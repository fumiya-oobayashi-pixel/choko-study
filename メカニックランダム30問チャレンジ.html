問1", "label": "問1(8)", "points": 3, "answer": "B", "stem": "２０２３年モデルプロフィアのプロシフト12（M112）に関する記述として、不適切なものはどれか。", "choices": {"A": "カウンターシャフトブレーキが新設され、トランスミッション後方に配置されている。", "B": "カウンターシャフトブレーキを外した後の取付け時には、全ての摩擦板をかん合させるために叩いて位相合わせをする。", "C": "ACUがクラッチアクチュエーター（CSC）に変更されている。CSCはクラッチベルハウジング内にあり、エアで作動し、このエアはクラッチ電磁弁で制御する。", "D": "クラッチストロークセンサーは、CSCに取り付けられており、エアピストンのストロークを検出している。"}, "explanation": "カウンターシャフト摩擦板のスプラインとブレーキシャフトのスプラインの位相が合っていない時は、摩擦板を1枚ずつ回転させて合わせる。叩くと摩擦板が破損する。正解はB。", "source": "23年 2次", "cat": "T/M"}, {"no": 9, "section": "問1", "label": "問1(9)", "points": 3, "answer": "B", "stem": "アリソンオートマチックトランスミッション（６速）の変速作動に関する記述として、不適切なものはどれか。", "choices": {"A": "シフトポジション「R」時は、P2サンギヤが逆回転出力となるため、P3サンギヤに逆回転が入力され、P3キャリアは逆回転のまま減速して出力し、アウトプットシャフトへ伝える。", "B": "シフトポジション「D」２速時は、P2キャリアを増速出力させてP3リングギヤへ伝えるので、P3キャリアが１速時より小さいレシオでアウトプットシャフトを回転させる。", "C": "シフトポジション「D」１速時は、P3リングギヤが拘束され、P3キャリアを出力とすることでアウトプットシャフトを減速回転させている。", "D": "シフトポジション「D」４速時は、P3リングギヤとP3サンギヤは等速で回転し、出力となるP3キャリアも等速回転となり、アウトプットシャフトが回転する。"}, "explanation": "「D」2速時でもP2キャリアは減速回転する（増速出力ではない）。1速時は拘束されていたP3リングギヤが2速時にはP3サンギヤと共に入力として回転するので、その分だけ1速時より小さいギヤレシオを作っている。正解はB。", "source": "23年 2次", "cat": "T/M"}, {"no": 10, "section": "問1", "label": "問1(10)", "points": 3, "answer": "A", "stem": "プッシュ式レリーズフォーク（ダイヤフラムスプリング）のマニュアルトランスミッション搭載車両にて、トランスミッション周辺で異音が発生している場合に関する記述として、不適切なものはどれか。", "choices": {"A": "走行中に異音が発生していて、ギヤ段により異音が変化する場合は、トランスミッション内部の不具合であり、クラッチの不具合は考えられない。", "B": "停車中に異音が発生していて、クラッチを切った時に異音が消える場合は、クラッチの不具合であり、トランスミッションの不具合は考えられない。", "C": "停車中に異音が発生していて、クラッチを切って異音が消えない場合は、エンジン側の不具合が考えられる。", "D": "走行中に異音が発生していて、クラッチを切ったままニュートラルにした時に異音が消える場合は、トランスミッション内のベアリング不具合が考えられる。"}, "explanation": "クラッチの断接によってT/M内部が回転するしないの変化をするため、ギヤ段により異音が変化する場合はトランスミッション内部の不具合も考えられる（クラッチの不具合だけとは言えない）。正解はA。", "source": "23年 2次", "cat": "T/M"}, {"no": 12, "section": "問1", "label": "問1(12)", "points": 3, "answer": "B", "stem": "２＊G付プロフィアトラックのサスペンションを脱着する場合の注意事項に関する記述として、不適切なものはどれか。", "choices": {"A": "スターターキーを必ず「LOCK」位置にしたのちレベリングタイマーを解除する。", "B": "車高センサー、リンクロッド、レベリングレバーの脱着作業のみ、必ず車高の初期設定を行う。", "C": "アッパーロッドは、組付け方向矢印が車両前方になるように取り付ける。", "D": "アクスルが前方にずれないようにドラムおよびローター部をトランスミッションジャッキなどで支え、浮かせないようにする。"}, "explanation": "車高センサー、リンクロッド、レベリングレバーだけではなく、車高センサーブラケット、トルクロッドブラケットなどの取り外し作業を行ったときにも必ず車高の初期設定を行う。正解はB。", "source": "23年 2次", "cat": "T/M"}, {"no": 13, "section": "問1", "label": "問1(13)", "points": 3, "answer": "C", "stem": "振動・騒音に関する記述として、適切なものはどれか。", "choices": {"A": "シミーとは、ホイール系のダイナミックアンバランスや路面の凹凸が振動強制力となり、発生する現象である。", "B": "こもり音とは、ホイール系のアンバランスやエンジントルク変動などが振動強制力となり、発生する現象である。", "C": "シェイクとは、ホイール系のアンバランスや路面の凹凸が振動強制力となり、発生する現象である。", "D": "ハーシュネスとは、タイヤのランアウト不良が振動強制力となり、発生する現象である。"}, "explanation": "シェイクはホイール系のアンバランス・偏心・ブレーキハブのアンバランスが原因。こもり音はE/Gトルク変動・タイヤのランアウト不良・プロペラシャフトのアンバランスが原因。ハーシュネスは路面の凹凸が原因。シミーはダイナミックアンバランスが原因。正解はC。", "source": "23年 2次", "cat": "エンジン"}, {"no": 14, "section": "問1", "label": "問1(14)", "points": 3, "answer": "B", "stem": "ファイナル・ギヤに関する記述として、適切なものはどれか。", "choices": {"A": "トー当たり、フェース当たりの場合は、ドライブ・ピニオンを遠ざけ、リング・ギヤを近付ける。", "B": "トー当たり、フランク当たりの場合は、ドライブ・ピニオンを遠ざけ、リング・ギヤを近付ける。", "C": "ヒール当たり、フェース当たりの場合は、ドライブ・ピニオンを近付け、リング・ギヤを遠ざける。", "D": "ヒール当たり、フランク当たりの場合は、ドライブ・ピニオンを遠ざけ、リング・ギヤを近付ける。"}, "explanation": "トー当たり、フランク当たりの場合は、ドライブ・ピニオンを遠ざけリング・ギヤを近付ける。正解はB。", "source": "23年 2次", "cat": "一般関連"}, {"no": 15, "section": "問1", "label": "問1(15)", "points": 3, "answer": "C", "stem": "ASRの制御に関する記述として、不適切なものはどれか。", "choices": {"A": "車両が走行を開始すると左右の駆動輪の車輪速度が常に前輪と比較、監視される。", "B": "駆動輪の駆動力を維持することにより、加速時の尻振りを防止している。", "C": "タイヤと路面間の摩擦力の変化に対応して、ブレーキ作動中の車両の安定性を確保している。", "D": "一方の駆動輪が空転を始めスリップ率の限界値を超えると、ただちにスリップをしている車輪にブレーキをかける。"}, "explanation": "選択肢Cは、ABSの説明である。ASRはスリップした車輪へのブレーキとエンジン出力の低減により駆動力をコントロールする（ブレーキ作動中の安定性確保はABSの機能）。正解はC。", "source": "23年 2次", "cat": "ブレーキ"}, {"no": 16, "section": "問1", "label": "問1(16)", "points": 3, "answer": "A", "stem": "L＊G付プロフィアのEBSに関する記述として、適切なものはどれか。", "choices": {"A": "EBSが故障して電気系が全失陥しバックアップモードに入っても、ブレーキ力は確保されているのでPCSは作動する。", "B": "バックアップ用のエア回路を残していて、常時バックアップバルブのエア圧をアクスルモジュレータへ送ることにより、電気系統の失陥が生じた場合にもブレーキを作動できるようにしている。", "C": "ブレーキシグナルトランスミッターは、ブレーキペダルのストローク量を電気信号に変換し、ECUからストローク量をフィードバックされ、その指示値によりエア圧をチャンバーへ送っている。", "D": "ブレーキブースターの戻り不良の原因として、エアピストンとエアシリンダーの摺動不良やチェックバルブの機能不良などが考えられる。"}, "explanation": "A：バックアップモード時にはPCSは作動しない（誤り）。B：EBS正常時はバックアップバルブによりバックアップエアを遮断している。C：エア圧はモジュレーター（比例電磁弁）を介してチャンバーへ送っている。正解はA（不適切）。", "source": "23年 2次", "cat": "ブレーキ"}, {"no": 17, "section": "問1", "label": "問1(17)", "points": 3, "answer": "A", "stem": "ブレーキの故障に関する記述として、不適切なものはどれか。", "choices": {"A": "ブレーキジャダーの高速ジャダーは、高速からの強いブレーキをかけた時に起こる。原因として最も影響があるのはフロントドラム摺動面の振れである。", "B": "ブレーキの片効きは、特に新品ライニングで発生しやすくなっている。これは左右の当たりが不均一であったり、フェードが大きいためである。", "C": "ブレーキライニングの早期摩耗はブレーキの使用条件に大きく左右されるが、その中でも最も影響の大きいのがライニングの温度である。", "D": "バックアップバルブはEBS失陥時、リレーバルブとして働き、ブレーキシグナルトランスミッターからのエア信号圧を、アクスルモジュレーターに送る。"}, "explanation": "高速ジャダーは高速からの強いブレーキではなく、高速からの弱いブレーキをかけた時に起こる。正解はA。", "source": "23年 2次", "cat": "T/M"}, {"no": 18, "section": "問1", "label": "問1(18)", "points": 3, "answer": "B", "stem": "２＊G付デュトロのABS制御に関する記述として、不適切なものはどれか。", "choices": {"A": "増圧作動時　保持ソレノイドへの信号はOFFである。減圧ソレノイドへの信号はOFFである。", "B": "減圧作動時　保持ソレノイドへの信号はONである。減圧ソレノイドへの信号はOFFである。", "C": "保持作動時　保持ソレノイドへの信号はONである。減圧ソレノイドへの信号はOFFである。", "D": "ブレーキアクチュエーターはTRC（駆動力制御）の制御に関わっている。"}, "explanation": "減圧作動時は、保持ソレノイドへの信号はON、減圧ソレノイドへの信号はON（OFFではなくON）。正解はB。", "source": "23年 2次", "cat": "ブレーキ"}, {"no": 19, "section": "問1", "label": "問1(19)", "points": 3, "answer": "D", "stem": "２＊G付プロフィアのエアスプリングの各バルブの作動についての記述として、適切な組み合わせはどれか。【エア排出時】給気／排気切り替えマグネチックバルブは［イ］　左右開閉切り替えバルブは［ロ］", "choices": {"A": "［イ］OFF　［ロ］OFF", "B": "［イ］ON　［ロ］ON", "C": "［イ］ON　［ロ］OFF", "D": "［イ］OFF　［ロ］ON"}, "explanation": "エア排出時の組み合わせは、給気/排気切り替えマグネチックバルブは「OFF」、左右開閉切り替えマグネチックバルブは「ON」。正解はD。", "source": "23年 2次", "cat": "シャシ・フレーム"}, {"no": 20, "section": "問1", "label": "問1(20)", "points": 3, "answer": "B", "stem": "２＊G付プロフィアのADBシステムに関する記述として、不適切なものはどれか。", "choices": {"A": "常時、画像センサーで前方車両位置を検出しているため、相対位置が変わっても遮光範囲を追従可能となっている。", "B": "ミリ波レーダーセンサーで対向車のヘッドライト、先行者のテールライト位置を検出している。", "C": "協調システムデバイスからの信号を基にヘッドライトのハイビーム配光を制御している。", "D": "プロジェクターレンズに搭載されたLEDを点灯／消灯／調光している。"}, "explanation": "対向車のヘッドライト、先行者のテールライト位置を検出しているのはミリ波レーダーセンサーではなく画像センサー。正解はB。", "source": "23年 2次", "cat": "電気装置"}, {"no": 23, "section": "問1", "label": "問1(23)", "points": 3, "answer": "D", "stem": "業務用消火器の適応火災表示例の記述として、不適切なものはどれか。", "choices": {"A": "白色ラベル　普通火災（A火災）木材、紙などの火災", "B": "黄色ラベル　油火災（B火災）石油類の火災", "C": "青色ラベル　電気火災（C火災）電気設備火災など", "D": "赤色ラベル　ガス火災"}, "explanation": "白：普通火災（A火災）木材・紙などの火災、黄：油火災（B火災）石油類の火災、青：電気火災（C火災）電気設備火災など。赤色ラベルのガス火災という区分は存在しない。正解はD。", "source": "23年 2次", "cat": "一般関連"}, {"no": 24, "section": "問1", "label": "問1(24)", "points": 3, "answer": "A", "stem": "安全作業の基本として、不適切なものはどれか。", "choices": {"A": "ホイスト作業時にワイヤーの吊り角が小さくなるとワイヤーにかかる力は大きくなるので、ワイヤーを丈夫なものにしなければならない。", "B": "グラインダー作業時は、保護めがね、革手袋、防塵マスクを必ず着用する。", "C": "安全で正確な作業は整理整頓された環境で生まれるので、通路に工具や部品を直接置かない。", "D": "ジャッキアップ時は、リジッドラックで車両を確実に支えてから作業を開始する。"}, "explanation": "吊り角が大きくなるとワイヤーにかかる力も大きくなる（小さくなると力は小さくなる）。正解はA。", "source": "23年 2次", "cat": "一般関連"}, {"no": 25, "section": "問1", "label": "問1(25)", "points": 3, "answer": "D", "stem": "排出ガスに関する記述として、適切なものはどれか。", "choices": {"A": "ディーゼルエンジンは空気過剰率が大きいため、COの発生は極めて多い。", "B": "ディーゼルエンジンは十分な空気の中で燃焼が行われるため、HCの発生は多い。", "C": "排出ガス中におけるNOxは主にNOとO2である。", "D": "サルフェートとは、燃焼中の硫黄分が酸化して生成された硫黄化合物の総称である。"}, "explanation": "A：ディーゼルエンジンはCOの発生は極めて少ない。B：HCの発生は少ない。C：NOxは主にNOとNO2（O2ではない）。D：サルフェートは硫黄化合物の総称で正しい。正解はD。", "source": "23年 2次", "cat": "エンジン"}, {"no": 26, "section": "問1", "label": "問1(26)", "points": 3, "answer": "C", "stem": "２＊G付プロフィア（２０２３年モデル）に関する記述として、適切なものはどれか。", "choices": {"A": "EDSSについて、車線逸脱警報をOFFにしているとEDSS作動時における車両逸脱判定は行わないため、減速および停止は機能するが、車線内維持は行わない。", "B": "SAMSは、コーナーレーダーセンサーで進路上を交差する移動物を検知し、衝突の恐れがあれば自動でブレーキを作動させる。", "C": "レーンキーピングアシスト（LKA）は、一定速度以上で走行中にシステムが車線逸脱を判断するとステアリングを制御し、車両を車線内に戻す支援や車線内に維持することを支援する。", "D": "ドライバーモニターIIは、PCSと連動して作動するものであるため、単独での運転者への警報機能は備えていない。"}, "explanation": "A：EDSSにおける車両逸脱判定は継続させる（警報OFFでも）。B：SAMSは警告のみ（自動ブレーキは作動しない）。D：ドライバーモニターIIは単独警報機能がある。正解はC。", "source": "23年 2次", "cat": "ブレーキ"}, {"no": 27, "section": "問1", "label": "問1(27)", "points": 3, "answer": "A", "stem": "道路運送車両の保安基準に照らし、保安基準に関する記述として、不適切なものはどれか。", "choices": {"A": "自動車の安定性に関し、空車状態及び積車状態におけるかじ取り車輪の接地部にかかる軸重の総和が、それぞれ車両重量及び車両総重量の２０％（三輪自動車にあっては１８％）以上であること。", "B": "自動車の軸重は、１０トン（牽引自動車のうちで告示で定めるものは１１．５トン）を超えてはならない。", "C": "自動車には、走行中の自動車が確実かつ安全に減速及び停止を行なうことができ、かつ、平坦な舗装路面等で確実に停止状態を保持できるものとして、独立に作用する二系統以上の制動装置を備えなければならない。", "D": "最遠軸距離とは、自動車の最前部の車軸中心から最後部の車軸中心までの水平距離をいう。"}, "explanation": "保安基準第四条の2に規定されるのは「かじ取り車輪の接地部にかかる荷重の総和」であり、「軸重」ではない。正解はA。", "source": "23年 2次", "cat": "法令"}, {"no": 28, "section": "問1", "label": "問1(28)", "points": 3, "answer": "B", "stem": "道路運送車両法の保安基準に照らし、小型四輪の乗用車（車両重量１,３８０㎏、乗車定員５人、右ハンドル）を左側及び右側に、それぞれ傾けた場合に転覆しない角度の組み合わせとして、適切なものはどれか。", "choices": {"A": "左側３０° 右側３０°", "B": "左側３５° 右側３５°", "C": "左側３０° 右側２５°", "D": "左側２５° 右側３０°"}, "explanation": "道路運送車両法の保安基準第5条（安定性）：自動車は空車状態において、左側および右側にそれぞれ35°まで傾けた場合に転覆しないこと。ただし、車両総重量が車両重量の1.2倍以下の自動車は30°まで。本問の乗用車は35°/35°。正解はB。", "source": "23年 2次", "cat": "法令"}, {"no": 29, "section": "問1", "label": "問1(29)", "points": 3, "answer": "C", "stem": "事業用自動車の定期点検基準に関する記述として、不適切なものはどれか。", "choices": {"A": "ファンベルトの緩み及び損傷は３ヵ月ごと", "B": "ショックアブソーバーの油漏れ及び損傷は３ヵ月ごと", "C": "バッテリーターミナル部の接続状態は６ヵ月ごと", "D": "ホイールボルト、ナットの緩みは３ヵ月ごと"}, "explanation": "事業用自動車等の定期点検基準：バッテリーターミナル部の接続状態は3ヵ月ごと（6ヵ月ではない）。正解はC。", "source": "23年 2次", "cat": "一般関連"}, {"no": 30, "section": "問1", "label": "問1(30)", "points": 3, "answer": "A", "stem": "道路運送車両法の保安基準に照らし（２０１７年以降制作車両）、次の文章の［　］に当てはまる記述として、適切なものはどれか。「貨物の運送の用に供する普通自動車であって車両総重量が［　］以上のものの後面には、大型後部反射器を備えなければならない。」", "choices": {"A": "７トン", "B": "５トン", "C": "８トン", "D": "１０トン"}, "explanation": "道路運送車両法保安基準第38条の2（大型後部反射器）：貨物の運送の用に供する普通自動車であって車両総重量が7トン以上のものの後面には、後部反射器の他に、更に大型後部反射器を備えなければならない。正解はA。", "source": "23年 2次", "cat": "法令"}, {"no": 1, "section": "問1", "label": "問1(1)", "points": 3, "answer": "B", "stem": "２＊Ｇ付プロフィア（２０１７年モデル）のＥ１３Ｃエンジンに関する記述として、不適切なものはどれか。", "choices": {"A": "ピストンピン部の下端から指定された寸法の部位を測定する。", "B": "シリンダーブロック上面のひずみの測定は、直定規とプラスチゲージを使用して測定する。", "C": "シリンダーヘッド下面またはブロック上面を研磨した場合は、カムアイドルギヤとサブアイドルギヤのバックラッシュが小さくなるため、カムアイドルギヤシャフトを位置決めピンの無いものに交換してバックラッシュを調整する。", "D": "メインベアリングキャップに取り付けるスラストベアリングは、品番捺印側をメインベアリングキャップ側に向けてメインベアリングキャップに取り付ける。"}, "explanation": "シリンダーブロック上面のひずみの測定は、直定規とシックネスゲージ（プラスチゲージではない）を使用して測定する。正解はB。", "source": "24年 2次", "cat": "エンジン"}, {"no": 2, "section": "問1", "label": "問1(2)", "points": 3, "answer": "D", "stem": "２＊Ｇ付プロフィア（２０１７年モデル）のＥ１３Ｃエンジンに関する記述として、不適切なものはどれか。", "choices": {"A": "ＥＧＲとＶＮＴの作動に関して、エンジン負荷が高い時はターボの過給によりインマニ内圧力の方が高くなりＥＧＲ効率が悪いので、ＶＮＴのノズルを絞って、エキマニ内圧力を高め、ＥＧＲ効率を高めている。", "B": "エンジンの出力不足がある場合の故障原因として、ＥＧＲバルブが全開固着した場合は出力不足の要因になり得る。", "C": "エンジンリターダーの強弱はＶＮＴの開度で制御されており、ノズルを絞った場合はターボの回転が上がり、吸気が増えることで圧縮時の抵抗が増加するためブレーキ力が強くなる。", "D": "エンジンの出力不足がある場合の故障原因として、ＥＧＲバルブの開度不良は考えられない。"}, "explanation": "EGRバルブが全開固着した場合は出力不足の要因になり得るため、EGRバルブの開度不良も考えられる原因の一つ。正解はD。", "source": "24年 2次", "cat": "T/M"}, {"no": 3, "section": "問1", "label": "問1(3)", "points": 3, "answer": "A", "stem": "Ａ０５Ｃエンジンに関する記述として、適切なものはどれか。", "choices": {"A": "コモンレール圧力センサーは、センサー側コネクター断線時にＥＣＵ側信号電圧が約５Ｖを示す。", "B": "エンジン冷却水が減る要因の一つとしてエンジンのヘッドガスケットからの吹き抜けが挙げられるが、シリンダーライナーの突き出し量不足や突き出し部の損傷などが原因である。", "C": "寒冷地でのエンジン始動不良の要因の一つとして軽油の種類が挙げられるが、寒冷地では－２０°Ｃまで凍結しない軽油３号を入れる必要がある。", "D": "エンジンリターダーが作動状態から戻らなくなる原因として、ワイヤーハーネスの断線やエンジンＥＣＵの故障が考えられる。"}, "explanation": "コモンレール圧力センサーはセンサー側コネクター断線時にECU側信号電圧が約5Vを示す（プルアップ抵抗のため）。これが適切な記述。正解はA。", "source": "24年 2次", "cat": "T/M"}, {"no": 5, "section": "問1", "label": "問1(5)", "points": 3, "answer": "A", "stem": "２＊Ｇ付プロフィアハイブリッドシステム（２０２４年モデル）に関する記述として、不適切なものはどれか。", "choices": {"A": "定常走行時に負荷が低いときは、クラッチを切断してＨＶモーターのみで走行する。このとき、エンジンは燃費確保のため停止している。", "B": "一定車速以上でスキャニングクルーズ使用時に下り坂などで増速した場合、設定した目標車速を保持するように自動で回生ブレーキを掛ける。", "C": "アイドリングストップ状態からのエンジン再始動は、ＨＶモーターがスターターとして働き、キー操作時のエンジン始動はスターターモーターを使用してエンジンを始動する。", "D": "走行発電はＨＶバッテリーの過放電防止のために充電を行うため、エンジンフルで走行している場合でも発電電力を確保している。"}, "explanation": "HVモーターのみの走行中でもエンジンは停止しない（燃費確保のため停止するという記述が不適切）。正解はA。", "source": "24年 2次", "cat": "HV"}, {"no": 6, "section": "問1", "label": "問1(6)", "points": 3, "answer": "C", "stem": "デュトロハイブリッドシステムに関する記述として、不適切なものはどれか。", "choices": {"A": "システムメインリレー（ＳＭＲ）は、ＨＶバッテリーとインバーター間の接続と遮断を行っており、ＳＭＲ１及びプリチャージレジスターは、電源投入時の突入電流が回路に流れないようにしている。", "B": "ＨＶバッテリーＥＣＵは、ＨＶバッテリーの状態を常に監視し、ＨＶ－ＥＣＵへバッテリーＳＯＣを送信している。なお、ＳＯＣの制御目標値は約６０％である。", "C": "ＨＶバッテリー容量に十分な余裕がある場合でも、エンジントルクアシスト機能において、モータージェネレーターのみでの発進・走行は行わない。", "D": "パラレル・シリーズハイブリッドシステムの特徴は、パラレル方式のハイブリッドシステムにＨＶバッテリー充電専用の発電機を加えたシステムで、モーター走行しながら発電が可能である。"}, "explanation": "HVバッテリー容量に十分な余裕がある時は、モータージェネレーターのみで発進・走行する（モータージェネレーターのみでの発進・走行は行わないという記述が不適切）。正解はC。", "source": "24年 2次", "cat": "HV"}, {"no": 7, "section": "問1", "label": "問1(7)", "points": 3, "answer": "D", "stem": "Ｍ１１２に関する記述として、不適切なものはどれか。", "choices": {"A": "カウンターシャフトブレーキの新設により、変速スピードの向上とドライバビリティを実現した。", "B": "ケース形状を変更することで、剛性の向上による信頼性向上と整備性向上を実現した。", "C": "ＰＴＯポジションスイッチ経路を新設した。", "D": "メインギヤの１速－後退、２速－３速、スプリッターＬｏギヤおよびＨｉギアをそれぞれシンクロレス化することで、質量の低減と変速スピードアップを実現した。"}, "explanation": "トランスミッションスプリッターはシンクロレスではない。正解はD。", "source": "24年 2次", "cat": "T/M"}, {"no": 8, "section": "問1", "label": "問1(8)", "points": 3, "answer": "B", "stem": "マニュアルトランスミッションの振動・騒音に関する記述として、不適切なものはどれか。", "choices": {"A": "インターロックピンの摺動不良", "B": "うなり音は、トランスミッションギヤのかみ合い率を小さくし、振動周波数を低くすることで低減することができる。", "C": "アイドル回転速度が高すぎる", "D": "コントロールバルブの不良"}, "explanation": "うなり音の低減は、かみ合い率を大きくし、振動周波数を高くすることで低減できる（小さくするのは不適切）。正解はB。", "source": "24年 2次", "cat": "T/M"}, {"no": 9, "section": "問1", "label": "問1(9)", "points": 3, "answer": "A", "stem": "マニュアルトランスミッションの「チェンジレバーの操作が重い」という症状の推定原因として、不適切なものはどれか。", "choices": {"A": "シンクロスリーブスプライン部摩耗", "B": "ジャダは、クラッチを徐々につないでいく際にクラッチディスクの摩擦面で間欠的な滑りが生じ、エンジンからの伝達トルクが変動することで発生する。", "C": "クラッチ切れ不良", "D": "コントロールバルブの不良"}, "explanation": "シンクロスリーブスプライン部の摩耗はギヤ抜けの要因となる（チェンジレバー操作が重い原因ではない）。正解はA。", "source": "24年 2次", "cat": "T/M"}, {"no": 10, "section": "問1", "label": "問1(10)", "points": 3, "answer": "B", "stem": "マニュアルトランスミッションの振動・騒音に関する記述として、不適切なものはどれか。", "choices": {"A": "車両発進時のジャダは、１０Ｈｚ～２０Ｈｚの振動周波数でクラッチ伝達トルクの変動による振動である。", "B": "うなり音は、４００Ｈｚ～３ｋＨｚの振動周波数でトランスミッションギヤのかみ合いによる振動である。", "C": "オートマチックトランスミッションにおいて、変速時ショックが大きい場合に考えられる不具合原因として、シンクロスリーブスプラインチャンファー（面取り部）摩耗がある。", "D": "ＡＴ内部のクラッチ、ブレーキなどの作動不良やラインプレッシャーが高すぎる場合は変速時ショックが大きくなる。"}, "explanation": "うなり音はトランスミッションギヤのかみ合い率を大きくし振動周波数を高くすることで低減できる（うなり音の周波数は400Hz～3kHzという記述は不適切）。正解はB。", "source": "24年 2次", "cat": "T/M"}, {"no": 11, "section": "問1", "label": "問1(11)", "points": 3, "answer": "D", "stem": "エアサスペンション機能で、各軸重値をメータへ表示させる機能の記述として、不適切なものはどれか。", "choices": {"A": "エアスプリングの高さが標準高付近であれば、走行中も軸重モニターを表示し、２秒毎に更新され、０．１ｔ単位で表示を行うことができる。", "B": "ハイトコントロールで車高を上下した場合、標準車高から外れると軸重は「－」表示になる。", "C": "軸重モニターに故障が発生したときは、マルチインフォメーション内のウォーニングランプ表示部にハイトコントロールウォーニングランプを点灯させ、あわせて、マルチディスプレイのメイン画面に表示を行う。", "D": "車両制御ＥＣＵにて内圧を計算し、ＣＡＮ信号をメーターへ出力する。"}, "explanation": "軸重モニターの内圧計算とCAN信号出力はエアサス制御ECUが行う（車両制御ECUではない）。正解はD。", "source": "24年 2次", "cat": "シャシ・フレーム"}, {"no": 12, "section": "問1", "label": "問1(12)", "points": 3, "answer": "D", "stem": "シャシの故障診断に関する記述として、不適切なものはどれか。", "choices": {"A": "ジョイント角があると回転変動が生じるため、入力軸と出力軸を平行にすることで回転変動を相殺している。", "B": "エキゾーストブレーキが作動しない要因として、カーボンによるバルブ固着やコントロールシリンダーのリターンスプリング折損、排気漏れが考えられる。", "C": "制動力不良の要因としては、ブレーキ装置に不具合がある場合や真空倍力装置に負圧が作用しない場合、その他にフェード現象やベーパーロック現象が発生した場合などが推定される。", "D": "リターダーが作動しない場合に考えられる要因として、リターダースイッチの不良や電磁弁の不良、アイドルスイッチの不良が考えられる。"}, "explanation": "排気漏れでもエキゾーストブレーキは作動する（ブレーキ力が弱くなるだけ）。Dのリターダー作動不良の要因としてアイドルスイッチの不良は考えられない。正解はD。", "source": "24年 2次", "cat": "T/M"}, {"no": 13, "section": "問1", "label": "問1(13)", "points": 3, "answer": "B", "stem": "プロペラシャフトの振動・騒音に関する記述として、不適切なものはどれか。", "choices": {"A": "プロペラシャフトにアンバランスがあると回転の遠心力で振動が生じる。この振動は回転速度（車速）が高くなると急激に増加する。", "B": "ジョイント部には反対側の軸から受ける偶力があり、これは二次偶力と呼ばれ、回転変動と同じように入力軸と出力軸を平行にすると解消する。", "C": "３ジョイントプロペラシャフトでは、シャフトを分割することで固有振動数を高め、高速時のエンジン、ミッション、プロペラシャフトの曲げ振動によるこもり音を防止している。", "D": "ブレーキジャダーはブレーキをかけたときに異常な振動や異音、左右に振れたりする振動が発生する現象で、車体振動のピークは６０～８０ｋｍ／ｈ付近で、ステアリングホイール振動は１００～１５０ｋｍ／ｈ付近である。"}, "explanation": "二次偶力は、それぞれのジョイント角に存在し、入力軸と出力軸を平行にするだけでは解決しない。正解はB。", "source": "24年 2次", "cat": "T/M"}, {"no": 14, "section": "問1", "label": "問1(14)", "points": 3, "answer": "C", "stem": "ファイナル・ギヤに関する記述として、適切なものはどれか。", "choices": {"A": "トー当たり、フランク当たりの場合は、ドライブ・ピニオンを近付け、リング・ギヤを遠ざける。", "B": "ヒール当たり、フランク当たりの場合は、ドライブ・ピニオンを遠ざけ、リング・ギヤを近付ける。", "C": "トー当たり、フランク当たりの場合は、ドライブ・ピニオンを遠ざけリング・ギヤを近付ける。", "D": "トー当たり、フェース当たりの場合は、ドライブ・ピニオンを遠ざけ、リング・ギヤを近付ける。"}, "explanation": "トー当たり・フランク当たりの場合は、ドライブ・ピニオンを遠ざけリング・ギヤを近付ける。正解はC。", "source": "24年 2次", "cat": "一般関連"}, {"no": 15, "section": "問1", "label": "問1(15)", "points": 3, "answer": "D", "stem": "２０１７年モデル日野デュトロのＰＣＳ作動条件として、不適切なものはどれか。", "choices": {"A": "スターターキーまたはエンジン（イグニッション）スイッチが「ＯＮ」のとき", "B": "自車速度が約１０ｋｍ／ｈ～１４０ｋｍ／ｈのとき", "C": "自車から見た先行車や障害物等の相対速度が約１０ｋｍ／ｈ以上のとき", "D": "検出対象が歩行者のときは、自車速度約１２ｋｍ／ｈ～５０ｋｍ／ｈのとき"}, "explanation": "検出対象が歩行者のときは、自車速度約12km/h～80km/hが正しい（50km/hではない）。正解はD。", "source": "24年 2次", "cat": "エンジン"}, {"no": 16, "section": "問1", "label": "問1(16)", "points": 3, "answer": "A", "stem": "ブレーキノイズの説明として、適切なものはどれか。", "choices": {"A": "スキール音は、制動時に発生する。", "B": "スキーク音は、非制動時に発生する。", "C": "グローン音の振動周波数は、２００Ｈｚから５００Ｈｚである。", "D": "グローン音のうち、軽い制動時に発生する「グー」という音は、ライニングとドラムのスリップによるものである。"}, "explanation": "スキール音は制動時に発生する（スキーク音は非制動時→制動時への移行時に発生、グローン音は200Hzから500Hz）。正解はA。", "source": "24年 2次", "cat": "ブレーキ"}, {"no": 17, "section": "問1", "label": "問1(17)", "points": 3, "answer": "A", "stem": "２＊Ｇ付き小型トラック（１．５ｔ）のブレーキコントロールシステムに関する記述として、不適切なものはどれか。", "choices": {"A": "コンビネーションメータＡＳＳＹのスリップインジケータランプは、①ＴＲＣ、ＶＳＣの作動時②スキッドコントロールＥＣＵに異常が発生した場合に点灯する。", "B": "システムに異常が発生し、システムが停止した場合にはフェイルセーフ機能として、人力により発生させたブレーキマスタシリンダの油圧がホイールシリンダに作用する構造とし、制動力を確保している。", "C": "ＶＳＣ ＥＣＵは、ヨーレートセンサーおよびＧセンサーを内蔵しており、ヨーレート、横Ｇを検出して、ＣＡＮ通信により、ＥＢＳ ＥＣＵに信号を送る。", "D": "ブレーキアクチュエータＡＳＳＹのスキッドコントロールコンピュータは、各センサおよびコンピュータからの信号をもとに、ブレーキアクチュエータＡＳＳＹを駆動して、各輪のブレーキ油圧を制御する。"}, "explanation": "スリップインジケータランプはTRC・VSCの作動時は点滅する（点灯ではない）。点灯はスキッドコントロールECUに異常が発生した場合。正解はA。", "source": "24年 2次", "cat": "ブレーキ"}, {"no": 18, "section": "問1", "label": "問1(18)", "points": 3, "answer": "A", "stem": "２＊Ｇ付プロフィアのＶＳＣに関する記述として、不適切なものはどれか。", "choices": {"A": "車両が走行を開始すると左右の駆動輪の車輪速度が常に前輪と比較、監視される。", "B": "横滑り軽減制御時は、旋回時の過大なヨーを抑えるため、両輪をブレーキ制御して横滑りを抑制する。", "C": "ロール軽減制御時は、各輪のブレーキを制御し、安定的に車両を減速させ横Ｇを減少させる。", "D": "ブレーキウォーニングランプは、①ＥＢＤに異常が発生した場合②ブレーキフルードレベル低下時③バキュームタンク内の負圧低下時に点灯する。"}, "explanation": "Aの記述はABSの説明である（VSCではない）。正解はA。", "source": "24年 2次", "cat": "ブレーキ"}, {"no": 19, "section": "問1", "label": "問1(19)", "points": 3, "answer": "D", "stem": "２＊Ｇ付プロフィアのＡＳＲの制御に関する記述として、不適切なものはどれか。", "choices": {"A": "一方の駆動輪が空転を始めスリップ率の限界値を超えると、ただちにスリップをしている車輪にブレーキをかける。", "B": "駆動輪の駆動力を維持することにより、加速時の尻振りを防止している。", "C": "タイヤと路面間の摩擦力の変化に対応して、ブレーキ作動中の車両の安定性を確保している。", "D": "車両制御ＥＣＵは、危険状態を感知すると、ＥＢＳ ＥＣＵからの信号を入力してエンジンＥＣＵに出力し、エンジンＥＣＵはこの信号をもとにエンジン出力を制御する。"}, "explanation": "ASRでは片輪にブレーキをかける（両輪ではない）。また車両制御ECUの制御経路の説明に誤りがある。正解はD。", "source": "24年 2次", "cat": "ブレーキ"}, {"no": 20, "section": "問1", "label": "問1(20)", "points": 3, "answer": "B", "stem": "図に示すソレノイドバルブ回路をサーキットテスタで点検した結果の不具合推測に関する記述として、不適切なものはどれか。", "choices": {"A": "アクチュエーター停止時、③とアース間で測定した電圧が０Ｖの場合、アクチュエーターのコイルや配線の異常が考えられる。", "B": "アクチュエーター駆動時、①と②間で測定した電圧が２４Ｖの場合は、正常である。", "C": "アクチュエーター駆動時、①とアース間で測定した電圧が２４Ｖで、②とアース間で測定した電圧が１２Ｖの場合は、コイルからＥＣＵ間の配線抵抗増大が考えられる。", "D": "アクチュエーター停止状態から駆動したとき、②とアース間で電圧を測定して、２４Ｖから０Ｖに変化した場合、ＥＣＵ内部の異常が考えられる。"}, "explanation": "マイナス駆動回路では、正常駆動時に②より下流は0Vになるため、アクチュエーター駆動時に①と②間が24Vというのは正常ではない（異常がある）。正解はB。", "source": "24年 const calcPool = [{"no": 31, "section": "問2", "label": "問2(1)", "points": 5, "answer": "A", "stem": "【計算問題】６気筒ガソリンエンジン搭載の後輪駆動車（ＦＲ式）において、高速道路を１００ｋｍ／ｈで走行中に振動が発生したため、振動計を用いて振動周波数を測定した。測定結果と推定原因に関する記述として[ イ ]～[ 二 ]に当てはまる数値として、適切なものはどれか。\n\n（注）答えが小数点以下になる場合は、小数点以下第１位を四捨五入しなさい。\n\n【車両情報】\n・Ｔ／Ｍの変速比：０．７１３\n・最終減速比：３．５４２\n・タイヤの有効半径：０．３ｍ\n\n振動周波数が約[ イ ]Ｈｚの場合は、タイヤのアンバランスが考えられる\n振動周波数が約[ ロ ]Ｈｚの場合は、ドライブシャフト(トリポート型等速ジョイント)のジョイントの不良が考えられる\n振動周波数が約[ ハ ]Ｈｚの場合は、エンジンのトルク変動が考えられる\n振動周波数が約[ 二 ]Ｈｚの場合は、プロペラシャフトのアンバランスが考えられる", "choices": {"A": "［イ］１５ ［ロ］４４ ［ハ］１１１ ［二］５２", "B": "［イ］１５ ［ロ］１５ ［ハ］１１１ ［二］４４", "C": "［イ］４４ ［ロ］１１３ ［ハ］１５ ［二］１５", "D": "［イ］１５ ［ロ］４４ ［ハ］４４ ［二］５２", "E": "［イ］１５ ［ロ］４４ ［ハ］９７ ［二］５２"}, "explanation": "タイヤの振動周波数：100,000m÷60分÷60秒÷(2π×0.3m)＝約15Hz\nドライブシャフト(トリポート型)：15Hz×3＝約44Hz（トリポート型は3倍）\nプロペラシャフト：15Hz×3.542≒約52Hz\nエンジントルク変動：52Hz×0.713×3（6気筒）≒約111Hz\n正解はA。", "source": "19年 1次", "cat": "計算"}, {"no": 32, "section": "問2", "label": "問2(2)", "points": 5, "answer": "E", "stem": "【計算問題】下図のコネクタＢの⑦～⑧間に０．２５ｋΩの接触抵抗が発生している場合、エンジンＥＣＵの入力回路の信号線電圧として、適切なものはどれか。\n\n【回路条件】\n・電源電圧：5V\n・プルアップ抵抗（ECU内蔵）：8kΩ\n・センサー内部抵抗：2kΩ\n・接触抵抗：0.25kΩ（250Ω）", "choices": {"A": "約 ４．０２ Ｖ", "B": "約 ４．００ Ｖ", "C": "約 ３．９０ Ｖ", "D": "約 １．００ Ｖ", "E": "約 ０．９７ Ｖ"}, "explanation": "オームの法則により全体に流れる電流：5V÷(8,000Ω+2,000Ω+250Ω)≒0.000488A\n信号線電圧：0.000488A×2,000Ω≒0.976V≒約0.97V\n正解はE。", "source": "19年 1次", "cat": "計算"}, {"no": 31, "section": "問2", "label": "問2(1)", "points": 5, "answer": "C", "stem": "【計算問題】タイヤ直径が９０ｃｍの大型トラックが時速８０ｋｍ／ｈで走行しているときのタイヤの周波数として、適切なものはどれか。ただし、円周率は３．１４とする。", "choices": {"A": "約３．４９Ｈｚ", "B": "約１０．３２Ｈｚ", "C": "約７．８６Ｈｚ", "D": "約１６．９２Ｈｚ", "E": "約２８．３１Ｈｚ"}, "explanation": "・80km/h×1,000÷3,600秒＝約22.22m/s\n・タイヤの円周：0.9m×3.14＝2.826m\n・周波数：22.22m/s÷2.826m≒約7.86Hz\n正解はC。", "source": "20年 1次", "cat": "計算"}, {"no": 32, "section": "問2", "label": "問2(2)", "points": 5, "answer": "B", "stem": "【計算問題】図に示す温度センサー回路において、コネクタの端子③と端子④の間に１．５ｋΩの接触抵抗が発生している場合、電圧計Ｖ（端子①）が示す電圧として、適切なものはどれか。ただし、配線等の抵抗はないものとする。\n\n【条件】\n・電源電圧：５Ｖ\n・Ｒ１：１．５ｋΩ\n・Ｒ２：１．５ｋΩ\n・水温センサー（温度センサー）：２．５ｋΩ", "choices": {"A": "約１．４Ｖ", "B": "約２．１Ｖ", "C": "約２．９Ｖ", "D": "約３．１Ｖ", "E": "約３．６Ｖ"}, "explanation": "・水温センサー回路の合成抵抗：2.5kΩ（センサー）+1.5kΩ（③④間の接触抵抗）＝4kΩ\n・4kΩとR2（1.5kΩ）の並列回路の合成抵抗：約1.09kΩ\n・回路全体の合成抵抗：1.5kΩ（R1）+約1.09kΩ＝約2.59kΩ\n・回路全体に流れる電流：5V÷2590Ω≒約0.00193A\n・R1での電圧降下：1500Ω×約0.00193A≒約2.89V\n・端子①の電圧：5V－約2.89V≒約2.10V\n正解はB。", "source": "20年 1次", "cat": "計算"}, {"no": 31, "section": "問2", "label": "問2(1)", "points": 5, "answer": "A", "stem": "【計算問題】図のような回路において、テスターにかかる電圧として適切なものはどれか。\n\n【条件】\n・電源電圧：24V\n・テスターの内部抵抗：0.5MΩ\n・並列回路の抵抗：11MΩ\n\n※テスターの内部抵抗も回路に含めて計算すること。", "choices": {"A": "１１．７３Ｖ", "B": "１２．００Ｖ", "C": "約６４km/h", "D": "約７５km/h", "E": "約１０３km/h"}, "explanation": "テスターの内部抵抗も回路に入れなければならないので、0.5MΩと11MΩの合成抵抗を求めて、0.5MΩを足すと回路全体の抵抗（0.97826Ω）が求められる。\n24V÷0.97826Ω≒24.533A\n24.533A×0.47826Ω≒11.73V\nよって11.73Vが正解。正解はA。", "source": "21年 1次", "cat": "計算"}, {"no": 32, "section": "問2", "label": "問2(2)", "points": 5, "answer": "B", "stem": "【計算問題】７速走行時の車速として適切なものはどれか。\n\n【条件】\n・エンジン回転数：1,600rpm\n・ギヤ段7速：メインギヤ3速、レンジＨＩ\n・トランスミッション変速比（7速）：1.318\n・ファイナルギア減速比：4\n・タイヤ半径：0.5m（タイヤ円周＝0.5×2×3.14＝3.14m）", "choices": {"A": "約６４km/h", "B": "約７５km/h", "C": "約１０３km/h", "D": "１１．７３Ｖ", "E": "１２．００Ｖ"}, "explanation": "タイヤ円周：0.5m×2×3.14＝3.14m\n車速：1,600（エンジン回転）×60（分）÷1.318（変速比）÷4（ファイナル減速比）×3.14（タイヤ円周）÷1,000（m）≒約75km/h\n正解はB。", "source": "21年 1次", "cat": "計算"}, {"no": 31, "section": "問2", "label": "問2(1)", "points": 5, "answer": "E", "stem": "【計算問題】図の回路において、内部抵抗が１２ＭΩのテスターに表示される電圧として、適切なものはどれか。ただし、配線の抵抗はないものとし、答えは小数点以下第３位を四捨五入とする。\n\n【条件】\n・電源：２４V\n・R1：０．７ＭΩ\n・R2：０．７ＭΩ\n・テスター内部抵抗：１２ＭΩ", "choices": {"A": "２４．００Ｖ", "B": "２３．５５Ｖ", "C": "１６．４０Ｖ", "D": "１３．４５Ｖ", "E": "１１．６６Ｖ"}, "explanation": "テスターの内部抵抗も回路に入れる。0.7MΩ(R2)と12MΩ(テスター)の合成抵抗を求め、0.7MΩ(R1)を足すと回路全体の抵抗（約0.6614MΩ）が求められる。24V÷0.6614MΩ≒17.629A（µA換算）×テスター並列部の分圧≒11.66V。正解はE。", "source": "22年 1次", "cat": "計算"}, {"no": 32, "section": "問2", "label": "問2(2)", "points": 5, "answer": "C", "stem": "【計算問題】６気筒エンジン搭載の後輪駆動車（ＦＲ式）において、高速道路を１００ｋｍ／ｈで走行中に振動が発生した。振動計を用いて振動周波数を測定した場合、測定結果と推定原因に関する記述として、適切なものはどれか。\n\n【条件】\n・トランスミッションの変速比：０．７１３\n・最終減速比：３．５４２\n・タイヤの有効半径：０．６ｍ", "choices": {"A": "振動周波数が約１１１Ｈｚの場合はエンジンのトルク変動が考えられる。", "B": "振動周波数が約４０Ｈｚの場合は、プロペラ・シャフトのアンバランスが考えられる。", "C": "振動周波数が約５６Ｈｚの場合はエンジンのトルク変動が考えられる。", "D": "振動周波数が約５３Ｈｚの場合は、タイヤのアンバランスが考えられる。", "E": "振動周波数が約１５Ｈｚの場合は、タイヤのアンバランスが考えられる。"}, "explanation": "タイヤ1回転当たりの走行距離：2π×0.6=3.768m。1時間当たりのタイヤ回転数：100000÷3.768≒26539回転。1秒当たり：26539÷3600≒7.372回転。タイヤ1回転当たりのエンジン回転数：0.713×3.542×7.372≒18.609回転。6気筒エンジンはクランク2回転当たり6回のトルク変動が生じるので、18.609×3≒55.83Hz≒約56Hz。正解はC。", "source": "22年 1次", "cat": "計算"}, {"no": 31, "section": "問2", "label": "問2(1)", "points": 5, "answer": "C", "stem": "【計算問題】図に示す温度センサー回路において、コネクタの端子③と端子④の間に０．５ｋΩの接触抵抗が発生している場合、電圧計Ｖ（端子①）が示す電圧として、適切なものはどれか。ただし、配線やマイコン、入力回路の抵抗は考えないものとし、コネクタは接続状態とする。\n\n【条件】\n・水温センサー抵抗値：2.5kΩ\n・R1：1.5kΩ\n・R2：1.5kΩ\n・電源電圧：5V", "choices": {"A": "0.5V", "B": "1.5V", "C": "2.0V", "D": "2.5V", "E": "3.0V"}, "explanation": "①センサー側の抵抗値：2.5kΩ（水温センサー）＋0.5kΩ（③④間の接触抵抗）＝3kΩ\n②センサー回路とR2の合成抵抗：3kΩと1.5kΩの並列＝1.0kΩ\n③回路全体の合成抵抗：1.5kΩ（R1）＋1.0kΩ＝2.5kΩ\n④回路電流：5V÷2500Ω＝0.002A\n⑤R1の電圧降下：1500Ω×0.002A＝3.0V\n⑥端子①の電圧：5V－3.0V＝2.0V\n正解はC。", "source": "23年 1次", "cat": "計算"}, {"no": 32, "section": "問2", "label": "問2(2)", "points": 5, "answer": "B", "stem": "【計算問題】車輪速センサー回路にて図１の箇所で波形を測定したところ、図２の結果が得られた。この時の時速（ｋｍ／ｈ）として、適切なものはどれか。\n（注）答えが小数点以下になる場合は、小数点以下第１位を四捨五入すること。\n\n【条件】\n・タイヤの有効半径：0.6m\n・ロータ歯数：18歯\n・波形の1周期：2ms（中性点0Vを基準）", "choices": {"A": "60km/h", "B": "94km/h", "C": "74km/h", "D": "86km/h", "E": "102km/h"}, "explanation": "・波形の1周期は図から8ms（中性点0V、1V、2msの読み取り：ロータ1歯あたり8ms/1周期ではなく、グラフ読み取りで1周期8ms）\n・タイヤ1回転の距離：2π×0.6m＝3.768m\n・タイヤ1回転の時間：8ms×18歯＝144ms\n・速度：3.768m÷144ms＝0.02616...m/ms\n・m/msをm/sへ：×1000＝26.166...m/s\n・m/sをkm/hへ：×3.6＝94.2km/h→四捨五入で94km/h\n正解はB。", "source": "23年 1次", "cat": "計算"}, {"no": 31, "section": "問2", "label": "問2(1)", "points": 5, "answer": "E", "stem": "【計算問題】図の回路において、内部抵抗が12MΩのテスターに表示される電圧として、適切なものはどれか。ただし、配線の抵抗はないものとし、答えは小数点以下第3位を四捨五入とする。\n\n【回路条件】\n・24V電源\n・R1：0.7MΩ\n・R2：0.7MΩ\n・テスター内部抵抗：12MΩ", "choices": {"A": "24.00V", "B": "23.55V", "C": "16.40V", "D": "13.45V", "E": "11.66V"}, "explanation": "テスターの内部抵抗も回路に入れなければならない。\nR2（0.7MΩ）と12MΩ（テスター内部抵抗）の合成抵抗：\n1/(1/0.7 + 1/12) = 0.66141732283MΩ\n回路全体の抵抗：0.66141732... + 0.7 = 1.36141732...MΩ\n電流：24V ÷ 1.36141732MΩ = 17.6286871A\n表示電圧：17.6286871A × 0.66141732MΩ = 11.6599...V\n→ 11.66V。正解はE。", "source": "24年 1次", "cat": "計算"}, {"no": 32, "section": "問2", "label": "問2(2)", "points": 5, "answer": "E", "stem": "【計算問題】下記の条件下にて走行中の乾式単板クラッチ付き車両において、各種数値から、走行実態に最も近いギヤ段数とクラッチスリップ率の組合せを計算し、選択肢から適切なものを選択しなさい。\n\n【走行条件】\n1. 車両は加速中であり、トランスミッション側はシフトアップを完了し半クラッチ状態にて回転を合わせている最中である。\n2. エンジンクランクシャフト回転数：1320rpm\n3. トランスミッションアウトプットシャフト回転数：945rpm\n4. トランスミッション各段数のギヤレシオ（別表参照）\n※クラッチスリップ率は小数点第1位を四捨五入", "choices": {"A": "第9速／スリップ率86%", "B": "第8速／スリップ率28%", "C": "第10速／スリップ率90%", "D": "第9速／スリップ率14%", "E": "第10速／スリップ率10%"}, "explanation": "①ギヤ段数の計算：アウトプット回転数×ギヤレシオでインプットシャフト回転数を求める。\n第10速：945×1.263=1193.525rpm\n第9速：945×1.588=1500.66rpm\n第8速：945×1.994=1884.33rpm\nクランクシャフト回転数（1320rpm）を超えない範囲で最も近い値→第10速（1193.525rpm）。\n②クラッチスリップ率：\n伝達率=1194÷1320×100=90.4545...→四捨五入で90%\nスリップ率=100%-90%=10%\n正解はE（第10速／スリップ率10%）。", "source": "24年 1次", "cat": "計算"}, {"no": 31, "section": "問2", "label": "問2(1)", "points": 5, "answer": "D", "stem": "【計算問題】図に示すポジション・センサが図に示す状態にある場合、この回路に関する記述として、適切なものは次のうちどれか。ただし、配線等の抵抗はないものとし、コネクタＡとコネクタＢはそれぞれ接続状態とする。\n\n回路条件：センサ内部抵抗7.5kΩ、プルアップ抵抗2.5kΩ、電源5V", "choices": {"A": "ECUの入力回路には、1.2Vの信号電圧が入力される。", "B": "コネクタＡの①～②端子間に2.5kΩの接触抵抗が発生している場合、ECUの入力回路には、2.0Vの信号電圧が入力される。", "C": "コネクタＡの⑤～⑥端子間に1.5kΩの接触抵抗が発生している場合、ECUの入力回路には、4.5Vの信号電圧が入力される。", "D": "コネクタＢの⑪～⑫端子間に0.5kΩの接触抵抗が発生している場合、ECUの入力回路には、3.8Vの信号電圧が入力される。"}, "explanation": "1. 正常時：7.5÷(2.5+7.5)×5V＝3.75V（1.2Vではない→A不適切）\n2. コネクタA ①-② 2.5kΩ接触抵抗：7.5÷(2.5+2.5+7.5)×5V＝3.0V（2.0Vではない→B不適切）\n3. コネクタA ⑤-⑥ 1.5kΩ接触抵抗：(7.5+1.5)÷(2.5+7.5+1.5)×5V＝9.0÷11.5×5V≒3.91V（4.5Vではない→C不適切）\n4. コネクタB ⑪-⑫ 0.5kΩ接触抵抗：(7.5+0.5)÷(2.5+7.5+0.5)×5V＝8.0÷10.5×5V≒3.80V→3.8V（適切）\n正解はD。", "source": "25年 1次", "cat": "計算"}, {"no": 32, "section": "問2", "label": "問2(2)", "points": 5, "answer": "A", "stem": "【計算問題】車輪速センサー回路にて、図１の箇所で波形を測定したところ、図２の結果が得られた。この時の時速（ｋｍ／ｈ）を求めなさい。\n（注）答えが小数点以下になる場合は、小数点以下第１位を四捨五入しなさい。\n\n条件：タイヤの有効半径：０．６ｍ、波形の1周期：20ms、センサ歯数：18歯", "choices": {"A": "38km/h", "B": "45km/h", "C": "30km/h", "D": "28km/h"}, "explanation": "・タイヤ1回転の距離＝2π×0.6m≒3.768m\n・タイヤ1回転の時間＝20ms×18歯＝360ms\n・速度＝3.768m÷360ms＝0.01047m/ms\n・m/ms→m/s：×1000＝10.47m/s\n・m/s→km/h：×3.6＝37.68km/h\n・小数第1位四捨五入→38km/h\n正解はA。", "source": "25年 1次", "cat": "計算"}, {"no": 31, "section": "問2", "label": "問2(1)", "points": 5, "answer": "A", "stem": "【計算問題】マニュアルエアコンのブロアモータ回路にて、ブロアスイッチがＬｏの時に、下図の電圧計が示す電圧は何Vになるか求めなさい。各部抵抗値は下記の通りであり、配線やスイッチの接触抵抗はないものとする。（注）答えが小数点以下になる場合は、小数点以下第２位を四捨五入しなさい。\n\n【条件】\n・ブロアモータ：７．５Ω\n・ブロアレジスター：各２．５Ω（×３）\n・ヒーターリレー：２８０Ω\n・電源電圧：２４Ｖ", "choices": {"A": "４Ｖ", "B": "６Ｖ", "C": "８Ｖ", "D": "１２Ｖ", "E": "２４Ｖ"}, "explanation": "モーター側回路の合成抵抗：7.5Ω＋2.5Ω×3＝15Ω\n流れる電流：24V÷15Ω＝1.6A\nモーターで消費する電圧：1.6A×7.5Ω＝12V（A点）\nB点（レジスタ間）：各4V降下なので8V\n電圧計の示す電圧：12V－8V＝4V\n正解はA（4V）。", "source": "19年 2次", "cat": "計算"}, {"no": 32, "section": "問2", "label": "問2(2)", "points": 5, "answer": "B", "stem": "【計算問題】下記の諸元を有する車両にて、ギヤ段７速、エンジン回転数１６００ｒ／ｍｉｎで走行しているときの車速を求めなさい。（注）円周率は３．１４とし、答えが小数点以下になる場合は、小数点以下第1位を四捨五入しなさい。\n\n【条件】\n・トランスミッション：Ｍ００９トランスミッション\n・ギヤ段７速の変速比：１．３１８\n・ファイナルギヤの減速比：４．０\n・駆動輪の有効半径：０．５ｍ", "choices": {"A": "４５ｋｍ／ｈ", "B": "５７ｋｍ／ｈ", "C": "６３ｋｍ／ｈ", "D": "７２ｋｍ／ｈ", "E": "８５ｋｍ／ｈ"}, "explanation": "タイヤ円周：0.5m×2×3.14＝3.14m\n車速：1600（rpm）×60（分）÷1.318（変速比）÷4.0（ファイナル減速比）×3.14（タイヤ円周）÷1,000（m→km）＝57.1…km/h\n小数点以下第1位を四捨五入して57km/h\n正解はB（57km/h）。", "source": "19年 2次", "cat": "計算"}, {"no": 31, "section": "問2", "label": "問2(1)", "points": 5, "answer": "B", "stem": "【計算問題】電源電圧が５Ｖで、抵抗値２ＭΩの抵抗２個を直列に接続した回路において、片方の抵抗の両端に内部抵抗１０ＭΩのテスタ（電圧計）を接続したとき、計算で求められるテスタの表示値（Ｖ）は、いくつか。\n（注）答えが小数点以下になる場合は、小数点以下第３位を四捨五入しなさい。", "choices": {"A": "1.25V", "B": "2.27V", "C": "2.50V", "D": "3.33V", "E": "4.00V"}, "explanation": "テスタ接続側の合成抵抗：2MΩ×10MΩ÷(2MΩ+10MΩ)＝20÷12≒1.667MΩ\n全体の合成抵抗：2MΩ+1.667MΩ≒3.667MΩ\nテスタ表示値：1.667÷3.667×5V≒2.273V→四捨五入で2.27V\n正解はB。", "source": "20年 2次", "cat": "計算"}, {"no": 32, "section": "問2", "label": "問2(2)", "points": 5, "answer": "C", "stem": "【計算問題】４サイクル６気筒エンジン搭載車において、アイドル回転（５５０min⁻¹）時に、ステアリングホイール及びシートに振動が発生し、エンジンのトルク変動によるものと判断した際の振動数（Ｈｚ）は、いくつか。\n（注）答えが小数点以下になる場合は、小数点以下第２位を四捨五入しなさい。", "choices": {"A": "9.2Hz", "B": "18.3Hz", "C": "27.5Hz", "D": "36.7Hz", "E": "55.0Hz"}, "explanation": "550（1分間の回転数）÷60（秒）×3（※トルク変動係数：6気筒は×3倍）＝27.5Hz\n※トルク変動は4気筒ならば×2倍、6気筒ならば×3倍\n正解はC。", "source": "20年 2次", "cat": "計算"}, {"no": 31, "section": "問2", "label": "問2(1)", "points": 5, "answer": "A", "stem": "【計算問題】マニュアルエアコンのブロアモータ回路にて、ブロアスイッチがＬｏの時に、電圧計が示す電圧は何Vになるか求めなさい。\n\n【条件】\n・ブロアモータ：７．５Ω\n・ブロアレジスター：各２．５Ω（×３）\n・ヒーターリレー：２８０Ω\n・配線やスイッチの接触抵抗はないものとする\n（注）答えが小数点以下になる場合は、小数点以下第２位を四捨五入すること。", "choices": {"A": "4V", "B": "6V", "C": "8V", "D": "10V", "E": "12V"}, "explanation": "電圧計の+側をA点、-側をB点とする。A点は、ブロアモータの抵抗7.5Ωとブロアレジスターの合成抵抗7.5Ωの間の点。抵抗値1：1なのでブロアモーターで12V電圧降下する。A点の電圧は12V。B点はブロアレジスタの間の点。各レジスタ2.5Ωなので抵抗値は1：1：1であるため、各レジスタでは4Vずつ電圧降下する。B点の電圧は8V。電圧計の示す電圧は12-8＝4V。正解はA。", "source": "21年 2次", "cat": "計算"}, {"no": 32, "section": "問2", "label": "問2(2)", "points": 5, "answer": "E", "stem": "【計算問題】図に示す油圧式ブレーキの油圧回路において、マスタ・シリンダの内径Ａが１５ｍｍ、ホイール・シリンダの内径Ｂが６０ｍｍの場合、ブレーキ・ペダルを矢印の方向に８０Ｎの力（Ｆ１）で押したとき、ホイール・シリンダのピストンにかかる力（Ｆ２）は何Ｎになるか求めなさい。\n\n（注）答えが小数点以下になる場合は、小数点以下第２位を四捨五入すること。", "choices": {"A": "512N", "B": "1280N", "C": "2048N", "D": "4096N", "E": "8192N"}, "explanation": "ペダルを押す力×ペダルの長さ/支点＝80×32/5＝512N（マスタシリンダに加わる力）\nF2＝(60/15)²×512＝4²×512＝16×512＝8192N\n正解はE。", "source": "21年 2次", "cat": "計算"}, {"no": 31, "section": "問2", "label": "問2(1)", "points": 5, "answer": "A", "stem": "【計算問題】電源電圧が5Vで、抵抗値2MΩの抵抗2個を直列に接続した回路において、片方の抵抗の両端に内部抵抗10MΩのテスタ（電圧計）を接続したとき、計算で求められるテスタの表示値（V）はいくつか。\n（注）答えが小数点以下になる場合は、小数点以下第3位を四捨五入しなさい。", "choices": {"A": "2.27V", "B": "2.50V", "C": "1.67V", "D": "3.33V", "E": "1.25V"}, "explanation": "テスタ接続側の合成抵抗：2MΩ×10MΩ÷(2MΩ+10MΩ)=1.666...MΩ\n全体の合成抵抗：2MΩ+1.666...MΩ=3.666...MΩ\nテスタ表示値：1.666...÷3.666...×5V=2.267...V≒2.27V\n正解はA。", "source": "22年 2次", "cat": "計算"}, {"no": 32, "section": "問2", "label": "問2(2)", "points": 5, "answer": "D", "stem": "【計算問題】車輪速センサー回路にて波形を測定したところ、CAN-H信号の1周期が20ms、ロータ歯数18歯、タイヤの有効半径0.6mであった。この時の時速（km/h）を求めなさい。\n（注）答えが小数点以下になる場合は、小数点以下第1位を四捨五入しなさい。", "choices": {"A": "30km/h", "B": "34km/h", "C": "36km/h", "D": "38km/h", "E": "42km/h"}, "explanation": "タイヤ1回転の距離：2π×0.6m≒3.768m\nタイヤ1回転の時間：20ms×18歯=360ms\n速度：3.768m÷360ms=0.01047m/ms=10.47m/s\n時速：10.47×3.6≒37.68km/h≒38km/h\n正解はD。", "source": "22年 2次", "cat": "計算"}, {"no": 31, "section": "問2", "label": "問2(1)", "points": 5, "answer": "A", "stem": "【計算問題】図に示す温度センサー回路において、コネクタの端子③と端子④の間に２．０ｋΩの接触抵抗が発生している場合、電圧計Ｖ（端子①）が示す電圧を求めよ。（注）答えが小数点以下になる場合、小数点以下第３位を四捨五入する。\n\n【条件】\n・水温センサー抵抗：2.5kΩ\n・R1：1.5kΩ\n・R2：1.5kΩ\n・電源電圧：5V", "choices": {"A": "2.14V", "B": "2.50V", "C": "3.00V", "D": "1.87V", "E": "2.86V"}, "explanation": "・水温センサー回路の合成抵抗：2.5kΩ+2.0kΩ＝4.5kΩ\n・4.5kΩとR2（1.5kΩ）の並列合成抵抗：(4.5×1.5)÷(4.5+1.5)＝1.125kΩ\n・回路全体の合成抵抗：R1（1.5kΩ）+1.125kΩ＝2.625kΩ\n・回路全体の電流：5V÷2625Ω＝0.001905A\n・R1での電圧降下：1500Ω×0.001905A≒2.857V\n・端子①の電圧：5V−2.857V≒2.14V\n正解はA。", "source": "23年 2次", "cat": "計算"}, {"no": 32, "section": "問2", "label": "問2(2)", "points": 5, "answer": "B", "stem": "【計算問題】２＊G付ポンチョにて、下記の走行条件でオシロスコープを用いて主回転センサー信号（NE）および副回転センサー信号（G）を計測した。この時の車速（km/h）を求めよ。（注）答えが小数点以下になる場合、小数点以下は四捨五入する。\n\n【条件】\n・TIME 10ms/div\n・CH1 NE：波形は1回転あたり5マス分\n・トランスミッションの変速比：0.807\n・最終減速比：4.333\n・タイヤの有効半径：0.386m", "choices": {"A": "45km/h", "B": "50km/h", "C": "55km/h", "D": "60km/h", "E": "65km/h"}, "explanation": "①NEの周期：10(ms/div)×5(マス)＝50(ms/回転)\n②エンジン回転数：60(s)×1000(ms)÷50(ms/回転)＝1200(min⁻¹)\n③タイヤ回転数：1200÷0.807÷4.333≒343.2(rpm)\n④車速：343.2(rpm)×2π×0.386(m)×60÷1000≒50(km/h)\n正解はB。", "source": "23年 2次", "cat": "計算"}, {"no": 31, "section": "問2", "label": "問2(1)", "points": 5, "answer": "C", "stem": "【計算問題】図１に示す温度抵抗特性を持った油温センサ回路の点検に関する記述として、不適切なものはどれか。ただし、指定以外の配線の抵抗はないものとする。\n\n【回路条件】\n・電源電圧：5V\n・基準抵抗：1.5kΩ（固定）\n・油温20°C時の油温センサ抵抗：約3.0kΩ\n・油温80°C時の油温センサ抵抗：0.3kΩ", "choices": {"A": "正常時のＶ１は、油温２０°Ｃのときに約１．９２Ｖになる。", "B": "油温が８０°Ｃで、コネクタＡの③～④端子間に０．３ｋΩの接触抵抗が発生している場合、Ｖ３は約１．１１Ｖになる。", "C": "油温が８０°Ｃで、コネクタＢの⑦～⑧端子間に０．４ｋΩの接触抵抗が発生している場合、Ｖ２は約２．９１Ｖになる。", "D": "油温が２０°Ｃで、コネクタＢの⑤～⑥端子間に０．７ｋΩの接触抵抗が発生している場合、Ｖ１は約１．５８Ｖになる。"}, "explanation": "油温80°Cの時、油温センサの抵抗値は0.3kΩ。コネクタBの⑦～⑧端子間に0.4kΩの接触抵抗が発生している場合：\n合成抵抗R：1/R=1/(0.3+0.4)+1/1.5=1/0.7+1/1.5\n1/R=22/10.5、R=10.5/22Ω\nV2=((10.5/22)/((10.5/22)+1.5))×5V=52.5/43.5≒1.21V\n約2.91Vではなく約1.21Vになるため不適切。正解はC。", "source": " let quiz = [], answers = {}, current = 0;
let wrongAnswerKeys = new Set();
var firebaseReady = false;
var currentUid = null;
var db = null;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getWrongKey(q) {
  return 'mechPool_q' + q.no;
}

function startQuiz() {
  document.getElementById('startscreen').style.display = 'none';
  document.getElementById('quiz').style.display = '';
  document.getElementById('nav').style.display = '';

  // Build pool: prioritize wrong answer questions
  let wrongQuestions = normalPool.filter(q => wrongAnswerKeys.has(getWrongKey(q)));
  let otherQuestions = normalPool.filter(q => !wrongAnswerKeys.has(getWrongKey(q)));
  
  // Take up to 30 from wrong, fill rest from others (total 30 normal + 2 calc = 32)
  let selected = shuffle(wrongQuestions).slice(0, 30);
  let remaining = 30 - selected.length;
  selected = [...selected, ...shuffle(otherQuestions).slice(0, remaining)];
  const calc = shuffle(calcPool).slice(0, 2);
  quiz = shuffle([...selected, ...calc]);
  answers = {};
  current = 0;
  renderQ();
}

function renderQ() {
  const q = quiz[current];
  updateProgress();
  const isCalc = q.section === '問2';
  const isWrong = wrongAnswerKeys.has(getWrongKey(q));
  let html = '';
  html += `<div class="source-badge">📋 ${q.source} / ${q.label}</div>`;
  if (isWrong) html += `<div style="display:inline-block;background:#fef2f2;color:#dc2626;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;margin-left:6px;margin-bottom:8px">❌ 過去に間違えた問題</div>`;
  html += `<div class="qtitle">問題 ${current+1} / ${quiz.length}　（${q.points}点）</div>`;
  if (isCalc) html += `<div class="calc-note">💡 計算問題です。しっかり計算して答えてください。</div>`;
  html += `<div class="qstem">${q.stem.replace(/\n/g, '<br>')}</div>`;
  html += `<div class="choices">`;
  const ans = answers[current];
  for (const [key, val] of Object.entries(q.choices)) {
    let cls = 'choice';
    if (ans) {
      if (key === q.answer) cls += ' correct';
      else if (key === ans && ans !== q.answer) cls += ' wrong';
    }
    const onclick = ans ? '' : `onclick="selectAns(${current},'${key}')"`;
    html += `<button class="${cls}" ${onclick}><span class="lbl">${key}</span><span>${val}</span></button>`;
  }
  html += `</div>`;
  if (ans && q.explanation) {
    html += `<div class="expl">${q.explanation.replace(/\n/g, '<br>')}</div>`;
  } else if (ans) {
    html += `<div class="expl">正解：<strong>${q.answer}</strong></div>`;
  }
  document.getElementById('quiz');
  html += '<a href="./index.html" style="display:block;text-align:center;margin-top:16px;padding:12px;background:#1e3a5f;color:white;border-radius:10px;text-decoration:none;font-weight:700;font-size:.95rem">🏠 ホームへ戻る</a>'
  .innerHTML = html;
  document.getElementById('nextBtn').textContent = current === quiz.length - 1 ? '結果を見る 📊' : '次へ ▶';
}

function selectAns(idx, key) {
  if (answers[idx]) return;
  answers[idx] = key;
  const q = quiz[idx];
  const isCorrect = key === q.answer;
  // Firebase tracking
  if (firebaseReady && currentUid && db) {
    const wkey = getWrongKey(q);
    if (isCorrect) {
      wrongAnswerKeys.delete(wkey);
      import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js').then(({doc, deleteDoc, setDoc, increment}) => {
        deleteDoc(doc(db, 'users', currentUid, 'wrongAnswers', wkey)).catch(()=>{});
        const cat = (q.section==="問2"||q.section==="問２") ? "計算" : (q.cat || "新装置・一般")).replace(/\//g,'_');
        setDoc(doc(db,'users',currentUid,'catStats',cat),{total:increment(1),correct:increment(1)},{merge:true}).catch(()=>{});
      });
    } else {
      wrongAnswerKeys.add(wkey);
      import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js').then(({doc, setDoc, deleteDoc, serverTimestamp, increment}) => {
        setDoc(doc(db, 'users', currentUid, 'wrongAnswers', wkey), {
          source: 'mechPool', qNo: q.no, label: q.label||('Q'+q.no),
          url: '/choko-study/メカニックランダム30問チャレンジ.html',
          stem: q.stem.substring(0,120), timestamp: serverTimestamp(),
          url: window.location.pathname
        }, {merge:true}).catch(()=>{});
        setDoc(doc(db, 'users', currentUid, 'wrongHistory', wkey), {
          source: 'mechPool', qNo: q.no, label: q.label||('Q'+q.no),
          url: '/choko-study/メカニックランダム30問チャレンジ.html',
          stem: q.stem.substring(0,120), firstWrong: serverTimestamp(),
          url: window.location.pathname
        }, {merge:true}).catch(()=>{});
        const cat = (q.section==="問2"||q.section==="問２") ? "計算" : (q.cat || "新装置・一般")).replace(/\//g,'_');
        setDoc(doc(db,'users',currentUid,'catStats',cat),{total:increment(1),correct:increment(0)},{merge:true}).catch(()=>{});
      });
    }
  }
  renderQ();
}

function prevQ() { if (current > 0) { current--; renderQ(); } }
function nextQ() {
  if (current < quiz.length - 1) { current++; renderQ(); }
  else showResult();
}

function updateProgress() {
  const pct = ((current + 1) / quiz.length * 100).toFixed(0);
  document.getElementById('barfill').style.width = pct + '%';
  document.getElementById('prog').textContent = `${current + 1} / ${quiz.length} 問`;
}

function showResult() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('nav').style.display = 'none';
  document.getElementById('barfill').style.width = '100%';
  document.getElementById('prog').textContent = '完了！';

  let correctPts = 0, totalPts = 0;
  for (let i = 0; i < quiz.length; i++) {
    totalPts += quiz[i].points;
    if (answers[i] === quiz[i].answer) correctPts += quiz[i].points;
  }
  const cntCorrect = quiz.filter((q, i) => answers[i] === q.answer).length;
  const pct = Math.round(correctPts / totalPts * 100);

  // Save stats to Firebase
  if (firebaseReady && currentUid && db) {
    import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js').then(({doc, setDoc, increment, serverTimestamp}) => {
      setDoc(doc(db, 'users', currentUid, 'stats', 'HS1_random'), {
        source: 'HS1ランダム', lastAttempted: quiz.length,
        lastCorrect: cntCorrect, lastTotal: quiz.length,
        lastDate: serverTimestamp(), totalAttempts: increment(1)
      }, {merge:true}).catch(()=>{});
    });
  }

  let reviewHtml = '';
  for (let i = 0; i < quiz.length; i++) {
    const q = quiz[i];
    const ok = answers[i] === q.answer;
    reviewHtml += `<div class="review-item ${ok?'ok':'ng'}">
      <div style="font-weight:700;font-size:12px;margin-bottom:4px">${ok?'✅':'❌'} 問題${i+1} [${q.source} / ${q.label}]</div>
      <div style="font-size:13px;color:#374151">${q.stem.replace(/\n/g,'<br>').substring(0,80)}${q.stem.length>80?'...':''}</div>
      ${!ok?`<div style="font-size:12px;margin-top:4px;color:#dc2626">あなた: <strong>${answers[i]||'未回答'}</strong>　正解: <strong>${q.answer}</strong></div>`:''}
    </div>`;
  }

  const emoji = pct>=70?'🎉':pct>=50?'😊':'😅';
  document.getElementById('result').innerHTML = `
    <div class="result">
      <div style="text-align:center">
        <div style="font-size:2.5rem">${emoji}</div>
        <div class="score-big">${correctPts} / ${totalPts} 点</div>
        <div style="color:#64748b;font-size:.9rem">${cntCorrect} / ${quiz.length} 問正解（正答率 ${pct}%）</div>
        ${pct>=70?'<div style="color:#059669;font-weight:700;margin-top:8px">合格ライン突破！お見事！</div>':'<div style="color:#dc2626;font-weight:700;margin-top:8px">もう一度チャレンジしよう！</div>'}
      </div>
      <button class="action-btn" onclick="location.reload()" style="margin-top:20px">🔄 もう一度チャレンジ</button>
      <button class="action-btn secondary" onclick="location.href='index.html'" style="margin-top:8px">← 問題一覧に戻る</button>
      <div style="margin-top:20px;font-weight:700;font-size:14px;color:#1e3a5f">📋 問題別結果</div>
      ${reviewHtml}
    </div>`;
  document.getElementById('result').style.display = 'block';
}
</script>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

try {
  const app = initializeApp(FIREBASE_CONFIG);
  const auth = getAuth(app);
  const dbInst = getFirestore(app);

  onAuthStateChanged(auth, async user => {
    const badge = document.getElementById('login-badge');
    const hint = document.getElementById('login-hint');
    if (user) {
      const name = (user.displayName || user.email.split('@')[0]);
      badge.innerHTML = `<span style="font-size:.75rem;background:#dbeafe;color:#1e40af;padding:3px 8px;border-radius:999px">👤 ${name}</span>`;
      hint.style.display = 'none';
      // Load wrong answers
      try {
        const snap = await getDocs(collection(dbInst, 'users', user.uid, 'wrongAnswers'));
        snap.forEach(d => { wrongAnswerKeys.add(d.id); });
        if (wrongAnswerKeys.size > 0) {
          document.getElementById('wrong-banner').style.display = 'block';
          document.getElementById('wrong-count').textContent = wrongAnswerKeys.size;
        }
      } catch(e) { console.warn('Wrong answers load error:', e); }
      window.currentUid = user.uid;
      window.db = dbInst;
      window.firebaseReady = true;
    } else {
      badge.innerHTML = `<a href="login.html" style="font-size:.75rem;background:#f1f5f9;color:#64748b;padding:3px 8px;border-radius:999px;text-decoration:none">ログイン</a>`;
    }
  });
} catch(e) {
  console.warn('Firebase init error:', e);
}
</script>
