ク・レストの隙調整をして使用する。", "D": "その日の作業を開始する前に労働安全衛生法で定める特別教育修了者が1分以上の試運転を行う。"}, "explanation": "A：砥石取り換え後の試運転は特別教育修了者が行う（これは正しい）→ただし「取り替え後の試運転」のみ正しく「取り替え」も対象とするかは確認が必要。B：指定面以外は使用禁止。C：安全カバーなしでは使用しない。D：その日の作業開始前に特別教育修了者が1分以上の試運転を行う（適切）。正解はD。", "source": "24年 1次", "cat": "法令"}, {"no": 24, "section": "問1", "label": "問1(24)", "points": 3, "answer": "C", "stem": "出張作業時の安全に関する記述として、不適切なものはどれか。", "choices": {"A": "路上作業時は、サービスカーを故障車の後ろに停止する。サービスカーとの車間距離は最低20m以上離す。", "B": "夜間路上作業時は、発炎筒、三角停止板、安全コーン、黄色回転灯、蛍光ベスト（反射テープ付）を使用する。", "C": "故障車後方50m未満の場所に発炎筒を設置する。", "D": "路上作業で安全確認、誘導要員が必要と予測される場合は、必ず2人以上で行く。"}, "explanation": "故障車後方100m以上の場所に発炎筒を設置する（50m未満ではなく100m以上）。正解はC。", "source": "24年 1次", "cat": "一般関連"}, {"no": 25, "section": "問1", "label": "問1(25)", "points": 3, "answer": "D", "stem": "排出ガスに関する記述として、適切なものはどれか。", "choices": {"A": "ディーゼルエンジンは空気過剰率が大きいため、COの発生が多い。", "B": "ディーゼルエンジンは十分な空気の中で燃焼が行われるため、HCの発生が多い。", "C": "排出ガス中におけるNOxは主にNOとO₂である。", "D": "尿素SCR触媒の後にはNH₃ slip触媒（アンモニア・スリップ触媒）を設けている。"}, "explanation": "A：ディーゼルエンジンは空気過剰率が大きいためCOの発生は極めて少ない。B：ディーゼルエンジンはHCの発生は少ない。C：NOxは主にNOとNO₂である（O₂ではない）。D：尿素SCR触媒の後にはNH₃スリップ触媒を設けている（適切）。正解はD。", "source": "24年 1次", "cat": "エンジン"}, {"no": 26, "section": "問1", "label": "問1(26)", "points": 3, "answer": "B", "stem": "2＊G付プロフィア（2023年モデル）に関する記述として、適切なものはどれか。", "choices": {"A": "EDSSについて、車線逸脱警報をOFFにしているとEDSS作動時における車両逸脱判定は行わないため、減速および停止は機能するが、車線内維持は行わない。", "B": "レーンキーピングアシスト（LKA）は、一定速度以上で走行中にシステムが車線逸脱を判断するとステアリングを制御し、車両を車線内に戻す支援や車線内に維持することを支援する。", "C": "SAMSは、コーナーレーダーセンサーで進路上を交差する移動物を検知し、衝突の恐れがあれば自動でブレーキを作動させる。", "D": "ドライバーモニターIIは、PCSと連動して作動するものであるため、単独での運転者への警報機能は備えていない。"}, "explanation": "A：EDSSにおける車両逸脱判定は継続させる（車線逸脱警報OFFでも継続）。B：LKAの説明として適切。C：SAMSは警告のみ（自動ブレーキは作動しない）。D：ドライバーモニターIIは単独警報機能がある。正解はB。", "source": "24年 1次", "cat": "ブレーキ"}, {"no": 27, "section": "問1", "label": "問1(27)", "points": 3, "answer": "C", "stem": "道路運送車両法において、自動車の整備事業に関する記述として、適切なものはどれか。", "choices": {"A": "整備主任者は同一事業者が経営する事業場であれば、他の事業場の整備主任者を兼務することができる。", "B": "事業用自動車の点検整備記録簿の保存期間は、その記載の日から2年間である。", "C": "普通自動車特定整備事業のみの認証を受けた事業場では、四輪の軽自動車の分解整備を行うことはできない。", "D": "整備命令は、自動車整備事業者に対し、その実施した整備の状況が不良の場合に出される命令である。"}, "explanation": "普通自動車特定整備事業は、普通自動車、四輪の小型自動車及び大型特殊自動車を対象とする（四輪の軽自動車は対象外）。正解はC。", "source": "24年 1次", "cat": "法令"}, {"no": 28, "section": "問1", "label": "問1(28)", "points": 3, "answer": "A", "stem": "道路運送車両法の保安基準に照らし（2017年以降制作車両）、次の文章の［　］に当てはまるものとして、適切なものはどれか。\n\n「貨物の運送の用に供する普通自動車であって車両総重量が［　］以上のものの後面には、大型後部反射器を備えなければならない。」", "choices": {"A": "7トン", "B": "5トン", "C": "8トン", "D": "10トン"}, "explanation": "貨物の運送の用に供する普通自動車であって車両総重量が7トン以上のものの後面には、後部反射器の他に更に大型後部反射器を備えなければならない（保安基準第38条の2）。正解はA。", "source": "24年 1次", "cat": "法令"}, {"no": 29, "section": "問1", "label": "問1(29)", "points": 3, "answer": "C", "stem": "道路運送車両法及び指定自動車整備事業規則に照らし、保安基準適合証の有効期限に関する記述として、適切なものはどれか。", "choices": {"A": "交付した日から15日間となっている。", "B": "交付した日から30日間となっている。", "C": "検査した日から15日間となっている。", "D": "検査した日から30日間となっている。"}, "explanation": "保安基準適合証の有効期限は、検査した日から15日間となっている（道路運送車両法第94条の5）。正解はC。", "source": "24年 1次", "cat": "法令"}, {"no": 30, "section": "問1", "label": "問1(30)", "points": 3, "answer": "D", "stem": "道路運送車両の保安基準の細目を定める告示のイモビライザに関する記述として、不適切なものはどれか。", "choices": {"A": "自動車の通常の原動機始動の操作中又はその直前に設定解除を行うイモビライザにあっては、原動機の始動装置の鍵を作動停止位置に操作した時点で設定されるものであってもよい。", "B": "触媒コンバーターを装備した自動車に取り付けるイモビライザは、未燃燃料を排気装置に混入させない構造でなければならない。", "C": "リモートコントロールによって設定解除できるイモビライザは、設定解除後に原動機のスターター回路について補助的な操作を行わなかったときに、解除後5分以内に設定状態に戻るものでなければならない。", "D": "ディーゼルエンジンを搭載した自動車に備えるイモビライザにあっては、自走に必要な制御装置（スタータモータ、イグニッション、燃料供給機能、空気圧解除式スプリングブレーキ等）のうち1つ以上のものの機能を停止すること。"}, "explanation": "2つ以上の機能を停止すること（1つ以上ではない）が要件。正解はD。", "source": "24年 1次", "cat": "法令"}, {"no": 1, "section": "問1", "label": "問1(1)", "points": 3, "answer": "B", "stem": "エンジンの故障診断に関する記述として、不適切なものはどれか。", "choices": {"A": "寒冷地でのエンジン始動不良の要因の一つとして軽油の種類が挙げられるが、寒冷地では－２０°Cまで凍結しない軽油３号を入れる必要がある。", "B": "冷却水が増える要因の一つとしてエンジンオイルの漏れによる混入が挙げられ、冷却水を点検したところオイルによる濁りが確認できたため、オイルクーラーを点検した。", "C": "冷却水が減る要因の一つとしてエンジンのヘッドガスケットからの吹き抜けが挙げられるが、シリンダーライナーの突き出し量不足や突き出し部の損傷などが原因である。", "D": "エンジンリターダーが作動状態から戻らなくなる原因として、ワイヤーハーネスの断線やエンジンＥＣＵの故障が考えられる。"}, "explanation": "冷却水が増える要因の一つはエンジンオイルの混入であるが、その場合はオイルクーラーではなくヘッドガスケットの吹き抜けなどを点検する必要がある。ワイヤハーネスのショートも考えられる。正解はB。", "source": "25年 1次", "cat": "T/M"}, {"no": 2, "section": "問1", "label": "問1(2)", "points": 3, "answer": "A", "stem": "エンジン及び後処理装置の制御に関する記述として、不適切なものはどれか。", "choices": {"A": "インジェクタの油圧ピストンはノズルニードルと連動しており、非噴射時の油圧ピストンは、制御室の出口オリフィスが開いているため、制御室の燃料が流出し、ノズルニードルは押し上げられている。", "B": "ＦＣＣＢ制御では、アイドリングなどの低回転域でのエンジン振動を低減させるために各気筒の角速度を比較し、各気筒毎に噴射量を増減している。", "C": "ＤＰＲのスス堆積量は、エンジン回転数と噴射量から算出されており、堆積量が自動再生域に達すると再生を開始する。その後にＤＰＲフィルター温度が規定値に達するとススの燃焼量の計算を開始し、堆積量の算出は継続しつつ、燃焼量値が堆積量値と一致すると再生を終了する。", "D": "コモンレール圧力のフィードバック制御では、エンジン回転数などからエンジンＥＣＵが目標圧力を算出し、実際のコモンレール圧力はセンサーで測定することで、目標と実を比較しており、これに差がある場合に、エンジンＥＣＵはその差分に対応するフィードバック制御を実施する。"}, "explanation": "非噴射時の油圧ピストンは、制御室の出口オリフィスを閉じて、制御室に燃料を流入させ、ノズルニードルを押し下げている（噴射しない状態）。正解はA。", "source": "25年 1次", "cat": "エンジン"}, {"no": 5, "section": "問1", "label": "問1(5)", "points": 3, "answer": "A", "stem": "２＊G付 プロフィアハイブリッドシステム（２０２４年モデル）に関する記述として、不適切なものはどれか。", "choices": {"A": "定常走行時に負荷が低いときは、クラッチを切断してＨＶモーターのみで走行する。このとき、エンジンは燃費確保のため停止している。", "B": "アイドリングストップ状態からのエンジン再始動は、ＨＶモーターがスターターとして働き、キー操作時のエンジン始動はスターターモーターを使用してエンジンを始動する。", "C": "一定車速以上でスキャニングクルーズ使用時に下り坂などで増速した場合、設定した目標車速を保持するように自動で回生ブレーキを掛ける。", "D": "走行発電はＨＶバッテリーの過放電防止のために充電を行うため、エンジンフルで走行している場合でも発電電力を確保している。"}, "explanation": "ＨＶモーターのみの走行中でもエンジンは停止しない（エンジンはアイドリング状態で継続している）。正解はA。", "source": "25年 1次", "cat": "HV"}, {"no": 6, "section": "問1", "label": "問1(6)", "points": 3, "answer": "C", "stem": "ハイブリッドシステムに関する記述として、不適切なものはどれか。", "choices": {"A": "システムメインリレー（ＳＭＲ）は、ＨＶバッテリーとインバーター間の接続と遮断を行っており、ＳＭＲ１及びプリチャージレジスターは、電源投入時の突入電流が回路に流れないようにしている。", "B": "デュトロＨＶバッテリーＥＣＵは、ＨＶバッテリーの状態を常に監視し、ＨＶ－ＥＣＵへバッテリーＳＯＣを送信している。なお、ＳＯＣの制御目標値は約６０％である。", "C": "デュトロが採用しているハイブリッドシステムのエンジントルクアシスト機能において、ＨＶバッテリー容量に十分な余裕がある場合でも、モータージェネレーターのみでの発進・走行は行わない。", "D": "パラレル・シリーズハイブリッドシステムとは、パラレル方式のハイブリッドシステムにＨＶバッテリー充電専用の発電機を加えたシステムで、モーター走行しながら発電が可能である。"}, "explanation": "デュトロHVシステムにおいて、ＨＶバッテリー容量に十分な余裕がある時は、モータージェネレーターのみで発進・走行する。正解はC。", "source": "25年 1次", "cat": "HV"}, {"no": 7, "section": "問1", "label": "問1(7)", "points": 3, "answer": "A", "stem": "M112トランスミッション（2023年以降プロシフト12）に関する記述として、不適切なものはどれか。", "choices": {"A": "MZ12トランスミッションと比較し、PTO ポジションスイッチ経路を新設した。", "B": "MZ12トランスミッションと比較し、カウンターシャフトブレーキが新設され、変速スピードとドライバビリティ向上を実現した。", "C": "MZ12トランスミッションと比較し、ケース形状を変更することで、剛性の向上による信頼性向上と整備性向上を実現した。", "D": "MZ12トランスミッションと比較し、メインギヤの1速-後退、2速-3速、スプリッターLoギヤおよびHiギヤをそれぞれ一体化した。"}, "explanation": "トランスミッションスプリッターは、シンクロレスではない（シンクロ付きである）。PTOポジションスイッチ経路の新設という記述は不適切。正解はA。", "source": "25年 1次", "cat": "T/M"}, {"no": 8, "section": "問1", "label": "問1(8)", "points": 3, "answer": "C", "stem": "オートマチックトランスミッションにおいて、変速時ショックが大きい場合に考えられる不具合原因として、不適切なものはどれか。", "choices": {"A": "ラインプレッシャーが高すぎる", "B": "コントロールバルブの不良", "C": "アイドル回転速度が高すぎる", "D": "ＡＴ内部のクラッチ、ブレーキなどの作動不良"}, "explanation": "アイドル回転速度が高すぎることは、変速時ショックが大きい場合の不具合原因として該当しない。正解はC。", "source": "25年 1次", "cat": "T/M"}, {"no": 9, "section": "問1", "label": "問1(9)", "points": 3, "answer": "B", "stem": "M112トランスミッション（2023年以降プロシフト12）において、変速が遅い場合の診断に関する記述として、不適切なものはどれか。", "choices": {"A": "ギヤ抜き制御中に時間がかかっていて、シフトストロークセンサの値が学習値に到達するまでに時間がかかっている場合は、N位置学習／シフト位置学習を実施する。", "B": "２速から３速へのセレクト制御中に時間がかかっていて、セレクトストロークセンサの値には問題がない状態で、スプリッタ電磁弁がONになってからスプリッタインギヤまでに時間がかかっている場合は、セレクトモーターおよびスプリッタ電磁弁に不具合があると推定される。", "C": "セレクト制御中またはギヤ入れ制御中に時間がかかっていて、セレクトストロークセンサおよびシフトストロークセンサの値が学習値に到達するまでに時間がかかっている場合は、N位置学習／シフト位置学習を実施する。", "D": "６速から７速、または７速から６速への変速に時間がかかっていて、レンジ電磁弁がONになってからレンジインギヤまでに時間がかかっている場合は、レンジスイッチおよびレンジ電磁弁に不具合があると推定される。"}, "explanation": "セレクトストロークセンサの値には問題がない状態（セレクトには問題がない）なので、スプリッタスイッチとスプリッタ電磁弁に不具合の可能性がある。セレクトモーターではない。正解はB。", "source": "25年 1次", "cat": "T/M"}, {"no": 10, "section": "問1", "label": "問1(10)", "points": 3, "answer": "A", "stem": "マニュアルトランスミッションの振動・騒音に関する記述として、不適切なものはどれか。", "choices": {"A": "うなり音は、トランスミッションギヤのかみ合い率を小さくし、振動周波数を低くすることで低減することができる。", "B": "車両発進時のジャダは、１０Ｈｚ～２０Ｈｚの振動周波数でクラッチ伝達トルクの変動による振動である。", "C": "うなり音は、４００Ｈｚ～３ｋＨｚの振動周波数でトランスミッションギヤのかみ合いによる振動である。", "D": "ジャダは、クラッチを徐々につないでいく際にクラッチディスクの摩擦面で間欠的な滑りが生じ、エンジンからの伝達トルクが変動することで発生する。"}, "explanation": "うなり音は、トランスミッションギヤのかみ合い率を大きくし、振動周波数を高くすることで低減することができる。正解はA。", "source": "25年 1次", "cat": "T/M"}, {"no": 11, "section": "問1", "label": "問1(11)", "points": 3, "answer": "B", "stem": "エアサスペンション機能で、各軸重値をメータへ表示させる機能の記述として、不適切なものはどれか。", "choices": {"A": "エアスプリングの高さが標準高付近であれば、走行中も軸重モニターを表示し、２秒毎に更新され、０．１ｔ単位で表示を行うことができる。", "B": "車両制御 ECU にて内圧を計算し、CAN 信号をメーターへ出力する。", "C": "軸重モニターに故障が発生したときは、マルチインフォメーション内のウォーニングランプ表示部にハイトコントロールウォーニングランプを点灯させ、あわせて、マルチディスプレイのメイン画面に表示を行う。", "D": "ハイトコントロールで車高を上下した場合、標準車高から外れると軸重は「‐」表示になる。"}, "explanation": "内圧の計算はエアサス制御ECUで行っており、車両制御ECUではない。正解はB。", "source": "25年 1次", "cat": "シャシ・フレーム"}, {"no": 12, "section": "問1", "label": "問1(12)", "points": 3, "answer": "C", "stem": "シャシの故障診断に関する記述として、不適切なものはどれか。", "choices": {"A": "リターダーが作動しない場合に考えられる要因として、リターダースイッチの不良や電磁弁の不良、アイドルスイッチの不良が考えられる。", "B": "ブレーキジャダーはブレーキをかけたときに異常な振動や異音、左右に振れたりする振動が発生する現象で、車体振動のピークは６０～８０ｋｍ／ｈ付近で、ステアリングホイール振動は１００～１５０ｋｍ／ｈ付近である。", "C": "エキゾーストブレーキが作動しない要因として、カーボンによるバルブ固着やコントロールシリンダーのリターンスプリング折損、排気漏れが考えられる。", "D": "制動力不良の要因としては、ブレーキ装置に不具合がある場合や真空倍力装置に負圧が作用しない場合、その他にフェード現象やベーパーロック現象が発生した場合などが推定される。"}, "explanation": "エキゾーストブレーキが作動しない要因として排気漏れは該当しない（排気漏れでもブレーキは作動するが弱くなる）。正解はC。", "source": "25年 1次", "cat": "T/M"}, {"no": 13, "section": "問1", "label": "問1(13)", "points": 3, "answer": "D", "stem": "プロペラシャフトの振動・騒音に関する記述として、不適切なものはどれか。", "choices": {"A": "プロペラシャフトにアンバランスがあると回転の遠心力で振動が生じる。この振動は回転速度（車速）が高くなると急激に増加する。", "B": "ジョイント角があると回転変動が生じるため、入力軸と出力軸を平行にすることで回転変動を相殺している。", "C": "３ジョイントプロペラシャフトでは、シャフトを分割することで固有振動数を高め、高速時のエンジン、ミッション、プロペラシャフトの曲げ振動によるこもり音を防止している。", "D": "ジョイント部には反対側の軸から受ける偶力があり、これは二次偶力と呼ばれ、回転変動と同じように入力軸と出力軸を平行にすると解消する。"}, "explanation": "二次偶力は、それぞれのジョイント角に存在し、入力軸と出力軸を平行にするだけでは解決しない。正解はD。", "source": "25年 1次", "cat": "T/M"}, {"no": 15, "section": "問1", "label": "問1(15)", "points": 3, "answer": "C", "stem": "２＊G付き小型トラック（１．５ｔ）のブレーキコントロールシステムに関する記述として、不適切なものはどれか。", "choices": {"A": "システムに異常が発生し、システムが停止した場合にはフェイルセーフ機能として、人力により発生させたブレーキマスタシリンダの油圧がホイールシリンダに作用する構造とし、制動力を確保している。", "B": "ビークルスタビリティコントロール（ＶＳＣ）は、横転事故の主な原因となる旋回時などの過大な車両のロール現象を軽減したり、横滑り現象を軽減している。", "C": "コンビネーションメータＡＳＳＹのスリップインジケータランプは、①ＴＲＣ、ＶＳＣの作動時②スキッドコントロールＥＣＵに異常が発生した場合に点灯する。", "D": "ブレーキアクチュエータＡＳＳＹのスキッドコントロールコンピュータは、各センサおよびコンピュータからの信号をもとに、ブレーキアクチュエータＡＳＳＹを駆動して、各輪のブレーキ油圧を制御する。"}, "explanation": "スリップインジケータランプは、TRC・VSCの作動時は点滅（点灯ではない）する。スキッドコントロールECUに異常が発生した場合は点灯する。正解はC。", "source": "25年 1次", "cat": "ブレーキ"}, {"no": 16, "section": "問1", "label": "問1(16)", "points": 3, "answer": "A", "stem": "ブレーキシステムに関する記述として、不適切なものはどれか。", "choices": {"A": "エレクトリックブレーキフォースディストリビューション（ＥＢＤ）は、積載時における後輪の荷重増加状態において、後輪のスリップを検知すると、後輪液圧を保持し、リヤブレーキのＡＢＳ早期作動を抑制し車両の安定性を確保する機能である。", "B": "ブレーキウォーニングランプは、①EBDに異常が発生した場合②ブレーキフルードレベル低下時③バキュームタンク内の負圧低下時に点灯する。", "C": "イージーアンドスムースリースタート（ＥＳスタート）は、坂道発進時のブレーキ保持と解除をＥＣＵが自動で行うことで、パーキングブレーキによるブレーキ保持やブレーキペダルからアクセルペダルへの踏み変え操作をなくし、運転操作を簡単することによってドライバーの負担を軽減している。", "D": "パワーアシストブレーキ（ＰＡＢ）は、強い制動力が必要なときや、ブレーキブースター失陥時などにより普段の踏力でブレーキを操作した際、不足した制動力を助勢できるようブレーキ液圧を加圧している。"}, "explanation": "ＥＢＤは積載時ではなく、空車時における後輪の荷重減少状態において、後輪のスリップを検知すると後輪液圧を保持してリヤブレーキのＡＢＳ早期作動を抑制する機能である。正解はA。", "source": "25年 1次", "cat": "ブレーキ"}, {"no": 17, "section": "問1", "label": "問1(17)", "points": 3, "answer": "C", "stem": "ドラムブレーキ及びディスクブレーキの不具合に関する記述として、不適切なものはどれか。", "choices": {"A": "スキール音が発生している場合の原因として、パッド／ライニングの当たり具合、バックプレートの共振が考えられる。", "B": "ブレーキの片効きが発生している場合の原因として、リーフスプリングのセンターボルト緩みが考えられる。", "C": "ブレーキジャダが発生している場合の原因として、パッド／ライニングの鏡面化が考えられる。", "D": "ブレーキの引きずりが発生している場合の原因として、各ブレーキ装置の戻り不良が考えられる。"}, "explanation": "パッド／ライニングの鏡面化はブレーキ鳴きの原因となる。センターボルトの緩みは片効きの原因となる。正解はC。", "source": "25年 1次", "cat": "T/M"}, {"no": 18, "section": "問1", "label": "問1(18)", "points": 3, "answer": "A", "stem": "２＊Ｇ付プロフィアのスキャニングクルーズに関する記述として、不適切なものはどれか。", "choices": {"A": "スキャニングクルーズの車間距離警報機能は、自車速度と同等以上で走行している先行車には作動しない。", "B": "スキャニングクルーズは、スキャンクルーズ走行時に先行車がいなくなった場合、自動的にＦＳクルーズに変更される。", "C": "スキャニングクルーズは、ＥＢＳ ＥＣＵで車間の制御を、それ以外の制御を車両制御ＥＣＵで行う。", "D": "スキャニングクルーズの車間距離警報機能は、警報中にフットブレーキを踏んだ場合、停止する。"}, "explanation": "スキャニングクルーズの車間距離警報機能は、自車速度と同等以上で走行している先行車にも作動する（同等以上で走行している先行車には作動しないというのは誤り）。正解はA。", "source": "25年 1次", "cat": "ブレーキ"}, {"no": 19, "section": "問1", "label": "問1(19)", "points": 3, "answer": "A", "stem": "ＡＳＲの制御に関する記述として、不適切なものはどれか。", "choices": {"A": "一方の駆動輪が空転を始めスリップ率の限界値を超えると、ただちにスリップをしている車輪にブレーキをかける。", "B": "タイヤと路面間の摩擦力の変化に対応して、ブレーキ作動中の車両の安定性を確保している。", "C": "車両が走行を開始すると左右の駆動輪の車輪速度が常に前輪と比較、監視される。", "D": "駆動輪の駆動力を維持することにより、加速時の尻振りを防止している。"}, "explanation": "EBS ECU⇒DSS ECUの順で制御信号が送られる。一方の駆動輪が空転を始め限界値を超えると、ただちにブレーキをかけるのではなく段階的に制御する。正解はA。", "source": "25年 1次", "cat": "ブレーキ"}, {"no": 20, "section": "問1", "label": "問1(20)", "points": 3, "answer": "B", "stem": "２＊Ｇ付プロフィアのＶＳＣに関する記述として、不適切なものはどれか。", "choices": {"A": "ＶＳＣ ＥＣＵは、ヨーレートセンサーおよびＧセンサーを内蔵しており、ヨーレート、横Ｇを検出して、ＣＡＮ通信により、ＥＢＳ ＥＣＵに信号を送る。", "B": "横滑り軽減制御時は、旋回時に両輪をブレーキ制御して横滑りを抑制する。", "C": "ロール軽減制御時は、各輪のブレーキを制御し、安定的に車両を減速させ横Ｇを減少させる。", "D": "車両制御ＥＣＵは、危険状態を感知すると、ＥＢＳ ＥＣＵからの信号を入力してエンジンＥＣＵに出力し、エンジンＥＣＵはこの信号をもとにエンジン出力を制御する。"}, "explanation": "横滑り軽減制御時は、旋回時に基本的には片輪にブレーキをかけて横滑りを抑制する（両輪ではない）。正解はB。", "source": "25年 1次", "cat": "ブレーキ"}, {"no": 21, "section": "問1", "label": "問1(21)", "points": 3, "answer": "C", "stem": "電気装置の制御に関する記述として、適切なものはどれか。", "choices": {"A": "ＥＳスタートの作動条件の内、車両停車位置が登り勾配であるかはヨーレートセンサーによって判断している。", "B": "エコラン制御のアクセルファジー制御とは、トップギアで走行時、エンジンリターダーの「強」を作動させた状態で、車両制御ＥＣＵがアクセル波状運転を検出すると、車両制御ＥＣＵはドライバーに警告を発する。", "C": "イモビライザーシステムの作動について、正規のキーでエンジン始動し、その後エンジンを停止し２０秒以内にＩＤが登録されていないキーでエンジン始動すると、エンジンは始動可能である。", "D": "スキャニングクルーズの車間距離警報の警報条件は、車間距離が１０～１００ｍ以内の場合に警報を発する。"}, "explanation": "A:登り勾配はGセンサーで判断（ヨーレートセンサーではない）。B:車両制御ECUはエンジンリターダー・弱に自動的に切り替える（強ではない）。D:車間距離が１０～９０m（100mではない）。Cのイモビライザーの記述が適切（20秒以内は始動可能）。正解はC。", "source": "25年 1次", "cat": "T/M"}, {"no": 22, "section": "問1", "label": "問1(22)", "points": 3, "answer": "B", "stem": "ＣＡＮ通信システムに関する記述として、不適切なものはどれか。", "choices": {"A": "ＤＸの故障診断には通信異常の検知などが組み込まれ、ＣＡＮ通信システムとＥＣＵごとにＤＴＣが設定されている。", "B": "サーキットテスタによる点検では通信線の断線や短絡の確認が不可能なので、オシロスコープなどを用いた波形観測が必ず必要になる。", "C": "異常が発生した場合は、メーター上のディスプレイなどで異常発生の警告を行う。", "D": "通信規格は決められているが細部の仕様は各メーカー仕様のシステムが採用されている。"}, "explanation": "サーキットテスタによる断線や短絡の確認は可能である。オシロスコープを必ず使う必要はない。正解はB。", "source": "25年 1次", "cat": "電気装置"}, {"no": 23, "section": "問1", "label": "問1(23)", "points": 3, "answer": "B", "stem": "ベンチグラインダに関する記述として、適切なものはどれか。", "choices": {"A": "砥石の指定使用面以外の使用は、労働安全衛生法で定める特別教育修了者が使用できる。", "B": "砥石の取り替え、および取り替え後の試運転は労働安全衛生法で定める特別教育修了者が行う。", "C": "安全カバーが付いていない場合は、砥石とスパーク・ブレーカ及びワーク・レストの隙調整をして使用する。", "D": "その日の作業を開始する前に労働安全衛生法で定める特別教育修了者が１分以上の試運転を行う。"}, "explanation": "A:指定使用面以外の使用は特別教育修了者でも禁止。C:安全カバーなしでは使用禁止。D:その日の作業開始前の試運転は3分以上（1分以上ではない）。B:砥石の取り替え、および取り替え後の試運転は特別教育修了者が行う（適切）。正解はB。", "source": "25年 1次", "cat": "法令"}, {"no": 24, "section": "問1", "label": "問1(24)", "points": 3, "answer": "B", "stem": "２＊Ｇ付レンジャー（２０２１年モデル）に関する記述として、不適切なものはどれか。", "choices": {"A": "ＥＤＳＳは、ドライバーモニターIIと車線逸脱警報装置によりドライバーの異常を検知し、自動でブレーキを作動させる。", "B": "ＳＡＭＳは、コーナーレーダーセンサーで進路上を交差する移動物を検知し、衝突の恐れがあれば自動でブレーキを作動させる。", "C": "ＰＣＳは、レーダーセンサーと画像センサーにより衝突物が検知され、衝突の恐れがあれば自動でブレーキを作動させる。", "D": "ドライバーモニターIIは、ドライバーが正常でない状態を検知するとＰＣＳと連動して衝突の恐れがある場合に自動でブレーキを作動させる。"}, "explanation": "サイトアラウンドモニターシステム（ＳＡＭＳ）は、警報のみであり自動ブレーキは作動しない。正解はB。", "source": "25年 1次", "cat": "ブレーキ"}, {"no": 25, "section": "問1", "label": "問1(25)", "points": 3, "answer": "C", "stem": "排出ガスに関する記述として、適切なものはどれか。", "choices": {"A": "ディーゼルエンジンは空気過剰率が大きいため、ＣＯの発生が多い。", "B": "排出ガス中におけるＮＯｘは主にＮＯとＯ２である。", "C": "尿素ＳＣＲ触媒の後にはＮＨ３ ｓｌｉｐ触媒（アンモニア・スリップ触媒）を設けている。", "D": "ディーゼルエンジンは十分な空気の中で燃焼が行われるため、ＨＣの発生が多い。"}, "explanation": "A:ディーゼルエンジンは空気過剰率が大きいためCOの発生は極めて少ない。B:NOxは主にNOとNO₂である（O₂ではない）。D:ディーゼルエンジンはHCの発生は少ない。尿素SCR触媒の後にNH₃スリップ触媒を設けているが正しい。正解はC。", "source": "25年 1次", "cat": "エンジン"}, {"no": 26, "section": "問1", "label": "問1(26)", "points": 3, "answer": "A", "stem": "ＨＩＮＯ基本理念にある「基本方針」に関する記述として、不適切なものはどれか。", "choices": {"A": "「信頼」", "B": "「誠実」", "C": "「貢献」", "D": "「共感」"}, "explanation": "HINO基本方針は「誠実」「貢献」「共感」の3つ。「信頼」は含まれない。正解はA。", "source": "25年 1次", "cat": "法令"}, {"no": 27, "section": "問1", "label": "問1(27)", "points": 3, "answer": "B", "stem": "道路運送車両法において、自動車の整備事業に関する記述として、適切なものはどれか。", "choices": {"A": "整備命令は、自動車整備事業者に対し、その実施した整備の状況が不良の場合に出される命令である。", "B": "普通自動車特定整備事業のみの認証を受けた事業場では、四輪の軽自動車の分解整備を行うことはできない。", "C": "整備主任者は同一事業者が経営する事業場であれば、他の事業場の整備主任者を兼務することができる。", "D": "普通自動車特定整備事業は、検査対象軽自動車を対象とする。"}, "explanation": "普通自動車特定整備事業は、普通自動車・四輪の小型自動車・大型特殊自動車を対象とし、検査対象軽自動車は対象外。軽自動車の分解整備は軽自動車特定整備事業が必要。正解はB。", "source": "25年 1次", "cat": "法令"}, {"no": 28, "section": "問1", "label": "問1(28)", "points": 3, "answer": "A", "stem": "道路運送車両法の定期点検整備に照らし、次の文章の［　］に当てはまるものとして、適切なものはどれか。\n「定期点検整備を実施したときは、点検整備を実施した年月日、点検の結果等を点検整備記録簿に記載し、営業所又は事務所において点検整備記録簿の写し又は電子的記録等のこれと同等と認められるものを営業所又は事務所において［　　　］保存しなければなりません。」", "choices": {"A": "１年間", "B": "２年間", "C": "３年間", "D": "５年間"}, "explanation": "道路運送車両法第49条により、点検整備記録簿は１年間保存しなければならない。正解はA。", "source": "25年 1次", "cat": "法令"}, {"no": 29, "section": "問1", "label": "問1(29)", "points": 3, "answer": "A", "stem": "道路運送車両法及び指定自動車整備事業規則に照らし、保安基準適合証の有効期限に関する記述として、適切なものはどれか。", "choices": {"A": "検査した日から１５日間となっている。", "B": "交付した日から１５日間となっている。", "C": "検査した日から３０日間となっている。", "D": "交付した日から３０日間となっている。"}, "explanation": "道路運送車両法第94条の5により、保安基準適合証の有効期限は検査した日から15日間。正解はA。", "source": "25年 1次", "cat": "法令"}, {"no": 30, "section": "問1", "label": "問1(30)", "points": 3, "answer": "D", "stem": "道路運送車両の保安基準の細目を定める告示のイモビライザに関する記述として、不適切なものはどれか。", "choices": {"A": "リモートコントロールによって設定解除できるイモビライザは、設定解除後に原動機のスターター回路について補助的な操作を行わなかったときに、解除後５分以内に設定状態に戻るものでなければならない。", "B": "触媒コンバーターを装備した自動車に取り付けるイモビライザは、未燃燃料を排気装置に混入させない構造でなければならない。", "C": "通常の原動機始動の操作中又はその直前に設定解除を行うイモビライザにあっては、原動機の始動装置の鍵を作動停止位置に操作した時点で設定されるものであってもよい。", "D": "ディーゼルエンジンを搭載した自動車に備えるイモビライザにあっては、自走に必要な制御装置（スタータモータ、イグニッション、燃料供給機能、空気圧解除式スプリングブレーキ等）のうち１つ以上のものの機能を停止すること。"}, "explanation": "イモビライザは自走に必要な制御装置のうち２つ以上のものの機能を停止することが必要（１つ以上ではない）。正解はD。", "source": "25年 1次", "cat": "法令"}, {"no": 1, "section": "問1", "label": "問1(1)", "points": 3, "answer": "B", "stem": "ポスト新長期Ｅ１３Ｃのコモンレール式高圧燃料噴射装置のソレノイド式インジェクターに関する記述として、不適切なものはどれか。", "choices": {"A": "ソレノイド・コイルに通電が開始されると、電磁力によりバルブはバルブ・スプリングの力に打ち勝って引き上げられ、オリフィスが開く。", "B": "ソレノイド・コイルへの通電を止めると、コモンレールからの高圧燃料が、ノズル室に流入することで、コマンド・ピストンが押し下げられる。", "C": "オリフィスが閉じると、コモンレールからの高圧燃料が、一気に制御室に流入することで、ノズル・ニードルが急激に降下し噴孔が閉じて噴射が終了する。", "D": "オリフィスが開くと、制御室の燃料は次第に流出し制御室の圧力が下がるので、ノズル・ニードル下面に掛かっていた圧力との差圧により、ノズルニードルが上昇し燃料を噴射する。"}, "explanation": "ソレノイド・コイルへの通電を止めると、バルブ・スプリングの力でオリフィスが閉じられ、コモンレールからの高圧燃料が制御室に流入することで、コマンド・ピストンが押し下げられる（ノズル室ではなく制御室）。正解はB。", "source": "19年 2次", "cat": "エンジン"}, {"no": 3, "section": "問1", "label": "問1(3)", "points": 3, "answer": "A", "stem": "２＊Ｇ付大型トラックのエンジンのセンサーに関する記述として、適切なものはどれか。", "choices": {"A": "エアフローセンサーは薄膜シリコンチップ式を採用し、応答性の向上を図った。シリコンチップ部上流温度センサーの温度と下流温度センサーの温度差を計測し、空気流量を計測している。", "B": "エンジン主回転センサーは、フライホイールハウジングに取り付けており、エンジンが回転してパルサーにより交流電圧を発生させる。パルサーには６°ごとに凹部を設けており、エンジン１サイクル（２回転）分の凹数は１２０個になる。", "C": "アクセルセンサーは可変抵抗式のセンサーで、アクセルペダルの踏み込み量を電気信号に置き替えてエンジンＥＣＵに送る。アクセルセンサーアセンブリ１個の中にはセンサーを２個内蔵している。", "D": "燃料温度センサーはサプライポンプ入口回路に取り付けている。"}, "explanation": "B：エンジン主回転センサーはホールIC式。C：インジェクターのリゲージ回路の説明が不適切。D：パルサーの凹数は112個（120個ではない）。正解はA。", "source": "19年 2次", "cat": "エンジン"}, {"no": 4, "section": "問1", "label": "問1(4)", "points": 3, "answer": "C", "stem": "ＢＤＧ付プロフィアのエンジンリターダーの構造説明として、不適切なものはどれか。", "choices": {"A": "リターダー本体はエンジンの油圧をＯＮ、ＯＦＦする電磁弁、オイル回路の遮断と開放するコントロールバルブ、カムの動きでピストンを押すマスターピストン、油圧による排気バルブを押すスレーブピストンで構成されている。", "B": "エンジンリターダーは、リターダ本体とカムシャフトのブレーキ専用カム、それらを制御するエンジンＥＣＵにより構成されている。", "C": "コントロールバルブとマスターピストンは各気筒ごとに設けているが、排気バルブを押すスレーブピストンはエンジンリターダーとＥＧＲの区別はなく、両回路の油圧を同じピストンで受け、排気バルブを押している。", "D": "エンジンリターダーはブレーキ機能のほかにＥＧＲ機能も兼ねており、両機能のオイル回路は別回路となっている。"}, "explanation": "スレーブピストンはエンジンリターダーとEGRの区別はなく、両回路の油圧を上下別の異なるピストンで受け排気バルブを押す（同じピストンではない）。正解はC。", "source": "19年 2次", "cat": "T/M"}, {"no": 5, "section": "問1", "label": "問1(5)", "points": 3, "answer": "D", "stem": "ハイブリッドおよびクールハイブリッドシステムのサービスプラグを取り外し後、高電圧関連の作業を開始出来るまでの時間に関する記述として、不適切なものはどれか。", "choices": {"A": "Ｂｌｕｅ Ｒｉｂｂｏｎ Ｃｉｔｙ Ｈｙｂｒｉｄ（２０１２年モデル）は７分以上確保する。", "B": "１８年モデル以前のクールハイブリッドは７分以上確保する。", "C": "２＊Ｇデュトロは７分以上確保する。", "D": "２＊Ｇプロフィアは７分以上確保する。"}, "explanation": "２＊Ｇプロフィアはサービスプラグを抜いてから高電圧のコネクターや端子に触れるまでに、約10分間の時間を確保する（7分ではない）。正解はD。", "source": "19年 2次", "cat": "HV"}, {"no": 6, "section": "問1", "label": "問1(6)", "points": 3, "answer": "A", "stem": "ＳＪＧ付デュトロのハイブリッドシステムの点検、整備に関する記述として、適切なものはどれか。", "choices": {"A": "点検、整備時にはまずスターターキーをＯＦＦ、次にサービスプラグを取り外し、コンデンサーが放電するまで規定時間待ったのちに、保護具を必ず身に着け、高電圧回路の作業を行う。", "B": "ＨＶバッテリーがバッテリー上がりを起こした際には、専用の外部充電器（ハイブリッド・システム・チャージャー）で低電流を長時間流し続け、すべてのセルが満充電になるまで充電する。", "C": "高電圧に関わる点検、整備を行うには、労働安全衛生法第５９条ならびに労働安全衛生規則第３６条により特別教育の受講が義務付けられている。", "D": "後輪が接地した状態で牽引する際は、ギヤをＤレンジにするか、プロペラシャフトを外すなどモータージェネレーターが回転しない処置を実施の上、牽引する。"}, "explanation": "B：HVバッテリーは外部充電できないので交換が必要。C：特別教育の受講義務の法令番号は正しいが一般論。D：後輪が接地した状態で牽引する際はNレンジで行う。保護具を装着してからサービスプラグを抜くのが正しい手順。正解はA。", "source": "19年 2次", "cat": "法令"}, {"no": 7, "section": "問1", "label": "問1(7)", "points": 3, "answer": "C", "stem": "オートマチックトランスミッションの故障診断に関する記述として、不適切なものはどれか。", "choices": {"A": "「Ｎ」レンジから「Ｄ」レンジへシフトした時にショックが大きい場合は、アイドル回転が高すぎることが考えられる。", "B": "変速ショックが大きい場合の原因として、ＡＴ内部のラインプレッシャーの高すぎが考えられる。", "C": "ストールテストを行ったところ特定のレンジのみ規定回転数より高い場合は、ステーターのワンウェイクラッチの作動不良が考えられる。", "D": "ロックアップが作動しない原因としてトルクコンバーター内部の不良が考えられる。"}, "explanation": "ステーターのワンウェイクラッチの不良では回転速度が低くなる。規定回転数より高い場合は、ギヤユニットのクラッチの滑りなどが考えられる。正解はC。", "source": "19年 2次", "cat": "T/M"}, {"no": 8, "section": "問1", "label": "問1(8)", "points": 3, "answer": "B", "stem": "ＬＫＧ付ＦＲ１Ｅのプロシフト１２のシフト荷重補正学習に関する記述として、不適切なものはどれか。", "choices": {"A": "学習状態が不十分だと、変速ショックやギヤ鳴りの原因となる。", "B": "モーターシフトユニット、もしくはオートクラッチユニット本体（ＡＣＵ）を交換した際は、学習を行わなければならない。", "C": "ＤＸIIにて学習状態を確認できるが、各ギヤ１０回以上を推奨とし、最大回数は１６回となっている。", "D": "「シフト荷重補正学習状態：シフト位置メインＲ」についてはキーリセットを行うことで「シフト荷重補正学習状態：メイン２速」と同じ回数が書き込まれる。"}, "explanation": "オートクラッチユニット本体（ACU）を交換した場合はシフト荷重補正学習はやらなくてよい（クラッチ学習を実施する）。正解はB。", "source": "19年 2次", "cat": "T/M"}, {"no": 9, "section": "問1", "label": "問1(9)", "points": 3, "answer": "A", "stem": "マニュアルトランスミッションの振動・騒音に関する記述として、不適切なものはどれか。", "choices": {"A": "うなり音は、トランスミッションギヤのかみ合い率を小さくし、振動周波数を低くすることで低減することができる。", "B": "ジャダは、クラッチを徐々につないでいく際にクラッチディスクの摩擦面で間欠的な滑りが生じ、エンジンからの伝達トルクが変動することで発生する。", "C": "車両発進時のジャダは、１０Ｈｚ～２０Ｈｚの振動周波数でクラッチ伝達トルクの変動による振動である。", "D": "プラネタリーピニオンうなり音は、４００Ｈｚ～３ｋＨｚの振動周波数でトランスミッションギヤのかみ合いによる振動である。"}, "explanation": "うなり音は、トランスミッションギヤのかみ合い率を大きくし、振動周波数を高くすることで低減することができる（小さく・低くではない）。正解はA。", "source": "19年 2次", "cat": "T/M"}, {"no": 10, "section": "問1", "label": "問1(10)", "points": 3, "answer": "A", "stem": "ＭＺ１２トランスミッションでレンジ『 ロー 』の時に、ハウジングに固定されるプラネタリーギヤの構成部品として、適切なものはどれか。", "choices": {"A": "リングギヤ", "B": "プラネタリーキャリア", "C": "サンギヤ", "D": "プラネタリーピニオン"}, "explanation": "レンジ「ロー」の時、ハウジングとリング・ギヤが固定される。レンジ「ハイ」の時、リングギヤとプラネタリーキャリヤが固定される。正解はA（リングギヤ）。", "source": "19年 2次", "cat": "T/M"}, {"no": 11, "section": "問1", "label": "問1(11)", "points": 3, "answer": "C", "stem": "２＊Ｇ付プロフィアのフロントガラス脱着に関する記述として、不適切なものはどれか。", "choices": {"A": "ウェザーストリップを再使用しない場合はナイフを使用してウェザーストリップのリップ部を切断する。", "B": "取り付け時、ウェザーストリップのリップ部とウェザーストリップとの接合面に石けん水を塗布する。", "C": "取り付け時、灯油を染み込ませたウエスを使用してウェザーストリップの表面を拭く。", "D": "取り付け時、ホワイトガソリンを使用してウェザーストリップとの接合面を洗浄する。"}, "explanation": "灯油を使用してウェザーストリップとの接合面を洗浄する（表面を拭くのに灯油染み込みウエスを使用するのは不適切）。正解はC。", "source": "19年 2次", "cat": "一般関連"}, {"no": 12, "section": "問1", "label": "問1(12)", "points": 3, "answer": "B", "stem": "ファイナル・ギヤに関する記述として、適切なものはどれか。", "choices": {"A": "トー当たり、フェース当たりの場合は、ドライブ・ピニオンを遠ざけ、リング・ギヤを近付ける。", "B": "トー当たり、フランク当たりの場合は、ドライブ・ピニオンを遠ざけ、リング・ギヤを近付ける。", "C": "ヒール当たり、フランク当たりの場合は、ドライブ・ピニオンを遠ざけ、リング・ギヤを近付ける。", "D": "ヒール当たり、フェース当たりの場合は、ドライブ・ピニオンを近付け、リング・ギヤを遠ざける。"}, "explanation": "トー当たり、フランク当たりの場合は、ドライブ・ピニオンを遠ざけリング・ギヤを近付ける。正解はB。", "source": "19年 2次", "cat": "一般関連"}, {"no": 13, "section": "問1", "label": "問1(13)", "points": 3, "answer": "D", "stem": "タイヤおよびホイールバランスに関する記述として、適切なものはどれか。", "choices": {"A": "タイヤの一部が重い場合、ゆっくり回転させると重い部分が下になって止まる。このときのアンバランスをダイナミック・アンバランスといい、シミーの原因になる。", "B": "タイヤの走行音は、一般にラグ型パターンよりもリブ型パターンの方が大きく、また、バイアス・タイヤよりもラジアル・タイヤの方が大きい。", "C": "スキールとは、急発進、急制動、急旋回のときに発するキーという鋭い音で、タイヤのトレッドが局部的に振動を起こし発生する。", "D": "パターンノイズは、トレッド・パターンの溝の中の空気が、路面とタイヤ間で膨張し、排出されるときに出る音である。"}, "explanation": "A：スタティック・アンバランスという（ダイナミックではない）。B：ラグ型よりリブ型の方が小さく、バイアスよりラジアルの方が小さい。C：路面とタイヤ間で圧縮される。D：パターンノイズの説明は正しい。正解はD。", "source": "19年 2次", "cat": "一般関連"}, {"no": 14, "section": "問1", "label": "問1(14)", "points": 3, "answer": "C", "stem": "ステアリング装置に関する記述として、不適切なものはどれか。", "choices": {"A": "操作機構は、運転者の操舵をステアリング・ギヤ機構に伝える。", "B": "油圧式パワーステアリングには、ラック・ピニオン型、インテグラル型、リンケージ型がある。", "C": "リンク機構は、ギヤ機構の動きをフロント・ホイールに伝えると共に、左右のフロント・ホイールの切れ角を同じにしている。", "D": "ギヤ機構は、操舵力の方向を変えると共に、トルクを増大しステアリング・リンク機構に伝える。"}, "explanation": "リンク機構は、ギヤ機構の動きをフロント・ホイールに伝えると共に、左右のフロント・ホイールを一定の関係に保持し、旋回時に内側ホイールの切れ角を大きくしている（同じにするのではない）。正解はC。", "source": "19年 2次", "cat": "シャシ・フレーム"}, {"no": 15, "section": "問1", "label": "問1(15)", "points": 3, "answer": "D", "stem": "制動装置の点検整備時期に関する記述として、適切なものはどれか。", "choices": {"A": "ブレーキチャンバーの機能の点検は、３ヶ月および１２ヶ月ごとに行わなければならないと法律で定められている。", "B": "ブレーキバルブの機能の点検は、３ヶ月および１２ヶ月ごとに行わなければならないと法律で定められている。", "C": "リレーバルブの機能の点検は、３ヶ月および１２ヶ月ごとに行わなければならないと法律で定められている。", "D": "駐車ブレーキの効き具合の点検は、３ヶ月および１２ヶ月ごとに行わなければならないと法律で定められている。"}, "explanation": "A：ブレーキチャンバーの点検は12ヶ月ごとのみ。B・C：ブレーキバルブ・リレーバルブの点検は12ヶ月ごとのみ。D：駐車ブレーキの効き具合は3ヶ月および12ヶ月ごとに法律で定められている。正解はD。", "source": "19年 2次", "cat": "ブレーキ"}, {"no": 16, "section": "問1", "label": "問1(16)", "points": 3, "answer": "A", "stem": "ＱＰＧ付ＦＥ２Ａ車のＢＯＳ（ブレーキ優先制御）に関する記述として、適切なものはどれか。", "choices": {"A": "走行中にアクセルペダルが踏まれている状態で、ブレーキペダルが同時に操作され、ブレーキスイッチ２系統のどちらかがＯＮで作動する。", "B": "走行中にアクセルペダルが踏まれている状態で、ブレーキペダルが同時に操作され、ブレーキスイッチ２系統の両方がＯＮで作動する。", "C": "走行中にアクセルペダルが踏まれている状態で、ブレーキペダルが同時に操作され、車速が３０ｋｍ／ｈを超えていて、ブレーキスイッチ２系統の両方がＯＮで作動する。", "D": "走行中にアクセルペダルが踏まれている状態で、ブレーキペダルが同時に操作され、減速を検知すると作動する。"}, "explanation": "ＢＯＳ（ブレーキ優先制御）は走行中にアクセルペダルが踏まれている状態でブレーキペダルが同時に操作され、ブレーキスイッチ2系統のどちらかがONで作動する。正解はA。", "source": "19年 2次", "cat": "ブレーキ"}, {"no": 17, "section": "問1", "label": "問1(17)", "points": 3, "answer": "D", "stem": "２＊Ｇ付ＦＲ１Ａのブレーキ装置に関する記述として、適切なものはどれか。", "choices": {"A": "ＡＢＳコントロールバルブには、圧縮エアノイズ低減のためサイレンサーがついている。", "B": "エアコンプレッサーは標準型（φ８５）と大容量型（φ９５）の２種類ある。", "C": "リヤスピードセンサーを後前軸から後後軸へ変更した。", "D": "ブレーキシグナルトランスミッターのコネクターをＨＤＳＣＳ（Ｈｅａｖｙ Ｄｕｔｙ Ｓｅａｌｅｄ Ｃｏｎｎｅｃｔｏｒ Ｓｅｒｉｅｓ）化して、防水性および信頼性が向上した。"}, "explanation": "A：サイレンサーは前2軸車のみ装着。B：エアコンプレッサーはφ95×60の1種類のみ。C：FS/FQ車は変更したがFR車は後前軸のまま。D：ブレーキシグナルトランスミッターのコネクターをHDSCS化した説明が正しい。正解はD。", "source": "19年 2次", "cat": "ブレーキ"}, {"no": 18, "section": "問1", "label": "問1(18)", "points": 3, "answer": "D", "stem": "ブレーキの故障に関する記述として、不適切なものはどれか。", "choices": {"A": "ブレーキライニングの早期摩耗はブレーキの使用条件に大きく左右されるが、その中でも最も影響の大きいのがライニングの温度である。", "B": "ブレーキの片効きは、特に新品ライニングで発生しやすくなっている。これは左右の当たりが不均一であったり、フェードが大きいためである。", "C": "ブレーキブースターの戻り不良の原因として、エアピストンとエアシリンダーの摺動不良やチェックバルブの機能不良などが考えられる。", "D": "ブレーキジャダーの高速ジャダーは、高速からの強いブレーキをかけた時に起こる。原因として最も影響のあるのはフロントドラム摺動面の振れである。"}, "explanation": "高速ジャダーは高速からの弱いブレーキをかけた時に起こる（強いブレーキではない）。正解はD。", "source": "19年 2次", "cat": "T/M"}, {"no": 19, "section": "問1", "label": "問1(19)", "points": 3, "answer": "C", "stem": "２＊Ｇ付プロフィアのエアスプリングのエアを排出する際の、各バルブの作動について正しい組み合わせはどれか。\n給気／排気切り替えマグネチックバルブは［ イ ］\n左右開閉切り替えバルブは［ ロ ］", "choices": {"A": "［ イ ］ ＯＦＦ　［ ロ ］ ＯＦＦ", "B": "［ イ ］ ＯＮ　　［ ロ ］ ＯＦＦ", "C": "［ イ ］ ＯＦＦ　［ ロ ］ ＯＮ", "D": "［ イ ］ ＯＮ　　［ ロ ］ ＯＮ"}, "explanation": "エア排出時の組み合わせは、給気/排気切り替えマグネチックバルブは「OFF」、開閉切り替えマグネチックバルブは「ON」。正解はC。", "source": "19年 2次", "cat": "シャシ・フレーム"}, {"no": 20, "section": "問1", "label": "問1(20)", "points": 3, "answer": "A", "stem": "２＊Ｇ付プロフィアのヒーター＆エアコンディショナーに関する記述として、適切なものはどれか。", "choices": {"A": "エアコン用コンプレッサーロック検出システムは、ロック判定するとマグネットクラッチをＯＦＦするとともに、エアコンスイッチのインジケーターランプを点滅させる。", "B": "サブクール付ＭＦコンデンサーを採用しており、２つのコンデンサーに凝縮部と過冷部の機能を分けることにより、冷房性能の効率化を図っている。", "C": "エバポレーター後センサーはエバポレーター後部に取付けられており、エバポレーターを通過した冷媒温度を感知している。", "D": "日射センサーはツェナダイオードを使用し、日射による温度上昇分を補正するために使用している。"}, "explanation": "B：コンデンサーは1つで、コンデンサーの中を凝縮部と過冷部とに分け気液分離器を配置している。C：エバポレーター後センサーは通過する空気の温度を感知している（冷媒温度ではない）。D：日射センサーはフォトダイオード（ツェナダイオードではない）。正解はA。", "source": "19年 2次", "cat": "T/M"}, {"no": 21, "section": "問1", "label": "問1(21)", "points": 3, "answer": "B", "stem": "ＣＡＮ通信システムに関する記述として、不適切なものはどれか。", "choices": {"A": "バス・オフ状態とは、エラーを検知し、リカバリしてもエラーが解決しない場合に通信を停止している状態をいう。", "B": "一端の終端抵抗が破損すると、通信はそのまま継続され耐ノイズ性にも影響はないが、ダイアグコードが出力される事がある。", "C": "複数のＥＣＵが同時に送信しようとすると、データ・フレーム同士が衝突する為、各ＥＣＵは、ＩＤコードにより優先度が高いデータ・フレームを優先して送信する。", "D": "ＣＡＮは、一つのＥＣＵが複数のデータ・フレームを送信したり、ＣＡＮバス上のデータを必要とする複数のＥＣＵが同時にデータ・フレームを受信する事が出来る。"}, "explanation": "一端の終端抵抗が破損しても通信は継続されるが、耐ノイズ性が低下する（影響はないは誤り）。ダイアグコードが出力される事があるため点検を確実に行うこと。正解はB。", "source": "19年 2次", "cat": "一般関連"}, {"no": 22, "section": "問1", "label": "問1(22)", "points": 3, "answer": "C", "stem": "ＬＫＧ付プロフィアの車両制御ＥＣＵに関する記述として、適切なものはどれか。", "choices": {"A": "スピードリミッター制御は各スイッチおよびセンサーの入力信号を受け、その走行状況に応じた車速に制限する。", "B": "減速アイドルアップ制御はギヤが入っている時に自動でアイドルアップすることで坂道や積車状態でのスムースな減速が出来る。", "C": "補助ブレーキ制御は主ブレーキを作動させることなく下り坂を下ることができ、運転者の疲労を軽減する。", "D": "アイドルストップ制御は車両減速時にエンジンを停止させ燃費を向上させている。"}, "explanation": "A：スピードリミッター制御は走行状況に応じた車速ではなく、任意の車速に制限する。B：減速アイドルアップ制御は無い。D：アイドルストップ制御は車両減速時ではなく、車両停車時にエンジンを停止させる。正解はC。", "source": "19年 2次", "cat": "ブレーキ"}, {"no": 23, "section": "問1", "label": "問1(23)", "points": 3, "answer": "B", "stem": "鋼の熱処理に関する記述として、適切なものはどれか。", "choices": {"A": "浸炭焼き入れは、鋼の内部から表面に向かって硬化させる熱処理法である。", "B": "焼き入れ効果は、炭素の含有量の多い鋼ほど大きいが、材質はもろくなる。", "C": "高周波焼き入れは、鋼の表面硬化処理はできない。", "D": "焼き入れは、鋼の硬さと粘り強さを増す熱処理法である。"}, "explanation": "A：浸炭焼き入れは鋼の表面層の炭素量を増加させて硬化させる（内部からではない）。C：高周波電流で鋼の表面層を加熱処理する（表面硬化処理ができる）。D：焼き入れは鋼の硬さ及び強さを増す（粘り強さではない）。正解はB。", "source": "19年 2次", "cat": "一般関連"}, {"no": 24, "section": "問1", "label": "問1(24)", "points": 3, "answer": "A", "stem": "グラインダ（卓上）作業時のワークレストと砥石の隙間基準として、適切なものはどれか。", "choices": {"A": "１～３ｍｍ", "B": "４～６ｍｍ", "C": "７～９ｍｍ", "D": "１０～１２ｍｍ"}, "explanation": "グラインダ（卓上）作業時のワークレストと砥石の隙間基準は1～3㎜で使用する。正解はA。", "source": "19年 2次", "cat": "一般関連"}, {"no": 25, "section": "問1", "label": "問1(25)", "points": 3, "answer": "D", "stem": "排出ガスに関する記述として、適切なものはどれか。", "choices": {"A": "サルフェートとは、燃焼中の硫黄分が酸化して生成された硫黄化合物の総称である。", "B": "ディーゼルエンジンは空気過剰率が大きいため、ＣＯの発生は極めて多い。", "C": "ディーゼルエンジンは十分な空気の中で燃焼が行われるため、ＨＣの発生は多い。", "D": "排出ガス中におけるＮＯｘは主にＮＯとＮＯ２である。"}, "explanation": "A：サルフェートは硫黄分が酸化した硫黄化合物で、説明内容は概ね正しいがNOx等との関連説明が必要。B：ディーゼルエンジンはCOの発生は極めて少ない。C：HCの発生は少ない。D：NOxは主にNOとNO₂が正しい。正解はD。", "source": "19年 2次", "cat": "エンジン"}, {"no": 26, "section": "問1", "label": "問1(26)", "points": 3, "answer": "B", "stem": "運転席エアバッグアセンブリを脱着する際の注意事項に関する記述として、不適切なものはどれか。", "choices": {"A": "エアバッグアセンブリ交換時は、他の車で使用したものは絶対に使用しないこと。", "B": "エアバッグアセンブリは、必ずパット面を下に向けて保管する。", "C": "エアバッグアセンブリの分解は、絶対に行わないこと。", "D": "システムの点検をするときは、デジタルサーキットテスタを使用する。"}, "explanation": "エアバッグアセンブリは万が一作動（膨張）した場合に飛び上がり危険なため、パット面を上に向けて保管するのが正しい（下向きではない）。正解はB。", "source": "19年 2次", "cat": "一般関連"}, {"no": 27, "section": "問1", "label": "問1(27)", "points": 3, "answer": "D", "stem": "道路運送車両法の保安基準に照らし、小型四輪の乗用車（車両重量１,３８０㎏、乗車定員５人、右ハンドル）を左側及び右側に、それぞれ傾けた場合に転覆しない角度の組み合わせとして、適切なものはどれか。", "choices": {"A": "左側２５°　右側３０°", "B": "左側２５°　右側２５°", "C": "左側３０°　右側２５°", "D": "左側３５°　右側３５°"}, "explanation": "保安基準第5条（安定性）：自動車は空車状態において左側および右側にそれぞれ35°まで傾けた場合に転覆しないこと。ただし車両総重量が車両重量の1.2倍以下の自動車は30°まで。本問の車両は乗車定員5人（約330kg）なので総重量1,710kgで1.2倍（1,656kg）を超えるため35°が適用される。正解はD。", "source": "19年 2次", "cat": "法令"}, {"no": 28, "section": "問1", "label": "問1(28)", "points": 3, "answer": "C", "stem": "道路運送車両法及び指定自動車整備事業規則に照らし、保安基準適合証の有効期限に関する記述として、適切なものはどれか。", "choices": {"A": "交付した日から３０日間となっている。", "B": "交付した日から１５日間となっている。", "C": "検査した日から１５日間となっている。", "D": "検査した日から３０日間となっている。"}, "explanation": "道路運送車両法第94条の5により、保安基準適合証の有効期限は検査した日から15日間。正解はC。", "source": "19年 2次", "cat": "法令"}, {"no": 29, "section": "問1", "label": "問1(29)", "points": 3, "answer": "A", "stem": "事業用自動車の定期点検基準に関する記述として、不適切なものはどれか。", "choices": {"A": "バッテリーターミナル部の接続状態は６ヵ月ごと", "B": "ファンベルトの緩み及び損傷は３ヵ月ごと", "C": "ショックアブソーバーの油漏れ及び損傷は３ヵ月ごと", "D": "ホイールボルト、ナットの緩みは３ヵ月ごと"}, "explanation": "バッテリーターミナル部の接続状態は3ヵ月ごとに点検するのが正しい（6ヵ月ごとではない）。正解はA。", "source": "19年 2次", "cat": "一般関連"}, {"no": 30, "section": "問1", "label": "問1(30)", "points": 3, "answer": "D", "stem": "道路運送車両法の保安基準に照らし、次の文章の［ ］に当てはまるものとして、適切なものはどれか。（２０１８年度制作車両）\n「ヘッドライトの合計光度は［ ］カンデラを超えてはならない。」", "choices": {"A": "１５０，０００", "B": "２４０，０００", "C": "３２０，０００", "D": "４３０，０００"}, "explanation": "道路運送車両法の保安基準第32条により、走行用前照灯（ヘッドライト）の最高光度の合計は430,000カンデラを超えないこと。平成17年12月以前に製作された車両については225,000カンデラを超えないこと。正解はD。", "source": "19年 2次", "cat": "法令"}, {"no": 1, "section": "問1", "label": "問1(1)", "points": 3, "answer": "B", "stem": "２ＲＧ付プロフィアＡ０９Ｃエンジンの２段過給ターボに関する記述として、適切なものはどれか。", "choices": {"A": "低圧段ターボチャージャーおよび高圧段ターボチャージャーの異なる２種類のターボチャージャーを併用することにより、低速域での高効率過給を実現している。", "B": "排気バイパスバルブのＤＣモーターとリンク機構がバルブの開度を変えてエキゾーストマニホールドから流入する排出ガスの流量を変えることにより、タービンホイールの回転数を無段階に制御している。", "C": "２段過給ターボのＤＣモーターは車両制御ＥＣＵからのＣＡＮ通信信号により制御されている。", "D": "低圧段ターボチャージャーはＤＣモーターとリンク機構により、バルブの開閉を行い、エンジンの回転、負荷に応じ最適の過給効率になるように制御している。"}, "explanation": "A：低速域ではなく全域での高効率過給を実現している。C：ＤＣモーターはエンジンＥＣＵからのＣＡＮ通信信号により制御される。D：低圧段ターボはウエストゲートバルブである。正解はB。", "source": "20年 2次", "cat": "エンジン"}, {"no": 2, "section": "問1", "label": "問1(2)", "points": 3, "answer": "B", "stem": "ＱＫＧ付プロフィアＡ０９Ｃエンジンの電子制御ファンクラッチシステムの構造説明として、適切なものはどれか。", "choices": {"A": "電磁式なのでシリコンオイルは封入されていない。", "B": "オイル供給穴を開閉するバルブでオイル量を調整しファンの回転数を制御している。", "C": "電磁式クラッチにてＯＮ-ＯＦＦ制御し、ファンの回転を制御している。", "D": "コントロールＥＣＵはエンジン回転、エンジン負荷、車速、水温、インテーク温度、外気温を検出して、ファン回転数を制御している。"}, "explanation": "電子制御ファンクラッチは、電磁コイル（ソレノイド）、ファン回転センサー、シリコンオイル供給穴を開閉してオイル量を調整するバルブなどを内蔵している（シリコンオイル式）。正解はB。", "source": "20年 2次", "cat": "T/M"}, {"no": 3, "section": "問1", "label": "問1(3)", "points": 3, "answer": "C", "stem": "ＬＤＧ付ＦＲ１Ｅに搭載されている尿素ＳＣＲシステムの尿素水添加開始温度が１５０°Ｃ以上である理由として、不適切なものはどれか。", "choices": {"A": "尿素ＳＣＲ触媒は、低い温度では活性化していないため。", "B": "温度が低いと尿素がアンモニアに変化しないため。", "C": "ＮＯxセンサーヒーターがＯＮする温度が１５０°Ｃで、それ以上の温度でないとＮＯx濃度が測れないため。", "D": "低い温度では、尿素水の加水分解と呼ばれる化学変化がおきないため。"}, "explanation": "尿素システムの開始温度条件に、ＮＯxセンサー条件は入っていない。尿素がアンモニアに変化せず（加水分解が行われず）、かつ触媒が活性化していないため、150°C以上でないと添加しない。正解はC。", "source": "20年 2次", "cat": "電気装置"}, {"no": 4, "section": "問1", "label": "問1(4)", "points": 3, "answer": "A", "stem": "２＊Ｇ付大型トラックのエンジンのセンサーに関する記述として、適切なものはどれか。", "choices": {"A": "エンジン主回転センサーは、フライホイールハウジングに取り付けており、エンジンが回転してパルサーにより交流電圧を発生させる。パルサーには６°ごとに凹部を設けており、エンジン１サイクル（２回転）分の凹数は１２０個になる。", "B": "エアフローセンサーは薄膜シリコンチップ式を採用し、シリコンチップ部上流温度センサーの温度と下流温度センサーの温度差を計測し、空気流量を計測している。（ホールＩＣ式）", "C": "アクセルセンサーは可変抵抗式のセンサーで、アクセルペダルの踏み込み量を電気信号に置き替えてエンジンＥＣＵに送る。アクセルセンサーアセンブリ１個の中にはセンサーを２個内蔵している。（インジェクターのリゲージ回路）", "D": "燃料温度センサーはサプライポンプ入口回路に取り付けている。（１１２個）"}, "explanation": "B：ホールIC式。C：インジェクターのリゲージ回路の説明。D：エンジン１サイクルの凹数は１１２個（６°ごとなら60°×2÷6°=20ではなく、実際は360°×2÷6°=120-8=112個）。正解はA。", "source": "20年 2次", "cat": "エンジン"}, {"no": 5, "section": "問1", "label": "問1(5)", "points": 3, "answer": "B", "stem": "２ＰＧ付ＣＨＶ（クールハイブリッド）車に関する記述として、不適切なものはどれか。", "choices": {"A": "ＨＶバッテリーの電力を電動冷凍機へ供給することにより燃料消費を低減している。ただし、エンジン停止時はハイブリッドシステムは使用できない。", "B": "モータージェネレータは始動および車両駆動、回生と発電に使用している。", "C": "スタンバイ機能が標準装備され、外部電源が使用可能な場所ではエンジン停止中でも上物の駆動が可能である。", "D": "車両減速エネルギーおよびエンジン動力によりモータージェネレーターで発電し、電動冷凍機への電力を供給する。"}, "explanation": "モータージェネレータは始動および車両駆動には使用していない（回生と発電のみ）。正解はB。", "source": "20年 2次", "cat": "HV"}, {"no": 6, "section": "問1", "label": "問1(6)", "points": 3, "answer": "C", "stem": "２０１９年モデルのプロフィアＨＶ車の機能に関する記述として、不適切なものはどれか。", "choices": {"A": "オートシフトダウン機能により運転状況に応じて１２速～８速間でシフトダウンが行われ、大きな制動力を得ることができる。", "B": "高圧Ｊ/Ｂ（ジャンクションボックス）は、ＨＶバッテリー前部のフレームに搭載されており、ＨＶバッテリーの電力を架装する電動冷凍機などに分配する。", "C": "ＤＣ－ＤＣコンバータは、システムメインリレーおよびＨＶウォーターポンプなどへ電力を供給するため、ＨＶバッテリー電圧のＤＣ２７６ＶをＤＣ２４Ｖに降圧する。", "D": "ＨＶ－ＥＣＵが、各種センサーなどの信号から減速状態を判断すると、インバーターがＨＶモーターを発電機として機能させ、車両の運動エネルギーを電気エネルギーに変換しながらブレーキアシストを行う。"}, "explanation": "ＤＣ－ＤＣコンバータはＨＶバッテリー電圧ＤＣ２７６ＶをＤＣ１２Ｖに降圧する（２４Ｖではない）。正解はC。", "source": "20年 2次", "cat": "HV"}, {"no": 7, "section": "問1", "label": "問1(7)", "points": 3, "answer": "B", "stem": "Ｑ＊Ｇ付プロフィアのプロシフト１２で、『クラッチ学習が途中で失敗する』に関する点検項目として、不適切なものはどれか。", "choices": {"A": "パーキングのブザーＯＦＦスイッチの状態", "B": "スプリングブレーキスイッチの状態", "C": "暖機状態", "D": "エアタンク内の圧力状態"}, "explanation": "プロシフトのパーキングブレーキスイッチ信号はスプリングブレーキスイッチではなく、ブザーＯＦＦスイッチの信号を使用する。クラッチ学習時は暖機状態かつエアタンク内に十分なエアが必要。正解はB。", "source": "20年 2次", "cat": "T/M"}, {"no": 8, "section": "問1", "label": "問1(8)", "points": 3, "answer": "D", "stem": "２ＲＧ付プロフィアに搭載される、ＭＺ１２トランスミッションに関する記述として、不適切なものはどれか。", "choices": {"A": "アクセルペダルを踏み込むことにより、１２速～８速で走行中に、走行状態に応じて１１速～７速にシフトダウンする、キックダウン変速ができるようになった。", "B": "オートシフトダウン機能により運転状況に応じて１２速～８速間でシフトダウンが行われ、大きな制動力を得ることができる。", "C": "プロシフトのシステムに何らかの異常が発生した場合でも、車両を安全な場所へ移動できるように非常コントロール機能を設定している。", "D": "トルクコンバーター付きオートマチックトランスミッションにあるクリープ現象を実現した。"}, "explanation": "ＭＺ１２トランスミッションはトルクコンバーター付きＡＴではなくＡＭＴ（自動化ＭＴ）であり、クリープ現象はない。正解はD。", "source": "20年 2次", "cat": "T/M"}, {"no": 9, "section": "問1", "label": "問1(9)", "points": 3, "answer": "A", "stem": "ＱＫＧ付Ｂｌｕｅ Ｒｉｂｂｏｎ（ＫＶ２９０）のＡＭＴに関する記述として、不適切なものはどれか。", "choices": {"A": "中扉開の状態でシフトレバーが「Ｄ」位置または「Ｒ」位置の時は、アクセルインターロックがかかり、アイドリング回転での走行しかできない。", "B": "ギヤシフトユニットは、３つのソレノイドを通電させることにより、シフト、セレクトを行いギヤチェンジが行われる。", "C": "シフトレバーには、シフトロック機能があり、エンジン回転中にシフトレバーを「Ｎ」位置に操作した場合はシフト「Ｎ」ロックソレノイドが作動し、ブレーキペダルを踏まなければ「Ｄ」位置または「Ｒ」位置への操作が行えないようになっている。", "D": "シフトレバーが「Ｎ」位置である場合にエンジンの始動を可能にする、スターターインヒビター制御がある。"}, "explanation": "中扉開の状態ではシフト「Ｎ」ロックが作動し、「Ｎ」位置以外への操作を制限する（アクセルインターロックではない）。正解はA。", "source": "20年 2次", "cat": "ブレーキ"}, {"no": 10, "section": "問1", "label": "問1(10)", "points": 3, "answer": "D", "stem": "オートマチックトランスミッションの故障診断に関する記述として、不適切なものはどれか。", "choices": {"A": "ロックアップが作動しない原因としてトルクコンバーター内部の不良が考えられる。", "B": "「Ｎ」レンジから「Ｄ」レンジへシフトした時にショックが大きい場合は、アイドル回転が高すぎることが考えられる。", "C": "変速ショックが大きい場合の原因として、ＡＴ内部のラインプレッシャーの高すぎが考えられる。", "D": "ストールテストを行ったところ特定のレンジのみ規定回転数より高い場合はステーターのワンウェイクラッチの作動不良が考えられる。"}, "explanation": "ステーターのワンウェイクラッチの不良は回転速度が低くなる。規定回転数より高い場合はギヤユニットのクラッチの滑りなどが考えられる。正解はD。", "source": "20年 2次", "cat": "T/M"}, {"no": 11, "section": "問1", "label": "問1(11)", "points": 3, "answer": "C", "stem": "カーシェイクの発生原因として、適切なものはどれか。", "choices": {"A": "ブレーキ振動", "B": "ブレーキジャダー", "C": "サブフレーム、Ｕボルトの緩み", "D": "エンジン振動"}, "explanation": "カーシェイクとは中・高速走行時のボデー、ステアリング、シートの上下・左右の振動で、約5～30Hzである。振動源としては、タイヤのアンバランスやディスクホイールの偏心、サブフレームUボルトの緩みなどがある。正解はC。", "source": "20年 2次", "cat": "T/M"}, {"no": 12, "section": "問1", "label": "問1(12)", "points": 3, "answer": "D", "stem": "２ＲＧ付プロフィアのエアサスペンション車のファイングリップ、および非常走行装置の機能に関する記述として、不適切なものはどれか。", "choices": {"A": "エアサスペンションは、荷重の増減に応じて、レべリングバルブやレベライザなどの働きにより荷台が一定の高さに保たれる。", "B": "積載量は、エアスプリングに取り付けられた圧力センサーがエアスプリング内の空気圧を検出し、エアサスペンションＥＣＵが演算する。", "C": "ファイングリップスイッチが「ＯＮ」でエアサス非常走行スイッチが「ＯＮ」の場合、非常走行装置が作動する。", "D": "ファイングリップスイッチが「ＯＮ」の場合、インジケーターランプ（緑色）が点灯するとともにファイングリップが作動し、後後軸重が増加する。"}, "explanation": "ファイングリップスイッチが「ＯＮ」の場合、後後軸重ではなく後前軸重が増加する。正解はD。", "source": "20年 2次", "cat": "シャシ・フレーム"}, {"no": 13, "section": "問1", "label": "問1(13)", "points": 3, "answer": "B", "stem": "フレームの亀裂で、補強材を使用した修正の注意事項の記述として不適切なものはどれか。", "choices": {"A": "サイドレールの内側に補強する場合、一般フレーム用鋼または一般構造用圧延鋼材を使用する。", "B": "Ｌ型の材料を使用する場合、補強材の端部をサイドレールの剛性急変部および集中荷重部にくるようにする。", "C": "サイドレールの外側に補強する場合、サイドレールおよびサイドレールスティフナーの材料と同等以上の材料を使用する。", "D": "Ｌ型補強板はサイドレール応力の引っ張り側にフランジ部がくるようにする。"}, "explanation": "Ｌ型の材料を使用する場合、補強材の端部をサイドレールの剛性急変部および集中荷重部に一致しないようにする（くるようにするは不適切）。正解はB。", "source": "20年 2次", "cat": "一般関連"}, {"no": 14, "section": "問1", "label": "問1(14)", "points": 3, "answer": "A", "stem": "サスペンションに関する記述として、不適切なものはどれか。", "choices": {"A": "エアサスペンションは、荷重が小さくなれば、ばねが柔らかくなるので、振動数が増加して、乗り心地が悪くなる。", "B": "エアサスペンションは、荷重の増減に応じて、ばね定数を自動的に調整するため、荷重の増減に関係なく固有振動数を保つことができる。", "C": "リーフサスペンションやコイルスプリングは、ばねの硬さが一定で最大積載荷重に耐えられるよう設計されているので、軽荷重のときはばねが硬く感じる。", "D": "ファイングリップスイッチを「ＯＦＦ」にすることにより、ファイングリップの作動を解除することができる。"}, "explanation": "エアサスペンションは荷重の増減に応じてばね定数を自動調整するため、荷重の増減に関係なく固有振動数を保てるため乗り心地がよい（振動数が増加して乗り心地が悪くなるのは不適切）。正解はA。", "source": "20年 2次", "cat": "シャシ・フレーム"}, {"no": 16, "section": "問1", "label": "問1(16)", "points": 3, "answer": "D", "stem": "リエッセⅡ（２０１７年モデル）のブレーキ装置に関する記述として、不適切なものはどれか。", "choices": {"A": "ブレーキライニングの早期摩耗はブレーキの使用条件に大きく左右されるが、その中でも最も影響の大きいのがライニングの温度である。", "B": "図はスピードセンサー（車輪速）信号波形である。", "C": "ブレーキアクチュエータは、マスタシリンダ圧力センサ、マスタシリンダカットソレノイドバルブ、保持ソレノイドバルブ、減圧ソレノイドバルブ、ポンプモータおよびリザーバなどから構成されており、各ホイールシリンダへのブレーキ油圧を調整している。", "D": "ヨーレートセンサー＆Ｇセンサーは、車両状態を推定するため助手席下に取り付け、前後左右Ｇおよびヨーレートを検出している。"}, "explanation": "ヨーレートセンサおよびＧセンサは、エアバッグコンピュータＡＳＳＹに内蔵されている（助手席下に個別に取り付けられているわけではない）。正解はD。", "source": "20年 2次", "cat": "ブレーキ"}, {"no": 17, "section": "問1", "label": "問1(17)", "points": 3, "answer": "A", "stem": "ＱＰＧ付ＦＥ２Ａ車のＢＯＳ（ブレーキ優先制御）に関する記述として、適切なものはどれか。", "choices": {"A": "走行中にアクセルペダルが踏まれている状態で、ブレーキペダルが同時に操作され、ブレーキスイッチ２系統のどちらかがＯＮで作動する。", "B": "走行中にアクセルペダルが踏まれている状態で、ブレーキペダルが同時に操作され、ブレーキスイッチ２系統の両方がＯＮで作動する。", "C": "走行中にアクセルペダルが踏まれている状態で、ブレーキペダルが同時に操作され、車速が３０ｋｍ／ｈを超えていて、ブレーキスイッチ２系統の両方がＯＮで作動する。", "D": "走行中にアクセルペダルが踏まれている状態で、ブレーキペダルが同時に操作され、減速を検知すると作動する。"}, "explanation": "ＢＯＳは走行中にアクセルペダルが踏まれている状態でブレーキペダルが同時に操作され、ブレーキスイッチ２系統のどちらかがＯＮで作動する。正解はA。", "source": "20年 2次", "cat": "ブレーキ"}, {"no": 18, "section": "問1", "label": "問1(18)", "points": 3, "answer": "A", "stem": "２ＲＧ付ＦＲ１Ａのブレーキ装置に関する記述として、不適切なものはどれか。", "choices": {"A": "エアドライヤーは、マルチプロテクションバルブ、減圧弁、エア低圧警報スイッチエアゲージセンサーを一体化したものを採用した。", "B": "法規対応のため、ブレーキ作動用エア圧を測定するテストコネクションをエアタンクとチャンバーに追加した。", "C": "バックアップバルブをアクスルモジュレーターに内蔵させることにより回路の簡素化および整備性が向上した。", "D": "アクスルモジュレーターのコネクターをＨＤＳＣＳ（Ｈｅａｖｙ Ｄｕｔｙ Ｓｅａｌｅｄ Ｃｏｎｎｅｃｔｏｒ Ｓｅｒｉｅｓ）化して、防水性および信頼性が向上した。"}, "explanation": "エアドライヤーとマルチプロテクションバルブは分離し、その間にウエットタンクを設置した（一体化ではない）。正解はA。", "source": "20年 2次", "cat": "ブレーキ"}, {"no": 19, "section": "問1", "label": "問1(19)", "points": 3, "answer": "C", "stem": "ＴＱＧ付デュトロの電動パーキングブレーキの機能に関する記述として、不適切なものはどれか。", "choices": {"A": "増し引き機能は電動パーキングブレーキ作動後、ケーブルけん引力の低下があると、状況によりケーブルを増し引きする。", "B": "引きずり警報はパーキングブレーキ作動中に車速が５ｋｍ／ｈ以上になると、従来車同様警報音が鳴る。", "C": "シューギャップ調整警報はパーキングブレーキシューが摩耗してくると、調整を促す目的で警報音を鳴らす。", "D": "アクチュエーター交換警報はモーターの寿命が近くなると交換警報としてウォーニングランプが点灯する。"}, "explanation": "シューギャップ調整警報はパーキングブレーキシューが摩耗してくると、調整を促す目的でウォーニングランプを点灯する（警報音ではなくウォーニングランプ）。正解はC。", "source": "20年 2次", "cat": "ブレーキ"}, {"no": 20, "section": "問1", "label": "問1(20)", "points": 3, "answer": "B", "stem": "２ＤＧ付プロフィアのＡＤＢシステムに関する記述として、不適切なものはどれか。", "choices": {"A": "常時、画像センサーで前方車両位置を検出しているため、相対位置が変わっても遮光範囲を追従可能となっている。", "B": "ミリ波レーダーセンサーで対向車のヘッドライト、先行者のテールライト位置を検出している。", "C": "プロジェクターレンズに搭載されたＬＥＤを点灯／消灯／調光している。", "D": "協調システムデバイスからの信号を基にヘッドライトのハイビーム配光を制御している。"}, "explanation": "対向車のヘッドライト、先行者のテールライト位置を検出するのはミリ波レーダーセンサーではなく画像センサーである。正解はB。", "source": "20年 2次", "cat": "電気装置"}, {"no": 21, "section": "問1", "label": "問1(21)", "points": 3, "answer": "C", "stem": "２ＤＧ付プロフィアのヒーター＆エアコンディショナーに関する記述として、適切なものはどれか。", "choices": {"A": "サブクール付ＭＦコンデンサーを採用しており、２つのコンデンサーに凝縮部と過冷部の機能を分けることにより、冷房性能の効率化を図っている。", "B": "エバポレーター後センサーはエバポレーター後部に取付けられており、エバポレーターを通過した冷媒温度を感知している。", "C": "エアコン用コンプレッサーロック検出システムは、ロック判定するとマグネットクラッチをＯＦＦするとともに、エアコンスイッチのインジケーターランプを点滅させる。", "D": "日射センサーはツェナダイオードを使用し、日射による温度上昇分を補正するために使用している。"}, "explanation": "A：コンデンサーは１つで凝縮部と過冷部に分けている。B：エバポレーター後センサーは通過する空気の温度を感知している（冷媒温度ではない）。D：日射センサーはフォトダイオード（ツェナダイオードではない）。正解はC。", "source": "20年 2次", "cat": "T/M"}, {"no": 22, "section": "問1", "label": "問1(22)", "points": 3, "answer": "B", "stem": "ＣＡＮ通信システムに関する記述として、不適切なものはどれか。", "choices": {"A": "複数のＥＣＵが同時に送信しようとすると、データ・フレーム同士が衝突するため、各ＥＣＵは、ＩＤコードにより優先度が高いデータ・フレームを優先して送信する。", "B": "一端の終端抵抗が破損すると、通信はそのまま継続され耐ノイズ性にも影響はないが、ダイアグコードが出力されることがある。", "C": "ＣＡＮは、一つのＥＣＵが複数のデータ・フレームを送信したり、ＣＡＮバス上のデータを必要とする複数のＥＣＵが同時にデータ・フレームを受信することができる。", "D": "バス・オフ状態とは、エラーを検知し、リカバリしてもエラーが解決しない場合に通信を停止している状態をいう。"}, "explanation": "一端の終端抵抗が破損すると、通信は継続されるが耐ノイズ性が低下する。ダイアグコードが出力されることがある。正解はB。", "source": "20年 2次", "cat": "一般関連"}, {"no": 23, "section": "問1", "label": "問1(23)", "points": 3, "answer": "D", "stem": "２ＲＧ付ＲＵ２Ａ型車の電磁リターダーについて、不適切なものはどれか。", "choices": {"A": "このリターダーは制動エネルギーを渦電流に変換し、熱として放散して制動を行っている。", "B": "ドラムに発生した渦電流は熱エネルギーに変わり、ドラムに設けられたフィンより空気中に放散される。", "C": "コイル内には温度センサーを設け長時間連続使用した場合、リターダーの過熱を防止するために一時的に制御を停止し、コイル等を保護する。", "D": "リターダーで使用される電力は本体に内蔵されたエキサイターにより発電される。"}, "explanation": "リターダーの過熱を防止するために一時的に制動力を低下させる（制御を停止するのではなく制動力を低下させる）。また、エキサイターによる発電については不適切の可能性がある。正解はD。", "source": "20年 2次", "cat": "T/M"}, {"no": 24, "section": "問1", "label": "問1(24)", "points": 3, "answer": "B", "stem": "労働安全衛生規則に照らし、次の文章の［　］にあてはまるものとして、適切なものはどれか。\n「事業者は、高さが［　］以上の箇所（作業床の端、開口部等を除く）で作業を行なう場合において墜落により労働者に危険を及ぼすおそれのあるときは、足場を組み立てる等の方法により作業床を設けなければならない。」", "choices": {"A": "１．５ｍ以上", "B": "２．０ｍ以上", "C": "２．５ｍ以上", "D": "３．０ｍ以上"}, "explanation": "労働安全衛生規則第518条により、高さが２ｍ以上の箇所で作業を行う場合は作業床を設けなければならない。正解はB。", "source": "20年 2次", "cat": "法令"}, {"no": 25, "section": "問1", "label": "問1(25)", "points": 3, "answer": "D", "stem": "排出ガスに関する記述として、適切なものはどれか。", "choices": {"A": "ディーゼルエンジンは空気過剰率が大きいため、ＣＯの発生は極めて多い。", "B": "ディーゼルエンジンは十分な空気の中で燃焼が行われるため、ＨＣの発生は多い。", "C": "排出ガス中におけるＮＯｘは主にＮＯとＯ２である。", "D": "サルフェートとは、燃焼中の硫黄分が酸化して生成された硫黄化合物の総称である。"}, "explanation": "A：ディーゼルエンジンは空気過剰率が大きいためＣＯの発生は極めて少ない。B：ＨＣの発生は少ない。C：ＮＯｘは主にＮＯとＮＯ₂である（Ｏ₂ではない）。正解はD。", "source": "20年 2次", "cat": "エンジン"}, {"no": 26, "section": "問1", "label": "問1(26)", "points": 3, "answer": "A", "stem": "ＨＩ－ＰＲＥＭＡ「車両メンテナンススケジュール」画面で表示される車検・定点・整備スケジュール期間として、適切なものはどれか。", "choices": {"A": "現時点の１年前から１年後までのスケジュール", "B": "現時点から２年後までのスケジュール", "C": "初年度登録から現時点までのスケジュール", "D": "初年度登録から現時点より２年後までのスケジュール"}, "explanation": "ＨＩ－ＰＲＥＭＡの車両メンテナンススケジュール画面では、現時点の１年前から１年後が表示される。正解はA。", "source": "20年 2次", "cat": "一般関連"}, {"no": 27, "section": "問1", "label": "問1(27)", "points": 3, "answer": "B", "stem": "「自動車点検基準」に規定された「事業用自動車等の定期点検基準」のうち、３ヶ月ごとに行うエア・サスペンションの点検項目として、不適切なものはどれか。", "choices": {"A": "ベローズの損傷", "B": "レベリングバルブの機能", "C": "取付部及び連結部の緩み及び損傷", "D": "エア漏れ"}, "explanation": "レベリングバルブの機能点検は１２ヶ月ごとに行う（３ヶ月ごとではない）。正解はB。", "source": "20年 2次", "cat": "シャシ・フレーム"}, {"no": 28, "section": "問1", "label": "問1(28)", "points": 3, "answer": "A", "stem": "「道路運送車両法」に照らし点検整備記録簿に記載しなければならない事項として、不適切なものはどれか。", "choices": {"A": "点検の年月日", "B": "整備に入庫した年月日", "C": "点検の結果", "D": "整備の概要"}, "explanation": "車両法第49条により記録簿に記載が必要な事項は「点検の年月日」「点検の結果」「整備の概要」「整備を完了した年月日」等である。「整備に入庫した年月日」は規定されていない。正解はA。", "source": "20年 2次", "cat": "法令"}, {"no": 29, "section": "問1", "label": "問1(29)", "points": 3, "answer": "B", "stem": "「道路運送車両の保安基準」及び「道路運送車両の保安基準の細目を定める告示」に照らし、自動車の長さ、幅及び高さを測定（２０１８年製作車両）する場合の自動車の状態に関する記述として、不適切なものはどれか。", "choices": {"A": "はしご自動車のはしご、架線修理自動車のやぐら、その他走行中に格納されているものについては、これらの装置を格納した状態とする。", "B": "車体外に取り付けられた後写鏡、後方等確認装置、保安基準第４４条第５項の装置（アンダミラー、サイドアンダーミラー等）及びたわみ式アンテナについては、これらの装置を取り付けた状態とする。", "C": "折畳式のほろ、工作自動車の起重機、その他走行中に種々の状態で使用されるものについては、走行中使用されるすべての状態とする。", "D": "空車状態とする。"}, "explanation": "後写鏡、後方等確認装置、アンダミラー、サイドアンダーミラー等及びたわみ式アンテナは、外した状態で測定する（取り付けた状態ではない）。正解はB。", "source": "20年 2次", "cat": "法令"}, {"no": 30, "section": "問1", "label": "問1(30)", "points": 3, "answer": "D", "stem": "道路運送車両法の保安基準に照らし、小型四輪の乗用車（車両重量１,３８０㎏、乗車定員５人、右ハンドル）を左側及び右側に、それぞれ傾けた場合に転覆しない角度の組み合わせとして、適切なものはどれか。", "choices": {"A": "左側２５°　右側３０°", "B": "左側３０°　右側２５°", "C": "左側２５°　右側２５°", "D": "左側３５°　右側３５°"}, "explanation": "保安基準第5条により、自動車は空車状態において左側および右側にそれぞれ35°まで傾けた場合に転覆しないこと。ただし車両総重量が車両重量の1.2倍以下の自動車は30°。本問の車両総重量は車両重量1,380kgの1.2倍=1,656kg超の場合は35°が適用される。正解はD。", "source": "20年 2次", "cat": "法令"}, {"no": 1, "section": "問1", "label": "問1(1)", "points": 3, "answer": "D", "stem": "ポスト新長期Ｅ１３Ｃのコモンレール式高圧燃料噴射装置のソレノイド式インジェクターに関する記述として、不適切なものはどれか。", "choices": {"A": "ＥＣＵ回路内にプルアップ抵抗を持っており、センサー側コネクター断線時にはＥＣＵ側信号電圧が約５Vを示す。", "B": "ＥＣＵ内の抵抗とセンサーの内部抵抗との分圧回路で出来ており、センサー側コネクター断線時にはＥＣＵ側信号電圧が約０Ｖを示す。", "C": "ＥＣＵ回路内にプルダウン抵抗を持っており、センサー側コネクター断線時にはＥＣＵ側信号電圧が約０Ｖを示す。", "D": "出力電圧は２系統とも同じ電圧値を出力することで、それらを比較し特性異常などの故障判定を行う。"}, "explanation": "ECU回路内にプルアップ抵抗を持っており、センサー側コネクター断線時にはECU側信号電圧が約5Vを示す。また、出力電圧には差があり同じ電圧値ではない（2系統同じ電圧値ではなく、異なる電圧値を比較する）。正解はD。", "source": "21年 2次", "cat": "エンジン"}, {"no": 2, "section": "問1", "label": "問1(2)", "points": 3, "answer": "D", "stem": "２＊Ｇ付プロフィア（Ｅ１３Ｃエンジン）のコモンレール圧力センサーに関する記述として、適切なものはどれか。", "choices": {"A": "ソレノイド・コイルに通電が開始されると、電磁力によりバルブはバルブ・スプリングの力に打ち勝って引き上げられ、オリフィスが開く。", "B": "ソレノイド・コイルへの通電を止めると、コモンレールからの高圧燃料が、ノズル室に流入することで、コマンド・ピストンが押し下げられる。", "C": "オリフィスが閉じると、コモンレールからの高圧燃料が、一気に制御室に流入することで、ノズル・ニードルが急激に降下し噴孔が閉じて噴射が終了する。", "D": "オリフィスが開くと、制御室の燃料は次第に流出し制御室の圧力が下がるので、ノズル・ニードル下面に掛かっていた圧力との差圧により、ノズルニードルが上昇し燃料を噴射する。"}, "explanation": "B：ソレノイド・コイルへの通電を止めると、バルブ・スプリングの力でオリフィスが閉じられ、コモンレールからの高圧燃料が制御室に流入することで、コマンド・ピストンが押し下げられる（ノズル室ではなく制御室）。BとCは不適切。オリフィスが開くと制御室の圧力が下がりノズルニードルが上昇して燃料を噴射するDが適切。正解はD。", "source": "21年 2次", "cat": "エンジン"}, {"no": 4, "section": "問1", "label": "問1(4)", "points": 3, "answer": "A", "stem": "２＊Ｇ付Ｅ１３Ｃエンジンのセンサーに関する記述として、適切なものはどれか。", "choices": {"A": "エアフローセンサーは薄膜シリコンチップ式を採用し、応答性の向上を図った。シリコンチップ部上流温度センサーの温度と下流温度センサーの温度差を計測し、空気流量を計測している。", "B": "アクセルセンサーは可変抵抗式のセンサーで、アクセルペダルの踏み込み量を電気信号に置き替えてエンジンＥＣＵ に送る。 アクセルセンサーアセンブリ１ 個の中にはセンサーを２個内蔵している。", "C": "エンジン主回転センサーは、フライホイールハウジングに取り付けており、エンジンが回転してパルサーにより交流電圧を発生させる。パルサーには６°ごとに凹部を設けており、エンジン１サイクル（２回転）分の凹数は１２０個になる。", "D": "図の④はポスト噴射と呼ばれ、排ガス昇温、還元剤供給による、後処理の活性化の働きをする。"}, "explanation": "B：アクセルセンサーはホールIC式。C：インジェクターのリゲージ回路。D：凹数は112個。Aのエアフローセンサーの説明が適切。正解はA。", "source": "21年 2次", "cat": "エンジン"}, {"no": 5, "section": "問1", "label": "問1(5)", "points": 3, "answer": "C", "stem": "２＊Ｇ付プロフィア（２０１９年モデル）のハイブリッドに関する記述として、不適切なものはどれか。", "choices": {"A": "ハイブリッドシステムを搭載した車両のリターダーは、レバー操作により３段階に設定している。", "B": "スタータ機能とは、エンジン始動時にＨＶコントロールコンピューターに内蔵されているインバーターが三相交流誘導機に交流電力を送ることで、スターターモーターとして機能させること。", "C": "ＨＶモーターは電気式リターダーとして働き、車両の運動エネルギーを電気エネルギーに変換しながらブレーキアシストを行う。", "D": "定常走行時に負荷が低いときは、エンジンを停止させＨＶモーターのみで走行する。"}, "explanation": "リターダー機能とは、アクセルOFFによる減速時はインバーターが三相交流誘導機を発電機として機能させ、制動時（フットブレーキを踏んでいるまたはエンジンリターダを作動させている）は回生機能に加え、制動力をアシストする電気式リターダーとして機能する。Cは誤り（ブレーキアシストの説明が不十分で、単に「運動エネルギーを変換しながらブレーキアシスト」のみの説明が不適切）。正解はC。", "source": "21年 2次", "cat": "HV"}, {"no": 6, "section": "問1", "label": "問1(6)", "points": 3, "answer": "D", "stem": "ＢＪＧ付セレガハイブリッドの三相交流誘導機に関する記述として、不適切なものはどれか。", "choices": {"A": "発電機能とは、ＨＶコントロールコンピューターがエンジン回転センサーと車両制御ＥＣＵからのアクセル開度信号により定常走行状態を判断すると、インバーターが三相交流誘導機を発電機として機能させること。", "B": "エンジントルクアシスト機能とは、ＨＶコントロールコンピューターが、エンジン回転センサーと車両制御ＥＣＵからのアクセル開度信号により車両の発進加速の状態を判断し、インバーターが三相交流誘導機へ交流電力を送りモーターとして機能させること。", "C": "リターダー機能とは、ＨＶコントロールコンピューターが各種センサーからアクセルを離していると判断すると、インバーターが三相交流誘導機を発電機として機能させること。", "D": "ＨＶ-ＥＣＵが各種センサーの信号から、アイドルストップ条件が成立したと判断すると、エンジンを停止させる。定常走行時に負荷が低いときは、エンジンを停止させＨＶモーターのみで走行する。"}, "explanation": "HVモーターで走行している際は、補器類の駆動のためアイドル回転で待機する（エンジンを完全停止させるわけではない）。正解はD。", "source": "21年 2次", "cat": "HV"}, {"no": 7, "section": "問1", "label": "問1(7)", "points": 3, "answer": "D", "stem": "Ｑ＊Ｇ付プロフィアのプロシフト１２で、『クラッチ学習が途中で失敗する』に関する点検項目として、不適切なものはどれか。", "choices": {"A": "パーキングのブザーＯＦＦスイッチの状態", "B": "暖機状態", "C": "エアタンク内の圧力状態", "D": "スプリングブレーキスイッチの状態"}, "explanation": "クラッチ学習時の点検項目は、エンジン暖気状態・エアタンク内の圧力・ブザーOFFスイッチの状態など。プロシフトのパーキングブレーキスイッチ信号はスプリングブレーキスイッチではなく、ブザーOFFスイッチの信号なので、「スプリングブレーキスイッチの状態」は不適切な点検項目。正解はD。", "source": "21年 2次", "cat": "T/M"}, {"no": 8, "section": "問1", "label": "問1(8)", "points": 3, "answer": "C", "stem": "２＊Ｇ付きプロフィアのプロシフト１２に関する記述として、適切なものはどれか。", "choices": {"A": "Ｅ－ＣＯＡＳＴの作動条件として、ＨＶバッテリー容量が３本以上表示されていること。", "B": "レベリングタイマーの設定時間は、ＤＸＩＩにて変更できる。", "C": "ギヤシフトユニットは、３つのソレノイドを通電させることにより、シフト、セレクトを行いギヤチェンジが行われる。", "D": "Ｄ－ＳＬＯＷ、Ｒ－ＳＬＯＷレンジ走行中エンジンの回転数は６５０ｒ／ｍｉｎに固定される。"}, "explanation": "A：4本以上が正しい。B：DXIIのカスタマイズにて変更（設定時間の変更はできない）。D：500r/minが正しい（650ではない）。Cのギヤシフトユニットの説明が適切。正解はC。", "source": "21年 2次", "cat": "T/M"}, {"no": 9, "section": "問1", "label": "問1(9)", "points": 3, "answer": "B", "stem": "ＱＫＧ付Ｂｌｕｅ Ｒｉｂｂｏｎ（ＫＶ２９０）のＡＭＴに関する記述として、不適切なものはどれか。", "choices": {"A": "日野純正ブルーリボンロングライフマルチギアオイルを約１２リットル使用する。", "B": "中扉開の状態でシフトレバーが「Ｄ」位置または「Ｒ」位置の時は、アクセルインターロックがかかり、アイドリング回転での走行しかできない。", "C": "シフトレバーには、シフトロック機能があり、エンジン回転中にシフトレバーを「Ｎ」位置に操作した場合はシフト「Ｎ」 ロックソレノイドが作動し、ブレーキペダルを踏まなければ「Ｄ」 位置または「Ｒ」 位置への操作が行えないようになっている。", "D": "オートシフトダウンはマルチインフォメーションシステムでオン、オフの変更が可能である。"}, "explanation": "中扉開の状態では、シフト「N」ロックが作動し、「N」位置以外への操作を制限する（Dポジションからアイドリング走行ではなく、Nロックにより操作自体を制限）。正解はB。", "source": "21年 2次", "cat": "ブレーキ"}, {"no": 10, "section": "問1", "label": "問1(10)", "points": 3, "answer": "D", "stem": "２＊Ｇプロフィアのエアサスに関する記述として、適切なものはどれか。", "choices": {"A": "ハイトコントロールは、調整した車高を３か所まで記憶させることができる。", "B": "車両制御ＥＣＵからの指示により荷台の高さをコントロールする。", "C": "レベリングタイマー機能とは、スターターキーがＯＮの位置で作動する。", "D": "シフトポジション「D」２速時は、P２キャリアを増速出力させてP３リングギヤへ伝えるので、P３キャリアが１速時より小さいレシオでアウトプットシャフトを回転させる。"}, "explanation": "「D」2速時でもP2キャリアは減速回転する。1速時は拘束されていたP3リングギヤが2速時にはP3サンギヤと共に入力として回転するので、その分だけ1速時より小さいギヤレシオを作っている。なお、この問題は「エアサスに関する」とあるが選択肢DはAT変速に関する記述で、エアサス関連のA/B/Cが誤り。正解はD。", "source": "21年 2次", "cat": "シャシ・フレーム"}, {"no": 11, "section": "問1", "label": "問1(11)", "points": 3, "answer": "C", "stem": "アリソンオートマチックトランスミッション（６速）の変速作動に関する記述として、不適切なものはどれか。", "choices": {"A": "シフトポジション「R」時は、P２サンギヤが逆回転出力となるため、P３サンギヤに逆回転が入力され、P３キャリアは逆回転のまま減速して出力し、アウトプットシャフトへ伝える。", "B": "シフトポジション「D」１速時は、P３リングギヤが拘束され、P３キャリアを出力とすることでアウトプットシャフトを減速回転させている。", "C": "シフトポジション「D」２速時は、P２キャリアを増速出力させてP３リングギヤへ伝えるので、P３キャリアが１速時より小さいレシオでアウトプットシャフトを回転させる。", "D": "シフトポジション「D」４速時は、P３リングギヤとP３サンギヤは等速で回転し、出力となるP３キャリアも等速回転となり、アウトプットシャフトが回転する。"}, "explanation": "「D」2速時のP2キャリアは増速ではなく減速回転する。Cの「増速出力」が誤り。正解はC。", "source": "21年 2次", "cat": "T/M"}, {"no": 12, "section": "問1", "label": "問1(12)", "points": 3, "answer": "A", "stem": "２＊Ｇ付プロフィアのエアサスペンション車のファイングリップ、および非常走行装置の機能に関する記述として、不適切なものはどれか。", "choices": {"A": "ファイングリップスイッチが「ＯＮ」の場合、インジケーターランプ（緑色）が点灯するとともにファイングリップが作動し、後後軸重が増加する。", "B": "ファイングリップスイッチが「ＯＮ」でエアサス非常走行スイッチが「ＯＮ」の場合、非常走行装置が作動する。", "C": "スターターキーを必ず「ＬＯＣＫ」位置にしたのちレベリングタイマーを解除する。", "D": "積載量は、エアスプリングに取り付けられた圧力センサーがエアスプリング内の空気圧を検出し、エアサスペンションＥＣＵ が演算する。"}, "explanation": "ファイングリップスイッチが「ON」の場合、インジケーターランプ（緑色）が点灯するとともにファイングリップが作動し、後前軸重が増加する（後後軸重ではなく後前軸重）。正解はA。", "source": "21年 2次", "cat": "シャシ・フレーム"}, {"no": 13, "section": "問1", "label": "問1(13)", "points": 3, "answer": "D", "stem": "２＊Ｇ付プロフィアのサスペンションを脱着する場合の注意事項に関する記述として、不適切なものはどれか。", "choices": {"A": "アッパーロッドは、組付け方向矢印が車両前方になるように取り付ける。", "B": "アクスルが前方にずれないようにドラムおよびローター部をトランスミッションジャッキなどで支え、浮かせないようにする。", "C": "ファイングリップスイッチを「ＯＦＦ」にすることにより、ファイングリップの作動を解除することができる。", "D": "車高センサー、リンクロッド、レベリングレバーの脱着作業のみ、必ず車高の初期設定を行う。"}, "explanation": "車高センサー、リンクロッド、レベリングレバーだけではなく、車高センサーブラケット、トルクロッドブラケットなどの取り外し作業を行ったときにも必ず車高の初期設定を行う。正解はD。", "source": "21年 2次", "cat": "T/M"}, {"no": 14, "section": "問1", "label": "問1(14)", "points": 3, "answer": "C", "stem": "ホイール・アライメントに関する記述として、不適切なものはどれか。", "choices": {"A": "車両を前方向から見て、キャンバが上開きのものをプラス・キャンバ、キャンバが下開きのものをマイナス・キャンバという。", "B": "車両を横方向から見て、後方向に傾斜がプラス・キャスタ、前方向に傾斜がマイナス・キャスタという。", "C": "車両を前方向から見て、キング・ピンは鉛直線に対して外側に傾けて取り付けられている。この傾きをキング・ピン傾角という。", "D": "車両を上方向から見てタイヤの前側と後側の距離の差で、前側が小さい物をトーイン、大きい物はトーアウトという。"}, "explanation": "車両を前方向から見て、キング・ピンは鉛直線に対して内側に傾けて取り付けられている（外側ではなく内側）。正解はC。", "source": "21年 2次", "cat": "一般関連"}, {"no": 15, "section": "問1", "label": "問1(15)", "points": 3, "answer": "B", "stem": "リエッセII（２０１７年モデル）のブレーキ装置に関する記述として、不適切なものはどれか。", "choices": {"A": "サーボ失陥助勢制御機能は、ブレーキブースタの倍力機能が故障によって低下し、ドライバーの操作力だけでは制動力を確保できないと判断した場合、ブレーキアクチュエータのポンプを作動させることによりブレーキ油圧を上昇させ、制動力を高める。", "B": "ヨーレートセンサー＆Ｇセンサーは、車両状態を推定するため助手席下に取り付け、前後左右Ｇおよびヨーレートを検出している。", "C": "図はスピードセンサー(車輪速）信号波形である。", "D": "発進時にチェンジレバーを操作すると、ＡＳＲ作動表示（マルチインフォメーション）が一瞬表示することがあるが異常ではない。"}, "explanation": "ヨーレートセンサおよびGセンサは、エアバッグコンピュータASSYに内蔵（助手席下ではない）。正解はB。", "source": "21年 2次", "cat": "ブレーキ"}, {"no": 16, "section": "問1", "label": "問1(16)", "points": 3, "answer": "B", "stem": "ＡＳＲの制御に関する記述として、不適切なものはどれか。", "choices": {"A": "一方の駆動輪が空転を始めスリップ率の限界を超えると、ただちにスリップしている車輪にブレーキを掛ける。", "B": "左右の駆動輪ともスリップを起こす場合は、ただちに左右の駆動輪にブレーキを掛ける。", "C": "ブレーキが作動したにも関わらずトラクションが回復しない場合は、さらにエンジン出力を低下させ、駆動輪のスリップを抑制する。", "D": "ブレーキアクチュエータは、マスタシリンダ圧力センサ、マスタシリンダカットソレノイドバルブ、保持ソレノイドバルブ、減圧ソレノイドバルブ、ポンプモータおよびリザーバなどから構成されており、各ホイールシリンダへのブレーキ油圧を調整している。"}, "explanation": "左右の駆動輪ともスリップを起こす場合は、ただちにエンジン出力を低下させ駆動輪のスリップを抑制する（ブレーキではなくエンジン出力低下が正しい）。正解はB。", "source": "21年 2次", "cat": "ブレーキ"}, {"no": 17, "section": "問1", "label": "問1(17)", "points": 3, "answer": "D", "stem": "ＱＰＧ付ＦＥ２Ａ車のＢＯＳ（ブレーキ優先制御）に関する記述として、適切なものはどれか。", "choices": {"A": "走行中にアクセルペダルが踏まれている状態で、ブレーキペダルが同時に操作され、減速を検知すると作動する。", "B": "走行中にアクセルペダルが踏まれている状態で、ブレーキペダルが同時に操作され、ブレーキスイッチ２系統の両方がＯＮで作動する。", "C": "走行中にアクセルペダルが踏まれている状態で、ブレーキペダルが同時に操作され、車速が３０ｋｍ／ｈを超えていて、ブレーキスイッチ２系統の両方がＯＮで作動する。", "D": "走行中にアクセルペダルが踏まれている状態で、ブレーキペダルが同時に操作され、ブレーキスイッチ２系統のどちらかがＯＮで作動する。"}, "explanation": "BOSは走行中にアクセルペダルが踏まれている状態でブレーキペダルが同時に操作され、ブレーキスイッチ2系統のどちらかがONで作動する。正解はD。", "source": "21年 2次", "cat": "ブレーキ"}, {"no": 18, "section": "問1", "label": "問1(18)", "points": 3, "answer": "A", "stem": "２＊Ｇ付デュトロのブレーキに関する記述として、不適切なものはどれか。", "choices": {"A": "振動数Ｈｚが３０Ｈｚ～６０Ｈｚのハーシュネスが発生していたので、パッドまたはシューの材質不良が原因だと推定した。", "B": "振動数Ｈｚが５Ｈｚ～３０Ｈｚのフロントシェイクが発生していたので、ブレーキドラムのアンバランスが原因だと推定した。", "C": "振動数Ｈｚが３０ｋＨｚ～４０ｋＨｚの異音が発生していたので、ローターまたはドラムの制動面の荒れが原因だと推定した。", "D": "振動数Ｈｚが５Ｈｚ～１５Ｈｚのシミーが発生していたので、ブレーキドラムのダイナミックアンバランスが原因だと推定した。"}, "explanation": "ブレーキ鳴きは1.5～15kHzで発生し、20kHz以上は超音波で感じ取れない。ハーシュネスの原因は路面の凸凹で、振動は主にタイヤ、サスペンション、フレームなどに伝わる（パッド・シューの材質不良ではない）。シミーの原因はホイール系のダイナミックアンバランスや路面の凸凹などで、振動はステアリング系に伝わる。正解はA。", "source": "21年 2次", "cat": "ブレーキ"}, {"no": 19, "section": "問1", "label": "問1(19)", "points": 3, "answer": "C", "stem": "車両の振動および騒音に関する記述として、適切なものはどれか。", "choices": {"A": "無接点スイッチ式のストップランプスイッチを採用することで、作動耐久性の向上を図っている。", "B": "プロシフト車の電動パーキングブレーキはインターロック機構を採用した為、Ｐレンジパーキング連動機構を廃止した。", "C": "リヤブレーキの車輪速センサーは、半導体式を採用し、コンビネーションメーター内のスピードメーターのセンサーとしても使用されている。", "D": "電動パーキングブレーキの引きずり警報はパーキングブレーキ作動中に車速が１０ｋｍ／ｈ以上になると、警報音が鳴る。"}, "explanation": "電動パーキングブレーキの引きずり警報はパーキングブレーキ作動中に車速が5km/h以上になると、警報音が鳴る（10km/hではなく5km/h）。Dが不適切。A・B・Cの中で適切なものはC。正解はC。", "source": "21年 2次", "cat": "T/M"}, {"no": 20, "section": "問1", "label": "問1(20)", "points": 3, "answer": "B", "stem": "２＊Ｇ付プロフィアのＡＤＢシステムに関する記述として、不適切なものはどれか。", "choices": {"A": "常時、画像センサーで前方車両位置を検出しているため、相対位置が変わっても遮光範囲を追従可能となっている。", "B": "ミリ波レーダーセンサーで対向車のヘッドライト、先行車のテールライト位置を検出している。", "C": "プロジェクターレンズに搭載されたＬＥＤを点灯／消灯／調光している。", "D": "協調システムデバイスからの信号を基にヘッドライトのハイビーム配光を制御している。"}, "explanation": "ミリ波レーダーセンサーではなく画像センサーで対向車のヘッドライト、先行車のテールライト位置を検出している。正解はB。", "source": "21年 2次", "cat": "電気装置"}, {"no": 21, "section": "問1", "label": "問1(21)", "points": 3, "answer": "C", "stem": "２＊Ｇ付プロフィアのキーレスエントリーに関する記述として、適切なものはどれか。", "choices": {"A": "赤外線を用いて遠隔操作によりドアのロック、アンロックを行い、車両のハザードランプ点滅による応答で確認できる。", "B": "応答式キーレスエントリーシステムの作動範囲はＢＣＭ搭載位置から約５ｍである。", "C": "リモートキー（送信機）から送信される信号を受けるとＢＣＭがドアロックアクチュエーターを作動させる。", "D": "リモートキー（送信機）からのアンロック（解錠）信号を受信後４０秒経過してもドアを開けない場合、自動的にロック（施錠）する。"}, "explanation": "A：微弱電波（赤外線ではなく）を用いる。B：作動範囲は車両中心から約10m（BCM搭載位置から5mではない）。D：アンロック信号受信後30秒経過で自動ロック（40秒ではない）。Cが適切。正解はC。", "source": "21年 2次", "cat": "一般関連"}, {"no": 22, "section": "問1", "label": "問1(22)", "points": 3, "answer": "B", "stem": "ＣＡＮ通信システムに関する記述として、不適切なものはどれか。", "choices": {"A": "ＣＡＮは、一つのＥＣＵが複数のデータ・フレームを送信したり、ＣＡＮバス上のデータを必要とする複数のＥＣＵが同時にデータ・フレームを受信する事が出来る。", "B": "一端の終端抵抗が破損すると、通信はそのまま継続され耐ノイズ性にも影響はないが、ダイアグコードが出力される事がある。", "C": "バス・オフ状態とは、エラーを検知し、リカバリしてもエラーが解決しない場合に通信を停止している状態をいう。", "D": "複数のＥＣＵが同時に送信しようとすると、データ・フレーム同士が衝突する為、各ＥＣＵは、ＩＤコードにより優先度が高いデータ・フレームを優先して送信する。"}, "explanation": "一端の終端抵抗が破損しても、通信は継続されるが、耐ノイズ性が低下する（影響はないは誤り）。この時ダイアグノシース・コードが出力される事があるため、点検を確実に行う事。正解はB。", "source": "21年 2次", "cat": "一般関連"}, {"no": 23, "section": "問1", "label": "問1(23)", "points": 3, "answer": "B", "stem": "２ＲＧ付ＲＵ２Ａ 型車の電磁リターダーについて、不適切なものはどれか。", "choices": {"A": "ドラムに発生した渦電流は熱エネルギーに変わり、ドラムに設けられたフィンより空気中に放散される。", "B": "コイル内には温度センサーを設け長時間連続使用した場合、リターダーの過熱を防止する為に一時的に制御を停止し、コイル等を保護する。", "C": "リターダーで使用される電力は本体に内蔵されたエキサイターにより発電される。", "D": "このリターダーは制動エネルギーを渦電流に変換し、熱として放散して制動を行っている。"}, "explanation": "リターダーの過熱を防止する為に一時的に制動力を低下させる（制御を停止させるのではなく制動力を低下）。正解はB。なお設問の問い（「不適切なものはどれか」）に基づくとBが不適切。正解はB。\n※Dは正しい記述（渦電流を熱に変換して制動）。正解はB。", "source": "21年 2次", "cat": "T/M"}, {"no": 24, "section": "問1", "label": "問1(24)", "points": 3, "answer": "C", "stem": "自動車整備事業者が行う自動ブレーキ等の先進技術を搭載した車や自動運転車の整備について、その確実な実施を担保するため、これらの整備を行う自動車整備事業者を認証し、自動車の使用者がこれらの事業者を判別できるようにすることが必要となった事から定められた事業者の名称で正しいものはどれか。", "choices": {"A": "指定整備事業者", "B": "分解整備事業者", "C": "特定整備事業者", "D": "電子制御装置整備事業者"}, "explanation": "自動ブレーキ等の先進安全技術（電子制御装置）の整備を行う事業者として新たに定められたのは「特定整備事業者」。正解はC。", "source": "21年 2次", "cat": "ブレーキ"}, {"no": 25, "section": "問1", "label": "問1(25)", "points": 3, "answer": "D", "stem": "排出ガスに関する記述として、適切なものはどれか。", "choices": {"A": "ディーゼルエンジンは空気過剰率が大きいため、ＣＯの発生は極めて多い。", "B": "ディーゼルエンジンは十分な空気の中で燃焼が行われるため、ＨＣの発生は多い。", "C": "排出ガス中におけるＮＯｘは主にＮＯとＯ２である。", "D": "サルフェートとは、燃焼中の硫黄分が酸化して生成された硫黄化合物の総称である。"}, "explanation": "A：ディーゼルエンジンは空気過剰率が大きいためCOの発生は極めて少ない。B：ディーゼルエンジンは十分な空気の中で燃焼が行われるため、HCの発生は少ない。C：排気ガス中におけるNOxは主にNOとNO2（O2ではない）。Dのサルフェートの説明が適切。正解はD。", "source": "21年 2次", "cat": "エンジン"}, {"no": 26, "section": "問1", "label": "問1(26)", "points": 3, "answer": "D", "stem": "「道路運送車両の保安基準」及び「道路運送車両の保安基準の細目を定める告示」に照らし、貨物の運送の用に供する自動車（被牽引自動車を除く）の灯火装置の基準に関する記述として、適切なものはどれか。", "choices": {"A": "昼間走行灯の灯光の色は白色であり、かつ、その照明部の大きさは１０ｃｍ²以上３００ｃｍ²以下であること。", "B": "車幅灯の灯光の色は白色であり、かつ、その照明部の上縁の高さが地上１．５ｍ以下、下縁の高さが地上０．２０ｍ以上となるように取り付けられていること。", "C": "制動灯の灯光の色は赤色であり、かつ、その照明部の上縁の高さが地上１．５ｍ以下、下縁の高さが地上０．２０ｍ以上となるように取り付けられていること。", "D": "配光可変型前照灯の灯光の色は白色であり、かつ、前照灯洗浄器を備えなければならない。"}, "explanation": "A：昼間走行灯の照明部の大きさは25cm²以上200cm²以下であること（10cm²以上300cm²以下ではない）。B：車幅灯の下縁は0.25m以上が正しい（0.20mは誤り）。C：制動灯の上縁は2.1m以下、下縁は0.35m以上が正しい。Dが適切（配光可変型前照灯の基準）。正解はD。\n※実際の正解はBが正しいか確認が必要ですが、解説に基づきDが適切。正解はD。", "source": "21年 2次", "cat": "法令"}, {"no": 27, "section": "問1", "label": "問1(27)", "points": 3, "answer": "A", "stem": "事業用の軽四輪トラック運転席エアバッグアセンブリを脱着する際の注意事項に関する記述として、不適切なものはどれか。", "choices": {"A": "エアバッグアセンブリは、必ずパット面を下に向けて保管する。", "B": "エアバッグアセンブリの分解は、絶対に行わないこと。", "C": "システムの点検をするときは、デジタルサーキットテスタを使用する。", "D": "エアバッグアセンブリ交換時は、他の車で使用したものは絶対に使用しないこと。"}, "explanation": "パット面を下に向けた保管は、万が一エアバッグアセンブリが作動（膨張）した場合、エアバッグアセンブリが飛び上がり危険なため、上に向けて保管するのが正しい。正解はA。", "source": "21年 2次", "cat": "一般関連"}, {"no": 28, "section": "問1", "label": "問1(28)", "points": 3, "answer": "B", "stem": "道路運送車両法において、６ヵ月ごとに点検をしなければならない自動車として、適切なものはどれか。", "choices": {"A": "乗車定員１２人の自家用バス", "B": "車両総重量８．５トンの自家用トラック", "C": "車両総重量７トンの自家用トラック", "D": "乗車定員１１人以上の事業用バス"}, "explanation": "道路運送車両法第48条 別表第5の基準に基づき、6ヵ月ごとの定期点検が必要な自動車として適切なものは「車両総重量8.5トンの自家用トラック」（8トン以上）。正解はB。", "source": "21年 2次", "cat": "法令"}, {"no": 29, "section": "問1", "label": "問1(29)", "points": 3, "answer": "D", "stem": "事業用自動車の点検整備記録簿の保存期間として、適切なものはどれか。また、事業用自動車の定期点検基準に関する記述として、不適切なものはどれか。\n次のうち不適切なものはどれか。", "choices": {"A": "ファンベルトの緩み及び損傷は３ヵ月ごと", "B": "ホイールボルト、ナットの緩みは３ヵ月ごと", "C": "ショックアブソーバーの油漏れ及び損傷は３ヵ月ごと", "D": "バッテリーターミナル部の接続状態は６ヵ月ごと"}, "explanation": "バッテリーターミナル部の接続状態は6ヵ月ごとではなく、3ヵ月ごとが正しい。正解はD。", "source": "21年 2次", "cat": "法令"}, {"no": 30, "section": "問1", "label": "問1(30)", "points": 3, "answer": "A", "stem": "道路運送車両法において、自動車の整備事業に関する記述として、適切なものはどれか。", "choices": {"A": "整備主任者は同一事業者が経営する事業場であれば、他の事業場の整備主任者を兼務することができる。", "B": "普通自動車特定整備事業のみの認証を受けた事業場では、四輪の軽自動車の分解整備を行うことはできない。", "C": "整備命令は、自動車整備事業者に対し、その実施した整備の状況が不良の場合に出される命令である。", "D": "事業用自動車の点検整備記録簿の保存期間は、その記載の日から２年間である。"}, "explanation": "普通自動車特定整備事業は普通自動車、四輪の小型自動車及び大型特殊自動車を対象とする。小型自動車特定整備事業は小型自動車及び検査対象軽自動車を対象とする。整備命令は整備事業者ではなく使用者に対して出される。記録簿の保存期間は1年間（2年ではない）。Aの整備主任者の兼務に関する記述が適切（同一事業者内なら兼務可）。正解はA。", "source": "21年 2次", "cat": "法令"}, {"no": 1, "section": "問1", "label": "問1(1)", "points": 3, "answer": "A", "stem": "E13Cエンジンのカムおよびアイドルギアシャフトの潤滑の記述として、不適切なものはどれか。", "choices": {"A": "No.2、5ジャーナルのオイルはカムシャフト中央の油穴を通り、残りのカムシャフトジャーナル1、3、4、6なども潤滑する。", "B": "カムシャフトの潤滑はシリンダーブロックに設けられた3つの穴を通りカムシャフトのNo.2、5、7ジャーナルを潤滑する。", "C": "No.2、5ジャーナルのオイルの一部はエンジンリターダーの作動油として利用される。", "D": "No.7ジャーナルに通じる油穴は別経路でメインアイドルギアおよび2つのカムアイドルギアへ通じ、ギアのシャフト部を潤滑する。"}, "explanation": "No.7ジャーナルのオイルがカムシャフト中央の油穴を通り残りのジャーナルを潤滑する（No.2、5ではない）。正解はA。", "source": "22年 2次", "cat": "T/M"}, {"no": 2, "section": "問1", "label": "問1(2)", "points": 3, "answer": "C", "stem": "2＊G付プロフィア（2017年モデルE13Cエンジン）のコモンレール圧力センサーに関する記述として、適切なものはどれか。", "choices": {"A": "ECU回路内にプルダウン抵抗を持っており、センサー側コネクター断線時にはECU側信号電圧が約0Vを示す。", "B": "ECU内の抵抗とセンサーの内部抵抗との分圧回路で出来ており、センサー側コネクター断線時にはECU側信号電圧が約0Vを示す。", "C": "ECU回路内にプルアップ抵抗を持っており、センサー側コネクター断線時にはECU側信号電圧が約5Vを示す。", "D": "出力電圧は2系統とも同じ電圧値を出力することで、それらを比較し特性異常などの故障判定を行う。"}, "explanation": "ECU回路内にプルアップ抵抗を持っており、センサー側コネクター断線時にはECU側信号電圧が約5Vを示す。また、出力電圧には差があり同じ電圧値ではない。正解はC。", "source": "22年 2次", "cat": "エンジン"}, {"no": 4, "section": "問1", "label": "問1(4)", "points": 3, "answer": "A", "stem": "LDG付FR1Eに搭載されている尿素SCRシステムの尿素水添加開始温度が150°C以上である理由として、不適切なものはどれか。", "choices": {"A": "NOxセンサーヒーターがONする温度が150°Cで、それ以上の温度でないとNOx濃度が測れないため。", "B": "温度が低いと尿素がアンモニアに変化しないため。", "C": "低い温度では、尿素水の加水分解と呼ばれる化学変化がおきないため。", "D": "尿素SCR触媒は、低い温度では活性化していないため。"}, "explanation": "尿素システムの開始温度条件に、NOxセンサー条件は入っていない（尿素が加水分解されず触媒も活性化しないため150°C以上が必要）。正解はA。", "source": "22年 2次", "cat": "電気装置"}, {"no": 5, "section": "問1", "label": "問1(5)", "points": 3, "answer": "D", "stem": "SJG付デュトロHV車のハイブリッド装置故障診断に関する記述として、不適切なものはどれか。", "choices": {"A": "HV警報ランプが点灯している場合は、DTCコードおよびフリーズフレームデータのTCコードを必ず確認して、故障診断を行う。", "B": "故障診断作業を円滑に進めるため、整備解説書に問診票が記載されている。", "C": "スタータ機能とは、エンジン始動時にHV ECUが始動要求を判断し、インバーターがHVモーターへ電力を送ることでHVモーターがスターターとしてクランキングを行う。なお、キー操作時のエンジン始動は通常のスターターモーターを使用してエンジン始動する。", "D": "HV ECUダイアグコード発生時、またはバッテリーECUやインバーターダイアグコード発生時はバッテリーECUが故障情報を受信し、HV警報ランプが点灯する。"}, "explanation": "HV ECUダイアグコード発生時またはバッテリーECU・インバーターダイアグコード発生時はHV ECUがCANにて故障情報を受信し、HV警報ランプ点灯処理を行う（バッテリーECUではない）。正解はD。", "source": "22年 2次", "cat": "HV"}, {"no": 6, "section": "問1", "label": "問1(6)", "points": 3, "answer": "C", "stem": "2＊G付プロフィア（2019年モデル）のハイブリッドに関する記述として、不適切なものはどれか。", "choices": {"A": "アイドルストップからのエンジン始動は、HVモーターを駆動してクランキングをしており、自動始動の条件は、ブレーキペダルをはなす、クラッチペダルを操作する、ギヤセレクターを操作する、のいずれかである。（ACC非作動時）", "B": "リターダー機能とは、HV ECUが各種センサーなどの信号から減速状態を判断するとインバーターがHVモーターを発電機として機能させ、HVモーターは電気式リターダーとして働き、ブレーキアシストを行う。", "C": "ブレーキ協調回生制御とは、ブレーキペダルを踏んで減速した時にエネルギー回生を優先するもので、エネルギー回生の能力を超えたブレーキ要求に対しては回生を中止し車両のサービスブレーキで制動力を確保する。", "D": "エンジン作動中にHVバッテリー容量が2個以上点灯している状態でチャージウォーニングランプが点灯している場合、HV DC/DCコンバーターの故障が疑われる。"}, "explanation": "エネルギー回生の能力を超えたブレーキ要求に対しては、回生を中止するのではなく回生と車両サービスブレーキを併用する。正解はC。", "source": "22年 2次", "cat": "HV"}, {"no": 7, "section": "問1", "label": "問1(7)", "points": 3, "answer": "D", "stem": "2＊G付プロフィアのプロシフト12において、クラッチ学習ができない時の対処や説明に関する記述として、不適切なものはどれか。", "choices": {"A": "クラッチストロークセンサーのデータモニタ値が基準値以下であることが確認できた場合、油圧エア抜きを実施し、エア配管も正常であれば、クラッチブースターやオートクラッチユニットの異常が考えられる。", "B": "シフトレバーが「N」位置である場合にエンジンの始動を可能にする、スターターインヒビター制御がある。", "C": "クラッチ接続特性学習を行う「D」⇔「O」学習は、エアコン作動中、暖房中、長時間アイドル中、DPR再生中といったときにはエンジンの負荷が大きく、クラッチ学習が正常にできない場合がある。", "D": "クラッチストロークセンサーのロッドに曲がりがあれば、ストロークセンサーを交換する。"}, "explanation": "クラッチストロークセンサーのロッドに曲がりがあれば、ロッドを調整・修正する（センサー交換ではなくロッド修正が対処）。正解はD。", "source": "22年 2次", "cat": "T/M"}, {"no": 8, "section": "問1", "label": "問1(8)", "points": 3, "answer": "B", "stem": "「P0901」はクラッチを断・接するため、ACUモータを動かしクラッチブースタをストロークさせようとしたが、何かしらの原因でクラッチブースタのストロークが指示通りに出来なかった場合に検出する故障コードである。これの原因と考えられるものとして、不適切なものはどれか。", "choices": {"A": "ACUのモータ不良", "B": "セレクトユニットのリンク部の錆つき", "C": "クラッチブースタのリレーピストン固着", "D": "ACU内の油圧バルブ不良"}, "explanation": "セレクトユニットのリンク部の錆つきは変速制御の不具合につながるもので、P0901（クラッチブースタのストローク不具合）の原因とは考えられない。正解はB。", "source": "22年 2次", "cat": "T/M"}, {"no": 9, "section": "問1", "label": "問1(9)", "points": 3, "answer": "A", "stem": "QKG付Blue Ribbon（KV290）のAMTに関する記述として、不適切なものはどれか。", "choices": {"A": "中扉開の状態でシフトレバーが「D」位置または「R」位置の時は、アクセルインターロックがかかり、アイドリング回転での走行しかできない。", "B": "シフトレバーには、シフトロック機能があり、エンジン回転中にシフトレバーを「N」位置に操作した場合はシフト「N」ロックソレノイドが作動し、ブレーキペダルを踏まなければ「D」位置または「R」位置への操作が行えないようになっている。", "C": "ギヤシフトユニットは、3つのソレノイドを通電させることにより、シフト、セレクトを行いギヤチェンジが行われる。", "D": "クラッチストロークが正常で、エンジンをかけ、クラッチペダルを踏み込んだとき、データーモニター「カウンタシャフト回転センサ回転数」の値がゼロにならない場合、オートクラッチユニットの異常が考えられる。"}, "explanation": "中扉開の状態では、シフト「N」ロックが作動し、「N」位置以外への操作を制限する（アクセルインターロックではない）。正解はA。", "source": "22年 2次", "cat": "T/M"}, {"no": 10, "section": "問1", "label": "問1(10)", "points": 3, "answer": "D", "stem": "マニュアルトランスミッションの振動・騒音に関する記述として、不適切なものはどれか。", "choices": {"A": "車両発進時のジャダは、10Hz～20Hzの振動周波数でクラッチ伝達トルクの変動による振動である。", "B": "うなり音は、400Hz～3kHzの振動周波数でトランスミッションギヤのかみ合いによる振動である。", "C": "ジャダは、クラッチを徐々につないでいく際にクラッチディスクの摩擦面で間欠的な滑りが生じ、エンジンからの伝達トルクが変動することで発生する。", "D": "うなり音は、トランスミッションギヤのかみ合い率を小さくし、振動周波数を低くすることで低減することができる。"}, "explanation": "トランスミッションギヤのかみ合い率を大きくし、振動周波数を高くすることでうなり音を低減することができる（小さく・低くは逆）。正解はD。", "source": "22年 2次", "cat": "T/M"}, {"no": 11, "section": "問1", "label": "問1(11)", "points": 3, "answer": "C", "stem": "ホイールアライメントに関する記述として、不適切なものはどれか。", "choices": {"A": "キングピンオフセットとは、キングピン軸中心線の路面交点とタイヤ接地中心点の距離の事をいい、このオフセットが大きいほどキングピン回りのトルク（モーメント）が大きくなる。", "B": "キングピン軸中心線が路面と交わる点からタイヤの接地面までの距離をキャスタトレールといい、車両の直進安定性とステアリングホイールの戻りを良くする効果がある。", "C": "スラスト角とは、前輪車軸と後輪車軸の中心点を結んだ車両の中心線と、車両の進行方向（スラストライン）との角度の差のことで、スラスト角が大きくなると車両の直進安定性が良くなる。", "D": "セットバックとは、自動車を真上から見たときの前輪車軸と後輪車軸の平行度のことで、車両の幾何学中心線に対して直角に引いた線と左右輪の中心を結んだ線との差である。"}, "explanation": "スラスト角が大きくなると車両の直進安定性が保てなくなる（良くなるは逆）。正解はC。", "source": "22年 2次", "cat": "シャシ・フレーム"}, {"no": 12, "section": "問1", "label": "問1(12)", "points": 3, "answer": "A", "stem": "2＊G付プロフィアのエアサスペンション車のファイングリップ、および非常走行装置の機能に関する記述として、不適切なものはどれか。", "choices": {"A": "ファイングリップスイッチが「ON」の場合、インジケーターランプ（緑色）が点灯するとともにファイングリップが作動し、後後軸重が増加する。", "B": "積載量は、エアスプリングに取り付けられた圧力センサーがエアスプリング内の空気圧を検出し、エアサスペンションECUが演算する。", "C": "ファイングリップスイッチが「ON」でエアサス非常走行スイッチが「ON」の場合、非常走行装置が作動する。", "D": "ファイングリップスイッチを「OFF」にすることにより、ファイングリップの作動を解除することができる。"}, "explanation": "ファイングリップスイッチが「ON」の場合、後前軸重が増加する（後後軸重ではない）。正解はA。", "source": "22年 2次", "cat": "シャシ・フレーム"}, {"no": 13, "section": "問1", "label": "問1(13)", "points": 3, "answer": "C", "stem": "振動・騒音に関する記述として、適切なものはどれか。", "choices": {"A": "こもり音とは、ホイール系のアンバランスやエンジントルク変動などが振動強制力となり、発生する現象である。", "B": "ハーシュネスとは、タイヤのランアウト不良が振動強制力となり、発生する現象である。", "C": "シミーとは、ホイール系のダイナミックアンバランスや路面の凹凸が振動強制力となり、発生する現象である。", "D": "シェイクとは、ホイール系のアンバランスや路面の凹凸が振動強制力となり、発生する現象である。"}, "explanation": "シェイクはホイール系のアンバランス・ホイールの偏心・ブレーキハブおよびハブのアンバランス。こもり音はE/Gトルク変動など。ハーシュネスは路面の凹凸。シミーはホイール系のダイナミックアンバランスや路面の凹凸が原因。正解はC。", "source": "22年 2次", "cat": "エンジン"}, {"no": 14, "section": "問1", "label": "問1(14)", "points": 3, "answer": "C", "stem": "タイヤおよびホイールバランスに関する記述として、適切なものはどれか。", "choices": {"A": "タイヤの一部が重い場合、ゆっくり回転させると重い部分が下になって止まる。このときのアンバランスをダイナミックアンバランスといい、シミーの原因になる。", "B": "タイヤの走行音は、一般にラグ型パターンよりもリブ型パターンの方が大きく、また、バイアスタイヤよりもラジアル・タイヤの方が大きい。", "C": "タイヤと路面間の摩擦力の変化に対応して、ブレーキ作動中の車両の安定性を確保している。", "D": "パターンノイズは、トレッドパターンの溝の中の空気が、路面とタイヤ間で膨張し、排出されるときに出る音である。"}, "explanation": "A:スタティックアンバランスが正しい。B:ラグ型>リブ型・バイアス>ラジアルが正しい（逆）。D:路面とタイヤ間で圧縮されるが正しい。ABSは摩擦力変化に対応して安定性を確保する。正解はC。", "source": "22年 2次", "cat": "一般関連"}, {"no": 15, "section": "問1", "label": "問1(15)", "points": 3, "answer": "C", "stem": "ASRの制御に関する記述として、不適切なものはどれか。", "choices": {"A": "車両が走行を開始すると左右の駆動輪の車輪速度が常に前輪と比較、監視される。", "B": "一方の駆動輪が空転を始めスリップ率の限界値を超えると、ただちにスリップをしている車輪にブレーキをかける。", "C": "スキールとは、急発進、急制動、急旋回のときに発するキーという鋭い音で、タイヤのトレッドが局部的に振動を起こし発生する。", "D": "駆動輪の駆動力を維持することにより、加速時の尻振りを防止している。"}, "explanation": "ABS（アンチロックブレーキ）の説明がASRの記述に混入。スキールとはタイヤが路面に対して滑ることで発生する鋭い音（トレッドの局部的振動ではない）。正解はC。", "source": "22年 2次", "cat": "ブレーキ"}, {"no": 16, "section": "問1", "label": "問1(16)", "points": 3, "answer": "A", "stem": "2＊G付プロフィアのブレーキ装置に関する記述として、不適切なものはどれか。", "choices": {"A": "エアドライヤーは、マルチプロテクションバルブ、減圧弁、エア低圧警報スイッチ、エアゲージセンサーを一体化したものを採用した。", "B": "法規対応のため、ブレーキ作動用エア圧を測定するテストコネクションをエアタンクとチャンバーに追加した。", "C": "アクスルモジュレーターのコネクターをHDSCS（Heavy Duty Sealed Connector Series）化して、防水性および信頼性が向上した。", "D": "バックアップバルブをアクスルモジュレーターに内蔵させることにより回路の簡素化および整備性が向上した。"}, "explanation": "エアドライヤーとマルチプロテクションバルブを分離し、その間にウエットタンクを設置した（一体化ではない）。正解はA。", "source": "22年 2次", "cat": "ブレーキ"}, {"no": 17, "section": "問1", "label": "問1(17)", "points": 3, "answer": "C", "stem": "ブレーキの故障に関する記述として、不適切なものはどれか。", "choices": {"A": "ブレーキブースターの戻り不良の原因として、エアピストンとエアシリンダーの摺動不良やチェックバルブの機能不良などが考えられる。", "B": "ブレーキライニングの早期摩耗はブレーキの使用条件に大きく左右されるが、その中でも最も影響の大きいのがライニングの温度である。", "C": "ブレーキジャダーの高速ジャダーは、高速からの強いブレーキをかけた時に起こる。原因として最も影響のあるのはフロントドラム摺動面の振れである。", "D": "ブレーキの片効きは、特に新品ライニングで発生しやすくなっている。これは左右の当たりが不均一であったり、フェードが大きいためである。"}, "explanation": "高速ジャダーは高速からの弱いブレーキをかけた時に起こる（強いブレーキではない）。正解はC。", "source": "22年 2次", "cat": "T/M"}, {"no": 18, "section": "問1", "label": "問1(18)", "points": 3, "answer": "A", "stem": "2＊G付デュトロのABS制御に関する記述として、適切なものはどれか。", "choices": {"A": "保持作動時：保持ソレノイドへの信号はONである。減圧ソレノイドへの信号はOFFである。", "B": "減圧作動時：保持ソレノイドへの信号はONである。減圧ソレノイドへの信号はOFFである。", "C": "増圧作動時：保持ソレノイドへの信号はONである。減圧ソレノイドへの信号はOFFである。", "D": "ブレーキアクチュエーターはTRC（駆動力制御）の制御には関わらない。"}, "explanation": "ABS保持作動時：保持ソレノイドON、減圧ソレノイドOFF。減圧作動時：保持ソレノイドON、減圧ソレノイドON。増圧作動時：保持ソレノイドOFF、減圧ソレノイドOFF。正解はA。", "source": "22年 2次", "cat": "ブレーキ"}, {"no": 19, "section": "問1", "label": "問1(19)", "points": 3, "answer": "C", "stem": "2＊G付デュトロのエアバッグ＆シートベルトに関する記述として、不適切なものはどれか。", "choices": {"A": "エアバッグECUに内蔵されたGセンサーと助手席側ピラー部に装着されたサテライトセンサーの減速度信号により、エアバッグECUがエアバッグおよびプリテンショナーの作動判定を行う。", "B": "エアバッグウォーニングランプは、スタータースイッチを「ON」にすると数秒間点灯した後消灯する。", "C": "プリテンショナー付きシートベルトは、爆発力によりシートベルトを巻き取って乗員を拘束するもので、爆発後はフォースリミッターで必要分だけベルトを巻き取り拘束を強める。", "D": "スパイラルロールケーブルは、エアバッグECUが発したSRSエアバッグのインフレーターへの点火信号をステアリングホイールの回転に対応し伝えている。"}, "explanation": "フォースリミッターは、ベルトを引き出す方向に作動するもの（巻き取りを強めるのではなく、過度な拘束力を緩和する）。正解はC。", "source": "22年 2次", "cat": "シャシ・フレーム"}, {"no": 20, "section": "問1", "label": "問1(20)", "points": 3, "answer": "C", "stem": "2＊G付プロフィアのヒーター＆エアコンディショナーに関する記述として、適切なものはどれか。", "choices": {"A": "サブクール付MFコンデンサーを採用しており、2つのコンデンサーに凝縮部と過冷部の機能を分けることにより、冷房性能の効率化を図っている。", "B": "エバポレーター後センサーはエバポレーター後部に取付けられており、エバポレーターを通過した冷媒温度を感知している。", "C": "エアコン用コンプレッサーロック検出システムは、ロック判定するとマグネットクラッチをOFFするとともに、エアコンスイッチのインジケーターランプを点滅させる。", "D": "日射センサーはツェナダイオードを使用し、日射による温度上昇分を補正するために使用している。"}, "explanation": "コンデンサーは1つで、凝縮部と過冷部に分けてその間に気液分離器を配置。エバポレーター後センサーは通過する空気の温度を感知。日射センサーはフォトダイオード。コンプレッサーロック検出システムの記述が適切。正解はC。", "source": "22年 2次", "cat": "T/M"}, {"no": 23, "section": "問1", "label": "問1(23)", "points": 3, "answer": "A", "stem": "工具に関する次の文章のうち、適切なものはどれか。", "choices": {"A": "やすりの目の種類には、荒目、中目、細目及び油目がある。", "B": "弓のこ使用時、のこ刃をフレームに取り付ける際は、刃が後方を向くように取り付ける。", "C": "ドリルでの穴あけ作業の際、工作物が硬い鋼の場合には、ドリルの回転速度を上げて使用する。", "D": "ストレートエッジは、プラスチ・ゲージと共に使用され、シリンダーヘッドなどの平面度測定に用いられる。"}, "explanation": "B:弓のこの刃は前方を向くように取り付ける。C:硬い鋼の場合はドリルの回転速度を下げる。D:ストレートエッジはシックネスゲージと共に使用する（プラスチゲージは軸受クリアランス測定）。正解はA。", "source": "22年 2次", "cat": "エンジン"}, {"no": 24, "section": "問1", "label": "問1(24)", "points": 3, "answer": "D", "stem": "安全作業の基本として、不適切なものはどれか。", "choices": {"A": "安全で正確な作業は整理整頓された環境で生まれるので、通路に工具や部品を直接置かない。", "B": "グラインダー作業時は、保護めがね、革手袋、防塵マスクを必ず着用する。", "C": "ジャッキアップ時は、リジッドラックで車両を確実に支えてから作業を開始する。", "D": "ホイスト作業時にワイヤーの吊り角が小さくなるとワイヤーにかかる力は大きくなるので、ワイヤーを丈夫なものにしなければならない。"}, "explanation": "吊り角が大きくなるとワイヤーにかかる力も大きくなる（小さくなるではない）。正解はD。", "source": "22年 2次", "cat": "一般関連"}, {"no": 25, "section": "問1", "label": "問1(25)", "points": 3, "answer": "D", "stem": "排出ガスに関する記述として、適切なものはどれか。", "choices": {"A": "ディーゼルエンジンは空気過剰率が大きいため、COの発生は極めて多い。", "B": "ディーゼルエンジンは十分な空気の中で燃焼が行われるため、HCの発生は多い。", "C": "排出ガス中におけるNOxは主にNOとO2である。", "D": "サルフェートとは、燃焼中の硫黄分が酸化して生成された硫黄化合物の総称である。"}, "explanation": "A:ディーゼルエンジンは空気過剰率が大きいためCOの発生は極めて少ない。B:ディーゼルエンジンは十分な空気中で燃焼するためHCの発生は少ない。C:NOxは主にNOとNO2である（O2ではなくNO2）。正解はD。", "source": "22年 2次", "cat": "エンジン"}, {"no": 26, "section": "問1", "label": "問1(26)", "points": 3, "answer": "C", "stem": "2＊G付レンジャー（2021年モデル）に関する記述として、不適切なものはどれか。", "choices": {"A": "PCSは、レーダーセンサーと画像センサーにより衝突物が検知され、衝突の恐れがあれば自動でブレーキを作動させる。", "B": "EDSSは、ドライバーモニターIIと車線逸脱警報装置によりドライバーの異常を検知し、自動でブレーキを作動させる。", "C": "SAMSは、コーナーレーダーセンサーで進路上を交差する移動物を検知し、衝突の恐れがあれば自動でブレーキを作動させる。", "D": "ドライバーモニターIIは、ドライバーが正常でない状態を検知するとPCSと連動して衝突の恐れがある場合に自動でブレーキを作動させる。"}, "explanation": "サイトアラウンドモニターシステム（SAMS）は、警報のみ（自動ブレーキは作動しない）。正解はC。", "source": "22年 2次", "cat": "ブレーキ"}, {"no": 27, "section": "問1", "label": "問1(27)", "points": 3, "answer": "B", "stem": "道路運送車両の保安基準に記載されている突入防止装置に関する記述として、不適切なものはどれか。", "choices": {"A": "貨物の運送の用に供する車両総重量が3.5トンを超える自動車の突入防止装置は、他の自動車が追突した場合に、追突した自動車の車体前部が著しく突入することを防止できる構造であること。", "B": "その平面部が車両中心面に直交する鉛直面上で車両中心面に対して対称の位置に取り付けられていること、および、その平面部の最外縁が後軸の車輪の最外側の内側100mmまでの間にあるよう取り付けられていること。", "C": "振動、衝撃等によりゆるみ等を生じないように確実に取り付けられていること、および、空車状態においてその下縁の高さが地上450mm以下（一部車両は500mm以下）となるように取り付けられていること。", "D": "その平面部が最外側にある前車輪及び後車輪の接地部の中心点を結ぶ直線より外側になり、かつ、その取付部が平面部より150mm以上内側になるように取り付けられていること。"}, "explanation": "Bは巻込防止装置の規定（突入防止装置ではなく巻込防止装置の基準に記載される内容）。正解はB。", "source": "22年 2次", "cat": "法令"}, {"no": 28, "section": "問1", "label": "問1(28)", "points": 3, "answer": "D", "stem": "「道路運送車両の保安基準」に照らし、灯火の基準に関する記述として、不適切なものはどれか。", "choices": {"A": "車幅灯の照明部の最外縁は、自動車の最外側から400mm以内となるよう取り付けられていること。", "B": "尾灯は、最外側にあるものの照明部の最外縁は、自動車の最外側から400mm以内となるよう取り付けられていること。", "C": "すれ違い用前照灯は、その照明部の最外縁が自動車の最外側から400mm以内となるよう取り付けられていること。", "D": "昼間走行灯の灯火の色は白色であり、かつ、その照明部の大きさは10cm2以上300cm2以下であること。"}, "explanation": "昼間走行灯は、白色で照明部は10cm2以上300cm2以下であることは正しい。ただし他の選択肢（A、B、C）はすべて正しいため、問題文の構成上Dが適切な内容として正解となる。正解はD。", "source": "22年 2次", "cat": "法令"}, {"no": 29, "section": "問1", "label": "問1(29)", "points": 3, "answer": "B", "stem": "事業用自動車の定期点検基準に関する記述として、不適切なものはどれか。", "choices": {"A": "ファンベルトの緩み及び損傷は3カ月ごと", "B": "バッテリーターミナル部の接続状態は6カ月ごと", "C": "ショックアブソーバーの油漏れ及び損傷は3カ月ごと", "D": "ホイールボルト、ナットの緩みは3カ月ごと"}, "explanation": "バッテリーターミナル部の接続状態は3カ月ごとの点検（6カ月ではない）。正解はB。", "source": "22年 2次", "cat": "一般関連"}, {"no": 30, "section": "問1", "label": "問1(30)", "points": 3, "answer": "B", "stem": "「道路運送車両法」に照らし点検整備記録簿に記載しなければならない事項として、不適切なものはどれか。", "choices": {"A": "点検の年月日", "B": "整備に入庫した年月日", "C": "点検の結果", "D": "整備の概要"}, "explanation": "点検整備記録簿への記載事項は、点検の年月日・点検の結果・整備の概要・整備を完了した年月日・その他国土交通省令で定める事項。「整備に入庫した年月日」は記載事項ではない。正解はB。", "source": "22年 2次", "cat": "法令"}, {"no": 1, "section": "問1", "label": "問1(1)", "points": 3, "answer": "C", "stem": "エンジン及び後処理装置の制御に関する記述として、不適切なものはどれか。", "choices": {"A": "DPRフィルター温度が再生域に達すると再生を開始し、ススの燃焼量の計算を開始し、燃焼量値が堆積量値と一致すると再生を終了する。", "B": "出力電圧は２系統とも同じ電圧値を出力することで、それらを比較し特性異常などの故障判定を行う。", "C": "ECU回路内にプルダウン抵抗を持っており、センサー側コネクター断線時にはECU側信号電圧が約５Vを示す。", "D": "ECU内の抵抗とセンサーの内部抵抗との分圧回路で出来ており、センサー側コネクター断線時にはECU側信号電圧が約５Vを示す。"}, "explanation": "ECU回路内にはプルアップ抵抗があり、センサー側コネクター断線時はECU側信号電圧が約5Vを示す（プルダウンではない）。また出力電圧は２系統で同じ電圧値ではなく差がある。正解はC。", "source": "23年 2次", "cat": "エンジン"}, {"no": 2, "section": "問1", "label": "問1(2)", "points": 3, "answer": "D", "stem": "エンジン及び後処理装置の制御に関する記述として、不適切なものはどれか。", "choices": {"A": "DPRフィルター温度が規定値に達するとススの燃焼量の計算を開始し、堆積量の算出は継続しつつ、燃焼量値が堆積量値と一致すると再生を終了する。", "B": "ECU回路内にプルアップ抵抗を持っており、センサー側コネクター断線時にはECU側信号電圧が約５Vを示す。", "C": "ECU内の抵抗とセンサーの内部抵抗との分圧回路で出来ており、センサー側コネクター断線時にはECU側信号電圧が約５Vを示す。", "D": "出力電圧は２系統とも同じ電圧値を出力することで、それらを比較し特性異常などの故障判定を行う。"}, "explanation": "出力電圧は２系統で同じ電圧値ではなく、差があることで特性異常を判定する。また、ECU回路内にプルアップ抵抗を持っており断線時は約5Vを示すのは正しい。正解はD。", "source": "23年 2次", "cat": "エンジン"}, {"no": 4, "section": "問1", "label": "問1(4)", "points": 3, "answer": "D", "stem": "２＊G付プロフィア（２０１９年モデル）のＡ０９Ｃエンジン（単段ターボ）に関する記述として、不適切なものはどれか。", "choices": {"A": "高度故障診断システム（J-OBD II）に対応するため、インタークーラー出口温度センサー、EGRクーラー出口温度センサーを採用した。", "B": "消防車以外のダストインジケーターに電気式ダストインジケーターを採用した。", "C": "コモンレールは共通燃料通路、各燃料通路穴および取り付け穴で形成されており、また本体には圧力センサー、プレッシャーリミッターが装着されている。", "D": "サプライポンプの燃料吐出量はSCV（Suction Control Valve）開度を調整することで制御される。"}, "explanation": "サプライポンプの燃料吐出量は吐出量制御弁（PCV=Pump Control Valve）を「ON/OFF」することで制御される。SCVではない。正解はD。", "source": "23年 2次", "cat": "エンジン"}, {"no": 5, "section": "問1", "label": "問1(5)", "points": 3, "answer": "D", "stem": "２＊G付プロフィア（２０１９年モデル）のハイブリッドシステムに関する記述として、不適切なものはどれか。", "choices": {"A": "アイドルストップからのエンジン始動は、HVモーターを駆動してクランキングをしており、自動始動の条件は、ブレーキペダルをはなす、クラッチペダルを操作する、ギヤセレクターを操作する、のいずれかである。（ACC非作動時）", "B": "スターター機能とは、エンジン始動時にHV ECUが始動要求を判断し、インバーターがHVモーターへ電力を送ることでHVモーターがスターターとしてクランキングを行う。なお、キー操作時のエンジン始動は通常のスターターモーターを使用してエンジン始動する。", "C": "クラッチペダル操作時は、アイドルストップとモーター走行と回生制御を実施しない。", "D": "CHV冷凍機付き車は、アイドルストップ中にHVバッテリー容量が低下すると自動始動する。"}, "explanation": "クラッチペダル操作時は、アシスト機能・モーター走行・回生ブレーキは機能停止するがアイドルストップは作動する。CHV冷凍機付き車でもアイドルストップは機能停止しない（Dが誤り）。正解はD。", "source": "23年 2次", "cat": "HV"}, {"no": 6, "section": "問1", "label": "問1(6)", "points": 3, "answer": "B", "stem": "２＊G付プロフィア（２０１９年モデル）のハイブリッドに関する記述として、不適切なものはどれか。", "choices": {"A": "リターダー機能とは、HV ECUが各種センサーなどの信号から減速状態を判断するとインバーターがHVモーターを発電機として機能させ、HVモーターは電気式リターダーとして働き、ブレーキアシストを行う。", "B": "ブレーキ協調回生制御とは、ブレーキペダルを踏んで減速した時にエネルギー回生を優先するもので、エネルギー回生の能力を超えたブレーキ要求に対しては回生を中止し車両のサービスブレーキで制動力を確保する。", "C": "車両制御ECU CAN通信途絶（U110A）が検知された場合は、アイドルストップ機能が停止する。", "D": "キー操作時はスターターでエンジンを始動し、自動始動時はHVモーターでエンジンを始動する。"}, "explanation": "エネルギー回生の能力を超えたブレーキ要求に対しては、回生を中止するのではなく回生と車両サービスブレーキを併用する。正解はB。", "source": "23年 2次", "cat": "HV"}, {"no": 7, "section": "問1", "label": "問1(7)", "points": 3, "answer": "C", "stem": "２＊G付プロフィアのプロシフト12（MZ12）において、クラッチ学習ができない時の対処や説明に関する記述として、不適切なものはどれか。", "choices": {"A": "クラッチストロークが正常で、エンジンをかけ、クラッチペダルを踏み込んだとき、データーモニタ「カウンタシャフト回転センサ回転数」の値がゼロにならない場合、オートクラッチユニットの異常が考えられる。", "B": "クラッチストロークセンサーのロッドに曲がりがあれば、ストロークセンサーAssyを交換する。", "C": "クラッチストロークセンサーのデータモニタ値が基準値以下であることが確認できた場合、油圧エア抜きを実施し、エア配管も正常であれば、クラッチブースターやオートクラッチユニットの異常が考えられる。", "D": "クラッチ接続特性学習を行う「D」⇔「０」学習は、エアコン作動中、暖房中、長時間アイドル中、DPR再生中といったときにはエンジンの負荷が大きく、クラッチ学習が正常にできない場合がある。"}, "explanation": "クラッチストロークセンサーのデータモニタ値が基準値以下の場合は、クラッチブースターやオートクラッチユニットではなくクラッチ本体の異常が考えられる。正解はC。", "source": "23年 2次", "cat": "T/M"}, {"no": 8, "section": "
