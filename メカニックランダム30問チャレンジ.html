<!DOCTYPE html>
<html lang="ja">
<head>

<title>メカニック HS-1 ランダム32問チャレンジ</title>
<style>
body{margin:0;background:#f0f4f8;font-family:-apple-system,BlinkMacSystemFont,'Yu Gothic',Meiryo,sans-serif;color:#111}
header{position:relative;position:sticky;top:0;background:#fff;padding:10px 14px;border-bottom:1px solid #ddd;z-index:10}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
header .title{font-weight:900;font-size:15px;color:#1e3a5f}
.wrap{max-width:900px;margin:auto;padding:10px 10px 90px}
.card{background:#fff;border-radius:14px;padding:16px;border:1px solid #ddd;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:10px}
.qtitle{font-size:13px;color:#666;font-weight:700;margin-bottom:4px}
.qstem{font-size:16px;font-weight:700;line-height:1.6;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #eee}
.choices{display:flex;flex-direction:column;gap:10px;margin-top:10px}
.choice{padding:14px 16px;font-size:15px;font-weight:700;border-radius:12px;border:2px solid #bfdbfe;background:#ffffff;color:#111;text-align:left;line-height:1.5;cursor:pointer;display:flex;gap:10px;align-items:flex-start}
.choice .lbl{min-width:24px;font-size:18px;font-weight:900;color:#1d4ed8}
.choice.selected{background:#eff6ff;border-color:#2563eb}
.choice.selected .lbl{color:#2563eb}
.choice.correct{background:#d1fae5;border-color:#059669!important}
.choice.correct .lbl{color:#059669!important}
.choice.wrong{background:#fee2e2;border-color:#dc2626!important}
.choice.wrong .lbl{color:#dc2626!important}
.expl{margin-top:12px;padding:10px 12px;background:#f0fdf4;border-radius:8px;border:1px solid #a7f3d0;font-size:13px;line-height:1.7;color:#065f46}
.nav{position:fixed;left:0;right:0;bottom:0;max-width:900px;margin:auto;display:flex;gap:10px;padding:10px 14px;background:#f0f4f8ee;border-top:1px solid #ddd}
.nav button{flex:1;padding:14px;border:none;border-radius:12px;background:#1e3a5f;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
.nav button.secondary{background:#6b7280}
.bar{height:8px;background:#ddd;border-radius:999px;overflow:hidden}
.bar div{height:100%;background:#1d4ed8;transition:width 0.3s;width:0%}
.small{font-size:12px;color:#666;margin-top:3px}
.result{background:#fff;border-radius:14px;padding:18px;border:1px solid #ddd}
.score-big{font-size:36px;font-weight:900;color:#1e3a5f;margin:10px 0}
.source-badge{display:inline-block;background:#1e3a5f;color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;margin-bottom:8px}
.calc-note{background:#eff6ff;border:1px solid #93c5fd;border-radius:8px;padding:10px;font-size:13px;margin-bottom:12px;line-height:1.6;color:#1d4ed8}
.action-btn{width:100%;padding:15px;border:none;border-radius:12px;background:#1e3a5f;color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:10px;font-family:inherit}
.action-btn.secondary{background:#f1f5f9;color:#1e3a5f;border:2px solid #1e3a5f}
.review-item{border:1px solid #e2e8f0;border-radius:10px;padding:12px;margin-top:10px;font-size:14px}
.review-item.ok{border-color:#059669;background:#f0fdf4}
.review-item.ng{border-color:#dc2626;background:#fef2f2}
.start-screen{text-align:center;padding:40px 20px}
.start-screen .big-icon{font-size:4rem;margin-bottom:16px}
.start-screen h2{font-size:1.4rem;font-weight:900;color:#1e3a5f;margin-bottom:8px}
.start-screen p{color:#64748b;font-size:.9rem;line-height:1.6;margin-bottom:24px}
.start-btn{display:inline-block;padding:16px 40px;background:linear-gradient(135deg,#1e3a5f,#2d5a8e);color:#fff;border:none;border-radius:14px;font-size:1.1rem;font-weight:900;cursor:pointer;box-shadow:0 4px 14px rgba(29,58,95,.4);font-family:inherit}
.login-hint{font-size:.8rem;color:#94a3b8;margin-top:12px}
.wrong-review-banner{background:#fff5f5;border:1px solid #fca5a5;border-radius:10px;padding:12px;margin-bottom:12px;font-size:.85rem;color:#dc2626;display:none}
</style>
</head>
<body>
<header>
  <div class="hdr-top">
    <div class="title">🔧 メカニック HS-1 ランダム32問チャレンジ</div>
    <div id="login-badge"></div>
  </div>
  <div class="bar"><div id="barfill"></div></div>
  <div class="small" id="prog"></div>
<div id="fb-login-badge" style="position:absolute;top:14px;right:14px"></div></header>

<div class="wrap">

    <h2>ランダム32問チャレンジ</h2>
    <p>19〜25年度 HS-1認定試験（1次・2次）から<br>ランダムに<strong>30問</strong>＋計算問題<strong>2問</strong>を出題します。<br>毎回違う問題で力試し！</p>
    <div class="wrong-review-banner" id="wrong-banner">
      ❌ 過去の間違い問題が <span id="wrong-count">0</span>問あります。<br>
      <strong style="color:#dc2626">間違い問題を優先出題</strong>します！

  <div id="result" style="display:none"></div>
</div>

  <button onclick="nextQ()" id="nextBtn">次へ ▶</button>
</div>

<script>
const normalPool = [{"no": 1, "section": "問1", "label": "問1(1)", "points": 3, "answer": "C", "stem": "２ＲＧ付プロフィアＡ０９Ｃエンジンの２段過給ターボに関する記述として、適切なものはどれか。", "choices": {"A": "低速域ではなく全域に有効な2段過給ターボを採用している（低圧段ターボチャージャーおよび高段圧ターボチャージャーの異なる2種類のターボチャージャーを併用することにより、低速域での高効率過給を実現している）。", "B": "２段過給ターボのＤＣモーターはウエスト機構ではなくＤＣモーターとリンク機構により制御されている。", "C": "排気バイパスバルブのＤＣモーターとリンク機構がバルブの開度を変えてエキゾーストマニホールドから流入する排出ガスの流量を変えることにより、タービンホイールの回転数を無段階に制御している。", "D": "低圧段ターボチャージャーはウエストゲートバルブではなくＤＣモーターとリンク機構により、バルブの開閉を行い、エンジンの回転、負荷に応じ最適の過給効率になるように制御している。"}, "explanation": "A：低速域ではなく全域で有効。B：ウエスト機構ではなくDCモーターとリンク機構。D：低圧段ターボはウエストゲートバルブで制御する。正解はC。", "source": "19年 1次", "cat": "エンジン"}, {"no": 2, "section": "問1", "label": "問1(2)", "points": 3, "answer": "B", "stem": "ＱＫＧ付プロフィアＡ０９Ｃエンジンの電子制御ファンクラッチシステムの構造説明として、適切なものはどれか。", "choices": {"A": "電磁式なのでシリコンオイルは封入されていない。", "B": "オイル供給穴を開閉するバルブでオイル量を調整しファンの回転数を制御している。", "C": "電磁式クラッチにてＯＮ-ＯＦＦ制御し、ファンの回転を制御している。", "D": "コントロールＥＣＵはエンジン回転、エンジン負荷、車速、水温、インテーク温度、外気温を検出して、ファン回転数を制御している。"}, "explanation": "電子制御ファンクラッチは、シリコンオイル供給穴を開閉するバルブでオイル量を調整してファンの回転数を制御するビスカス式である。電磁式ではない。正解はB。", "source": "19年 1次", "cat": "T/M"}, {"no": 3, "section": "問1", "label": "問1(3)", "points": 3, "answer": "C", "stem": "ＬＤＧ付ＦＲ１Ｅに搭載されている尿素ＳＣＲシステムの、尿素水添加開始温度が１５０°C以上である理由として、不適切なものはどれか。", "choices": {"A": "温度が低いと尿素がアンモニアに変化しないため。", "B": "低い温度では、尿素水の加水分解と呼ばれる化学変化がおきないため。", "C": "ＮＯxセンサーヒーターがＯＮする温度が１５０°Cで、それ以上の温度でないとＮＯx濃度が測れないため。", "D": "尿素ＳＣＲ触媒は、低い温度では活性化していないため。"}, "explanation": "尿素がアンモニアに変化せず（加水分解が行われず）、かつ触媒が活性化していないため150°C以上でないと添加しない。尿素システムの開始温度条件に、NOxセンサー条件は入っていない。正解はC。", "source": "19年 1次", "cat": "電気装置"}, {"no": 5, "section": "問1", "label": "問1(5)", "points": 3, "answer": "B", "stem": "２ＰＧ付ＣＨＶ（クールハイブリット）車に関する記述として、不適切なものはどれか。", "choices": {"A": "ＨＶバッテリーの電力を電動冷凍機へ供給することにより燃料消費を低減している。ただしエンジン停止時はハイブリッドシステムは使用できない。", "B": "モータージェネレータは始動および車両駆動、回生と発電に使用している。", "C": "車両減速エネルギーおよびエンジン動力によりモータージェネレーターで発電し、電動冷凍機への電力を供給する。", "D": "スタンバイ機能が標準装備され、外部電源が使用可能な場所ではエンジン停止中でも上物の駆動が可能である。"}, "explanation": "モータージェネレータは始動および車両駆動には使用していない。回生と発電に使用する。正解はB。", "source": "19年 1次", "cat": "HV"}, {"no": 6, "section": "問1", "label": "問1(6)", "points": 3, "answer": "C", "stem": "ＱＳＧ付Ｂｌｕｅ Ｒｉｂｂｏｎ Ｈｙｂｒｉｄ（ＨＬ２Ａ）のＨＶシステム故障診断時に注意する項目に関する記述として、適切なものはどれか。", "choices": {"A": "高電圧系統の点検を行う時は絶縁手袋を着用し、サービスプラグを４つ全て抜いて、７分間以上待ってから実施する。", "B": "ＨＶバッテリーは４並列に構成されており、１つまでは故障（ＳＭＲ-ＯＦＦ）しても、エンジン始動が可能である。", "C": "不具合修理をし暖気後、加速（０→４０→０ｋｍ／ｈ）を５回以上試走を行い、ＤＴＣコードが出力しないことを確認する。", "D": "不具合修理をし暖気後、加速（０→４０→０ｋｍ／ｈ）を３回以上試走を行い、ＤＴＣコードが出力しないことを確認する。"}, "explanation": "サービスプラグを抜いてから10分間は高電圧系の端子に触れないこと。HVバッテリーは4並列で2つまでは故障してもエンジン始動可能。暖機後、加速0→40→0km/hを5回以上行いDTCコードが出力しないことを確認する。正解はC。", "source": "19年 1次", "cat": "エンジン"}, {"no": 7, "section": "問1", "label": "問1(7)", "points": 3, "answer": "B", "stem": "ＬＫＧ付ＦＲ１Ｅのプロシフト１２のシフト荷重補正学習に関する記述として、不適切なものはどれか。", "choices": {"A": "学習状態が不十分だと、変速ショックやギヤ鳴りの原因となる。", "B": "モーターシフトユニット、もしくはオートクラッチユニット本体（ＡＣＵ）を交換した際は、学習を行わなければならない。", "C": "「シフト荷重補正学習状態：シフト位置メインＲ」についてはキーリセットを行うことで「シフト荷重補正学習状態：メイン２速」と同じ回数が書き込まれる。", "D": "メーターＥＣＵがプロシフトＥＣＵからギヤ位置、警報、故障コードなどの情報を受信できるようにゲートウェイＥＣＵが信号の変換を行なっている。"}, "explanation": "オートクラッチユニット本体（ACU）を交換した場合はシフト荷重補正学習はやらなくてよい（クラッチ学習を実施する）。モーターシフトユニットを交換した場合は学習が必要。正解はB。", "source": "19年 1次", "cat": "T/M"}, {"no": 8, "section": "問1", "label": "問1(8)", "points": 3, "answer": "C", "stem": "ＬＤＧ付プロフィアのプロシフト１６に関する記述として、不適切なものはどれか。", "choices": {"A": "学習状態が不十分だと、変速ショックやギヤ鳴りの原因となる。", "B": "モーターシフトユニット、もしくはオートクラッチユニット本体（ＡＣＵ）を交換した際は、学習を行わなければならない。", "C": "クラッチ制御は「断」用の電磁弁、「接」用の電磁弁の合計２つの電磁弁で制御している。", "D": "ＤＸIIにて学習状態を確認できるが、各ギヤ１０回以上を推奨とし、最大回数は１６回となっている。"}, "explanation": "クラッチ制御は「断」用のSlow電磁弁・Fast電磁弁、「接」用のSlow電磁弁・Fast電磁弁、計4つの電磁弁で制御している（2つではない）。正解はC。", "source": "19年 1次", "cat": "T/M"}, {"no": 9, "section": "問1", "label": "問1(9)", "points": 3, "answer": "B", "stem": "ＱＳＧ付Ｂｌｕｅ Ｒｉｂｂｏｎ Ｈｙｂｒｉｄ（ＨＬ２Ａ）のＡＭＴシステムに関する記述として、不適切なものはどれか。", "choices": {"A": "シフトレバーが「Ｎ」位置である場合にエンジンの始動を可能にする、スターターインヒビター制御がある。", "B": "中扉開の状態でシフトレバーが「Ｄ」位置または「Ｒ」位置の時は、アクセルインターロックがかかり、アイドリング回転での走行しかできない。", "C": "ギヤシフトユニットは、３つのソレノイドを通電させることにより、シフト、セレクトを行いギヤチェンジが行われる。", "D": "シフトレバーには、シフトロック機能があり、エンジン回転中にシフトレバーを「Ｎ」位置に操作した場合はシフト「Ｎ」ロックソレノイドが作動し、ブレーキペダルを踏まなければ「Ｄ」位置または「Ｒ」位置への操作が行えないようになっている。"}, "explanation": "中扉開の状態では、シフト「N」ロックが作動し、「N」位置以外への操作を制限する（アクセルインターロックではない）。正解はB。", "source": "19年 1次", "cat": "ブレーキ"}, {"no": 10, "section": "問1", "label": "問1(10)", "points": 3, "answer": "A", "stem": "ＱＫＧ付Ｂｌｕｅ Ｒｉｂｂｏｎ（ＫＶ２９０）のＡＭＴに関する記述として、不適切なものはどれか。", "choices": {"A": "シフトセンサー、セレクトセンサーはそれぞれメイン信号Ｖｏｕｔ１とサブ信号Ｖｏｕｔ２の２系統に分かれており、片方が故障した場合はもう一方で制御できるようになっている。", "B": "トランスミッションはＭＸ０６を採用しており、全段シンクロレスのコンスタントメッシュ式となっている。", "C": "扉との協調制御を行うことにより、中扉の開閉操作と連動して自動的にギヤをニュートラルに切り替えることで、利便性の向上を図っている。", "D": "ＡＭＴシステムに故障が発生した場合に、避難場所まで移動走行させるための非常走行スイッチを採用しており、前進または後退の非常走行を行うことができる。"}, "explanation": "シフトセンサー、セレクトセンサーはそれぞれサブ信号Vout1とメイン信号Vout2の2系統に分かれっている（メイン・サブが逆）。正解はA。", "source": "19年 1次", "cat": "T/M"}, {"no": 11, "section": "問1", "label": "問1(11)", "points": 3, "answer": "A", "stem": "カーシェイクの発生原因として、適切なものはどれか。", "choices": {"A": "サブフレーム、Ｕボルトの緩み", "B": "ブレーキ振動", "C": "エンジン振動", "D": "プロペラシャフトのアンバランス"}, "explanation": "カーシェイクとは中・高速走行時のボデー、ステアリング、シートの上下・左右の振動（約5〜30Hz）で、振動源はタイヤのアンバランス、ディスクホイールの偏心、サブフレームUボルトの緩みなどがある。正解はA。", "source": "19年 1次", "cat": "T/M"}, {"no": 12, "section": "問1", "label": "問1(12)", "points": 3, "answer": "C", "stem": "プロペラシャフトに関する記述として、不適切なものはどれか。", "choices": {"A": "製作時に回転時のバランスをとるためのバランスピースが取り付けられる。", "B": "エンジンの強力な動力を伝えるため、ねじれ強度、曲げ剛性が大きく、高回転にも優れた特性をもつ鋼管が用いられている。", "C": "ユニバーサルジョイントは、駆動軸及び受動軸の取り付け角度が変化すると回転速度及びトルクが変動する。", "D": "大型車は、プロペラシャフトが共振するのを防ぐために、２本、あるいは３本に分割している。"}, "explanation": "ユニバーサルジョイントは、駆動軸及び受動軸の取り付け角度が変化しても円滑に回転し、動力を伝える機構である（回転速度及びトルクが変動するのは不適切な記述）。正解はC。", "source": "19年 1次", "cat": "T/M"}, {"no": 13, "section": "問1", "label": "問1(13)", "points": 3, "answer": "D", "stem": "ファイナル・ギヤに関する記述として、適切なものはどれか。", "choices": {"A": "ヒール当たり、フランク当たりの場合は、ドライブ・ピニオンを遠ざけ、リング・ギヤを近付ける。", "B": "ヒール当たり、フェース当たりの場合は、ドライブ・ピニオンを近付け、リング・ギヤを遠ざける。", "C": "トー当たり、フランク当たりの場合は、ドライブ・ピニオンを近付け、リング・ギヤを遠ざける。", "D": "トー当たり、フェース当たりの場合は、ドライブ・ピニオンを遠ざけ、リング・ギヤを近付ける。"}, "explanation": "トー当たり、フランク当たりの場合は、ドライブ・ピニオンを遠ざけリング・ギヤを近付ける（選択肢Cが逆）。トー当たり、フェース当たりはドライブ・ピニオンを遠ざけリング・ギヤを近付ける。正解はD。", "source": "19年 1次", "cat": "一般関連"}, {"no": 14, "section": "問1", "label": "問1(14)", "points": 3, "answer": "A", "stem": "フレームクロスメンバーの取り付けに使用している、ボブテールピンおよびカラーに関する記述として、不適切なものはどれか。", "choices": {"A": "取り外しの際は、耐破壊性、耐盗難性が高いのでカラー部をプラズマ切断機またガス切断機を使用する。", "B": "振動に強い締結で緩みに強く、トルク管理や増し締めが不要。", "C": "取り付ける際は、ツール本体に締結用アタッチメントを取り付け使用し、締め付け後は専用ゲージにてカラー径が規定値以下になっている事を確認する。", "D": "フレームの第1クロスメンバーの左右に使用している。"}, "explanation": "切断の際もツール本体を使用し、締結切断用アタッチメントに付け替えて使用する（プラズマ切断機やガス切断機は使用しない）。正解はA。", "source": "19年 1次", "cat": "一般関連"}, {"no": 15, "section": "問1", "label": "問1(15)", "points": 3, "answer": "C", "stem": "２ＲＧ付プロフィアのディスクブレーキに関する記述として、不適切なものはどれか。", "choices": {"A": "エアオーバーブレーキ用ＶＳＣシステムを新開発し、オプション装着できる。", "B": "ローターは、前後ともベンチレーテッドタイプを採用している。", "C": "対向ピストン式キャリパーが採用されている。", "D": "ＥＳスタート作動時には、ＡＢＳアクチュエーター内蔵のＥＳソレノイドを使用している。"}, "explanation": "ディスクブレーキは、ピンスライド式キャリパーを採用している（対向ピストン式ではない）。正解はC。", "source": "19年 1次", "cat": "ブレーキ"}, {"no": 16, "section": "問1", "label": "問1(16)", "points": 3, "answer": "D", "stem": "ＱＰＧ付ＦＥ２Ａのブレーキ装置に関する記述として、適切なものはどれか。", "choices": {"A": "ＡＳＲシステムは装備されるが、ＰＣＳシステムは装備されていない。", "B": "エア圧制御用リニア電磁弁は、ＶＳＣシステムのみで使用している。", "C": "ＥＳスタート作動時には、ＡＢＳアクチュエーター内蔵のＥＳソレノイドを使用している。", "D": "ライニングが摩耗した場合、ドラムとライニングのすき間調整は、オートスラックアジャスター機構により自動調整される。"}, "explanation": "A：FE2Aに全車標準装備されている。B：エア圧制御用リニア電磁弁はVSC、ASR、ESスタートで使用している。C：エア圧制御用リニア電磁弁を作動させてESスタートを行う。正解はD。", "source": "19年 1次", "cat": "ブレーキ"}, {"no": 17, "section": "問1", "label": "問1(17)", "points": 3, "answer": "D", "stem": "ＡＣＧ付ＨＵ８Ｊのブレーキ装置に関する記述として、不適切なものはどれか。", "choices": {"A": "サービスブレーキには、少ない踏力で強力な制動力が得られるフルエアブレーキを採用している。", "B": "エアパイピングは、フロントおよびリヤ系統が独立した２系統配管とし、万一いずれかの配管が故障しても、残る他方の配管系で制動できる。", "C": "ブレーキチャンバーの形状は、ドラムブレーキ用と異なる。", "D": "ドラムブレーキは、デュアルツーリーディングブレーキを全車に標準採用している。"}, "explanation": "ドラムブレーキはリーディングトレーリングブレーキを全車に標準採用している（デュアルツーリーディングではない）。正解はD。", "source": "19年 1次", "cat": "ブレーキ"}, {"no": 18, "section": "問1", "label": "問1(18)", "points": 3, "answer": "A", "stem": "２ＲＧ付ＦＲ１Ａのブレーキ装置に関する記述として、不適切なものはどれか。", "choices": {"A": "エアドライヤーは、マルチプロテクションバルブ、減圧弁、エア低圧警報スイッチ、エアゲージセンサーを一体化したものを採用した。", "B": "バックアップバルブをアクスルモジュレーターに内蔵させることにより回路の簡素化および整備性が向上した。", "C": "アクスルモジュレーターのコネクターをＨＤＳＣＳ（Ｈｅａｖｙ Ｄｕｔｙ Ｓｅａｌｅｄ Ｃｏｎｎｅｃｔｏｒ Ｓｅｒｉｅｓ）化して、防水性および信頼性が向上した。", "D": "法規対応のため、ブレーキ作動用エア圧を測定するテストコネクションをエアタンクとチャンバーに追加した。"}, "explanation": "エアドライヤーとマルチプロテクションバルブを分離し、その間にウエットタンクを設置した（一体化ではない）。正解はA。", "source": "19年 1次", "cat": "ブレーキ"}, {"no": 19, "section": "問1", "label": "問1(19)", "points": 3, "answer": "A", "stem": "ＱＰＧ付プロフィアのドライバーモニター単独警報の作動条件として、不適切なものはどれか。", "choices": {"A": "先行車を検出している時。", "B": "ターンシグナル操作がない時。", "C": "自車の速度が約６０ｋｍ／ｈ以上である時。", "D": "車両が直進状態である時。"}, "explanation": "単独警報の条件として、先行車を検出していない時（検出している時ではない）。ドライバーモニターが運転者の顔が正面を向いていない、または眼を閉じている状態が一定時間続いたと判断した時。ブレーキ操作がない時、などがある。正解はA。", "source": "19年 1次", "cat": "電気装置"}, {"no": 20, "section": "問1", "label": "問1(20)", "points": 3, "answer": "C", "stem": "ＴＱＧ付デュトロの電動パーキングブレーキの機能に関する記述として、不適切なものはどれか。", "choices": {"A": "増し引き機能は電動パーキングブレーキ作動後、ケーブルけん引力の低下があると、状況によりケーブルを増し引きする。", "B": "引きずり警報はパーキングブレーキ作動中に車速が５ｋｍ／ｈ以上になると、従来車同様警報音が鳴る。", "C": "シューギャップ調整警報はパーキングブレーキシューが摩耗してくると、調整を促す目的で警報音を鳴らす。", "D": "アクチュエーター交換警報はモーターの寿命が近くなると交換警報としてウォーニングランプを点灯する。"}, "explanation": "シューギャップ調整警報はパーキングブレーキシューが摩耗してくると、調整を促す目的でウォーニングランプを点灯する（警報音ではない）。正解はC。", "source": "19年 1次", "cat": "ブレーキ"}, {"no": 21, "section": "問1", "label": "問1(21)", "points": 3, "answer": "B", "stem": "２ＤＧ付プロフィアのヒーター＆エアコンディショナーに関する記述として、適切なものはどれか。", "choices": {"A": "日射センサーはツェナダイオードを使用し、日射による温度上昇分を補正するために使用している。", "B": "エアコン用コンプレッサーロック検出システムは、ロック判定するとマグネットクラッチをＯＦＦするとともに、エアコンスイッチのインジケーターランプを点滅させる。", "C": "サブクール付ＭＦコンデンサーを採用しており、２つのコンデンサーに凝縮部と過冷部の機能を分けることにより、冷房性能の効率化を図っている。", "D": "エバポレーター後センサーはエバポレーター後部に取付けられており、エバポレーターを通過した冷媒温度を感知している。"}, "explanation": "コンデンサーは1つで、コンデンサーの中を凝縮部と過冷部に分けてその間に気液分離器を配置している。エバポレーター後センサーは通過する空気の温度を感知している。日射センサーはフォトダイオード。正解はB。", "source": "19年 1次", "cat": "T/M"}, {"no": 22, "section": "問1", "label": "問1(22)", "points": 3, "answer": "C", "stem": "２ＤＧ付プロフィアのエアバック＆シートベルトに関する記述として、適切なものはどれか。", "choices": {"A": "エアバックＥＣＵは内蔵されたジャイロセンサーにより、車両前方からの衝撃を検知しインフレーターへ点火信号を送る。", "B": "ダイアグノーシスの出力通信方法をＣＡＮ通信化することにより、ダイアグモニターによる故障診断が可能となった。", "C": "ＳＲＳエアバックおよびプリテンショナー付きシートベルトは、車両前方及び車両後方から強い衝撃を受け、一定以上の強い衝撃を感知した場合のみ作動する。", "D": "エアバックＥＣＵからの着火信号により、プリテンショナー付きシートベルトは火薬が爆発し作動する。"}, "explanation": "エアバッグECUに内蔵されたGセンサーが車両前方からの強い衝撃を受けた場合に作動する（ジャイロセンサーではない）。ダイアグノーシスのCAN通信化によりHINO DXIIによる故障診断に対応し、ダイアグモニターによる故障診断は廃止された。正解はC。", "source": "19年 1次", "cat": "電気装置"}, {"no": 23, "section": "問1", "label": "問1(23)", "points": 3, "answer": "A", "stem": "グラインダ（卓上）作業時のワークレストと砥石の隙間基準として、適切なものはどれか。", "choices": {"A": "１～３ｍｍ", "B": "４～６ｍｍ", "C": "７～９ｍｍ", "D": "１０～１２ｍｍ"}, "explanation": "グラインダ（卓上）作業時のワークレストと砥石の隙間基準は1〜3mmで使用する。正解はA。", "source": "19年 1次", "cat": "一般関連"}, {"no": 24, "section": "問1", "label": "問1(24)", "points": 3, "answer": "C", "stem": "２２．５インチホイール装着車フロントハブベアリングの組み付け手順①～⑬のなかで［イ］～［ホ］に当てはまる語句として、適切なものはどれか。\n手順① ロックナットを［イ］で締め付ける\n手順③ ［ロ］\n手順④ ロックナットを［ハ］戻す\n手順⑦ ガタを確認する。ガタが有った場合、手順①からやり直し、手順④で戻し角度を［二］に変更する。\n手順⑬ ［ホ］", "choices": {"A": "［イ］２５０Ｎ・ｍ ［ロ］タイヤを同一方向へ３回転させる ［ハ］６０° ［二］３０° ［ホ］転動トルクを４か所測定し記録する", "B": "［イ］２５０Ｎ・ｍ ［ロ］タイヤを前後方向へ３回転させる ［ハ］９０° ［二］６０° ［ホ］転動トルクを４か所測定し記録する", "C": "［イ］２００Ｎ・ｍ ［ロ］タイヤを同一方向へ３回転させる ［ハ］６０° ［二］３０° ［ホ］起動トルクを４か所測定し記録する", "D": "［イ］２００Ｎ・ｍ ［ロ］タイヤを前後方向へ３回転させる ［ハ］９０° ［二］６０° ［ホ］起動トルクを４か所測定し記録する"}, "explanation": "イ：200N・ｍで締め付け、ロ：タイヤを同一方向へ3回転させる、ハ：60°戻す、二：30°に変更、ホ：起動トルクを4か所測定し記録する。正解はC。", "source": "19年 1次", "cat": "一般関連"}, {"no": 25, "section": "問1", "label": "問1(25)", "points": 3, "answer": "B", "stem": "事業用自動車等の定期点検時期として、不適切なものはどれか。", "choices": {"A": "車枠及び車体・非常口の扉の機能・緩み及び損傷の点検は３ヶ月ごとである。", "B": "原動機・冷却装置の水漏れ点検は３ヶ月ごとである。", "C": "ホイール・ナット及びホイール・ボルトの損傷の点検は１２ヶ月ごとである。", "D": "ロッド及びアーム類のボール・ジョイントのダスト・ブーツの亀裂及び損傷の点検は１２ヶ月ごとである。"}, "explanation": "原動機・冷却装置の水漏れ点検は12カ月ごとである（3ヶ月ごとではない）。正解はB。", "source": "19年 1次", "cat": "一般関連"}, {"no": 26, "section": "問1", "label": "問1(26)", "points": 3, "answer": "A", "stem": "ＨＩ－ＰＲＥＭＡ「車両メンテナンススケジュール」画面で表示される車検・定点・整備スケジュール期間として、適切なものはどれか。", "choices": {"A": "現時点の１年前から１年後までのスケジュール", "B": "現時点から２年後までのスケジュール", "C": "初年度登録から現時点までのスケジュール", "D": "初年度登録から、現時点より２年後までのスケジュール"}, "explanation": "HI-PREMA「車両メンテナンススケジュール」画面では、現時点の1年前から1年後が表示される。正解はA。", "source": "19年 1次", "cat": "一般関連"}, {"no": 27, "section": "問1", "label": "問1(27)", "points": 3, "answer": "D", "stem": "「道路運送車両の保安基準」に照らし、乗車定員１１人以上の自動車または幼児専用車に備える消火器の種類として、不適切なものはどれか。", "choices": {"A": "霧状の強化液を放射する消火器", "B": "炭酸ガスを放射する消火器", "C": "一塩化一臭化メタンを放射する消火器", "D": "泡を放射する消火器"}, "explanation": "保安基準第47条・細目告示第227条に規定される消火器は、霧状強化剤、炭酸ガス、一塩化一臭化メタン、二臭化四ふっ化エタン、消火粉末を放射するものである。泡を放射する消火器は対象外。正解はD。", "source": "19年 1次", "cat": "法令"}, {"no": 28, "section": "問1", "label": "問1(28)", "points": 3, "answer": "A", "stem": "「自動車点検基準」に規定された「事業用自動車等の定期点検基準」のうち、３ヶ月ごとに行う走行装置の点検項目として、不適切なものはどれか。", "choices": {"A": "リム・サイド・リングおよびホイール・ディスクの損傷", "B": "フロント・ホイール・ベアリングのがた", "C": "タイヤの状態", "D": "ホイール・ナットおよびホイール・ボルトの緩み"}, "explanation": "リム・サイド・リングおよびホイール・ディスクの損傷は12ヶ月ごとの点検項目である（3ヶ月ごとではない）。正解はA。", "source": "19年 1次", "cat": "一般関連"}, {"no": 29, "section": "問1", "label": "問1(29)", "points": 3, "answer": "D", "stem": "「道路運送車両の保安基準」及び「道路運送車両の保安基準の細目を定める告示」に照らし、自動車の長さ、幅及び高さを測定（２０１８製作車両）する場合の自動車の状態に関する記述として、不適切なものはどれか。", "choices": {"A": "はしご自動車のはしご、架線修理自動車のやぐら、その他走行中に格納されているものについては、これらの装置を格納した状態とする。", "B": "折畳式のほろ、工作自動車の起重機、その他走行中に種々の状態で使用されるものについては、走行中使用されるすべての状態とする。", "C": "空車状態とする。", "D": "車体外に取り付けられた後写鏡、後方等確認装置、保安基準第４４条第５項の装置（アンダミラー、サイドアンダーミラー等）及びたわみ式アンテナについては、これらの装置を取り付けた状態とする。"}, "explanation": "後写鏡、後方等確認装置、アンダミラー、サイドアンダーミラー等及びたわみ式アンテナは、外した状態で測定する（取り付けた状態ではない）。正解はD。", "source": "19年 1次", "cat": "法令"}, {"no": 30, "section": "問1", "label": "問1(30)", "points": 3, "answer": "C", "stem": "「道路運送車両法」及び「指定自動車整備事業規則」に照らし、保安基準適合証の有効期限に関する記述として、適切なものはどれか。", "choices": {"A": "検査した日から３０日間となっている。", "B": "交付した日から１５日間となっている。", "C": "検査した日から１５日間となっている。", "D": "交付した日から３０日間となっている。"}, "explanation": "道路運送車両法第94条の5に基づき、保安基準適合証の有効期限は検査した日から15日間となっている。正解はC。", "source": "19年 1次", "cat": "法令"}, {"no": 1, "section": "問1", "label": "問1(1)", "points": 3, "answer": "A", "stem": "ポスト新長期Ｅ１３Ｃのコモンレール式高圧燃料噴射装置のソレノイド式インジェクターに関する記述として、不適切なものはどれか。", "choices": {"A": "ソレノイド・コイルへの通電を止めると、コモンレールからの高圧燃料が、ノズル室に流入することで、コマンド・ピストンが押し下げられる。", "B": "ソレノイド・コイルに通電が開始されると、電磁力によりバルブはバルブ・スプリングの力に打ち勝って引き上げられ、オリフィスが開く。", "C": "オリフィスが開くと、制御室の燃料は次第に流出し制御室の圧力が下がるので、ノズル・ニードル下面に掛かっていた圧力との差圧により、ノズルニードルが上昇し燃料を噴射する。", "D": "オリフィスが閉じると、コモンレールからの高圧燃料が、一気に制御室に流入することで、ノズル・ニードルが急激に降下し噴孔が閉じて噴射が終了する。"}, "explanation": "ソレノイド・コイルへの通電を止めると、バルブ・スプリングの力でオリフィスが閉じられ、コモンレールからの高圧燃料が制御室に流入してコマンド・ピストンが押し下げられる（ノズル室ではない）。正解はA。", "source": "20年 1次", "cat": "エンジン"}, {"no": 2, "section": "問1", "label": "問1(2)", "points": 3, "answer": "C", "stem": "Ｂ＊Ｇ付プロフィアのエンジンリターダーの構造説明として、不適切なものはどれか。", "choices": {"A": "リターダー本体とカムシャフトのブレーキ専用カム、それらを制御するエンジンＥＣＵにより構成されている。", "B": "リターダー本体は電磁弁、コントロールバルブ、マスターピストン、スレーブピストンで構成されている。", "C": "スレーブピストンはエンジンリターダーとＥＧＲの区別はなく、両回路の油圧を同じピストンで受け、排気バルブを押している。", "D": "コントロールバルブとマスターピストンは各気筒ごとに設けている。"}, "explanation": "スレーブピストンはエンジンリターダーとEGRの区別はなく、両回路の油圧を上下別の異なるピストンで受け排気バルブを押す（同じピストンではない）。正解はC。", "source": "20年 1次", "cat": "T/M"}, {"no": 3, "section": "問1", "label": "問1(3)", "points": 3, "answer": "A", "stem": "２＊Ｇ付きデュトロにおいて、超音波張力計を用いたオルタネーターベルト測定要領について、適切なものはどれか。", "choices": {"A": "オルタネーターとウォーターポンプ間で測定する。", "B": "超音波張力計のマイクを１０ｃｍ以上離して測定する。", "C": "新品ベルトの張力が運転後に少しでも低下した場合、異常である。", "D": "新品時、張り直し時の張力は同じ値とする。"}, "explanation": "B：超音波張力計のマイクは2～3cmに近づける。C：ベルトの張力は運転後に低下するが、初期馴染みによるもので異常ではない。D：新品時と張り直し時の値は異なる。正解はA。", "source": "20年 1次", "cat": "一般関連"}, {"no": 4, "section": "問1", "label": "問1(4)", "points": 3, "answer": "B", "stem": "２＊Ｇ付レンジャーにおける、青色ＬＬＣ（ロングライフクーラント）交換時期に関する記述として、適切なものはどれか。", "choices": {"A": "ＬＬＣ濃度５０％の交換時期は、３年または４００，０００ｋｍ走行毎である。", "B": "ＬＬＣ濃度３０％の交換時期は、３年または６００，０００ｋｍ走行毎である。", "C": "ＬＬＣ濃度５０％の交換時期は、２年または２００，０００ｋｍ走行毎である。", "D": "ＬＬＣ濃度３０％の交換時期は、４年または８００，０００ｋｍ走行毎である。"}, "explanation": "LLC濃度30%の交換時期は3年または600,000km走行毎である。正解はB。", "source": "20年 1次", "cat": "一般関連"}, {"no": 6, "section": "問1", "label": "問1(6)", "points": 3, "answer": "A", "stem": "ハイブリッドモータに関する記述として、不適切なのはどれか。", "choices": {"A": "モータの回転速度は交流電源の電圧で制御する。", "B": "減速時は発電機としてエネルギーを回収する。", "C": "ハイブリッドモータは永久磁石を取り付けたロータを、三相交流を用いて回転させる交流同期電動機である。", "D": "モータの発生するトルクは、電流の大きさで制御している。"}, "explanation": "モータの回転速度は交流電流の周波数で制御する（電圧ではない）。正解はA。", "source": "20年 1次", "cat": "HV"}, {"no": 7, "section": "問1", "label": "問1(7)", "points": 3, "answer": "C", "stem": "ＬＫＧ付プロフィアに搭載されているプロシフト１２のシフト荷重補正学習に関する記述として、不適切なものはどれか。", "choices": {"A": "学習状態が不十分だと、変速ショックやギヤ鳴りの原因となる。", "B": "モーターシフトユニットを交換した際は、学習を行わなければならない。", "C": "オートクラッチユニット本体（ＡＣＵ）を交換した際は、シフト荷重補正学習を行わなければならない。", "D": "ＤＸIIにて学習状態を確認できるが、各ギヤ１０回以上を推奨とし、最大回数は１６回となっている。"}, "explanation": "オートクラッチユニット本体（ACU）を交換した場合はシフト荷重補正学習はやらなくてよい（クラッチ学習を実施する）。正解はC。", "source": "20年 1次", "cat": "T/M"}, {"no": 8, "section": "問1", "label": "問1(8)", "points": 3, "answer": "C", "stem": "ＬＫＧ付プロフィアに搭載されている、ＭＺ１２トランスミッションに関する記述として、不適切なものはどれか。", "choices": {"A": "シフトユニットはＤＣモーター、ボールねじ部、パワーシフト部などで構成されている。", "B": "セレクトユニットはＤＣモーター、ボールねじ部などで構成されている。", "C": "レンジマグネチックバルブは、３連マグネチックバルブを採用している。", "D": "スプリッターマグネチックバルブは、２連マグネチックバルブを採用している。"}, "explanation": "レンジマグネチックバルブは2連マグネチックバルブを採用している（3連ではない）。正解はC。", "source": "20年 1次", "cat": "T/M"}, {"no": 9, "section": "問1", "label": "問1(9)", "points": 3, "answer": "D", "stem": "２＊Ｇ付トラクター（２０１８年モデル）のプロシフト１６に関する記述として、不適切なものはどれか。", "choices": {"A": "圧縮エア式を採用しており、シフト・セレクト方向、スプリッター、レンジおよびクラッチアクチュエーター、カウンターシャフトブレーキなどを圧縮エアの力で制御している。", "B": "バルブモジュール内部に１４個のマグネチックバルブを搭載している。", "C": "ギヤセレクターとシーケンシャルレバーの操作信号を取り込み、ＣＡＮ通信用の信号に変換してプロシフトＥＣＵに送信するため、ＩＯコンバーターを採用している。", "D": "新機能としてＥＳスタート、走行モード切替機能、アイドル走行機能、キックダウン機能を追加した。"}, "explanation": "プロシフト16は圧縮エアを使用しているがセレクト方向は電磁ソレノイド式を使用している（圧縮エアではない）。正解はD。", "source": "20年 1次", "cat": "T/M"}, {"no": 10, "section": "問1", "label": "問1(10)", "points": 3, "answer": "C", "stem": "『Ｐ０９０１』はクラッチを断・接するため、ＡＣＵモータを動かしクラッチブースタをストロークさせようとしたが、何かしらの原因でクラッチブースタのストロークが指示通りに出来なかった場合に検出する故障コードである。これの原因と考えられるものとして、不適切なものはどれか。", "choices": {"A": "ＡＣＵ内の油圧バルブ不良", "B": "クラッチブースタのリレーピストン固着", "C": "セレクトユニットのリンク部の錆つき", "D": "ＡＣＵのモータ不良"}, "explanation": "セレクトユニット錆付きは変速制御の不具合につながるが、P0901（クラッチブースタのストローク不具合）の原因ではない。正解はC。", "source": "20年 1次", "cat": "T/M"}, {"no": 11, "section": "問1", "label": "問1(11)", "points": 3, "answer": "C", "stem": "パワーステアリングの構造に関する記述として、適切なものはどれか。", "choices": {"A": "ラック・ピニオン型はコントロール・バルブとパワー・シリンダをステアリング・ギヤ装置の内部に収めたものである。", "B": "インテグラル型はコントロール・バルブをステアリング・ギヤ装置の内部に、パワー・シリンダをラック・チューブに設けたものである。", "C": "リンケージ型はステアリング・リンク機構の途中にパワー・シリンダを設けたものである。", "D": "ピニオン・アシスト式はモータをステアリング・ギヤ装置のラック部に設けたものである。"}, "explanation": "A:インテグラル型の説明。B:ラック・ピニオン型の説明。D:ピニオン・アシスト式はモータをステアリング・ギヤ装置のピニオンに設けたもの。正解はC。", "source": "20年 1次", "cat": "シャシ・フレーム"}, {"no": 12, "section": "問1", "label": "問1(12)", "points": 3, "answer": "A", "stem": "ショック・アブソーバの診断に関する記述として、不適切なものはどれか。", "choices": {"A": "スウィシュ音はショック・アブソーバ内部でオイルが狭い穴を高速で通過する際、内部の異常によりオイルが大量に流れたときに発生する。", "B": "スタビライザ・ブッシュの音はブッシュが摩耗したときに発生することが多く、「ギュッ」という音や「ザッザー」という音である。", "C": "ラジアス・ロッド、トレーリング・アームなどのブッシュの音は荒れた道路を走行中、あるいは制動時や発進時に発生しやすい。", "D": "ダンパ打音は、オイル漏れやガス抜けなどにより、内部で減衰力に乱れが生じて不正な振動が発生しボデー・パネル面で発生する。"}, "explanation": "スウィシュ音はオイルがスムーズに流れないときに発生する（大量に流れるときではない）。正解はA。", "source": "20年 1次", "cat": "一般関連"}, {"no": 13, "section": "問1", "label": "問1(13)", "points": 3, "answer": "C", "stem": "Ｌ＊Ｇ付ウイングボデー油圧シリンダーの記述として、適切なものはどれか。", "choices": {"A": "油圧シリンダーの可変絞り弁Ｕポートは、ウイング上昇時の調整をおこなう。", "B": "油圧シリンダーの可変絞り弁Ｄポートは、ウイング下降時の調整をおこなう。", "C": "調整時に開閉の時間が遅い場合、油圧ホースジョイントを取り外して、中にあるストレーナーのゴミを清掃する。", "D": "ウイングの作動が速いときは可変絞り弁を時計回りに、遅いときは反時計回りに約１／２回転回す。"}, "explanation": "A：可変絞り弁DポートはウイングUp（上昇）時の調整。B：可変絞り弁UポートはウイングDown（下降）時の調整。D：作動が速いときは反時計回り、遅いときは時計回りに回す。正解はC。", "source": "20年 1次", "cat": "エンジン"}, {"no": 14, "section": "問1", "label": "問1(14)", "points": 3, "answer": "D", "stem": "２＊Ｇ付プロフィアトラックのサスペンションを脱着する場合の注意事項に関する記述として、不適切なものはどれか。", "choices": {"A": "アクスルが前方にずれないようにドラムおよびローター部をトランスミッションジャッキなどで支え、浮かせないようにする。", "B": "アッパーロッドは、組付け方向矢印が車両前方になるように取り付ける。", "C": "スターターキーを必ず「ＬＯＣＫ」位置にしたのちレベリングタイマーを解除する。", "D": "車高センサー、リンクロッド、レベリングレバーの脱着作業のみ、必ず車高の初期設定を行う。"}, "explanation": "車高センサー、リンクロッド、レベリングレバーだけでなく、車高センサーブラケット、トルクロッドブラケットなどの取り外し作業を行ったときにも必ず車高の初期設定を行う。正解はD。", "source": "20年 1次", "cat": "T/M"}, {"no": 15, "section": "問1", "label": "問1(15)", "points": 3, "answer": "C", "stem": "２＊Ｇ付プロフィアのブレーキ関連の定期交換部品に関する記述として、不適切なものはどれか。", "choices": {"A": "エキスパンダー端部のダストブーツの交換時期は、１年ごとである。", "B": "スプリングブレーキチャンバーのピギーバック部は、３年ごとにサブアセンブリで交換する。", "C": "ブレーキシグナルトランスミッターの交換時期は、５年ごとである。", "D": "エキスパンダー内部のゴム部品の交換時期は、３年ごとであり、エキスパンダーアセンブリで交換する。"}, "explanation": "ブレーキシグナルトランスミッターの交換時期は6年ごとである（5年ではない）。正解はC。", "source": "20年 1次", "cat": "ブレーキ"}, {"no": 16, "section": "問1", "label": "問1(16)", "points": 3, "answer": "D", "stem": "２ＤＧ付メルファのブレーキ装置に関する記述として、不適切なものはどれか。", "choices": {"A": "リヤドラムブレーキは、デュアルツーリーディングブレーキを標準採用している。", "B": "ＡＳＲシステムは装備されるが、ＰＣＳシステムは装備されていない。", "C": "サービスブレーキには、空気油圧複合式ブレーキ(エアオーバーハイドロリックブレーキ)を採用している。", "D": "パーキングブレーキは、デュオサーボタイプで、トランスミッションの後端に取り付けられている。"}, "explanation": "パーキングブレーキはウェッジ式ホイールパーキングブレーキを採用している（デュオサーボタイプではない）。正解はD。", "source": "20年 1次", "cat": "T/M"}, {"no": 17, "section": "問1", "label": "問1(17)", "points": 3, "answer": "D", "stem": "ＱＰＧ付レンジャーＦＥ２Ａのブレーキ装置に関する記述として、適切なものはどれか。", "choices": {"A": "エアオーバーブレーキ用ＶＳＣシステムを新開発し、オプション装着できる。", "B": "エア圧制御用リニア電磁弁は、ＶＳＣシステムのみで使用している。", "C": "ＥＳスタート作動時には、ＡＢＳアクチュエーター内蔵のＥＳソレノイドを使用している。", "D": "ＡＢＳ－ＥＣＵは、ＡＢＳアクチュエーターに一体で取り付けられている。"}, "explanation": "A：FE2Aに全車標準装備（オプションではない）。B：エア圧制御用リニア電磁弁は、VSC、ASR、ESスタートで使用している。C：エア圧制御用リニア電磁弁を作動させ、ESスタートを作動させる。正解はD。", "source": "20年 1次", "cat": "ブレーキ"}, {"no": 18, "section": "問1", "label": "問1(18)", "points": 3, "answer": "C", "stem": "２＊Ｇ付プロフィアのブレーキ装置に関する記述として、不適切なものはどれか。", "choices": {"A": "バックアップバルブをアクスルモジュレーターに内蔵させることにより回路の簡素化および整備性が向上した。", "B": "アクスルモジュレーターのコネクターをＨＤＳＣＳ（Heavy Duty Sealed Connector Series）化して、防水性および信頼性が向上した。", "C": "エアドライヤーは、マルチプロテクションバルブ、減圧弁、エア低圧警報スイッチ、エアゲージセンサーを一体化したものを採用した。", "D": "法規対応のため、ブレーキ作動用エア圧を測定するテストコネクションをエアタンクとチャンバーに追加した。"}, "explanation": "エアドライヤーとマルチプロテクションバルブを分離し、その間にウエットタンクを設置した（一体化ではない）。正解はC。", "source": "20年 1次", "cat": "ブレーキ"}, {"no": 19, "section": "問1", "label": "問1(19)", "points": 3, "answer": "B", "stem": "２＊Ｇ付プロフィアのヒーター＆エアコンディショナーに関する記述として、不適切なものはどれか。", "choices": {"A": "暖気と冷気を混合し、温度コントロールを行うことのできるフルエアミックス方式を採用している。", "B": "ブロワー遅動制御は、内気温度センサーの検出温度によって制御を行い、センターレジスターからの熱風の吹き出しを防止している。", "C": "ブロワー起動制御とは、ブロワーモーター起動時に、モーター保護のため２秒間風量を「２」に固定する。", "D": "日射補正制御は、日差しが強い場合にはブロワースピードを上げ、日差しが弱い場合にはブロワースピードを下げて制御する。"}, "explanation": "ブロワー遅動制御は、エバポレーター後センサーの検出温度で制御している（内気温度センサーではない）。正解はB。", "source": "20年 1次", "cat": "電気装置"}, {"no": 20, "section": "問1", "label": "問1(20)", "points": 3, "answer": "A", "stem": "２＊Ｇ付プロフィアのエアバック＆シートベルトに関する記述として、適切なものはどれか。", "choices": {"A": "ダイアグノーシスの出力通信方法をＣＡＮ通信化することにより、ＨＩＮＯ ＤＸＩＩによる故障診断が可能となった。", "B": "ＳＲＳエアバックおよびプリテンショナー付きシートベルトは、車両前方及び車両後方から一定以上の強い衝撃を感知した場合のみ作動する。", "C": "エアバックＥＣＵは内蔵されたジャイロセンサーにより、衝撃を検知しインフレーターへ点火信号を送る。", "D": "エアバックＥＣＵからの着火信号により、プリテンショナー付きシートベルトは火薬が爆発し作動する。"}, "explanation": "SRSエアバッグはエアバッグECUに内蔵されたGセンサーが、車両前方からの強い衝撃を受けた場合に作動する（ジャイロセンサーではなく、後方衝撃では作動しない）。正解はA。", "source": "20年 1次", "cat": "電気装置"}, {"no": 21, "section": "問1", "label": "問1(21)", "points": 3, "answer": "D", "stem": "Ｑ＊Ｇ付プロフィアのスターターに関する記述として、適切なものはどれか。", "choices": {"A": "モーター部は４極の直巻短時間定格の低速形で、アーマチュアはギヤハウジングおよびコンミュテーターエンドフレームの各軸受けで支えられている。", "B": "リダクション部はプラネタリーギヤ方式を採用し、約１／４に減速してピニオンギヤに伝達させる役目をしている。", "C": "スプラグクラッチ部は始動中エンジンからの動力が逆にモーター部（アーマチュア）に伝達されることを防止する働きをもっており、ローラークラッチが用いられている。", "D": "スタートマグネチックスイッチ部はメイン接点の開閉を行い、ピニオンギヤとリングギヤとのかみ合いおよび離脱をレバーを介して行っている。"}, "explanation": "A：モーター部は4極の直巻短時間定格の高速形。B：アーマチュアの回転をプラネタリーギヤを介して約1/5に減速。C：スプラグクラッチ部ではなくピニオンクラッチ部。正解はD。", "source": "20年 1次", "cat": "T/M"}, {"no": 22, "section": "問1", "label": "問1(22)", "points": 3, "answer": "D", "stem": "２＊Ｇ付プロフィアのセントラルゲートウェイＥＣＵに記録されるデータロガーの１日ログとして、不適切なものはどれか。", "choices": {"A": "装置負荷系データ", "B": "制動系データ", "C": "ギヤ系データ", "D": "ダイアグ系データ"}, "explanation": "ダイアグ系データは生涯ログであり、1日ログではない。正解はD。", "source": "20年 1次", "cat": "一般関連"}, {"no": 23, "section": "問1", "label": "問1(23)", "points": 3, "answer": "A", "stem": "自動車の材料に関する記述として、適切なものはどれか。", "choices": {"A": "焼結合金は多孔性で耐摩耗性、耐衝撃性に優れている。", "B": "球状黒鉛鋳鉄はカムシャフト等に使用されている。", "C": "冷間圧延鋼板は、熱間圧延鋼板を更に低温で圧延したものである。", "D": "アルミニウムの熱伝導率は鉄の約４倍である。"}, "explanation": "B：球状黒鉛鋳鉄はピストンリング、合金鋳鉄はカムシャフトに使用されている。C：冷間圧延鋼板は熱間圧延鋼板を更に常温で圧延したもの。D：アルミニウムは熱の伝導率が鉄の約3倍。正解はA。", "source": "20年 1次", "cat": "一般関連"}, {"no": 24, "section": "問1", "label": "問1(24)", "points": 3, "answer": "C", "stem": "ＬＬＣ（ロングライフクーラント）に関する記述として、不適切なものはどれか。", "choices": {"A": "主成分が、エチレングリコールで、特殊な添加剤を配合し、凍結防止効果と防錆・防食効果と冷却効果を長期間に渡り、性能を維持する。", "B": "補充するときは、注入してあるものと同一銘柄を用い、かつ同一濃度の補充液を注入する。", "C": "水との混合割合は、２０～５０％の範囲で使用する。", "D": "河川の水や井戸水のような硬水を使用すると水あかや錆がつく原因になる。"}, "explanation": "LLCと水との混合割合は30～60%の範囲で使用する（20～50%ではない）。正解はC。", "source": "20年 1次", "cat": "一般関連"}, {"no": 25, "section": "問1", "label": "問1(25)", "points": 3, "answer": "B", "stem": "メンテナンスノートで定めている、事業用自動車の厳しい使われ方（シビアコンディション時）に関する記述として、不適切なものはどれか。", "choices": {"A": "悪路（凸凹路、砂利道、未舗装路等）、雪道、多塵地帯の走行が走行距離の３０％以上。", "B": "走行距離が目安として１５，０００ｋｍ／月以上。", "C": "発進・停止の繰り返しが多い、もしくは低速走行が走行距離の３０％以上。", "D": "山道、登降坂道が走行距離の３０％以上。"}, "explanation": "走行距離が多い場合の目安は10,000km/月以上（15,000kmではない）。正解はB。", "source": "20年 1次", "cat": "一般関連"}, {"no": 26, "section": "問1", "label": "問1(26)", "points": 3, "answer": "B", "stem": "出張作業時の安全に関する記述として、不適切なものはどれか。", "choices": {"A": "路上作業で、安全確認、誘導要員が必要と予測される場合は、必ず２人で行く。", "B": "路上作業時は、サービスカーを故障車の前に停止してハンドルを右にきり、作業スペースを確保する。", "C": "故障車後方１００ｍ以上の場所に発炎筒を設置する。", "D": "夜間作業時は、安全コーン、黄色回転灯、蛍光ベスト（反射テープ付）を使用する。"}, "explanation": "サービスカーは故障車の後ろに止め、ハンドルを左に切る。故障車とサービスカーとの車間距離は最低20mは離す。正解はB。", "source": "20年 1次", "cat": "一般関連"}, {"no": 27, "section": "問1", "label": "問1(27)", "points": 3, "answer": "B", "stem": "「道路運送車両法」に照らし、長さ４．６５ｍ、幅１．７２ｍ、高さ１．６７ｍで原動機の総排気量が１．９９Ｌのディーゼルエンジンの自動車の種別として、適切なものはどれか。", "choices": {"A": "小型自動車", "B": "普通自動車", "C": "大型特殊自動車", "D": "軽自動車"}, "explanation": "小型自動車は長さ4.7m以下、幅1.7m以下、高さ2.0m以下。総排気量は2.0L以下（ディーゼル車は適用除外）。出題の車両は全幅が1.72mで規定の1.7mを超えているため種別は普通自動車となる。正解はB。", "source": "20年 1次", "cat": "法令"}, {"no": 28, "section": "問1", "label": "問1(28)", "points": 3, "answer": "C", "stem": "道路運送車両法の自動車点検基準に照らし、「事業用自動車等の定期点検基準」のうち、３ヶ月ごとに行う走行装置の点検項目として、不適切なものはどれか。", "choices": {"A": "ナックルの連結部のガタ", "B": "フロント・ホイール・ベアリングのガタ", "C": "ホイール・ナット及びホイール・ボルトの損傷", "D": "タイヤの状態"}, "explanation": "ホイール・ナット及びホイール・ボルトの損傷は、12ヶ月ごとの点検項目となる（3ヶ月ごとではない）。正解はC。", "source": "20年 1次", "cat": "法令"}, {"no": 29, "section": "問1", "label": "問1(29)", "points": 3, "answer": "C", "stem": "道路運送車両法の保安基準に照らし、次の文章の［　］に当てはまるものとして、適切なものはどれか。\n「最高速度が２０ｋm/ｈ未満の自動車は右側および左側に、それぞれ［　］まで傾けた場合に転覆しないこと。」", "choices": {"A": "２０°", "B": "２５°", "C": "３０°", "D": "３５°"}, "explanation": "最高速度20km/h未満の自動車および車両総重量が車両重量の1.2倍以下の自動車は30°まで傾けた場合に転覆しなければよい（通常は35°）。正解はC。", "source": "20年 1次", "cat": "法令"}, {"no": 30, "section": "問1", "label": "問1(30)", "points": 3, "answer": "D", "stem": "道路運送車両法の保安基準に照らし、方向指示器の基準に関する記述として、不適切なものはどれか。", "choices": {"A": "照明部は上縁の高さ地上２．１ｍ以下でなければならない。", "B": "前面に備える方向指示器は、昼間にその決められた範囲の前方１００ｍの距離から点灯を確認できるもの。", "C": "両側面に備える方向指示器は、昼間にその決められた範囲の側方３０ｍの距離から点灯を確認できるもの。", "D": "照明部の最外縁は、自動車の最外側から６００mm以内となるように取り付けられていること。"}, "explanation": "それぞれ最外側にある照明部の最外縁は、自動車の最外側から400mm以内となるように取り付けること（600mmではない）。正解はD。", "source": "20年 1次", "cat": "法令"}, {"no": 2, "section": "問1", "label": "問1(2)", "points": 3, "answer": "C", "stem": "下記エンジンリターダの説明で［ ］にあてはまる語句として、適切なものはどれか。\nエンジンＥＣＵの信号によりマグネチックバルブが開き、エンジンからの油圧が［①］とその内部にあるチェックバルブを押し上げ、マスターピストンとスレーブピストン間にオイルが供給され、マスターピストンと［②］がブレーキカムに接触するまで押し下げられる。圧縮上死点付近で［③］はブレーキカムによって押し上げられオイルを押し戻す。［④］がオイル通路を閉塞し、油圧が上昇することにより［⑤］を押し下げエキゾーストバルブが開き、圧縮空気を逃がすことで、圧縮行程で得たブレーキ力を損失することなく有効に活用する。", "choices": {"A": "①コントロールバルブ ②ブレーキ用ロッカーアーム ③スレーブピストン ④逆止弁 ⑤マスターピストン", "B": "①マグネチックバルブ ②吸気ロッカーアーム ③スレーブピストン ④チェックバルブ ⑤マスターピストン", "C": "①コントロールバルブ ②ブレーキ用ロッカーアーム ③マスターピストン ④チェックバルブ ⑤スレーブピストン", "D": "①マグネチックバルブ ②ブレーキ用ロッカーアーム ③マスターピストン ④逆止弁 ⑤スレーブピストン"}, "explanation": "①コントロールバルブ ②ブレーキ用ロッカーアーム ③マスターピストン ④チェックバルブ ⑤スレーブピストン が正しい組み合わせ。正解はC。", "source": "21年 1次", "cat": "ブレーキ"}, {"no": 3, "section": "問1", "label": "問1(3)", "points": 3, "answer": "A", "stem": "２＊Ｇ付大型トラックのエンジンのセンサーに関する記述として、適切なものはどれか。", "choices": {"A": "エアフローセンサーは薄膜シリコンチップ式を採用し、シリコンチップ部上流温度センサーの温度と下流温度センサーの温度差で空気流量を計測している。", "B": "アクセルセンサーは可変抵抗式のセンサーで、アクセルセンサーアセンブリ１個の中にセンサーを２個内蔵している。", "C": "燃料温度センサーはサプライポンプ入口回路に取り付けている。", "D": "エンジン主回転センサーは、フライホイールハウジングに取り付けており、パルサーには６°ごとに凹部を設けており、エンジン１サイクル（２回転）分の凹数は１２０個になる。"}, "explanation": "アクセルセンサーはホールIC式。燃料温度センサーはインジェクターのリゲージ回路に設置。フライホイールのパルサー穴は６°ごとに112個。エアフローセンサーの薄膜シリコンチップ式の記述が適切。正解はA。", "source": "21年 1次", "cat": "エンジン"}, {"no": 4, "section": "問1", "label": "問1(4)", "points": 3, "answer": "B", "stem": "ポスト新長期Ｅ１３Ｃのコモンレール式高圧燃料噴射装置のソレノイド式インジェクターに関する記述として、不適切なものはどれか。", "choices": {"A": "ソレノイド・コイルに通電が開始されると、電磁力によりバルブはバルブ・スプリングの力に打ち勝って引き上げられ、オリフィスが開く。", "B": "ソレノイド・コイルへの通電を止めると、コモンレールからの高圧燃料が、ノズル室に流入することで、コマンド・ピストンが押し下げられる。", "C": "オリフィスが開くと、制御室の燃料は次第に流出し制御室の圧力が下がるので、ノズル・ニードル下面に掛かっていた圧力との差圧により、ノズルニードルが上昇し燃料を噴射する。", "D": "オリフィスが閉じると、コモンレールからの高圧燃料が、一気に制御室に流入することで、ノズル・ニードルが急激に降下し噴孔が閉じて噴射が終了する。"}, "explanation": "ソレノイド・コイルへの通電を止めると、バルブ・スプリングの力でオリフィスが閉じられ、コモンレールからの高圧燃料が制御室に流入することでコマンド・ピストンが押し下げられる（ノズル室ではない）。正解はB。", "source": "21年 1次", "cat": "エンジン"}, {"no": 5, "section": "問1", "label": "問1(5)", "points": 3, "answer": "C", "stem": "ＳＪＧ付デュトロのハイブリッドシステムの点検、整備に関する記述として、適切なものはどれか。", "choices": {"A": "ＨＶバッテリーがバッテリー上がりを起こした際には、専用の外部充電器で低電流を長時間流し続け、すべてのセルが満充電になるまで充電する。", "B": "後輪が接地した状態で牽引する際はギヤをＤレンジにするか、プロペラシャフトを外すなどモータージェネレーターが回転しないように牽引する。", "C": "整備時にはまずスターターキーをＯＦＦにしてからサービスプラグを取り外し、コンデンサーが放電するまで７分間待つ。その後、保護具を身に着け高電圧回路の作業を行う。", "D": "高電圧に関わる点検、整備を行うには、労働安全衛生法第５９条ならびに労働安全衛生規則第３６条により特別教育の受講が義務付けられている。"}, "explanation": "後輪が接地した状態で牽引する際はNレンジで行う。HVバッテリーは外部充電できないので交換が必要。護具を装着してからサービスプラグを抜く（順序が逆）。整備時の正しい手順（キーOFF→サービスプラグ取り外し→7分待機→保護具着用）が適切。正解はC。", "source": "21年 1次", "cat": "法令"}, {"no": 6, "section": "問1", "label": "問1(6)", "points": 3, "answer": "A", "stem": "２０１９年モデルのプロフィアＨＶ車の機能に関する記述として、不適切なものはどれか。", "choices": {"A": "ＤＣ－ＤＣコンバータは、システムメインリレーおよびＨＶウォーターポンプなどへ電力を供給するため、ＨＶバッテリー電圧のＤＣ２７６Ｖをでdc24Vに降圧する。", "B": "高圧Ｊ/Ｂ（ジャンクションボックス）は、ＨＶバッテリー前部のフレームに搭載されており、ＨＶバッテリーの電力を架装する電動冷凍機などに分配する。", "C": "ＨＶバッテリーは定格電圧２７６（Ｖ）、容量４０（Ａｈ）のリチウムイオンバッテリーを搭載している。", "D": "ＨＶ－ＥＣＵが、各種センサーなどの信号から減速状態（フットブレーキを踏んでいるまたはエンジンリターダーを作動させている）を判断すると、インバーターがHVモーターを発電機として機能させ、車両の運動エネルギーを電気エネルギーに変換しながらブレーキアシストを行う。"}, "explanation": "ＤＣ－ＤＣコンバータはＨＶバッテリー電圧のＤＣ２７６ＶをＤＣ２４Ｖではなく、DC24VをDC12Vに降圧する（バッテリー電圧276VはDC12Vへ降圧）。正解はA。", "source": "21年 1次", "cat": "HV"}, {"no": 7, "section": "問1", "label": "問1(7)", "points": 3, "answer": "B", "stem": "Ｌ＊Ｇ付プロフィアに搭載されている、ＭＺ１２トランスミッションに関する記述として、不適切なものはどれか。", "choices": {"A": "スプリッターマグネチックバルブは、２連マグネチックバルブを採用している。", "B": "レンジマグネチックバルブは、３連マグネチックバルブを採用している。", "C": "シフトユニットはＤＣモーター、ボールねじ部、パワーシフト部などで構成されている。", "D": "セレクトユニットはＤＣモーター、ボールねじ部などで構成されている。"}, "explanation": "レンジマグネチックバルブは２連マグネチックバルブを採用している（３連ではない）。正解はB。", "source": "21年 1次", "cat": "T/M"}, {"no": 8, "section": "問1", "label": "問1(8)", "points": 3, "answer": "A", "stem": "マニュアルトランスミッションの振動・騒音に関する記述として、不適切なものはどれか。", "choices": {"A": "うなり音は、トランスミッションギヤのかみ合い率を小さくし、振動周波数を低くすることで低減することができる。", "B": "ジャダは、クラッチを徐々につないでいく際にクラッチディスクの摩擦面で間欠的な滑りが生じ、エンジンからの伝達トルクが変動することで発生する。", "C": "車両発進時のジャダは、１０～２０Ｈｚの振動周波数でクラッチ伝達トルクの変動による振動である。", "D": "うなり音は、４００Ｈｚ～３ｋＨｚの振動周波数でトランスミッションギヤのかみ合いによる振動である。"}, "explanation": "トランスミッションギヤのかみ合い率を大きくし、振動周波数を高くすることでうなり音を低減することができる（小さくするのは逆）。正解はA。", "source": "21年 1次", "cat": "T/M"}, {"no": 9, "section": "問1", "label": "問1(9)", "points": 3, "answer": "B", "stem": "ＳＪＧ付デュトロのプロシフトVに関する記述として、不適切なものはどれか。", "choices": {"A": "モータードライバーは、ＡＭＴ ＥＣＵからの指示により、シフト、セレクトモーターおよびＡＣＵモーターに電力を供給し、駆動力の増減や回転方向の切り替えを行っている。", "B": "ＡＣＵストロークセンサーの値はメイン信号、サブ信号ともに、クラッチ完接状態で約４．２Ｖ、クラッチ完断状態で約１Ｖとなっており、マスターシリンダーのピストンストローク量をＡＭＴ ＥＣＵへ送っている。", "C": "ＡＣＵストロークセンサーは、メイン信号とサブ信号の２系統に分かれており、片方が故障した場合はもう一方で制御を行う。", "D": "自動制御による発進、変速操作に加え、ハイブリットシステムにおいてもクラッチが作動し、クラッチの作動回数が多く、高い耐久性を実現するため、クラッチのレリーズ機構にレバーシャフト式を採用した。"}, "explanation": "ＡＣＵストロークセンサー電圧はメインとサブで逆特性となっており、クラッチ完接状態でメインが約4.2V、サブが約0.8V、クラッチ完断状態でメインが約1.0V、サブが約4.0Vとなっている（メイン・サブともに同じ値ではない）。正解はB。", "source": "21年 1次", "cat": "HV"}, {"no": 10, "section": "問1", "label": "問1(10)", "points": 3, "answer": "A", "stem": "オートマチックトランスミッションの故障診断に関する記述として、不適切なものはどれか。", "choices": {"A": "ストールテストを行ったところ特定のレンジのみ規定回転数より高い場合は、ステーターのワンウェイクラッチの作動不良が考えられる。", "B": "ロックアップが作動しない原因としてトルクコンバーター内部の不良が考えられる。", "C": "変速ショックが大きい場合の原因として、ＡＴ内部のラインプレッシャーの高すぎが考えられる。", "D": "「Ｎ」レンジから「Ｄ」レンジへシフトした時にショックが大きい場合は、アイドル回転が高すぎることが考えられる。"}, "explanation": "ステーターのワンウェイクラッチの不良は回転速度が低くなる（高くなるではなく）。規定回転数より高い場合は、ギヤユニットのクラッチの滑りなどが考えられる。正解はA。", "source": "21年 1次", "cat": "T/M"}, {"no": 11, "section": "問1", "label": "問1(11)", "points": 3, "answer": "A", "stem": "２＊Ｇ付プロフィアトラックのサスペンションを脱着する場合の注意事項に関する記述として、不適切なものはどれか。", "choices": {"A": "車高センサー、リンクロッド、レベリングレバーの脱着作業のみ、必ず車高の初期設定を行う。", "B": "スターターキーを必ず「ＬＯＣＫ」位置にしたのちレベリングタイマーを解除する。", "C": "アクスルが前方にずれないようにドラムおよびローター部をトランスミッションジャッキなどで支え、浮かせないようにする。", "D": "アッパーロッドは、組付け方向矢印が車両前方になるように取り付ける。"}, "explanation": "車高センサー、リンクロッド、レベリングレバーだけではなく、車高センサーブラケット、トルクロッドブラケットなどの取り外し作業を行ったときにも必ず車高の初期設定を行う（「のみ」は誤り）。正解はA。", "source": "21年 1次", "cat": "T/M"}, {"no": 12, "section": "問1", "label": "問1(12)", "points": 3, "answer": "D", "stem": "ファイナル・ギヤに関する記述として、適切なものはどれか。", "choices": {"A": "トー当たり、フェース当たりの場合は、ドライブ・ピニオンを遠ざけ、リング・ギヤを近付ける。", "B": "トー当たり、フランク当たりの場合は、ドライブ・ピニオンを近付け、リング・ギヤを遠ざける。", "C": "ヒール当たり、フェース当たりの場合は、ドライブ・ピニオンを近付け、リング・ギヤを遠ざける。", "D": "ヒール当たり、フランク当たりの場合は、ドライブ・ピニオンを遠ざけ、リング・ギヤを近付ける。"}, "explanation": "トー当たり、フランク当たりの場合はドライブ・ピニオンを遠ざけリング・ギヤを近付ける。ヒール当たり、フランク当たりの場合はドライブ・ピニオンを遠ざけリング・ギヤを近付けるが適切。正解はD。", "source": "21年 1次", "cat": "一般関連"}, {"no": 13, "section": "問1", "label": "問1(13)", "points": 3, "answer": "D", "stem": "タイヤおよびホイールバランスに関する記述として、適切なものはどれか。", "choices": {"A": "タイヤの一部が重い場合、ゆっくり回転させると重い部分が下になって止まる。このときのアンバランスをダイナミック・アンバランスといい、シミーの原因になる。", "B": "タイヤの走行音は、一般にラグ型パターンよりもリブ型パターンの方が大きく、また、バイアス・タイヤよりもラジアル・タイヤの方が大きい。", "C": "パターンノイズは、トレッド・パターンの溝の中の空気が、路面とタイヤ間で膨張し、排出されるときに出る音である。", "D": "スキールとは、急発進、急制動、急旋回のときに発するキーという鋭い音で、タイヤのトレッドが局部的に振動を起し発生する。"}, "explanation": "A：スタティック・アンバランスという。B：ラグ型よりもリブ型の方が小さい、バイアスよりもラジアルの方が小さい。C：路面とタイヤ間で圧縮される。D：スキールの説明が適切。正解はD。", "source": "21年 1次", "cat": "一般関連"}, {"no": 14, "section": "問1", "label": "問1(14)", "points": 3, "answer": "B", "stem": "ステアリング装置に関する記述として、不適切なものはどれか。", "choices": {"A": "操作機構は、運転者の操舵をステアリング・ギヤ機構に伝える。", "B": "リンク機構は、ギヤ機構の動きをフロント・ホイールに伝えると共に、左右のフロント・ホイールの切れ角を同じにしている。", "C": "油圧式パワーステアリングには、ラック・ピニオン型、インテグラル型、リンケージ型がある。", "D": "ギヤ機構は、操舵力の方向を変えると共に、トルクを増大しステアリング・リンク機構に伝える。"}, "explanation": "リンク機構は、ギヤ機構の動きをフロント・ホイールに伝えると共に、左右のフロント・ホイールを一定の関係に保持し、旋回時に内側ホイールの切れ角を大きくしている（「切れ角を同じにしている」は誤り）。正解はB。", "source": "21年 1次", "cat": "シャシ・フレーム"}, {"no": 15, "section": "問1", "label": "問1(15)", "points": 3, "answer": "B", "stem": "２＊Ｇ付プロフィアのブレーキ装置に関する記述として、不適切なものはどれか。", "choices": {"A": "バックアップバルブをアクスルモジュレーターに内蔵させることにより回路の簡素化および整備性が向上した。", "B": "エアドライヤーは、マルチプロテクションバルブ、減圧弁、エア低圧警報スイッチ、エアゲージセンサーを一体化したものを採用した。", "C": "法規対応のため、ブレーキ作動用エア圧を測定するテストコネクションをエアタンクとチャンバーに追加した。", "D": "アクスルモジュレーターのコネクターをＨＤＳＣＳ（Heavy Duty Sealed Connector Series）化して、防水性および信頼性が向上した。"}, "explanation": "エアドライヤーとマルチプロテクションバルブを分離し、その間にウエットタンクを設置した（一体化ではない）。正解はB。", "source": "21年 1次", "cat": "ブレーキ"}, {"no": 16, "section": "問1", "label": "問1(16)", "points": 3, "answer": "D", "stem": "Ｓ＊Ｇ付レンジャー（エアオーバー車）のＡＢＳ制御ソレノイドバルブに関する記述として、適切なものはどれか。", "choices": {"A": "増圧作動時：保持ソレノイドへの信号はＯＮ、減圧ソレノイドへの信号はＯＦＦである。", "B": "増圧作動時：保持ソレノイドへの信号はＯＮ、減圧ソレノイドへの信号はＯＮである。", "C": "増圧作動時：保持ソレノイドへの信号はＯＦＦ、減圧ソレノイドへの信号はＯＦＦである。", "D": "減圧作動時：保持ソレノイドへの信号はＯＦＦ、減圧ソレノイドへの信号はＯＦＦである。"}, "explanation": "増圧作動時、保持ソレノイドへの信号はＯＦＦ、減圧ソレノイドへの信号はＯＦＦが正しい（A:増圧時の保持がONは誤り）。減圧作動時は保持・減圧ともOFF。正解はD。", "source": "21年 1次", "cat": "一般関連"}, {"no": 17, "section": "問1", "label": "問1(17)", "points": 3, "answer": "A", "stem": "制動装置の点検整備時期に関する記述として、適切なものはどれか。", "choices": {"A": "駐車ブレーキの効き具合の点検は、３ヶ月および１２ヶ月ごとに行わなければならないと法律で定められている。", "B": "ブレーキチャンバーの機能の点検は、３ヶ月および１２ヶ月ごとに行わなければならないと法律で定められている。", "C": "ブレーキバルブの機能の点検は、３ヶ月および１２ヶ月ごとに行わなければならないと法律で定められている。", "D": "リレーバルブの機能の点検は、３ヶ月および１２ヶ月ごとに行わなければならないと法律で定められている。"}, "explanation": "ブレーキチャンバーの機能の点検は12ヶ月ごと、ブレーキバルブの機能の点検は12ヶ月ごと、リレーバルブの機能の点検は12ヶ月ごと。駐車ブレーキの効き具合は3ヶ月および12ヶ月ごとが正しい。正解はA。", "source": "21年 1次", "cat": "ブレーキ"}, {"no": 18, "section": "問1", "label": "問1(18)", "points": 3, "answer": "A", "stem": "Ｔ＊Ｇ付デュトロのブレーキ点検に関する記述として、不適切なものはどれか。", "choices": {"A": "バキュームチェックバルブを点検したところ、バキュームポンプ側からバキュームリザーバー側に通気があったので、バキュームチェックバルブは正常である。", "B": "ディスクブレーキのブレーキディスクとブレーキパッドのすき間は自動的に適正に保たれるため、すき間の調整は不要である。", "C": "ドラムブレーキのブレーキライニング端面の段差がなくなっている場合は、使用限度を超えているため交換が必要である。", "D": "エンジン回転中にブレーキペダルを踏み込み、その状態でエンジンを止めて３０秒間保持した際に、ペダル高さが変化しなかったので、負荷気密の簡易点検は正常である。"}, "explanation": "バキュームチェックバルブの点検では、バキュームリザーバー側からバキュームポンプ側に通気があること、またバキュームポンプ側からバキュームリザーバー側に通気がないことを確認する（AはポンプからリザーバーへOKとしているが逆）。正解はA。", "source": "21年 1次", "cat": "ブレーキ"}, {"no": 19, "section": "問1", "label": "問1(19)", "points": 3, "answer": "B", "stem": "２＊Ｇ付プロフィアのエアスプリングのエアを排出する際の、各バルブの作動について正しい組み合わせはどれか。\n給気／排気切り替えマグネチックバルブは［ イ ］左右開閉切り替えバルブは［ ロ ］", "choices": {"A": "［イ］ＯＮ ［ロ］ＯＮ", "B": "［イ］ＯＦＦ ［ロ］ＯＮ", "C": "［イ］ＯＮ ［ロ］ＯＦＦ", "D": "［イ］ＯＦＦ ［ロ］ＯＦＦ"}, "explanation": "エア排出時の組み合わせは、給気/排気切り替えマグネチックバルブは「OFF」、左右開閉切り替えバルブは「ON」。正解はB。", "source": "21年 1次", "cat": "シャシ・フレーム"}, {"no": 20, "section": "問1", "label": "問1(20)", "points": 3, "answer": "D", "stem": "２＊Ｇ付プロフィアのヒーター＆エアコンディショナーに関する記述として、不適切なものはどれか。", "choices": {"A": "暖気と冷気を混合し、温度コントロールを行うことのできるフルエアミックス方式を採用している。", "B": "日射補正制御は、日差しが強い場合にはブロワースピードを上げ、日差しが弱い場合にはブロワースピードを下げて制御する。", "C": "ブロワー起動制御とは、ブロワーモーター起動時に、モーター保護のため２秒間風量を「２」に固定する。", "D": "ブロワー遅動制御は、内気温度センサーの検出温度によって制御を行い、センターレジスターからの熱風の吹き出しを防止している。"}, "explanation": "ブロワー遅動制御は、エバポレーター後センサーの検出温度で制御している（内気温度センサーではない）。正解はD。", "source": "21年 1次", "cat": "電気装置"}, {"no": 23, "section": "問1", "label": "問1(23)", "points": 3, "answer": "A", "stem": "安全作業の基本として、不適切なものはどれか。", "choices": {"A": "ホイスト作業時にワイヤーの吊り角が小さくなるとワイヤーにかかる力は大きくなるので、ワイヤーを丈夫なものにしなければならない。", "B": "安全で正確な作業は整理整頓された環境で生まれるので、通路に工具や部品を直接置かない。", "C": "グラインダー作業時は、保護めがね、革手袋、防塵マスクを必ず着用する。", "D": "ジャッキアップ時は、リジッドラックで車両を確実に支えてから作業を開始する。"}, "explanation": "吊り角が大きくなるとかかる力も大きくなる（吊り角が小さいとかかる力も小さい）。正解はA。", "source": "21年 1次", "cat": "一般関連"}, {"no": 24, "section": "問1", "label": "問1(24)", "points": 3, "answer": "A", "stem": "出張作業時の安全に関する記述として、不適切なものはどれか。", "choices": {"A": "故障車後方５０ｍ未満の場所に発炎筒を設置する。", "B": "路上作業で安全確認、誘導要員が必要と予測される場合は、必ず２人以上で行く。", "C": "路上作業時は、サービスカーを故障車の後ろに停止する。サービスカーとの車間距離は最低２０ｍ以上離す。", "D": "故障現場が一般道路の自動車専用道路、交通量が多く安全が確保できないバイパス等の場合は、警察へ緊急案件として危険通報を行い指示を受けること。"}, "explanation": "故障車後方100ｍ以上の場所に発炎筒を設置する（50m未満は誤り）。正解はA。", "source": "21年 1次", "cat": "一般関連"}, {"no": 25, "section": "問1", "label": "問1(25)", "points": 3, "answer": "D", "stem": "排気ガスに関する記述として、適切なものはどれか。", "choices": {"A": "ディーゼルエンジンは空気過剰率が大きいため、ＣＯの発生は極めて多い。", "B": "ディーゼルエンジンは十分な空気の中で燃焼が行われるため、ＨＣの発生は多い。", "C": "排気ガス中におけるＮＯｘは主にＮＯとＯ2である。", "D": "サルフェートとは、燃焼中の硫黄分が酸化して生成された硫黄化合物の総称である。"}, "explanation": "A：ディーゼルエンジンは空気過剰率が大きいためCOの発生は極めて少ない。B：ディーゼルエンジンは十分な空気の中で燃焼が行われるため、HCの発生は少ない。C：排気ガス中におけるNOxは主にNOとNO2である（O2ではない）。D：サルフェートの記述が適切。正解はD。", "source": "21年 1次", "cat": "エンジン"}, {"no": 26, "section": "問1", "label": "問1(26)", "points": 3, "answer": "C", "stem": "２＊Ｇ付ＲＵ２Ａ型車の電磁リターダーについて、不適切なものはどれか。", "choices": {"A": "このリターダーは制動エネルギーを渦電流に変換し、熱として放散して制動を行っている。", "B": "リターダーで使用される電力は本体に内蔵されたエキサイターにより発電される。", "C": "コイル内には温度センサーを設け長時間連続使用した場合、リターダーの過熱を防止する為に一時的に制御を停止し、コイル等を保護する。", "D": "ドラムに発生した渦電流は熱エネルギーに変わり、ドラムに設けられたフィンより空気中に放散される。"}, "explanation": "リターダーの過熱を防止する為に一時的に制動力を低下させる（制御を停止するのではなく制動力を低下させる）。正解はC。", "source": "21年 1次", "cat": "T/M"}, {"no": 27, "section": "問1", "label": "問1(27)", "points": 3, "answer": "A", "stem": "道路運送車両法の保安基準に照らし、次の文章の［ ］に当てはまるものとして、適切なものはどれか。\n「燃料タンクの注入口及びガス抜き口は、露出した電気端子及び電気開閉器から［ ］以上離れていること。」", "choices": {"A": "２００ｍｍ", "B": "３００ｍｍ", "C": "４００ｍｍ", "D": "１００ｍｍ"}, "explanation": "道路運送車両法の保安基準第15条 燃料装置：燃料タンクの注入口及びガス抜き口は、露出した電気端子及び電気開閉器から200mm以上離れていること。正解はA。", "source": "21年 1次", "cat": "法令"}, {"no": 28, "section": "問1", "label": "問1(28)", "points": 3, "answer": "C", "stem": "道路運送車両法及び指定自動車整備事業規則に照らし、保安基準適合証の有効期限に関する記述として、適切なものはどれか。", "choices": {"A": "交付した日から３０日間となっている。", "B": "交付した日から１５日間となっている。", "C": "検査した日から１５日間となっている。", "D": "検査した日から３０日間となっている。"}, "explanation": "道路運送車両法第94条の5 保安基準適合証等：検査した日から15日間。正解はC。", "source": "21年 1次", "cat": "法令"}, {"no": 29, "section": "問1", "label": "問1(29)", "points": 3, "answer": "C", "stem": "道路運送車両法の自動車点検基準に照らし、「事業用自動車等の定期点検基準」のうち、３ヶ月ごとに行う走行装置の点検項目として、不適切なものはどれか。", "choices": {"A": "タイヤの状態", "B": "フロント・ホイール・ベアリングのガタ", "C": "ホイール・ナット及びホイール・ボルトの損傷", "D": "レベリングバルブの機能"}, "explanation": "ホイール・ナット・及びホイール・ボルトの損傷は、12ヶ月ごとの点検項目となる（3ヶ月ごとではない）。正解はC。", "source": "21年 1次", "cat": "法令"}, {"no": 30, "section": "問1", "label": "問1(30)", "points": 3, "answer": "D", "stem": "自動車点検基準に規定された事業用自動車等の定期点検基準のうち、３ヶ月ごとに行うエア・サスペンションの点検項目として、不適切なものはどれか。", "choices": {"A": "エア漏れ", "B": "ナックルの連結部のガタ", "C": "取付部及び連結部の緩み及び損傷", "D": "レベリングバルブの機能"}, "explanation": "事業用自動車等の定期点検基準（別表3）：レベリングバルブの機能点検は12ヶ月ごと（3ヶ月ごとではない）。正解はD。", "source": "21年 1次", "cat": "シャシ・フレーム"}, {"no": 5, "section": "問1", "label": "問1(5)", "points": 3, "answer": "C", "stem": "ＳＪＧ付デュトロのハイブリッドシステムの点検、整備に関する記述として、適切なものはどれか。", "choices": {"A": "ＨＶバッテリーがバッテリー上がりを起こした際には、専用の外部充電器で低電流を長時間流し続け、すべてのセルが満充電になるまで充電する。", "B": "後輪が接地した状態で牽引する際はギヤをＤレンジにするか、プロペラシャフトを外すなどモータージェネレーターが回転しないように牽引する。", "C": "整備時にはまずスターターキーをＯＦＦにしてからサービスプラグを取り外し、コンデンサーが放電するまで７分間待つ。その後、保護具を身に着け高電圧回路の作業を行う。", "D": "高電圧に関わる点検、整備を行うには、労働安全衛生法第５９条ならびに労働安全衛生規則第３６条により特別教育の受講が義務付けられている。"}, "explanation": "後輪が接地した状態で牽引する際はNレンジで行う。HVバッテリーは外部充電できないので交換が必要。保護具を装着してからサービスプラグ（高電圧部位）を抜く手順が正しい。Cの記述（キーOFF→サービスプラグ取り外し→7分待つ→保護具着用）が適切な手順。正解はC。", "source": "22年 1次", "cat": "法令"}, {"no": 6, "section": "問1", "label": "問1(6)", "points": 3, "answer": "D", "stem": "プロフィア（２０１４年モデル）ＣＨＶ車で冷凍機作動中の動きに関する記述として、不適切なものはどれか。", "choices": {"A": "アイドリング停車でＨＶバッテリーの残存容量が低い状態では、アイドルアップを行いＨＶバッテリーと電動冷凍ユニットの両方に電力を供給する。", "B": "減速中でＨＶバッテリーの残存容量が高い状態では、モータージェネレーターで発電を行い電動冷凍ユニットに電力を供給する。", "C": "減速中でＨＶバッテリーの残存容量が中間の状態では、ＨＶバッテリーと電動冷凍ユニットの両方に電力を供給する。", "D": "定速走行中でＨＶバッテリーの残存容量が中間状態では、ＨＶバッテリーと電動冷凍ユニットの両方に電力を供給する。"}, "explanation": "定速走行中で残存容量が中間状態では、電動冷凍機ユニットのみに供給している（HVバッテリーへは供給しない）。正解はD。", "source": "22年 1次", "cat": "HV"}, {"no": 7, "section": "問1", "label": "問1(7)", "points": 3, "answer": "A", "stem": "２＊G付きリエッセIIのオートマチックトランスミッション故障診断に関する記述として、不適切なものはどれか。", "choices": {"A": "エンジン始動後にシフトを「D」または「R」にしたときにエンジンが停止する場合、ロックアップ用ソレノイドの不良が考えられる。", "B": "シフトアップしない場合は、変速用ソレノイドの不良が考えられる。", "C": "シフトを「N」から「D」にしたときにシフトショックが大になる場合は、ニュートラルスタートスイッチの不良が考えられる。", "D": "ロックアップしない場合は、スピードセンサー（NT）系統の不良が考えられる。"}, "explanation": "シフトを「N」から「D」にしたときにシフトショックが大になる場合、油温度センサーまたはトランスミッションコントロールコンピューターの不良が考えられる（ニュートラルスタートスイッチではない）。正解はA。", "source": "22年 1次", "cat": "T/M"}, {"no": 8, "section": "問1", "label": "問1(8)", "points": 3, "answer": "C", "stem": "マニュアルトランスミッションの振動・騒音に関する記述として、不適切なものはどれか。", "choices": {"A": "ジャダは、クラッチを徐々につないでいく際にクラッチディスクの摩擦面で間欠的な滑りが生じ、エンジンからの伝達トルクが変動することで発生する。", "B": "車両発進時のジャダは、１０～２０Ｈｚの振動周波数でクラッチ伝達トルクの変動による振動である。", "C": "うなり音は、トランスミッションギヤのかみ合い率を小さくし、振動周波数を低くすることで低減することができる。", "D": "うなり音は、４００Ｈｚ～３ｋＨｚの振動周波数でトランスミッションギヤのかみ合いによる振動である。"}, "explanation": "うなり音は、トランスミッションギヤのかみ合い率を大きくし、振動周波数を高くすることで低減することができる（小さくして低くするは誤り）。正解はC。", "source": "22年 1次", "cat": "T/M"}, {"no": 9, "section": "問1", "label": "問1(9)", "points": 3, "answer": "C", "stem": "２＊Ｇ付プロフィアトラックのサスペンションを脱着する場合の注意事項に関する記述として、不適切なものはどれか。", "choices": {"A": "アクスルが前方にずれないようにドラムおよびローター部をトランスミッションジャッキなどで支え、浮かせないようにする。", "B": "スターターキーを必ず「ＬＯＣＫ」位置にしたのちレベリングタイマーを解除する。", "C": "車高センサー、リンクロッド、レベリングレバーの脱着作業のみ、必ず車高の初期設定を行う。", "D": "アッパーロッドは、組付け方向矢印が車両前方になるように取り付ける。"}, "explanation": "車高センサー、リンクロッド、レベリングレバーだけではなく、車高センサーブラケット、トルクロッドブラケットなどの取り外し作業を行ったときにも必ず車高の初期設定を行う。「脱着作業のみ」とするのが不適切。正解はC。", "source": "22年 1次", "cat": "T/M"}, {"no": 10, "section": "問1", "label": "問1(10)", "points": 3, "answer": "B", "stem": "プロシフト１２の『Ｐ０９０１』コードについて、その原因と考えられるものとして、不適切なものはどれか。", "choices": {"A": "ＡＣＵ内の油圧バルブ不良", "B": "シンクロスリーブスプラインチャンファー（面取り部）摩耗", "C": "ＡＣＵのモータ不良", "D": "クラッチ切れ不良"}, "explanation": "シンクロスリーブスプライン部の摩耗はギヤ抜けの要因となる（P0901コードの原因ではない）。P0901はクラッチブースタのストロークが指示通りにできなかった場合に検出するコード。正解はB。", "source": "22年 1次", "cat": "T/M"}, {"no": 11, "section": "問1", "label": "問1(11)", "points": 3, "answer": "D", "stem": "マニュアルトランスミッションの「チェンジレバーの操作が重い」という症状の要因として、不適切なものはどれか。", "choices": {"A": "インターロックピンの摺動不良", "B": "クラッチブースタのリレーピストン固着", "C": "セレクトユニットのリンク部の錆つき", "D": "シンクロスリーブスプライン部摩耗"}, "explanation": "セレクトユニット錆付きは変速制御の不具合につながり「チェンジレバーの操作が重い」の要因となりうる。シンクロスリーブスプライン部摩耗はギヤ抜けの要因であり、チェンジレバーが重い症状の要因ではない。正解はD。", "source": "22年 1次", "cat": "T/M"}, {"no": 12, "section": "問1", "label": "問1(12)", "points": 3, "answer": "C", "stem": "サスペンションに関する記述として、不適切なものはどれか。", "choices": {"A": "エアサスペンションは、荷重の増減に応じて、レべリングバルブやレベライザなどの働きにより荷台が一定の高さに保たれる。", "B": "リーフサスペンションやコイルスプリングは、ばねの硬さが一定で最大積載荷重に耐えられるよう設計されているので、軽荷重のときはばねが硬く感じる。", "C": "エアサスペンションは、荷重が小さくなれば、ばねが柔らかくなるので、振動数が増加して、乗り心地が悪くなる。", "D": "エアサスペンションは、荷重の増減に応じて、ばね定数を自動的に調整するため、荷重の増減に関係なく固有振動数を保つことができる。"}, "explanation": "エアサスペンションは荷重の増減に関わらず固有振動数を保つことができるため、乗り心地がよい。「振動数が増加して乗り心地が悪くなる」は不適切。正解はC。", "source": "22年 1次", "cat": "シャシ・フレーム"}, {"no": 13, "section": "問1", "label": "問1(13)", "points": 3, "answer": "A", "stem": "ステアリング装置に関する記述として、不適切なものはどれか。", "choices": {"A": "リンク機構は、ギヤ機構の動きをフロント・ホイールに伝えると共に、左右のフロント・ホイールの切れ角を同じにしている。", "B": "操作機構は、運転者の操舵をステアリング・ギヤ機構に伝える。", "C": "油圧式パワーステアリングには、ラック・ピニオン型、インテグラル型、リンケージ型がある。", "D": "ギヤ機構は、操舵力の方向を変えると共に、トルクを増大しステアリング・リンク機構に伝える。"}, "explanation": "リンク機構は、ギヤ機構の動きをフロント・ホイールに伝えると共に、左右のフロント・ホイールを一定の関係に保持し、旋回時に内側ホイールの切れ角を大きくしている（切れ角を同じにするのではない）。正解はA。", "source": "22年 1次", "cat": "シャシ・フレーム"}, {"no": 14, "section": "問1", "label": "問1(14)", "points": 3, "answer": "A", "stem": "２＊Ｇプロフィアのフレーム修理および修正に関する記述として、不適切なものはどれか。", "choices": {"A": "溶接する場合はウェブ部分への溶接は避け、フランジ部に溶接する。", "B": "補強材とサイドレールの結合は原則としてボルト締めで行う。", "C": "サイドレールには高張力鋼板を使用しているのでアンダーカット、オーバーラップおよびピンホールなどがないように溶接する。", "D": "サイド・メンバの片側だけに亀裂が発生した場合にも、強度上のアンバランスを防ぐ為、左右のサイド・メンバに同じような補強を施す。"}, "explanation": "フランジ部への溶接は避け、ウェブ部分に溶接する（フランジ部に溶接するのは不適切）。正解はA。", "source": "22年 1次", "cat": "一般関連"}, {"no": 15, "section": "問1", "label": "問1(15)", "points": 3, "answer": "A", "stem": "２＊Ｇ付プロフィアのブレーキ装置に関する記述として、不適切なものはどれか。", "choices": {"A": "エアドライヤーは、マルチプロテクションバルブ、減圧弁、エア低圧警報スイッチ、エアゲージセンサーを一体化したものを採用した。", "B": "バックアップバルブをアクスルモジュレーターに内蔵させることにより回路の簡素化および整備性が向上した。", "C": "法規対応のため、ブレーキ作動用エア圧を測定するテストコネクションをエアタンクとチャンバーに追加した。", "D": "アクスルモジュレーターのコネクターをＨＤＳＣＳ（Ｈｅａｖｙ Ｄｕｔｙ Ｓｅａｌｅｄ Ｃｏｎｎｅｃｔｏｒ Ｓｅｒｉｅｓ）化して、防水性および信頼性が向上した。"}, "explanation": "エアドライヤーとマルチプロテクションバルブを分離し、その間にウエットタンクを設置した（一体化ではない）。正解はA。", "source": "22年 1次", "cat": "ブレーキ"}, {"no": 16, "section": "問1", "label": "問1(16)", "points": 3, "answer": "A", "stem": "２＊Ｇ付レンジャーのＢＯＳ（ブレーキ優先制御）に関する記述として、適切なものはどれか。", "choices": {"A": "走行中にアクセルペダルが踏まれている状態で、ブレーキペダルが同時に操作され、ブレーキスイッチ２系統のどちらかがＯＮで作動する。", "B": "走行中にアクセルペダルが踏まれている状態で、ブレーキペダルが同時に操作され、車速が３０ｋｍ／ｈを超えていて、ブレーキスイッチ２系統の両方がＯＮで作動する。", "C": "走行中にアクセルペダルが踏まれている状態で、ブレーキペダルが同時に操作され、ブレーキスイッチ２系統の両方がＯＮで作動する。", "D": "走行中にアクセルペダルが踏まれている状態で、ブレーキペダルが同時に操作され、減速を検知すると作動する。"}, "explanation": "BOSはブレーキスイッチ2系統のどちらかがONで作動する。正解はA。", "source": "22年 1次", "cat": "ブレーキ"}, {"no": 17, "section": "問1", "label": "問1(17)", "points": 3, "answer": "B", "stem": "２ＤＧ付メルファのブレーキ装置に関する記述として、不適切なものはどれか。", "choices": {"A": "サービスブレーキには、空気油圧複合式ブレーキ(エアオーバーハイドロリックブレーキ)を採用している。", "B": "パーキングブレーキは、デュオサーボタイプで、トランスミッションの後端に取り付けられている。", "C": "ＡＢＳ－ＥＣＵは、ＡＢＳアクチュエーターに一体で取り付けられている。", "D": "リヤドラムブレーキは、デュアルツーリーディングブレーキを標準採用している。"}, "explanation": "パーキングブレーキはウェッジ式ホイールパーキングブレーキを採用している（デュオサーボタイプではない）。正解はB。", "source": "22年 1次", "cat": "T/M"}, {"no": 18, "section": "問1", "label": "問1(18)", "points": 3, "answer": "D", "stem": "デュトロ（２０１９年モデル）のＡＢＳに関する記述で、下記の「不具合の状況」と「不具合の推定原因」の組合せのうち、不適切なものはどれか。", "choices": {"A": "ブレーキの効きが悪い　→　エアの混入、車輪速センサー取付け不良、センサーローターの歯欠け、油圧漏れ", "B": "ブレーキが片効きする　→　左右片側の保持ソレノイドバルブが閉側に固着", "C": "ブレーキペダルのストロークが大きい　→　エアの混入、油圧漏れ", "D": "ＡＢＳ作動中にタイヤがロックする　→　当該ブレーキの減圧ソレノイドバルブが開側に固着"}, "explanation": "ABS作動中にタイヤがロックする場合は、減圧ソレノイドバルブが閉側に固着（減圧できずロック）が正しい原因。「開側に固着」では減圧し続けるのでロックしない。正解はD。", "source": "22年 1次", "cat": "ブレーキ"}, {"no": 19, "section": "問1", "label": "問1(19)", "points": 3, "answer": "A", "stem": "２＊Ｇ付のセレガのアクティブセーフティに関する記述として、不適切なものはどれか。", "choices": {"A": "スキャニングクルーズはＤＳＳ ＥＣＵで車間の制御を、それ以外を車両制御ＥＣＵで行っている。", "B": "車両逸脱警報はスキャニングクルーズと組み合わせることで、前方および左右方向を監視している。", "C": "ＶＳＣ ＥＣＵの横滑り軽減制御時は旋回外輪のブレーキ制御にて横滑りを抑制している。", "D": "多重通信システムではＩＰＳ採用したことにより、負荷側の断線及びヒューズ切れを検出可能にしている。"}, "explanation": "多重通信システムではIPS採用により、負荷側のショート及びヒューズ切れを検出可能にしている（断線ではなくショート）。正解はA。", "source": "22年 1次", "cat": "ブレーキ"}, {"no": 20, "section": "問1", "label": "問1(20)", "points": 3, "answer": "B", "stem": "２＊Ｇ付プロフィアのヒーター＆エアコンディショナーに関する記述として、不適切なものはどれか。", "choices": {"A": "日射補正制御は、日差しが強い場合にはブロワースピードを上げ、日差しが弱い場合にはブロワースピードを下げて制御する。", "B": "ブロワー遅動制御は、内気温度センサーの検出温度によって制御を行い、センターレジスターからの熱風の吹き出しを防止している。", "C": "ブロワー起動制御とは、ブロワーモーター起動時に、モーター保護のため２秒間風量を「２」に固定する。", "D": "暖気と冷気を混合し、温度コントロールを行うことのできるフルエアミックス方式を採用している。"}, "explanation": "ブロワー遅動制御は、エバポレーター後センサーの検出温度で制御している（内気温度センサーではない）。正解はB。", "source": "22年 1次", "cat": "電気装置"}, {"no": 21, "section": "問1", "label": "問1(21)", "points": 3, "answer": "D", "stem": "ＣＡＮ通信システムに関する記述として、不適切なものはどれか。", "choices": {"A": "異常が発生した場合は、メーター上のディスプレイなどで異常発生の警告を行う。", "B": "DXの故障診断には通信異常の検知などが組み込まれ、CAN通信システムとECUごとにDTCが設定されている。", "C": "通信規格は決められているが細部の仕様は各メーカー仕様のシステムが採用されている。", "D": "サーキットテスタによる点検では通信線の断線や短絡の確認が不可能であるのでオシロスコープなどを用いた波形観測が必ず必要になる。"}, "explanation": "サーキットテスタによる断線や短絡の確認は可能（オシロスコープが必ず必要というわけではない）。正解はD。", "source": "22年 1次", "cat": "電気装置"}, {"no": 23, "section": "問1", "label": "問1(23)", "points": 3, "answer": "A", "stem": "鋳鉄の記述として、不適切なものはどれか。", "choices": {"A": "合金鋳鉄は、球状黒鉛鋳鉄にクロム、モリブデン、ニッケルなどの金属を一種類または数種類加えて強度や耐摩耗性などを向上させたものである。", "B": "鋳鉄は、鋳物を作るのに適している。", "C": "球状黒鉛鋳鉄は、普通鋳鉄に含まれる黒鉛を球状化し、強度や耐摩耗性などを向上させたものである。", "D": "鋳鉄は鋼に比べて耐摩耗性に優れているが、一般的に衝撃に弱い。"}, "explanation": "合金鋳鉄は球状黒鉛鋳鉄ではなく、普通鋳鉄にクロム、モリブデン、ニッケルなどを加えたもの。正解はA。", "source": "22年 1次", "cat": "一般関連"}, {"no": 24, "section": "問1", "label": "問1(24)", "points": 3, "answer": "C", "stem": "安全作業の基本として、不適切なものはどれか。", "choices": {"A": "安全で正確な作業は整理整頓された環境で生まれるので、通路に工具や部品を直接置かない。", "B": "グラインダー作業時は、保護めがね、革手袋、防塵マスクを必ず着用する。", "C": "ホイスト作業時にワイヤーの吊り角が小さくなるとワイヤーにかかる力は大きくなるので、ワイヤーを丈夫なものにしなければならない。", "D": "ジャッキアップ時は、リジッドラックで車両を確実に支えてから作業を開始する。"}, "explanation": "吊り角が大きくなるとかかる力も大きくなる（小さくなると力は小さくなる）。正解はC。", "source": "22年 1次", "cat": "一般関連"}, {"no": 25, "section": "問1", "label": "問1(25)", "points": 3, "answer": "D", "stem": "メンテナンスノートで定めている、事業用自動車の厳しい使われ方（シビアコンディション時）に関する記述として、不適切なものはどれか。", "choices": {"A": "悪路（凸凹路、砂利道、未舗装路等）、雪道、多塵地帯の走行が走行距離の３０％以上。", "B": "山道、登降坂道が走行距離の３０％以上。", "C": "発進・停止の繰り返しが多い、もしくは低速走行が走行距離の３０％以上。", "D": "走行距離が目安として１５，０００ｋｍ／月以上。"}, "explanation": "走行距離が多い場合の目安は10,000km/月以上（15,000km/月以上ではない）。正解はD。", "source": "22年 1次", "cat": "一般関連"}, {"no": 26, "section": "問1", "label": "問1(26)", "points": 3, "answer": "B", "stem": "２＊Ｇ付セレガのスキャニングクルーズが自動的に一時解除されるケースに関する記述について、不適切なものはどれか。", "choices": {"A": "補助ブレーキを作動させたとき。", "B": "車速が３５ｋｍ／ｈ未満になったとき。", "C": "運転席のシートベルトを外したとき。", "D": "ワイパーをLOにしたとき。"}, "explanation": "ワイパーをHIにしたときに一時解除される（LOではない）。正解はB。", "source": "22年 1次", "cat": "ブレーキ"}, {"no": 27, "section": "問1", "label": "問1(27)", "points": 3, "answer": "B", "stem": "「道路運送車両法」に照らし、長さ４．６５ｍ、幅１．７２ｍ、高さ１．６７ｍで原動機の総排気量が１．９９Ｌのディーゼルエンジンの自動車の種別として、適切なものはどれか。", "choices": {"A": "小型自動車", "B": "普通自動車", "C": "大型特殊自動車", "D": "軽自動車"}, "explanation": "小型自動車は長さ4.7m以下、幅1.7m以下、高さ2.0m以下、総排気量2.0L以下（ディーゼルは適用除外）。出題の車両は全幅1.72mが規定の1.7mを超えており、種別は普通自動車となる。正解はB。", "source": "22年 1次", "cat": "法令"}, {"no": 28, "section": "問1", "label": "問1(28)", "points": 3, "answer": "B", "stem": "電子制御装置整備対象車両のフロントガラス交換作業を、自社（電子制御装置整備の認証を受けている指定工場）の構内外注となるガラス修理業者が自社工場にて作業を行う場合についての記述として、不適切なものはどれか。", "choices": {"A": "自社の責任下で作業が行われることが明確にされていれば、ガラス修理業者は自動車整備士資格は持たなくとも特定整備事業者の資格が必要である。", "B": "電子制御装置点検整備作業場について、他の整備事業者の電子制御装置点検整備作業の共用を可能とし、その場所で電子制御装置点検作業以外の従来の分解整備を行うことはできない。", "C": "指定自動車整備事業者について、電子制御装置整備に係る特定整備事業の認証を受けていない場合は、その整備の保安基準適合証を交付することはできない。", "D": "一定の条件を満たせば４年間（令和６年３月３１日まで）の経過措置期間が認められている。"}, "explanation": "自社の責任下で作業が行われることが明確にされていれば、ガラス修理業者は自動車整備士資格も特定整備事業者資格も不要。正解はB。", "source": "22年 1次", "cat": "法令"}, {"no": 29, "section": "問1", "label": "問1(29)", "points": 3, "answer": "B", "stem": "事業用自動車の定期点検基準に関する記述として、不適切なものはどれか。", "choices": {"A": "ファンベルトの緩み及び損傷は３ヵ月ごと", "B": "バッテリーターミナル部の接続状態は６ヵ月ごと", "C": "ショックアブソーバーの油漏れ及び損傷は３ヵ月ごと", "D": "ホイールボルト、ナットの緩みは３ヵ月ごと"}, "explanation": "バッテリーターミナル部の接続状態は3ヵ月ごと（6ヵ月ごとではない）。正解はB。", "source": "22年 1次", "cat": "一般関連"}, {"no": 30, "section": "問1", "label": "問1(30)", "points": 3, "answer": "C", "stem": "「道路運送車両の保安基準」に照らし、灯火の基準に関する記述として、不適切なものはどれか。", "choices": {"A": "すれ違い用前照灯は、その照明部の最外縁が自動車の最外側から４００ｍｍ以内となるよう取り付けられていること。", "B": "車幅灯の照明部の最外縁は、自動車の最外側から４００ｍｍ以内となるよう取り付けられていること。", "C": "後退灯は、その照明部の最外縁が自動車の最外側から４００ｍｍ以内となるよう取り付けられていること。", "D": "尾灯は、最外側にあるものの照明部の最外縁は、自動車の最外側から４００ｍｍ以内となるよう取り付けられていること。"}, "explanation": "後退灯には最外側から400mm以内の規定はない（前照灯・車幅灯・尾灯には規定あり）。正解はC。", "source": "22年 1次", "cat": "法令"}, {"no": 5, "section": "問1", "label": "問1(5)", "points": 3, "answer": "B", "stem": "２＊Ｇ付ＣＨＶ（クールハイブリッド）車に関する記述として、不適切なものはどれか。", "choices": {"A": "スタンバイ機能が標準装備され、外部電源が使用可能な場所ではエンジン停止中でも上物の駆動が可能である。", "B": "モータージェネレータは始動および車両駆動、回生と発電に使用している。", "C": "車両減速エネルギーおよびエンジン動力によりモータージェネレーターで発電し、電動冷凍機への電力を供給する。", "D": "ＨＶバッテリーの電力を電動冷凍機へ供給することにより燃料消費を低減している。ただし、エンジン停止時はハイブリッドシステムは使用できない。"}, "explanation": "モータージェネレータは始動および車両駆動には使用していない（回生と発電のみ）。正解はB。", "source": "23年 1次", "cat": "HV"}, {"no": 6, "section": "問1", "label": "問1(6)", "points": 3, "answer": "C", "stem": "小型トラックのハイブリッドシステムのシステムメインリレー（ＳＭＲ１～３）回路に関する次の文章の(イ)～（ホ）にあてはまる語句の組み合わせとして、適切なものはどれか。\n\n「高電圧回路の電源を接続するとき、インバーターコントロール回路は、まずＳＭＲ（イ）をＯＮして、その後ＳＭＲ（ロ）をＯＮ、ＳＭＲ（ハ）をＯＦＦしている。こうして接続直後はプリチャージレジスターを（ニ）電流を流して（ホ）している。」", "choices": {"A": "(イ)２　(ロ)３　(ハ)２　(ニ)通さず高い　(ホ)システムを起動しやすく", "B": "(イ)２と３　(ロ)１　(ハ)２　(ニ)通さず高い　(ホ)システムを起動しやすく", "C": "(イ)１と２　(ロ)３　(ハ)１　(ニ)通した制限　(ホ)高電圧の突入電流から回路を保護", "D": "(イ)１　(ロ)２と３　(ハ)１　(ニ)通した制限　(ホ)高電圧の突入電流から回路を保護"}, "explanation": "SMR1と2をONして、その後SMR3をON、SMR1をOFF。プリチャージレジスターを通した制限電流で高電圧の突入電流から回路を保護する。正解はC。", "source": "23年 1次", "cat": "HV"}, {"no": 7, "section": "問1", "label": "問1(7)", "points": 3, "answer": "A", "stem": "２＊Ｇ付きリエッセIIのオートマチックトランスミッション故障診断に関する記述として、不適切なものはどれか。", "choices": {"A": "シフトを「Ｎ」から「Ｄ」にしたときにシフトショックが大きくなる場合は、ニュートラルスタートスイッチの不良が考えられる。", "B": "シフトアップしない場合は、変速用ソレノイドの不良が考えられる。", "C": "エンジン始動後、シフトを「Ｄ」または「Ｒ」にしたときにエンジンが停止する場合、ロックアップ用ソレノイドの不良が考えられる。", "D": "ロックアップしない場合は、スピードセンサー（ＮＴ）系統の不良が考えられる。"}, "explanation": "シフトを「N」から「D」にしたときにシフトショックが大きくなる場合は、油温センサーまたはトランスミッションコントロールコンピューターの不良が考えられる（ニュートラルスタートスイッチではない）。正解はA。", "source": "23年 1次", "cat": "T/M"}, {"no": 8, "section": "問1", "label": "問1(8)", "points": 3, "answer": "D", "stem": "２＊Ｇ付プロフィアのプロシフト１２において、クラッチ学習ができない時の対処や説明に関する記述として、不適切なものはどれか。", "choices": {"A": "クラッチストロークが正常で、エンジンをかけ、クラッチペダルを踏み込んだとき、データーモニター「カウンタシャフト回転センサ回転数」の値がゼロにならない場合、オートクラッチユニットの異常が考えられる。", "B": "クラッチストロークセンサーのロッドに曲がりがあれば、ストロークセンサーAｓｓｙを交換する。", "C": "クラッチ接続特性学習を行う「Ｄ」⇔「０」学習は、エアコン作動中、暖房中、長時間アイドル中、ＤＰＲ再生中といったときにはエンジンの負荷が大きく、クラッチ学習が正常にできない場合がある。", "D": "クラッチストロークセンサーのデータモニタ値が基準値以下であることが確認できた場合、油圧エア抜きを実施し、エア配管も正常であれば、クラッチブースターやオートクラッチユニットの異常が考えられる。"}, "explanation": "クラッチストロークセンサーのデータモニタ値が基準値以下の場合、油圧エア抜きを実施してエア配管も正常であれば、クラッチ本体の異常が考えられる（クラッチブースターやオートクラッチユニットではない）。正解はD。", "source": "23年 1次", "cat": "T/M"}, {"no": 9, "section": "問1", "label": "問1(9)", "points": 3, "answer": "A", "stem": "マニュアルトランスミッションの「チェンジレバーの操作が重い」という症状の推定原因として、不適切なものはどれか。", "choices": {"A": "シンクロスリーブスプライン部摩耗", "B": "サイレンサーパッドの摩耗", "C": "インターロックピンの摺動不良", "D": "クリップバンドの遊び"}, "explanation": "シンクロスリーブスプライン部の摩耗はギヤ抜けの要因となる（チェンジリング異音の原因ではない）。正解はA。", "source": "23年 1次", "cat": "T/M"}, {"no": 10, "section": "問1", "label": "問1(10)", "points": 3, "answer": "B", "stem": "マニュアルトランスミッションの「チェンジレバーの操作が重い」という症状の推定原因として、不適切なものはどれか。", "choices": {"A": "クラッチ切れ不良", "B": "キャンバー（スプリング）のへたり", "C": "シンクロスリーブスプラインチャンファー（面取り部）摩耗", "D": "クラッチストロークセンサーの異常"}, "explanation": "キャンバー（スプリング）のへたりは乗り心地の悪化につながるが、チェンジレバーの操作が重い原因ではない。正解はB。", "source": "23年 1次", "cat": "T/M"}, {"no": 11, "section": "問1", "label": "問1(11)", "points": 3, "answer": "A", "stem": "２＊Ｇ付プロフィアのエアサスペンション車のファイングリップ、および非常走行装置の機能に関する記述として、不適切なものはどれか。", "choices": {"A": "ファイングリップスイッチが「ＯＮ」の場合、インジケーターランプ（緑色）が点灯するとともにファイングリップが作動し、後後軸重が増加する。", "B": "ファイングリップスイッチが「ＯＮ」でエアサス非常走行スイッチが「ＯＮ」の場合、非常走行装置が作動する。", "C": "積載量は、エアスプリングに取り付けられた圧力センサーがエアスプリング内の空気圧を検出し、エアサスペンションＥＣＵが演算する。", "D": "ファイングリップスイッチを「ＯＦＦ」にすることにより、ファイングリップの作動を解除することができる。"}, "explanation": "ファイングリップスイッチが「ON」の場合、インジケーターランプ（緑色）が点灯するとともにファイングリップが作動し、後前軸重が増加する（後後軸重ではない）。正解はA。", "source": "23年 1次", "cat": "シャシ・フレーム"}, {"no": 12, "section": "問1", "label": "問1(12)", "points": 3, "answer": "B", "stem": "サスペンションに関する記述として、不適切なものはどれか。", "choices": {"A": "エアサスペンションは、荷重の増減に応じてレベリングバルブやレベライザなどの働きにより荷台が一定の高さに保たれる。", "B": "エアサスペンションは、荷重が小さくなれば、バネが柔らかくなるので振動数が増加して、乗り心地が悪くなる。", "C": "リーフサスペンションやコイルスプリングは、バネの硬さが一定で最大積載荷重に耐えられるよう設計されているので、軽荷重のときはバネが硬く感じる。", "D": "エアサスペンションは、荷重の増減に応じてバネ定数を自動的に調整するため、荷重の増減に関係なく固有振動数を保つことができる。"}, "explanation": "エアサスペンションは荷重の増減に応じてばね定数を自動的に調整するため、荷重の増減に関係なく固有振動数を保てるため乗り心地がよい。「振動数が増加して乗り心地が悪くなる」は誤り。正解はB。", "source": "23年 1次", "cat": "シャシ・フレーム"}, {"no": 13, "section": "問1", "label": "問1(13)", "points": 3, "answer": "A", "stem": "２＊Ｇ付プロフィアに搭載される、ＭＺ１２トランスミッションに関する記述として、不適切なものはどれか。", "choices": {"A": "トルクコンバーター付きオートマチックトランスミッションにあるクリープ現象を実現した。", "B": "アクセルペダルを踏み込むことにより、１２速～８速で走行中に、走行状態に応じて１１速～７速にシフトダウンする、キックダウン変速ができるようになった。", "C": "プロシフトのシステムに何らかの異常が発生した場合でも、車両を安全な場所へ移動できるように非常コントロール機能を設定している。", "D": "オートシフトダウン機能により運転状況に応じて１２速～８速間でシフトダウンが行われ、大きな制動力を得ることができる。"}, "explanation": "トルクコンバーター付きオートマチックトランスミッションにあるクリープ現象はない（MZ12はAMTであり、クリープ現象は実現していない）。正解はA。", "source": "23年 1次", "cat": "T/M"}, {"no": 14, "section": "問1", "label": "問1(14)", "points": 3, "answer": "B", "stem": "ステアリング装置に関する記述として、不適切なものはどれか。", "choices": {"A": "操作機構は、運転者の操舵をステアリング・ギヤ機構に伝える。", "B": "リンク機構は、ギヤ機構の動きをフロント・ホイールに伝えると共に、左右のフロント・ホイールの切れ角を同じにしている。", "C": "ギヤ機構は、操舵力の方向を変えると共に、トルクを増大しステアリング・リンク機構に伝える。", "D": "油圧式パワーステアリングには、ラック・ピニオン型、インテグラル型、リンケージ型がある。"}, "explanation": "リンク機構は、ギヤ機構の動きをフロント・ホイールに伝えると共に、左右のフロント・ホイールを一定の関係に保持し、旋回時に内側ホイールの切れ角を大きくしている（切れ角を同じにするのではない）。正解はB。", "source": "23年 1次", "cat": "シャシ・フレーム"}, {"no": 15, "section": "問1", "label": "問1(15)", "points": 3, "answer": "B", "stem": "ドラムブレーキ及びディスクブレーキの不具合に関する記述として、不適切なものはどれか。", "choices": {"A": "ブレーキの引きずりが発生している場合の原因として、各ブレーキ装置の戻り不良が考えられる。", "B": "ブレーキジャダが発生している場合の原因として、パッド／ライニングの鏡面化が考えられる。", "C": "スキール音が発生している場合の原因として、パッド／ライニングの当たり具合、バックプレートの共振が考えられる。", "D": "ブレーキの片効きが発生している場合の原因として、リーフスプリングのセンターボルト緩みが考えられる。"}, "explanation": "センターボルトの緩みは片効きの原因となる。鏡面化は「鳴き（スキール音）」の原因になる（ジャダの原因ではない）。正解はB。", "source": "23年 1次", "cat": "T/M"}, {"no": 16, "section": "問1", "label": "問1(16)", "points": 3, "answer": "A", "stem": "２＊Ｇ付レンジャーのＢＯＳ（ブレーキ優先制御）に関する記述として、適切なものはどれか。", "choices": {"A": "走行中にアクセルペダルが踏まれている状態で、ブレーキペダルが同時に操作され、ブレーキスイッチ２系統のどちらかがＯＮで作動する。", "B": "走行中にアクセルペダルが踏まれている状態で、ブレーキペダルが同時に操作され、ブレーキスイッチ２系統の両方がＯＮで作動する。", "C": "走行中にアクセルペダルが踏まれている状態で、ブレーキペダルが同時に操作され、減速を検知すると作動する。", "D": "走行中にアクセルペダルが踏まれている状態で、ブレーキペダルが同時に操作され、車速が３０ｋｍ／ｈを超えていて、ブレーキスイッチ２系統の両方がＯＮで作動する。"}, "explanation": "BOSは「走行中にアクセルペダルが踏まれている状態でブレーキペダルが同時に操作され、ブレーキスイッチ2系統のどちらかがONで作動する」が正しい。正解はA。", "source": "23年 1次", "cat": "ブレーキ"}, {"no": 17, "section": "問1", "label": "問1(17)", "points": 3, "answer": "A", "stem": "２＊Ｇ付プロフィアのディスクブレーキに関する記述として、不適切なものはどれか。", "choices": {"A": "対向ピストン式キャリパーが採用されている。", "B": "ローターは、前後ともベンチレーテッドタイプを採用している。", "C": "ディスクブレーキは、一部の車型にオプションとして装着される。", "D": "ブレーキチャンバーの形状は、ドラムブレーキ用と異なる。"}, "explanation": "ディスクブレーキは、ピンスライド式キャリパーを採用している（対向ピストン式ではない）。正解はA。", "source": "23年 1次", "cat": "ブレーキ"}, {"no": 18, "section": "問1", "label": "問1(18)", "points": 3, "answer": "A", "stem": "ＡＳＲの制御に関する記述として、不適切なものはどれか。", "choices": {"A": "タイヤと路面間の摩擦力の変化に対応して、ブレーキ作動中の車両の安定性を確保している。", "B": "駆動輪の駆動力を維持することにより、加速時の尻振りを防止している。", "C": "一方の駆動輪が空転を始めスリップ率の限界値を超えると、ただちにスリップをしている車輪にブレーキをかける。", "D": "車両が走行を開始すると左右の駆動輪の車輪速度が常に前輪と比較、監視される。"}, "explanation": "タイヤと路面間の摩擦力の変化に対応して車両の安定性を確保するのはABS（アンチロックブレーキシステム）の説明。ASRは加速時の駆動輪の空転を防止するシステム。正解はA。", "source": "23年 1次", "cat": "ブレーキ"}, {"no": 20, "section": "問1", "label": "問1(20)", "points": 3, "answer": "C", "stem": "２＊Ｇ付プロフィアのＡＤＢシステムに関する記述として、不適切なものはどれか。", "choices": {"A": "プロジェクターレンズに搭載されたＬＥＤを点灯／消灯／調光している。", "B": "常時、画像センサーで前方車両位置を検出しているため、相対位置が変わっても遮光範囲を追従可能となっている。", "C": "ミリ波レーダーセンサーで対向車のヘッドライト、先行者のテールライト位置を検出している。", "D": "協調システムデバイスからの信号を基にヘッドライトのハイビーム配光を制御している。"}, "explanation": "対向車のヘッドライトや先行者のテールライト位置を検出するのは画像センサー（ミリ波レーダーセンサーではない）。正解はC。", "source": "23年 1次", "cat": "電気装置"}, {"no": 22, "section": "問1", "label": "問1(22)", "points": 3, "answer": "B", "stem": "ＣＡＮ通信システムに関する記述として、不適切なものはどれか。", "choices": {"A": "異常が発生した場合は、メーター上のディスプレイなどで異常発生の警告を行う。", "B": "サーキットテスタによる点検では通信線の断線や短絡の確認が不可能なので、オシロスコープなどを用いた波形観測が必ず必要になる。", "C": "ＤＸの故障診断には通信異常の検知などが組み込まれ、ＣＡＮ通信システムとＥＣＵごとにＤＴＣが設定されている。", "D": "通信規格は決められているが細部の仕様は各メーカー仕様のシステムが採用されている。"}, "explanation": "サーキットテスタによる断線や短絡の確認は可能（オシロスコープが「必ず必要」は不正確）。正解はB。", "source": "23年 1次", "cat": "電気装置"}, {"no": 23, "section": "問1", "label": "問1(23)", "points": 3, "answer": "B", "stem": "安全作業の基本として、不適切なものはどれか。", "choices": {"A": "安全で正確な作業は整理整頓された環境で生まれるので、通路に工具や部品を直接置かない。", "B": "ホイスト作業時にワイヤーの吊り角が小さくなるとワイヤーにかかる力は大きくなるので、ワイヤーを丈夫なものにしなければならない。", "C": "グラインダー作業時は、保護めがね、革手袋、防塵マスクを必ず着用する。", "D": "ジャッキアップ時は、リジッドラックで車両を確実に支えてから作業を開始する。"}, "explanation": "吊り角が大きくなるとワイヤーにかかる力も大きくなる（吊り角が小さくなると力は小さくなる）。正解はB。", "source": "23年 1次", "cat": "一般関連"}, {"no": 24, "section": "問1", "label": "問1(24)", "points": 3, "answer": "A", "stem": "出張作業時の安全に関する記述として、不適切なものはどれか。", "choices": {"A": "故障車後方５０ｍ未満の場所に発炎筒を設置する。", "B": "路上作業時は、サービスカーを故障車の後ろに停止する。サービスカーとの車間距離は最低２０ｍ以上離す。", "C": "夜間路上作業時は、発炎筒、三角停止板、安全コーン、黄色回転灯、蛍光ベスト（反射テープ付）を使用する。", "D": "路上作業で安全確認、誘導要員が必要と予測される場合は、必ず２人以上で行く。"}, "explanation": "故障車後方100ｍ以上の場所に発炎筒を設置する（50m未満は不適切）。正解はA。", "source": "23年 1次", "cat": "一般関連"}, {"no": 25, "section": "問1", "label": "問1(25)", "points": 3, "answer": "D", "stem": "排出ガスに関する記述として、適切なものはどれか。", "choices": {"A": "ディーゼルエンジンは空気過剰率が大きいため、ＣＯの発生は極めて多い。", "B": "ディーゼルエンジンは十分な空気の中で燃焼が行われるため、ＨＣの発生は多い。", "C": "排出ガス中におけるＮＯｘは主にＮＯとＯ２である。", "D": "サルフェートとは、燃焼中の硫黄分が酸化して生成された硫黄化合物の総称である。"}, "explanation": "A:ディーゼルはCOの発生は極めて少ない。B:HCの発生は少ない。C:NOxは主にNOとNO2（O2ではない）。D:サルフェートは硫黄化合物の総称で適切。正解はD。", "source": "23年 1次", "cat": "エンジン"}, {"no": 26, "section": "問1", "label": "問1(26)", "points": 3, "answer": "A", "stem": "２＊Ｇ付レンジャー（２０２１年モデル）に関する記述として、不適切なものはどれか。", "choices": {"A": "ＳＡＭＳは、コーナーレーダーセンサーで進路上を交差する移動物を検知し、衝突の恐れがあれば自動でブレーキを作動させる。", "B": "ＰＣＳは、レーダーセンサーと画像センサーにより衝突物が検知され、衝突の恐れがあれば自動でブレーキを作動させる。", "C": "ＥＤＳＳは、ドライバーモニターIIと車線逸脱警報装置によりドライバーの異常を検知し、自動でブレーキを作動させる。", "D": "ドライバーモニターIIは、ドライバーが正常でない状態を検知するとＰＣＳと連動して衝突の恐れがある場合に自動でブレーキを作動させる。"}, "explanation": "サイトアラウンドモニターシステム（SAMS）は警報のみで、自動ブレーキは作動しない。正解はA。", "source": "23年 1次", "cat": "ブレーキ"}, {"no": 27, "section": "問1", "label": "問1(27)", "points": 3, "answer": "B", "stem": "「道路運送車両法」に照らし、長さ４．６５ｍ、幅１．７２ｍ、高さ１．６７ｍで原動機の総排気量が１．９９ℓのディーゼルエンジンの自動車の種別として、適切なものはどれか。", "choices": {"A": "軽自動車", "B": "普通自動車", "C": "小型自動車", "D": "大型特殊自動車"}, "explanation": "小型自動車は長さ4.7m以下、幅1.7m以下、高さ2.0m以下。総排気量は2.0L以下だが、ディーゼル車は適応除外。しかし、出題の車両は全幅1.72mが規定の1.7mを超えており、種別は普通自動車となる。正解はB。", "source": "23年 1次", "cat": "法令"}, {"no": 28, "section": "問1", "label": "問1(28)", "points": 3, "answer": "A", "stem": "「道路運送車両の保安基準」及び「道路運送車両の保安基準の細目を定める告示」に照らし、自動車の長さ、幅及び高さを測定（２０１８年製作車両）する場合の自動車の状態に関する記述として、不適切なものはどれか。", "choices": {"A": "車体外に取り付けられた後写鏡、後方等確認装置、保安基準第４４条第５項の装置（アンダミラー、サイドアンダーミラー等）及びたわみ式アンテナについては、これらの装置を取り付けた状態とする。", "B": "はしご自動車のはしご、架線修理自動車のやぐら、その他走行中に格納されているものについては、これらの装置を格納した状態とする。", "C": "折畳式のほろ、工作自動車の起重機、その他走行中に種々の状態で使用されるものについては、走行中使用されるすべての状態とする。", "D": "空車状態とする。"}, "explanation": "後写鏡、後方等確認装置、アンダミラー、サイドアンダーミラー等及びたわみ式アンテナは、外した状態とする（取り付けた状態ではない）。正解はA。", "source": "23年 1次", "cat": "法令"}, {"no": 29, "section": "問1", "label": "問1(29)", "points": 3, "answer": "C", "stem": "道路運送車両法及び指定自動車整備事業規則に照らし、保安基準適合証の有効期限に関する記述として、適切なものはどれか。", "choices": {"A": "検査した日から１５日間となっている。", "B": "検査した日から３０日間となっている。", "C": "交付した日から１５日間となっている。", "D": "交付した日から３０日間となっている。"}, "explanation": "道路運送車両法第94条の5に基づき、保安基準適合証の有効期限は交付した日から15日間。正解はC。", "source": "23年 1次", "cat": "法令"}, {"no": 30, "section": "問1", "label": "問1(30)", "points": 3, "answer": "D", "stem": "「道路運送車両の保安基準」に照らし、灯火の基準に関する記述として、不適切なものはどれか。", "choices": {"A": "すれ違い用前照灯は、その照明部の最外縁が自動車の最外側から４００ｍｍ以内となるよう取り付けられていること。", "B": "車幅灯の照明部の最外縁は、自動車の最外側から４００ｍｍ以内となるよう取り付けられていること。", "C": "尾灯は、最外側にあるものの照明部の最外縁は、自動車の最外側から４００ｍｍ以内となるよう取り付けられていること。", "D": "後退灯は、その照明部の最外縁が自動車の最外側から４００ｍｍ以内となるよう取り付けられていること。"}, "explanation": "後退灯には最外側から400mm以内の取り付け規則はない（前照灯、車幅灯、尾灯には規定あり）。正解はD。", "source": "23年 1次", "cat": "法令"}, {"no": 2, "section": "問1", "label": "問1(2)", "points": 3, "answer": "C", "stem": "エンジン及び後処理装置の制御に関する記述として、不適切なものはどれか。", "choices": {"A": "コモンレール圧力のフィードバック制御では、エンジン回転数などからエンジンECUが目標圧力を算出し、実際のコモンレール圧力はセンサーで測定することで、目標と実を比較しており、これに差がある場合に、エンジンECUはその差分に対応するフィードバック制御を実施する。", "B": "インジェクタの油圧ピストンはノズルニードルと連動しており、制御室には燃料の流入及び流出のオリフィスがある。", "C": "非噴射時の油圧ピストンは、制御室の出口オリフィスが開いているため、制御室の燃料が流出し、ノズルニードルは押し上げられている。", "D": "DPRのスス堆積量は、エンジン回転数と噴射量から算出されており、堆積量が自動再生域に達すると再生を開始する。その後にDPRフィルター温度が規定値に達するとススの燃焼量の計算を開始し、堆積量の算出は継続しつつ、燃焼量値が堆積量値と一致すると再生を終了する。"}, "explanation": "非噴射時は、出口オリフィスを閉じて制御室に燃料を流入させ、ノズルニードルを押し下げている（押し上げではない）。正解はC。", "source": "24年 1次", "cat": "エンジン"}, {"no": 4, "section": "問1", "label": "問1(4)", "points": 3, "answer": "A", "stem": "2＊G付ブルーリボンハイブリッド（HL2A）のハイブリッドシステムに関する記述として、不適切なものはどれか。", "choices": {"A": "モーター発進は、発進から2段先への変速までモーター発進をする。", "B": "モーター発進は、発進からアイドリング回転数付近までモーター発進をする。", "C": "モーター走行時、エンジンはアイドリング回転で待機している。", "D": "Dレンジで発進した場合は、HVバッテリー残存容量に応じて発進方法が自動的に切り替わる。"}, "explanation": "モーター発進時は、2段先ではなく次の段（1段先）までモーター発進を行う。正解はA。", "source": "24年 1次", "cat": "HV"}, {"no": 6, "section": "問1", "label": "問1(6)", "points": 3, "answer": "C", "stem": "2＊G付プロフィア（2019年モデル）のハイブリッドに関する記述として、不適切なものはどれか。", "choices": {"A": "HV-ECUが各種センサーの信号から、アイドルストップ条件が成立したと判断すると、エンジンを停止させる。", "B": "HVモーターは電気式リターダーとして働き、車両の運動エネルギーを電気エネルギーに変換しながらブレーキアシストを行う。", "C": "定常走行時に負荷が低いときは、エンジンを停止させHVモーターのみで走行する。", "D": "3D地図情報などをもとにルート上の勾配を先読みし、走行負荷を予測して最適なハイブリッド制御を行っている。"}, "explanation": "HVモーターで走行している際は、補器類の駆動のためエンジンはアイドル回転で待機する（エンジン停止はしない）。正解はC。", "source": "24年 1次", "cat": "HV"}, {"no": 7, "section": "問1", "label": "問1(7)", "points": 3, "answer": "A", "stem": "2023年モデルプロフィアのプロシフト12（M112）のオートシフトダウン機能に関する記述として、不適切なものはどれか。", "choices": {"A": "オートシフトダウン機能は12速から9速の間でシフトダウンを行う。", "B": "オートシフトダウン機能とは、補助ブレーキのコントロールレバーをオートシフトダウン作動位置に操作した時に自動的にシフトダウンを行い、エンジンリターダー力を増幅する機能。", "C": "オートシフトダウンの作動条件はギア位置が9速以上で走行し、エンジン回転数がオートシフトダウンを実施できる状態にあり、かつ、アクセルをオフすると実施される。", "D": "オートシフトダウン機能はアクセルを踏む、もしくはクラッチを踏むことで解除される。"}, "explanation": "オートシフトダウン機能は12速から8速の間でシフトダウンを行う（9速ではなく8速）。正解はA。", "source": "24年 1次", "cat": "T/M"}, {"no": 8, "section": "問1", "label": "問1(8)", "points": 3, "answer": "B", "stem": "オートマチックトランスミッションにおいて、変速時ショックが大きい場合に考えられる不具合原因として、不適切なものはどれか。", "choices": {"A": "ATのクラッチ、ブレーキなどの作動不良", "B": "アイドル回転速度が高すぎる", "C": "ラインプレッシャーが高すぎる", "D": "コントロールバルブの不良"}, "explanation": "アイドル回転速度が高すぎることは、変速時ショック大きいの不具合推定原因として該当しない。正解はB。", "source": "24年 1次", "cat": "T/M"}, {"no": 9, "section": "問1", "label": "問1(9)", "points": 3, "answer": "C", "stem": "マニュアルトランスミッションの「チェンジレバーの操作が重い」という症状の推定原因として、不適切なものはどれか。", "choices": {"A": "クラッチ切れ不良", "B": "インターロックピンの摺動不良", "C": "シンクロスリーブスプライン部摩耗", "D": "シンクロスリーブスプラインチャンファー（面取り部）摩耗"}, "explanation": "シンクロスリーブスプライン部の摩耗はギヤ抜けの要因となり、チェンジレバーの操作が重い原因には該当しない。正解はC。", "source": "24年 1次", "cat": "T/M"}, {"no": 10, "section": "問1", "label": "問1(10)", "points": 3, "answer": "A", "stem": "マニュアルトランスミッションの振動・騒音に関する記述として、不適切なものはどれか。", "choices": {"A": "うなり音は、トランスミッションギヤのかみ合い率を小さくし、振動周波数を低くすることで低減することができる。", "B": "車両発進時のジャダは、10Hz～20Hzの振動周波数でクラッチ伝達トルクの変動による振動である。", "C": "ジャダは、クラッチを徐々につないでいく際にクラッチディスクの摩擦面で間欠的な滑りが生じ、エンジンからの伝達トルクが変動することで発生する。", "D": "うなり音は、400Hz～3kHzの振動周波数でトランスミッションギヤのかみ合いによる振動である。"}, "explanation": "うなり音を低減するには、トランスミッションギヤのかみ合い率を大きくし、振動周波数を高くすることで低減できる（小さくするのは不適切）。正解はA。", "source": "24年 1次", "cat": "T/M"}, {"no": 11, "section": "問1", "label": "問1(11)", "points": 3, "answer": "A", "stem": "2＊G付きプロフィアのエアサス装着車（FR）のファイングリップ及び非常走行装置に関する記述として、不適切なものはどれか。", "choices": {"A": "ファイングリップ作動時は後前軸、後後軸圧力センサーからの信号により、エアサスペンションECUがリアエアサスペンション3連マグネチックバルブの給気/排気切り替えマグネチックバルブおよび左/右開閉マグネチックバルブを作動させ、後後軸エアスプリングのエアを排出する。", "B": "非常走行装置作動時はファイングリップスイッチが「ON」かつエアサス非常走行スイッチが「ON」、エンジン「ON」ならばインジケーターランプ（緑色）およびエアサス非常走行スイッチに内蔵のインジケーターランプが点灯する。", "C": "非常走行装置作動時は車高が下がるのを防止するため、エアサスペンションECUが車高調整要求を出し、車高を調整する。", "D": "ファイングリップ解除時はファイングリップスイッチを再度押すとインジケーターランプ（緑色）が消灯（非常走行装置作動時はエアサス非常走行スイッチに内蔵のインジケーターランプも消灯）し、非常走行装置も解除する。"}, "explanation": "ファイングリップ/非常走行装置の3連マグネチックバルブ作動に関する記述が不適切。給気/排気切り替えマグネチックバルブおよび左/右開閉マグネチックバルブを作動させて後後軸エアスプリングのエアを排出する動作の説明が誤っている。正解はA。", "source": "24年 1次", "cat": "シャシ・フレーム"}, {"no": 12, "section": "問1", "label": "問1(12)", "points": 3, "answer": "B", "stem": "サスペンションに関する記述として、不適切なものはどれか。", "choices": {"A": "スプリングのばね定数とは、ばねのたわみ量に対する荷重の増加率をいう。", "B": "エアサスペンション用のエアタンクには、セーフティバルブが設けられている。", "C": "ハーシュネスとは、路面の段差、継ぎ目走行時にタイヤに加えられた衝撃力がサスペンションを通して衝撃音や振動として伝わる現象をいう。", "D": "エアサスペンション系統の異常で、エアタンク内の圧力が規定値以下になった場合は、プロテクションバルブが開く。"}, "explanation": "B：エアサス用タンクにはセーフティバルブがない（不適切）。D：プロテクションバルブは規定値以下になった場合は閉じる（開くは不適切）。BとDともに不適切のため、どちらかを選択で正解。正解はB（またはD）。", "source": "24年 1次", "cat": "シャシ・フレーム"}, {"no": 13, "section": "問1", "label": "問1(13)", "points": 3, "answer": "D", "stem": "プロペラシャフトの振動・騒音に関する記述として、不適切なものはどれか。", "choices": {"A": "プロペラシャフトにアンバランスがあると回転の遠心力で振動が生じる。この振動は回転速度（車速）が高くなると急激に増加する。", "B": "ジョイント角があると回転変動が生じるため、入力軸と出力軸を平行にすることで回転変動を相殺している。", "C": "3ジョイントプロペラシャフトでは、シャフトを分割することで固有振動数を高め、高速時のエンジン、ミッション、プロペラシャフトの曲げ振動によるこもり音を防止している。", "D": "ジョイント部には反対側の軸から受ける偶力があり、これは二次偶力と呼ばれ、回転変動と同じように入力軸と出力軸を平行にすると解消する。"}, "explanation": "二次偶力は、それぞれのジョイント角に存在し、入力軸と出力軸を平行にするだけでは解決しない。正解はD。", "source": "24年 1次", "cat": "T/M"}, {"no": 14, "section": "問1", "label": "問1(14)", "points": 3, "answer": "A", "stem": "ファイナル・ギヤに関する記述として、適切なものはどれか。", "choices": {"A": "ヒール当たり、フェース当たりの場合は、ドライブ・ピニオンを近付け、リング・ギヤを遠ざける。", "B": "トー当たり、フランク当たりの場合は、ドライブ・ピニオンを近付け、リング・ギヤを遠ざける。", "C": "ヒール当たり、フランク当たりの場合は、ドライブ・ピニオンを遠ざけ、リング・ギヤを近付ける。", "D": "トー当たり、フェース当たりの場合は、ドライブ・ピニオンを遠ざけ、リング・ギヤを近付ける。"}, "explanation": "トー当たり、フランク当たりの場合は、ドライブ・ピニオンを遠ざけリング・ギヤを近付ける（Bは逆が正解）。適切なものはA：ヒール当たり、フェース当たりの場合はドライブ・ピニオンを近付けリング・ギヤを遠ざける。正解はA。", "source": "24年 1次", "cat": "一般関連"}, {"no": 15, "section": "問1", "label": "問1(15)", "points": 3, "answer": "B", "stem": "ドラムブレーキ及びディスクブレーキの不具合に関する記述として、不適切なものはどれか。", "choices": {"A": "ブレーキの引きずりが発生している場合の原因として、各ブレーキ装置の戻り不良が考えられる。", "B": "ブレーキジャダが発生している場合の原因として、パッド/ライニングの鏡面化が考えられる。", "C": "ブレーキの片効きが発生している場合の原因として、リーフスプリングのセンターボルト緩みが考えられる。", "D": "スキール音が発生している場合の原因として、パッド/ライニングの当たり具合、バックプレートの共振が考えられる。"}, "explanation": "鏡面化は鳴き（スキール音など）の原因になる。センターボルトの緩みは片効きの原因となる。ブレーキジャダの原因は鏡面化ではなくロータ/ドラムの偏摩耗などが該当する。正解はB。", "source": "24年 1次", "cat": "T/M"}, {"no": 16, "section": "問1", "label": "問1(16)", "points": 3, "answer": "C", "stem": "ブレーキノイズの説明として、適切なものはどれか。", "choices": {"A": "スキール音は、非制動時に発生する。", "B": "グローン音のうち、軽い制動時に発生する「グー」という音は、ライニングとドラムのスリップによるものである。", "C": "スキーク音は、制動時に発生する。", "D": "グローン音の振動周波数は、1000Hzから14000Hzである。"}, "explanation": "A：スキール音は制動時に発生する（非制動時→制動時）。B：グローン音の「グー」という音は非制動時に発生する（制動時→非制動時）。C：スキーク音は制動時に発生する（適切）。D：グローン音の振動周波数は200Hzから500Hz。正解はC。", "source": "24年 1次", "cat": "ブレーキ"}, {"no": 17, "section": "問1", "label": "問1(17)", "points": 3, "answer": "A", "stem": "2＊G付き小型トラック（1.5t）のブレーキコントロールシステムに関する記述として、不適切なものはどれか。", "choices": {"A": "コンビネーションメータASSYのスリップインジケータランプは、①TRC、VSCの作動時②スキッドコントロールECUに異常が発生した場合に点灯する。", "B": "システムに異常が発生し、システムが停止した場合にはフェイルセーフ機能として、人力により発生させたブレーキマスタシリンダの油圧がホイールシリンダに作用する構造とし、制動力を確保している。", "C": "タイヤと路面間の摩擦力の変化に対応して、ブレーキ作動中の車両の安定性を確保している。", "D": "ブレーキアクチュエータASSYのスキッドコントロールコンピュータは、各センサおよびコンピュータからの信号をもとに、ブレーキアクチュエータASSYを駆動して、各輪のブレーキ油圧を制御する。"}, "explanation": "TRC、VSCの作動時はスリップインジケータランプが点滅（点灯ではない）。正解はA。", "source": "24年 1次", "cat": "ブレーキ"}, {"no": 18, "section": "問1", "label": "問1(18)", "points": 3, "answer": "A", "stem": "ASRの制御に関する記述として、不適切なものはどれか。", "choices": {"A": "車両が走行を開始すると左右の駆動輪の車輪速度が常に前輪と比較、監視される。一方の駆動輪が空転を始めスリップ率の限界値を超えると、ただちにスリップをしている車輪にブレーキをかける。", "B": "駆動輪の駆動力を維持することにより、加速時の尻振りを防止している。", "C": "タイヤと路面間の摩擦力の変化に対応して制御する。", "D": "スリップが発生した場合、エンジン出力を抑制する制御も行う。"}, "explanation": "これはABSの説明（左右の駆動輪速度を前輪と比較してスリップ制御）。ASRはエンジン出力制御やブレーキ制御を組み合わせた加速スリップ制御。正解はA。", "source": "24年 1次", "cat": "ブレーキ"}, {"no": 19, "section": "問1", "label": "問1(19)", "points": 3, "answer": "B", "stem": "2＊G付プロフィアのVSCに関する記述として、不適切なものはどれか。", "choices": {"A": "ロール軽減制御時は、各輪のブレーキを制御し、安定的に車両を減速させ横Gを減少させる。", "B": "横滑り軽減制御時は、旋回時に両輪をブレーキ制御して横滑りを抑制する。", "C": "車両制御ECUは、危険状態を感知すると、EBS ECUからの信号を入力してエンジンECUに出力し、エンジンECUはこの信号をもとにエンジン出力を制御する。", "D": "VSC ECUは、ヨーレートセンサーおよびGセンサーを内蔵しており、ヨーレート、横Gを検出して、CAN通信により、EBS ECUに信号を送る。"}, "explanation": "横滑り軽減制御時は基本的には片輪にブレーキをかける（両輪ではない）。正解はB。", "source": "24年 1次", "cat": "ブレーキ"}, {"no": 21, "section": "問1", "label": "問1(21)", "points": 3, "answer": "C", "stem": "2＊G付プロフィアのヒーター＆エアコンディショナーに関する記述として、不適切なものはどれか。", "choices": {"A": "暖気と冷気を混合し、温度コントロールを行うことのできるフルエアミックス方式を採用している。", "B": "異常が発生した場合は、メーター上のディスプレイなどで異常発生の警告を行う。", "C": "ブロワー遅動制御は、内気温度センサーの検出温度によって制御を行い、センターレジスターからの熱風の吹き出しを防止している。", "D": "日射補正制御は、日差しが強い場合にはブロワースピードを上げ、日差しが弱い場合にはブロワースピードを下げて制御する。"}, "explanation": "ブロワー遅動制御は、エバポレーター後センサーの検出温度によって制御を行い、センターレジスターからの熱風の吹き出しを防止している（内気温度センサーではない）。正解はC。", "source": "24年 1次", "cat": "電気装置"}, {"no": 22, "section": "問1", "label": "問1(22)", "points": 3, "answer": "D", "stem": "CAN通信システムに関する記述として、不適切なものはどれか。", "choices": {"A": "DXの故障診断には通信異常の検知などが組み込まれ、CAN通信システムとECUごとにDTCが設定されている。", "B": "通信規格は決められているが細部の仕様は各メーカー仕様のシステムが採用されている。", "C": "ブロワー起動制御とは、ブロワーモーター起動時に、モーター保護のため2秒間風量を「2」に固定する。", "D": "サーキットテスタによる点検では通信線の断線や短絡の確認が不可能なので、オシロスコープなどを用いた波形観測が必ず必要になる。"}, "explanation": "サーキットテスタによる断線や短絡の確認は可能である。正解はD。", "source": "24年 1次", "cat": "電気装置"}, {"no": 23, "section": "問1", "label": "問1(23)", "points": 3, "answer": "D", "stem": "ベンチグラインダに関する記述として、適切なものはどれか。", "choices": {"A": "砥石の取り替え、および取り替え後の試運転は労働安全衛生法で定める特別教育修了者が行う。", "B": "砥石の指定使用面以外の使用は、労働安全衛生法で定める特別教育修了者が使用できる。", "C": "安全カバーが付いていない場合は、砥石とスパーク・ブレーカ及びワー
