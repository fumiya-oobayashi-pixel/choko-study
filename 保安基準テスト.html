  {no:7250,section:"保安基準別添",label:"別添92（2階建バスの構造要件）",q:"別添92において、2階客室の側面の窓ガラスに関する規定として正しいものはどれか。",choices:["A. 座席の上面から高さ600mm以下の部分が開口できない構造でなければならない", "B. 座席の上面から高さ800mm以下の部分が開口できない構造でなければならない", "C. 座席の上面から高さ1000mm以下の部分が開口できない構造でなければならない", "D. すべての窓ガラスが開口できない構造でなければならない"],answer:"B",exp:"別添92第7項（窓ガラス）。2階客室に設けられた側面の窓ガラスは、座席の上面から高さ800mm以下の部分が開口できない構造でなければならない。ただし開口部の有効寸法が100mm以下の場合はこの限りでない。"},
  {no:7251,section:"保安基準別添",label:"別添93（連結車両の制動作動おくれ防止の技術基準）",q:"別添93「連結車両の制動作動おくれ防止の技術基準」において、ダミー回路1のダミータンクの容量として正しいものはどれか。",choices:["A. 0.4l", "B. 0.6l", "C. 0.8l", "D. 1.0l"],answer:"C",exp:"別添93第2項注1。ダミー回路1とは、容量0.8lのダミータンクに内径8mm、長さ0.5m以下の金属配管を連結したものをいう。ダミー回路2は容量36lのダミータンクを有する。"},
  {no:7252,section:"保安基準別添",label:"別添93（連結車両の制動作動おくれ防止の技術基準）",q:"別添93において、ブレーキペダルの作動開始時から各車軸のブレーキチャンバ圧力が最終到達圧力の60%に達するまでの時間として正しいものはどれか。",choices:["A. 0.5秒以内", "B. 0.7秒以内", "C. 1.0秒以内", "D. 1.2秒以内"],answer:"B",exp:"別添93第3.3項。ブレーキペダルの作動開始時から牽引自動車及び被牽引自動車のブレーキチャンバ圧力（又はホイールシリンダ圧力）が最終到達圧力の60%に達するまでの時間はいずれも0.7秒以内であること。"},
  {no:7253,section:"保安基準別添",label:"別添94（灯火等の照明部、個数、取付位置等の測定方法）",q:"別添94において、隣接する灯火等の投影間の最短距離が何mm以下の場合に1個とみなすことができるか。",choices:["A. 50mm以下", "B. 75mm以下", "C. 100mm以下", "D. 150mm以下"],answer:"B",exp:"別添94第2.3.1項。基準軸に直角の方向に測定した2つの隣接する投影間の最短距離が75mm以下のものは、照明部（又は灯室）の数に関係なく、1個とみなすことができる。"},
  {no:7254,section:"保安基準別添",label:"別添94（灯火等の照明部、個数、取付位置等の測定方法）",q:"別添94において、帯状の灯火等が「2個」とみなされる条件として正しいものはどれか。",choices:["A. 発光面の長さが0.6m以上であって最外縁が最外側から0.3m以内", "B. 発光面の長さが0.8m以上であって最外縁が最外側から0.4m以内で車両中心面に関して対称", "C. 発光面の長さが1.0m以上であって最外縁が最外側から0.5m以内", "D. 発光面の長さが0.5m以上であって最外縁が最外側から0.4m以内"],answer:"B",exp:"別添94第2.3.3項。帯状の形状又は細長い形状を有する灯火等の発光面であって、車両中心面に関して対称な位置に取り付けられ、発光面の長さが0.8m以上かつ発光面の最外縁が自動車の両側において最外側から0.4m以内となるよう取り付けられている場合に2個とみなす。"},
  {no:7255,section:"保安基準別添",label:"別添95（自動車の走行性能の技術基準）",q:"別添95「自動車の走行性能の技術基準」において、普通自動車（一般）の車両総重量GVWと原動機の最高出力の関係式として正しいものはどれか。",choices:["A. GVW ≦ 217 × kW - 2400", "B. GVW ≦ 135 × kW - 1500", "C. GVW ≦ 122 × kW - 600", "D. GVW ≦ 164 × kW - 1900"],answer:"B",exp:"別添95第2.1項。普通自動車（クレーン車等の特殊な作業用自動車を除く上記以外の自動車）はGVW ≦ 135×kW{100×PS} - 1500、小型自動車はGVW ≦ 122×kW{90×PS} - 600。なおクレーン車等の特殊な作業用自動車（最高出力118kW以上）はGVW ≦ 217×kW{160×PS} - 2400。"},
  {no:7256,section:"保安基準別添",label:"別添95（自動車の走行性能の技術基準）",q:"別添95の適用範囲から除外される自動車として正しいものはどれか。",choices:["A. 車両総重量8t以上の大型貨物自動車", "B. 専ら乗用の用に供する乗車定員10人以下の自動車", "C. すべての旅客自動車", "D. 最高速度100km/h以下の自動車"],answer:"B",exp:"別添95第1項（適用範囲）。内燃機関を原動機とする自動車のうち、大型特殊自動車、小型特殊自動車及び軽自動車並びにセミトレーラ等の連結車両及び専ら乗用の用に供する乗車定員10人以下の自動車は適用対象から除外される。"},
  {no:7257,section:"保安基準別添",label:"別添96（連結車両の走行性能の技術基準）",q:"別添96「連結車両の走行性能の技術基準」において、連結車両総重量Gcwと牽引自動車の駆動軸重Wdの関係式として正しいものはどれか。",choices:["A. Gcw ≦ 3 × Wd", "B. Gcw ≦ 4 × Wd", "C. Gcw ≦ 5 × Wd", "D. Gcw ≦ 6 × Wd"],answer:"B",exp:"別添96第2.1項。連結車両の走行性能は次の各式のいずれにも適合していること：Gcw ≦ 164.51×kW{121×PS} - 1900、かつGcw ≦ 4×Wd。Gcwは連結車両総重量、Wdは牽引自動車の駆動軸重。"},
  {no:7258,section:"保安基準別添",label:"別添96（連結車両の走行性能の技術基準）",q:"別添96において、昭和49年3月31日以前に登録した牽引自動車（まっ消登録したものを除く）で牽引される連結車両の走行性能の特例式として正しいものはどれか。",choices:["A. Gcw ≦ 164.51 × kW - 1900", "B. Gcw ≦ 200.00 × kW - 2000", "C. Gcw ≦ 220.26 × kW - 2530", "D. Gcw ≦ 250.00 × kW - 3000"],answer:"C",exp:"別添96第2.2項。昭和49年3月31日までに道路運送車両法第7条の規定により登録を行った牽引自動車（昭和49年4月1日以降にまっ消登録したものを除く）で牽引される連結車両は、Gcw ≦ 220.26×kW{162×PS} - 2530 かつGcw ≦ 4×Wdに適合すればよい。"},
  {no:7259,section:"保安基準別添",label:"別添97（使用過程にある大型貨物自動車の速度抑制装置の技術基準）",q:"別添97「使用過程にある大型貨物自動車の速度抑制装置の技術基準」において、速度抑制装置の設定速度の上限として正しいものはどれか。",choices:["A. 80km/h以下の任意の速度", "B. 90km/h以下の任意の速度", "C. 100km/h以下の任意の速度", "D. 110km/h以下の任意の速度"],answer:"B",exp:"別添97第3.2項。速度抑制装置の設定速度は90km/h以下の任意の速度とする。また速度抑制装置は、自動車使用者等により設定速度の変更及び設定の解除ができるものであってはならない。"},
  {no:7260,section:"保安基準別添",label:"別添97（使用過程にある大型貨物自動車の速度抑制装置の技術基準）",q:"別添97において、加速試験の判定基準として「安定速度」が満たすべき条件として正しいものはどれか。",choices:["A. 安定速度は設定速度に3km/hを加えた速度及び90km/hを超えてはならない", "B. 安定速度は設定速度に5km/hを加えた速度及び90km/hを超えてはならない", "C. 安定速度は設定速度に10km/hを加えた速度及び100km/hを超えてはならない", "D. 安定速度は設定速度と同一でなければならない"],answer:"B",exp:"別添97第4.1.4.2.1項。安定速度は設定速度に5km/hを加えた速度及び90km/hを超えてはならない。また最初に安定速度に達した後の最大速度は安定速度に1.05を乗じた速度を超えてはならない（第4.1.4.2.2項）。"},
  {no:7261,section:"保安基準別添",label:"別添97（使用過程にある大型貨物自動車の速度抑制装置の技術基準）",q:"別添97において、速度抑制装置付自動車に表示する車両後面の標識の形状として正しいものはどれか。",choices:["A. 直径100mm以上の円形で文字を赤色、地を白色とする", "B. 直径130mm以上の円形で文字を黒色、地を黄色とする", "C. 直径150mm以上の正方形で文字を白色、地を青色とする", "D. 直径120mm以上の三角形で文字を黒色、地を橙色とする"],answer:"B",exp:"別添97第5項（表示）備考。車両の後面に表示する標識の形状は直径130mm以上の円、文字の高さは25mm、色彩は文字を黒色・地を黄色とする。車室内に表示するものは直径30mm以上の円、文字の高さは7mm以上とする。"},
  {no:7262,section:"保安基準別添",label:"別添98（原動機付自転車の制動装置の技術基準）",q:"別添98「原動機付自転車の制動装置の技術基準」において、常温時制動試験の制動前ブレーキ温度として正しいものはどれか。",choices:["A. 80℃以下", "B. 100℃以下", "C. 120℃以下", "D. 150℃以下"],answer:"B",exp:"別添98第3.2.1.2項。常温時制動試験を行う前の試験原付車の制動前ブレーキ温度は100℃以下とする。"},
  {no:7263,section:"保安基準別添",label:"別添98（原動機付自転車の制動装置の技術基準）",q:"別添98において、特定小型原動機付自転車を除く原付車の常温時制動試験の制動初速度として正しいものはどれか。",choices:["A. 70%VMAX（60を上限）±5km/h", "B. 80%VMAX（160を上限）±5km/h", "C. 90%VMAX（60を上限）±5km/h", "D. 90%VMAX（80を上限）±5km/h"],answer:"C",exp:"別添98第3.2.1.3項(1)。特定小型原動機付自転車を除く原付車の常温時制動試験は、90%VMAX（VMAXに0.9を乗じて得る値。ただし60、最高速度50km/h以下の第一種原付自転車は40を上限）±5km/hの制動初速度から行う。"},
  {no:7264,section:"保安基準別添",label:"別添98（原動機付自転車の制動装置の技術基準）",q:"別添98において「連動ブレーキ機能」の定義として正しいものはどれか。",choices:["A. ABS（アンチロックブレーキシステム）と同義で、車輪のロックを防止する機能", "B. 1個の操作装置により前輪及び後輪の制動を行うことができる主制動装置の機能", "C. 前輪と後輪を別々の操作装置で制動できる機能", "D. 電気式回生制動装置を活用して制動力を発生させる機能"],answer:"B",exp:"別添98第2.3項。「連動ブレーキ機能」とは、1個の操作装置により前輪及び後輪の制動を行うことができる主制動装置の機能をいう。「補助ブレーキ機能」は連動ブレーキ機能を有した主制動装置において連動ブレーキ機能を作用させる操作装置以外の操作装置により、連動ブレーキ機能に比べて低い能力の制動を行うことができる機能（第2.4項）。"},
  {no:7265,section:"保安基準別添",label:"別添99（歩行者頭部及び脚部保護の技術基準）",q:"別添99「歩行者頭部及び脚部保護の技術基準」の取扱いとして正しいものはどれか。",choices:["A. 2023年6月5日に改正され、新たな基準が定められた", "B. 2015年1月22日に削除された", "C. 現在も有効な技術基準として適用されている", "D. 2018年12月28日に削除された"],answer:"B",exp:"別添99のタイトルに「2015.1.22削除」と明記されている。別添99「歩行者頭部及び脚部保護の技術基準」は2015年（平成27年）1月22日に削除されている。"},
  {no:7266,section:"保安基準別添",label:"別添100（圧縮水素ガスを燃料とする自動車の燃料装置の技術基準）",q:"別添100「圧縮水素ガスを燃料とする自動車の燃料装置の技術基準」において、容器安全弁が作動した場合に放出される水素ガスの排出方法として禁止されているものはどれか。",choices:["A. 車両後方に向けて排出すること", "B. 車両側方に向けて排出すること", "C. 車両前方に向けて排出すること", "D. 車両上方に向けて排出すること"],answer:"C",exp:"別添100第3.1.4.5項。容器安全弁が作動した場合の水素ガス排出は、(1)運転者室内・客室内・荷室内への直接排出禁止、(2)タイヤハウス内への排出禁止、(3)着火源への排出禁止、(4)他のガス容器への排出禁止、(5)車両前方への排出禁止が規定されている。"},
  {no:7267,section:"保安基準別添",label:"別添100（圧縮水素ガスを燃料とする自動車の燃料装置の技術基準）",q:"別添100において、ガス容器の格納室の換気試験での合格基準として正しいものはどれか。",choices:["A. 格納室内のガス濃度が90%低下するのに要する時間が120s以内", "B. 格納室内のガス濃度が90%低下するのに要する時間が180s以内", "C. 格納室内のガス濃度が50%低下するのに要する時間が60s以内", "D. 格納室内のガス濃度が90%低下するのに要する時間が300s以内"],answer:"B",exp:"別添100第3.5.2.3項。格納室の換気試験（別紙1「気密・換気試験」の2.による）を行ったときに、格納室内のガス濃度が90%低下するのに要する時間が180s以内であること。"},
  {no:7268,section:"保安基準別添",label:"別添100（圧縮水素ガスを燃料とする自動車の燃料装置の技術基準）",q:"別添100において、貨物の運送の用に供する車両総重量3.5t未満の自動車のガス容器取付部が満たすべき走行方向の加速度として正しいものはどれか。",choices:["A. ±49m/s2", "B. ±98m/s2", "C. ±147m/s2", "D. ±196m/s2"],answer:"D",exp:"別添100第3.5.4.1項。貨物の運送の用に供する車両総重量3.5t未満の自動車のガス容器取付部は、常用圧力でガスを充填した状態において走行方向の加速度±196m/s2により破断しないものでなければならない。車両総重量3.5t以上12t未満の自動車等は±98m/s2（第3.5.4.2項）。"},
  {no:7311,section:"保安基準別添",label:"別添101（燃料電池自動車の高電圧からの乗車人員の保護に関する技術基準）",q:"別添101の技術基準において、燃料電池自動車の動力系に適用される作動電圧の基準として正しいものはどれか。",choices:["A. 作動電圧が直流48V以上である部分を有する動力系全体に適用する。", "B. 作動電圧が直流60V以上である部分を有する動力系全体（交流部分を含む）に適用する。", "C. 作動電圧が直流100V以上である部分を有する動力系全体に適用する。", "D. 作動電圧が交流30V以上である部分を有する動力系全体に適用する。"],answer:"B",exp:"別添101の1.適用範囲に、作動電圧が直流60V以上である部分を有する動力系の全体（交流部分を含む）に適用すると規定されている。"},
  {no:7312,section:"保安基準別添",label:"別添101（燃料電池自動車の高電圧からの乗車人員の保護に関する技術基準）",q:"別添101において、客室内及び荷室内の活電部に対する直接接触の保護として要求される保護等級はどれか。",choices:["A. いかなる場合においても保護等級IPXXAを満足するものでなければならない。", "B. いかなる場合においても保護等級IPXXBを満足するものでなければならない。", "C. いかなる場合においても保護等級IPXXDを満足するものでなければならない。", "D. いかなる場合においても保護等級IPXX0を満足するものでなければならない。"],answer:"C",exp:"別添101の3.1.1.1.により、客室内及び荷室内の活電部に対する保護は、いかなる場合においても保護等級IPXXDを満足するものでなければならない。"},
  {no:7313,section:"保安基準別添",label:"別添101（燃料電池自動車の高電圧からの乗車人員の保護に関する技術基準）",q:"別添101における間接接触に対する保護として、すべての露出導電部と電気的シャシとの間の抵抗値はどの値未満でなければならないか。",choices:["A. 0.01Ω未満", "B. 0.05Ω未満", "C. 0.1Ω未満", "D. 1.0Ω未満"],answer:"C",exp:"別添101の3.2.2.により、すべての露出導電部と電気的シャシとの間の抵抗値は0.1Ω未満でなければならない。これは0.2A以上の電流を流した状態で測定する。"},
  {no:7314,section:"保安基準別添",label:"別添102（側方照射灯の灯光の色、明るさ等に関する技術基準）",q:"別添102において、光源電子制御装置によって電圧が制御されない側方照射灯のうち、交換することができない光源を装着したものであって12Vのものの測定に印加する電圧はどれか。",choices:["A. 12.0V", "B. 12.5V", "C. 13.5V", "D. 14.0V"],answer:"C",exp:"別添102の4.2.により、光源電子制御装置によって電圧が制御されない側方照射灯のうち交換できない光源を装着したものであって12Vのものの測定は13.5Vの電圧を印加して行う。"},
  {no:7315,section:"保安基準別添",label:"別添102（側方照射灯の灯光の色、明るさ等に関する技術基準）",q:"別添102における側方照射灯の説明として正しいものはどれか。",choices:["A. 側方照射灯とは、自動車の後方側方の道路を照射するため備える補助灯をいう。", "B. 側方照射灯とは、自動車の進行方向前側方の道路を照射するため備える補助灯をいう。", "C. 側方照射灯とは、自動車の両側面を照射するため備える補助灯をいう。", "D. 側方照射灯とは、自動車の前方を広範囲に照射するため備える補助灯をいう。"],answer:"B",exp:"別添102の2.1.により、側方照射灯とは自動車の進行方向前側方の道路を照射するため、補助灯として自動車に備えるものをいう。"},
  {no:7316,section:"保安基準別添",label:"別添102（側方照射灯の灯光の色、明るさ等に関する技術基準）",q:"別添102において、電球以外の光源を使用する側方照射灯にあっては、最小光度要件及び最大光度要件への適合を何分後に測定した光度で確認するか。",choices:["A. 作動1分後及び10分後", "B. 作動1分後及び30分後", "C. 作動5分後及び30分後", "D. 作動10分後及び60分後"],answer:"B",exp:"別添102の4.5.により、電球以外の光源を使用する側方照射灯にあっては、作動1分後及び30分後に測定した光度が最小光度要件及び最大光度要件に適合するものとする。"},
  {no:7317,section:"保安基準別添",label:"別添103（ガソリン・液化石油ガス特殊自動車排出ガスの測定方法）",q:"別添103において対象とするエンジンの定格出力の範囲として正しいものはどれか。",choices:["A. 定格出力が7kW以上19kW未満のエンジン", "B. 定格出力が19kW以上560kW未満のエンジン", "C. 定格出力が19kW以上600kW未満のエンジン", "D. 定格出力が30kW以上560kW未満のエンジン"],answer:"B",exp:"別添103の2.により、対象とするエンジンは定格出力が19kW以上560kW未満のエンジンに適用する。"},
  {no:7318,section:"保安基準別添",label:"別添103（ガソリン・液化石油ガス特殊自動車排出ガスの測定方法）",q:"別添103の適用範囲として、測定対象となる排出ガス成分に含まれないものはどれか。",choices:["A. 一酸化炭素（CO）", "B. 全炭化水素（THC）", "C. 窒素酸化物（NOx）", "D. 硫黄酸化物（SOx）"],answer:"D",exp:"別添103の1.により、測定対象は一酸化炭素（CO）、全炭化水素（THC）、窒素酸化物（NOx）、二酸化炭素（CO2）である。硫黄酸化物（SOx）は含まれない。"},
  {no:7319,section:"保安基準別添",label:"別添103（ガソリン・液化石油ガス特殊自動車排出ガスの測定方法）",q:"別添103において、7モード法の説明として正しいものはどれか。",choices:["A. 7モード法とは、エンジン速度とトルクが段階的に変化するテストサイクルをいう。", "B. 7モード法とは、エンジン速度とトルクが一定に保持されるテストサイクルをいう。", "C. 7モード法とは、路上走行を模擬した実走行に基づくテストサイクルをいう。", "D. 7モード法とは、アイドリング状態のみを測定するテストサイクルをいう。"],answer:"B",exp:"別添103の3.1.1.により、7モード法とはエンジン速度とトルクが一定に保持されるテストサイクルであって、ディスクリート試験サイクル又はRMC試験サイクルにより実施されるものをいう。"},
  {no:7320,section:"保安基準別添",label:"別添105（再帰反射材の技術基準）",q:"別添105において、線状再帰反射材及び輪郭表示再帰反射材に使用しなければならない再帰反射材のクラスはどれか。",choices:["A. クラス「A」", "B. クラス「B」", "C. クラス「C」", "D. クラス「D」"],answer:"C",exp:"別添105の5.2.により、線状再帰反射材及び輪郭表示再帰反射材はクラス「C」の再帰反射材料を使用しなければならない。"},
  {no:7321,section:"保安基準別添",label:"別添105（再帰反射材の技術基準）",q:"別添105において、再帰反射材が全方向回転式でないものに表示しなければならない文字として正しいものはどれか。",choices:["A. UP", "B. TOP", "C. FRONT", "D. SIDE"],answer:"B",exp:"別添105の3.1.により、再帰反射材が全方向回転式でないものにあっては5.の規定を適合する向きにおいて「TOP」という文字を表示しなければならない。"},
  {no:7322,section:"保安基準別添",label:"別添105（再帰反射材の技術基準）",q:"別添105において、再帰反射係数の定義として正しいものはどれか。",choices:["A. 反射面における入射光軸方向への光度係数をその面積で割った値", "B. 反射面における観測軸方向への光度係数をその面積で割った値", "C. 反射面における全方向への光度係数の合計をその面積で割った値", "D. 反射面における水平方向への光度係数をその面積で割った値"],answer:"B",exp:"別添105の2.4.1.により、再帰反射係数（記号R）とは反射面における観測軸方向への光度係数をその面積Aで割った値をいう。"},
  {no:7323,section:"保安基準別添",label:"別添106（ワンマンバスの構造要件）",q:"別添106において、路線を定めて定期的に運行する乗車定員30人以上のワンマンバスのホイールベース間に備える後扉の有効幅として正しいものはどれか。",choices:["A. 600mm以上", "B. 700mm以上", "C. 800mm以上", "D. 900mm以上"],answer:"C",exp:"別添106の3.1.2.により、路線を定めて定期的に運行する乗車定員30人以上のワンマンバスのホイールベース間に備える後扉にあっては、有効幅が800mm以上であること。"},
  {no:7324,section:"保安基準別添",label:"別添106（ワンマンバスの構造要件）",q:"別添106において、路線を定めて定期的に運行するワンマンバスの後扉の外側上部に備える灯火について、閉扉後の消灯の遅延時間として正しいものはどれか。",choices:["A. 2秒以上遅延して消灯する", "B. 4秒以上遅延して消灯する", "C. 6秒以上遅延して消灯する", "D. 10秒以上遅延して消灯する"],answer:"B",exp:"別添106の3.7.2.により、路線を定めて定期的に運行するワンマンバスの乗降口（後扉に限る）の外側上部の灯火は、開扉と同時に点灯し、閉扉後4秒以上遅延して消灯する。"},
  {no:7325,section:"保安基準別添",label:"別添106（ワンマンバスの構造要件）",q:"別添106において、ワンマンバスの乗降口の扉の開閉装置の要件として正しいものはどれか。",choices:["A. 乗降口の扉の開閉は、車掌が操作できる構造でなければならない。", "B. 乗降口の扉の開閉は、運転者が運転者席において操作できる構造（自動式）でなければならない。", "C. 乗降口の扉の開閉は、乗客が操作できる構造でなければならない。", "D. 乗降口の扉の開閉は、外部から遠隔操作できる構造でなければならない。"],answer:"B",exp:"別添106の3.2.1.により、乗降口の扉の開閉は運転者が運転者席において操作できる構造（自動式）でなければならない。"},
  {no:7326,section:"保安基準別添",label:"別添107（前部潜り込み防止装置の技術基準）",q:"別添107の適用範囲として正しいものはどれか。",choices:["A. 車両総重量が2.5tを超える貨物自動車の前面に備える前部潜り込み防止装置", "B. 車両総重量が3.5tを超える貨物自動車の前面に備える前部潜り込み防止装置", "C. 車両総重量が5.0tを超える貨物自動車の前面に備える前部潜り込み防止装置", "D. 車両総重量が7.5tを超える貨物自動車の前面に備える前部潜り込み防止装置"],answer:"B",exp:"別添107の1.により、本技術基準は貨物の運送の用に供する自動車であって車両総重量が3.5tを超えるものの前面に備える前部潜り込み防止装置に適用する。"},
  {no:7327,section:"保安基準別添",label:"別添107（前部潜り込み防止装置の技術基準）",q:"別添107において、前部潜り込み防止装置の平面部の断面の高さとして、車両総重量が12tを超えるものに要求される最小値はどれか。",choices:["A. 80mm以上", "B. 100mm以上", "C. 120mm以上", "D. 150mm以上"],answer:"C",exp:"別添107の3.2.により、前部潜り込み防止装置の平面部の断面の高さは、車両総重量が12tを超えるものにあっては120mm以上でなければならない。"},
  {no:7328,section:"保安基準別添",label:"別添107（前部潜り込み防止装置の技術基準）",q:"別添107において、前部潜り込み防止装置の位置を変えるための操作力の上限として正しいものはどれか。",choices:["A. 200Nを超えるものであってはならない。", "B. 300Nを超えるものであってはならない。", "C. 400Nを超えるものであってはならない。", "D. 500Nを超えるものであってはならない。"],answer:"C",exp:"別添107の3.3.により、前部潜り込み防止装置の位置を変えるための操作力は、400Nを超えるものであってはならない。"},
  {no:7329,section:"保安基準別添",label:"別添108（前部潜り込み防止装置取付装置等の技術基準）",q:"別添108において、前部潜り込み防止装置の2つのP1点間における下縁の高さの上限として、通常の自動車（コンクリートミキサー車及びダンプ車以外）に適用される値はどれか。",choices:["A. 地上350mm以下", "B. 地上400mm以下", "C. 地上445mm以下", "D. 地上500mm以下"],answer:"B",exp:"別添108の3.1.5.により、前部潜り込み防止装置の2つのP1点間における下縁の高さは地上400mm（コンクリートミキサー車及びダンプ車にあっては地上450mm）を超えてはならない。"},
  {no:7330,section:"保安基準別添",label:"別添108（前部潜り込み防止装置取付装置等の技術基準）",q:"別添108において、前部潜り込みを防止する構造又は装置として認められないものはどれか。",choices:["A. 特殊な前部潜り込み防止装置", "B. 車体構造であって前部潜り込み防止装置の機能を果たすことができるもの", "C. 車枠部品であって前部潜り込み防止装置の機能を果たすことができるもの", "D. 後部に取り付けられた緩衝装置"],answer:"D",exp:"別添108の2.5.により、前部潜り込みを防止する構造又は装置は特殊な前部潜り込み防止装置か、車体構造・車枠部品・その他の構成部品であって機能を果たすことができるものをいう。後部緩衝装置は該当しない。"},
  {no:7331,section:"保安基準別添",label:"別添108（前部潜り込み防止装置取付装置等の技術基準）",q:"別添108の適用範囲について、車両総重量が7.5t以下の自動車の前部潜り込みを防止する装置について適用免除となる要件として正しいものはどれか。",choices:["A. 堅ろうであり板状であること及び下縁の高さが地上350mm以下であれば適用しない。", "B. 堅ろうであり板状であること及び下縁の高さが地上400mm以下であれば適用しない。", "C. 堅ろうであり板状であること及び下縁の高さが地上450mm以下であれば適用しない。", "D. 堅ろうであり板状であること及び下縁の高さが地上500mm以下であれば適用しない。"],answer:"B",exp:"別添108の1.ただし書きにより、車両総重量が7.5t以下の自動車にあっては、堅ろうであり板状であり前部潜り込み防止機能を有し、かつ前部潜り込み防止装置の下縁の高さが地上400mm以下であれば本規定は適用しない。"},
  {no:7332,section:"保安基準別添",label:"別添109（無負荷急加速時に排出される排出ガスの光吸収係数の測定方法）",q:"別添109において、排出ガスの光吸収係数の測定に際して加速ペダルを踏み込んだ後の排出ガス採取時間として正しいものはどれか。",choices:["A. 加速ペダルを踏み込み始めた時から3秒が経過するまでの間", "B. 加速ペダルを踏み込み始めた時から5秒が経過するまでの間", "C. 加速ペダルを踏み込み始めた時から10秒が経過するまでの間", "D. 加速ペダルを踏み込み始めた時から30秒が経過するまでの間"],answer:"B",exp:"別添109の4.3.により、排出ガスの採取は加速ペダルを踏み込み始めた時から5秒が経過するまでの間に行う。"},
  {no:7333,section:"保安基準別添",label:"別添109（無負荷急加速時に排出される排出ガスの光吸収係数の測定方法）",q:"別添109において、測定値が閾値を超えた場合の再測定の間隔として正しいものはどれか。",choices:["A. 1秒以上5秒以下の間隔", "B. 2秒以上8秒以下の間隔", "C. 4秒以上10秒以下の間隔", "D. 10秒以上30秒以下の間隔"],answer:"C",exp:"別添109の4.4.3.及び4.4.4.により、測定値が閾値を超える場合には4秒以上10秒以下の間隔をおいて再度測定を行う。"},
  {no:7334,section:"保安基準別添",label:"別添110（電気式自動車及び電気式ハイブリッド自動車の高電圧からの乗車人員の保護に関する技術基準）",q:"別添110の適用範囲として、適用が除外される自動車の種別に含まれないものはどれか。",choices:["A. 二輪自動車", "B. 三輪自動車", "C. 燃料電池自動車", "D. 普通乗用自動車（乗車定員5人）"],answer:"D",exp:"別添110の1.により、二輪自動車、側車付二輪自動車、三輪自動車、カタピラ及びそりを有する軽自動車、大型特殊自動車、小型特殊自動車、被牽引自動車並びに燃料電池自動車は除外されるが、普通乗用自動車（乗車定員5人）は適用対象となる。"},
  {no:7335,section:"保安基準別添",label:"別添110（電気式自動車及び電気式ハイブリッド自動車の高電圧からの乗車人員の保護に関する技術基準）",q:"別添110において、充電系連結システムの構成として正しいものはどれか。",choices:["A. 充電系連結システムは動力系に含まれる。", "B. 充電系連結システムは常時動力系と直流電気的に接続されている。", "C. 充電系連結システムは外部電源に接続している時以外には動力系から直流電気的に絶縁される。", "D. 充電系連結システムには燃料電池スタックが含まれる。"],answer:"C",exp:"別添110の2.4.により、充電系連結システムは電気回路を開閉する接触器、絶縁トランス等により外部電源に接続している時以外には動力系から直流電気的に絶縁される電気回路である。"},
  {no:7336,section:"保安基準別添",label:"別添110（電気式自動車及び電気式ハイブリッド自動車の高電圧からの乗車人員の保護に関する技術基準）",q:"別添110において、動力系の感電からの保護が適用される作動電圧の基準として正しいものはどれか。",choices:["A. 作動電圧が直流12V以上である部分を有する動力系に適用する。", "B. 作動電圧が直流48V以上である部分を有する動力系に適用する。", "C. 作動電圧が直流60V以上である部分を有する動力系（交流部分を含む）に適用する。", "D. 作動電圧が直流100V以上である部分を有する動力系に適用する。"],answer:"C",exp:"別添110の3.1.により、作動電圧が直流60V以上である部分を有する動力系（交流部分を含む）に適用する。"},
  {no:7337,section:"保安基準別添",label:"別添111（電気自動車、電気式ハイブリッド自動車及び燃料電池自動車の衝突後の高電圧からの乗車人員の保護に関する技術基準）",q:"別添111において、高電圧の定義として正しいものはどれか。",choices:["A. 直流60V以下又は交流30V（実効値）以下の作動電圧をいう。", "B. 直流60Vを超え1,500V以下又は交流30V（実効値）を超え1,000V（実効値）以下の作動電圧をいう。", "C. 直流100Vを超え1,000V以下又は交流50V（実効値）を超え750V（実効値）以下の作動電圧をいう。", "D. 直流48Vを超え600V以下又は交流24V（実効値）を超え480V（実効値）以下の作動電圧をいう。"],answer:"B",exp:"別添111の2.19.により、高電圧とは直流60Vを超え1,500V以下又は交流30V（実効値）を超え1,000V（実効値）以下の作動電圧をいう。"},
  {no:7338,section:"保安基準別添",label:"別添111（電気自動車、電気式ハイブリッド自動車及び燃料電池自動車の衝突後の高電圧からの乗車人員の保護に関する技術基準）",q:"別添111において、後面衝突に関する要件が適用される自動車として正しいものはどれか。",choices:["A. すべての電力により作動する原動機を有する自動車", "B. 乗車定員11人以上の自動車及び車両総重量が2.8tを超える自動車", "C. 専ら乗用の用に供する普通自動車又は小型自動車若しくは軽自動車（乗車定員11人以上の自動車及び車両総重量2.8t超を除く）", "D. 燃料電池自動車のみ"],answer:"C",exp:"別添111の3.により、後面衝突に関する要件は専ら乗用の用に供する普通自動車又は小型自動車若しくは軽自動車（乗車定員11人以上の自動車及び車両総重量が2.8tを超える自動車を除く）に適用する。"},
  {no:7339,section:"保安基準別添",label:"別添111（電気自動車、電気式ハイブリッド自動車及び燃料電池自動車の衝突後の高電圧からの乗車人員の保護に関する技術基準）",q:"別添111において、原動機用蓄電池パックの定義として正しいものはどれか。",choices:["A. 1つのセル又はセルの集合体から成る最小の単一エネルギ貯蔵体をいう。", "B. 原動機用蓄電池モジュール及び保持枠又はトレーやケースを含む単一の機械的集合体をいう。", "C. 駆動に係る電力を供給するための電気的に接続された電力貯蔵体及びその集合体をいう。", "D. 電気的に互いに接続された導電性の部分の集合体をいう。"],answer:"B",exp:"別添111の2.4.により、原動機用蓄電池パックとは原動機用蓄電池モジュール及び保持枠又はトレーやケースを含む単一の機械的集合体をいう。"},
  {no:7340,section:"保安基準別添",label:"別添112（後付消音器の技術基準）",q:"別添112において、第一種後付消音器の騒音防止性能試験の要件として、加速走行騒音の上限値（乗車定員10人以下の専ら乗用の普通自動車・小型自動車・軽自動車）として正しいものはどれか。",choices:["A. 73dBを超える騒音を発しない構造であること", "B. 76dBを超える騒音を発しない構造であること", "C. 79dBを超える騒音を発しない構造であること", "D. 82dBを超える騒音を発しない構造であること"],answer:"A",exp:"別添112 IのII表及び3.(2)により、専ら乗用の用に供する乗車定員10人以下の普通自動車・小型自動車・軽自動車（二輪除く）は73dBを超える騒音を発しない構造でなければならない。"},
  {no:7341,section:"保安基準別添",label:"別添112（後付消音器の技術基準）",q:"別添112において、第二種後付消音器の説明として正しいものはどれか。",choices:["A. 指定自動車等に備えられている消音器と異なる構造を有し、異なる範囲の自動車等に備えられるもの", "B. 指定自動車等に備えられている消音器と同一の構造を有し、同一の範囲の自動車等の同一の位置に備えられるもの", "C. 新たに開発された消音技術を用いた消音器", "D. 自動車に備えられた純正品の消音器"],answer:"B",exp:"別添112 Iの2.(2)により、第二種後付消音器とは指定自動車等に備えられている消音器と同一の構造を有し、かつ同一の範囲の自動車等の同一の位置に備えられるものをいう。"},
  {no:7342,section:"保安基準別添",label:"別添113（衝突被害軽減制動制御装置の技術基準）",q:"別添113において、警報制動の最大減速度の範囲として正しいものはどれか。",choices:["A. 最大減速度が0.49m/s2以上1.96m/s2以下であり、かつ0.5秒未満のもの", "B. 最大減速度が0.98m/s2以上2.45m/s2以下であり、かつ0.8秒未満のもの", "C. 最大減速度が1.47m/s2以上3.92m/s2以下であり、かつ1.0秒未満のもの", "D. 最大減速度が2.0m/s2以上4.0m/s2以下であり、かつ1.5秒未満のもの"],answer:"B",exp:"別添113の2.26.により、警報制動とは最大減速度が0.98m/s2以上2.45m/s2以下であり、かつ0.8秒未満の制動装置の制御による車両の制動をいう。"},
  {no:7343,section:"保安基準別添",label:"別添113（衝突被害軽減制動制御装置の技術基準）",q:"別添113の適用範囲として、衝突被害軽減制動制御装置の技術基準が適用される自動車に含まれないものはどれか。",choices:["A. 立席を有するものを除く専ら乗用の用に供する乗車定員10人以上の普通自動車であって車両総重量が5tを超えるもの", "B. 貨物の運送の用に供する普通自動車（第5輪荷重を有する牽引自動車及び被牽引自動車を除く）であって車両総重量が8tを超えるもの", "C. 貨物の運送の用に供する普通自動車（第5輪荷重を有する牽引自動車に限る）であって車両総重量が13tを超えるもの", "D. 軽自動車の乗用車であって車両総重量が3.5tを超えるもの"],answer:"D",exp:"別添113の1.により、適用対象は乗車定員10人以上の普通自動車（立席なし・GVW5t超）、貨物普通自動車（GVW8t超）及び牽引自動車（GVW13t超）である。軽自動車の乗用車は含まれない。"},
  {no:7344,section:"保安基準別添",label:"別添113（衝突被害軽減制動制御装置の技術基準）",q:"別添113において、装置搭載車がABSを備えていないトレーラを牽引する牽引自動車の場合、制動制御はどのように規定されているか。",choices:["A. 制動制御は通常どおり作動しなければならない。", "B. 制動制御は作動してはならない。", "C. 制動制御は警告灯の点灯と同時に作動しなければならない。", "D. 制動制御は速度50km/h以下の場合のみ作動してもよい。"],answer:"B",exp:"別添113の3.3.により、装置搭載車が牽引自動車である場合であって、被牽引自動車がABSを備えていない場合又は被牽引自動車のABSが故障している場合においては、制動制御は作動してはならない。"},
  {no:7345,section:"保安基準別添",label:"別添114（牽引自動車の軸重に関する技術基準）",q:"別添114において、試験自動車の走行速度として正しいものはどれか。",choices:["A. 速度3±1km/h", "B. 速度5±1km/h", "C. 速度10±2km/h", "D. 速度20±5km/h"],answer:"B",exp:"別添114の3.1.により、試験用ステップ板の上を速度5±1km/hで後軸の両輪が同時に当該ステップ板から離れるように試験自動車を走行させる。"},
  {no:7346,section:"保安基準別添",label:"別添114（牽引自動車の軸重に関する技術基準）",q:"別添114において、周波数が2.0Hzを超える場合の判定として正しいものはどれか。",choices:["A. 本技術基準に適合するものとする。", "B. 本技術基準に適合しないものとする。", "C. 追加試験を実施して判定する。", "D. 減衰比の値のみで判定する。"],answer:"B",exp:"別添114の4.1.により、周波数が2.0Hzを超える場合は本技術基準に適合しないものとする。"},
  {no:7347,section:"保安基準別添",label:"別添115（二輪車のばい煙、悪臭のあるガス、有害なガス等の発散防止装置に係る車載式故障診断装置の技術基準）",q:"別添115において、二輪車用J-OBDIが適用される自動車として正しいものはどれか。",choices:["A. すべてのガソリンを燃料とする二輪自動車", "B. 総排気量が0.050リットル以下で最高速度が50km/h以下のガソリンを燃料とする一般原動機付自転車", "C. ガソリンを燃料とする側車付二輪自動車", "D. 総排気量が0.125リットル以下のガソリンを燃料とする二輪自動車"],answer:"B",exp:"別添115のI.1.により、二輪車用J-OBDIは総排気量が0.050リットル以下で最高速度が50km/h以下のガソリンを燃料とする一般原動機付自転車に備えるものに適用する。"},
  {no:7348,section:"保安基準別添",label:"別添115（二輪車のばい煙、悪臭のあるガス、有害なガス等の発散防止装置に係る車載式故障診断装置の技術基準）",q:"別添115において、二輪車用J-OBDIの警告灯に関する規定として正しいものはどれか。",choices:["A. 走行開始後5分以内に正常作動を確認できる機能を有するものであること。", "B. 走行開始前に正常に作動することの確認ができる機能を有するものであること。", "C. 走行中に点灯して自動的に消灯する機能を有するものであること。", "D. 車速が時速30km以上の場合のみ点灯する機能を有するものであること。"],answer:"B",exp:"別添115のII.3.5.2.により、走行開始前に二輪車用J-OBDIが正常に作動することの確認ができる機能を有するものでなければならない。"},
  {no:7349,section:"保安基準別添",label:"別添115（二輪車のばい煙、悪臭のあるガス、有害なガス等の発散防止装置に係る車載式故障診断装置の技術基準）",q:"別添115において、電気回路診断の対象として明記されているセンサとして正しいものはどれか。",choices:["A. 乗員体重センサ", "B. 酸素センサ又は空燃比センサ", "C. フロントブレーキ圧力センサ", "D. ナビゲーションシステム位置センサ"],answer:"B",exp:"別添115のII.3.1.15.により、酸素センサ又は空燃比センサは電気回路診断の対象として明記されている。"},
  {no:7350,section:"保安基準別添",label:"別添116（オフサイクル時のディーゼル重量車排出ガスの制御に関する技術基準）",q:"別添116における規制対象排出ガスとして正しいものはどれか。",choices:["A. 一酸化炭素、非メタン炭化水素、窒素酸化物及び粒子状物質", "B. 一酸化炭素、全炭化水素、窒素酸化物及び二酸化炭素", "C. 一酸化炭素、窒素酸化物、粒子状物質及び硫黄酸化物", "D. 一酸化炭素、窒素酸化物、粒子状物質及び二酸化炭素"],answer:"A",exp:"別添116の2.6.により、規制対象排出ガスとは一酸化炭素、非メタン炭化水素、窒素酸化物及び粒子状物質をいう。"},
  {no:7351,section:"保安基準別添",label:"別添116（オフサイクル時のディーゼル重量車排出ガスの制御に関する技術基準）",q:"別添116において、ディフィートストラテジーの定義として正しいものはどれか。",choices:["A. 基本排出ガスストラテジーと補助排出ガスストラテジーを統合したものをいう。", "B. 基本排出ガスストラテジー及び補助排出ガスストラテジーの性能要件を満たさない排出ガスストラテジーをいう。", "C. 排出ガスを削減するために特定の条件下でのみ作動するストラテジーをいう。", "D. 試験時のみに作動する排出ガス制御ストラテジーをいう。"],answer:"B",exp:"別添116の2.4.により、ディフィートストラテジーとは基本排出ガスストラテジー及び補助排出ガスストラテジーの性能要件を満たさない排出ガスストラテジーをいう。"},
  {no:7352,section:"保安基準別添",label:"別添116（オフサイクル時のディーゼル重量車排出ガスの制御に関する技術基準）",q:"別添116の適用範囲として正しいものはどれか。",choices:["A. 軽油を燃料とする普通自動車及び小型自動車であって車両総重量が3.5tを超えるもの（専ら乗用の用に供する乗車定員10人以下のものを除く）", "B. ガソリンを燃料とするすべての自動車", "C. 軽油を燃料とするすべての自動車", "D. 軽油を燃料とする車両総重量5t以下の小型自動車"],answer:"A",exp:"別添116の1.により、本技術基準は軽油を燃料とする普通自動車及び小型自動車であって車両総重量が3.5tを超えるもの（専ら乗用の用に供する乗車定員10人以下のものを除く）のオフサイクル時の排出ガスの制御に適用する。"},
  {no:7353,section:"保安基準別添",label:"別添117（二輪車の燃料蒸発ガスの測定方法）",q:"別添117において、非露出型燃料タンクの定義として正しいものはどれか。",choices:["A. 燃料タンクが完全に密閉されているもの", "B. 燃料タンクキャップ以外の部分が直射日光に当たらないように備え付けられた燃料タンク", "C. 燃料タンクが車体内部に完全に収納されているもの", "D. 燃料タンクの素材が樹脂製のもの"],answer:"B",exp:"別添117の2.1.により、非露出型燃料タンクとは燃料タンクキャップ以外の部分が直射日光に当たらないように備え付けられた燃料タンクをいう。"},
  {no:7354,section:"保安基準別添",label:"別添117（二輪車の燃料蒸発ガスの測定方法）",q:"別添117において、温度計の精度として正しいものはどれか。",choices:["A. プラスマイナス0.5K以内", "B. プラスマイナス1K（プラスマイナス1度C）以内", "C. プラスマイナス2K以内", "D. プラスマイナス5K以内"],answer:"B",exp:"別添117の5.1.により、温度計の精度はプラスマイナス1K（プラスマイナス1度C）以内であること。"},
  {no:7355,section:"保安基準別添",label:"別添117（二輪車の燃料蒸発ガスの測定方法）",q:"別添117において、SHED試験のプレコンディショニングフェーズにおける車両ソークの温度範囲として正しいものはどれか。",choices:["A. 283.7Kから303.7Kの間で60分", "B. 288.7Kから308.7Kの間で60分", "C. 293.7Kから313.7Kの間で60分", "D. 298.0Kから318.0Kの間で60分"],answer:"B",exp:"別添117別紙1の図1により、車両ソークは288.7から308.7K（摂氏15.7から35.7度）の範囲で60分間行うものとされている。"},
  {no:7356,section:"保安基準別添",label:"別添118（圧縮水素ガスを燃料とする二輪自動車及び側車付二輪自動車の燃料装置の技術基準）",q:"別添118において、容器安全弁の定義として正しいものはどれか。",choices:["A. 圧力が異常に上昇した場合に圧力を減じる弁であって、再び閉めることができるもの", "B. ガス容器内の水素ガスの流出を遮断する弁", "C. ガス容器に直接取り付けられ、温度異常上昇時に一回に限って作動し水素ガスを放出する弁", "D. ガス容器からガス充填口への水素ガスの逆流を防止する弁"],answer:"C",exp:"別添118の2.6.により、容器安全弁とはガス容器に直接取り付けられ、ガス容器内の水素ガスの温度が異常に上昇しガス容器が損傷するおそれがある場合に一回に限って作動し水素ガスを放出する弁をいう。"},
  {no:7357,section:"保安基準別添",label:"別添118（圧縮水素ガスを燃料とする二輪自動車及び側車付二輪自動車の燃料装置の技術基準）",q:"別添118において、ガス充填口の取付に関して禁止されている場所として正しいものはどれか。",choices:["A. 車体外部の目立つ場所", "B. 車体外部からの衝撃を吸収する構造体の外側", "C. 運転者室内、客室内、荷室内及び換気が十分でない場所", "D. 車体後部の上部"],answer:"C",exp:"別添118の3.1.3.により、ガス充填口は車体外部からの衝撃を吸収する構造体の内側、運転者室内、客室内、荷室内、その他水素ガスが滞留する場所及び換気が十分でない場所に取り付けてはならない。"},
  {no:7358,section:"保安基準別添",label:"別添118（圧縮水素ガスを燃料とする二輪自動車及び側車付二輪自動車の燃料装置の技術基準）",q:"別添118において、主止弁の定義として正しいものはどれか。",choices:["A. 圧力が異常に上昇した場合に圧力を減じる弁をいう。", "B. 容器元弁のうち電磁的に作動することによりその弁から下流への水素ガスの供給を遮断する弁であって、電源に接続されていないときは閉じているもの", "C. ガス容器に直接取り付けられ水素ガスの流出を遮断する弁全般", "D. 容器元弁のうちガス容器からガス充填口への水素ガスの逆流を防止する弁"],answer:"B",exp:"別添118の2.4.により、主止弁とは容器元弁のうち電磁的に作動することによりその弁から下流への水素ガスの供給を遮断する弁であって、電源に接続されていないときは閉じているものをいう。"},
  {no:7359,section:"保安基準別添",label:"別添119（路上走行時のディーゼル軽・中量車排出ガスに関する技術基準）",q:"別添119の適用範囲として正しいものはどれか。",choices:["A. ガソリンを燃料とするすべての乗用自動車", "B. 軽油を燃料とする普通自動車及び小型自動車であって、車両総重量が3.5t以下のもの又は専ら乗用の用に供する乗車定員9人以下のもの", "C. 軽油を燃料とする大型貨物自動車", "D. 軽油を燃料とする車両総重量が5tを超えるすべての自動車"],answer:"B",exp:"別添119の1.により、本技術基準は軽油を燃料とする普通自動車及び小型自動車であって、車両総重量が3.5t以下のもの又は専ら乗用の用に供する乗車定員9人以下のものについて適用する。"},
  {no:7360,section:"保安基準別添",label:"別添119（路上走行時のディーゼル軽・中量車排出ガスに関する技術基準）",q:"別添119において、拡張高度条件として規定されている範囲として正しいものはどれか。",choices:["A. 海抜500mを超え海抜700m以下", "B. 海抜700mを超え海抜1000m以下", "C. 海抜1000mを超え海抜1500m以下", "D. 海抜1500mを超え海抜2000m以下"],answer:"B",exp:"別添119の2.3.により、拡張高度条件は海抜700mを超え海抜1000m以下とする。"},
  {no:7381,section:"保安基準別添",label:"別添122（高速道路等における低速自動運行装置を備える自動車の技術基準）",q:"自動車線維持システム（ALKS）の作動が許可される最高速度として正しいものはどれか。",choices:["A. 40km/h", "B. 50km/h", "C. 60km/h", "D. 80km/h"],answer:"C",exp:"別添122の3.1.2.3.1.に「自動車線維持システムの作動が許可される最高速度は60km/hである」と規定されている。"},
  {no:7382,section:"保安基準別添",label:"別添122（高速道路等における低速自動運行装置を備える自動車の技術基準）",q:"自動車線維持システムにおいて、引継ぎ要求の開始から強化されるまでの最大時間として正しいものはどれか。",choices:["A. 2秒後", "B. 4秒後", "C. 10秒後", "D. 30秒後"],answer:"B",exp:"別添122の3.1.4.3.2.に「引継ぎフェーズの間、引継ぎ要求は、当該要求の開始から遅くとも4秒後に強化されなければならない」と規定されている。"},
  {no:7383,section:"保安基準別添",label:"別添123（作動状態記録装置の技術基準）",q:"作動状態記録装置が記録した情報の保存期間について、正しいものはどれか。",choices:["A. 3ヶ月間またはデータ記録が1000回を超えるまでのいずれか短い期間", "B. 6ヶ月間またはデータ記録が2500回を超えるまでのいずれか短い期間", "C. 1年間またはデータ記録が5000回を超えるまでのいずれか短い期間", "D. 2年間またはデータ記録が10000回を超えるまでのいずれか短い期間"],answer:"B",exp:"別添123の3.3.1.に「6ヶ月間」または「2500回を超えて情報を記録するまでの間」のいずれか短い期間と規定されている。"},
  {no:7384,section:"保安基準別添",label:"別添123（作動状態記録装置の技術基準）",q:"作動状態記録装置のタイムスタンプの精度として正しいものはどれか。",choices:["A. ±0.1秒", "B. ±0.5秒", "C. ±1.0秒", "D. ±2.0秒"],answer:"C",exp:"別添123の3.2.1.3.2.に「精度：±1.0秒」と規定されている。"},
  {no:7385,section:"保安基準別添",label:"別添123（作動状態記録装置の技術基準）",q:"事故情報計測・記録装置を備える自動車の作動状態記録装置は、トリガー条件を最後に満たした時点から少なくとも何秒前までに記録したデータを電子通信インターフェースにより取得できなければならないか。",choices:["A. 10秒前", "B. 20秒前", "C. 30秒前", "D. 60秒前"],answer:"C",exp:"別添123の3.4.3.1.に「事故情報記録・計測装置へのトリガー条件を最後に満たした時点から少なくとも30秒前までに記録したデータを電子通信インターフェースにより取得できなければならない」と規定されている。"},
  {no:7386,section:"保安基準別添",label:"別添124（継続検査等に用いる車載式故障診断装置の技術基準）",q:"継続検査等に用いる車載式故障診断装置（継続検査用OBD）において、「特定故障コード」の定義として正しいものはどれか。",choices:["A. 故障コードのうち、自動車製作者が定めた任意のコード", "B. 故障コードのうち、当該コードのみで対象装置が基準に適合しなくなると識別できるもの", "C. 故障コードのうち、走行中の診断により記録されるもの", "D. 故障コードのうち、排出ガス規制に関するもの"],answer:"B",exp:"別添124の用語定義に「特定故障コード」は「故障コードのうち、当該故障コードのみで対象装置が基準に適合しなくなると識別できるもの」と規定されている。"},
  {no:7387,section:"保安基準別添",label:"別添124（継続検査等に用いる車載式故障診断装置の技術基準）",q:"継続検査用OBDに規定する故障コードの規格として、正しい組み合わせはどれか。",choices:["A. ISO 15031-6またはSAE J 2012", "B. ISO 9141またはISO 15765", "C. SAE J1939またはISO 13400", "D. ISO 14229またはISO 14230"],answer:"A",exp:"別添124の3.1.(1)に「故障コードは、ISO 15031-6又はSAE J 2012に従って定められたものであること」と規定されている。"},
  {no:7388,section:"保安基準別添",label:"別添125（車載式燃料・電力消費等測定装置の技術基準）",q:"「ライフタイム値」の定義として正しいものはどれか。",choices:["A. 車両製作時から廃車までの総積算値", "B. 車両完成時から特定の時間までの間に積算される値", "C. 各走行サイクルにおける燃料消費量の平均値", "D. 直近1年間に積算された燃料消費量の合計値"],answer:"B",exp:"別添125の2.2.に「ライフタイム値とは、車両完成時から特定の時間までの間に積算される値をいう」と定義されている。"},
  {no:7389,section:"保安基準別添",label:"別添125（車載式燃料・電力消費等測定装置の技術基準）",q:"車載式燃料・電力消費等測定装置において、ガソリン又は軽油を燃料とする乗用車（乗車定員9人以下）の精度要件として正しいものはどれか。",choices:["A. 試験WLTC燃料消費量との差が－10%を超え10%未満であること", "B. 試験WLTC燃料消費量との差が－5%を超え5%未満であること", "C. 試験WLTC燃料消費量との差が±3%以内であること", "D. 試験WLTC燃料消費量との差が±1%以内であること"],answer:"B",exp:"別添125の4.に「試験WLTC燃料消費量から記録される総燃料消費量を引いて得た値を試験WLTC燃料消費量で除した値が－0.05を超え0.05未満であること（つまり±5%未満）」と規定されている。"},
  {no:7390,section:"保安基準別添",label:"別添126（特定小型原動機付自転車の走行安定性の技術基準）",q:"特定小型原動機付自転車の走行安定性試験において、試験路面通過後の進行方向誤差の許容範囲として正しいものはどれか。",choices:["A. 10度以内", "B. 15度以内", "C. 20度以内", "D. 30度以内"],answer:"C",exp:"別添126の2.(2)に「目標と実際の軌道の誤差は20度以内であること」と規定されている。"},
  {no:7391,section:"保安基準別添",label:"別添127（特定小型原動機付自転車の速度抑制装置の技術基準）",q:"特定小型原動機付自転車の速度抑制装置における設定最高速度の上限として正しいものはどれか（歩道通行モード以外の場合）。",choices:["A. 15km/h", "B. 20km/h", "C. 25km/h", "D. 30km/h"],answer:"B",exp:"別添127の3.2.に「速度抑制装置の設定最高速度は、20km/h（6km/h）以下の任意の速度とする」と規定されている。通常走行モードの上限は20km/hである。"},
  {no:7392,section:"保安基準別添",label:"別添127（特定小型原動機付自転車の速度抑制装置の技術基準）",q:"特定小型原動機付自転車の速度抑制装置の走行試験において、試験車両の平均安定速度の許容誤差として正しいものはどれか。",choices:["A. 実測値が平均安定速度の±5%以内", "B. 実測値が平均安定速度の±10%以内", "C. 実測値が平均安定速度の±15%以内", "D. 実測値が平均安定速度の±20%以内"],answer:"B",exp:"別添127の4.2.2.に「実測値が平均安定速度の±10%以内であること」と規定されている。"},
  {no:7393,section:"保安基準別添",label:"別添128（車両後退通報装置の通報音の測定方法）",q:"車両後退通報装置の通報音測定に用いる騒音計の周波数補正回路の特性として正しいものはどれか。",choices:["A. C特性", "B. Z特性（フラット）", "C. A特性", "D. B特性"],answer:"C",exp:"別添128の3.1.1.(2)に「周波数補正回路の特性は、A特性とする」と規定されている。"},
  {no:7394,section:"保安基準別添",label:"別添128（車両後退通報装置の通報音の測定方法）",q:"車両後退通報装置の通報音測定において、マイクロホンの設置位置として正しいものはどれか。",choices:["A. 車両中心線上から左右方向±0.15m以内、車両後端から1.00±0.10m、地上0.45mから1.55mの範囲", "B. 車両中心線上から左右方向±0.30m以内、車両後端から2.00±0.20m、地上0.50mから1.20mの範囲", "C. 車両後端の中心から後方1.00m、地上高さ1.00m固定", "D. 車両後端から0.50±0.05mの位置、地上1.20mの高さ固定"],answer:"A",exp:"別添128の3.2.(1)に「マイクロホンは、車両中心線上から左右方向±0.15mの位置、かつ、車両後端から1.00±0.10mの位置で、地上0.45mから1.55mの範囲のいずれかの高さの位置」と規定されている。"},
  {no:7395,section:"保安基準別添",label:"別添129（後方視界看視装置の技術基準）",q:"後方視界看視装置の技術基準において、試験対象物の寸法として正しいものはどれか。",choices:["A. 高さ1.0m、直径0.2mの円柱", "B. 高さ0.8m、直径0.3mの円柱", "C. 高さ0.5m、直径0.5mの円柱", "D. 高さ1.2m、直径0.4mの円柱"],answer:"B",exp:"別添129の2.2.に「試験対象物とは、高さ0.8m、直径0.3mの円柱形の対象物を指す」と規定されている。"},
  {no:7396,section:"保安基準別添",label:"別添129（後方視界看視装置の技術基準）",q:"後方視界看視装置の近接後方視界において、車両最後端を基準とした前後の境界面の距離として正しいものはどれか。",choices:["A. 後方0.2mから2.5mの範囲", "B. 後方0.3mから3.5mの範囲", "C. 後方0.5mから5.0mの範囲", "D. 後方1.0mから4.0mの範囲"],answer:"B",exp:"別添129の3.1.(a)(b)に「車両の最後端の後方0.3mにある点を通る鉛直面」および「車両の最後端の後方3.5mにある点を通る鉛直面」が近接後方視界の境界として規定されている。"},
  {no:7397,section:"保安基準別添",label:"別添130（後方視界看視装置取付装置等の技術基準）",q:"後退イベントの定義において、前進状態に係る終了条件の一つとして正しいものはどれか。",choices:["A. 速度が10km/h以下になった場合", "B. 速度が16km/h以下になった場合", "C. 速度が20km/h以下になった場合", "D. 速度が8km/h以下になった場合"],answer:"B",exp:"別添130の2.2.(a)に後退イベントの終了条件として「速度≦16km/h（0km/hを含む）」が規定されている。"},
  {no:7398,section:"保安基準別添",label:"別添130（後方視界看視装置取付装置等の技術基準）",q:"後方視界看視装置（バックカメラシステム）において、型式指定時の後退イベント開始から後方視界像が表示されるまでの時間として正しいものはどれか。",choices:["A. 1.0秒以内", "B. 2.0秒以内", "C. 3.0秒以内", "D. 5.0秒以内"],answer:"B",exp:"別添130の3.4.に「型式の指定等を行う場合にあっては後退イベントの開始から2.0秒以内に後方視界像が表示されるものとする」と規定されている。"},
  {no:7399,section:"保安基準別添",label:"別添131（圧縮水素ガスを燃料とする自動車のガス容器及びガス容器附属品の技術基準）",q:"圧縮水素ガスを燃料とする自動車のガス容器に関する技術基準において、「国際相互承認圧縮水素自動車燃料装置用容器」が適合すべき協定規則として正しいものはどれか。",choices:["A. 協定規則第110号", "B. 協定規則第134号", "C. 協定規則第146号", "D. 協定規則第154号"],answer:"B",exp:"別添131の2.1.に「国際相互承認圧縮水素自動車燃料装置用容器とは、協定規則第134号の基準に適合するものとして認定された自動車の燃料装置用として圧縮水素を充填するためのガス容器」と規定されている。"},
  {no:7400,section:"保安基準別添",label:"別添132（圧縮天然ガスを燃料とする自動車のガス容器及びガス容器附属品の技術基準）",q:"圧縮天然ガス自動車燃料装置用容器において、「フープラップ容器」の定義として正しいものはどれか。",choices:["A. ライナーにヘリカル巻により繊維を巻き付けたガス容器", "B. ライナーにフープ巻のみにより繊維を巻き付けたガス容器", "C. 溶接部を有しない継目なし構造のガス容器", "D. ライナー全体を繊維で覆ったフルラップ構造のガス容器"],answer:"B",exp:"別添132の2.8.に「フープラップ容器とは、ライナーに、フープ巻（ライナー胴部に繊維を軸とほぼ直角に巻き付ける方法）のみにより樹脂含浸連続繊維を巻き付けたガス容器」と定義されている。"},
  {no:7401,section:"保安基準別添",label:"別添132（圧縮天然ガスを燃料とする自動車のガス容器及びガス容器附属品の技術基準）",q:"圧縮天然ガス自動車燃料装置用容器が適合すべき協定規則として正しいものはどれか。",choices:["A. 協定規則第100号", "B. 協定規則第110号", "C. 協定規則第134号", "D. 協定規則第146号"],answer:"B",exp:"別添132の2.1.に「国際相互承認圧縮天然ガス自動車燃料装置用容器とは、協定規則第110号に適合するものとして認定された容器」と規定されている。"},
  {no:7402,section:"保安基準別添",label:"別添133（液化天然ガスを燃料とする自動車のガス容器及びガス容器附属品の技術基準）",q:"液化天然ガス（LNG）自動車燃料装置用容器附属品（国際相互承認）として、圧縮天然ガス（CNG）用附属品と比較して追加されているものはどれか。",choices:["A. 安全弁", "B. バルブ", "C. 逆止弁", "D. 過流防止弁"],answer:"C",exp:"別添133の2.2.には国際相互承認液化天然ガス自動車燃料装置用容器附属品としてバルブ、安全弁、逆止弁、過流防止弁が列挙されている。別添132（CNG）の2.2.にはバルブ、安全弁、過流防止弁が規定されており、LNG用には「逆止弁」が追加されている点が特徴的である。"},
  {no:8001,section:"保安基準適用関係",label:"第1条（定義等）",q:"道路運送車両の保安基準適用関係告示において、用語の定義が規定されている根拠法令として正しいものはどれか。",choices:["A. 道路交通法第2条、保安基準第1条及び細目告示第2条第1項による", "B. 道路運送車両法第2条、保安基準第1条及び細目告示第2条第1項による", "C. 道路運送法第2条、保安基準第2条及び細目告示第2条第1項による", "D. 道路運送車両法第3条、保安基準第1条及び細目告示第2条第2項による"],answer:"B",exp:"第1条（定義等）において、用語の定義は道路運送車両法第2条、保安基準第1条及び細目告示第2条第1項によると規定されている。"},
  {no:8002,section:"保安基準適用関係",label:"第4条（原動機及び動力伝達装置）",q:"道路運送車両の保安基準適用関係告示（第4条）において、速度抑制装置（保安基準第8条第4項）の適用に関する記述として正しいものはどれか。",choices:["A. 平成15年8月31日以前に製作された自動車には速度抑制装置の備付義務が全て免除される", "B. 平成15年8月31日以前に製作された自動車には速度抑制装置備付期限の経過措置が設けられている", "C. 電気自動車には速度抑制装置の備付義務が常に適用される", "D. すべての自動車に速度抑制装置（OBD規制含む）の適用除外はない"],answer:"B",exp:"第4条では、平成15年8月31日以前に製作された自動車に対して速度抑制装置備付期限の経過措置が設けられている。また電気自動車はOBD規制の適用除外となる場合がある。"},
  {no:8003,section:"保安基準適用関係",label:"第4条（原動機及び動力伝達装置）",q:"第4条（原動機及び動力伝達装置）において、燃料消費率測定規制の適用除外となる燃料種として正しいものはどれか。",choices:["A. ガソリン車及びLPG車", "B. 軽油（ディーゼル）車のみ", "C. 圧縮水素ガス自動車・電気自動車・燃料電池自動車", "D. 全ての自動車が適用除外となる"],answer:"C",exp:"第4条では圧縮水素ガス自動車（EV含む）・燃料電池自動車（FCEV）等について燃料消費率測定規制の適用除外が定められている。"},
  {no:8004,section:"保安基準適用関係",label:"第7条（かじ取装置）",q:"第7条（かじ取装置）において、旧基準の適用対象となる製作時期として正しいものはどれか。",choices:["A. 昭和45年9月30日以前に製作された自動車", "B. 昭和48年9月30日以前に製作された自動車", "C. 昭和50年3月31日以前に製作された自動車", "D. 昭和55年12月31日以前に製作された自動車"],answer:"B",exp:"第7条（かじ取装置）では昭和48年9月30日以前に製作された自動車に旧基準を適用する経過措置が設けられている。"},
  {no:8005,section:"保安基準適用関係",label:"第7条（かじ取装置）",q:"第7条（かじ取装置）において、小型低速軽自動車の特例基準で定められている車両長さとして正しいものはどれか。",choices:["A. 長さ2.00m以下", "B. 長さ2.50m以下", "C. 長さ3.00m以下", "D. 長さ3.50m以下"],answer:"B",exp:"第7条における小型低速軽自動車の特例基準では、長さ2.50m等の寸法要件が定められている。"},
  {no:8006,section:"保安基準適用関係",label:"第13条（高圧ガスを燃料とする自動車の燃料装置）",q:"第13条（高圧ガスを燃料とする自動車の燃料装置）が対象とする燃料の種類として正しいものはどれか。",choices:["A. 圧縮水素ガス・ガソリン・液化石油ガスを燃料とする自動車", "B. 圧縮水素ガス・圧縮天然ガス・液化天然ガスを燃料とする自動車", "C. 電気・燃料電池・圧縮天然ガスを燃料とする自動車", "D. 液化石油ガス・圧縮天然ガス・軽油を燃料とする自動車"],answer:"B",exp:"第13条は圧縮水素ガス・圧縮天然ガス・液化天然ガスを燃料とする自動車の燃料装置（ガス容器・配管等）に関する経過措置を定めている。"},
  {no:8007,section:"保安基準適用関係",label:"第13条（高圧ガスを燃料とする自動車の燃料装置）",q:"第13条において引用されている、高圧ガス燃料装置に関連する協定規則の番号として正しいものはどれか。",choices:["A. 協定規則第79号・第80号・第100号・第110号", "B. 協定規則第94号・第95号・第110号・第134号", "C. 協定規則第44号・第129号・第145号・第173号", "D. 協定規則第10号・第14号・第16号・第17号"],answer:"B",exp:"第13条では衝突時の乗員保護基準等として協定規則第94号・第95号・第110号・第134号・第137号等が引用されている。"},
  {no:8008,section:"保安基準適用関係",label:"第14条（電気装置）",q:"第14条（電気装置）において、旧基準（電気配線被覆・電気端子の保護・蓄電池固定）が適用される製作時期として正しいものはどれか。",choices:["A. 昭和40年12月31日以前に製作された自動車", "B. 昭和46年12月31日以前に製作された自動車", "C. 昭和50年3月31日以前に製作された自動車", "D. 昭和55年9月30日以前に製作された自動車"],answer:"B",exp:"第14条（電気装置）では昭和46年12月31日以前に製作された自動車に旧基準（電気配線被覆、電気端子の保護、蓄電池固定）を適用する経過措置がある。"},
  {no:8009,section:"保安基準適用関係",label:"第14条（電気装置）",q:"第14条において、サイバーセキュリティシステム及びプログラム等改変システムに関する協定規則として正しいものはどれか。",choices:["A. 協定規則第94号別添", "B. 協定規則第100号", "C. 協定規則別添120", "D. 協定規則第175号"],answer:"C",exp:"第14条では、サイバーセキュリティシステム・プログラム等改変システムについて協定規則別添120の段階的適用（令和4〜8年）が規定されている。"},
  {no:8010,section:"保安基準適用関係",label:"第19条（座席）",q:"第19条（座席）において、旧基準（座席寸法・間隙・取付耐久性等）が適用される製作時期の区分として正しいものはどれか。",choices:["A. 乗用車：平成15年6月30日以前、大型・貨物：平成19年6月30日以前", "B. 乗用車：平成19年6月30日以前、大型・貨物：平成24年6月30日以前", "C. 乗用車：平成24年6月30日以前、大型・貨物：平成28年6月30日以前", "D. 全車種共通で平成22年3月31日以前"],answer:"B",exp:"第19条では乗用車は平成19年6月30日以前、大型・貨物車は平成24年6月30日以前に製作された自動車に旧基準を適用する経過措置が設けられている。"},
  {no:8011,section:"保安基準適用関係",label:"第20条（座席ベルト等）",q:"第20条（座席ベルト等）において引用されている、座席ベルトに関する主な協定規則として正しい組み合わせはどれか。",choices:["A. 協定規則第10号・第17号・第80号・第100号", "B. 協定規則第14号・第16号・第173号・第174号", "C. 協定規則第44号・第94号・第95号・第129号", "D. 協定規則第79号・第134号・第145号・第153号"],answer:"B",exp:"第20条（座席ベルト等）では協定規則第14号・第16号・第173号・第174号への各改訂版読替えが令和9年まで段階的に規定されている。"},
  {no:8012,section:"保安基準適用関係",label:"第20条（座席ベルト等）",q:"第20条において、座席ベルト非装着時警報装置（ELR等）の段階的適用期間として正しいものはどれか。",choices:["A. 平成25年〜平成30年", "B. 平成28年〜令和5年", "C. 令和元年〜令和9年", "D. 令和5年〜令和12年"],answer:"C",exp:"第20条では座席ベルト非装着時警報装置（ELR等）の段階的適用について令和元年〜令和9年の期間が経過措置として設けられている。"},
  {no:8013,section:"保安基準適用関係",label:"第21条（頭部後傾抑止装置）",q:"第21条（頭部後傾抑止装置）において、旧基準が適用される製作時期として正しいものはどれか。",choices:["A. 平成19年6月30日以前に製作された自動車", "B. 平成22年3月31日以前に製作された自動車", "C. 平成24年6月30日以前に製作された自動車", "D. 平成28年3月31日以前に製作された自動車"],answer:"C",exp:"第21条（頭部後傾抑止装置）では平成24年6月30日以前に製作された自動車に旧基準（追突等による頭部後傾抑止装置の基準）を適用する経過措置が設けられている。"},
  {no:8014,section:"保安基準適用関係",label:"第21条（頭部後傾抑止装置）",q:"第21条において引用されている協定規則第17号の読替え対象改訂版として正しいものはどれか。",choices:["A. 第8改訂版・第9改訂版", "B. 第10改訂版・第11改訂版補足改訂版", "C. 第12改訂版・第13改訂版", "D. 第6改訂版・第7改訂版"],answer:"B",exp:"第21条では協定規則第17号（座席・頭部後傾抑止装置）について第10改訂版・第11改訂版補足改訂版への段階的読替えが令和4年〜令和11年に定められている。"},
  {no:8015,section:"保安基準適用関係",label:"第22条（年少者用補助乗車装置等）",q:"第22条（年少者用補助乗車装置等）において、旧基準（チャイルドシート装置・取付具・着脱性）が適用される製作時期として正しいものはどれか。",choices:["A. 昭和62年3月31日以前に製作された自動車", "B. 平成7年3月31日以前に製作された自動車", "C. 平成12年3月31日以前に製作された自動車", "D. 平成15年9月30日以前に製作された自動車"],answer:"B",exp:"第22条（年少者用補助乗車装置等）では平成7年3月31日以前に製作された自動車に旧基準（チャイルドシート装置・取付具・着脱性）を適用する経過措置がある。"},
  {no:8016,section:"保安基準適用関係",label:"第22条（年少者用補助乗車装置等）",q:"第22条において、協定規則第44号から第129号（ISOFIX等）への移行経過措置の期間として正しいものはどれか。",choices:["A. 平成25年〜平成30年", "B. 平成28年〜令和3年", "C. 令和2年〜令和8年", "D. 令和5年〜令和12年"],answer:"C",exp:"第22条では協定規則第44号から第129号（ISOFIX等）への移行について令和2年〜令和8年の段階的経過措置が規定されている。"},
  {no:8061,section:"保安基準適用関係",label:"第26条（窓ガラス）",q:"平成元年4月30日以前に製作された自動車の窓ガラスについて、最高速度35キロメートル毎時未満の大型特殊自動車にはどのような適用が定められているか。",choices:["A. すべての窓ガラスが安全ガラスでなければならない", "B. 前面ガラスのみが安全ガラスでなければならない", "C. 窓ガラスに関する規定は一切適用されない", "D. 側面ガラスのみが安全ガラスでなければならない"],answer:"B",exp:"第26条第1項第1号において、最高速度35キロメートル毎時未満の大型特殊自動車にあっては前面ガラスのみが安全ガラスでなければならないとされており、すべての窓ガラスへの適用ではない。"},
  {no:8062,section:"保安基準適用関係",label:"第26条（窓ガラス）",q:"前面ガラスに乗用自動車の試験領域Aにアンテナをはり付ける場合の要件として正しいものはどれか。",choices:["A. 機器の幅が1.0ミリメートル以下であること", "B. 機器の幅が0.5ミリメートル以下であり、かつ3本以下であること", "C. 機器の幅が0.5ミリメートル以下であること（本数制限なし）", "D. 機器の幅が1.0ミリメートル以下であり、かつ3本以下であること"],answer:"B",exp:"第26条第1項第3号トの(1)において、試験領域Aにはり付ける場合は機器の幅が0.5ミリメートル以下であり、かつ3本以下であることと規定されている。"},
  {no:8063,section:"保安基準適用関係",label:"第26条（窓ガラス）",q:"前面ガラス及び側面ガラス（運転者席より後方の部分を除く）に装着等が認められるものとして誤っているものはどれか。",choices:["A. 検査標章", "B. 整備命令標章", "C. 車検ステッカー（民間の認証）", "D. 臨時検査合格標章"],answer:"C",exp:"第26条第1項第3号では、前面ガラス及び側面ガラスに装着等が認められるものとして整備命令標章、臨時検査合格標章、検査標章など法令で定めるものが列挙されている。民間の認証ステッカーは規定にないため認められない。"},
  {no:8064,section:"保安基準適用関係",label:"第27条（騒音防止装置）",q:"昭和51年8月31日以前に製作された普通自動車のうち、車両総重量が3.5トンを超え、かつ原動機の最高出力が150キロワットを超えるものの定常走行騒音の基準として正しいものはどれか。",choices:["A. 74デシベルを超えないこと", "B. 78デシベルを超えないこと", "C. 80デシベルを超えないこと", "D. 86デシベルを超えないこと"],answer:"C",exp:"第27条第1項の表において、車両総重量が3.5トンを超え、原動機の最高出力が150キロワットを超えるものの定常走行騒音は80デシベルを超えない構造とされている。"},
  {no:8065,section:"保安基準適用関係",label:"第27条（騒音防止装置）",q:"昭和51年8月31日以前に製作された小型自動車（二輪自動車に限る）の加速走行騒音の上限として正しいものはどれか。",choices:["A. 84デシベル", "B. 86デシベル", "C. 89デシベル", "D. 92デシベル"],answer:"B",exp:"第27条第1項の表において、小型自動車（二輪自動車に限る）の加速走行騒音の上限は86デシベルと定められている。"},
  {no:8066,section:"保安基準適用関係",label:"第27条（騒音防止装置）",q:"昭和52年8月31日以前に製作された専ら乗用の用に供する乗車定員10人以下の普通自動車（二輪を除く）の定常走行騒音の上限として正しいものはどれか。",choices:["A. 70デシベル", "B. 74デシベル", "C. 78デシベル", "D. 80デシベル"],answer:"A",exp:"第27条第2項の表において、専ら乗用の用に供する乗車定員10人以下の普通自動車・小型自動車・軽自動車（二輪除く）の定常走行騒音は70デシベルとされている。"},
  {no:8067,section:"保安基準適用関係",label:"第28条（ばい煙、悪臭のあるガス、有害なガス等の発散防止装置）",q:"昭和45年12月31日以前に製作された自動車について適用が免除される細目告示の規定として正しいものはどれか。（昭和45年9月1日以降に指定を受けた型式指定自動車及び認定を受けた型式認定自動車（軽自動車に限る）を除く）",choices:["A. 細目告示第41条第1項及び第2項", "B. 細目告示第41条第3項、第119条第3項及び第197条第3項", "C. 細目告示第41条第4項、第119条第4項及び第197条第4項", "D. 細目告示第41条第1項第5号から第8号まで及び第2項"],answer:"B",exp:"第28条第1項の表において、昭和45年12月31日以前に製作された自動車については細目告示第41条第3項、第119条第3項及び第197条第3項の規定が適用されないとされている。"},
  {no:8068,section:"保安基準適用関係",label:"第28条（ばい煙、悪臭のあるガス、有害なガス等の発散防止装置）",q:"軽油を燃料とする大型特殊自動車又は小型特殊自動車であって定格出力が19kW以上37kW未満の原動機を備えたものは、何年8月31日以前に製作された場合に一部規定の適用が免除されるか。",choices:["A. 平成19年8月31日", "B. 平成20年8月31日", "C. 平成21年8月31日", "D. 平成22年8月31日"],answer:"B",exp:"第28条第1項の表第8号イにおいて、定格出力が19kW以上37kW未満の原動機を備えた自動車は平成20年8月31日以前に製作されたものが対象とされている。"},
  {no:8069,section:"保安基準適用関係",label:"第29条（前照灯等）",q:"平成17年12月31日以前に製作された自動車の走行用前照灯について、すべてを同時に照射したときに確認できる距離（通常の場合）として正しいものはどれか。",choices:["A. 夜間前方50メートルの距離にある交通上の障害物", "B. 夜間前方75メートルの距離にある交通上の障害物", "C. 夜間前方100メートルの距離にある交通上の障害物", "D. 夜間前方150メートルの距離にある交通上の障害物"],answer:"C",exp:"第29条第1項第1号イにおいて、走行用前照灯はすべてを同時に照射したときに夜間前方100メートルの距離にある交通上の障害物を確認できる性能を有することが必要とされている。"},
  {no:8070,section:"保安基準適用関係",label:"第29条（前照灯等）",q:"走行用前照灯の最高光度の合計の上限として正しいものはどれか。",choices:["A. 10万カンデラ", "B. 15万カンデラ", "C. 20万カンデラ", "D. 22万5000カンデラ"],answer:"D",exp:"第29条第1項第1号イにおいて、走行用前照灯の最高光度の合計は22万5000カンデラを超えないことが規定されている。"},
  {no:8071,section:"保安基準適用関係",label:"第29条（前照灯等）",q:"すれ違い用前照灯（通常の自動車）の照明部の上縁の取付け高さの上限として正しいものはどれか。",choices:["A. 地上1.0メートル以下", "B. 地上1.2メートル以下", "C. 地上1.5メートル以下", "D. 地上2.1メートル以下"],answer:"B",exp:"第29条第1項第4号ロにおいて、二輪自動車等以外の自動車に備えるすれ違い用前照灯の照明部の上縁の高さは地上1.2メートル以下とされている。"},
  {no:8072,section:"保安基準適用関係",label:"第30条（前部霧灯）",q:"平成17年12月31日以前に製作された自動車の前部霧灯について、同時に点灯できる個数の上限として正しいものはどれか。",choices:["A. 同時に1個まで", "B. 同時に2個まで", "C. 同時に3個以上点灯しないこと", "D. 個数制限なし"],answer:"C",exp:"第30条第1項第3号イにおいて、前部霧灯は同時に3個以上点灯しないように取り付けられていることが規定されている。"},
  {no:8073,section:"保安基準適用関係",label:"第30条（前部霧灯）",q:"前部霧灯（二輪等以外）の照明部の下縁の取付け高さの下限として正しいものはどれか。",choices:["A. 地上0.15メートル以上", "B. 地上0.2メートル以上", "C. 地上0.25メートル以上", "D. 地上0.35メートル以上"],answer:"C",exp:"第30条第1項第3号ロにおいて、前部霧灯の照明部の下縁の高さは地上0.25メートル以上となるように取り付けられていることが規定されている。"},
  {no:8074,section:"保安基準適用関係",label:"第31条の2（低速走行時側方照射灯）",q:"第31条の2第2項において、令和8年9月1日以降に製作された自動車であって旧規定の適用が認められる型式指定自動車の要件として正しいものはどれか。",choices:["A. 令和8年8月31日以前に指定を受けた型式指定自動車", "B. 令和7年8月31日以前に指定を受けた型式指定自動車", "C. 令和9年8月31日以前に指定を受けた型式指定自動車", "D. 令和10年8月31日以前に指定を受けた型式指定自動車"],answer:"A",exp:"第31条の2第2項第2号イにおいて、令和8年9月1日以降に製作された自動車であって旧規定が認められる型式指定自動車は令和8年8月31日以前に指定を受けたものとされている。"},
  {no:8075,section:"保安基準適用関係",label:"第31条の2（低速走行時側方照射灯）",q:"貨物の運送の用に供する自動車であって車両総重量3.5トンを超えるものに係る旧規定の適用（第3項）の期限として正しいものはどれか。",choices:["A. 令和9年8月31日以前に製作された自動車", "B. 令和10年8月31日以前に製作された自動車", "C. 令和11年8月31日以前に製作された自動車", "D. 令和12年8月31日以前に製作された自動車"],answer:"B",exp:"第31条の2第3項第3号において、貨物の運送の用に供する自動車であって車両総重量3.5トンを超えるものは令和10年8月31日以前に製作されたものが旧規定に適合するものであればよいとされている。"},
  {no:8076,section:"保安基準適用関係",label:"第32条（車幅灯）",q:"平成17年12月31日以前に製作された自動車の車幅灯について、夜間の前方何メートルの距離から点灯を確認できることが必要か。",choices:["A. 150メートル", "B. 200メートル", "C. 300メートル", "D. 500メートル"],answer:"C",exp:"第32条第1項第2号イにおいて、車幅灯は夜間にその前方300メートルの距離から点灯を確認できるものであることが規定されている。"},
  {no:8077,section:"保安基準適用関係",label:"第32条（車幅灯）",q:"車幅灯（二輪等以外）の照明部の上縁の取付け高さの上限として正しいものはどれか。",choices:["A. 地上1.5メートル以下", "B. 地上1.8メートル以下", "C. 地上2.0メートル以下", "D. 地上2.1メートル以下"],answer:"D",exp:"第32条第1項第3号イにおいて、二輪自動車等以外の自動車に備える車幅灯の照明部の上縁の高さは地上2.1メートル以下とされている。"},
  {no:8078,section:"保安基準適用関係",label:"第32条（車幅灯）",q:"車幅灯の照明部の最外縁の取付け位置について、被牽引自動車の場合の上限として正しいものはどれか。",choices:["A. 自動車の最外側から150ミリメートル以内", "B. 自動車の最外側から200ミリメートル以内", "C. 自動車の最外側から300ミリメートル以内", "D. 自動車の最外側から400ミリメートル以内"],answer:"A",exp:"第32条第1項第3号ハにおいて、被牽引自動車の車幅灯の照明部の最外縁は自動車の最外側から150ミリメートル以内とされている（一般の自動車は400ミリメートル以内）。"},
  {no:8079,section:"保安基準適用関係",label:"第33条の2（昼間走行灯）",q:"第33条の2第2項において旧規定（令和4年改正前）の適用が認められる自動車のうち、令和6年9月1日から令和9年8月31日までに製作された型式指定自動車の要件として正しいものはどれか。",choices:["A. 令和6年7月31日以前に指定を受けた型式指定自動車", "B. 令和6年8月31日以前に指定を受けた型式指定自動車", "C. 令和7年8月31日以前に指定を受けた型式指定自動車", "D. 令和8年8月31日以前に指定を受けた型式指定自動車"],answer:"B",exp:"第33条の2第2項第2号イにおいて、令和6年9月1日から令和9年8月31日までに製作された型式指定自動車であって旧規定に適合するものとして認められるのは令和6年8月31日以前に指定を受けたものとされている。"},
  {no:8080,section:"保安基準適用関係",label:"第33条の2（昼間走行灯）",q:"第33条の2第2項第3号における出荷検査証に係る自動車の特例について、出荷検査証の発行後何月を経過しない間に新規検査等を受けようとするものが対象か。",choices:["A. 6月", "B. 9月", "C. 11月", "D. 12月"],answer:"C",exp:"第33条の2第2項第3号において、令和9年8月31日以前に発行された出荷検査証に係る自動車であって当該出荷検査証の発行後11月を経過しない間に新規検査又は予備検査を受けようとし、又は受けたものが対象とされている。"},
  {no:8081,section:"保安基準適用関係",label:"第35条（側方灯及び側方反射器）",q:"長さ9メートル以上の普通自動車（専ら乗用の用に供するものを除く）に側方灯又は側方反射器を備えなければならない部位として正しいものはどれか。",choices:["A. 前部のみ", "B. 前部及び後部", "C. 前部、中央部及び後部", "D. 後部のみ"],answer:"C",exp:"第35条第1項第1号イにおいて、長さ9メートル以上の普通自動車は前部、中央部及び後部の両側面に側方灯又は側方反射器を備えなければならないとされている。"},
  {no:8082,section:"保安基準適用関係",label:"第35条（側方灯及び側方反射器）",q:"側方灯の点灯確認距離として正しいものはどれか。",choices:["A. 夜間側方50メートルの距離から点灯を確認できること", "B. 夜間側方100メートルの距離から点灯を確認できること", "C. 夜間側方150メートルの距離から点灯を確認できること", "D. 夜間側方300メートルの距離から点灯を確認できること"],answer:"C",exp:"第35条第1項第2号イにおいて、側方灯は夜間側方150メートルの距離から点灯を確認できるものであることが規定されている。"},
  {no:8083,section:"保安基準適用関係",label:"第35条（側方灯及び側方反射器）",q:"側方反射器の反射部の形状として定められているものはどれか。",choices:["A. 三角形以外であること", "B. 文字及び三角形以外であること", "C. 円形のみであること", "D. 長方形のみであること"],answer:"B",exp:"第35条第1項第5号ロにおいて、側方反射器の反射部は文字及び三角形以外の形であることと規定されている。"},
  {no:8084,section:"保安基準適用関係",label:"第36条（番号灯）",q:"昭和35年3月31日以前に製作された自動車の番号灯について、夜間の確認距離として正しいものはどれか。",choices:["A. 後方10メートルの距離から番号標の数字等を確認できること", "B. 後方20メートルの距離から番号標の数字等を確認できること", "C. 後方30メートルの距離から番号標の数字等を確認できること", "D. 後方50メートルの距離から番号標の数字等を確認できること"],answer:"B",exp:"第36条第1項第1号において、番号灯は夜間後方20メートルの距離から自動車登録番号標等の数字等の表示を確認できる灯光の色が白色のものとされている。"},
  {no:8085,section:"保安基準適用関係",label:"第36条（番号灯）",q:"第36条第10項において旧規定（令和2年改正前）の適用が認められる二輪自動車の期限として正しいものはどれか。",choices:["A. 令和3年8月31日以前に製作された二輪自動車", "B. 令和5年8月31日以前に製作された二輪自動車", "C. 令和7年8月31日以前に製作された二輪自動車", "D. 令和8年8月31日以前に製作された二輪自動車"],answer:"B",exp:"第36条第10項第1号において、令和5年8月31日以前に製作された二輪自動車については改正前の細目告示に適合するものであればよいとされている。"},
  {no:8121,section:"保安基準適用関係",label:"第37条（尾灯）",q:"平成17年12月31日以前に製作された自動車について、尾灯の視認性に関する基準として正しいものはどれか。",choices:["A. 尾灯は、夜間にその後方200メートルの距離から点灯を確認できるものであること。", "B. 尾灯は、夜間にその後方300メートルの距離から点灯を確認できるものであること。", "C. 尾灯は、昼間にその後方300メートルの距離から点灯を確認できるものであること。", "D. 尾灯は、夜間にその後方150メートルの距離から点灯を確認できるものであること。"],answer:"B",exp:"第37条第1項第2号イの規定により、尾灯は夜間にその後方300メートルの距離から点灯を確認できるものでなければならない。なお、昭和48年11月30日以前に製作された自動車については150メートルに読み替えられる。"},
  {no:8122,section:"保安基準適用関係",label:"第37条（尾灯）",q:"平成17年12月31日以前に製作された自動車について、二輪自動車、側車付二輪自動車並びにカタピラ及びそりを有する軽自動車以外の自動車に備える尾灯の取付高さとして正しいものはどれか。",choices:["A. 照明部の上縁の高さが地上2.5メートル以下、下縁の高さが地上0.35メートル以上", "B. 照明部の上縁の高さが地上2.1メートル以下、下縁の高さが地上0.35メートル以上", "C. 照明部の上縁の高さが地上2.1メートル以下、下縁の高さが地上0.25メートル以上", "D. 照明部の上縁の高さが地上2.0メートル以下、下縁の高さが地上0.35メートル以上"],answer:"B",exp:"第37条第1項第3号ロの規定により、照明部の上縁の高さが地上2.1メートル以下、下縁の高さが地上0.35メートル以上（セミトレーラでその自動車の構造上取り付けることができないものは最高の高さ）となるように取り付けられなければならない。"},
  {no:8123,section:"保安基準適用関係",label:"第37条（尾灯）",q:"平成17年12月31日以前に製作された自動車について、後面の両側に備える尾灯の最外縁に関する取付基準として正しいものはどれか。",choices:["A. 最外側にあるものの照明部の最外縁は、自動車の最外側から300ミリメートル以内", "B. 最外側にあるものの照明部の最外縁は、自動車の最外側から500ミリメートル以内", "C. 最外側にあるものの照明部の最外縁は、自動車の最外側から400ミリメートル以内", "D. 最外側にあるものの照明部の最外縁は、自動車の最外側から450ミリメートル以内"],answer:"C",exp:"第37条第1項第3号ニの規定により、後面の両側に備える尾灯の最外側にあるものの照明部の最外縁は、自動車の最外側から400ミリメートル以内となるように取り付けられなければならない。"},
  {no:8124,section:"保安基準適用関係",label:"第38条（後部霧灯）",q:"平成17年12月31日以前に製作された自動車について、後部霧灯の数の基準として正しいものはどれか。",choices:["A. 後部霧灯の数は、1個であること。", "B. 後部霧灯の数は、2個以下であること。", "C. 後部霧灯の数は、3個以下であること。", "D. 後部霧灯の数は、4個以下であること。"],answer:"B",exp:"第38条第1項第3号イの規定により、後部霧灯の数は2個以下でなければならない。"},
  {no:8125,section:"保安基準適用関係",label:"第38条（後部霧灯）",q:"平成17年12月31日以前に製作された自動車について、後部霧灯の制動灯との離隔距離に関する基準として正しいものはどれか。",choices:["A. 後部霧灯の照明部は、制動灯の照明部から50ミリメートル以上離れていること。", "B. 後部霧灯の照明部は、制動灯の照明部から150ミリメートル以上離れていること。", "C. 後部霧灯の照明部は、制動灯の照明部から100ミリメートル以上離れていること。", "D. 後部霧灯の照明部は、制動灯の照明部から200ミリメートル以上離れていること。"],answer:"C",exp:"第38条第1項第3号ヘの規定により、後部霧灯の照明部は制動灯の照明部から100ミリメートル以上離れていなければならない。"},
  {no:8126,section:"保安基準適用関係",label:"第38条（後部霧灯）",q:"平成17年12月31日以前に製作された自動車について、後部霧灯を1個備える場合の取付位置に関する基準として正しいものはどれか。",choices:["A. 当該後部霧灯の中心が車両中心面上又はこれより左側の位置となるように取り付けられていること。", "B. 当該後部霧灯の中心が車両中心面上に取り付けられていること。", "C. 当該後部霧灯の中心が車両中心面上又はこれより右側の位置となるように取り付けられていること。", "D. 当該後部霧灯の中心が車両右端から400ミリメートル以内に取り付けられていること。"],answer:"C",exp:"第38条第1項第3号チの規定により、後部霧灯を1個備える場合にあっては、当該後部霧灯の中心が車両中心面上又はこれより右側の位置となるように取り付けられていなければならない。"},
  {no:8127,section:"保安基準適用関係",label:"第41条（後部反射器）",q:"平成17年12月31日以前に製作された自動車について、後部反射器の視認性に関する基準として正しいものはどれか。",choices:["A. 後部反射器は、夜間にその後方100メートルの距離から走行用前照灯で照射した場合にその反射光を照射位置から確認できるものであること。", "B. 後部反射器は、夜間にその後方150メートルの距離から走行用前照灯で照射した場合にその反射光を照射位置から確認できるものであること。", "C. 後部反射器は、夜間にその後方200メートルの距離から走行用前照灯で照射した場合にその反射光を照射位置から確認できるものであること。", "D. 後部反射器は、昼間にその後方150メートルの距離から確認できるものであること。"],answer:"B",exp:"第41条第1項第1号ハの規定により、後部反射器は夜間にその後方150メートルの距離から走行用前照灯で照射した場合にその反射光を照射位置から確認できるものでなければならない。なお、昭和48年11月30日以前に製作された自動車については100メートルに読み替えられる。"},
  {no:8128,section:"保安基準適用関係",label:"第41条（後部反射器）",q:"平成17年12月31日以前に製作された被牽引自動車に備える後部反射器の形状に関する基準として正しいものはどれか。",choices:["A. 反射部は、文字及び三角形以外の形であること。", "B. 反射部は、正立正三角形又は帯状部の幅が一辺の5分の1以上の中空の正立正三角形であって、一辺が150ミリメートル以上200ミリメートル以下のものであること。", "C. 反射部は、円形又は正方形であること。", "D. 反射部は、一辺が100ミリメートル以上150ミリメートル以下の正立正三角形であること。"],answer:"B",exp:"第41条第1項第1号ロの規定により、被牽引自動車に備える後部反射器の反射部は、正立正三角形又は帯状部の幅が一辺の5分の1以上の中空の正立正三角形であって、一辺が150ミリメートル以上200ミリメートル以下のものでなければならない。"},
  {no:8129,section:"保安基準適用関係",label:"第42条（制動灯）",q:"平成17年12月31日以前に製作された自動車について、制動灯の視認性に関する基準として正しいものはどれか。",choices:["A. 制動灯は、昼間にその後方50メートルの距離から点灯を確認できるものであること。", "B. 制動灯は、夜間にその後方100メートルの距離から点灯を確認できるものであること。", "C. 制動灯は、昼間にその後方100メートルの距離から点灯を確認できるものであること。", "D. 制動灯は、昼間にその後方200メートルの距離から点灯を確認できるものであること。"],answer:"C",exp:"第42条第1項第2号イの規定により、制動灯は昼間にその後方100メートルの距離から点灯を確認できるものでなければならない。なお、昭和48年11月30日以前に製作された自動車については30メートルに読み替えられる。"},
  {no:8130,section:"保安基準適用関係",label:"第42条（制動灯）",q:"平成17年12月31日以前に製作された自動車について、尾灯と兼用の制動灯の光度に関する基準として正しいものはどれか。",choices:["A. 同時に点灯したときの光度が尾灯のみを点灯したときの光度の3倍以上となる構造であること。", "B. 同時に点灯したときの光度が尾灯のみを点灯したときの光度の5倍以上となる構造であること。", "C. 同時に点灯したときの光度が尾灯のみを点灯したときの光度の2倍以上となる構造であること。", "D. 同時に点灯したときの光度が尾灯のみを点灯したときの光度の10倍以上となる構造であること。"],answer:"B",exp:"第42条第1項第2号ロの規定により、尾灯と兼用の制動灯は、同時に点灯したときの光度が尾灯のみを点灯したときの光度の5倍以上となる構造でなければならない。なお、昭和35年3月31日以前に製作された自動車については2倍以上、昭和35年4月1日から昭和48年11月30日までに製作された自動車については3倍以上に読み替えられる。"},
  {no:8131,section:"保安基準適用関係",label:"第42条（制動灯）",q:"平成17年12月31日以前に製作された自動車に備える制動灯の灯光の色として正しいものはどれか。",choices:["A. 橙色であること。", "B. 黄色であること。", "C. 赤色であること。", "D. 赤色又は橙色であること。"],answer:"C",exp:"第42条第1項第2号ハの規定により、制動灯の灯光の色は赤色でなければならない。なお、昭和48年11月30日以前に製作された自動車については赤色又は橙色とすることができる。"},
  {no:8132,section:"保安基準適用関係",label:"第43条（補助制動灯）",q:"平成17年12月31日以前に製作された自動車について、補助制動灯の個数に関する基準として正しいものはどれか。",choices:["A. 補助制動灯の数は、2個以下であること。", "B. 補助制動灯の数は、1個であること（ただし書の場合を除く）。", "C. 補助制動灯の数は、3個以下であること。", "D. 補助制動灯の数は、左右1個ずつであること。"],answer:"B",exp:"第43条第1項第3号イの規定により、補助制動灯の数は1個でなければならない。ただし、自動車の構造上照明部の中心を車両中心面上に取り付けることができない場合に、車両中心面の両側に1個ずつ取り付ける場合を除く。"},
  {no:8133,section:"保安基準適用関係",label:"第43条（補助制動灯）",q:"平成17年12月31日以前に製作された自動車について、補助制動灯の照明部の下縁の取付高さに関する基準として正しいものはどれか。",choices:["A. その照明部の下縁の高さが地上0.75メートル以上又は後面ガラスの最下端の下方0.15メートルより上方であって制動灯の照明部の上縁を含む水平面以上", "B. その照明部の下縁の高さが地上1.0メートル以上又は後面ガラスの最下端の下方0.15メートルより上方であって制動灯の照明部の上縁を含む水平面以上", "C. その照明部の下縁の高さが地上0.85メートル以上又は後面ガラスの最下端の下方0.15メートルより上方であって制動灯の照明部の上縁を含む水平面以上", "D. その照明部の下縁の高さが地上0.60メートル以上又は後面ガラスの最下端の下方0.15メートルより上方であって制動灯の照明部の上縁を含む水平面以上"],answer:"C",exp:"第43条第1項第3号ロの規定により、補助制動灯は、その照明部の下縁の高さが地上0.85メートル以上又は後面ガラスの最下端の下方0.15メートルより上方であって、制動灯の照明部の上縁を含む水平面以上となるように取り付けられていなければならない。"},
  {no:8134,section:"保安基準適用関係",label:"第45条（方向指示器）",q:"平成17年12月31日以前に製作された自動車について、方向指示器の視認距離に関する基準として正しいものはどれか（前面又は後面に備えるものについて）。",choices:["A. 方向の指示を表示する方向50メートルの距離から昼間において点灯を確認できるものであること。", "B. 方向の指示を表示する方向100メートルの距離から昼間において点灯を確認できるものであること。", "C. 方向の指示を表示する方向150メートルの距離から昼間において点灯を確認できるものであること。", "D. 方向の指示を表示する方向200メートルの距離から昼間において点灯を確認できるものであること。"],answer:"B",exp:"第45条第1項第2号イの規定により、方向指示器（前面又は後面に備えるもの）は方向の指示を表示する方向100メートルの距離から昼間において点灯を確認できるものでなければならない。なお、自動車の両側面に備える方向指示器については30メートルの距離からでよい。"},
  {no:8135,section:"保安基準適用関係",label:"第45条（方向指示器）",q:"平成17年12月31日以前に製作された自動車について、方向指示器の灯光の色として正しいものはどれか。",choices:["A. 白色であること。", "B. 赤色であること。", "C. 橙色であること。", "D. 黄色であること。"],answer:"C",exp:"第45条第1項第2号ロの規定により、方向指示器の灯光の色は橙色でなければならない。"},
  {no:8136,section:"保安基準適用関係",label:"第45条（方向指示器）",q:"平成17年12月31日以前に製作された自動車について、方向指示器を備えなければならない位置について正しいものはどれか。",choices:["A. 自動車の車両中心線上の前方及び後方20メートルの距離から指示部が見通すことのできる位置に少なくとも左右1個ずつ備えること。", "B. 自動車の車両中心線上の前方及び後方30メートルの距離から指示部が見通すことのできる位置に少なくとも左右1個ずつ備えること。", "C. 自動車の車両中心線上の前方及び後方50メートルの距離から指示部が見通すことのできる位置に少なくとも左右1個ずつ備えること。", "D. 自動車の車両中心線上の前方及び後方100メートルの距離から指示部が見通すことのできる位置に少なくとも左右1個ずつ備えること。"],answer:"B",exp:"第45条第1項第1号イの規定により、自動車には方向指示器を車両中心線上の前方及び後方30メートルの距離から指示部が見通すことのできる位置に少なくとも左右1個ずつ備えなければならない。"},
  {no:8137,section:"保安基準適用関係",label:"第47条の2（緊急制動表示灯）",q:"第47条の2に規定する緊急制動表示灯について、協定規則第48号第5改訂版が適用される型式指定期間として正しいものはどれか。",choices:["A. 平成21年7月22日から平成23年2月6日までに型式の指定を行う場合", "B. 平成21年10月24日から平成24年10月23日までに型式の指定を行う場合", "C. 平成24年11月18日から平成29年11月17日までに型式の指定を行う場合", "D. 平成29年11月18日以降に型式の指定を行う場合"],answer:"C",exp:"第47条の2第1項の規定により、保安基準第41条の4第4項及び細目告示第61条の2第2項ただし書の規定が適用される自動車のうち平成24年11月18日から平成29年11月17日までに型式の指定を行う場合については、協定規則第48号第5改訂版の規定に適合するものであればよい。"},
  {no:8138,section:"保安基準適用関係",label:"第47条の3（後面衝突警告表示灯）",q:"第47条の3第2項に規定する二輪自動車について、協定規則第53号の読替えが適用される製作期間として正しいものはどれか。",choices:["A. 令和8年8月31日以前に製作された二輪自動車", "B. 令和10年8月31日以前に製作された二輪自動車", "C. 令和5年8月31日以前に製作された二輪自動車", "D. 令和12年8月31日以前に製作された二輪自動車"],answer:"B",exp:"第47条の3第2項の規定により、令和10年8月31日以前に製作された二輪自動車については、細目告示第61条の3第2項の規定中「協定規則第53号」とあるのは、「協定規則第53号第3改訂版補足第4改訂版」と読み替えることができる。"},
  {no:8139,section:"保安基準適用関係",label:"第47条（非常点滅表示灯）",q:"平成17年12月31日以前に製作された自動車に非常点滅表示灯の備付けが不要とされる車両として正しいものはどれか。",choices:["A. 最高速度40キロメートル毎時未満の自動車", "B. 最高速度30キロメートル毎時未満の自動車", "C. 最高速度50キロメートル毎時未満の自動車", "D. 最高速度60キロメートル毎時未満の自動車"],answer:"A",exp:"第47条第1項第1号の規定により、二輪自動車、側車付二輪自動車、カタピラ及びそりを有する軽自動車、大型特殊自動車、幅0.8メートル以下の自動車並びに最高速度40キロメートル毎時未満の自動車並びにこれらにより牽引される被牽引自動車にあっては、非常点滅表示灯の備付けは不要とされている。"},
  {no:8140,section:"保安基準適用関係",label:"第47条（非常点滅表示灯）",q:"昭和48年11月30日以前に製作された自動車の非常点滅表示灯の点滅周期として認められる基準として正しいものはどれか。",choices:["A. 毎分60回以上120回以下の一定の周期で点滅し、又は光度が増減するものであること。", "B. 毎分50回以上120回以下の一定の周期で点滅し、又は光度が増減するものであること。", "C. 毎分40回以上100回以下の一定の周期で点滅し、又は光度が増減するものであること。", "D. 毎分50回以上150回以下の一定の周期で点滅し、又は光度が増減するものであること。"],answer:"B",exp:"第47条第4項第2号の規定により、昭和48年11月30日以前に製作された自動車の非常点滅表示灯は毎分50回以上120回以下の一定の周期で点滅し、又は光度が増減するものであることとされている。"},
  {no:8141,section:"保安基準適用関係",label:"第48条（その他の灯火等の制限）",q:"平成17年12月31日以前に製作された自動車について、後方を照射し若しくは後方に表示する灯光の色が橙色である灯火で照明部の上縁が地上何メートル以下のものを備えてはならないか（例外灯火を除く）。",choices:["A. 地上2.0メートル以下のもの", "B. 地上2.5メートル以下のもの", "C. 地上3.0メートル以下のもの", "D. 地上1.5メートル以下のもの"],answer:"B",exp:"第48条第1項第1号の規定により、自動車には、例外として認められた灯火を除き、後方を照射し若しくは後方に表示する灯光の色が橙色である灯火で照明部の上縁が地上2.5メートル以下のもの、又は灯光の色が赤色である灯火を備えてはならない。"},
  {no:8142,section:"保安基準適用関係",label:"第48条（その他の灯火等の制限）",q:"平成17年12月31日以前に製作された自動車について、灯火の光度制限に関する基準として正しいものはどれか（所定の灯火を除く）。",choices:["A. 光度が200カンデラ以下のものでなければならない。", "B. 光度が300カンデラ以下のものでなければならない。", "C. 光度が400カンデラ以下のものでなければならない。", "D. 光度が500カンデラ以下のものでなければならない。"],answer:"B",exp:"第48条第1項第9号の規定により、自動車に備える灯火は、規定された灯火（前照灯、制動灯等）を除き、光度が300カンデラ以下のものでなければならない。"},
  {no:8143,section:"保安基準適用関係",label:"第48条（その他の灯火等の制限）",q:"平成17年12月31日以前に製作された自動車について、後方を照射し又は後方に表示する灯光の色が白色である灯火を備えることが認められるものとして正しいものはどれか。",choices:["A. 尾灯", "B. 後退灯", "C. 制動灯", "D. 後部霧灯"],answer:"B",exp:"第48条第1項第2号の規定により、後方を照射し又は後方に表示する灯光の色が白色である灯火として備えることが認められるものは、番号灯、後退灯、室内照明灯、一般乗合旅客自動車運送事業の用に供する自動車の方向幕灯、一般乗用旅客自動車運送事業の用に供する自動車の社名表示灯及び走行中に使用しない灯火である。"},
  {no:8144,section:"保安基準適用関係",label:"第51条の2（車線逸脱警報装置）",q:"車線逸脱警報装置（保安基準第43条の6）が適用除外となる製作時期として正しいものはどれか。",choices:["A. 平成25年7月31日以前に製作された自動車", "B. 平成27年7月31日以前に製作された自動車", "C. 平成30年7月31日以前に製作された自動車", "D. 令和元年7月31日以前に製作された自動車"],answer:"B",exp:"第51条の2第1項の規定により、平成27年7月31日以前に製作された自動車については、保安基準第43条の6の規定並びに細目告示第67条の2、第145条の2及び第223条の2の規定は適用しない。"},
  {no:8145,section:"保安基準適用関係",label:"第51条の2（車線逸脱警報装置）",q:"車線逸脱警報装置に関して、指定自動車等以外の自動車に対する協定規則第130号の読替えとして認められる内容として正しいものはどれか。",choices:["A. 走行中に車線から逸脱しようとしている又は逸脱していることを検知した場合に自動的に制動する装置であること", "B. 走行中に車線から逸脱しようとしている又は逸脱していることを検知した場合に運転者に警報するものであり、解除装置を備える場合は作動しない状態となったときに運転者に視覚的に警報するものであること", "C. 走行中に車線から逸脱しようとしている又は逸脱していることを検知した場合に自動的に操舵するものであること", "D. 走行中に車線から逸脱した場合のみに運転者に警報するものであること"],answer:"B",exp:"第51条の2第9項の規定により、指定自動車等以外の自動車については、当分の間、細目告示第145条の2第1項中の協定規則第130号の規定を、走行中に車線から逸脱しようとしている又は逸脱していることを検知した場合に運転者に警報するものであり、解除装置を備える場合はその旨を運転者席の運転者に的確かつ視覚的に警報するものであること、と読み替えることができる。"},
  {no:8146,section:"保安基準適用関係",label:"第51条の3（車両接近通報装置）",q:"車両接近通報装置（保安基準第43条の7）が適用除外となる製作時期として正しいものはどれか。",choices:["A. 平成28年3月7日以前に製作された自動車", "B. 平成30年3月7日以前に製作された自動車", "C. 令和元年3月7日以前に製作された自動車", "D. 令和2年3月7日以前に製作された自動車"],answer:"B",exp:"第51条の3第1項第1号の規定により、平成30年3月7日以前に製作された自動車については、保安基準第43条の7の規定は適用しない。"},
  {no:8147,section:"保安基準適用関係",label:"第51条の3（車両接近通報装置）",q:"第51条の3第5項に規定する協定規則第138号の読替えが適用される製作期間として正しいものはどれか。",choices:["A. 令和6年8月31日以前に製作された自動車", "B. 令和8年8月31日以前に製作された自動車", "C. 令和10年8月31日以前に製作された自動車", "D. 令和5年8月31日以前に製作された自動車"],answer:"B",exp:"第51条の3第5項の規定により、令和8年8月31日以前に製作された自動車については、細目告示第67条の3の規定中「協定規則第138号」とあるのは「協定規則第138号改訂版補足第3改訂版」と読み替えることができる。"},
  {no:8148,section:"保安基準適用関係",label:"第52条（後写鏡等）",q:"平成18年12月31日以前に製作された自動車について、後写鏡の視野に関する基準として正しいものはどれか（普通の自動車の場合）。",choices:["A. 運転者が運転者席において、自動車の左右の外側線上後方30メートルまでの間にある車両の交通状況を確認できるものであること。", "B. 運転者が運転者席において、自動車の左右の外側線上後方50メートルまでの間にある車両の交通状況を確認できるものであること。", "C. 運転者が運転者席において、自動車の左右の外側線上後方100メートルまでの間にある車両の交通状況を確認できるものであること。", "D. 運転者が運転者席において、自動車の左右の外側線上後方20メートルまでの間にある車両の交通状況を確認できるものであること。"],answer:"B",exp:"第52条第1項第1号ニの規定により、運転者が運転者席において自動車の左右の外側線上後方50メートルまでの間にある車両の交通状況及び自動車の左外側線付近の交通状況を確認できるものでなければならない。"},
  {no:8149,section:"保安基準適用関係",label:"第52条（後写鏡等）",q:"平成18年12月31日以前に製作されたハンドルバー方式の二輪自動車について、後写鏡の反射面の取付位置に関する基準として正しいものはどれか。",choices:["A. 後写鏡の反射面の中心が、かじ取装置の中心を通り進行方向に平行な鉛直面から180ミリメートル以上外側となるように取り付けられていること。", "B. 後写鏡の反射面の中心が、かじ取装置の中心を通り進行方向に平行な鉛直面から280ミリメートル以上外側となるように取り付けられていること。", "C. 後写鏡の反射面の中心が、かじ取装置の中心を通り進行方向に平行な鉛直面から380ミリメートル以上外側となるように取り付けられていること。", "D. 後写鏡の反射面の中心が、かじ取装置の中心を通り進行方向に平行な鉛直面から200ミリメートル以上外側となるように取り付けられていること。"],answer:"B",exp:"第52条第1項第3号イの規定により、後写鏡の反射面の中心が、かじ取装置の中心を通り進行方向に平行な鉛直面から280ミリメートル以上外側となるように取り付けられていなければならない。"},
  {no:8150,section:"保安基準適用関係",label:"第52条（後写鏡等）",q:"平成18年12月31日以前に製作された普通自動車（乗車定員11人以上又は車両総重量8トン以上若しくは最大積載量5トン以上）に備えなければならない装置として正しいものはどれか。",choices:["A. 当該自動車の前面から0.5メートルの距離にある鉛直面及び当該自動車の左側面から0.3メートルの距離にある鉛直面と当該自動車との間にある高さ1メートルの障害物を確認できる鏡その他の装置", "B. 当該自動車の前面から0.3メートルの距離にある鉛直面及び当該自動車の左側面から0.3メートルの距離にある鉛直面と当該自動車との間にある高さ1メートルの障害物を確認できる鏡その他の装置", "C. 当該自動車の前面から0.3メートルの距離にある鉛直面及び当該自動車の左側面から0.5メートルの距離にある鉛直面と当該自動車との間にある高さ1メートルの障害物を確認できる鏡その他の装置", "D. 当該自動車の前面から1.0メートルの距離にある鉛直面及び当該自動車の左側面から0.3メートルの距離にある鉛直面と当該自動車との間にある高さ1メートルの障害物を確認できる鏡その他の装置"],answer:"B",exp:"第52条第1項第4号の表イの規定により、乗車定員11人以上の自動車及び車両総重量が8トン以上又は最大積載量が5トン以上の普通自動車には、当該自動車の前面から0.3メートルの距離にある鉛直面及び当該自動車の左側面から0.3メートルの距離にある鉛直面と当該自動車との間にある高さ1メートルの障害物を確認できる鏡その他の装置を備えなければならない。"},
  {no:8181,section:"保安基準適用関係",label:"第54条の2（事故情報計測・記録装置）",q:"事故情報計測・記録装置（第54条の2）の適用が除外される対象となる自動車の車両区分として正しいものはどれか。",choices:["A. 専ら乗用の用に供する自動車のうち乗車定員10人未満のもの及び貨物の運送の用に供する自動車のうち車両総重量が3.5トン以下のもの", "B. 専ら乗用の用に供する自動車のうち乗車定員10人以上のもの及び貨物の運送の用に供する自動車のうち車両総重量が3.5トンを超えるもの", "C. 専ら乗用の用に供する自動車のうち乗車定員11人未満のもの及び貨物の運送の用に供する自動車のうち車両総重量が5トン以下のもの", "D. 専ら乗用の用に供する自動車のうち乗車定員8人未満のもの及び貨物の運送の用に供する自動車のうち車両総重量が3トン以下のもの"],answer:"A",exp:"第54条の2第1項の括弧書きにより、乗用車は乗車定員10人未満、貨物車は車両総重量3.5トン以下のものが対象となる。"},
  {no:8182,section:"保安基準適用関係",label:"第54条の2（事故情報計測・記録装置）",q:"第54条の2第1項の規定により、令和4年7月1日から令和8年8月31日までに製作された（輸入車以外の）国産自動車のうち、保安基準第46条の2等の規定が適用されないものの要件として誤っているものはどれか。",choices:["A. 令和4年6月30日以前に指定を受けた型式指定自動車", "B. 令和4年7月1日以降に新たに指定を受けた型式指定自動車であって、同年6月30日以前の型式と事故情報計測・記録装置に係る性能が同一のもの", "C. 国土交通大臣が定める自動車", "D. 令和5年1月1日以降に指定を受けた型式指定自動車であって、令和4年6月30日以前に指定を受けた型式指定自動車と車体形状が同一のもの"],answer:"D",exp:"第54条の2第1項第2号ロは、性能が同一であることを条件としており、車体形状の同一性は要件ではない。また、令和5年1月1日以降に指定を受けた型式という区分も規定にはなく、Dは誤り。"},
  {no:8183,section:"保安基準適用関係",label:"第54条の2（事故情報計測・記録装置）",q:"第54条の2第5項において、乗車定員10人以上の乗用自動車及び車両総重量3.5トンを超える貨物自動車に係る保安基準第46条の2等の規定の適用除外の期限として正しいものはどれか（製作日の基準）。",choices:["A. 令和6年11月30日以前に製作された自動車", "B. 令和8年11月30日以前に製作された自動車", "C. 令和10年11月30日以前に製作された自動車", "D. 令和4年6月30日以前に製作された自動車"],answer:"B",exp:"第54条の2第5項第1号は「令和8年11月30日以前に製作された自動車」について、保安基準第46条の2等の規定を適用しないと定めている。"},
  {no:8184,section:"保安基準適用関係",label:"第56条（運行記録計）",q:"第56条の経過措置により、平成18年12月31日以前に製作された自動車について運行記録計の備え付けが必要な自動車として正しいものはどれか。",choices:["A. 貨物の運送の用に供する普通自動車であって、車両総重量が5トン以上又は最大積載量が3トン以上のもの", "B. 貨物の運送の用に供する普通自動車であって、車両総重量が8トン以上又は最大積載量が5トン以上のもの", "C. 貨物の運送の用に供する普通自動車であって、車両総重量が10トン以上又は最大積載量が7トン以上のもの", "D. すべての貨物の運送の用に供する普通自動車"],answer:"B",exp:"第56条第1項第1号イは、貨物の運送の用に供する普通自動車であって、車両総重量が8トン以上または最大積載量が5トン以上のものに運行記録計を備えることを定めている。"},
  {no:8185,section:"保安基準適用関係",label:"第56条（運行記録計）",q:"第56条の規定において、旧基準の運行記録計の技術基準への適合が認められる運行記録計として、令和10年9月1日以降に製作されたものでも旧基準適合が許容されるものはどれか。",choices:["A. 令和10年9月1日以降に法第75条の3第1項の規定による型式の指定を受けた運行記録計", "B. 令和10年8月31日以前に法第75条の3第1項の規定によりその型式について指定を受けた運行記録計", "C. 令和10年8月31日以前に製作された自動車以外の新規自動車に備える運行記録計", "D. 輸入された自動車に備える運行記録計"],answer:"B",exp:"第56条第2項第2号は、令和10年9月1日以降に製作された運行記録計であっても、令和10年8月31日以前に型式の指定を受けたものは旧基準に適合すればよいと定めている。"},
  {no:8186,section:"保安基準適用関係",label:"第63条（ばい煙、悪臭のあるガス、有害なガス等の発散防止装置）",q:"第63条第1項に規定する保安基準第61条の3第2項から第4項の規定が適用されない第一種一般原動機付自転車について、製作日の上限として正しいものはどれか（輸入品を除く）。",choices:["A. 平成10年8月31日以前に製作されたもの", "B. 平成11年8月31日以前に製作されたもの", "C. 平成12年8月31日以前に製作されたもの", "D. 平成13年8月31日以前に製作されたもの"],answer:"B",exp:"第63条第1項第1号は、平成11年8月31日以前に製作された第一種一般原動機付自転車（一定のものを除く）については保安基準第61条の3第2項から第4項の規定は適用しないと定めている。"},
  {no:8187,section:"保安基準適用関係",label:"第63条（ばい煙、悪臭のあるガス、有害なガス等の発散防止装置）",q:"第63条第2項に規定する、ガソリンを燃料とする第一種一般原動機付自転車（型式認定済み）の二輪車暖機モード法による排出ガス基準において、4サイクルの原動機を有するものの一酸化炭素の基準値（g/km）として正しいものはどれか。",choices:["A. 8.00", "B. 13.0", "C. 3.00", "D. 2.00"],answer:"B",exp:"第63条第2項の表によれば、4サイクルの原動機を有するものの一酸化炭素の基準値は13.0 g/kmである。2サイクルは8.00 g/kmである。"},
  {no:8188,section:"保安基準適用関係",label:"第63条（ばい煙、悪臭のあるガス、有害なガス等の発散防止装置）",q:"第63条第4項に定める、ガソリンを燃料とする第一種一般原動機付自転車の無負荷アイドリング時排出ガス基準において、4サイクルの炭化水素（HC）の基準値として正しいものはどれか。",choices:["A. 100万分の7800", "B. 100万分の3000", "C. 100万分の2000", "D. 100万分の1600"],answer:"C",exp:"第63条第4項の表によれば、4サイクルの原動機を有するものの炭化水素は100万分の2000とされている。2サイクルは100万分の7800である。"},
  {no:8189,section:"保安基準適用関係",label:"第64条（前照灯）",q:"第64条第1項の経過措置において、平成10年3月31日以前に製作された一般原動機付自転車の前照灯について、夜間前方何メートルの距離にある交通上の障害物を確認できる性能が必要とされるか（最高速度20km/h以上の第2種原動機付自転車以外）。",choices:["A. 10メートル", "B. 15メートル", "C. 25メートル", "D. 50メートル"],answer:"B",exp:"第64条第1項第1号は、夜間前方15メートルの距離にある交通上の障害物を確認できる性能を有することを定めている（最高速度20km/h以上の第2種は50メートル）。"},
  {no:8190,section:"保安基準適用関係",label:"第64条（前照灯）",q:"第64条第1項第5号の規定において、一般原動機付自転車の前照灯に減光または照射方向を下向きに変換できる構造が必要とされる光度の閾値として正しいものはどれか。",choices:["A. 5000カンデラ以上", "B. 8000カンデラ以上", "C. 1万カンデラ以上", "D. 2万カンデラ以上"],answer:"C",exp:"第64条第1項第5号は、光度が1万カンデラ以上の前照灯について、減光または照射方向を下向きに変換できる構造であることを定めている。"},
  {no:8191,section:"保安基準適用関係",label:"第65条（番号灯）",q:"第65条第1項の規定において、保安基準第62条の2および細目告示の番号灯関連規定が適用されない一般原動機付自転車の製作日の上限として正しいものはどれか。",choices:["A. 昭和35年10月14日以前", "B. 昭和39年10月14日以前", "C. 昭和44年3月31日以前", "D. 昭和48年11月30日以前"],answer:"B",exp:"第65条第1項は、昭和39年10月14日以前に製作された一般原動機付自転車については、保安基準第62条の2並びに細目告示第245条等の規定は適用しないと定めている。"},
  {no:8192,section:"保安基準適用関係",label:"第65条（番号灯）",q:"第65条第6項の規定において、二輪の一般原動機付自転車について細目告示中の「協定規則第53号」を「協定規則第53号第3改訂版補足第4改訂版」と読み替えることができる対象として正しいものはどれか（輸入車以外の場合）。",choices:["A. 令和8年8月31日以前に製作された二輪の一般原動機付自転車", "B. 令和9年8月31日以前に製作された二輪の一般原動機付自転車", "C. 令和10年8月31日以前に製作された二輪の一般原動機付自転車", "D. 令和12年8月31日以前に製作された二輪の一般原動機付自転車"],answer:"C",exp:"第65条第6項第1号は、令和10年8月31日（輸入された二輪の一般原動機付自転車にあっては令和12年8月31日）以前に製作された二輪の一般原動機付自転車を対象としている。"},
  {no:8193,section:"保安基準適用関係",label:"第66条（尾灯）",q:"第66条第1項第2号イの規定において、旧基準が適用される一般原動機付自転車（平成17年12月31日以前製作）の尾灯について、夜間後方何メートルの距離から点灯を確認できることが求められるか。",choices:["A. 50メートル", "B. 100メートル", "C. 150メートル", "D. 200メートル"],answer:"C",exp:"第66条第1項第2号イは、尾灯は夜間にその後方150メートルの距離から点灯を確認できるものであることを定めている。"},
  {no:8194,section:"保安基準適用関係",label:"第66条（尾灯）",q:"第66条第3項に規定する昭和39年12月31日以前に製作された一般原動機付自転車の尾灯について、取付位置の基準として正しいものはどれか。",choices:["A. 地上1メートル以下", "B. 地上1.5メートル以下", "C. 地上2メートル以下", "D. 地上2.5メートル以下"],answer:"C",exp:"第66条第3項第4号は、尾灯の取付位置は地上2メートル以下であることを定めている（ただし、座席高500mm未満の一部の車両は1m以上2m以下）。"},
  {no:8195,section:"保安基準適用関係",label:"第67条の2（後部反射器）",q:"第67条の2第4項において、細目告示の後部反射器規定について旧規定への適合が認められる原動機付自転車のうち、令和8年9月1日以降に製作されたものに旧規定適合が許容される条件として正しいものはどれか。",choices:["A. 令和8年9月1日以降に型式認定を受けたものであって、後部反射器の色が同一のもの", "B. 令和8年9月1日以降に型式認定を受けたものであって、令和8年8月31日以前に認定を受けたものと後部反射器の型式が同一のもの", "C. 令和8年9月1日以降に型式認定を受けたものであって、令和8年8月31日以前に認定を受けたものと車体形状が同一のもの", "D. 令和8年8月31日以前に型式認定を受けたものと同一メーカーが製造したもの"],answer:"B",exp:"第67条の2第4項第3号は、令和8年9月1日以降に型式認定を受けた原動機付自転車であって、令和8年8月31日以前に認定を受けたものと後部反射器の型式が同一であるものに旧規定適合を許容している。"},
  {no:8196,section:"保安基準適用関係",label:"第67条（制動灯）",q:"第67条第1項第1号の旧基準において、制動灯は昼間後方何メートルの距離から点灯を確認できることが必要とされるか。",choices:["A. 15メートル", "B. 20メートル", "C. 30メートル", "D. 50メートル"],answer:"C",exp:"第67条第1項第1号は、制動灯は昼間後方30メートルの距離から点灯を確認できるものであることを定めている。"},
  {no:8197,section:"保安基準適用関係",label:"第67条（制動灯）",q:"第67条第3項の規定において、昭和39年10月15日から昭和48年11月30日までに製作された一般原動機付自転車の制動灯の灯光の色について許容される色の組み合わせとして正しいものはどれか。",choices:["A. 赤色のみ", "B. 赤色または白色", "C. 赤色または橙色", "D. 赤色または黄色"],answer:"C",exp:"第67条第3項は、昭和39年10月15日から昭和48年11月30日までに製作された一般原動機付自転車については、制動灯の灯光の色は赤色または橙色とすることができると定めている。"},
  {no:8198,section:"保安基準適用関係",label:"第71条の2（方向指示器）",q:"第71条の2第1項第2号の旧基準において、一般原動機付自転車（平成17年12月31日以前製作）の方向指示器の点滅周期として正しいものはどれか。",choices:["A. 毎分40回以上100回以下", "B. 毎分50回以上120回以下", "C. 毎分60回以上120回以下", "D. 毎分60回以上150回以下"],answer:"C",exp:"第71条の2第1項第2号は、方向指示器は毎分60回以上120回の一定の周期で点滅するものであることを定めている。"},
  {no:8199,section:"保安基準適用関係",label:"第71条の2（方向指示器）",q:"第71条の2第3項の規定において、保安基準第64条の3第1項（方向指示器の備え付け義務）が適用されない一般原動機付自転車の製作時期の上限として正しいものはどれか。",choices:["A. 昭和39年10月14日以前", "B. 昭和44年3月31日以前", "C. 昭和48年11月30日以前", "D. 昭和51年8月31日以前"],answer:"B",exp:"第71条の2第3項は、昭和44年3月31日以前に製作された一般原動機付自転車については、保安基準第64条の3第1項の規定は適用しないと定めている。"},
  {no:8200,section:"保安基準適用関係",label:"第71条の3（後写鏡）",q:"第71条の3第1項の規定において、平成18年12月31日以前に製作されたハンドルバー方式・車室なしの一般原動機付自転車の後写鏡について、旧基準として認められる視野範囲として正しいものはどれか。",choices:["A. 左外側線上後方30メートルまでの間にある車両の交通状況を確認できること", "B. 左外側線上後方50メートルまでの間にある車両の交通状況を確認できること", "C. 左外側線上後方100メートルまでの間にある車両の交通状況を確認できること", "D. 左右外側線上後方50メートルまでの間にある車両の交通状況を確認できること"],answer:"B",exp:"第71条の3第1項は、後写鏡は運転者が運転者席において一般原動機付自転車の左外側線上後方50メートルまでの間にある車両の交通状況を確認できるものであればよいと定めている。"},
  {no:8201,section:"保安基準適用関係",label:"第71条の3（後写鏡）",q:"第71条の3第2項の規定において、保安基準第65条および細目告示の後写鏡関連規定が適用されない一般原動機付自転車の製作日の上限として正しいものはどれか。",choices:["A. 昭和35年9月30日以前", "B. 昭和39年10月14日以前", "C. 昭和44年3月31日以前", "D. 昭和48年11月30日以前"],answer:"B",exp:"第71条の3第2項は、昭和39年10月14日以前に製作された一般原動機付自転車については、保安基準第65条および細目告示の規定は適用しないと定めている。"},
  {no:8202,section:"保安基準適用関係",label:"第71条（消音器）",q:"第71条第1項の表において、昭和51年8月31日以前に製作された第二種原動機付自転車の加速走行騒音の基準値として正しいものはどれか。",choices:["A. 79デシベル", "B. 80デシベル", "C. 82デシベル", "D. 85デシベル"],answer:"C",exp:"第71条第1項の表によれば、第二種原動機付自転車の加速走行騒音の基準値は82デシベルである（定常走行騒音は80デシベル）。"},
  {no:8203,section:"保安基準適用関係",label:"第71条（消音器）",q:"第71条第10項の規定において、内燃機関を原動機とする一般原動機付自転車の消音器について、細目告示第252条第2項の代わりに破損および腐食がないことのみを求める旧基準が認められる製作日の上限として正しいものはどれか。",choices:["A. 平成18年3月31日以前", "B. 平成20年3月31日以前", "C. 平成22年3月31日以前", "D. 平成25年3月31日以前"],answer:"C",exp:"第71条第10項は、平成22年3月31日以前に製作されたものが備える消音器については、細目告示第252条第2項の規定にかかわらず、破損および腐食がないものであればよいと定めている。"},
  {no:8204,section:"保安基準適用関係",label:"第73条の2（電気装置）",q:"第73条の2第1項の規定において、一般原動機付自転車について当分の間適用しなくてもよいとされる規定として正しいものはどれか。",choices:["A. 保安基準第65条の4第2項", "B. 保安基準第65条の4第1項並びに細目告示第253条の3第1項等", "C. 保安基準第65条の4第3項", "D. 細目告示第253条の3第2項のみ"],answer:"B",exp:"第73条の2第1項は、一般原動機付自転車について当分の間、保安基準第65条の4第1項並びに細目告示第253条の3第1項、第269条の3第1項および第2項並びに第285条の3第1項の規定は適用しなくてもよいと定めている。"},
  {no:8205,section:"保安基準適用関係",label:"第73条の2（電気装置）",q:"第73条の2第2項に規定する、保安基準第65条の4第2項が適用されない一般原動機付自転車について、令和9年3月1日から令和11年2月28日までに製作されたものに適用除外が認められる条件として正しいものはどれか。",choices:["A. 令和9年2月28日以前に型式認定を受けたもの、または同日以前に認定を受けたものと電気装置に係る性能が同一のもの、または型式認定を受けていないもの", "B. 令和9年2月28日以前に製作されたもの", "C. 令和9年3月1日以降に新たに型式認定を受けたもの", "D. 輸入された一般原動機付自転車のみ"],answer:"A",exp:"第73条の2第2項第2号は、令和9年3月1日から令和11年2月28日までに製作されたものについて、イ（令和9年2月28日以前に認定を受けたもの）、ロ（性能が同一のもの）、ハ（型式認定外のもの）の3条件のいずれかを満たすものに適用除外を認めている。"},
  {no:8206,section:"保安基準適用関係",label:"第76条の2（後面衝突警告表示灯）",q:"第76条の2の規定において、細目告示中の「協定規則第53号」を「協定規則第53号第3改訂版補足第4改訂版」と読み替えることができる二輪の一般原動機付自転車として、令和10年9月1日から令和12年8月31日までに製作されたものに読み替えが認められる条件として正しいものはどれか。",choices:["A. 令和10年8月31日以前に型式認定を受けたものと後面衝突警告表示灯の性能、取付位置および取付方法に変更がないもの", "B. 令和10年8月31日以前に型式認定を受けたもの", "C. 令和10年8月31日以前に製作されたものと車体形状が同一のもの", "D. 輸入された二輪の一般原動機付自転車に限る"],answer:"A",exp:"第76条の2第2号は、令和10年8月31日以前に型式認定を受けたものと後面衝突警告表示灯の性能、取付位置および取付方法に変更がないものを条件としている。"},
  {no:8207,section:"保安基準適用関係",label:"第76条（緊急制動表示灯）",q:"第76条第1項に規定する旧基準（令和2年告示第1021号による改正前）への適合が認められる一般原動機付自転車として、正しいものはどれか。",choices:["A. 令和5年8月31日以前に製作された二輪の第一種一般原動機付自転車", "B. 令和7年6月14日以前に製作された二輪の第一種一般原動機付自転車", "C. 令和8年8月31日以前に製作された二輪の第一種一般原動機付自転車", "D. 令和10年8月31日以前に製作された二輪の第一種一般原動機付自転車"],answer:"B",exp:"第76条第1項第1号は、令和7年6月14日以前に製作された二輪の第一種一般原動機付自転車を旧基準適合可能な対象として定めている。"},
  {no:8208,section:"保安基準適用関係",label:"第78条の2（電気装置）",q:"第78条の2の規定において、特定小型原動機付自転車について当分の間適用しなくてもよいとされる規定として正しいものはどれか。",choices:["A. 保安基準第66条の15第2項のみ", "B. 保安基準第66条の15第1項並びに細目告示第298条第1項、第311条第1項および第2項並びに第324条第1項", "C. 細目告示第298条第2項のみ", "D. 保安基準第66条の15全項および細目告示関連規定のすべて"],answer:"B",exp:"第78条の2は、特定小型原動機付自転車について当分の間、保安基準第66条の15第1項並びに細目告示第298条第1項、第311条第1項および第2項並びに第324条第1項の規定は適用しなくてもよいと定めている。"}
];
const BADGE={
  "保安基準":["badge-h","H系"],
  "保安基準細目":["badge-s","S系"],
  "保安基準別添":["badge-b","B系"],
  "保安基準適用関係":["badge-t","T系"]
};
let currentQuestions=[],currentIndex=0,score=0,answered=false;

function updateLabels(){
  const sec=document.getElementById('sel-section').value;
  const sel=document.getElementById('sel-label');
  for(const opt of sel.options){
    if(opt.value==='all'){opt.style.display='';continue;}
    const grp=opt.parentElement;
    if(sec==='all'){opt.style.display='';}
    else if(sec==='保安基準'){opt.style.display=grp.label&&grp.label.startsWith('H')?'':'none';}
    else if(sec==='保安基準細目'){opt.style.display=grp.label&&grp.label.startsWith('S')?'':'none';}
    else if(sec==='保安基準別添'){opt.style.display=grp.label&&grp.label.startsWith('B')?'':'none';}
    else{opt.style.display=grp.label&&grp.label.startsWith('T')?'':'none';}
  }
  sel.value='all';
}

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function startQuiz(){
  const sec=document.getElementById('sel-section').value;
  const lbl=document.getElementById('sel-label').value;
  const cnt=document.getElementById('sel-count').value;
  let filtered=QUESTIONS.filter(q=>(sec==='all'||q.section===sec)&&(lbl==='all'||q.label===lbl));
  if(filtered.length===0){document.getElementById('no-questions').classList.add('show');document.getElementById('quiz-area').innerHTML='';document.getElementById('stats-bar').classList.add('hidden');return;}
  document.getElementById('no-questions').classList.remove('show');
  filtered=shuffle(filtered);
  if(cnt!=='all') filtered=filtered.slice(0,parseInt(cnt));
  currentQuestions=filtered;currentIndex=0;score=0;
  document.getElementById('stats-bar').classList.remove('hidden');
  renderQuestion();
}

function renderQuestion(){
  if(currentIndex>=currentQuestions.length){renderResult();return;}
  answered=false;
  const q=currentQuestions[currentIndex];
  const total=currentQuestions.length;
  document.getElementById('progress-text').textContent=`問題 ${currentIndex+1} / ${total}`;
  document.getElementById('score-text').textContent=`正解: ${score}`;
  document.getElementById('progress-fill').style.width=((currentIndex/total)*100)+'%';
  const L={"A":0,"B":1,"C":2,"D":3};
  const ansIdx=typeof q.answer==='string'?(L[q.answer]??0):q.answer;
  const idxs=shuffle([0,1,2,3].slice(0,q.choices.length));
  const choicesHtml=idxs.map((orig,disp)=>{
    const letter=['A','B','C','D'][disp];
    const text=(q.choices[orig]||'').replace(/^[A-D]\. ?/,'');
    return `<button class="choice-btn" onclick="selectAnswer(${orig},${ansIdx})" id="cb-${orig}">${letter}. ${text}</button>`;
  }).join('');
  const [bc,bl]=BADGE[q.section]||['badge-h','H系'];
  document.getElementById('quiz-area').innerHTML=`
    <div class="quiz-card">
      <div class="badges"><span class="badge ${bc}">${bl}</span><span class="badge" style="background:#f7fafc;color:#4a5568;font-size:0.68rem">${q.label}</span></div>
      <div class="question-text">${q.q}</div>
      ${choicesHtml}
      <div class="explanation" id="exp">${q.exp}</div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題 →</button>
    </div>`;
}

function selectAnswer(selected,correct){
  if(answered)return;
  answered=true;
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  if(selected===correct){score++;document.getElementById('cb-'+selected).classList.add('correct');}
  else{document.getElementById('cb-'+selected).classList.add('wrong');document.getElementById('cb-'+correct).classList.add('reveal');}
  document.getElementById('exp').classList.add('show');
  document.getElementById('next-btn').classList.add('show');
  document.getElementById('score-text').textContent=`正解: ${score}`;
}

function nextQuestion(){currentIndex++;renderQuestion();}

function renderResult(){
  const total=currentQuestions.length;
  const pct=Math.round(score/total*100);
  const rank=pct>=80?'🏆 合格圏！':pct>=60?'📚 もう少し！':'💪 要復習';
  document.getElementById('stats-bar').classList.add('hidden');
  document.getElementById('quiz-area').innerHTML=`
    <div class="result-card">
      <div style="font-size:1.05rem;color:#4a5568">結果</div>
      <div class="result-score">${score} / ${total}</div>
      <div class="result-pct">正答率 ${pct}%　${rank}</div>
      <button class="retry-btn" onclick="startQuiz()">🔄 もう一度</button>
      <button class="retry-btn" style="background:#4a5568" onclick="location.reload()">🏠 最初から</button>
    </div>`;
}
</script>
