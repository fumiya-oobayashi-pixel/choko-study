  {no:6730,section:"保安基準細目",label:"第246条（尾灯）",q:"一般小型原動機付自転車の尾灯について、この基準に適合するとみなされる光源の範囲と照明部の大きさとして正しいものはどれか。",choices:["A. 光源が3W以上20W以下で照明部の大きさが10cm2以上", "B. 光源が5W以上30W以下で照明部の大きさが15cm2以上", "C. 光源が5W以上30W以下で照明部の大きさが20cm2以上", "D. 光源が10W以上40W以下で照明部の大きさが15cm2以上"],answer:"B",exp:"第246条第2項第1号の規定により、光源が5W以上30W以下で照明部の大きさが15cm2以上であり、かつその機能が正常である尾灯はこの基準に適合するものとする。"},
  {no:6731,section:"保安基準細目",label:"第247条（制動灯）",q:"一般小型原動機付自転車の制動灯について、昼間の点灯確認距離として規定されているものはどれか。",choices:["A. 後方50mの距離から点灯を確認できること", "B. 後方100mの距離から点灯を確認できること", "C. 後方150mの距離から点灯を確認できること", "D. 後方200mの距離から点灯を確認できること"],answer:"B",exp:"第247条第2項第1号の規定により、制動灯は昼間にその後方100mの距離から点灯を確認できるものでなければならない。"},
  {no:6732,section:"保安基準細目",label:"第247条（制動灯）",q:"一般小型原動機付自転車の尾灯と兼用の制動灯について、同時点灯時の光度に関する規定として正しいものはどれか。",choices:["A. 尾灯のみを点灯したときの光度の3倍以上", "B. 尾灯のみを点灯したときの光度の5倍以上", "C. 尾灯のみを点灯したときの光度の7倍以上", "D. 尾灯のみを点灯したときの光度の10倍以上"],answer:"B",exp:"第247条第2項第2号の規定により、尾灯と兼用の制動灯は同時に点灯したときの光度が尾灯のみを点灯したときの光度の5倍以上となる構造でなければならない。"},
  {no:6733,section:"保安基準細目",label:"第248条（後部反射器）",q:"一般小型原動機付自転車の付随車に備える後部反射器の反射部の形状として規定されているものはどれか。",choices:["A. 正立正三角形で一辺が30mm以上のもの", "B. 正立正三角形で一辺が50mm以上のもの", "C. 正立正三角形で一辺が70mm以上のもの", "D. 文字及び三角形以外の形であること"],answer:"B",exp:"第248条第2項第2号の規定により、付随車に備える後部反射器の反射部は、正立正三角形で一辺が50mm以上のもの又は中空の正立正三角形で帯状部の幅が25mm以上のものでなければならない。"},
  {no:6734,section:"保安基準細目",label:"第248条（後部反射器）",q:"一般小型原動機付自転車の後部反射器について、後方からの確認距離として規定されているものはどれか。",choices:["A. 後方50mの距離から走行用前照灯で照射した場合に反射光を確認できること", "B. 後方100mの距離から走行用前照灯で照射した場合に反射光を確認できること", "C. 後方150mの距離から走行用前照灯で照射した場合に反射光を確認できること", "D. 後方200mの距離から走行用前照灯で照射した場合に反射光を確認できること"],answer:"B",exp:"第248条第2項第3号の規定により、後部反射器は夜間にその後方100mの距離から走行用前照灯で照射した場合にその反射光を照射位置から確認できるものでなければならない。"},
  {no:6735,section:"保安基準細目",label:"第250条（警音器）",q:"一般小型原動機付自転車の警音器の音の大きさとして規定されているものはどれか（前方7mの位置において）。",choices:["A. 105dB以下80dB以上", "B. 110dB以下83dB以上", "C. 112dB以下83dB以上", "D. 115dB以下85dB以上"],answer:"C",exp:"第250条第4項第1号の規定により、一般小型原動機付自転車の警音器の音の大きさは、一般小型原動機付自転車の前方7mの位置において112dB以下83dB以上でなければならない。"},
  {no:6736,section:"保安基準細目",label:"第250条（警音器）",q:"一般小型原動機付自転車の警音器の計測において、2回の計測値の差が何dBを超える場合に計測値を無効とするか。",choices:["A. 1dBを超える場合", "B. 2dBを超える場合", "C. 3dBを超える場合", "D. 5dBを超える場合"],answer:"B",exp:"第250条第5項第6号ロの規定により、2回の計測値の差が2dBを超える場合には計測値を無効とする（ただし、いずれの計測値も規定の範囲内にない場合には有効）。"},
  {no:6737,section:"保安基準細目",label:"第252条（消音器）",q:"第一種一般原動機付自転車の近接排気騒音の上限として規定されているものはどれか。",choices:["A. 80dBを超えない", "B. 84dBを超えない", "C. 87dBを超えない", "D. 90dBを超えない"],answer:"B",exp:"第252条第1項第1号の表の規定により、第一種一般原動機付自転車の近接排気騒音は84dBを超えてはならない。"},
  {no:6738,section:"保安基準細目",label:"第252条（消音器）",q:"第二種原動機付自転車の近接排気騒音の上限として規定されているものはどれか。",choices:["A. 84dBを超えない", "B. 87dBを超えない", "C. 90dBを超えない", "D. 95dBを超えない"],answer:"C",exp:"第252条第1項第1号の表の規定により、第二種原動機付自転車の近接排気騒音は90dBを超えてはならない。"},
  {no:6739,section:"保安基準細目",label:"第252条（消音器）",q:"第一種一般原動機付自転車の加速走行騒音の上限として規定されているものはどれか。",choices:["A. 65dBを超えない", "B. 68dBを超えない", "C. 71dBを超えない", "D. 75dBを超えない"],answer:"C",exp:"第252条第1項第2号の表の規定により、第一種一般原動機付自転車の加速走行騒音は71dBを超えてはならない。"},
  {no:6740,section:"保安基準細目",label:"第254条（乗車装置）",q:"一般原動機付自転車における運転者以外の者の用に供する座席（またがり式を除く）の寸法として正しいものはどれか。",choices:["A. 1人につき幅300mm以上、奥行350mm以上", "B. 1人につき幅350mm以上、奥行400mm以上", "C. 1人につき幅380mm以上、奥行400mm以上", "D. 1人につき幅400mm以上、奥行450mm以上"],answer:"C",exp:"第254条第2項の規定により、運転者以外の者の用に供する座席（またがり式を除く）は、1人につき幅380mm以上、奥行400mm以上でなければならない。"},
  {no:6741,section:"保安基準細目",label:"第260条（前照灯）",q:"第260条の規定による一般原動機付自転車の前照灯（二輪以外）の取付位置として正しいものはどれか。",choices:["A. 地上0.8m以下", "B. 地上1.0m以下", "C. 地上1.3m以下", "D. 地上1.5m以下"],answer:"B",exp:"第260条第2項第2号の規定により、前照灯の取付位置は地上1m以下でなければならない（二輪の一般原動機付自転車に備える前照灯は照明部の上縁の高さが地上1.3m以下、下縁の高さが地上0.5m以上）。"},
  {no:6742,section:"保安基準細目",label:"第260条（前照灯）",q:"一般原動機付自転車の前照灯（光度10,000cd以上のもの）に必要な機能として正しいものはどれか。",choices:["A. 消灯できる構造であること", "B. 減光し又は照射方向を下向きに変換することができる構造であること", "C. 点滅できる構造であること", "D. 自動的に照射方向を変えられる構造であること"],answer:"B",exp:"第260条第2項第1号の規定により、光度が10,000cd以上の前照灯にあっては、減光し又は照射方向を下向きに変換することができる構造でなければならない。"},
  {no:6743,section:"保安基準細目",label:"第261条（番号灯）",q:"第261条（第255条以降の款に属する一般原動機付自転車の番号灯）について、標識番号の視認距離として規定されているものはどれか。",choices:["A. 後方5mの距離から確認できること", "B. 後方8mの距離から確認できること", "C. 後方10mの距離から確認できること", "D. 後方15mの距離から確認できること"],answer:"B",exp:"第261条第1項第1号の規定により、番号灯は夜間にその後方8mの距離から標識の番号等を確認できるものでなければならない。"},
  {no:6744,section:"保安基準細目",label:"第262条（尾灯）",q:"第262条に規定する一般原動機付自転車の尾灯の照明部の中心の取付高さとして正しいものはどれか。",choices:["A. 地上1.5m以下", "B. 地上2.0m以下", "C. 地上2.5m以下", "D. 地上3.0m以下"],answer:"B",exp:"第262条第2項第2号の規定により、尾灯はその照明部の中心が地上2m以下となるように取り付けられなければならない。"},
  {no:6745,section:"保安基準細目",label:"第262条（尾灯）",q:"一般原動機付自転車の後面の両側に備える尾灯について、最外側にあるものの照明部の最外縁と車両最外側との関係として正しいものはどれか。",choices:["A. 一般原動機付自転車の最外側から300mm以内", "B. 一般原動機付自転車の最外側から400mm以内", "C. 一般原動機付自転車の最外側から500mm以内", "D. 一般原動機付自転車の最外側から600mm以内"],answer:"B",exp:"第262条第2項第3号の規定により、後面の両側に備える尾灯は最外側にあるものの照明部の最外縁が一般原動機付自転車の最外側から400mm以内となるように取り付けられなければならない。"},
  {no:6746,section:"保安基準細目",label:"第263条（制動灯）",q:"第263条に規定する一般原動機付自転車の制動灯について、補助制動装置の減速能力が何m/s2以下の場合に操作中に点灯しない構造とすることができるか。",choices:["A. 1.5m/s2以下", "B. 2.0m/s2以下", "C. 2.2m/s2以下", "D. 3.0m/s2以下"],answer:"C",exp:"第263条第2項第1号ただし書の規定により、80km/h（最高速度が80km/h未満の場合はその最高速度）から減速した場合の減速能力が2.2m/s2以下である補助制動装置にあっては、操作中に制動灯が点灯しない構造とすることができる。"},
  {no:6747,section:"保安基準細目",label:"第264条（後部反射器）",q:"第264条に規定する一般原動機付自転車（付随車を除く）の後部反射器の反射部の形状として正しいものはどれか。",choices:["A. 三角形であること", "B. 文字及び三角形以外の形であること", "C. 正方形又は長方形であること", "D. 円形であること"],answer:"B",exp:"第264条第1項第1号の規定により、後部反射器（付随車に備えるものを除く）の反射部は文字及び三角形以外の形でなければならない（O、I、U又は8といった単純な形の文字又は数字に類似した形状は適合するものとする）。"},
  {no:6748,section:"保安基準細目",label:"第264条（後部反射器）",q:"第264条に規定する一般原動機付自転車の後部反射器の反射部の中心の取付高さとして正しいものはどれか。",choices:["A. 地上1.0m以下", "B. 地上1.5m以下", "C. 地上2.0m以下", "D. 地上2.5m以下"],answer:"B",exp:"第264条第2項第1号の規定により、後部反射器はその反射部の中心が地上1.5m以下となるように取り付けられなければならない。"},
  {no:6749,section:"保安基準細目",label:"第266条（警音器）",q:"第266条に規定する一般原動機付自転車（動力7kW超の二輪の一般原動機付自転車等）の警音器の音の大きさとして正しいものはどれか（前方7mの位置において）。",choices:["A. 112dB以下80dB以上", "B. 112dB以下83dB以上", "C. 112dB以下87dB以上", "D. 115dB以下85dB以上"],answer:"C",exp:"第266条第2項第1号の規定により、一般原動機付自転車（動力が7kW超の二輪を含む標準的なもの）の警音器の音の大きさは前方7mの位置において112dB以下87dB以上でなければならない（動力7kW以下の二輪は83dB以上）。"},
  {no:6750,section:"保安基準細目",label:"第266条（警音器）",q:"第266条に規定する一般原動機付自転車の警音器の音の大きさの計測において、マイクロホンの設置位置として正しいものはどれか。",choices:["A. 車両中心線上の前端から2mの位置の地上1mの高さ", "B. 車両中心線上の前端から5mの位置の地上0.5mの高さ", "C. 車両中心線上の前端から7mの位置の地上0.5mから1.5mの高さにおける音の大きさが最大となる高さ", "D. 車両中心線上の前端から10mの位置の地上1mの高さ"],answer:"C",exp:"第266条第3項第2号の規定により、マイクロホンは車両中心線上の一般原動機付自転車の前端から7mの位置の地上0.5mから1.5mの高さにおける音の大きさが最大となる高さにおいて車両中心線に平行かつ水平に向けて設置する。"},
  {no:6751,section:"保安基準細目",label:"第268条（消音器）",q:"第268条に規定する定常走行騒音の上限（三輪以上又は総排気量0.050リットル以下・最高速度50km/h以下の一般原動機付自転車）として正しいものはどれか。",choices:["A. 75dBを超えない", "B. 80dBを超えない", "C. 85dBを超えない", "D. 90dBを超えない"],answer:"C",exp:"第268条第1項第1号の規定により、該当する一般原動機付自転車は定常走行騒音が85dBを超える騒音を発しない構造でなければならない。"},
  {no:6801,section:"保安基準細目",label:"第269条（速度計）",q:"第269条の規定において、一般原動機付自転車の速度計に関する基準として正しいものはどれか。",choices:["A. 速度はmph（マイル毎時）で表示されていればよい", "B. ディジタル式速度計は、昼間及び夜間のいずれにおいても十分な輝度又はコントラストを有しなければならない", "C. 速度計は、運転者席の後方視界範囲内にあればよい", "D. 照明装置を備えないものであっても、文字板及び指示針に自発光塗料を塗ったものでなければ基準に適合する"],answer:"B",exp:"第269条第1項第1号ハの規定により、ディジタル式速度計は昼間又は夜間のいずれにおいて十分な輝度又はコントラストを有しないものは基準に適合しない。速度はkm/hで表示（イ）、運転者の直接視界範囲内（ニ）、照明装置・自発光式・自発光塗料のいずれかに該当すること（ロ）が要件。"},
  {no:6802,section:"保安基準細目",label:"第269条（速度計）",q:"平成19年1月1日以降に製作された二輪の一般原動機付自転車（速度計指示速度V1=40km/h）について、速度計試験機を用いて計測した速度V2の適合範囲として正しいものはどれか。",choices:["A. 10（V1－6）/11 ≦ V2 ≦ （100/90）V1", "B. 10（V1－8）/11 ≦ V2 ≦ V1", "C. 10（V1－6）/11 ≦ V2 ≦ V1", "D. 10（V1－8）/11 ≦ V2 ≦ （100/90）V1"],answer:"B",exp:"第269条第1項第2号ロ(2)の規定により、平成19年1月1日以降に製作された二輪及び三輪の一般原動機付自転車は、10（V1－8）/11 ≦ V2 ≦ V1 の式に適合しなければならない。二輪・三輪以外は「V1－6」を用いる式が適用される。"},
  {no:6803,section:"保安基準細目",label:"第269条（速度計）",q:"平成18年12月31日以前に製作された二輪及び三輪以外の一般原動機付自転車（V1=40km/h）の速度計精度基準として正しいものはどれか。",choices:["A. 10（V1－6）/11 ≦ V2 ≦ V1", "B. 10（V1－8）/11 ≦ V2 ≦ （100/90）V1", "C. 10（V1－6）/11 ≦ V2 ≦ （100/90）V1", "D. 10（V1－8）/11 ≦ V2 ≦ V1"],answer:"C",exp:"第269条第1項第2号イ(1)の規定により、平成18年12月31日までに製作された二輪及び三輪以外の一般原動機付自転車は、10（V1－6）/11 ≦ V2 ≦ （100/90）V1 の式が適用される。平成19年以降は上限がV1となる点が異なる。"},
  {no:6804,section:"保安基準細目",label:"第270条（乗車装置）",q:"第270条第2項の規定において、運転者以外の者の用に供する座席（またがり式を除く）の寸法基準として正しいものはどれか。",choices:["A. 1人につき幅400mm以上、奥行380mm以上", "B. 1人につき幅380mm以上、奥行380mm以上", "C. 1人につき幅380mm以上、奥行400mm以上", "D. 1人につき幅400mm以上、奥行400mm以上"],answer:"C",exp:"第270条第2項の規定により、運転者以外の者の用に供する座席（またがり式の座席を除く）は、1人につき幅380mm以上、奥行400mm以上でなければならない。幅と奥行の数値を混同しやすいため注意が必要。"},
  {no:6805,section:"保安基準細目",label:"第270条（乗車装置）",q:"第270条第1項の規定において、基準に適合するものとして認められるものはどれか。",choices:["A. またがり式の後部座席であって握り手のみを有するが足かけを有しないもの", "B. またがり式の後部座席であって握り手及び足かけを有し、安全な乗車を確保できる構造のもの", "C. 座席を有しない乗車装置の床面であって、滑り止め加工が施されていないもの", "D. 乗車人員が動揺により転落するおそれがあるが座席を有するもの"],answer:"B",exp:"第270条第1項の規定により、またがり式の後部座席であって握り手及び足かけの両方を有し、安全な乗車を確保できる構造のものは基準に適合する。また、座席を有しない乗車装置の床面で十分な滑り止め加工がされているものも適合するとされる。"},
  {no:6806,section:"保安基準細目",label:"第273条（接地部及び接地圧）",q:"第273条第1項第3号の規定において、空気入りゴムタイヤの接地圧の基準として正しいものはどれか。",choices:["A. タイヤの接地部の幅1cmあたり100kgを超えないこと", "B. タイヤの接地部の幅1cmあたり150kgを超えないこと", "C. タイヤの接地部の幅1cmあたり200kgを超えないこと", "D. タイヤの接地部の幅1cmあたり300kgを超えないこと"],answer:"C",exp:"第273条第1項第3号の規定により、空気入りゴムタイヤ又は接地部の厚さ25mm以上の固形ゴムタイヤの接地圧は、タイヤの接地部の幅1cmあたり200kgを超えないこととされている。カタピラは1cm2あたり3kgが基準（第4号）。"},
  {no:6807,section:"保安基準細目",label:"第273条（接地部及び接地圧）",q:"第273条第1項第4号の規定において、カタピラの接地圧の基準として正しいものはどれか。",choices:["A. カタピラの接地面積1cm2あたり1kgを超えないこと", "B. カタピラの接地面積1cm2あたり3kgを超えないこと", "C. カタピラの接地面積1cm2あたり5kgを超えないこと", "D. カタピラの接地部の幅1cmあたり200kgを超えないこと"],answer:"B",exp:"第273条第1項第4号の規定により、カタピラの接地圧は接地面積1cm2あたり3kgを超えないこととされる。なお、カタピラの接地面積は見かけ接地面積（A＝a・b）で算出する。タイヤの基準（幅1cmあたり200kg）と混同しないよう注意。"},
  {no:6808,section:"保安基準細目",label:"第274条（制動装置）",q:"第274条第2項第4号の規定において、最高速度が50km/hを超える二輪の一般原動機付自転車に備えなければならない制動装置として正しいものはどれか。",choices:["A. すべての車輪を制動する1個の操作装置を有する主制動装置", "B. 2個の独立した操作装置を有し、前車輪を含む車輪及び後車輪を含む車輪をそれぞれ独立に制動する主制動装置", "C. 後車輪を含む半数以上の車輪を制動する主制動装置", "D. 駐車制動装置及びすべての車輪を制動する足動式の分配制動機能を有する主制動装置"],answer:"B",exp:"第274条第2項第4号イの規定により、二輪の一般原動機付自転車であって最高速度が50km/hを超えるものは、2個の独立した操作装置を有し、前車輪を含む車輪及び後車輪を含む車輪をそれぞれ独立に制動する主制動装置を備えなければならない。"},
  {no:6809,section:"保安基準細目",label:"第274条（制動装置）",q:"第274条第2項第7号の規定において、液体の圧力により作動する主制動装置に関する基準として誤っているものはどれか。",choices:["A. 制動液の液面のレベルを容易に確認できる透明若しくは半透明なリザーバ・タンクを備えたもの", "B. 制動液が減少したときに運転者席の運転者に警報する液面低下警報装置を備えたもの", "C. リザーバ・タンクのふたを開けないで制動液の液量を容易に確認できるもの", "D. 制動液の交換を年1回以上行う定期点検が義務付けられているもの"],answer:"D",exp:"第274条第2項第7号の規定は、液体の圧力により作動する主制動装置のリザーバタンク等の確認方法について定めており、イ（透明・半透明タンク又はゲージ）、ロ（液面低下警報装置）、ハ（ふたを開けずに確認できる構造）のいずれかを備えることを求めている。定期交換の義務については規定していない。"},
  {no:6810,section:"保安基準細目",label:"第275条（ばい煙、悪臭のあるガス、有害なガス等の発散防止装置）",q:"第275条第1項の規定において、ガソリンを燃料とする一般原動機付自転車の排気ガス中の一酸化炭素の許容濃度として正しいものはどれか（総排気量0.050リットル超・最高速度50km/h超の場合）。",choices:["A. 容量比で0.3%を超えないこと", "B. 容量比で0.5%を超えないこと", "C. 容量比で1.0%を超えないこと", "D. 容量比で3.0%を超えないこと"],answer:"B",exp:"第275条第1項の規定により、一酸化炭素の測定値は0.5%を超えないこととされる。ただし、総排気量が0.050リットル以下で最高速度が50km/h以下の一般原動機付自転車にあっては3.0%が適用される。"},
  {no:6811,section:"保安基準細目",label:"第275条（ばい煙、悪臭のあるガス、有害なガス等の発散防止装置）",q:"第275条第1項の規定において、一般原動機付自転車の排気ガス中の炭化水素の許容濃度（ノルマルヘキサン当量による容量比）として正しいものはどれか。",choices:["A. 100万分の800を超えないこと", "B. 100万分の1,000を超えないこと", "C. 100万分の1,600を超えないこと", "D. 100万分の2,000を超えないこと"],answer:"C",exp:"第275条第1項の規定により、炭化水素のノルマルヘキサン当量による容量比で表した測定値は100万分の1,600を超えないこととされている。一酸化炭素の0.5%とセットで覚えること。"},
  {no:6812,section:"保安基準細目",label:"第276条（前照灯）",q:"第276条第1項の規定において、使用の過程にある一般原動機付自転車の前照灯の性能基準として正しいものはどれか。",choices:["A. 夜間前方20mの距離にある交通上の障害物を確認できる性能を有すること", "B. 夜間前方40mの距離にある交通上の障害物を確認できる性能を有すること", "C. 夜間前方100mの距離にある交通上の障害物を確認できる性能を有すること", "D. 昼間前方40mの距離にある交通上の障害物を確認できる性能を有すること"],answer:"B",exp:"第276条第1項第1号の規定により、前照灯は夜間にその前方40mの距離にある交通上の障害物を確認できる性能を有することとされている。特定小型原動機付自転車（第291条）の15mと混同しないこと。"},
  {no:6813,section:"保安基準細目",label:"第276条（前照灯）",q:"第276条第2項の規定において、二輪の一般原動機付自転車に備える前照灯の取付位置として正しいものはどれか。",choices:["A. 照明部の上縁の高さが地上1m以下、下縁の高さが地上0.5m以上", "B. 照明部の上縁の高さが地上1.3m以下、下縁の高さが地上0.3m以上", "C. 照明部の上縁の高さが地上1.3m以下、下縁の高さが地上0.5m以上", "D. 照明部の上縁の高さが地上1.5m以下、下縁の高さが地上0.5m以上"],answer:"C",exp:"第276条第2項第2号の規定により、二輪の一般原動機付自転車に備える前照灯は、照明部の上縁の高さが地上1.3m以下、下縁の高さが地上0.5m以上であることとされている。二輪以外は地上1m以下が適用される。"},
  {no:6814,section:"保安基準細目",label:"第276条（前照灯）",q:"第276条第2項の規定において、光度が10,000cd以上の前照灯に要求される構造として正しいものはどれか。",choices:["A. 自動的に光軸を調整できる構造であること", "B. 減光し又は照射方向を下向きに変換することができる構造であること", "C. 走行中に消灯できる構造であること", "D. 前方100m先まで照射できる光度を有すること"],answer:"B",exp:"第276条第2項第1号の規定により、光度が10,000cd以上の前照灯は、減光し又は照射方向を下向きに変換することができる構造でなければならない。ただし、協定規則第53号に定める基準に適合する前照灯を備える二輪の一般原動機付自転車はこの限りでない。"},
  {no:6815,section:"保安基準細目",label:"第277条（番号灯）",q:"第277条第1項の規定において、一般原動機付自転車の番号灯の性能基準として正しいものはどれか。",choices:["A. 夜間後方5mの距離から標識の番号等を確認できること", "B. 夜間後方8mの距離から標識の番号等を確認できること", "C. 夜間後方10mの距離から標識の番号等を確認できること", "D. 夜間後方20mの距離から標識の番号等を確認できること"],answer:"B",exp:"第277条第1項第1号の規定により、番号灯は夜間にその後方8mの距離から標識の番号等を確認できるものであることとされている。尾灯（後方300m）や制動灯（後方100m）等の距離基準と区別して覚えること。"},
  {no:6816,section:"保安基準細目",label:"第277条（番号灯）",q:"第277条第3項の規定において、番号灯の取付方法等に関する基準として正しいものはどれか。",choices:["A. 番号灯は、運転者席において消灯できる構造でなければならない", "B. 番号灯は、毎分60回以上の周期で点滅するものであること", "C. 番号灯は、運転者席において消灯できない構造又は前照灯が点灯している場合に消灯できない構造であること", "D. 番号灯の灯光の色は、橙色であること"],answer:"C",exp:"第277条第3項第1号の規定により、番号灯は運転者席において消灯できない構造又は前照灯が点灯している場合に消灯できない構造であることとされている。灯光の色は白色（第1項第2号）、点滅しないこと（第3項第2号）も規定されている。"},
  {no:6817,section:"保安基準細目",label:"第278条（尾灯）",q:"第278条第1項の規定において、一般原動機付自転車の尾灯の性能基準として正しいものはどれか。",choices:["A. 昼間後方300mの距離から点灯を確認できるもの", "B. 夜間後方100mの距離から点灯を確認できるもの", "C. 夜間後方300mの距離から点灯を確認できるもの", "D. 昼間後方100mの距離から点灯を確認できるもの"],answer:"C",exp:"第278条第1項第1号の規定により、尾灯は夜間にその後方300mの距離から点灯を確認できるものであることとされている。制動灯は昼間後方100m（第279条第1項第1号）であり、昼間・夜間及び距離の組み合わせに注意すること。"},
  {no:6818,section:"保安基準細目",label:"第278条（尾灯）",q:"第278条第1項の規定において、尾灯がその基準（夜間後方300m確認）に適合するとみなされる場合の光源の要件として正しいものはどれか。",choices:["A. 光源が5W以上30W以下で照明部の大きさが10cm2以上", "B. 光源が5W以上30W以下で照明部の大きさが15cm2以上", "C. 光源が15W以上60W以下で照明部の大きさが15cm2以上", "D. 光源が15W以上60W以下で照明部の大きさが20cm2以上"],answer:"B",exp:"第278条第1項第1号の規定により、光源が5W以上30W以下で照明部の大きさが15cm2以上であり、機能が正常である尾灯はこの基準に適合するとみなされる。制動灯は光源15W以上60W以下・照明部20cm2以上（第279条第1項第1号）と異なるため注意。"},
  {no:6819,section:"保安基準細目",label:"第278条（尾灯）",q:"第278条第2項の規定において、後面の両側に備える尾灯の最外縁の取付位置基準として正しいものはどれか。",choices:["A. 一般原動機付自転車の最外側から300mm以内", "B. 一般原動機付自転車の最外側から400mm以内", "C. 一般原動機付自転車の最外側から500mm以内", "D. 一般原動機付自転車の最外側から600mm以内"],answer:"B",exp:"第278条第2項第3号の規定により、後面の両側に備える尾灯の最外側にあるものの照明部の最外縁は、一般原動機付自転車の最外側から400mm以内となるように取り付けられていることとされている。特定小型原動機付自転車は300mm以内（第292条）と異なる。"},
  {no:6820,section:"保安基準細目",label:"第279条（制動灯）",q:"第279条第1項の規定において、尾灯と兼用の制動灯に関する基準として正しいものはどれか。",choices:["A. 同時に点灯したときの光度が尾灯のみを点灯したときの光度の3倍以上となる構造", "B. 同時に点灯したときの光度が尾灯のみを点灯したときの光度の5倍以上となる構造", "C. 同時に点灯したときの光度が尾灯のみを点灯したときの光度の8倍以上となる構造", "D. 同時に点灯したときの光度が尾灯のみを点灯したときの光度の10倍以上となる構造"],answer:"B",exp:"第279条第1項第2号の規定により、尾灯と兼用の制動灯は、同時に点灯したときの光度が尾灯のみを点灯したときの光度の5倍以上となる構造でなければならない。"},
  {no:6821,section:"保安基準細目",label:"第279条（制動灯）",q:"第279条第1項の規定において、制動灯の性能基準として正しいものはどれか。",choices:["A. 夜間後方100mの距離から点灯を確認できること", "B. 昼間後方100mの距離から点灯を確認できること", "C. 昼間後方300mの距離から点灯を確認できること", "D. 夜間後方300mの距離から点灯を確認できること"],answer:"B",exp:"第279条第1項第1号の規定により、制動灯は昼間にその後方100mの距離から点灯を確認できるものであることとされている。尾灯（夜間・後方300m）と比較して、昼間・100mという点が異なる。"},
  {no:6822,section:"保安基準細目",label:"第280条（後部反射器）",q:"第280条第1項の規定において、一般原動機付自転車（付随車を除く）の後部反射器の反射部の形状について正しいものはどれか。",choices:["A. 正立正三角形で一辺が50mm以上のものでなければならない", "B. 文字及び三角形以外の形であること（ただしO、I、U、8等の単純な文字・数字類似形状は適合）", "C. 円形であること", "D. 矩形（長方形）であること"],answer:"B",exp:"第280条第1項第1号の規定により、後部反射器（付随車を除く）の反射部は文字及び三角形以外の形であることとされる。ただし、O、I、U又は8といった単純な形の文字・数字に類似した形状は適合するとみなされる。付随車の反射部は正立正三角形（第2号）が要件となる。"},
  {no:6823,section:"保安基準細目",label:"第280条（後部反射器）",q:"第280条第2項の規定において、後部反射器の取付位置として正しいものはどれか。",choices:["A. 反射部の中心が地上1m以下", "B. 反射部の中心が地上1.5m以下", "C. 反射部の中心が地上2m以下", "D. 反射部の中心が地上2.3m以下"],answer:"B",exp:"第280条第2項第1号の規定により、後部反射器はその反射部の中心が地上1.5m以下となるように取り付けられていることとされている。尾灯・制動灯の照明部の中心（地上2m以下）と混同しないよう注意。"},
  {no:6824,section:"保安基準細目",label:"第282条（警音器）",q:"第282条第2項の規定において、一般原動機付自転車の前方7mの位置における警音器の音の大きさの基準として正しいものはどれか（動力7kW超の場合）。",choices:["A. 112dB以下83dB以上", "B. 112dB以下87dB以上", "C. 105dB以下83dB以上", "D. 105dB以下87dB以上"],answer:"B",exp:"第282条第2項第1号の規定により、警音器の音の大きさは一般原動機付自転車の前方7mの位置において112dB以下87dB以上でなければならない。ただし動力が7kW以下の二輪の一般原動機付自転車は112dB以下83dB以上が適用される。"},
  {no:6825,section:"保安基準細目",label:"第282条（警音器）",q:"第282条第1項の規定において、警音器の警報音発生装置として基準に適合しないものはどれか。",choices:["A. 音が連続して一定の大きさで発せられるもの", "B. 音が自動的に断続するもの", "C. 音色が一定のもの", "D. 運転者が音の大きさを容易に変化させることができないもの"],answer:"B",exp:"第282条第1項第1号の規定により、音が自動的に断続するものは基準に適合しない。警報音は連続するものであり、音の大きさ及び音色が一定なものでなければならない（同項）。"},
  {no:6826,section:"保安基準細目",label:"第284条（消音器）",q:"第284条第1項第1号の規定において、定常走行騒音の基準として正しいものはどれか（三輪以上の一般原動機付自転車・総排気量0.050L以下・最高速度50km/h以下の場合）。",choices:["A. 定常走行騒音をdBで表した値が80dBを超えないこと", "B. 定常走行騒音をdBで表した値が85dBを超えないこと", "C. 定常走行騒音をdBで表した値が90dBを超えないこと", "D. 定常走行騒音をdBで表した値が95dBを超えないこと"],answer:"B",exp:"第284条第1項第1号の規定により、対象となる一般原動機付自転車は別添39に定める方法で測定した定常走行騒音が85dBを超えない構造でなければならない。近接排気騒音（第1種84dB・第2種90dB）と混同しないよう注意。"},
  {no:6827,section:"保安基準細目",label:"第284条（消音器）",q:"第284条第1項第2号の規定において、第一種一般原動機付自転車の近接排気騒音の基準として正しいものはどれか。",choices:["A. 近接排気騒音が80dBを超えないこと", "B. 近接排気騒音が84dBを超えないこと", "C. 近接排気騒音が90dBを超えないこと", "D. 近接排気騒音が95dBを超えないこと"],answer:"B",exp:"第284条第1項第2号の規定により、第一種一般原動機付自転車の近接排気騒音は84dBを超えない構造でなければならない。第二種原動機付自転車は90dBが上限とされており、種別によって基準値が異なる。"},
  {no:6828,section:"保安基準細目",label:"第285条（速度計）",q:"第285条第2項の規定において、走行距離計に関する基準として正しいものはどれか。",choices:["A. 走行距離計は、運転者席の後部に備えること", "B. 走行距離計は、運転者が容易に確認できる位置に備えること", "C. 走行距離計は、速度計と一体のものでなければならない", "D. 走行距離計は、デジタル表示のものでなければならない"],answer:"B",exp:"第285条第2項第1号の規定により、走行距離計は運転者が容易に確認できる位置に備えることとされている。また、表示する距離は平坦な舗装路面での走行時において著しい誤差のないものでなければならない（第2号）。"},
  {no:6829,section:"保安基準細目",label:"第288条（接地部及び接地圧）",q:"第288条第2号の規定において、特定小型原動機付自転車の空気入りゴムタイヤの接地圧基準として正しいものはどれか。",choices:["A. タイヤの接地部の幅1cmあたり100kgを超えないこと", "B. タイヤの接地部の幅1cmあたり150kgを超えないこと", "C. タイヤの接地部の幅1cmあたり200kgを超えないこと", "D. タイヤの接地部の幅1cmあたり250kgを超えないこと"],answer:"C",exp:"第288条第2号の規定により、特定小型原動機付自転車の空気入りゴムタイヤ又は接地部の厚さ25mm以上の固形ゴムタイヤの接地圧は、タイヤの接地部の幅1cmあたり200kgを超えないこととされている。一般原動機付自転車（第273条）と同様の基準が適用される。"},
  {no:6830,section:"保安基準細目",label:"第289条（制動装置）",q:"第289条第3項の規定において、二輪の特定小型原動機付自転車に備えなければならない主制動装置として正しいものはどれか。",choices:["A. 後車輪のみを制動する主制動装置", "B. すべての車輪を一つの操作装置で制動する主制動装置", "C. 前車輪を含む車輪及び後車輪を含む車輪をそれぞれ独立に制動する主制動装置", "D. 後車輪を含む半数以上の車輪を制動する主制動装置"],answer:"C",exp:"第289条第3項第3号の規定により、二輪の特定小型原動機付自転車は前車輪を含む車輪及び後車輪を含む車輪をそれぞれ独立に制動する主制動装置を備えなければならない。四輪の場合は後車輪を含む半数以上の車輪を制動する主制動装置（第5号）が適用される。"},
  {no:6831,section:"保安基準細目",label:"第289条（制動装置）",q:"第289条第4項の規定において、付随車を牽引する特定小型原動機付自転車の主制動装置の操作力（足動式）の上限として正しいものはどれか。",choices:["A. 200N以下", "B. 250N以下", "C. 300N以下", "D. 350N以下"],answer:"D",exp:"第289条第4項の規定により、付随車を牽引する場合の制動能力の基準において、運転者の操作力は足動式のものにあっては350N以下、手動式のものにあっては200N以下とされている。"},
  {no:6832,section:"保安基準細目",label:"第291条（前照灯）",q:"第291条第1項の規定において、特定小型原動機付自転車の前照灯の性能基準として正しいものはどれか。",choices:["A. 夜間前方10mの距離にある交通上の障害物を確認できること", "B. 夜間前方15mの距離にある交通上の障害物を確認できること", "C. 夜間前方40mの距離にある交通上の障害物を確認できること", "D. 夜間前方100mの距離にある交通上の障害物を確認できること"],answer:"B",exp:"第291条第1項第1号の規定により、特定小型原動機付自転車の前照灯は夜間前方15mの距離にある交通上の障害物を確認できる性能を有することとされている。一般原動機付自転車は前方40m（第276条第1項第1号）であり、車両種別で異なる。"},
  {no:6833,section:"保安基準細目",label:"第292条（尾灯）",q:"第292条第2項の規定において、特定小型原動機付自転車の後面の両側に備える尾灯の最外縁の取付位置基準として正しいものはどれか。",choices:["A. 特定小型原動機付自転車の最外側から200mm以内", "B. 特定小型原動機付自転車の最外側から300mm以内", "C. 特定小型原動機付自転車の最外側から400mm以内", "D. 特定小型原動機付自転車の最外側から500mm以内"],answer:"B",exp:"第292条第2項第3号の規定により、特定小型原動機付自転車の後面の両側に備える尾灯の最外縁は、最外側から300mm以内に取り付けることとされている。一般原動機付自転車は400mm以内（第278条第2項第3号）と異なる点に注意。"},
  {no:6834,section:"保安基準細目",label:"第293条（制動灯）",q:"第293条第2項の規定において、特定小型原動機付自転車の後面の両側に備える制動灯の最外縁の取付位置基準として正しいものはどれか。",choices:["A. 最外側から200mm以内", "B. 最外側から300mm以内", "C. 最外側から400mm以内", "D. 最外側から500mm以内"],answer:"B",exp:"第293条第2項第3号の規定により、特定小型原動機付自転車の後面の両側に備える制動灯の最外側の照明部最外縁は、特定小型原動機付自転車の最外側から300mm以内に取り付けることとされている。一般原動機付自転車は400mm（第279条）と異なる。"},
  {no:6835,section:"保安基準細目",label:"第294条（後部反射器）",q:"第294条第2項の規定において、特定小型原動機付自転車に備える後部反射器の最外縁の取付位置として正しいものはどれか。",choices:["A. 最外側から200mm以内", "B. 最外側から300mm以内", "C. 最外側から400mm以内", "D. 最外側から500mm以内"],answer:"B",exp:"第294条第2項第2号の規定により、特定小型原動機付自転車の後部反射器の最外縁は最外側から300mm以内に取り付けられていることとされている。一般原動機付自転車（第280条第2項第2号）は400mm以内が基準となる。"},
  {no:6836,section:"保安基準細目",label:"第296条（方向指示器）",q:"第296条第2項の規定において、特定小型原動機付自転車の方向指示器の点滅基準として正しいものはどれか。",choices:["A. 毎分30回以上60回以下の一定の周期で点滅するもの", "B. 毎分60回以上120回以下の一定の周期で点滅するもの", "C. 毎分90回以上180回以下の一定の周期で点滅するもの", "D. 毎分120回以上240回以下の一定の周期で点滅するもの"],answer:"B",exp:"第296条第2項第1号の規定により、特定小型原動機付自転車の方向指示器は毎分60回以上120回以下の一定の周期で点滅するものでなければならない。"},
  {no:6837,section:"保安基準細目",label:"第296条（方向指示器）",q:"第296条第1項の規定において、特定小型原動機付自転車の方向指示器（前方又は後方に表示するもの）の性能基準として正しいものはどれか。",choices:["A. 昼間後方50mの距離から点灯を確認できること", "B. 方向の指示を表示する方向100mの距離から昼間において点灯を確認できること", "C. 夜間後方100mの距離から点灯を確認できること", "D. 昼間後方200mの距離から点灯を確認できること"],answer:"B",exp:"第296条第1項第2号の規定により、方向指示器は方向の指示を表示する方向100mの距離から昼間において点灯を確認できるものでなければならない。また、各指示部の投影面積が7cm2以上であり機能が正常のものはこの基準に適合するとみなされる。"},
  {no:6838,section:"保安基準細目",label:"第296条（方向指示器）",q:"第296条第2項の規定において、特定小型原動機付自転車の方向指示器（前方指示）の照明部の最内縁間隔として正しいものはどれか。",choices:["A. 照明部の最内縁において120mm以上", "B. 照明部の最内縁において150mm以上", "C. 照明部の最内縁において240mm以上", "D. 照明部の最内縁において300mm以上"],answer:"C",exp:"第296条第2項第3号の規定により、前方に対して方向の指示を表示するための方向指示器は照明部の最内縁において240mm以上の間隔を有することとされている。後方指示のものは照明部の中心において150mm以上の間隔が要件となる。"},
  {no:6839,section:"保安基準細目",label:"第298条（電気装置）",q:"第298条第2項の規定において、特定小型原動機付自転車の原動機用蓄電池について基準に適合するとみなされないものはどれか。",choices:["A. 国際連合危険物輸送勧告（UN38.3）に適合するもの", "B. ヨーロッパ連合における統一規格（EN15194）に適合するもの", "C. 電気用品の技術上の基準を定める省令（PSEマーク表示）に適合するもの", "D. JIS規格C8714に適合するもの"],answer:"D",exp:"第298条第2項第1号の規定により、原動機用蓄電池がUN38.3、EN15194、又はPSEマーク表示のいずれかに適合するものは協定規則第136号の規則6.に適合するとみなされる。JIS規格C8714は規定された適合みなし基準に含まれていない。"},
  {no:6840,section:"保安基準細目",label:"第299条（乗車装置）",q:"第299条の規定において、特定小型原動機付自転車の乗車装置の基準として正しいものはどれか。",choices:["A. 座席を有しない乗車装置の床面に滑り止め加工がされているものは、転落・転倒防止の基準に適合するものとする", "B. またがり式の後部座席であって握り手及び足かけを有するものは基準に適合しない", "C. 乗車装置は走行中の振動により車体から分離することができる構造でなければならない", "D. 乗車装置の幅は380mm以上、奥行は400mm以上でなければならない"],answer:"A",exp:"第299条第1号の規定により、座席を有しない乗車装置の床面であって十分な滑り止め加工がされているものは、乗車人員が転落又は転倒することなく安全な乗車を確保できる構造の基準に適合するものとされる。第2号では乗車装置は堅ろうで走行中の振動等により車体から分離しない構造であることが求められる。"},
  {no:6841,section:"保安基準細目",label:"第290条（車体）",q:"第290条第3項の規定において、座席の地上面からの高さが500mm未満の特定小型原動機付自転車（またがり式座席・二輪を除く）の車体について、視認性基準に適合するとみなされる条件として正しいものはどれか。",choices:["A. 地上1m以上の車体の投影面の大きさがそれぞれ長さ200mm以上、幅150mm以上のもの", "B. 地上1m以上の車体の投影面の大きさがそれぞれ長さ300mm以上、幅250mm以上のもの", "C. 地上1m以上の車体の投影面の大きさがそれぞれ長さ400mm以上、幅300mm以上のもの", "D. 地上1m以上の車体の投影面の大きさがそれぞれ長さ500mm以上、幅400mm以上のもの"],answer:"B",exp:"第290条第1項第3号の規定により、地上1m以上の車体の構造について車両中心線に平行な鉛直面への投影面及びそれと直角に交わる鉛直面への投影面の大きさがそれぞれ長さ300mm以上、幅250mm以上のものは視認性の基準に適合するとみなされる。"},
  {no:6901,section:"保安基準細目",label:"第304条（前照灯）",q:"特定小型原動機付自転車の前照灯について、第304条第1項の規定として正しいものはどれか。",choices:["A. 前照灯は、夜間前方20mの距離にある交通上の障害物を確認できる性能を有すること。", "B. 前照灯は、夜間前方15mの距離にある交通上の障害物を確認できる性能を有すること。", "C. 前照灯の灯光の色は、黄色であること。", "D. 前照灯の照射光線の主光軸は、上向きであること。"],answer:"B",exp:"第304条第1項第1号の規定により、前照灯は夜間前方15mの距離にある交通上の障害物を確認できる性能を有すること。また、第3号により灯光の色は白色、第2号により主光軸は下向きである。"},
  {no:6902,section:"保安基準細目",label:"第304条（前照灯）",q:"特定小型原動機付自転車の前照灯の取付位置に関する第304条第2項の規定として正しいものはどれか。ただし、二輪の特定小型原動機付自転車を除く。",choices:["A. 前照灯の取付位置は、地上1.3m以下であること。", "B. 前照灯の取付位置は、地上1.5m以下であること。", "C. 前照灯の取付位置は、地上1m以下であること。", "D. 前照灯の取付位置は、地上2m以下であること。"],answer:"C",exp:"第304条第2項第2号の規定により、前照灯の取付位置は地上1m以下であること。なお、二輪の特定小型原動機付自転車にあっては照明部の上縁の高さが地上1.3m以下、下縁の高さが地上0.5m以上とする別途規定がある。"},
  {no:6903,section:"保安基準細目",label:"第304条（前照灯）",q:"特定小型原動機付自転車の前照灯で、減光または照射方向を下向きに変換できる構造が必要とされるのはどれか。",choices:["A. 光度が5,000cd以上のもの", "B. 光度が10,000cd以上のもの", "C. 光度が8,000cd以上のもの", "D. すべての前照灯"],answer:"B",exp:"第304条第2項第1号の規定により、光度が10,000cd以上の前照灯にあっては、減光し又は照射方向を下向きに変換することができる構造であること。"},
  {no:6904,section:"保安基準細目",label:"第305条（尾灯）",q:"特定小型原動機付自転車の尾灯について、第305条第1項の規定として正しいものはどれか。",choices:["A. 尾灯は、夜間にその後方200mの距離から点灯を確認できるものであること。", "B. 尾灯の灯光の色は、橙色であること。", "C. 尾灯は、夜間にその後方300mの距離から点灯を確認できるものであること。", "D. 尾灯の光源は、10W以上50W以下であること。"],answer:"C",exp:"第305条第1項第1号の規定により、尾灯は夜間にその後方300mの距離から点灯を確認できるものであること。また、第2号により灯光の色は赤色。光源は5W以上30W以下で照明部の大きさが15㎠以上が適合の目安。"},
  {no:6905,section:"保安基準細目",label:"第305条（尾灯）",q:"特定小型原動機付自転車の尾灯の取付位置に関する第305条第2項の規定として正しいものはどれか。",choices:["A. 尾灯の照明部の中心は地上1.5m以下となるように取り付けること。", "B. 尾灯の照明部の中心は地上2m以下となるように取り付けること。", "C. 尾灯の照明部の中心は地上1m以下となるように取り付けること。", "D. 後面の両側に備える尾灯の最外縁は、車両最外側から200㎜以内であること。"],answer:"B",exp:"第305条第2項第2号の規定により、尾灯の照明部の中心は地上2m以下となるように取り付けること。後面の両側に備える尾灯の最外縁は最外側から300㎜以内（第3号）。"},
  {no:6906,section:"保安基準細目",label:"第306条（制動灯）",q:"特定小型原動機付自転車の制動灯について、第306条第1項の規定として正しいものはどれか。",choices:["A. 制動灯は、夜間にその後方100mの距離から点灯を確認できるものであること。", "B. 制動灯は、昼間にその後方100mの距離から点灯を確認できるものであること。", "C. 制動灯は、昼間にその後方200mの距離から点灯を確認できるものであること。", "D. 制動灯の灯光の色は、橙色であること。"],answer:"B",exp:"第306条第1項第1号の規定により、制動灯は昼間にその後方100mの距離から点灯を確認できるものであること（尾灯が夜間300mであるのに対して、制動灯は昼間100m）。灯光の色は赤色（第3号）。"},
  {no:6907,section:"保安基準細目",label:"第306条（制動灯）",q:"特定小型原動機付自転車の尾灯と兼用の制動灯に関する第306条第1項第2号の規定として正しいものはどれか。",choices:["A. 同時点灯時の光度が尾灯のみ点灯時の光度の3倍以上であること。", "B. 同時点灯時の光度が尾灯のみ点灯時の光度の4倍以上であること。", "C. 同時点灯時の光度が尾灯のみ点灯時の光度の5倍以上であること。", "D. 同時点灯時の光度が尾灯のみ点灯時の光度の2倍以上であること。"],answer:"C",exp:"第306条第1項第2号の規定により、尾灯と兼用の制動灯は、同時に点灯したときの光度が尾灯のみを点灯したときの光度の5倍以上となる構造であること。"},
  {no:6908,section:"保安基準細目",label:"第306条（制動灯）",q:"特定小型原動機付自転車の制動灯の点灯条件に関する第306条第2項第1号の規定として正しいものはどれか。",choices:["A. 主制動装置を操作している場合のみ点灯する構造であること。", "B. 主制動装置又は補助制動装置を操作している場合のみ点灯する構造であること。", "C. 補助制動装置を操作している場合にのみ点灯する構造であること。", "D. 常時点灯している構造であること。"],answer:"B",exp:"第306条第2項第1号の規定により、制動灯は主制動装置又は補助制動装置を操作している場合のみ点灯する構造であること。"},
  {no:6909,section:"保安基準細目",label:"第307条（後部反射器）",q:"特定小型原動機付自転車の後部反射器の反射部の形状に関する第307条第1項第1号の規定として正しいものはどれか。",choices:["A. 反射部は、円形又は三角形以外の形であること。", "B. 反射部は、文字及び三角形以外の形であること。", "C. 反射部は、三角形でなければならない。", "D. 反射部は、四角形又は円形でなければならない。"],answer:"B",exp:"第307条第1項第1号の規定により、後部反射器の反射部は文字及び三角形以外の形であること。なお、O、I、U又は8といった単純な形の文字又は数字に類似した形状はこの基準に適合するものとする。"},
  {no:6910,section:"保安基準細目",label:"第307条（後部反射器）",q:"特定小型原動機付自転車の後部反射器の取付位置に関する第307条第2項第1号の規定として正しいものはどれか。",choices:["A. 反射部の中心が地上2m以下となるように取り付けること。", "B. 反射部の中心が地上1m以下となるように取り付けること。", "C. 反射部の中心が地上1.5m以下となるように取り付けること。", "D. 反射部の中心が地上1.8m以下となるように取り付けること。"],answer:"C",exp:"第307条第2項第1号の規定により、後部反射器はその反射部の中心が地上1.5m以下となるように取り付けられていること。"},
  {no:6911,section:"保安基準細目",label:"第308条（警音器）",q:"特定小型原動機付自転車の警音器の音量に関する第308条第2項第1号の規定として正しいものはどれか。ただし、一般的な特定小型原動機付自転車（動力が7kWを超えるもの）とする。",choices:["A. 前方7mの位置において110dB以下85dB以上であること。", "B. 前方7mの位置において112dB以下87dB以上であること。", "C. 前方10mの位置において112dB以下87dB以上であること。", "D. 前方7mの位置において115dB以下90dB以上であること。"],answer:"B",exp:"第308条第2項第1号の規定により、警音器の音の大きさは特定小型原動機付自転車の前方7mの位置において112dB以下87dB以上であること。動力が7kW以下の二輪の特定小型原動機付自転車にあっては112dB以下83dB以上。"},
  {no:6912,section:"保安基準細目",label:"第308条（警音器）",q:"特定小型原動機付自転車の警音器の警報音発生装置について、第308条第1項に基づき基準に適合しないものはどれか。ただし、空気式及び電動空気式の警音器とする。",choices:["A. 音が連続するもの", "B. 音の大きさ及び音色が一定なもの", "C. 音が自動的に断続するもの", "D. 適当な音響を発するもの"],answer:"C",exp:"第308条第1項第1号の規定により、音が自動的に断続するものは基準に適合しない。警報音発生装置の音は連続するものであり、かつ、音の大きさ及び音色が一定なものでなければならない。"},
  {no:6913,section:"保安基準細目",label:"第309条（方向指示器）",q:"特定小型原動機付自転車の方向指示器の灯光の色に関する第309条第1項第3号の規定として正しいものはどれか。",choices:["A. 方向指示器の灯光の色は、白色であること。", "B. 方向指示器の灯光の色は、黄色であること。", "C. 方向指示器の灯光の色は、橙色であること。", "D. 方向指示器の灯光の色は、赤色であること。"],answer:"C",exp:"第309条第1項第3号の規定により、方向指示器の灯光の色は橙色であること。"},
  {no:6914,section:"保安基準細目",label:"第309条（方向指示器）",q:"特定小型原動機付自転車の方向指示器の点滅周期に関する第309条第2項第1号の規定として正しいものはどれか。",choices:["A. 毎分60回以上120回以下の一定の周期で点滅するものであること。", "B. 毎分45回以上90回以下の一定の周期で点滅するものであること。", "C. 毎分80回以上100回以下の一定の周期で点滅するものであること。", "D. 毎分60回以上90回以下の一定の周期で点滅するものであること。"],answer:"A",exp:"第309条第2項第1号の規定により、方向指示器は毎分60回以上120回以下の一定の周期で点滅するものであること。"},
  {no:6915,section:"保安基準細目",label:"第309条（方向指示器）",q:"特定小型原動機付自転車の方向指示器の前方左右の間隔に関する第309条第2項第3号の規定として正しいものはどれか。",choices:["A. 前方に対して表示するものは、照明部の最内縁において200㎜以上の間隔を有すること。", "B. 前方に対して表示するものは、照明部の最内縁において240㎜以上の間隔を有すること。", "C. 後方に対して表示するものは、照明部の中心において240㎜以上の間隔を有すること。", "D. 前方に対して表示するものは、照明部の最内縁において300㎜以上の間隔を有すること。"],answer:"B",exp:"第309条第2項第3号の規定により、前方に対して方向の指示を表示するためのものは照明部の最内縁において240㎜以上、後方に対して指示を表示するためのものは照明部の中心において150㎜以上の間隔を有すること。"},
  {no:6916,section:"保安基準細目",label:"第314条（接地部及び接地圧）",q:"特定小型原動機付自転車の接地圧に関する第314条第1項第2号の規定として正しいものはどれか。",choices:["A. 空気入りゴムタイヤについては、接地圧がタイヤの接地部の幅1㎝あたり150㎏を超えないこと。", "B. 空気入りゴムタイヤ又は接地部の厚さ25㎜以上の固形ゴムタイヤについては、接地圧がタイヤの接地部の幅1㎝あたり200㎏を超えないこと。", "C. 空気入りゴムタイヤについては、接地圧がタイヤの接地部の幅1㎝あたり200㎏を超えないこと。", "D. 固形ゴムタイヤについては、接地圧がタイヤの接地部の幅1㎝あたり300㎏を超えないこと。"],answer:"B",exp:"第314条第1項第2号の規定により、空気入りゴムタイヤ又は接地部の厚さ25㎜以上の固形ゴムタイヤについては、その接地圧はタイヤの接地部の幅1㎝あたり200㎏を超えないこと。"},
  {no:6917,section:"保安基準細目",label:"第315条（制動装置）",q:"特定小型原動機付自転車の制動装置について、第315条第2項が求める制動装置の系統数として正しいものはどれか。",choices:["A. 1系統以上の制動装置", "B. 2系統以上の制動装置", "C. 3系統以上の制動装置", "D. 4系統以上の制動装置"],answer:"B",exp:"第315条第2項の規定により、特定小型原動機付自転車には2系統以上の制動装置を備えなければならない。"},
  {no:6918,section:"保安基準細目",label:"第315条（制動装置）",q:"二輪の特定小型原動機付自転車の主制動装置に関する第315条第3項第3号の規定として正しいものはどれか。",choices:["A. 前車輪を含む車輪及び後車輪を含む車輪をそれぞれ独立に制動する主制動装置を備えること。", "B. すべての車輪を連動して制動する主制動装置を備えること。", "C. 後車輪のみを制動する主制動装置を備えること。", "D. 前車輪のみを制動する主制動装置を備えること。"],answer:"A",exp:"第315条第3項第3号の規定により、二輪の特定小型原動機付自転車にあっては、前車輪を含む車輪及び後車輪を含む車輪をそれぞれ独立に制動する主制動装置を備えること。"},
  {no:6919,section:"保安基準細目",label:"第315条（制動装置）",q:"四輪を有する特定小型原動機付自転車の主制動装置に関する第315条第3項第5号の規定として正しいものはどれか。",choices:["A. すべての車輪を制動する主制動装置を備えること。", "B. 前車輪を含む半数以上の車輪を制動する主制動装置を備えること。", "C. 後車輪を含む半数以上の車輪を制動する主制動装置を備えること。", "D. 前車輪のみを制動する主制動装置を備えること。"],answer:"C",exp:"第315条第3項第5号の規定により、四輪を有する特定小型原動機付自転車にあっては、後車輪を含む半数以上の車輪を制動する主制動装置を備えること。"},
  {no:6920,section:"保安基準細目",label:"第316条（車体）",q:"特定小型原動機付自転車の車体の視認性に関する第316条第1項第4号の規定として正しいものはどれか。",choices:["A. 座席の地上面からの高さが500㎜未満の特定小型原動機付自転車（またがり式及び二輪を除く）は、他の交通からの視認性が確保されるものであること。", "B. すべての特定小型原動機付自転車は、他の交通からの視認性が確保されるものであること。", "C. 座席の地上面からの高さが300㎜未満の特定小型原動機付自転車は、他の交通からの視認性が確保されるものであること。", "D. 二輪の特定小型原動機付自転車のみ、他の交通からの視認性が確保されるものであること。"],answer:"A",exp:"第316条第1項第4号の規定により、座席の地上面からの高さが500㎜未満の特定小型原動機付自転車（またがり式の座席を有するもの及び二輪のものを除く）は、他の交通からの視認性が確保されるものであること。"},
  {no:6921,section:"保安基準細目",label:"第316条（車体）",q:"特定小型原動機付自転車の車体が視認性基準に適合するとみなされる条件として第316条第1項第4号が定める車体の投影面の大きさとして正しいものはどれか。",choices:["A. 地上1m以上の車体の構造について投影面の大きさがそれぞれ長さ200㎜以上、幅150㎜以上のもの", "B. 地上1m以上の車体の構造について投影面の大きさがそれぞれ長さ300㎜以上、幅250㎜以上のもの", "C. 地上0.5m以上の車体の構造について投影面の大きさがそれぞれ長さ300㎜以上、幅250㎜以上のもの", "D. 地上1m以上の車体の構造について投影面の大きさがそれぞれ長さ400㎜以上、幅300㎜以上のもの"],answer:"B",exp:"第316条第1項第4号の規定により、地上1m以上の車体の構造について車両中心線に平行な鉛直面への投影面及びそれと直角に交わる鉛直面への投影面の大きさがそれぞれ長さ300㎜以上、幅250㎜以上のものは基準に適合するものとする。"},
  {no:6922,section:"保安基準細目",label:"第317条（前照灯）",q:"第317条（使用の過程にある特定小型原動機付自転車の前照灯）の個数に関する規定として正しいものはどれか。ただし、二輪の特定小型原動機付自転車で協定規則第53号適合品を除く。",choices:["A. 前照灯の個数は、1個であること。", "B. 前照灯の個数は、1個又は2個であること。", "C. 前照灯の個数は、2個以上であること。", "D. 前照灯の個数は、1個又は3個であること。"],answer:"B",exp:"第317条第2項第4号の規定により、前照灯の個数は1個又は2個であること（協定規則第53号に適合する前照灯を備える二輪の特定小型原動機付自転車を除く）。"},
  {no:6923,section:"保安基準細目",label:"第320条（後部反射器）",q:"第320条（使用の過程にある特定小型原動機付自転車の後部反射器）の確認距離に関する規定として正しいものはどれか。",choices:["A. 夜間にその後方50mの距離から走行用前照灯で照射した場合に反射光を確認できること。", "B. 夜間にその後方100mの距離から走行用前照灯で照射した場合に反射光を確認できること。", "C. 夜間にその後方200mの距離から走行用前照灯で照射した場合に反射光を確認できること。", "D. 昼間にその後方100mの距離から確認できること。"],answer:"B",exp:"第320条第1項第2号の規定により、後部反射器は夜間にその後方100mの距離から走行用前照灯で照射した場合にその反射光を照射位置から確認できるものであること。"},
  {no:6924,section:"保安基準細目",label:"第322条（方向指示器）",q:"第322条（使用の過程にある特定小型原動機付自転車の方向指示器）の指示部中心の取付高さに関する第322条第2項第4号の規定として正しいものはどれか。",choices:["A. 方向指示器の指示部の中心は、地上2m以下となるように取り付けること。", "B. 方向指示器の指示部の中心は、地上2.3m以下となるように取り付けること。", "C. 方向指示器の指示部の中心は、地上1.5m以下となるように取り付けること。", "D. 方向指示器の指示部の中心は、地上2.5m以下となるように取り付けること。"],answer:"B",exp:"第322条第2項第4号の規定により、方向指示器の指示部の中心は地上2.3m以下となるように取り付けられていること。"},
  {no:6925,section:"保安基準細目",label:"第323条（速度抑制装置）",q:"第323条の規定により、速度抑制装置について基準に適合しないものはどれか。",choices:["A. 原動機の作動中、確実に機能するもの", "B. 速度抑制装置の機能を損なう改変が行われているもの", "C. 別添127に定める基準に適合するもの", "D. 速度制御が確実に作動するもの"],answer:"B",exp:"第323条第2号イの規定により、速度抑制装置の機能を損なう改変が行われているものは基準に適合しない。また、使用者等により設定速度の変更又は解除ができるものも適合しない（同号ロ）。"},
  {no:6926,section:"保安基準細目",label:"第323条（速度抑制装置）",q:"第323条の速度抑制装置について、基準に適合しないものとして規定されているのはどれか。",choices:["A. 原動機の作動中に確実に機能するもの", "B. 特定小型原動機付自転車の使用者等により設定速度の変更又は解除ができるもの", "C. 別添127の技術基準に適合するもの", "D. 速度制御性能が正常に作動するもの"],answer:"B",exp:"第323条第2号ロの規定により、特定小型原動機付自転車の使用者等により設定速度の変更又は解除ができるものは基準に適合しないものとする。"},
  {no:6927,section:"保安基準細目",label:"第324条（電気装置）",q:"第324条第1項の規定により、電気装置に関するサイバーセキュリティに係る基準として正しいものはどれか。",choices:["A. 特定小型原動機付自転車に備える電気装置が、省エネルギーを確保できるものであること。", "B. 特定小型原動機付自転車に備える電気装置が、サイバーセキュリティを確保できるものであること。", "C. 特定小型原動機付自転車に備える電気装置が、耐震性を確保できるものであること。", "D. 特定小型原動機付自転車に備える電気装置が、防水性を確保できるものであること。"],answer:"B",exp:"第324条第1項の規定により、特定小型原動機付自転車に備える電気装置が、サイバーセキュリティを確保できるものであることとする。"},
  {no:6928,section:"保安基準細目",label:"第324条（電気装置）",q:"第324条第2項の規定により、原動機用蓄電池が基準に適合するとみなされるものとして正しいものはどれか。",choices:["A. 国際連合危険物輸送勧告（UN38.3）に適合するもの", "B. 米国自動車技術者協会規格（SAE）に適合するもの", "C. 国際標準化機構規格（ISO）に適合するもの", "D. 日本工業規格（JIS）に適合するもの"],answer:"A",exp:"第324条第2項第1号の規定により、国際連合危険物輸送勧告（UN38.3）、ヨーロッパ連合における統一規格（EN15194）、又は電気用品の技術上の基準を定める省令（PSEマーク表示）のいずれかに適合するものは基準に適合するものとみなす。"},
  {no:6929,section:"保安基準細目",label:"第325条（乗車装置）",q:"第325条の規定により、座席を有しない乗車装置の床面について基準に適合するものとされる条件はどれか。",choices:["A. 床面が十分な強度を有するもの", "B. 床面に十分な滑り止め加工がされているもの", "C. 床面が金属製であるもの", "D. 床面の面積が一定以上であるもの"],answer:"B",exp:"第325条第1号の規定により、座席を有しない乗車装置の床面であって、十分な滑り止め加工がされているものは、乗車人員が動揺・衝撃等により転落又は転倒することなく安全な乗車を確保できる構造の基準に適合するものとする。"},
  {no:6930,section:"保安基準細目",label:"第326条（最高速度表示灯）",q:"第326条第1項第2号の規定による最高速度表示灯の灯光の色として正しいものはどれか。",choices:["A. 白色", "B. 橙色", "C. 赤色", "D. 緑色"],answer:"D",exp:"第326条第1項第2号の規定により、最高速度表示灯の灯光の色は緑色であること。"},
  {no:6931,section:"保安基準細目",label:"第326条（最高速度表示灯）",q:"第326条第2項の規定による最高速度表示灯が表示する速度として正しいものはどれか。",choices:["A. 6km/h又は15km/h", "B. 6km/h又は20km/h", "C. 10km/h又は20km/h", "D. 6km/h又は25km/h"],answer:"B",exp:"第326条第2項の規定により、最高速度表示灯が表示する速度は6km/h又は20km/hとする。"},
  {no:6932,section:"保安基準細目",label:"第326条（最高速度表示灯）",q:"第326条第3項第1号の規定により、最高速度表示灯の点灯・点滅の条件として正しいものはどれか。",choices:["A. 速度抑制装置が作動する速度が6km/hを超える場合は、常に点滅するものであること。", "B. 速度抑制装置が作動する速度が6km/h以下の場合は、常に点灯するものであること。", "C. 速度抑制装置が作動する速度が6km/hを超える場合は、常に点灯するものであること。", "D. 速度抑制装置が作動する速度にかかわらず、常に点滅するものであること。"],answer:"C",exp:"第326条第3項第1号の規定により、速度抑制装置が作動する速度が6km/hを超える場合は常に点灯するものであること。速度抑制装置が作動する速度が6km/h以下の場合に限り、常に点滅するものであること（毎分60回以上120回以下の一定の周期）。"},
  {no:6933,section:"保安基準細目",label:"第326条（最高速度表示灯）",q:"第326条第3項第3号の規定による最高速度表示灯（後方に照射するものを除く）の取付高さに関する規定として正しいものはどれか。",choices:["A. 中心が地上0.3m以上となるように取り付けること。", "B. 中心が地上0.4m以上となるように取り付けること。", "C. 中心が地上0.5m以上となるように取り付けること。", "D. 中心が地上0.6m以上となるように取り付けること。"],answer:"B",exp:"第326条第3項第3号の規定により、最高速度表示灯（後方に照射するものを除く）の中心は地上0.4m以上となるように取り付けられていること。"},
  {no:6934,section:"保安基準細目",label:"第321条（警音器）",q:"第321条第2項第1号の規定により、動力が7kW以下の二輪の特定小型原動機付自転車に備える警音器の音の大きさとして正しいものはどれか。",choices:["A. 前方7mの位置において112dB以下87dB以上であること。", "B. 前方7mの位置において112dB以下83dB以上であること。", "C. 前方10mの位置において112dB以下83dB以上であること。", "D. 前方7mの位置において110dB以下80dB以上であること。"],answer:"B",exp:"第321条第2項第1号の規定により、動力が7kW以下の二輪の特定小型原動機付自転車に備える警音器にあっては、前方7mの位置において112dB以下83dB以上であること。一般は112dB以下87dB以上。"},
  {no:6935,section:"保安基準細目",label:"第318条（尾灯）",q:"第318条（使用の過程にある特定小型原動機付自転車の尾灯）の光源の規格として、基準に適合するとみなされるものはどれか。",choices:["A. 光源が3W以上15W以下で照明部の大きさが10㎠以上であり機能が正常であるもの", "B. 光源が5W以上30W以下で照明部の大きさが15㎠以上であり機能が正常であるもの", "C. 光源が10W以上40W以下で照明部の大きさが20㎠以上であり機能が正常であるもの", "D. 光源が5W以上20W以下で照明部の大きさが10㎠以上であり機能が正常であるもの"],answer:"B",exp:"第318条第1項第1号の規定により、光源が5W以上30W以下で照明部の大きさが15㎠以上であり、かつその機能が正常である尾灯は、後方300mの距離から点灯を確認できる基準に適合するものとする。"},
  {no:7001,section:"保安基準別添",label:"別添1（大型貨物自動車の速度抑制装置の技術基準）",q:"大型貨物自動車の速度抑制装置に関する次の記述のうち、正しいものはどれか。",choices:["A. 速度抑制装置の設定速度は100km/h以下の任意の速度とする", "B. 速度抑制装置の設定速度は90km/h以下の任意の速度とし、自動車使用者等による設定速度の変更及び解除ができてはならない", "C. 速度抑制装置は主制動装置を補助するために作動させることができる", "D. 速度抑制装置の設定速度は80km/h以下の任意の速度とする"],answer:"B",exp:"別添1の3.2項により、設定速度は90km/h以下の任意の速度とし、自動車使用者等による設定速度の変更及び設定の解除ができてはならないと規定されている。"},
  {no:7002,section:"保安基準別添",label:"別添1（大型貨物自動車の速度抑制装置の技術基準）",q:"大型貨物自動車の速度抑制装置の試験路試験における天候条件として正しいものはどれか。",choices:["A. 平均風速は8m/s未満で、最大風速は15m/sを超えないこと", "B. 平均風速は6m/s未満で、最大風速は10m/sを超えないこと", "C. 平均風速は4m/s未満で、最大風速は8m/sを超えないこと", "D. 平均風速は5m/s未満で、最大風速は12m/sを超えないこと"],answer:"B",exp:"別添1の4.1.3.1.項により、試験路試験の天候条件は平均風速6m/s未満、最大風速は10m/sを超えないことと規定されている。"},
  {no:7003,section:"保安基準別添",label:"別添1（大型貨物自動車の速度抑制装置の技術基準）",q:"速度抑制装置の加速試験における判定基準として正しいものはどれか。",choices:["A. 安定速度は設定速度に10km/hを加えた速度を超えてはならない", "B. 安定速度は設定速度に5km/hを加えた速度及び90km/hを超えてはならない", "C. 安定速度は設定速度に3km/hを加えた速度及び90km/hを超えてはならない", "D. 安定速度は設定速度に5km/hを加えた速度及び100km/hを超えてはならない"],answer:"B",exp:"別添1の4.1.4.2.1.項により、安定速度は設定速度に5km/hを加えた速度及び90km/hを超えてはならないと規定されている。"},
  {no:7004,section:"保安基準別添",label:"別添2（軽合金製ディスクホイールの技術基準）",q:"乗用車用軽合金製ディスクホイールの回転曲げ疲労試験における曲げモーメントの計算式中、係数Smの標準値として正しいものはどれか。",choices:["A. 1.0", "B. 1.2", "C. 1.5", "D. 2.0"],answer:"C",exp:"別添2の2.1.1.項により、曲げモーメントの係数Smの標準値は1.5と規定されている（ただし、特定の合金や鋳鍛造材については1.8または2.0とすることができる）。"},
  {no:7005,section:"保安基準別添",label:"別添2（軽合金製ディスクホイールの技術基準）",q:"乗用車用軽合金製ディスクホイールの半径方向負荷耐久試験において、ディスクホイールを最低何回転させなければならないか。",choices:["A. 10万回転", "B. 20万回転", "C. 30万回転", "D. 50万回転"],answer:"D",exp:"別添2の2.2.2.2.項により、半径方向負荷耐久試験ではディスクホイールを最低50万回転させることと規定されている。"},
  {no:7006,section:"保安基準別添",label:"別添2（軽合金製ディスクホイールの技術基準）",q:"乗用車用軽合金製ディスクホイールの衝撃試験において、おもりを落下させる際のタイヤの空気圧として正しいものはどれか。",choices:["A. 150±10kPa", "B. 180±10kPa", "C. 200±10kPa", "D. 250±10kPa"],answer:"C",exp:"別添2の2.3.2.2.項により、衝撃試験時のタイヤの空気圧は200±10kPaと規定されている。"},
  {no:7007,section:"保安基準別添",label:"別添3（乗用車用空気入タイヤの技術基準）2015.10.8削除",q:"別添3（乗用車用空気入タイヤの技術基準）の適用範囲として正しいものはどれか。",choices:["A. 専ら乗用の用に供する自動車であって乗車定員10人以上のものに備えるタイヤに適用する", "B. 専ら乗用の用に供する自動車であって乗車定員10人未満のもの又は車両総重量3.5t以下の被牽引自動車に備えるタイヤに適用する", "C. 二輪自動車及び側車付二輪自動車を含む全ての自動車のタイヤに適用する", "D. 貨物の運送の用に供する自動車のみに備えるタイヤに適用する"],answer:"B",exp:"別添3の1.項（適用範囲）により、専ら乗用の用に供する自動車（二輪自動車、側車付二輪自動車、三輪自動車及び被牽引自動車を除く）であって乗車定員10人未満のもの又は車両総重量3.5t以下の被牽引自動車に備えるタイヤに適用すると規定されている。"},
  {no:7008,section:"保安基準別添",label:"別添4（トラック、バス及びトレーラ用空気入タイヤの技術基準）2015.10.8削除",q:"別添4（トラック、バス及びトレーラ用空気入タイヤの技術基準）において、車両総重量3.5t以下の貨物の運送の用に供する自動車に備えるタイヤの取扱いとして正しいものはどれか。",choices:["A. 別添4の基準のみ適用される", "B. 別添3の乗用車用空気入タイヤの技術基準を適用することができる", "C. 適用除外となりいずれの基準も適用されない", "D. 別添5の二輪車用空気入タイヤの技術基準を適用することができる"],answer:"B",exp:"別添4の1.項により、車両総重量3.5t以下の貨物の運送の用に供する自動車に備えるタイヤは、別添4の適用に替えて別添3の基準を適用することができると規定されている。"},
  {no:7009,section:"保安基準別添",label:"別添5（二輪車用空気入タイヤの技術基準）2015.10.8削除",q:"別添5（二輪車用空気入タイヤの技術基準）における「ランフラットタイヤ（セルフサポートタイヤ）」の定義として最も適切なものはどれか。",choices:["A. 特殊な補強材を追加したタイヤであって、パンク後でも100km/hで走行できるもの", "B. 追加の構成部品なく、適切なリムに取り付けた状態でフラットタイヤランニングモードで80km/hの速度で80kmまで走行できる技術的特徴を有するタイヤ", "C. 特殊な空気圧制御システムと組み合わせて使用するタイヤ", "D. パンク後も空気圧を維持できる構造を持つタイヤ"],answer:"B",exp:"別添3の2.2.7.項（別添5においても同義で参照）により、ランフラットタイヤ（セルフサポートタイヤ）は、追加の構成部品がなく適切なリムに取り付けた状態においてフラットタイヤランニングモードで80km/h（50mph）の速度で80kmまでの距離を走行している間は少なくとも基本的なタイヤの機能を維持している技術的特徴を有するタイヤをいうと規定されている。"},
  {no:7010,section:"保安基準別添",label:"別添6（衝撃吸収式かじ取装置の技術基準）2011.6.23削除",q:"別添6（衝撃吸収式かじ取装置の技術基準）のバリヤに対する正面衝突試験に関する記述として正しいものはどれか。",choices:["A. 非積載質量の自動車を60km/hの速度でバリヤに衝突させた際にコラム頂点が後方15cmを超えて移動しないこと", "B. 非積載質量の自動車を48.3km/hの速度でバリヤに衝突させた際にステアリングコラムとそのシャフトの頂点が水平方向に後方12.7cmを超えて移動しないこと", "C. 非積載質量の自動車を50km/hの速度でバリヤに衝突させた際にコラム頂点が後方10cmを超えて移動しないこと", "D. 積載状態の自動車を48.3km/hの速度でバリヤに衝突させた際にコラム頂点が後方12.7cmを超えて移動しないこと"],answer:"B",exp:"別添6の3.1.項により、非積載質量の自動車を48.3km/hの速度でバリヤに衝突させた際にステアリングコラムとそのシャフトの頂点が車両の水平方向に後方12.7cmを超えて移動せず、さらに鉛直方向に上方12.7cmを超えて移動しないものでなければならないと規定されている。"},
  {no:7011,section:"保安基準別添",label:"別添7（四輪自動車等の施錠装置の技術基準）2022.10.7削除",q:"別添7（四輪自動車等の施錠装置の技術基準）における機械式施錠機能の鍵の組合せ数に関する記述として正しいものはどれか。",choices:["A. 機械式施錠機能は500通り以上の鍵の組合せを有するものでなければならない", "B. 機械式施錠機能は1,000通り以上の鍵の組合せを有するものでなければならない", "C. 機械式施錠機能は5,000通り以上の鍵の組合せを有するものでなければならない", "D. 機械式施錠機能は10,000通り以上の鍵の組合せを有するものでなければならない"],answer:"B",exp:"別添7の3.6.項により、機械式施錠機能は1,000通り以上の鍵の組合せを有するものでなければならないと規定されている（ただし、1年間の製造車両台数が1,000台未満の場合は製造車両台数と同数で可）。"},
  {no:7012,section:"保安基準別添",label:"別添8（二輪自動車等の施錠装置の技術基準）",q:"別添8（二輪自動車等の施錠装置の技術基準）における施錠装置の種類とその説明の組み合わせとして正しいものはどれか。",choices:["A. 第1種：ステアリングと動力伝達装置の両方を施錠する", "B. 第2種：自動車の原動機を不作動にする装置と連動してステアリングを施錠する", "C. 第3種：ステアリングだけを施錠する", "D. 第4種：ステアリングを施錠する"],answer:"B",exp:"別添8の2.1.2.項により、第2種の施錠装置は自動車の原動機を不作動にする装置と連動してステアリングを施錠するものと規定されている。"},
  {no:7013,section:"保安基準別添",label:"別添8（二輪自動車等の施錠装置の技術基準）",q:"別添8（二輪自動車等の施錠装置の技術基準）において、施錠装置（第4種を除く）が作動するために必要なかじ取りハンドルの操作角度として正しいものはどれか。",choices:["A. 前方直進状態から少なくとも10度左又は右の角度に操作された場合にのみ施錠する", "B. 前方直進状態から少なくとも15度左又は右の角度に操作された場合にのみ施錠する", "C. 前方直進状態から少なくとも20度左又は右の角度に操作された場合にのみ施錠する", "D. 前方直進状態から少なくとも30度左又は右の角度に操作された場合にのみ施錠する"],answer:"C",exp:"別添8の3.10.項により、施錠装置（第4種を除く）はかじ取りハンドルが前方直進状態から少なくとも20度左又は右の角度に操作された場合にのみ施錠するものでなければならないと規定されている。"},
  {no:7014,section:"保安基準別添",label:"別添8（二輪自動車等の施錠装置の技術基準）",q:"別添8（二輪自動車等の施錠装置の技術基準）において、施錠装置（第4種を除く）に作動時にかじ取りハンドル軸の両方向にかけられるトルクとして正しいものはどれか。",choices:["A. 100Nm", "B. 150Nm", "C. 200Nm", "D. 300Nm"],answer:"C",exp:"別添8の3.9.項により、施錠装置（第4種を除く）はその作動時にかじ取りハンドル軸の軸回りにかじ取りハンドル軸両方向に200Nmのトルクがかけられた場合でも安全性をおびやかすような損傷をかじ取装置に与えることなく耐えなければならないと規定されている。"},
  {no:7015,section:"保安基準別添",label:"別添9（イモビライザの技術基準）2022.10.7削除",q:"別添9（イモビライザの技術基準）において、イモビライザの適用対象となる自動車の車両電源として正しいものはどれか。",choices:["A. 車両電源が6Vである自動車", "B. 車両電源が12Vである自動車", "C. 車両電源が24Vである自動車", "D. 車両電源が48Vである自動車"],answer:"B",exp:"別添9の1.項（適用範囲）により、この技術基準は車両電源が12Vである自動車に備えるイモビライザに適用すると規定されている。"},
  {no:7016,section:"保安基準別添",label:"別添10（トラック及びバスの制動装置の技術基準）2013.8.30削除",q:"別添10（トラック及びバスの制動装置の技術基準）における「第2種バス」の定義として正しいものはどれか。",choices:["A. 専ら乗用の用に供する乗車定員10人以上の自動車であって、車両総重量5t以下のもの", "B. 専ら乗用の用に供する乗車定員10人以上の自動車であって、車両総重量が5tを超えるもの", "C. 専ら乗用の用に供する乗車定員11人以上の自動車であって、車両総重量が8tを超えるもの", "D. 専ら乗用の用に供する乗車定員10人以上の自動車であって、車両総重量が10tを超えるもの"],answer:"B",exp:"別添10の2.2.項により、第2種バスとは専ら乗用の用に供する乗車定員10人以上の自動車であって車両総重量が5tを超えるものをいうと規定されている。"},
  {no:7031,section:"保安基準別添",label:"別添11（アンチロックブレーキシステムの技術基準）2013.8.30削除",q:"別添11（アンチロックブレーキシステムの技術基準）における「ロック」の定義として正しいものはどれか。",choices:["A. 車輪の回転運動の停止状態又はそれに近い状態が0.3秒以上継続する現象", "B. 車輪の回転運動の停止状態又はそれに近い状態が0.5秒以上継続する現象", "C. 車輪の回転運動の停止状態又はそれに近い状態が1.0秒以上継続する現象", "D. 車輪の回転運動が完全に停止した状態が0.5秒以上継続する現象"],answer:"B",exp:"別添11の2.1.「ロック」の定義により、車輪の回転運動の停止状態又はそれに近い状態が0.5秒以上継続する現象をいう。"},
  {no:7032,section:"保安基準別添",label:"別添12（乗用車の制動装置の技術基準）2014.2.13削除",q:"別添12（乗用車の制動装置の技術基準）における「B種の電気式回生制動装置」の定義として正しいものはどれか。",choices:["A. 主制動装置の一部でない電気式回生制動装置", "B. 主制動装置の一部である電気式回生制動装置", "C. 補助制動装置として機能する電気式回生制動装置", "D. 非常用制動装置として機能する電気式回生制動装置"],answer:"B",exp:"別添12の2.14.3.により、「B種の電気式回生制動装置」とは主制動装置の一部である電気式回生制動装置をいう。なお、A種は主制動装置の一部でないものをいう（2.14.2.）。"},
  {no:7033,section:"保安基準別添",label:"別添14（制動液漏れ警報装置の技術基準）",q:"別添14（制動液漏れ警報装置の技術基準）において、制動液漏れ警報装置の試験でブレーキペダルを踏み込む際の操作力の上限として正しいものはどれか。",choices:["A. 500N", "B. 600N", "C. 700N", "D. 800N"],answer:"C",exp:"別添14の2.の試験方法により、ブレーキペダルを運転者の操作力700N以下の適当な踏力で踏み込む、と定められている。"},
  {no:7034,section:"保安基準別添",label:"別添14（制動液漏れ警報装置の技術基準）",q:"別添14（制動液漏れ警報装置の技術基準）の判定基準において、音による警報装置の警報音の大きさとして、「その他の自動車」に適用される基準値として正しいものはどれか（ジーゼル以外の場合）。",choices:["A. 60dB（A）以上", "B. 65dB（A）以上", "C. 70dB（A）以上", "D. 75dB（A）以上"],answer:"C",exp:"別添14の2.1.(1)の表により、その他の自動車（ジーゼルを原動機とするもの以外）の警報音の大きさは70dB（A）以上であること。ジーゼルを原動機とするものは75dB（A）以上。"},
  {no:7035,section:"保安基準別添",label:"別添15（トレーラの制動装置の技術基準）2013.8.30削除",q:"別添15（トレーラの制動装置の技術基準）における「第3種トレーラ」の説明として正しいものはどれか（センターアクスルトレーラの場合）。",choices:["A. 積載状態での後軸重の総和が0.75tを超え3.5t以下のもの", "B. 積載状態での後軸重の総和が3.5tを超え10t以下のもの", "C. 積載状態での後軸重の総和が10tを超えるもの", "D. 積載状態での後軸重の総和が0.75t以下のもの"],answer:"B",exp:"別添15の2.3.により、センターアクスルトレーラの「第3種トレーラ」とは積載状態での後軸重の総和が3.5tを超え10t以下のものをいう。"},
  {no:7036,section:"保安基準別添",label:"別添16（乗用車用プラスチツク製燃料タンクの技術基準）",q:"別添16（乗用車用プラスチツク製燃料タンクの技術基準）の燃料透過性試験において、判定基準として燃料の減少量が適合するとされる数値として正しいものはどれか（通常の3.1.2.の試験の場合）。",choices:["A. 24時間当たり10g以下", "B. 24時間当たり15g以下", "C. 24時間当たり20g以下", "D. 24時間当たり30g以下"],answer:"C",exp:"別添16の4.1.1.により、3.1.1.から3.1.2.の試験を行ったとき、燃料の減少量は24時間当たり20g以下であること。なお、再試験（3.1.3.）の場合は10g以下（4.1.2.）。"},
  {no:7037,section:"保安基準別添",label:"別添16（乗用車用プラスチツク製燃料タンクの技術基準）",q:"別添16（乗用車用プラスチツク製燃料タンクの技術基準）の耐圧試験における試験条件として正しいものはどれか。",choices:["A. 温度40℃の水を公称容量まで満たし、内圧をゲージ圧で20kPaに5時間保つ", "B. 温度53℃の水を公称容量まで満たし、内圧をゲージ圧で29kPaに5時間保つ", "C. 温度53℃の水を公称容量まで満たし、内圧をゲージ圧で20kPaに3時間保つ", "D. 温度40℃の水を公称容量まで満たし、内圧をゲージ圧で29kPaに3時間保つ"],answer:"B",exp:"別添16の3.3.により、耐圧試験では温度53℃の水を公称容量まで満たし、53±2℃の温度のもとで燃料タンクの内圧をゲージ圧で29kPaに5時間保つ。"},
  {no:7038,section:"保安基準別添",label:"別添17（衝突時等における燃料漏れ防止の技術基準）",q:"別添17（衝突時等における燃料漏れ防止の技術基準）の前面衝突試験において、試験自動車をバリヤに衝突させる速度として正しいものはどれか。",choices:["A. 40±2km/h", "B. 48±2km/h", "C. 50±2km/h", "D. 56±2km/h"],answer:"C",exp:"別添17の3.1.3.により、前面衝突試験では試験自動車を50±2km/hの速度でバリヤ前面に垂直に正面衝突させる。"},
  {no:7039,section:"保安基準別添",label:"別添17（衝突時等における燃料漏れ防止の技術基準）",q:"別添17（衝突時等における燃料漏れ防止の技術基準）において、台車を使用した後面衝突試験でのインパクタと台車の総質量として正しいものはどれか。",choices:["A. 900±20kg", "B. 1,000±20kg", "C. 1,100±20kg", "D. 1,200±20kg"],answer:"C",exp:"別添17の3.2.1.2.1.(3)により、台車及びインパクタの総質量は1,100±20kgであること。"},
  {no:7040,section:"保安基準別添",label:"別添18（自動車燃料ガス容器取付部の技術基準）",q:"別添18（自動車燃料ガス容器取付部の技術基準）において、上下方向の振動振幅一定試験での周波数1Hzから3Hzの振幅として正しいものはどれか。",choices:["A. ±0.5mm", "B. ±1mm", "C. ±10mm", "D. ±28mm"],answer:"D",exp:"別添18の4.1.1.(1)により、上下方向の振動振幅一定試験においてf=1～3Hzの振幅はa=±28mmである。"},
  {no:7041,section:"保安基準別添",label:"別添18（自動車燃料ガス容器取付部の技術基準）",q:"別添18（自動車燃料ガス容器取付部の技術基準）のゆるみ試験において、常用帯域に共振を有する場合の試験時間又は試験回数として正しいものはどれか。",choices:["A. 10時間又は2×10の5乗回", "B. 20時間又は4×10の5乗回", "C. 30時間又は6×10の5乗回", "D. 40時間又は8×10の5乗回"],answer:"B",exp:"別添18の4.2.1.(1)により、常用帯域に共振を有する場合は3方向ともそれぞれの共振周波数で20時間又は4×10の5乗回の試験を行う。加振加速度は±4.9m/s2。"},
  {no:7042,section:"保安基準別添",label:"別添19（自動車燃料ガス容器の気密・換気の技術基準）",q:"別添19（自動車燃料ガス容器の気密・換気の技術基準）の格納室の気密試験において、停車時の試験で容器格納室に導入する圧力として正しいものはどれか。",choices:["A. 5kPa", "B. 10kPa", "C. 15kPa", "D. 20kPa"],answer:"B",exp:"別添19の3.1.1.(2)により、容器格納室に圧縮炭酸ガスを吹き込み、容器格納室の内圧を10kPaにした後、5分間その状態を保つ。"},
  {no:7043,section:"保安基準別添",label:"別添19（自動車燃料ガス容器の気密・換気の技術基準）",q:"別添19（自動車燃料ガス容器の気密・換気の技術基準）の判定基準において、格納室の換気試験（3.2.）の合否基準として正しいものはどれか。",choices:["A. 容器格納室内のガス濃度が90%低下するのに要する時間が120秒以内であること", "B. 容器格納室内のガス濃度が90%低下するのに要する時間が180秒以内であること", "C. 容器格納室内のガス濃度が50%低下するのに要する時間が180秒以内であること", "D. 容器格納室内のガス濃度が90%低下するのに要する時間が300秒以内であること"],answer:"B",exp:"別添19の4.(2)により、3.2.による試験を行ったときに、容器格納室内のガス濃度が90%低下するのに要する時間が180秒以内であること。"},
  {no:7044,section:"保安基準別添",label:"別添20（外装の技術基準）2016.10.7削除",q:"別添20（外装の技術基準）において、自動車の外部表面に有してはならない突起の曲率半径として正しいものはどれか。",choices:["A. 曲率半径が1.5mm未満の突起", "B. 曲率半径が2.0mm未満の突起", "C. 曲率半径が2.5mm未満の突起", "D. 曲率半径が5.0mm未満の突起"],answer:"C",exp:"別添20の3.4.により、外部表面には曲率半径が2.5mm未満である突起を有してはならない。ただし、突出量が5mm未満の突起は端部に丸みが付けられていればよく、突出量が1.5mm未満はこの限りでない。"},
  {no:7045,section:"保安基準別添",label:"別添21（外装の手荷物積載用部品の技術基準）2016.10.7削除",q:"別添21（外装の手荷物積載用部品の技術基準）において、手荷物積載用部品の表面の曲率半径に関する特別規定として正しいものはどれか。",choices:["A. 直径100mmの球体が接触する部分について、曲率半径が2.5mm以上であること", "B. 直径100mmの球体が接触する部分について、曲率半径が5.0mm以上であること", "C. 直径165mmの球体が接触する部分について、曲率半径が2.5mm以上であること", "D. 直径165mmの球体が接触する部分について、曲率半径が5.0mm以上であること"],answer:"C",exp:"別添21の4.1.2.により、手荷物積載用部品の表面は、自動車に取り付けた状態で直径165mmの球体が接触する部分について、その曲率半径が2.5mm以上であること（4.2.の要件を適用する場合を除く）。"},
  {no:7061,section:"保安基準別添",label:"別添22（外装の電波送受信用アンテナの技術基準）",q:"別添22「外装の電波送受信用アンテナの技術基準」における電波送受信用アンテナの表面の突起に関する記述として、次のうち正しいものはどれか。",choices:["A. 突起の曲率半径は1.5mm未満であってはならない。", "B. 突起の曲率半径が2.5mm未満であってはならないが、突出量が1.5mm未満の突起はこの限りでない。", "C. 硬さが80ショア(A)以下の材料からなる突起は曲率半径の制限を受けない。", "D. 突出量が5mm未満の突起はすべて曲率半径の制限を受けない。"],answer:"B",exp:"3.4の規定により、電波送受信用アンテナの表面の突起の曲率半径は2.5mm未満であってはならない。ただし、突出量が5mm未満の突起は外向きの端部に丸みがあればよく、突出量が1.5mm未満の突起はこの限りでない（3.4）。硬さの免除基準は60ショア(A)以下（3.5）であり、80ショア(A)ではない。"},
  {no:7062,section:"保安基準別添",label:"別添23（前面衝突時の乗員保護の技術基準）",q:"別添23「前面衝突時の乗員保護の技術基準」におけるHIC（頭部傷害指数）の算出に用いるt1およびt2の制限として、次のうち正しいものはどれか。",choices:["A. |t1 - t2| は50ms以下でなければならない。", "B. |t1 - t2| は36ms以下でなければならない。", "C. |t1 - t2| は20ms以下でなければならない。", "D. |t1 - t2| は15ms以下でなければならない。"],answer:"B",exp:"2.6の規定において、HICの計算に用いるt1及びt2は衝突中の任意の時間（単位s）であり、|t1－t2|≦36msとする、と定められている。"},
  {no:7063,section:"保安基準別添",label:"別添24（側面衝突時の乗員保護装置の技術基準）",q:"別添24「側面衝突時の乗員保護装置の技術基準」における胸部性能基準として、次のうち正しいものはどれか。",choices:["A. 胸部変位（RDC）は50mm以下、胸部傷害値（VC）は1.5m/秒以下であること。", "B. 胸部変位（RDC）は42mm以下、胸部傷害値（VC）は1.0m/秒以下であること。", "C. 胸部変位（RDC）は35mm以下、胸部傷害値（VC）は0.5m/秒以下であること。", "D. 胸部変位（RDC）は42mm以下、胸部傷害値（VC）は2.0m/秒以下であること。"],answer:"B",exp:"3.2.1.2の規定により、胸部性能基準は胸部変位（RDC）42mm以下、胸部傷害値（VC）1.0m/秒以下と定められている。また、腰部の恥骨荷重（PSPF）は6kN以下、腹部荷重（APF）は内力2.5kN以下である。"},
  {no:7064,section:"保安基準別添",label:"別添27（内装材料の難燃性の技術基準）",q:"別添27「内装材料の難燃性の技術基準」における試験片の寸法として、次のうち正しいものはどれか。",choices:["A. 長さ300mm、幅100mm、厚さ10mm", "B. 長さ350mm、幅100mm、厚さ12mm", "C. 長さ350mm、幅50mm、厚さ12mm", "D. 長さ300mm、幅50mm、厚さ10mm"],answer:"B",exp:"3.1.1の規定により、内装材料の試験片の寸法は長さ350mm、幅100mm、厚さ12mmとされている。ただし内装材料の大きさや形状により当該寸法の直方体を採取できない場合は採取できる最大寸のものを試験片とする。"},
  {no:7065,section:"保安基準別添",label:"別添27（内装材料の難燃性の技術基準）",q:"別添27「内装材料の難燃性の技術基準」における試験実施前の試験片の保管条件として、次のうち正しいものはどれか。",choices:["A. 温度25±5℃、相対湿度50±5％の環境に少なくとも12時間放置する。", "B. 温度20±5℃、相対湿度50±5％の環境に少なくとも24時間放置する。", "C. 温度20±5℃、相対湿度65±5％の環境に少なくとも24時間放置する。", "D. 温度15±5℃、相対湿度50±5％の環境に少なくとも12時間放置する。"],answer:"B",exp:"3.2.2の規定により、試験を実施する前に各試験片は20±5℃の温度および相対湿度50±5％に保たれた環境条件のもとで少なくとも24時間放置する。なお試験片の燃焼は20±5℃の温度および相対湿度65±20％の環境条件のもとで行う。"},
  {no:7066,section:"保安基準別添",label:"別添27（内装材料の難燃性の技術基準）",q:"別添27「内装材料の難燃性の技術基準」において、ガスバーナーに供給するガスとして原則使用されるものはどれか。",choices:["A. 総発熱量が30,000～35,000kJ/m3の都市ガス", "B. 総発熱量が35,000～38,000kJ/m3の天然ガス", "C. 総発熱量が40,000kJ/m3以上の液化天然ガス", "D. 総発熱量が25,000～30,000kJ/m3のプロパンガス"],answer:"B",exp:"3.2.6の規定により、ガスバーナーに供給されるガスは原則として総発熱量が35,000～38,000kJ/m3の天然ガスを用いる。ただし当該天然ガスと同等以上の総発熱量を有する液化石油ガス（LPガス）を用いてもよい。"},
  {no:7067,section:"保安基準別添",label:"別添28（インストルメントパネルの衝撃吸収の技術基準）",q:"別添28「インストルメントパネルの衝撃吸収の技術基準」における試験方法として、頭部模型を衝突させる速度は次のうちどれか。（標準的な場合）",choices:["A. 20±1km/h", "B. 24±1km/h", "C. 30±1km/h", "D. 56±1km/h"],answer:"B",exp:"3.4の規定により、頭部模型（直径165mmの球状または半球状剛体模型でその有効質量は6.8kg）を衝撃位置に速度24±1km/hで衝突させ、頭部模型に発生する減速度を測定する。ただし、エアバッグを装備したインストルメントパネルにあっては20±1km/hとすることができる。"},
  {no:7068,section:"保安基準別添",label:"別添28（インストルメントパネルの衝撃吸収の技術基準）",q:"別添28「インストルメントパネルの衝撃吸収の技術基準」における判定基準として、次のうち正しいものはどれか。",choices:["A. 頭部模型に発生する減速度は3ms以上連続して980m/s2を超えないこと。", "B. 頭部模型に発生する減速度は3ms以上連続して784m/s2を超えないこと。", "C. 頭部模型に発生する減速度は5ms以上連続して784m/s2を超えないこと。", "D. 頭部模型に発生する減速度は5ms以上連続して588m/s2を超えないこと。"],answer:"B",exp:"4.の規定により、試験を行ったとき、頭部模型に発生する減速度は3msec以上連続して784m/s2（約80G相当）を超えないことが判定基準とされている。"},
  {no:7069,section:"保安基準別添",label:"別添29（直接前方視界の技術基準）",q:"別添29「直接前方視界の技術基準」において、試験に用いる障害物の形状として正しいものはどれか。",choices:["A. 直径0.2m、高さ1mの円柱", "B. 直径0.3m、高さ1mの円柱", "C. 直径0.3m、高さ1.2mの円柱", "D. 直径0.5m、高さ1mの円柱"],answer:"B",exp:"2.4の規定により、直接前方視界の技術基準における「障害物」とは直径0.3m、高さ1mの円柱と定義されている。試験はこの障害物を基準アイポイントから直接確認できるかを確認する。"},
  {no:7070,section:"保安基準別添",label:"別添33（運転者席の座席ベルトの非装着時警報装置の技術基準）",q:"別添33「運転者席の座席ベルトの非装着時警報装置の技術基準」における初期警報の判定基準として、次のうち正しいものはどれか。",choices:["A. 座席ベルト非装着状態でイグニッションスイッチをONにした後、2秒以上警報音が鳴ること。", "B. 座席ベルト非装着状態でイグニッションスイッチをONにした後、表示による警報が作動すること（ただし座席ベルト装着状態でもON後8秒以下は警報可）。", "C. 座席ベルト非装着状態でイグニッションスイッチをONにした後、2秒以上の間、表示による警報が作動しかつ警報音が鳴ること。", "D. 走行開始後10秒以内に座席ベルト非装着を検知した場合に警報が作動すること。"],answer:"B",exp:"5.1.1の規定により、初期警報の判定基準の一つとして、座席ベルト非装着状態においてイグニッションスイッチを入れた状態にした後、表示による警報が作動すること（ただし座席ベルト装着状態でもON後8秒以下は警報可）が定められている。5.1.2では4秒以上の表示警報と警報音の両方、5.1.3では4秒以上8秒以下の警報音と60秒以上の表示警報も規定されている。"},
  {no:7071,section:"保安基準別添",label:"別添34（頭部後傾抑止装置の技術基準）",q:"別添34「頭部後傾抑止装置の技術基準」における高さの調節機構を有しない頭部後傾抑止装置の高さの要件として、次のうち正しいものはどれか。",choices:["A. 前部座席において700mm以上、その他の座席にあって650mm以上", "B. 前部座席において750mm以上、その他の座席にあって700mm以上", "C. 前部座席において800mm以上、その他の座席にあって750mm以上", "D. 前部座席において850mm以上、その他の座席にあって800mm以上"],answer:"C",exp:"3.4.2の規定により、高さの調節機構を有しない頭部後傾抑止装置の高さは、運転者席およびこれと並列の座席（前部座席）において800mm以上、その他の座席にあって750mm以上でなければならないと定められている。"},
  {no:7072,section:"保安基準別添",label:"別添38（近接排気騒音の測定方法）",q:"別添38「近接排気騒音の測定方法」において、マイクロホンの設置位置として正しいものはどれか。（標準的な場合）",choices:["A. 排気管開口部中心から0.3m離れた位置で、排気流方向と外側後方45度に交わる面上", "B. 排気管開口部中心から0.5m離れた位置で、排気流方向と外側後方45度に交わる面上", "C. 排気管開口部中心から1.0m離れた位置で、排気流方向と後方90度に交わる面上", "D. 排気管開口部中心から0.5m離れた位置で、排気流方向と後方90度に交わる面上"],answer:"B",exp:"3.2(1)の規定により、マイクロホンの位置は排気流の方向を含む鉛直面と外側後方45度に交わる排気管の開口部中心を含む鉛直面上で排気管の開口部中心から0.5m離れた位置とされている。また、開口部中心の高さ（地上高さ0.2m未満の場合は地上高さ0.2m）の±0.025mの位置とする。"},
  {no:7073,section:"保安基準別添",label:"別添38（近接排気騒音の測定方法）",q:"別添38「近接排気騒音の測定方法」における近接排気騒音の測定時の原動機回転速度として、次のうち正しいものはどれか。（一般的な自動車の場合）",choices:["A. 最高出力時の回転速度の50%", "B. 最高出力時の回転速度の60%", "C. 最高出力時の回転速度の75%", "D. 最高出力時の回転速度の80%"],answer:"C",exp:"5.2の規定により、近接排気騒音の測定時は原動機を最高出力時の回転速度の75%の回転速度で測定する。ただし、小型自動車および軽自動車（二輪・側車付二輪）ならびに一般原動機付自転車のうち最高出力時の回転速度が毎分5000回転を超えるものは50%とする。"},
  {no:7074,section:"保安基準別添",label:"別添39（定常走行騒音の測定方法）",q:"別添39「定常走行騒音の測定方法」において、マイクロホンの設置位置（地上高さ）として正しいものはどれか。",choices:["A. 1.0±0.05m", "B. 1.2±0.05m", "C. 1.5±0.05m", "D. 2.0±0.05m"],answer:"B",exp:"4.2(1)の規定により、定常走行騒音の測定におけるマイクロホンの設置位置は、走行方向に直角に車両中心線から左側へ水平距離7.5m（M1の位置は7m）離れた位置で、かつ地上高さが1.2±0.05mの位置とする。"},
  {no:7075,section:"保安基準別添",label:"別添39（定常走行騒音の測定方法）",q:"別添39「定常走行騒音の測定方法」における試験速度の基準として、次のうち正しいものはどれか。（一般的な自動車の場合）",choices:["A. 原動機の最高出力時の回転数の50%の回転数で走行した場合の速度（最高50km/h）±1.5km/h", "B. 原動機の最高出力時の回転数の60%の回転数で走行した場合の速度（最高50km/h）±1.5km/h", "C. 原動機の最高出力時の回転数の75%の回転数で走行した場合の速度（最高50km/h）±1.5km/h", "D. 原動機の最高出力時の回転数の60%の回転数で走行した場合の速度（最高60km/h）±2.0km/h"],answer:"B",exp:"6.1(2)イの規定により、定常走行騒音の試験速度は原動機の最高出力時の回転数の60%の回転数で走行した場合の速度（その速度が50km/hを超える自動車（軽自動車（二輪・側車付二輪を除く））にあっては50km/h）±1.5km/hと定められている。"},
  {no:7091,section:"保安基準別添",label:"別添40（加速走行騒音の測定方法）",q:"別添40に規定する加速走行騒音の測定において、試験自動車の重量に関する許容範囲として正しいものはどれか。",choices:["A. 車両総重量の±1%（車両総重量1000kg未満の場合は±10kg）以内", "B. 車両総重量の±2%（車両総重量1000kg未満の場合は±20kg）以内", "C. 車両総重量の±3%（車両総重量1000kg未満の場合は±30kg）以内", "D. 車両総重量の±5%（車両総重量1000kg未満の場合は±50kg）以内"],answer:"B",exp:"別添40 第2項(3)に、重量の許容範囲はその±2%（車両総重量が1000kg未満の場合は±20kg）以内と規定されている。"},
  {no:7092,section:"保安基準別添",label:"別添40（加速走行騒音の測定方法）",q:"別添40に規定する加速走行騒音の測定において、騒音測定を行う場所の暗騒音の大きさに関する規定として正しいものはどれか。",choices:["A. 原則として自動車騒音の大きさより5dB以上小さくなければならない", "B. 原則として自動車騒音の大きさより8dB以上小さくなければならない", "C. 原則として自動車騒音の大きさより10dB以上小さくなければならない", "D. 原則として自動車騒音の大きさより15dB以上小さくなければならない"],answer:"C",exp:"別添40 第5項(1)に、暗騒音の大きさは原則として自動車騒音の大きさより10dB以上小さくなければならないと規定されている。"},
  {no:7093,section:"保安基準別添",label:"別添40（加速走行騒音の測定方法）",q:"別添40に規定する加速走行騒音の測定において、マイクロホンの設置位置として正しいものはどれか。",choices:["A. 走行方向に直角に車両中心線から左側へ水平距離5m、地上高さ1.2±0.05m", "B. 走行方向に直角に車両中心線から左側へ水平距離7.5m、地上高さ1.2±0.05m", "C. 走行方向に直角に車両中心線から左側へ水平距離7.5m、地上高さ1.5±0.05m", "D. 走行方向に直角に車両中心線から左側へ水平距離10m、地上高さ1.2±0.05m"],answer:"B",exp:"別添40 第4.2項(1)に、マイクロホンは車両中心線から左側へ水平距離7.5m（±0.05m）、地上高さ1.2±0.05mの位置と規定されている。"},
  {no:7094,section:"保安基準別添",label:"別添42（軽・中量車排出ガスの測定方法）",q:"別添42（JC08モード法）の適用範囲において、対象となる自動車の車両総重量の条件として正しいものはどれか。",choices:["A. 車両総重量が3.0t以下のもの又は専ら乗用の用に供する乗車定員8人以下のもの", "B. 車両総重量が3.5t以下のもの又は専ら乗用の用に供する乗車定員9人以下のもの", "C. 車両総重量が4.0t以下のもの又は専ら乗用の用に供する乗車定員10人以下のもの", "D. 車両総重量が5.0t以下のもの又は専ら乗用の用に供する乗車定員11人以下のもの"],answer:"B",exp:"別添42 第1項に、車両総重量が3.5t以下のもの又は専ら乗用の用に供する乗車定員9人以下のものと規定されている。"},
  {no:7095,section:"保安基準別添",label:"別添42（軽・中量車排出ガスの測定方法）",q:"別添42に規定する測定装置の精度のうち、速度計の精度として正しいものはどれか。",choices:["A. ±0.1km/h以内", "B. ±0.3km/h以内", "C. ±0.5km/h以内", "D. ±1.0km/h以内"],answer:"C",exp:"別添42 第5.1.1項(4)に、速度計の精度は±0.5km/h以内と規定されている。"},
  {no:7096,section:"保安基準別添",label:"別添42（軽・中量車排出ガスの測定方法）",q:"別添42に規定するCVS装置（定容量採取装置）の精度として正しいものはどれか。",choices:["A. 測定流量の±1%以内", "B. 測定流量の±2%以内", "C. 測定流量の±3%以内", "D. 測定流量の±5%以内"],answer:"B",exp:"別添42 第5.1.1項(8)に、CVS装置の精度は測定流量の±2%以内と規定されている。"},
  {no:7097,section:"保安基準別添",label:"別添43（ディーゼル特殊自動車排出ガスの測定方法）",q:"別添43（ディーゼル特殊自動車排出ガスの測定方法）の適用対象となるエンジンの定格出力の範囲として正しいものはどれか。",choices:["A. 定格出力が10kW以上500kW未満のエンジン", "B. 定格出力が15kW以上500kW未満のエンジン", "C. 定格出力が19kW以上560kW未満のエンジン", "D. 定格出力が25kW以上600kW未満のエンジン"],answer:"C",exp:"別添43 第2項に、定格出力が19kW以上560kW未満のエンジンに適用されると規定されている。"},
  {no:7098,section:"保安基準別添",label:"別添43（ディーゼル特殊自動車排出ガスの測定方法）",q:"別添43においてディーゼル特殊自動車8モード法は、ディスクリート試験サイクル又はRMC試験サイクルのいずれかにより実施するとされているが、NRTCモード法と合わせてこの技術基準で測定する排出ガス成分のうち誤っているものはどれか。",choices:["A. 一酸化炭素（CO）と非メタン炭化水素（NMHC）", "B. 窒素酸化物（NOx）と二酸化炭素（CO2）", "C. 粒子状物質（PM）", "D. メタン（CH4）と亜酸化窒素（N2O）"],answer:"D",exp:"別添43 第1項に、測定対象はCO、NMHC、NOx、CO2、PMと規定されており、CH4やN2Oは含まれない。"},
  {no:7099,section:"保安基準別添",label:"別添43（ディーゼル特殊自動車排出ガスの測定方法）",q:"別添43における「遅れ時間」の定義として正しいものはどれか。",choices:["A. 測定装置を試験直前にゼロ及びスパン校正してから試験開始までの時間", "B. 基準点で測定される成分の変化と基準点として定義されるサンプリングプローブでの最終測定値の10%のシステム応答との間の時間差", "C. ガス分析計の校正ガス導入から安定した数値表示までの時間", "D. 排出ガスがサンプリングプローブからCVS装置に到達するまでの時間"],answer:"B",exp:"別添43 第3.1.10項に、遅れ時間とは基準点での成分変化とサンプリングプローブでの最終測定値の10%（t10）のシステム応答との間の時間差と定義されている。"},
  {no:7100,section:"保安基準別添",label:"別添44（二輪車排出ガスの測定方法）",q:"別添44（二輪車モード法）の適用範囲として正しいものはどれか。",choices:["A. ガソリンを燃料とする総排気量0.050l以下であって最高速度50km/h以下の車両", "B. ガソリンを燃料とする総排気量0.125l以下であって最高速度50km/h以下の車両", "C. ガソリン又はLPGを燃料とする総排気量0.050l以下の二輪自動車", "D. ガソリンを燃料とする総排気量0.050l以下であって最高速度60km/h以下の車両"],answer:"A",exp:"別添44 第1項に、ガソリンを燃料とする総排気量0.050l以下であって最高速度が50km/h以下の車両（原付自転車）に適用すると規定されている。"},
  {no:7101,section:"保安基準別添",label:"別添44（二輪車排出ガスの測定方法）",q:"別添44に規定する試験原付自転車の重量に関する記述として正しいものはどれか。",choices:["A. 空車状態の原付自転車のみの重量とする", "B. 空車状態の原付自転車に1人の人員が乗車した重量で、人員1人の重量は55kg又は75kgとする", "C. 空車状態の原付自転車に1人の人員が乗車した重量で、人員1人の重量は65kgとする", "D. 空車状態の原付自転車に1人の人員が乗車した重量で、人員1人の重量は75kgとする"],answer:"B",exp:"別添44 第2.2項に、試験原付自転車重量は空車状態の原付自転車に1人の人員が乗車した重量で、人員1人の重量は55kg又は75kgと規定されている。"},
  {no:7102,section:"保安基準別添",label:"別添44（二輪車排出ガスの測定方法）",q:"別添44に規定する測定装置の精度のうち、惰行時間の測定装置の精度として正しいものはどれか。",choices:["A. ±0.05秒以内", "B. ±0.1秒以内", "C. ±0.5秒以内", "D. ±1秒以内"],answer:"B",exp:"別添44 第4.1.1項(5)に、惰行時間の測定装置の精度は±0.1秒以内と規定されている。"},
  {no:7103,section:"保安基準別添",label:"別添46（無負荷急加速黒煙の測定方法）",q:"別添46（無負荷急加速黒煙の測定方法）の黒煙測定器の状態に関する記述として正しいものはどれか。",choices:["A. 黒煙測定器は使用開始前に暖機し、1週間に1回校正を行ったうえで使用する", "B. 黒煙測定器は使用開始前に暖機し、1日1回校正を行ったうえで使用する", "C. 黒煙測定器は校正不要で、プローブのパージのみ行えばよい", "D. 黒煙測定器は使用開始前に暖機し、測定ごとに校正を行ったうえで使用する"],answer:"B",exp:"別添46 第2項に、黒煙測定器は使用開始前に十分暖機し、1日1回校正を行ったうえで使用すると規定されている（2014.1.20削除）。"},
  {no:7104,section:"保安基準別添",label:"別添47（熱害警報装置等の技術基準）",q:"別添47に規定する試験室内の温度の下限値として正しいものはどれか。",choices:["A. 273K（0℃）以上", "B. 278K（5℃）以上", "C. 283K（10℃）以上", "D. 293K（20℃）以上"],answer:"C",exp:"別添47 第3項に、試験室内の温度は283K（10℃）以上と規定されている。"},
  {no:7105,section:"保安基準別添",label:"別添47（熱害警報装置等の技術基準）",q:"別添47に規定するシャシダイナモメータの等価慣性重量の設定において、車両総重量が938kg以上1125kg以下の場合の等価慣性重量の標準値として正しいものはどれか。",choices:["A. 875kg", "B. 1000kg", "C. 1250kg", "D. 1500kg"],answer:"B",exp:"別添47 第4.1項 表1に、車両総重量938〜1125kgに対する等価慣性重量の標準値は1000kgと規定されている。"},
  {no:7106,section:"保安基準別添",label:"別添48（車載式故障診断装置の技術基準）",q:"別添48において、J-OBD Iが適用されるのはどのような自動車か。正しいものはどれか。",choices:["A. ガソリン又はLPGを燃料とする普通自動車及び小型自動車（二輪自動車を除く）のうち車両総重量が3.5tを超えるもの（専ら乗用9人以下のものを除く）", "B. ガソリン、LPG又は軽油を燃料とする普通自動車及び小型自動車で車両総重量が3.5t以下のもの又は乗車定員9人以下のもの", "C. 軽油を燃料とする普通自動車及び小型自動車のうち車両総重量が3.5tを超えるもの（専ら乗用9人以下のものを除く）", "D. ガソリン、LPG又は軽油以外を燃料とする全ての自動車"],answer:"A",exp:"別添48 第Ⅰ章1項に、J-OBD Iはガソリン又はLPGを燃料とする普通自動車及び小型自動車（二輪除く）のうち車両総重量が3.5tを超えるもの（専ら乗用9人以下のものを除く）に適用されると規定されている。"},
  {no:7107,section:"保安基準別添",label:"別添48（車載式故障診断装置の技術基準）",q:"別添48に規定するJ-OBD Iの故障検知対象（ガソリン又はLPGを燃料とする自動車）のうち、次のうち含まれないものはどれか。",choices:["A. 大気圧センサ及び吸気圧力センサ", "B. 酸素センサ又は空燃比センサ及びそのヒータ回路", "C. 排気二次空気システム", "D. 触媒コンバータの劣化検知システム"],answer:"D",exp:"別添48 第Ⅱ章2.1.1項に規定するJ-OBD Iの故障検知対象には触媒コンバータの劣化検知は含まれず、大気圧センサ、酸素センサ等の電気回路の断線検知等が主な対象となっている。"},
  {no:7108,section:"保安基準別添",label:"別添48（車載式故障診断装置の技術基準）",q:"別添48において、軽油を燃料とする自動車のJ-OBD I対象部品として、次のうち誤っているものはどれか。",choices:["A. 燃料噴射タイミングセンサ及び燃料噴射量調節センサ", "B. 燃料温度センサ及び燃料圧力センサ", "C. 酸素センサ又は空燃比センサ及びそのヒータ回路", "D. 排気温度センサ（DPFで排気温度センサを採用する場合に限る）"],answer:"C",exp:"別添48 第Ⅱ章2.1.2項に規定する軽油燃料車の故障検知対象には酸素センサや空燃比センサは含まれない。これらはガソリン・LPG燃料車（2.1.1項）の対象である。"},
  {no:7109,section:"保安基準別添",label:"別添49（燃料蒸発ガスの測定方法）",q:"別添49（燃料蒸発ガスの測定方法）の適用範囲として正しいものはどれか。",choices:["A. ガソリン又はLPGを燃料とする全ての自動車からの蒸発ガス（HC）の測定", "B. ガソリンを燃料とする普通自動車、小型自動車（二輪除く）及び軽自動車（二輪除く）からのHCの測定", "C. ガソリンを燃料とする全ての自動車（二輪自動車を含む）からのHCの測定", "D. 軽油を燃料とする特殊自動車からの蒸発ガス（HC）の測定"],answer:"B",exp:"別添49 第1項に、ガソリンを燃料とする普通自動車、小型自動車（二輪除く）及び軽自動車（二輪除く）から蒸発ガスとして排出されるHCの測定に適用すると規定されている。"},
  {no:7110,section:"保安基準別添",label:"別添52（灯火器及び反射器並びに指示装置の取付装置の技術基準）",q:"別添52の「非積載状態」の定義として正しいものはどれか。",choices:["A. 乗車人員及び積載物品を乗車又は積載しない状態（燃料含まず）", "B. 乗車人員及び積載物品を乗車又は積載せず、燃料・冷却水・潤滑油の全量を搭載し、工具・付属品を全て装備した状態", "C. 空車状態の自動車に運転者1名（55kg）が乗車した状態", "D. 空車状態の自動車に運転者1名（75kg）が乗車した状態"],answer:"B",exp:"別添52 第2.2項に、「非積載状態」は乗車人員・積載物品を乗車・積載せず、燃料・冷却水・潤滑油の全量を搭載し、工具及び付属品（スペアタイヤ含む）を全て装備した状態と定義されている。"},
  {no:7111,section:"保安基準別添",label:"別添52（灯火器及び反射器並びに指示装置の取付装置の技術基準）",q:"別添52において、「交換式光源」の定義として正しいものはどれか。",choices:["A. 工具を使用しなければ光源ホルダーに脱着できない光源", "B. 工具を使用せずに光源ホルダーに脱着できるように設計された光源", "C. 固定された装置とともにしか交換できない光源", "D. 固定された光源モジュールとともにしか交換できない光源"],answer:"B",exp:"別添52 第2.5.1.1.1項に、「交換式光源」とは工具を使用せずに光源ホルダーに脱着できるように設計された光源と定義されている。"},
  {no:7112,section:"保安基準別添",label:"別添52（灯火器及び反射器並びに指示装置の取付装置の技術基準）",q:"別添52において、「放電灯光源」の定義として正しいものはどれか。",choices:["A. 1本以上の白熱フィラメントの熱放射によって可視光を放射する光源", "B. アーク放電によるエレクトロルミネッセンス又はけい光によって可視光を放射する光源", "C. 1個以上の半導体の接合による注入型発光又はけい光によって可視光を放射する光源", "D. LEDのみを光源とする光源モジュール"],answer:"B",exp:"別添52 第2.5.1.1.5項に、「放電灯光源」はアーク放電によるエレクトロルミネッセンス又はけい光によって可視光を放射する光源と定義されている。"},
  {no:7113,section:"保安基準別添",label:"別添53（二輪自動車等の灯火器及び反射器並びに指示装置の取付装置の技術基準）",q:"別添53において、走行用前照灯の照明部の個数の取扱いに関して、基準軸に直角の方向に測定した2つの隣接する投影間の最短距離が何mm以下の場合に1個とみなすことができるか。",choices:["A. 50mm以下", "B. 60mm以下", "C. 75mm以下", "D. 100mm以下"],answer:"C",exp:"別添53 第2.1.3.1項に、基準軸に直角の方向に測定した2つの隣接する投影間の最短距離が75mm以下のものは1個とみなすことができると規定されている。"},
  {no:7114,section:"保安基準別添",label:"別添53（二輪自動車等の灯火器及び反射器並びに指示装置の取付装置の技術基準）",q:"別添53において、「前部霧灯の照明部」の取扱いとして正しいものはどれか。",choices:["A. 灯室（反射板等により区切られた光源を納めた部分）の数として取り扱う", "B. 照明部の数として取り扱い、有効反射面の開口部をレンズ面上へ投影した部分が明らかな場合はその部分とする", "C. レンズ外形の全体として取り扱う", "D. 基準中心を起点として測定した外径面として取り扱う"],answer:"B",exp:"別添53 第2.1.1.1項に、前部霧灯の照明部はレンズ部分として取り扱い、有効反射面の開口部をレンズ面上へ投影した部分が明らかとなる書面等の提出がある場合には当該部分とすると規定されている。"},
  {no:7115,section:"保安基準別添",label:"別添55（前照灯洗浄器の技術基準）",q:"別添55に規定する前照灯洗浄器の作動温度範囲として正しいものはどれか。",choices:["A. −5℃から35℃までのすべての温度", "B. −10℃から35℃までのすべての温度", "C. −15℃から40℃までのすべての温度", "D. −20℃から50℃までのすべての温度"],answer:"B",exp:"別添55 第3.2.3項に、前照灯洗浄器は−10℃から35℃までのすべての温度において作動可能であることと規定されている。"},
  {no:7116,section:"保安基準別添",label:"別添55（前照灯洗浄器の技術基準）",q:"別添55に規定する前照灯洗浄器の耐放置温度試験に関する規定として正しいものはどれか。",choices:["A. −25℃の温度に1時間及び+70℃の温度に1時間放置しても損傷がないこと", "B. −35℃の温度に1時間及び+80℃の温度に1時間放置しても損傷がないこと", "C. −40℃の温度に2時間及び+85℃の温度に2時間放置しても損傷がないこと", "D. −30℃の温度に1時間及び+90℃の温度に1時間放置しても損傷がないこと"],answer:"B",exp:"別添55 第3.2.3項に、前照灯洗浄器は−35℃の温度に1時間及び+80℃の温度に1時間放置しても損傷がないことと規定されている。"},
  {no:7117,section:"保安基準別添",label:"別添55（前照灯洗浄器の技術基準）",q:"別添55に規定する前照灯洗浄器が作動中において、すれ違い用前照灯の照明部を覆う面積の上限として正しいものはどれか。",choices:["A. 当該照明部の表面積の10%を超えないこと", "B. 当該照明部の表面積の20%を超えないこと", "C. 当該照明部の表面積の30%を超えないこと", "D. 当該照明部の表面積の50%を超えないこと"],answer:"B",exp:"別添55 第3.2.2.1項に、作動中のすれ違い用前照灯の照明部を当該照明部の表面積の20%を超えて覆わないことと規定されている。"},
  {no:7118,section:"保安基準別添",label:"別添56（前照灯洗浄器及び前照灯洗浄器取付装置の技術基準）",q:"別添56に規定する洗浄液容器の容量に関して、容量等級50の前照灯洗浄器の場合に必要な洗浄回数として正しいものはどれか。",choices:["A. 少なくとも25回の洗浄に十分な容量", "B. 少なくとも50回の洗浄に十分な容量", "C. 少なくとも100回の洗浄に十分な容量", "D. 少なくとも150回の洗浄に十分な容量"],answer:"B",exp:"別添56 第3.2.2.1項に、容量等級50の前照灯洗浄器は少なくとも50回の洗浄に十分な容量を有することと規定されている。"},
  {no:7119,section:"保安基準別添",label:"別添58（車幅灯の技術基準）",q:"別添58において、カタピラ及びそりを有する軽自動車に備える車幅灯の灯光の確認距離として正しいものはどれか。",choices:["A. 夜間にその前方100mの距離から点灯を確認できること", "B. 夜間にその前方200mの距離から点灯を確認できること", "C. 夜間にその前方300mの距離から点灯を確認できること", "D. 夜間にその前方500mの距離から点灯を確認できること"],answer:"C",exp:"別添58 第3.4.1項に、カタピラ及びそりを有する軽自動車に備える車幅灯は夜間にその前方300mの距離から点灯を確認できるものであると規定されている。"},
  {no:7120,section:"保安基準別添",label:"別添58（車幅灯の技術基準）",q:"別添58において、「照明部」の定義として正しいものはどれか。",choices:["A. 灯火器の外形全体のレンズ部分", "B. 基準軸に直角な鉛直面において直射光が図面上入射するレンズの部分又は基準軸方向の光度に対して98%の光度となるレンズの部分", "C. 基準軸方向の光度に対して50%の光度となるレンズの部分", "D. 灯火器のレンズ面積のうち有効発光面積"],answer:"B",exp:"別添58 第2.5項に、「照明部」は基準軸に直角な鉛直面において直射光が図面上入射するレンズの部分又は基準軸方向の光度に対して98%の光度となるレンズの部分と定義されている。"},
  {no:7121,section:"保安基準別添",label:"別添58（車幅灯の技術基準）",q:"別添58において、側方灯により車幅灯の配光角度を補完する場合の車幅灯の見かけの照明部の表面積の最小値として正しいものはどれか。",choices:["A. 8cm2以上", "B. 10cm2以上", "C. 12.5cm2以上", "D. 15cm2以上"],answer:"C",exp:"別添58 第3.6項に、保安基準第34条第3項の規定に基づき側方灯により車幅灯の配光角度を補完するときは、当該車幅灯の見かけの照明部の表面積は12.5cm2以上でなければならないと規定されている。"},
  {no:7122,section:"保安基準別添",label:"別添59（前部上側端灯の技術基準）",q:"別添59において、「前部上側端灯」の定義として正しいものはどれか。",choices:["A. 車両後面の最上部にできる限り近く装着され、車両の全幅を明確に示すために備えられたもの", "B. 車両前面の最上部にできる限り近く、かつ最外端近くに装着され、車両の全幅を明確に示すために備えられたもの", "C. 車両側面の最外端に装着され、車両の全長を明確に示すために備えられたもの", "D. 車両前面の最下部に装着され、車両の全幅を明確に示すために備えられたもの"],answer:"B",exp:"別添59 第2.1項に、「前部上側端灯」は車両前面の最上部にできる限り近く、かつ最外端近くに装着され、車両の全幅を明確に示すために備えられたものと定義されている。"},
  {no:7123,section:"保安基準別添",label:"別添59（前部上側端灯の技術基準）",q:"別添59において、二輪自動車等に備える前部上側端灯の灯光の色として正しいものはどれか。",choices:["A. 橙色のみ", "B. 白色又は橙色", "C. 白色のみ", "D. 黄色又は白色"],answer:"C",exp:"別添59 第3.3.2項に、二輪自動車等に備える前部上側端灯の灯光の色は白色であることと規定されている。"},
  {no:7124,section:"保安基準別添",label:"別添60（前部反射器の技術基準）",q:"別添60において、前部反射器の配光特性による等級分類として正しいものはどれか。",choices:["A. 等級Ⅰ及び等級Ⅱに分類する", "B. 等級ⅠA及び等級ⅠBに分類する", "C. 等級Ⅰ、等級Ⅱ及び等級Ⅲに分類する", "D. 等級A、等級B及び等級Cに分類する"],answer:"B",exp:"別添60 第2.14項に、反射器はその配光特性にしたがって等級ⅠA及び等級ⅠBに分類すると規定されている（2020.9.25削除）。"},
  {no:7125,section:"保安基準別添",label:"別添60（前部反射器の技術基準）",q:"別添60において、「光度係数」の定義として正しいものはどれか。",choices:["A. 反射光の光度を照射面積で除した値", "B. 反射光の光度を反射器の照度で除した値", "C. 入射光の照度を反射面積で除した値", "D. 反射光の輝度を入射光の照度で除した値"],answer:"B",exp:"別添60 第2.12項に、「光度係数」とは反射光の光度を反射器の照度で除した値と定義されている（2020.9.25削除）。"},
  {no:7151,section:"保安基準別添",label:"別添61（側方灯の技術基準）",q:"別添61「側方灯の技術基準」において、側方灯の種類SM1の基準軸上における最小光度として正しいものはどれか。",choices:["A. 0.6cd", "B. 2.0cd", "C. 4.0cd", "D. 10.0cd"],answer:"C",exp:"別添61の4.1.1.により、SM1の基準軸上の最小光度は4.0cdと規定されている。SM2は基準軸上でも0.6cdでよいが、SM1は4.0cd以上が必要。"},
  {no:7152,section:"保安基準別添",label:"別添61（側方灯の技術基準）",q:"別添61「側方灯の技術基準」において、二輪自動車等に備える側方灯の灯光の色に関する記述として正しいものはどれか。",choices:["A. 灯光の色は橙色でなければならず、いかなる場合も赤色であってはならない", "B. 灯光の色は橙色であるが、後部に備える側方灯で尾灯等と一体のものは赤色でもよい", "C. 灯光の色は白色でなければならない", "D. 灯光の色は橙色または白色のいずれかでなければならない"],answer:"B",exp:"別添61の3.3.2.により、側方灯の灯光の色は橙色であること。ただし後部に備える側方灯であって尾灯、後部上側端灯、後部霧灯、制動灯または後部反射器と構造上一体または兼用のものは赤色でもよい。"},
  {no:7153,section:"保安基準別添",label:"別添61（側方灯の技術基準）",q:"別添61「側方灯の技術基準」において、側方灯（SM1およびSM2共通）の最大光度として正しいものはどれか。",choices:["A. 10.0cd", "B. 15.0cd", "C. 25.0cd", "D. 40.0cd"],answer:"C",exp:"別添61の4.1.2.により、SM1およびSM2ともに所定の配光表内での最大光度は25.0cdと規定されている。"},
  {no:7154,section:"保安基準別添",label:"別添62（側方反射器の技術基準）",q:"別添62「側方反射器の技術基準」（2020年9月25日削除）において、等級IB反射器の特徴として正しいものはどれか。",choices:["A. 防水性能を有し、単独の反射装置として使用するもの", "B. 防水性能はなく、車体と一体化した他の灯火と結合した装置", "C. 全反射光学ユニットが交換可能な構造のもの", "D. 三角形の形状をもち被牽引自動車専用のもの"],answer:"B",exp:"別添62の2.15.により、等級IBの反射器は別紙6の1.1.の規定に適合する防水性能はなく、かつ車両の車体と一体化した他の灯火と結合した装置である。"},
  {no:7155,section:"保安基準別添",label:"別添63（番号灯の技術基準）",q:"別添63「番号灯の技術基準」において、番号灯の判定基準に関する記述として正しいものはどれか。",choices:["A. 各測定点の照度は5ルクス以上であること", "B. 各測定点の照度は15ルクス以上であること", "C. 均斉度は30以下であること", "D. 入射板光と試験板のなす角は5度以上であること"],answer:"B",exp:"別添63の3.1.により各測定点の照度は15ルクス以上、3.2.により均斉度は20以下、3.3.により入射板光と試験板のなす角は8度以上と規定されている。"},
  {no:7156,section:"保安基準別添",label:"別添64（尾灯の技術基準）",q:"別添64「尾灯の技術基準」において、尾灯（種類R又はR1・固定光度）の基準軸における最小光度として正しいものはどれか。",choices:["A. 1cd", "B. 2cd", "C. 4cd", "D. 8cd"],answer:"C",exp:"別添64の4.1.の表により、種類R又はR1（固定光度）の尾灯の最小光度は4cdと規定されている。"},
  {no:7157,section:"保安基準別添",label:"別添64（尾灯の技術基準）",q:"別添64「尾灯の技術基準」において、制動灯と兼用の尾灯に関する記述として正しいものはどれか。",choices:["A. 制動灯と兼用の尾灯は認められない", "B. 制動灯と兼用の尾灯は複式光源配列の一部をなすもの、または当該機能の失陥監視装置を備える自動車に備えるものでなければならない", "C. 制動灯と兼用の尾灯は単純に共通の光源を使用すればよい", "D. 制動灯と兼用の尾灯は必ず光度調整装置を備えなければならない"],answer:"B",exp:"別添64の3.3.1.により、制動灯と兼用式の尾灯は、複式光源配列の一部をなすものまたは当該機能の失陥監視装置を備える自動車に備えるもののいずれかに該当しなければならない。"},
  {no:7158,section:"保安基準別添",label:"別添65（後部霧灯の技術基準）",q:"別添65「後部霧灯の技術基準」（2020年5月29日削除）において、後部霧灯（種類F又はF1・固定光度）の最大光度として正しいものはどれか。",choices:["A. 150cd", "B. 200cd", "C. 300cd", "D. 600cd"],answer:"C",exp:"別添65の4.3.の表により、後部霧灯の種類F又はF1（固定光度）の最大光度は300cdと規定されている。"},
  {no:7159,section:"保安基準別添",label:"別添66（駐車灯の技術基準）",q:"別添66「駐車灯の技術基準」において、前方駐車灯の基準軸における光度の最小値と最大値の組み合わせとして正しいものはどれか。",choices:["A. 最小1cd、最大30cd", "B. 最小2cd、最大60cd", "C. 最小2cd、最大30cd", "D. 最小4cd、最大60cd"],answer:"B",exp:"別添66の4.1.1.により、前方駐車灯の光度は最小2cd、最大60cdと規定されている。後方駐車灯は最小2cd、最大30cdである。"},
  {no:7160,section:"保安基準別添",label:"別添66（駐車灯の技術基準）",q:"別添66「駐車灯の技術基準」において、二輪自動車等に備える後面駐車灯の灯光の色として正しいものはどれか。",choices:["A. 白色", "B. 橙色", "C. 赤色", "D. 青色"],answer:"C",exp:"別添66の3.3.2.により、後面に備える駐車灯の灯光の色は赤色と規定されている。前面は白色、両側面は進行方向が白色で後退方向が赤色（側方灯等と兼用の場合は橙色でもよい）。"},
  {no:7161,section:"保安基準別添",label:"別添67（後部上側端灯の技術基準）",q:"別添67「後部上側端灯の技術基準」において、後部上側端灯（種類RM1・固定光度）の基準軸における最大光度として正しいものはどれか。",choices:["A. 8.5cd", "B. 17cd", "C. 25cd", "D. 42cd"],answer:"B",exp:"別添67の4.1.の表により、種類RM1（固定光度）の単一の後部上側端灯の最大光度は17cdと規定されている。最小光度は4cdである。"},
  {no:7162,section:"保安基準別添",label:"別添68（後部反射器の技術基準）",q:"別添68「後部反射器の技術基準」（2020年9月25日削除）において、等級IIIAおよびIIIBの後部反射器（被牽引自動車用）の反射部の形状として正しいものはどれか。",choices:["A. 正方形", "B. 円形", "C. 正三角形", "D. 六角形"],answer:"C",exp:"別添68の別紙3のII.1.により、等級IIIAおよびIIIBの後部反射器の反射部の形状は正三角形と規定されている。一つの角にTOPという文字が表示されている場合は当該角の頂点を上方に設置すること。"},
  {no:7163,section:"保安基準別添",label:"別添70（制動灯の技術基準）",q:"別添70「制動灯の技術基準」において、制動灯（種類S1・固定光度）の基準軸における最小光度として正しいものはどれか。",choices:["A. 25cd", "B. 40cd", "C. 60cd", "D. 100cd"],answer:"C",exp:"別添70の4.1.の表により、種類S1（固定光度）の制動灯の最小光度は60cdと規定されている。最大光度は260cdである。"},
  {no:7164,section:"保安基準別添",label:"別添70（制動灯の技術基準）",q:"別添70「制動灯の技術基準」において、尾灯と兼用の制動灯の光度比に関する規定として正しいものはどれか。",choices:["A. 制動灯と尾灯を同時点灯したときの光度比は3:1以上", "B. 制動灯と尾灯を同時点灯したときの光度比は5:1以上", "C. 制動灯と尾灯を同時点灯したときの光度比は8:1以上", "D. 制動灯と尾灯を同時点灯したときの光度比は10:1以上"],answer:"B",exp:"別添70の4.2.(3)により、尾灯又は後部上側端灯と兼用の制動灯は、同時に点灯したときの実測光度と尾灯のみまたは後部上側端灯のみ点灯したときの実測光度の比率が5:1以上でなければならない。"},
  {no:7165,section:"保安基準別添",label:"別添71（補助制動灯の技術基準）",q:"別添71「補助制動灯の技術基準」において、補助制動灯（種類S3・固定光度）の基準軸における最小光度と最大光度の組み合わせとして正しいものはどれか。",choices:["A. 最小10cd、最大80cd", "B. 最小25cd、最大110cd", "C. 最小40cd、最大130cd", "D. 最小60cd、最大260cd"],answer:"B",exp:"別添71の4.1.の表により、種類S3（固定光度）の単一の補助制動灯の最小光度は25cd、最大光度は110cdと規定されている。"},
  {no:7166,section:"保安基準別添",label:"別添72（後退灯の技術基準）",q:"別添72「後退灯の技術基準」において、後退灯の基準軸における最小光度として正しいものはどれか。",choices:["A. 25cd", "B. 50cd", "C. 80cd", "D. 120cd"],answer:"C",exp:"別添72の4.2.により、後退灯の基準軸の光度は80cd以上でなければならない。また灯光の色は白色でなければならない。"},
  {no:7167,section:"保安基準別添",label:"別添73（方向指示器の技術基準）",q:"別添73「方向指示器の技術基準」が適用される自動車として正しいものはどれか。",choices:["A. すべての普通自動車の方向指示器", "B. 車両総重量8t以上または最大積載量5t以上の普通自動車（一定の除外車両を除く）の両側面中央部の方向指示器", "C. 乗車定員11人以上の自動車のすべての方向指示器", "D. セミトレーラを牽引する牽引自動車の方向指示器"],answer:"B",exp:"別添73の1.により、本技術基準は車両総重量8t以上または最大積載量5t以上の普通自動車（セミトレーラを牽引する牽引自動車、乗車定員11人以上の自動車等を除く。以下「大型貨物自動車等」という。）の両側面の中央部に備える方向指示器に適用する。"},
  {no:7168,section:"保安基準別添",label:"別添74（警音器の警報音発生装置の技術基準）",q:"別添74「警音器の警報音発生装置の技術基準」において、二輪自動車（動力7kW超）用以外の警報音発生装置のA特性による加重音圧レベルの上限値として正しいものはどれか。",choices:["A. 100dB(A)", "B. 112dB(A)", "C. 115dB(A)", "D. 118dB(A)"],answer:"D",exp:"別添74の3.2.7.(b)により、二輪自動車（動力7kW以下）用以外の自動車に使用する警報音発生装置のA特性による加重音圧レベルは118dB(A)を超えないこととされている。動力7kW以下の二輪自動車用は115dB(A)。"},
  {no:7169,section:"保安基準別添",label:"別添75（警音器の技術基準）",q:"別添75「警音器の技術基準」において、二輪自動車（動力7kW超）以外の自動車の警音器の最大音圧レベルの規定として正しいものはどれか。",choices:["A. 83dB(A)以上112dB(A)以下", "B. 87dB(A)以上112dB(A)以下", "C. 87dB(A)以上118dB(A)以下", "D. 95dB(A)以上115dB(A)以下"],answer:"B",exp:"別添75の2.8.(b)により、二輪自動車（動力7kW以下）以外の自動車の警音器の最大音圧レベルは87dB(A)以上112dB(A)以下と規定されている。動力7kW以下の二輪自動車用は83dB(A)以上112dB(A)以下。"},
  {no:7221,section:"保安基準別添",label:"別添81（直前直左確認鏡の技術基準）",q:"別添81「直前直左確認鏡の技術基準」において、「キャブオーバ型大型貨物自動車等」に関する説明として正しいものはどれか。",choices:["A. 車両総重量が5t以上又は最大積載量が3t以上の普通自動車であって原動機の相当部分が運転者室の下にあるもの", "B. 車両総重量が8t以上又は最大積載量が5t以上の普通自動車であって原動機の相当部分が運転者室又は客室の下にあるもの（乗車定員11人以上の自動車等を除く）", "C. 車両総重量が8t以上又は最大積載量が5t以上の普通自動車であって原動機が運転者室の前方にあるもの", "D. 車両総重量が10t以上の普通自動車であって原動機の相当部分が運転者室又は客室の下にあるもの"],answer:"B",exp:"別添81第2.6項の定義。キャブオーバ型大型貨物自動車等とは、車両総重量8t以上又は最大積載量5t以上の普通自動車であって原動機の相当部分が運転者室又は客室の下にあるもの（乗車定員11人以上の自動車等を除く）をいう。ワンサイドキャブ型やトラッククレーン等は含まれない。"},
  {no:7222,section:"保安基準別添",label:"別添81（直前直左確認鏡の技術基準）",q:"別添81「直前直左確認鏡の技術基準」において、車外に取り付けた鏡その他の装置の突出量に関して正しいものはどれか。",choices:["A. 自動車の最外側から150mm以上突出しないものでなければならない", "B. 自動車の最外側から200mm以上突出しないものでなければならない", "C. 自動車の最外側から250mm以上突出しないものでなければならない", "D. 自動車の最外側から300mm以上突出しないものでなければならない"],answer:"C",exp:"別添81第3.3項。車外に取り付けた鏡その他の装置は、自動車の最外側から250mm（被牽引自動車を牽引する場合は被牽引自動車の最外側から250mm）以上突出しないものでなければならない。"},
  {no:7223,section:"保安基準別添",label:"別添81（直前直左確認鏡の技術基準）",q:"別添81「直前直左確認鏡の技術基準」において、障害物の定義として正しいものはどれか。",choices:["A. 直径0.2m、高さ0.8mの円柱", "B. 直径0.3m、高さ1mの円柱", "C. 直径0.5m、高さ1.2mの円柱", "D. 直径0.3m、高さ1.5mの円柱"],answer:"B",exp:"別添81第2.4項の定義。「障害物」とは、直径0.3m、高さ1mの円柱をいう。"},
  {no:7224,section:"保安基準別添",label:"別添82（二輪自動車等の後写鏡の技術基準）",q:"別添82「二輪自動車等の後写鏡の技術基準」の適用範囲として正しいものはどれか。",choices:["A. すべての二輪自動車に備える後写鏡に適用する", "B. ハンドルバー方式のかじ取り装置を備える二輪自動車、側車付二輪自動車及び三輪自動車であって車室を有しないものに備える後写鏡に適用する", "C. 最高速度50km/hを超えるすべての二輪自動車に備える後写鏡に適用する", "D. 車室を有する二輪自動車に備える後写鏡のみに適用する"],answer:"B",exp:"別添82第1項（適用範囲）。本技術基準は、ハンドルバー方式のかじ取り装置を備える二輪自動車、側車付二輪自動車及び三輪自動車であって車室を有しないものに備える後写鏡に適用する。また、協定規則第81号と調和している。"},
  {no:7225,section:"保安基準別添",label:"別添82（二輪自動車等の後写鏡の技術基準）",q:"別添82において「反射面上の一点における曲率半径（rp）」の計算式として正しいものはどれか。",choices:["A. rp = ri × r'i（主曲率半径の積）", "B. rp = (ri + r'i) / 2（主曲率半径の算術平均）", "C. rp = (ri - r'i) / 2（主曲率半径の差の半値）", "D. rp = ri / r'i（主曲率半径の比）"],answer:"B",exp:"別添82第2.4項。反射面上の一点における曲率半径（rp）は、主曲率半径riとr'iの算術平均値であり、rp = (ri + r'i) / 2 で表される。"},
  {no:7226,section:"保安基準別添",label:"別添83（二輪自動車等の後写鏡及び後写鏡取付装置の技術基準）",q:"別添83「二輪自動車等の後写鏡及び後写鏡取付装置の技術基準」において、後写鏡の取り付け数に関する規定として正しいものはどれか。",choices:["A. 最高速度に関わらず、すべての二輪自動車は左右両側に1個ずつ後写鏡を備えなければならない", "B. 最高速度が50km/hを超える二輪自動車、側車付二輪自動車及び三輪自動車は、左右両側にそれぞれ1個ずつ後写鏡を備えなければならない", "C. 最高速度が30km/hを超えるすべての二輪自動車は、左側に1個のみ後写鏡を備えれば足りる", "D. 最高速度が80km/hを超える二輪自動車のみ左右に後写鏡を備える義務がある"],answer:"B",exp:"別添83第3.2.1項。最高速度が50km/hを超える二輪自動車、側車付二輪自動車及び三輪自動車は、自動車の左右両側にそれぞれ1個ずつ後写鏡を備えなければならない。"},
  {no:7227,section:"保安基準別添",label:"別添83（二輪自動車等の後写鏡及び後写鏡取付装置の技術基準）",q:"別添83において「後写鏡及び後写鏡取付装置」が適合すべき要件として正しいものはどれか。",choices:["A. 取り付けられた後写鏡は、別添81の規定に適合し、かつ堅ろうに取り付けられていること", "B. 取り付けられた後写鏡は、別添82の規定に適合し、かつ堅ろうに取り付けられていること", "C. 取り付けられた後写鏡は、別添84の規定に適合し、かつ確実に固定されていること", "D. 取り付けられた後写鏡は、別添80の規定に適合し、かつ容易に調整できること"],answer:"B",exp:"別添83第3.1.1項及び3.1.2項。自動車に取り付けられた後写鏡は別添82「二輪自動車等の後写鏡の技術基準」の規定に適合するものであること、かつ後写鏡は堅ろうに取り付けられていることが要件となっている。"},
  {no:7228,section:"保安基準別添",label:"別添84（乗用車等の窓ふき器及び洗浄液噴射装置の技術基準）",q:"別添84「乗用車等の窓ふき器及び洗浄液噴射装置の技術基準」の適用範囲として正しいものはどれか。",choices:["A. すべての乗用自動車の前面ガラスの窓ふき器及び洗浄液噴射装置に適用する", "B. 専ら乗用の用に供する普通自動車又は小型自動車若しくは軽自動車（乗車定員11人以上の自動車、二輪自動車等を除く）に適用する", "C. 乗車定員11人以上の乗用自動車の窓ふき器のみに適用する", "D. 大型バスを含むすべての乗用自動車の窓ふき器に適用する"],answer:"B",exp:"別添84第1項（適用範囲）。専ら乗用の用に供する普通自動車又は小型自動車若しくは軽自動車（乗車定員11人以上の自動車、二輪自動車、側車付二輪自動車、カタピラ及びそりを有する軽自動車、最高速度20km/h未満の自動車及び被牽引自動車を除く）の前面ガラスの窓ふき器及び洗浄液噴射装置に適用する。"},
  {no:7229,section:"保安基準別添",label:"別添84（乗用車等の窓ふき器及び洗浄液噴射装置の技術基準）",q:"別添84において電気式（12V式）の洗浄液噴射装置の試験電圧として正しいものはどれか。",choices:["A. 10V〜12V", "B. 11V〜13V", "C. 12V〜14V", "D. 14V〜16V"],answer:"C",exp:"別添84の表1（試験電圧又はポンプ作動力）。電気式（12V式）の洗浄液噴射装置の試験電圧は12〜14Vである。電気式（24V式）は24〜28V、手動式は110〜135N、足動式は440〜445Nとされている。"},
  {no:7230,section:"保安基準別添",label:"別添84（乗用車等の窓ふき器及び洗浄液噴射装置の技術基準）",q:"別添84において「サイクル」の定義として正しいものはどれか。",choices:["A. 窓ふき器の1回の往動作をいう", "B. 窓ふき器の往復動作をいう", "C. 窓ふき器の1回の復動作をいう", "D. 窓ふき器の1分間の動作回数をいう"],answer:"B",exp:"別添84第2.1項。「サイクル」とは、窓ふき器の往復動作をいう。"},
  {no:7231,section:"保安基準別添",label:"別添85（バス及びトラックの洗浄液噴射装置の技術基準）",q:"別添85「バス及びトラックの洗浄液噴射装置の技術基準」において、足動式ポンプの試験作動力として正しいものはどれか。",choices:["A. 110〜135N", "B. 220〜250N", "C. 350〜400N", "D. 440〜445N"],answer:"D",exp:"別添85の表1（試験電圧又はポンプの作動力）。足動式の試験作動力は440〜445Nである。手動式は110〜135N、電気式（12V式）は12〜14V、電気式（24V式）は24〜28Vである。"},
  {no:7232,section:"保安基準別添",label:"別添85（バス及びトラックの洗浄液噴射装置の技術基準）",q:"別添85において「耐拘束性を有すること」の試験条件として、1分間に何回の操作を行うか。正しいものはどれか。",choices:["A. 1分間に3回（1回当たり少なくとも3秒間作動）", "B. 1分間に6回（1回当たり少なくとも3秒間作動）", "C. 1分間に10回（1回当たり少なくとも1秒間作動）", "D. 1分間に4回（1回当たり少なくとも5秒間作動）"],answer:"B",exp:"別添85第2.3項。「耐拘束性を有すること」の確認は、全ノズルをふさぎ、規定の試験電圧又はポンプ作動力で洗浄液噴射装置を1分間に6回（1回当たり少なくとも3秒間作動させる）操作する試験による。"},
  {no:7233,section:"保安基準別添",label:"別添86（デフロスタの技術基準）",q:"別添86「デフロスタの技術基準」において「デフロスト」の定義として正しいものはどれか。",choices:["A. ガラス外表面のミストをデフロスタにより除去することをいう", "B. 前面視界確保のためガラス外表面の霜又は氷をデフロスタにより除去し、若しくは窓ふき器が除去できる程度に溶解すること、または窓ふき器により除去することをいう", "C. ガラス内表面の曇りをデフロスタにより除去することのみをいう", "D. 前面ガラスの内表面の水滴を除去する装置の作動をいう"],answer:"B",exp:"別添86第2.1項。「デフロスト」とは、前面視界確保のためガラス外表面を覆っている霜若しくは氷をデフロスタにより除去し、若しくは前面ガラス用窓ふき器が除去することができる程度に溶解すること、又は当該霜若しくは氷を前面ガラス用窓ふき器により除去することをいう。"},
  {no:7234,section:"保安基準別添",label:"別添86（デフロスタの技術基準）",q:"別添86において「ミスト」の定義として正しいものはどれか。",choices:["A. ガラス外表面の霜や氷をいう", "B. 空気中の水分がガラス外表面上で結露することにより生じるガラス外表面上の水滴の膜をいう", "C. 空気中の水分がガラス内表面上で凝結することにより生じるガラス内表面上の微小な水滴の膜をいう", "D. 雨滴がガラスに付着した状態をいう"],answer:"C",exp:"別添86第2.3項。「ミスト」とは、空気中の水分がガラス内表面上で凝結することにより生じるガラス内表面上の微小な水滴の膜をいう。「デミスト」は前方視界確保のためガラス内表面を覆っているミストをデフロスタにより除去することをいう（第2.4項）。"},
  {no:7235,section:"保安基準別添",label:"別添87（サンバイザの衝撃吸収の技術基準）",q:"別添87「サンバイザの衝撃吸収の技術基準」において、静的接触試験に使用する球状剛体頭部模型の直径として正しいものはどれか。",choices:["A. 直径130mm", "B. 直径155mm", "C. 直径165mm", "D. 直径180mm"],answer:"C",exp:"別添87第2.2項。実車取付状態のサンバイザに対して、直径165mmの球状剛体頭部模型があらゆる方向より静的に接触する部分を測定する。"},
  {no:7236,section:"保安基準別添",label:"別添87（サンバイザの衝撃吸収の技術基準）",q:"別添87において、サンバイザ構成材料のうち硬いものの角の半径の判定基準として正しいものはどれか。",choices:["A. 2.0mm以上", "B. 2.5mm以上", "C. 3.0mm以上", "D. 3.2mm以上"],answer:"D",exp:"別添87第3.2項。静的接触するサンバイザ構成材料のうち硬いものの角の半径は3.2mm以上とする。ただし、取り付けのための基盤部の角の半径は、板厚の15%あればよい。"},
  {no:7237,section:"保安基準別添",label:"別添88（速度計の技術基準）",q:"別添88「速度計の技術基準」において、「通常走行時のタイヤ空気圧」の定義として正しいものはどれか。",choices:["A. 自動車製作者により指定された冷間時のタイヤ空気圧と同じ値", "B. 自動車製作者により指定された冷間時のタイヤ空気圧に20kPaを加えたもの", "C. 自動車製作者により指定された温間時のタイヤ空気圧", "D. 自動車製作者により指定された冷間時のタイヤ空気圧から10kPaを差し引いたもの"],answer:"B",exp:"別添88第2.2項。「通常走行時のタイヤ空気圧」とは、自動車製作者により指定された冷間時のタイヤ空気圧に20kPaを加えたものをいう。"},
  {no:7238,section:"保安基準別添",label:"別添88（速度計の技術基準）",q:"別添88において、速度計の指度V1と自動車の走行時の速度V2の間の関係式として正しいものはどれか。",choices:["A. 0 ≦ V1 - V2 ≦ V2/10 + 4", "B. 0 ≦ V1 - V2 ≦ V2/5 + 4", "C. -4 ≦ V1 - V2 ≦ V2/10", "D. 0 ≦ V1 - V2 ≦ V2/10 + 2"],answer:"A",exp:"別添88第3.3項。速度計の指度V1（km/h）と自動車の走行時の速度V2（km/h）の関係は「0 ≦ V1 - V2 ≦ V2/10 + 4」に適合しなければならない。速度計の指度は自動車の走行時の速度を下回ってはならない。"},
  {no:7239,section:"保安基準別添",label:"別添88（速度計の技術基準）",q:"別添88において、走行試験の試験機器の精度として正しいものはどれか。",choices:["A. ±0.1%以内", "B. ±0.5%以内", "C. ±1.0%以内", "D. ±2.0%以内"],answer:"B",exp:"別添88第3.2.6項。自動車の走行時の速度を測定するために使用する試験機器の精度は±0.5%以内であること。また試験路表面は平坦で乾燥し、十分な粘着性を有するものとされている（第3.2.6.1項）。"},
  {no:7240,section:"保安基準別添",label:"別添89（運行記録計の技術基準）",q:"別添89「運行記録計の技術基準」の適用対象として正しいものはどれか。",choices:["A. 車両総重量が5t以上又は最大積載量が3t以上の貨物用普通自動車", "B. 貨物の運送の用に供する普通自動車であって車両総重量8t以上又は最大積載量5t以上のもの（緊急自動車等を除く）", "C. すべての事業用貨物自動車", "D. 車両総重量12t以上のすべての貨物自動車"],answer:"B",exp:"別添89適用範囲。貨物の運送の用に供する普通自動車であって車両総重量が8t以上又は最大積載量が5t以上のもの（道路運送車両法第99条の自動車、緊急自動車及び被牽引自動車を除く）が適用対象。該当する被牽引自動車を牽引する牽引自動車も対象となる。"},
  {no:7241,section:"保安基準別添",label:"別添89（運行記録計の技術基準）",q:"別添89において、運行記録計の瞬間速度記録の精度（許容差）として、標準速度計の指示が60km/hの場合の許容差として正しいものはどれか。",choices:["A. ±2.0km/h", "B. ±2.5km/h", "C. ±3.0km/h", "D. ±3.5km/h"],answer:"C",exp:"別添89の表-2（瞬間速度記録装置の精度）。標準速度計の指示が40km/h及び60km/hの場合の許容差は±3.0km/h、80km/hの場合は±3.5km/h、100km/hの場合は±4.5km/hである。"},
  {no:7242,section:"保安基準別添",label:"別添89（運行記録計の技術基準）",q:"別添89において、運行時間指示装置（時計）及び記録装置の精度として正しいものはどれか。",choices:["A. 運行時間24時間について±3分以内", "B. 運行時間24時間について±5分以内", "C. 運行時間24時間について±10分以内", "D. 運行時間24時間について±2分以内"],answer:"B",exp:"別添89第4.3項。運行時間指示装置（時計）及び記録装置の精度は、運行時間24時間について±5分以内、24時間を超えてn日連続して記録するものについては±{5+2(n-1)}分以内であること。なお耐熱性試験の運行時間記録の変化は運行時間24時間につき3分以内（表-1）と異なるので注意。"},
  {no:7243,section:"保安基準別添",label:"別添90（速度表示装置の技術基準）",q:"別添90「速度表示装置の技術基準」の適用対象から除外される自動車として正しいものはどれか。",choices:["A. 車両総重量が8t以上の貨物自動車", "B. 最高速度40km/h未満の自動車、緊急自動車、被牽引自動車", "C. 最高速度60km/h未満の自動車すべて", "D. 最大積載量が5t未満の貨物自動車"],answer:"B",exp:"別添90第1項（適用範囲）。道路運送車両法第99条の自動車、緊急自動車、被牽引自動車及び最高速度40km/h未満の自動車は適用対象から除外される。"},
  {no:7244,section:"保安基準別添",label:"別添90（速度表示装置の技術基準）",q:"別添90において、速度表示装置の構成として正しいものはどれか。",choices:["A. 速度計指示部及び速度記録部から構成される", "B. 検出部（検出器、作動確認灯、点検スイッチ等）及び速度表示灯から構成される", "C. 発信器及び受信器から構成される", "D. 記録部及び警告灯から構成される"],answer:"B",exp:"別添90第2.4項。速度表示装置は検出部（検出器、作動確認灯、点検スイッチなどにより構成された部分）及び速度表示灯（以下「表示灯」）より構成される。"},
  {no:7245,section:"保安基準別添",label:"別添91（連節バスの構造要件）",q:"別添91「連節バスの構造要件」において、連節部の床面とターンテーブルとの間の隙間（全車輪が同一平面上にある場合）の許容値として正しいものはどれか。",choices:["A. 5mm以下", "B. 10mm以下", "C. 15mm以下", "D. 20mm以下"],answer:"B",exp:"別添91第3.1.2.1項。空車状態で水平面上に停車している場合、全車輪が同一平面上にあるときの前後各車室の床面とターンテーブルとの間のカバーがされていない隙間は10mmを超えてはならない。"},
  {no:7246,section:"保安基準別添",label:"別添91（連節バスの構造要件）",q:"別添91において、前車室の後扉及び後車室の扉（ホイールベース間に備えるもの）の有効幅として正しいものはどれか。",choices:["A. 700mm以上", "B. 750mm以上", "C. 800mm以上", "D. 850mm以上"],answer:"C",exp:"別添91第3.4.2項。前車室の後扉及び後車室の扉のうちホイールベース間に備えるものにあっては、有効幅800mm以上であること。"},
  {no:7247,section:"保安基準別添",label:"別添91（連節バスの構造要件）",q:"別添91において、連節部への座席・立席に関する規定として正しいものはどれか。",choices:["A. 連節部には立席のみ備えることができる", "B. 連節部には立席及び補助座席が備えられていないこと、かつ連節部に備える座席は前向きであること", "C. 連節部には補助座席のみ備えることができる", "D. 連節部には制限なく座席を設置できる"],answer:"B",exp:"別添91第3.8.1項及び3.8.2項。連節部には立席及び補助座席が備えられていないこと、また連節部に備える座席は前向きであることが要件とされている。"},
  {no:7248,section:"保安基準別添",label:"別添92（2階建バスの構造要件）",q:"別添92「2階建バスの構造要件」において、最大安定傾斜角度として正しいものはどれか。",choices:["A. 左右各20°まで傾けた場合に転覆しないこと", "B. 左右各25°まで傾けた場合に転覆しないこと", "C. 左右各28°まで傾けた場合に転覆しないこと", "D. 左右各30°まで傾けた場合に転覆しないこと"],answer:"C",exp:"別添92第1項（最大安定傾斜角度）。空車状態で乗務員が定位置に乗車し、かつ2階の乗車定員の人員が2階客室のすべての座席に乗車した状態において、左側及び右側にそれぞれ28°まで傾けた場合に転覆しないものでなければならない。"},
  {no:7249,section:"保安基準別添",label:"別添92（2階建バスの構造要件）",q:"別添92において、2階建バスの階段の踏段の有効幅として正しいものはどれか。",choices:["A. 400mm以上", "B. 500mm以上", "C. 600mm以上", "D. 700mm以上"],answer:"C",exp:"別添92第2項（階段）。階段の踏段の有効幅は600mm以上であること。また踏段上における有効高さは1600mm以上、1段の高さは300mm以下、有効奥行は300mm以上とされている。"},
