  {no:6306,section:"保安基準細目",label:"第103条（連結装置）",q:"牽引自動車及び被牽引自動車の連結装置の基準として誤っているものはどれか。",choices:["A. 連結装置は、堅ろうで運行に十分耐えるものであること。", "B. 連結装置は、相互に確実に結合する構造であること。", "C. 連結装置には、走行中振動、衝撃等により分離しないように適当な安全装置を備えること。", "D. 応急用の牽引こうは、連結装置に含まれる。"],answer:"D",exp:"第103条第2項により、貨物自動車等の車枠の先端に設けられた被牽引自動車を牽引することを目的としない応急用の牽引こう等は、連結装置に含まないものとする。"},
  {no:6307,section:"保安基準細目",label:"第104条（乗車装置）",q:"消防自動車の立席が乗車装置の基準に適合するとみなされる要件として正しいものはどれか。",choices:["A. 握り棒及び滑り止めを施した踏板（奥行25cm以上）を有するもの", "B. 握り棒及び滑り止めを施した踏板（奥行30cm以上）を有するもの", "C. 握り棒及び滑り止めを施した踏板（奥行35cm以上）を有するもの", "D. つり革及び握り棒を有するもの"],answer:"B",exp:"第104条第1項第1号ハにより、消防自動車の立席であって、握り棒及び滑り止めを施した踏板（奥行30cm以上）を有するものは、乗車装置の基準に適合するものとする。"},
  {no:6308,section:"保安基準細目",label:"第104条（乗車装置）",q:"内装材料の難燃性基準の適用において、内装とされないものとして正しいものはどれか。",choices:["A. 表面の寸法が長さ293mm又は幅25mmに満たないもの", "B. 表面の寸法が長さ300mm又は幅30mmに満たないもの", "C. 表面の寸法が長さ250mm又は幅20mmに満たないもの", "D. 表面の寸法が長さ350mm又は幅30mmに満たないもの"],answer:"A",exp:"第104条第3項第2号により、表面の寸法が長さ293mm又は幅25mmに満たないものは内装とされないものとする。"},
  {no:6309,section:"保安基準細目",label:"第105条（運転者席）",q:"専ら乗用の用に供する自動車であって乗車定員10人未満のものの運転者席における視野の基準について、運転者が確認できる障害物の大きさはどれか。",choices:["A. 高さ0.8m直径30cmの円柱", "B. 高さ1m直径20cmの円柱", "C. 高さ1m直径30cmの円柱", "D. 高さ1.2m直径30cmの円柱"],answer:"C",exp:"第105条第1項第1号イにより、運転者が運転者席において確認できる障害物は、高さ1m直径30cmの円柱をいう。"},
  {no:6310,section:"保安基準細目",label:"第106条（座席）",q:"自動車の運転者以外の者の用に供する座席の着席空間として、1人につき必要な最小幅はどれか。",choices:["A. 350mm以上", "B. 380mm以上", "C. 400mm以上", "D. 450mm以上"],answer:"C",exp:"第106条第1項第2号により、自動車の運転者以外の者の用に供する座席は、1人につき、幅400mm以上の着席するに必要な空間を有すること。"},
  {no:6311,section:"保安基準細目",label:"第106条（座席）",q:"乗車定員11人以上の自動車（緊急自動車を除く）の座席について、前方の座席、隔壁等との必要な間げきはどれか。",choices:["A. 150mm以上", "B. 200mm以上", "C. 250mm以上", "D. 300mm以上"],answer:"B",exp:"第106条第1項第6号イにより、乗車定員11人以上の自動車（緊急自動車を除く）の座席（幼児専用車の幼児用座席を除く）は、前方の座席、隔壁等と200mm以上の間げきを有すること。"},
  {no:6312,section:"保安基準細目",label:"第106条（座席）",q:"幼児専用車の幼児用座席が前方の座席等と有すべき間げきとして正しいものはどれか。",choices:["A. 100mm以上", "B. 150mm以上", "C. 200mm以上", "D. 250mm以上"],answer:"B",exp:"第106条第1項第6号ロにより、幼児専用車の幼児用座席は前方の座席、隔壁等と150mm以上の間げきを有すること。"},
  {no:6313,section:"保安基準細目",label:"第107条（補助座席定員）",q:"補助座席定員に関する告示の基準として正しいものはどれか。",choices:["A. 補助座席以外の座席の定員が、座席定員の3分の1以上でなければならない。", "B. 補助座席以外の座席の定員が、座席定員の2分の1以上でなければならない。", "C. 補助座席の定員が、座席定員の3分の1以下でなければならない。", "D. 補助座席の定員が、座席定員の4分の1以下でなければならない。"],answer:"B",exp:"第107条により、前条第2項第1号イからハまでに掲げる座席以外の座席の定員が、座席定員の2分の1以上でなければならないものとする。"},
  {no:6314,section:"保安基準細目",label:"第108条（座席ベルト等）",q:"第二種座席ベルトの定義として正しいものはどれか。",choices:["A. 少なくとも乗車人員の腰部の移動を拘束することのできるもの", "B. 少なくとも乗車人員の腰部の移動を拘束し、かつ、上半身が前方に倒れることを防止することのできるもの", "C. 乗車人員の全身を拘束することのできるもの", "D. 少なくとも乗車人員の肩部の移動を拘束することのできるもの"],answer:"B",exp:"第108条第2項により、第二種座席ベルトとは、三点式座席ベルト等少なくとも乗車人員の腰部の移動を拘束し、かつ、上半身が前方に倒れることを防止することのできるものをいう。"},
  {no:6315,section:"保安基準細目",label:"第111条（通路）",q:"乗車定員11人以上の自動車に設ける通路の有効幅及び有効高さの基準として正しいものはどれか（通常の場合）。",choices:["A. 有効幅250mm以上、有効高さ1,600mm以上", "B. 有効幅300mm以上、有効高さ1,600mm以上", "C. 有効幅300mm以上、有効高さ1,800mm以上", "D. 有効幅350mm以上、有効高さ1,600mm以上"],answer:"B",exp:"第111条第1項により、乗車定員11人以上の自動車（緊急自動車を除く）及び幼児専用車に設ける通路は、有効幅300mm以上、有効高さ1,600mm以上のものでなければならない。"},
  {no:6316,section:"保安基準細目",label:"第111条（通路）",q:"通路の有効高さを1,200mmとすることができる条件として正しいものはどれか。",choices:["A. 当該通路に係る全ての座席の前縁と最も近い乗降口との車両中心線方向の最短距離が3m未満である場合", "B. 当該通路に係る全ての座席の前縁と最も近い乗降口との車両中心線方向の最短距離が2m未満である場合", "C. 当該通路に係る全ての座席の前縁と最も近い乗降口との車両中心線方向の最短距離が1m未満である場合", "D. 当該通路に係る全ての座席の前縁と最も近い乗降口との車両中心線方向の最短距離が2.5m未満である場合"],answer:"B",exp:"第111条第1項により、当該通路に係る全ての座席の前縁と最も近い乗降口との車両中心線方向の最短距離が2m未満である場合は、有効高さを1,200mmとすることができる。"},
  {no:6317,section:"保安基準細目",label:"第112条（立席）",q:"立席を設けることができる客室内の床面の基準として正しいものはどれか。",choices:["A. 有効幅250mm以上、有効高さ1,600mm以上の専ら座席の用に供する床面以外の床面", "B. 有効幅300mm以上、有効高さ1,800mm以上の専ら座席の用に供する床面以外の床面", "C. 有効幅300mm以上、有効高さ1,600mm以上の専ら座席の用に供する床面以外の床面", "D. 有効幅350mm以上、有効高さ1,800mm以上の専ら座席の用に供する床面以外の床面"],answer:"B",exp:"第112条第1項により、立席を設けることができる客室内の床面は、客室内の有効幅300mm以上、有効高さ1,800mm以上の専ら座席の用に供する床面以外の床面とする。"},
  {no:6318,section:"保安基準細目",label:"第112条（立席）",q:"立席人員1人の占める広さに関する告示で定める面積として正しいものはどれか。",choices:["A. 0.12m2", "B. 0.14m2", "C. 0.16m2", "D. 0.18m2"],answer:"B",exp:"第112条第5項により、立席人員1人の占める広さに関し告示で定める面積は、0.14m2とする。"},
  {no:6319,section:"保安基準細目",label:"第113条（乗降口）",q:"乗降口の有効幅の最小基準として正しいものはどれか（一般的な乗降口）。",choices:["A. 500mm以上", "B. 550mm以上", "C. 600mm以上", "D. 650mm以上"],answer:"C",exp:"第113条第2項第1号により、乗降口の有効幅は600mm以上であること。"},
  {no:6320,section:"保安基準細目",label:"第113条（乗降口）",q:"乗降口の踏段について、乗車定員11人以上23人以下の旅客自動車運送事業用自動車であって車両総重量5トン以下のものの一段の高さの基準として正しいものはどれか。",choices:["A. 100mm以上200mm以下", "B. 120mm以上250mm以下", "C. 100mm以上230mm以下", "D. 150mm以上300mm以下"],answer:"B",exp:"第113条第2項第3号イにより、乗車定員11人以上23人以下の旅客自動車運送事業用自動車であって車両総重量5トン以下のものにあっては、一段の高さが120mm以上250mm以下の踏段を備えること。"},
  {no:6321,section:"保安基準細目",label:"第114条（非常口）",q:"乗車定員30人以上の自動車の非常口の有効幅及び有効高さの基準として正しいものはどれか（原則の場合）。",choices:["A. 有効幅350mm以上、有効高さ1,100mm以上", "B. 有効幅400mm以上、有効高さ1,200mm以上", "C. 有効幅450mm以上、有効高さ1,300mm以上", "D. 有効幅500mm以上、有効高さ1,400mm以上"],answer:"B",exp:"第114条第1項第2号により、乗車定員30人以上の自動車の非常口は、有効幅400mm以上、有効高さ1,200mm以上であること。"},
  {no:6322,section:"保安基準細目",label:"第114条（非常口）",q:"乗車定員30人未満の幼児専用車の非常口の有効幅及び有効高さの基準として正しいものはどれか。",choices:["A. 有効幅250mm以上、有効高さ800mm以上", "B. 有効幅300mm以上、有効高さ1,000mm以上", "C. 有効幅350mm以上、有効高さ1,100mm以上", "D. 有効幅400mm以上、有効高さ1,200mm以上"],answer:"B",exp:"第114条第1項第5号により、乗車定員30人未満の幼児専用車の非常口は、有効幅300mm以上、有効高さ1,000mm以上であること。"},
  {no:6323,section:"保安基準細目",label:"第114条（非常口）",q:"非常口付近の灯火により非常口の位置を表示する場合の灯火の色として正しいものはどれか。",choices:["A. 白色", "B. 橙色", "C. 緑色", "D. 青色"],answer:"C",exp:"第114条第2項により、灯火により非常口の位置を表示するときは、その灯火の色は緑色でなければならない。"},
  {no:6324,section:"保安基準細目",label:"第115条（物品積載装置）",q:"専ら砂利・土砂の運搬に用いる普通自動車の荷台（傾斜するもの）が基準に適合しないとされる条件として正しいものはどれか。",choices:["A. 最大積載量を荷台の容積（0.1m3未満切捨て）で除した値が1.0t/m3未満のもの", "B. 最大積載量を荷台の容積（0.1m3未満切捨て）で除した値が1.3t/m3未満のもの", "C. 最大積載量を荷台の容積（0.1m3未満切捨て）で除した値が1.5t/m3未満のもの", "D. 最大積載量を荷台の容積（0.1m3未満切捨て）で除した値が2.0t/m3未満のもの"],answer:"C",exp:"第115条第1項第2号により、専ら砂利・土砂の運搬に用いる普通自動車の荷台であって、最大積載量を荷台の容積（0.1m3未満切捨て）で除した値が普通自動車にあっては1.5t/m3未満のものは基準に適合しない。"},
  {no:6325,section:"保安基準細目",label:"第115条（物品積載装置）",q:"専ら砂利・土砂の運搬に用いる小型自動車の荷台が基準に適合しないとされる積載量/容積比の基準として正しいものはどれか。",choices:["A. 1.0t/m3未満", "B. 1.2t/m3未満", "C. 1.3t/m3未満", "D. 1.5t/m3未満"],answer:"C",exp:"第115条第1項第2号により、専ら砂利・土砂の運搬に用いる小型自動車の荷台（傾斜するものに限る）であって、最大積載量を荷台の容積で除した値が小型自動車にあっては1.3t/m3未満のものは基準に適合しない。"},
  {no:6326,section:"保安基準細目",label:"第116条（高圧ガス運送装置）",q:"高圧ガス運送装置の圧力計の目盛に関する基準として正しいものはどれか。",choices:["A. 零からガス充填圧力の1.0倍以上1.5倍以下", "B. 零からガス充填圧力の1.5倍以上2倍以下", "C. 零からガス充填圧力の2倍以上3倍以下", "D. 零からガス充填圧力の1.2倍以上1.8倍以下"],answer:"B",exp:"第116条第7号により、圧力計は零からガス充填圧力の1.5倍以上2倍以下までの目盛をしたものであること。"},
  {no:6327,section:"保安基準細目",label:"第117条（窓ガラス）",q:"保安基準第29条第1項の「安全ガラス」として正しくないものはどれか。",choices:["A. 合わせガラス", "B. 強化ガラス", "C. 通常の板ガラス", "D. ガラス－プラスチック"],answer:"C",exp:"第117条第2項により、安全ガラスは合わせガラス、強化ガラス、部分強化ガラス、有機ガラス又はガラス－プラスチックとする。通常の板ガラスはこれに含まれない。"},
  {no:6328,section:"保安基準細目",label:"第118条（自動車の騒音防止装置）",q:"側車付二輪自動車（二輪自動車から改造を行ったものを除く）の近接排気騒音の基準値として正しいものはどれか。",choices:["A. 94dB", "B. 96dB", "C. 97dB", "D. 99dB"],answer:"C",exp:"第118条第1項第2号の表により、側車付二輪自動車（二輪自動車から改造を行ったものを除く）の近接排気騒音の基準値は97dBである。"},
  {no:6329,section:"保安基準細目",label:"第118条（自動車の騒音防止装置）",q:"車両総重量が3.5tを超え、原動機の最高出力が150kWを超える自動車の近接排気騒音の基準値として正しいものはどれか。",choices:["A. 99dB", "B. 105dB", "C. 110dB", "D. 115dB"],answer:"C",exp:"第118条第1項第2号の表により、車両総重量が3.5tを超え、原動機の最高出力が150kWを超えるもの（大型特殊自動車及び小型特殊自動車）の近接排気騒音の基準値は110dBである。"},
  {no:6330,section:"保安基準細目",label:"第119条（排出ガス）",q:"ガソリン又はLPGを燃料とする普通・小型自動車のうちGVW3.5t超のものがJE05モード法で適合すべき窒素酸化物の基準値（g/kWh）として正しいものはどれか。",choices:["A. 0.5", "B. 0.7", "C. 0.9", "D. 1.2"],answer:"C",exp:"第119条第1項第1号イにより、窒素酸化物については0.9g/kWhを超えないものであること。"},
  {no:6331,section:"保安基準細目",label:"第119条（排出ガス）",q:"WLTCモード法による規制で、専ら乗用の乗車定員10人以下の普通・小型・軽自動車の一酸化炭素の走行距離1km当たりの排出量基準（g/km）として正しいものはどれか。",choices:["A. 1.50", "B. 2.03", "C. 4.48", "D. 7.06"],answer:"B",exp:"第119条第1項第2号イの表により、専ら乗用の用に供する乗車定員10人以下の普通自動車、小型自動車又は軽自動車の一酸化炭素の基準値は2.03g/kmである。"},
  {no:6332,section:"保安基準細目",label:"第120条（前照灯等）",q:"走行用前照灯（最高速度20km/h未満の自動車を除く）が夜間にその前方で確認できる必要な距離として正しいものはどれか（一般的な自動車）。",choices:["A. 50m", "B. 75m", "C. 100m", "D. 150m"],answer:"C",exp:"第120条第2項第1号により、走行用前照灯は夜間にその前方100mの距離にある交通上の障害物を確認できる性能を有するものであること。"},
  {no:6333,section:"保安基準細目",label:"第120条（前照灯等）",q:"走行用前照灯の灯光の色として正しいものはどれか。",choices:["A. 黄色", "B. 白色", "C. 橙色", "D. 淡黄色"],answer:"B",exp:"第120条第2項第3号により、走行用前照灯の灯光の色は白色であること。"},
  {no:6334,section:"保安基準細目",label:"第120条（前照灯等）",q:"一般の自動車（特殊用途車等を除く）の走行用前照灯の個数として正しいものはどれか。",choices:["A. 1個又は2個", "B. 2個又は4個", "C. 2個、3個又は4個", "D. 1個、2個又は4個"],answer:"B",exp:"第120条第3項第1号により、走行用前照灯の数は2個又は4個であること（二輪自動車等を除く）。"},
  {no:6335,section:"保安基準細目",label:"第121条（前部霧灯）",q:"前部霧灯の灯光の色として正しいものはどれか。",choices:["A. 白色のみ", "B. 白色又は淡黄色であり、その全てが同一であること", "C. 白色又は橙色であり、その全てが同一であること", "D. 任意の色でよい"],answer:"B",exp:"第121条第1項第2号により、前部霧灯は白色又は淡黄色であり、その全てが同一であること。"},
  {no:6336,section:"保安基準細目",label:"第121条（前部霧灯）",q:"一般の乗用車（乗車定員10人未満）及び車両総重量3.5t以下の貨物車に備える前部霧灯の照明部上縁の高さの基準として正しいものはどれか。",choices:["A. 地上600mm以下", "B. 地上800mm以下", "C. 地上1,000mm以下", "D. 地上1,200mm以下"],answer:"B",exp:"第121条第3項第2号により、専ら乗用の用に供する自動車であって乗車定員が10人未満のもの及び貨物の運送の用に供する自動車であって車両総重量3.5t以下のものに備える前部霧灯は、その照明部の上縁の高さが地上800mm以下であること。"},
  {no:6337,section:"保安基準細目",label:"第122条（側方照射灯）",q:"側方照射灯の光度の上限として正しいものはどれか。",choices:["A. 10,000cd以下", "B. 14,000cd以下", "C. 16,800cd以下", "D. 20,000cd以下"],answer:"C",exp:"第122条第1項第1号により、側方照射灯の光度は16,800cd以下であること。"},
  {no:6338,section:"保安基準細目",label:"第122条（側方照射灯）",q:"側方照射灯の照明部の取付高さとして正しいものはどれか。",choices:["A. 下縁の高さが地上0.20m以上、上縁の高さが地上0.9m以下", "B. 下縁の高さが地上0.25m以上、上縁の高さが地上0.9m以下", "C. 下縁の高さが地上0.30m以上、上縁の高さが1.0m以下", "D. 下縁の高さが地上0.25m以上、上縁の高さが地上1.2m以下"],answer:"B",exp:"第122条第3項第4号により、側方照射灯はその照明部の下縁の高さが地上0.25m以上、上縁の高さが地上0.9m以下であってすれ違い用前照灯の照明部の上縁を含む水平面以下となるように取り付けられていること。"},
  {no:6339,section:"保安基準細目",label:"第123条（車幅灯）",q:"車幅灯を夜間前方300mの距離から点灯確認できるとみなされる要件（平成18年1月1日以降製作車）として正しいものはどれか。",choices:["A. 光源が3W以上で照明部の大きさが10cm2以上", "B. 光源が5W以上30W以下で照明部の大きさが15cm2以上", "C. 光源が5W以上で照明部の大きさが20cm2以上", "D. 光源が10W以上で照明部の大きさが15cm2以上"],answer:"B",exp:"第123条第1項第1号により、平成18年1月1日以降に製作された自動車に備える車幅灯は、光源が5W以上30W以下で照明部の大きさが15cm2以上であり、かつ、その機能が正常なものは基準に適合するものとする。"},
  {no:6340,section:"保安基準細目",label:"第123条（車幅灯）",q:"自動車（二輪自動車を除く）に備える車幅灯の照明部の最外縁の位置として正しいものはどれか（被牽引自動車以外）。",choices:["A. 自動車の最外側から150mm以内", "B. 自動車の最外側から300mm以内", "C. 自動車の最外側から400mm以内", "D. 自動車の最外側から500mm以内"],answer:"C",exp:"第123条第3項第4号により、自動車（二輪自動車を除く）に備える車幅灯の照明部の最外縁は自動車の最外側から400mm以内（被牽引自動車にあっては150mm以内）となるように取り付けられていること。"},
  {no:6341,section:"保安基準細目",label:"第124条（前部上側端灯）",q:"前部上側端灯が夜間前方300mの距離から点灯確認できるとみなされる要件として正しいものはどれか。",choices:["A. 光源が3W以上20W以下で照明部の大きさが10cm2以上", "B. 光源が5W以上30W以下で照明部の大きさが15cm2以上", "C. 光源が5W以上で照明部の大きさが20cm2以上", "D. 光源が10W以上30W以下で照明部の大きさが15cm2以上"],answer:"B",exp:"第124条第1項第1号により、光源が5W以上30W以下で照明部の大きさが15cm2以上のものであり、かつ、その機能が正常である前部上側端灯は、基準に適合するものとする。"},
  {no:6342,section:"保安基準細目",label:"第125条（前部反射器）",q:"前部反射器の反射部の形状として正しいものはどれか。",choices:["A. 三角形であること", "B. 三角形以外の形状であること", "C. 円形であること", "D. 四角形であること"],answer:"B",exp:"第125条第1項第2号により、前部反射器の反射部は三角形以外の形状であること。なお、被牽引自動車の後部反射器は三角形とされる。"},
  {no:6343,section:"保安基準細目",label:"第125条（前部反射器）",q:"前部反射器の反射光の色として正しいものはどれか。",choices:["A. 赤色", "B. 橙色", "C. 黄色", "D. 白色"],answer:"D",exp:"第125条第1項第3号により、前部反射器による反射光の色は白色であること。"},
  {no:6344,section:"保安基準細目",label:"第126条（側方灯及び側方反射器）",q:"側方灯の灯光の色として原則として正しいものはどれか。",choices:["A. 白色", "B. 橙色", "C. 赤色", "D. 緑色"],answer:"B",exp:"第126条第1項第2号により、側方灯の灯光の色は橙色であること（ただし後部に備える側方灯であって尾灯等と一体のものは赤色も可）。"},
  {no:6345,section:"保安基準細目",label:"第126条（側方灯及び側方反射器）",q:"長さ6mを超える自動車に備える側方灯の照明部の間隔として正しいものはどれか（原則）。",choices:["A. 2m以内", "B. 3m以内", "C. 4m以内", "D. 5m以内"],answer:"B",exp:"第126条第3項第3号により、長さ6mを超える自動車に備える側方灯はその照明部の間隔が3m以内となるよう取り付けられていること。"},
  {no:6346,section:"保安基準細目",label:"第127条（番号灯）",q:"番号灯が夜間後方何mの距離から番号標の数字等を確認できる性能を有する必要があるか。",choices:["A. 10m", "B. 15m", "C. 20m", "D. 30m"],answer:"C",exp:"第127条第1項第1号により、番号灯は夜間後方20mの距離から自動車登録番号標等の数字等の表示を確認できるものであること。"},
  {no:6347,section:"保安基準細目",label:"第127条（番号灯）",q:"二輪自動車及び側車付二輪自動車に備える番号灯の番号標板面の照度の基準として正しいものはどれか。",choices:["A. 8lx以上", "B. 10lx以上", "C. 12lx以上", "D. 15lx以上"],answer:"D",exp:"第127条第1項第1号ロにより、二輪自動車及び側車付二輪自動車に備える番号灯は、番号灯試験器を用いて計測した番号標板面の照度が15lx以上のものであること。"},
  {no:6348,section:"保安基準細目",label:"第128条（尾灯）",q:"尾灯の灯光の色として正しいものはどれか。",choices:["A. 白色", "B. 橙色", "C. 赤色", "D. 黄色"],answer:"C",exp:"第128条第1項第2号により、尾灯の灯光の色は赤色であること。"},
  {no:6349,section:"保安基準細目",label:"第128条（尾灯）",q:"自動車（二輪自動車を除く）に備える尾灯の照明部の上縁の高さとして正しいものはどれか（一般的な自動車）。",choices:["A. 地上1.5m以下", "B. 地上1.8m以下", "C. 地上2.0m以下", "D. 地上2.1m以下"],answer:"D",exp:"第128条第3項第2号により、自動車（側車付二輪自動車並びにカタピラ及びそりを有する軽自動車を除く）に備える尾灯は、その照明部の上縁の高さが地上2.1m以下となるように取り付けられていること。"},
  {no:6350,section:"保安基準細目",label:"第129条（後部霧灯）",q:"後部霧灯の灯光の色として正しいものはどれか。",choices:["A. 白色", "B. 橙色", "C. 赤色", "D. 黄色"],answer:"C",exp:"第129条第1項第2号により、後部霧灯の灯光の色は赤色であること。"},
  {no:6351,section:"保安基準細目",label:"第129条（後部霧灯）",q:"後部霧灯の数の上限として正しいものはどれか。",choices:["A. 1個以下", "B. 2個以下", "C. 3個以下", "D. 4個以下"],answer:"B",exp:"第129条第3項第1号により、後部霧灯の数は2個以下であること。"},
  {no:6352,section:"保安基準細目",label:"第129条（後部霧灯）",q:"後部霧灯の照明部と制動灯の照明部との最小距離として正しいものはどれか。",choices:["A. 50mm以上", "B. 75mm以上", "C. 100mm以上", "D. 150mm以上"],answer:"C",exp:"第129条第3項第7号により、後部霧灯の照明部は制動灯の照明部から100mm以上離れていること。"},
  {no:6353,section:"保安基準細目",label:"第130条（駐車灯）",q:"後面に備える駐車灯の灯光の色として正しいものはどれか。",choices:["A. 白色", "B. 橙色", "C. 赤色", "D. 黄色"],answer:"C",exp:"第130条第1項第2号により、後面に備える駐車灯の灯光の色は赤色であること（前面は白色、両側面は前方が白色、後退方向が赤色）。"},
  {no:6354,section:"保安基準細目",label:"第130条（駐車灯）",q:"後面に備える駐車灯の点灯に関する基準として正しいものはどれか。",choices:["A. 長さ4m以上又は幅2m以上の自動車は左右の駐車灯が同時に点灯すること", "B. 長さ6m以上又は幅2m以上の自動車は後面の駐車灯の全てが同時に点灯すること", "C. 長さ6m以上又は幅2m以上の自動車以外は左側又は右側の駐車灯のみ点灯する構造にできる", "D. 前面の駐車灯は後面の駐車灯に関係なく点灯できる"],answer:"C",exp:"第130条第3項第3号により、長さ6m以上又は幅2m以上の自動車以外の自動車にあっては、左側又は右側の駐車灯のみ点灯する構造とすることができる。"},
  {no:6355,section:"保安基準細目",label:"第131条（後部上側端灯）",q:"後部上側端灯の灯光の色として正しいものはどれか。",choices:["A. 白色", "B. 橙色", "C. 赤色", "D. 黄色"],answer:"C",exp:"第131条第1項第2号により、後部上側端灯の灯光の色は赤色であること。"},
  {no:6356,section:"保安基準細目",label:"第131条（後部上側端灯）",q:"後部上側端灯の照明部と尾灯の照明部との最小距離（車両中心面に直交する鉛直面への投影）として正しいものはどれか。",choices:["A. 100mm以上", "B. 150mm以上", "C. 200mm以上", "D. 250mm以上"],answer:"C",exp:"第131条第3項第4号により、後部上側端灯はその照明部と尾灯の照明部を車両中心面に直交する鉛直面に投影したときに200mm以上離れるような位置に取り付けられていること。"},
  {no:6357,section:"保安基準細目",label:"第132条（後部反射器）",q:"被牽引自動車に備える後部反射器の反射部の形状として正しいものはどれか。",choices:["A. 三角形以外の形状", "B. 円形", "C. 正立正三角形又は帯状部の幅が一辺の5分の1以上の中空の正立正三角形であって、一辺が150mm以上200mm以下のもの", "D. 正立正三角形であって、一辺が100mm以上150mm以下のもの"],answer:"C",exp:"第132条第1項第2号により、被牽引自動車に備える後部反射器の反射部は正立正三角形又は帯状部の幅が一辺の5分の1以上の中空の正立正三角形であって、一辺が150mm以上200mm以下のものであること。"},
  {no:6358,section:"保安基準細目",label:"第132条（後部反射器）",q:"後部反射器による反射光の色として正しいものはどれか。",choices:["A. 白色", "B. 橙色", "C. 黄色", "D. 赤色"],answer:"D",exp:"第132条第1項第4号により、後部反射器による反射光の色は赤色であること。"},
  {no:6401,section:"保安基準細目",label:"第133条（大型後部反射器）",q:"大型後部反射器の反射部の寸法に関する次の記述のうち、被牽引自動車以外の自動車に備えるものの幅として正しいものはどれか。",choices:["A. 110mm以上130mm以下", "B. 130mm以上150mm以下", "C. 195mm以上230mm以下", "D. 150mm以上195mm以下"],answer:"B",exp:"第133条第1項第1号の規定により、大型後部反射器の反射部は一辺の長さが130mm以上、幅が130mm以上150mm以下（被牽引自動車に備えるものは195mm以上230mm以下）の長方形であること。被牽引自動車以外は130mm以上150mm以下が正解。"},
  {no:6402,section:"保安基準細目",label:"第133条（大型後部反射器）",q:"大型後部反射器の取付個数として保安基準細目第133条に規定されているものはどれか。",choices:["A. 1個、2個又は3個", "B. 2個又は4個", "C. 1個、2個又は4個", "D. 1個から4個まで（任意の個数）"],answer:"C",exp:"第133条第3項第1号の規定により、大型後部反射器の数は1個、2個又は4個であること。3個は規定されていない。"},
  {no:6403,section:"保安基準細目",label:"第133条（大型後部反射器）",q:"大型後部反射器は昼間においてその後方何mの位置からその赤色部を確認できるものでなければならないか。",choices:["A. 100m", "B. 200m", "C. 150m", "D. 300m"],answer:"C",exp:"第133条第1項第5号の規定により、大型後部反射器は昼間においてその後方150mの位置からその赤色部を確認できるものでなければならない。"},
  {no:6404,section:"保安基準細目",label:"第134条（制動灯）",q:"制動灯は昼間にその後方何mの距離から点灯を確認できなければならないか。",choices:["A. 50m", "B. 200m", "C. 100m", "D. 150m"],answer:"C",exp:"第134条第1項第1号の規定により、制動灯は昼間にその後方100mの距離から点灯を確認できるものでなければならない。"},
  {no:6405,section:"保安基準細目",label:"第134条（制動灯）",q:"尾灯と兼用の制動灯について、同時に点灯したときの光度は、尾灯のみを点灯したときの光度の何倍以上でなければならないか。",choices:["A. 3倍以上", "B. 5倍以上", "C. 10倍以上", "D. 8倍以上"],answer:"B",exp:"第134条第1項第2号の規定により、尾灯又は後部上側端灯と兼用の制動灯は、同時に点灯したときの光度が尾灯のみを点灯したときの光度の5倍以上となる構造であること。"},
  {no:6406,section:"保安基準細目",label:"第134条（制動灯）",q:"二輪自動車（側車付二輪自動車を除く）に備える制動灯の照明部の上縁の高さの基準として正しいものはどれか。",choices:["A. 地上2.1m以下", "B. 地上1.5m以下", "C. 地上1.8m以下", "D. 地上2.0m以下"],answer:"B",exp:"第134条第3項第2号の規定により、二輪自動車に備える制動灯の照明部の上縁の高さは地上1.5m以下でなければならない（その他の自動車は2.1m以下）。"},
  {no:6407,section:"保安基準細目",label:"第135条（補助制動灯）",q:"補助制動灯の数に関する規定として正しいものはどれか。",choices:["A. 1個または2個", "B. 必ず1個", "C. 1個。ただし車両中心面両側に各1個取り付ける場合を除く", "D. 2個以内"],answer:"C",exp:"第135条第3項第1号の規定により、補助制動灯の数は1個であること。ただし、第3号ただし書の規定により車両中心面の両側に1個ずつ取り付ける場合はこの限りでない。"},
  {no:6408,section:"保安基準細目",label:"第135条（補助制動灯）",q:"補助制動灯の照明部の下縁の高さ又は取付位置の基準として正しいものはどれか。",choices:["A. 地上0.35m以上、または後面ガラス最下端の下方0.1mより上方", "B. 地上0.85m以上、または後面ガラス最下端の下方0.15mより上方であって制動灯の照明部上縁を含む水平面以上", "C. 地上1.0m以上", "D. 地上0.75m以上、または制動灯照明部の上縁の高さ以上"],answer:"B",exp:"第135条第3項第2号の規定により、補助制動灯はその照明部の下縁の高さが地上0.85m以上又は後面ガラスの最下端の下方0.15mより上方であって、制動灯の照明部の上縁を含む水平面以上となるように取り付けられていること。"},
  {no:6409,section:"保安基準細目",label:"第135条（補助制動灯）",q:"補助制動灯と尾灯との兼用に関する規定として正しいものはどれか。",choices:["A. 兼用は一切禁止されている", "B. 兼用は禁止されているが、二輪自動車についてはこの限りでない", "C. 兼用は認められている", "D. 大型特殊自動車においてのみ兼用が認められている"],answer:"B",exp:"第135条第3項第4号の規定により、補助制動灯は尾灯と兼用でないこと。ただし、二輪自動車に備えるものにあってはこの限りではない。"},
  {no:6410,section:"保安基準細目",label:"第136条（後退灯）",q:"後退灯の灯光の色として正しいものはどれか。",choices:["A. 黄色", "B. 橙色", "C. 白色", "D. 赤色"],answer:"C",exp:"第136条第1項第2号の規定により、後退灯の灯光の色は白色であること。"},
  {no:6411,section:"保安基準細目",label:"第136条（後退灯）",q:"長さ6mを超える専ら乗用の用に供する乗員定員10人以上の自動車に備える後退灯の個数として正しいものはどれか。",choices:["A. 1個又は2個", "B. 1個、2個又は4個", "C. 2個、3個又は4個", "D. 2個"],answer:"C",exp:"第136条第3項第1号イの規定により、長さが6mを超える自動車（専ら乗用の用に供する自動車であって乗員定員10人以上の自動車及び貨物の運送の用に供する自動車に限る）にあっては、後退灯の数は2個、3個又は4個であること。"},
  {no:6412,section:"保安基準細目",label:"第136条（後退灯）",q:"後退灯の照明部の上縁の高さの基準（大型特殊・小型特殊自動車を除く）として正しいものはどれか。",choices:["A. 地上1.5m以下", "B. 地上2.1m以下", "C. 地上1.2m以下", "D. 地上1.0m以下"],answer:"C",exp:"第136条第3項第3号の規定により、後退灯はその照明部の上縁の高さが地上1.2m以下となるように取り付けられなければならない（大型特殊・小型特殊自動車で構造上やむを得ない場合を除く）。"},
  {no:6413,section:"保安基準細目",label:"第137条（方向指示器）",q:"方向指示器（前方又は後方に表示するもの）は、方向の指示を表示する方向何mの位置から昼間において点灯を確認できなければならないか。",choices:["A. 50m", "B. 300m", "C. 100m", "D. 200m"],answer:"C",exp:"第137条第1項第1号の規定により、方向指示器は方向の指示を表示する方向100m（自動車の両側面に備えるものにあっては30m）の位置から昼間において点灯を確認できるものでなければならない。"},
  {no:6414,section:"保安基準細目",label:"第137条（方向指示器）",q:"長さ6m以上の自動車に備える前方又は後方に表示するための方向指示器（平成18年以降製作）の光源W数の範囲として正しいものはどれか。",choices:["A. 10W以上60W以下", "B. 6W以上60W以下", "C. 15W以上60W以下", "D. 15W以上"],answer:"C",exp:"第137条第1項第1号の第1表（イ）の規定により、長さ6m以上の自動車に備える前方又は後方に表示するための方向指示器の光源は15W以上60W以下、照明部の面積は40cm²以上であること。"},
  {no:6415,section:"保安基準細目",label:"第138条（補助方向指示器）",q:"二輪自動車に備える補助方向指示器の照明部の中心の高さの基準として正しいものはどれか。",choices:["A. 地上2.1m以下", "B. 地上1.5m以下", "C. 地上2.5m以下", "D. 地上2.3m以下"],answer:"D",exp:"第138条第3項第3号の規定により、二輪自動車に備える補助方向指示器は、その照明部の中心が地上2.3m以下となるように取り付けられていること。"},
  {no:6416,section:"保安基準細目",label:"第138条（補助方向指示器）",q:"補助方向指示器の点滅に関する規定として正しいものはどれか。",choices:["A. 方向指示器と独立して点滅する構造であること", "B. 方向指示器と連動して点滅するものであること", "C. 非常点滅表示灯と連動して点滅するものであること", "D. 手動スイッチにより操作できる構造であること"],answer:"B",exp:"第138条第3項第2号の規定により、補助方向指示器は方向指示器と連動して点滅するものであること。"},
  {no:6417,section:"保安基準細目",label:"第139条（非常点滅表示灯）",q:"非常点滅表示灯の操作に関する規定として原則的に正しいものはどれか。",choices:["A. 自動で作動するものでなければならない", "B. 手動で操作するものでなければならない", "C. 自動と手動の両方で操作できるものでなければならない", "D. 電子制御によるものでなければならない"],answer:"B",exp:"第139条第3項第4号の規定により、非常点滅表示灯は手動で操作するものでなければならない。ただし、緊急制動表示灯の作動停止、衝突事故、運転者異常時対応システムの制御等の場合は自動で作動させることができる。"},
  {no:6418,section:"保安基準細目",label:"第139条（非常点滅表示灯）",q:"盗難防止装置の設定・解除状態を表示するために非常点滅表示灯を使用できる時間の上限として正しいものはどれか。",choices:["A. 1秒以内", "B. 5秒以内", "C. 3秒以内", "D. 10秒以内"],answer:"C",exp:"第139条第3項第1号ただし書の規定により、盗難防止装置の設定または設定解除の状態を外部に表示するため、3秒を超えない範囲内において非常点滅表示灯を使用する構造のものは適合するものとする。"},
  {no:6419,section:"保安基準細目",label:"第140条（その他の灯火等の制限）",q:"後方を照射し若しくは後方に表示する灯光の色が橙色（照明部上縁が地上2.5m以下のもの）または赤色である灯火を備えてはならないが、例外として認められているものはどれか。",choices:["A. 前照灯", "B. 車幅灯", "C. 後退灯", "D. 方向指示器"],answer:"D",exp:"第140条第2項の規定により、後方を照射し若しくは後方に表示する橙色又は赤色の灯火を備えてはならないが、方向指示器（第3号）は例外として認められている。後退灯は白色の灯火として別途規定されており、前照灯・車幅灯は前方向けの灯火である。"},
  {no:6420,section:"保安基準細目",label:"第140条（その他の灯火等の制限）",q:"自動車の前面ガラスの上方に備えてはならない灯火として第140条に規定されているものはどれか。",choices:["A. 灯光の色が白色である灯火", "B. 灯光の色が青紫色である灯火（一般乗合旅客自動車運送事業用自動車を除く）", "C. 灯光の色が赤色である灯火", "D. 灯光の色が黄色である灯火"],answer:"B",exp:"第140条第4項の規定により、自動車（一般乗合旅客自動車運送事業用自動車を除く）の前面ガラスの上方には、灯光の色が青紫色である灯火を備えてはならない。"},
  {no:6421,section:"保安基準細目",label:"第141条（警音器）",q:"警音器の音の大きさについて、自動車の前方何mの位置で計測した値が規定されているか。",choices:["A. 2m", "B. 20m", "C. 10m", "D. 7m"],answer:"D",exp:"第141条第2項第1号の規定により、警音器の音の大きさは自動車の前方7mの位置において112dB以下87dB以上（動力7kW以下の二輪自動車にあっては112dB以下83dB以上）であること。"},
  {no:6422,section:"保安基準細目",label:"第141条（警音器）",q:"警音器の音の大きさの基準（動力7kW超の一般自動車）として正しいものはどれか。",choices:["A. 100dB以下80dB以上", "B. 112dB以下87dB以上", "C. 112dB以下83dB以上", "D. 120dB以下90dB以上"],answer:"B",exp:"第141条第2項第1号の規定により、警音器の音の大きさは自動車の前方7mの位置において112dB以下87dB以上であること（動力7kW以下の二輪自動車にあっては112dB以下83dB以上）。"},
  {no:6423,section:"保安基準細目",label:"第141条（警音器）",q:"警音器の警報音発生装置として認められないものはどれか。",choices:["A. 音が連続するもの", "B. 音の大きさが一定なもの", "C. 音色が一定なもの", "D. 運転者が運転者席において音の大きさを容易に変化させることができるもの"],answer:"D",exp:"第141条第1項の規定により、警音器の警報音発生装置は音が連続し、音の大きさおよび音色が一定なものでなければならない。運転者が容易に音の大きさまたは音色を変化させることができるものは基準に適合しない。"},
  {no:6424,section:"保安基準細目",label:"第142条（非常信号用具）",q:"非常信号用具の灯光の確認距離として正しいものはどれか。",choices:["A. 昼間100mの距離から確認できる赤色の灯光", "B. 夜間150mの距離から確認できる赤色の灯光", "C. 夜間200mの距離から確認できる赤色の灯光", "D. 昼間200mの距離から確認できる橙色の灯光"],answer:"C",exp:"第142条第1項第1号の規定により、非常信号用具は夜間200mの距離から確認できる赤色の灯光を発するものでなければならない。"},
  {no:6425,section:"保安基準細目",label:"第142条（非常信号用具）",q:"赤色合図灯について、基準に適合しないものとして規定されているのはどれか。",choices:["A. 赤色灯火の発光部のレンズの直径が40mm以上のもの", "B. 赤色灯火の発光部のレンズの直径が35mm未満のもの", "C. 電池消耗により性能が低下していないもの", "D. 豆電球2.5V・0.3A以上の性能を有するもの"],answer:"B",exp:"第142条第2項第1号の規定により、赤色灯火の発光部のレンズの直径が35mm未満の赤色合図灯は基準に適合しないものとする。"},
  {no:6426,section:"保安基準細目",label:"第143条（警告反射板）",q:"警告反射板の反射部の形状として正しいものはどれか。",choices:["A. 一辺が300mm以上の中空の正立正三角形で帯状部の幅が40mm以上", "B. 一辺が400mm以上の中空の正立正三角形で帯状部の幅が50mm以上", "C. 一辺が500mm以上の実心の正立正三角形", "D. 一辺が400mm以上の中空の倒立正三角形で帯状部の幅が50mm以上"],answer:"B",exp:"第143条第1号の規定により、警告反射板の反射部は一辺が400mm以上の中空の正立正三角形で帯状部の幅が50mm以上のものであること。"},
  {no:6427,section:"保安基準細目",label:"第143条（警告反射板）",q:"警告反射板はどのような条件で反射光を確認できなければならないか。",choices:["A. 昼間100mの距離から走行用前照灯で照射した場合に確認できること", "B. 夜間200mの距離から走行用前照灯で照射した場合に確認できること", "C. 夜間150mの距離から走行用前照灯で照射した場合に確認できること", "D. 昼間200mの距離から確認できること"],answer:"C",exp:"第143条第2号の規定により、警告反射板は夜間150mの距離から走行用前照灯で照射した場合にその反射光を照射位置から確認できるものであること。"},
  {no:6428,section:"保安基準細目",label:"第144条（停止表示器材）",q:"停止表示器材が夜間反射光を確認できなければならない距離として正しいものはどれか。",choices:["A. 夜間100mの距離から走行用前照灯で照射した場合", "B. 夜間150mの距離から走行用前照灯で照射した場合", "C. 夜間200mの距離から走行用前照灯で照射した場合", "D. 夜間300mの距離から走行用前照灯で照射した場合"],answer:"C",exp:"第144条第1項第2号の規定により、停止表示器材は夜間200mの距離から走行用前照灯で照射した場合にその反射光を照射位置から確認できるものであること。"},
  {no:6429,section:"保安基準細目",label:"第144条（停止表示器材）",q:"停止表示器材による蛍光の色として正しいものはどれか。",choices:["A. 白色または黄色", "B. 赤色または橙色", "C. 黄色または橙色", "D. 赤色のみ"],answer:"B",exp:"第144条第1項第4号の規定により、停止表示器材による反射光の色は赤色であり、かつ当該停止表示器材による蛍光の色は赤色または橙色であること。"},
  {no:6430,section:"保安基準細目",label:"第148条（速度計等）",q:"速度計の指示速度に関し、平成19年1月1日以降に製作された自動車（二輪・三輪・カタピラ及びそりを有する軽自動車以外）の基準式として正しいものはどれか（V1：指示速度、V2：実測速度）。",choices:["A. 10（V1－6）/11≦V2≦（100/90）V1", "B. 10（V1－8）/11≦V2≦（100/94）V1", "C. 10（V1－6）/11≦V2≦（100/94）V1", "D. 10（V1－4）/11≦V2≦（100/90）V1"],answer:"C",exp:"第148条第1項第2号ロ（1）の規定により、平成19年1月1日以降に製作された自動車（二輪自動車等以外）の速度計の精度基準式は10（V1－6）/11≦V2≦（100/94）V1である。"},
  {no:6431,section:"保安基準細目",label:"第148条（速度計等）",q:"速度計の基準に適合しないものはどれか。",choices:["A. 速度がkm/hで表示されるもの", "B. 照明装置を備えたもの", "C. 速度がmph（マイル毎時）で表示されるもの", "D. 自発光式のもの"],answer:"C",exp:"第148条第1項第1号イの規定により、速度がkm/hで表示されないものは基準に適合しないものとする。mph表示のみのものはこれに該当する。"},
  {no:6432,section:"保安基準細目",label:"第149条（消火器）",q:"保安基準第47条第1項の自動車（危険物運送車以外）に備える消火器として、霧状の強化液を放射するものの充てん量の基準として正しいものはどれか。",choices:["A. 4l以上", "B. 8l以上", "C. 6l以上", "D. 10l以上"],answer:"C",exp:"第149条第2項第2号イの規定により、保安基準第47条第1項の自動車（危険物運送車等を除く）に備える消火器として、霧状の強化液を放射する消火器の充てん量は6l以上であること。"},
  {no:6433,section:"保安基準細目",label:"第151条（運行記録計）",q:"運行記録計が記録しなければならない継続時間の最低基準として正しいものはどれか。",choices:["A. 12時間以上の継続した時間内における記録", "B. 24時間以上の継続した時間内における記録", "C. 48時間以上の継続した時間内における記録", "D. 8時間以上の継続した時間内における記録"],answer:"B",exp:"第151条第1項第1号の規定により、運行記録計は24時間以上の継続した時間内における当該自動車のすべての時刻における瞬間速度及びすべての2時刻間における走行距離を自動的に記録できる構造であること。"},
  {no:6434,section:"保安基準細目",label:"第152条（速度表示装置）",q:"速度表示装置において60km/hを超える速度で走行する場合に点灯する速度表示灯の個数として正しいものはどれか。",choices:["A. 1個", "B. 2個", "C. 3個", "D. 4個"],answer:"C",exp:"第152条第1項第1号の規定により、速度表示装置は60km/hを超える速度で走行する場合に3個の速度表示灯を点灯する構造であること（40km/h超60km/h以下は2個、40km/h以下は1個）。"},
  {no:6435,section:"保安基準細目",label:"第152条（速度表示装置）",q:"速度表示灯の灯光の色として正しいものはどれか。",choices:["A. 白色", "B. 橙色", "C. 黄緑色", "D. 黄色"],answer:"C",exp:"第152条第1項第4号の規定により、速度表示灯の灯光の色は黄緑色であること。"},
  {no:6436,section:"保安基準細目",label:"第153条（緊急自動車）",q:"緊急自動車の警光灯は前方何mの距離から点灯を確認できなければならないか。",choices:["A. 100m", "B. 200m", "C. 150m", "D. 300m"],answer:"D",exp:"第153条第1号の規定により、緊急自動車の警光灯は前方300mの距離から点灯を確認できる赤色のものであること。"},
  {no:6437,section:"保安基準細目",label:"第153条（緊急自動車）",q:"緊急自動車のサイレンの音の大きさとして正しいものはどれか。",choices:["A. 自動車の前方7mの位置において112dB以下87dB以上", "B. 自動車の前方20mの位置において90dB以上120dB以下", "C. 自動車の前方10mの位置において100dB以上130dB以下", "D. 自動車の前方20mの位置において95dB以上115dB以下"],answer:"B",exp:"第153条第2号の規定により、緊急自動車のサイレンの音の大きさは、その自動車の前方20mの位置において90dB以上120dB以下であること。"},
  {no:6438,section:"保安基準細目",label:"第153条（緊急自動車）",q:"緊急自動車の車体の塗色について消防自動車の色として正しいものはどれか。",choices:["A. 白色", "B. 朱色", "C. 赤色", "D. 橙色"],answer:"B",exp:"第153条第3号の規定により、緊急自動車の車体の塗色は、消防自動車にあっては朱色とし、その他の緊急自動車にあっては白色とする（一部例外あり）。"},
  {no:6439,section:"保安基準細目",label:"第154条（道路維持作業用自動車）",q:"道路維持作業用自動車に備える灯火に関する規定として正しいものはどれか。",choices:["A. 赤色であって点滅式のものであり、200mの距離から点灯を確認できること", "B. 黄色であって点滅式のものであり、150mの距離から点灯を確認できること", "C. 橙色であって点滅式のものであり、100mの距離から点灯を確認できること", "D. 黄色であって連続点灯式のものであり、150mの距離から点灯を確認できること"],answer:"B",exp:"第154条第1号・第2号の規定により、道路維持作業用自動車に備える灯火は黄色であって点滅式のものであり、150mの距離から点灯を確認できるものであること。"},
  {no:6440,section:"保安基準細目",label:"第155条（旅客自動車運送事業用自動車）",q:"乗車定員11人以上の旅客自動車運送事業用自動車の運転者席の側面の窓の開放に関する基準として正しいものはどれか。",choices:["A. 有効幅および有効高さがそれぞれ300mm以上開放できること", "B. 有効幅および有効高さがそれぞれ270mm以上開放できること", "C. 有効幅200mm以上、有効高さ270mm以上開放できること", "D. 有効幅および有効高さがそれぞれ200mm以上開放できること"],answer:"B",exp:"第155条第1項第4号の規定により、運転者席の側面の窓は簡易な操作により有効幅及び有効高さがそれぞれ270mm以上開放できる構造のものであること。"},
  {no:6441,section:"保安基準細目",label:"第159条（乗車定員及び最大積載量）",q:"連続した座席の座席定員の計算方法（幼児専用車以外）として正しいものはどれか。",choices:["A. 座席の幅を27cmで除して得た整数値", "B. 座席の幅を40cmで除して得た整数値", "C. 座席の幅を50cmで除して得た整数値", "D. 座席の幅を35cmで除して得た整数値"],answer:"B",exp:"第159条第1項第2号イの規定により、幼児専用車以外の自動車にあっては、連続した座席の座席定員は当該座席の幅を40cmで除して得た整数値とする（幼児専用車は27cm）。"},
  {no:6442,section:"保安基準細目",label:"第159条（乗車定員及び最大積載量）",q:"立席定員の計算方法として正しいものはどれか。",choices:["A. 立席面積の合計を0.20m²で除して得た整数値", "B. 立席面積の合計を0.14m²で除して得た整数値", "C. 立席面積の合計を0.10m²で除して得た整数値", "D. 立席面積の合計を0.25m²で除して得た整数値"],answer:"B",exp:"第159条第1項第3号の規定により、立席定員は立席面積の合計を0.14m²で除して得た整数値とする。"},
  {no:6443,section:"保安基準細目",label:"第162条（長さ、幅及び高さ）",q:"自動車の長さ・幅・高さの測定に関して、測定値の単位および端数の扱いとして正しいものはどれか。",choices:["A. 単位はmmとし、1mm未満は切り捨て", "B. 単位はmとし、0.01m未満は切り捨て", "C. 単位はcmとし、1cm未満は切り捨て", "D. 単位はcmとし、0.5cm未満は切り捨て"],answer:"C",exp:"第162条第2項の規定により、自動車の長さ、幅、高さの測定値は単位はcmとし、1cm未満は切り捨てるものとする。"},
  {no:6444,section:"保安基準細目",label:"第163条（最低地上高）",q:"最低地上高の基準について、自動車の地上高（全面）として正しいものはどれか。",choices:["A. 7cm以上", "B. 10cm以上", "C. 9cm以上", "D. 12cm以上"],answer:"C",exp:"第163条第2号ロ（1）の規定により、自動車の地上高（全面）は9cm以上であること。"},
  {no:6445,section:"保安基準細目",label:"第164条（安定性）",q:"自動車の安定性に関し、かじ取り車輪の接地部にかかる荷重の総和は、車両重量及び車両総重量のそれぞれ何％以上でなければならないか（三輪自動車以外）。",choices:["A. 15%以上", "B. 18%以上", "C. 20%以上", "D. 25%以上"],answer:"C",exp:"第164条第1号の規定により、空車状態及び積車状態におけるかじ取り車輪の接地部にかかる荷重の総和が、それぞれ車両重量及び車両総重量の20%（三輪自動車にあっては18%）以上であること。"},
  {no:6446,section:"保安基準細目",label:"第164条（安定性）",q:"自動車（二輪・被牽引自動車を除く）を傾けた場合に転覆しない傾き角度の基準（一般自動車）として正しいものはどれか。",choices:["A. 左右それぞれ25°まで", "B. 左右それぞれ30°まで", "C. 左右それぞれ35°まで", "D. 左右それぞれ40°まで"],answer:"C",exp:"第164条第4号の規定により、空車状態において自動車を左側及び右側にそれぞれ35°（側車付二輪自動車は25°、一部の自動車は30°）まで傾けた場合に転覆しないこと。"},
  {no:6447,section:"保安基準細目",label:"第165条（接地部及び接地圧）",q:"空気入りゴムタイヤの接地圧の基準として正しいものはどれか。",choices:["A. タイヤ接地部の幅1cmあたり150kgを超えないこと", "B. タイヤ接地部の幅1cmあたり200kgを超えないこと", "C. タイヤ接地部の幅1cmあたり300kgを超えないこと", "D. タイヤ接地部の幅1cmあたり100kgを超えないこと"],answer:"B",exp:"第165条第3号の規定により、空気入りゴムタイヤ又は接地部の厚さ25mm以上の固形ゴムタイヤについては、その接地圧はタイヤの接地部の幅1cmあたり200kgを超えないこと。"},
  {no:6448,section:"保安基準細目",label:"第165条（接地部及び接地圧）",q:"カタピラの接地圧の基準として正しいものはどれか。",choices:["A. カタピラの接地面積1cm²あたり3kgを超えないこと", "B. カタピラの接地面積1cm²あたり5kgを超えないこと", "C. カタピラの接地面積1cm²あたり2kgを超えないこと", "D. カタピラの接地面積1cm²あたり10kgを超えないこと"],answer:"A",exp:"第165条第4号の規定により、カタピラについてはその接地圧はカタピラの接地面積1cm²あたり3kgを超えないこと。"},
  {no:6501,section:"保安基準細目",label:"第166条（原動機及び動力伝達装置）",q:"原動機及び動力伝達装置に関する第166条の基準において、次のうち「この基準に適合しないもの」として明示されていないものはどれか。",choices:["A. 原動機の始動が著しく困難なもの", "B. エア・クリーナが取り外されているもの", "C. ファンベルト等に著しい緩み又は損傷があるもの", "D. 燃料フィルタが目詰まりしているもの"],answer:"D",exp:"第166条第1項第1号に列挙される不適合例はイ〜ソまで規定されており、燃料フィルタの目詰まりは列挙されていない。始動困難（イ）、エア・クリーナ取り外し（ニ）、ファンベルト緩み・損傷（ト）は明示されている。"},
  {no:6502,section:"保安基準細目",label:"第166条（原動機及び動力伝達装置）",q:"速度抑制装置に関し、第166条第2項の規定で「確認ランプ等が装備されていない場合」に必要な措置として正しいものはどれか。",choices:["A. 速度抑制装置の設定速度を車室内に表示すること", "B. 速度抑制装置の封印等当該装置の機能を損なう改変を防止する措置が自動車に適正に施されていること", "C. 公的試験機関による試験成績書を常時携帯すること", "D. 速度抑制装置の機能を確認できる外部診断機を備えること"],answer:"B",exp:"第166条第2項第1号イただし書により、確認ランプ等が装備されていないものにあっては、速度抑制装置の封印等当該装置の機能を損なう改変を防止する措置が自動車に適正に施されていることが求められる。"},
  {no:6503,section:"保安基準細目",label:"第166条（原動機及び動力伝達装置）",q:"第166条第1項第2号の車載式燃料・電力消費等測定装置の義務対象から除外される自動車として、正しいものはどれか。",choices:["A. 乗用車で乗車定員9人のもの", "B. 貨物の運送の用に供する自動車（三輪自動車を除く）", "C. 軽自動車（二輪自動車（側車付二輪自動車を含む）に限る）", "D. 普通乗用車で車両総重量3.5t以下のもの"],answer:"C",exp:"第166条第1項第2号では、軽自動車（二輪自動車（側車付二輪自動車を含む）に限る）、カタピラ及びそりを有する軽自動車、大型特殊自動車、小型特殊自動車並びに被牽引自動車が除外対象として列挙されている。"},
  {no:6504,section:"保安基準細目",label:"第167条（走行装置）",q:"第167条第4項第2号に規定するタイヤの滑り止めの溝の深さについて、一般の自動車（最高速度40km/h以上）に要求される深さとして正しいものはどれか。",choices:["A. 0.8mm以上", "B. 1.6mm以上", "C. 2.4mm以上", "D. 3.2mm以上"],answer:"B",exp:"第167条第4項第2号により、タイヤの滑り止めの溝の深さは1.6mm（二輪自動車及び側車付二輪自動車に備えるものにあっては0.8mm）以上でなければならない。"},
  {no:6505,section:"保安基準細目",label:"第167条（走行装置）",q:"第167条第4項第2号で、ラグ型タイヤの滑り止めの溝の深さを判定する範囲として正しいものはどれか。",choices:["A. タイヤ接地部の全幅にわたる部分", "B. タイヤ接地部の中心線からそれぞれ全幅の4分の1の範囲", "C. タイヤ接地部の中心線からそれぞれ全幅の3分の1の範囲", "D. タイヤ接地部の両端から全幅の10％以内の範囲"],answer:"B",exp:"第167条第4項第2号により、ラグ型タイヤにあっては空気入ゴムタイヤの接地部の中心線からそれぞれ全幅の4分の1の範囲が滑り止めの溝深さの判定範囲とされている。"},
  {no:6506,section:"保安基準細目",label:"第167条（走行装置）",q:"第167条第5項のタイヤ空気圧監視装置の義務付け対象から除外される自動車として正しいものはどれか。",choices:["A. 専ら乗用の用に供する乗車定員10人未満で車両総重量3.5tを超える自動車", "B. 貨物の運送の用に供する三輪自動車", "C. 専ら乗用の用に供する乗車定員9人で車両総重量3.0tの自動車", "D. 貨物の運送の用に供する車両総重量5.0tの自動車"],answer:"B",exp:"第167条第5項により、三輪自動車はタイヤ空気圧監視装置の義務付け対象から除外されている。乗用車で車両総重量3.5t超や三輪自動車は除外対象に明記されている。"},
  {no:6507,section:"保安基準細目",label:"第168条（操縦装置）",q:"第168条第1項第1号により、側車付二輪自動車等に備える操作装置の配置として、かじ取ハンドルの中心から左右それぞれ何mm以内に配置されなければならないか。",choices:["A. 300mm以内", "B. 400mm以内", "C. 500mm以内", "D. 600mm以内"],answer:"C",exp:"第168条第1項第1号により、保安基準第10条各号に掲げる装置はかじ取ハンドルの中心から左右にそれぞれ500mm以内に配置されなければならない。"},
  {no:6508,section:"保安基準細目",label:"第168条（操縦装置）",q:"第168条第1項第5号で「運転者が運転者席において容易に識別できるような表示」の定義として正しいものはどれか。",choices:["A. 運転者が運転者席に着席した状態で通常の姿勢で見える位置に文字、数字又は記号で表示されたもの", "B. 運転者が運転者席に着席した状態で著しく無理な姿勢をとらずに見える位置に文字、数字又は記号により表示されたもの", "C. 運転者が運転者席に着席した状態で前方を向いた状態で確認できる位置に記号で表示されたもの", "D. 運転者が運転者席の前面パネルにて確認できる位置にシンボルマークで表示されたもの"],answer:"B",exp:"第168条第1項第5号により、「運転者が運転者席において容易に識別できるような表示」とは、運転者が運転者席に着席した状態で著しく無理な姿勢をとらずに見える位置に文字、数字又は記号により、当該装置を容易に判別できる表示をしたものをいう。"},
  {no:6509,section:"保安基準細目",label:"第169条（かじ取装置）",q:"第169条第1項第1号ルの規定で、4輪以上の自動車のかじ取車輪をサイドスリップ・テスタで計測した場合の許容横滑り量として正しいものはどれか。",choices:["A. 走行1mについて3mmを超えないもの", "B. 走行1mについて5mmを超えないもの", "C. 走行1mについて7mmを超えないもの", "D. 走行1mについて10mmを超えないもの"],answer:"B",exp:"第169条第1項第1号ルにより、4輪以上の自動車のかじ取車輪をサイドスリップ・テスタを用いて計測した場合の横滑り量が走行1mについて5mmを超えるものは基準不適合となる。"},
  {no:6510,section:"保安基準細目",label:"第169条（かじ取装置）",q:"第169条第1項第2号で、パワ・ステアリングを装着していない自動車（最高速度20km/h未満を除く）において基準不適合とされるかじ取車輪の輪荷重の総和として正しいものはどれか。",choices:["A. 3,500kg以上", "B. 4,000kg以上", "C. 4,700kg以上", "D. 5,000kg以上"],answer:"C",exp:"第169条第1項第2号により、パワ・ステアリングを装着していない自動車（最高速度が20km/h未満の自動車を除く）であって、かじ取車輪の輪荷重の総和が4,700kg以上であるものは基準に適合しないものとされる。"},
  {no:6511,section:"保安基準細目",label:"第170条（施錠装置等）",q:"第170条第1項第1号ロで、制動装置に備える施錠装置の構造として正しいものはどれか。",choices:["A. その作動により、原動機その他運行に必要な装置の機能を確実に停止させることができる構造", "B. その作動により、当該自動車の車輪を確実に停止させることができる構造", "C. その作動により、施錠装置を備えた装置の機能を確実に停止させることができる構造", "D. その作動により、かじ取装置の機能を確実に停止させることができる構造"],answer:"B",exp:"第170条第1項第1号ロにより、制動装置に備える施錠装置は、その作動により当該自動車の車輪を確実に停止させることができる構造でなければならない。"},
  {no:6512,section:"保安基準細目",label:"第170条（施錠装置等）",q:"第170条第3項第5号でイモビライザの設定又は設定解除を灯光により通知する場合、方向指示器の点灯又は点滅時間の上限として正しいものはどれか。",choices:["A. 1秒を超えないもの", "B. 2秒を超えないもの", "C. 3秒を超えないもの", "D. 5秒を超えないもの"],answer:"C",exp:"第170条第3項第5号により、イモビライザの設定又は設定解除を灯光により通知する場合、方向指示器の点灯又は点滅時間は3秒を超えないものでなければならない。"},
  {no:6513,section:"保安基準細目",label:"第170条（施錠装置等）",q:"第170条第1項第1号ロ及び第3号の規定が適用されない自動車として正しいものはどれか。",choices:["A. 大型特殊自動車及び小型特殊自動車", "B. 二輪自動車、側車付二輪自動車並びにカタピラ及びそりを有する軽自動車", "C. 被牽引自動車及び軽自動車", "D. 三輪自動車及び大型特殊自動車"],answer:"B",exp:"第170条第1項ただし書により、第1号ロ及び第3号の規定は二輪自動車、側車付二輪自動車並びにカタピラ及びそりを有する軽自動車には適用しない。"},
  {no:6514,section:"保安基準細目",label:"第171条（制動装置）",q:"第171条第2項第6号で、主制動装置の回転部分及びしゅう動部分の間のすき間の自動調整が免除される自動車として正しいものはどれか。",choices:["A. 車両総重量3.5t以下の乗用車の後車輪に備える主制動装置", "B. 車両総重量3.5t以下の自動車（専ら乗用を除く）の後車輪に備える主制動装置", "C. 車両総重量5t以下の全ての自動車の後車輪に備える主制動装置", "D. 全ての自動車の前車輪に備える主制動装置"],answer:"B",exp:"第171条第2項第6号イにより、車両総重量3.5t以下の自動車（専ら乗用の用に供する自動車を除く）の後車輪に備える主制動装置は、すき間の自動調整要件が免除される。"},
  {no:6515,section:"保安基準細目",label:"第171条（制動装置）",q:"第171条第2項第3号で「主制動装置はすべての車輪を制動すること」とされているが、「車輪を制動する」とみなされる構造として正しいものはどれか。",choices:["A. ブレーキ・ドラムが車輪と接触している構造", "B. ブレーキ・ディスク等の制動力作用面がボルト、軸、歯車等の強固な部品により車輪と結合されている構造", "C. ブレーキ・パッドが直接タイヤと接触する構造", "D. ブレーキ・ホースが車軸に取り付けられている構造"],answer:"B",exp:"第171条第2項第3号により、ブレーキ・ディスク、ブレーキ・ドラム等の制動力作用面がボルト、軸、歯車等の強固な部品により車輪と結合されている構造は、「車輪を制動する」とされる。"},
  {no:6516,section:"保安基準細目",label:"第172条（牽引自動車及び被牽引自動車の制動装置）",q:"第172条第3項により、主制動装置を省略することができる被牽引自動車が連結される牽引自動車の最高速度の条件として正しいものはどれか。",choices:["A. 最高速度20km/h以下の牽引自動車", "B. 最高速度25km/h以下の牽引自動車", "C. 最高速度30km/h以下の牽引自動車", "D. 最高速度35km/h以下の牽引自動車"],answer:"B",exp:"第172条第3項により、最高速度25km/h以下の牽引自動車により牽引される被牽引自動車にあっては、牽引する牽引自動車の主制動装置のみで所定の基準に適合する場合、主制動装置を省略することができる。"},
  {no:6517,section:"保安基準細目",label:"第172条（牽引自動車及び被牽引自動車の制動装置）",q:"第172条第6項で、牽引自動車と被牽引自動車の主制動装置の連動に関し正しいものはどれか。",choices:["A. 牽引自動車の主制動装置を操作してから一定時間後に被牽引自動車の主制動装置が作用する構造であればよい", "B. 牽引自動車の主制動装置を操作したときに、直ちに被牽引自動車の主制動装置が作用する構造でなければならない", "C. 被牽引自動車の主制動装置は牽引自動車とは独立して作動する構造であればよい", "D. 牽引自動車の主制動装置と被牽引自動車の主制動装置は同時に操作できる構造であればよい"],answer:"B",exp:"第172条第6項により、牽引自動車の主制動装置を操作したときに、直ちに被牽引自動車の主制動装置が作用する構造でなければならない（接近作用式を除く）。"},
  {no:6518,section:"保安基準細目",label:"第173条（緩衝装置）",q:"第173条第2項に列挙される緩衝装置の基準不適合例として正しいものはどれか。",choices:["A. ショック・アブソーバに著しい液漏れ、ガス漏れ若しくは損傷があり、又は取付部に緩みがあるもの", "B. ショック・アブソーバを2個以上備えているもの", "C. ばねの長さが製造メーカー規定値より10%短いもの", "D. 緩衝装置に防錆塗装が施されていないもの"],answer:"A",exp:"第173条第2項第10号により、ショック・アブソーバに著しい液漏れ、ガス漏れ若しくは損傷があり、又は取付部に緩みがあるものは基準不適合とされる。"},
  {no:6519,section:"保安基準細目",label:"第173条（緩衝装置）",q:"第173条第2項第15号で改造を行ったことにより基準不適合とされるものとして正しいものはどれか。",choices:["A. ばねを交換したことにより車高が変化したもの", "B. 切断等によりばねの一部又は全部を除去したもの", "C. ショック・アブソーバを強化型に交換したもの", "D. スタビライザを社外品に交換したもの"],answer:"B",exp:"第173条第2項第15号イにより、切断等によりばねの一部又は全部を除去したものは基準不適合とされる。"},
  {no:6520,section:"保安基準細目",label:"第174条（燃料装置）",q:"第174条第1項第2号ロで、燃料タンクの注入口及びガス抜口が露出した電気端子及び電気開閉器から離れていなければならない距離として正しいものはどれか。",choices:["A. 100mm以上", "B. 150mm以上", "C. 200mm以上", "D. 300mm以上"],answer:"C",exp:"第174条第1項第2号ロにより、燃料タンクの注入口及びガス抜口は、露出した電気端子及び電気開閉器から200mm以上離れていなければならない。"},
  {no:6521,section:"保安基準細目",label:"第174条（燃料装置）",q:"第174条第3項（燃料漏れ防止に係る性能）の適用除外自動車として正しいものはどれか。",choices:["A. 乗車定員11人以上の自動車", "B. 乗車定員10人以下の乗用車", "C. 車両総重量3.5t以下の貨物自動車", "D. 最高速度50km/h以上の乗用車"],answer:"A",exp:"第174条第3項により、乗車定員11人以上の自動車、貨物の運送の用に供する自動車であって車両総重量が3.5tを超える自動車、二輪自動車等は衝突時の燃料漏れ防止性能規定の適用除外となる。"},
  {no:6522,section:"保安基準細目",label:"第175条（発生炉ガスを燃料とする自動車の燃料装置）",q:"第175条第3号で、ガス発生炉と防熱壁との間隔の要件として正しいものはどれか。",choices:["A. 30mm以上", "B. 50mm以上", "C. 100mm以上", "D. 150mm以上"],answer:"B",exp:"第175条第3号により、発生炉ガスを燃料とする自動車において、ガス発生炉と防熱壁との間隔は50mm以上でなければならない。"},
  {no:6523,section:"保安基準細目",label:"第176条（高圧ガスを燃料とする自動車の燃料装置）",q:"第176条第1項第3号で、ガス容器の取付場所として正しいものはどれか。",choices:["A. 座席又は立席のある車室内に設置してもよい", "B. 車体外に取り付けるものを除き、座席又は立席のある車室と気密な隔壁で仕切られ、車体外と通気が十分な場所に取り付けられていること", "C. トランクルーム内であればどこでも設置できる", "D. 車室内の床下に隔壁なしで設置できる"],answer:"B",exp:"第176条第1項第3号により、ガス容器は車体外に取り付けるものを除き、座席又は立席のある車室と気密な隔壁で仕切られ、車体外と通気が十分な場所に取り付けられていなければならない。"},
  {no:6524,section:"保安基準細目",label:"第176条（高圧ガスを燃料とする自動車の燃料装置）",q:"第176条第1項第1号イにおいて、容器再検査を受けたことのないガス容器として適合するものとして正しいものはどれか。",choices:["A. 製造から10年以内であることが確認できるもの", "B. 容器保安規則第7条及び第17条に規定する構造及び機能を有するもの", "C. メーカーの保証書が添付されているもの", "D. 使用されたことがない新品であること"],answer:"B",exp:"第176条第1項第1号イ(1)により、容器再検査を受けたことのないガス容器の適合条件の一つとして、容器保安規則第7条及び第17条に規定する構造及び機能を有するものが挙げられている。"},
  {no:6525,section:"保安基準細目",label:"第177条（電気装置）",q:"第177条第1項第1号で、車室内等の電気配線に求められる要件として正しいものはどれか。",choices:["A. 被覆され、かつ、車体に定着されていること", "B. 被覆され、かつ、可動式であること", "C. 絶縁素材で覆われ、かつ、着脱可能であること", "D. 難燃材で覆われ、かつ、金属管で保護されていること"],answer:"A",exp:"第177条第1項第1号により、車室内等の電気配線は被覆され、かつ、車体に定着されていることが求められる。"},
  {no:6526,section:"保安基準細目",label:"第177条（電気装置）",q:"第177条第5項第1号で、動力系の活電部への人体接触保護が求められる作動電圧の閾値として正しいものはどれか。",choices:["A. 直流48V又は交流24V（実効値）を超える部分", "B. 直流60V又は交流30V（実効値）を超える部分", "C. 直流100V又は交流50V（実効値）を超える部分", "D. 直流60V又は交流60V（実効値）を超える部分"],answer:"B",exp:"第177条第5項第1号により、作動電圧が直流60V又は交流30V（実効値）を超える部分を有する動力系の活電部への人体の接触に対する保護が求められる。"},
  {no:6527,section:"保安基準細目",label:"第178条（車枠及び車体）",q:"第178条第1項の車枠及び車体の基準として誤っているものはどれか。",choices:["A. 車枠及び車体は、堅ろうで運行に十分耐えるものであること", "B. 車体は、車枠に確実に取り付けられ、振動、衝撃等によりゆるみを生じないようになっていること", "C. 車枠及び車体は、著しく損傷していないこと", "D. 車枠は、車体よりも必ず高強度の材料で製造されていること"],answer:"D",exp:"第178条第1項では「堅ろうで運行に十分耐えること」「確実に取り付けられていること」「著しく損傷していないこと」の3要件が規定されているが、材料の比較強度については規定されていない。"},
  {no:6528,section:"保安基準細目",label:"第178条（車枠及び車体）",q:"第178条第2項で、専ら乗用の用に供する自動車（乗車定員10人以下）に備えるエア・スポイラの要件について、エア・スポイラが「自動車の最前端又は最後端とならない」という条件の例外として認められる場合として正しいものはどれか。",choices:["A. バンパの下端より下方にある部分の角部が半径5mm以上であるもの又は角部の硬さが60ショア（A）以下のもの", "B. エア・スポイラが樹脂製であるもの", "C. エア・スポイラの高さが地上50mm以下のもの", "D. エア・スポイラが着脱可能な構造であるもの"],answer:"A",exp:"第178条第2項第3号イただし書により、バンパの下端より下方にある部分であって、直径100mmの球体が静的に接触することのできる部分の角部が半径5mm以上であるもの又は角部の硬さが60ショア（A）以下の場合は、最前端・最後端となることが許容される。"},
  {no:6529,section:"保安基準細目",label:"第179条（巻込防止装置）",q:"第179条第4項第1号で、空車状態における巻込防止装置の下縁の高さの上限として正しいものはどれか。",choices:["A. 地上300mm以下", "B. 地上400mm以下", "C. 地上450mm以下", "D. 地上550mm以下"],answer:"C",exp:"第179条第4項第1号により、巻込防止装置は空車状態において、その下縁の高さが地上450mm以下、その上縁の高さが地上650mm以上となるように取り付けられていなければならない。"},
  {no:6530,section:"保安基準細目",label:"第179条（巻込防止装置）",q:"第179条第4項第2号で、巻込防止装置の平面部の上縁と荷台等との間隔の上限として基準に適合するとされる値として正しいものはどれか。",choices:["A. 400mm以下", "B. 500mm以下", "C. 550mm以下", "D. 650mm以下"],answer:"C",exp:"第179条第4項第2号により、巻込防止装置の平面部の上縁と荷台等との間隔が550mm以下となるように取り付けられている巻込防止装置は基準に適合するものとされる。"},
  {no:6531,section:"保安基準細目",label:"第179条（巻込防止装置）",q:"第179条第4項第3号で、巻込防止装置の平面部前端から前輪タイヤ最後部まで及び平面部後端から後輪タイヤ最前部までの距離の上限として正しいものはどれか。",choices:["A. 200mm以下", "B. 300mm以下", "C. 400mm以下", "D. 500mm以下"],answer:"C",exp:"第179条第4項第3号により、巻込防止装置の平面部前端から前輪タイヤの最後部まで、及び平面部後端から後輪タイヤの最前部までの距離は400mm以下でなければならない。"},
  {no:6532,section:"保安基準細目",label:"第180条（突入防止装置）",q:"第180条第1項第2号で、貨物の運送の用に供する車両総重量3.5t超の自動車の突入防止装置の平面部断面の高さの最低値（原則）として正しいものはどれか。",choices:["A. 80mm以上", "B. 100mm以上", "C. 120mm以上", "D. 150mm以上"],answer:"C",exp:"第180条第1項第2号により、貨物の運送の用に供する自動車であって車両総重量が3.5tを超えるもの及びポール・トレーラの突入防止装置の平面部断面の高さは120mm（一定の自動車にあっては100mm）以上でなければならない。"},
  {no:6533,section:"保安基準細目",label:"第180条（突入防止装置）",q:"第180条第2項第2号ロで、突入防止装置の省略が認められる車体後面の構造部の下縁の高さの上限（一般の場合）として正しいものはどれか。",choices:["A. 空車状態において地上450mm以下", "B. 空車状態において地上550mm以下", "C. 空車状態において地上600mm以下", "D. 空車状態において地上650mm以下"],answer:"B",exp:"第180条第2項第2号ロにより、車体後面の構造部の下縁の高さが空車状態において地上550mm以下であることが突入防止装置の省略要件の一つとして規定されている。"},
  {no:6534,section:"保安基準細目",label:"第181条（連結装置）",q:"第181条第2項で、連結装置に含まれないとされるものとして正しいものはどれか。",choices:["A. セミトレーラのカプラ", "B. フルトレーラの連結棒", "C. 貨物自動車等の車枠の先端に設けられた被牽引自動車を牽引することを目的としない応急用の牽引こう等", "D. ポール・トレーラの連結装置"],answer:"C",exp:"第181条第2項により、貨物自動車等の車枠の先端に設けられた被牽引自動車を牽引することを目的としない応急用の牽引こう等は、連結装置に含まないものとされている。"},
  {no:6535,section:"保安基準細目",label:"第182条（乗車装置）",q:"第182条第1項第1号ハで、消防自動車の立席として基準に適合するものとして正しいものはどれか。",choices:["A. 握り棒及び滑り止めを施した踏板（奥行20cm以上）を有するもの", "B. 握り棒及び滑り止めを施した踏板（奥行30cm以上）を有するもの", "C. つり革及び滑り止めを施した踏板（奥行30cm以上）を有するもの", "D. 握り棒及び安全ベルトを有するもの"],answer:"B",exp:"第182条第1項第1号ハにより、消防自動車の立席であって、握り棒及び滑り止めを施した踏板（奥行30cm以上）を有するものは基準に適合するものとされる。"},
  {no:6536,section:"保安基準細目",label:"第182条（乗車装置）",q:"第182条第3項で、「内装」とされないものとして正しいものはどれか。",choices:["A. 車体に固定されているもの", "B. 表面の寸法が長さ293mm又は幅25mmに満たないもの", "C. 難燃材料で製造されているもの", "D. 運転席周辺に設置されているもの"],answer:"B",exp:"第182条第3項第2号により、表面の寸法が長さ293mm又は幅25mmに満たないものは「内装」とされないものとする。また第1号により車体に固定されていないものも内装から除外される。"},
  {no:6537,section:"保安基準細目",label:"第183条（運転者席）",q:"第183条第1項第1号イで、運転者が確認できることが求められる障害物の大きさとして正しいものはどれか。",choices:["A. 高さ0.5m直径20cmの円柱", "B. 高さ1m直径30cmの円柱", "C. 高さ1.5m直径25cmの円柱", "D. 高さ0.8m直径30cmの円柱"],answer:"B",exp:"第183条第1項第1号イにより、運転者が鏡等を用いずに直接確認できることが求められる障害物は「高さ1m直径30cmの円柱」とされている。"},
  {no:6538,section:"保安基準細目",label:"第183条（運転者席）",q:"第183条第1項第1号イ(1)及び(2)で規定される運転者視野確認範囲の前方鉛直面の距離として正しいものはどれか。",choices:["A. 当該自動車の前面から1.5mと2.0mの距離にある鉛直面", "B. 当該自動車の前面から2mと2.3mの距離にある鉛直面", "C. 当該自動車の前面から2.5mと3.0mの距離にある鉛直面", "D. 当該自動車の前面から1.0mと2.0mの距離にある鉛直面"],answer:"B",exp:"第183条第1項第1号イ(1)(2)により、当該自動車の前面から2mの距離にある鉛直面と当該自動車の前面から2.3mの距離にある鉛直面の間の範囲が規定されている。"},
  {no:6539,section:"保安基準細目",label:"第184条（座席）",q:"第184条第1項第2号で、1人の乗客に要求される座席の最小幅として正しいものはどれか。",choices:["A. 300mm以上", "B. 350mm以上", "C. 400mm以上", "D. 450mm以上"],answer:"C",exp:"第184条第1項第2号により、自動車の運転者以外の者の用に供する座席（一定の除外を除く）は、1人につき幅400mm以上の着席するに必要な空間を有することが求められる。"},
  {no:6540,section:"保安基準細目",label:"第184条（座席）",q:"第184条第1項第6号イで、乗車定員11人以上の自動車（緊急自動車を除く）の座席について前方座席等との間隔として要求される距離として正しいものはどれか。",choices:["A. 100mm以上", "B. 150mm以上", "C. 200mm以上", "D. 250mm以上"],answer:"C",exp:"第184条第1項第6号イにより、乗車定員11人以上の自動車（緊急自動車を除く）の座席（幼児専用車の幼児用座席を除く）は、前方の座席、隔壁等と200mm以上の間げきを有することが求められる。"},
  {no:6541,section:"保安基準細目",label:"第184条（座席）",q:"第184条第1項第6号ロで、幼児専用車の幼児用座席について前方座席等との間隔として要求される距離として正しいものはどれか。",choices:["A. 100mm以上", "B. 150mm以上", "C. 200mm以上", "D. 250mm以上"],answer:"B",exp:"第184条第1項第6号ロにより、幼児専用車の幼児用座席は前方の座席、隔壁等と150mm以上の間げきを有することが求められる。"},
  {no:6542,section:"保安基準細目",label:"第185条（補助座席定員）",q:"第185条の補助座席定員に関する規定として正しいものはどれか。",choices:["A. 補助座席以外の座席の定員が、座席定員の3分の1以上でなければならない", "B. 補助座席以外の座席の定員が、座席定員の2分の1以上でなければならない", "C. 補助座席の定員が、座席定員の3分の1以上でなければならない", "D. 補助座席の定員が、座席定員の2分の1以上でなければならない"],answer:"B",exp:"第185条により、補助座席定員に関しては、第184条第2項第1号イからハまでに掲げる座席以外の座席の定員が座席定員の2分の1以上でなければならないとされている。"},
  {no:6543,section:"保安基準細目",label:"第186条（座席ベルト等）",q:"第186条第3項で「第一種座席ベルト」の定義として正しいものはどれか。",choices:["A. 三点式座席ベルト等少なくとも乗車人員の腰部の移動を拘束し、かつ上半身が前方に倒れることを防止できるもの", "B. 二点式座席ベルト等少なくとも乗車人員の腰部の移動を拘束することができるもの", "C. 四点式座席ベルト等乗車人員の上半身全体を拘束できるもの", "D. 肩ベルトのみで上半身の移動を拘束できるもの"],answer:"B",exp:"第186条第3項により、「第一種座席ベルト」とは二点式座席ベルト等少なくとも乗車人員の腰部の移動を拘束することのできるものをいう。第186条第2項の「第二種座席ベルト」は三点式等で腰部拘束と上半身前倒れ防止ができるものをいう。"},
  {no:6544,section:"保安基準細目",label:"第186条（座席ベルト等）",q:"第186条第4項第3号で、座席ベルトの取付装置が備えられる位置として正しいものはどれか。",choices:["A. 運転者が操作しやすい位置であればよい", "B. 取り付けられる座席ベルトが有効に作用する位置に備えられたものであること", "C. 座席の前方に取り付けられていること", "D. 座席のシート下部に取り付けられていること"],answer:"B",exp:"第186条第4項第3号により、座席ベルトの取付装置は取り付けられる座席ベルトが有効に作用する位置に備えられたものでなければならない。"},
  {no:6545,section:"保安基準細目",label:"第187条（頭部後傾抑止装置）",q:"第187条第1項第4号で頭部後傾抑止装置に求められる要件として正しいものはどれか。",choices:["A. 通常走行中に移動しないものであること", "B. 振動、衝撃により脱落することのないように備えられたものであること", "C. 外力が加わった際に自動的に元の位置に戻るものであること", "D. 高さ調整機能を有するものであること"],answer:"B",exp:"第187条第1項第4号により、頭部後傾抑止装置は振動、衝撃により脱落することのないように備えられたものでなければならない。"},
  {no:6546,section:"保安基準細目",label:"第188条（年少者用補助乗車装置等）",q:"第188条第1項第6号で、年少者用補助乗車装置取付具の個数要件（原則）として正しいものはどれか。",choices:["A. 1個以上備えていること", "B. 2個以上備えていること", "C. 3個以上備えていること", "D. 4個以上備えていること"],answer:"B",exp:"第188条第1項第6号により、年少者用補助乗車装置取付具は2個以上（一定の要件を満たす場合は1個以上）備えていなければならない。"},
  {no:6547,section:"保安基準細目",label:"第188条（年少者用補助乗車装置等）",q:"第188条第1項第6号で年少者用補助乗車装置取付具を1個以上備えればよい要件として正しいものはどれか。",choices:["A. 乗降口が3個以下であること", "B. 乗降口が2個以下であること", "C. 車両重量が1,000kg以下であること", "D. 原動機の最高出力が100kW以下であること"],answer:"B",exp:"第188条第1項第6号イにより、乗降口が2個以下であることが年少者用補助乗車装置取付具を1個以上備えればよい要件の一つとされている。"},
  {no:6548,section:"保安基準細目",label:"第189条（通路）",q:"第189条第1項で、乗車定員11人以上の自動車（緊急自動車を除く）の通路に求められる有効幅として正しいものはどれか。",choices:["A. 200mm以上", "B. 250mm以上", "C. 300mm以上", "D. 350mm以上"],answer:"C",exp:"第189条第1項により、乗車定員11人以上の自動車及び幼児専用車に設ける通路は有効幅300mm以上でなければならない。"},
  {no:6549,section:"保安基準細目",label:"第189条（通路）",q:"第189条第1項で、通路の有効高さを1,200mmとすることができる条件として正しいものはどれか。",choices:["A. 当該通路に係る全ての座席の前縁と最も近い乗降口との車両中心線方向の最短距離が1m未満である場合", "B. 当該通路に係る全ての座席の前縁と最も近い乗降口との車両中心線方向の最短距離が2m未満である場合", "C. 当該通路に係る全ての座席の前縁と最も近い乗降口との車両中心線方向の最短距離が3m未満である場合", "D. 車両総重量が5t以下の自動車の場合"],answer:"B",exp:"第189条第1項により、当該通路に係る全ての座席の前縁と最も近い乗降口との車両中心線方向の最短距離が2m未満である場合は、有効高さを1,200mm以上とすることができる。"},
  {no:6550,section:"保安基準細目",label:"第190条（立席）",q:"第190条第5項で、立席人員1人の占める広さとして告示で定める面積として正しいものはどれか。",choices:["A. 0.10m²", "B. 0.12m²", "C. 0.14m²", "D. 0.16m²"],answer:"C",exp:"第190条第5項により、立席人員1人の占める広さに関し告示で定める面積は0.14m²とされている。"},
  {no:6551,section:"保安基準細目",label:"第190条（立席）",q:"第190条第1項で、立席を設けることができる床面の有効高さとして正しいものはどれか。",choices:["A. 有効高さ1,600mm以上", "B. 有効高さ1,800mm以上", "C. 有効高さ2,000mm以上", "D. 有効高さ1,500mm以上"],answer:"B",exp:"第190条第1項により、立席を設けることができる床面は、客室内の有効幅300mm以上、有効高さ1,800mm以上の専ら座席の用に供する床面以外の床面とされている。"},
  {no:6552,section:"保安基準細目",label:"第191条（乗降口）",q:"第191条第2項第1号で、乗降口の有効幅の最低値として正しいものはどれか。",choices:["A. 400mm以上", "B. 500mm以上", "C. 600mm以上", "D. 700mm以上"],answer:"C",exp:"第191条第2項第1号により、乗降口の有効幅は600mm以上でなければならない。"},
  {no:6553,section:"保安基準細目",label:"第191条（乗降口）",q:"第191条第2項第3号イで、乗車定員11人以上23人以下の旅客自動車運送事業用自動車（車両総重量5t以下）の踏段の一段の高さとして正しいものはどれか。",choices:["A. 100mm以上200mm（最下段は400mm）以下", "B. 120mm以上250mm（最下段は430mm）以下", "C. 100mm以上250mm（最下段は500mm）以下", "D. 150mm以上300mm（最下段は450mm）以下"],answer:"B",exp:"第191条第2項第3号イにより、乗車定員11人以上23人以下の旅客自動車運送事業用自動車（車両総重量5t以下）の踏段の一段の高さは120mm以上250mm（最下段の踏段にあっては空車状態において430mm）以下とされている。"},
  {no:6554,section:"保安基準細目",label:"第191条（乗降口）",q:"第191条第3項第1号で、幼児専用車の乗降口の踏段の一段の高さとして正しいものはどれか。",choices:["A. 一段の高さが150mm（最下段は250mm）以下", "B. 一段の高さが200mm（最下段は300mm）以下", "C. 一段の高さが250mm（最下段は350mm）以下", "D. 一段の高さが200mm（最下段は400mm）以下"],answer:"B",exp:"第191条第3項第1号により、幼児専用車の乗降口の踏段は、一段の高さが200mm（最下段は300mm）以下であり、有効奥行が200mm以上でなければならない。"},
  {no:6555,section:"保安基準細目",label:"第192条（非常口）",q:"第192条第1項第2号で、乗車定員30人以上の自動車の非常口に要求される有効幅と有効高さ（原則）として正しいものはどれか。",choices:["A. 有効幅300mm以上、有効高さ1,000mm以上", "B. 有効幅350mm以上、有効高さ1,100mm以上", "C. 有効幅400mm以上、有効高さ1,200mm以上", "D. 有効幅500mm以上、有効高さ1,400mm以上"],answer:"C",exp:"第192条第1項第2号により、乗車定員30人以上の自動車の非常口は有効幅400mm以上、有効高さ1,200mm以上でなければならない（第3号及び第4号の場合を除く）。"},
  {no:6556,section:"保安基準細目",label:"第192条（非常口）",q:"第192条第1項第5号で、乗車定員30人未満の幼児専用車の非常口に要求される有効幅と有効高さとして正しいものはどれか。",choices:["A. 有効幅250mm以上、有効高さ900mm以上", "B. 有効幅300mm以上、有効高さ1,000mm以上", "C. 有効幅350mm以上、有効高さ1,100mm以上", "D. 有効幅400mm以上、有効高さ1,200mm以上"],answer:"B",exp:"第192条第1項第5号により、乗車定員30人未満の幼児専用車の非常口は有効幅300mm以上、有効高さ1,000mm以上でなければならない。"},
  {no:6557,section:"保安基準細目",label:"第192条（非常口）",q:"第192条第2項で、非常口の位置を灯火により表示する場合、その灯火の色として正しいものはどれか。",choices:["A. 赤色", "B. 黄色", "C. 白色", "D. 緑色"],answer:"D",exp:"第192条第2項により、灯火により非常口の位置を表示するときは、その灯火の色は緑色でなければならない。"},
  {no:6558,section:"保安基準細目",label:"第192条（非常口）",q:"第192条第1項第1号で、非常口を設ける場所として正しいものはどれか。",choices:["A. 客室の左側面の後部又は後面", "B. 客室の右側面の後部又は後面", "C. 客室の前面又は左側面の後部", "D. 客室の右側面の前部又は後面"],answer:"B",exp:"第192条第1項第1号により、非常口は客室の右側面の後部（客室の右側面のうち客室の長手方向の中央より後方の部分をいう）又は後面に設けられていなければならない。"},
  {no:6559,section:"保安基準細目",label:"第193条（物品積載装置）",q:"第193条第1項第2号で、専ら砂利・土砂の運搬に用いる普通自動車の傾斜荷台において基準不適合となる、最大積載量を荷台容積で除した値の上限として正しいものはどれか。",choices:["A. 1.0t/m³未満", "B. 1.3t/m³未満", "C. 1.5t/m³未満", "D. 2.0t/m³未満"],answer:"C",exp:"第193条第1項第2号により、専ら砂利・土砂の運搬に用いる普通自動車の荷台（傾斜するものに限る）において、最大積載量を荷台容積で除した数値が1.5t/m³未満のものは基準不適合となる（小型自動車は1.3t/m³）。"},
  {no:6560,section:"保安基準細目",label:"第194条（高圧ガス運送装置）",q:"第194条第7号で、高圧ガス運送装置の圧力計の目盛として正しいものはどれか。",choices:["A. 零からガス充填圧力の1.0倍以上1.5倍以下までの目盛", "B. 零からガス充填圧力の1.5倍以上2倍以下までの目盛", "C. 零からガス充填圧力の2倍以上3倍以下までの目盛", "D. 零からガス充填圧力の1.2倍以上1.8倍以下までの目盛"],answer:"B",exp:"第194条第7号により、高圧ガス運送装置の圧力計は零からガス充填圧力の1.5倍以上2倍以下までの目盛をしたものでなければならない。"},
  {no:6561,section:"保安基準細目",label:"第195条（窓ガラス）",q:"第195条第3項第2号で、前面ガラス及び側面ガラスの可視光線透過率の最低値として正しいものはどれか。",choices:["A. 50%以上", "B. 60%以上", "C. 70%以上", "D. 80%以上"],answer:"C",exp:"第195条第3項第2号により、運転者が交通状況を確認するために必要な視野の範囲に係る部分における可視光線の透過率は70%以上でなければならない。"},
  {no:6562,section:"保安基準細目",label:"第195条（窓ガラス）",q:"第195条第1項で規定される安全ガラスの種類として含まれないものはどれか。",choices:["A. 合わせガラス", "B. 強化ガラス", "C. 有機ガラス（ポリカーボネート材等）", "D. 網入りガラス"],answer:"D",exp:"第195条第1項により、安全ガラスとは合わせガラス、強化ガラス、部分強化ガラス、有機ガラス（ポリカーボネート材又はメタクリル材等の硬質合成樹脂材をいう）又はガラス－プラスチックとされており、網入りガラスは列挙されていない。"},
  {no:6563,section:"保安基準細目",label:"第196条（自動車の騒音防止装置）",q:"第196条第1項第1号で、定常走行騒音の上限値として規定されている値（大型特殊自動車等）として正しいものはどれか。",choices:["A. 75dBを超えないこと", "B. 80dBを超えないこと", "C. 85dBを超えないこと", "D. 90dBを超えないこと"],answer:"C",exp:"第196条第1項第1号により、側車付二輪自動車、三輪自動車、カタピラ及びそりを有する軽自動車、大型特殊自動車並びに小型特殊自動車は定常走行騒音が85dBを超えない構造でなければならない。"},
  {no:6564,section:"保安基準細目",label:"第196条（自動車の騒音防止装置）",q:"第196条第1項第2号の近接排気騒音の基準で、車両総重量が3.5tを超え、原動機の最高出力が150kWを超える自動車の上限値として正しいものはどれか。",choices:["A. 96dB", "B. 98dB", "C. 99dB", "D. 110dB"],answer:"D",exp:"第196条第1項第2号の表により、車両総重量が3.5tを超え原動機の最高出力が150kWを超えるもの（三輪自動車等を除く）の近接排気騒音の上限値は110dBとされている。"},
  {no:6565,section:"保安基準細目",label:"第197条（自動車のばい煙、悪臭のあるガス、有害なガス等の発散防止装置）",q:"第197条第1項第1号で、ガソリン又は液化石油ガスを燃料とする「4サイクルの原動機を有する軽自動車（二輪自動車を除く）」の一酸化炭素の基準値として正しいものはどれか。",choices:["A. 1%以下", "B. 2%以下", "C. 3%以下", "D. 4.5%以下"],answer:"B",exp:"第197条第1項第1号の表ハにより、4サイクルの原動機を有する軽自動車（二輪自動車を除く）の一酸化炭素の測定値は2%を超えないものでなければならない。"},
  {no:6566,section:"保安基準細目",label:"第197条（自動車のばい煙、悪臭のあるガス、有害なガス等の発散防止装置）",q:"第197条第1項第2号で、軽油を燃料とする普通自動車及び小型自動車（二輪自動車を除く）の光吸収係数の上限として正しいものはどれか。",choices:["A. 0.30m⁻¹を超えないこと", "B. 0.40m⁻¹を超えないこと", "C. 0.50m⁻¹を超えないこと", "D. 0.60m⁻¹を超えないこと"],answer:"C",exp:"第197条第1項第2号により、軽油を燃料とする自動車のうち、普通自動車及び小型自動車（二輪自動車を除く）並びに一定の大型特殊自動車及び小型特殊自動車は、光吸収係数が0.50m⁻¹を超えないものでなければならない。"},
  {no:6567,section:"保安基準細目",label:"第197条（自動車のばい煙、悪臭のあるガス、有害なガス等の発散防止装置）",q:"第197条第1項第1号で、2サイクルの原動機を有する自動車（二輪自動車を除く）の一酸化炭素の基準値として正しいものはどれか。",choices:["A. 1%以下", "B. 2%以下", "C. 4.5%以下", "D. 6%以下"],answer:"C",exp:"第197条第1項第1号の表イにより、2サイクルの原動機を有する自動車（二輪自動車を除く）の一酸化炭素の測定値は4.5%を超えないものでなければならない。"},
  {no:6568,section:"保安基準細目",label:"第198条（前照灯等）",q:"第198条第2項第1号で、走行用前照灯（最高速度20km/h未満の自動車を除く）が夜間に前方何mの距離にある障害物を確認できる性能を有するものでなければならないか（一般の自動車）。",choices:["A. 50m", "B. 75m", "C. 100m", "D. 150m"],answer:"C",exp:"第198条第2項第1号により、走行用前照灯（最高速度20km/h未満を除く）は、夜間にその前方100m（除雪等特別な用途の自動車等にあっては50m）の距離にある交通上の障害物を確認できる性能を有するものでなければならない。"},
  {no:6569,section:"保安基準細目",label:"第198条（前照灯等）",q:"第198条第2項第3号で、走行用前照灯の灯光の色として規定されているものはどれか。",choices:["A. 淡黄色", "B. 白色又は淡黄色", "C. 白色", "D. 橙色"],answer:"C",exp:"第198条第2項第3号により、走行用前照灯の灯光の色は白色でなければならない。"},
  {no:6570,section:"保安基準細目",label:"第198条（前照灯等）",q:"第198条第3項第1号で、走行用前照灯の数（一般の自動車）として正しいものはどれか。",choices:["A. 1個又は2個", "B. 2個又は4個", "C. 2個、4個又は6個", "D. 偶数であればよい"],answer:"B",exp:"第198条第3項第1号により、走行用前照灯の数は2個又は4個でなければならない（二輪自動車は1個又は2個、一定の自動車は1個・2個・4個）。"},
  {no:6571,section:"保安基準細目",label:"第198条（前照灯等）",q:"第198条第3項第3号で、走行用前照灯の最高光度の合計の上限として正しいものはどれか。",choices:["A. 300,000cdを超えないこと", "B. 380,000cdを超えないこと", "C. 430,000cdを超えないこと", "D. 500,000cdを超えないこと"],answer:"C",exp:"第198条第3項第3号により、走行用前照灯の最高光度の合計は430,000cdを超えてはならない。"},
  {no:6572,section:"保安基準細目",label:"第167条（走行装置）",q:"第167条第3項で「堅ろう」とみなされる軽合金製ディスクホイールの条件として正しいものはどれか。",choices:["A. 別添2の技術基準に基づきマークが表示され、かつ、損傷がないもの", "B. 製造メーカーの純正品であり、かつ、損傷がないもの", "C. JIS規格に適合し、かつ、損傷がないもの", "D. 使用年数が5年以内で、かつ、損傷がないもの"],answer:"A",exp:"第167条第3項により、軽合金製ディスクホイールであって、別添2「軽合金製ディスクホイールの技術基準」に基づき鋳出し又は刻印によりマークが表示されており、かつ損傷がないものは「堅ろう」とされるものとする。"},
  {no:6573,section:"保安基準細目",label:"第171条（制動装置）",q:"第171条第2項第6号ロ(2)で、自動調整免除となる車両総重量3.5t超12t以下の自動車の条件として正しいものはどれか。",choices:["A. 全ての車輪に動力を伝達できる構造の動力伝達装置を備える自動車", "B. 前軸及び後軸のそれぞれ1軸以上に動力を伝達できる構造の動力伝達装置及び1個以上の動力伝達装置の差動機の作動を停止又は制限できる装置を備え、かつ、4分の1こう配の坂路を登坂する能力を有する自動車", "C. 大型特殊自動車の種別に属する自動車", "D. 最大積載量が3t以上の自動車"],answer:"B",exp:"第171条第2項第6号ロ(2)により、前軸及び後軸のそれぞれ1軸以上に動力を伝達できる構造の動力伝達装置及び1個以上の差動機作動停止・制限装置を備え、4分の1こう配の坂路を登坂できる自動車（車両総重量3.5t超12t以下、乗用除く）も自動調整免除となる。"},
  {no:6574,section:"保安基準細目",label:"第179条（巻込防止装置）",q:"第179条第4項第4号で、巻込防止装置の取付部が平面部より内側になければならない距離として正しいものはどれか。",choices:["A. 100mm以上内側", "B. 150mm以上内側", "C. 200mm以上内側", "D. 250mm以上内側"],answer:"B",exp:"第179条第4項第4号により、巻込防止装置は、その平面部が最外側にある前後車輪の接地部中心点を結ぶ直線より外側になり、かつ、その取付部が平面部より150mm以上内側になるように取り付けられていなければならない。"},
  {no:6575,section:"保安基準細目",label:"第197条（自動車のばい煙、悪臭のあるガス、有害なガス等の発散防止装置）",q:"第197条第1項第1号で、二輪自動車の一酸化炭素の基準値として正しいものはどれか。",choices:["A. 0.5%以下", "B. 1%以下", "C. 2%以下", "D. 4.5%以下"],answer:"A",exp:"第197条第1項第1号の表ロにより、二輪自動車の一酸化炭素の測定値は0.5%を超えないものでなければならない。"},
  {no:6601,section:"保安基準細目",label:"第199条（前部霧灯）",q:"前部霧灯の灯光の色に関する規定として正しいものはどれか。",choices:["A. 前部霧灯は、白色又は淡黄色であり、その全てが同一であること", "B. 前部霧灯は、白色又は橙色であり、その全てが同一であること", "C. 前部霧灯は、白色のみであること", "D. 前部霧灯は、淡黄色のみであること"],answer:"A",exp:"第199条第1項第2号の規定により、前部霧灯は白色又は淡黄色であり、その全てが同一であること。橙色は認められていない。"},
  {no:6602,section:"保安基準細目",label:"第199条（前部霧灯）",q:"乗車定員10人未満の専ら乗用の用に供する自動車（二輪・三輪・被牽引自動車を除く）に備える前部霧灯の照明部上縁の高さとして正しいものはどれか。",choices:["A. 地上800mm以下", "B. 地上1,000mm以下", "C. 地上1,200mm以下", "D. 地上1,500mm以下"],answer:"A",exp:"第199条第3項第2号の規定により、専ら乗用の用に供する自動車であって乗車定員が10人未満のもの（二輪自動車、三輪自動車及び被牽引自動車を除く）に備える前部霧灯は、照明部の上縁の高さが地上800mm以下であること。地上1,200mm以下となるのはそれ以外の自動車。"},
  {no:6603,section:"保安基準細目",label:"第199条（前部霧灯）",q:"二輪自動車以外の自動車に備える前部霧灯の照明部の最外縁は、自動車の最外側からいくつ以内に取り付けなければならないか。",choices:["A. 150mm以内", "B. 250mm以内", "C. 400mm以内", "D. 600mm以内"],answer:"C",exp:"第199条第3項第4号の規定により、二輪自動車以外の自動車に備える前部霧灯の照明部の最外縁は、自動車の最外側から400mm以内となるように取り付けられていること。"},
  {no:6604,section:"保安基準細目",label:"第200条（側方照射灯）",q:"側方照射灯の光度として正しいものはどれか。",choices:["A. 3,000cd以下", "B. 8,400cd以下", "C. 16,800cd以下", "D. 33,600cd以下"],answer:"C",exp:"第200条第1項第1号の規定により、側方照射灯の光度は16,800cd以下であること。"},
  {no:6605,section:"保安基準細目",label:"第200条（側方照射灯）",q:"側方照射灯の灯光の色として正しいものはどれか。",choices:["A. 橙色", "B. 赤色", "C. 白色", "D. 黄色"],answer:"C",exp:"第200条第1項第3号の規定により、側方照射灯の灯光の色は白色であること。"},
  {no:6606,section:"保安基準細目",label:"第200条（側方照射灯）",q:"側方照射灯の取付位置に関する記述として正しいものはどれか。",choices:["A. 照明部の下縁の高さが地上0.15m以上、上縁の高さが地上0.9m以下", "B. 照明部の下縁の高さが地上0.25m以上、上縁の高さが地上0.9m以下", "C. 照明部の下縁の高さが地上0.25m以上、上縁の高さが地上1.2m以下", "D. 照明部の下縁の高さが地上0.35m以上、上縁の高さが地上1.0m以下"],answer:"B",exp:"第200条第3項第4号の規定により、側方照射灯は照明部の下縁の高さが地上0.25m以上、上縁の高さが地上0.9m以下であってすれ違い用前照灯の照明部の上縁を含む水平面以下となるように取り付けられていること。"},
  {no:6607,section:"保安基準細目",label:"第201条（車幅灯）",q:"車幅灯の確認距離に関する記述として正しいものはどれか。",choices:["A. 夜間にその前方150mの距離から点灯を確認できること", "B. 夜間にその前方200mの距離から点灯を確認できること", "C. 夜間にその前方300mの距離から点灯を確認できること", "D. 夜間にその前方500mの距離から点灯を確認できること"],answer:"C",exp:"第201条第1項第1号の規定により、車幅灯は夜間にその前方300mの距離から点灯を確認できるものであること。"},
  {no:6608,section:"保安基準細目",label:"第201条（車幅灯）",q:"車幅灯の灯光の色が橙色であってもよい場合として正しいものはどれか。",choices:["A. 側方灯と構造上一体となっているもの", "B. 方向指示器、非常点滅表示灯又は側方灯と構造上一体となっているもの又は兼用のもの及び二輪自動車等に備えるもの", "C. 大型特殊自動車に備えるもの", "D. 被牽引自動車に備えるもの"],answer:"B",exp:"第201条第1項第2号のただし書きにより、方向指示器、非常点滅表示灯又は側方灯と構造上一体となっているもの又は兼用のもの及び二輪自動車、側車付二輪自動車並びにカタピラ及びそりを有する軽自動車に備えるものにあっては、橙色であってもよい。"},
  {no:6609,section:"保安基準細目",label:"第201条（車幅灯）",q:"自動車（二輪自動車を除く）に備える車幅灯の照明部の最外縁は、自動車の最外側からいくつ以内に取り付けなければならないか（被牽引自動車を除く）。",choices:["A. 150mm以内", "B. 250mm以内", "C. 400mm以内", "D. 500mm以内"],answer:"C",exp:"第201条第3項第4号の規定により、自動車（二輪自動車を除く）に備える車幅灯の照明部の最外縁は、自動車の最外側から400mm以内となるように取り付けられていること。なお被牽引自動車にあっては150mm以内。"},
  {no:6610,section:"保安基準細目",label:"第202条（前部上側端灯）",q:"前部上側端灯の灯光の色として正しいものはどれか。",choices:["A. 橙色", "B. 赤色", "C. 白色", "D. 淡黄色"],answer:"C",exp:"第202条第1項第2号の規定により、前部上側端灯の灯光の色は白色であること。"},
  {no:6611,section:"保安基準細目",label:"第202条（前部上側端灯）",q:"前部上側端灯の照明部の最外縁は、自動車の最外側からいくつ以内に取り付けなければならないか。",choices:["A. 150mm以内", "B. 200mm以内", "C. 400mm以内", "D. 600mm以内"],answer:"C",exp:"第202条第3項第3号の規定により、前部上側端灯の照明部の最外縁は、自動車の最外側から400mm以内となるように取り付けられていること。"},
  {no:6612,section:"保安基準細目",label:"第202条（前部上側端灯）",q:"前部上側端灯に関する規定として正しいものはどれか。",choices:["A. 前部上側端灯は、車幅灯が点灯している場合に消灯できない構造であること", "B. 前部上側端灯は、前照灯が点灯している場合に消灯できない構造であること", "C. 前部上側端灯は、尾灯が点灯している場合に消灯できない構造であること", "D. 前部上側端灯は、常時点灯の構造であること"],answer:"A",exp:"第202条第3項第6号の規定により、前部上側端灯は車幅灯が点灯している場合に消灯できない構造であること。"},
  {no:6613,section:"保安基準細目",label:"第203条（前部反射器）",q:"前部反射器は、夜間にその前方何mの距離から走行用前照灯で照射した場合に反射光を確認できなければならないか。",choices:["A. 50m", "B. 100m", "C. 150m", "D. 300m"],answer:"C",exp:"第203条第1項第1号の規定により、前部反射器は夜間にその前方150mの距離から走行用前照灯で照射した場合にその反射光を照射位置から確認できるものであること。"},
  {no:6614,section:"保安基準細目",label:"第203条（前部反射器）",q:"前部反射器の反射部の形状に関する規定として正しいものはどれか。",choices:["A. 三角形の形状であること", "B. 三角形以外の形状であること", "C. 正立正三角形であること", "D. 円形であること"],answer:"B",exp:"第203条第1項第2号の規定により、前部反射器の反射部は三角形以外の形状であること。なお三角形（正立正三角形）は被牽引自動車の後部反射器に規定されている。"},
  {no:6615,section:"保安基準細目",label:"第203条（前部反射器）",q:"前部反射器の取付位置に関する規定として正しいものはどれか。",choices:["A. 反射部の上縁の高さが地上1.0m以下、下縁の高さが地上0.15m以上", "B. 反射部の上縁の高さが地上1.5m以下、下縁の高さが地上0.25m以上", "C. 反射部の上縁の高さが地上2.0m以下、下縁の高さが地上0.25m以上", "D. 反射部の上縁の高さが地上1.5m以下、下縁の高さが地上0.35m以上"],answer:"B",exp:"第203条第3項第1号の規定により、前部反射器は反射部の上縁の高さが地上1.5m以下、下縁の高さが地上0.25m以上となるように取り付けられていること。"},
  {no:6616,section:"保安基準細目",label:"第204条（側方灯及び側方反射器）",q:"側方灯の確認距離に関する規定として正しいものはどれか。",choices:["A. 夜間側方50mの距離から点灯を確認できること", "B. 夜間側方100mの距離から点灯を確認できること", "C. 夜間側方150mの距離から点灯を確認できること", "D. 夜間側方300mの距離から点灯を確認できること"],answer:"C",exp:"第204条第1項第1号の規定により、側方灯は夜間側方150mの距離から点灯を確認できるものであること。"},
  {no:6617,section:"保安基準細目",label:"第204条（側方灯及び側方反射器）",q:"側方灯の灯光の色の原則として正しいものはどれか。",choices:["A. 白色", "B. 橙色", "C. 赤色", "D. 淡黄色"],answer:"B",exp:"第204条第1項第2号の規定により、側方灯の灯光の色は橙色であること。ただし、後部に備える側方灯であって尾灯等と構造上一体となっているもの又は兼用のものにあっては赤色であってもよい。"},
  {no:6618,section:"保安基準細目",label:"第204条（側方灯及び側方反射器）",q:"長さ6mを超える自動車に備える側方灯の照明部の間隔として正しいものはどれか（特別な用途に使用されるものを除く）。",choices:["A. 1m以内", "B. 2m以内", "C. 3m以内", "D. 4m以内"],answer:"C",exp:"第204条第3項第3号の規定により、長さ6mを超える自動車に備える側方灯は、照明部の間隔が3m以内となるよう取り付けられていること（特別な用途に使用される自動車は例外あり）。"},
  {no:6619,section:"保安基準細目",label:"第205条（番号灯）",q:"番号灯の確認距離に関する規定として正しいものはどれか。",choices:["A. 夜間後方10mの距離から番号標の数字等を確認できること", "B. 夜間後方20mの距離から番号標の数字等を確認できること", "C. 夜間後方30mの距離から番号標の数字等を確認できること", "D. 夜間後方50mの距離から番号標の数字等を確認できること"],answer:"B",exp:"第205条第1項第1号の規定により、番号灯は夜間後方20mの距離から自動車登録番号標、臨時運行許可番号標、回送運行許可番号標又は車両番号標の数字等の表示を確認できるものであること。"},
  {no:6620,section:"保安基準細目",label:"第205条（番号灯）",q:"二輪自動車及び側車付二輪自動車に備える番号灯の番号標板面の照度として正しいものはどれか。",choices:["A. 8lx以上", "B. 10lx以上", "C. 15lx以上", "D. 20lx以上"],answer:"C",exp:"第205条第1項第1号ロの規定により、二輪自動車及び側車付二輪自動車に備える番号灯にあっては、番号灯試験器を用いて計測した番号標板面の照度が15lx以上であること（一般の自動車は8lx以上）。"},
  {no:6621,section:"保安基準細目",label:"第205条（番号灯）",q:"番号灯の点灯構造に関する規定として正しいものはどれか。",choices:["A. 番号灯は、運転者席において消灯できない構造であること", "B. 番号灯は、前照灯、前部霧灯若しくは車幅灯のいずれかが点灯している場合に消灯できない構造であること", "C. 番号灯は、A又はBのいずれかに適合する構造であること", "D. 番号灯は、制動灯が点灯している場合に消灯できない構造であること"],answer:"C",exp:"第205条第3項第1号の規定により、番号灯は運転者席において消灯できない構造、又は前照灯、前部霧灯若しくは車幅灯のいずれかが点灯している場合に消灯できない構造であること（いずれかに適合すればよい）。"},
  {no:6622,section:"保安基準細目",label:"第206条（尾灯）",q:"尾灯の確認距離に関する規定として正しいものはどれか。",choices:["A. 夜間にその後方150mの距離から点灯を確認できること", "B. 夜間にその後方200mの距離から点灯を確認できること", "C. 夜間にその後方300mの距離から点灯を確認できること", "D. 夜間にその後方500mの距離から点灯を確認できること"],answer:"C",exp:"第206条第1項第1号の規定により、尾灯は夜間にその後方300mの距離から点灯を確認できるものであること。"},
  {no:6623,section:"保安基準細目",label:"第206条（尾灯）",q:"自動車（側車付二輪自動車及びカタピラ等を有する軽自動車を除く）に備える尾灯の取付高さについて、正しいものはどれか（二輪自動車を除く一般の自動車の場合）。",choices:["A. 照明部の上縁の高さが地上1.5m以下、下縁の高さが地上0.25m以上", "B. 照明部の上縁の高さが地上2.1m以下、下縁の高さが地上0.35m以上", "C. 照明部の上縁の高さが地上2.0m以下、下縁の高さが地上0.35m以上", "D. 照明部の上縁の高さが地上2.1m以下、下縁の高さが地上0.25m以上"],answer:"B",exp:"第206条第3項第2号の規定により、自動車（側車付二輪自動車並びにカタピラ及びそりを有する軽自動車を除く）に備える尾灯は、照明部の上縁の高さが地上2.1m以下、下縁の高さが地上0.35m以上となるように取り付けられていること（二輪自動車は上縁1.5m以下、下縁0.25m以上）。"},
  {no:6624,section:"保安基準細目",label:"第207条（後部霧灯）",q:"後部霧灯の数に関する規定として正しいものはどれか。",choices:["A. 1個", "B. 1個又は2個", "C. 2個以下", "D. 制限なし"],answer:"C",exp:"第207条第3項第1号の規定により、後部霧灯の数は2個以下であること。"},
  {no:6625,section:"保安基準細目",label:"第207条（後部霧灯）",q:"後部霧灯の点灯条件に関する規定として正しいものはどれか。",choices:["A. 後部霧灯は、尾灯が点灯している場合にのみ点灯できる構造であること", "B. 後部霧灯は、前照灯又は前部霧灯が点灯している場合にのみ点灯できる構造であること", "C. 後部霧灯は、常時点灯できる構造であること", "D. 後部霧灯は、制動灯が点灯している場合にのみ点灯できる構造であること"],answer:"B",exp:"第207条第3項第2号の規定により、後部霧灯は前照灯又は前部霧灯が点灯している場合にのみ点灯できる構造であり、かつ、前照灯又は前部霧灯のいずれが点灯している場合においても消灯できる構造であること。"},
  {no:6626,section:"保安基準細目",label:"第207条（後部霧灯）",q:"後部霧灯の照明部と制動灯の照明部の離隔距離として正しいものはどれか。",choices:["A. 50mm以上", "B. 100mm以上", "C. 150mm以上", "D. 200mm以上"],answer:"B",exp:"第207条第3項第7号の規定により、後部霧灯の照明部は制動灯の照明部から100mm以上離れていること。"},
  {no:6627,section:"保安基準細目",label:"第207条（後部霧灯）",q:"後部霧灯を1個備える場合の取付位置に関する規定として正しいものはどれか（二輪自動車以外の場合）。",choices:["A. 車両中心面上又はこれより左側の位置となるように取り付けられていること", "B. 車両中心面上又はこれより右側の位置となるように取り付けられていること", "C. 車両中心面上にのみ取り付けられていること", "D. どちら側でもよい"],answer:"B",exp:"第207条第3項第9号の規定により、後部霧灯を1個備える場合は、当該後部霧灯の中心が車両中心面上又はこれより右側の位置（二輪自動車にあっては車両中心面上の位置）となるように取り付けられていること。"},
  {no:6628,section:"保安基準細目",label:"第208条（駐車灯）",q:"駐車灯の確認距離に関する規定として正しいものはどれか（前面に備えるものの場合）。",choices:["A. 夜間前方100mの距離から点灯を確認できること", "B. 夜間前方150mの距離から点灯を確認できること", "C. 夜間前方200mの距離から点灯を確認できること", "D. 夜間前方300mの距離から点灯を確認できること"],answer:"B",exp:"第208条第1項第1号の規定により、前面に備える駐車灯にあっては夜間前方150mの距離から点灯を確認できるものであること。"},
  {no:6629,section:"保安基準細目",label:"第208条（駐車灯）",q:"駐車灯の灯光の色に関する規定として正しいものはどれか（前面に備えるものの場合）。",choices:["A. 白色", "B. 橙色", "C. 赤色", "D. 淡黄色"],answer:"A",exp:"第208条第1項第2号の規定により、駐車灯の灯光の色は前面に備えるものにあっては白色、後面に備えるものにあっては赤色、両側面に備えるものにあっては自動車の進行方向が白色、後退方向が赤色であること。"},
  {no:6630,section:"保安基準細目",label:"第208条（駐車灯）",q:"後面に備える駐車灯の点灯に関する規定として正しいものはどれか（長さ6m以上又は幅2m以上の自動車の場合）。",choices:["A. 左側又は右側のみ点灯できる", "B. 全ての後面駐車灯が同時に点灯するものであること", "C. 前面駐車灯が点灯している場合にのみ点灯できる", "D. 制動灯と連動して点灯するものであること"],answer:"B",exp:"第208条第3項第3号の規定により、後面に備える駐車灯はそのすべてが同時に点灯するものであること。ただし、長さ6m以上又は幅2m以上の自動車以外の自動車にあっては、左側又は右側のみ点灯する構造とすることができる。"},
  {no:6631,section:"保安基準細目",label:"第209条（後部上側端灯）",q:"後部上側端灯の灯光の色として正しいものはどれか。",choices:["A. 白色", "B. 橙色", "C. 赤色", "D. 黄色"],answer:"C",exp:"第209条第1項第2号の規定により、後部上側端灯の灯光の色は赤色であること。"},
  {no:6632,section:"保安基準細目",label:"第209条（後部上側端灯）",q:"後部上側端灯に関する規定として正しいものはどれか。",choices:["A. 後部上側端灯は、車幅灯が点灯している場合に消灯できない構造であること", "B. 後部上側端灯は、尾灯が点灯している場合に消灯できない構造であること", "C. 後部上側端灯は、前照灯が点灯している場合に消灯できない構造であること", "D. 後部上側端灯は、常時点灯の構造であること"],answer:"B",exp:"第209条第3項第5号の規定により、後部上側端灯は尾灯が点灯している場合に消灯できない構造であること。"},
  {no:6633,section:"保安基準細目",label:"第209条（後部上側端灯）",q:"後部上側端灯の照明部と尾灯の照明部の離隔距離について、正しいものはどれか。",choices:["A. 車両中心面に直交する鉛直面に投影したときに100mm以上離れること", "B. 車両中心面に直交する鉛直面に投影したときに200mm以上離れること", "C. 車両中心面に直交する鉛直面に投影したときに300mm以上離れること", "D. 車両中心面に直交する鉛直面に投影したときに400mm以上離れること"],answer:"B",exp:"第209条第3項第4号の規定により、後部上側端灯はその照明部と尾灯の照明部を車両中心面に直交する鉛直面に投影したときに200mm以上離れるような位置に取り付けられていること。"},
  {no:6634,section:"保安基準細目",label:"第210条（後部反射器）",q:"被牽引自動車に備える後部反射器の反射部の形状として正しいものはどれか。",choices:["A. 三角形以外の形状", "B. 正立正三角形又は帯状部の幅が一辺の5分の1以上の中空の正立正三角形で一辺が150mm以上200mm以下のもの", "C. 円形", "D. 長方形"],answer:"B",exp:"第210条第1項第2号の規定により、被牽引自動車に備える後部反射器の反射部は正立正三角形又は帯状部の幅が一辺の5分の1以上の中空の正立正三角形であって、一辺が150mm以上200mm以下のものであること（被牽引自動車以外は三角形以外の形状）。"},
  {no:6635,section:"保安基準細目",label:"第210条（後部反射器）",q:"後部反射器による反射光の色として正しいものはどれか。",choices:["A. 白色", "B. 橙色", "C. 黄色", "D. 赤色"],answer:"D",exp:"第210条第1項第4号の規定により、後部反射器による反射光の色は赤色であること（前部反射器の反射光は白色）。"},
  {no:6636,section:"保安基準細目",label:"第211条（大型後部反射器）",q:"被牽引自動車以外の自動車に備える大型後部反射器の模様について正しいものはどれか。",choices:["A. 黄色の反射部が赤色の反射部又は蛍光部により囲まれており、帯状部の幅は40±1mm", "B. 黄色の反射部及び赤色の反射部又は蛍光部からなる45±5°の角度をなす縞模様で幅は100±2.5mm", "C. 赤色の反射部及び白色の反射部からなる45±5°の角度をなす縞模様で幅は100±2.5mm", "D. 黄色の反射部が白色の反射部により囲まれており、帯状部の幅は50±1mm"],answer:"B",exp:"第211条第1項第3号の規定により、被牽引自動車以外の自動車に備えるものは、黄色の反射部及び赤色の反射部又は蛍光部からなる45±5°の角度をなす縞模様であり、かつ、その幅は100±2.5mmであること。"},
  {no:6637,section:"保安基準細目",label:"第211条（大型後部反射器）",q:"大型後部反射器の下縁及び上縁の取付高さとして正しいものはどれか（一般の場合）。",choices:["A. 下縁の高さが地上0.15m以上、上縁の高さが地上1.5m以下", "B. 下縁の高さが地上0.25m以上、上縁の高さが地上1.5m以下", "C. 下縁の高さが地上0.25m以上、上縁の高さが地上2.1m以下", "D. 下縁の高さが地上0.35m以上、上縁の高さが地上1.5m以下"],answer:"B",exp:"第211条第3項第2号の規定により、大型後部反射器は下縁の高さが地上0.25m以上及び上縁の高さが地上1.5m以下となるように取り付けること（構造上取り付けられない場合は例外あり）。"},
  {no:6638,section:"保安基準細目",label:"第212条（制動灯）",q:"制動灯の確認距離に関する規定として正しいものはどれか。",choices:["A. 昼間にその後方50mの距離から点灯を確認できること", "B. 昼間にその後方100mの距離から点灯を確認できること", "C. 昼間にその後方150mの距離から点灯を確認できること", "D. 夜間にその後方300mの距離から点灯を確認できること"],answer:"B",exp:"第212条第1項第1号の規定により、制動灯は昼間にその後方100mの距離から点灯を確認できるものであること（夜間ではなく昼間である点に注意）。"},
  {no:6639,section:"保安基準細目",label:"第212条（制動灯）",q:"尾灯又は後部上側端灯と兼用の制動灯に関する規定として正しいものはどれか。",choices:["A. 同時に点灯したときの光度が尾灯のみを点灯したときの光度の3倍以上となる構造", "B. 同時に点灯したときの光度が尾灯のみを点灯したときの光度の5倍以上となる構造", "C. 同時に点灯したときの光度が尾灯のみを点灯したときの光度の7倍以上となる構造", "D. 同時に点灯したときの光度が尾灯のみを点灯したときの光度の10倍以上となる構造"],answer:"B",exp:"第212条第1項第2号の規定により、尾灯又は後部上側端灯と兼用の制動灯は、同時に点灯したときの光度が尾灯のみ又は後部上側端灯のみを点灯したときの光度の5倍以上となる構造であること。"},
  {no:6640,section:"保安基準細目",label:"第213条（補助制動灯）",q:"補助制動灯の数に関する規定として正しいものはどれか（原則の場合）。",choices:["A. 1個", "B. 2個", "C. 1個又は2個", "D. 制限なし"],answer:"A",exp:"第213条第3項第1号の規定により、補助制動灯の数は1個であること。ただし、車両中心面の両側に1個ずつ取り付ける場合にあっては、この限りでない。"},
  {no:6641,section:"保安基準細目",label:"第213条（補助制動灯）",q:"補助制動灯の照明部の下縁の高さに関する規定として正しいものはどれか。",choices:["A. 地上0.35m以上又は後面ガラスの最下端の下方0.15mより上方", "B. 地上0.85m以上又は後面ガラスの最下端の下方0.15mより上方", "C. 地上1.0m以上又は後面ガラスの最下端の下方0.15mより上方", "D. 地上1.2m以上又は後面ガラスの最下端の下方0.15mより上方"],answer:"B",exp:"第213条第3項第2号の規定により、補助制動灯は照明部の下縁の高さが地上0.85m以上又は後面ガラスの最下端の下方0.15mより上方であって、制動灯の照明部の上縁を含む水平面以上となるように取り付けられていること。"},
  {no:6642,section:"保安基準細目",label:"第213条（補助制動灯）",q:"補助制動灯の点灯条件に関する規定として正しいものはどれか。",choices:["A. 補助制動灯は、尾灯が点灯する場合のみ点灯する構造であること", "B. 補助制動灯は、制動灯が点灯する場合のみ点灯する構造であること", "C. 補助制動灯は、前照灯が点灯する場合のみ点灯する構造であること", "D. 補助制動灯は、常時点灯できる構造であること"],answer:"B",exp:"第213条第3項第5号の規定により、補助制動灯は制動灯が点灯する場合のみ点灯する構造であること。"},
  {no:6643,section:"保安基準細目",label:"第214条（後退灯）",q:"後退灯の灯光の色として正しいものはどれか。",choices:["A. 橙色", "B. 赤色", "C. 白色", "D. 黄色"],answer:"C",exp:"第214条第1項第2号の規定により、後退灯の灯光の色は白色であること。"},
  {no:6644,section:"保安基準細目",label:"第214条（後退灯）",q:"長さ6mを超える乗合自動車及び貨物自動車に備える後退灯の個数として正しいものはどれか。",choices:["A. 1個又は2個", "B. 2個", "C. 2個、3個又は4個", "D. 4個"],answer:"C",exp:"第214条第3項第1号イの規定により、長さが6mを超える自動車（専ら乗用の用に供する自動車であって乗員定員10人以上の自動車及び貨物の運送の用に供する自動車に限る）にあっては、後退灯の数は2個、3個又は4個であること。"},
  {no:6645,section:"保安基準細目",label:"第214条（後退灯）",q:"後退灯の照明部の上縁の高さ（原則）として正しいものはどれか。",choices:["A. 地上0.9m以下", "B. 地上1.0m以下", "C. 地上1.2m以下", "D. 地上1.5m以下"],answer:"C",exp:"第214条第3項第3号の規定により、後退灯はその照明部の上縁の高さが地上1.2m以下（大型特殊自動車及び小型特殊自動車で構造上取り付けられないものは例外あり）、下縁の高さが0.25m以上となるように取り付けられなければならない。"},
  {no:6646,section:"保安基準細目",label:"第215条（方向指示器）",q:"方向指示器の確認距離に関する規定として正しいものはどれか（前方又は後方に表示する一般の方向指示器の場合）。",choices:["A. 昼間において30mの距離から点灯を確認できること", "B. 昼間において100mの距離から点灯を確認できること", "C. 夜間において100mの距離から点灯を確認できること", "D. 昼間において150mの距離から点灯を確認できること"],answer:"B",exp:"第215条第1項第1号の規定により、方向指示器は方向の指示を表示する方向100m（自動車の両側面に備えるものにあっては30m）の位置から昼間において点灯を確認できるものであること。"},
  {no:6647,section:"保安基準細目",label:"第217条（非常点滅表示灯）",q:"非常点滅表示灯の操作方法に関する規定として正しいものはどれか（原則）。",choices:["A. 自動で作動するものでなければならない", "B. 手動で操作するものでなければならない", "C. 手動又は自動のいずれでもよい", "D. 運転者席から遠隔操作できる構造でなければならない"],answer:"B",exp:"第217条第3項第4号の規定により、非常点滅表示灯は手動で操作するものでなければならない。ただし、緊急制動表示灯の作動が停止した場合等の例外においては自動で作動させることができる。"},
  {no:6648,section:"保安基準細目",label:"第218条（その他の灯火等の制限）",q:"自動車の前面ガラスの上方に備えてはならない灯火として正しいものはどれか。",choices:["A. 灯光の色が赤色である灯火", "B. 灯光の色が白色である灯火", "C. 灯光の色が青紫色である灯火（一般乗合旅客自動車運送事業用自動車を除く）", "D. 灯光の色が橙色である灯火"],answer:"C",exp:"第218条第4項の規定により、自動車（一般乗合旅客自動車運送事業用自動車を除く）の前面ガラスの上方には、灯光の色が青紫色である灯火を備えてはならない。"},
  {no:6649,section:"保安基準細目",label:"第218条（その他の灯火等の制限）",q:"後方を照射し又は後方に表示する白色の灯火として、自動車に備えることができるものとして正しいものはどれか。",choices:["A. 尾灯", "B. 後退灯", "C. 後部霧灯", "D. 制動灯"],answer:"B",exp:"第218条第3項の規定により、後方を照射し又は後方に表示する白色の灯火として備えることができるものとして、後退灯、番号灯、室内照明灯等が列挙されている。尾灯・後部霧灯・制動灯は赤色の灯火であって白色ではない。"},
  {no:6650,section:"保安基準細目",label:"第219条（警音器）",q:"警音器の音の大きさについて、自動車の前方7mの位置における規定として正しいものはどれか（一般の自動車の場合）。",choices:["A. 100dB以下87dB以上", "B. 112dB以下87dB以上", "C. 112dB以下83dB以上", "D. 120dB以下90dB以上"],answer:"B",exp:"第219条第2項第1号の規定により、警音器の音の大きさは自動車の前方7mの位置において112dB以下87dB以上（動力が7kW以下の二輪自動車に備える警音器にあっては112dB以下83dB以上）であること。"},
  {no:6651,section:"保安基準細目",label:"第219条（警音器）",q:"警音器の警報音発生装置に関する規定として、適合しないものとされるのはどれか。",choices:["A. 音が連続するもの", "B. 音の大きさ及び音色が一定なもの", "C. 音が自動的に断続するもの", "D. 運転者が運転者席で音の大きさや音色を容易に変化させることができないもの"],answer:"C",exp:"第219条第1項の規定により、警音器の警報音発生装置の音は連続するものであり、かつ、音の大きさ及び音色が一定なものであること。音が自動的に断続するものは基準に適合しないとされている。"},
  {no:6652,section:"保安基準細目",label:"第220条（非常信号用具）",q:"非常信号用具の灯光に関する規定として正しいものはどれか。",choices:["A. 夜間100mの距離から確認できる赤色の灯光を発するものであること", "B. 夜間150mの距離から確認できる橙色の灯光を発するものであること", "C. 夜間200mの距離から確認できる赤色の灯光を発するものであること", "D. 夜間300mの距離から確認できる赤色の灯光を発するものであること"],answer:"C",exp:"第220条第1項第1号の規定により、非常信号用具は夜間200mの距離から確認できる赤色の灯光を発するものであること。"},
  {no:6653,section:"保安基準細目",label:"第221条（警告反射板）",q:"警告反射板の反射部の形状として正しいものはどれか。",choices:["A. 一辺が400mm以上の中空の正立正三角形で帯状部の幅が50mm以上のもの", "B. 一辺が300mm以上の中空の正立正三角形で帯状部の幅が40mm以上のもの", "C. 一辺が400mm以上の長方形で帯状部の幅が50mm以上のもの", "D. 一辺が200mm以上の中空の正立正三角形で帯状部の幅が30mm以上のもの"],answer:"A",exp:"第221条第1項第1号の規定により、警告反射板の反射部は一辺が400mm以上の中空の正立正三角形で帯状部の幅が50mm以上のものであること。"},
  {no:6654,section:"保安基準細目",label:"第221条（警告反射板）",q:"警告反射板の反射光確認距離として正しいものはどれか。",choices:["A. 夜間100mの距離から走行用前照灯で照射した場合に確認できること", "B. 夜間150mの距離から走行用前照灯で照射した場合に確認できること", "C. 夜間200mの距離から走行用前照灯で照射した場合に確認できること", "D. 昼間200mの距離から確認できること"],answer:"B",exp:"第221条第1項第2号の規定により、警告反射板は夜間150mの距離から走行用前照灯で照射した場合にその反射光を照射位置から確認できるものであること。"},
  {no:6655,section:"保安基準細目",label:"第222条（停止表示器材）",q:"停止表示器材の夜間反射光確認距離として正しいものはどれか。",choices:["A. 夜間100mの距離から走行用前照灯で照射した場合に確認できること", "B. 夜間150mの距離から走行用前照灯で照射した場合に確認できること", "C. 夜間200mの距離から走行用前照灯で照射した場合に確認できること", "D. 夜間300mの距離から走行用前照灯で照射した場合に確認できること"],answer:"C",exp:"第222条第1項第2号の規定により、停止表示器材は夜間200mの距離から走行用前照灯で照射した場合にその反射光を照射位置から確認できるものであること。"},
  {no:6656,section:"保安基準細目",label:"第222条（停止表示器材）",q:"停止表示器材の昼間蛍光確認距離として正しいものはどれか。",choices:["A. 昼間100mの距離からその蛍光を確認できること", "B. 昼間150mの距離からその蛍光を確認できること", "C. 昼間200mの距離からその蛍光を確認できること", "D. 昼間300mの距離からその蛍光を確認できること"],answer:"C",exp:"第222条第1項第3号の規定により、停止表示器材は昼間200mの距離からその蛍光を確認できるものであること。"},
  {no:6657,section:"保安基準細目",label:"第222条（停止表示器材）",q:"停止表示器材の蛍光の色として正しいものはどれか。",choices:["A. 赤色のみ", "B. 赤色又は橙色", "C. 橙色のみ", "D. 赤色又は黄色"],answer:"B",exp:"第222条第1項第4号の規定により、停止表示器材による反射光の色は赤色であり、かつ、当該停止表示器材による蛍光の色は赤色又は橙色であること。"},
  {no:6658,section:"保安基準細目",label:"第226条（速度計）",q:"平成19年1月1日以降に製作された自動車（二輪・三輪・カタピラ等を有する軽自動車以外）の速度計の精度に関して正しいものはどれか（速度計が40km/hを指示したとき）。",choices:["A. 10（V1－6）/11≦V2≦（100/90）V1", "B. 10（V1－6）/11≦V2≦（100/94）V1", "C. 10（V1－8）/11≦V2≦（100/90）V1", "D. 10（V1－8）/11≦V2≦（100/94）V1"],answer:"B",exp:"第226条第1項第2号ロ（1）の規定により、平成19年1月1日以降に製作された自動車（二輪自動車、側車付二輪自動車、三輪自動車並びにカタピラ及びそりを有する軽自動車以外）にあっては、計測した速度が10（V1－6）/11≦V2≦（100/94）V1に適合すること。"},
  {no:6659,section:"保安基準細目",label:"第229条（運行記録計）",q:"運行記録計が記録しなければならない連続した時間として正しいものはどれか。",choices:["A. 12時間以上", "B. 16時間以上", "C. 20時間以上", "D. 24時間以上"],answer:"D",exp:"第229条第1項第1号の規定により、運行記録計は24時間以上の継続した時間内における当該自動車についての瞬間速度及び走行距離を自動的に記録できる構造であること。"},
  {no:6660,section:"保安基準細目",label:"第230条（速度表示装置）",q:"速度表示装置において、60km/hを超える速度で走行する場合に点灯する速度表示灯の個数として正しいものはどれか。",choices:["A. 1個", "B. 2個", "C. 3個", "D. 4個"],answer:"C",exp:"第230条第1項第1号の規定により、速度表示装置は60km/hを超える速度で走行する場合に3個の灯火（速度表示灯）を自動的に点灯する構造であること。40km/h以下は1個、40km/h超60km/h以下は2個。"},
  {no:6661,section:"保安基準細目",label:"第230条（速度表示装置）",q:"速度表示灯の灯光の色として正しいものはどれか。",choices:["A. 白色", "B. 橙色", "C. 赤色", "D. 黄緑色"],answer:"D",exp:"第230条第1項第4号の規定により、速度表示灯の灯光の色は黄緑色であること。"},
  {no:6662,section:"保安基準細目",label:"第230条（速度表示装置）",q:"速度表示灯の取付位置として正しいものはどれか。",choices:["A. 前面ガラスの下方であり、かつ、地上1.5m以上", "B. 前面ガラスの上方であり、かつ、地上1.8m以上", "C. 前面ガラスの上方であり、かつ、地上1.5m以上", "D. 前面ガラスの上方であり、かつ、地上2.0m以上"],answer:"B",exp:"第230条第2項第1号の規定により、速度表示灯の取付位置は前面ガラスの上方であり、かつ、地上1.8m以上であること。"},
  {no:6663,section:"保安基準細目",label:"第231条（緊急自動車）",q:"緊急自動車の警光灯の確認距離と色として正しいものはどれか。",choices:["A. 前方150mの距離から点灯を確認できる赤色のもの", "B. 前方200mの距離から点灯を確認できる赤色のもの", "C. 前方300mの距離から点灯を確認できる赤色のもの", "D. 前方300mの距離から点灯を確認できる橙色のもの"],answer:"C",exp:"第231条第1項第1号の規定により、警光灯は前方300mの距離から点灯を確認できる赤色のものであること。"},
  {no:6664,section:"保安基準細目",label:"第231条（緊急自動車）",q:"緊急自動車のサイレンの音の大きさとして正しいものはどれか（自動車の前方20mの位置において）。",choices:["A. 80dB以上110dB以下", "B. 85dB以上115dB以下", "C. 90dB以上120dB以下", "D. 87dB以上112dB以下"],answer:"C",exp:"第231条第1項第2号の規定により、サイレンの音の大きさは自動車の前方20mの位置において90dB以上120dB以下であること。"},
  {no:6665,section:"保安基準細目",label:"第231条（緊急自動車）",q:"緊急自動車の車体の塗色の原則として正しいものはどれか（消防自動車の場合）。",choices:["A. 白色", "B. 赤色", "C. 朱色", "D. 橙色"],answer:"C",exp:"第231条第1項第3号の規定により、緊急自動車の車体の塗色は消防自動車にあっては朱色とし、その他の緊急自動車にあっては白色とする（警察自動車等は例外あり）。"},
  {no:6701,section:"保安基準細目",label:"第232条（道路維持作業用自動車）",q:"道路維持作業用自動車に備える灯火の灯光の色に関する規定として正しいものはどれか。",choices:["A. 白色であって点滅式のものであること", "B. 黄色であって点滅式のものであること", "C. 赤色であって点滅式のものであること", "D. 橙色であって点滅式のものであること"],answer:"B",exp:"第232条第1号の規定により、道路維持作業用自動車の灯火は黄色であって点滅式のものでなければならない。"},
  {no:6702,section:"保安基準細目",label:"第232条（道路維持作業用自動車）",q:"道路維持作業用自動車の灯火について、点灯を確認できる距離として規定されているものはどれか。",choices:["A. 100mの距離から点灯を確認できるもの", "B. 120mの距離から点灯を確認できるもの", "C. 150mの距離から点灯を確認できるもの", "D. 200mの距離から点灯を確認できるもの"],answer:"C",exp:"第232条第2号の規定により、道路維持作業用自動車の灯火は150mの距離から点灯を確認できるものでなければならない。"},
  {no:6703,section:"保安基準細目",label:"第233条（旅客自動車運送事業用自動車）",q:"乗車定員11人以上の旅客自動車運送事業用自動車における運転者席の側面の窓の開放に関する規定として正しいものはどれか。",choices:["A. 簡易な操作により有効幅及び有効高さがそれぞれ200mm以上開放できる構造", "B. 簡易な操作により有効幅及び有効高さがそれぞれ250mm以上開放できる構造", "C. 簡易な操作により有効幅及び有効高さがそれぞれ270mm以上開放できる構造", "D. 簡易な操作により有効幅及び有効高さがそれぞれ300mm以上開放できる構造"],answer:"C",exp:"第233条第1項第4号の規定により、運転者席の側面の窓は簡易な操作により有効幅及び有効高さがそれぞれ270mm以上開放できる構造でなければならない。"},
  {no:6704,section:"保安基準細目",label:"第233条（旅客自動車運送事業用自動車）",q:"乗車定員24人以上の旅客自動車運送事業用自動車の室内照明灯について、客室床面積1㎡あたりの光源の要件（白熱灯の場合）として正しいものはどれか。",choices:["A. 3W以上", "B. 5W以上", "C. 7W以上", "D. 10W以上"],answer:"B",exp:"第233条第2項第1号の規定により、室内照明灯の光源は客室床面積1㎡あたり5W（蛍光灯の場合にあっては2W）以上又はこれと同等以上の明るさでなければならない。"},
  {no:6705,section:"保安基準細目",label:"第233条（旅客自動車運送事業用自動車）",q:"乗車定員24人以上の旅客自動車運送事業用自動車の乗降口の踏段（幼児専用車の乗降口に備える踏段を除く）の有効奥行として正しいものはどれか。",choices:["A. 200mm以上", "B. 250mm以上", "C. 300mm以上", "D. 350mm以上"],answer:"C",exp:"第233条第2項第2号の規定により、乗降口の踏段の有効奥行は300mm以上でなければならない（ただし最下段等の特例を除く）。"},
  {no:6706,section:"保安基準細目",label:"第233条（旅客自動車運送事業用自動車）",q:"乗車定員24人以上の旅客自動車運送事業用自動車において、車掌席の設置場所として規定されているものはどれか。",choices:["A. 運転者席の付近", "B. 乗降口の付近", "C. 車体前部", "D. 客室の中央付近"],answer:"B",exp:"第233条第2項第3号の規定により、車掌席は乗降口の付近に設けなければならない。"},
  {no:6707,section:"保安基準細目",label:"第233条（旅客自動車運送事業用自動車）",q:"乗車定員24人以上の旅客自動車運送事業用自動車において、運転者席と車掌席の距離が何m以上の場合に連絡装置を備えなければならないか。",choices:["A. 2m以上", "B. 3m以上", "C. 4m以上", "D. 5m以上"],answer:"B",exp:"第233条第2項第4号の規定により、運転者席と車掌席との距離（中心間の最短距離を床面に平行に計測）が3m以上である場合はブザその他の連絡装置を備えなければならない。"},
  {no:6708,section:"保安基準細目",label:"第234条（ガス運送容器を備える自動車）",q:"ガス運送容器を備える自動車のバンパの長さに関する規定として正しいものはどれか。",choices:["A. 当該自動車の幅の60%以上", "B. 当該自動車の幅の70%以上", "C. 当該自動車の幅の80%以上", "D. 当該自動車の幅の90%以上"],answer:"C",exp:"第234条第1項第2号ハの規定により、バンパの本体は車両中心線に対して対称に取り付けられ、かつ、その長さは当該自動車の幅の80%以上でなければならない。"},
  {no:6709,section:"保安基準細目",label:"第234条（ガス運送容器を備える自動車）",q:"後部取出し式容器（容器元弁をその後面に設けた容器）を備えたガス運送車において、容器元弁等からバンパの後面までの距離の規定として正しいものはどれか。",choices:["A. 20cm以上", "B. 30cm以上", "C. 40cm以上", "D. 50cm以上"],answer:"C",exp:"第234条第2項第1号の規定により、後部取出し式容器の場合は容器元弁及び緊急遮断装置に係るバルブからバンパの後面までの距離が40cm以上でなければならない。"},
  {no:6710,section:"保安基準細目",label:"第234条（ガス運送容器を備える自動車）",q:"後部取出し式容器以外のガス運送容器において、容器の後面からバンパの後面までの距離の規定として正しいものはどれか。",choices:["A. 20cm以上", "B. 30cm以上", "C. 40cm以上", "D. 50cm以上"],answer:"B",exp:"第234条第2項第2号の規定により、後部取出し式容器以外の容器の場合は容器の後面からバンパの後面までの距離が30cm以上でなければならない。"},
  {no:6711,section:"保安基準細目",label:"第234条（ガス運送容器を備える自動車）",q:"ガス運送容器の附属品が操作箱に収納される場合、操作箱からバンパの後面までの距離の規定として正しいものはどれか。",choices:["A. 10cm以上", "B. 15cm以上", "C. 20cm以上", "D. 25cm以上"],answer:"C",exp:"第234条第2項第3号の規定により、操作箱からバンパの後面までの距離が20cm以上でなければならない（前2号の基準に適合するほか）。"},
  {no:6712,section:"保安基準細目",label:"第235条（火薬類を運送する自動車）",q:"火薬類を運送する自動車の燃料装置に関する規定として正しいものはどれか。",choices:["A. 燃料装置はガス発生炉を使用するものでないこと", "B. 燃料装置はガソリンを使用するものでないこと", "C. 燃料装置はディーゼル機関を使用するものでないこと", "D. 燃料装置は電気を動力とするものでないこと"],answer:"A",exp:"第235条第1項第1号の規定により、火薬類を運送する自動車の燃料装置はアセチレン・ガス発生装置又はガス発生炉を使用するものでないこと、と定められている。"},
  {no:6713,section:"保安基準細目",label:"第235条（火薬類を運送する自動車）",q:"火薬類を運送する自動車において、荷台その他火薬類を積載する場所と原動機との間の構造として規定されているものはどれか。",choices:["A. 不燃性の隔壁で仕切られていること", "B. 難燃性の隔壁で仕切られていること", "C. 金属製の扉で区画されていること", "D. 特別な仕切りを設けなくてよい"],answer:"A",exp:"第235条第1項第2号の規定により、荷台その他火薬類を積載する場所と原動機との間は不燃性の隔壁で仕切られていなければならない。"},
  {no:6714,section:"保安基準細目",label:"第236条（危険物を運送する自動車）",q:"危険物の規制に関する政令別表第3に掲げる指定数量以上の危険物を運送する自動車について、第236条第1項の規定に加えて適合しなければならない事項として正しいものはどれか。",choices:["A. 荷台と原動機との間が難燃性の隔壁で仕切られていること", "B. 荷台と原動機との間が不燃性の隔壁で仕切られていること", "C. 荷台に専用の換気設備を設けること", "D. 荷台に消火器を備えること"],answer:"B",exp:"第236条第3項の規定により、指定数量以上の危険物を運送する自動車は、荷台その他危険物を積載する場所と原動機との間が不燃性の隔壁で仕切られていなければならない。"},
  {no:6715,section:"保安基準細目",label:"第236条（危険物を運送する自動車）",q:"爆発性液体を運送するため車台にタンクを固定した自動車の排気管について、タンクの表面から何mm未満の部分に防熱措置が必要とされているか。",choices:["A. 100mm未満", "B. 150mm未満", "C. 200mm未満", "D. 300mm未満"],answer:"C",exp:"第236条第4項第4号の規定により、排気管及び消音器はタンクの表面から200mm未満の部分には適当な防熱措置が施されていなければならない。"},
  {no:6716,section:"保安基準細目",label:"第236条（危険物を運送する自動車）",q:"爆発性液体を運送するタンク車に備えるバンパについて、第236条第5項の規定による適合要件のうち、バンパの長さに関する記述として正しいものはどれか。",choices:["A. 当該自動車の幅の70%以上", "B. 当該自動車の幅の80%以上", "C. 当該自動車の幅の90%以上", "D. 当該自動車の幅以上"],answer:"B",exp:"第236条第5項の規定により、タンクの損傷を防止するための装置は車両中心線に対して対称に取り付けられ、かつ、その長さが当該自動車の幅の80%以上でなければならない。"},
  {no:6717,section:"保安基準細目",label:"第237条（乗車定員及び最大積載量）",q:"幼児専用車以外の自動車における連続した座席の座席定員の算出方法として正しいものはどれか。",choices:["A. 当該座席の幅を27cmで除して得た整数値", "B. 当該座席の幅を40cmで除して得た整数値", "C. 当該座席の幅を50cmで除して得た整数値", "D. 当該座席の幅を60cmで除して得た整数値"],answer:"B",exp:"第237条第1項第2号イの規定により、幼児専用車以外の自動車の連続した座席の座席定員は、当該座席の幅を40cmで除して得た整数値とする。"},
  {no:6718,section:"保安基準細目",label:"第237条（乗車定員及び最大積載量）",q:"幼児専用車における連続した座席の座席定員の算出方法として正しいものはどれか。",choices:["A. 当該座席の幅を20cmで除して得た整数値", "B. 当該座席の幅を25cmで除して得た整数値", "C. 当該座席の幅を27cmで除して得た整数値", "D. 当該座席の幅を30cmで除して得た整数値"],answer:"C",exp:"第237条第1項第2号ロの規定により、幼児専用車の連続した座席の座席定員は、当該座席の幅を27cmで除して得た整数値とする。"},
  {no:6719,section:"保安基準細目",label:"第237条（乗車定員及び最大積載量）",q:"立席定員を算出する際に使用する1人あたりの立席面積として規定されているものはどれか。",choices:["A. 0.10m2", "B. 0.12m2", "C. 0.14m2", "D. 0.16m2"],answer:"C",exp:"第237条第1項第3号の規定により、立席定員は立席面積の合計を0.14m2で除して得た整数値とする。"},
  {no:6720,section:"保安基準細目",label:"第238条（臨時乗車定員）",q:"臨時乗車定員の算出において、立席定員を求める際に用いる1人あたりの立席面積として正しいものはどれか。",choices:["A. 0.10m2", "B. 0.12m2", "C. 0.14m2", "D. 0.20m2"],answer:"C",exp:"第238条の規定により、臨時乗車定員の算出における立席定員は、立席面積の合計を0.14m2で除した整数値とする。"},
  {no:6721,section:"保安基準細目",label:"第241条（接地部及び接地圧）",q:"一般原動機付自転車の空気入りゴムタイヤ又は固形ゴムタイヤ（接地部の厚さ25mm以上）の接地圧の上限として正しいものはどれか。",choices:["A. タイヤの接地部の幅1cmあたり100kg", "B. タイヤの接地部の幅1cmあたり150kg", "C. タイヤの接地部の幅1cmあたり200kg", "D. タイヤの接地部の幅1cmあたり250kg"],answer:"C",exp:"第241条第3号の規定により、空気入りゴムタイヤ又は接地部の厚さ25mm以上の固形ゴムタイヤの接地圧は、タイヤの接地部の幅1cmあたり200kgを超えてはならない。"},
  {no:6722,section:"保安基準細目",label:"第241条（接地部及び接地圧）",q:"一般原動機付自転車のカタピラの接地圧の上限として正しいものはどれか。",choices:["A. カタピラの接地面積1cm2あたり1kg", "B. カタピラの接地面積1cm2あたり2kg", "C. カタピラの接地面積1cm2あたり3kg", "D. カタピラの接地面積1cm2あたり5kg"],answer:"C",exp:"第241条第4号の規定により、カタピラの接地圧はカタピラの接地面積1cm2あたり3kgを超えてはならない。"},
  {no:6723,section:"保安基準細目",label:"第243条（ばい煙、悪臭のあるガス、有害なガス等の発散防止装置）",q:"ガソリンを燃料とする一般原動機付自転車（総排気量0.050リットル超・最高速度50km/h超の二輪を除く）の一酸化炭素の排出基準（WMTCモード法による走行距離1kmあたりg）として正しいものはどれか。",choices:["A. 0.50以下", "B. 0.80以下", "C. 1.00以下", "D. 2.00以下"],answer:"C",exp:"第243条第1項第1号の規定により、一酸化炭素の排出量の平均値は1.00（g/km）を超えないものでなければならない。"},
  {no:6724,section:"保安基準細目",label:"第243条（ばい煙、悪臭のあるガス、有害なガス等の発散防止装置）",q:"総排気量0.050リットル以下で最高速度50km/h以下のガソリンを燃料とする一般原動機付自転車の一酸化炭素排出基準（二輪車モード法・走行距離1kmあたりg）として正しいものはどれか。",choices:["A. 1.0以下", "B. 1.5以下", "C. 2.0以下", "D. 3.0以下"],answer:"C",exp:"第243条第1項第2号の規定により、該当する小型の一般原動機付自転車の一酸化炭素排出量の平均値は2.0（g/km）を超えないものでなければならない。"},
  {no:6725,section:"保安基準細目",label:"第244条（前照灯）",q:"一般小型原動機付自転車の前照灯について、夜間確認できる障害物の距離として規定されているものはどれか。",choices:["A. 前方20mの距離にある交通上の障害物", "B. 前方30mの距離にある交通上の障害物", "C. 前方40mの距離にある交通上の障害物", "D. 前方50mの距離にある交通上の障害物"],answer:"C",exp:"第244条第2項第1号の規定により、一般小型原動機付自転車の前照灯は夜間にその前方40mの距離にある交通上の障害物を確認できる性能を有しなければならない。"},
  {no:6726,section:"保安基準細目",label:"第244条（前照灯）",q:"二輪の一般原動機付自転車以外の一般原動機付自転車に備える前照灯の取付位置として正しいものはどれか。",choices:["A. 地上0.8m以下", "B. 地上1.0m以下", "C. 地上1.2m以下", "D. 地上1.5m以下"],answer:"B",exp:"第244条第3項第2号の規定により、前照灯の取付位置は地上1m以下でなければならない。"},
  {no:6727,section:"保安基準細目",label:"第245条（番号灯）",q:"一般小型原動機付自転車に備える番号灯について、夜間の視認距離として規定されているものはどれか。",choices:["A. 後方5mの距離から標識の番号等を確認できること", "B. 後方8mの距離から標識の番号等を確認できること", "C. 後方10mの距離から標識の番号等を確認できること", "D. 後方15mの距離から標識の番号等を確認できること"],answer:"B",exp:"第245条第2項第1号の規定により、番号灯は夜間にその後方8mの距離から標識の番号等を確認できるものでなければならない。"},
  {no:6728,section:"保安基準細目",label:"第245条（番号灯）",q:"一般小型原動機付自転車の番号灯について、その構造に関する規定として正しいものはどれか。",choices:["A. 番号灯は点滅するものであること", "B. 番号灯は前照灯が点灯している場合に消灯できない構造であること", "C. 番号灯は常時点灯していなければならない", "D. 番号灯は尾灯と連動して点滅できること"],answer:"B",exp:"第245条第5項第1号の規定により、番号灯は運転者席において消灯できない構造又は前照灯が点灯している場合に消灯できない構造でなければならない。"},
