<script>
const questions = [
{no:1, cat:"エンジン", stem:"ディーゼルエンジンに関する記述として、適切なものはどれか。", answer:"C",
 choices:{A:"ガソリンと空気の混合気をシリンダー内に吸入し、点火プラグで着火する",B:"スロットルバルブで吸気量を制御することで出力を調整する",C:"圧縮された高温の空気に軽油を噴射し、自己着火によって燃焼させる",D:"熱効率が低く燃費はガソリンエンジンより劣る"},
 explanation:"正解はC。ディーゼルエンジンは空気のみを吸入して高圧縮し、高温になった空気に軽油を噴射して自己着火させる。AとBはガソリンエンジンの特徴。Dは誤りで、ディーゼルエンジンは熱効率に優れ燃費が良い。"},

{no:2, cat:"エンジン", stem:"軽油の引火点と着火点の組み合わせとして、適切なものはどれか。", answer:"B",
 choices:{A:"引火点 約-40℃、着火点 約300℃",B:"引火点 約60℃、着火点 約250℃",C:"引火点 約60℃、着火点 約300℃",D:"引火点 約-40℃、着火点 約250℃"},
 explanation:"正解はB。軽油の引火点は約60℃（常温では引火しない）、着火点は約250℃（自己着火しやすい）。なおガソリンは引火点約-40℃・着火点約300℃で、常温でも引火しやすく自己着火しにくい。"},

{no:3, cat:"エンジン", stem:"ポンピングロスに関する記述として、適切なものはどれか。", answer:"A",
 choices:{A:"吸入行程で空気をシリンダー内に吸い込む力と排気行程で燃焼ガスを押し出す力による損失をいう",B:"ピストンとシリンダーライナーの摩擦により発生する損失をいう",C:"ディーゼルエンジンではガソリンエンジンより一般にポンピングロスが大きい",D:"スロットルバルブで吸気を絞るためポンピングロスが発生する"},
 explanation:"正解はA。ポンピングロスは吸入・排気行程で生じるポンプ仕事の損失。Cは逆で、ディーゼルエンジンは燃料噴射量で出力制御するためスロットルバルブで絞るガソリンエンジンより一般にポンピングロスが抑制される。Dはガソリンエンジンの説明。"},

{no:4, cat:"エンジン", stem:"バルブオーバーラップに関する記述として、適切なものはどれか。", answer:"D",
 choices:{A:"吸気バルブと排気バルブが完全に閉じている状態のことをいう",B:"圧縮上死点付近で吸気バルブのみが開いている状態をいう",C:"排気上死点付近で排気バルブのみが開いている状態をいう",D:"ピストンが排気上死点付近にあり、吸気バルブと排気バルブが同時に開いている状態をいう"},
 explanation:"正解はD。バルブオーバーラップとは、ピストンが排気上死点付近にあるとき吸気バルブと排気バルブが同時に開いている状態のこと。この状態を利用して吸排気効率を高めている。"},

{no:5, cat:"エンジン", stem:"噴射タイミングに関する記述として、適切なものはどれか。", answer:"B",
 choices:{A:"エンジン回転数が高くなるほど噴射タイミングを遅らせる必要がある",B:"燃料噴射開始から自己着火が始まるまでの時間を着火遅れ期間という",C:"着火遅れ期間はエンジン回転数が上がるほど長くなる",D:"最大燃焼圧力はピストンが圧縮上死点に達したときに得るのが理想である"},
 explanation:"正解はB。着火遅れ期間とは燃料噴射から自己着火開始までの時間。エンジン回転数が高くなってもこの時間は変わらないため、回転数が高いときほど噴射タイミングを早める（進角する）必要がある。最大圧力はピストン下降開始直後が理想。"},

{no:6, cat:"エンジン", stem:"日野自動車の直列6気筒ディーゼルエンジンの噴射順序として、適切なものはどれか。", answer:"C",
 choices:{A:"1→2→3→4→5→6",B:"1→3→5→2→4→6",C:"1→4→2→6→3→5",D:"1→5→3→6→2→4"},
 explanation:"正解はC。日野自動車の直列6気筒エンジンの噴射順序は1→4→2→6→3→5。この順序はエンジンの振動・バランスを考慮して設計されており、隣接するシリンダーが連続して燃焼しないように設定されている。"},

{no:7, cat:"エンジン", stem:"シリンダーヘッドに関する記述として、適切なものはどれか。", answer:"A",
 choices:{A:"シリンダーブロックの上面にヘッドガスケットを介して取り付けられ、燃焼室の一部を形成する",B:"アルミニウム合金製が一般的で、軽量化のため特に冷却への配慮は少ない",C:"シリンダーヘッドボルトは脱着後に首下長さを測定する必要はなく再使用可能である",D:"シリンダーヘッドガスケットはシール面が潰れていないため再使用が可能である"},
 explanation:"正解はA。シリンダーヘッドはシリンダーブロック上面にヘッドガスケットを介して取り付けられ燃焼室の一部を形成する。一般に鋳鉄製。Bは誤りで直接燃焼ガスに接するため冷却への配慮が必要。CとDも誤りで、ヘッドボルトは塑性変形しているため再使用不可が原則、ガスケットも再使用不可。"},

{no:8, cat:"エンジン", stem:"塑性域角度法に関する記述として、不適切なものはどれか。", answer:"D",
 choices:{A:"弾性域限界の降伏点まで締め付けた後、さらに規定の角度で増し締めする方法である",B:"高い締め付け力（軸力）を発生させ、装置の締結をより強固にする効果がある",C:"塑性域まで締め付けたボルトは基本的に再使用できない",D:"規定の角度を超えて増し締めしても、軸力が増えるのみで問題は生じない"},
 explanation:"正解はD（不適切なもの）。規定の角度以上で締め付けるとボルトが破断する。塑性域角度法では規定トルクで降伏点まで締め、さらに規定角度で増し締めすることで大きな軸力を得るが、過度な締め付けはボルト破断の原因になる。"},

{no:9, cat:"エンジン", stem:"シリンダーライナーに関する記述として、適切なものはどれか。", answer:"B",
 choices:{A:"湿式ライナーは外周が直接冷却水に触れず、現在の主流である",B:"乾式ライナーは外周が直接冷却水に触れない方式で、現在主流である",C:"シリンダーライナーの最も摩耗が激しい部分はピストン速度が最も速いシリンダー中央付近である",D:"シリンダーライナーの材質は軽量なアルミニウム合金が一般的に使用される"},
 explanation:"正解はB。乾式ライナーは外周が冷却水に直接触れない方式で現在主流。湿式ライナーは外周が直接冷却水に接する方式だが、現在は乾式が主流。シリンダーの最大摩耗は燃焼圧力が作用するピストン上死点のピストンリング位置付近。材質は特殊鋳鉄製。"},

{no:10, cat:"エンジン", stem:"ピストンリングに関する記述として、不適切なものはどれか。", answer:"C",
 choices:{A:"気密性の保持、ピストンの冷却、オイルのかき落としなどの働きがある",B:"1個のピストンに対し、2〜3本のコンプレッションリングと1本のオイルリングが取り付けられている",C:"コンプレッションリングの合い口隙間はゼロに近いほどシール性が高まるため、隙間のないものが使用される",D:"燃焼圧力を直接受けるトップリングにはPVD処理を施し、耐摩耗性を高めている"},
 explanation:"正解はC（不適切なもの）。ピストンリングの合い口隙間は、エンジン作動中の高温下での熱膨張を考慮して設けられている。隙間がないと熱膨張時にリングが突き合わさりシリンダーを損傷させる恐れがある。"},

{no:11, cat:"エンジン", stem:"HFCDピストンに関する記述として、適切なものはどれか。", answer:"A",
 choices:{A:"ダクタイル鋳鉄製で、内部にクーリングチャンネルを設けてエンジンオイルで冷却する構造である",B:"アルミニウム合金製で、軽量・高熱伝導性を特長とする日野自動車独自のピストンである",C:"熱膨張係数が大きいためアルミニウム合金製ピストンより大きなピストンクリアランスが必要である",D:"PAI（ポリアミドイミド樹脂）コーティングにより耐熱性を高めたアルミニウム合金製ピストンである"},
 explanation:"正解はA。HFCDピストンは日野自動車が開発したダクタイル鋳鉄製ピストン。鋳鉄製の高強度を保ちながら肉薄軽量化し、内部にクーリングチャンネルを設けエンジンオイルで冷却する。鋳鉄製のため熱膨張率が小さく、ピストンクリアランスを小さくできる。"},

{no:12, cat:"エンジン", stem:"ターボチャージャーに関する記述として、適切なものはどれか。", answer:"D",
 choices:{A:"電動モーターで駆動されるためエンジン回転数に関わらず一定の過給圧が得られる",B:"エンジンの吸入空気を圧縮するが、燃料噴射量は変えないため出力増加の効果は小さい",C:"ターボチャージャーの採用により熱効率が低下し、燃費が悪化するという欠点がある",D:"排気ガスのエネルギーでタービンを回転させ、コンプレッサーで吸入空気を圧縮・過給する"},
 explanation:"正解はD。ターボチャージャーは排気ガスでタービンを回し、同軸のコンプレッサーで吸入空気を圧縮・過給する装置。これにより充填効率が上がり出力・熱効率が向上する。ディーゼルエンジンとターボチャージャーの相性が良く、燃費向上に貢献する。"},

{no:13, cat:"エンジン", stem:"排気ガス浄化装置（DPR）に関する記述として、適切なものはどれか。", answer:"B",
 choices:{A:"DPRはNOxを主に除去するための装置で、PMの処理は別の装置が担う",B:"排気ガス中のPM（粒子状物質）をフィルターで捕集し、燃焼除去することで浄化する装置である",C:"尿素水を使用してPMを直接分解する仕組みである",D:"DPRは交換不要な恒久的な装置で、定期的なメンテナンスは必要ない"},
 explanation:"正解はB。DPR（Diesel Particulate active Reduction system）は排気ガス中のPM（粒子状物質）をフィルターで捕集し、バーナー等で燃焼除去する装置。NOxの浄化はSCRシステム（尿素SCR）が担う。定期的な強制再生や点検が必要。"},

{no:14, cat:"エンジン", stem:"オイルポンプに関する記述として、適切なものはどれか。", answer:"C",
 choices:{A:"電動モーターで駆動され、エンジン回転数に関わらず一定の油圧を発生する",B:"オイルポンプにはベーン式が採用され、構造が複雑だが高効率である",C:"クランクシャフトによって駆動され、日野自動車では構造が簡単で信頼性が高いギヤポンプ式を採用している",D:"油圧が低くなりすぎた場合にセーフティバルブが開弁し油圧を高める"},
 explanation:"正解はC。オイルポンプはクランクシャフトで駆動されるギヤポンプ式が日野自動車で採用されている。セーフティバルブは油圧が規定値以上に高くなった場合に開弁して余剰オイルをオイルパンに戻し、規定値以上にならないよう保護する。"},

{no:15, cat:"エンジン", stem:"オイルクーラーに関する記述として、適切なものはどれか。", answer:"A",
 choices:{A:"水冷多板式で、エレメント中をエンジンオイルが流れ、周囲をエンジン冷却水が流れて熱交換する",B:"空冷フィン式で、走行風によってエンジンオイルを冷却する構造である",C:"エンジンオイル温度が高いときは冷却し、低いときは冷却せず低温状態を維持する",D:"エンジンオイル温度が125℃以上になっても潤滑性能への影響はない"},
 explanation:"正解はA。オイルクーラーは水冷多板式で、エレメント中をエンジンオイルが流れ、その周囲をエンジン冷却水が流れて熱交換を行う。エンジンオイル温度が高いときは冷却し、低いときは温める（双方向）。エンジンオイルは125℃以上で急激に潤滑性を失う。"},

{no:16, cat:"エンジン", stem:"サーモスタットに関する記述として、適切なものはどれか。", answer:"D",
 choices:{A:"冷却水温が低い時にラジエーターへ冷却水を流し、暖機を早める",B:"ペレット内の固体ワックスが冷却水温によって収縮・膨張する作用を利用してバルブを開閉する",C:"日野自動車のエンジンでは開弁温度が95℃、全開温度が76.5〜82℃となっている",D:"冷却水温が低い時はサーモスタットが閉じ、冷却水はラジエーターをバイパスして暖機を促進する"},
 explanation:"正解はD。サーモスタットは冷却水温が低いときに閉じてラジエーターをバイパスさせ暖機を促進する。Bは逆で、冷却水温が高くなるとワックスが液体になり膨張してバルブが開く。日野自動車では開弁温度76.5〜82℃、全開温度95℃。"},

{no:17, cat:"エンジン", stem:"ラジエーターキャップのプレッシャーバルブに関する記述として、適切なものはどれか。", answer:"B",
 choices:{A:"冷却系統内を常に大気圧に保つことで沸点を下げ、冷却効率を高める",B:"冷却系統を加圧することで沸点を上昇させ、冷却効率を高める",C:"冷却水温が下がったときに開弁して冷却水圧力を下げる役割を担う",D:"バキュームバルブと同じ機能を持ち、負圧時にリザーブタンクへ冷却水を送る"},
 explanation:"正解はB。ラジエーターキャップのプレッシャーバルブは冷却系統を常に加圧し沸点を上昇させることで冷却効率を高める。加圧によりクーラントポンプ吸込み口のキャビテーション発生も抑制する。バキュームバルブは冷却水温が下がったとき（負圧発生時）にリザーブタンクから冷却水を吸い込む。"},

{no:18, cat:"エンジン", stem:"コモンレール式電子制御燃料噴射システムに関する記述として、適切なものはどれか。", answer:"C",
 choices:{A:"機械式燃料噴射システムと比較して、エンジン側の条件に依存した制御が特徴である",B:"コモンレール内の燃料圧力は最大で約20MPa程度である",C:"一度の燃焼行程中に複数回の燃料噴射（マルチ噴射）を行うことができる",D:"サプライポンプは電動モーターで駆動され、エンジンとは独立して作動する"},
 explanation:"正解はC。コモンレール式は電子制御によりマルチ噴射（1燃焼行程中に複数回噴射）が可能。コモンレール内燃料圧力は200MPaに達する高圧。サプライポンプはタイミングギヤを介してクランクシャフトで駆動される。"},

{no:19, cat:"エンジン", stem:"SCVに関する記述として、適切なものはどれか。", answer:"A",
 choices:{A:"SCVはサプライポンプからの吐出量を調整し、コモンレール内の圧力を制御するバルブである",B:"SCVはコモンレールに取り付けられた圧力センサーで、燃料圧力を検知する",C:"SCVはインジェクターに内蔵され、噴射タイミングを制御する二方電磁弁である",D:"SCVは全エンジン形式に共通して採用されている統一規格の部品である"},
 explanation:"正解はA。SCV（Suction Control Valve）はサプライポンプからの吐出量を調整してコモンレール内圧力を制御するバルブ。通電時間に応じて燃料通路面積を変化させプランジャー室への燃料吸入量を調量する。E13CエンジンではPCV、A09CではMPROPが同様の目的で使用される。"},

{no:20, cat:"エンジン", stem:"フューエルフィルターに関する記述として、適切なものはどれか。", answer:"D",
 choices:{A:"フューエルフィルターはコモンレールとインジェクターの間に設置されている",B:"水分の分離を行うセジメンター機能がなく、水抜き作業は不要である",C:"エレメント交換時は必ず上下を確認し、正しい向きに取り付ける必要がある",D:"フューエルフィルターはサプライポンプとフィードポンプの間に設置され、燃料中の不純物をろ過する"},
 explanation:"正解はD。フューエルフィルターはフィードポンプとサプライポンプ本体の間に設置され、不純物のろ過と水分の分離（セジメンター機能）を行う。倒立型エレメントは上下の区別のない対称形状で誤組みが起こらない設計。"},

{no:21, cat:"エンジン", stem:"コモンレールに関する記述として、不適切なものはどれか。", answer:"B",
 choices:{A:"サプライポンプによって生成された高圧燃料を蓄え、各シリンダーのインジェクターに分配する",B:"コモンレール内の燃料圧力はエンジン回転数にかかわらず常に一定で、制御の必要はない",C:"プレッシャーリミッターが装着されており、許容圧力を超えたときに作動する",D:"インジェクションパイプとコモンレールを結ぶ高圧噴射パイプを等長化して噴射量を安定させている"},
 explanation:"正解はB（不適切なもの）。コモンレール内の燃料圧力はエンジン回転数と負荷による目標値と実際の圧力値が一致するようフィードバック制御が行われる。圧力は常に制御・調整されており、一定ではない。"},

{no:22, cat:"電気装置", stem:"オルタネーターに関する記述として、適切なものはどれか。", answer:"A",
 choices:{A:"交流発電機で、発電された交流電圧はレクチファイヤーによって直流電圧に変換される",B:"クランクシャフトに対してエンジン回転数の約半分で回転する",C:"発電量はICレギュレーターではなく、ベルトの張り具合によって調整される",D:"直列に2個接続されたバッテリーに対し、同電圧の24Vで充電する"},
 explanation:"正解はA。オルタネーターは交流発電機で、レクチファイヤー（整流器）により交流を直流に変換する。エンジン回転数の約2倍で回転する。発電量の調整はICレギュレーターが行う。充電電圧はバッテリー電圧より少し高い28.5Vである。"},

{no:23, cat:"電気装置", stem:"ICレギュレーターに関する記述として、適切なものはどれか。", answer:"C",
 choices:{A:"エンジン始動時のみ作動し、高回転時には停止する装置である",B:"ローターコイルへの電流ではなく、ステーターコイルへの電流を制御して発電量を調整する",C:"エンジン高回転時には発電過多とならないよう、ローターコイルへの電流を調整して電圧を一定に保つ",D:"ICレギュレーターが故障してショート状態になるとバッテリーが上がりやすくなる"},
 explanation:"正解はC。ICレギュレーターはエンジン回転数による発電量の変動を抑えるため、ローターコイル（フィールドコイル）への電流を制御して電圧を一定に保つ。ICレギュレーター内トランジスターがショートすると常に充電状態となりバッテリー過充電（液が急激に減少）が発生する。"},

{no:24, cat:"電気装置", stem:"スターターに関する記述として、適切なものはどれか。", answer:"D",
 choices:{A:"スターターはオーバーランニングクラッチを介してクランクシャフトを直接回転させる",B:"日野自動車の大型エンジンでは12V-6kWのスターターを使用している",C:"スターター回転数は約700〜1000rpmで、この回転数でエンジンを始動させる",D:"マグネットスイッチがソレノイドの吸引力でレバーを動かしピニオンを押し出し、フライホイールのリングギヤにかみ合わせる"},
 explanation:"正解はD。スターターのマグネットスイッチはソレノイドの吸引力でレバーを介しピニオンをフライホイールのリングギヤにかみ合わせ、同時にモーターへ電力を供給する。大型エンジンは24V-6kW。始動回転数はおよそ70〜100r/minである。"},

{no:25, cat:"電気装置", stem:"バッテリーに関する記述として、不適切なものはどれか。", answer:"C",
 choices:{A:"バッテリーは電気エネルギーを化学エネルギーとして蓄え、必要に応じて電気エネルギーを取り出す装置である",B:"長期間放置すると自己放電により充電量が低下する自己放電という現象がある",C:"トラック・バスのバッテリーは12Vバッテリーを並列接続し、24Vで各電装品を作動させる",D:"バッテリー液の比重を測定することで充電状態を確認することができる"},
 explanation:"正解はC（不適切なもの）。トラック・バスのバッテリーは12Vバッテリーを直列接続して24Vにしている。並列接続では電圧は12Vのままで容量が増えるだけである。"},

{no:26, cat:"T/M", stem:"クラッチの役割に関する記述として、不適切なものはどれか。", answer:"D",
 choices:{A:"エンジン始動時にエンジンとトランスミッションを切り離し、スターターの回転負荷を軽減する",B:"トランスミッション変速時に動力を遮断し、ギヤの噛み合いを容易にする",C:"車両発進時にエンジンの動力をトランスミッションに徐々に伝達し、スムーズな発進を可能にする",D:"クラッチは動力の伝達・遮断のみを目的とし、振動低減やダンパー機能は持たない"},
 explanation:"正解はD（不適切なもの）。クラッチは動力の伝達・遮断だけでなく、駆動系に過負荷をかけないこと、車両振動を低減させるダンパー作用、アイドリング中の打音や低速ガラ音の低減なども担っている。"},

{no:27, cat:"T/M", stem:"クラッチフェーシングに関する記述として、適切なものはどれか。", answer:"B",
 choices:{A:"セラメタリックディスクはガラス繊維ベースで、接続感が優れ相手部品への攻撃性が低い",B:"セミモールドディスクはガラス繊維をベースに合成樹脂等を浸透させ加熱硬化成型したもので、諸性能のバランスが良く多くの車両に使用されている",C:"クラッチフェーシングの摩擦係数は250℃以上でも変化せず安定している",D:"コンビディスクはセラメタリック材のみを使用した最高性能のディスクである"},
 explanation:"正解はB。セミモールドディスク（オーガニックディスク）はガラス繊維ベースで諸性能のバランスがよく広く使用される。セラメタリックは銅母体に磁器粉末を焼結したもので耐熱・耐久性は高いが相手部品への攻撃性がある。摩擦係数は250℃以上で低下し摩耗量が急増する。"},

{no:28, cat:"T/M", stem:"ダイヤフラムスプリング式クラッチに関する記述として、適切なものはどれか。", answer:"C",
 choices:{A:"複数のコイルスプリングでプレッシャープレートをクラッチディスクに押し付ける方式である",B:"部品点数が多く構造が複雑であるが、大きなトルク容量が得られるため主に大型トラックに採用されている",C:"クラッチフェーシングが摩耗してもバネ力が低下しにくく、高速回転時に遠心力によるバネ力の減少が少ない",D:"プレッシャープレートへの圧力が不均一になるため、クラッチの断続作用が不安定になりやすい"},
 explanation:"正解はC。ダイヤフラムスプリング式は皿バネ状のダイヤフラムスプリングを使用し、部品点数が少なく構造簡単で圧力が全周に均一。フェーシング摩耗後もバネ力が低下しにくく、高回転時の遠心力によるバネ力減少も少ないため乗用車からトラックまで広く採用される。"},

{no:29, cat:"T/M", stem:"トランスミッションの変速比に関する記述として、適切なものはどれか。", answer:"A",
 choices:{A:"変速比は「アウトプットギヤの歯数÷インプットギヤの歯数」で表され、変速比が大きいほどトルクが増大し回転数は低下する",B:"変速段数が上がるにつれて変速比は大きくなり、最高段では最大の変速比となる",C:"オーバードライブとは変速比が1より大きい状態で、高い駆動力が得られる",D:"変速比が大きいと高速走行に適し、小さいと発進・登坂に適している"},
 explanation:"正解はA。変速比が大きいほどアウトプットシャフトの回転数は低下するがトルクは増大する（発進・登坂に有利）。変速段数が上がるほど変速比は小さくなり、最高段では1または1以下（オーバードライブ）となる。"},

{no:30, cat:"T/M", stem:"シンクロメッシュ機構に関する記述として、適切なものはどれか。", answer:"D",
 choices:{A:"変速時に回転数が同期する前にギヤを噛み合わせることで素早い変速を可能にする機構である",B:"コンスタントメッシュ方式はシンクロメッシュ機構を備えており、スムーズな変速が可能である",C:"ダブルシフトを防止する装置であり、二重噛み合い防止装置と同じ機能を持つ",D:"変速時に回転数の異なるアウトプットシャフトとアウトプットギヤをスムーズに噛み合わせるための装置である"},
 explanation:"正解はD。シンクロメッシュ機構は変速時に回転数の異なる部品の回転を同期させてからギヤを噛み合わせる機構。コンスタントメッシュはシンクロメッシュ機構を持たず大きな力を伝達できる。"},

{no:31, cat:"T/M", stem:"ディファレンシャルの機能に関する記述として、適切なものはどれか。", answer:"B",
 choices:{A:"ディファレンシャルはトランスミッションと同様に変速比を変えることができる",B:"旋回時などに左右のタイヤの回転差を自動的に調整し、スムーズな旋回を可能にする差動作用を持つ",C:"ハイポイドギヤはドライブピニオンの中心がリングギヤの中心より上にあるため車高を低くできる",D:"ディファレンシャルの最終減速比を大きくすると最高速度が向上し、登坂性能は低下する"},
 explanation:"正解はB。ディファレンシャルは左右のタイヤの回転差を自動調整する差動作用を持つ。ハイポイドギヤはドライブピニオンがリングギヤ中心より下にあるためプロペラシャフトを低くでき車両床面を低くできる。最終減速比を大きくすると登坂性能が向上するが最高速度は低下する。"},

{no:32, cat:"T/M", stem:"LSD（Limited Slip Differential）に関する記述として、適切なものはどれか。", answer:"C",
 choices:{A:"LSDは旋回時に外側のタイヤへ駆動力を集中させる装置である",B:"ノンスピンディファレンシャルは制動時に外輪をフリーにし、内輪のみ制動力を伝える",C:"多板クラッチ式LSDは片方のホイールがスリップしても他方に駆動力を伝え、脱出性・走破性を向上させる",D:"LSDを使用すると通常走行時の旋回半径が大きくなり操縦性が低下する"},
 explanation:"正解はC。多板クラッチ式LSDはディファレンシャルギヤ内の摩擦多板クラッチで差動作用を制限し、片輪スリップ時でも他方に駆動力を伝える。ノンスピンディファレンシャルは駆動旋回時に外輪側ドリブンクラッチをセンターカムから切り離し内輪のみ駆動、制動時は異なる作動をする。"},

{no:33, cat:"シャシ・フレーム", stem:"サスペンションスプリングの種類に関する記述として、適切なものはどれか。", answer:"D",
 choices:{A:"リーフスプリングは衝撃を和らげる作用に優れ、重量が小さく乗り心地が良い",B:"エアスプリングは前後左右方向の剛性が高いため、ラジアスロッドなどの補助装置は不要である",C:"コイルスプリングはリーフスプリングと同様にアクスルを単独で支えることができる",D:"エアスプリングは荷重に比例して硬さが変化するため、空車時と積載時の乗り心地に差が出にくい"},
 explanation:"正解はD。エアスプリングは圧縮空気の弾性を利用し、荷重に比例して硬さが変化するため空車・積載時で乗り心地差が少ない。ただしエアスプリングは前後左右の剛性がないためラジアスロッドやラテラルロッドが必要。コイルスプリングは単独ではアクスルを支えられない。"},

{no:34, cat:"シャシ・フレーム", stem:"ショックアブソーバーに関する記述として、適切なものはどれか。", answer:"A",
 choices:{A:"スプリングの無駄な伸縮を抑え、乗り心地・タイヤの接地性・操縦安定性を向上させる",B:"縮み側のみに作用する単動式が主流で、伸び側には作用しない",C:"ショックアブソーバーはスプリングの振動エネルギーを位置エネルギーに変換する",D:"スプリングの振動をオイルの流通抵抗で減衰させるが、窒素ガスは使用されない"},
 explanation:"正解はA。ショックアブソーバーはスプリングの無駄な伸縮を抑えて乗り心地・接地性・操縦安定性を向上させる。ピストン上下運動のエネルギーは熱エネルギーに変換される（位置エネルギーではない）。複動式は縮み・伸びの両方に作用する。"},

{no:35, cat:"シャシ・フレーム", stem:"ホイールアライメントのキャスター角に関する記述として、適切なものはどれか。", answer:"C",
 choices:{A:"キャスター角とはタイヤを前方から見たときのタイヤ中心線の傾きを指す",B:"キャスター角を設けることで、直進走行時のタイヤの横滑りを防止する",C:"キャスター角はステアリング軸の傾きで、直進安定性の確保と操舵後のハンドルの直進復元力を発生させる",D:"キャスター角はキャンバー角とも呼ばれ、タイヤの摩耗を均一にする効果がある"},
 explanation:"正解はC。キャスター角はステアリング軸（キングピン軸）の前後方向の傾きで、直進安定性の確保とハンドルの直進復元力を生み出す。キャンバー角はタイヤを前方から見たときのタイヤ中心線の傾き。"},

{no:36, cat:"シャシ・フレーム", stem:"スタビライザーに関する記述として、適切なものはどれか。", answer:"B",
 choices:{A:"路面の凹凸で左右サスペンションが同方向に動く場合、スタビライザーが捻れて最大の復元力が発生する",B:"旋回時に外側のサスペンションが縮み内側が伸びるとスタビライザーが捻れ、復元力で車体の傾きを抑える",C:"スタビライザーはコの字型のバーで、バーの中央部を左右のアームに接続する構造である",D:"スタビライザーはショックアブソーバーと同じ機能を持ち、振動を減衰させる"},
 explanation:"正解はB。旋回時は遠心力で外側サスペンションが縮み内側が伸びるため、スタビライザーバーが捻れて復元力が発生し車体の傾きを抑える。路面凹凸で左右が同方向に動く場合はスタビライザーが捻れないので抑制されない。スタビライザーはコの字型で両端を左右アームに接続し中央部をフレームで支持する。"},

{no:37, cat:"シャシ・フレーム", stem:"エアオーバーブレーキシステムに関する記述として、適切なものはどれか。", answer:"D",
 choices:{A:"ブレーキの操作力はすべて油圧のみで伝達され、エアの補助はない",B:"エアオーバーブレーキシステムはフルエアブレーキシステムより構造が複雑で大型車専用である",C:"ブレーキブースターは電動モーターによって倍力を行う装置である",D:"ブレーキペダルの操作力を油圧と圧縮空気の両方を使って倍力する方式である"},
 explanation:"正解はD。エアオーバーブレーキシステムはブレーキペダルの操作力を油圧と圧縮空気の両方を使って伝達・倍力するシステム。フルエアブレーキはブレーキ力の伝達をすべて圧縮空気で行う。ブレーキブースターは負圧と大気圧の差（バキューム式）または圧縮空気を利用して倍力する。"},

{no:38, cat:"シャシ・フレーム", stem:"フルエアブレーキシステムのスプリングブレーキチャンバーに関する記述として、適切なものはどれか。", answer:"A",
 choices:{A:"スプリングブレーキはスプリングの力でブレーキを作動させ、エアを供給することでスプリングを押し縮めてブレーキを解除する構造である",B:"スプリングブレーキは通常走行時にスプリング力でブレーキが作動した状態を維持する",C:"スプリングブレーキはサービスブレーキとして使用され、ブレーキペダル操作によって作動する",D:"スプリングブレーキチャンバーはエアが失陥しても自動的にブレーキが解除される安全機能を持つ"},
 explanation:"正解はA。スプリングブレーキはスプリングの力でブレーキを作動させる（フェールセーフ機能）。エアを供給してスプリングを押し縮めることでブレーキが解除される。エアが失陥した際はスプリング力でブレーキが作動し安全側に働く。"},

{no:39, cat:"シャシ・フレーム", stem:"車両の動きのうち、ローリングに関する記述として、適切なものはどれか。", answer:"C",
 choices:{A:"路面の大きな凸凹を乗り越えたときなどにボディ全体が前後にゆれる現象である",B:"うねりのある路面や高速走行時に車両全体が上下に振動する現象である",C:"旋回時や凸凹の路面走行時にスプリングがたわんで、ボディが左右にゆれる現象である",D:"路面のわだちで車両がふらつき真っすぐに走らない不安定な状態である"},
 explanation:"正解はC。ローリングは旋回時や凸凹路面走行時にボディが左右にゆれる現象。Aはピッチング（前後の揺れ）、Bはバウンジング（上下振動）、Dはワンダリング（わだちによるふらつき）の説明。"},

{no:40, cat:"電気装置", stem:"オームの法則に関する記述として、適切なものはどれか。", answer:"B",
 choices:{A:"電流は電圧に反比例し、抵抗に比例する",B:"電流（A）は電圧（V）を抵抗（Ω）で割ることで求められる",C:"抵抗が大きいほど同じ電圧では電流が多く流れる",D:"電圧が高いほど同じ抵抗では電流が少なくなる"},
 explanation:"正解はB。オームの法則はI=V/R（電流=電圧÷抵抗）。電流は電圧に比例し抵抗に反比例する。抵抗が大きいほど電流は流れにくくなり、電圧が高いほど電流は多く流れる。"},

{no:41, cat:"電気装置", stem:"直列回路と並列回路に関する記述として、適切なものはどれか。", answer:"D",
 choices:{A:"直列接続では各抵抗にかかる電圧が電源電圧と等しく、電流は分流する",B:"並列接続では回路全体の合成抵抗は各抵抗の中で最も大きい値となる",C:"自動車の電装品は基本的に直列接続されており、1つが故障すると他も停止する",D:"並列接続では回路全体の合成抵抗は各抵抗のどの値よりも小さくなる"},
 explanation:"正解はD。並列接続の合成抵抗は1/R0=1/R1+1/R2+... で求められ、各抵抗値より小さくなる。自動車の電装品は基本的に並列接続で、一つが故障しても他には影響が少ない。直列接続では電流値はどこでも等しく、各電圧の合計が電源電圧に等しい。"},

{no:42, cat:"電気装置", stem:"リレーに関する記述として、適切なものはどれか。", answer:"A",
 choices:{A:"小さな電気で大きな電気をON/OFFすることができる装置で、主に大電流が流れる回路に使用する",B:"リレーは回路の過電流を検知して断線させ、電装品や配線を保護する安全装置である",C:"リレーの接点はスイッチをONにしていなくてもスプリングで接続状態を維持している",D:"リレーを使用することで、大電流が流れる配線を運転席まで引き回す必要がある"},
 explanation:"正解はA。リレーは電磁石（コイル）、接点、スプリングで構成され、小さな電気でコイルを励磁して接点を閉じ、大きな電気を断続する装置。電気が流れていないとき接点はスプリング力によって切断（開路）状態。リレーにより運転席への太い電線の引き回しが不要になる。"},

{no:43, cat:"電気装置", stem:"ヒューズおよびヒュージブルリンクに関する記述として、適切なものはどれか。", answer:"C",
 choices:{A:"ヒューズは過電流が流れたとき瞬時に溶断し、定格電流を少しでも超えるとすぐに切れる",B:"ヒュージブルリンクはヒューズボックス内に設置され、個々の電装品を保護するために使用される",C:"ヒュージブルリンクはバッテリー近くの最上流に取り付けられ、衝突事故等でのワイヤーハーネスショートによる火災を防ぐ",D:"現在の主流はガラス管型ヒューズで、溶断の確認がしやすい構造になっている"},
 explanation:"正解はC。ヒュージブルリンクはバッテリー近くの最上流に取り付けられ、衝突事故などでワイヤーハーネスがボディとショートした際の火災を防ぐ。個々の電装品保護はヒューズが担う。現在の主流はミニブレードヒューズ（ブレード型）で、色による識別と溶断確認がしやすい。"},

{no:44, cat:"電気装置", stem:"ボディアースに関する記述として、適切なものはどれか。", answer:"B",
 choices:{A:"ボディアースはバッテリーのプラス端子と電装品のプラス極をボディに接続する配線方式である",B:"バッテリーのマイナス端子と電装品のマイナス極をボディに接続し、車体を電気回路の一部として利用する",C:"ボディアース方式では行きと帰りの2本の配線が必要で、配線が複雑になる",D:"車両ボディに触ると感電するのは、ボディに常時大きな電流が流れているためである"},
 explanation:"正解はB。ボディアースはバッテリーのマイナス端子と電装品のマイナス極をボディに接続して車体を電気の帰路として使用することで配線を簡略化する方式。感電しない理由は、人がボディに触れても電源まで閉じた回路が成立しないため人体に電流が流れないから。"},

{no:45, cat:"電気装置", stem:"ワイヤーハーネスに関する記述として、適切なものはどれか。", answer:"D",
 choices:{A:"ワイヤーハーネスは太いほど抵抗が大きくなり、電流が流れにくくなる",B:"周囲温度が高くなるほど許容電流は小さくなり、収束本数が多くなるほど許容電流は大きくなる",C:"ワイヤーハーネスのサイズは外径で表し、単位はmm（ミリメートル）を使用する",D:"ワイヤーハーネスが細かったり長くなったりすると抵抗が大きくなり、電流が流れにくくなる"},
 explanation:"正解はD。ハーネスが細いほど・長いほど抵抗が大きくなり電流が流れにくくなる。太いほど抵抗は小さく電流が流れやすい。周囲温度が高くなるほど・収束本数が多くなるほど許容電流は小さくなる。ハーネスサイズは公称断面積（mm²）で表す。"}
,
{no:46, cat:"エンジン", stem:"ディーゼルエンジンの利点に関する記述として、不適切なものはどれか。", answer:"D",
 choices:{A:"低回転で大きなトルクを発生することができる",B:"ガソリンエンジンより熱効率に優れ燃費が良い",C:"各部品が高強度で製造されており、耐久性に優れる",D:"高回転での出力特性に優れており、スポーツ走行に適している"},
 explanation:"正解はD（不適切なもの）。ディーゼルエンジンは各部品の重量が大きいため高回転化が難しく、スポーツ走行には向かない。ディーゼルの利点は低回転高トルク・高耐久性・低燃費であり、商用トラックに最適。"},

{no:47, cat:"エンジン", stem:"ディーゼルエンジンの欠点に関する記述として、適切なものはどれか。", answer:"C",
 choices:{A:"軽油は引火点が低く、取り扱いが危険である",B:"ガソリンエンジンより機械的な摩擦損失が大きく燃費が悪い",C:"高圧縮のため燃焼圧力が高く、大きな燃焼音が発生し騒音が大きい",D:"スロットルバルブで吸気を制御するためポンピングロスが大きい"},
 explanation:"正解はC。ディーゼルエンジンは高圧縮（圧縮比15〜22）のため燃焼圧力が高く、大きな燃焼音が発生して騒音が大きい。軽油の引火点は約60℃で常温では引火しない。ポンピングロスが小さいのはディーゼルの利点。"},

{no:48, cat:"エンジン", stem:"4サイクルディーゼルエンジンの圧縮行程に関する記述として、適切なものはどれか。", answer:"B",
 choices:{A:"吸気バルブと排気バルブが共に開いた状態でピストンが上昇する",B:"吸気バルブと排気バルブが共に閉じた状態でピストンが上昇し、空気を圧縮する",C:"空気と燃料の混合気をピストンが圧縮する",D:"ピストンが下降して圧縮した燃焼ガスを排出する"},
 explanation:"正解はB。4サイクルディーゼルエンジンの圧縮行程では、吸気バルブと排気バルブが共に閉じた状態でピストンが上昇し、シリンダー内の空気を高圧縮する。ディーゼルは空気のみを圧縮する（混合気ではない）。"},

{no:49, cat:"エンジン", stem:"ディーゼルエンジンとガソリンエンジンの比較に関する記述として、適切なものはどれか。", answer:"A",
 choices:{A:"ガソリンエンジンは引火点が低く常温でも引火しやすく、着火点が高く自己着火しにくい",B:"ガソリンエンジンの引火点は約60℃、着火点は約250℃である",C:"軽油の着火点はガソリンより高く、約300℃である",D:"ディーゼルエンジンは点火プラグで着火し、ガソリンエンジンは自己着火する"},
 explanation:"正解はA。ガソリンは引火点約-40℃（常温でも引火する）・着火点約300℃（自己着火しにくい）。軽油は引火点約60℃・着火点約250℃（自己着火しやすい）。ディーゼルは自己着火、ガソリンエンジンは点火プラグで着火する。"},

{no:50, cat:"エンジン", stem:"エンジンの熱勘定（エネルギーバランス）に関する記述として、適切なものはどれか。", answer:"D",
 choices:{A:"有効仕事として取り出せるエネルギーは燃料の持つエネルギーの大部分を占める",B:"冷却損失と排気損失はほぼ同一で、有効仕事とほぼ同じ割合となる",C:"ディーゼルエンジンの熱効率は約10〜15%である",D:"燃料の持つエネルギーは有効仕事・冷却損失・排気損失・機械損失などに分配される"},
 explanation:"正解はD。エンジンの熱勘定とは燃料のエネルギーがどのように分配されるかを示したもの。有効仕事・冷却損失・排気損失・機械損失などに分配される。ディーゼルエンジンの熱効率は30〜40%で、ガソリンエンジン（25〜28%）より高い。"},

{no:51, cat:"エンジン", stem:"セタン価に関する記述として、適切なものはどれか。", answer:"B",
 choices:{A:"セタン価とはガソリンのアンチノック性を示す指標で、数値が大きいほどノッキングが起きやすい",B:"セタン価はディーゼル燃料の着火性を示す指標で、数値が大きいほど自己着火しやすい",C:"セタン価が低い燃料ほどディーゼルエンジンに適しており、着火遅れが短くなる",D:"セタン価はオクタン価と同じ指標で、ガソリンとディーゼル両方に使用される"},
 explanation:"正解はB。セタン価はディーゼル燃料の着火性（自己着火しやすさ）を示す指標で、数値が大きいほど着火しやすく着火遅れが短い。オクタン価はガソリンのアンチノック性の指標。セタン価の高い燃料ほどディーゼルエンジンに適している。"},

{no:52, cat:"エンジン", stem:"燃焼室の種類に関する記述として、適切なものはどれか。", answer:"C",
 choices:{A:"直接噴射式燃焼室は副燃焼室を持ち、燃料噴射圧力が低くてよい",B:"渦流室式は熱効率が高く、現在の主流となっている",C:"直接噴射式はピストン頂部のキャビティに直接燃料を噴射する方式で、熱効率が高く現在の主流である",D:"予燃焼室式は燃焼効率が高く排気がクリーンなため大型トラックに広く採用されている"},
 explanation:"正解はC。直接噴射式（DI）はピストン頂部のキャビティ（くぼみ）に直接燃料を噴射する方式で、熱効率が高く現在の主流。副燃焼室式（渦流室式・予燃焼室式）は間接噴射式で、かつては使用されたが現在は直接噴射式が主流。"},

{no:53, cat:"エンジン", stem:"クランクシャフトに関する記述として、適切なものはどれか。", answer:"A",
 choices:{A:"ピストンの往復運動を回転運動に変換する部品で、メインジャーナル・クランクピン・クランクアームで構成される",B:"クランクシャフトのメインジャーナルにコンロッドが直接連結される",C:"クランクシャフトの材質は軽量化のためアルミニウム合金製が採用されている",D:"クランクシャフトのバランスウェイトはクランクシャフトの回転を速めるためのものである"},
 explanation:"正解はA。クランクシャフトはピストンの往復運動を回転運動に変換する。メインジャーナル（クランクケースに支持）・クランクピン（コンロッドが連結）・クランクアームで構成。材質は鍛鋼製か球状黒鉛鋳鉄製。バランスウェイトは振動低減のため。"},

{no:54, cat:"エンジン", stem:"コンロッド（連接棒）に関する記述として、適切なものはどれか。", answer:"D",
 choices:{A:"コンロッドはクランクシャフトとカムシャフトを連結する部品である",B:"コンロッドの大端部はピストンピンに連結され、小端部はクランクピンに連結される",C:"コンロッド素材は重量軽減のためアルミニウム合金製が主流である",D:"コンロッドはピストンの往復運動をクランクシャフトに伝える部品で、大端部がクランクピン、小端部がピストンピンに連結される"},
 explanation:"正解はD。コンロッド（連接棒）はピストンとクランクシャフトを連結し、ピストンの往復運動をクランクシャフトに伝える。小端部がピストンピンに、大端部がクランクシャフトのクランクピンに連結される。材質は鍛鋼製が主流。"},

{no:55, cat:"エンジン", stem:"カムシャフトに関する記述として、適切なものはどれか。", answer:"B",
 choices:{A:"カムシャフトはクランクシャフトと同じ回転数で回転する",B:"カムシャフトはクランクシャフトの1/2の回転数で回転し、1回転でバルブを1回開閉する",C:"カムシャフトは直接クランクシャフトにかみ合って駆動される",D:"カムシャフトの材質はアルミニウム合金製で、軽量化を優先している"},
 explanation:"正解はB。カムシャフトはタイミングギヤ・チェーン・ベルトを介してクランクシャフトの1/2の回転数で回転し、カムが1回転する間にバルブを1回開閉する（4サイクルエンジンは2回転に1回吸排気）。材質は特殊鋳鉄製が主流。"},

{no:56, cat:"エンジン", stem:"バルブスプリングに関する記述として、適切なものはどれか。", answer:"C",
 choices:{A:"バルブスプリングはバルブが開いているときにバルブを押さえ込む役割をする",B:"バルブスプリングは等ピッチのコイルスプリングで、サージングが発生しにくい",C:"バルブスプリングはバルブを閉じる方向に常時力をかけており、不等ピッチにすることでサージング（共振）を防止している",D:"バルブスプリングが強いほどバルブの開閉が容易になり燃費が向上する"},
 explanation:"正解はC。バルブスプリングはバルブを閉じる方向に常時力をかけており、カムによって開かれたバルブを閉じる役割をする。不等ピッチにすることでサージング（スプリングの共振）を防止している。スプリングが強すぎると摩擦増加で燃費悪化。"},

{no:57, cat:"エンジン", stem:"インタークーラーに関する記述として、適切なものはどれか。", answer:"A",
 choices:{A:"ターボチャージャーで圧縮された高温の空気を冷却し、充填効率を高める装置である",B:"エンジンオイルを冷却するための装置で、ラジエーターの前面に設置される",C:"インタークーラーにより吸入空気温度が下がると充填効率が低下する",D:"インタークーラーは小型トラックのみに採用され、大型トラックには使用されない"},
 explanation:"正解はA。インタークーラーはターボチャージャーで圧縮されて高温になった吸入空気を冷却する装置。空気は冷却されると体積が小さくなり密度が増すため充填効率が向上し、出力向上と排気ガス改善に貢献する。"},

{no:58, cat:"エンジン", stem:"エンジンリターダーに関する記述として、適切なものはどれか。", answer:"D",
 choices:{A:"エンジンリターダーはブレーキペダルを踏んだ場合のみ作動し、通常走行では使用できない",B:"エンジンリターダーはエンジン燃焼を利用して制動力を発生させるため、燃費が悪化する",C:"エンジンリターダーは急坂での速度増加防止に最適で、ブレーキフルードの消耗を助長する",D:"エンジンリターダーは排気バルブを利用してシリンダー内の圧力を高め、エンジンの回転抵抗で制動力を得る補助ブレーキである"},
 explanation:"正解はD。エンジンリターダーは排気バルブを閉じてシリンダー内に圧力を発生させ、エンジンの回転抵抗（ポンプ損失）で制動力を得る補助ブレーキ。フットブレーキと併用することでブレーキの負担を軽減し、フェード防止に役立つ。"},

{no:59, cat:"エンジン", stem:"エンジンオイルの劣化に関する記述として、適切なものはどれか。", answer:"B",
 choices:{A:"エンジンオイルは酸化しにくく、長期間使用しても性能は変わらない",B:"エンジンオイルは使用に伴い酸化・熱劣化・汚染が進み、潤滑性能・洗浄性能が低下する",C:"エンジンオイルの黒ずみは汚染の証拠であり、洗浄性能が働いていない状態を示す",D:"エンジンオイルのオイル消費が多い場合は軽油の混入が主な原因である"},
 explanation:"正解はB。エンジンオイルは使用に伴い酸化・熱劣化・燃焼生成物（すす・酸性物質）による汚染が進み、潤滑・洗浄・密封性能が低下するため定期的な交換が必要。オイルが黒ずむのは洗浄分散機能が働いている証拠。"},

{no:60, cat:"エンジン", stem:"冷却水の沸点と加圧の関係に関する記述として、適切なものはどれか。", answer:"C",
 choices:{A:"純水の沸点は100℃だが、ラジエーターキャップで加圧すると沸点は下がる",B:"LLCを添加すると冷却水の沸点が必ず200℃以上になる",C:"ラジエーターキャップで冷却系統を加圧することで冷却水の沸点が上昇し、冷却効率が向上する",D:"加圧によって沸点が上がるのは純水のみで、LLCを加えた場合は効果がない"},
 explanation:"正解はC。ラジエーターキャップのプレッシャーバルブによって冷却系統を加圧すると、冷却水の沸点が上昇する（例：88kPa加圧で約120℃まで上昇）。これにより冷却効率が向上し、キャビテーション防止にも効果がある。"},

{no:61, cat:"エンジン", stem:"エンジンオイルの潤滑方式に関する記述として、適切なものはどれか。", answer:"A",
 choices:{A:"日野自動車のエンジンは圧送式（強制潤滑式）を採用し、オイルポンプで各潤滑箇所にオイルを圧送する",B:"現在の自動車エンジンはすべて飛沫式（しぶき式）で潤滑する",C:"圧送式はオイルポンプが不要なため、構造が簡単で整備が容易である",D:"飛沫式は各潤滑箇所に確実にオイルを供給できるため信頼性が高い"},
 explanation:"正解はA。日野自動車のエンジンは圧送式（強制潤滑式）を採用しており、オイルポンプで加圧したオイルを各摺動部（メインベアリング・カムシャフト・タペット等）に圧送する。確実な潤滑が可能で信頼性が高い。"},

{no:62, cat:"エンジン", stem:"ウォーターポンプに関する記述として、適切なものはどれか。", answer:"D",
 choices:{A:"ウォーターポンプはエンジンとは独立した電動モーターで駆動される",B:"ウォーターポンプはサーモスタットを内蔵しており、温度に応じて流量を調整する",C:"ウォーターポンプはベルト駆動で、冷却水をラジエーターからシリンダーヘッドへ循環させるが、シリンダーブロックへは送らない",D:"ウォーターポンプは遠心式で、ファンベルト（Vベルト）またはギヤ・チェーンでクランクシャフトから駆動される"},
 explanation:"正解はD。ウォーターポンプは遠心式（インペラ式）で、クランクシャフトからファンベルト（Vベルト）またはギヤ・チェーンで駆動される。ラジエーターで冷却された冷却水をシリンダーブロック・ヘッドに循環させる。"},

{no:63, cat:"エンジン", stem:"フローダンパーに関する記述として、適切なものはどれか。", answer:"C",
 choices:{A:"フローダンパーはコモンレールとサプライポンプの間に設置され、燃料圧力の変動を防ぐ",B:"フローダンパーはインジェクターに内蔵されており、噴射量を制限する",C:"フローダンパーはコモンレールとインジェクターを接続するパイプの途中に設置され、コモンレール内の圧力変動（脈動）を緩和する",D:"フローダンパーはフューエルフィルターに内蔵されており、燃料の流量を一定に保つ"},
 explanation:"正解はC。フローダンパーはコモンレールとインジェクターをつなぐ高圧パイプの途中（コモンレール側）に設置され、インジェクターが噴射するたびに生じるコモンレール内の圧力変動（脈動）を緩和する装置。"},

{no:64, cat:"エンジン", stem:"インジェクター（コモンレール式）の構造に関する記述として、適切なものはどれか。", answer:"A",
 choices:{A:"インジェクターは電磁弁（ソレノイドバルブ）またはピエゾ素子を使用して、エンジンECUの指令で燃料を噴射する",B:"インジェクターはコモンレールに直接取り付けられており、燃料タンクから直接燃料を吸入して噴射する",C:"インジェクターの噴孔はノズル先端に1つだけ設けられており、そこから燃料を噴射する",D:"インジェクターは機械式で、カムシャフトの回転に同期して噴射する"},
 explanation:"正解はA。コモンレール式インジェクターは電磁弁（ソレノイドバルブ）またはピエゾ素子を使用し、エンジンECUの指令により噴射タイミング・噴射量・噴射回数を制御する。ノズル先端には複数の噴孔が設けられている。"},

{no:65, cat:"エンジン", stem:"フィードポンプの種類に関する記述として、適切なものはどれか。", answer:"B",
 choices:{A:"フィードポンプはすべてのエンジンでギヤポンプ式のみが採用されている",B:"フィードポンプにはインナーローターで外ローターを回すトロコイドタイプと、2つのギヤを使用するギヤタイプがある",C:"フィードポンプはバキューム圧（負圧）によって燃料を吸い上げる装置である",D:"フィードポンプはタイミングチェーンを介してカムシャフトで駆動される"},
 explanation:"正解はB。フィードポンプはカムシャフトによって駆動され、6枚歯のインナーローターで7枚歯のアウターローターを回すトロコイドタイプと、2つのギヤを使用するギヤタイプがある。燃料を燃料タンクから吸い上げてフィルターを経由しサプライポンプに送る。"},

{no:66, cat:"エンジン", stem:"エア抜きプラグに関する記述として、適切なものはどれか。", answer:"D",
 choices:{A:"エア抜きプラグはフューエルフィルターの下部に設けられており、水抜きに使用する",B:"エア抜きプラグはインジェクターに設けられており、噴射前の燃料脈動を防ぐ",C:"エア抜きプラグはサプライポンプに設けられており、ポンプ内のエアを抜くために使用する",D:"エア抜きプラグはフューエルフィルターボデーの上部に設けられており、燃料系統のプライミング（エア抜き）の際に使用する"},
 explanation:"正解はD。エア抜きプラグはフューエルフィルターボデーの上部に設けられており、燃料系統のプライミング（エア抜き）作業の際に使用する。フィルター下部の水抜きプラグは燃料中の水分排出に使用する。"},

{no:67, cat:"電気装置", stem:"オルタネーターの充電電圧に関する記述として、適切なものはどれか。", answer:"B",
 choices:{A:"オルタネーターの充電電圧は12Vバッテリーを2個直列接続した場合と同じ24Vである",B:"オルタネーターの充電電圧はバッテリー電圧（24V）より高い約28.5Vに設定されている",C:"オルタネーターの充電電圧はバッテリーの状態に関わらず常に30V以上を維持する",D:"オルタネーターの充電電圧はICレギュレーターの故障時に低下し、バッテリー過充電が発生する"},
 explanation:"正解はB。オルタネーターの充電電圧はバッテリー電圧（24V）より高い約28.5V（通常範囲27〜29V）に設定されており、ICレギュレーターが制御する。ICレギュレーター内トランジスターがショートすると発電し続けバッテリー過充電となる。"},

{no:68, cat:"電気装置", stem:"マグネットスイッチ（スターター）に関する記述として、適切なものはどれか。", answer:"C",
 choices:{A:"マグネットスイッチはスターターに流れる電流を調整し、回転数を制御する装置である",B:"マグネットスイッチはバッテリーに直接取り付けられており、過充電を防止する",C:"マグネットスイッチはソレノイドの吸引力でシフトレバーを介してピニオンをリングギヤに噛み合わせ、同時にメインスイッチをONにしてモーターに電力を供給する",D:"マグネットスイッチはエンジンが始動すると常に通電し続け、バッテリーを充電する"},
 explanation:"正解はC。マグネットスイッチはソレノイドコイルの電磁力でシフトレバーを動かしピニオンをフライホイールのリングギヤに噛み合わせる。同時にメインスイッチの接点を閉じてモーターへ大電流を供給しエンジンをクランキングする。"},

{no:69, cat:"電気装置", stem:"スターターのオーバーランニングクラッチに関する記述として、適切なものはどれか。", answer:"D",
 choices:{A:"オーバーランニングクラッチはエンジン始動後にスターターへの過大な逆トルク伝達を防止するための装置である",B:"オーバーランニングクラッチはエンジン始動中にピニオンの回転をモーターに確実に伝えるための常時噛み合い機構である",C:"オーバーランニングクラッチはモーターの過熱を防止するために電流を自動的に遮断する保護装置である",D:"エンジン始動後にピニオンよりリングギヤの回転が速くなった場合、オーバーランニングクラッチが空転してモーターへの過大な逆トルクを防ぐ"},
 explanation:"正解はD。エンジン始動後はフライホイール（リングギヤ）の回転がピニオンより速くなる。オーバーランニングクラッチはこの逆転状態でクラッチが空転し（フリーホイール状態）、モーターへの過大な逆トルク伝達を防いでモーターを保護する。"},

{no:70, cat:"電気装置", stem:"燃料噴射量の電子制御に使用されるセンサーに関する記述として、適切なものはどれか。", answer:"A",
 choices:{A:"エンジン回転センサー・コモンレール圧力センサー・水温センサー・吸気温度センサーなどの情報をエンジンECUが受け取り、最適な噴射量・噴射タイミングを制御する",B:"コモンレール式燃料噴射では噴射タイミングのみをセンサーで管理し、噴射量は機械的に制御される",C:"エンジン回転センサーはカムシャフトの回転を検出し、クランクシャフトの回転は検出しない",D:"吸気温度センサーは排気ガスの温度を測定し、DPR再生の開始タイミングを制御する"},
 explanation:"正解はA。コモンレール式では、エンジン回転センサー・コモンレール圧力センサー・水温センサー・吸気温度センサー・アクセル開度センサー等の情報をエンジンECUが処理し、燃料噴射量・噴射タイミング・噴射回数を総合的に制御する。"},

{no:71, cat:"T/M", stem:"クラッチブースターに関する記述として、適切なものはどれか。", answer:"B",
 choices:{A:"クラッチブースターはクラッチペダルの操作力を電動モーターの力で増幅する装置である",B:"クラッチブースターはクラッチペダルの操作力を圧縮空気または負圧によって倍力し、クラッチ操作を軽くする装置である",C:"クラッチブースターは小型トラックのみに採用され、大型トラックには使用されない",D:"クラッチブースターはクラッチマスターシリンダーの代わりとして使用され、油圧は発生させない"},
 explanation:"正解はB。クラッチブースターは大型クラッチのスプリング力に対してドライバーの操作力を軽減するため、圧縮空気（エア式）または負圧（バキューム式）を利用してクラッチ操作力を倍力する補助装置。主に大型・中型トラックに採用。"},

{no:72, cat:"T/M", stem:"オートクラッチユニット（ACU）に関する記述として、適切なものはどれか。", answer:"C",
 choices:{A:"ACUは完全自動変速機でドライバーはクラッチ操作もシフト操作も不要である",B:"ACUはクラッチ操作のみを自動化し、変速操作はドライバーが手動で行う",C:"ACUはクラッチの断続操作を自動化した装置で、変速操作はドライバーが行うが、クラッチペダルは不要になる",D:"ACUはトルクコンバーターを使用してクラッチ操作を不要にしたシステムである"},
 explanation:"正解はC。ACU（Auto Clutch Unit）はクラッチの断続操作を自動化した装置。ドライバーは変速（シフト）操作を行うが、クラッチペダルは不要。クラッチの接続・切断はECUが自動的に行い、操作ミスによる車両損傷を防ぎ、ドライバーの疲労軽減にも貢献する。"},

{no:73, cat:"T/M", stem:"トランスミッションのインプットシャフトに関する記述として、適切なものはどれか。", answer:"A",
 choices:{A:"インプットシャフトはクラッチ側に接続されており、クラッチ接続時にエンジンの動力を受け取る",B:"インプットシャフトはファイナルドライブギヤに直接接続されている",C:"インプットシャフトはアウトプットシャフトと同軸で、両者の回転数は常に同一である",D:"インプットシャフトはリングギヤを介してプロペラシャフトに動力を伝える"},
 explanation:"正解はA。トランスミッションのインプットシャフト（メインドライブシャフト）はクラッチ側に接続されており、クラッチ接続時にエンジンの動力を受け取る。アウトプットシャフトは変速されたトルクをプロペラシャフトへ出力する。"},

{no:74, cat:"T/M", stem:"変速比と速度・トルクの関係に関する記述として、適切なものはどれか。", answer:"D",
 choices:{A:"変速比が大きい（低速ギヤ）ほど、アウトプットシャフトの回転数が増し、速度が上がる",B:"変速比が1の場合（直結段）、インプットとアウトプットの回転数・トルクともに等しい",C:"オーバードライブとは変速比が1以上で、エンジン回転数より出力軸の回転数が多い",D:"変速比が大きいほど（低速段）アウトプットトルクが増大し、変速比が小さいほど（高速段）アウトプット回転数が増す"},
 explanation:"正解はD。変速比が大きいほど（低速段）アウトプットシャフトの回転数は低下するがトルクが増大する（発進・登坂に有利）。変速比が小さいほど（高速段）アウトプット回転数が増す。変速比1の直結段ではトルクに損失はあるが回転数は同じ。オーバードライブは変速比が1未満。"},

{no:75, cat:"T/M", stem:"プロペラシャフトのバランスに関する記述として、適切なものはどれか。", answer:"B",
 choices:{A:"プロペラシャフトは均一な重量分布が必要なく、アンバランスがあっても問題ない",B:"プロペラシャフトがアンバランスだと振動が発生し、部品の早期摩耗やドライバーへの不快感につながるため、バランスウェイトで調整する",C:"プロペラシャフトの回転バランス調整は新品時のみ行い、整備後の再調整は不要である",D:"プロペラシャフトの取り外し後は、元の位置に関係なく任意の向きで取り付けてよい"},
 explanation:"正解はB。プロペラシャフトがアンバランスだと高速回転時に振動が発生し、部品の早期摩耗やドライバーへの不快感が生じる。バランスウェイト（バランスピース）で調整する。取り外し後は元の位置・向きで取り付けるため必ず合いマークを付けること。"},

{no:76, cat:"T/M", stem:"リアアクスルの構造に関する記述として、適切なものはどれか。", answer:"C",
 choices:{A:"浮動式アクスルシャフトはアクスルシャフトがタイヤ・ホイールの重量と車両荷重を支えている",B:"完全浮動式はアクスルシャフトが曲げ荷重と駆動力を同時に負担する",C:"完全浮動式アクスルシャフトは駆動力のみを伝達し、タイヤ・ホイールの重量と車両荷重はアクスルハウジングが支える",D:"完全浮動式と3/4浮動式は同一の構造で、大型トラックに広く使用されている"},
 explanation:"正解はC。完全浮動式アクスルシャフトは駆動力のみを伝達し、タイヤ・ホイールの重量（縦荷重）と車両荷重（横荷重）はアクスルハウジングが支える。大型トラックに採用される。半浮動式は曲げ荷重も負担する。"},

{no:77, cat:"T/M", stem:"プロペラシャフトの分割（中間シャフト）に関する記述として、適切なものはどれか。", answer:"A",
 choices:{A:"ホイールベースが長い車両では、プロペラシャフトを2本または3本に分割してセンターベアリングで支持する",B:"プロペラシャフトの分割数が多いほどユニバーサルジョイントの角度変化が大きくなり、振動が増加する",C:"センターベアリングはフレームに取り付けられており、プロペラシャフトの前後方向の移動を規制する",D:"プロペラシャフトは1本が基本構造で、車長が長くても分割する必要はない"},
 explanation:"正解はA。ホイールベースが長い車両ではプロペラシャフトを長くすると剛性・バランスの問題が生じるため、2本または3本に分割してセンターベアリングでフレームに支持する。分割により各部のユニバーサルジョイント角度が小さくなり、振動も低減できる。"},

{no:78, cat:"シャシ・フレーム", stem:"フロントアクスルの構造に関する記述として、適切なものはどれか。", answer:"D",
 choices:{A:"I型断面フロントアクスルは強度・剛性に劣るため現在は使用されない",B:"フロントアクスルはキングピンを介してホイールハブに連結され、ホイールを支持する",C:"フロントアクスルにはドライブシャフトが内蔵されており、前輪への動力伝達も担う",D:"フロントアクスルはI型断面の鍛鋼製で高い強度と剛性を持ち、キングピンを介してステアリングナックルが取り付けられる"},
 explanation:"正解はD。フロントアクスルはI型断面の鍛鋼製で高い強度と剛性を持つ。キングピンを介してステアリングナックルが取り付けられ、ホイールが操舵できる構造。ただし前輪駆動の場合はドライブシャフトが追加される。"},

{no:79, cat:"シャシ・フレーム", stem:"ラジアスロッドの機能に関する記述として、適切なものはどれか。", answer:"B",
 choices:{A:"ラジアスロッドはショックアブソーバーと並行に設置され、振動を吸収する役割を持つ",B:"ラジアスロッドはアクスルに働く前後方向の力（駆動・制動時の反力）を受け止め、アクスルの前後方向の移動を規制する",C:"ラジアスロッドはサスペンションスプリングの役割を担い、路面の凹凸を吸収する",D:"ラジアスロッドは左右方向の力を受け止め、車体の横揺れを防止する"},
 explanation:"正解はB。ラジアスロッドはアクスルに働く前後方向の力（発進・制動時の慣性力）を受け止め、アクスルの前後方向の移動を規制する。左右方向の力を受け止めるのはラテラルロッド（ワットリンク・パナールロッド）。"},

{no:80, cat:"シャシ・フレーム", stem:"ディスクブレーキに関する記述として、適切なものはどれか。", answer:"C",
 choices:{A:"ディスクブレーキはドラムブレーキと比較して自己倍力作用（サーボ効果）が大きく制動力が高い",B:"ディスクブレーキは全天候型とはいえず、雨天時の制動力は大きく低下する",C:"ディスクブレーキはロータとパッドが露出しているため放熱性に優れ、フェードが発生しにくい",D:"ディスクブレーキのブレーキパッドはドラムブレーキのシューより面積が大きく、耐摩耗性に優れる"},
 explanation:"正解はC。ディスクブレーキはロータとパッドが外部に露出しているため放熱性が高く、フェード（熱による制動力低下）が発生しにくい。自己倍力作用はドラムブレーキにあり、ディスクブレーキにはない。雨天時も水切れが良く安定した制動力を発揮する。"},

{no:81, cat:"シャシ・フレーム", stem:"ABSに関する記述として、適切なものはどれか。", answer:"A",
 choices:{A:"ABSはブレーキ操作中に車輪がロックしかけると自動的にブレーキ液圧を制御し、車輪のスリップを適正に保つシステムである",B:"ABSはブレーキを自動的に作動させる装置で、ドライバーのブレーキ操作は不要になる",C:"ABS作動中は制動距離が必ず短くなり、砂利道や雪道での制動距離も大幅に改善される",D:"ABS作動時はハンドル操作が完全に不要で、自動的に安全な方向へ進む"},
 explanation:"正解はA。ABSはAnti-lock Brake Systemの略。ブレーキ操作中に車輪がロックしそうになると、ホイールスピードセンサーが検知してモジュレーターが液圧を制御し車輪スリップを適正に保つ。これにより制動時の操舵性と安定性を確保する。"},

{no:82, cat:"シャシ・フレーム", stem:"タイヤのトー角に関する記述として、適切なものはどれか。", answer:"D",
 choices:{A:"トーインとはタイヤを上から見たとき、タイヤ前方が後方より広がっている状態をいう",B:"トー角はキャンバー角とも呼ばれ、タイヤの直立・傾きを表す",C:"トーアウトは直進性を向上させ、タイヤの偏摩耗を防ぐため通常使用される",D:"トーインはタイヤを上から見たとき前方が後方より狭まっている状態で、タイヤの直進性確保と偏摩耗防止が目的である"},
 explanation:"正解はD。トーインはタイヤを上から見たとき前方が後方より狭まっている（ハの字型）状態。キャンバー角のポジティブキャンバーによって外向きに開こうとするタイヤを矯正し、直進性を確保して偏摩耗を防ぐ目的がある。"},

{no:83, cat:"シャシ・フレーム", stem:"パワーステアリングの種類に関する記述として、適切なものはどれか。", answer:"B",
 choices:{A:"油圧式パワーステアリングは電動モーターを使用してアシストし、省エネルギーに優れる",B:"油圧式パワーステアリングはエンジン駆動の油圧ポンプで発生させた油圧でアシストし、電動式は電動モーターでアシストする",C:"電動式パワーステアリングは常に最大アシスト力を発生し、操舵のフィーリングは単調になる",D:"現在のトラックはほとんどが電動式パワーステアリングを採用しており、油圧式は廃止されている"},
 explanation:"正解はB。油圧式パワーステアリングはエンジンで駆動するオイルポンプの油圧でハンドルアシストを行う。電動式（EPS）は電動モーターでアシストする。電動式はエンジン負荷なく省エネだが、大型トラックは大きなアシスト力が必要なため現在も油圧式が主流。"},

{no:84, cat:"シャシ・フレーム", stem:"センターパーキングブレーキ（センターブレーキ）に関する記述として、適切なものはどれか。", answer:"C",
 choices:{A:"センターパーキングブレーキはフロントブレーキに作用するパーキングブレーキである",B:"センターパーキングブレーキはリヤホイール内のドラムブレーキを利用する方式である",C:"センターパーキングブレーキはプロペラシャフトに取り付けられており、プロペラシャフトを制動することでリヤ車輪の回転を止める",D:"センターパーキングブレーキは大型トラックには採用されていない"},
 explanation:"正解はC。センターパーキングブレーキ（センターブレーキ）はトランスミッション後方のプロペラシャフト上に設けられたドラムブレーキで、プロペラシャフトを制動することで間接的にリヤ車輪の回転を止める。大型トラック・バスに広く採用。"},

{no:85, cat:"電気装置", stem:"コンデンサー（キャパシター）の特性に関する記述として、適切なものはどれか。", answer:"A",

let current=0,answers=new Array(questions.length).fill(null);
function render(){
  const q=questions[current];
  const answered=answers[current]!==null;
  document.getElementById('prog').textContent=current+1+' / '+questions.length;
  document.getElementById('barfill').style.width=(((current+1)/questions.length)*100)+'%';
  let html='<div class="section-badge">'+q.cat+'</div><div class="qtitle">問'+q.no+'</div><div class="qstem">'+q.stem+'</div><div class="choices">';
  ['A','B','C','D'].forEach(function(k){
    var cls='choice';
    if(answered){if(k===q.answer)cls+=' correct';else if(k===answers[current])cls+=' wrong';}
    html+='<button class="'+cls+'" onclick="select(\''+k+'\')"><span class="label">'+k+'</span><span>'+q.choices[k]+'</span></button>';
  });
  html+='</div>';
  if(answered)html+='<div class="explanation show">'+q.explanation+'</div>';
  document.getElementById('quiz').innerHTML=html;
  document.getElementById('nextBtn').textContent=current===questions.length-1?'結果を見る':'次へ ▶';
}
function select(k){if(answers[current]!==null)return;answers[current]=k;render();}
function nextQ(){if(current===questions.length-1){showResult();return;}current++;render();}
function prevQ(){if(current>0){current--;render();}}
function showResult() {
  document.getElementById('nav').style.display = 'none';
  document.getElementById('quiz').style.display = 'none';
  const correct = answers.filter(function(a,i){ return a === questions[i].answer; }).length;
  const total = questions.length;
  const pct = Math.round(correct / total * 100);

  // Firebase保存
  if (typeof window._saveELResult === 'function') window._saveELResult(correct, total);

  // 間違い問題リスト
  let wrongHtml = '';
  const wrongs = questions.filter(function(q,i){ return answers[i] !== q.answer; });
  if (wrongs.length > 0) {
    wrongHtml = '<div style="margin-top:16px;border-top:1px solid #eee;padding-top:12px">' +
      '<div style="font-weight:700;font-size:13px;color:#dc2626;margin-bottom:8px">❌ 間違えた問題 (' + wrongs.length + '問)</div>';
    wrongs.forEach(function(q, i) {
      wrongHtml += '<div style="background:#fff5f5;border-left:3px solid #dc2626;padding:8px 10px;border-radius:6px;margin-bottom:6px;font-size:12px">';
      wrongHtml += '<div style="font-weight:700;color:#dc2626;margin-bottom:3px">Q' + q.no + '.</div>';
      wrongHtml += '<div style="color:#333;line-height:1.5">' + q.stem.substring(0, 60) + (q.stem.length > 60 ? '…' : '') + '</div>';
      wrongHtml += '<div style="color:#16a34a;font-weight:700;margin-top:3px">正解：' + q.answer + '　' + (q.choices[q.answer] || '') + '</div>';
      wrongHtml += '</div>';
    });
    wrongHtml += '</div>';
  } else {
    wrongHtml = '<div style="margin-top:12px;color:#16a34a;font-weight:700;font-size:15px">🎉 全問正解！</div>';
  }

  document.getElementById('result').style.display = 'block';
  document.getElementById('result').innerHTML =
    '<div class="result">' +
    '<div style="font-weight:900;font-size:18px">📊 結果</div>' +
    '<div class="score-big">' + correct + ' / ' + total + '</div>' +
    '<div style="font-size:14px;color:#666">' + pct + '点</div>' +
    wrongHtml +
    '<div class="actions" style="margin-top:16px;display:grid;gap:10px">' +
    '<button onclick="location.reload()" style="padding:14px;border:none;border-radius:12px;background:#16a34a;color:#fff;font-size:15px;font-weight:700;cursor:pointer;width:100%">🔄 もう一度</button>' +
    '<a href="./index.html" style="display:block;padding:14px;border-radius:12px;background:#1e3a5f;color:#fff;font-size:15px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none">🏠 ホームへ戻る</a>' +
    '</div>' +
    '</div>';
  window.scrollTo(0, 0);
}
render();
</script>
<script>
// ?q=N 復習モード（マイページ復習フォルダから遷移時）
(function(){
  var qParam = new URLSearchParams(location.search).get('q');
  if (!qParam) return;
  var qi = questions.findIndex(function(q){ return q.no === parseInt(qParam); });
  if (qi < 0) return;
  current = qi;
  render();

  // 選択後に即時フィードバックオーバーレイを表示
  var _origSelect = select;
  select = function(k) {
    if (answers[current] !== null) return;
    _origSelect(k);
    var q = questions[current];
    var isCorrect = k === q.answer;
    // Firebase更新（正解→削除、不正解→保存）
    (function(){
      var u=window._fbUser, d=window._fbDb, s=window._fbSrc;
      if(!u||!d||!s) return;
      import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js').then(function(m){
        var key=s+'_q'+q.no;
        if(isCorrect){
          m.deleteDoc(m.doc(d,'users',u.uid,'wrongAnswers',key)).catch(function(){});
        } else {
          m.setDoc(m.doc(d,'users',u.uid,'wrongAnswers',key),{
            source:s,qNo:q.no,label:'Q'+q.no,
            stem:(q.stem||'').substring(0,120),
            timestamp:m.serverTimestamp(),
            url:window.location.pathname
          },{merge:true}).catch(function(){});
          m.setDoc(m.doc(d,'users',u.uid,'wrongHistory',key),{
            source:s,qNo:q.no,label:'Q'+q.no,
            stem:(q.stem||'').substring(0,120),
            firstWrong:m.serverTimestamp(),
            url:window.location.pathname
          },{merge:true}).catch(function(){});
        }
      });
    })();
    _showElReviewOverlay(q, isCorrect);
  };

  function _showElReviewOverlay(q, isCorrect) {
    var old=document.getElementById('_el_rov'); if(old) old.remove();
    var col=isCorrect?'#059669':'#dc2626';
    var ansHtml=!isCorrect
      ?'<div style="margin:8px 0;font-size:.9rem;color:#1d4ed8;font-weight:700">正解: '+q.answer+'　'+(q.choices[q.answer]||'')+'</div>'
      :'';
    var expHtml=q.explanation
      ?'<div style="margin-top:12px;text-align:left;background:#f8fafc;border-radius:8px;padding:12px;font-size:.82rem;line-height:1.7;color:#374151;max-height:200px;overflow-y:auto">'+q.explanation.replace(/\n/g,'<br>')+'</div>'
      :'';
    var nextBtn=(function(){
      var rq=JSON.parse(sessionStorage.getItem('reviewQueue')||'[]');
      var next=rq.length?rq[0]:null;
      if(next){rq.shift();sessionStorage.setItem('reviewQueue',JSON.stringify(rq));}
      var left=rq.length;
      return next
        ?'<a href="'+next+'" style="display:inline-block;margin-top:10px;margin-left:8px;padding:12px 24px;background:#059669;color:white;border-radius:10px;text-decoration:none;font-weight:700;font-size:.9rem">▶ 次の復習問題（残'+left+'問）</a>'
        :'<div style="margin-top:12px;font-size:.85rem;color:#059669;font-weight:700">✅ この単元の復習完了！</div>';
    })();
    var ov=document.createElement('div');
    ov.id='_el_rov';
    ov.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.65);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;box-sizing:border-box';
    ov.innerHTML='<div style="background:white;border-radius:16px;padding:24px;max-width:480px;width:100%;text-align:center;font-family:-apple-system,Meiryo,sans-serif">'
      +'<div style="font-size:2.4rem">'+(isCorrect?'✅':'❌')+'</div>'
      +'<div style="font-size:1.25rem;font-weight:900;color:'+col+';margin:8px 0">'+(isCorrect?'正解！':'不正解')+'</div>'
      +ansHtml+expHtml
      +'<div style="margin-top:20px">'
      +'<a href="./mypage.html" style="display:inline-block;padding:12px 24px;background:#1e3a5f;color:white;border-radius:10px;text-decoration:none;font-weight:700;font-size:.9rem">📁 マイページへ戻る</a>'
      +nextBtn
      +'</div></div>';
    document.body.appendChild(ov);
  }
})();
</script>

<script src="./firebase-config.js"></script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, deleteDoc, serverTimestamp, increment } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// e-learning カテゴリ → レーダーチャートカテゴリ マッピング
const _EL_CAT_MAP = {
  'エンジン制御':'エンジン','コモンレール燃料噴射':'エンジン',
  'DPR制御':'エンジン','尿素SCR制御':'エンジン','尿素SCR':'エンジン',
  'HC-SCR制御':'エンジン','HC-SCR':'エンジン','故障診断':'エンジン',
  'ディーゼルエンジン':'エンジン','エンジン本体':'エンジン',
  '潤滑・冷却':'エンジン','燃料装置':'エンジン','エンジン':'エンジン',
  '測定具':'エンジン','油脂':'エンジン','定期点検整備':'エンジン',
  '動力伝達装置':'T/M','動力伝達':'T/M',
  '制動装置':'ブレーキ',
  '操舵走行装置':'シャシ・フレーム','シャシ':'シャシ・フレーム',
  '電気装置':'電気装置','電気':'電気装置',
  '法律':'法令','法令':'法令',
  '安全':'新装置・一般','仕様':'新装置・一般','自動車概要':'新装置・一般',
};
const SOURCE_KEY = document.title.replace(/[\s\u3000]/g,'_').replace(/[^\w\u3040-\u9FFF_]/g,'');
try {
  const app = initializeApp(FIREBASE_CONFIG);
  const auth = getAuth(app);
  const db = getFirestore(app);
  onAuthStateChanged(auth, user => {
    window._fbUser = user;
    window._fbDb = db;
    window._fbSrc = SOURCE_KEY;
  });
  // selectをラップ: 解答ごとにcatStats更新
  const _elOrigSel = window.select;
  window.select = function(k) {
    _elOrigSel(k);
    const user = window._fbUser, db = window._fbDb;
    if (!user || !db) return;
    const q = questions[current];
    if (!q) return;
    const isCorrect = k === q.answer;
    const mappedCat = (_EL_CAT_MAP[q.cat] || q.cat || 'エンジン').replace(/\//g,'_');
    setDoc(doc(db, 'users', user.uid, 'catStats', mappedCat), {
      total: increment(1),
      correct: increment(isCorrect ? 1 : 0)
    }, {merge: true}).catch(() => {});
  };

} catch(e) { console.warn('Firebase init:', e.message); }
window._saveELResult = function(correct, total) {
  const user = window._fbUser, db = window._fbDb, src = window._fbSrc;
  if (!user || !db) return;
  questions.forEach(function(q, i) {
    const isCorrect = answers[i] === q.answer;
    const key = src + '_q' + q.no;
    if (isCorrect) {
      deleteDoc(doc(db, 'users', user.uid, 'wrongAnswers', key)).catch(function(){});
    } else if (answers[i] !== null && answers[i] !== undefined) {
      setDoc(doc(db, 'users', user.uid, 'wrongAnswers', key), {
        source: src, qNo: q.no, label: 'Q' + q.no,
        stem: (q.stem || '').substring(0, 120),
        cat: q.cat || '',
        timestamp: serverTimestamp(),
        url: window.location.pathname
      }, {merge: true}).catch(function(){});
      setDoc(doc(db, 'users', user.uid, 'wrongHistory', key), {
        source: src, qNo: q.no, label: 'Q' + q.no,
        stem: (q.stem || '').substring(0, 120),
        firstWrong: serverTimestamp(),
        url: window.location.pathname
      }, {merge: true}).catch(function(){});
    }
  });
  setDoc(doc(db, 'users', user.uid, 'stats', src), {
    source: src, lastCorrect: correct, lastTotal: total,
    lastDate: serverTimestamp(), totalAttempts: increment(1)
  }, {merge: true}).catch(function(){});
};
</script>
