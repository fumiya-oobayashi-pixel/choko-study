<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ちょこスタ 管理者ダッシュボード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f1f5f9;font-family:'Hiragino Sans','Meiryo',sans-serif;color:#1e293b;min-height:100vh}
header{background:linear-gradient(135deg,#1e3a5f,#2d5a8e);color:white;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:1.1rem;font-weight:900}
.logout-btn{padding:6px 14px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:white;border-radius:8px;cursor:pointer;font-size:.8rem;font-family:inherit}
main{max-width:900px;margin:0 auto;padding:16px}
.card{background:white;border-radius:14px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:14px}
.card h2{font-size:.95rem;font-weight:700;color:#1e3a5f;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #e2e8f0;display:flex;align-items:center;gap:6px}
.user-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.user-card{border:2px solid #e2e8f0;border-radius:12px;padding:14px;cursor:pointer;transition:.15s}
.user-card:hover{border-color:#2563eb;background:#eff6ff}
.user-card.selected{border-color:#2563eb;background:#eff6ff}
.user-name{font-weight:700;font-size:.95rem;color:#1e3a5f}
.user-meta{font-size:.75rem;color:#64748b;margin-top:3px}
.stat-badge{display:inline-block;background:#dbeafe;color:#1d4ed8;font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:999px;margin-top:6px;margin-right:4px}
.stat-badge.red{background:#fee2e2;color:#dc2626}
.stat-badge.green{background:#d1fae5;color:#059669}
.wrong-list{display:flex;flex-direction:column;gap:6px}
.wrong-item{background:#fff5f5;border:1px solid #fecaca;border-radius:8px;padding:10px 12px}
.wrong-item .wi-label{font-size:.75rem;font-weight:700;color:#dc2626;margin-bottom:2px}
.wrong-item .wi-stem{font-size:.85rem;color:#374151;line-height:1.5}
.wi-source{font-size:.7rem;color:#64748b;margin-top:3px}
.stats-table{width:100%;border-collapse:collapse;font-size:.82rem}
.stats-table th{background:#f8fafc;padding:8px 10px;text-align:left;font-weight:700;color:#64748b;border-bottom:2px solid #e2e8f0}
.stats-table td{padding:8px 10px;border-bottom:1px solid #f1f5f9}
.stats-table tr:hover td{background:#f8fafc}
.empty{text-align:center;color:#94a3b8;padding:24px;font-size:.9rem}
.loading{text-align:center;color:#64748b;padding:24px}
.tab-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.tab-btn{padding:6px 14px;border:2px solid #e2e8f0;border-radius:20px;font-size:.8rem;font-weight:700;cursor:pointer;background:white;color:#64748b;font-family:inherit;transition:.15s}
.tab-btn.active{border-color:#2563eb;background:#eff6ff;color:#2563eb}
.no-access{text-align:center;padding:60px 20px}
.no-access .icon{font-size:3rem;margin-bottom:12px}
</style>
</head>
<body>
<header>
  <h1>🔐 ちょこスタ 管理者ダッシュボード</h1>
  <div style="display:flex;gap:8px">
    <a href="./mypage.html" class="logout-btn" style="text-decoration:none">📊 マイページ</a>
    <button class="logout-btn" onclick="doLogout()">ログアウト</button>
  </div>
</header>

<main id="main">
  <div class="loading" id="loading">読み込み中...</div>
  <div id="no-access" class="no-access" style="display:none">
    <div class="icon">🔒</div>
    <div style="font-weight:700;font-size:1.1rem;margin-bottom:8px">アクセス権限がありません</div>
    <div style="color:#64748b;font-size:.9rem">管理者権限が必要です。</div>
    <a href="index.html" style="display:inline-block;margin-top:16px;color:#2563eb;font-weight:700">← 問題一覧に戻る</a>
  </div>
  <div id="content" style="display:none">
    <!-- Summary -->
    <div class="card">
      <h2>📊 全体サマリー</h2>
      <div id="summary-content"><div class="loading">読み込み中...</div></div>
    </div>
    <!-- User selector -->
    <div class="card">
      <h2>👥 ユーザー一覧</h2>
      <div class="user-grid" id="user-grid"><div class="loading">読み込み中...</div></div>
    </div>
    <!-- User detail -->
    <div class="card" id="user-detail" style="display:none">
      <h2 id="user-detail-title">📋 ユーザー詳細</h2>
      <div class="tab-row">
        <button class="tab-btn active" onclick="showTab('wrong')">🔄 復習フォルダ</button>
        <button class="tab-btn" onclick="showTab('history')">📚 全履歴フォルダ</button>
        <button class="tab-btn" onclick="showTab('stats')">取り組み履歴</button>
        <button class="tab-btn" onclick="showTab('chart')">📊 チャートリセット</button>
        <button class="tab-btn" onclick="showTab('parts')">🔧 パーツ間違い</button>
      </div>
      <div id="tab-wrong">
        <div id="wrong-reset-area" style="margin-bottom:10px"></div>
        <div class="wrong-list" id="wrong-list"></div>
      </div>
      <div id="tab-history" style="display:none">
        <div id="history-reset-area" style="margin-bottom:10px"></div>
        <div class="wrong-list" id="history-list"></div>
      </div>
      <div id="tab-chart" style="display:none">
        <div id="chart-reset-area" style="margin-bottom:10px"></div>
        <div style="display:flex;gap:6px;margin-bottom:10px">
          <button class="tab-btn active" id="chart-mech-btn" onclick="switchAdminChart('mech')">🔧 メカニック</button>
          <button class="tab-btn" id="chart-front-btn" onclick="switchAdminChart('front')">🪟 フロント</button>
        </div>
        <div style="max-width:480px;margin:0 auto"><canvas id="adminRadarChart"></canvas></div>
        <div id="chart-stats-list" style="margin-top:14px"></div>
      </div>
      <div id="tab-stats" style="display:none">
        <div id="stats-reset-area" style="margin-bottom:10px"></div>
        <table class="stats-table" id="stats-table">
          <thead><tr><th>ファイル</th><th>正解</th><th>問題数</th><th>正答率</th><th>回数</th><th>最終日</th></tr></thead>
          <tbody id="stats-body"></tbody>
        </table>
      </div>
      <div id="tab-parts" style="display:none">
        <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
          <button class="tab-btn ptab active" id="parts-sub-wrong-btn" onclick="switchPartsTab('wrong')">🔄 復習フォルダ</button>
          <button class="tab-btn ptab" id="parts-sub-history-btn" onclick="switchPartsTab('history')">📚 全履歴</button>
          <button class="tab-btn ptab" id="parts-sub-stats-btn" onclick="switchPartsTab('stats')">📋 取り組み履歴</button>
        </div>
        <div id="parts-sub-wrong">
          <div id="parts-wrong-reset-area" style="margin-bottom:10px"></div>
          <div class="wrong-list" id="parts-wrong-list"></div>
        </div>
        <div id="parts-sub-history" style="display:none">
          <div id="parts-history-reset-area" style="margin-bottom:10px"></div>
          <div class="wrong-list" id="parts-history-list"></div>
        </div>
        <div id="parts-sub-stats" style="display:none">
          <div id="parts-stats-reset-area" style="margin-bottom:10px"></div>
          <table class="stats-table" id="parts-stats-table">
            <thead><tr><th>ファイル</th><th>正解</th><th>問題数</th><th>正答率</th><th>回数</th><th>最終日</th></tr></thead>
            <tbody id="parts-stats-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="firebase-config.js"></script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, getDocs, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);
const db = getFirestore(app);

window.doLogout = async () => {
  await signOut(auth);
  location.href = 'login.html';
};

onAuthStateChanged(auth, async user => {
  document.getElementById('loading').style.display = 'none';
  if (!user) {
    location.href = 'login.html';
    return;
  }
  if (!isAdmin(user.email)) {
    document.getElementById('no-access').style.display = 'block';
    return;
  }
  document.getElementById('content').style.display = 'block';
  loadAllData();
});

let allUsersData = {};
let adminRadarChart = null;
let currentChartCatStats = [];
const MECH_CATS = ["エンジン","HV","T/M","ブレーキ","シャシ・フレーム","電気装置","法令","新装置・一般","計算"];
const FRONT_CATS = ["保証制度","外注（下請法含む）","見積り（事故見積含む）","受付/苦情/電話対応",
                    "ハイトス系/ICT","引渡対応/売上/回収","手形/小切手/領収書/売掛",
                    "通過車両関連","商品知識・車両知識","一般/保険","安全/法令","計算"];

async function loadAllData() {
  try {
    const usersSnap = await getDocs(collection(db, 'users'));
    const parse = s => (s.docs||[]).map(d => ({id: d.id, ...d.data()}));

    // 全ユーザーのサブコレクションを並列取得
    const userResults = await Promise.all(usersSnap.docs.map(async userDoc => {
      const uid = userDoc.id;
      const userData = userDoc.data();
      const [wrongSnap, historySnap, statsSnap, catSnap,
             partsWrongSnap, partsHistorySnap, partsStatsSnap] = await Promise.all([
        getDocs(collection(db, 'users', uid, 'wrongAnswers')),
        getDocs(collection(db, 'users', uid, 'wrongHistory')),
        getDocs(collection(db, 'users', uid, 'stats')),
        getDocs(collection(db, 'users', uid, 'catStats')),
        getDocs(collection(db, 'users', uid, 'partsWrongAnswers')).catch(() => ({docs:[]})),
        getDocs(collection(db, 'users', uid, 'partsWrongHistory')).catch(() => ({docs:[]})),
        getDocs(collection(db, 'users', uid, 'partsStats')).catch(() => ({docs:[]})),
      ]);
      return { uid, userData,
        wrongList: parse(wrongSnap), historyList: parse(historySnap),
        statsList: parse(statsSnap), catStats: parse(catSnap),
        partsWrongList: parse(partsWrongSnap), partsHistoryList: parse(partsHistorySnap),
        partsStatsList: parse(partsStatsSnap) };
    }));

    const userGrid = document.getElementById('user-grid');
    userGrid.innerHTML = '';
    let totalWrong = 0;

    for (const r of userResults) {
      const { uid, userData, wrongList, historyList, statsList } = r;
      allUsersData[uid] = { uid, email: userData.email || uid,
        displayName: userData.displayName || userData.email || uid, ...r };
      totalWrong += wrongList.length;
      const totalAttempts = statsList.reduce((s,x) => s + (x.totalAttempts||0), 0);
      const div = document.createElement('div');
      div.className = 'user-card';
      div.onclick = () => showUser(uid);
      div.id = 'ucard-' + uid;
      div.innerHTML = `
        <div class="user-name">👤 ${userData.displayName || userData.email || uid.substring(0,8)}</div>
        <div class="user-meta">${userData.email || ''}</div>
        <span class="stat-badge red">❌ 復習 ${wrongList.length}問</span>
        <span class="stat-badge" style="background:#faf5ff;color:#7e22ce">📚 全履歴 ${historyList.length}問</span>
        <span class="stat-badge">📝 ${totalAttempts}回受験</span>
      `;
      userGrid.appendChild(div);
    }

    if (!userResults.length) userGrid.innerHTML = '<div class="empty">ユーザーデータなし</div>';

    document.getElementById('summary-content').innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px">
        <div style="background:#eff6ff;border-radius:10px;padding:14px;text-align:center">
          <div style="font-size:1.8rem;font-weight:900;color:#1d4ed8">${userResults.length}</div>
          <div style="font-size:.8rem;color:#64748b;margin-top:2px">登録ユーザー</div>
        </div>
        <div style="background:#fff5f5;border-radius:10px;padding:14px;text-align:center">
          <div style="font-size:1.8rem;font-weight:900;color:#dc2626">${totalWrong}</div>
          <div style="font-size:.8rem;color:#64748b;margin-top:2px">合計間違い問題数</div>
        </div>
      </div>
    `;
  } catch(e) {
    document.getElementById('user-grid').innerHTML = '<div class="empty">データ取得エラー: ' + e.message + '</div>';
    console.error(e);
  }
}

window.showUser = function(uid) {
  document.querySelectorAll('.user-card').forEach(c => c.classList.remove('selected'));
  const card = document.getElementById('ucard-' + uid);
  if (card) card.classList.add('selected');

  const data = allUsersData[uid];
  if (!data) return;

  document.getElementById('user-detail').style.display = 'block';
  document.getElementById('user-detail-title').textContent = `📋 ${data.displayName || data.email} の詳細`;

  renderWrongList(data.wrongList, uid);
  renderHistoryList(data.historyList, uid);
  renderStatsList(data.statsList, uid);
  renderChartStats(data.catStats||[], uid);
  renderPartsWrongList(data.partsWrongList||[], uid);
  renderPartsHistoryList(data.partsHistoryList||[], uid);
  renderPartsStatsList(data.partsStatsList||[], uid);
  switchPartsTab('wrong');
  showTab('wrong');
  document.getElementById('user-detail').scrollIntoView({ behavior: 'smooth' });
};

function renderWrongList(wrongList, uid) {
  const el = document.getElementById('wrong-list');
  const resetArea = document.getElementById('wrong-reset-area');
  if (!wrongList.length) {
    el.innerHTML = '<div class="empty">✅ 間違い問題なし！</div>';
    if (resetArea) resetArea.innerHTML = '';
    return;
  }
  if (resetArea) resetArea.innerHTML = `<button onclick="resetWrong('${uid}')" style="padding:8px 16px;background:#dc2626;color:white;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:.85rem">🗑️ このユーザーの復習フォルダをリセット</button>`;
  wrongList.sort((a,b) => (b.timestamp?.seconds||0) - (a.timestamp?.seconds||0));
  el.innerHTML = wrongList.map(w => `
    <div class="wrong-item">
      <div class="wi-label">❌ ${w.label || 'Q'+w.qNo}</div>
      <div class="wi-stem">${w.stem || ''}</div>
      <div class="wi-source">📁 ${w.source || ''}</div>
    </div>
  `).join('');
}

function renderStatsList(statsList, uid) {
  const tbody = document.getElementById('stats-body');
  const resetArea = document.getElementById('stats-reset-area');
  if (!statsList || !statsList.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty">取り組み履歴なし</td></tr>';
    if (resetArea) resetArea.innerHTML = '';
    return;
  }
  if (resetArea) resetArea.innerHTML = `<button onclick="resetStats('${uid}')" style="padding:8px 16px;background:#b45309;color:white;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:.85rem">🗑️ このユーザーの取り込み履歴をリセット</button>`;
  statsList.sort((a,b) => (b.lastDate?.seconds||0) - (a.lastDate?.seconds||0));
  tbody.innerHTML = statsList.map(s => {
    const pct = s.lastTotal ? Math.round(s.lastCorrect/s.lastTotal*100) : 0;
    const dateStr = s.lastDate ? new Date(s.lastDate.seconds*1000).toLocaleDateString('ja-JP') : '-';
    return `<tr>
      <td>${s.source || s.id}</td>
      <td>${s.lastCorrect||0}</td>
      <td>${s.lastTotal||0}</td>
      <td style="color:${pct>=70?'#059669':'#dc2626'};font-weight:700">${pct}%</td>
      <td>${s.totalAttempts||1}</td>
      <td>${dateStr}</td>
    </tr>`;
  }).join('');
}

function renderHistoryList(historyList, uid) {
  const el = document.getElementById('history-list');
  const resetArea = document.getElementById('history-reset-area');
  if (!historyList || !historyList.length) {
    el.innerHTML = '<div class="empty">全履歴なし</div>';
    resetArea.innerHTML = '';
    return;
  }
  resetArea.innerHTML = `<button onclick="resetHistory('${uid}')" style="padding:8px 16px;background:#dc2626;color:white;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:.85rem">🗑️ このユーザーの全履歴をリセット</button>`;
  historyList.sort((a,b) => (b.firstWrong?.seconds||0)-(a.firstWrong?.seconds||0));
  el.innerHTML = historyList.map(w => `
    <div class="wrong-item" style="background:#faf5ff;border:1px solid #e9d5ff">
      <div class="wi-label" style="color:#7e22ce">📚 ${w.label||'Q'+w.qNo}</div>
      <div class="wi-stem">${w.stem||''}</div>
      <div class="wi-source">📁 ${w.source||''}</div>
    </div>`).join('');
}

window.resetHistory = async function(uid) {
  if (!confirm('このユーザーの全履歴フォルダをリセットしますか？\n（復習フォルダはそのまま残ります）')) return;
  const data = allUsersData[uid];
  if (!data || !data.historyList) return;
  try {
    const count = data.historyList.length;
    for (const item of data.historyList) {
      await deleteDoc(doc(db, 'users', uid, 'wrongHistory', item.id));
    }
    data.historyList = [];
    renderHistoryList([], uid);
    const card = document.getElementById('ucard-' + uid);
    if (card) card.querySelectorAll('.stat-badge').forEach(b => {
      if (b.textContent.includes('全履歴')) b.textContent = '📚 全履歴 0問';
    });
    alert('リセット完了しました（' + count + '問削除）');
  } catch(e) {
    alert('エラー: ' + e.message);
  }
};

window.resetWrong = async function(uid) {
  if (!confirm('このユーザーの復習フォルダをリセットしますか？')) return;
  const data = allUsersData[uid];
  if (!data || !data.wrongList) return;
  try {
    const count = data.wrongList.length;
    for (const item of data.wrongList) {
      await deleteDoc(doc(db, 'users', uid, 'wrongAnswers', item.id));
    }
    data.wrongList = [];
    renderWrongList([], uid);
    const card = document.getElementById('ucard-' + uid);
    if (card) card.querySelectorAll('.stat-badge').forEach(b => {
      if (b.textContent.includes('復習')) b.textContent = '❌ 復習 0問';
    });
    alert('復習フォルダをリセットしました（' + count + '問削除）');
  } catch(e) { alert('エラー: ' + e.message); }
};

function renderPartsWrongList(partsWrongList, uid) {
  const el = document.getElementById('parts-wrong-list');
  const resetArea = document.getElementById('parts-wrong-reset-area');
  if (!partsWrongList || !partsWrongList.length) {
    el.innerHTML = '<div class="empty">✅ パーツ復習問題なし！</div>';
    if (resetArea) resetArea.innerHTML = '';
    return;
  }
  if (resetArea) resetArea.innerHTML = `<button onclick="resetPartsWrong('${uid}')" style="padding:8px 16px;background:#dc2626;color:white;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:.85rem">🗑️ 部品編復習フォルダをリセット</button>`;
  partsWrongList.sort((a,b) => (b.timestamp?.seconds||0) - (a.timestamp?.seconds||0));
  el.innerHTML = partsWrongList.map(w => `
    <div class="wrong-item">
      <div class="wi-label">⚙️ ${w.label || 'Q'+w.qNo}</div>
      <div class="wi-stem">${w.stem || ''}</div>
      <div class="wi-source">📁 ${w.source || ''}</div>
    </div>
  `).join('');
}

function renderPartsHistoryList(list, uid) {
  const el = document.getElementById('parts-history-list');
  const resetArea = document.getElementById('parts-history-reset-area');
  if (!list || !list.length) {
    el.innerHTML = '<div class="empty">全履歴なし</div>';
    if (resetArea) resetArea.innerHTML = '';
    return;
  }
  if (resetArea) resetArea.innerHTML = `<button onclick="resetPartsHistory('${uid}')" style="padding:8px 16px;background:#dc2626;color:white;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:.85rem">🗑️ 部品編全履歴をリセット</button>`;
  list.sort((a,b) => (b.firstWrong?.seconds||b.timestamp?.seconds||0)-(a.firstWrong?.seconds||a.timestamp?.seconds||0));
  el.innerHTML = list.map(w => `
    <div class="wrong-item" style="background:#faf5ff;border:1px solid #e9d5ff">
      <div class="wi-label" style="color:#7e22ce">📚 ${w.label||'Q'+w.qNo}</div>
      <div class="wi-stem">${w.stem||''}</div>
      <div class="wi-source">📁 ${w.source||''}</div>
    </div>`).join('');
}

function renderPartsStatsList(list, uid) {
  const tbody = document.getElementById('parts-stats-body');
  const resetArea = document.getElementById('parts-stats-reset-area');
  if (!list || !list.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty">取り組み履歴なし</td></tr>';
    if (resetArea) resetArea.innerHTML = '';
    return;
  }
  if (resetArea) resetArea.innerHTML = `<button onclick="resetPartsStats('${uid}')" style="padding:8px 16px;background:#b45309;color:white;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:.85rem">🗑️ 部品編取り組み履歴をリセット</button>`;
  list.sort((a,b) => (b.lastDate?.seconds||0)-(a.lastDate?.seconds||0));
  tbody.innerHTML = list.map(s => {
    const pct = s.lastTotal ? Math.round(s.lastCorrect/s.lastTotal*100) : 0;
    const dateStr = s.lastDate ? new Date(s.lastDate.seconds*1000).toLocaleDateString('ja-JP') : '-';
    return `<tr>
      <td>${s.source||s.id}</td><td>${s.lastCorrect||0}</td><td>${s.lastTotal||0}</td>
      <td style="color:${pct>=70?'#059669':'#dc2626'};font-weight:700">${pct}%</td>
      <td>${s.totalAttempts||1}</td><td>${dateStr}</td>
    </tr>`;
  }).join('');
}

function renderChartStats(catStats, uid) {
  currentChartCatStats = catStats || [];
  const resetArea = document.getElementById('chart-reset-area');
  if (!catStats || !catStats.length) {
    const el = document.getElementById('chart-stats-list');
    if (el) el.innerHTML = '<div class="empty">チャートデータなし</div>';
    if (resetArea) resetArea.innerHTML = '';
    if (adminRadarChart) { adminRadarChart.destroy(); adminRadarChart = null; }
    return;
  }
  if (resetArea) resetArea.innerHTML = `<button onclick="resetChart('${uid}')" style="padding:8px 16px;background:#7e22ce;color:white;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:.85rem">📊 チャートデータをリセット</button>`;
  switchAdminChart('mech');
}

window.switchAdminChart = function(type) {
  document.getElementById('chart-mech-btn').classList.toggle('active', type === 'mech');
  document.getElementById('chart-front-btn').classList.toggle('active', type === 'front');
  const cats = type === 'mech' ? MECH_CATS : FRONT_CATS;
  const catMap = {};
  currentChartCatStats.forEach(c => { catMap[c.id] = c; catMap[c.id.replace(/_/g,'/')] = c; });
  const data = cats.map(c => {
    const s = catMap[c];
    return (s && s.total) ? Math.round(s.correct / s.total * 100) : 0;
  });
  if (adminRadarChart) { adminRadarChart.destroy(); adminRadarChart = null; }
  const canvas = document.getElementById('adminRadarChart');
  if (!canvas) return;
  const hasData = data.some(v => v > 0);
  const el = document.getElementById('chart-stats-list');
  if (!hasData) {
    el.innerHTML = '<div class="empty">このカテゴリのデータなし</div>';
    return;
  }
  adminRadarChart = new Chart(canvas, {
    type: 'radar',
    data: {
      labels: cats,
      datasets: [{
        label: '正答率（%）',
        data,
        backgroundColor: 'rgba(29,78,216,0.15)',
        borderColor: '#1d4ed8',
        borderWidth: 2,
        pointBackgroundColor: '#1d4ed8',
        pointRadius: 4
      }]
    },
    options: {
      responsive: true,
      scales: { r: { min: 0, max: 100, ticks: { stepSize: 20 }, pointLabels: { font: { size: 11 } } } },
      plugins: { legend: { position: 'bottom' } }
    }
  });
  // テーブルも表示
  const sorted = cats.map((c,i) => ({ id: c, pct: data[i], s: catMap[c] }));
  el.innerHTML = '<table class="stats-table"><thead><tr><th>カテゴリ</th><th>解答数</th><th>正解</th><th>正答率</th></tr></thead><tbody>'
    + sorted.map(({id, pct, s}) =>
      `<tr><td>${id}</td><td>${s?.total||0}</td><td>${s?.correct||0}</td><td style="color:${pct>=70?'#059669':'#dc2626'};font-weight:700">${pct}%</td></tr>`
    ).join('') + '</tbody></table>';
};

window.resetChart = async function(uid) {
  if (!confirm('このユーザーのチャートデータ（カテゴリ別正答率）をリセットしますか？')) return;
  const data = allUsersData[uid];

    for (const item of data.catStats) {

};

window.showTab = function(tab) {
  document.querySelectorAll('.tab-btn:not(.ptab)').forEach((b,i) => {
    const tabs = ['wrong','history','stats','chart','parts'];
    b.classList.toggle('active', tabs[i] === tab);
  });
  document.getElementById('tab-wrong').style.display = tab === 'wrong' ? '' : 'none';
  document.getElementById('tab-history').style.display = tab === 'history' ? '' : 'none';
  document.getElementById('tab-stats').style.display = tab === 'stats' ? '' : 'none';
  document.getElementById('tab-chart').style.display = tab === 'chart' ? '' : 'none';
  document.getElementById('tab-parts').style.display = tab === 'parts' ? '' : 'none';
};
