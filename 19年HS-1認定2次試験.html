  {no:1, section:"問1", label:"問1(1)", points:3, answer:"B",
   cat:"エンジン",
   stem:"ポスト新長期Ｅ１３Ｃのコモンレール式高圧燃料噴射装置のソレノイド式インジェクターに関する記述として、不適切なものはどれか。",
   choices:{A:"ソレノイド・コイルに通電が開始されると、電磁力によりバルブはバルブ・スプリングの力に打ち勝って引き上げられ、オリフィスが開く。",B:"ソレノイド・コイルへの通電を止めると、コモンレールからの高圧燃料が、ノズル室に流入することで、コマンド・ピストンが押し下げられる。",C:"オリフィスが閉じると、コモンレールからの高圧燃料が、一気に制御室に流入することで、ノズル・ニードルが急激に降下し噴孔が閉じて噴射が終了する。",D:"オリフィスが開くと、制御室の燃料は次第に流出し制御室の圧力が下がるので、ノズル・ニードル下面に掛かっていた圧力との差圧により、ノズルニードルが上昇し燃料を噴射する。"},
   explanation:"ソレノイド・コイルへの通電を止めると、バルブ・スプリングの力でオリフィスが閉じられ、コモンレールからの高圧燃料が制御室に流入することで、コマンド・ピストンが押し下げられる（ノズル室ではなく制御室）。正解はB。"},

  {no:2, section:"問1", label:"問1(2)", points:3, answer:"A",
   cat:"エンジン",
   stem:"図はＡ０５Ｃエンジン、サプライポンプのカムとＰＣＶの作動図です。①～④に当てはまる語句の組み合わせとして、適切なものはどれか。",
   choices:{A:"①吸入工程　②圧送工程　③開弁　④閉弁",B:"①吸入工程　②圧送工程　③閉弁　④開弁",C:"①吸入工程　②圧縮工程　③閉弁　④開弁",D:"①吸気工程　②圧縮工程　③開弁　④閉弁"},

  {no:3, section:"問1", label:"問1(3)", points:3, answer:"A",
   cat:"エンジン",
   stem:"２＊Ｇ付大型トラックのエンジンのセンサーに関する記述として、適切なものはどれか。",
   choices:{A:"エアフローセンサーは薄膜シリコンチップ式を採用し、応答性の向上を図った。シリコンチップ部上流温度センサーの温度と下流温度センサーの温度差を計測し、空気流量を計測している。",B:"アクセルセンサーは可変抵抗式のセンサーで、アクセルペダルの踏み込み量を電気信号に置き替えてエンジンＥＣＵに送る。アクセルセンサーアセンブリ１個の中にはセンサーを２個内蔵している。",C:"燃料温度センサーはサプライポンプ入口回路に取り付けている。",D:"エンジン主回転センサーは、フライホイールハウジングに取り付けており、エンジンが回転してパルサーにより交流電圧を発生させる。パルサーには６°ごとに凹部を設けており、エンジン１サイクル（２回転）分の凹数は１２０個になる。"},
   explanation:"B：エンジン主回転センサーはホールIC式。C：インジェクターのリゲージ回路の説明が不適切。D：パルサーの凹数は112個（120個ではない）。正解はA。"},

  {no:4, section:"問1", label:"問1(4)", points:3, answer:"C",

   explanation:"スレーブピストンはエンジンリターダーとEGRの区別はなく、両回路の油圧を上下別の異なるピストンで受け排気バルブを押す（同じピストンではない）。正解はC。"},

  {no:5, section:"問1", label:"問1(5)", points:3, answer:"B",

   choices:{A:"後輪が接地した状態で牽引する際は、ギヤをＤレンジにするか、プロペラシャフトを外すなどモータージェネレーターが回転しない処置を実施の上、牽引する。",B:"点検、整備時にはまずスターターキーをＯＦＦ、次にサービスプラグを取り外し、コンデンサーが放電するまで規定時間待ったのちに、保護具を必ず身に着け、高電圧回路の作業を行う。",C:"高電圧に関わる点検、整備を行うには、労働安全衛生法第５９条ならびに労働安全衛生規則第３６条により特別教育の受講が義務付けられている。",D:"ＨＶバッテリーがバッテリー上がりを起こした際には、専用の外部充電器（ハイブリッド・システム・チャージャー）で低電流を長時間流し続け、すべてのセルが満充電になるまで充電する。"},

  {no:7, section:"問1", label:"問1(7)", points:3, answer:"D",

  {no:8, section:"問1", label:"問1(8)", points:3, answer:"B",

  {no:10, section:"問1", label:"問1(10)", points:3, answer:"A",

   choices:{A:"タイヤの一部が重い場合、ゆっくり回転させると重い部分が下になって止まる。このときのアンバランスをダイナミック・アンバランスといい、シミーの原因になる。",B:"タイヤの走行音は、一般にラグ型パターンよりもリブ型パターンの方が大きく、また、バイアス・タイヤよりもラジアル・タイヤの方が大きい。",C:"スキールとは、急発進、急制動、急旋回のときに発するキーという鋭い音で、タイヤのトレッドが局部的に振動を起こし発生する。",D:"パターンノイズは、トレッド・パターンの溝の中の空気が、路面とタイヤ間で膨張し、排出されるときに出る音である。"},

function norm(q) {
  if (q.o !== undefined && Array.isArray(q.o)) {
    var labs = q.o.length <= 3 ? L3 : q.o.length === 4 ? L4 : L5;
    var ch = {};
    q.o.forEach(function(v, i) { ch[labs[i]] = v; });
    return {no:q.n, section:q.s||'', label:(q.s||'問'+q.n), points:q.p, answer:labs[q.a], stem:q.q, choices:ch, explanation:q.exp||'', invalid:false, multi:false, freeAnswer:false};
  }
  if (q.opts !== undefined && Array.isArray(q.opts)) {
    var labs2 = q.labels || L4;
    var ch2 = {};
    q.opts.forEach(function(v, i) { if (labs2[i]) ch2[labs2[i]] = v; });
    var sec = q.section || q.s || '';
    var lbl = q.label || (sec ? sec + '(' + (q.no||q.n) + ')' : '問' + (q.no||q.n));
    var ansVal = Array.isArray(q.ans) ? q.ans.map(function(i){return labs2[i];}).join(',') : labs2[q.ans];
    return {no:q.no||q.n, section:sec, label:lbl, points:q.pts||q.points||1, answer:ansVal, stem:q.text||q.stem||q.q||'', choices:ch2, explanation:q.exp||q.explanation||'', invalid:false, multi:q.multi||false, freeAnswer:false};
  }
  return {no:q.no, section:q.section||q.s||'', label:q.label||('問'+q.no), points:q.points||q.pts||1, answer:q.answer, stem:q.stem||q.text||q.q||'', choices:q.choices||{}, explanation:q.explanation||q.exp||'', invalid:q.invalid||false, multi:false, freeAnswer:q.freeAnswer||false};
}

const totalQ = questions.length;
let idx = 0;
const ans = {};

function updateProg() {
  const answered = Object.keys(ans).length;
  document.getElementById('barfill').style.width = (answered/totalQ*100)+'%';
  document.getElementById('prog').textContent = (idx+1)+' / '+totalQ+' 問  （回答済み '+answered+' 問）';
}

function render() {
  const _q = questions[idx];
  const q = norm(_q);
  const isCalc = q.section === '問2' || q.section === '問２';
  const choiceKeys = Object.keys(q.choices);
  let html = '';
  if (q.section) html += '<div class="section-badge">'+q.section+'</div>';
  html += '<div class="qtitle">'+q.label+'（'+q.points+'点）</div>';
  if (q.invalid) html += '<div class="calc-note" style="background:#fff5f5;border-color:#fca5a5;color:#dc2626">⚠️ この問題は試験では無効問題でした（採点対象外）</div>';
  if (q.freeAnswer) html += '<div class="calc-note" style="background:#eff6ff;border-color:#93c5fd;color:#1d4ed8">📝 記述問題 — 計算して答えを確認してください（採点対象外）</div>';
  if (q.multi) html += '<div class="calc-note" style="background:#fff7ed;border-color:#fdba74;color:#c2410c">☑️ 複数選択問題（採点対象外）</div>';
  if (isCalc && !q.freeAnswer) html += '<div class="calc-note">📝 計算問題 — 電卓使用可</div>';
  if(typeof figures!=='undefined'&&figures[q.no])html+='<div class="qfig" style="margin:10px 0;padding:6px;background:#f0f7ff;border-radius:8px;text-align:center">'+figures[q.no]+'</div>';
    html += '<div class="qstem">'+q.stem.replace(/\n/g,'<br>')+'</div>';
  if (q.freeAnswer) {
    html += '<div style="background:#eff6ff;border:1px solid #93c5fd;border-radius:10px;padding:12px;margin-top:10px">';
    html += '<div style="font-weight:700;color:#1d4ed8;margin-bottom:6px">正解：'+q.answer+'</div>';
    if (q.explanation) html += '<div style="color:#333;font-size:14px;line-height:1.6">'+q.explanation.replace(/\n/g,'<br>')+'</div>';
    html += '</div>';
  } else {
    html += '<div class="choices">';
    choiceKeys.forEach(function(c) {
      if (!q.choices[c]) return;
      const sel = ans[q.no] === c ? ' selected' : '';
      html += '<button class="choice'+sel+'" onclick="selectAns('+q.no+',\'' + c + '\')"><span class="label">'+c+'</span><span>'+q.choices[c]+'</span></button>';
    });
    html += '</div>';
  }
  document.getElementById('quiz').innerHTML = html;
  document.getElementById('nextBtn').textContent = idx === totalQ - 1 ? '採点する ✓' : '次へ ▶';
  updateProg();
  window.scrollTo(0, 0);
}

function selectAns(no, c) { ans[no] = c; updateProg(); render(); }
function prevQ() { if (idx > 0) { idx--; render(); } }
function nextQ() { if (idx < totalQ - 1) { idx++; render(); } else { showResult(); } }

function showResult() {
  let score = 0, max = 0;
  const norms = questions.map(norm);
  norms.forEach(function(q) {
    if (q.invalid || q.freeAnswer || q.multi) return;
    max += q.points;
    if (ans[q.no] === q.answer) score += q.points;
  });
  let html = '<div class="result"><h2>📊 採点結果</h2><div class="score-big">'+score+' / '+max+' 点</div>';
  const sections = {}, secOrder = [];
  norms.forEach(function(q) {
    if (q.invalid || q.freeAnswer || q.multi) return;
    if (!sections[q.section]) { sections[q.section] = {score:0,max:0}; secOrder.push(q.section); }
    sections[q.section].max += q.points;
    if (ans[q.no] === q.answer) sections[q.section].score += q.points;
  });
  const vs = secOrder.filter(function(s) { return s; });
  if (vs.length > 0) {
    let sh = '<p style="font-size:14px;color:#555">';
    vs.forEach(function(s) { sh += s+'：'+sections[s].score+'/'+sections[s].max+'点　'; });
    html += sh + '</p>';
  }
  let hasMiss = false;
  html += '<h3 style="margin:16px 0 8px;font-size:15px;color:#333">📝 全問解説</h3>';
  norms.forEach(function(q) {
    if (q.invalid) {
      html += '<div style="border-left:5px solid #d1d5db;background:#f9fafb;padding:12px;margin:8px 0;border-radius:8px;line-height:1.6;font-size:14px">';
      html += '<div style="font-weight:700;font-size:15px;margin-bottom:4px;color:#6b7280">'+q.label+' ⚠️ 無効問題（採点対象外）</div>';
      if (q.explanation) html += '<div style="color:#333;margin-top:4px">'+q.explanation.replace(/\n/g,'<br>')+'</div>';
      html += '</div>';
      return;
    }
    if (q.freeAnswer) {
      html += '<div style="border-left:5px solid #93c5fd;background:#eff6ff;padding:12px;margin:8px 0;border-radius:8px;line-height:1.6;font-size:14px">';
      html += '<div style="font-weight:700;font-size:15px;margin-bottom:4px;color:#1d4ed8">'+q.label+' 📝 記述問題（採点対象外）</div>';
      html += '<div style="color:#1d4ed8;font-weight:700;margin-bottom:4px">正解：'+q.answer+'</div>';
      if (q.explanation) html += '<div style="color:#333;margin-top:4px">'+q.explanation.replace(/\n/g,'<br>')+'</div>';
      html += '</div>';
      return;
    }
    if (q.multi) {
      html += '<div style="border-left:5px solid #fdba74;background:#fff7ed;padding:12px;margin:8px 0;border-radius:8px;line-height:1.6;font-size:14px">';
      html += '<div style="font-weight:700;font-size:15px;margin-bottom:4px;color:#c2410c">'+q.label+' ☑️ 複数選択（採点対象外）</div>';
      html += '<div style="color:#c2410c;font-weight:700;margin-bottom:4px">正解：'+q.answer+'</div>';
      if (q.explanation) html += '<div style="color:#333;margin-top:4px">'+q.explanation.replace(/\n/g,'<br>')+'</div>';
      html += '</div>';
      return;
    }
    const wrong = ans[q.no] !== q.answer;
    if (wrong) hasMiss = true;
    const bc = wrong ? '#dc2626' : '#d1d5db';
    const bg = wrong ? '#fff5f5' : '#fff';
    const correctText = q.choices[q.answer] || '';
    html += '<div style="border-left:5px solid '+bc+';background:'+bg+';padding:12px;margin:8px 0;border-radius:8px;line-height:1.6;font-size:14px">';
    html += '<div style="font-weight:700;font-size:15px;margin-bottom:4px;color:'+(wrong?'#dc2626':'#111')+'">'+q.label+(wrong?' ❌':' ✅')+'</div>';
    if (wrong) {
      const myText = q.choices[ans[q.no]] || '';
      html += '<div style="color:#dc2626;font-weight:700;margin-bottom:2px">あなたの答え：'+(ans[q.no]||'未回答')+(myText ? '　'+myText : '')+'</div>';
      html += '<div style="color:#16a34a;font-weight:700;margin-bottom:4px">正解：'+q.answer+(correctText ? '　'+correctText : '')+'</div>';
    } else {
      html += '<div style="color:#16a34a;font-weight:700;margin-bottom:4px">正解：'+q.answer+(correctText ? '　'+correctText : '')+'</div>';
    }
    if (q.explanation) html += '<div style="color:#333;margin-top:4px">'+q.explanation.replace(/\n/g,'<br>')+'</div>';
    html += '</div>';
  });
  if (!hasMiss) html += '<p style="font-size:18px;font-weight:900;color:#16a34a">🎉 全問正解です！</p>';
  html += '<div class="actions"><button onclick="reviewMistakes()" style="padding:14px;border:none;border-radius:12px;background:#dc2626;color:#fff;font-size:16px;font-weight:700;cursor:pointer">間違えた問題を復習</button><button onclick="resetQuiz()" style="padding:14px;border:none;border-radius:12px;background:#6b7280;color:#fff;font-size:16px;font-weight:700;cursor:pointer">最初からやり直す</button></div></div>';
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('nav').style.display = 'none';
  const r = document.getElementById('result');
  r.style.display = 'block';
  html += '<a href="./index.html" style="display:block;text-align:center;margin-top:16px;padding:12px;background:#1e3a5f;color:white;border-radius:10px;text-decoration:none;font-weight:700;font-size:.95rem">🏠 ホームへ戻る</a>';
  r.innerHTML = html;
  window.scrollTo(0, 0);
}

function reviewMistakes() {
  const norms = questions.map(norm);
  for (let i = 0; i < norms.length; i++) {
    const q = norms[i];
    if (q.invalid || q.freeAnswer || q.multi) continue;
    if (ans[q.no] !== q.answer) {
      idx = i;
      document.getElementById('quiz').style.display = 'block';
      document.getElementById('nav').style.display = 'flex';
      document.getElementById('result').style.display = 'none';
      render(); return;
    }
  }
}

function resetQuiz() {
  Object.keys(ans).forEach(function(k) { delete ans[k]; });
  idx = 0;
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('nav').style.display = 'flex';
  document.getElementById('result').style.display = 'none';
  render();
}

render();
</script>

<script src="./firebase-config.js"></script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, deleteDoc, collection, getDocs, serverTimestamp, increment } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const SOURCE_KEY = document.title.replace(/[\s　]/g, '_').replace(/[^\w\u3040-\u9FFF]/g, '');

try {
  const app = initializeApp(FIREBASE_CONFIG);
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, async user => {
    // ログインバッジ表示
    const badge = document.getElementById('fb-login-badge');
    if (badge) {
      if (user) {
        const name = user.displayName || user.email.split('@')[0];
        badge.innerHTML = `<a href="./index.html" style="font-size:.72rem;background:rgba(255,255,255,.2);color:white;padding:3px 8px;border-radius:999px;text-decoration:none">👤 ${name}</a>`;
        // 間違い問題を読み込む
        try {
          const snap = await getDocs(collection(db, 'users', user.uid, 'wrongAnswers'));
          snap.forEach(d => { window._wrongKeys = window._wrongKeys || new Set(); window._wrongKeys.add(d.id); });
        } catch(e) {}
      } else {
        badge.innerHTML = `<a href="./login.html" style="font-size:.72rem;background:rgba(255,255,255,.15);color:white;padding:3px 10px;border-radius:999px;text-decoration:none">ログイン</a>`;
      }
    }
    window._fbUser = user;
    window._fbDb = db;
    window._fbSrc = SOURCE_KEY;
    // users/{uid}ドキュメントを作成（管理者ページで一覧表示するため）
    try {
      const { doc, setDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
      setDoc(doc(db,'users',user.uid),{email:user.email,displayName:user.displayName||user.email.split('@')[0],lastLogin:new Date().toISOString()},{merge:true}).catch(()=>{});
    } catch(e){}
  });

  // selectAns をラップして答え記録
  const _orig = window.selectAns;
  window.selectAns = function(no, choice) {
    _orig(no, choice);
    const user = window._fbUser;
    const db = window._fbDb;
    if (!user || !db) return;
    const q = questions.find(q2 => q2.no === no);
    if (!q) return;
    const isCorrect = choice === q.answer;
    const key = window._fbSrc + '_q' + no;
    if (isCorrect) {
      deleteDoc(doc(db, 'users', user.uid, 'wrongAnswers', key)).catch(()=>{});
    } else {
      setDoc(doc(db, 'users', user.uid, 'wrongAnswers', key), {
        source: window._fbSrc, qNo: no, label: q.label || ('Q'+no),
        stem: (q.stem||'').substring(0,120), timestamp: serverTimestamp(),
        url: window.location.pathname
      }, {merge:true}).catch(()=>{});
      setDoc(doc(db, 'users', user.uid, 'wrongHistory', key), {
        source: window._fbSrc, qNo: no, label: q.label || ('Q'+no),
        stem: (q.stem||'').substring(0,120), firstWrong: serverTimestamp(),
        url: window.location.pathname
      }, {merge:true}).catch(()=>{});
    }
    // カテゴリ別累計
    const cat = q.cat || "一般関連";
    setDoc(doc(db,'users',user.uid,'catStats',cat),{total:increment(1),correct:increment(isCorrect?1:0)},{merge:true}).catch(()=>{});
  };

  // showResult をラップして受験記録
  const _origResult = window.showResult;
  window.showResult = function() {
    _origResult();
    const user = window._fbUser;
    const db = window._fbDb;
    if (!user || !db) return;
    const norms = questions.filter(q => !q.invalid && !q.freeAnswer && !q.multi);
    let correct = 0, total = 0;
    norms.forEach(q => {
      total += q.points || 3;
      if (ans[q.no] === q.answer) correct += q.points || 3;
    });
    setDoc(doc(db, 'users', user.uid, 'stats', window._fbSrc), {
      source: window._fbSrc, lastCorrect: correct, lastTotal: total,
      lastDate: serverTimestamp(), totalAttempts: increment(1)
    }, {merge:true}).catch(()=>{});
  };
} catch(e) { console.warn('Firebase:', e.message); }
</script>

<script>
// ?q=N で特定問題から開始
window.addEventListener('load', function() {
  var qParam = new URLSearchParams(location.search).get('q');
  if (!qParam || typeof questions === 'undefined' || typeof render !== 'function') return;
  var qi = questions.findIndex(function(x){ return x.no === parseInt(qParam); });
  if (qi >= 0) { idx = qi; render(); }
});
</script>
