  {no:1, section:"問1", label:"問1(1)", points:2, answer:"B",
   stem:"２＊Ｇ付プロフィア（Ａ０９Ｃ）のクーリングシステムに関する記述として、適切なものはどれか。",
   choices:{A:"２段過給ターボ車のクーラントポンプは、単段ターボ車と比較してプーリー径を大きくし、かつベーン形状を変更して、冷却水の吐出量を増加させている。",B:"飛石から樹脂製ラジエーターロアタンクをガードするロアタンクカバーをダンプとミキサー車に標準設定している。",C:"クーリングファンは、エンジン放熱量アップのため、２段過給ターボ車のみファンを直径７５０ｍｍに変更。",D:"走行中に冷却水の水位が想定以下に下がると、ラジエーターに取り付けたウォーターレベルスイッチが作動し、「冷却水不足」の表示と警報が鳴る。"},
   explanation:"2段過給ターボ車のクーラントポンプはプーリー径を小さくしている。ファン径750mmは2段過給ターボ車および消防車が対象。ウォーターレベルスイッチはヘッダータンク上部に設けている。適切なのはB。正解はB。"},
  {no:2, section:"問1", label:"問1(2)", points:2, answer:"D",
   stem:"Ｑ＊Ｇ付プロフィア（２０１４年モデル）におけるエンジン関連の変更点に関する記述として、不適切なものはどれか。",
   choices:{A:"フローリミッター内のスプリングおよびピストンを廃止した。",B:"燃料添加弁およびＦＣＶ（Ｆｕｅｌ Ｃｕｔ Ｖａｌｖｅ：燃料遮断弁）を追加した。また、燃料添加弁の追加に伴い、シャシ側にプレフューエルフィルターを追加した。",C:"電子制御ファンクラッチは、通電により磁力を発生させる電磁コイル、ファンの回転数を検出する回転センサー、シリコンオイル供給穴を開閉してオイル量を調整して回転を制御するバルブなどを内蔵している。",D:"尿素水の濃度測定は、超音波により測定され、測定データーはＬＡＮ通信によりエンジンＥＣＵに送信される。"},
   explanation:"尿素水の濃度測定センサーは超音波により測定され、測定データはCAN通信でエンジンECUおよび尿素SCR DCUへ送信される。「LAN通信」「エンジンECUのみ」とする記述が不適切。正解はD。"},
  {no:3, section:"問1", label:"問1(3)", points:2, answer:"C",
   stem:"過給機付きエンジンに関する記述として、適切なものはどれか。",
   choices:{A:"ブーストコンペンセータ（通称：ブーコン）が作動すると燃料の噴射量が増す。",B:"インタークーラーはターボチャージャーに吸入される空気を冷却する。",C:"ウエストゲートバルブは過給圧が規定値を超えると開いて、タービンホイールに吹き付ける排気ガスの一部を逃がす働きをする。",D:"ターボチャージャーは空気過剰率が小さくなるのでエンジンの出力を増すことができる。"},
   explanation:"インタークーラーはターボチャージャーから出た圧縮空気を冷却する（吸入空気ではない）。ターボは充填効率が向上するため出力が増す（空気過剰率は大きくなる）。ウエストゲートバルブはタービンホイールへの排気ガスの一部を逃がして過給圧を制御するCが適切。正解はC。"},
  {no:4, section:"問1", label:"問1(4)", points:2, answer:"A",
   stem:"２＊Ｇ付大型トラックのエンジンのセンサーに関する記述として、適切なものはどれか。",
   choices:{A:"燃料温度センサーはサプライポンプ入口回路に取り付けている。",B:"エアフローセンサーはホールＩＣ式を採用し、応答性の向上を図った。",C:"アクセルセンサーアセンブリ１個の中にはインジェクターのリゲージ回路が含まれている。",D:"エンジン１サイクル（２回転）分の凹数は１１２個になる。"},
   explanation:"エアフローセンサーは薄膜シリコンチップ式。ホールIC式は他のセンサー。インジェクターのリゲージ回路は別部品。エンジン主回転センサーのパルサー凹数は112個。燃料温度センサーはサプライポンプ入口回路取り付けが正しい。正解はA。"},
  {no:5, section:"問1", label:"問1(5)", points:2, answer:"B",
   stem:"Ｑ＊Ｇ付プロフィアＡ０９Ｃエンジンの電子制御ファンクラッチシステムの構造説明として、適切なものはどれか。",
   choices:{A:"ファンクラッチＥＣＵはエンジン回転、エンジン負荷、車速、水温、インテーク温度、外気温を検出して、ファン回転数を制御している。",B:"オイル供給穴を開閉するバルブでオイル量を調整しファンの回転数を制御している。",C:"電磁式なのでシリコンオイルは封入されていない。",D:"電磁式クラッチにてＯＮ-ＯＦＦ制御し、ファンの回転を制御している。"},
   explanation:"ファンクラッチECUではなくエンジンECUがファン回転数を制御する。シリコンオイルは封入されており、オイル供給穴を開閉するバルブでオイル量を調整してファン回転数を制御するBが適切。正解はB。"},
  {no:6, section:"問1", label:"問1(6)", points:2, answer:"A",
   stem:"ＳＪＧデュトロハイブリッド車のパワーコントロールユニット内にある、システムメインリレー回路に関する記述として、適切なものはどれか。",
   choices:{A:"システムメインリレーは、レジスターを経由した制限電流を流すことにより、回路を保護するためのものである。",B:"システムメインリレーは、高電圧電源回路の接続と遮断を確実に行うもので、２個のリレーが配置してある。",C:"回路上には３個のリレーが配置してあり、アシスト時と充電時で回路の使い分けをしている。",D:"システムメインリレーは、ＨＶバッテリーの交流電流とモータージェネレーターの直流電流の変換を行う。"},
   explanation:"システムメインリレー回路は3個のリレーを使用し、最初にシステムメインレジスターを経由した制限電流を流すことで、高電圧の突入電流から回路を保護する。直流・交流変換を行うものではない。正解はA。"},
  {no:7, section:"問1", label:"問1(7)", points:2, answer:"C",
   stem:"下図は２＊Ｇ付プロフィアのハイブリッド車で、ブレーキを踏んだ時の制動トルクを表したグラフです。図の［①］から［④］に当てはまる語句の組み合わせとして、適切なものはどれか。",
   choices:{A:"①リターダトルク ②サービスブレーキ ③車両停止トルク ④最大ブレーキトルク",B:"①サービスブレーキ ②エネルギー回生 ③ブレーキ要求トルク ④最大回生トルク",C:"①エネルギー回生 ②サービスブレーキ ③回生最大トルク ④ブレーキ要求トルク",D:"①エネルギー回生 ②リターダトルク ③ブレーキ要求トルク ④最大リターダトルク"},
   explanation:"ブレーキを踏んだとき、まずエネルギー回生を優先し、回生能力を超えるブレーキ要求に対してサービスブレーキを併用する。①エネルギー回生②サービスブレーキ③回生最大トルク④ブレーキ要求トルクの組合せが正しい。正解はC。"},
  {no:8, section:"問1", label:"問1(8)", points:2, answer:"A",
   stem:"ＢＪＧ付セレガハイブリッドの三相交流誘導機に関する記述として、不適切なものはどれか。",
   choices:{A:"リターダー機能とは、ＨＶコントロールコンピューターが各種センサーからアクセルを離していると判断すると、インバーターが三相交流誘導機に通電しブレーキ力を発生させることである。",B:"スタータ機能とは、エンジン始動時にＨＶコントロールコンピューターに内蔵されているインバーターが三相交流誘導機に交流電力を送ることで、スタータモーターとして機能させることである。",C:"エンジントルクアシスト機能とは、ＨＶコントロールコンピューターが車両の発進加速の状態を判断し、インバーターが三相交流誘導機へ交流電力を送りモーターとして機能させることである。",D:"発電機能とは、ＨＶコントロールコンピューターが定常走行状態を判断すると、インバーターが三相交流誘導機を発電機として機能させることである。"},
   explanation:"リターダー機能はアクセルOFFによる減速時にインバーターが三相交流誘導機を発電機として機能させる（通電してブレーキ力を発生させるのではなく、回生発電による制動）。正解はA。"},
  {no:9, section:"問1", label:"問1(9)", points:2, answer:"D",
   stem:"ＳＪＧ付デュトロのハイブリッドシステムの点検、整備に関する記述として、適切なものはどれか。",
   choices:{A:"ＨＶバッテリーがバッテリー上がりを起こした際には、専用の外部充電器（ハイブリッド・システム・チャージャ）で低電流を長時間流し続け、すべてのセルが満充電になるまで充電する。",B:"後輪が接地した状態で牽引する際は、ギヤをＤレンジにするか、プロペラシャフトを外すなどモータージェネレーターが回転しない処置を実施の上、牽引する。",C:"車両火災が発生しているときには、ＡＢＣ消火器で消火する。水をかける場合は消火栓から大量に放水するのは危険なため、少量の水で放水する。",D:"点検、整備時にはまずスターターキーをＯＦＦ、次にサービスプラグを取り外し、コンデンサーが放電するまで７分間待ったのちに、保護具を必ず身に着け、高電圧回路の作業を行う。"},
   explanation:"後輪が接地した状態で牽引する際はNレンジで行う（DレンジやプロペラシャフトではなくNレンジ）。HVバッテリーは外部充電できないので交換が必要。車両火災では少量放水はかえって危険で大量放水が正しい。適切なのはD（スターターOFF→7分待ち→保護具装着→高電圧作業は正しい手順）。正解はD。"},
  {no:10, section:"問1", label:"問1(10)", points:2, answer:"C",
   stem:"ハイブリッド車の事故現場での処置要領に関する記述として、不適切なものはどれか。",
   choices:{A:"ＨＶバッテリーから漏れたバッテリー液は強アルカリ性の電解液であるため直接触れてはいけない。やむを得ず触る場合はゴム手袋、保護メガネを着用し、飽和ほう酸水で中和しリトマス紙で確認後、処置をする。",B:"高電圧線かどうか不明なむき出しの線に、やむを得ず触る場合、または触れるおそれがある場合は、絶縁手袋を着用し電線を絶縁処置する。",C:"水をかける場合は消火栓などから大量の水で放水するのは危険なため、少量の水で放水する。",D:"車両が水に浸かっているときは、感電のおそれがあるためサービスプラグを抜き取ることが可能であっても、高電圧部品・配線等には触れないようにする。"},
   explanation:"少量の放水ではかえって危険であるため、消火栓などから大量の水で放水を行うことが正しい。少量放水が危険としているCが不適切。正解はC。"},
  {no:11, section:"問1", label:"問1(11)", points:2, answer:"B",
   stem:"２＊Ｇ付プロフィア（１９年モデル）ＨＶ車のＡＭＴに関する記述として、適切なものはどれか。",
   choices:{A:"クラッチアクチュエータは、ＡＭＴ ＥＣＵからの電気信号により、油圧を発生させてクラッチの断接を行う。",B:"ＨＶシステムとの協調制御を採用し、ＨＶモーターが効率的に電気を使用できるように、クラッチやトランスミッションを制御している。",C:"変速時、ＨＶモーターによる回転合わせを行うため、トランスミッションは全段シンクロメッシュ式を採用した。",D:"発進時、ＨＶモーターを制御することにより、ＡＴ車にあるクリープ現象を実現し、微速走行性を向上させた。"},
   explanation:"クラッチアクチュエータはエアピストンによりクラッチを断接する（油圧ではない）。T/Mのメイン部はコンスタントメッシュ式、スプリッター・レンジ部はシンクロメッシュ式。AT車のようなクリープ現象はない。HVシステムとの協調制御のBが適切。正解はB。"},
  {no:12, section:"問1", label:"問1(12)", points:2, answer:"C",
   stem:"Ｑ＊Ｇ付ＦＥ２Ａのトランスミッションに関する記述として、不適切なものはどれか。",
   choices:{A:"ＭＸ０６は前進６速のＯＤ（オーバードライブ）、ＭＸ０７は６速までＭＸ０６と同ギヤレシオのＷＯＤ（ダブルオーバードライブ）となっている。",B:"シンクロのストロークを短縮することにより、操作力の低減を図りパワーシフトを廃止した。",C:"インターロックピン式の二重かみ合い防止機構を廃止した。",D:"シフトポジション「Ｄ」１速時は、Ｐ３リングギヤが拘束され、Ｐ３キャリアを出力とすることでアウトプットシャフトを減速回転させている。"},
   explanation:"MX07とMX06は1〜5速までは共通構造になっている。6速からは別構造となっており、ギヤレシオもそれぞれ設定されている。MX07は6速までMX06と同ギヤレシオとする記述が不適切。正解はC。"},
  {no:13, section:"問1", label:"問1(13)", points:2, answer:"D",
   stem:"アリソンオートマチックトランスミッション（６速）の変速作動に関する記述として、不適切なものはどれか。",
   choices:{A:"シフトポジション「Ｄ」１速時は、Ｐ３リングギヤが拘束され、Ｐ３キャリアを出力とすることでアウトプットシャフトを減速回転させている。",B:"Ｐ３サンギヤに逆回転が入力され、Ｐ３キャリアは逆回転のまま減速して出力し、アウトプットシャフトへ伝える。",C:"大容量オイルポンプを内蔵することにより、トランスミッション内部の潤滑性能を向上した。",D:"シフトポジション「Ｄ」２速時は、Ｐ２キャリアを増速出力させてＰ３リングギヤへ伝えるので、Ｐ３キャリアが１速時より小さいレシオでアウトプットシャフトを減速回転させる。"},
   explanation:"「D」2速時でもP2キャリアは減速回転する。1速時は拘束されていたP3リングギヤが2速時にはP3サンギヤと共に入力として回転するので、その分だけ1速時より小さいギヤレシオを作っている。正解はD。"},
  {no:14, section:"問1", label:"問1(14)", points:2, answer:"A",
   stem:"ＭＺ１２トランス・ミッションでレンジ「ロー」の時に、ハウジングに固定されるプラネタリー・ギヤの構成部品として、適切なものはどれか。",
   choices:{A:"リングギヤ",B:"プラネタリーキャリア",C:"サンギヤ",D:"プラネタリーピニオン"},
   explanation:"レンジ「ロー」の時はハウジングとリングギヤが固定される。レンジ「ハイ」の時はリングギヤとプラネタリーキャリヤが固定される。正解はA。"},
  {no:15, section:"問1", label:"問1(15)", points:2, answer:"C",
   stem:"Ｌ＊Ｇ付プロフィアのプロシフト１６に関する記述として、不適切なものはどれか。",
   choices:{A:"スプリッタ２段、メイン４段、レンジ２段の組み合わせにより前進１６段の変速を可能にしている。",B:"セレクトレバーを操作すると、レバー本体からＣＡＮ通信によりプロシフトＥＣＵに電気信号が送られ変速が行われる。",C:"プロシフトＥＣＵは助手席側インパネ内右下に搭載されており、各センサーなどの情報を元に変速制御を行っている。",D:"断・接用にそれぞれＦａｓｔ・Ｓｌｏｗの２系統（計４つ）のマグネチックバルブを備え、クラッチ制御を行っている。"},
   explanation:"プロシフトECUはT/M上部シフトアクチュエーター内蔵であり、助手席側インパネ内右下ではない。正解はC。"},
  {no:16, section:"問1", label:"問1(16)", points:2, answer:"B",
   stem:"振動現象に関する記述として、不適切なものはどれか。",

function norm(q) {
  if (q.o !== undefined && Array.isArray(q.o)) {
    var labs = q.o.length <= 3 ? L3 : q.o.length === 4 ? L4 : L5;
    var ch = {};
    q.o.forEach(function(v, i) { ch[labs[i]] = v; });
    return {no:q.n, section:q.s||'', label:(q.s||'問'+q.n), points:q.p, answer:labs[q.a], stem:q.q, choices:ch, explanation:q.exp||'', invalid:false, multi:false, freeAnswer:false};
  }
  if (q.opts !== undefined && Array.isArray(q.opts)) {
    var labs2 = q.labels || L4;
    var ch2 = {};
    q.opts.forEach(function(v, i) { if (labs2[i]) ch2[labs2[i]] = v; });
    var sec = q.section || q.s || '';
    var lbl = q.label || (sec ? sec + '(' + (q.no||q.n) + ')' : '問' + (q.no||q.n));
    var ansVal = Array.isArray(q.ans) ? q.ans.map(function(i){return labs2[i];}).join(',') : labs2[q.ans];
    return {no:q.no||q.n, section:sec, label:lbl, points:q.pts||q.points||1, answer:ansVal, stem:q.text||q.stem||q.q||'', choices:ch2, explanation:q.exp||q.explanation||'', invalid:false, multi:q.multi||false, freeAnswer:false};
  }
  return {no:q.no, section:q.section||q.s||'', label:q.label||('問'+q.no), points:q.points||q.pts||1, answer:q.answer, stem:q.stem||q.text||q.q||'', choices:q.choices||{}, explanation:q.explanation||q.exp||'', invalid:q.invalid||false, multi:false, freeAnswer:q.freeAnswer||false};
}

const totalQ = questions.length;
let idx = 0;
const ans = {};

function updateProg() {
  const answered = Object.keys(ans).length;
  document.getElementById('barfill').style.width = (answered/totalQ*100)+'%';
  document.getElementById('prog').textContent = (idx+1)+' / '+totalQ+' 問  （回答済み '+answered+' 問）';
}

function render() {
  const _q = questions[idx];
  const q = norm(_q);
  const isCalc = q.section === '問2' || q.section === '問２';
  const choiceKeys = Object.keys(q.choices);
  let html = '';
  if (q.section) html += '<div class="section-badge">'+q.section+'</div>';
  html += '<div class="qtitle">'+q.label+'（'+q.points+'点）</div>';
  if (q.invalid) html += '<div class="calc-note" style="background:#fff5f5;border-color:#fca5a5;color:#dc2626">⚠️ この問題は試験では無効問題でした（採点対象外）</div>';
  if (q.freeAnswer) html += '<div class="calc-note" style="background:#eff6ff;border-color:#93c5fd;color:#1d4ed8">📝 記述問題 — 計算して答えを確認してください（採点対象外）</div>';
  if (q.multi) html += '<div class="calc-note" style="background:#fff7ed;border-color:#fdba74;color:#c2410c">☑️ 複数選択問題（採点対象外）</div>';
  if (isCalc && !q.freeAnswer) html += '<div class="calc-note">📝 計算問題 — 電卓使用可</div>';
  html += '<div class="qstem">'+q.stem.replace(/\n/g,'<br>')+'</div>';
  if (q.freeAnswer) {
    html += '<div style="background:#eff6ff;border:1px solid #93c5fd;border-radius:10px;padding:12px;margin-top:10px">';
    html += '<div style="font-weight:700;color:#1d4ed8;margin-bottom:6px">正解：'+q.answer+'</div>';
    if (q.explanation) html += '<div style="color:#333;font-size:14px;line-height:1.6">'+q.explanation.replace(/\n/g,'<br>')+'</div>';
    html += '</div>';
  } else {
    html += '<div class="choices">';
    choiceKeys.forEach(function(c) {
      if (!q.choices[c]) return;
      const sel = ans[q.no] === c ? ' selected' : '';
      html += '<button class="choice'+sel+'" onclick="selectAns('+q.no+',\'' + c + '\')"><span class="label">'+c+'</span><span>'+q.choices[c]+'</span></button>';
    });
    html += '</div>';
  }
  document.getElementById('quiz').innerHTML = html;
  document.getElementById('nextBtn').textContent = idx === totalQ - 1 ? '採点する ✓' : '次へ ▶';
  updateProg();
  window.scrollTo(0, 0);
}

function selectAns(no, c) { ans[no] = c; updateProg(); render(); }
function prevQ() { if (idx > 0) { idx--; render(); } }
function nextQ() { if (idx < totalQ - 1) { idx++; render(); } else { showResult(); } }

function showResult() {
  let score = 0, max = 0;
  const norms = questions.map(norm);
  norms.forEach(function(q) {
    if (q.invalid || q.freeAnswer || q.multi) return;
    max += q.points;
    if (ans[q.no] === q.answer) score += q.points;
  });
  let html = '<div class="result"><h2>📊 採点結果</h2><div class="score-big">'+score+' / '+max+' 点</div>';
  const sections = {}, secOrder = [];
  norms.forEach(function(q) {
    if (q.invalid || q.freeAnswer || q.multi) return;
    if (!sections[q.section]) { sections[q.section] = {score:0,max:0}; secOrder.push(q.section); }
    sections[q.section].max += q.points;
    if (ans[q.no] === q.answer) sections[q.section].score += q.points;
  });
  const vs = secOrder.filter(function(s) { return s; });
  if (vs.length > 0) {
    let sh = '<p style="font-size:14px;color:#555">';
    vs.forEach(function(s) { sh += s+'：'+sections[s].score+'/'+sections[s].max+'点　'; });
    html += sh + '</p>';
  }
  let hasMiss = false;
  html += '<h3 style="margin:16px 0 8px;font-size:15px;color:#333">📝 全問解説</h3>';
  norms.forEach(function(q) {
    if (q.invalid) {
      html += '<div style="border-left:5px solid #d1d5db;background:#f9fafb;padding:12px;margin:8px 0;border-radius:8px;line-height:1.6;font-size:14px">';
      html += '<div style="font-weight:700;font-size:15px;margin-bottom:4px;color:#6b7280">'+q.label+' ⚠️ 無効問題（採点対象外）</div>';
      if (q.explanation) html += '<div style="color:#333;margin-top:4px">'+q.explanation.replace(/\n/g,'<br>')+'</div>';
      html += '</div>';
      return;
    }
    if (q.freeAnswer) {
      html += '<div style="border-left:5px solid #93c5fd;background:#eff6ff;padding:12px;margin:8px 0;border-radius:8px;line-height:1.6;font-size:14px">';
      html += '<div style="font-weight:700;font-size:15px;margin-bottom:4px;color:#1d4ed8">'+q.label+' 📝 記述問題（採点対象外）</div>';
      html += '<div style="color:#1d4ed8;font-weight:700;margin-bottom:4px">正解：'+q.answer+'</div>';
      if (q.explanation) html += '<div style="color:#333;margin-top:4px">'+q.explanation.replace(/\n/g,'<br>')+'</div>';
      html += '</div>';
      return;
    }
    if (q.multi) {
      html += '<div style="border-left:5px solid #fdba74;background:#fff7ed;padding:12px;margin:8px 0;border-radius:8px;line-height:1.6;font-size:14px">';
      html += '<div style="font-weight:700;font-size:15px;margin-bottom:4px;color:#c2410c">'+q.label+' ☑️ 複数選択（採点対象外）</div>';
      html += '<div style="color:#c2410c;font-weight:700;margin-bottom:4px">正解：'+q.answer+'</div>';
      if (q.explanation) html += '<div style="color:#333;margin-top:4px">'+q.explanation.replace(/\n/g,'<br>')+'</div>';
      html += '</div>';
      return;
    }
    const wrong = ans[q.no] !== q.answer;
    if (wrong) hasMiss = true;
    const bc = wrong ? '#dc2626' : '#d1d5db';
    const bg = wrong ? '#fff5f5' : '#fff';
    const correctText = q.choices[q.answer] || '';
    html += '<div style="border-left:5px solid '+bc+';background:'+bg+';padding:12px;margin:8px 0;border-radius:8px;line-height:1.6;font-size:14px">';
    html += '<div style="font-weight:700;font-size:15px;margin-bottom:4px;color:'+(wrong?'#dc2626':'#111')+'">'+q.label+(wrong?' ❌':' ✅')+'</div>';
    if (wrong) {
      const myText = q.choices[ans[q.no]] || '';
      html += '<div style="color:#dc2626;font-weight:700;margin-bottom:2px">あなたの答え：'+(ans[q.no]||'未回答')+(myText ? '　'+myText : '')+'</div>';
      html += '<div style="color:#16a34a;font-weight:700;margin-bottom:4px">正解：'+q.answer+(correctText ? '　'+correctText : '')+'</div>';
    } else {
      html += '<div style="color:#16a34a;font-weight:700;margin-bottom:4px">正解：'+q.answer+(correctText ? '　'+correctText : '')+'</div>';
    }
    if (q.explanation) html += '<div style="color:#333;margin-top:4px">'+q.explanation.replace(/\n/g,'<br>')+'</div>';
    html += '</div>';
  });
  if (!hasMiss) html += '<p style="font-size:18px;font-weight:900;color:#16a34a">🎉 全問正解です！</p>';
  html += '<div class="actions"><button onclick="reviewMistakes()" style="padding:14px;border:none;border-radius:12px;background:#dc2626;color:#fff;font-size:16px;font-weight:700;cursor:pointer">間違えた問題を復習</button><button onclick="resetQuiz()" style="padding:14px;border:none;border-radius:12px;background:#6b7280;color:#fff;font-size:16px;font-weight:700;cursor:pointer">最初からやり直す</button></div></div>';
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('nav').style.display = 'none';
  const r = document.getElementById('result');
  r.style.display = 'block';
  html += '<a href="./index.html" style="display:block;text-align:center;margin-top:16px;padding:12px;background:#1e3a5f;color:white;border-radius:10px;text-decoration:none;font-weight:700;font-size:.95rem">🏠 ホームへ戻る</a>';
  r.innerHTML = html;
  window.scrollTo(0, 0);
}

function reviewMistakes() {
  const norms = questions.map(norm);
  for (let i = 0; i < norms.length; i++) {
    const q = norms[i];
    if (q.invalid || q.freeAnswer || q.multi) continue;
    if (ans[q.no] !== q.answer) {
      idx = i;
      document.getElementById('quiz').style.display = 'block';
      document.getElementById('nav').style.display = 'flex';
      document.getElementById('result').style.display = 'none';
      render(); return;
    }
  }
}

function resetQuiz() {
  Object.keys(ans).forEach(function(k) { delete ans[k]; });
  idx = 0;
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('nav').style.display = 'flex';
  document.getElementById('result').style.display = 'none';
  render();
}

render();
</script>

const SOURCE_KEY = document.title.replace(/[\s　]/g,'_').replace(/[^\w\u3040-\u9FFF]/g,'');

try {
  const app = initializeApp(FIREBASE_CONFIG);
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, async user => {
    const badge = document.getElementById('fb-login-badge');
    if (badge) {
      if (user) {
        const name = user.displayName || user.email.split('@')[0];
        badge.innerHTML = `<a href="./index.html" style="font-size:.72rem;background:rgba(255,255,255,.2);color:white;padding:3px 8px;border-radius:999px;text-decoration:none">👤 ${name}</a>`;
      } else {
        badge.innerHTML = `<a href="./login.html" style="font-size:.72rem;background:rgba(255,255,255,.15);color:white;padding:3px 10px;border-radius:999px;text-decoration:none">ログイン</a>`;
      }
    }
    window._fbUser = user;
    window._fbDb = db;
    window._fbSrc = SOURCE_KEY;
  });

  const _orig = window.selectAns;
  if (typeof _orig === 'function') {
    window.selectAns = function(no, choice) {
      _orig(no, choice);
      const user = window._fbUser; const db = window._fbDb;
      if (!user || !db) return;
      const q = (window.questions||[]).find(q2 => q2.no === no);
      if (!q) return;
      const isCorrect = choice === q.answer;
      const key = window._fbSrc + '_q' + no;
      if (isCorrect) {
        deleteDoc(doc(db,'users',user.uid,'wrongAnswers',key)).catch(()=>{});
      } else {
        setDoc(doc(db,'users',user.uid,'wrongAnswers',key),{
          source:window._fbSrc,qNo:no,label:q.label||('Q'+no),
          stem:(q.stem||'').substring(0,120),timestamp:serverTimestamp()
        },{merge:true}).catch(()=>{});
      }
    };
  }

  const _origResult = window.showResult;
  if (typeof _origResult === 'function') {
    window.showResult = function() {
      _origResult();
      const user = window._fbUser; const db = window._fbDb;
      if (!user || !db) return;
      const norms = (window.questions||[]).filter(q=>!q.invalid&&!q.freeAnswer&&!q.multi);
      let correct=0,total=0;
      norms.forEach(q=>{total+=q.points||3;if(window.ans&&window.ans[q.no]===q.answer)correct+=q.points||3;});
      setDoc(doc(db,'users',user.uid,'stats',window._fbSrc),{
        source:window._fbSrc,lastCorrect:correct,lastTotal:total,
        lastDate:serverTimestamp(),totalAttempts:increment(1)
      },{merge:true}).catch(()=>{});
    };
  }
} catch(e){ console.warn('Firebase:',e.message); }
</script>
</body>
</html>
