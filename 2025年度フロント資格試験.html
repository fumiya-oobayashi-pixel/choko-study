const questions = [
{no:1,pts:2,labels:L4,text:"保証書に関する記述として、不適切なものはどれか。",
opts:["保証による修理作業の実施は、弊社販売会社の整備工場および定期整備のしおりの巻末に掲げた弊社が認めた整備工場で行う。なおこの場合、取外した部品は当社の所有となる。","保証期間が残っている車両を購入した場合、「二次保証の条件」を満たせば二次保証を受けることができるが、その際の点検の結果で、修理が必要となる部分の費用は、保証対象範囲内であってもお客様に負担していただく。","保証書を破損又は紛失した場合で保証書の発行を受けたお客様から申し出がある場合に再発行する。再発行手続きは最寄の日野販売会社で行う。","保証の開始日は次の通りである。①登録No.が有る車両は初度登録日。②登録No.が無い登録前車両（納入前車両）は故障発生日。③登録No.が無い無登録車両（構内専用車、防衛省車両）はお客様への納車又は納入日。"],
ans:2,cat:"保証制度",exp:"保証書の再発行手続きは、保証書の発行手続きを行った日野販売会社にて行う。最寄の販売会社ではない。"},
{no:2,pts:2,labels:L4,text:"保証制度に関する記述として、不適切なものはどれか。",
opts:["日野自動車の保証制度は、販売会社・日野自動車がそれぞれの約束を結び、この約束によって成り立っている。","販売会社はお客様との売買契約で、保証書に記載されている期間と条件に従って保証修理することを約束している。","販売会社は日野販売会社基本契約書に基づき、日野自動車に代わって保証修理を実施することを約束している。","販売会社は、お客様より保証書に記載された期間と条件に適合する申し出を受けた場合は保証修理を断ることができない。"],
ans:0,cat:"保証制度",exp:"日野自動車の保証制度は、お客様・販売会社・日野自動車がそれぞれの約束を結び成り立っている。Aは「お客様」が抜けているため不適切。"},
{no:3,pts:2,labels:L4,text:"保証申請期間に関する記述として、適切なものはどれか。",
opts:["一般保証修理（日野車）の保証申請期間は、故障発生日から30日以内である。","通過車両保証修理（日野車）の保証申請期間は、故障発生日から60日以内である。","納入前保証修理（日野車）の保証申請期間は、故障発生日から60日以内である。","保証申請（日野車）で一部又は全部が否決で、それに異議のある場合の再申請は、故障発生日から60日以内である。"],
ans:2,cat:"保証制度",exp:"一般保証：60日以内。通過車両保証：90日以内。納入前保証：60日以内（C適切）。否決異議再申請：90日以内。"},
{no:4,pts:2,labels:L4,text:"下請法について、親事業者の4つの義務について不適切なものはどれか。",
opts:["「発注書面の交付義務」：発注に際して、「11の法定事項」を満たした書面を直ちに下請業者に発行しなければならない。","「支払期日を定める義務」：納入品受領（納入）日または役務の提供をした日から60日以内のできるだけ短い期間内に定めなければならない。","「遅延利息を支払う義務」：納入物受領後60日を経過した日から実際に支払をする日までの期間について、年率14.6%の遅延利息を支払わなくてはならない。","「書類作成・保存義務」：下請業者との取引に関する記録を書類として作成し、1年間保存しなければならない。"],
ans:3,cat:"外注（下請法含む）",exp:"書類作成・保存義務の保存期間は2年間（1年間は不適切）。"},
{no:5,pts:2,labels:L4,text:"下請法に関する取引上の注意事項として、不適切なものはどれか。",
opts:["「60日以内の支払」の起算日とは、下請事業者から給付を受けた日であり、検収日でも請求書受付日でもなく「納入日」のことである。","「1ヶ月締切制度」とは、1ヶ月毎に納品の締切日を定め、締切日1ヶ月後までに支払日を定めて支払う制度であり、1ヶ月締切制度を採用している場合、支払日は「締切後30日以内」ではなく、あくまでも締切後1ヶ月となる。","金融機関を利用した支払（振込）で支払日が金融機関休業日にあたる場合、仕入先とあらかじめ、翌営業日への支払いの順延を「合意、書面化」していれば、3日以内の範囲で順延が可能である。","金融機関の振込手数料（実費）の仕入先負担について、仕入先との間で書面での合意をしている場合、実費の範囲内で有効である。"],
ans:2,cat:"外注（下請法含む）",exp:"金融機関休業日に当たる場合の順延は、2日以内の範囲で可能である（3日以内は不適切）。"},
{no:6,pts:2,labels:L4,text:"外注依頼書の発行に関する記述として、適切なものはどれか。",
opts:["作業指示書発行後、外注作業が発生した場合は、作業指示書のコピーで対応できる。","価格が決定しない場合、理由と確定予定日を明記し、決定後即時に補充書面を発行する。","納期は変わることがあるので、発注時は特に提示する必要はない。","外注依頼書（正）はフロントにて管理する。"],
ans:1,cat:"外注（下請法含む）",exp:"外注依頼書は必ず発行する。価格が決定しない場合は理由と確定予定日を明記し、決定後即時に補充書面を発行する（B適切）。外注依頼書（正）は外注先に、（控）はフロントで管理する。"},
{no:7,pts:2,labels:L4,text:"整備作業の外注について、不適切なものはどれか。",
opts:["車検整備および完成検査一式を依頼。","取り外したエアドライヤのオーバーホールを依頼。","構内でリーフスプリングの交換を依頼。","タイヤ交換を依頼。"],
ans:2,cat:"外注（下請法含む）",exp:"リーフスプリング交換は分解整備に該当する。指定整備事業者が外注できる分解整備作業の条件に「構内での外注」は含まれない。"},
{no:8,pts:2,labels:L4,text:"見積書の記載内容に関する記述として、適切なものはどれか。",
opts:["主体作業とは、車両を構成する主要な部品およびそれに取り付けられている部品（付帯部品）の複合した作業で、作業時間の対価が工賃として計上できない作業内容。","関連作業とは、２つ以上の主要部品を取り替える場合、複合した主体作業の関連部位は、作業箇所が重複となり簡略されることにより、作業時間が縮小可能となる作業。","付帯作業とは、ある主体作業を行う場合、その主体作業とは別途な作業が必要なときのその作業。","付随作業とは、それ自体の作業時間が主体作業の範囲内に含まれて設定されており、特に作業項目は設定せず、工賃も単独では計上しないもの。"],
ans:1,cat:"見積り（事故見積含む）",exp:"A：主体作業は工賃計上できる作業。C：付帯作業の説明はDの内容。D：付随作業の説明はCの内容。B（関連作業）が適切。"},
{no:9,pts:2,labels:L4,text:"事故車の見積方法として、適切なものはどれか。",
opts:["見積段階での写真撮影は、損傷部位とナンバープレートの写っている全体写真を１枚撮ればよい。","損傷状態の確認や判定をする場合、歪みや電装品の損傷など目ではっきりとわからない箇所は、勘に頼らず、測定によって確認する。","作業内容の分類には主体作業・付随作業・関連作業などがあるが、交換や修理しない部品の脱着は見積書に記載しない。","分解しないとわからない箇所もあり、請求金額が変更となり高くなればお客様の信頼を失うことになるので、見積書は高めに作成しておく。"],
ans:1,cat:"見積り（事故見積含む）",exp:"A：写真は正面・斜め・左右より損傷部位を含め撮影。C：部品の脱着だけでも作業項目を記載する。D：分解してわからない箇所は「別途お見積り」と明記。B（測定による確認）が適切。"},
{no:10,pts:2,labels:L4,text:"事故修理見積書に記載されている用語に関する記述として、適切なものはどれか。",
opts:["「Ｖ」とは、板金修理の事である。","「Ｄ」とは、脱着の事である。","「Ｗ」とは、分解修理の事である。","「Ｔ」とは、塗装の事である。"],
ans:2,cat:"見積り（事故見積含む）",exp:"W=分解修理（Washer）、V=塗装前処理（Vinyl)、D=脱着、T=取付（Toritsuke）など。W=分解修理（C適切）。"},
{no:11,pts:2,labels:L4,text:"正しい電話対応として、不適切なものはどれか。",
opts:["相手の話は途中で口をはさまず最後まで聞き、先入観をもったり、話の途中で早とちりを起こしたりせずに最後まで聞き取ることが大事。","暗い、陰気な調子で対応されると自信が感じられず、信用を失いますので、明るい声でハキハキと歯切れのいい話し方を心がける。","電話対応中、お客様が急いでいる様子が感じ取られたら、手短に切り上げる、または電話をかけ直す。電話をかけ直す場合は食事どきがもっと最適である。","電話を受け取るとき、ベルが鳴ったらすぐ出て名のる。ベルは2度まで、3度以上鳴ったら「お待たせしました」と答える。"],
ans:2,cat:"受付/苦情/電話対応",exp:"食事どきへのかけ直しは迷惑になるため不適切。電話のかけ直しは相手の状況を考慮した時間帯を選ぶ。"},
{no:12,pts:2,labels:L4,text:"受付時現車の確認を行う際の注意点に関する記述として、不適切なものはどれか。",
opts:["不正改造の有無を十分にチェックし、不正改造がある場合にはお客様に説明し、正規の状態で入庫いただくようにお願いする。","貴重品や高価なものが搭載されていたら、お客様に伝えフロントで大切に保管しておく。","車両の傷、汚れ、積荷、などの状態をお客様と一緒に確認し、納車後のトラブル防止を図る。","不具合の申し出の場合は、必ず問診を実施する。問診は専門用語を使わず、具体的な例を挙げ、お客様の答えやすい問い方にする。"],
ans:1,cat:"受付/苦情/電話対応",exp:"貴重品はお客様自身に確認して頂き、お客様自身が持ち帰るようにお願いする。フロントで保管は不適切。"},
{no:13,pts:2,labels:L4,text:"お客様への説明方法として、適切なものはどれか。",
opts:["完成時間や整備料金について見通しがつかない場合は、具体的な表現は避ける。","分解してみなければ正確なことが分からない場合は、誤解を与えないようにあいまいな説明をしておく。","お客様に技術説明をする場合は、現物や資料を示して説明をする。","会話の始めにお客様との距離を縮めるために話題が豊富な政治、宗教、思想に関する話をする。"],
ans:2,cat:"受付/苦情/電話対応",exp:"あいまいな表現は避け、具体的に現物や資料を見せて説明する（C適切）。政治・宗教・思想などは避けるべき話題。"},
{no:14,pts:2,labels:L4,text:"事故を受け付ける際の対応に関する記述として、不適切なものはどれか。",
opts:["まずは顧客の安否を気遣って「おケガはありませんか」などの言葉が必要である。","お客様への同情心から、お客様の言い分を全面的に信用したりせずに、あくまでも聞き役になる。","人身が絡んだり、話し合いが難航する場合はフロントアドバイザーが事故処理を代行したほうが良いこともある。","事故処理は当事者間で行ってもらい、保険適用の場合はお客様に保険内容の適切な助言を行うにとどめる。"],
ans:2,cat:"受付/苦情/電話対応",exp:"フロントアドバイザーが事故処理を代行することは不適切。事故処理は当事者間で行うものであり、販売会社は適切な助言にとどめる。"},
{no:15,pts:2,labels:L4,text:"HI-PREMAはお客様車両情報や故障コードの確認ができるほか、整備提案書、対象車両リスト作成など（　）にも活用することができるツールである。（　）内に入るものとして、適切なものはどれか。",
opts:["車検勧誘","見積作成","事前提案","利益率向上"],
ans:0,cat:"ハイトス系/ICT",exp:"HI-PREMAは車両情報・故障コード確認のほか、整備提案書・対象車両リスト作成など「車検勧誘」にも活用できるツールである。"},
{no:16,pts:2,labels:L4,text:"HI-PREMA、Hi-Link、HINO-CYCLEに関する記述として、不適切なものはどれか。",
opts:["HINO-CYCLEでHITOSSから車検予約する場合で、予約する車両が決まっていない場合は、通常の予約受付の必須項目に加え、車型・車番入力(ダミーの文字・数字を入力)にてHINO-CYCLEに反映される。","HITOSS見積作成時、Hi-Link操作にて「部品→作業取得」からHITOSS作業コード品番紐づけ明細する際、ご用命明細に作業が紐づかなかった、または紐づけなかったものは部品の上段に空欄行が挿入される。","HITOSS見積作成にて、HI-PREMA提案書を取り込む場合は必要項目を入力後、提案状況に「提案有」アラート表示を確認しても、Ｆ８「他画面」からの提案書検索は対応できない。","HITOSS見積作成にて、HI-PREMAから１つの提案書に対して、紐づけられる見積作成は５件までである。"],
ans:0,cat:"ハイトス系/ICT",exp:"HINO-CYCLEで予約する車両が決まっていない場合は、必須項目の「車型・車番」欄にダミーを入力するのは不適切な操作である。"},
{no:17,pts:2,labels:L4,text:"HITOSSのお客様照会画面、保有車両一覧画面の車両層別に対する記述において、不適切なものはどれか。",
opts:["a：継続取引車両（3年連続入庫）","b：見込み車両（昨年入庫）","c*：疎遠車両（2年以上連続未入庫）","b*：見込み車両（2年連続入庫）"],
ans:2,cat:"ハイトス系/ICT",exp:"c*は「疎遠車両」を表すが、正しくは「3年以上連続未入庫」の車両。2年以上連続未入庫は不適切。"},
{no:18,pts:2,labels:L4,text:"納品書に関する記述として、不適切なものはどれか。",
opts:["納品書とは、お客様へ渡す整備の明細である。","外注又は他販売会社入庫車両は、送付されてきた請求書をもとに仕入をする。","納品書は納車または引き渡しの際、お客様へ手渡すのが原則である。","納品書発行時は関連伝票を収集し、指示通りの作業が行われたか確認する。"],
ans:1,cat:"引渡対応/売上/回収",exp:"外注や他販売会社入庫車両は、送付されてきた「納品書」をもとに仕入をする（請求書ではない）。"},
{no:19,pts:2,labels:L4,text:"売上・回収に関する記述として、不適切なものはどれか。",
opts:["ＨＩＴＯＳＳⅡ上のお客様ランクが「6、7」の場合、売上先確認。「8、9」の場合、売上不可が表示される。","小切手とは振出人の取引銀行に対して、受取人に一定額の金額を支払うように委託する有価証券のこと。","売掛金は利息が付かず、時効が5年である。","受取手形は6ヶ月以内に2回、銀行を支払い場所とする約束手形を不渡りにすると銀行取引停止処分を受ける。"],
ans:0,cat:"引渡対応/売上/回収",exp:"HITOSSIIのお客様ランク「6、7」は売上要確認、「8」は売上不可。「9」は別の区分。Aの記述は不正確。"},
{no:20,pts:2,labels:L4,text:"即伝に関する記述として、不適切なものはどれか。",
opts:["お客様に修理車両引き渡し後、すぐに伝票を起こすことによる、伝票売り上げ処理をするシステムを指す。","事務処理業務の平準化により残業が減る。","回収時のトラブルが減り、回収業務が円滑になる。","お客様が当月の支払い予測（計画）を立てやすくなる。"],
ans:0,cat:"引渡対応/売上/回収",exp:"即伝は「引き渡し時点（引渡しと同時）」に伝票を起こす仕組み。「引き渡し後」ではなく「引き渡し時」に行う。"},
{no:21,pts:2,labels:L4,text:"整備料金の説明と回収に関する記述として、不適切なものはどれか。",
opts:["サービス部門で販売する商品は、点検、整備という点検整備作業における「技術の提供」である。","点検・整備の価値をお客様に理解していただけるよう、必要性、効果などをわかりやすくお客様に説明することも、「機能的サービス」の一環である。","無償、有償作業を同時に行う場合、受注の時点で「料金」とその有償、無償についてお客様に説明しておく。","売掛金が回収予定日を過ぎても入金されない場合は、督促状を普通郵便や内容証明付郵便などの手段を講じることも大切である。"],
ans:3,cat:"引渡対応/売上/回収",exp:"売掛金の督促は、まず電話・訪問による直接交渉が優先。普通郵便での督促は証拠能力が低く不適切。内容証明は有効だが、普通郵便との組み合わせ表記に問題あり。"},
{no:22,pts:2,labels:L4,text:"MOBILOTSメンテナンスリースの記載について、適切なものはどれか。",
opts:["以下の2種類のプランがある。Rプラン：車検や法定点検、オイル類・エレメント類の交換等に限定したプランSプラン：車検や法定点検、一般整備、故障修理に加えて、条件を満たす車両は、HINO CONNECT-Maintenance Supportを含むプラン","Rプランの契約期間は新車時からの契約に限り、初度登録から通算10年まで（再契約含む）となる。","Sプランでは尿素水フィルタ交換やトランスミッションオイルフィルタ交換もプランに含まれる。","Rプランでは尿素水溶液（AdBlue®）の補充もプランに含まれる。"],
ans:1,cat:"一般/保険",exp:"A：Rプランには納引手数料は含まれない。Rプランの契約期間は初度登録から通算10年まで（B適切）。"},
{no:23,pts:2,labels:L4,text:"デュトロ Z EVについて、不適切なものはどれか。",
opts:["大容量バッテリーの搭載により、一充電当たり航続距離は150km。","床面地上高は、空車時450mm、定積時で400mmと超低床設計。ワンステップで荷室への乗降が可能なため、荷物を持ったままでの乗り降りなども余裕を持って行える。","デュトロ Z EVに搭載された安全装置は、前方の車両や歩行者（昼夜）、自転車運転者（昼夜）をミリ波レーダーと画像センサー検出。警報ブザーとディスプレイ表示で衝突の可能性を知らせ、ブレーキを踏めなかった場合はブレーキを作動させる。","4ナンバーサイズに収まるコンパクトな全長、全幅ながら、約8㎥の荷室容積、最大積載量1.0トンを確保。普通免許をお持ちの方なら、どなたでも運転できるよう、車両総重量を3.5トン未満に設定。"],
ans:2,cat:"商品知識・車両知識",exp:"デュトロZEVの衝突被害軽減ブレーキは、自転車運転者（昼）の検出には対応しているが、一部条件（夜間・特定状況）では検出できない場合がある。センサーの仕様説明が不適切。"},
{no:24,pts:2,labels:L4,text:"ジーゼルノックを防ぐ方法の記述として、不適切なものはどれか。",
opts:["セタン価向上剤などを使い、燃料着火性をよくする。","シリンダー内の圧縮圧力を高くする。","燃料噴射始めの噴射量を多くする。","冷間時の自己着火を容易にするために、吸入空気温度を上げる。"],
ans:2,cat:"商品知識・車両知識",exp:"ジーゼルノック防止のためには、燃料噴射始めの噴射量を「少なく」する（パイロット噴射等）。多くすると着火遅れが大きくなりノックが悪化する。"},
{no:25,pts:2,labels:L4,text:"デュトロ Z EVについて、不適切なものはどれか。",
opts:["普通充電と急速充電の両方に対応している。","ｅDAPは、アクセルペダル１つで加速から停止まで調整することが可能である。","誤発進抑制機能は、前進・後退ともに機能する。","モーター駆動で変速機がないため、走行がスムーズである。"],
ans:1,cat:"商品知識・車両知識",exp:"eDAP（Electric Deceleration Assist Pedal）はアクセルペダルで減速・停止を調整するシステムで、主に減速・停止のコントロール。「加速から停止まで」の表現が不適切。"},
{no:26,pts:2,labels:L4,text:"自賠責保険に関する記述として、不適切なものはどれか。",
opts:["後遺障害第１級（常時介護を要する場合）の保険金の限度額は4,000万円である。","政府は、自動車によって生命又は身体を害された者がある場合、その車の保有者が明らかでないため被害者が損害賠償の請求をすることができないときは、被害者の請求により政令で定める金額の限度においてその受けた損害をてん補する。","死亡による保険金の限度額は2,500万円である。","指定整備事業者は、自賠責保険証の保険期間が、自動車検査証の有効期間が満了する日までの期間と全部が重複するものでないときは、保安基準適合証を交付してはならない。"],
ans:2,cat:"保証制度",exp:"死亡による保険金の限度額は3,000万円（2,500万円は不適切）。"},
{no:27,pts:2,labels:L4,text:"自家用自動車保険（通称P・A・P）の基本契約に含まれていないものはどれか。",

ans:0,cat:"保証制度",exp:"PAPの基本契約には、自損事故保険、無保険車傷害保険、搭乗者傷害保険が含まれる。車両保険は特約（別途）契約が必要であり、基本契約には含まれない。"},
{no:28,pts:2,labels:L4,text:"自動車保険の保険金請求書類に関する記述として、不適切なものはどれか。",
opts:["対人賠償の適用時には、交通事故証明書が必要になる。","自損事故の適用時には、交通事故証明書が不要になる。","無保険車傷害の適用時には、交通事故証明書が必要になる。","搭乗者傷害の適用時には、交通事故証明書が必要になる。"],
ans:1,cat:"保証制度",exp:"自損事故の場合も交通事故証明書（自損事故証明書）が必要。B「不要」は不適切。"},
{no:29,pts:2,labels:L4,text:"インボイス関連の記載について、不適切なものはどれか。",
opts:["インボイスは、売手が買手に対して、正確な適用税率や消費税額等を伝えるものです。なお、請求書に限らず、所定の事項が記載された書類であれば、領収書や納品書など書類の名称を問わず、インボイスとなります。","書類がインボイスとなるためには、①交付先の氏名または名称、②売手の氏名又は名称及び登録番号、③取引年月日、④取引内容（軽減税率の対象品目である旨）、⑤10%・8%それぞれの対価の総額及び適用税率、⑥10%・8%それぞれの消費税額等の記載が必要である。","事業者の方が納付する税額は、「売上げ時に受け取った消費税額」から「仕入れ等の際に支払った消費税額」を差し引いて計算します。この差し引く計算を「仕入税額控除」といい、仕入税額控除をするためには、その金額が正しいことを確認できるようにする。","売手側（販売会社）はインボイスを交付するには事前にインボイス発行事業者の登録を受ける必要があります。また、交付したインボイスの写しは、保存義務はありません。"],
ans:3,cat:"引渡対応/売上/回収",exp:"交付したインボイスの写しは保存義務がある（7年間の保存が必要）。「保存義務はありません」は不適切。"},
{no:30,pts:2,labels:L4,text:"小切手の必須記載事項として、不適切なものはどれか。",
opts:["振出人","金額","受取人","振出日"],
ans:2,cat:"手形/小切手/領収書/売掛",exp:"小切手は持参人払い（bearer cheque）形式が多く、「受取人」の記載は必須ではない。振出人・金額・振出日は必須記載事項。"},
{no:31,pts:2,labels:L4,text:"領収書に関する記述として、適切なものはどれか。",
opts:["領収書には有効期限はない。","領収書には保管期間はない。","領収書の有効期限は1年間。","領収書の保管期間は5年間。"],
ans:0,cat:"手形/小切手/領収書/売掛",exp:"領収書そのものには有効期限はない（A適切）。ただし保管期間は法令で定められている（商法：7年間など）。"},
{no:32,pts:2,labels:L4,text:"令和２年４月１日改正民法施行後の売掛金に関する記述として、不適切なものはどれか。",
opts:["時効の成立を停止させるため、請求書を再度送付した。","取引先が倒産してしまったので、回収は出来ない。","支払いに懸念のあるお客様と、現金取引を行った。","1年間、時効の完成を猶予をするために、書面での合意をした。"],
ans:0,cat:"手形/小切手/領収書/売掛",exp:"改正民法では時効停止（猶予）には催告（内容証明郵便等）が必要。単なる請求書の再送付は催告とはみなされず時効停止の効果がない（A不適切）。"},
{no:33,pts:2,labels:L4,text:"通過車両規定に照らし、特別対応料と体制維持費に関する記述として、不適切なものはどれか。",
opts:["体制維持費は元販売会社の負担分であるため、お客様に請求してはならない。","登録前車両については体制維持費のみ、保証申請にてメーカーに請求できる。","特別対応料および体制維持費の振替割引はしない。","営業時間外に受付し、実際に作業をした場合、もしくは作業はしないが出動して故障診断等を行い、説明等の処置をとった場合は、特別対応料および体制維持費を請求することができる。"],
ans:1,cat:"通過車両関連",exp:"登録前車両については「特別対応料のみ」保証申請にてメーカーに請求できる。「体制維持費のみ」は不適切。"},
{no:34,pts:2,labels:L4,text:"通過車両規定において、元販売会社から実施販売会社への支払い方法として、適切なものはどれか。",
opts:["元販売会社は、締切日の翌月末を支払日とする。","支払金額は、原則として15万円以下は現金支払いとする。","実施販売会社からの請求書は、毎月月末をもって締め切る。","支払金額が5万円を超える場合は、支払日起算支払月から3ヶ月目の15日を期限とする自社手形払いとする。"],
ans:2,cat:"通過車両関連",exp:"実施販売会社からの請求書は毎月月末締め（C適切）。元販売会社の支払日は締切の翌月15日。現金支払いは10万円以下。手形払いは10万円超の場合。"},
{no:35,pts:2,labels:L4,text:"「通過車両規定」事故修理の見積料金について、保険による場合、保険外の場合を問わず、正式見積書を提出し修理を実施しないときには、原則として元販売会社に対し請求できる額として、適切なものはどれか。",
opts:["見積額の8%","見積額の3%","見積額の5%","見積額の10%"],
ans:1,cat:"通過車両関連",exp:"見積金額が50万円以上100万円未満の場合の見積料は10,000円（20,000円は不適切）。正しくは：50万未満=0円、50万〜100万未満=10,000円、100万〜500万未満=20,000円、500万以上=30,000円。"},
{no:36,pts:2,labels:L4,text:"「道路運送車両の保安基準」に照らし、イモビライザの構造、施錠性能等に関する記述として、不適切なものはどれか。",
opts:["その作動により、制動装置の解除を妨げるものでないこと。ただし、空気解除式スプリングブレーキの解除を防止する形式のイモビライザにあっては、この限りでない。","走行中の振動、衝撃等により作動するおそれがないものであること。","イモビライザの作動または解除の操作を表示する灯火は、方向指示器または車幅灯と兼用のものであって、その点灯または点滅が５秒を超えないものとする。","その作動により、原動機その他運行に必要な装置の機能を確実に停止させることができる構造であること。"],
ans:2,cat:"通過車両関連",exp:"イモビライザの作動/解除を方向指示器または車幅灯で表示する場合、点灯または点滅が「3秒を超えないもの」であること（5秒は不適切）。"},
{no:37,pts:2,labels:L4,text:"車両移動・駐・停車時の安全に関する記述として、不適切なものはどれか。",
opts:["工場内での車両移動はお客様や他業者ではなく自社従業員が実施する。","作業中の場合、駐車ブレーキが正常に作動してかつ平坦な場所であれば必ずしも輪止をする必要はない。","バック誘導の誘導員は、笛を使用していても車両の真後ろに立ってはならない。","バック誘導の誘導員は運転者に聞こえるよう、笛または大きな声で誘導を行う。"],
ans:1,cat:"安全/法令",exp:"作業中や点検時は必ず輪止めをする。駐車ブレーキが正常でも輪止めは省略できない（B不適切）。"},
{no:38,pts:2,labels:L4,text:"次の作業をする場合に必要な安全保護具の組み合わせとして、不適切なものはどれか。",
opts:["高所作業は「ヘルメット」「墜落制止用器具(安全帯)」。","大型トラック荷台での積み下ろし作業は「ヘルメット」。","ボール盤作業は「保護メガネ」。","グラインダー作業は「保護メガネ」「防塵マスク」「軍手」。"],
ans:3,cat:"安全/法令",exp:"グラインダー作業では手が巻き込まれる危険があるため、軍手の使用は禁止されている。保護メガネ・防塵マスクは必要だが軍手は不可（D不適切）。"},
{no:39,pts:2,labels:L4,text:"資格(免許、技能講習、特別教育)が必要ない作業として、適切なものはどれか。",
opts:["タイヤ組立て時の空気充填。","クレーンを用いてのエンジンの吊上げ作業。","トルクセッターを用いたホイールナットの締付けトルク管理作業。","ハイブリッド車のバッテリーサービスプラグの取り外し作業。"],
ans:2,cat:"安全/法令",exp:"タイヤ充填は特別教育が必要。クレーン吊上げは玉掛け技能講習等が必要。HVバッテリーは特別教育が必要。トルクセッターによるホイールナット締付けトルク管理は特別な資格不要（C適切）。"},
{no:40,pts:2,labels:L4,text:"安全衛生教育（法令）で定められた特別教育の種別について、不適切なものはどれか。",

ans:2,cat:"安全/法令",exp:"可燃性ガス・酸素を用いる溶接・溶断は「技能講習」であり、特別教育ではない（C不適切）。A・B・Dは特別教育に該当する。"},
{no:41,pts:2,labels:L4,text:"特定整備（電子制御装置整備）に関する記述として、不適切なものはどれか。",
opts:["PCS付き車両のフロントガラス交換作業を構内外注した。","PCS付き車両のフロントバンパー交換作業を特定整備（分解）工場へ外注した。","他メーカ車の衝突被害軽減装置のエーミングを特定整備工場へ外注した。","PCSのエーミングを自社の駐車場で実施した。"],
ans:1,cat:"安全/法令",exp:"PCS付き車両のフロントバンパー交換は電子制御装置整備に該当する。特定整備（分解）工場への外注は電子制御装置整備認証がないため不適切。"},
{no:42,pts:2,labels:L4,text:"道路運送車両法に照らし、自動車の整備事業に関する記述として、不適切なものはどれか。",
opts:["普通自動車特定整備事業は、普通自動車、四輪の軽自動車、大型特殊自動車の特定整備を対象としている。","特定整備記録簿は、その記載の日から1年間保存しなければならない。","自動車分解整備事業者は、事業を廃止した日から30日以内に国土交通大臣に届け出なければならない。","特定整備を行ったときは、当該自動車の使用者の請求有無に関わらず、特定整備記録簿を交付しなければならない。"],
ans:3,cat:"安全/法令",exp:"A：普通自動車特定整備事業の対象は四輪小型自動車（軽自動車は誤り）。B：特定整備記録簿の保存期間は2年間（1年は不適切）。C：届出先は地方運輸局長（国土交通大臣は誤り）。"},
{no:43,pts:2,labels:L4,text:"次の文章の［　］にあてはまる組み合わせとして、適切なものはどれか。\n道路運送車両法に照らし、自動車の[①]に変更があった場合その事由があった日から[②]以内に自動車検査証の記入を受けなければならない。",
opts:["①使用者　②15日","①所有者　②14日","①使用者　②30日","①所有者　②30日"],
ans:0,cat:"安全/法令",exp:"道路運送車両法第67条により、自動車の使用者に変更があった場合は、15日以内に自動車検査証の記入を受けなければならない。"},
{no:44,pts:2,labels:L4,text:"OBD検査に関する記述として、不適切なものはどれか。",
opts:["OBD検査は、車載コンピューターと通信して故障コードを確認する検査である。","OBD検査に不適合となった場合は、整備を行ってから再検査が必要になる。","OBD検査は全ての自動車に対して義務付けられている。","OBD検査に合格しても、その他の検査に不合格であれば車検は通らない。"],
ans:2,cat:"安全/法令",exp:"OBD検査は全ての自動車に義務付けられているわけではなく、一定の条件を満たす車両（対象車両）のみが対象。「全ての自動車に義務付け」（C）が不適切。"},
{no:45,pts:2,labels:L4,text:"令和2年4月1日より施行された特定整備制度に関する記載として、不適切なものはどれか。",
opts:["OBD検査の対象外としている大型特殊自動車、被牽引自動車、二輪自動車を除いた自動車の定期点検基準の点検項目について、「OBD（車載式故障診断装置）の診断の結果」を追加し、1年ごとに点検することを義務付け。","特定整備とはこれまでの分解整備とは異なり、新たに電子制御装置整備（自動ブレーキ等の先進技術）に関して認証することを特定整備と定義している。","特定整備の対象となる作業（電子制御装置整備作業）は以下の3つ：①自動運行装置の取り外しや作動に影響を及ぼすおそれがある整備・改造、②衝突被害軽減制動制御装置等に用いられるカメラ等の取り外しや機能調整、③①②に係るカメラ等が取り付けられている車体前部・窓ガラスの脱着。","特定整備（電子制御装置整備）の認証に必要な整備主任者は2級以上の自動車整備士資格または自動車車体整備士、自動車電気装置整備士に加えて運輸支局等が行う講習受講と試問に合格する事が条件である。"],
ans:1,cat:"安全/法令",exp:"特定整備は分解整備を含む概念であり、「これまでの分解整備とは異なり新たに電子制御装置整備のみを定義」（B）は不適切。現在の分解整備も特定整備に含まれる。"},
{no:46,pts:2,labels:L4,text:"自動車特定整備制度の電子制御装置整備に該当しないものはどれか。",
opts:["PCS付き車両のエンジンECUのリプログラミング","PCS付き車両のフロントガラスの交換","PCS付き車両のバンパーの脱着","PCSのエーミング"],
ans:0,cat:"安全/法令",exp:"電子制御装置整備の対象：①自動運行装置脱着、②PCSカメラ等の脱着・機能調整、③①②に係るバンパー・グリル・窓ガラスの脱着。エンジンECUのリプログラミング（A）はこれらに該当しないため、電子制御装置整備に該当しない。"},
{no:47,pts:2,labels:L4,text:"道路運送車両の保安基準に照らし、非常口の記述に関して、適切なものはどれか。",
opts:["幼児専用車、乗車定員25人以上の自動車（緊急自動車およびすべての座席が乗降口から直接着席できる自動車を除く）には、非常口を設けなければならない。","非常口のとびらが開放した場合に、その旨を乗客に警報する装置を備えなければならない。","非常口は、客室の右側面の後部または後面に設けられていること。","非常口には、非常の際に客室の内外から、特別な器具を用いないで開放できる、外開きのとびらを備えること。"],
ans:0,cat:"安全/法令",exp:"A（25人以上）が誤り。正しくは乗車定員30人以上。B（警報装置）、C（右側面後部または後面）、D（外開きのとびら）は適切な記述。"},
{no:48,pts:2,labels:L4,text:"車検時のOBD検査に関する記述として、不適切なものはどれか。",
opts:["車載式故障診断装置を利用した自動車検査であり、特定DTCが発生している車両に関しては、保安基準不適合となる。","車検証に「OBD検査対象車」（電子車検証の場合は「OBD検査対象」）などの記載がある場合でも、法令等で定められた条件によりOBD検査を実施しなくてもよいことがある。","OBD検査対象車両は、国産・輸入車問わず令和3年10月1日以降の新型車（フルモデルチェンジ車）である。","指定工場においてはOBD検査実施が義務となるが、認証工場での自工場内実施は義務ではない。"],
ans:2,cat:"安全/法令",exp:"OBD検査対象車両は、国産車は令和3年（2021年）10月1日以降、輸入車は令和4年（2022年）10月1日以降の新型車。「国産・輸入車問わず令和3年」は不適切。"},
{no:49,pts:2,labels:L4,text:"コンディションレポートの狙いとして、適切なものはどれか。",
opts:["車検、定点入庫時に定期交換部品の交換を促すことで、確実な予防整備を実施する。","突発で入庫したお客様に整備提案し部品交換を促す。","メカニックへの作業指示の際、交換箇所の指示に使用する。","部品商への外販活動に使用し、純正部品の拡販に使用する。"],
ans:0,cat:"一般/保険",exp:"コンディションレポートはお客様車両の使われ方を把握し、計画入庫時に定期交換部品の交換を促すことで確実な予防整備を実施するためのツール（A適切）。"},
{no:50,pts:2,labels:L4,text:"日野自動車は、お客様や社会に貢献するという日野の原点に立ち返り、一人ひとりが大切にすべき価値観とあるべき姿を「HINOウェイ」としてまとめた。HINOウェイの価値観として、適切なものはどれか。",
opts:["誠実、貢献、共感","誠実、貢献、協力","誠実、貢献、共有","誠実、貢献、感謝"],
ans:0,cat:"一般/保険",exp:"HINOウェイの価値観は「誠実、貢献、共感」の3つ。"},
// Q51-60 計算問題 (5点each)
{no:51,pts:5,labels:L4,text:"シビアコンディションに関する記述として、適切なものはどれか。",
opts:["悪路（凹凸路、砂利道、未舗装路等）、雪道、多塵地帯の走行が走行距離の20%以上。","山道、登降坂路の走行が走行距離の10%以上。","発進・停止の繰り返しが多い、もしくは低速走行が走行距離の30%以上。","走行距離が多い（目安：20,000km/月以上）。"],
ans:2,cat:"一般/保険",exp:"シビアコンディションの判定：悪路・雪道・多塵地帯=30%以上、山道・登降坂路=30%以上、発進・停止繰返し/低速走行=30%以上（C適切）、走行距離=10,000km/月以上。"},
{no:52,pts:5,labels:L4,text:"危険物に関する記述として、不適切なものはどれか。",
opts:["第一石油類とは、ガソリン・ブレーキクリーナーが該当する。","第二石油類とは、PSオイル・ブレーキフルードが該当する。","第四石油類とは、エンジンオイル・T/Mオイル・D/Fオイルが該当する。","第三石油類とは、重油・AT油が該当する。"],
ans:1,cat:"商品知識・車両知識",exp:"第二石油類は灯油・軽油が該当する。PSオイル・ブレーキフルードは第三石油類または第四石油類に分類される（B不適切）。"},
{no:53,pts:5,labels:L4,text:"MOBILOTSメンテナンスリースの記載について、適切なものはどれか。",
opts:["ファイナンスリースとは車両代、登録諸費用に加え、契約期間中に発生する自動車諸税や保険料・納引手数料を月々のリース料に含めることができるリースプラン。","メンテナンスリースとはファイナンスリースに、車検・法定点検等を加え、車両の維持・管理に必要な費用を含めたリースプラン。","メンテナンスマネジメントサービスとは車検・法定点検等のメンテナンス費用を月々定額でお支払いいただくサービス。新車及び中古車、現在使用中の車両でも契約できる。","メンテナンスリースには自動車保険（リースカー車両費用補償特約つき）を組み込むことができ、その場合日野プレミアムサポートとして①修理費用差額補償サービス、②フロントガラス修理補償サービス、③タイヤパンク修理補償サービスの３つが無償で追加されます。"],
ans:0,cat:"一般/保険",exp:"A：ファイナンスリースには「納引手数料」は含まれない（A不適切）。B・C・Dは適切な記述。"},
{no:54,pts:5,labels:L4,text:"市場技術速報の発行判断内容の記述として、不適切なものはどれか。",
opts:["同種不具合が複数台発生したため発生台数分の市技報を作成した。","シートベルト巻き取り不良の点検後、部品不良にて交換をしたが保証期間外のため市技報を作成しなかった。","左右のミラーが同時に故障したため、1件の市技報にまとめて記載した。","整備作業時に作業性がとても悪かったため不具合ではないが市技報を作成した。"],
ans:1,cat:"一般/保険",exp:"市技報（市場技術速報）は保証期間内・外や同種不具合かどうかに関わらず発行が必要。保証期間外でも発行すべきであり、Bは不適切。"},
{no:55,pts:5,labels:L4,text:"市場技術速報作成時に関する記述として、適切なのはどれか。",
opts:["整備担当者確認結果へ分解整備結果、故障診断内容を記入した。","個人情報および個人情報に準じる表現を記入した。","部品返却が不要の場合にコメント欄へ返却のない理由を記入した。","詳細内容へ点検結果、解析結果、推定原因を記入した。"],
ans:2,cat:"一般/保険",exp:"B：個人情報は市技報に記入しない。D：詳細内容には故障事象・発生条件・発生状況を記入（点検結果・解析結果・推定原因ではない）。C（部品返却不要の場合はコメント欄に理由記入）が適切。"},
{no:56,pts:5,labels:L4,text:"ある販売会社の一ヶ月の整備部門の業績があります。車検整備と一般整備の合計売上利益として、適切なものはどれか。（値引等は無いものとする）\n\n・車検売上高：29,500千円\n・売上原価合計（車検＋一般整備）：25,800千円\n・一般整備売上原価：17,000千円\n・一般整備売上利益率：32％",
opts:["29,900千円","28,700千円","30,200千円","25,900千円"],
ans:1,cat:"計算",exp:"一般整備売上高 = 17,000 ÷ (1-0.32) = 25,000千円\n一般整備売上利益 = 25,000 × 0.32 = 8,000千円\n車検売上原価 = 25,800 - 17,000 = 8,800千円\n車検売上利益 = 29,500 - 8,800 = 20,700千円\n合計売上利益 = 20,700 + 8,000 = 28,700千円 → B"},
{no:57,pts:5,labels:L4,text:"平日の定時間内にＡ販売会社からエンジン始動不良となった日野車のバッテリー交換（2個）の広域サービス対応依頼が入ったため、Ｂ販売会社のサービスエンジニアが10km先の故障車両までサービスカーで出動した。Ａ販売会社への請求金額（消費税10%込）として、適切なものはどれか。\n（答えは小数点以下第一位を四捨五入）\n\n・純正PBバッテリーLP（定価）：38,000円（1個）\n・DN（仕入価格）：16,500円（1個）\n・標準作業時間（バッテリー交換）：0.5時間\n・Ａ販売会社の工賃レート：10,000円\n・Ｂ販売会社の工賃レート：10,500円",
opts:["59,895円","60,060円","61,215円","84,535円"],
ans:2,cat:"計算",exp:"①技術料：10,500(B社)×0.5h×1.25(出張)×0.8(振替控除)＝5,250円\n②バッテリー：16,500×2個×1.2(振替増し)＝39,600円\n③サービスカー：(8,000基本+400×10km)×0.9(振替控除)＝10,800円\n合計：(5,250+39,600+10,800)×1.1＝61,215円 → C"},
{no:58,pts:5,labels:L4,text:"通過車両のワイパーリンク修理を行い、技術料が10,000円（税抜）、部品代（定価）が20,000円（税抜）だった。元販売会社への振替料金（消費税込）を求めなさい。\n（答えが小数点以下になる場合は第1位を四捨五入）",
opts:["16,500円","24,400円","24,800円","26,400円"],
ans:3,cat:"計算",exp:"技術料振替：10,000×0.8(20%控除)＝8,000円\n部品代振替：20,000×0.8(20%控除)＝16,000円\n合計振替：24,000円\n税込：24,000×1.10＝26,400円 → D"},
{no:59,pts:5,labels:L4,text:"下記の数値は、ある販売会社の１ヶ月の整備業績です。営業費カバー率（%）を求めなさい。（小数点以下第1位四捨五入）\n\nＡ：会社総経費　66,121千円\nＢ：総売上高　169,298千円\nＣ：整備売上高　163,810千円\nＤ：有償売上高　142,635千円\nＥ：整備売上利益　62,815千円\nＦ：有償売上利益　45,842千円\nＧ：総整備台数　1,832台",

function norm(q) {
  if (q.o !== undefined && Array.isArray(q.o)) {
    var labs = q.o.length <= 3 ? L3 : q.o.length === 4 ? L4 : L5;
    var ch = {};
    q.o.forEach(function(v, i) { ch[labs[i]] = v; });
    return {no:q.n, section:q.s||'', label:(q.s||'問'+q.n), points:q.p, answer:labs[q.a], stem:q.q, choices:ch, explanation:q.exp||'', invalid:false, multi:false, freeAnswer:false, cat:q.cat||''};
  }
  if (q.opts !== undefined && Array.isArray(q.opts)) {
    var labs2 = q.labels || L4;
    var ch2 = {};
    q.opts.forEach(function(v, i) { if (labs2[i]) ch2[labs2[i]] = v; });
    var sec = q.section || q.s || '';
    var lbl = q.label || (sec ? sec + '(' + (q.no||q.n) + ')' : '問' + (q.no||q.n));
    var ansVal = Array.isArray(q.ans) ? q.ans.map(function(i){return labs2[i];}).join(',') : labs2[q.ans];
    return {no:q.no||q.n, section:sec, label:lbl, points:q.pts||q.points||1, answer:ansVal, stem:q.text||q.stem||q.q||'', choices:ch2, explanation:q.exp||q.explanation||'', invalid:false, multi:q.multi||false, freeAnswer:false, fig:q.fig||'', cat:q.cat||''};
  }
  return {no:q.no, section:q.section||q.s||'', label:q.label||('問'+q.no), points:q.points||q.pts||1, answer:q.answer, stem:q.stem||q.text||q.q||'', choices:q.choices||{}, explanation:q.explanation||q.exp||'', invalid:q.invalid||false, multi:false, freeAnswer:q.freeAnswer||false, fig:q.fig||'', cat:q.cat||''};
}

const totalQ = questions.length;
let idx = 0;
const ans = {};
var reviewMode = false, reviewList = [], reviewPos = 0;

function updateProg() {
  const answered = Object.keys(ans).length;
  document.getElementById('barfill').style.width = (answered/totalQ*100)+'%';
  document.getElementById('prog').textContent = (idx+1)+' / '+totalQ+' 問  （回答済み '+answered+' 問）';
}

function checkFree() {
  const q = norm(questions[idx]);
  const input = document.getElementById('freeInput').value.trim();
  const result = document.getElementById('freeResult');
  const correct = String(q.answer).replace(/[,，　 ]/g,'');
  const inputClean = input.replace(/[,，　 ]/g,'');
  result.style.display = 'block';
  if (inputClean === correct || input === String(q.answer)) {
    result.style.background = '#f0fdf4';
    result.style.border = '1px solid #86efac';
    result.style.color = '#166534';
    result.innerHTML = '✅ 正解！ 正解：'+q.answer+(q.explanation?'<br><span style="font-size:13px;color:#333">'+q.explanation.replace(/\n/g,'<br>')+'</span>':'');
  } else {
    result.style.background = '#fef2f2';
    result.style.border = '1px solid #fca5a5';
    result.style.color = '#991b1b';
    result.innerHTML = '❌ 不正解 正解：'+q.answer+(q.explanation?'<br><span style="font-size:13px;color:#333">'+q.explanation.replace(/\n/g,'<br>')+'</span>':'');
  }
}

function render() {
  const _q = questions[idx];
  const q = norm(_q);
  const isCalc = q.section === '問2' || q.section === '問２';
  const choiceKeys = Object.keys(q.choices);
  let html = '';
  if (q.section) html += '<div class="section-badge">'+q.section+'</div>';
  html += '<div class="qtitle">'+q.label+'（'+q.points+'点）</div>';
  if (q.invalid) html += '<div class="calc-note" style="background:#fff5f5;border-color:#fca5a5;color:#dc2626">⚠️ この問題は試験では無効問題でした（採点対象外）</div>';
  if (q.freeAnswer) html += '<div class="calc-note" style="background:#eff6ff;border-color:#93c5fd;color:#1d4ed8">📝 記述問題 — 計算して答えを確認してください（採点対象外）</div>';
  if (q.multi) html += '<div class="calc-note" style="background:#fff7ed;border-color:#fdba74;color:#c2410c">☑️ 複数選択問題（採点対象外）</div>';
  if (isCalc && !q.freeAnswer) html += '<div class="calc-note">📝 計算問題 — 電卓使用可</div>';
  if (q.fig) html += '<div style="text-align:center;margin-bottom:12px">'+q.fig+'</div>';
  html += '<div class="qstem">'+q.stem.replace(/\n/g,'<br>')+'</div>';
  if (q.freeAnswer) {
    html += '<div style="margin-top:12px">';
    html += '<input type="text" id="freeInput" placeholder="答えを入力..." style="width:100%;padding:12px;font-size:16px;border:2px solid #93c5fd;border-radius:10px;box-sizing:border-box;margin-bottom:10px">';
    html += '<button onclick="checkFree()" style="width:100%;padding:12px;background:#3b82f6;color:#fff;font-size:16px;font-weight:700;border:none;border-radius:10px;cursor:pointer">答え合わせ</button>';
    html += '<div id="freeResult" style="display:none;margin-top:10px;padding:12px;border-radius:10px"></div>';
    html += '</div>';
  } else {
    html += '<div class="choices">';
    choiceKeys.forEach(function(c) {
      if (!q.choices[c]) return;
      const sel = ans[q.no] === c ? ' selected' : '';
      html += '<button class="choice'+sel+'" onclick="selectAns('+q.no+',\'' + c + '\')"><span class="label">'+c+'</span><span>'+q.choices[c]+'</span></button>';
    });
    html += '</div>';
  }
  document.getElementById('quiz').innerHTML = html;
  document.getElementById('nextBtn').textContent = idx === totalQ - 1 ? '採点する ✓' : '次へ ▶';
  updateProg();
  window.scrollTo(0, 0);
}

function selectAns(no, c) { ans[no] = c; updateProg(); render(); }
function prevQ() {
  if (reviewMode) {
    if (reviewPos > 0) { reviewPos--; idx = reviewList[reviewPos]; render(); _updateReviewBadge(); }
  } else {
    if (idx > 0) { idx--; render(); }
  }
}
function nextQ() {
  if (reviewMode) {
    if (reviewPos < reviewList.length - 1) { reviewPos++; idx = reviewList[reviewPos]; render(); _updateReviewBadge(); }
    else { reviewMode = false; reviewList = []; showResult(); }
  } else {
    if (idx < totalQ - 1) { idx++; render(); } else { showResult(); }
  }
}

function showResult() {
  let score = 0, max = 0;
  const norms = questions.map(norm);
  norms.forEach(function(q) {
    if (q.invalid || q.freeAnswer || q.multi) return;
    max += q.points;
    if (ans[q.no] === q.answer) score += q.points;
  });
  let html = '<div class="result"><h2>📊 採点結果</h2><div class="score-big">'+score+' / '+max+' 点</div>';
  const sections = {}, secOrder = [];
  norms.forEach(function(q) {
    if (q.invalid || q.freeAnswer || q.multi) return;
    if (!sections[q.section]) { sections[q.section] = {score:0,max:0}; secOrder.push(q.section); }
    sections[q.section].max += q.points;
    if (ans[q.no] === q.answer) sections[q.section].score += q.points;
  });
  const vs = secOrder.filter(function(s) { return s; });
  if (vs.length > 0) {
    let sh = '<p style="font-size:14px;color:#555">';
    vs.forEach(function(s) { sh += s+'：'+sections[s].score+'/'+sections[s].max+'点　'; });
    html += sh + '</p>';
  }
  let hasMiss = false;
  html += '<h3 style="margin:16px 0 8px;font-size:15px;color:#333">📝 全問解説</h3>';
  norms.forEach(function(q) {
    if (q.invalid) {
      html += '<div style="border-left:5px solid #d1d5db;background:#f9fafb;padding:12px;margin:8px 0;border-radius:8px;line-height:1.6;font-size:14px">';
      html += '<div style="font-weight:700;font-size:15px;margin-bottom:4px;color:#6b7280">'+q.label+' ⚠️ 無効問題（採点対象外）</div>';
      if (q.explanation) html += '<div style="color:#333;margin-top:4px">'+q.explanation.replace(/\n/g,'<br>')+'</div>';
      html += '</div>';
      return;
    }
    if (q.freeAnswer) {
      html += '<div style="border-left:5px solid #93c5fd;background:#eff6ff;padding:12px;margin:8px 0;border-radius:8px;line-height:1.6;font-size:14px">';
      html += '<div style="font-weight:700;font-size:15px;margin-bottom:4px;color:#1d4ed8">'+q.label+' 📝 記述問題（採点対象外）</div>';
      html += '<div style="color:#1d4ed8;font-weight:700;margin-bottom:4px">正解：'+q.answer+'</div>';
      if (q.explanation) html += '<div style="color:#333;margin-top:4px">'+q.explanation.replace(/\n/g,'<br>')+'</div>';
      html += '</div>';
      return;
    }
    if (q.multi) {
      html += '<div style="border-left:5px solid #fdba74;background:#fff7ed;padding:12px;margin:8px 0;border-radius:8px;line-height:1.6;font-size:14px">';
      html += '<div style="font-weight:700;font-size:15px;margin-bottom:4px;color:#c2410c">'+q.label+' ☑️ 複数選択（採点対象外）</div>';
      html += '<div style="color:#c2410c;font-weight:700;margin-bottom:4px">正解：'+q.answer+'</div>';
      if (q.explanation) html += '<div style="color:#333;margin-top:4px">'+q.explanation.replace(/\n/g,'<br>')+'</div>';
      html += '</div>';
      return;
    }
    const wrong = ans[q.no] !== q.answer;
    if (wrong) hasMiss = true;
    const bc = wrong ? '#dc2626' : '#d1d5db';
    const bg = wrong ? '#fff5f5' : '#fff';
    const correctText = q.choices[q.answer] || '';
    html += '<div style="border-left:5px solid '+bc+';background:'+bg+';padding:12px;margin:8px 0;border-radius:8px;line-height:1.6;font-size:14px">';
    html += '<div style="font-weight:700;font-size:15px;margin-bottom:4px;color:'+(wrong?'#dc2626':'#111')+'">'+q.label+(wrong?' ❌':' ✅')+'</div>';
    if (wrong) {
      const myText = q.choices[ans[q.no]] || '';
      html += '<div style="color:#dc2626;font-weight:700;margin-bottom:2px">あなたの答え：'+(ans[q.no]||'未回答')+(myText ? '　'+myText : '')+'</div>';
      html += '<div style="color:#16a34a;font-weight:700;margin-bottom:4px">正解：'+q.answer+(correctText ? '　'+correctText : '')+'</div>';
    } else {
      html += '<div style="color:#16a34a;font-weight:700;margin-bottom:4px">正解：'+q.answer+(correctText ? '　'+correctText : '')+'</div>';
    }
    if (q.explanation) html += '<div style="color:#333;margin-top:4px">'+q.explanation.replace(/\n/g,'<br>')+'</div>';
    html += '</div>';
  });
  if (!hasMiss) html += '<p style="font-size:18px;font-weight:900;color:#16a34a">🎉 全問正解です！</p>';
  html += '<div class="actions"><button onclick="reviewMistakes()" style="padding:14px;border:none;border-radius:12px;background:#dc2626;color:#fff;font-size:16px;font-weight:700;cursor:pointer">間違えた問題を復習</button><button onclick="resetQuiz()" style="padding:14px;border:none;border-radius:12px;background:#6b7280;color:#fff;font-size:16px;font-weight:700;cursor:pointer">最初からやり直す</button></div></div>';
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('nav').style.display = 'none';
  const r = document.getElementById('result');
  r.style.display = 'block';
  html += '<a href="./index.html" style="display:block;text-align:center;margin-top:16px;padding:12px;background:#1e3a5f;color:white;border-radius:10px;text-decoration:none;font-weight:700;font-size:.95rem">🏠 ホームへ戻る</a>';
  r.innerHTML = html;
  window.scrollTo(0, 0);
}

function reviewMistakes() {
  const norms = questions.map(norm);
  reviewList = [];
  for (let i = 0; i < norms.length; i++) {
    const q = norms[i];
    if (q.invalid || q.freeAnswer || q.multi) continue;
    const _L = q.labels || ['A','B','C','D'];
    const correct = q.answer !== undefined ? q.answer : _L[q.ans !== undefined ? q.ans : 0];
    if (ans[q.no] !== correct) reviewList.push(i);
  }
  if (!reviewList.length) return;
  reviewMode = true;
  reviewPos = 0;
  idx = reviewList[0];
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('nav').style.display = 'flex';
  document.getElementById('result').style.display = 'none';
  render();
  _updateReviewBadge();
}

function resetQuiz() {
  Object.keys(ans).forEach(function(k) { delete ans[k]; });
  idx = 0; reviewMode = false; reviewList = []; reviewPos = 0;
  var rb = document.getElementById('_review_badge'); if (rb) rb.remove();
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('nav').style.display = 'flex';
  document.getElementById('result').style.display = 'none';
  render();
}

render();

// ?q=N で特定問題から開始（復習モード）
(function(){
  var qParam = new URLSearchParams(location.search).get('q');
  if (!qParam || typeof questions === 'undefined' || typeof render !== 'function') return;
  var qi = questions.findIndex(function(x){ return x.no === parseInt(qParam); });
  if (qi < 0) return;
  idx = qi;
  render();

  // 復習モード: 答えたら即フィードバックオーバーレイ
  var _origSel = window.selectAns;
  window.selectAns = function(no, choice) {
    if (_origSel) _origSel(no, choice);
    var q = questions.find(function(x){ return x.no === no; });
    if (!q) return;
    var _L = q.labels || ['A','B','C','D'];
    var correctAns = q.answer !== undefined ? q.answer : _L[q.ans !== undefined ? q.ans : 0];
    var isCorrect = (choice === correctAns);
    _showReviewResult(q, isCorrect, correctAns);
    // Firebase: 復習モードでの正解削除・不正解登録
    (function(){
      var fbUser = window._fbUser;
      var fbDb = window._fbDb;
      var fbSrc = window._fbSrc;
      if (!fbUser || !fbDb || !fbSrc) return;
      import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js')
        .then(function(m) {
          var key = fbSrc + '_q' + no;
          if (isCorrect) {
            m.deleteDoc(m.doc(fbDb, 'users', fbUser.uid, 'wrongAnswers', key)).catch(function(){});
          } else {
            m.setDoc(m.doc(fbDb, 'users', fbUser.uid, 'wrongAnswers', key), {
              source: fbSrc, qNo: no, label: q.label||('Q'+no),
              stem: (q.stem||'').substring(0,120), timestamp: m.serverTimestamp(),
              url: window.location.pathname
            }, {merge:true}).catch(function(){});
          }
        });
    })();
  };

  function _showReviewResult(q, isCorrect, correctAns) {
    var old = document.getElementById('_review_overlay');
    if (old) old.remove();
    var isSpecial = q.freeAnswer || q.multi;
    var icon = isCorrect ? '✅' : (isSpecial ? '📝' : '❌');
    var msg  = isCorrect ? '正解！'  : (isSpecial ? '記述・複数選択問題' : '不正解');
    var col  = isCorrect ? '#059669' : (isSpecial ? '#1d4ed8' : '#dc2626');
    var ansHtml = (!isCorrect && !isSpecial)
      ? '<div style="margin:8px 0;font-size:.9rem;color:#1d4ed8;font-weight:700">正解: ' + correctAns + '</div>' : '';
    var expHtml = q.explanation
      ? '<div style="margin-top:12px;text-align:left;background:#f8fafc;border-radius:8px;padding:12px;font-size:.82rem;line-height:1.7;color:#374151;max-height:220px;overflow-y:auto">'
        + (q.explanation||'').replace(/\n/g,'<br>') + '</div>' : '';
    var ov = document.createElement('div');
    ov.id = '_review_overlay';
    ov.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.65);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;box-sizing:border-box';
    ov.innerHTML = '<div style="background:white;border-radius:16px;padding:24px;max-width:480px;width:100%;text-align:center;font-family:-apple-system,Meiryo,sans-serif">'
      + '<div style="font-size:2.4rem">' + icon + '</div>'
      + '<div style="font-size:1.25rem;font-weight:900;color:' + col + ';margin:8px 0">' + msg + '</div>'
      + ansHtml + expHtml
      + '<a href="./mypage.html" style="display:inline-block;margin-top:20px;padding:12px 28px;background:#1e3a5f;color:white;border-radius:10px;text-decoration:none;font-weight:700;font-size:.9rem">📁 マイページへ戻る</a>'
      + (function(){var _rq=JSON.parse(sessionStorage.getItem('reviewQueue')||'[]');var _rNext=_rq.length?_rq[0]:null;if(_rNext){_rq.shift();sessionStorage.setItem('reviewQueue',JSON.stringify(_rq));}var _rTotal=parseInt(sessionStorage.getItem('reviewTotal')||'0');var _rLeft=_rq.length;return _rNext?'<a href="'+_rNext+'" style="display:inline-block;margin-top:10px;margin-left:8px;padding:12px 28px;background:#059669;color:white;border-radius:10px;text-decoration:none;font-weight:700;font-size:.9rem">▶ 次の復習問題（残'+_rLeft+'問）</a>':'';})()
      + '<br><button onclick="document.getElementById(\'_review_overlay\').remove()" style="margin-top:10px;padding:8px 20px;background:transparent;border:1px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:.82rem;color:#64748b;font-family:inherit">✏️ 続けて解く</button>'
      + '</div>';
    document.body.appendChild(ov);
  }
})();
</script>

<script src="./firebase-config.js"></script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, deleteDoc, collection, getDocs, serverTimestamp, increment } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const SOURCE_KEY = document.title.replace(/[\s　]/g,'_').replace(/[^\w\u3040-\u9FFF]/g,'');

try {
  const app = initializeApp(FIREBASE_CONFIG);
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, async user => {
    const badge = document.getElementById('fb-login-badge');
    if (badge) {
      if (user) {
        const name = user.displayName || user.email.split('@')[0];
        badge.innerHTML = `<a href="./index.html" style="font-size:.72rem;background:rgba(255,255,255,.2);color:white;padding:3px 8px;border-radius:999px;text-decoration:none">👤 ${name}</a>`;
      } else {
        badge.innerHTML = `<a href="./login.html" style="font-size:.72rem;background:rgba(255,255,255,.15);color:white;padding:3px 10px;border-radius:999px;text-decoration:none">ログイン</a>`;
      }
    }
    window._fbUser = user;
    window._fbDb = db;
    window._fbSrc = SOURCE_KEY;
    // users/{uid}ドキュメントを作成（管理者ページで一覧表示するため）
    try {
      const { doc, setDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
      setDoc(doc(db,'users',user.uid),{email:user.email,displayName:user.displayName||user.email.split('@')[0],lastLogin:new Date().toISOString()},{merge:true}).catch(()=>{});
    } catch(e){}
  });

  const _orig = window.selectAns;
  if (typeof _orig === 'function') {
    window.selectAns = function(no, choice) {
      _orig(no, choice);
      const user = window._fbUser; const db = window._fbDb;
      if (!user || !db) return;
      const q = (typeof questions!=="undefined"?questions:[]).find(q2 => q2.no === no);
      if (!q) return;
      const _L = q.labels || ['A','B','C','D'];
      const isCorrect = choice === (q.answer !== undefined ? q.answer : _L[q.ans]);
      // カテゴリ別累計
      const cat = ((q.section==="問2"||q.section==="問２") ? "計算" : (q.cat || "一般/保険")).replace(/\//g,'_');
      setDoc(doc(db,'users',user.uid,'catStats',cat),{total:increment(1),correct:increment(isCorrect?1:0)},{merge:true}).catch(()=>{});
    };
  }

  const _origResult = window.showResult;
  if (typeof _origResult === 'function') {
    window.showResult = function() {
      _origResult();
      const user = window._fbUser; const db = window._fbDb;
      if (!user || !db) return;
      const norms = (typeof questions!=="undefined"?questions:[]).filter(q=>!q.invalid&&!q.freeAnswer&&!q.multi);
      const ansObj = (typeof ans!=="undefined"?ans:{});
      let correct=0,total=0;
      norms.forEach(q=>{
        total+=q.points||3;
        const _L2 = q.labels || ['A','B','C','D'];
        const correctAns = q.answer !== undefined ? q.answer : _L2[q.ans];
        const isCorrect2 = ansObj[q.no] === correctAns;
        if(isCorrect2) correct+=q.points||3;
        const key = window._fbSrc + '_q' + q.no;
        if(isCorrect2) {
          deleteDoc(doc(db,'users',user.uid,'wrongAnswers',key)).catch(()=>{});
        } else if(ansObj[q.no] !== undefined) {
          setDoc(doc(db,'users',user.uid,'wrongAnswers',key),{
            source:window._fbSrc,qNo:q.no,label:q.label||('Q'+q.no),
            stem:(q.text||q.stem||'').substring(0,120),timestamp:serverTimestamp(),
            url:window.location.pathname
          },{merge:true}).catch(()=>{});
          setDoc(doc(db,'users',user.uid,'wrongHistory',key),{
            source:window._fbSrc,qNo:q.no,label:q.label||('Q'+q.no),
            stem:(q.text||q.stem||'').substring(0,120),firstWrong:serverTimestamp(),
            url:window.location.pathname
          },{merge:true}).catch(()=>{});
        }
      });
      setDoc(doc(db,'users',user.uid,'stats',window._fbSrc),{
        source:window._fbSrc,lastCorrect:correct,lastTotal:total,
        lastDate:serverTimestamp(),totalAttempts:increment(1)
      },{merge:true}).catch(()=>{});
    };
  }
} catch(e){ console.warn('Firebase:',e.message); }
</script>

<script>
function _updateReviewBadge() {
  var nav = document.getElementById('nav');
  if (!nav || typeof reviewMode === 'undefined' || !reviewMode) return;
  var b = document.getElementById('_review_badge');
  if (!b) {
    b = document.createElement('div');
    b.id = '_review_badge';
    b.style.cssText = 'position:absolute;top:-28px;left:50%;transform:translateX(-50%);background:#dc2626;color:white;font-size:.75rem;font-weight:700;padding:3px 12px;border-radius:999px;white-space:nowrap';
    nav.style.position = 'relative';
    nav.appendChild(b);
  }
  b.textContent = '❌ 間違い問題 ' + (reviewPos+1) + ' / ' + reviewList.length;
}
