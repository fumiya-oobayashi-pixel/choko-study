  {no:1, section:"問1", label:"問1(1)", points:3, answer:"A",
   stem:"磁気抵抗素子式回転センサーの点検結果として、適切なものはどれか。",
   choices:{A:"③－④間の信号は図のような信号であれば正常である。",B:"早く回転させたとき、①－②間の信号の電圧が高くなるのは正常である。",C:"①－②間の信号は図のような信号であれば正常である。",D:"①－②間の信号と③－④間の信号が等しければ正常である。"},
   explanation:"磁気抵抗素子式回転センサーの出力波形は0Vを基準とする矩形波であり、回転が速くなると周波数が増える。③－④間（出力側）の信号が矩形波であれば正常。正解はA。"},
  {no:2, section:"問1", label:"問1(2)", points:3, answer:"C",
   stem:"下記エンジンリターダの説明で［ ］にあてはまる語句として、適切なものはどれか。\nエンジンＥＣＵの信号によりマグネチックバルブが開き、エンジンからの油圧が［①］とその内部にあるチェックバルブを押し上げ、マスターピストンとスレーブピストン間にオイルが供給され、マスターピストンと［②］がブレーキカムに接触するまで押し下げられる。圧縮上死点付近で［③］はブレーキカムによって押し上げられオイルを押し戻す。［④］がオイル通路を閉塞し、油圧が上昇することにより［⑤］を押し下げエキゾーストバルブが開き、圧縮空気を逃がすことで、圧縮行程で得たブレーキ力を損失することなく有効に活用する。",
   choices:{A:"①コントロールバルブ ②ブレーキ用ロッカーアーム ③スレーブピストン ④逆止弁 ⑤マスターピストン",B:"①マグネチックバルブ ②吸気ロッカーアーム ③スレーブピストン ④チェックバルブ ⑤マスターピストン",C:"①コントロールバルブ ②ブレーキ用ロッカーアーム ③マスターピストン ④チェックバルブ ⑤スレーブピストン",D:"①マグネチックバルブ ②ブレーキ用ロッカーアーム ③マスターピストン ④逆止弁 ⑤スレーブピストン"},
   explanation:"①コントロールバルブ ②ブレーキ用ロッカーアーム ③マスターピストン ④チェックバルブ ⑤スレーブピストン が正しい組み合わせ。正解はC。"},
  {no:3, section:"問1", label:"問1(3)", points:3, answer:"A",
   stem:"２＊Ｇ付大型トラックのエンジンのセンサーに関する記述として、適切なものはどれか。",
   choices:{A:"エアフローセンサーは薄膜シリコンチップ式を採用し、シリコンチップ部上流温度センサーの温度と下流温度センサーの温度差で空気流量を計測している。",B:"アクセルセンサーは可変抵抗式のセンサーで、アクセルセンサーアセンブリ１個の中にセンサーを２個内蔵している。",C:"燃料温度センサーはサプライポンプ入口回路に取り付けている。",D:"エンジン主回転センサーは、フライホイールハウジングに取り付けており、パルサーには６°ごとに凹部を設けており、エンジン１サイクル（２回転）分の凹数は１２０個になる。"},
   explanation:"アクセルセンサーはホールIC式。燃料温度センサーはインジェクターのリゲージ回路に設置。フライホイールのパルサー穴は６°ごとに112個。エアフローセンサーの薄膜シリコンチップ式の記述が適切。正解はA。"},
  {no:4, section:"問1", label:"問1(4)", points:3, answer:"B",
   stem:"ポスト新長期Ｅ１３Ｃのコモンレール式高圧燃料噴射装置のソレノイド式インジェクターに関する記述として、不適切なものはどれか。",
   choices:{A:"ソレノイド・コイルに通電が開始されると、電磁力によりバルブはバルブ・スプリングの力に打ち勝って引き上げられ、オリフィスが開く。",B:"ソレノイド・コイルへの通電を止めると、コモンレールからの高圧燃料が、ノズル室に流入することで、コマンド・ピストンが押し下げられる。",C:"オリフィスが閉じると、コモンレールからの高圧燃料が、一気に制御室に流入することで、ノズル・ニードルが急激に降下し噴孔が閉じて噴射が終了する。",D:"オリフィスが開くと、制御室の燃料は次第に流出し制御室の圧力が下がるので、ノズル・ニードル下面に掛かっていた圧力との差圧により、ノズルニードルが上昇し燃料を噴射する。"},
   explanation:"ソレノイド・コイルへの通電を止めると、バルブ・スプリングの力でオリフィスが閉じられ、コモンレールからの高圧燃料が制御室に流入することでコマンド・ピストンが押し下げられる（ノズル室ではない）。正解はB。"},
  {no:5, section:"問1", label:"問1(5)", points:3, answer:"B",
   stem:"ＳＪＧ付デュトロのハイブリッドシステムの点検、整備に関する記述として、適切なものはどれか。",
   choices:{A:"後輪が接地した状態で牽引する際はギヤをＤレンジにするか、プロペラシャフトを外すなどモータージェネレーターが回転しないように牽引する。",B:"整備時にはまずスターターキーをＯＦＦにしてからサービスプラグを取り外し、コンデンサーが放電するまで７分間待つ。その後、保護具を身に着け高電圧回路の作業を行う。",C:"ＨＶバッテリーがバッテリー上がりを起こした際には、専用の外部充電器で低電流を長時間流し続け、すべてのセルが満充電になるまで充電する。",D:"高電圧に関わる点検、整備を行うには、労働安全衛生法第５９条ならびに労働安全衛生規則第３６条により特別教育の受講が義務付けられている。"},
   explanation:"後輪が接地した状態で牽引する際はNレンジで行う。HVバッテリーは外部充電できないので交換が必要。護具を装着してからサービスプラグを抜く（順序が逆）。整備時の正しい手順（キーOFF→サービスプラグ取り外し→7分待機→保護具着用）が適切。正解はB。"},
  {no:6, section:"問1", label:"問1(6)", points:3, answer:"A",
   stem:"２０１９年モデルのプロフィアＨＶ車の機能に関する記述として、不適切なものはどれか。",
   choices:{A:"ＤＣ－ＤＣコンバータは、システムメインリレーおよびＨＶウォーターポンプなどへ電力を供給するため、ＨＶバッテリー電圧のＤＣ２７６Ｖをでdc24Vに降圧する。",B:"ＨＶバッテリーは定格電圧２７６（Ｖ）、容量４０（Ａｈ）のリチウムイオンバッテリーを搭載している。",C:"ＨＶ－ＥＣＵが、各種センサーなどの信号から減速状態（フットブレーキを踏んでいるまたはエンジンリターダーを作動させている）を判断すると、インバーターがHVモーターを発電機として機能させ、車両の運動エネルギーを電気エネルギーに変換しながらブレーキアシストを行う。",D:"高圧Ｊ/Ｂ（ジャンクションボックス）は、ＨＶバッテリー前部のフレームに搭載されており、ＨＶバッテリーの電力を架装する電動冷凍機などに分配する。"},
   explanation:"ＤＣ－ＤＣコンバータはＨＶバッテリー電圧のＤＣ２７６ＶをＤＣ２４Ｖではなく、DC24VをDC12Vに降圧する（バッテリー電圧276VはDC12Vへ降圧）。正解はA。"},
  {no:7, section:"問1", label:"問1(7)", points:3, answer:"C",
   stem:"Ｌ＊Ｇ付プロフィアに搭載されている、ＭＺ１２トランスミッションに関する記述として、不適切なものはどれか。",
   choices:{A:"スプリッターマグネチックバルブは、２連マグネチックバルブを採用している。",B:"シフトユニットはＤＣモーター、ボールねじ部、パワーシフト部などで構成されている。",C:"レンジマグネチックバルブは、３連マグネチックバルブを採用している。",D:"セレクトユニットはＤＣモーター、ボールねじ部などで構成されている。"},
   explanation:"レンジマグネチックバルブは２連マグネチックバルブを採用している（３連ではない）。正解はC。"},
  {no:8, section:"問1", label:"問1(8)", points:3, answer:"B",
   stem:"マニュアルトランスミッションの振動・騒音に関する記述として、不適切なものはどれか。",
   choices:{A:"うなり音は、４００Ｈｚ～３ｋＨｚの振動周波数でトランスミッションギヤのかみ合いによる振動である。",B:"うなり音は、トランスミッションギヤのかみ合い率を小さくし、振動周波数を低くすることで低減することができる。",C:"車両発進時のジャダは、１０～２０Ｈｚの振動周波数でクラッチ伝達トルクの変動による振動である。",D:"ジャダは、クラッチを徐々につないでいく際にクラッチディスクの摩擦面で間欠的な滑りが生じ、エンジンからの伝達トルクが変動することで発生する。"},
   explanation:"トランスミッションギヤのかみ合い率を大きくし、振動周波数を高くすることでうなり音を低減することができる（小さくするのは逆）。正解はB。"},
  {no:9, section:"問1", label:"問1(9)", points:3, answer:"B",
   stem:"ＳＪＧ付デュトロのプロシフトVに関する記述として、不適切なものはどれか。",
   choices:{A:"モータードライバーは、ＡＭＴ ＥＣＵからの指示により、シフト、セレクトモーターおよびＡＣＵモーターに電力を供給し、駆動力の増減や回転方向の切り替えを行っている。",B:"ＡＣＵストロークセンサーの値はメイン信号、サブ信号ともに、クラッチ完接状態で約４．２Ｖ、クラッチ完断状態で約１Ｖとなっており、マスターシリンダーのピストンストローク量をＡＭＴ ＥＣＵへ送っている。",C:"ＡＣＵストロークセンサーは、メイン信号とサブ信号の２系統に分かれており、片方が故障した場合はもう一方で制御を行う。",D:"自動制御による発進、変速操作に加え、ハイブリットシステムにおいてもクラッチが作動し、クラッチの作動回数が多く、高い耐久性を実現するため、クラッチのレリーズ機構にレバーシャフト式を採用した。"},
   explanation:"ＡＣＵストロークセンサー電圧はメインとサブで逆特性となっており、クラッチ完接状態でメインが約4.2V、サブが約0.8V、クラッチ完断状態でメインが約1.0V、サブが約4.0Vとなっている（メイン・サブともに同じ値ではない）。正解はB。"},
  {no:10, section:"問1", label:"問1(10)", points:3, answer:"C",
   stem:"オートマチックトランスミッションの故障診断に関する記述として、不適切なものはどれか。",
   choices:{A:"ロックアップが作動しない原因としてトルクコンバーター内部の不良が考えられる。",B:"「Ｎ」レンジから「Ｄ」レンジへシフトした時にショックが大きい場合は、アイドル回転が高すぎることが考えられる。",C:"ストールテストを行ったところ特定のレンジのみ規定回転数より高い場合は、ステーターのワンウェイクラッチの作動不良が考えられる。",D:"変速ショックが大きい場合の原因として、ＡＴ内部のラインプレッシャーの高すぎが考えられる。"},
   explanation:"ステーターのワンウェイクラッチの不良は回転速度が低くなる（高くなるではなく）。規定回転数より高い場合は、ギヤユニットのクラッチの滑りなどが考えられる。正解はC。"},
  {no:11, section:"問1", label:"問1(11)", points:3, answer:"D",
   stem:"２＊Ｇ付プロフィアトラックのサスペンションを脱着する場合の注意事項に関する記述として、不適切なものはどれか。",
   choices:{A:"スターターキーを必ず「ＬＯＣＫ」位置にしたのちレベリングタイマーを解除する。",B:"アクスルが前方にずれないようにドラムおよびローター部をトランスミッションジャッキなどで支え、浮かせないようにする。",C:"アッパーロッドは、組付け方向矢印が車両前方になるように取り付ける。",D:"車高センサー、リンクロッド、レベリングレバーの脱着作業のみ、必ず車高の初期設定を行う。"},
   explanation:"車高センサー、リンクロッド、レベリングレバーだけではなく、車高センサーブラケット、トルクロッドブラケットなどの取り外し作業を行ったときにも必ず車高の初期設定を行う（「のみ」は誤り）。正解はD。"},
  {no:12, section:"問1", label:"問1(12)", points:3, answer:"D",
   stem:"ファイナル・ギヤに関する記述として、適切なものはどれか。",
   choices:{A:"トー当たり、フェース当たりの場合は、ドライブ・ピニオンを遠ざけ、リング・ギヤを近付ける。",B:"トー当たり、フランク当たりの場合は、ドライブ・ピニオンを近付け、リング・ギヤを遠ざける。",C:"ヒール当たり、フェース当たりの場合は、ドライブ・ピニオンを近付け、リング・ギヤを遠ざける。",D:"ヒール当たり、フランク当たりの場合は、ドライブ・ピニオンを遠ざけ、リング・ギヤを近付ける。"},
   explanation:"トー当たり、フランク当たりの場合はドライブ・ピニオンを遠ざけリング・ギヤを近付ける。ヒール当たり、フランク当たりの場合はドライブ・ピニオンを遠ざけリング・ギヤを近付けるが適切。正解はD。"},
  {no:13, section:"問1", label:"問1(13)", points:3, answer:"D",
   stem:"タイヤおよびホイールバランスに関する記述として、適切なものはどれか。",
   choices:{A:"タイヤの一部が重い場合、ゆっくり回転させると重い部分が下になって止まる。このときのアンバランスをダイナミック・アンバランスといい、シミーの原因になる。",B:"タイヤの走行音は、一般にラグ型パターンよりもリブ型パターンの方が大きく、また、バイアス・タイヤよりもラジアル・タイヤの方が大きい。",C:"パターンノイズは、トレッド・パターンの溝の中の空気が、路面とタイヤ間で膨張し、排出されるときに出る音である。",D:"スキールとは、急発進、急制動、急旋回のときに発するキーという鋭い音で、タイヤのトレッドが局部的に振動を起し発生する。"},
   explanation:"A：スタティック・アンバランスという。B：ラグ型よりもリブ型の方が小さい、バイアスよりもラジアルの方が小さい。C：路面とタイヤ間で圧縮される。D：スキールの説明が適切。正解はD。"},
  {no:14, section:"問1", label:"問1(14)", points:3, answer:"B",
   stem:"ステアリング装置に関する記述として、不適切なものはどれか。",
   choices:{A:"操作機構は、運転者の操舵をステアリング・ギヤ機構に伝える。",B:"リンク機構は、ギヤ機構の動きをフロント・ホイールに伝えると共に、左右のフロント・ホイールの切れ角を同じにしている。",C:"ギヤ機構は、操舵力の方向を変えると共に、トルクを増大しステアリング・リンク機構に伝える。",D:"油圧式パワーステアリングには、ラック・ピニオン型、インテグラル型、リンケージ型がある。"},
   explanation:"リンク機構は、ギヤ機構の動きをフロント・ホイールに伝えると共に、左右のフロント・ホイールを一定の関係に保持し、旋回時に内側ホイールの切れ角を大きくしている（「切れ角を同じにしている」は誤り）。正解はB。"},
  {no:15, section:"問1", label:"問1(15)", points:3, answer:"A",
   stem:"２＊Ｇ付プロフィアのブレーキ装置に関する記述として、不適切なものはどれか。",
   choices:{A:"エアドライヤーは、マルチプロテクションバルブ、減圧弁、エア低圧警報スイッチ、エアゲージセンサーを一体化したものを採用した。",B:"法規対応のため、ブレーキ作動用エア圧を測定するテストコネクションをエアタンクとチャンバーに追加した。",C:"アクスルモジュレーターのコネクターをＨＤＳＣＳ（Heavy Duty Sealed Connector Series）化して、防水性および信頼性が向上した。",D:"バックアップバルブをアクスルモジュレーターに内蔵させることにより回路の簡素化および整備性が向上した。"},
   explanation:"エアドライヤーとマルチプロテクションバルブを分離し、その間にウエットタンクを設置した（一体化ではない）。正解はA。"},
  {no:16, section:"問1", label:"問1(16)", points:3, answer:"D",
   stem:"Ｓ＊Ｇ付レンジャー（エアオーバー車）のＡＢＳ制御ソレノイドバルブに関する記述として、適切なものはどれか。",
   choices:{A:"増圧作動時：保持ソレノイドへの信号はＯＮ、減圧ソレノイドへの信号はＯＦＦである。",B:"増圧作動時：保持ソレノイドへの信号はＯＮ、減圧ソレノイドへの信号はＯＮである。",C:"増圧作動時：保持ソレノイドへの信号はＯＦＦ、減圧ソレノイドへの信号はＯＦＦである。",D:"減圧作動時：保持ソレノイドへの信号はＯＦＦ、減圧ソレノイドへの信号はＯＦＦである。"},
   explanation:"増圧作動時、保持ソレノイドへの信号はＯＦＦ、減圧ソレノイドへの信号はＯＦＦが正しい（A:増圧時の保持がONは誤り）。減圧作動時は保持・減圧ともOFF。正解はD。"},
  {no:17, section:"問1", label:"問1(17)", points:3, answer:"D",
   stem:"制動装置の点検整備時期に関する記述として、適切なものはどれか。",
   choices:{A:"ブレーキチャンバーの機能の点検は、３ヶ月および１２ヶ月ごとに行わなければならないと法律で定められている。",B:"ブレーキバルブの機能の点検は、３ヶ月および１２ヶ月ごとに行わなければならないと法律で定められている。",C:"リレーバルブの機能の点検は、３ヶ月および１２ヶ月ごとに行わなければならないと法律で定められている。",D:"駐車ブレーキの効き具合の点検は、３ヶ月および１２ヶ月ごとに行わなければならないと法律で定められている。"},
   explanation:"ブレーキチャンバーの機能の点検は12ヶ月ごと、ブレーキバルブの機能の点検は12ヶ月ごと、リレーバルブの機能の点検は12ヶ月ごと。駐車ブレーキの効き具合は3ヶ月および12ヶ月ごとが正しい。正解はD。"},
  {no:18, section:"問1", label:"問1(18)", points:3, answer:"A",
   stem:"Ｔ＊Ｇ付デュトロのブレーキ点検に関する記述として、不適切なものはどれか。",
   choices:{A:"バキュームチェックバルブを点検したところ、バキュームポンプ側からバキュームリザーバー側に通気があったので、バキュームチェックバルブは正常である。",B:"ドラムブレーキのブレーキライニング端面の段差がなくなっている場合は、使用限度を超えているため交換が必要である。",C:"エンジン回転中にブレーキペダルを踏み込み、その状態でエンジンを止めて３０秒間保持した際に、ペダル高さが変化しなかったので、負荷気密の簡易点検は正常である。",D:"ディスクブレーキのブレーキディスクとブレーキパッドのすき間は自動的に適正に保たれるため、すき間の調整は不要である。"},
   explanation:"バキュームチェックバルブの点検では、バキュームリザーバー側からバキュームポンプ側に通気があること、またバキュームポンプ側からバキュームリザーバー側に通気がないことを確認する（AはポンプからリザーバーへOKとしているが逆）。正解はA。"},
  {no:19, section:"問1", label:"問1(19)", points:3, answer:"B",

   choices:{A:"［イ］ＯＮ ［ロ］ＯＮ",B:"［イ］ＯＦＦ ［ロ］ＯＮ",C:"［イ］ＯＮ ［ロ］ＯＦＦ",D:"［イ］ＯＦＦ ［ロ］ＯＦＦ"},

  {no:20, section:"問1", label:"問1(20)", points:3, answer:"D",
   stem:"２＊Ｇ付プロフィアのヒーター＆エアコンディショナーに関する記述として、不適切なものはどれか。",
   choices:{A:"暖気と冷気を混合し、温度コントロールを行うことのできるフルエアミックス方式を採用している。",B:"日射補正制御は、日差しが強い場合にはブロワースピードを上げ、日差しが弱い場合にはブロワースピードを下げて制御する。",C:"ブロワー起動制御とは、ブロワーモーター起動時に、モーター保護のため２秒間風量を「２」に固定する。",D:"ブロワー遅動制御は、内気温度センサーの検出温度によって制御を行い、センターレジスターからの熱風の吹き出しを防止している。"},

  {no:21, section:"問1", label:"問1(21)", points:3, answer:"C",
   stem:"ＣＡＮ通信システムに関する記述として、不適切なものはどれか。",
   choices:{A:"複数のＥＣＵが同時に送信しようとすると、データ・フレーム同士が衝突する為、各ＥＣＵは、ＩＤコードにより優先度が高いデータ・フレームを優先して送信する。",B:"ＣＡＮは、一つのＥＣＵが複数のデータ・フレームを送信したり、ＣＡＮバス上のデータを必要とする複数のＥＣＵが同時にデータ・フレームを受信する事が出来る。",C:"一端の終端抵抗が破損すると、通信はそのまま継続され耐ノイズ性にも影響はないが、ダイアグコードが出力される事がある。",D:"バス・オフ状態とは、エラーを検知し、リカバリしてもエラーが解決しない場合に通信を停止している状態をいう。"},
   explanation:"一端の終端抵抗が破損しても通信は継続されるが、耐ノイズ性が低下する（影響はないは誤り）。ダイアグノシース・コードが出力されることがあり、発見した場合は終端抵抗を内蔵しているECUを交換する。正解はC。"},
  {no:22, section:"問1", label:"問1(22)", points:3, answer:"C",

  {no:23, section:"問1", label:"問1(23)", points:3, answer:"C",
   stem:"安全作業の基本として、不適切なものはどれか。",

  {no:24, section:"問1", label:"問1(24)", points:3, answer:"A",
   stem:"出張作業時の安全に関する記述として、不適切なものはどれか。",
   choices:{A:"故障車後方５０ｍ未満の場所に発炎筒を設置する。",B:"路上作業で安全確認、誘導要員が必要と予測される場合は、必ず２人以上で行く。",C:"路上作業時は、サービスカーを故障車の後ろに停止する。サービスカーとの車間距離は最低２０ｍ以上離す。",D:"故障現場が一般道路の自動車専用道路、交通量が多く安全が確保できないバイパス等の場合は、警察へ緊急案件として危険通報を行い指示を受けること。"},

  {no:25, section:"問1", label:"問1(25)", points:3, answer:"D",
   stem:"排気ガスに関する記述として、適切なものはどれか。",
   choices:{A:"ディーゼルエンジンは空気過剰率が大きいため、ＣＯの発生は極めて多い。",B:"ディーゼルエンジンは十分な空気の中で燃焼が行われるため、ＨＣの発生は多い。",C:"排気ガス中におけるＮＯｘは主にＮＯとＯ2である。",D:"サルフェートとは、燃焼中の硫黄分が酸化して生成された硫黄化合物の総称である。"},

  {no:26, section:"問1", label:"問1(26)", points:3, answer:"D",

  {no:31, section:"問2", label:"問2(1)", points:5, answer:"A",
   stem:"【計算問題】図のような回路において、テスターにかかる電圧として適切なものはどれか。\n\n【条件】\n・電源電圧：24V\n・テスターの内部抵抗：0.5MΩ\n・並列回路の抵抗：11MΩ\n\n※テスターの内部抵抗も回路に含めて計算すること。",
   choices:{A:"１１．７３Ｖ",B:"１２．００Ｖ",C:"約６４km/h",D:"約７５km/h",E:"約１０３km/h"},
   explanation:"テスターの内部抵抗も回路に入れなければならないので、0.5MΩと11MΩの合成抵抗を求めて、0.5MΩを足すと回路全体の抵抗（0.97826Ω）が求められる。\n24V÷0.97826Ω≒24.533A\n24.533A×0.47826Ω≒11.73V\nよって11.73Vが正解。正解はA。"},

   choices:{A:"約６４km/h",B:"約７５km/h",C:"約１０３km/h",D:"１１．７３Ｖ",E:"１２．００Ｖ"},
   explanation:"タイヤ円周：0.5m×2×3.14＝3.14m\n車速：1,600（エンジン回転）×60（分）÷1.318（変速比）÷4（ファイナル減速比）×3.14（タイヤ円周）÷1,000（m）≒約75km/h\n正解はB。"}

    return {no:q.no||q.n, section:sec, label:lbl, points:q.pts||q.points||1, answer:ansVal, stem:q.text||q.stem||q.q||'', choices:ch2, explanation:q.exp||q.explanation||'', invalid:false, multi:q.multi||false, freeAnswer:false};
  }
  return {no:q.no, section:q.section||q.s||'', label:q.label||('問'+q.no), points:q.points||q.pts||1, answer:q.answer, stem:q.stem||q.text||q.q||'', choices:q.choices||{}, explanation:q.explanation||q.exp||'', invalid:q.invalid||false, multi:false, freeAnswer:q.freeAnswer||false};
}

const totalQ = questions.length;
let idx = 0;
const ans = {};

function updateProg() {
  const answered = Object.keys(ans).length;
  document.getElementById('barfill').style.width = (answered/totalQ*100)+'%';
  document.getElementById('prog').textContent = (idx+1)+' / '+totalQ+' 問  （回答済み '+answered+' 問）';
}

function render() {
  const _q = questions[idx];
  const q = norm(_q);
  const isCalc = q.section === '問2' || q.section === '問２';
  const choiceKeys = Object.keys(q.choices);
  let html = '';
  if (q.section) html += '<div class="section-badge">'+q.section+'</div>';
  html += '<div class="qtitle">'+q.label+'（'+q.points+'点）</div>';
  if (q.invalid) html += '<div class="calc-note" style="background:#fff5f5;border-color:#fca5a5;color:#dc2626">⚠️ この問題は試験では無効問題でした（採点対象外）</div>';
  if (q.freeAnswer) html += '<div class="calc-note" style="background:#eff6ff;border-color:#93c5fd;color:#1d4ed8">📝 記述問題 — 計算して答えを確認してください（採点対象外）</div>';
  if (q.multi) html += '<div class="calc-note" style="background:#fff7ed;border-color:#fdba74;color:#c2410c">☑️ 複数選択問題（採点対象外）</div>';
  if (isCalc && !q.freeAnswer) html += '<div class="calc-note">📝 計算問題 — 電卓使用可</div>';
  if(typeof figures!=='undefined'&&figures[q.no])html+='<div class="qfig" style="margin:10px 0;padding:6px;background:#f0f7ff;border-radius:8px;text-align:center">'+figures[q.no]+'</div>';
    html += '<div class="qstem">'+q.stem.replace(/\n/g,'<br>')+'</div>';
  if (q.freeAnswer) {
    html += '<div style="background:#eff6ff;border:1px solid #93c5fd;border-radius:10px;padding:12px;margin-top:10px">';
    html += '<div style="font-weight:700;color:#1d4ed8;margin-bottom:6px">正解：'+q.answer+'</div>';
    if (q.explanation) html += '<div style="color:#333;font-size:14px;line-height:1.6">'+q.explanation.replace(/\n/g,'<br>')+'</div>';
    html += '</div>';
  } else {
    html += '<div class="choices">';
    choiceKeys.forEach(function(c) {
      if (!q.choices[c]) return;
      const sel = ans[q.no] === c ? ' selected' : '';
      html += '<button class="choice'+sel+'" onclick="selectAns('+q.no+',\'' + c + '\')"><span class="label">'+c+'</span><span>'+q.choices[c]+'</span></button>';
    });
    html += '</div>';
  }
  document.getElementById('quiz').innerHTML = html;
  document.getElementById('nextBtn').textContent = idx === totalQ - 1 ? '採点する ✓' : '次へ ▶';
  updateProg();
  window.scrollTo(0, 0);
}

function selectAns(no, c) { ans[no] = c; updateProg(); render(); }
function prevQ() { if (idx > 0) { idx--; render(); } }
function nextQ() { if (idx < totalQ - 1) { idx++; render(); } else { showResult(); } }

function showResult() {
  let score = 0, max = 0;
  const norms = questions.map(norm);
  norms.forEach(function(q) {
    if (q.invalid || q.freeAnswer || q.multi) return;
    max += q.points;
    if (ans[q.no] === q.answer) score += q.points;
  });
  let html = '<div class="result"><h2>📊 採点結果</h2><div class="score-big">'+score+' / '+max+' 点</div>';
  const sections = {}, secOrder = [];
  norms.forEach(function(q) {
    if (q.invalid || q.freeAnswer || q.multi) return;
    if (!sections[q.section]) { sections[q.section] = {score:0,max:0}; secOrder.push(q.section); }
    sections[q.section].max += q.points;
    if (ans[q.no] === q.answer) sections[q.section].score += q.points;
  });
  const vs = secOrder.filter(function(s) { return s; });
  if (vs.length > 0) {
    let sh = '<p style="font-size:14px;color:#555">';
    vs.forEach(function(s) { sh += s+'：'+sections[s].score+'/'+sections[s].max+'点　'; });
    html += sh + '</p>';
  }
  let hasMiss = false;
  html += '<h3 style="margin:16px 0 8px;font-size:15px;color:#333">📝 全問解説</h3>';
  norms.forEach(function(q) {
    if (q.invalid) {
      html += '<div style="border-left:5px solid #d1d5db;background:#f9fafb;padding:12px;margin:8px 0;border-radius:8px;line-height:1.6;font-size:14px">';
      html += '<div style="font-weight:700;font-size:15px;margin-bottom:4px;color:#6b7280">'+q.label+' ⚠️ 無効問題（採点対象外）</div>';
      if (q.explanation) html += '<div style="color:#333;margin-top:4px">'+q.explanation.replace(/\n/g,'<br>')+'</div>';
      html += '</div>';
      return;
    }
    if (q.freeAnswer) {
      html += '<div style="border-left:5px solid #93c5fd;background:#eff6ff;padding:12px;margin:8px 0;border-radius:8px;line-height:1.6;font-size:14px">';
      html += '<div style="font-weight:700;font-size:15px;margin-bottom:4px;color:#1d4ed8">'+q.label+' 📝 記述問題（採点対象外）</div>';
      html += '<div style="color:#1d4ed8;font-weight:700;margin-bottom:4px">正解：'+q.answer+'</div>';
      if (q.explanation) html += '<div style="color:#333;margin-top:4px">'+q.explanation.replace(/\n/g,'<br>')+'</div>';
      html += '</div>';
      return;
    }
    if (q.multi) {
      html += '<div style="border-left:5px solid #fdba74;background:#fff7ed;padding:12px;margin:8px 0;border-radius:8px;line-height:1.6;font-size:14px">';
      html += '<div style="font-weight:700;font-size:15px;margin-bottom:4px;color:#c2410c">'+q.label+' ☑️ 複数選択（採点対象外）</div>';
      html += '<div style="color:#c2410c;font-weight:700;margin-bottom:4px">正解：'+q.answer+'</div>';
      if (q.explanation) html += '<div style="color:#333;margin-top:4px">'+q.explanation.replace(/\n/g,'<br>')+'</div>';
      html += '</div>';
      return;
    }
    const wrong = ans[q.no] !== q.answer;
    if (wrong) hasMiss = true;
    const bc = wrong ? '#dc2626' : '#d1d5db';
    const bg = wrong ? '#fff5f5' : '#fff';
    const correctText = q.choices[q.answer] || '';
    html += '<div style="border-left:5px solid '+bc+';background:'+bg+';padding:12px;margin:8px 0;border-radius:8px;line-height:1.6;font-size:14px">';
    html += '<div style="font-weight:700;font-size:15px;margin-bottom:4px;color:'+(wrong?'#dc2626':'#111')+'">'+q.label+(wrong?' ❌':' ✅')+'</div>';
    if (wrong) {
      const myText = q.choices[ans[q.no]] || '';
      html += '<div style="color:#dc2626;font-weight:700;margin-bottom:2px">あなたの答え：'+(ans[q.no]||'未回答')+(myText ? '　'+myText : '')+'</div>';
      html += '<div style="color:#16a34a;font-weight:700;margin-bottom:4px">正解：'+q.answer+(correctText ? '　'+correctText : '')+'</div>';
    } else {
      html += '<div style="color:#16a34a;font-weight:700;margin-bottom:4px">正解：'+q.answer+(correctText ? '　'+correctText : '')+'</div>';
    }
    if (q.explanation) html += '<div style="color:#333;margin-top:4px">'+q.explanation.replace(/\n/g,'<br>')+'</div>';
    html += '</div>';
  });
  if (!hasMiss) html += '<p style="font-size:18px;font-weight:900;color:#16a34a">🎉 全問正解です！</p>';
  html += '<div class="actions"><button onclick="reviewMistakes()" style="padding:14px;border:none;border-radius:12px;background:#dc2626;color:#fff;font-size:16px;font-weight:700;cursor:pointer">間違えた問題を復習</button><button onclick="resetQuiz()" style="padding:14px;border:none;border-radius:12px;background:#6b7280;color:#fff;font-size:16px;font-weight:700;cursor:pointer">最初からやり直す</button></div></div>';
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('nav').style.display = 'none';
  const r = document.getElementById('result');
  r.style.display = 'block';
  html += '<a href="./index.html" style="display:block;text-align:center;margin-top:16px;padding:12px;background:#1e3a5f;color:white;border-radius:10px;text-decoration:none;font-weight:700;font-size:.95rem">🏠 ホームへ戻る</a>';
  r.innerHTML = html;
  window.scrollTo(0, 0);
}

function reviewMistakes() {
  const norms = questions.map(norm);
  for (let i = 0; i < norms.length; i++) {
    const q = norms[i];
    if (q.invalid || q.freeAnswer || q.multi) continue;
    if (ans[q.no] !== q.answer) {
      idx = i;
      document.getElementById('quiz').style.display = 'block';
      document.getElementById('nav').style.display = 'flex';
      document.getElementById('result').style.display = 'none';
      render(); return;
    }
  }
}

function resetQuiz() {
  Object.keys(ans).forEach(function(k) { delete ans[k]; });
  idx = 0;
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('nav').style.display = 'flex';
  document.getElementById('result').style.display = 'none';
  render();
}

render();
</script>

<script src="./firebase-config.js"></script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, deleteDoc, collection, getDocs, serverTimestamp, increment } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const SOURCE_KEY = document.title.replace(/[\s　]/g, '_').replace(/[^\w\u3040-\u9FFF]/g, '');

try {
  const app = initializeApp(FIREBASE_CONFIG);
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, async user => {
    // ログインバッジ表示
    const badge = document.getElementById('fb-login-badge');
    if (badge) {
      if (user) {
        const name = user.displayName || user.email.split('@')[0];
        badge.innerHTML = `<a href="./index.html" style="font-size:.72rem;background:rgba(255,255,255,.2);color:white;padding:3px 8px;border-radius:999px;text-decoration:none">👤 ${name}</a>`;
        // 間違い問題を読み込む
        try {
          const snap = await getDocs(collection(db, 'users', user.uid, 'wrongAnswers'));
          snap.forEach(d => { window._wrongKeys = window._wrongKeys || new Set(); window._wrongKeys.add(d.id); });
        } catch(e) {}
      } else {
        badge.innerHTML = `<a href="./login.html" style="font-size:.72rem;background:rgba(255,255,255,.15);color:white;padding:3px 10px;border-radius:999px;text-decoration:none">ログイン</a>`;
      }
    }
    window._fbUser = user;
    window._fbDb = db;
    window._fbSrc = SOURCE_KEY;
    // users/{uid}ドキュメントを作成（管理者ページで一覧表示するため）
    try {
      const { doc, setDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
      setDoc(doc(db,'users',user.uid),{email:user.email,displayName:user.displayName||user.email.split('@')[0],lastLogin:new Date().toISOString()},{merge:true}).catch(()=>{});
    } catch(e){}
  });

  // selectAns をラップして答え記録
  const _orig = window.selectAns;
  window.selectAns = function(no, choice) {
    _orig(no, choice);
    const user = window._fbUser;
    const db = window._fbDb;
    if (!user || !db) return;
    const q = questions.find(q2 => q2.no === no);
    if (!q) return;
    const isCorrect = choice === q.answer;
    const key = window._fbSrc + '_q' + no;
    if (isCorrect) {
      deleteDoc(doc(db, 'users', user.uid, 'wrongAnswers', key)).catch(()=>{});
    } else {
      setDoc(doc(db, 'users', user.uid, 'wrongAnswers', key), {
        source: window._fbSrc, qNo: no, label: q.label || ('Q'+no),
        stem: (q.stem||'').substring(0,120), timestamp: serverTimestamp()
      }, {merge:true}).catch(()=>{});
      setDoc(doc(db, 'users', user.uid, 'wrongHistory', key), {
        source: window._fbSrc, qNo: no, label: q.label || ('Q'+no),
        stem: (q.stem||'').substring(0,120), firstWrong: serverTimestamp()
      }, {merge:true}).catch(()=>{});
    }
  };

  // showResult をラップして受験記録
  const _origResult = window.showResult;
  window.showResult = function() {
    _origResult();
    const user = window._fbUser;
    const db = window._fbDb;
    if (!user || !db) return;
    const norms = questions.filter(q => !q.invalid && !q.freeAnswer && !q.multi);
    let correct = 0, total = 0;
    norms.forEach(q => {
      total += q.points || 3;
      if (ans[q.no] === q.answer) correct += q.points || 3;
    });
    setDoc(doc(db, 'users', user.uid, 'stats', window._fbSrc), {
      source: window._fbSrc, lastCorrect: correct, lastTotal: total,
      lastDate: serverTimestamp(), totalAttempts: increment(1)
    }, {merge:true}).catch(()=>{});
  };
} catch(e) { console.warn('Firebase:', e.message); }
</script>
