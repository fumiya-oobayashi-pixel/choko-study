<!DOCTYPE html>
<html lang="ja">

<title>ちょこスタ マイページ</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f1f5f9;font-family:'Hiragino Sans','Meiryo',sans-serif;color:#1e293b;min-height:100vh}
header{background:linear-gradient(135deg,#1e3a5f,#2d5a8e);color:white;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:1.1rem;font-weight:900}
.home-btn{padding:6px 14px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:white;border-radius:8px;text-decoration:none;font-size:.8rem;font-weight:700}
main{max-width:900px;margin:0 auto;padding:16px}
.card{background:white;border-radius:14px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:14px}
.card h2{font-size:.95rem;font-weight:700;color:#1e3a5f;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #e2e8f0;display:flex;align-items:center;gap:6px}
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.stat-box{background:#f8fafc;border-radius:10px;padding:14px;text-align:center}
.stat-num{font-size:1.8rem;font-weight:900;color:#1e3a5f}
.stat-label{font-size:.75rem;color:#64748b;margin-top:2px}
.stat-num.red{color:#dc2626}
.stat-num.green{color:#059669}
.chart-wrap{position:relative;max-width:520px;margin:0 auto}
.tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:6px 14px;border:2px solid #e2e8f0;border-radius:20px;font-size:.8rem;font-weight:700;cursor:pointer;background:white;color:#64748b;font-family:inherit;transition:.15s}
.tab.active{border-color:#1e3a5f;background:#eff6ff;color:#1e3a5f}
.folder-tabs{display:flex;gap:0;margin-bottom:12px;border-radius:10px;overflow:hidden;border:2px solid #e2e8f0}
.folder-tab{flex:1;padding:10px;border:none;font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit;background:white;color:#64748b;transition:.15s}
.folder-tab.active.review{background:#fef3c7;color:#b45309;border-bottom:3px solid #f59e0b}
.folder-tab.active.history{background:#fdf2f8;color:#7e22ce;border-bottom:3px solid #9333ea}
.wrong-list{display:flex;flex-direction:column;gap:6px;max-height:400px;overflow-y:auto}
.wrong-item{border-radius:8px;padding:10px 12px;cursor:pointer;transition:.12s}
.wrong-item.review{background:#fff5f5;border:1px solid #fecaca}
.wrong-item.review:hover{background:#fee2e2;border-color:#f87171}
.wrong-item.history{background:#faf5ff;border:1px solid #e9d5ff;cursor:default}
.wi-label{font-size:.75rem;font-weight:700;margin-bottom:2px;display:flex;justify-content:space-between;align-items:center}
.wi-label.review{color:#dc2626}
.wi-label.history{color:#7e22ce}
.wi-go{font-size:.7rem;background:#1e3a5f;color:white;padding:2px 7px;border-radius:999px}
.wi-stem{font-size:.85rem;color:#374151;line-height:1.5}
.wi-src{font-size:.7rem;color:#64748b;margin-top:3px}
.perf-list{display:flex;flex-direction:column;gap:6px}
.perf-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#f8fafc;border-radius:8px}
.perf-source{font-size:.82rem;font-weight:700;flex:1;color:#1e293b}
.perf-bar-wrap{width:140px;background:#e2e8f0;border-radius:999px;height:8px;overflow:hidden}
.perf-bar{height:100%;border-radius:999px;transition:width .3s}
.perf-pct{font-size:.78rem;font-weight:700;min-width:38px;text-align:right}
.empty{text-align:center;color:#94a3b8;padding:24px;font-size:.9rem}
.loading{text-align:center;color:#64748b;padding:24px}
.no-login{text-align:center;padding:60px 20px}
.no-login .icon{font-size:3rem;margin-bottom:12px}
.main-tabs{display:flex;gap:0;margin-bottom:16px;border-radius:12px;overflow:hidden;border:2px solid #1e3a5f;background:#1e3a5f}
.main-tab{flex:1;padding:12px;border:none;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;color:rgba(255,255,255,.6);background:transparent;transition:.15s}
.main-tab.active{background:white;color:#1e3a5f}

.weak-item{background:#fff5f5;border-left:4px solid #dc2626;border-radius:8px;padding:12px 14px;margin-bottom:10px}
.weak-item.ok{background:#f0fdf4;border-left-color:#16a34a}
.weak-item.mid{background:#fffbeb;border-left-color:#f59e0b}
.weak-cat{font-weight:700;font-size:.95rem;margin-bottom:4px}
.weak-bar-wrap{height:8px;background:#e5e7eb;border-radius:999px;margin:4px 0 6px;overflow:hidden}
.weak-bar{height:100%;border-radius:999px;transition:width .4s}
.weak-advice{font-size:.78rem;color:#374151;line-height:1.6;margin-top:6px}
.weak-ref{font-size:.72rem;color:#6b7280;margin-top:4px}
.weak-el-cats{margin-top:6px;display:flex;flex-wrap:wrap;gap:4px}
.weak-el-tag{font-size:.68rem;background:#fee2e2;color:#dc2626;padding:2px 7px;border-radius:999px;font-weight:700}
</style>
</head>

<header>
<h1>📊 マイページ</h1>
<a href="./index.html" class="home-btn">🏠 ホーム</a>
</header>

<main>
<div class="loading" id="loading">読み込み中...</div>
<div id="no-login" class="no-login" style="display:none">
<div class="icon">🔒</div>
<div style="font-weight:700;font-size:1.1rem;margin-bottom:8px">ログインが必要です</div>
<a href="./login.html" style="display:inline-block;margin-top:12px;padding:10px 24px;background:#1e3a5f;color:white;border-radius:10px;text-decoration:none;font-weight:700">ログインする</a>
</div>
<div id="content" style="display:none">

<div class="main-tabs">
<button class="main-tab active" onclick="switchMainTab('service')">🔧 サービス編</button>
<button class="main-tab" onclick="switchMainTab('parts')">⚙️ 部品編</button>
</div>

<div id="service-section">

<div class="card">
<h2>📈 あなたの記録</h2>
<div class="stats-row">
<div class="stat-box"><div class="stat-num" id="total-attempts">0</div><div class="stat-label">総受験回数</div></div>
<div class="stat-box"><div class="stat-num red" id="wrong-count">0</div><div class="stat-label">復習フォルダ</div></div>
<div class="stat-box"><div class="stat-num" style="color:#7e22ce" id="history-count">0</div><div class="stat-label">全履歴フォルダ</div></div>
<div class="stat-box"><div class="stat-num green" id="total-q">0</div><div class="stat-label">累計解答問数</div></div>
</div>
</div>

<div class="card">
<h2>📉 カテゴリ別 正答率</h2>
<div class="tabs">
<button class="tab active" onclick="showChart(this,'mech')">🔧 メカニック</button>
<button class="tab" onclick="showChart(this,'front')">🪟 フロント</button>
<button class="tab" onclick="showChart(this,'shingatasha')">🚌 新型車</button>
</div>
<div class="chart-wrap"><canvas id="radarChart"></canvas></div>
</div>


<div class="card">
<h2>🎯 苦手分野分析</h2>
<div id="weakness-section"><div class="empty">問題を解くとデータが反映されます</div></div>
</div>

<div class="card">
<h2>📋 試験別 詳細</h2>
<div class="perf-list" id="perf-list"></div>
</div>

<div class="card">
<h2>📁 間違い問題フォルダ</h2>
<div class="folder-tabs">
<button class="folder-tab review active" onclick="showFolder(this,'review','svc')">🔄 復習フォルダ（正解で消える）<span id="review-badge"></span></button>
<button class="folder-tab history" onclick="showFolder(this,'history','svc')">📚 全履歴フォルダ（永久記録）<span id="history-badge"></span></button>
</div>
<div id="svc-folder-review">
<div class="wrong-list" id="wrong-list-review"><div class="empty">間違い問題なし！</div></div>
</div>
<div id="svc-folder-history" style="display:none">
<div class="wrong-list" id="wrong-list-history"><div class="empty">履歴なし</div></div>
</div>
</div>

</div><!-- /service-section -->

<div id="parts-section" style="display:none">

<div class="card">
<h2>📈 あなたの記録（部品編）</h2>
<div class="stats-row">
<div class="stat-box"><div class="stat-num" id="p-total-attempts">0</div><div class="stat-label">総受験回数</div></div>
<div class="stat-box"><div class="stat-num red" id="p-wrong-count">0</div><div class="stat-label">復習フォルダ</div></div>
<div class="stat-box"><div class="stat-num" style="color:#7e22ce" id="p-history-count">0</div><div class="stat-label">全履歴フォルダ</div></div>
<div class="stat-box"><div class="stat-num green" id="p-total-q">0</div><div class="stat-label">累計解答問数</div></div>
</div>
</div>

<div class="card">
<h2>📋 試験別 詳細（部品編）</h2>
<div class="perf-list" id="p-perf-list"></div>
</div>

<div class="card">
<h2>📁 間違い問題フォルダ（部品編）</h2>
<div class="folder-tabs">
<button class="folder-tab review active" onclick="showFolder(this,'review','parts')">🔄 復習フォルダ（正解で消える）<span id="p-review-badge"></span></button>
<button class="folder-tab history" onclick="showFolder(this,'history','parts')">📚 全履歴フォルダ（永久記録）<span id="p-history-badge"></span></button>
</div>
<div id="parts-folder-review">
<div class="wrong-list" id="p-wrong-list-review"><div class="empty">間違い問題なし！</div></div>
</div>
<div id="parts-folder-history" style="display:none">
<div class="wrong-list" id="p-wrong-list-history"><div class="empty">履歴なし</div></div>
</div>
</div>

</div><!-- /parts-section -->

</div>
</main>

    document.getElementById('loading').innerHTML='接続エラーが発生しました。<br><button onclick="location.reload()" style="margin-top:12px;padding:8px 20px;background:#3b82f6;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px">🔄 再読み込み</button>';
  }
},10000);

onAuthStateChanged(auth, async user => {
clearTimeout(_loadTimeout);
document.getElementById('loading').style.display='none';
if(!user){document.getElementById('no-login').style.display='block';return;}
document.getElementById('content').style.display='block';
const parse = s => (s.docs||[]).map(d=>({id:d.id,...d.data()}));
const snaps = await Promise.all([
  getDocs(collection(db,'users',user.uid,'wrongAnswers')),
  getDocs(collection(db,'users',user.uid,'wrongHistory')),
  getDocs(collection(db,'users',user.uid,'stats')),
  getDocs(collection(db,'users',user.uid,'catStats')),
  getDocs(collection(db,'users',user.uid,'partsWrongAnswers')).catch(()=>({docs:[]})),
  getDocs(collection(db,'users',user.uid,'partsWrongHistory')).catch(()=>({docs:[]})),
  getDocs(collection(db,'users',user.uid,'partsStats')).catch(()=>({docs:[]})),
  getDocs(collection(db,'users',user.uid,'partsCatStats')).catch(()=>({docs:[]})),
]).catch(()=>Array(8).fill({docs:[]}));
[allWrong,allHistory,allStats,allCatStats,partsWrong,partsHistory,partsStats,partsCatStats] = snaps.map(parse);
renderService();
renderParts();
});

function renderService(){
const tot=allStats.reduce((s,x)=>s+(x.totalAttempts||0),0);
const totalQ=allCatStats.reduce((s,x)=>s+(x.total||0),0);
document.getElementById('total-attempts').textContent=tot;
document.getElementById('wrong-count').textContent=allWrong.length;
document.getElementById('history-count').textContent=allHistory.length;
document.getElementById('total-q').textContent=totalQ;
document.getElementById('review-badge').textContent=' ('+allWrong.length+'問)';
document.getElementById('history-badge').textContent=' ('+allHistory.length+'問)';
renderWrongList('wrong-list-review',allWrong,'review','mech',false);
renderWrongList('wrong-list-history',allHistory,'history','mech',false);
renderPerfList(allStats,'perf-list','mech');
showChartData('mech');
renderWeaknessAnalysis();
}

const _reviewQueues={};

function renderWrongList(elId,list,type,tabType,isParts){
const el=document.getElementById(elId);
let filtered=list;
if(!isParts){
if(tabType==='front') filtered=list.filter(w=>isFrontSource(w.source||w.id||''));
else if(tabType==='mech') filtered=list.filter(w=>isMechSource(w.source||w.id||''));
else if(tabType==='shingatasha') filtered=list.filter(w=>isShingataShaSource(w.source||w.id||''));
}
if(!filtered.length){el.innerHTML='<div class="empty">'+(type==='review'?'✅ 間違い問題なし！':'まだ履歴なし')+'</div>';return;}
const sorted=[...filtered].sort((a,b)=>(b.timestamp?.seconds||b.firstWrong?.seconds||0)-(a.timestamp?.seconds||a.firstWrong?.seconds||0));
if(type==='review'){_reviewQueues[elId]=sorted.map(w=>{const b=isParts?(w.url||null):(w.url||(w.source&&SOURCE_TO_URL[w.source])||null);return b?`${b}?q=${w.qNo}`:null;});}
el.innerHTML=sorted.map((w,i)=>{
const baseUrl=isParts?(w.url||null):(w.url||(w.source&&SOURCE_TO_URL[w.source])||null);
const href=baseUrl?`${baseUrl}?q=${w.qNo}`:'#';
const isLink=type==='review'&&!!baseUrl;
const tag=isLink?`<a href="${href}" onclick="_startReview('${elId}',${i},'${baseUrl}')" style="display:block;text-decoration:none;color:inherit">`:'<div>';
const endTag=isLink?'</a>':'</div>';
return `${tag}<div class="wrong-item ${type}" style="${isLink?'':'cursor:default'}">
<div class="wi-label ${type}"><span>${type==='review'?'❌':'📚'} ${w.label||'Q'+w.qNo}</span>${isLink?'<span class="wi-go">▶ 問題へ</span>':''}</div>
<div class="wi-stem">${w.stem||''}</div>
<div class="wi-src">📁 ${(w.source||'').replace(/_/g,' ')}</div>
</div>${endTag}`;
}).join('');
}

window._startReview=function(elId,clickedIdx,filterUrl){
const all=_reviewQueues[elId]||[];
let queue,total;
if(filterUrl){const sameFile=all.filter(u=>u&&u.split('?')[0]===filterUrl);const clicked=all[clickedIdx];const pos=sameFile.indexOf(clicked);queue=pos>=0?sameFile.slice(pos+1):[];total=sameFile.length;}
else{queue=all.slice(clickedIdx+1).filter(Boolean);total=all.filter(Boolean).length;}
sessionStorage.setItem('reviewQueue',JSON.stringify(queue));
sessionStorage.setItem('reviewTotal',String(total));
}

function isMechSource(src){return /メカニック|エンジニア|新人|HS/.test(src);}
function isFrontSource(src){return !isMechSource(src)&&/HF|フロント|48回|49回/.test(src);}
function isShingataShaSource(src){return /新型車/.test(src);}

// list:対象データ配列, elId:描画先ID, type:フィルタ種別(''=全件)
function renderPerfList(list,elId,type){
const el=document.getElementById(elId);
if(!list.length){el.innerHTML='<div class="empty">受験データなし</div>';return;}
let filtered=list;
if(type==='front') filtered=list.filter(s=>isFrontSource(s.source||s.id));
else if(type==='mech') filtered=list.filter(s=>isMechSource(s.source||s.id));
else if(type==='shingatasha') filtered=list.filter(s=>isShingataShaSource(s.source||s.id));
if(!filtered.length){el.innerHTML='<div class="empty">受験データなし</div>';return;}
const sorted=[...filtered].sort((a,b)=>(b.lastDate?.seconds||0)-(a.lastDate?.seconds||0));
el.innerHTML=sorted.map(s=>{
const pct=s.lastTotal?Math.round(s.lastCorrect/s.lastTotal*100):0;
const color=pct>=70?'#059669':pct>=50?'#f59e0b':'#dc2626';
return `<div class="perf-item"><div class="perf-source">${(s.source||s.id).replace(/_/g,' ')}</div><div class="perf-bar-wrap"><div class="perf-bar" style="width:${pct}%;background:${color}"></div></div><div class="perf-pct" style="color:${color}">${pct}%</div></div>`;
}).join('');
}

window.showChart=function(btn,type){
document.querySelectorAll('#service-section .tab').forEach(t=>t.classList.remove('active'));
btn.classList.add('active');
showChartData(type);
};

function showChartData(type){
if(radarChart){radarChart.destroy();radarChart=null;}
const wrap=document.querySelector('#service-section .chart-wrap');
if(!wrap) return;
const cats=type==='mech'?MECH_CATS:type==='front'?FRONT_CATS:SHINGATASHA_CATS;
const catMap={};
allCatStats.forEach(c=>{catMap[c.id]=c; catMap[c.id.replace(/_/g,'/')]=c;});
const hasData=cats.some(c=>catMap[c]&&catMap[c].total>0);
renderPerfList(allStats,'perf-list',type);
const srcFilter=type==='front'?isFrontSource:type==='shingatasha'?isShingataShaSource:isMechSource;
const fw=allWrong.filter(w=>srcFilter(w.source||w.id||''));
const fh=allHistory.filter(w=>srcFilter(w.source||w.id||''));
renderWrongList('wrong-list-review',fw,'review',type,false);
renderWrongList('wrong-list-history',fh,'history',type,false);
renderWeaknessAnalysis();
document.getElementById('review-badge').textContent=' ('+fw.length+'問)';
document.getElementById('history-badge').textContent=' ('+fh.length+'問)';
if(!hasData){wrap.innerHTML='<div class="empty">まだデータなし<br><small>問題を解くと反映されます</small></div>';return;}
if(!document.getElementById('radarChart')){const c=document.createElement('canvas');c.id='radarChart';wrap.innerHTML='';wrap.appendChild(c);}
const data=cats.map(c=>{const d=catMap[c];return d&&d.total>0?Math.round(d.correct/d.total*100):0;});
radarChart=new Chart(document.getElementById('radarChart'),{type:'radar',data:{labels:cats,datasets:[{label:'正答率(%)',data:data,backgroundColor:'rgba(30,58,95,.15)',borderColor:'#1e3a5f',pointBackgroundColor:'#1e3a5f',borderWidth:2}]},options:{responsive:true,scales:{r:{min:0,max:100,ticks:{stepSize:20,font:{size:10}},pointLabels:{font:{size:11}}}},plugins:{legend:{display:false}}}});
}

function renderWeaknessAnalysis(){
const el=document.getElementById('weakness-section');
if(!el) return;
const catStatMap={};
allCatStats.forEach(c=>{catStatMap[c.id]=c;});
// e-learning wrongAnswers をcatで集計
const elWrongOrigCount={};
const elWrongMappedCats={};
allWrong.filter(w=>w.cat).forEach(w=>{
  const mapped=EL_DISPLAY_CAT[w.cat]||w.cat;
  elWrongOrigCount[w.cat]=(elWrongOrigCount[w.cat]||0)+1;
  if(!elWrongMappedCats[mapped]) elWrongMappedCats[mapped]=[];
  if(!elWrongMappedCats[mapped].includes(w.cat)) elWrongMappedCats[mapped].push(w.cat);
});
const cats=MECH_CATS.map(cat=>{
  const s=catStatMap[cat];
  const total=s?(s.total||0):0;
  const correct=s?(s.correct||0):0;
  const pct=total>0?Math.round(correct/total*100):null;
  const elCats=elWrongMappedCats[cat]||[];
  const elCount=elCats.reduce((sum,oc)=>sum+(elWrongOrigCount[oc]||0),0);
  return {cat,total,correct,pct,elCats,elCount};
}).filter(x=>x.total>0||x.elCount>0);
if(!cats.length){
  el.innerHTML='<div class="empty">問題を解くとデータが反映されます</div>';return;
}
cats.sort((a,b)=>{
  const pa=a.pct!==null?a.pct:(a.elCount>0?0:100);
  const pb=b.pct!==null?b.pct:(b.elCount>0?0:100);
  return pa-pb;
});
el.innerHTML=cats.map(x=>{
  const pct=x.pct;
  const color=pct===null?'#94a3b8':pct>=70?'#16a34a':pct>=50?'#f59e0b':'#dc2626';
  const cls=pct===null?'':(pct>=70?'ok':pct>=50?'mid':'');
  const adv=ADVICE_MAP[x.cat];
  const icon=pct===null?'⬜':pct>=70?'✅':pct>=50?'⚠️':'❌';
  const elTags=x.elCats.map(oc=>`<span class="weak-el-tag">${oc} ×${elWrongOrigCount[oc]||0}</span>`).join('');
  const refsHtml=adv?adv.refs.map(r=>`📖 ${r.label} <strong>${r.page}</strong>`).join('　／　'):'';
  const showAdvice=adv&&(x.elCount>0||(pct!==null&&pct<70));
  return `<div class="weak-item ${cls}">
<div class="weak-cat" style="color:${color}">${icon} ${x.cat}${pct!==null?` <span style="font-size:.8rem;font-weight:400;color:#64748b">${x.correct}/${x.total}問正解 (${pct}%)</span>`:''}${x.elCount>0?` <span style="font-size:.72rem;background:#fee2e2;color:#dc2626;padding:1px 7px;border-radius:999px;margin-left:4px">e-learning 間違い${x.elCount}問</span>`:''}</div>
${pct!==null?`<div class="weak-bar-wrap"><div class="weak-bar" style="width:${pct}%;background:${color}"></div></div>`:''}
${x.elCats.length?`<div class="weak-el-cats">${elTags}</div>`:''}
${showAdvice?`<div class="weak-advice">💡 ${adv.advice}</div>`:''}
${showAdvice&&refsHtml?`<div class="weak-ref">📚 参考資料：${refsHtml}</div>`:''}
</div>`;
}).join('');
}
