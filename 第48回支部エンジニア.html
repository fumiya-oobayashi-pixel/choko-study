function norm(q) {
  if (q.o !== undefined && Array.isArray(q.o)) {
    var labs = q.o.length <= 3 ? L3 : q.o.length === 4 ? L4 : L5;
    var ch = {};
    q.o.forEach(function(v, i) { ch[labs[i]] = v; });
    return {no:q.n, section:q.s||'', label:(q.s||'問'+q.n), points:q.p, answer:labs[q.a], stem:q.q, choices:ch, explanation:q.exp||'', invalid:false, multi:false, freeAnswer:false};
  }
  if (q.opts !== undefined && Array.isArray(q.opts)) {
    var labs2 = q.labels || L4;
    var ch2 = {};
    q.opts.forEach(function(v, i) { if (labs2[i]) ch2[labs2[i]] = v; });
    var sec = q.section || q.s || '';
    var lbl = q.label || (sec ? sec + '(' + (q.no||q.n) + ')' : '問' + (q.no||q.n));
    var ansVal = Array.isArray(q.ans) ? q.ans.map(function(i){return labs2[i];}).join(',') : labs2[q.ans];
    return {no:q.no||q.n, section:sec, label:lbl, points:q.pts||q.points||1, answer:ansVal, stem:q.text||q.stem||q.q||'', choices:ch2, explanation:q.exp||q.explanation||'', invalid:false, multi:q.multi||false, freeAnswer:false, fig:q.fig||''};
  }
  return {no:q.no, section:q.section||q.s||'', label:q.label||('問'+q.no), points:q.points||q.pts||1, answer:q.answer, stem:q.stem||q.text||q.q||'', choices:q.choices||{}, explanation:q.explanation||q.exp||'', invalid:q.invalid||false, multi:false, freeAnswer:q.freeAnswer||false, fig:q.fig||''};
}

const totalQ = questions.length;
let idx = 0;
const ans = {};
var reviewMode = false, reviewList = [], reviewPos = 0;

function updateProg() {
  const answered = Object.keys(ans).length;
  document.getElementById('barfill').style.width = (answered/totalQ*100)+'%';
  document.getElementById('prog').textContent = (idx+1)+' / '+totalQ+' 問  （回答済み '+answered+' 問）';
}

function checkFree() {
  const q = norm(questions[idx]);
  const input = document.getElementById('freeInput').value.trim();
  const result = document.getElementById('freeResult');
  const correct = String(q.answer).replace(/[,，　 ]/g,'');
  const inputClean = input.replace(/[,，　 ]/g,'');
  result.style.display = 'block';
  if (inputClean === correct || input === String(q.answer)) {
    result.style.background = '#f0fdf4';
    result.style.border = '1px solid #86efac';
    result.style.color = '#166534';
    result.innerHTML = '✅ 正解！ 正解：'+q.answer+(q.explanation?'<br><span style="font-size:13px;color:#333">'+q.explanation.replace(/\n/g,'<br>')+'</span>':'');
  } else {
    result.style.background = '#fef2f2';
    result.style.border = '1px solid #fca5a5';
    result.style.color = '#991b1b';
    result.innerHTML = '❌ 不正解 正解：'+q.answer+(q.explanation?'<br><span style="font-size:13px;color:#333">'+q.explanation.replace(/\n/g,'<br>')+'</span>':'');
  }
}

function render() {
  const _q = questions[idx];
  const q = norm(_q);
  const isCalc = q.section === '問2' || q.section === '問２';
  const choiceKeys = Object.keys(q.choices);
  let html = '';
  if (q.section) html += '<div class="section-badge">'+q.section+'</div>';
  html += '<div class="qtitle">'+q.label+'（'+q.points+'点）</div>';
  if (q.invalid) html += '<div class="calc-note" style="background:#fff5f5;border-color:#fca5a5;color:#dc2626">⚠️ この問題は試験では無効問題でした（採点対象外）</div>';
  if (q.freeAnswer) html += '<div class="calc-note" style="background:#eff6ff;border-color:#93c5fd;color:#1d4ed8">📝 記述問題 — 計算して答えを確認してください（採点対象外）</div>';
  if (q.multi) html += '<div class="calc-note" style="background:#fff7ed;border-color:#fdba74;color:#c2410c">☑️ 複数選択問題（採点対象外）</div>';
  if (isCalc && !q.freeAnswer) html += '<div class="calc-note">📝 計算問題 — 電卓使用可</div>';
  if (q.fig) html += '<div style="text-align:center;margin-bottom:12px">'+q.fig+'</div>';
  html += '<div class="qstem">'+q.stem.replace(/\n/g,'<br>')+'</div>';
  if (q.freeAnswer) {
    html += '<div style="margin-top:12px">';
    html += '<input type="text" id="freeInput" placeholder="答えを入力..." style="width:100%;padding:12px;font-size:16px;border:2px solid #93c5fd;border-radius:10px;box-sizing:border-box;margin-bottom:10px">';
    html += '<button onclick="checkFree()" style="width:100%;padding:12px;background:#3b82f6;color:#fff;font-size:16px;font-weight:700;border:none;border-radius:10px;cursor:pointer">答え合わせ</button>';
    html += '<div id="freeResult" style="display:none;margin-top:10px;padding:12px;border-radius:10px"></div>';
    html += '</div>';
  } else {
    html += '<div class="choices">';
    choiceKeys.forEach(function(c) {
      if (!q.choices[c]) return;
      const sel = ans[q.no] === c ? ' selected' : '';
      html += '<button class="choice'+sel+'" onclick="selectAns('+q.no+',\'' + c + '\')"><span class="label">'+c+'</span><span>'+q.choices[c]+'</span></button>';
    });
    html += '</div>';
  }
  document.getElementById('quiz').innerHTML = html;
  document.getElementById('nextBtn').textContent = idx === totalQ - 1 ? '採点する ✓' : '次へ ▶';
  updateProg();
  window.scrollTo(0, 0);
}

function selectAns(no, c) { ans[no] = c; updateProg(); render(); }
function prevQ() {
  if (reviewMode) {
    if (reviewPos > 0) { reviewPos--; idx = reviewList[reviewPos]; render(); _updateReviewBadge(); }
  } else {
    if (idx > 0) { idx--; render(); }
  }
}
function nextQ() {
  if (reviewMode) {
    if (reviewPos < reviewList.length - 1) { reviewPos++; idx = reviewList[reviewPos]; render(); _updateReviewBadge(); }
    else { reviewMode = false; reviewList = []; showResult(); }
  } else {
    if (idx < totalQ - 1) { idx++; render(); } else { showResult(); }
  }
}

function showResult() {
  let score = 0, max = 0;
  const norms = questions.map(norm);
  norms.forEach(function(q) {
    if (q.invalid || q.freeAnswer || q.multi) return;
    max += q.points;
    if (ans[q.no] === q.answer) score += q.points;
  });
  let html = '<div class="result"><h2>📊 採点結果</h2><div class="score-big">'+score+' / '+max+' 点</div>';
  const sections = {}, secOrder = [];
  norms.forEach(function(q) {
    if (q.invalid || q.freeAnswer || q.multi) return;
    if (!sections[q.section]) { sections[q.section] = {score:0,max:0}; secOrder.push(q.section); }
    sections[q.section].max += q.points;
    if (ans[q.no] === q.answer) sections[q.section].score += q.points;
  });
  const vs = secOrder.filter(function(s) { return s; });
  if (vs.length > 0) {
    let sh = '<p style="font-size:14px;color:#555">';
    vs.forEach(function(s) { sh += s+'：'+sections[s].score+'/'+sections[s].max+'点　'; });
    html += sh + '</p>';
  }
  let hasMiss = false;
  html += '<h3 style="margin:16px 0 8px;font-size:15px;color:#333">📝 全問解説</h3>';
  norms.forEach(function(q) {
    if (q.invalid) {
      html += '<div style="border-left:5px solid #d1d5db;background:#f9fafb;padding:12px;margin:8px 0;border-radius:8px;line-height:1.6;font-size:14px">';
      html += '<div style="font-weight:700;font-size:15px;margin-bottom:4px;color:#6b7280">'+q.label+' ⚠️ 無効問題（採点対象外）</div>';
      if (q.explanation) html += '<div style="color:#333;margin-top:4px">'+q.explanation.replace(/\n/g,'<br>')+'</div>';
      html += '</div>';
      return;
    }
    if (q.freeAnswer) {
      html += '<div style="border-left:5px solid #93c5fd;background:#eff6ff;padding:12px;margin:8px 0;border-radius:8px;line-height:1.6;font-size:14px">';
      html += '<div style="font-weight:700;font-size:15px;margin-bottom:4px;color:#1d4ed8">'+q.label+' 📝 記述問題（採点対象外）</div>';
      html += '<div style="color:#1d4ed8;font-weight:700;margin-bottom:4px">正解：'+q.answer+'</div>';
      if (q.explanation) html += '<div style="color:#333;margin-top:4px">'+q.explanation.replace(/\n/g,'<br>')+'</div>';
      html += '</div>';
      return;
    }
    if (q.multi) {
      html += '<div style="border-left:5px solid #fdba74;background:#fff7ed;padding:12px;margin:8px 0;border-radius:8px;line-height:1.6;font-size:14px">';
      html += '<div style="font-weight:700;font-size:15px;margin-bottom:4px;color:#c2410c">'+q.label+' ☑️ 複数選択（採点対象外）</div>';
      html += '<div style="color:#c2410c;font-weight:700;margin-bottom:4px">正解：'+q.answer+'</div>';
      if (q.explanation) html += '<div style="color:#333;margin-top:4px">'+q.explanation.replace(/\n/g,'<br>')+'</div>';
      html += '</div>';
      return;
    }
    const wrong = ans[q.no] !== q.answer;
    if (wrong) hasMiss = true;
    const bc = wrong ? '#dc2626' : '#d1d5db';
    const bg = wrong ? '#fff5f5' : '#fff';
    const correctText = q.choices[q.answer] || '';
    html += '<div style="border-left:5px solid '+bc+';background:'+bg+';padding:12px;margin:8px 0;border-radius:8px;line-height:1.6;font-size:14px">';
    html += '<div style="font-weight:700;font-size:15px;margin-bottom:4px;color:'+(wrong?'#dc2626':'#111')+'">'+q.label+(wrong?' ❌':' ✅')+'</div>';
    if (wrong) {
      const myText = q.choices[ans[q.no]] || '';
      html += '<div style="color:#dc2626;font-weight:700;margin-bottom:2px">あなたの答え：'+(ans[q.no]||'未回答')+(myText ? '　'+myText : '')+'</div>';
      html += '<div style="color:#16a34a;font-weight:700;margin-bottom:4px">正解：'+q.answer+(correctText ? '　'+correctText : '')+'</div>';
    } else {
      html += '<div style="color:#16a34a;font-weight:700;margin-bottom:4px">正解：'+q.answer+(correctText ? '　'+correctText : '')+'</div>';
    }
    if (q.explanation) html += '<div style="color:#333;margin-top:4px">'+q.explanation.replace(/\n/g,'<br>')+'</div>';
    html += '</div>';
  });
  if (!hasMiss) html += '<p style="font-size:18px;font-weight:900;color:#16a34a">🎉 全問正解です！</p>';
  html += '<div class="actions"><button onclick="reviewMistakes()" style="padding:14px;border:none;border-radius:12px;background:#dc2626;color:#fff;font-size:16px;font-weight:700;cursor:pointer">間違えた問題を復習</button><button onclick="resetQuiz()" style="padding:14px;border:none;border-radius:12px;background:#6b7280;color:#fff;font-size:16px;font-weight:700;cursor:pointer">最初からやり直す</button></div></div>';
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('nav').style.display = 'none';
  const r = document.getElementById('result');
  r.style.display = 'block';
  html += '<a href="./index.html" style="display:block;text-align:center;margin-top:16px;padding:12px;background:#1e3a5f;color:white;border-radius:10px;text-decoration:none;font-weight:700;font-size:.95rem">🏠 ホームへ戻る</a>';
  r.innerHTML = html;
  window.scrollTo(0, 0);
}

function reviewMistakes() {
  const norms = questions.map(norm);
  reviewList = [];
  for (let i = 0; i < norms.length; i++) {
    const q = norms[i];
    if (q.invalid || q.freeAnswer || q.multi) continue;
    const _L = q.labels || ['A','B','C','D'];
    const correct = q.answer !== undefined ? q.answer : _L[q.ans !== undefined ? q.ans : 0];
    if (ans[q.no] !== correct) reviewList.push(i);
  }
  if (!reviewList.length) return;
  reviewMode = true;
  reviewPos = 0;
  idx = reviewList[0];
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('nav').style.display = 'flex';
  document.getElementById('result').style.display = 'none';
  render();
  _updateReviewBadge();
}

function resetQuiz() {
  Object.keys(ans).forEach(function(k) { delete ans[k]; });
  idx = 0; reviewMode = false; reviewList = []; reviewPos = 0;
  var rb = document.getElementById('_review_badge'); if (rb) rb.remove();
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('nav').style.display = 'flex';
  document.getElementById('result').style.display = 'none';
  render();
}

render();

// ?q=N で特定問題から開始（復習モード）
(function(){
  var qParam = new URLSearchParams(location.search).get('q');
  if (!qParam || typeof questions === 'undefined' || typeof render !== 'function') return;
  var qi = questions.findIndex(function(x){ return x.no === parseInt(qParam); });
  if (qi < 0) return;
  idx = qi;
  render();

  // 復習モード: 答えたら即フィードバックオーバーレイ
  var _origSel = window.selectAns;
  window.selectAns = function(no, choice) {
    if (_origSel) _origSel(no, choice);
    var q = questions.find(function(x){ return x.no === no; });
    if (!q) return;
    var _L = q.labels || ['A','B','C','D'];
    var correctAns = q.answer !== undefined ? q.answer : _L[q.ans !== undefined ? q.ans : 0];
    var isCorrect = (choice === correctAns);
    _showReviewResult(q, isCorrect, correctAns);
    // Firebase: 復習モードでの正解削除・不正解登録
    (function(){
      var fbUser = window._fbUser;
      var fbDb = window._fbDb;
      var fbSrc = window._fbSrc;
      if (!fbUser || !fbDb || !fbSrc) return;
      import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js')
        .then(function(m) {
          var key = fbSrc + '_q' + no;
          if (isCorrect) {
            m.deleteDoc(m.doc(fbDb, 'users', fbUser.uid, 'wrongAnswers', key)).catch(function(){});
          } else {
            m.setDoc(m.doc(fbDb, 'users', fbUser.uid, 'wrongAnswers', key), {
              source: fbSrc, qNo: no, label: q.label||('Q'+no),
              stem: (q.stem||'').substring(0,120), timestamp: m.serverTimestamp(),
              url: window.location.pathname
            }, {merge:true}).catch(function(){});
          }
        });
    })();
  };

  function _showReviewResult(q, isCorrect, correctAns) {
    var old = document.getElementById('_review_overlay');
    if (old) old.remove();
    var isSpecial = q.freeAnswer || q.multi;
    var icon = isCorrect ? '✅' : (isSpecial ? '📝' : '❌');
    var msg  = isCorrect ? '正解！'  : (isSpecial ? '記述・複数選択問題' : '不正解');
    var col  = isCorrect ? '#059669' : (isSpecial ? '#1d4ed8' : '#dc2626');
    var ansHtml = (!isCorrect && !isSpecial)
      ? '<div style="margin:8px 0;font-size:.9rem;color:#1d4ed8;font-weight:700">正解: ' + correctAns + '</div>' : '';
    var expHtml = q.explanation
      ? '<div style="margin-top:12px;text-align:left;background:#f8fafc;border-radius:8px;padding:12px;font-size:.82rem;line-height:1.7;color:#374151;max-height:220px;overflow-y:auto">'
        + (q.explanation||'').replace(/\n/g,'<br>') + '</div>' : '';
    var ov = document.createElement('div');
    ov.id = '_review_overlay';
    ov.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.65);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;box-sizing:border-box';
    ov.innerHTML = '<div style="background:white;border-radius:16px;padding:24px;max-width:480px;width:100%;text-align:center;font-family:-apple-system,Meiryo,sans-serif">'
      + '<div style="font-size:2.4rem">' + icon + '</div>'
      + '<div style="font-size:1.25rem;font-weight:900;color:' + col + ';margin:8px 0">' + msg + '</div>'
      + ansHtml + expHtml
      + '<a href="./mypage.html" style="display:inline-block;margin-top:20px;padding:12px 28px;background:#1e3a5f;color:white;border-radius:10px;text-decoration:none;font-weight:700;font-size:.9rem">📁 マイページへ戻る</a>'
      + (function(){var _rq=JSON.parse(sessionStorage.getItem('reviewQueue')||'[]');var _rNext=_rq.length?_rq[0]:null;if(_rNext){_rq.shift();sessionStorage.setItem('reviewQueue',JSON.stringify(_rq));}var _rTotal=parseInt(sessionStorage.getItem('reviewTotal')||'0');var _rLeft=_rq.length;return _rNext?'<a href="'+_rNext+'" style="display:inline-block;margin-top:10px;margin-left:8px;padding:12px 28px;background:#059669;color:white;border-radius:10px;text-decoration:none;font-weight:700;font-size:.9rem">▶ 次の復習問題（残'+_rLeft+'問）</a>':'';})()
      + '<br><button onclick="document.getElementById(\'_review_overlay\').remove()" style="margin-top:10px;padding:8px 20px;background:transparent;border:1px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:.82rem;color:#64748b;font-family:inherit">✏️ 続けて解く</button>'
      + '</div>';
    document.body.appendChild(ov);
  }
})();
</script>

<script src="./firebase-config.js"></script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, deleteDoc, collection, getDocs, serverTimestamp, increment } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const SOURCE_KEY = document.title.replace(/[\s　]/g,'_').replace(/[^\w\u3040-\u9FFF]/g,'');

try {
  const app = initializeApp(FIREBASE_CONFIG);
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, async user => {
    const badge = document.getElementById('fb-login-badge');
    if (badge) {
      if (user) {
        const name = user.displayName || user.email.split('@')[0];
        badge.innerHTML = `<a href="./index.html" style="font-size:.72rem;background:rgba(255,255,255,.2);color:white;padding:3px 8px;border-radius:999px;text-decoration:none">👤 ${name}</a>`;
      } else {
        badge.innerHTML = `<a href="./login.html" style="font-size:.72rem;background:rgba(255,255,255,.15);color:white;padding:3px 10px;border-radius:999px;text-decoration:none">ログイン</a>`;
      }
    }
    window._fbUser = user;
    window._fbDb = db;
    window._fbSrc = SOURCE_KEY;
    // users/{uid}ドキュメントを作成（管理者ページで一覧表示するため）
    try {
      const { doc, setDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
      setDoc(doc(db,'users',user.uid),{email:user.email,displayName:user.displayName||user.email.split('@')[0],lastLogin:new Date().toISOString()},{merge:true}).catch(()=>{});
    } catch(e){}
  });

  const _orig = window.selectAns;
  if (typeof _orig === 'function') {
    window.selectAns = function(no, choice) {
      _orig(no, choice);
      const user = window._fbUser; const db = window._fbDb;
      if (!user || !db) return;
      const q = (typeof questions!=="undefined"?questions:[]).find(q2 => q2.no === no);
      if (!q) return;
      const isCorrect = choice === q.answer;
      const key = window._fbSrc + '_q' + no;
      if (isCorrect) {
        deleteDoc(doc(db,'users',user.uid,'wrongAnswers',key)).catch(()=>{});
      }

  const _origResult = window.showResult;
  if (typeof _origResult === 'function') {
    window.showResult = function() {
      _origResult();
      const user = window._fbUser; const db = window._fbDb;
      if (!user || !db) return;
      const norms = (typeof questions!=="undefined"?questions:[]).filter(q=>!q.invalid&&!q.freeAnswer&&!q.multi);
      const ansObj = (typeof ans!=="undefined"?ans:{});
      let correct=0,total=0;
      norms.forEach(q=>{
        total+=q.points||3;
        const _L2 = q.labels || ['A','B','C','D'];
        const correctAns = q.answer !== undefined ? q.answer : _L2[q.ans];
        const isCorrect2 = ansObj[q.no] === correctAns;
        if(isCorrect2) correct+=q.points||3;
        const key = window._fbSrc + '_q' + q.no;
        if(isCorrect2) {
          deleteDoc(doc(db,'users',user.uid,'wrongAnswers',key)).catch(()=>{});
        } else if(ansObj[q.no] !== undefined) {
          setDoc(doc(db,'users',user.uid,'wrongAnswers',key),{
            source:window._fbSrc,qNo:q.no,label:q.label||('Q'+q.no),
            stem:(q.text||q.stem||'').substring(0,120),timestamp:serverTimestamp(),
            url:window.location.pathname
          },{merge:true}).catch(()=>{});
          setDoc(doc(db,'users',user.uid,'wrongHistory',key),{
            source:window._fbSrc,qNo:q.no,label:q.label||('Q'+q.no),
            stem:(q.text||q.stem||'').substring(0,120),firstWrong:serverTimestamp(),
            url:window.location.pathname
          },{merge:true}).catch(()=>{});
        }
      });
      setDoc(doc(db,'users',user.uid,'stats',window._fbSrc),{
        source:window._fbSrc,lastCorrect:correct,lastTotal:total,
        lastDate:serverTimestamp(),totalAttempts:increment(1)
      },{merge:true}).catch(()=>{});
    };
  }
} catch(e){ console.warn('Firebase:',e.message); }
</script>

<script>
function _updateReviewBadge() {
  var nav = document.getElementById('nav');
  if (!nav || typeof reviewMode === 'undefined' || !reviewMode) return;
  var b = document.getElementById('_review_badge');
  if (!b) {
    b = document.createElement('div');
    b.id = '_review_badge';
    b.style.cssText = 'position:absolute;top:-28px;left:50%;transform:translateX(-50%);background:#dc2626;color:white;font-size:.75rem;font-weight:700;padding:3px 12px;border-radius:999px;white-space:nowrap';
    nav.style.position = 'relative';
    nav.appendChild(b);
  }
  b.textContent = '❌ 間違い問題 ' + (reviewPos+1) + ' / ' + reviewList.length;
}
</script>
