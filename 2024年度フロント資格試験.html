const L3=['A','B','C'];

const questions = [
{no:1,pts:2,labels:L4,text:"(1) 保証制度に関する記述として、不適切なものはどれか。",
opts:["保証修理は販売会社の収益、お客様の信頼の回復と維持、市場技術情報の収集という大きな役割を持っている。","補給部品の保証について、日野の保証書に記載する一般保証部品に準じ、販売会社の取り付け上に起因する不具合も保証範囲に含むものとする。","部品メーカーの保証対象と適用範囲について、バッテリーは製造日より６ヶ月間であり、タイヤについては各タイヤ製造メーカーの条件による保証とし、それぞれ代替品にて対応となる。","大型トラック／トラクター保証書について日野自動車が示す仕様(積載量、定員、速度、エンジン回転数等)の限度を超える使用に起因すると判定できる故障または破損については保証を適用しない。"],
ans:1,exp:"補給部品の保証において、販売会社の取り付け上に起因する不具合は保証範囲に含まない（含むとする記述が不適切）。"},
{no:2,pts:2,labels:L4,text:"(2) 保証制度に関する記述として、不適切なものはどれか。",
opts:["販売会社は、お客様より保証書に記載された期間と条件に適合する申し出を受けた場合は保証修理を断ることができない。","保証制度は約束によって成り立っており、お互いに約束（契約）を守って、正しく運用しなければならない。約束（契約）違反は信頼関係を損ない、重大問題に発展する。","日野自動車製品の取引等に関し、その基本的な事項について、販売会社と日野自動車の代表者間で契約を締結した契約書のことを「日野販売会社基本契約書」と言う。","日野自動車の保証制度は、販売会社・日野自動車がそれぞれの約束を結び、この約束によって成り立っている。"],
ans:3,exp:"日野自動車の保証制度は、お客様・販売会社・日野自動車の三者がそれぞれの約束を結び成り立っている。Dは「お客様」が抜けているため不適切。"},
{no:3,pts:2,labels:L4,text:"(3) 下請法の親事業者の義務や禁止事項、注意事項などに関する記述として、不適切なものはどれか。",
opts:["納入物受領後６０日を経過した日から実際に支払われた日までの期間について、年率１４．６％の遅延利息を支払わなければならない。","口頭発注によるトラブルを未然に防止するため、親事業者は発注に際して、「１１の法定事項」を満たした書面を直ちに下請事業者に発行しなければならない。","支払い期日になっても下請事業者から請求書が送られてこない場合でも支払いが遅れると違反になる恐れがある。","下請事業者に作業を依頼したが、翌日同じお客様、車両で追加作業が発生したので、交付済みの外注依頼書を訂正して追加依頼した。"],
ans:3,exp:"追加作業が発生した場合は、既存の外注依頼書を訂正するのではなく、追加分の外注依頼書を新たに発行しなければならない。"},
{no:4,pts:2,labels:L4,text:"(4) 外注依頼書の発行に関する記述として、適切なものはどれか。",
opts:["作業指示書発行後、外注作業が発生した場合は、作業指示書のコピーで対応出来る。","価格が決定しない場合、理由と確定予定日を明記し、決定後即時に補充書面を発行する。","納期は変わることがあるので、発注時は特に提示する必要はない。","外注依頼書（正）はフロントにて管理する。"],
ans:1,exp:"外注依頼書は必ず発行する。価格未定の場合は理由と確定予定日を明記し決定後即時に補充書面を発行する（B適切）。外注依頼書（正）は外注先に、（控）はフロントで管理する。"},
{no:5,pts:2,labels:L4,text:"(5) 見積書に関する記述として、不適切なものはどれか。",
opts:["分解しないと追加作業が発生するかどうかがわからないものに関しては、見積りの段階で概算の金額であることを伝える。","見積り段階でお客様に納期を明示する場合、整備時間を正確に把握して作業完了時期と納期を同じタイミングになるよう明示する必要がある。","見積りを正確なものにするには、受け入れ時のチェックや問診が必要になる。","見積りとは、費用、修理内容、日数などをお客様に理解しやすいように提示するもので、出来る限り正確に見積りを提示し、お客様に納得していただくものである。"],
ans:1,exp:"納期は整備時間（作業完了時期）と同じタイミングではなく、整備完了後に引き渡しや連絡等の時間を考慮した納期を別途設定して明示する必要がある。"},
{no:6,pts:2,labels:L4,text:"(6) 見積書の記載内容に関する記述として、適切なものはどれか。",
opts:["主体作業とは、車両を構成する主要な部品およびそれに取り付けられている部品(付帯部品)の複合した作業で、作業時間の対価が工賃として計上できない作業内容。","関連作業とは、２つ以上の主要部品を取り替える場合、複合した主体作業の関連部位は、作業箇所が重複となり簡略されることにより、作業時間が縮小可能となる作業。","付帯作業とは、ある主体作業を行う場合、その主体作業とは別途な作業が必要な時のその作業。","付随作業とは、それ自体の作業時間が主体作業の範囲内に含まれて設定されており、特に作業項目は設定せず、工賃も単独では計上しないもの。"],
ans:1,exp:"A：主体作業は工賃計上できる作業。C：付帯作業の説明はDの内容（付随作業の定義）。D：付随作業の説明はCの内容（付帯作業の定義）。B（関連作業）が適切。"},
{no:7,pts:2,labels:L4,text:"(7) 事故を受け付ける際の対応に関する記述として、不適切なものはどれか。",
opts:["まずは顧客の安否を気遣って「おケガはありませんか」などの言葉が必要である。","お客様への同情心から、お客様の言い分を全面的に信用したりせずに、あくまでも聞き役になる。","人身が絡んだり、話し合いが難航する場合はフロントアドバイザーが事故処理を代行したほうが良いこともある。","事故処理は当事者間で行ってもらい、保険適用の場合はお客様に保険内容の適切な助言を行うにとどめる。"],
ans:2,exp:"フロントアドバイザーが事故処理を代行することは不適切。事故処理は当事者間で行うものであり、販売会社は適切な助言にとどめる。"},
{no:8,pts:2,labels:L4,text:"(8) 事故見積りに関する記述として、不適切なものはどれか。",
opts:["損傷には、他の物体と接触した直接的な損傷と、そこから衝撃が伝播して損傷した間接損傷がある。","車両の挙動を想像することにより、損傷の範囲と程度を把握し、見えない部分については構造を考えて勘によって判断する。","衝撃力がどのように伝播しているかを構造から考える場合は、部材や断面の変化部位と衝撃力の支点部位に着眼すると良い。","損傷を確認する技能を高めるには、事故状況から考えられる損傷範囲と構造による損傷の波及を考えた見方をする必要がある。"],
ans:1,exp:"見えない部分を「勘によって判断」することは不適切。測定や構造的な確認を行い、根拠に基づいた判断をすることが必要。"},
{no:9,pts:2,labels:L4,text:"(9) ＨＩ－ＰＲＥＭＡ、Ｈｉ－Ｌｉｎｋ、ＨＩＮＯ－ＣＹＣＬＥに関する記述として、不適切なものはどれか。",
opts:["HINO-CYCLEでHITOSSから車検予約する場合で、予約する車両が決まっていない場合は、通常の予約受付の必須項目に加え、車型・車番入力(ダミーの文字・数字を入力)にてHINO-CYCLEに反映される。","HITOSS見積作成時、Hi-Link操作にて「部品→作業取得」からHITOSS作業コード品番紐づけ明細する際、ご用命明細に作業が紐づかなかった、または紐づけなかったものは部品の上段に空欄行が挿入される。","HITOSS見積作成にて、HI-PREMA提案書を取り込む場合は必要項目を入力後、提案状況に「提案有」アラート表示を確認しても、Ｆ８「他画面」からの提案書検索は対応できない。","HITOSS見積作成にて、HI-PREMAから１つの提案書に対して、紐づけられる見積作成は５件までである。"],
ans:0,exp:"HINO-CYCLEで予約する車両が決まっていない場合、「車型・車番」にダミーを入力するのは不正確な登録となるため不適切な操作。"},
{no:10,pts:2,labels:L4,text:"(10) 受付対応や苦情対応に関する記述として、不適切なものはどれか。",
opts:["不満を持った顧客のうち、苦情を申し立て、その解決に満足した顧客の再購入決定率は、不満を持ちながら苦情を申し立てない顧客のそれに対して比較的高いと言われている。","口コミの波及効果は、好意的な内容よりも非好意的な内容の方が二倍も強く影響を与えると言われている。","事故などお客様にトラブルが発生した際には、まず事故原因など技術的な説明をしてからお客様の気持ちが落ち着くのを待つことが大切である。","商品やサービスに問題があっても全てが苦情になるわけではなく、信頼関係ができていれば大問題にならない場合もあるが、それに甘えず常に緊張感を持って対応することが必要である。"],
ans:2,exp:"お客様にトラブルが発生した際は、まずお客様の気持ちに寄り添い誠意を示すことが先決。技術的な説明を最初に行うのは不適切。"},
{no:11,pts:2,labels:L4,text:"(11) 苦情対応に関する記述として、不適切なものはどれか。",
opts:["お客様の話を親身になってよく聞き、その場で対応できることは迅速に実施する。","苦情受付後は、速やかに上司に報告する。","自分で対応できない時は上司へ相談するまでの間に、その場しのぎの回答を行う。","商品やサービスに対するお客様の期待と、実際に得た商品やサービスの結果にギャップがあると不満が発生する。"],
ans:2,exp:"その場しのぎの回答は後にトラブルを拡大させるため不適切。対応できない場合は誠実に時間をもらい、上司に相談してから正確な回答を行う。"},
{no:12,pts:2,labels:L4,text:"(12) 受付など接客対応に関する記述として、不適切なものはどれか。",
opts:["第一印象がそれ以降の対応に重大な影響を及ぼすので、態度、言葉づかい、身だしなみなどには充分注意を払い、お客様に良い印象を与えるように努める。","不具合を訴えているお客様には、いつから、どこが、どんな時に、どのように、など話をよく聞き真意を知ることで自身とお客様の感覚の違いをなくすようにする。","再修理作業について、技術的には同一箇所の再修理作業ではなく同類の故障だった場合、まずは充分に技術的な説明をして再修理ではないことを弁解する必要がある。","受付時に直ちに作業にとりかかれない場合は、上司などと相談しながら、いつ着工できるかを説明し、お客様に了解を得る必要がある。"],
ans:2,exp:"再修理の際はまず謝罪し、お客様の気持ちに寄り添うことが先決。技術的な弁解を最初に行うのは不適切な対応。"},
{no:13,pts:2,labels:L4,text:"(13) 受付やお客様対応に関する記述として、不適切なものはどれか。",
opts:["問診は、お客様が望んでいる整備や指摘している不具合を正確に聞き取るために必要であり、要望事項をよく聞き、お客様の言った言葉で記録する必要がある。","苦情に対しては、言い分を最後までよく聞き、最優先で処理をすることが重要であるが、法外な要求や言い分である場合は、応じられない理由を説明してお断りする必要がある。","追加整備作業が発生し、お客様と連絡がとれずに完成時間に追われて了承を得ないまま作業を進めると、トラブルに発展する。","車検の概算見積もりでは、整備料金、ご依頼事項料金、諸費用を区別して記載しておくほうが良く、これは諸費用を立替え依頼された場合に対応できるようにするためである。"],
ans:3,exp:"車検の概算見積もりで諸費用を区別して記載しておくのは、諸費用の立替依頼への対応のためだけでなく、お客様が各費用を確認・理解できるようにするため。Dの説明は一面的で不完全（不適切）。"},
{no:14,pts:2,labels:L4,text:"(14) 電話でのお客様対応に関する記述として、不適切なものはどれか。",
opts:["相手の話の途中で結論が判断できた場合は、相手の都合を考えて話を遮ってでも返答する必要がある。","電話では声の調子で印象が決まってしまうので、明るく歯切れの良い話し方をする必要がある。","電話は相手の都合を一方的に拘束することがあるので、相手のことをよく考える必要がある。","電話をする前には、関係書類や筆記用具を準備し、用件内容を整理してから電話する。"],
ans:0,exp:"相手の話は最後まで聞くのが基本。話の途中で遮って返答することは失礼であり不適切。"},
{no:15,pts:2,labels:L4,text:"(15) 受付時現車の確認を行う際の注意点に関する記述として、不適切なものはどれか。",
opts:["不正改造の有無を十分にチェックし、不正改造がある場合にはお客様に説明し、正規の状態で入庫いただくようにお願いする。","貴重品や高価なものが搭載されていたら、お客様に伝えフロントで大切に保管しておく。","車両の傷、汚れ、積荷、などの状態をお客様と一緒に確認し、納車後のトラブル防止を図る。","不具合の申し出の場合は、必ず問診を実施する。問診は専門用語を使わず、具体的な例を挙げ、お客様の答えやすい問い方にする。"],
ans:1,exp:"貴重品はお客様自身が持ち帰るようお願いする。フロントで保管することは盗難・紛失等のリスクがあり不適切。"},
{no:16,pts:2,labels:L4,text:"(16) 整備料金の説明と回収に関する記述として、不適切なものはどれか。",
opts:["点検・整備の価値をお客様に理解していただけるよう、必要性、効果などをわかりやすくお客様に説明することも、「機能的サービス」の一環である。","売掛金が回収予定日を過ぎても入金されない場合は、督促状を普通郵便や内容証明付郵便などで発送する手段を講じることも大切である。","無償、有償作業を同時に行う場合、受注の時点で「料金」とその有償、無償についてお客様に説明しておく。","サービス部門で販売する商品は、点検、整備という点検整備作業における「技術の提供」である。"],
ans:1,exp:"売掛金の督促は、まず電話・訪問による直接交渉が優先。普通郵便の督促状は証拠能力が低く、回収業務の最初の手段として適切ではない。"},
{no:17,pts:2,labels:L4,text:"(17) お客様への説明方法として、適切なものはどれか。",
opts:["完成時間や整備料金について見通しがつかない場合は、具体的な表現は避ける。","分解してみなければ正確なことが分からない場合は、誤解を与えないようにあいまいな説明をしておく。","お客様に技術説明をする場合は、現物や資料を示して説明をする。","会話の始めにお客様との距離を縮めるために話題が豊富な政治、宗教、思想に関する話をする。"],
ans:2,exp:"技術説明には現物・資料を活用して具体的に説明する（C適切）。あいまいな説明や具体性のない回答は後のトラブルにつながる。政治・宗教・思想は避けるべき話題。"},
{no:18,pts:2,labels:L4,text:"(18) 引渡し、納車時の対応に関する記述として、不適切なものはどれか。",
opts:["どの部品がどのように不具合があったかを、お客様に分かりやすく説明できるように、取り替えた部品の損傷状態を自分で確認してから廃却する必要がある。","作業指示書通りの作業が完了しているか、車両は清掃されているか、傷が付かなかったか、搭載物は受付時の通りかなど、お客様の車両を確認する必要がある。","納車時の説明は、お客様からの申し出内容に対する説明のみならず、使用上の注意、この先必要になる整備等のアドバイスをする必要がある。","納車時での説明では、作業中に気付いたことや車の使い方に対するアドバイスなどお客様一人一人に合わせた心づかいが必要である。"],
ans:0,exp:"交換部品はお客様に現物を見せながら説明し、廃却するかどうかはお客様の意向を確認してから判断する。自分で確認してから廃却するのは不適切。"},
{no:19,pts:2,labels:L4,text:"(19) 売上・回収に関する記述として、不適切なものはどれか。",
opts:["ＨＩＴＯＳＳII上のお客様ランクが「 ６，７ 」の場合、売上先確認。「 ８，９ 」の場合、売上不可が表示される。","小切手とは振出人の取引銀行に対して、受取人に一定額の金額を支払うように委託する有価証券のこと。","売掛金は利息が付かず、時効が５年である。","受取手形は６ヶ月以内に２回、銀行を支払い場所とする約束手形を不渡りにすると銀行取引停止処分を受ける。"],
ans:0,exp:"HITOSSIIのお客様ランク区分は、「６，７」は売上先確認、「８」は売上不可が正しい。「８，９」の両方が売上不可という記述は不正確。"},
{no:20,pts:2,labels:L4,text:"(20) 納品書に関する記述として、不適切なものはどれか。",
opts:["納品書とは、お客様へ渡す整備の明細以外に、販売会社サービス部の売上げチェック用の資料としての機能もある。","外注又は他販売会社入庫車両は、送付されてきた請求書をもとに仕入をする。","工賃マスタに無い項目は、工数または原価、売価をその都度決める。","納品書発行時は関連伝票を収集し、指示通りの作業が行われたか確認する。"],
ans:1,exp:"外注や他販売会社入庫車両は、送付されてきた「納品書」をもとに仕入をする（請求書ではない）。"},
{no:21,pts:2,labels:L4,text:"(21) 手形、小切手、領収書に関する記述として、不適切なものはどれか。",
opts:["手形・小切手を受け取った際の確認ポイントとして、受取人の名前、支払金額、支払日、振出日が記載されていても被裏書人欄が記載されていない場合は無効になる。","手形の記載金額が１０万円以上の場合、印紙税法により収入印紙を貼ることが定められており、貼り付けられた印紙に消印を押す理由として、一度使った収入印紙が再度使われることを防ぐためである。","領収書の保存、保管期間は請求書などと同様に帳簿類の記載事項の証拠書類となるため１０年分の保管が必要である。","手形の取立期間は記載された日から２日、当日を含めて３日間となり、この中に日曜・祭日があればこれを除いて実日数となる。"],
ans:0,exp:"手形・小切手において被裏書人欄の記載がない場合も有効な場合がある。小切手は持参人払い形式が多く、被裏書人欄が必須ではない。Aの記述は不適切。"},
{no:22,pts:2,labels:L4,text:"(22) 売掛金に関する記述として、不適切なものはどれか。",
opts:["取引先が倒産した場合、原則として回収は出来ない。","時効の成立を中断させるため、請求書を再度送付した。","支払いに懸念のあるお客様と、現金取引を行った。","民法上の短期消滅時効（２年間）は廃止された。"],
ans:1,exp:"時効の中断（更新）には、裁判上の請求や支払督促など法的手続きが必要。単なる請求書の再送付は時効中断の効力を持たない（B不適切）。"},
{no:23,pts:2,labels:L4,text:"(23) ＨＩＴＯＳＳIIの売上報告画面で、工賃割増の適用に関する記述として、適切なものはどれか。",
opts:["対象工賃の行にある出区分に「 １ 」を入力する。","対象工賃の行にある出区分に「 ２ 」を入力する。","対象工賃の行にある出区分に「 ８ 」を入力する。","対象工賃の行にある出区分に「 ９ 」を入力する。"],
ans:3,exp:"HITOSSII売上報告画面での工賃割増（時間外・休日等）適用は、出区分に「９」を入力する。"},
{no:24,pts:2,labels:L4,text:"(24) ＨＩＴＯＳＳIIで売上報告のご用命作業明細画面に関する記述として、不適切なものはどれか。",
opts:["位置区分に「８」を入力して納品書を印字すると、位置欄に「後」と印字される。","位置区分に「３」を入力して納品書を印字すると、位置欄に「上下」と印字される。","位置区分に「４」を入力して納品書を印字すると、位置欄に「右」と印字される。","位置区分に「６」を入力して納品書を印字すると、位置欄に「前」と印字される。"],
ans:3,exp:"位置区分「６」は「後」に相当するなど、位置区分と位置欄の対応が異なる。Dの記述は不適切。"},
{no:25,pts:2,labels:L4,text:"(25) ＳＯＳ緊急サービス運用マニュアルに照らし、中央コールセンターでの受付においてＨＩＴＯＳＳII対応区分とお客様ランクの関係性についての記述として、適切なものはどれか。",
opts:["お客様ランク「９」では、優良客（Ｓ）であってもお断りする。","お客様ランク「６～８」では、優良客（Ｓ）であっても元販社へ照会を行う。","不良客（Ｂ）は、お客様ランクに関係なく、お断りする。","登録なし（Ｎ）の場合、お客様ランクに関係なく、元販社へ照会を行う。"],
ans:2,exp:"不良客（B）はお客様ランクに関係なくお断りする（C適切）。"},
{no:26,pts:2,labels:L4,text:"(26) 収入印紙に関する記述として、適切なものはどれか。",
opts:["小切手に貼る収入印紙は、記載金額１０万円未満は非課税、１００万円以下は２００円の収入印紙が必要となる。","手形に貼る収入印紙は、記載金額１０万円未満は非課税、１００万円以下は２００円の収入印紙が必要となる。","小切手に貼る収入印紙は、記載金額５万円未満は非課税、１００万円以下は２００円の収入印紙が必要となる。","手形に貼る収入印紙は、記載金額１５万円未満は非課税、１００万円以下は２００円の収入印紙が必要となる。"],
ans:1,exp:"手形（約束手形・為替手形）の収入印紙：記載金額10万円未満は非課税、100万円以下は200円（B適切）。小切手は一律200円（金額非課税）。"},
{no:27,pts:2,labels:L4,text:"(27) 約束手形の時効に関する記述として、適切なものはどれか。",
opts:["振出人に対しては、３年で時効となる。","振出人に対しては、４年で時効となる。","裏書人に対しては、３年で時効となる。","裏書人に対しては、４年で時効となる。"],
ans:0,exp:"約束手形の時効：振出人に対しては満期から3年、裏書人に対しては遡求権行使の日から1年（A適切）。"},
{no:28,pts:2,labels:L4,text:"(28) 通過車両規定において保証修理に関する作業の処理方法について、不適切なものはどれか。",
opts:["現品の元販売会社への到着期限は、故障発生日より２０日以内とする。","現品および関係書類は即時発送する。なお現品およびその梱包には、「保証部品」と明記した荷札をつけ、送状と受領書を同封する。","再修理等、整備保証に関する事項が発生した場合は販売会社間相互で協議して、その都度解決する。","現品が元販売会社に到着しなかった場合の損害は、実施販売会社とする。"],
ans:1,exp:"現品および関係書類を発送する際の荷札には「保証部品」と明記するが、「送状と受領書を同封」するという手続きが規定と異なる（または別途規定がある）。Bが不適切。"},
{no:29,pts:2,labels:L4,text:"(29) 通過車両規定に照らし、保険による事故修理の売上方法に関する記述として、不適切なものはどれか。",
opts:["技術料・・・保険査定額の５％を控除","部品代・・・保険査定額の１０％を控除","外注作業技術料・・・保険査定額の５％を控除","外注作業部品代・・・保険査定額の１０％を控除"],
ans:3,exp:"通過車両の保険事故修理では、外注作業部品代の控除率は通常の部品代とは異なる規定が設けられている。Dの記述（10%控除）は不適切。"},
{no:30,pts:2,labels:L4,text:"(30) 通過車両規定に照らし、特別対応料と体制維持費に関する記述として、不適切なものはどれか。",
opts:["体制維持費は元販売会社の負担分であるため、お客様に請求してはならない。","登録前車両については体制維持費のみ、保証申請にてメーカーに請求できる。","特別対応料および体制維持費の振替割引はしない。","営業時間外に受付し、実際に作業をした場合、もしくは作業はしないが出動して故障診断等を行い、説明等の処置をとった場合は、特別対応料および体制維持費を請求することができる。"],
ans:1,exp:"登録前車両については「特別対応料のみ」保証申請にてメーカーに請求できる。「体制維持費のみ」という記述は不適切。"},
{no:31,pts:2,labels:L4,text:"(31) 通過車両規定に照らし、お客様リストに優良客として登録されているお客様（通過車両）より直接、レンジャーの右側ヘッドライトバルブ（ハロゲン）交換の依頼を受けた。この場合の応対として、適切なものはどれか。",
opts:["元販売会社と連絡がとれないので、現金払いでの修理をお客様にお願いした。","元販売会社に確認をとらずに、受付をして作業した。","元販売会社に連絡がとれないので、連絡がとれるまで作業を待ってもらった。","元販売会社の担当に連絡がとれないので、作業を断った。"],
ans:1,exp:"優良客と登録されているお客様からの軽微な作業（ヘッドライトバルブ交換）については、元販売会社への確認なしに受付・作業することが適切（B適切）。"},
{no:32,pts:2,labels:L4,text:"(32) 通過車両規定に照らし、事故修理の正式見積書を提出し修理を実施しないときに元販売会社に請求できる見積額として適切なものはどれか。",
opts:["見積額の１％","見積額の３％","見積額の５％","見積額の７％"],
ans:1,exp:"通過車両規定において、正式見積書を提出し修理を実施しない場合は、元販売会社に見積額の3%を請求できる（B適切）。"},
{no:33,pts:2,labels:L4,text:"(33) ２＊Ｇ付プロフィア（２０２３年モデル）に関する記述として、適切なものはどれか。",
opts:["ＥＤＳＳについて、車線逸脱警報をＯＦＦにしているとＥＤＳＳ作動時における車両逸脱判定は行わないため、減速および停止は機能するが、車線内維持は行わない。","ＳＡＭＳは、コーナーレーダーセンサーで進路上を交差する移動物を検知し、衝突の恐れがあれば自動でブレーキを作動させる。","レーンキーピングアシスト（ＬＫＡ）は、一定速度以上で走行中にシステムが車線逸脱を判断するとステアリングを制御し、車両を車線内に戻す支援や車線内に維持することを支援する。","ドライバーモニターIIは、ＰＣＳと連動して作動するものであるため、単独での運転者への警報機能は備えていない。"],
ans:2,exp:"LKA（レーンキーピングアシスト）は一定速度以上でシステムが車線逸脱を判断するとステアリングを制御して車線内に戻す支援を行う（C適切）。ドライバーモニターIIは単独でも警報機能を持つ。"},
{no:34,pts:2,labels:L4,text:"(34) ２＊Ｇ付プロフィア（２０２４年モデル）の安全装置に関する記述として、不適切なものはどれか。",
opts:["出会い頭警報（ＦＣＴＡ）は、交差する移動物を検知した場合、ドライバーへ警報を出し、さらに自車前面に衝突する危険性が高まると自動でブレーキを作動させる。","左折巻込み警報（ＢＳＩＳ）は、自車左側方の移動物を検知した場合や左折時に衝突の危険性がある場合にブザー音や表示灯でドライバーへ警報する。","車線変更警報（ＢＳＤ）は、自車左右側方の移動物を検知した場合や車線変更時に衝突の危険性がある場合にブザー音や表示灯でドライバーへ警報する。","ＦＣＴＡとＢＳＩＳとＢＳＤの３つは、ＳＡＭＳの機能として設定されており、ＳＡＭＳ表示灯はピラー部に新設された。"],
ans:0,exp:"FCTA（出会い頭警報）は自車前面への衝突危険時に自動ブレーキを作動させるが、正確には出会い頭衝突の危険を警報するシステムであり、Aの説明内容が不適切。"},
{no:35,pts:2,labels:L4,text:"(35) ２＊Ｇ付プロフィアのＶＳＣに関する記述として、不適切なものはどれか。",
opts:["車両制御ＥＣＵは、危険状態を感知すると、ＥＢＳ ＥＣＵからの信号を受信してエンジンＥＣＵに出力し、エンジンＥＣＵはこの信号をもとにエンジン出力を制御する。","ＶＳＣ ＥＣＵは、ヨーレートセンサーおよびＧセンサーを内蔵しており、ヨーレート、横Ｇを検出して、ＣＡＮ通信により、ＥＢＳ ＥＣＵに信号を送る。","横滑り軽減制御時は、旋回時に両輪をブレーキ制御して横滑りを抑制する。","ロール軽減制御時は、各輪のブレーキを制御し、安定的に車両を減速させ横Ｇを減少させる。"],
ans:2,exp:"VSCの横滑り軽減制御時は、旋回内側の「片輪」をブレーキ制御して横滑りを抑制する。「両輪」のブレーキ制御という記述は不適切。"},
{no:36,pts:2,labels:L4,text:"(36) ２＊Ｇ付プロフィア（２０２３年モデル）のプロシフト１２（M１１２）のオートシフトダウン機能に関する記述として、不適切なものはどれか。",
opts:["オートシフトダウン機能は１２速から９速までシフトダウンを行う。","オートシフトダウン機能とは、補助ブレーキのコントロールレバーをオートシフトダウン作動位置に操作した時に自動的にシフトダウンを行い、エンジンリターダー力を増幅する機能。","オートシフトダウンの作動条件はギア位置が９速以上で走行し、エンジン回転数がオートシフトダウンを実施できる状態にあり、かつ、アクセルをオフすると実施される。","オートシフトダウン機能はアクセルを踏む、もしくはクラッチを踏むことで解除される。"],
ans:0,exp:"プロシフト12（M112）のオートシフトダウン機能は、12速から9速ではなく、正しいシフトダウン範囲が異なる。Aの記述は不適切。"},
{no:37,pts:2,labels:L4,text:"(37) デュトロ ＺＥＶ（ＢＥＶ車）について、不適切なものはどれか。",
opts:["普通充電と急速充電の両方に対応している。","ｅＤＡＰは、アクセルペダル１つで加速から停止まで調整することが可能である。","誤発進抑制機能は、前進・後退ともに機能する。","モーター駆動で変速機がないため、走行がスムーズである。"],
ans:1,exp:"eDAP（Electric Deceleration Assist Pedal）はアクセルペダルで減速・停止をコントロールするシステム。「加速から停止まで」の表現は不適切で、主に減速・停止制御のシステム。"},
{no:38,pts:2,labels:L4,text:"(38) ハイブリッドモータに関する記述として、不適切なものはどれか。",
opts:["モータの回転速度は交流電源の電圧で制御する。","ハイブリッドモータは永久磁石を取り付けたロータを、三相交流を用いて回転させる交流同期電動機である。","モータの発生するトルクは、電流の大きさで制御している。","減速時は発電機としてエネルギーを回収する。"],
ans:0,exp:"交流同期モータの回転速度は電圧ではなく「周波数（インバータによる周波数制御）」で制御する。電圧で制御するという記述が不適切。"},
{no:39,pts:2,labels:L4,text:"(39) 尿素ＳＣＲ（排出ガス浄化装置）に関する記述として、適切なものはどれか。",
opts:["尿素水を排出ガスに噴射し、還元反応にてＰＭを低減するシステムである。","尿素水を酸化触媒に噴射し、酸化触媒と尿素を反応させることで排出ガス温度を上昇させ、還元を促すシステムである。","排ガス浄化の際に未使用アンモニアを取り除くためのアンモニアスリップ触媒があり、ＳＣＲ触媒の上流に配置されている。","アフターラン制御とは、エンジン停止後に装置内に充填されていた尿素水をタンクに戻す制御のことである。"],
ans:3,exp:"アフターラン制御はエンジン停止後に尿素水噴射系内の尿素水を空にし、凍結・析出を防ぐためタンクに戻す制御（D適切）。SCRはNOxをアンモニアで還元する。アンモニアスリップ触媒はSCR触媒の下流に配置。"},
{no:40,pts:2,labels:L4,text:"(40) ２＊Ｇ付車のＤＰＲ（排出ガス浄化装置）に関する記述として、不適切なものはどれか。",
opts:["ＤＰＲフィルター内に排出ガス中のＰＭを捕集し、フィルター内を高温にして燃焼処理を行う。","ＤＰＲのスス堆積量は、エンジン回転数と噴射量から算出されており、再生時にはフィルター温度が規定値に達するとススの燃焼量の計算を開始し、再生開始時点で算出した堆積量と燃焼量値が一致すると再生を終了する。","停車時の再生ではポスト噴射を行わないようになっているが、燃料添加弁に不具合があるとポスト噴射を実行することがある。","メーター内の堆積量表示の本数に関わらず、インジケータランプが点滅して再生を促すことがあるが、ＤＰＲ装置の故障ではない。"],
ans:1,exp:"DPRの再生終了判定は、堆積量と燃焼量の一致ではなく、温度・時間など複数の条件で判定する。Bの再生終了条件の説明が不適切。"},
{no:41,pts:2,labels:L4,text:"(41) 産業廃棄物に関する記述として、不適切なものはどれか。",
opts:["自動車リサイクル法の対象となる自動車には、ナンバープレートの付いていない構内車も含まれる。","架装物はリサイクル法の対象外になるものがあり、保冷貨物車の冷蔵装置や土砂などの運搬用荷台、ミキサのタンクは対象外となる。","廃冷却水は油水分離層にて対応できるが、分離層の浄化機能が十分でない場合は、別に保管する。","カーエアコン用フロンガスは回収機で回収し、適正な方法で処理する。なお、回収ボンベはフロンの種類ごとに分けて混入しないようにする。"],
ans:2,exp:"廃冷却水は産業廃棄物（廃液）であり、油水分離槽では対応できない。適切な産業廃棄物処理業者に委託して処理する必要がある（C不適切）。"},
{no:42,pts:2,labels:L4,text:"(42) 車検時のOBD検査に関する記述として、不適切なものはどれか。",
opts:["車載式故障診断装置を利用した自動車検査であり、特定DTCが発生している車両に関しては、保安基準不適合となる。","診断機接続可能な車両であっても年式などによってOBD検査対象と対象外に分かれる。","指定工場においてはOBD検査実施が義務となるが、認証工場での自工場内実施は義務ではない。","使用者自身にて車検を受ける場合は、整備工場などでOBD検査を実施したうえで運輸支局の検査場にて通常の検査を受ける必要がある。"],
ans:3,exp:"使用者が自ら車検を受ける（ユーザー車検）場合、OBD検査は運輸支局の検査場で実施される。事前に整備工場で実施する義務はない（D不適切）。"},
{no:43,pts:2,labels:L4,text:"(43) 自動車保険に関する記述として、不適切なものはどれか。",
opts:["事故などを保険で処理する際には顧客の言い分を全面的に信用したり、直接介入したりしないようにする必要がある。","顧客から事故の連絡があった際には「お怪我はありませんか」など、まずは安否を気遣うようにする。","保険処理での車両修理は、顧客の利便性を考え、少額であれば保険会社に通知のみで即修理着手する。","保険の処理は、お客様にとって車が使用できないことに加えて、精神的な苦痛があることを心に留めておくことが必要である。"],
ans:2,exp:"保険処理での修理は金額にかかわらず、必ず保険会社の承認（査定）を受けてから着手する必要がある。「通知のみで即着手」は不適切。"},
{no:44,pts:2,labels:L4,text:"(44) 自動車保険に関する記述として、不適切なものはどれか。",
opts:["分損とは、事故車が修理可能でしかも車両の修理費が、車の時価よりも低い場合の損害のことをいう。","保険金の限度は１事故ごとに取扱い、保険金が支払われると保険金額が減少する。","自動車保険では一定の枠を設けてそれ以下の損害は支払い対象としないことにしており、免責金額として契約している。","修理不能の場合や修理見積額が保険価額を超える場合は全損となる。"],
ans:1,exp:"保険金の限度は1事故ごとに取り扱うが、保険金が支払われても保険金額は減少しない（不減額式）が一般的。B「保険金額が減少する」は不適切。"},
{no:45,pts:2,labels:L4,text:"(45) 自賠責保険に関する記述として、不適切なものはどれか。",
opts:["政府は、自動車によって生命又は身体を害された者がある場合で、その車の保有者が明らかでないため被害者が損害賠償の請求をすることができないときは、被害者の請求により、政令で定める金額の限度において、その受けた損害をてん補する。","後遺障害第１級（常時介護を要する場合）の保険金の限度額は４，０００万円である。","指定整備事業者は、自賠責保険証の保険期間が、自動車検査証の有効期間が満了する日までの期間と全部が重複するものでないときは、保安基準適合証を交付してはならない。","死亡による保険金の限度額は２，５００万円である。"],
ans:3,exp:"自賠責保険の死亡による保険金の限度額は3,000万円。「2,500万円」は不適切。"},
{no:46,pts:2,labels:L4,text:"(46) 日野メンテナンスリースに関する記述として、不適切なものはどれか。",
opts:["メンテナンスリースとは、車両代・税金・保険等にメンテナンス費用を加えたリース契約のことである。","基本契約としては３種類のプラン設定があり、そのうちのＭプランはHINO CONNECTメンテナンスサポートのサービス対象となる。","基本契約のＳプランでは、定期点検・油脂類交換・ワイパーゴム交換が含まれる。","メンテナンス対象修理と対象外作業が一度に発生した場合、工事受付を別にして処理しなければならない。"],
ans:1,exp:"HINO CONNECTメンテナンスサポートのサービス対象となるのはMプランではなく、別のプラン（Rプランまたは上位プラン）。Bの記述は不適切。"},
{no:47,pts:2,labels:L4,text:"(47) 日野プレミアムサポートに関する記述として、不適切なものはどれか。",
opts:["保証書を紛失した場合でもサービスの利用は可能である。","路上で交換したタイヤの修理は対象外である。","事故後６０日以上経過してからの事故通知や修理入庫は対象外である。","修理費用差額補償サービスは、リース期間中１回のみ利用可能である。"],
ans:1,exp:"日野プレミアムサポートでは路上でのタイヤ交換サポートも対象となる。「路上で交換したタイヤの修理は対象外」は不適切。"},
{no:48,pts:2,labels:L4,text:"(48) 安全の心構えに関する記述として、不適切なものはどれか。",
opts:["自分自身が主体となり自ら考えなければならない。","作業の洗い出しと改善、異常処置時の安全のルール作りを行う。","作業能率を阻害する原因と事故や災害を起こす原因は関連性がない。","正しい作業であれば、作業効率の向上も期待できる。"],
ans:2,exp:"作業能率を阻害する原因（手順の乱れ・環境の悪化など）と事故・災害を起こす原因は密接に関連している。「関連性がない」は不適切。"},
{no:49,pts:2,labels:L4,text:"(49) 危険物に関する記述として、不適切なものはどれか。",
opts:["第一石油類とは、ガソリン・ブレーキクリーナーが該当する。","第三石油類とは、重油・ＡＴ油が該当する。","第四石油類とは、エンジンオイル・Ｔ／Ｍオイル・Ｄ／Ｆオイルが該当する。","第二石油類とは、ＰＳオイル・ブレーキフルードが該当する。"],
ans:3,exp:"第二石油類とは灯油・軽油が該当する。PSオイル・ブレーキフルードは第四石油類に該当する。Dの記述は不適切。"},
{no:50,pts:2,labels:L4,text:"(50) 安全衛生教育（法令）で定められた特別教育の種別について、不適切なものはどれか。",
opts:["研削と石の取り替えまたは試運転","最大荷重１．０トン未満のフォークリフトの運転","可燃性ガス、酸素を用いる金属の溶接、溶断","アーク溶接機を用いる金属の溶接、溶断"],
ans:2,exp:"可燃性ガス・酸素を用いる金属の溶接・溶断は「技能講習（ガス溶接技能講習修了）」が必要であり、特別教育ではない（C不適切）。研削砥石・フォークリフト（1t未満）・アーク溶接は特別教育に該当。"},
// 問2（計算問題・各5点）
{no:51,pts:5,labels:L4,text:"(51) 車両移動時の安全に関する記述として、不適切なものはどれか。",
opts:["バック移動の際、運転手は誘導員の指示に従う。","工場内での車両移動はお客様や他業者ではなく自社従業員が実施する。","バック誘導の誘導員は、笛を使用していれば車両の真後ろに位置しても良い。","バック誘導の誘導員は運転者に聞こえるよう、笛または大きな声で誘導を行う。"],
ans:2,exp:"誘導員は笛の使用有無にかかわらず、車両の真後ろに立ってはならない（危険）。誘導員は運転者の見える位置に立ち、誘導を行う（C不適切）。"},
{no:52,pts:5,labels:L4,text:"(52) 安全マニュアルガイドラインに照らし、フロント受付に関する記述について、不適切なものはどれか。",
opts:["お客様車両入庫時には、積荷の安全確認を行う。","お客様車両入庫時には、フレーム腐食など作業の安全性に支障がないか確認する。","お客様に提示する用事があるなど、すぐに使用する部品はフロントのカウンター内に置くようにしてお待たせしないようにする。","フロント受付後、お客様による整備車両移動はご遠慮いただき、必ず自社従業員が移動させる。"],
ans:2,exp:"フロントのカウンター内には部品などを置かない。部品はカウンターに置かず適切な場所で管理する（C不適切）。"},
{no:53,pts:5,labels:L4,text:"(53) 道路運送車両法に照らし、自動車整備事業者の遵守事項として、不適切なものはどれか。",
opts:["作業に係る料金を事業場内の依頼者に見やすい場所に掲示すること。","作業の依頼者に対し、必要となる整備の内容及び整備の必要性について説明し、料金の概算見積りを記載した書面又は電磁記録を提供すること。","依頼者に対し、実施していない点検若しくは整備の料金を請求し、又は依頼されない点検若しくは整備を不当に行い、その料金を請求しないこと。","特定整備事業場においては、特定整備に関する整備主任者が必要であり、この特定整備の整備主任者は、他の事業場の整備主任者を兼務することができる。"],
ans:3,exp:"特定整備事業場の整備主任者は、他の事業場の整備主任者を兼務することができない（D不適切）。道路運送車両法施行規則第62条の2の2による規定。"},
{no:54,pts:5,labels:L4,text:"(54) 道路運送車両法及び自動車点検基準に照らし、自動車の区分（種別、用途等）と定期点検の時期の組合せとして、適切なものはどれか。",
opts:["乗車定員１１人以上の自家用バスは、６か月ごとに定期点検","車両総重量８トン未満の貨物運送用の自家用普通自動車は、６か月ごとに定期点検","車両総重量８トン以上の自家用自動車は、６か月ごとに定期点検","乗車定員１０人以下の乗用普通レンタカーは、１年ごとに定期点検"],
ans:1,exp:"車両総重量8t未満の貨物運送用自家用普通自動車は6か月ごとの定期点検（B適切）。乗員11人以上バス・8t以上自家用は3か月ごと、レンタカー（10人以下）は6か月ごと。"},
{no:55,pts:5,labels:L4,text:"(55) 道路運送車両法に照らし、自動車の整備事業に関する記述として、適切なものはどれか。",
opts:["整備主任者は同一事業者が経営する事業場であれば、他の事業場の整備主任者を兼務することができる。","普通自動車特定整備事業のみの認証を受けた事業場では、四輪の軽自動車の分解整備を行うことができる。","整備命令は、自動車整備事業者に対し、その実施した整備の状況が不良の場合に出される命令である。","自動車検査員は、他の事業場の検査員となることができない。ただし、同一事業者の他事業場で国交省が定める要件を満たしていれば兼務できる。"],
ans:3,exp:"自動車検査員は原則他事業場の兼務不可だが、同一事業者の他事業場で国交省要件を満たせば兼務可能（D適切）。普通自動車特定整備事業は軽自動車の分解整備不可。"},
{no:56,pts:5,labels:L4,text:"(56) 道路運送車両法に照らし、特定（分解）整備記録簿に関する記述として、不適切なものはどれか。",
opts:["整備をした場合は、使用者に記録簿の写しを交付しなければならない。","記録簿は、その記載の日から２年間保存しなければならない。","記録簿には、自動車登録番号または車台番号を記載しなければならない。","記録簿には、依頼者の氏名に加えて名称及び住所を記載しなければならない。"],
ans:3,exp:"記録簿には「依頼者の氏名又は名称及び住所」を記載（氏名または名称のいずれか）。「氏名に加えて名称」と両方必須とする記述は不適切（D不適切）。"},
{no:57,pts:5,labels:L4,text:"(57) 道路運送車両法に照らし、ナンバープレートの表示に係る新基準に関する記述として、不適切なものはどれか。",
opts:["ナンバープレートを被覆することになるカバーは、無色透明であっても装着禁止である。","ナンバープレートに取り付けるフレームは、幅が１０ｍｍ以下、かつ、厚さは１０ｍｍ以下でなければならない。","後面の上下角度は、ナンバープレート上端の地上高が１．２ｍ超の場合、上向き２５°～下向き１５°の範囲でなければならない。","前面の上下角度は、上下１０°の範囲でなければならない。"],
ans:1,exp:"ナンバーフレームの基準はフレームの上部・左右・下部のそれぞれで幅と厚さが異なる。「全て幅10mm以下・厚さ10mm以下」という一律の記述は不適切（B不適切）。"},
{no:58,pts:5,labels:L4,text:"(58) ある販売会社の、一ヶ月の整備部門の業績があります。下記、数値から車検整備と一般整備の合計売上利益として、適切なものはどれか。\n\n・車検売上高：29,500千円\n・車検台数：190台\n・売上原価合計（車検＋一般整備）：25,800千円\n・一般整備売上原価：17,000千円\n・一般整備売上利益率：32％",
opts:["２９，９００千円","２８，７００千円","３０，２００千円","２５，９００千円"],
ans:1,exp:"①一般整備売上高 = 17,000千 ÷ (1-0.32) = 25,000千円\n②車検売上原価 = 25,800千 - 17,000千 = 8,800千円\n③車検売上利益 = 29,500千 - 8,800千 = 20,700千円\n④一般整備売上利益 = 25,000千 - 17,000千 = 8,000千円\n合計利益 = 20,700千 + 8,000千 = 28,700千円 → B"},
{no:59,pts:5,labels:L4,text:"(59) 平日の定時間内にＡ販売会社からエンジン始動不良となった日野車のバッテリー交換（２個）の広域サービス対応依頼が入ったため、Ｂ販売会社のサービスエンジニアが１０ｋｍ先の故障車両までサービスカーで出動した。Ａ販売会社への請求金額を消費税１０％込みで計算した場合、適切なものはどれか。\n（注）答えは小数点以下第一位を四捨五入し、整数とする。\n\n・部品代（純正ＰＢバッテリー原価）：１６，５００円（１個）\n・標準作業時間（バッテリー交換）：０．５時間\n・Ａ販売会社の工賃レート：１０，０００円\n・Ｂ販売会社の工賃レート：１０，５００円",
opts:["４６，５３０円","５２，４７０円","５５，６５０円","６１，２１５円"],
ans:3,exp:"広域サービス振替計算（B社がA社へ請求）：\n①技術料：B社レート×時間×1.25(出張)×0.8(振替控除)\n　= 10,500×0.5×1.25×0.8 = 5,250円\n②部品代：原価×個数×1.2(振替増し)\n　= 16,500×2×1.2 = 39,600円\n③サービスカー：(8,000+400×10)×0.9(振替控除)\n　= 12,000×0.9 = 10,800円\n小計 = 5,250+39,600+10,800 = 55,650円\n×1.1(消費税) = 61,215円 → D"},
{no:60,pts:5,labels:L4,text:"(60) 以下の条件で発生する自動車の駆動力として、適切なものはどれか。\nただし、計算結果の小数点以下は切り捨てるものとする。\n\n・エンジンのトルク：１２００N・ｍ\n・変速比：２．５\n・最終減速比：３．８\n・動力伝達効率：０．９\n・タイヤの半径：０．５ｍ",
opts:["５１３０Ｎ","６３３３Ｎ","１０２６０Ｎ","２０５２０Ｎ"],
ans:3,exp:"駆動力 = エンジントルク × 変速比 × 最終減速比 × 動力伝達効率 ÷ タイヤ半径\n= 1200 × 2.5 × 3.8 × 0.9 ÷ 0.5\n= 1200 × 2.5 = 3000\n× 3.8 = 11,400\n× 0.9 = 10,260\n÷ 0.5 = 20,520N → D"}

    return {no:q.n, section:q.s||'', label:(q.s||'問'+q.n), points:q.p, answer:labs[q.a], stem:q.q, choices:ch, explanation:q.exp||'', invalid:false, multi:false, freeAnswer:false};
  }
  if (q.opts !== undefined && Array.isArray(q.opts)) {
    var labs2 = q.labels || L4;
    var ch2 = {};
    q.opts.forEach(function(v, i) { if (labs2[i]) ch2[labs2[i]] = v; });
    var sec = q.section || q.s || '';
    var lbl = q.label || (sec ? sec + '(' + (q.no||q.n) + ')' : '問' + (q.no||q.n));
    var ansVal = Array.isArray(q.ans) ? q.ans.map(function(i){return labs2[i];}).join(',') : labs2[q.ans];
    return {no:q.no||q.n, section:sec, label:lbl, points:q.pts||q.points||1, answer:ansVal, stem:q.text||q.stem||q.q||'', choices:ch2, explanation:q.exp||q.explanation||'', invalid:false, multi:q.multi||false, freeAnswer:false};
  }
  return {no:q.no, section:q.section||q.s||'', label:q.label||('問'+q.no), points:q.points||q.pts||1, answer:q.answer, stem:q.stem||q.text||q.q||'', choices:q.choices||{}, explanation:q.explanation||q.exp||'', invalid:q.invalid||false, multi:false, freeAnswer:q.freeAnswer||false};
}

const totalQ = questions.length;
let idx = 0;
const ans = {};

function updateProg() {
  const answered = Object.keys(ans).length;
  document.getElementById('barfill').style.width = (answered/totalQ*100)+'%';
  document.getElementById('prog').textContent = (idx+1)+' / '+totalQ+' 問  （回答済み '+answered+' 問）';
}

function render() {
  const _q = questions[idx];
  const q = norm(_q);
  const isCalc = q.section === '問2' || q.section === '問２';
  const choiceKeys = Object.keys(q.choices);
  let html = '';
  if (q.section) html += '<div class="section-badge">'+q.section+'</div>';
  html += '<div class="qtitle">'+q.label+'（'+q.points+'点）</div>';
  if (q.invalid) html += '<div class="calc-note" style="background:#fff5f5;border-color:#fca5a5;color:#dc2626">⚠️ この問題は試験では無効問題でした（採点対象外）</div>';
  if (q.freeAnswer) html += '<div class="calc-note" style="background:#eff6ff;border-color:#93c5fd;color:#1d4ed8">📝 記述問題 — 計算して答えを確認してください（採点対象外）</div>';
  if (q.multi) html += '<div class="calc-note" style="background:#fff7ed;border-color:#fdba74;color:#c2410c">☑️ 複数選択問題（採点対象外）</div>';
  if (isCalc && !q.freeAnswer) html += '<div class="calc-note">📝 計算問題 — 電卓使用可</div>';
  html += '<div class="qstem">'+q.stem.replace(/\n/g,'<br>')+'</div>';
  if (q.freeAnswer) {
    html += '<div style="background:#eff6ff;border:1px solid #93c5fd;border-radius:10px;padding:12px;margin-top:10px">';
    html += '<div style="font-weight:700;color:#1d4ed8;margin-bottom:6px">正解：'+q.answer+'</div>';
    if (q.explanation) html += '<div style="color:#333;font-size:14px;line-height:1.6">'+q.explanation.replace(/\n/g,'<br>')+'</div>';
    html += '</div>';
  } else {
    html += '<div class="choices">';
    choiceKeys.forEach(function(c) {
      if (!q.choices[c]) return;
      const sel = ans[q.no] === c ? ' selected' : '';
      html += '<button class="choice'+sel+'" onclick="selectAns('+q.no+',\'' + c + '\')"><span class="label">'+c+'</span><span>'+q.choices[c]+'</span></button>';
    });
    html += '</div>';
  }
  document.getElementById('quiz').innerHTML = html;
  document.getElementById('nextBtn').textContent = idx === totalQ - 1 ? '採点する ✓' : '次へ ▶';
  updateProg();
  window.scrollTo(0, 0);
}

function selectAns(no, c) { ans[no] = c; updateProg(); render(); }
function prevQ() { if (idx > 0) { idx--; render(); } }
function nextQ() { if (idx < totalQ - 1) { idx++; render(); } else { showResult(); } }

function showResult() {
  let score = 0, max = 0;
  const norms = questions.map(norm);
  norms.forEach(function(q) {
    if (q.invalid || q.freeAnswer || q.multi) return;
    max += q.points;
    if (ans[q.no] === q.answer) score += q.points;
  });
  let html = '<div class="result"><h2>📊 採点結果</h2><div class="score-big">'+score+' / '+max+' 点</div>';
  const sections = {}, secOrder = [];
  norms.forEach(function(q) {
    if (q.invalid || q.freeAnswer || q.multi) return;
    if (!sections[q.section]) { sections[q.section] = {score:0,max:0}; secOrder.push(q.section); }
    sections[q.section].max += q.points;
    if (ans[q.no] === q.answer) sections[q.section].score += q.points;
  });
  const vs = secOrder.filter(function(s) { return s; });
  if (vs.length > 0) {
    let sh = '<p style="font-size:14px;color:#555">';
    vs.forEach(function(s) { sh += s+'：'+sections[s].score+'/'+sections[s].max+'点　'; });
    html += sh + '</p>';
  }
  let hasMiss = false;
  html += '<h3 style="margin:16px 0 8px;font-size:15px;color:#333">📝 全問解説</h3>';
  norms.forEach(function(q) {
    if (q.invalid) {
      html += '<div style="border-left:5px solid #d1d5db;background:#f9fafb;padding:12px;margin:8px 0;border-radius:8px;line-height:1.6;font-size:14px">';
      html += '<div style="font-weight:700;font-size:15px;margin-bottom:4px;color:#6b7280">'+q.label+' ⚠️ 無効問題（採点対象外）</div>';
      if (q.explanation) html += '<div style="color:#333;margin-top:4px">'+q.explanation.replace(/\n/g,'<br>')+'</div>';
      html += '</div>';
      return;
    }
    if (q.freeAnswer) {
      html += '<div style="border-left:5px solid #93c5fd;background:#eff6ff;padding:12px;margin:8px 0;border-radius:8px;line-height:1.6;font-size:14px">';
      html += '<div style="font-weight:700;font-size:15px;margin-bottom:4px;color:#1d4ed8">'+q.label+' 📝 記述問題（採点対象外）</div>';
      html += '<div style="color:#1d4ed8;font-weight:700;margin-bottom:4px">正解：'+q.answer+'</div>';
      if (q.explanation) html += '<div style="color:#333;margin-top:4px">'+q.explanation.replace(/\n/g,'<br>')+'</div>';
      html += '</div>';
      return;
    }
    if (q.multi) {
      html += '<div style="border-left:5px solid #fdba74;background:#fff7ed;padding:12px;margin:8px 0;border-radius:8px;line-height:1.6;font-size:14px">';
      html += '<div style="font-weight:700;font-size:15px;margin-bottom:4px;color:#c2410c">'+q.label+' ☑️ 複数選択（採点対象外）</div>';
      html += '<div style="color:#c2410c;font-weight:700;margin-bottom:4px">正解：'+q.answer+'</div>';
      if (q.explanation) html += '<div style="color:#333;margin-top:4px">'+q.explanation.replace(/\n/g,'<br>')+'</div>';
      html += '</div>';
      return;
    }
    const wrong = ans[q.no] !== q.answer;
    if (wrong) hasMiss = true;
    const bc = wrong ? '#dc2626' : '#d1d5db';
    const bg = wrong ? '#fff5f5' : '#fff';
    const correctText = q.choices[q.answer] || '';
    html += '<div style="border-left:5px solid '+bc+';background:'+bg+';padding:12px;margin:8px 0;border-radius:8px;line-height:1.6;font-size:14px">';
    html += '<div style="font-weight:700;font-size:15px;margin-bottom:4px;color:'+(wrong?'#dc2626':'#111')+'">'+q.label+(wrong?' ❌':' ✅')+'</div>';
    if (wrong) {
      const myText = q.choices[ans[q.no]] || '';
      html += '<div style="color:#dc2626;font-weight:700;margin-bottom:2px">あなたの答え：'+(ans[q.no]||'未回答')+(myText ? '　'+myText : '')+'</div>';
      html += '<div style="color:#16a34a;font-weight:700;margin-bottom:4px">正解：'+q.answer+(correctText ? '　'+correctText : '')+'</div>';
    } else {
      html += '<div style="color:#16a34a;font-weight:700;margin-bottom:4px">正解：'+q.answer+(correctText ? '　'+correctText : '')+'</div>';
    }
    if (q.explanation) html += '<div style="color:#333;margin-top:4px">'+q.explanation.replace(/\n/g,'<br>')+'</div>';
    html += '</div>';
  });
  if (!hasMiss) html += '<p style="font-size:18px;font-weight:900;color:#16a34a">🎉 全問正解です！</p>';
  html += '<div class="actions"><button onclick="reviewMistakes()" style="padding:14px;border:none;border-radius:12px;background:#dc2626;color:#fff;font-size:16px;font-weight:700;cursor:pointer">間違えた問題を復習</button><button onclick="resetQuiz()" style="padding:14px;border:none;border-radius:12px;background:#6b7280;color:#fff;font-size:16px;font-weight:700;cursor:pointer">最初からやり直す</button></div></div>';
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('nav').style.display = 'none';
  const r = document.getElementById('result');
  r.style.display = 'block';
  html += '<a href="./index.html" style="display:block;text-align:center;margin-top:16px;padding:12px;background:#1e3a5f;color:white;border-radius:10px;text-decoration:none;font-weight:700;font-size:.95rem">🏠 ホームへ戻る</a>';
  r.innerHTML = html;
  window.scrollTo(0, 0);
}

function reviewMistakes() {
  const norms = questions.map(norm);
  for (let i = 0; i < norms.length; i++) {
    const q = norms[i];
    if (q.invalid || q.freeAnswer || q.multi) continue;
    if (ans[q.no] !== q.answer) {
      idx = i;
      document.getElementById('quiz').style.display = 'block';
      document.getElementById('nav').style.display = 'flex';
      document.getElementById('result').style.display = 'none';
      render(); return;
    }
  }
}

function resetQuiz() {
  Object.keys(ans).forEach(function(k) { delete ans[k]; });
  idx = 0;
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('nav').style.display = 'flex';
  document.getElementById('result').style.display = 'none';
  render();
}

render();
</script>

<script src="./firebase-config.js"></script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, deleteDoc, collection, getDocs, serverTimestamp, increment } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const SOURCE_KEY = document.title.replace(/[\s　]/g,'_').replace(/[^\w\u3040-\u9FFF]/g,'');

try {
  const app = initializeApp(FIREBASE_CONFIG);
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, async user => {
    const badge = document.getElementById('fb-login-badge');
    if (badge) {
      if (user) {
        const name = user.displayName || user.email.split('@')[0];
        badge.innerHTML = `<a href="./index.html" style="font-size:.72rem;background:rgba(255,255,255,.2);color:white;padding:3px 8px;border-radius:999px;text-decoration:none">👤 ${name}</a>`;
      } else {
        badge.innerHTML = `<a href="./login.html" style="font-size:.72rem;background:rgba(255,255,255,.15);color:white;padding:3px 10px;border-radius:999px;text-decoration:none">ログイン</a>`;
      }
    }
    window._fbUser = user;
    window._fbDb = db;
    window._fbSrc = SOURCE_KEY;
    // users/{uid}ドキュメントを作成（管理者ページで一覧表示するため）
    try {
      const { doc, setDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
      setDoc(doc(db,'users',user.uid),{email:user.email,displayName:user.displayName||user.email.split('@')[0],lastLogin:new Date().toISOString()},{merge:true}).catch(()=>{});
    } catch(e){}
  });

  const _orig = window.selectAns;
  if (typeof _orig === 'function') {
    window.selectAns = function(no, choice) {
      _orig(no, choice);
      const user = window._fbUser; const db = window._fbDb;
      if (!user || !db) return;
      const q = (typeof questions!=="undefined"?questions:[]).find(q2 => q2.no === no);
      if (!q) return;
      const isCorrect = choice === q.answer;
      const key = window._fbSrc + '_q' + no;
      if (isCorrect) {
        deleteDoc(doc(db,'users',user.uid,'wrongAnswers',key)).catch(()=>{});
      } else {
        setDoc(doc(db,'users',user.uid,'wrongAnswers',key),{
          source:window._fbSrc,qNo:no,label:q.label||('Q'+no),
          stem:(q.stem||'').substring(0,120),timestamp:serverTimestamp()
        },{merge:true}).catch(()=>{});
        setDoc(doc(db,'users',user.uid,'wrongHistory',key),{
          source:window._fbSrc,qNo:no,label:q.label||('Q'+no),
          stem:(q.stem||'').substring(0,120),firstWrong:serverTimestamp()
        },{merge:true}).catch(()=>{});
      }
    };
  }

  const _origResult = window.showResult;
  if (typeof _origResult === 'function') {
    window.showResult = function() {
      _origResult();
      const user = window._fbUser; const db = window._fbDb;
      if (!user || !db) return;
      const norms = (typeof questions!=="undefined"?questions:[]).filter(q=>!q.invalid&&!q.freeAnswer&&!q.multi);
      let correct=0,total=0;
      norms.forEach(q=>{total+=q.points||3;if((typeof ans!=="undefined"?ans:{})[q.no]===q.answer)correct+=q.points||3;});
      setDoc(doc(db,'users',user.uid,'stats',window._fbSrc),{
        source:window._fbSrc,lastCorrect:correct,lastTotal:total,
        lastDate:serverTimestamp(),totalAttempts:increment(1)
      },{merge:true}).catch(()=>{});
    };
  }
} catch(e){ console.warn('Firebase:',e.message); }
</script>
</body>
