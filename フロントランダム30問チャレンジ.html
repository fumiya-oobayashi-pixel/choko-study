": "問10", "points": 3, "answer": "C", "stem": "領収書に関する記述として、不適切なものはどれか。", "choices": {"A": "商法上の重要取引で使われた領収書は、１０年保管が必要。", "B": "領収書そのものには、有効期限はない。", "C": "必要項目の記載があっても名刺の裏では、認められない。"}, "explanation": "名刺の裏でも必要事項があれば領収書として認められる。また帳簿書類等（領収書含む）の通常の保存期間は7年間（欠損金が生ずる事業年度は10年間）。", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 11, "label": "問11", "points": 3, "answer": "B", "stem": "整備料金の説明と回収に関する記述として、不適切なものはどれか。", "choices": {"A": "点検・整備の価値をお客様に理解していただけるよう、必要性、効果などをわかりやすくお客様に説明することも、「機能的サービス」の一環である。", "B": "売掛金が回収予定日を過ぎても入金されない場合は、督促状を普通郵便や内容証明付郵便などの手段を講じることも大切である。", "C": "サービス部門で販売する商品は、点検、整備という点検整備作業における「技術の提供」である。"}, "explanation": "督促状は配達証明付郵便や内容証明付郵便で送付する。普通郵便では送達の証明ができないため適切でない。", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 12, "label": "問12", "points": 3, "answer": "C", "stem": "通過車両規定に照らし、売上に関する記述として、不適切なものはどれか。", "choices": {"A": "修理で使用した油脂は、２０％控除する。", "B": "純正品タイヤは、原価（ＤＮ）の２０％増しを振替金額とする。", "C": "自社レッカー使用は、１０％控除する。"}, "explanation": "実施販売会社が自社のレッカー車を使用した場合、振替請求額は5%を控除する（10%ではない）。", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 13, "label": "問13", "points": 3, "answer": "A", "stem": "通過車両規定において事故修理（保険修理）の売り上げ（振替）に関する記述として、適切なものはどれか。", "choices": {"A": "・技術料は保険査定額の５％を控除。\n・部品代は保険査定額の１０％を控除。", "B": "・技術料は保険査定額の２０％を控除。\n・部品代は保険査定額の１０％を控除。", "C": "・技術料は保険査定額の５％を控除。\n・部品代は保険査定額の５％を控除。"}, "explanation": "保険修理の振替は：技術料→保険査定額の5%控除、部品代→保険査定額の10%控除、外注作業技術料・外注作業部品代→保険査定額の5%控除。", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 14, "label": "問14", "points": 3, "answer": "C", "stem": "通過車両規定において、受付時の対応に関する記述として、適切なものはどれか。", "choices": {"A": "他販売会社のリコール未実施車両が入庫した場合、早急にリコール作業を実施しなければならないので入庫した販売会社で実施する。", "B": "他販売会社のリコール未実施車両が入庫した場合、元販売会社で実施するようにお客様へ伝える。", "C": "他販売会社のリコール未実施車両が入庫した場合、元販売会社に連絡し、どちらの販売会社で実施するか相談する。"}, "explanation": "他販売会社のリコール未実施車両が入庫した場合、元販売会社に連絡しどちらの販売会社で実施するか相談する。", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 15, "label": "問15", "points": 3, "answer": "A", "stem": "下請法の親事業者の義務に関する記述として、不適切なものはどれか。", "choices": {"A": "納入物受領後６０日を経過した日から支払手続き完了日までの期間については、年率１４．６％の遅延利息を支払わなくてはならない。", "B": "口頭発注によるトラブルを未然に防止するため、親事業者は発注に際して、「１１の法定事項」を満たした書面を直ちに下請事業者に発行しなければならない。", "C": "支払期限は、納入品受領（納入）日または役務の提供をした日から６０日以内のできるだけ短い期間内に定めなければならない。"}, "explanation": "遅延利息は、納入物受領後60日を経過した日から「実際に支払われた日まで」の期間について年率14.6%。「支払手続き完了日まで」ではない。", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 16, "label": "問16", "points": 3, "answer": "B", "stem": "ＤＰＲ（排出ガス浄化装置）に関する記述として、適切なものはどれか。", "choices": {"A": "メーター内の堆積量表示の本数に関わらず、インジケータランプが点滅することがあり、この場合はＤＰＲ装置の故障である。", "B": "ＤＰＲフィルター内に排出ガス中のＰＭを捕集し、燃焼処理を行う。", "C": "ＤＰＲフィルター内に排出ガス中のＮＯｘを捕集し、燃焼処理を行う。"}, "explanation": "DPRはPM（すす、粒子状物質）を捕集し燃焼処理する装置。NOxを捕集するのはSCR（尿素SCR）。インジケータランプ点滅が必ずしも故障ではない。", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 17, "label": "問17", "points": 3, "answer": "C", "stem": "２＊Ｇ付プロフィア（２０２３年モデル）に関する記述として、適切なものはどれか。", "choices": {"A": "ＥＤＳＳについて、車線逸脱警報をＯＦＦにしているとＥＤＳＳ作動時における車両逸脱判定は行わないため、減速および停止は機能するが、車線内維持は行わない。", "B": "ＳＡＭＳは、コーナーレーダーセンサーで進路上を交差する移動物を検知し、衝突の恐れがあれば自動でブレーキを作動させる。", "C": "レーンキーピングアシスト（ＬＫＡ）は、一定速度以上で走行中にシステムが車線逸脱を判断するとステアリングを制御し、車両を車線内に戻す支援や車線内に維持することを支援する。"}, "explanation": "A：EDSSにおける車両逸脱判定は車線逸脱警報OFFでも継続する。B：SAMSは警告のみで自動ブレーキは作動しない。C：LKAの説明は正しい。", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 18, "label": "問18", "points": 3, "answer": "C", "stem": "２＊Ｇ付プロフィア（２０２３年モデル）のＭ１１２型トランスミッションに関する記述として、不適切なものはどれか。", "choices": {"A": "オートシフトダウン機能は、アクセルペダルまたはクラッチペダルを踏むと解除される。", "B": "キックダウン機能があり、オートモード選択時に１１速から７速の間のいずれかにシフトダウンする。", "C": "非常コントロール機能を使用中の場合、インギヤでクラッチがつながっている状態ではエンジン始動が不可能である。"}, "explanation": "非常コントロール時は、インギヤ＆クラッチ接続の状態でもエンジン始動が可能である。", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 19, "label": "問19", "points": 3, "answer": "B", "stem": "道路運送車両法において、自動車の整備事業に関する記述として、適切なものはどれか。", "choices": {"A": "整備主任者は同一事業者が経営する事業場であれば、他の事業場の整備主任者を兼務することができる。", "B": "普通自動車特定整備事業のみの認証を受けた事業場では、四輪の軽自動車の分解整備を行うことはできない。", "C": "整備命令は、自動車整備事業者に対し、その実施した整備の状況が不良の場合に出される命令である。"}, "explanation": "普通自動車特定整備事業の対象は普通自動車・四輪小型自動車・大型特殊自動車であり、軽自動車は含まれない。C：整備命令は車両使用者に対して出されるもの。", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 20, "label": "問20", "points": 3, "answer": "A", "stem": "道路運送車両法および自動車点検基準に照らし、「事業用自動車の定期点検基準」に該当する自動車として、適切なものはどれか。", "choices": {"A": "乗車定員１１人以上の自家用自動車", "B": "乗車定員１０人以下の幼児運送専用の自家用普通・小型自動車", "C": "車両総重量８トン未満の貨物運送用の自家用普通・小型自動車"}, "explanation": "乗車定員11人以上の自家用自動車（マイクロバス等）は事業用自動車と同様に3ヶ月ごとの定期点検基準が適用される。", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 21, "label": "問21", "points": 3, "answer": "C", "stem": "「道路運送車両法の保安基準」に照らし、巻込防止装置（２０１８年製作車両）に関する記述として、不適切なものはどれか。", "choices": {"A": "大型自動車に備えるものについては、空車状態において、その下縁の高さが地上４５０ｍｍ以下、上縁の高さが６５０ｍｍ以上であること。", "B": "大型自動車以外の貨物用普通自動車に備えるものについては、運転者席乗降口付近を除きその下縁の高さが地上６００ｍｍ以下であること。", "C": "大型自動車に備えるものについては、空車状態において、巻込防止装置の平面部の上縁と荷台等の間隔が６００ｍｍ以下であること。"}, "explanation": "巻込防止装置の平面部の上縁と荷台等の間隔は550mm以下（600mmではない）。", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 22, "label": "問22", "points": 3, "answer": "B", "stem": "道路運送車両の保安基準に照らし、２０１７年制作車両で大型後部反射器を備えなければならない車両の記述として、適切なものはどれか。", "choices": {"A": "車両総重量６トン以上の貨物運送用普通自動車", "B": "車両総重量７トン以上の貨物運送用普通自動車", "C": "車両総重量８トン以上の貨物運送用普通自動車"}, "explanation": "貨物の運送の用に供する普通自動車であって、車両総重量が7トン以上のものの後面には大型後部反射器を備えなければならない。", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 23, "label": "問23", "points": 3, "answer": "C", "stem": "保険の処理および計算方法に関する記述として、不適切なものはどれか。", "choices": {"A": "分損とは、事故車が修理可能でしかも車両の修理費が、車の時価よりも低い場合の損害のことをいう。", "B": "自動車保険では一定の枠を設けてそれ以下の損害は支払い対象としないことにしており、免責金額として契約している。", "C": "保険金の限度は１事故ごとに取扱い、保険金が支払われると保険金額が減少する。"}, "explanation": "保険金が支払われても保険金額は減少するものではない。1事故ごとの限度額で管理されるが、支払後に保険金額が減少することはない。", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 24, "label": "問24", "points": 3, "answer": "B", "stem": "自賠責保険に関する記述として、不適切なものはどれか。", "choices": {"A": "指定整備事業者は、自賠責保険証の保険期間が、自動車検査証の有効期間が満了する日までの期間と全部が重複するものでないときは、保安基準適合証を交付してはならない。", "B": "死亡による保険金の限度額は２，５００万円である。", "C": "後遺障害第１級（常時介護を要する場合）の保険金の限度額は４，０００万円である。"}, "explanation": "死亡による保険金額の限度額は3,000万円（2,500万円ではない）。", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 25, "label": "問25", "points": 3, "answer": "C", "stem": "自動車保険に関する記述として、不適切なものはどれか。", "choices": {"A": "事故などを保険で処理する際には顧客の言い分を全面的に信用したり、直接介入したりしないようにする必要がある。", "B": "顧客から事故の連絡があった際には「お怪我はありませんか」など、まずは安否を気遣うようにする。", "C": "保険処理での車両修理は、顧客の利便性を考え、少額であれば保険会社に通知のみで即修理着手する。"}, "explanation": "保険処理での修理は、通知後に保険会社から承認を得てから修理着手する。少額であっても承認なしに着手することはできない。", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 26, "label": "問26", "points": 3, "answer": "B", "stem": "日野メンテナンスリースに関する記述として、不適切なものはどれか。", "choices": {"A": "メンテナンスリースとは、車両代・税金・保険等にメンテナンス費用を加えたリース契約のことである。", "B": "基本契約としては、４種類のプラン設定がある。", "C": "メンテナンス対象修理と対象外作業が一度に発生した場合、工事受付を別にして処理しなければならない。"}, "explanation": "基本契約は（S・M・R）プランの3種類。4種類ではない。", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 27, "label": "問27", "points": 3, "answer": "C", "stem": "安全の心構えに関する記述として、不適切なものはどれか。", "choices": {"A": "自分自身が主体となり自ら考えなければならない。", "B": "作業の洗い出しと改善、異常処置時の安全のルール作りを行う。", "C": "作業能率を阻害する原因と事故や災害を起こす原因は関連性がない。"}, "explanation": "作業能率を阻害する原因を掘り下げると大部分は事故や災害を起こす原因となる。両者には大きな関連性がある。", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 28, "label": "問28", "points": 3, "answer": "C", "stem": "安全行動と安全状態の具体例に関する記述として、不適切なものはどれか。", "choices": {"A": "フロント受付後に、お客様、内・外注業者、部品業者が入庫車を移動させることは安全上ご遠慮願う。", "B": "車両点検、受入点検は「点検場」を確保、明示し、そこで行う。", "C": "工場内のお客様立ち入りを禁止とし、その旨をフロント付近に表示し、安全上、いかなる場合も立ち入らせてはならない。"}, "explanation": "やむを得ずお客様が工場内に入る場合は帽子・ヘルメット等を着用していただくとともに、必ず案内をつける。いかなる場合も禁止というわけではない。", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 29, "label": "問29", "points": 3, "answer": "A", "stem": "フロント受付時の安全に関する記述について、不適切なものはどれか。", "choices": {"A": "お客様に提示する用事があるなど、すぐに使用する部品はフロントのカウンター内に置くようにしてお待たせしないようにする。", "B": "お客様車両入庫時には、フレーム腐食など作業の安全に支障がないか確認する。", "C": "お客様車両入庫時には、積荷の安全確認を行う。"}, "explanation": "フロントのカウンター内には部品などを置かない。部品はカウンター内に置いてはいけない。", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 30, "label": "問30", "points": 3, "answer": "B", "stem": "車検時のOBD検査に関する記述として、不適切なものはどれか。", "choices": {"A": "車載式故障診断装置を利用した自動車検査であり、特定DTCが発生している車両に関しては、保安基準不適合となる。", "B": "診断機接続可能な車両であれば、年式問わずに全数がOBD検査対象になる。", "C": "指定工場においてはOBD検査実施が義務となるが、認証工場での自工場内実施は義務ではない。"}, "explanation": "OBD検査対象は、国産が令和3年10月以降の新型車、輸入車が令和4年10月以降の新型車。年式問わず全数が対象ではない。", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 31, "label": "問31", "points": 5, "answer": "D", "stem": "平日の定時間内にＡ販売会社からエンジン始動不良となった日野車のバッテリー交換（２個）の広域サービス対応依頼が入ったため、Ｂ販売会社のサービスエンジニアが１０ｋｍ先の故障車両までサービスカーで出動した。Ａ販売会社への請求金額を消費税１０％込みで計算した場合、適切なものはどれか。\n（注）答えは小数点以下第一位を四捨五入し、整数とする。\n\n部品代（純正ＰＢバッテリー原価）：１６，５００円（１個）\n標準作業時間（バッテリー交換）：０．５時間\nＡ販売会社の工賃レート：１０，０００円\nＢ販売会社の工賃レート：１０，５００円\n\n【計算式】\n①技術料：10,500×0.5×1.25（出張）×0.8（技術料控除）＝5,250円\n②部品代：16,500×2個×1.2（振替増し）＝39,600円\n③サービスカー：(8,000＋400×10km)×0.9（振替控除）＝10,800円\n合計：(5,250＋39,600＋10,800)×1.1（消費税）＝61,215円", "choices": {"A": "４６，５３０円", "B": "５２，４７０円", "C": "５５，６５０円", "D": "６１，２１５円", "E": "６２，９２０円"}, "explanation": "①技術料5,250＋②部品代39,600＋③サービスカー10,800＝55,650円、消費税込み：55,650×1.1＝61,215円", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 32, "label": "問32", "points": 5, "answer": "A", "stem": "保険による事故修理を実施販売会社が下記内容で行なった。元販売会社への請求金額を消費税１０％込みで計算した場合、適切なものはどれか。\n（注）答えは小数点以下第一位を四捨五入し、整数とする。\n\n実施販売会社の保険査定額（税抜き）\n技術料：１００，０００円\n部品代：５０，０００円\n外注作業技術料：３０，０００円\n外注作業部品代：８０，０００円\n\n【計算式】\n技術料：100,000×0.95（5%控除）＝95,000円\n部品代：50,000×0.90（10%控除）＝45,000円\n外注技術料：30,000×0.95（5%控除）＝28,500円\n外注部品代：80,000×0.95（5%控除）＝76,000円\n合計税抜：244,500円　税込：244,500×1.1＝268,950円", "choices": {"A": "２６８，９５０円", "B": "２７０，５５０円", "C": "２７６，０５０円", "D": "２８０，５５０円", "E": "２８６，０００円"}, "explanation": "技術料95,000＋部品代45,000＋外注技術料28,500＋外注部品代76,000＝244,500円、税込：244,500×1.1＝268,950円", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 1, "label": "問1", "points": 3, "answer": "C", "stem": "日野サービスの基本として、不適切なものはどれか。", "choices": {"A": "お客様の期待を上回る仕事を提供することである。", "B": "お客様目線で業務を行うことである。", "C": "部品の価格を通常よりも安くお客様に提供することである。"}, "explanation": "日野サービスの基本は、無償の行動や価格を安くすることではなく、お客様に信頼・満足していただいて期待を上回る仕事を提供することが最良のサービスと考えている。", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 2, "label": "問2", "points": 3, "answer": "A", "stem": "接客対話の基礎に関する記述として、不適切なものはどれか。", "choices": {"A": "内容をよく分かってもらうために、専門用語をなるべく使って説明する。", "B": "感情的な議論をしないためには、落ち着いた態度と、なごやかな口調で話す。", "C": "相手の話しや、言い分をじっくり最後まで聞ける、聞き上手になる。"}, "explanation": "専門用語ではなく、一般的な用語で話す。", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 3, "label": "問3", "points": 3, "answer": "C", "stem": "お客様対応における「お辞儀」に関する記述として、適切なものはどれか。", "choices": {"A": "会釈の角度は１５度とされており、一般的にお客様の送迎時に適している。", "B": "敬礼の角度は３０度とされており、お客様へのお詫びの際に適している。", "C": "最敬礼の角度は４５度とされており、初対面の人への挨拶に適している。"}, "explanation": "会釈（15度）＝顔見知りとのすれ違い時など / 敬礼（30度）＝お客様の送迎時など / 最敬礼（45度）＝お詫びや初対面の挨拶など。Cが正しい。", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 4, "label": "問4", "points": 3, "answer": "C", "stem": "お客様対応に関する記述として、不適切なものはどれか。", "choices": {"A": "お客様の期待に応えることで、信頼関係を構築することが重要である。", "B": "サービスに対する期待と結果にギャップが生じると、お客様は不満を持つようになる。", "C": "口うるさいお客様には十分な対応を行い、親しいお客様にはそうでない対応を行うような柔軟性が信頼関係を構築する。"}, "explanation": "公平な対応が重要となる。お客様によって対応を変えるのは不適切。", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 5, "label": "問5", "points": 3, "answer": "A", "stem": "お客様への説明方法として、適切なものはどれか。", "choices": {"A": "お客様に技術説明をする場合は、現物や資料を示して説明をする。", "B": "完成時間や整備料金について見通しがつかない場合は、具体的な表現は避ける。", "C": "分解してみなければ正確なことが分からない場合は、誤解を与えないようにあいまいな表現をしておく。"}, "explanation": "お客様には、あいまいな表現は避け、具体的に現物や資料を見せて説明をする。", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 6, "label": "問6", "points": 3, "answer": "C", "stem": "苦情対応に関する記述として、不適切なものはどれか。", "choices": {"A": "お客様の話を親身になってよく聞き、その場で対応できることは迅速に実施する。", "B": "苦情受付後は、速やかに上司に報告する。", "C": "自分で対応できない時は上司へ相談するまでの間に、その場しのぎの回答を行う。"}, "explanation": "対応しきれないことは、すぐに上司へ相談する必要はあるが、その場しのぎの回答は避ける。", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 7, "label": "問7", "points": 3, "answer": "B", "stem": "身だしなみに関する記述として、不適切なものはどれか。", "choices": {"A": "第一印象は見た目で決まると言われている。", "B": "メカニックはお客様対応が少ないため、身だしなみは気にしなくても良い。", "C": "クールビズの場合でも、肌着は見えないようにした方が良い。"}, "explanation": "どのような立場でも服装が乱れていないかなどの清潔感ある身だしなみが必要。メカニックも同様。", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 8, "label": "問8", "points": 3, "answer": "A", "stem": "電話でのお客様対応に関する記述として、不適切なものはどれか。", "choices": {"A": "相手の話の途中で結論が判断できた場合は、相手の都合を考えて話を遮ってでも返答する必要がある。", "B": "電話では声の調子で印象が決まってしまうので、明るく歯切れの良い話し方をする必要がある。", "C": "電話は相手の都合を一方的に拘束することがあるので、相手のことをよく考える必要がある。"}, "explanation": "早とちりの原因になるので、相手の話は最後まで聞き取る必要がある。話を遮るのは不適切。", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 9, "label": "問9", "points": 3, "answer": "B", "stem": "名刺の受け渡しマナーとして、適切なものはどれか。", "choices": {"A": "名刺を受け取ったらすぐにしまう。", "B": "名前の読み方がわからない場合は、その場で確認する。", "C": "打合せ内容を忘れないように、その場で名刺にメモをする。"}, "explanation": "名刺を受取ってもすぐにしまわない。名刺にメモをしない。名前の読み方がわからない場合はその場で確認する（B適切）。", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 10, "label": "問10", "points": 3, "answer": "A", "stem": "お客様対応に関する記述として、不適切なものはどれか。", "choices": {"A": "会話の始めにお客様との距離を縮めるために話題が豊富な政治、宗教、思想に関する話をすると良い。", "B": "お客様の話は最後までよく聞く必要があり、そのうえでこちらの意見を述べることも大切である。", "C": "人は「オットリ型」など、ある程度タイプ別に分かれており、それぞれの対応が必要になる。"}, "explanation": "政治、宗教、思想の話は禁句。対立・摩擦を生む可能性があるため接客の場では避けるべき。", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 11, "label": "問11", "points": 3, "answer": "C", "stem": "受付時現車の確認を行う際の注意点に関する記述として、不適切なものはどれか。", "choices": {"A": "不正改造の有無を十分にチェックし、不正改造がある場合にはお客様に説明し、正規の状態に戻すようにお願いする。", "B": "車両の傷、汚れ、積荷、などの状態をお客様と一緒に確認し、納車後のトラブル防止を図る。", "C": "貴重品や高価なものが搭載されていたら、お客様に伝えフロントで大切に保管しておく。"}, "explanation": "貴重品は、お客様に持ち帰るようにお願いする（フロントで保管しない）。", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 12, "label": "問12", "points": 3, "answer": "B", "stem": "受付対応に関する記述として、不適切なものはどれか。", "choices": {"A": "お客様の出迎えでは、大きくハッキリした言葉で挨拶する。", "B": "ご用命事項を聞き取る際には、重要な情報だけメモをとる。", "C": "ご用命確認後は、速やかにお客様を待合室へご案内する。"}, "explanation": "ささいなことでも必ずメモをとる。重要な情報だけでは不十分。", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 13, "label": "問13", "points": 3, "answer": "A", "stem": "整備料金の説明と回収に関する記述として、不適切なものはどれか。", "choices": {"A": "有償と無償の作業を同時に行う場合、請求時点で「有償、無償の区別」「料金」を明確に「お客様に説明」しておくことが、「整備料金」の円滑な回収につながる。", "B": "サービス部門で販売する商品は点検、整備という機能的サービスすなわち、点検整備作業における「技術の提供」である。", "C": "提供する点検、整備の価値を十分理解していただけるよう、わかりやすく「お客様に説明」することも機能的サービスの一環である。"}, "explanation": "料金と有償・無償の説明は受注時点（請求時点ではなく）で行う。", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 14, "label": "問14", "points": 3, "answer": "B", "stem": "引渡し、納車時の対応に関する記述として、不適切なものはどれか。", "choices": {"A": "作業指示書通りの作業が完了しているか、車両は清掃されているか、傷が付かなかったか、搭載物は受付時の通りかなど、お客様の車両を確認する必要がある。", "B": "どの部品がどのように不具合があったかを、お客様に分かりやすく説明できるように、取り替えた部品の損傷状態を自分で確認してから廃却する必要がある。", "C": "納車時の説明は、お客様からの申し出内容に対する説明のみならず、使用上の注意、この先必要になる整備等のアドバイスをする必要がある。"}, "explanation": "交換部品はお客様へ提示し分かりやすく説明した後、お客様の廃却意思の確認後に廃却する。自分で確認後に廃却するのは不適切。", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 15, "label": "問15", "points": 3, "answer": "C", "stem": "領収書に関する記述として、不適切なものはどれか。", "choices": {"A": "商法上の重要取引で使われた領収書は、１０年保管が必要。", "B": "領収書そのものには、有効期限はない。", "C": "必要項目の記載があっても名刺の裏では、認められない。"}, "explanation": "必要項目（日付・宛名・発行者・金額）が記載されていれば、名刺の裏であっても領収書として認められる。", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 16, "label": "問16", "points": 3, "answer": "C", "stem": "通過車両の業務処理規定に関する記述として、不適切なものはどれか。", "choices": {"A": "営業時間外でも出動できるように幹線道路を中心に全国に対応拠点を配置している。", "B": "出動は作業の安全確保や連絡のため２名体制を原則としている。", "C": "営業時間外での出動では特別対応料を請求できることになっており、他メーカー車でも金額は同じである。"}, "explanation": "他メーカー車両への対応は割増しになっている（10,000円割増し請求ができる）。", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 17, "label": "問17", "points": 3, "answer": "B", "stem": "通過車両の業務処理規定に関する記述として、不適切なものはどれか。", "choices": {"A": "元販売会社とは、通過車両を修理対応する際、その車両を販売した販売会社や主幹販売会社など、現在取引のある販売会社を総称していう。", "B": "通過車両とは、自社以外の販売会社が販売した車両や、自社の他拠店が販売した車両を総称していう。", "C": "実施販売会社とは、通過車両を修理対応する販売会社をいう。"}, "explanation": "通過車両とは、自社以外の販売会社が販売した車両をいう。自社の他拠店が販売した車両は含まない。", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 18, "label": "問18", "points": 3, "answer": "B", "stem": "保証制度に関する記述として、不適切なものはどれか。", "choices": {"A": "販売会社はお客様との売買契約で、保証書に記載されている期間と条件に従って保証修理することを約束している。", "B": "日野自動車の保証制度は、販売会社・日野自動車がそれぞれの約束を結び、この約束によって成り立っている。", "C": "販売会社は日野販売会社基本契約書に基づき、日野自動車に代わって保証修理を実施することを約束している。"}, "explanation": "日野自動車の保証制度は、お客様・販売会社・日野自動車がそれぞれの約束を結び成り立っている。「お客様」が抜けているBは不適切。", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 19, "label": "問19", "points": 3, "answer": "A", "stem": "自動車損害賠償責任保険（自賠責保険）に関する記述として、不適切なものはどれか。", "choices": {"A": "対人と対物への賠償として入る保険。", "B": "自動車１台ごとに必ずつけなくてはならない保険（強制保険）。", "C": "保険の契約が締結されている車両でなければ運行してはならない。"}, "explanation": "自動車損害賠償保障法により、強制的につけなくてはならない対人賠償のみを担保するもの。対物賠償は含まれない。", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 20, "label": "問20", "points": 3, "answer": "C", "stem": "２＊Ｇ付プロフィア（２０２３年モデル）に関する記述として、適切なものはどれか。", "choices": {"A": "ＥＤＳＳについて、車線逸脱警報をＯＦＦにしているとＥＤＳＳ作動時における車両逸脱判定は行わないため、減速および停止は機能するが、車線内維持は行わない。", "B": "ＳＡＭＳは、コーナーレーダーセンサーで進路上を交差する移動物を検知し、衝突の恐れがあれば自動でブレーキを作動させる。", "C": "レーンキーピングアシスト（ＬＫＡ）は、一定速度以上で走行中にシステムが車線逸脱を判断するとステアリングを制御し、車両を車線内に戻す支援や車線内に維持することを支援する。"}, "explanation": "A：EDSSは車線逸脱警報OFFでも車両逸脱判定は継続させる。B：SAMSは警告のみであり自動ブレーキは作動しない。C（LKA）の記述が適切。", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 21, "label": "問21", "points": 3, "answer": "A", "stem": "尿素ＳＣＲ（排出ガス浄化装置）に関する記述として、適切なものはどれか。", "choices": {"A": "尿素水を排出ガスに噴射し、ＮＯｘを低減するシステムである。", "B": "尿素水を排出ガスに噴射し、排出ガス温度を上昇させるシステムである。", "C": "尿素水を排出ガスに噴射し、ＰＭを低減するシステムである。"}, "explanation": "SCRシステムは、尿素水を排出ガスに噴射してNOxを分解し、窒素と水に変化させてNOxを低減するシステム。", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 22, "label": "問22", "points": 3, "answer": "C", "stem": "ＤＰＲ（排出ガス浄化装置）に関する記述として、不適切なものはどれか。", "choices": {"A": "メーター内の堆積量表示の本数に関わらず、インジケータランプが点滅することがあるが、ＤＰＲ装置の故障ではない。", "B": "ＤＰＲフィルター内に排出ガス中のＰＭを捕集し、燃焼処理を行う。", "C": "ＤＰＲフィルター内に排出ガス中のＮＯｘを捕集し、燃焼処理を行う。"}, "explanation": "DPRはPM（粒子状物質）を捕集・燃焼処理する装置。NOxを捕集・処理するのはDPRではなく尿素SCRシステム。", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 23, "label": "問23", "points": 3, "answer": "C", "stem": "下請法で定義している親事業者の４つの義務として、不適切なものはどれか。", "choices": {"A": "発注書面交付の義務", "B": "支払日を定める義務", "C": "商品受領の義務"}, "explanation": "4つの義務は①発注書面の交付義務 ②支払日を定める義務 ③遅延利息を支払う義務 ④書類作成の義務。「商品受領の義務」は含まれない。", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 24, "label": "問24", "points": 3, "answer": "A", "stem": "道路運送車両法において、法令３ヶ月点検を実施しなければならない自動車の種別として、不適切なものはどれか。", "choices": {"A": "乗車定員１０人以下の乗用の普通、小型、検査対象軽自動車のレンタカー", "B": "乗車定員１１人の自家用バス", "C": "車両総重量８トンの自家用貨物トラック"}, "explanation": "乗用レンタカー（乗車定員10人以下）は3ヶ月点検の対象ではなく6ヶ月点検（道路運送車両法第48条）。", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 25, "label": "問25", "points": 3, "answer": "A", "stem": "道路運送車両法に照らし、自動車の検査の種別として、不適切なものはどれか。", "choices": {"A": "分解整備検査", "B": "予備検査", "C": "臨時検査"}, "explanation": "道路運送車両法における検査の種別は「新規検査」「継続検査」「臨時検査」「予備検査」「構造等変更検査」。「分解整備検査」という種別は存在しない。", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 26, "label": "問26", "points": 3, "answer": "B", "stem": "道路運送車両法に関する記述として、不適切なものはどれか。", "choices": {"A": "三級自動車整備士の資格を取得した者は、整備管理者の資格を有する。", "B": "指定整備事業は、保安基準適合証を交付し、公道走行できる状態にして国の検査場に現車提示を行う必要がある。", "C": "自家用マイクロバスを運行する者は、１日１回、その運行の開始前に日常点検をしなければならない。"}, "explanation": "指定整備事業者（民間車検場）から有効な保安基準適合証の提示があった場合、保安基準に適合するものとみなされ、国の検査場への現車提示が省略できる。", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 27, "label": "問27", "points": 3, "answer": "A", "stem": "品質改善に関する記述として、適切なものはどれか。", "choices": {"A": "「改善対策」とは、保安基準に関わらず、日野自動車（メーカー）が安全確保、公害防止の観点から必要と判断した場合に実施するものである。", "B": "「サービスキャンペーン」とは、車両の構造・装置の不具合による事故を未然に防止することを目的として、国土交通省がメーカーへ改善を命令する制度である。", "C": "「リコール」とは、車両の構造・装置・性能等が、保安基準に適合しなくなる場合に、保証書とは別に有償で修理するものである。"}, "explanation": "リコールは保安基準に適合しなくなるおそれがある場合の無償修理（有償ではない）。サービスキャンペーンは国交省の命令制度ではなくメーカーの自主的措置。Aの「改善対策」が正しい説明。", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 28, "label": "問28", "points": 3, "answer": "C", "stem": "職場内の５Ｓに関する記述として、適切なものはどれか。", "choices": {"A": "整理とは、必要なものがいつでも取り出せて、戻せること。", "B": "整頓とは、いるものといらないものを分けて、いらないものを捨てること。", "C": "清掃とは、いつもきれいな環境にしておくこと。"}, "explanation": "整理とはいるものといらないものを分けていらないものを捨てること。整頓とは必要なものがいつでも取り出せて戻せること。AとBが逆。清掃（C）が正しい。", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 29, "label": "問29", "points": 3, "answer": "B", "stem": "フロント受付時の安全に関する記述について、不適切なものはどれか。", "choices": {"A": "お客様車両入庫時には、積荷の安全確認を行う。", "B": "お客様に提示する用事があるなど、すぐに使用する部品はフロントのカウンター内に置くようにしてお待たせしないようにする。", "C": "お客様車両入庫時には、フレーム腐食など作業の安全に支障がないか確認する。"}, "explanation": "フロントのカウンター内には部品などを置かない（安全のため）。", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 30, "label": "問30", "points": 3, "answer": "A", "stem": "リヤダブルタイヤ間に挟まった石などの異物の除去方法に関する記述として、適切なものはどれか。", "choices": {"A": "両方のタイヤのエアを完全に抜いてから除去する。", "B": "片方のタイヤのエアを抜いてから除去する。", "C": "エアを抜かずにハンマーで石をたたいて除去する。"}, "explanation": "エアを抜かずに無理やり取り除くとタイヤが破裂する危険がある。両方のタイヤのエアを完全に抜いてから安全に除去する。", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 31, "label": "問31", "points": 5, "answer": "D", "stem": "【問２(1)】通過車両の業務処理規定に照らし、サービスカーを使用して片道１５ｋｍ離れた場所での出張作業を行った。\n元販売会社へのサービスカー使用料金の振り替え請求額を消費税１０％込みで計算した場合、適切なものはどれか。\n\n（注）答えは小数点以下第一位を四捨五入し、整数とする。", "choices": {"A": "９，４８０円", "B": "１２，９００円", "C": "１５，８４０円", "D": "１３，８６０円", "E": "１７，８００円"}, "explanation": "【計算】\n基本料金：8,000円\n距離料金：400円×15km＝6,000円\n小計：14,000円\n10%控除：14,000×0.9＝12,600円\n消費税込：12,600×1.1＝13,860円 → D", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 32, "label": "問32", "points": 5, "answer": "A", "stem": "【問２(2)】平日の営業時間内に通過車両のバッテリ交換を下記内容で行った。消費税１０％込みの元販売会社への振替料金として、適切なものはどれか。\n\n技術料：１０，０００円（税抜）\n部品代（定価）：５，０００円（税抜）\n純正ＰＢバッテリ（原価）：２５，０００円（２個分合計税抜）\n\n（注）答えは小数点以下第一位を四捨五入し、整数とする。", "choices": {"A": "４６，２００円", "B": "４９，８００円", "C": "５０，５００円", "D": "５１，９００円", "E": "５３，８００円"}, "explanation": "【計算】\n技術料振替（20%控除）：10,000×0.8＝8,000円\n部品代振替（定価×0.8）：5,000×0.8＝4,000円\n純正PBバッテリ（原価×1.2）：25,000×1.2＝30,000円\n小計：42,000円\n消費税込：42,000×1.1＝46,200円 → A", "source": "24年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 1, "label": "問1(1)", "points": 3, "answer": "B", "stem": "保証業務に関する記述として、不適切なものはどれか。", "choices": {"A": "保証修理には販売会社の収益、お客様の信頼の回復と維持、市場技術情報の収集と大きな役割を持っている。", "B": "補給部品の保証について、日野の保証書に記載する一般保証部品に準じ、販売会社の取り付け上に起因する不具合も含むものとする。", "C": "部品メーカーの保証対象と適用範囲について、バッテリーは製造日より６ヶ月間であり、タイヤについては各タイヤ製造メーカーの条件による保証とし、それぞれ代替品にて対応となる。", "D": "大型トラック／トラクター保証書について日野自動車が示す仕様（積載量、定員、速度、エンジン回転数等）の限度を超える使用に起因すると判定できる故障または破損については適用しない。"}, "explanation": "補給部品の保証は一般保証部品に準じるが、「販売会社の取り付け上に起因する不具合」は含まない（含むは誤り）。", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 2, "label": "問1(2)", "points": 3, "answer": "C", "stem": "下請法の親事業者の４つの義務に関する記述として、不適切なものはどれか。", "choices": {"A": "下請事業者との取引に関する記録を書類として作成し、２年間保存しなければならない。", "B": "口頭発注によるトラブルを未然に防止するため、親事業者は発注に際して、「１１の法定事項」を満たした書面を直ちに下請事業者に発行しなければならない。", "C": "追加で作業を依頼したが、下請事業者と話し合って合意したので書類の追加発行は対応しなかった。", "D": "支払期限は、納入品受領（納入）日または役務の提供をした日から６０日以内のできるだけ短い期間内に定めなければならない。"}, "explanation": "合意があっても違反になることがある。追加作業を依頼した場合でも、書類の追加発行（発注書面の作成・交付）が必要。", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 3, "label": "問1(3)", "points": 3, "answer": "D", "stem": "見積りに関する記述について不適切なものはどれか。", "choices": {"A": "見積りには修理費用の合意書、部品の発注書、修理の作業指示書、経営のための資料としてなどの機能と役割があり、修理費用、修理の具体的内容、修理所要日数などをお客様に知らせる行為である。", "B": "事故見積りでは適正利潤を確保するために、自動車の構造・機能の基本知識、損傷診断技法、修理技法、脱漏、重複などを加味した料金算定の知識が不可欠になる。", "C": "事故見積り内容において修理品質の確保ができ、適正な利潤が得られる作業内容と料金明細になっていることが必要であり、修理箇所について衝撃波及経路に沿った点検を行い、損傷程度と範囲を記載する。", "D": "一般(故障)整備の見積り作成の場合、分解し判断が必要となった場合は整備料金および時間について即時に答えるのではなく、作業工程が判明した際に報告するべきである。"}, "explanation": "故障整備のお客様に対しては、整備料金および時間（整備見積り）について「即時に答えなければならない」。分解後に報告するというのは不適切。", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 4, "label": "問1(4)", "points": 3, "answer": "A", "stem": "受付対応や苦情対応に関する記述として、不適切なものはどれか。", "choices": {"A": "苦情においては、不満発生から少し時間をおくため対応せずにお客様が冷静になることを待つことも大切である。", "B": "商品やサービスに問題があっても全てが苦情になるわけではなく、信頼関係ができていれば大問題にならない場合もあるが、それに甘えず常に緊張感を持って対応することが必要である。", "C": "口コミの波及効果は、好意的な内容よりも非好意的な内容の方が二倍も強く影響を与えると言われている。", "D": "不満を持った顧客のうち、苦情を申し立て、その解決に満足した顧客の再購入決定率は、不満を持ちながら苦情を申し立てない顧客より比較的高いと言われている。"}, "explanation": "不満が小さいうちに早く対応することが重要。時間をおいて冷静になるのを待つのは不適切で、対応が遅れるほど不満が大きくなる。", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 5, "label": "問1(5)", "points": 3, "answer": "D", "stem": "見積書に関する記述として、不適切なものはどれか。", "choices": {"A": "分解しないと追加作業が発生するかどうかがわからないものに関しては、見積りの段階で概算の金額であることを伝える。", "B": "見積りとは、費用、修理内容、日数などをお客様に理解しやすいように提示するもので、出来る限り正確に見積りを提示し、お客様に納得していただくものである。", "C": "見積りを正確なものにするには、受け入れ時のチェックや問診が必要になる。", "D": "点検・車検時の見積りの作成では、点検整備料金の項目の中にお客様ご依頼事項を記載して、見やすく一括しておく必要がある。"}, "explanation": "点検・車検時の見積りでは、「点検整備料金」と「お客様ご依頼事項」は区別しておく必要がある（一括にしてはいけない）。", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 6, "label": "問1(6)", "points": 3, "answer": "D", "stem": "通過車両の業務処理要領について、実施販売会社が元販売会社へ販売会社間振替を行う場合、不適切なものはどれか。", "choices": {"A": "HITOSSⅡでの価格クラスがZBの部品について、定価の１０％を控除し請求を行った。", "B": "使用した他メーカー部品は、自社のお客様へ販売する価格と同じ価格で請求を行った。", "C": "外注のレッカーサービスを使用したが、元販売会社から要求が無かったため外注先請求書を添付しなかった。", "D": "整備で使用した洗油、ウエスは「消耗品」のようにまとめた項目にせず、それぞれを分けて請求する。"}, "explanation": "洗油・ウエス等は技術料原価に含まれているため、消耗品として別途請求しない。なお外注先請求書は原則として添付しない（元販売会社から要求があった場合のみ）。", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 7, "label": "問1(7)", "points": 3, "answer": "A", "stem": "引渡し、納車時の対応に関する記述として、不適切なものはどれか。", "choices": {"A": "どの部品がどのように不具合があったかを、お客様に分かりやすく説明できるように、取り替えた部品の損傷状態を自分で確認してから廃却する必要がある。", "B": "作業指示書通りの作業が完了しているか、車両は清掃されているか、傷が付かなかったか、搭載物は受付時の通りかなど、お客様の車両を確認する必要がある。", "C": "納車時の説明は、お客様からの申し出内容に対する説明のみならず、使用上の注意、この先必要になる整備等のアドバイスをする必要がある。", "D": "納車時での説明では、作業中に気付いたことや車の使い方に対するアドバイスなどお客様一人一人に合わせた心づかいが必要である。"}, "explanation": "交換部品はお客様へ提示し分かりやすく説明した後、お客様の廃却意思の確認後に廃却する（自分で確認してから廃却するのでは不十分）。", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 8, "label": "問1(8)", "points": 3, "answer": "A", "stem": "HITOSSⅡの売上画面に関する記述として、不適切なものはどれか。", "choices": {"A": "①欄は作業・部品区分の入力であり、１を入力すると『作業内容』、２を入力すると『部品』、３を入力すると『ご用命事項』となる。", "B": "②欄は部位の入力であり、対応する数字を入力すると『上』や『左右』などの位置が表示されるので、複数ある部品の作業をする際には入力すると部位の特定が容易になる。", "C": "③欄は有・無償区分の入力であり、『０～２』だと有償、『３～５』だと保証、『６～８』だと無償での売上となる。", "D": "④欄は納品書への売価表示方法の入力であり、『０』だと標準の売価表示、『１』を入力すると納品書の売価欄に『サービス』と表示される。"}, "explanation": "①欄は数字や記号を入力することで行の追加や入れ替えなどができる欄。「作業・部品区分」の入力は①欄の右隣の欄に入力する。", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 9, "label": "問1(9)", "points": 3, "answer": "B", "stem": "手形、小切手、領収書に関する記述として、不適切なものはどれか。", "choices": {"A": "手形の記載金額が１０万円以上の場合、印紙税法により収入印紙を貼ることが定められており、貼り付けられた印紙に消印を押す理由として、一度使った収入印紙が再度使われることを防ぐためである。", "B": "手形・小切手を受け取った際の確認ポイントとして、受取人の名前、支払金額、支払日、振出日が記載されていても被裏書人欄が記載されていない場合は無効になる。", "C": "領収書の保存、保管期間は請求書などと同様に帳簿類の記載事項の証拠書類となるため１０年間分の保管が必要である。", "D": "手形の取立期間は記載された日から２日、当日を含めて３日間となり、この中に日曜・祭日があればこれを除いて実日数となる。"}, "explanation": "被裏書人欄が記載されていなくても「白地式裏書」として渡すことができ、裏書が連続しているとみなされるため無効にはならない。", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 10, "label": "問1(10)", "points": 3, "answer": "C", "stem": "整備料金の説明と回収に関する記述として、不適切なものはどれか。", "choices": {"A": "点検・整備の価値をお客様に理解していただけるよう、必要性、効果などをわかりやすくお客様に説明することも、「機能的サービス」の一環である。", "B": "無償、有償作業を同時に行う場合、受注の時点で「料金」とその有償、無償についてお客様に説明しておく。", "C": "売掛金が回収予定日を過ぎても入金されない場合は、督促状を普通郵便や内容証明付郵便などの手段を講じることも大切である。", "D": "サービス部門で販売する商品は、点検、整備という点検整備作業における「技術の提供」である。"}, "explanation": "督促状は「配達証明付郵便」や「内容証明付郵便」で送付する（普通郵便では証拠能力が低い）。", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 11, "label": "問1(11)", "points": 3, "answer": "B", "stem": "HITOSSⅡでの保証申請に関する記述として、不適切なものはどれか。", "choices": {"A": "保証申請の期限は、日野車の一般保証であれば故障発生日（入庫日）から６０日間である。（通過車両除く）", "B": "１車両に対して複数故障での保証申請は、１故障ずつ不具合内容を明確にし、申請書を結合して申請する。", "C": "保証にて交換した部品の保管期限は３０日間である。（スカニア除く）", "D": "申請結果が一部否決または否決となった場合、差分は自社の費用で売り上げることになる。"}, "explanation": "申請は1車両1故障が原則であり、複数故障がある場合は結合ではなく「分割して」申請する。", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 12, "label": "問1(12)", "points": 3, "answer": "B", "stem": "通過車両の業務処理要領について、保険による事故修理の販売会社間振替として、適切なものはどれか。", "choices": {"A": "技術料は、保険査定額の１０％を控除する。", "B": "部品代は、保険査定額の１０％を控除する。", "C": "外注作業技術料は、保険査定額の１０％を控除する。", "D": "外注作業部品代は、保険査定額の１０％を控除する。"}, "explanation": "保険修理の販売会社間振替控除率：部品代→10%控除（正しい）、技術料→5%控除、外注作業技術料→5%控除、外注作業部品代→5%控除。", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 13, "label": "問1(13)", "points": 3, "answer": "D", "stem": "優良客として登録されているお客様（通過車両）から自走入庫により、レンジャーの右側リヤコンビネーションランプ不具合修理依頼を直接受け、Assy交換保証での対応予定となった。\n部品代２０，０００円\nこの場合の対応として、適切なものはどれか。", "choices": {"A": "元販売会社に連絡をとらずに、保証受付をして作業した。", "B": "元販売会社に連絡がとれないので、作業を断った。", "C": "元販売会社に連絡がとれないので、一般作業で受付し、自社で立替払いとした。", "D": "元販売会社に連絡をとり、処置を決定した。"}, "explanation": "保証になると思われる場合は、必ず元販売会社に連絡する。1件5万円未満でも保証修理が見込まれる場合は元販売会社への連絡・確認が必要。", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 14, "label": "問1(14)", "points": 3, "answer": "A", "stem": "通過車両規定において、サービスカー使用料金（税抜）に関する記述として、不適切なものはどれか。\n\n【規定】基本料8,000円＋片道1kmごとに400円加算\nやむを得ず2往復した場合は基本8,000円＋片道1kmごとに300円加算\n振替は上記金額の10%控除", "choices": {"A": "出発地点から到着地点まで、片道９ｋｍの場合に販売会社間振替料金は９，５２０円となる。", "B": "出発地点から到着地点まで、片道で９ｋｍを２往復した場合に販売会社間振替料金は１２，０６０円となる。", "C": "出発地点から到着地点まで、片道１７ｋｍの場合に販売会社間振替料金は１３，３２０円となる。", "D": "出発地点から到着地点まで、片道で１７ｋｍを２往復した場合に販売会社間振替料金は１６，３８０円となる。"}, "explanation": "片道9kmの正しい計算：\n8,000＋(400×9)=11,600円 → 11,600×0.9=10,440円\nAの9,520円は誤り。\n\n各選択肢の検証：\nB: 8,000+(300×9×2)=13,400×0.9=12,060円 ✓\nC: 8,000+(400×17)=14,800×0.9=13,320円 ✓\nD: 8,000+(300×17×2)=18,200×0.9=16,380円 ✓", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 15, "label": "問1(15)", "points": 3, "answer": "D", "stem": "２＊Ｇ付プロフィア（２０２３年モデル）に関する記述として、適切なものはどれか。", "choices": {"A": "ＥＤＳＳについて、車線逸脱警報をＯＦＦにしているとＥＤＳＳ作動時における車両逸脱判定は行わないため、減速および停止は機能するが、車線内維持は行わない。", "B": "ＳＡＭＳは、コーナーレーダーセンサーで進路上を交差する移動物を検知し、衝突の恐れがあれば自動でブレーキを作動させる。", "C": "ドライバーモニターⅡは、ＰＣＳと連動して作動するものであるため、単独での運転者への警報機能は備えていない。", "D": "レーンキーピングアシスト（ＬＫＡ）は、一定速度以上で走行中にシステムが車線逸脱を判断するとステアリングを制御し、車両を車線内に戻す支援や車線内に維持することを支援する。"}, "explanation": "A→EDSSにおける車両逸脱判定は車線逸脱警報OFFでも継続させる。B→SAMSは警告のみ（自動ブレーキは作動しない）。C→ドライバーモニターⅡは単独警報機能がある。D→LKAの説明として正しい。", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 16, "label": "問1(16)", "points": 3, "answer": "C", "stem": "ハイブリッド車または電気自動車に関する記述として、不適切なものはどれか。", "choices": {"A": "システムメインリレーは、高電圧回路の接続をする際に複数のリレーを用いて、接続直後の突入電流から回路を保護するなどをしている。", "B": "インバータは、高電圧バッテリーの直流電流をパワートランジスタのON／OFFで三相交流に変化させている。", "C": "DC／DCコンバーターは、システム起動の際に２４Vの電圧からトランジスタなどを用いて高電圧に昇圧し、高電圧回路に予め電圧をかけている。", "D": "回生ブレーキは、車両減速時に駆動用モーターを発電機として利用し、高電圧バッテリーを充電する。その際、発電の抵抗で車両が減速する。"}, "explanation": "DC/DCコンバーターは高電圧バッテリーの電圧を24Vや12Vに「降圧」して通常電装品に使用している（昇圧ではない）。", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 17, "label": "問1(17)", "points": 3, "answer": "C", "stem": "２０２４年モデルのプロフィアに搭載されている装置や部品の整備に関する記述として、不適切なものはどれか。", "choices": {"A": "PCS（衝突被害軽減ブレーキ）で使用しているミリ波レーダーを交換し、初期学習を行う作業は、特定整備に該当する。", "B": "LKA（レーンキープアシスト）で使用しているカメラを取り外し、フロントガラスを交換したうえで、取り外したカメラを再度取り付け、初期学習を行う作業は、特定整備に該当する。", "C": "SAMS（サイトアラウンドモニターシステム）で使用しているサイドレーダーセンサーを交換し、初期学習を行う作業は、特定整備に該当する。", "D": "ブレーキドラムを取り外し、ブレーキシューやライニングを交換する作業は、特定整備に該当する。"}, "explanation": "特定整備に該当する作業：①従来の分解整備、②自動ブレーキ用の前方センシングセンサーの取外し・調整、③自動操舵機能用センサーの取外し・調整。SAMSは警報のみで自動ブレーキや自動操舵は行わないため、SAMSのサイドレーダー交換は特定整備に該当しない。", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 18, "label": "問1(18)", "points": 3, "answer": "C", "stem": "２＊Ｇ付車のＤＰＲ（排出ガス浄化装置）に関する記述として、適切なものはどれか。", "choices": {"A": "再生時にエキゾーストブレーキバルブが閉じるのは、エンジン回転の上がり過ぎを防止し、適切な排ガス流量を維持するためである。", "B": "ＤＰＲのスス堆積量は、差圧センサーでDPR前後の圧力を検出することで実測されており、再生時はフィルター温度と差圧から燃焼量値を計算する。", "C": "停車時の再生ではポスト噴射を行わないようになっているが、燃料添加弁に不具合があるとポスト噴射を実行することがある。", "D": "再生は、スス堆積量と燃焼量が一致するまで継続される。この時の堆積量値は再生開始時の値となっている。"}, "explanation": "A→エキゾーストブレーキバルブが閉じるのは排気に抵抗をつくって負荷をかけ、噴射量を増やして熱量を増やすため（回転を下げる）。B→スス堆積量の実測はなく計算上の値。D→再生中も常に計算上の堆積量値が増えており、燃焼量が追いついて一致すると再生終了。C→正しい記述。", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 19, "label": "問1(19)", "points": 3, "answer": "A", "stem": "道路運送車両法に照らし用語に関する記述として、不適切なものはどれか。", "choices": {"A": "「軽車両」とは、人力もしくは畜力により陸上を移動させることを目的として製作した用具であって、軌条もしくは架線を用いた用具を含み、政令で定めるものをいう。", "B": "「道路運送車両」とは、自動車、原動機付自転車及び軽車両をいう。", "C": "自動車とは、原動機により陸上を移動させることを目的として製作した用具であって、原動機付自転車以外のものをいう。", "D": "「原動機付自転車」とは、国土交通省令で定める総排気量又は定格出力を有する原動機により陸上を移動させることを目的として製作した用具をいう。"}, "explanation": "軽車両とは人力もしくは畜力により陸上を移動させることを目的として製作した用具で「軌条若しくは架線を用いないもの」をいう。A は「軌条もしくは架線を用いた用具を含む」としており誤り。", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 20, "label": "問1(20)", "points": 3, "answer": "B", "stem": "道路運送車両法において、自動車の整備事業に関する記述として、適切なものはどれか。", "choices": {"A": "事業用自動車の点検整備記録簿の保存期間は、その記載の日から２年間である。", "B": "普通自動車特定整備事業のみの認証を受けた事業場では、四輪の軽自動車の分解整備を行うことはできない。", "C": "整備命令は、自動車整備事業者に対し、その実施した整備の状況が不良の場合に出される命令である。", "D": "整備主任者は同一事業者が経営する事業場であれば、他の事業場の整備主任者を兼務することができる。"}, "explanation": "普通自動車特定整備事業は普通自動車・四輪小型自動車・大型特殊自動車が対象。軽自動車は「軽自動車特定整備事業」または「小型自動車特定整備事業」の対象であり、普通自動車特定整備事業では扱えない。よってB（軽自動車の分解整備ができない）は正しい。", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 21, "label": "問1(21)", "points": 3, "answer": "C", "stem": "道路運送車両法に照らし、特定整備の電子制御装置整備に関する記述として、不適切なものはどれか。", "choices": {"A": "エーミング作業については「静的エーミング」と「動的エーミング」があり、ターゲット等を設置する必要がない「動的エーミング」については、原則として特定整備の対象外である。", "B": "電子制御装置整備に係る特定整備事業の認証を受けていない場合は、その整備の保安基準適合証を交付することはできない。", "C": "電子制御装置整備対象車両のフロントガラス交換作業を外注で修理業者が自社工場（特定整備認証工場）にて行う場合、修理業者は特定整備事業者の資格が必要である。", "D": "電子制御装置点検整備作業場は、他の整備事業者の電子制御装置点検整備作業の共用を可能としている。"}, "explanation": "自社工場（特定整備認証工場）を使用して外注作業を行う場合、修理業者には整備士資格も特定整備事業者資格も不要。自社工場の認証があれば作業可能。", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 22, "label": "問1(22)", "points": 3, "answer": "B", "stem": "道路運送車両法及び自動車点検基準に照らし、自動車の区分（種別、用途等）と定期点検の時期の組合せとして、適切なものはどれか。", "choices": {"A": "乗車定員１１人以上の自家用バスは、６か月ごとに定期点検", "B": "車両総重量８トン未満の貨物運送用の自家用普通自動車は、６か月ごとに定期点検", "C": "車両総重量８トン以上の自家用自動車は、６か月ごとに定期点検", "D": "乗車定員１０人以下の乗用普通レンタカーは、１年ごとに定期点検"}, "explanation": "A→乗車定員11人以上の自家用バスは3か月ごと。C→車両総重量8トン以上の自家用自動車は3か月ごと。D→乗用普通レンタカーは6か月ごと。B→車両総重量8トン未満の貨物運送用の自家用普通自動車は6か月ごと（正しい）。", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 23, "label": "問1(23)", "points": 3, "answer": "A", "stem": "保険に関する記述について不適切なものはどれか。", "choices": {"A": "保険金計算方法で分損の場合、大型トラックのキャビン交換のように大きな部品を新品に替えたために保険の目的全体の価額が増加したと認められるときは旧部品価格控除が適用となる。", "B": "自家用、営業用、乗用、貨物用の別などを問わず、すべての自動車が対象で対人賠償保険、対物賠償保険、車両保険についてそれぞれ担保種目を選択できる自動車保険は「Ｂ・Ａ・Ｐ」である。", "C": "自動車損害賠償責任保険とは自動車損害賠償保障法により「自動車は自動車損害賠償責任保険の契約が締結されているものでなければ運行の用に供してはならない」と決められている。", "D": "保険会社が販売する自動車保険は任意保険と呼ばれ保険会社が認可を受けた保険約款に従い顧客が任意につける保険であり、国内の保険会社は同一の約款、同一の保険料率で運営されている。"}, "explanation": "「旧部品価格控除」ではなく「Ｎ・Ｆ・Ｏ控除（新旧部品交換控除）」が正しい名称。", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 24, "label": "問1(24)", "points": 3, "answer": "B", "stem": "お客様の性格４タイプのうちニギヤカ型のお客様における接客対応方法について適切なものはどれか。", "choices": {"A": "ゆっくり冷静な態度で、一つ一つ念をおしていくような対応が望ましい。", "B": "中途半端な対応は禁物で、常に筋を通して、ときには強気に出る。", "C": "お客様と同じ気持ちになり、てきぱきと迅速に処理し明るく対応する。", "D": "特に明るく、積極的に話し、こちらから話を引き出す。"}, "explanation": "A→オットリ型への対応。C→テキパキ型への対応。D→キマジメ型への対応。B→ニギヤカ型は自己主張が強いため「中途半端な対応は禁物で、常に筋を通して、ときには強気に出る」対応が適切。", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 25, "label": "問1(25)", "points": 3, "answer": "A", "stem": "ＣＳに関する記述として、不適切なものはどれか。", "choices": {"A": "ＣＳ向上ポイントの一つに「サービス」があり、気配りや質の高い接客が求められ、さらには値引きが重要である。", "B": "「ＣＳの要素」は、便利、安心、信頼、感謝、親しみ、楽しさの６項目と言われている。", "C": "「ＣＳの要素」を満たすには、対応のＣＳ、基盤のＣＳの２つを意識することが必要である。", "D": "お客様は納得のいく説明や適切なアドバイスを求めるようになってきており、ＣＳ教育の必要性が増している。"}, "explanation": "CSでは「値引きが重要」ではなく、その価格に納得してもらえるような説明と品質が必要である。値引きをCSの主要ポイントとするのは誤り。", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 26, "label": "問1(26)", "points": 3, "answer": "B", "stem": "日野メンテナンスリースに関する記述として、適切なものはどれか。", "choices": {"A": "メンテナンスリースとは、車両代・税金・保険等にメンテナンス費用と修理期間の休業補償を加えたリース契約のことである。", "B": "基本契約としては３種類のプラン設定があり、そのうちのＲプランはＨＩＮＯ ＣＯＮＮＥＣＴメンテナンスサポートのサービス対象となる。", "C": "ＳプランとＭプランでは、冷凍機や油圧機器のメンテナンスがオプション項目となるが、Ｒプランでは契約内項目（オプションではない）である。", "D": "Ｒプランでは、音や振動など感覚的な現象の修理も対象となる。"}, "explanation": "A→修理期間の休業補償は含まれない。C→冷凍機や油圧機器のメンテナンスは全プランでオプション項目。D→感覚的な現象（音や振動）の修理は対象外。B→RプランはHINO CONNECTメンテナンスサポートのサービス対象（正しい）。", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 27, "label": "問1(27)", "points": 3, "answer": "A", "stem": "安全マニュアルガイドラインに照らし、フロント受付に関する記述について、不適切なものはどれか。", "choices": {"A": "お客様に提示する用事があるなど、すぐに使用する部品はフロントのカウンター内に置くようにしてお待たせしないようにする。", "B": "お客様車両入庫時には、フレーム腐食など作業の安全性に支障がないか確認する。", "C": "お客様車両入庫時には、積荷の安全確認を行う。", "D": "フロント受付後、お客様による整備車両移動はご遠慮いただき、必ず社員が移動させる。"}, "explanation": "フロントのカウンター内には部品などを置かない（危険防止のため）。", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 28, "label": "問1(28)", "points": 3, "answer": "D", "stem": "安全の心構えに関する記述として、不適切なものはどれか。", "choices": {"A": "作業の洗い出しと改善、異常処置時の安全のルール作りを行う。", "B": "正しい作業であれば、作業効率の向上も期待できる。", "C": "自分自身が主体となり自ら考えなければならない。", "D": "作業能率を阻害する原因と事故や災害を起こす原因は関連性がない。"}, "explanation": "作業能率を阻害する原因を掘り下げると大部分は事故や災害を起こす原因となる（関連性がないは誤り）。", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 29, "label": "問1(29)", "points": 3, "answer": "D", "stem": "車両への輪止めに関する記述として、不適切なものはどれか。", "choices": {"A": "輪止めは、２個一組で使用する。", "B": "輪止めをセットし足で軽く蹴り、タイヤに密着させる。", "C": "平坦な場所でも車両を駐停車させた際は、必ず輪止めをする。", "D": "ハンドルを切った状態で輪止めを掛けるようにする。"}, "explanation": "輪止め使用時は「タイヤを真っ直ぐにする」。ハンドルを切った状態で輪止めをかけるのは不適切。", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 30, "label": "問1(30)", "points": 3, "answer": "B", "stem": "安全教育における危険個所を発見する学習指導のポイントについて、不適切なものはどれか。", "choices": {"A": "テーマに従い、いろいろな問題解決法ができるように解決手法を身につけ、グループで学習できるように指導してからとりかかることは、職場の問題に対し、問題の所在を確かめ原因を追究し問題解決を図る学習ポイントである。", "B": "作業の習熟を図る学習ポイントは、体験学習で得た作業の習熟に、さらに応用力をつけるため、いろいろな場面での注意力をつけることである。", "C": "\"決めたことを守る\"心構えづくりの学習ポイントは、グループで決めたことを\"なぜ\"守らないか原因を追求し、反省させ、心から自覚を促す相互啓発の学習。各自、ルールを守る自律心に育成を図ることである。", "D": "危ない、危なくないの判断力を養う学習とは、\"なぜ\"危ないかの基礎知識を与え体験学習で判断力を養うところがポイントである。"}, "explanation": "作業の習熟を図る学習ポイントは、「作業手順書を教材として作業が身につくまで体験学習をさせること」が正しい。Bの「応用力をつけるため注意力をつける」ではない。", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 31, "label": "問2(31)", "points": 5, "answer": "D", "stem": "平日の定時間外２０時に、Ａ販売会社から日野中型車エンジン始動不良車両のバッテリー中間ケーブル交換(１個)の広域サービス対応依頼が入ったため、安全確保の観点からＢ販売会社のサービスエンジニア２名が１８km先の故障車両までサービスカーで出動した。\nＡ販売会社への請求金額を消費税込みで計算した場合、適切なものはどれか。\n\n部品代（外注部品バッテリー中間ケーブル） 1,500円\n標準作業時間（バッテリー中間ケーブル交換） 0.4時間\nＡ販売会社の工賃レート 10,000円\nＢ販売会社の工賃レート 10,500円\nサービスカー出張料金・その他費用：通過車両規定に記載の通り", "choices": {"A": "３６，１１０円", "B": "３９，７２１円", "C": "３５，６８４円", "D": "３４，１７７円"}, "explanation": "①サービスカー使用料（片道18km）：\n8,000+(400×18)=15,200円 → 15,200×0.9=13,680円\n\n②部品代（外注部品）：\n1,500×(1-0.1)=1,350円\n\n③技術料（B社レート×0.4h×定時間外出張1.5倍×20%控除）：\n10,500×0.4×1.5×0.8=5,040円\n\n④特別対応料＋体制維持費：\n10,000+1,000=11,000円\n\n合計（税抜）：13,680+1,350+5,040+11,000=31,070円\n税込（10%）：31,070×1.1=34,177円", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 32, "label": "問2(32)", "points": 5, "answer": "B", "stem": "ある支店の整備業態月次報告表において、次の①②の数値を計算し、答えの組合せが適切なものはどれか。\n\n【報告表データ】\n有償売上利益（実績）：120,995千円\n有償売上利益（目標）：125,000千円\n車検売上利益（実績）：60,965千円\n車検実施台数（実績）：300台\n\n①この月の有償売上利益達成率を計算しなさい。\n②現在と同じ平均単価と利益率で車検台数のみを積み上げた場合、最低あと何台の車検を実施すれば目標に到達するか計算しなさい。\n（※①②とも小数点第１位を四捨五入し整数とする）", "choices": {"A": "①９７％　②１９台", "B": "①９７％　②２０台", "C": "①９６％　②１９台", "D": "①９６％　②２１台"}, "explanation": "①有償売上利益達成率：\n120,995÷125,000×100=96.796% → 四捨五入して97%\n\n②目標達成に必要な追加台数：\n・不足分：125,000-120,995=4,005千円\n・車検1台当たり利益：60,965÷300=203.2千円 → 四捨五入して203千円\n・必要台数：4,005÷203=19.73台 → 四捨五入して20台\n（19台では不足、20台で目標達成見込み）", "source": "25年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 1, "label": "問1", "points": 3, "answer": "B", "stem": "保証業務に関する記述として、不適切なものはどれか。", "choices": {"A": "保証修理には販売会社の収益、お客様の信頼の回復と維持、市場技術情報の収集と大きな役割を持っている。", "B": "補給部品の保証について、日野の保証書に記載する一般保証部品に準じ、販売会社の取り付け上に起因する不具合も含むものとする。", "C": "大型トラック／トラクター保証書について日野自動車が示す仕様（積載量、定員、速度、エンジン回転数等）の限度を超える使用に起因すると判定できる故障または破損については適用しない。"}, "explanation": "販売会社の取り付け上に起因する不具合は含まない。", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 2, "label": "問2", "points": 3, "answer": "C", "stem": "下請法の親事業者の４つの義務に関する記述として、不適切なものはどれか。", "choices": {"A": "下請事業者との取引に関する記録を書類として作成し、２年間保存しなければならない。", "B": "口頭発注によるトラブルを未然に防止するため、親事業者は発注に際して、「１１の法定事項」を満たした書面を直ちに下請事業者に発行しなければならない。", "C": "追加で作業を依頼したが、下請事業者と話し合って合意したので書類の追加発行は対応しなかった。"}, "explanation": "合意があっても違反になることがある。追加発注時も書面の発行が必要。", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 3, "label": "問3", "points": 3, "answer": "C", "stem": "見積書に関する記述として、不適切なものはどれか。", "choices": {"A": "見積りとは、費用、修理内容、日数などをお客様に理解しやすいように提示するもので、出来る限り正確に見積りを提示し、お客様に納得していただくものである。", "B": "見積りを正確なものにするには、受け入れ時のチェックや問診が必要になる。", "C": "点検・車検時の見積りの作成では、点検整備料金の項目の中にお客様ご依頼事項を記載して、見やすく一括しておく必要がある。"}, "explanation": "点検・車検時の見積りの作成では、点検整備料金とお客様ご依頼事項は区別しておく必要がある。", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 4, "label": "問4", "points": 3, "answer": "A", "stem": "受付などお客様対応に関する記述として、不適切なものはどれか。", "choices": {"A": "車検の概算見積もりでは、整備料金、ご依頼事項料金、諸費用を区別して記載しておくほうが良く、これは諸費用を立替え依頼された場合に対応できるようにするためである。", "B": "苦情に対しては、言い分を最後までよく聞き、最優先で処理をすることが重要であるが、法外な要求や言い分である場合は、応じられない理由を説明してお断りする必要がある。", "C": "問診は、お客様が望んでいる整備や指摘している不具合を正確に聞き取るために必要であり、要望事項をよく聞き、お客様の言った言葉で記録する必要がある。"}, "explanation": "諸費用は前受が原則である。立替え依頼に対応するためではなく、事前に受領するのが基本。", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 5, "label": "問5", "points": 3, "answer": "C", "stem": "苦情対応に関する記述として、不適切なものはどれか。", "choices": {"A": "お客様の話を親身になってよく聞き、その場で対応できることは迅速に実施する。", "B": "苦情受付後は、速やかに上司に報告する。", "C": "自分で対応できない時は上司へ相談するまでの間に、その場しのぎの回答を行う。"}, "explanation": "対応しきれないことは、すぐに上司へ相談する必要はあるが、その場しのぎの回答は避ける。", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 6, "label": "問6", "points": 3, "answer": "A", "stem": "受付対応や苦情対応に関する記述として、不適切なものはどれか。", "choices": {"A": "事故などお客様にトラブルが発生した際には、まず事故原因など技術的な説明をしてからお客様の気持ちが落ち着くのを待つことが大切である。", "B": "不満を持った顧客のうち、苦情を申し立て、その解決に満足した顧客の再購入決定率は、不満を持ちながら苦情を申し立てない顧客より比較的高いと言われている。", "C": "商品やサービスに問題があっても全てが苦情になるわけではなく、信頼関係ができていれば大問題にならない場合もあるが、それに甘えず常に緊張感を持って対応することが必要である。"}, "explanation": "お客様の立場で心境をくみ取る必要があり、まずはお客様の身を案じることが最優先となる。技術的な説明はその後。", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 7, "label": "問7", "points": 3, "answer": "C", "stem": "優良客として登録されているお客様（通過車両）から自走入庫により、レンジャーの右側リヤコンビネーションランプ不具合修理依頼を直接受け、Assy交換保証での対応予定となった。（工賃＆部品代の合計２３，０００円）この場合の応対として、適切なものはどれか。", "choices": {"A": "元販売会社に連絡をとらずに、保証受付をして作業した。", "B": "元販売会社に連絡がとれないので、作業を断った。", "C": "元販売会社に連絡をとり、処置を決定した。"}, "explanation": "保証になると思われる場合は、元販売会社に連絡する。元販売会社と相談の上、処置を決定するのが正しい対応。", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 8, "label": "問8", "points": 3, "answer": "B", "stem": "通過車両規定の基本的な内容に関する記述として、適切なものはどれか。", "choices": {"A": "平日とは原則、月曜日から土曜日までの元販売会社の休業日を除いたものをいう。", "B": "営業時間内の受付開始・終了時間は、９時から１７時とし全国の販売会社で統一されている。", "C": "路上故障車に対する整備は、出動者の安全が確保できない場所では応急処置にとどめる。"}, "explanation": "A：平日は実施販売会社の休業日を除いたもの（元販売会社ではない）。C：安全が確保できない場所では作業を行わない（応急処置もNG）。", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 9, "label": "問9", "points": 3, "answer": "B", "stem": "売掛金に関する記述として、不適切なものはどれか。", "choices": {"A": "取引先が倒産した場合、原則として回収は出来ない。", "B": "時効の成立を中断させるため、請求書を再度送付した。", "C": "支払いに懸念のあるお客様と、現金取引を行った。"}, "explanation": "請求書の再送付だけでは時効は中断されない。時効を中断するには、訴訟の提起や支払督促などの法的手続きが必要。", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 10, "label": "問10", "points": 3, "answer": "A", "stem": "引渡し、納車時の対応に関する記述として、不適切なものはどれか。", "choices": {"A": "どの部品がどのように不具合があったかを、お客様に分かりやすく説明できるように、取り替えた部品の損傷状態を自分で確認してから廃却する必要がある。", "B": "作業指示書通りの作業が完了しているか、車両は清掃されているか、傷が付かなかったか、搭載物は受付時の通りかなど、お客様の車両を確認する必要がある。", "C": "納車時の説明は、お客様からの申し出内容に対する説明のみならず、使用上の注意、この先必要になる整備等のアドバイスをする必要がある。"}, "explanation": "交換部品はお客様へ提示し分かりやすく説明した後、お客様の廃却意思の確認後に廃却する。自分だけで確認して廃却してはいけない。", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 11, "label": "問11", "points": 3, "answer": "A", "stem": "HITOSSⅡの売上画面に関する記述として、不適切なものはどれか。", "choices": {"A": "①欄は作業・部品区分の入力であり、１を入力すると『作業内容』、２を入力すると『部品』、３を入力すると『ご用命事項』となる。", "B": "②欄は部位の入力であり、対応する数字を入力すると『上』や『左右』などの位置が表示されるので、複数ある部品の作業をする際には入力すると部位の特定が容易になる。", "C": "③欄は有・無償区分の入力であり、『０～２』だと有償、『３～５』だと保証、『６～８』だと無償での売上となる。"}, "explanation": "①欄は数字や記号を入力することで、行の追加や入れ替えなどができる。作業・部品区分の入力は①欄ではなく、右隣の欄。", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 12, "label": "問12", "points": 3, "answer": "B", "stem": "通過車両規定に照らし、事故修理の正式見積書を提出し修理を実施しないときに元販売会社に請求できる見積額として適切なものはどれか。", "choices": {"A": "見積額の１％", "B": "見積額の３％", "C": "見積額の５％"}, "explanation": "正式見積書を提出し修理を実施しないときには、原則として元販売会社に対し見積額の３％を請求できる。", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 13, "label": "問13", "points": 3, "answer": "A", "stem": "通過車両規定に照らし、修理に使用した他メーカー部品の販売会社間振替料金（税込）として、適切なものはどれか。\n実施販売会社での通常価格：８，０００円　部品原価：６，４００円　税率：１０％", "choices": {"A": "８，８００円", "B": "８，４４８円", "C": "７，９２０円"}, "explanation": "振替料金は実施販売会社が通常お客様に販売する価格（通常価格）を標準とする。8,000円×1.1（消費税）＝8,800円。", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 14, "label": "問14", "points": 3, "answer": "C", "stem": "通過車両規定に照らし、受付時の対応に関する記述として、適切なものはどれか。", "choices": {"A": "他販売会社のリコール未実施車両が入庫した場合、早急にリコール作業を実施しなければならないので入庫した販売会社で実施する。", "B": "他販売会社のリコール未実施車両が入庫した場合、元販売会社で実施するようにお客様へ伝える。", "C": "他販売会社のリコール未実施車両が入庫した場合、元販売会社に連絡し、どちらの販売会社で実施するか相談する。"}, "explanation": "他販売会社のリコール未実施車両が入庫した場合、元販売会社に連絡しどちらの販売会社で実施するか相談する。", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 15, "label": "問15", "points": 3, "answer": "C", "stem": "２０２４年モデルのプロフィアに搭載されている装置の整備に関する記述として、不適切なものはどれか。", "choices": {"A": "PCS（衝突被害軽減ブレーキ）で使用しているミリ波レーダーを交換し、初期学習を行う作業は、特定整備に該当する。", "B": "LKA（レーンキープアシスト）で使用しているカメラを取り外し、フロントガラスを交換したうえで、取り外したカメラを再度取り付け、初期学習を行う作業は、特定整備に該当する。", "C": "SAMS（サイトアラウンドモニターシステム）で使用しているサイドレーダーセンサーを交換し、初期学習を行う作業は、特定整備に該当する。"}, "explanation": "SAMSは警報のみで、自動ブレーキや自動操舵はしないため、特定整備に該当しない。特定整備は衝突被害軽減ブレーキや自動操舵機能に用いられるセンサーの取り外し・調整作業が対象。", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 16, "label": "問16", "points": 3, "answer": "B", "stem": "尿素ＳＣＲ（排出ガス浄化装置）に関する記述として、不適切なものはどれか。", "choices": {"A": "尿素水をSCR触媒に噴射するとアンモニアが生成され、それが触媒でＮＯxと反応することでＮＯxを無害化するシステムである。", "B": "アフターラン制御とは、エンジン停止後に装置内に残留しているＮＯｘを浄化するために既定時間の間、尿素を噴射する制御のことである。", "C": "排ガス浄化の際に未使用となったアンモニアを取り除くためのアンモニアスリップ触媒があり、ＳＣＲ触媒の下流に配置されている。"}, "explanation": "アフターラン制御とは、エンジン停止後に装置内に残留している尿素水をタンクに戻す制御である（NOxを浄化するための尿素噴射ではない）。", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 17, "label": "問17", "points": 3, "answer": "A", "stem": "２＊Ｇ付プロフィア（２０２４年モデル）の安全装置に関する記述として、不適切なものはどれか。", "choices": {"A": "出会い頭警報（ＦＣＴＡ）は、交差する移動物を検知した場合、ドライバーへ警報を出し、さらに自車前面に衝突する危険性が高まると自動でブレーキを作動させる。", "B": "左折巻込み警報（ＢＳＩＳ）は、自車左側方の移動物を検知した場合や左折時に衝突の危険性がある場合にブザー音や表示灯でドライバーへ警報する。", "C": "車線変更警報（ＢＳＤ）は、自車左右側方の移動物を検知した場合や車線変更時に衝突の危険性がある場合にブザー音や表示灯でドライバーへ警報する。"}, "explanation": "2024年モデルから側方監視・警報が追加されているが、警報のみであり自動でブレーキは作動しない。", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 18, "label": "問18", "points": 3, "answer": "A", "stem": "デュトロ ＺＥＶ（ＢＥＶ車）に関する記述として、不適切なものはどれか。", "choices": {"A": "ｅＤＡＰは、アクセルペダル１つで加速から停止まで調整することが可能である。", "B": "誤発進抑制機能は、前進・後退ともに機能する。", "C": "モーター駆動で変速機がないため、走行がスムーズである。"}, "explanation": "eDAPは停止まで可能なものではなく、停止にはブレーキ操作が必要である。", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 19, "label": "問19", "points": 3, "answer": "A", "stem": "道路運送車両法に照らし、自動車の検査の種別として、不適切なものはどれか。", "choices": {"A": "分解整備検査", "B": "予備検査", "C": "臨時検査"}, "explanation": "自動車の検査の種別は、新規検査・継続検査・臨時検査・構造変更等検査・予備検査の5種類。「分解整備検査」という種別は存在しない。", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 20, "label": "問20", "points": 3, "answer": "B", "stem": "道路運送車両法に照らし、自動車点検基準のうち、別表第１（事業用自動車等の日常点検基準）原動機の項目に関する記述として、不適切なものはどれか。", "choices": {"A": "ファン・ベルトの張り具合が適当であり、かつ、ファン・ベルトに損傷がないこと。", "B": "原動機のかかり具合が不良ではなく、かつ、黒煙がないこと。", "C": "低速及び加速の状態が適当であること。"}, "explanation": "原動機のかかり具合が不良でなく、かつ、異音がないこと。（「黒煙がないこと」ではなく「異音がないこと」が正しい。）", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 21, "label": "問21", "points": 3, "answer": "C", "stem": "道路運送車両法に照らし、特定整備の電子制御装置整備に関する記述として、不適切なものはどれか。", "choices": {"A": "エーミング作業については「静的エーミング」と「動的エーミング」があり、ターゲット等を設置する必要がない「動的エーミング」については、原則として特定整備の対象外である。", "B": "電子制御装置整備に係る特定整備事業の認証を受けていない場合は、その整備の保安基準適合証を交付することはできない。", "C": "電子制御装置整備対象車両のフロントガラス交換作業を外注で修理業者が自社工場（特定整備認証工場）にて行う場合、修理業者は特定整備事業者の資格が必要である。"}, "explanation": "フロントガラス交換作業を外注で行う場合、修理業者は整備士資格も特定整備事業者資格も不要。", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 22, "label": "問22", "points": 3, "answer": "A", "stem": "道路運送車両法に照らし、自動車の整備事業に関する記述として、適切なものはどれか。", "choices": {"A": "自動車検査員は、他の事業場の検査員となることができない。ただし、同一事業者の他事業場で国交省が定める要件を満たしていれば兼務できる。", "B": "整備命令は、自動車整備事業者に対し、その実施した整備の状況が不良の場合に出される命令である。", "C": "普通自動車特定整備事業のみの認証を受けた事業場では、四輪の軽自動車の分解整備を行うことができる。"}, "explanation": "普通自動車特定整備事業の対象は普通自動車・四輪の小型自動車・大型特殊自動車であり、軽自動車は対象外。B：整備命令は整備事業者ではなく車両使用者に対して出されるもの。", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 23, "label": "問23", "points": 3, "answer": "C", "stem": "整備／修理の法的責任に関する記述で、販売会社が整備や修理の責任を負う場合として不適切なものはどれか。", "choices": {"A": "定期点検などの時期がきている車が入庫したのに、その整備をお客様に告げることを怠った場合", "B": "整備そのものに瑕疵（不具合）があった場合", "C": "製造物の欠陥によってお客様に対して身体、財産に損害を被った場合"}, "explanation": "Cは製造物責任（PL法）であり、製造者が責任を負う。販売会社の整備・修理責任ではない。", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 24, "label": "問24", "points": 3, "answer": "B", "stem": "自動車保険に関する記述として、不適切なものはどれか。", "choices": {"A": "事故などを保険で処理する際には顧客の言い分を全面的に信用したり、直接介入したりしないようにする必要がある。", "B": "保険処理での車両修理は、顧客の利便性を考え、少額であれば保険会社に通知のみで即修理着手する。", "C": "顧客から事故の連絡があった際には「お怪我はありませんか」など、まずは安否を気遣うようにする。"}, "explanation": "保険処理での修理は、通知後に保険会社から承認を得てから修理着手する。少額でも承認なしに着手することはできない。", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 25, "label": "問25", "points": 3, "answer": "B", "stem": "自賠責保険に関する記述として、適切なものはどれか。", "choices": {"A": "自賠責保険で補償されるのは、相手を怪我、または死亡させた場合や、相手の物を破損した場合に、相手の損害賠償に対して保険金が支払われる。自分自身の怪我に対しては保険金は支払われない。", "B": "加害者が不誠実であったり、金額面で折り合いがつかない等で示談が成立しない場合などには、被害者が損害賠償額を直接、保険会社に支払うよう請求できる。", "C": "賠償額の確定までに時間がかかるような場合、被害者は、加害者の加入している保険会社に保険金の前払いを請求することができる。これを仮渡金といい、死亡した者１人につき、３９０万円である。"}, "explanation": "A：自賠責保険は相手の物（物損）には適用されない。C：仮渡金は死亡した者１人につき２９０万円（390万円ではない）。B：被害者が直接保険会社に請求できる（被害者請求）のは正しい。", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 26, "label": "問26", "points": 3, "answer": "A", "stem": "日野メンテナンスリースに関する記述として、不適切なものはどれか。", "choices": {"A": "基本契約としては、４種類のプラン設定がある。", "B": "修理受付時にメンテナンス対象作業と対象外作業が一度に発生した場合、工事受付を別にして処理しなければならない。", "C": "メンテナンスリースとは、車両代・税金・保険等にメンテナンス費用を加えたリース契約のことである。"}, "explanation": "基本契約は（S・M・R）プランの３種類。４種類ではない。", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 27, "label": "問27", "points": 3, "answer": "C", "stem": "安全の心構えに関する記述として、不適切なものはどれか。", "choices": {"A": "自分自身が主体となり自ら考えなければならない。", "B": "作業の洗い出しと改善、異常処置時の安全のルール作りを行う。", "C": "作業能率を阻害する原因と事故や災害を起こす原因は関連性がない。"}, "explanation": "作業能率を阻害する原因を掘り下げると大部分は事故や災害を起こす原因となる。つまり関連性が大いにある。", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 28, "label": "問28", "points": 3, "answer": "C", "stem": "車両への輪止めに関する記述として、不適切なものはどれか。", "choices": {"A": "輪止めをセットし足で軽く蹴り、タイヤに密着させる。", "B": "平坦な場所でも車両を駐停車させた際は、必ず輪止めをする。", "C": "ハンドルを切った状態で輪止めを掛けるようにする。"}, "explanation": "輪止め使用時はタイヤを真っ直ぐにする。ハンドルを切った状態で輪止めを掛けてはいけない。", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 29, "label": "問29", "points": 3, "answer": "A", "stem": "フロント受付時の安全に関する記述について、不適切なものはどれか。", "choices": {"A": "お客様に提示する用事があるなど、すぐに使用する部品はフロントのカウンター内に置くようにしてお待たせしないようにする。", "B": "お客様車両入庫時には、フレーム腐食など作業の安全に支障がないか確認する。", "C": "お客様車両入庫時には、積荷の安全確認を行う。"}, "explanation": "フロントのカウンター内には部品などを置かない。部品は作業場所に置くべきであり、フロントカウンター内に置くと危険。", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 30, "label": "問30", "points": 3, "answer": "C", "stem": "CSに関する記述について不適切なものはどれか。", "choices": {"A": "すべてのお客様の期待に応えるために必要な考えとして、生の声を真摯に聞く、心がつながる信頼関係の構築、問題発生時の適切な対応、適切な商品情報の提供などが大切となる。", "B": "CSを向上させるためにお客様が具体的に期待することは品質、スピード、価格、サービスであり、これらのどれか１つかけても、お客様には満足していただくことができない。", "C": "お客様の商品やサービスに対する「期待」と、実際にお客様が得た商品やサービスの「結果」との間にギャップがある場合に、お客様は不満を持つことになる。不満に対するお客様の対応は日頃の整備対応能力を上げて、お客様の気持ちを汲みとり、早期に不満を解決し、お客様との関係を修復しなければならない。"}, "explanation": "不満に対する対応は日頃のコミュニケーションを通じて、お客様の気持ちを吸い上げ、早期に不満を解決し、関係を修復しなければならない。「整備対応能力を上げる」ではなくコミュニケーションが重要。", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 31, "label": "問31", "points": 5, "answer": "C", "stem": "平日の定時間内にＡ販売会社からエンジン始動不良となった日野車のバッテリー交換（２個）の広域サービス対応依頼が入ったため、Ｂ販売会社のサービスエンジニアが１０ｋｍ先の故障車両までサービスカーで出動した。Ａ販売会社への請求金額を消費税１０％込みで計算した場合、適切なものはどれか。\n（注）答えは小数点以下第一位を四捨五入し、整数とする。\n\n部品代（純正ＰＢバッテリー原価）：１８，０００円（１個）\n標準作業時間（バッテリー交換）：０．５時間\nＡ販売会社の工賃レート：９，０００円\nＢ販売会社の工賃レート：１０，０００円\n\n【計算式】\n①技術料：10,000×0.5×1.25（出張）×0.8（技術料控除）＝5,000円\n②部品代：18,000×2個×1.2（振替増し）＝43,200円\n③サービスカー：(8,000＋400×10km)×0.9（振替控除）＝10,800円\n合計：(5,000＋43,200＋10,800)×1.1（消費税）＝64,900円", "choices": {"A": "５２，８００円", "B": "５８，５００円", "C": "６４，９００円"}, "explanation": "技術料5,000円＋部品代43,200円＋サービスカー10,800円＝59,000円、消費税込み：59,000×1.1＝64,900円", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 32, "label": "問32", "points": 5, "answer": "A", "stem": "ある支店の整備業態月次報告表において、次の①、②の数値を計算し、答えの組合せが適切なものはどれか。\n①総売上高に対する通過車両売上高の割合\n②総売上高に対する売上利益率\n※計算は小数点第２位を四捨五入する。\n\n【整備業態月次報告表（抜粋）】\n総売上高：324,168千円\n通過車両売上高：23,659千円\n売上利益：125,733千円", "choices": {"A": "①７．３％　②３８．８％", "B": "①８．０％　②３９．１％", "C": "①８．３％　②４８．４％"}, "explanation": "①23,659÷324,168×100＝7.298…→7.3%　②125,733÷324,168×100＝38.786…→38.8%　正しい組み合わせはA", "source": "25年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 1, "label": "問1", "points": 3, "answer": "B", "stem": "日野サービスの基本として、適切なものはどれか。", "choices": {"A": "お客様の期待通りの仕事を提供することが必要である。", "B": "お客様が支払う料金には整備代金と接客対応が含まれる。", "C": "整備代金などを通常よりも安くお客様に提供することが必要である。"}, "explanation": "日野サービスの基本は、無償の行動や価格を安くすることではなく、お客様に信頼・満足していただいて期待を上回る仕事を提供することが最良のサービスと考えている。", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 2, "label": "問2", "points": 3, "answer": "C", "stem": "接客対話の基本に関する記述として、不適切なものはどれか。", "choices": {"A": "点検・整備を依頼すれば安心だと思われるように正確な仕事を行う必要がある。", "B": "対応が良く気持ちいいと思われるように挨拶、態度など言動に対する気配りが必要である。", "C": "お客様の立場になって考え、お客様の都合を全て承諾する必要がある。"}, "explanation": "お客様の立場になって考え、真剣に対応する必要はあるが、全てそのまま承諾は行き過ぎである。", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 3, "label": "問3", "points": 3, "answer": "A", "stem": "接客対話の基本に関する記述として、適切なものはどれか。", "choices": {"A": "お客様の要望が理解できない場合は、整理して質問し、意向を確認する。", "B": "内容をよく分かってもらうために、専門用語をなるべく使って説明する。", "C": "お客様の話しや、言い分をじっくり最後まで聞き、こちらの意見は述べない。"}, "explanation": "専門用語ではなく一般的な用語で話し、こちらの意見を述べることも大切。お客様の要望が理解できない場合は整理して質問し確認するのが適切。", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 4, "label": "問4", "points": 3, "answer": "B", "stem": "お客様対応における「お辞儀」に関する記述として、不適切なものはどれか。", "choices": {"A": "会釈の角度は１５度とされており、一般的にお客様とのすれ違い時に適している。", "B": "敬礼の角度は３０度とされており、お客様へのお詫びの際に適している。", "C": "最敬礼の角度は４５度とされており、初対面の人への挨拶に適している。"}, "explanation": "会釈（15度）＝すれ違い時、敬礼（30度）＝お客様の送迎時、最敬礼（45度）＝お詫びや初対面の挨拶。敬礼はお詫びではなく送迎時に適している。", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 5, "label": "問5", "points": 3, "answer": "B", "stem": "お客様対応に関する記述として、不適切なものはどれか。", "choices": {"A": "お客様の期待に応えることで、信頼関係を構築することが重要である。", "B": "口うるさいお客様には十分な対応を行い、親しいお客様にはそうでない対応を行うような柔軟性が信頼関係を構築する。", "C": "サービスに対する期待と結果にギャップが生じると、お客様は不満を持つようになる。"}, "explanation": "公平な対応が重要。口うるさいお客様に手厚く、親しいお客様には軽い対応をするのは不公平であり、信頼関係を損なう。", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 6, "label": "問6", "points": 3, "answer": "C", "stem": "お客様への説明方法として、適切なものはどれか。", "choices": {"A": "完成時間や整備料金について見通しがつかない場合は、具体的な表現は避ける。", "B": "分解してみなければ正確なことが分からない場合は、誤解を与えないようにあいまいな表現をしておく。", "C": "お客様に技術説明をする場合は、現物や資料を示して説明をする。"}, "explanation": "お客様には、あいまいな表現は避け、具体的に現物や資料を見せて説明をする。", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 7, "label": "問7", "points": 3, "answer": "B", "stem": "苦情対応に関する記述として、不適切なものはどれか。", "choices": {"A": "お客様の話を親身になってよく聞き、その場で対応できることは迅速に実施する。", "B": "自分で対応できない時は上司へ相談するまでの間に、その場しのぎの回答を行う。", "C": "苦情受付後は、速やかに上司に報告する。"}, "explanation": "対応しきれないことは、すぐに上司へ相談する必要はあるが、その場しのぎの回答は避ける。", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 8, "label": "問8", "points": 3, "answer": "A", "stem": "身だしなみに関する記述として、適切なものはどれか。", "choices": {"A": "フロントスタッフで、Yシャツなどを着用の場合は、裾をズボンに入れる。", "B": "メカニックで、つなぎを着用の場合は、安全と通気性のために胸元ファスナーは大きく開けておく。", "C": "クールビズで、Yシャツの場合は、肌着が見える程度にボタンを開けると良い。"}, "explanation": "どのような立場でも服装が乱れていないかなどの清潔感ある身だしなみが必要。フロントスタッフはYシャツの裾をズボンに入れるのが適切。", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 9, "label": "問9", "points": 3, "answer": "B", "stem": "電話でのお客様対応に関する記述として、不適切なものはどれか。", "choices": {"A": "かかってきた電話を受けた場合は、まずこちらから会社名と個人名を名乗る。", "B": "こちらから電話した場合は、まず相手を確認して、こちらの会社名と個人名を名乗る。", "C": "相手に与える印象は大きく、この対応だけで会社全体を判断されてしまう。"}, "explanation": "電話をかけた場合でも最初に会社名と個人名を名乗る。相手確認が先という手順は不適切。", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 10, "label": "問10", "points": 3, "answer": "C", "stem": "電話でのお客様対応に関する記述として、不適切なものはどれか。", "choices": {"A": "電話は相手の都合を一方的に拘束することがあるので、相手のことをよく考える必要がある。", "B": "電話では声の調子で印象が決まってしまうので、明るく歯切れの良い話し方をする必要がある。", "C": "相手が話している途中で結論が判断できた場合は、相手の都合を考えて話を遮ってでも返答する必要がある。"}, "explanation": "早とちりの原因になるので、相手の話は最後まで聞き取る必要がある。話を遮るのは不適切。", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 11, "label": "問11", "points": 3, "answer": "B", "stem": "名刺の受け渡しマナーとして、不適切なものはどれか。", "choices": {"A": "名刺は、相手より先に立って両手で差し出す。", "B": "名前の読みがわからない場合、その名刺にメモ書きする。", "C": "名刺の受取は両手で行うが、同時交換の場合は互いに片手で受け渡しする。"}, "explanation": "名刺にメモをしてはならない。名刺を受け取ってもすぐにしまわず、丁寧に扱う。名刺は相手より先に出すことを心がける。", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 12, "label": "問12", "points": 3, "answer": "A", "stem": "ビジネス文書に関する記述として、不適切なものはどれか。", "choices": {"A": "社外宛てで、宛先が会社名のみであれば「各位」を使用し、「○○会社 各位」のように表現する。", "B": "敬語を正しく使う必要があり、例として「自分から話す」の場合は「申し上げる」と表現する。", "C": "人や会社の呼び方は、自社が「弊社」、相手の会社が「貴社」または「御社」となる。"}, "explanation": "会社名のみ宛先であれば「御中」と表現する（「各位」ではない）。「各位」は複数の個人に宛てる場合に使用する。", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 13, "label": "問13", "points": 3, "answer": "B", "stem": "お客様対応に関する記述として、不適切なものはどれか。", "choices": {"A": "お客様の話は最後までよく聞く必要があり、そのうえでこちらの意見を述べることも大切である。", "B": "会話の始めにお客様との距離を縮めるために話題が豊富な政治、宗教、思想に関する話をすると良い。", "C": "人は「オットリ型」など、ある程度タイプ別に分かれており、それぞれの対応が必要になる。"}, "explanation": "政治・宗教・思想などの話題は対立・摩擦を生む可能性があるため、接客の場では避けるべきである。", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 14, "label": "問14", "points": 3, "answer": "C", "stem": "事故を受け付ける際の対応に関する記述として、適切なものはどれか。", "choices": {"A": "お客様は事故の処理について心配することが多いので、まず最初に事故の状況を詳しく聞き取る必要がある。", "B": "お客様は興奮して当事者と揉めることがあるので、お客様の言い分を理解して整理したうえで、こちらから当事者に伝達する必要がある。", "C": "事故処理は当事者間で行ってもらい、保険適用の場合はお客様に保険内容の適切な助言を行うにとどめる。"}, "explanation": "事故処理は当事者間で行ってもらい、販売会社はお客様への保険内容の助言にとどめる。直接介入は不適切。", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 15, "label": "問15", "points": 3, "answer": "C", "stem": "受付対応に関する記述として、不適切なものはどれか。", "choices": {"A": "お客様の出迎えは、大きくハッキリした言葉で挨拶する。", "B": "ご用命事項を聞き取る際には、重要な情報だけでなく、ささいなことでもメモをとる。", "C": "車両確認時に貴重品があった場合は、フロントの金庫などで一時預かりする。"}, "explanation": "貴重品は預からない（トラブル防止のため）。", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 16, "label": "問16", "points": 3, "answer": "A", "stem": "整備料金の説明と回収に関する記述として、不適切なものはどれか。", "choices": {"A": "有償と無償の作業を同時に行う場合、請求時点で「有償、無償の区別」「料金」を明確に「お客様に説明」しておくことが、「整備料金」の円滑な回収につながる。", "B": "サービス部門で販売する商品は点検、整備という機能的サービスすなわち、点検整備作業における「技術の提供」である。", "C": "提供する点検、整備の価値を十分理解していただけるよう、わかりやすく「お客様に説明」することも機能的サービスの一環である。"}, "explanation": "料金と有償・無償の説明は受注時点（請求時点ではなく）で行う。", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 17, "label": "問17", "points": 3, "answer": "B", "stem": "引渡し、納車時の対応に関する記述として、不適切なものはどれか。", "choices": {"A": "作業指示書通りの作業が完了しているか、車両は清掃されているか、傷が付かなかったか、搭載物は受付時の通りかなど、お客様の車両を確認する必要がある。", "B": "どの部品がどのように不具合があったかを、お客様に分かりやすく説明できるように、取り替えた部品の損傷状態を自分で確認してから廃却する必要がある。", "C": "納車時の説明は、お客様からの申し出内容に対する説明のみならず、使用上の注意、この先必要になる整備等のアドバイスをする必要がある。"}, "explanation": "交換部品はお客様へ提示し分かりやすく説明した後、お客様の廃却意思の確認後に廃却する。自分で確認後に廃却するのは不適切。", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 18, "label": "問18", "points": 3, "answer": "A", "stem": "見積書に関する記述として、不適切なものはどれか。", "choices": {"A": "分解しないと追加作業が発生するかどうかがわからないものに関しては、見積れないので請求の段階で金額を伝える。", "B": "見積りとは、費用、修理内容、日数などをお客様に理解しやすいように提示するもので、出来る限り正確に見積りを提示し、お客様に納得していただくものである。", "C": "見積りを正確なものにするには、受け入れ時のチェックや問診が必要になる。"}, "explanation": "わからない作業でも概算であることを伝えて、判明した時点で中間の連絡を行う。請求の段階まで金額を伝えないのは不適切。", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 19, "label": "問19", "points": 3, "answer": "B", "stem": "通過車両の業務処理規定に関する記述として、不適切なものはどれか。", "choices": {"A": "営業時間外でも出動できるように幹線道路を中心に全国に対応拠点を配置している。", "B": "営業時間外での出動では特別対応料を請求できることになっており、他メーカー車でも金額は同じである。", "C": "出動は作業の安全確保や連絡のため２名体制を原則としている。"}, "explanation": "他メーカー車両の場合は10,000円の割増し請求ができる（他メーカーでも金額は同じという記述は不適切）。", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 20, "label": "問20", "points": 3, "answer": "C", "stem": "通過車両の業務処理規定に関する記述として、不適切なものはどれか。", "choices": {"A": "元販売会社とは、通過車両を修理対応する際、その車両を販売した販売会社や主幹販売会社など、現在取引のある販売会社を総称していう。", "B": "実施販売会社とは、通過車両を修理対応する販売会社をいう。", "C": "通過車両とは、自社以外の販売会社が販売した車両や、自社の他拠店が販売した車両を総称していう。"}, "explanation": "通過車両とは、自社以外の販売会社が販売した車両をいう。自社の他拠店が販売した車両は含まない。", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 21, "label": "問21", "points": 3, "answer": "B", "stem": "保証制度に関する記述として、不適切なものはどれか。", "choices": {"A": "販売会社はお客様との売買契約で、保証書に記載されている期間と条件に従って保証修理することを約束している。", "B": "販売会社は、お客様より保証に該当する修理を申し受けた場合、一定の要件を満たす時に限り保証修理を断ることができる。", "C": "販売会社は日野販売会社基本契約書に基づき、日野自動車に代わって保証修理を実施することを約束している。"}, "explanation": "保証に該当する場合、修理は断ることができない。保証修理を断れる例外規定はない。", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 22, "label": "問22", "points": 3, "answer": "A", "stem": "自動車損害賠償責任保険（自賠責保険）に関する記述として、不適切なものはどれか。", "choices": {"A": "対人と対物への賠償として入る保険。", "B": "保険の契約が締結されている車両でなければ運行してはならない。", "C": "保険の契約期間は、車検の有効期間を完全にカバーしている必要がある。"}, "explanation": "自動車損害賠償保障法により、強制的につけなくてはならない対人賠償のみを担保するもの。対物賠償は含まれない。", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 23, "label": "問23", "points": 3, "answer": "A", "stem": "２＊Ｇ付プロフィア（２０２４年モデル）の安全装置に関する記述として、不適切なものはどれか。", "choices": {"A": "出会い頭警報（ＦＣＴＡ）は、交差する移動物を検知した場合、ドライバーへ警報を出し、さらに自車前面に衝突する危険性が高まると自動でブレーキを作動させる。", "B": "左折巻込み警報（ＢＳＩＳ）は、自車左側方の移動物を検知した場合や左折時に衝突の危険性がある場合にブザー音や表示灯でドライバーへ警報する。", "C": "車線変更警報（ＢＳＤ）は、自車左右側方の移動物を検知した場合や車線変更時に衝突の危険性がある場合にブザー音や表示灯でドライバーへ警報する。"}, "explanation": "FCTA・BSIS・BSDなどをまとめてSAMSと呼称している。SAMSはいずれも警報のみであり、自動ブレーキは作動しない。", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 24, "label": "問24", "points": 3, "answer": "C", "stem": "排出ガス浄化装置に関する記述として、不適切なものはどれか。", "choices": {"A": "DPRは、装置内に排出ガス中のPMを捕集し、溜まったPMはフィルター内で燃焼処理を行う。", "B": "SCRは、装置内に尿素水を噴射し、排出ガス中のNoｘを分解し、無害なものに変化させる。", "C": "EGRは、排気ガスの一部を吸入空気側に戻すことでNoｘとPMを減少させている。"}, "explanation": "EGRは、排ガスを戻すことでNOxを減少させる（エンジン内の燃焼温度を下げる）が、PMを減少させるものではない。", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 25, "label": "問25", "points": 3, "answer": "C", "stem": "下請法で定義している親事業者の４つの義務として、不適切なものはどれか。", "choices": {"A": "発注書面交付の義務", "B": "支払日を定める義務", "C": "商品受領の義務"}, "explanation": "4つの義務は①発注書面の交付義務 ②支払日を定める義務 ③遅延利息を支払う義務 ④書類作成の義務。「商品受領の義務」は含まれない。", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 26, "label": "問26", "points": 3, "answer": "A", "stem": "道路運送車両法に照らし、自動車の整備事業に関する記述として、適切なものはどれか。", "choices": {"A": "点検または整備の作業を行う事業場は、依頼者に対し、整備の内容と必要性を説明し、料金の概算見積りを交付、または見積もりの電磁的記録を提供しなければならない。", "B": "依頼者に対し、行っていない点検／整備の料金を不当に請求してはならないが、依頼されない点検／整備であれば、その料金を請求できる。", "C": "点検または整備の作業を行う事業場は、作業に係る料金については見積書にて提示するため、事業場に料金の掲示はしない。"}, "explanation": "作業料金は、依頼者の見やすい位置に掲示しなければならない。概算見積りの提供義務はBCとも不適切であり、Aが正しい規定。", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 27, "label": "問27", "points": 3, "answer": "B", "stem": "品質改善に関する記述として、不適切なものはどれか。", "choices": {"A": "「サービスキャンペーン」とは、リコールや改善対策に該当しない車両の構造・装置の不具合への無償修理処置である。", "B": "「改善対策」とは、車両が保安基準に適合しないものの安全確保、公害防止には問題がないと判断した場合に無償修理を実施するものである。", "C": "「リコール」とは、車両が保安基準に適合しなくなる場合に、無償修理を実施するものである。"}, "explanation": "リコール：保安基準に適合しなくなるおそれがある場合に無料で修理。サービスキャンペーン：リコール・改善対策に該当しない不具合への無償処置。Bの「改善対策」の説明は不適切。", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 28, "label": "問28", "points": 3, "answer": "C", "stem": "職場内の５Ｓに関する記述として、適切なものはどれか。", "choices": {"A": "整理とは、必要なものがいつでも取り出せて、戻せること。", "B": "整頓とは、いるものといらないものを分けて、いらないものを捨てること。", "C": "躾（しつけ）とは、決められたことを正しく守る習慣のこと。"}, "explanation": "整理とは、いるものといらないものを分けて、いらないものを捨てること。整頓とは、必要なものがいつでも取り出せて戻せること。AとBが逆になっている。躾（C）が正しい。", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 29, "label": "問29", "points": 3, "answer": "B", "stem": "フロント受付時の安全に関する記述について、不適切なものはどれか。", "choices": {"A": "受付後の車両移動は、自社従業員が行う。", "B": "お客様に提示する用事があるなど、すぐに使用する部品はフロントのカウンター内に置くようにしてお待たせしないようにする。", "C": "お客様車両入庫時には、積荷の安全確認やフレーム腐食など作業の安全に支障がないか確認する。"}, "explanation": "フロントのカウンター内には部品などを置かない（安全のため）。", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 30, "label": "問30", "points": 3, "answer": "A", "stem": "安全の心構えに関する記述として、不適切なものはどれか。", "choices": {"A": "作業能率を阻害する原因と事故や災害を起こす原因は関連性がない。", "B": "作業の洗い出しと改善、異常処置時の安全のルール作りを行う。", "C": "自分自身が主体となり自ら考えなければならない。"}, "explanation": "作業能率を阻害する原因を掘り下げると大部分は事故や災害を起こす原因となる。「関連性がない」は誤り。", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 31, "label": "問31", "points": 5, "answer": "C", "stem": "【問２(1)】平日の営業時間内に通過車両のバッテリ交換を下記内容で行った。消費税１０％込みの元販売会社への振替料金として、適切なものはどれか。\n\n技術料：１０，０００円（税抜）\n純正ＰＢバッテリ（原価）：３０，０００円（２個分合計税抜）\nその他部品代（定価）：５，０００円（税抜）\n\n（注）答えは小数点以下第一位を四捨五入し、整数とする。", "choices": {"A": "４８，２００円", "B": "５０，８００円", "C": "５２，８００円"}, "explanation": "【計算】\n技術料振替（20%控除）：10,000×0.8＝8,000円\n純正PBバッテリ（原価×1.2）：30,000×1.2＝36,000円\nその他部品（定価×0.8）：5,000×0.8＝4,000円\n小計：48,000円\n消費税込：48,000×1.1＝52,800円 → C", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 32, "label": "問32", "points": 5, "answer": "B", "stem": "【問２(2)】通過車両の業務処理規定に照らし、サービスカーを使用して片道２０ｋｍ離れた場所での出張作業を行った。元販売会社へのサービスカー使用料金の振り替え請求額を消費税１０％込みで計算した場合、適切なものはどれか。\n\n（注）答えは小数点以下第一位を四捨五入し、整数とする。", "choices": {"A": "１４，９００円", "B": "１５，８４０円", "C": "１６，８６０円"}, "explanation": "【計算】\n基本料金：8,000円\n距離料金：400円×20km＝8,000円\n小計：16,000円\n10%控除：16,000×0.9＝14,400円\n消費税込：14,400×1.1＝15,840円 → B", "source": "25年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 1, "label": "問1", "points": 2, "answer": "D", "stem": "(1) 小型トラックにおいて「日野が架装した架装車の架装部分」の「錆によるボデー外板の穴あき」の保証期間に関する記述として、適切なものはどれか。", "choices": {"A": "架装した日から３年間。ただし、その期間内でも走行距離が６０,０００ｋｍまでとする。", "B": "新車を登録した日から３年間。ただし、その期間内でも走行距離が６０,０００ｋｍまでとする。", "C": "架装した日から３年間とする。", "D": "新車を登録した日から３年間とする。"}, "explanation": "錆による外板の穴あきに対する保証期間は「新車登録後3年間」で、走行距離制限はない（D適切）。", "source": "第49回全国フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 2, "label": "問2", "points": 2, "answer": "B", "stem": "(2) 小型トラックにおける保証期間の記述として、不適切なものはどれか。", "choices": {"A": "エグゾースト・パイプマフラ等は一般保証である。", "B": "ハロゲン・ランプは保証外である。", "C": "ハイブリッド用メインバッテリ（駆動用電池）は架装物等に電源を供給した場合、一般保証である。", "D": "クラッチカバーは特別保証である。"}, "explanation": "ハロゲンランプは消耗品扱いではなく「一般保証」の対象。「保証外」という記述が不適切（B不適切）。", "source": "第49回全国フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 3, "label": "問3", "points": 2, "answer": "A", "stem": "(3) 保証の種類に関する記述として、不適切なものはどれか。", "choices": {"A": "日野が補給するリンク品の保証はリンク品保証書に基づき保証修理を行う。", "B": "自動車の保証とは日野が出荷する完成車両に対し、日野が発行する保証書に基づいて実施する保証を言う。", "C": "補給部品の保証は、日野の保証書に記載する一般保証部品に準じる。", "D": "汎用エンジンの保証とは、汎用エンジンに添付された保証書に基づく保証を言う。"}, "explanation": "リンク品の保証はメーカ内規保証修理に基づく保証であり、「リンク品保証書」は存在しない（A不適切）。", "source": "第49回全国フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 4, "label": "問4", "points": 2, "answer": "A", "stem": "(4) 通過車両対応に関する業務処理規定についての記述として、不適切なものはどれか。", "choices": {"A": "通過車両とは、自社以外の販売会社が販売した車両をいう。（流入車両、登録前車両は含まない）", "B": "他メーカー車両の修理対応は原則として行わないこととする。（トヨタ車は除く）", "C": "営業時間外とは、原則、平日の実施販売会社定時間帯以外および休日をいう。", "D": "元販売会社とは、通過車両を修理対応する際、その車両を販売した販売会社や現在取引のある販売会社を総称していう。（主幹販社も含む）"}, "explanation": "通過車両とは自社以外の販売会社が販売した車両をいう。流入車両・登録前車両も含まれる。「含まない」という記述が不適切（A不適切）。", "source": "第49回全国フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 5, "label": "問5", "points": 2, "answer": "C", "stem": "(5) ＳＯＳ緊急サービス運用マニュアルに照らし、中央コールセンターでの受付においてＨＩＴＯＳＳII対応区分とお客様ランクの関係性についての記述として、適切なものはどれか。", "choices": {"A": "お客様ランク「９」では、優良客（Ｓ）であってもお断りする。", "B": "お客様ランク「６～８」では、優良客（Ｓ）であっても元販社へ照会を行う。", "C": "不良客（Ｂ）は、お客様ランクに関係なく、お断りする。", "D": "登録なし（Ｎ）の場合、お客様ランクに関係なく、元販社へ照会を行う。"}, "explanation": "不良客（B）はお客様ランクに関係なくお断りする（C適切）。優良客（S）はランク関係なく出動手配。登録なし（N）はランク6～8の場合に元販社へ照会。", "source": "第49回全国フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 6, "label": "問6", "points": 2, "answer": "B", "stem": "(6) 通過車両規定に照らし、お客様リストに優良客として登録されているお客様（通過車両）より直接、レンジャーの右側ヘッドライトバルブ（ハロゲン）交換の依頼を受けた。この場合の応対として、適切なものはどれか。", "choices": {"A": "元販売会社と連絡がとれないので、現金払いでの修理をお客様にお願いした。", "B": "元販売会社に確認をとらずに、受付をして作業した。", "C": "元販売会社に連絡がとれないので、連絡がとれるまで作業を待ってもらった。", "D": "元販売会社の担当に連絡がとれないので、作業を断った。"}, "explanation": "お客様登録リストに優良客として登録されていて修理費5万円以下は確認不要。元販社への確認なしに受付・作業することが適切（B適切）。", "source": "第49回全国フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 7, "label": "問7", "points": 2, "answer": "D", "stem": "(7) 通過車両対応に関する業務処理規定についての記述として、適切なものはどれか。", "choices": {"A": "休日の技術料割増は、実施販売会社の定時間内に受付し、定時間内に作業完了した場合には適用なし。", "B": "平日の技術料割増は、実施販売会社の定時間内に受付し、定時間外に作業完了した場合には適用なし。", "C": "平日の技術料割増は、実施販売会社の定時間内に受付し、定時間外に作業完了した出張作業は２５％割増となる。", "D": "休日の技術料割増は、２２時に受付し２３時に作業完了した場合の出張作業は１００％割増となる。"}, "explanation": "休日22時受付23時完了の出張作業は100%割増が適切（D適切）。休日定時間内受付・完了は25%割増あり。平日定時間外完了の出張は50%割増。", "source": "第49回全国フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 8, "label": "問8", "points": 2, "answer": "A", "stem": "(8) 即伝に関する記述として、不適切なものはどれか。", "choices": {"A": "お客様に修理車両引き渡し後、すぐに伝票を起こすことによる、伝票売り上げ処理をするシステムを指す。", "B": "事務処理業務の平準化により残業が減る。", "C": "回収時のトラブルが減り、回収業務が円滑になる。", "D": "サービスエンジニアの作業内容記入漏れによる、売上漏れを防止できる。"}, "explanation": "即伝とは工事完了後すぐに伝票を起こすシステム。「引き渡し後」ではなく「完了後すぐ」に伝票を起こして引き渡し時に納品書・請求書を渡せる（A不適切）。", "source": "第49回全国フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 9, "label": "問9", "points": 2, "answer": "D", "stem": "(9) 売上・回収に関する記述として、不適切なものはどれか。", "choices": {"A": "小切手とは振出人の取引銀行に対して、受取人に一定額の金額を支払うように委託する有価証券のこと。", "B": "改正民法施行により、起算日令和２年４月１日以降の売掛金の時効が２年から５年になった。", "C": "受取手形は６ヶ月に２回、銀行を支払い場所とする約束手形を不渡りにすると銀行取引停止処分を受ける。", "D": "ＨＩＴＯＳＳII上のお客様ランクが「 ６，７ 」の場合、売上先確認。「 ８，９ 」の場合、売上不可が表示される。"}, "explanation": "HITOSSIIのお客様ランクは「6、7、8」が売上先確認、「9」が売上不可。「8、9」両方が売上不可という記述が不適切（D不適切）。", "source": "第49回全国フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 10, "label": "問10", "points": 2, "answer": "A", "stem": "(10) 令和２年４月１日改正民法施行後の売掛金に関する記述として、不適切なものはどれか。", "choices": {"A": "時効の成立を停止させるため、請求書を再度送付した。", "B": "取引先が倒産してしまったので、回収は出来ない。", "C": "支払いに懸念のあるお客様と、現金取引を行った。", "D": "１年間、時効の完成を猶予をするために、書面での合意をした。"}, "explanation": "時効の中断（更新）には催告（内容証明郵便等）や裁判上の手続きが必要。単なる請求書の再送付は時効停止の効力を持たない（A不適切）。", "source": "第49回全国フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 11, "label": "問11", "points": 2, "answer": "C", "stem": "(11) 手形や小切手に関する記述として、適切なものはどれか。", "choices": {"A": "小切手の場合は振出人に対して請求の権利は３カ月で時効、裏書人に対しては６カ月で時効となる。また小切手に貼る収入印紙は、記載金額１０万円未満は非課税、１００万円以下は２００円の収入印紙が必要となる。", "B": "小切手の場合は振出人に対して請求の権利は６カ月で時効、裏書人に対しては６カ月で時効となる。また小切手に貼る収入印紙は、記載金額５万円未満は非課税、１００万円以下は２００円の収入印紙が必要となる。", "C": "手形の場合は振出人に対して請求の権利は３年で時効、裏書人に対しては１年で時効となる。また手形に貼る収入印紙は、記載金額１０万円未満は非課税、１００万円以下は２００円の収入印紙が必要となる。", "D": "手形の場合は振出人に対して請求の権利は1年で時効、裏書人に対しては３年で時効となる。また手形に貼る収入印紙は、記載金額５万円未満は非課税、１００万円以下は２００円の収入印紙が必要となる。"}, "explanation": "手形：振出人3年・裏書人1年で時効。手形の収入印紙：10万円未満非課税・100万円以下200円（C適切）。", "source": "第49回全国フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 12, "label": "問12", "points": 2, "answer": "D", "stem": "(12) 保険による事故修理の売上方法に関する記述として、不適切なものはどれか。", "choices": {"A": "技術料・・・保険査定額の５％を控除", "B": "部品代・・・保険査定額の１０％を控除", "C": "外注作業技術料・・・保険査定額の５％を控除", "D": "外注作業部品代・・・保険査定額の１０％を控除"}, "explanation": "通過車両の保険事故修理における外注作業部品代の控除率は10%ではない（D不適切）。", "source": "第49回全国フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 13, "label": "問13", "points": 2, "answer": "A", "stem": "(13) 整備費用(事故修理を除く)の売上方法に関する記述として、不適切なものはどれか。", "choices": {"A": "通過車両技術料単価・・・実施販売会社のお客様請求標準技術料単価の１０％を控除し、その改訂は年１回とする。", "B": "基本料金・・・標準作業時間に通過車両技術料単価を乗じて算出した額とする。", "C": "外注作業料金・・・電気、板金、塗装、機械加工等の外注作業は市場価格を基準とし、振替請求額は売上金額の１０％を控除する。", "D": "技術料割増...悪条件の場合は元販売会社へ事前連絡の上、出張技術料割増を５０％とすることができる。"}, "explanation": "通過車両技術料単価の改訂は年1回ではなく規定の改訂タイミングによる。または10%控除等の条件が規定と異なる（A不適切）。", "source": "第49回全国フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 14, "label": "問14", "points": 2, "answer": "B", "stem": "(14) 事故車や故障車の保管料に関する記述として、適切なものはどれか。", "choices": {"A": "修理を実施したもの・・・元販売会社宛に完成した旨を通知した日の翌日から起算し、７日間は無料。８日間以上は1日につき５００円とする。", "B": "修理しないもの・・・入庫日の翌日から起算し７日間は無料。８日間以上は１日につき９００円(小型車は５００円)とする。", "C": "修理を実施したもの・・・元販売会社宛に完成した旨を通知した日の翌日から起算し、７日間は無料。８日間以上は１日につき９００円とする。", "D": "修理しないもの・・・入庫日の翌日から起算し７日間は無料。８日間以上は１日につき５００円(小型車は３００円)とする。"}, "explanation": "修理しないもの：入庫日翌日から7日間無料、8日以上は1日900円（小型車500円）（B適切）。修理実施したものは完成通知日翌日から7日無料・以降900円。", "source": "第49回全国フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 15, "label": "問15", "points": 2, "answer": "B", "stem": "(15) 実施販売会社の請求方法に関する記述として、不適切なものはどれか。", "choices": {"A": "実施販売会社は作業完了後、即時に納品書を元販売会社宛に必ず発送する。", "B": "実施販売会社では毎月２０日を締切日とし、翌月分の請求書を一括して元販売会社に発送する。", "C": "原則として追加請求は認めないが、外注、その他やむを得ず別請求になる場合は、事前に元販売会社に連絡をし、承諾を得るものとする。", "D": "請求側、支払側とも半期ごとに残高整理を行い、元販売会社に通知するものとする。"}, "explanation": "毎月20日を締切日とし「当月分」の請求書を発送する。「翌月分」は誤り（B不適切）。", "source": "第49回全国フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 16, "label": "問16", "points": 2, "answer": "D", "stem": "(16) ２０１７年モデルのリエッセII（ＸＺＢ６０＊、７０＊）に関する記述として、不適切なものはどれか。", "choices": {"A": "イモビライザーシステムを全車に標準装備とした。", "B": "車両の電源を１２Ｖ化し、バッテリーを並列で接続している。", "C": "運転席＆助手席のエアバックを全車標準装備とした。", "D": "安全装備の充実化を図り、ＶＳＣ及びＰＣＳを全車に標準装備した。"}, "explanation": "リエッセIIにはVSCは全車標準装備だがPCSの設定はない。「VSC及びPCS全車標準装備」は不適切（D不適切）。", "source": "第49回全国フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 17, "label": "問17", "points": 2, "answer": "B", "stem": "(17) ２ＤＧ付メルファに関する記述として、不適切なものはどれか。", "choices": {"A": "エンジンは単段ターボチャージャー搭載のＡ０５Ｃ型エンジンを採用している。", "B": "排ガス（後処理）システムには尿素フリーのＤＰＲIIを採用している。", "C": "トランスミッションはＬＸ０６＋ＡＭＴのみの設定となっている。", "D": "運転席に電子式ＳＲＳエアバッグ＆プリテンショナー付シートベルトを採用している。"}, "explanation": "2DG付メルファの排ガス後処理システムはDPR+尿素SCRシステムを採用。「尿素フリーのDPRII」は不適切（B不適切）。", "source": "第49回全国フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 18, "label": "問18", "points": 2, "answer": "A", "stem": "(18) ジーゼルノックを防ぐ方法の記述として、不適切なものはどれか。", "choices": {"A": "セタン価の低い燃料を用いる", "B": "シリンダー内の圧縮圧力を高くする。", "C": "燃料噴射初めの噴射量を少なくする。", "D": "冷間時の自己着火を容易にするために、吸入空気温度を上げる。"}, "explanation": "ジーゼルノック防止にはセタン価の「高い」燃料（着火性の良い燃料）を用いる。「低い」は逆で不適切（A不適切）。", "source": "第49回全国フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 19, "label": "問19", "points": 2, "answer": "D", "stem": "(19) ２ＤＧ付メルファのキーレスエントリーシステムに関する記述として、不適切なものはどれか。", "choices": {"A": "扉が開閉し始める３秒前から作動が終わるまで警報ブザーが吹鳴する。", "B": "キーレスエントリーは、車両から約５ｍ以内で作動する。", "C": "専用コードに類似したコードを１分間に１０種類受信すると、その後コードは１０分間受け付けない。", "D": "キーレスエントリーは、車外ドア開閉スイッチが「開」のときは、作動しない。"}, "explanation": "キーレスエントリーは車外ドア開閉スイッチが「閉」のとき作動しない（開の時ではない）。Dの記述は不適切。", "source": "第49回全国フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 20, "label": "問20", "points": 2, "answer": "D", "stem": "(20) 道路運送車両法に関する記述として、不適切なものはどれか。", "choices": {"A": "自動車使用の本拠に乗車定員１０人以下で車両総重量８トン以上の自家用自動車及び乗車定員１０人以下の自動車運送事業用に供する自動車を５両以上使用している自動車運送業者は整備管理者を選任しなければならない。", "B": "三級自動車整備士の資格を取得した者は、整備管理者の資格を有する。", "C": "自家用マイクロバスを運行する者は、１日１回、その運行の開始前に日常点検をしなければならない。", "D": "自動車が保安基準に適合しなくなるおそれがある状態又は適合しない状態にあるときは、警察庁交通局長から改善命令を受けることがある。"}, "explanation": "保安基準に適合しない状態の改善命令は「警察庁交通局長」ではなく「地方運輸局長」が発令する（D不適切）。", "source": "第49回全国フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 21, "label": "問21", "points": 2, "answer": "B", "stem": "(21) 道路運送車両法において、自動車の整備事業に関する記述として、適切なものはどれか。", "choices": {"A": "事業用自動車の点検整備記録簿の保存期間は、その記載の日から２年間である。", "B": "普通自動車特定整備事業のみの認証を受けた事業場では、四輪の軽自動車の分解整備を行うことはできない。", "C": "整備命令は、自動車整備事業者に対し、その実施した整備の状況が不良の場合に出される命令である。", "D": "整備主任者は同一事業者が経営する事業場であれば、他の事業場の整備主任者を兼務することができる。"}, "explanation": "普通自動車特定整備事業は普通自動車・四輪小型自動車・大型特殊自動車が対象。四輪軽自動車は対象外のため分解整備不可（B適切）。", "source": "第49回全国フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 22, "label": "問22", "points": 2, "answer": "A", "stem": "(22) 「道路運送車両の保安基準」に照らし、灯火の基準に関する記述として、不適切なものはどれか。", "choices": {"A": "後退灯は、その照明部の最外縁が自動車の最外側から４００ｍｍ以内となるよう取り付けられていること。", "B": "すれ違い用前照灯は、その照明部の最外縁が自動車の最外側から４００ｍｍ以内となるよう取り付けられていること。", "C": "尾灯は、最外側にあるものの照明部の最外縁は、自動車の最外側から４００ｍｍ以内となるよう取り付けられていること。", "D": "車幅灯の照明部の最外縁は、自動車の最外側から４００ｍｍ以内となるよう取り付けられていること。"}, "explanat
