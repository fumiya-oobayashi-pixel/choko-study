度が高ければ高いほど凍結温度は低くなる。", "C": "ＬＬＣの濃度が低いと凍結防止性は低下するが防錆効果は高くなる。"}, "explanation": "LLCの濃度が低いと防錆効果および凍結防止性が低下する（A適切）。濃度が高すぎると逆に凍結温度が上昇する場合がある。", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 18, "label": "問18", "points": 3, "answer": "C", "stem": "２０１７年に販売開始したポストポスト新長期のプロフィアの商品説明として、不適切なものはどれか。", "choices": {"A": "プロシフト車の操作は、ダイヤル式のギヤセレクターおよびシーケンシャルレバーが採用されている。", "B": "ＡＤＢヘッドランプとは、対向車のヘッドランプや先行車のテールランプ位置を検出し、前方車両に眩惑を与えず、それ以外のエリアをハイビームで照射するシステムである。", "C": "ＬＥＤ仕様のリヤコンビネーションランプを標準設定し、ＬＥＤ式のストップランプ、テールランプ、ターンランプとさらにバルブ式のバックランプを内蔵している。"}, "explanation": "ターンランプはバルブ式であり、LED式ではない（C不適切）。正しくはLED式のストップランプ・テールランプ、バルブ式のターンランプ・バックランプを内蔵している。", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 19, "label": "問19", "points": 3, "answer": "B", "stem": "「道路運送車両法」に照らし、小型車の寸法に関する記述として、不適切なものはどれか。", "choices": {"A": "車両の長さは、４．７ｍ以下である。", "B": "車両の高さは、２．３ｍ以下である。", "C": "車両の幅は、１．７ｍ以下である。"}, "explanation": "小型車の寸法は長さ4.7m以下、幅1.7m以下、高さ2.0m以下。高さは2.3mではなく2.0m以下が正しい（B不適切）。", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 20, "label": "問20", "points": 3, "answer": "A", "stem": "「道路運送車両法」に照らし、地方運輸局長から出される「整備命令」の対象者として、適切なものはどれか。", "choices": {"A": "自動車の使用者", "B": "自動車分解整備事業者", "C": "自動車を整備した自動車整備士"}, "explanation": "道路運送車両法第54条により、整備命令は地方運輸局長から自動車の使用者へ出される（A適切）。", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 21, "label": "問21", "points": 3, "answer": "A", "stem": "「道路運送車両法」の自動車点検基準に照らし、点検整備記録簿の保存期間として、適切なものはどれか。", "choices": {"A": "自動車運送事業用自動車（貨物軽自動車運送事業を除く）は１年間である。", "B": "乗車定員１１人以上の自家用自動車は２年間である。", "C": "自家用乗用自動車は３年間である。"}, "explanation": "自動車運送事業用自動車は1年間（A適切）。乗車定員11人以上の自家用自動車は1年間。自家用乗用自動車は2年間。", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 22, "label": "問22", "points": 3, "answer": "B", "stem": "保安基準適合証および保安基準適合標章の有効期限として、適切なものはどれか。", "choices": {"A": "検査員が検査をした日を含み７日間", "B": "検査員が検査をした日を含み１５日間", "C": "検査員が検査をした日を含み３０日間"}, "explanation": "保安基準適合証等の有効期間は、指定規則第9条で検査をした日から15日間と定められている（B適切）。", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 23, "label": "問23", "points": 3, "answer": "B", "stem": "「道路運送車両の保安基準」に照らし、車幅灯（２０１８年製作車両）に関する記述として、不適切なものはどれか。", "choices": {"A": "白色。ただし、方向指示器、非常点滅表示灯または側方灯と構造上一体のもの、または兼用のものは橙色でもよい。", "B": "夜間前方１００ｍの距離から点灯を確認できること。", "C": "照射部の最外縁は自動車の最外側から４００ｍｍ以内。（トレーラーは１５０ｍｍ以内）"}, "explanation": "車幅灯は夜間前方300mの距離から点灯を確認できること（B不適切：100mではなく300m）。", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 24, "label": "問24", "points": 3, "answer": "B", "stem": "安全マニュアルに記載されている安全への心構えの中で、次の文章の［　］に当てはまるものとして、適切なものはどれか。\n\n「［　　　　　　　　　　　］」と言われるように、安全活動は「人道上な面」からも「社会的責任の面」からも極めて重要なことです。", "choices": {"A": "安全は責任感が必要", "B": "人の命は地球より重い", "C": "安全は経験が重要"}, "explanation": "「人の命は地球より重い」と言われるように、安全活動は人道上な面からも社会的責任の面からも極めて重要なことである（B適切）。", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 25, "label": "問25", "points": 3, "answer": "C", "stem": "職場内の５Ｓに関する記述として、適切なものはどれか。", "choices": {"A": "整理とは、必要なものがいつでも取り出せて、戻せること。", "B": "整頓とは、いるものといらないものを分けて、いらないものを捨てること。", "C": "清掃とは、いつもきれいな環境にしておくこと。"}, "explanation": "整理とは、いるものといらないものを分けて、いらないものを捨てること。整頓とは、必要なものがいつでも取り出せて、戻せること。清掃とは、いつもきれいな環境にしておくこと（C適切）。", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 26, "label": "問26", "points": 3, "answer": "A", "stem": "次の文章の［　］にあてはまる組み合わせとして、適切なものはどれか。\n\nハインリッヒの法則とは重傷害事故が[①]件発生する前には、軽傷害事故が[②]件起こり、無傷害事故が[③]件起こっているという確率を法則化したもの", "choices": {"A": "①１　②２９　③３００", "B": "①２～３　②２０　③２００", "C": "①５　②１０　③１００"}, "explanation": "ハインリッヒの法則：1件の重大事故の背後には29件の軽微な事故があり、さらにその背後に300件のヒヤリハットがある（A適切）。1：29：300の法則。", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 27, "label": "問27", "points": 3, "answer": "C", "stem": "サービス業態集計表に記載されている、営業費カバー率の計算式として、適切なものはどれか。", "choices": {"A": "（整備売上高÷会社総経費）×１００", "B": "（整備売上高÷整備・部品部門経費）×１００", "C": "（整備売上利益÷会社総経費）×１００"}, "explanation": "営業費カバー率 = （整備売上利益 ÷ 会社総経費）×100（C適切）。整備部門の利益が会社全体の経費をどれだけカバーしているかを示す指標。", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 28, "label": "問28", "points": 3, "answer": "B", "stem": "日野メンテナンスリースの基本契約Ｓプランに関する記述として、不適切なものはどれか。", "choices": {"A": "ワイパーゴムの交換は含む。", "B": "クーラーベルトの交換は含む。", "C": "パワーステアリングオイルの交換は含む。"}, "explanation": "クーラーベルトの交換はSプランには含まれない（B不適切）。ワイパーゴムやパワーステアリングオイルはSプランに含まれる。", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 29, "label": "問29", "points": 3, "answer": "A", "stem": "自動車損害賠償責任保険（自賠責保険）に関する記述として、不適切なものはどれか。", "choices": {"A": "対人と対物賠償として入る保険。", "B": "自動車１台ごとに必ずつけなくてはならない保険（強制保険）。", "C": "保険の契約が締結されている車両でなければ運行してはならない。"}, "explanation": "自賠責保険は対人賠償のみを担保するもの。対物賠償は含まれない（A不適切）。自動車損害賠償保障法により強制的につけなくてはならない保険。", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 30, "label": "問30", "points": 3, "answer": "A", "stem": "自動車損害賠償責任保険（自賠責保険）の支払金額に関する記述として、不適切なものはどれか。", "choices": {"A": "保険の支払いとして、ケガの場合で３００万円。", "B": "保険の支払いとして、死亡で３，０００万円。", "C": "保険の支払いとして、後遺障害（第１級）で４，０００万円。"}, "explanation": "ケガの場合の支払限度額は120万円（300万円は不適切）。死亡は3,000万円、後遺障害第1級は4,000万円が限度額。", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 31, "label": "問31", "points": 5, "answer": "B", "stem": "通過車両対応に関する業務処理規定において、サービスカーを使用して片道１５ｋｍを出張で作業を行った。\n依頼販売会社へのサービスカー使用料金の振り替え請求額を消費税込みとして、適切なものはどれか。\n\n注）答えが小数点以下になる場合は、小数点以下第１位を四捨五入しなさい。", "choices": {"A": "６，４８０円", "B": "７，７７６円", "C": "８，６４０円", "D": "１２，９６０円", "E": "１３，６０８円"}, "explanation": "旧料金（消費税8%時代）：10kmまで6,000円、以降1km毎に400円。\n片道15km（超過5km）：6,000 + 400×5 = 8,000円\n10%控除：8,000 × 0.9 = 7,200円\n消費税8%：7,200 × 1.08 = 7,776円 → B", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 32, "label": "問32", "points": 5, "answer": "D", "stem": "平日の営業時間内に通過車両のバッテリ交換を下記内容で行った。\n元販売会社への振替料金を消費税込みとして、適切なものはどれか。\n但し、部品は純正部品を使用し、特定部品は使用していない。\n\n注）答えが小数点以下になる場合は、小数点以下第１位を四捨五入しなさい。\n\n技術料：１７，０００円（税抜）\n部品代（定価）：３，２００円（税抜）\n純正ＰＢバッテリ（原価）：２８，０００円（２個分合計税抜）", "choices": {"A": "４１，６４５円", "B": "４９，８７４円", "C": "５２，０５６円", "D": "５３，７４１円", "E": "５８，１０４円"}, "explanation": "通過車両振替料金計算（消費税8%）：\n技術料（20%控除）：17,000 × 0.8 = 13,600円\n部品代（20%控除）：3,200 × 0.8 = 2,560円\nバッテリ振替（20%増し）：28,000 × 1.2 = 33,600円\n合計：13,600 + 2,560 + 33,600 = 49,760円\n税込み：49,760 × 1.08 = 53,740.8 ≒ 53,741円 → D", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 1, "label": "問1", "points": 2, "answer": "B", "stem": "(1) 保証制度に関する記述として、不適切なものはどれか。", "choices": {"A": "保証修理は販売会社の収益、お客様の信頼の回復と維持、市場技術情報の収集という大きな役割を持っている。", "B": "補給部品の保証について、日野の保証書に記載する一般保証部品に準じ、販売会社の取り付け上に起因する不具合も保証範囲に含むものとする。", "C": "部品メーカーの保証対象と適用範囲について、バッテリーは製造日より６ヶ月間であり、タイヤについては各タイヤ製造メーカーの条件による保証とし、それぞれ代替品にて対応となる。", "D": "大型トラック／トラクター保証書について日野自動車が示す仕様(積載量、定員、速度、エンジン回転数等)の限度を超える使用に起因すると判定できる故障または破損については保証を適用しない。"}, "explanation": "補給部品の保証において、販売会社の取り付け上に起因する不具合は保証範囲に含まない（含むとする記述が不適切）。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 2, "label": "問2", "points": 2, "answer": "D", "stem": "(2) 保証制度に関する記述として、不適切なものはどれか。", "choices": {"A": "販売会社は、お客様より保証書に記載された期間と条件に適合する申し出を受けた場合は保証修理を断ることができない。", "B": "保証制度は約束によって成り立っており、お互いに約束（契約）を守って、正しく運用しなければならない。約束（契約）違反は信頼関係を損ない、重大問題に発展する。", "C": "日野自動車製品の取引等に関し、その基本的な事項について、販売会社と日野自動車の代表者間で契約を締結した契約書のことを「日野販売会社基本契約書」と言う。", "D": "日野自動車の保証制度は、販売会社・日野自動車がそれぞれの約束を結び、この約束によって成り立っている。"}, "explanation": "日野自動車の保証制度は、お客様・販売会社・日野自動車の三者がそれぞれの約束を結び成り立っている。Dは「お客様」が抜けているため不適切。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 3, "label": "問3", "points": 2, "answer": "D", "stem": "(3) 下請法の親事業者の義務や禁止事項、注意事項などに関する記述として、不適切なものはどれか。", "choices": {"A": "納入物受領後６０日を経過した日から実際に支払われた日までの期間について、年率１４．６％の遅延利息を支払わなければならない。", "B": "口頭発注によるトラブルを未然に防止するため、親事業者は発注に際して、「１１の法定事項」を満たした書面を直ちに下請事業者に発行しなければならない。", "C": "支払い期日になっても下請事業者から請求書が送られてこない場合でも支払いが遅れると違反になる恐れがある。", "D": "下請事業者に作業を依頼したが、翌日同じお客様、車両で追加作業が発生したので、交付済みの外注依頼書を訂正して追加依頼した。"}, "explanation": "追加作業が発生した場合は、既存の外注依頼書を訂正するのではなく、追加分の外注依頼書を新たに発行しなければならない。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 4, "label": "問4", "points": 2, "answer": "B", "stem": "(4) 外注依頼書の発行に関する記述として、適切なものはどれか。", "choices": {"A": "作業指示書発行後、外注作業が発生した場合は、作業指示書のコピーで対応出来る。", "B": "価格が決定しない場合、理由と確定予定日を明記し、決定後即時に補充書面を発行する。", "C": "納期は変わることがあるので、発注時は特に提示する必要はない。", "D": "外注依頼書（正）はフロントにて管理する。"}, "explanation": "外注依頼書は必ず発行する。価格未定の場合は理由と確定予定日を明記し決定後即時に補充書面を発行する（B適切）。外注依頼書（正）は外注先に、（控）はフロントで管理する。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 5, "label": "問5", "points": 2, "answer": "B", "stem": "(5) 見積書に関する記述として、不適切なものはどれか。", "choices": {"A": "分解しないと追加作業が発生するかどうかがわからないものに関しては、見積りの段階で概算の金額であることを伝える。", "B": "見積り段階でお客様に納期を明示する場合、整備時間を正確に把握して作業完了時期と納期を同じタイミングになるよう明示する必要がある。", "C": "見積りを正確なものにするには、受け入れ時のチェックや問診が必要になる。", "D": "見積りとは、費用、修理内容、日数などをお客様に理解しやすいように提示するもので、出来る限り正確に見積りを提示し、お客様に納得していただくものである。"}, "explanation": "納期は整備時間（作業完了時期）と同じタイミングではなく、整備完了後に引き渡しや連絡等の時間を考慮した納期を別途設定して明示する必要がある。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 6, "label": "問6", "points": 2, "answer": "B", "stem": "(6) 見積書の記載内容に関する記述として、適切なものはどれか。", "choices": {"A": "主体作業とは、車両を構成する主要な部品およびそれに取り付けられている部品(付帯部品)の複合した作業で、作業時間の対価が工賃として計上できない作業内容。", "B": "関連作業とは、２つ以上の主要部品を取り替える場合、複合した主体作業の関連部位は、作業箇所が重複となり簡略されることにより、作業時間が縮小可能となる作業。", "C": "付帯作業とは、ある主体作業を行う場合、その主体作業とは別途な作業が必要な時のその作業。", "D": "付随作業とは、それ自体の作業時間が主体作業の範囲内に含まれて設定されており、特に作業項目は設定せず、工賃も単独では計上しないもの。"}, "explanation": "A：主体作業は工賃計上できる作業。C：付帯作業の説明はDの内容（付随作業の定義）。D：付随作業の説明はCの内容（付帯作業の定義）。B（関連作業）が適切。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 7, "label": "問7", "points": 2, "answer": "C", "stem": "(7) 事故を受け付ける際の対応に関する記述として、不適切なものはどれか。", "choices": {"A": "まずは顧客の安否を気遣って「おケガはありませんか」などの言葉が必要である。", "B": "お客様への同情心から、お客様の言い分を全面的に信用したりせずに、あくまでも聞き役になる。", "C": "人身が絡んだり、話し合いが難航する場合はフロントアドバイザーが事故処理を代行したほうが良いこともある。", "D": "事故処理は当事者間で行ってもらい、保険適用の場合はお客様に保険内容の適切な助言を行うにとどめる。"}, "explanation": "フロントアドバイザーが事故処理を代行することは不適切。事故処理は当事者間で行うものであり、販売会社は適切な助言にとどめる。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 8, "label": "問8", "points": 2, "answer": "B", "stem": "(8) 事故見積りに関する記述として、不適切なものはどれか。", "choices": {"A": "損傷には、他の物体と接触した直接的な損傷と、そこから衝撃が伝播して損傷した間接損傷がある。", "B": "車両の挙動を想像することにより、損傷の範囲と程度を把握し、見えない部分については構造を考えて勘によって判断する。", "C": "衝撃力がどのように伝播しているかを構造から考える場合は、部材や断面の変化部位と衝撃力の支点部位に着眼すると良い。", "D": "損傷を確認する技能を高めるには、事故状況から考えられる損傷範囲と構造による損傷の波及を考えた見方をする必要がある。"}, "explanation": "見えない部分を「勘によって判断」することは不適切。測定や構造的な確認を行い、根拠に基づいた判断をすることが必要。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 9, "label": "問9", "points": 2, "answer": "A", "stem": "(9) ＨＩ－ＰＲＥＭＡ、Ｈｉ－Ｌｉｎｋ、ＨＩＮＯ－ＣＹＣＬＥに関する記述として、不適切なものはどれか。", "choices": {"A": "HINO-CYCLEでHITOSSから車検予約する場合で、予約する車両が決まっていない場合は、通常の予約受付の必須項目に加え、車型・車番入力(ダミーの文字・数字を入力)にてHINO-CYCLEに反映される。", "B": "HITOSS見積作成時、Hi-Link操作にて「部品→作業取得」からHITOSS作業コード品番紐づけ明細する際、ご用命明細に作業が紐づかなかった、または紐づけなかったものは部品の上段に空欄行が挿入される。", "C": "HITOSS見積作成にて、HI-PREMA提案書を取り込む場合は必要項目を入力後、提案状況に「提案有」アラート表示を確認しても、Ｆ８「他画面」からの提案書検索は対応できない。", "D": "HITOSS見積作成にて、HI-PREMAから１つの提案書に対して、紐づけられる見積作成は５件までである。"}, "explanation": "HINO-CYCLEで予約する車両が決まっていない場合、「車型・車番」にダミーを入力するのは不正確な登録となるため不適切な操作。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 10, "label": "問10", "points": 2, "answer": "C", "stem": "(10) 受付対応や苦情対応に関する記述として、不適切なものはどれか。", "choices": {"A": "不満を持った顧客のうち、苦情を申し立て、その解決に満足した顧客の再購入決定率は、不満を持ちながら苦情を申し立てない顧客のそれに対して比較的高いと言われている。", "B": "口コミの波及効果は、好意的な内容よりも非好意的な内容の方が二倍も強く影響を与えると言われている。", "C": "事故などお客様にトラブルが発生した際には、まず事故原因など技術的な説明をしてからお客様の気持ちが落ち着くのを待つことが大切である。", "D": "商品やサービスに問題があっても全てが苦情になるわけではなく、信頼関係ができていれば大問題にならない場合もあるが、それに甘えず常に緊張感を持って対応することが必要である。"}, "explanation": "お客様にトラブルが発生した際は、まずお客様の気持ちに寄り添い誠意を示すことが先決。技術的な説明を最初に行うのは不適切。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 11, "label": "問11", "points": 2, "answer": "C", "stem": "(11) 苦情対応に関する記述として、不適切なものはどれか。", "choices": {"A": "お客様の話を親身になってよく聞き、その場で対応できることは迅速に実施する。", "B": "苦情受付後は、速やかに上司に報告する。", "C": "自分で対応できない時は上司へ相談するまでの間に、その場しのぎの回答を行う。", "D": "商品やサービスに対するお客様の期待と、実際に得た商品やサービスの結果にギャップがあると不満が発生する。"}, "explanation": "その場しのぎの回答は後にトラブルを拡大させるため不適切。対応できない場合は誠実に時間をもらい、上司に相談してから正確な回答を行う。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 12, "label": "問12", "points": 2, "answer": "C", "stem": "(12) 受付など接客対応に関する記述として、不適切なものはどれか。", "choices": {"A": "第一印象がそれ以降の対応に重大な影響を及ぼすので、態度、言葉づかい、身だしなみなどには充分注意を払い、お客様に良い印象を与えるように努める。", "B": "不具合を訴えているお客様には、いつから、どこが、どんな時に、どのように、など話をよく聞き真意を知ることで自身とお客様の感覚の違いをなくすようにする。", "C": "再修理作業について、技術的には同一箇所の再修理作業ではなく同類の故障だった場合、まずは充分に技術的な説明をして再修理ではないことを弁解する必要がある。", "D": "受付時に直ちに作業にとりかかれない場合は、上司などと相談しながら、いつ着工できるかを説明し、お客様に了解を得る必要がある。"}, "explanation": "再修理の際はまず謝罪し、お客様の気持ちに寄り添うことが先決。技術的な弁解を最初に行うのは不適切な対応。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 13, "label": "問13", "points": 2, "answer": "D", "stem": "(13) 受付やお客様対応に関する記述として、不適切なものはどれか。", "choices": {"A": "問診は、お客様が望んでいる整備や指摘している不具合を正確に聞き取るために必要であり、要望事項をよく聞き、お客様の言った言葉で記録する必要がある。", "B": "苦情に対しては、言い分を最後までよく聞き、最優先で処理をすることが重要であるが、法外な要求や言い分である場合は、応じられない理由を説明してお断りする必要がある。", "C": "追加整備作業が発生し、お客様と連絡がとれずに完成時間に追われて了承を得ないまま作業を進めると、トラブルに発展する。", "D": "車検の概算見積もりでは、整備料金、ご依頼事項料金、諸費用を区別して記載しておくほうが良く、これは諸費用を立替え依頼された場合に対応できるようにするためである。"}, "explanation": "車検の概算見積もりで諸費用を区別して記載しておくのは、諸費用の立替依頼への対応のためだけでなく、お客様が各費用を確認・理解できるようにするため。Dの説明は一面的で不完全（不適切）。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 14, "label": "問14", "points": 2, "answer": "A", "stem": "(14) 電話でのお客様対応に関する記述として、不適切なものはどれか。", "choices": {"A": "相手の話の途中で結論が判断できた場合は、相手の都合を考えて話を遮ってでも返答する必要がある。", "B": "電話では声の調子で印象が決まってしまうので、明るく歯切れの良い話し方をする必要がある。", "C": "電話は相手の都合を一方的に拘束することがあるので、相手のことをよく考える必要がある。", "D": "電話をする前には、関係書類や筆記用具を準備し、用件内容を整理してから電話する。"}, "explanation": "相手の話は最後まで聞くのが基本。話の途中で遮って返答することは失礼であり不適切。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 15, "label": "問15", "points": 2, "answer": "B", "stem": "(15) 受付時現車の確認を行う際の注意点に関する記述として、不適切なものはどれか。", "choices": {"A": "不正改造の有無を十分にチェックし、不正改造がある場合にはお客様に説明し、正規の状態で入庫いただくようにお願いする。", "B": "貴重品や高価なものが搭載されていたら、お客様に伝えフロントで大切に保管しておく。", "C": "車両の傷、汚れ、積荷、などの状態をお客様と一緒に確認し、納車後のトラブル防止を図る。", "D": "不具合の申し出の場合は、必ず問診を実施する。問診は専門用語を使わず、具体的な例を挙げ、お客様の答えやすい問い方にする。"}, "explanation": "貴重品はお客様自身が持ち帰るようお願いする。フロントで保管することは盗難・紛失等のリスクがあり不適切。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 16, "label": "問16", "points": 2, "answer": "B", "stem": "(16) 整備料金の説明と回収に関する記述として、不適切なものはどれか。", "choices": {"A": "点検・整備の価値をお客様に理解していただけるよう、必要性、効果などをわかりやすくお客様に説明することも、「機能的サービス」の一環である。", "B": "売掛金が回収予定日を過ぎても入金されない場合は、督促状を普通郵便や内容証明付郵便などで発送する手段を講じることも大切である。", "C": "無償、有償作業を同時に行う場合、受注の時点で「料金」とその有償、無償についてお客様に説明しておく。", "D": "サービス部門で販売する商品は、点検、整備という点検整備作業における「技術の提供」である。"}, "explanation": "売掛金の督促は、まず電話・訪問による直接交渉が優先。普通郵便の督促状は証拠能力が低く、回収業務の最初の手段として適切ではない。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 17, "label": "問17", "points": 2, "answer": "C", "stem": "(17) お客様への説明方法として、適切なものはどれか。", "choices": {"A": "完成時間や整備料金について見通しがつかない場合は、具体的な表現は避ける。", "B": "分解してみなければ正確なことが分からない場合は、誤解を与えないようにあいまいな説明をしておく。", "C": "お客様に技術説明をする場合は、現物や資料を示して説明をする。", "D": "会話の始めにお客様との距離を縮めるために話題が豊富な政治、宗教、思想に関する話をする。"}, "explanation": "技術説明には現物・資料を活用して具体的に説明する（C適切）。あいまいな説明や具体性のない回答は後のトラブルにつながる。政治・宗教・思想は避けるべき話題。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 18, "label": "問18", "points": 2, "answer": "A", "stem": "(18) 引渡し、納車時の対応に関する記述として、不適切なものはどれか。", "choices": {"A": "どの部品がどのように不具合があったかを、お客様に分かりやすく説明できるように、取り替えた部品の損傷状態を自分で確認してから廃却する必要がある。", "B": "作業指示書通りの作業が完了しているか、車両は清掃されているか、傷が付かなかったか、搭載物は受付時の通りかなど、お客様の車両を確認する必要がある。", "C": "納車時の説明は、お客様からの申し出内容に対する説明のみならず、使用上の注意、この先必要になる整備等のアドバイスをする必要がある。", "D": "納車時での説明では、作業中に気付いたことや車の使い方に対するアドバイスなどお客様一人一人に合わせた心づかいが必要である。"}, "explanation": "交換部品はお客様に現物を見せながら説明し、廃却するかどうかはお客様の意向を確認してから判断する。自分で確認してから廃却するのは不適切。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 19, "label": "問19", "points": 2, "answer": "A", "stem": "(19) 売上・回収に関する記述として、不適切なものはどれか。", "choices": {"A": "ＨＩＴＯＳＳII上のお客様ランクが「 ６，７ 」の場合、売上先確認。「 ８，９ 」の場合、売上不可が表示される。", "B": "小切手とは振出人の取引銀行に対して、受取人に一定額の金額を支払うように委託する有価証券のこと。", "C": "売掛金は利息が付かず、時効が５年である。", "D": "受取手形は６ヶ月以内に２回、銀行を支払い場所とする約束手形を不渡りにすると銀行取引停止処分を受ける。"}, "explanation": "HITOSSIIのお客様ランク区分は、「６，７」は売上先確認、「８」は売上不可が正しい。「８，９」の両方が売上不可という記述は不正確。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 20, "label": "問20", "points": 2, "answer": "B", "stem": "(20) 納品書に関する記述として、不適切なものはどれか。", "choices": {"A": "納品書とは、お客様へ渡す整備の明細以外に、販売会社サービス部の売上げチェック用の資料としての機能もある。", "B": "外注又は他販売会社入庫車両は、送付されてきた請求書をもとに仕入をする。", "C": "工賃マスタに無い項目は、工数または原価、売価をその都度決める。", "D": "納品書発行時は関連伝票を収集し、指示通りの作業が行われたか確認する。"}, "explanation": "外注や他販売会社入庫車両は、送付されてきた「納品書」をもとに仕入をする（請求書ではない）。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 21, "label": "問21", "points": 2, "answer": "A", "stem": "(21) 手形、小切手、領収書に関する記述として、不適切なものはどれか。", "choices": {"A": "手形・小切手を受け取った際の確認ポイントとして、受取人の名前、支払金額、支払日、振出日が記載されていても被裏書人欄が記載されていない場合は無効になる。", "B": "手形の記載金額が１０万円以上の場合、印紙税法により収入印紙を貼ることが定められており、貼り付けられた印紙に消印を押す理由として、一度使った収入印紙が再度使われることを防ぐためである。", "C": "領収書の保存、保管期間は請求書などと同様に帳簿類の記載事項の証拠書類となるため１０年分の保管が必要である。", "D": "手形の取立期間は記載された日から２日、当日を含めて３日間となり、この中に日曜・祭日があればこれを除いて実日数となる。"}, "explanation": "手形・小切手において被裏書人欄の記載がない場合も有効な場合がある。小切手は持参人払い形式が多く、被裏書人欄が必須ではない。Aの記述は不適切。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 22, "label": "問22", "points": 2, "answer": "B", "stem": "(22) 売掛金に関する記述として、不適切なものはどれか。", "choices": {"A": "取引先が倒産した場合、原則として回収は出来ない。", "B": "時効の成立を中断させるため、請求書を再度送付した。", "C": "支払いに懸念のあるお客様と、現金取引を行った。", "D": "民法上の短期消滅時効（２年間）は廃止された。"}, "explanation": "時効の中断（更新）には、裁判上の請求や支払督促など法的手続きが必要。単なる請求書の再送付は時効中断の効力を持たない（B不適切）。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 23, "label": "問23", "points": 2, "answer": "D", "stem": "(23) ＨＩＴＯＳＳIIの売上報告画面で、工賃割増の適用に関する記述として、適切なものはどれか。", "choices": {"A": "対象工賃の行にある出区分に「 １ 」を入力する。", "B": "対象工賃の行にある出区分に「 ２ 」を入力する。", "C": "対象工賃の行にある出区分に「 ８ 」を入力する。", "D": "対象工賃の行にある出区分に「 ９ 」を入力する。"}, "explanation": "HITOSSII売上報告画面での工賃割増（時間外・休日等）適用は、出区分に「９」を入力する。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 24, "label": "問24", "points": 2, "answer": "D", "stem": "(24) ＨＩＴＯＳＳIIで売上報告のご用命作業明細画面に関する記述として、不適切なものはどれか。", "choices": {"A": "位置区分に「８」を入力して納品書を印字すると、位置欄に「後」と印字される。", "B": "位置区分に「３」を入力して納品書を印字すると、位置欄に「上下」と印字される。", "C": "位置区分に「４」を入力して納品書を印字すると、位置欄に「右」と印字される。", "D": "位置区分に「６」を入力して納品書を印字すると、位置欄に「前」と印字される。"}, "explanation": "位置区分「６」は「後」に相当するなど、位置区分と位置欄の対応が異なる。Dの記述は不適切。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 25, "label": "問25", "points": 2, "answer": "C", "stem": "(25) ＳＯＳ緊急サービス運用マニュアルに照らし、中央コールセンターでの受付においてＨＩＴＯＳＳII対応区分とお客様ランクの関係性についての記述として、適切なものはどれか。", "choices": {"A": "お客様ランク「９」では、優良客（Ｓ）であってもお断りする。", "B": "お客様ランク「６～８」では、優良客（Ｓ）であっても元販社へ照会を行う。", "C": "不良客（Ｂ）は、お客様ランクに関係なく、お断りする。", "D": "登録なし（Ｎ）の場合、お客様ランクに関係なく、元販社へ照会を行う。"}, "explanation": "不良客（B）はお客様ランクに関係なくお断りする（C適切）。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 26, "label": "問26", "points": 2, "answer": "B", "stem": "(26) 収入印紙に関する記述として、適切なものはどれか。", "choices": {"A": "小切手に貼る収入印紙は、記載金額１０万円未満は非課税、１００万円以下は２００円の収入印紙が必要となる。", "B": "手形に貼る収入印紙は、記載金額１０万円未満は非課税、１００万円以下は２００円の収入印紙が必要となる。", "C": "小切手に貼る収入印紙は、記載金額５万円未満は非課税、１００万円以下は２００円の収入印紙が必要となる。", "D": "手形に貼る収入印紙は、記載金額１５万円未満は非課税、１００万円以下は２００円の収入印紙が必要となる。"}, "explanation": "手形（約束手形・為替手形）の収入印紙：記載金額10万円未満は非課税、100万円以下は200円（B適切）。小切手は一律200円（金額非課税）。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 27, "label": "問27", "points": 2, "answer": "A", "stem": "(27) 約束手形の時効に関する記述として、適切なものはどれか。", "choices": {"A": "振出人に対しては、３年で時効となる。", "B": "振出人に対しては、４年で時効となる。", "C": "裏書人に対しては、３年で時効となる。", "D": "裏書人に対しては、４年で時効となる。"}, "explanation": "約束手形の時効：振出人に対しては満期から3年、裏書人に対しては遡求権行使の日から1年（A適切）。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 28, "label": "問28", "points": 2, "answer": "B", "stem": "(28) 通過車両規定において保証修理に関する作業の処理方法について、不適切なものはどれか。", "choices": {"A": "現品の元販売会社への到着期限は、故障発生日より２０日以内とする。", "B": "現品および関係書類は即時発送する。なお現品およびその梱包には、「保証部品」と明記した荷札をつけ、送状と受領書を同封する。", "C": "再修理等、整備保証に関する事項が発生した場合は販売会社間相互で協議して、その都度解決する。", "D": "現品が元販売会社に到着しなかった場合の損害は、実施販売会社とする。"}, "explanation": "現品および関係書類を発送する際の荷札には「保証部品」と明記するが、「送状と受領書を同封」するという手続きが規定と異なる（または別途規定がある）。Bが不適切。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 29, "label": "問29", "points": 2, "answer": "D", "stem": "(29) 通過車両規定に照らし、保険による事故修理の売上方法に関する記述として、不適切なものはどれか。", "choices": {"A": "技術料・・・保険査定額の５％を控除", "B": "部品代・・・保険査定額の１０％を控除", "C": "外注作業技術料・・・保険査定額の５％を控除", "D": "外注作業部品代・・・保険査定額の１０％を控除"}, "explanation": "通過車両の保険事故修理では、外注作業部品代の控除率は通常の部品代とは異なる規定が設けられている。Dの記述（10%控除）は不適切。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 30, "label": "問30", "points": 2, "answer": "B", "stem": "(30) 通過車両規定に照らし、特別対応料と体制維持費に関する記述として、不適切なものはどれか。", "choices": {"A": "体制維持費は元販売会社の負担分であるため、お客様に請求してはならない。", "B": "登録前車両については体制維持費のみ、保証申請にてメーカーに請求できる。", "C": "特別対応料および体制維持費の振替割引はしない。", "D": "営業時間外に受付し、実際に作業をした場合、もしくは作業はしないが出動して故障診断等を行い、説明等の処置をとった場合は、特別対応料および体制維持費を請求することができる。"}, "explanation": "登録前車両については「特別対応料のみ」保証申請にてメーカーに請求できる。「体制維持費のみ」という記述は不適切。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 31, "label": "問31", "points": 2, "answer": "B", "stem": "(31) 通過車両規定に照らし、お客様リストに優良客として登録されているお客様（通過車両）より直接、レンジャーの右側ヘッドライトバルブ（ハロゲン）交換の依頼を受けた。この場合の応対として、適切なものはどれか。", "choices": {"A": "元販売会社と連絡がとれないので、現金払いでの修理をお客様にお願いした。", "B": "元販売会社に確認をとらずに、受付をして作業した。", "C": "元販売会社に連絡がとれないので、連絡がとれるまで作業を待ってもらった。", "D": "元販売会社の担当に連絡がとれないので、作業を断った。"}, "explanation": "優良客と登録されているお客様からの軽微な作業（ヘッドライトバルブ交換）については、元販売会社への確認なしに受付・作業することが適切（B適切）。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 32, "label": "問32", "points": 2, "answer": "B", "stem": "(32) 通過車両規定に照らし、事故修理の正式見積書を提出し修理を実施しないときに元販売会社に請求できる見積額として適切なものはどれか。", "choices": {"A": "見積額の１％", "B": "見積額の３％", "C": "見積額の５％", "D": "見積額の７％"}, "explanation": "通過車両規定において、正式見積書を提出し修理を実施しない場合は、元販売会社に見積額の3%を請求できる（B適切）。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 33, "label": "問33", "points": 2, "answer": "C", "stem": "(33) ２＊Ｇ付プロフィア（２０２３年モデル）に関する記述として、適切なものはどれか。", "choices": {"A": "ＥＤＳＳについて、車線逸脱警報をＯＦＦにしているとＥＤＳＳ作動時における車両逸脱判定は行わないため、減速および停止は機能するが、車線内維持は行わない。", "B": "ＳＡＭＳは、コーナーレーダーセンサーで進路上を交差する移動物を検知し、衝突の恐れがあれば自動でブレーキを作動させる。", "C": "レーンキーピングアシスト（ＬＫＡ）は、一定速度以上で走行中にシステムが車線逸脱を判断するとステアリングを制御し、車両を車線内に戻す支援や車線内に維持することを支援する。", "D": "ドライバーモニターIIは、ＰＣＳと連動して作動するものであるため、単独での運転者への警報機能は備えていない。"}, "explanation": "LKA（レーンキーピングアシスト）は一定速度以上でシステムが車線逸脱を判断するとステアリングを制御して車線内に戻す支援を行う（C適切）。ドライバーモニターIIは単独でも警報機能を持つ。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 34, "label": "問34", "points": 2, "answer": "A", "stem": "(34) ２＊Ｇ付プロフィア（２０２４年モデル）の安全装置に関する記述として、不適切なものはどれか。", "choices": {"A": "出会い頭警報（ＦＣＴＡ）は、交差する移動物を検知した場合、ドライバーへ警報を出し、さらに自車前面に衝突する危険性が高まると自動でブレーキを作動させる。", "B": "左折巻込み警報（ＢＳＩＳ）は、自車左側方の移動物を検知した場合や左折時に衝突の危険性がある場合にブザー音や表示灯でドライバーへ警報する。", "C": "車線変更警報（ＢＳＤ）は、自車左右側方の移動物を検知した場合や車線変更時に衝突の危険性がある場合にブザー音や表示灯でドライバーへ警報する。", "D": "ＦＣＴＡとＢＳＩＳとＢＳＤの３つは、ＳＡＭＳの機能として設定されており、ＳＡＭＳ表示灯はピラー部に新設された。"}, "explanation": "FCTA（出会い頭警報）は自車前面への衝突危険時に自動ブレーキを作動させるが、正確には出会い頭衝突の危険を警報するシステムであり、Aの説明内容が不適切。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 35, "label": "問35", "points": 2, "answer": "C", "stem": "(35) ２＊Ｇ付プロフィアのＶＳＣに関する記述として、不適切なものはどれか。", "choices": {"A": "車両制御ＥＣＵは、危険状態を感知すると、ＥＢＳ ＥＣＵからの信号を受信してエンジンＥＣＵに出力し、エンジンＥＣＵはこの信号をもとにエンジン出力を制御する。", "B": "ＶＳＣ ＥＣＵは、ヨーレートセンサーおよびＧセンサーを内蔵しており、ヨーレート、横Ｇを検出して、ＣＡＮ通信により、ＥＢＳ ＥＣＵに信号を送る。", "C": "横滑り軽減制御時は、旋回時に両輪をブレーキ制御して横滑りを抑制する。", "D": "ロール軽減制御時は、各輪のブレーキを制御し、安定的に車両を減速させ横Ｇを減少させる。"}, "explanation": "VSCの横滑り軽減制御時は、旋回内側の「片輪」をブレーキ制御して横滑りを抑制する。「両輪」のブレーキ制御という記述は不適切。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 36, "label": "問36", "points": 2, "answer": "A", "stem": "(36) ２＊Ｇ付プロフィア（２０２３年モデル）のプロシフト１２（M１１２）のオートシフトダウン機能に関する記述として、不適切なものはどれか。", "choices": {"A": "オートシフトダウン機能は１２速から９速までシフトダウンを行う。", "B": "オートシフトダウン機能とは、補助ブレーキのコントロールレバーをオートシフトダウン作動位置に操作した時に自動的にシフトダウンを行い、エンジンリターダー力を増幅する機能。", "C": "オートシフトダウンの作動条件はギア位置が９速以上で走行し、エンジン回転数がオートシフトダウンを実施できる状態にあり、かつ、アクセルをオフすると実施される。", "D": "オートシフトダウン機能はアクセルを踏む、もしくはクラッチを踏むことで解除される。"}, "explanation": "プロシフト12（M112）のオートシフトダウン機能は、12速から9速ではなく、正しいシフトダウン範囲が異なる。Aの記述は不適切。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 37, "label": "問37", "points": 2, "answer": "B", "stem": "(37) デュトロ ＺＥＶ（ＢＥＶ車）について、不適切なものはどれか。", "choices": {"A": "普通充電と急速充電の両方に対応している。", "B": "ｅＤＡＰは、アクセルペダル１つで加速から停止まで調整することが可能である。", "C": "誤発進抑制機能は、前進・後退ともに機能する。", "D": "モーター駆動で変速機がないため、走行がスムーズである。"}, "explanation": "eDAP（Electric Deceleration Assist Pedal）はアクセルペダルで減速・停止をコントロールするシステム。「加速から停止まで」の表現は不適切で、主に減速・停止制御のシステム。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 38, "label": "問38", "points": 2, "answer": "A", "stem": "(38) ハイブリッドモータに関する記述として、不適切なものはどれか。", "choices": {"A": "モータの回転速度は交流電源の電圧で制御する。", "B": "ハイブリッドモータは永久磁石を取り付けたロータを、三相交流を用いて回転させる交流同期電動機である。", "C": "モータの発生するトルクは、電流の大きさで制御している。", "D": "減速時は発電機としてエネルギーを回収する。"}, "explanation": "交流同期モータの回転速度は電圧ではなく「周波数（インバータによる周波数制御）」で制御する。電圧で制御するという記述が不適切。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 39, "label": "問39", "points": 2, "answer": "D", "stem": "(39) 尿素ＳＣＲ（排出ガス浄化装置）に関する記述として、適切なものはどれか。", "choices": {"A": "尿素水を排出ガスに噴射し、還元反応にてＰＭを低減するシステムである。", "B": "尿素水を酸化触媒に噴射し、酸化触媒と尿素を反応させることで排出ガス温度を上昇させ、還元を促すシステムである。", "C": "排ガス浄化の際に未使用アンモニアを取り除くためのアンモニアスリップ触媒があり、ＳＣＲ触媒の上流に配置されている。", "D": "アフターラン制御とは、エンジン停止後に装置内に充填されていた尿素水をタンクに戻す制御のことである。"}, "explanation": "アフターラン制御はエンジン停止後に尿素水噴射系内の尿素水を空にし、凍結・析出を防ぐためタンクに戻す制御（D適切）。SCRはNOxをアンモニアで還元する。アンモニアスリップ触媒はSCR触媒の下流に配置。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 40, "label": "問40", "points": 2, "answer": "B", "stem": "(40) ２＊Ｇ付車のＤＰＲ（排出ガス浄化装置）に関する記述として、不適切なものはどれか。", "choices": {"A": "ＤＰＲフィルター内に排出ガス中のＰＭを捕集し、フィルター内を高温にして燃焼処理を行う。", "B": "ＤＰＲのスス堆積量は、エンジン回転数と噴射量から算出されており、再生時にはフィルター温度が規定値に達するとススの燃焼量の計算を開始し、再生開始時点で算出した堆積量と燃焼量値が一致すると再生を終了する。", "C": "停車時の再生ではポスト噴射を行わないようになっているが、燃料添加弁に不具合があるとポスト噴射を実行することがある。", "D": "メーター内の堆積量表示の本数に関わらず、インジケータランプが点滅して再生を促すことがあるが、ＤＰＲ装置の故障ではない。"}, "explanation": "DPRの再生終了判定は、堆積量と燃焼量の一致ではなく、温度・時間など複数の条件で判定する。Bの再生終了条件の説明が不適切。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 41, "label": "問41", "points": 2, "answer": "C", "stem": "(41) 産業廃棄物に関する記述として、不適切なものはどれか。", "choices": {"A": "自動車リサイクル法の対象となる自動車には、ナンバープレートの付いていない構内車も含まれる。", "B": "架装物はリサイクル法の対象外になるものがあり、保冷貨物車の冷蔵装置や土砂などの運搬用荷台、ミキサのタンクは対象外となる。", "C": "廃冷却水は油水分離層にて対応できるが、分離層の浄化機能が十分でない場合は、別に保管する。", "D": "カーエアコン用フロンガスは回収機で回収し、適正な方法で処理する。なお、回収ボンベはフロンの種類ごとに分けて混入しないようにする。"}, "explanation": "廃冷却水は産業廃棄物（廃液）であり、油水分離槽では対応できない。適切な産業廃棄物処理業者に委託して処理する必要がある（C不適切）。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 42, "label": "問42", "points": 2, "answer": "D", "stem": "(42) 車検時のOBD検査に関する記述として、不適切なものはどれか。", "choices": {"A": "車載式故障診断装置を利用した自動車検査であり、特定DTCが発生している車両に関しては、保安基準不適合となる。", "B": "診断機接続可能な車両であっても年式などによってOBD検査対象と対象外に分かれる。", "C": "指定工場においてはOBD検査実施が義務となるが、認証工場での自工場内実施は義務ではない。", "D": "使用者自身にて車検を受ける場合は、整備工場などでOBD検査を実施したうえで運輸支局の検査場にて通常の検査を受ける必要がある。"}, "explanation": "使用者が自ら車検を受ける（ユーザー車検）場合、OBD検査は運輸支局の検査場で実施される。事前に整備工場で実施する義務はない（D不適切）。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 43, "label": "問43", "points": 2, "answer": "C", "stem": "(43) 自動車保険に関する記述として、不適切なものはどれか。", "choices": {"A": "事故などを保険で処理する際には顧客の言い分を全面的に信用したり、直接介入したりしないようにする必要がある。", "B": "顧客から事故の連絡があった際には「お怪我はありませんか」など、まずは安否を気遣うようにする。", "C": "保険処理での車両修理は、顧客の利便性を考え、少額であれば保険会社に通知のみで即修理着手する。", "D": "保険の処理は、お客様にとって車が使用できないことに加えて、精神的な苦痛があることを心に留めておくことが必要である。"}, "explanation": "保険処理での修理は金額にかかわらず、必ず保険会社の承認（査定）を受けてから着手する必要がある。「通知のみで即着手」は不適切。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 44, "label": "問44", "points": 2, "answer": "B", "stem": "(44) 自動車保険に関する記述として、不適切なものはどれか。", "choices": {"A": "分損とは、事故車が修理可能でしかも車両の修理費が、車の時価よりも低い場合の損害のことをいう。", "B": "保険金の限度は１事故ごとに取扱い、保険金が支払われると保険金額が減少する。", "C": "自動車保険では一定の枠を設けてそれ以下の損害は支払い対象としないことにしており、免責金額として契約している。", "D": "修理不能の場合や修理見積額が保険価額を超える場合は全損となる。"}, "explanation": "保険金の限度は1事故ごとに取り扱うが、保険金が支払われても保険金額は減少しない（不減額式）が一般的。B「保険金額が減少する」は不適切。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 45, "label": "問45", "points": 2, "answer": "D", "stem": "(45) 自賠責保険に関する記述として、不適切なものはどれか。", "choices": {"A": "政府は、自動車によって生命又は身体を害された者がある場合で、その車の保有者が明らかでないため被害者が損害賠償の請求をすることができないときは、被害者の請求により、政令で定める金額の限度において、その受けた損害をてん補する。", "B": "後遺障害第１級（常時介護を要する場合）の保険金の限度額は４，０００万円である。", "C": "指定整備事業者は、自賠責保険証の保険期間が、自動車検査証の有効期間が満了する日までの期間と全部が重複するものでないときは、保安基準適合証を交付してはならない。", "D": "死亡による保険金の限度額は２，５００万円である。"}, "explanation": "自賠責保険の死亡による保険金の限度額は3,000万円。「2,500万円」は不適切。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 46, "label": "問46", "points": 2, "answer": "B", "stem": "(46) 日野メンテナンスリースに関する記述として、不適切なものはどれか。", "choices": {"A": "メンテナンスリースとは、車両代・税金・保険等にメンテナンス費用を加えたリース契約のことである。", "B": "基本契約としては３種類のプラン設定があり、そのうちのＭプランはHINO CONNECTメンテナンスサポートのサービス対象となる。", "C": "基本契約のＳプランでは、定期点検・油脂類交換・ワイパーゴム交換が含まれる。", "D": "メンテナンス対象修理と対象外作業が一度に発生した場合、工事受付を別にして処理しなければならない。"}, "explanation": "HINO CONNECTメンテナンスサポートのサービス対象となるのはMプランではなく、別のプラン（Rプランまたは上位プラン）。Bの記述は不適切。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 47, "label": "問47", "points": 2, "answer": "B", "stem": "(47) 日野プレミアムサポートに関する記述として、不適切なものはどれか。", "choices": {"A": "保証書を紛失した場合でもサービスの利用は可能である。", "B": "路上で交換したタイヤの修理は対象外である。", "C": "事故後６０日以上経過してからの事故通知や修理入庫は対象外である。", "D": "修理費用差額補償サービスは、リース期間中１回のみ利用可能である。"}, "explanation": "日野プレミアムサポートでは路上でのタイヤ交換サポートも対象となる。「路上で交換したタイヤの修理は対象外」は不適切。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 48, "label": "問48", "points": 2, "answer": "C", "stem": "(48) 安全の心構えに関する記述として、不適切なものはどれか。", "choices": {"A": "自分自身が主体となり自ら考えなければならない。", "B": "作業の洗い出しと改善、異常処置時の安全のルール作りを行う。", "C": "作業能率を阻害する原因と事故や災害を起こす原因は関連性がない。", "D": "正しい作業であれば、作業効率の向上も期待できる。"}, "explanation": "作業能率を阻害する原因（手順の乱れ・環境の悪化など）と事故・災害を起こす原因は密接に関連している。「関連性がない」は不適切。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 49, "label": "問49", "points": 2, "answer": "D", "stem": "(49) 危険物に関する記述として、不適切なものはどれか。", "choices": {"A": "第一石油類とは、ガソリン・ブレーキクリーナーが該当する。", "B": "第三石油類とは、重油・ＡＴ油が該当する。", "C": "第四石油類とは、エンジンオイル・Ｔ／Ｍオイル・Ｄ／Ｆオイルが該当する。", "D": "第二石油類とは、ＰＳオイル・ブレーキフルードが該当する。"}, "explanation": "第二石油類とは灯油・軽油が該当する。PSオイル・ブレーキフルードは第四石油類に該当する。Dの記述は不適切。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 50, "label": "問50", "points": 2, "answer": "C", "stem": "(50) 安全衛生教育（法令）で定められた特別教育の種別について、不適切なものはどれか。", "choices": {"A": "研削と石の取り替えまたは試運転", "B": "最大荷重１．０トン未満のフォークリフトの運転", "C": "可燃性ガス、酸素を用いる金属の溶接、溶断", "D": "アーク溶接機を用いる金属の溶接、溶断"}, "explanation": "可燃性ガス・酸素を用いる金属の溶接・溶断は「技能講習（ガス溶接技能講習修了）」が必要であり、特別教育ではない（C不適切）。研削砥石・フォークリフト（1t未満）・アーク溶接は特別教育に該当。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 51, "label": "問51", "points": 5, "answer": "C", "stem": "(51) 車両移動時の安全に関する記述として、不適切なものはどれか。", "choices": {"A": "バック移動の際、運転手は誘導員の指示に従う。", "B": "工場内での車両移動はお客様や他業者ではなく自社従業員が実施する。", "C": "バック誘導の誘導員は、笛を使用していれば車両の真後ろに位置しても良い。", "D": "バック誘導の誘導員は運転者に聞こえるよう、笛または大きな声で誘導を行う。"}, "explanation": "誘導員は笛の使用有無にかかわらず、車両の真後ろに立ってはならない（危険）。誘導員は運転者の見える位置に立ち、誘導を行う（C不適切）。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 52, "label": "問52", "points": 5, "answer": "C", "stem": "(52) 安全マニュアルガイドラインに照らし、フロント受付に関する記述について、不適切なものはどれか。", "choices": {"A": "お客様車両入庫時には、積荷の安全確認を行う。", "B": "お客様車両入庫時には、フレーム腐食など作業の安全性に支障がないか確認する。", "C": "お客様に提示する用事があるなど、すぐに使用する部品はフロントのカウンター内に置くようにしてお待たせしないようにする。", "D": "フロント受付後、お客様による整備車両移動はご遠慮いただき、必ず自社従業員が移動させる。"}, "explanation": "フロントのカウンター内には部品などを置かない。部品はカウンターに置かず適切な場所で管理する（C不適切）。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 53, "label": "問53", "points": 5, "answer": "D", "stem": "(53) 道路運送車両法に照らし、自動車整備事業者の遵守事項として、不適切なものはどれか。", "choices": {"A": "作業に係る料金を事業場内の依頼者に見やすい場所に掲示すること。", "B": "作業の依頼者に対し、必要となる整備の内容及び整備の必要性について説明し、料金の概算見積りを記載した書面又は電磁記録を提供すること。", "C": "依頼者に対し、実施していない点検若しくは整備の料金を請求し、又は依頼されない点検若しくは整備を不当に行い、その料金を請求しないこと。", "D": "特定整備事業場においては、特定整備に関する整備主任者が必要であり、この特定整備の整備主任者は、他の事業場の整備主任者を兼務することができる。"}, "explanation": "特定整備事業場の整備主任者は、他の事業場の整備主任者を兼務することができない（D不適切）。道路運送車両法施行規則第62条の2の2による規定。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 54, "label": "問54", "points": 5, "answer": "B", "stem": "(54) 道路運送車両法及び自動車点検基準に照らし、自動車の区分（種別、用途等）と定期点検の時期の組合せとして、適切なものはどれか。", "choices": {"A": "乗車定員１１人以上の自家用バスは、６か月ごとに定期点検", "B": "車両総重量８トン未満の貨物運送用の自家用普通自動車は、６か月ごとに定期点検", "C": "車両総重量８トン以上の自家用自動車は、６か月ごとに定期点検", "D": "乗車定員１０人以下の乗用普通レンタカーは、１年ごとに定期点検"}, "explanation": "車両総重量8t未満の貨物運送用自家用普通自動車は6か月ごとの定期点検（B適切）。乗員11人以上バス・8t以上自家用は3か月ごと、レンタカー（10人以下）は6か月ごと。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 55, "label": "問55", "points": 5, "answer": "D", "stem": "(55) 道路運送車両法に照らし、自動車の整備事業に関する記述として、適切なものはどれか。", "choices": {"A": "整備主任者は同一事業者が経営する事業場であれば、他の事業場の整備主任者を兼務することができる。", "B": "普通自動車特定整備事業のみの認証を受けた事業場では、四輪の軽自動車の分解整備を行うことができる。", "C": "整備命令は、自動車整備事業者に対し、その実施した整備の状況が不良の場合に出される命令である。", "D": "自動車検査員は、他の事業場の検査員となることができない。ただし、同一事業者の他事業場で国交省が定める要件を満たしていれば兼務できる。"}, "explanation": "自動車検査員は原則他事業場の兼務不可だが、同一事業者の他事業場で国交省要件を満たせば兼務可能（D適切）。普通自動車特定整備事業は軽自動車の分解整備不可。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 56, "label": "問56", "points": 5, "answer": "D", "stem": "(56) 道路運送車両法に照らし、特定（分解）整備記録簿に関する記述として、不適切なものはどれか。", "choices": {"A": "整備をした場合は、使用者に記録簿の写しを交付しなければならない。", "B": "記録簿は、その記載の日から２年間保存しなければならない。", "C": "記録簿には、自動車登録番号または車台番号を記載しなければならない。", "D": "記録簿には、依頼者の氏名に加えて名称及び住所を記載しなければならない。"}, "explanation": "記録簿には「依頼者の氏名又は名称及び住所」を記載（氏名または名称のいずれか）。「氏名に加えて名称」と両方必須とする記述は不適切（D不適切）。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 57, "label": "問57", "points": 5, "answer": "B", "stem": "(57) 道路運送車両法に照らし、ナンバープレートの表示に係る新基準に関する記述として、不適切なものはどれか。", "choices": {"A": "ナンバープレートを被覆することになるカバーは、無色透明であっても装着禁止である。", "B": "ナンバープレートに取り付けるフレームは、幅が１０ｍｍ以下、かつ、厚さは１０ｍｍ以下でなければならない。", "C": "後面の上下角度は、ナンバープレート上端の地上高が１．２ｍ超の場合、上向き２５°～下向き１５°の範囲でなければならない。", "D": "前面の上下角度は、上下１０°の範囲でなければならない。"}, "explanation": "ナンバーフレームの基準はフレームの上部・左右・下部のそれぞれで幅と厚さが異なる。「全て幅10mm以下・厚さ10mm以下」という一律の記述は不適切（B不適切）。", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 58, "label": "問58", "points": 5, "answer": "B", "stem": "(58) ある販売会社の、一ヶ月の整備部門の業績があります。下記、数値から車検整備と一般整備の合計売上利益として、適切なものはどれか。\n\n・車検売上高：29,500千円\n・車検台数：190台\n・売上原価合計（車検＋一般整備）：25,800千円\n・一般整備売上原価：17,000千円\n・一般整備売上利益率：32％", "choices": {"A": "２９，９００千円", "B": "２８，７００千円", "C": "３０，２００千円", "D": "２５，９００千円"}, "explanation": "①一般整備売上高 = 17,000千 ÷ (1-0.32) = 25,000千円\n②車検売上原価 = 25,800千 - 17,000千 = 8,800千円\n③車検売上利益 = 29,500千 - 8,800千 = 20,700千円\n④一般整備売上利益 = 25,000千 - 17,000千 = 8,000千円\n合計利益 = 20,700千 + 8,000千 = 28,700千円 → B", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 59, "label": "問59", "points": 5, "answer": "D", "stem": "(59) 平日の定時間内にＡ販売会社からエンジン始動不良となった日野車のバッテリー交換（２個）の広域サービス対応依頼が入ったため、Ｂ販売会社のサービスエンジニアが１０ｋｍ先の故障車両までサービスカーで出動した。Ａ販売会社への請求金額を消費税１０％込みで計算した場合、適切なものはどれか。\n（注）答えは小数点以下第一位を四捨五入し、整数とする。\n\n・部品代（純正ＰＢバッテリー原価）：１６，５００円（１個）\n・標準作業時間（バッテリー交換）：０．５時間\n・Ａ販売会社の工賃レート：１０，０００円\n・Ｂ販売会社の工賃レート：１０，５００円", "choices": {"A": "４６，５３０円", "B": "５２，４７０円", "C": "５５，６５０円", "D": "６１，２１５円"}, "explanation": "広域サービス振替計算（B社がA社へ請求）：\n①技術料：B社レート×時間×1.25(出張)×0.8(振替控除)\n　= 10,500×0.5×1.25×0.8 = 5,250円\n②部品代：原価×個数×1.2(振替増し)\n　= 16,500×2×1.2 = 39,600円\n③サービスカー：(8,000+400×10)×0.9(振替控除)\n　= 12,000×0.9 = 10,800円\n小計 = 5,250+39,600+10,800 = 55,650円\n×1.1(消費税) = 61,215円 → D", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 60, "label": "問60", "points": 5, "answer": "D", "stem": "(60) 以下の条件で発生する自動車の駆動力として、適切なものはどれか。\nただし、計算結果の小数点以下は切り捨てるものとする。\n\n・エンジンのトルク：１２００N・ｍ\n・変速比：２．５\n・最終減速比：３．８\n・動力伝達効率：０．９\n・タイヤの半径：０．５ｍ", "choices": {"A": "５１３０Ｎ", "B": "６３３３Ｎ", "C": "１０２６０Ｎ", "D": "２０５２０Ｎ"}, "explanation": "駆動力 = エンジントルク × 変速比 × 最終減速比 × 動力伝達効率 ÷ タイヤ半径\n= 1200 × 2.5 × 3.8 × 0.9 ÷ 0.5\n= 1200 × 2.5 = 3000\n× 3.8 = 11,400\n× 0.9 = 10,260\n÷ 0.5 = 20,520N → D", "source": "2024年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 1, "label": "問1", "points": 2, "answer": "C", "stem": "保証書に関する記述として、不適切なものはどれか。", "choices": {"A": "保証による修理作業の実施は、弊社販売会社の整備工場および定期整備のしおりの巻末に掲げた弊社が認めた整備工場で行う。なおこの場合、取外した部品は当社の所有となる。", "B": "保証期間が残っている車両を購入した場合、「二次保証の条件」を満たせば二次保証を受けることができるが、その際の点検の結果で、修理が必要となる部分の費用は、保証対象範囲内であってもお客様に負担していただく。", "C": "保証書を破損又は紛失した場合で保証書の発行を受けたお客様から申し出がある場合に再発行する。再発行手続きは最寄の日野販売会社で行う。", "D": "保証の開始日は①登録No.が有る車両は初度登録日、②登録No.が無い登録前車両（納入前車両）は故障発生日、③登録No.が無い無登録車両（構内専用車、防衛省車両）はお客様への納車又は納入日である。"}, "explanation": "保証書の再発行手続きは、保証書の発行手続きを行った日野販売会社にて行う。最寄の販売会社ではない。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 2, "label": "問2", "points": 2, "answer": "A", "stem": "保証制度に関する記述として、不適切なものはどれか。", "choices": {"A": "日野自動車の保証制度は、販売会社・日野自動車がそれぞれの約束を結び、この約束によって成り立っている。", "B": "販売会社はお客様との売買契約で、保証書に記載されている期間と条件に従って保証修理することを約束している。", "C": "販売会社は日野販売会社基本契約書に基づき、日野自動車に代わって保証修理を実施することを約束している。", "D": "販売会社は、お客様より保証書に記載された期間と条件に適合する申し出を受けた場合は保証修理を断ることができない。"}, "explanation": "日野自動車の保証制度は、お客様・販売会社・日野自動車がそれぞれの約束を結び成り立っている。Aは「お客様」が抜けているため不適切。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 3, "label": "問3", "points": 2, "answer": "C", "stem": "保証申請期間に関する記述として、適切なものはどれか。", "choices": {"A": "一般保証修理（日野車）の保証申請期間は、故障発生日から30日以内である。", "B": "通過車両保証修理（日野車）の保証申請期間は、故障発生日から60日以内である。", "C": "納入前保証修理（日野車）の保証申請期間は、故障発生日から60日以内である。", "D": "保証申請（日野車）で一部又は全部が否決で、それに異議のある場合の再申請は、故障発生日から60日以内である。"}, "explanation": "一般保証：60日以内。通過車両保証：90日以内。納入前保証：60日以内（C適切）。否決異議再申請：90日以内。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 4, "label": "問4", "points": 2, "answer": "D", "stem": "下請法について、親事業者の4つの義務について不適切なものはどれか。", "choices": {"A": "「発注書面の交付義務」：発注に際して、「11の法定事項」を満たした書面を直ちに下請業者に発行しなければならない。", "B": "「支払期日を定める義務」：納入品受領（納入）日または役務の提供をした日から60日以内のできるだけ短い期間内に定めなければならない。", "C": "「遅延利息を支払う義務」：納入物受領後60日を経過した日から実際に支払をする日までの期間について、年率14.6%の遅延利息を支払わなくてはならない。", "D": "「書類作成・保存義務」：下請業者との取引に関する記録を書類として作成し、1年間保存しなければならない。"}, "explanation": "書類作成・保存義務の保存期間は2年間（1年間は不適切）。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 5, "label": "問5", "points": 2, "answer": "C", "stem": "下請法に関する取引上の注意事項として、不適切なものはどれか。", "choices": {"A": "「60日以内の支払」の起算日とは、下請事業者から給付を受けた日であり、検収日でも請求書受付日でもなく「納入日」のことである。", "B": "「1ヶ月締切制度」とは、1ヶ月毎に納品の締切日を定め、締切日1ヶ月後までに支払日を定めて支払う制度であり、1ヶ月締切制度を採用している場合、支払日は「締切後30日以内」ではなく、あくまでも締切後1ヶ月となる。", "C": "金融機関を利用した支払（振込）で支払日が金融機関休業日にあたる場合、仕入先とあらかじめ、翌営業日への支払いの順延を「合意、書面化」していれば、3日以内の範囲で順延が可能である。", "D": "金融機関の振込手数料（実費）の仕入先負担について、仕入先との間で書面での合意をしている場合、実費の範囲内で有効である。"}, "explanation": "金融機関休業日に当たる場合の順延は、2日以内の範囲で可能である（3日以内は不適切）。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 6, "label": "問6", "points": 2, "answer": "B", "stem": "外注依頼書の発行に関する記述として、適切なものはどれか。", "choices": {"A": "作業指示書発行後、外注作業が発生した場合は、作業指示書のコピーで対応できる。", "B": "価格が決定しない場合、理由と確定予定日を明記し、決定後即時に補充書面を発行する。", "C": "納期は変わることがあるので、発注時は特に提示する必要はない。", "D": "外注依頼書（正）はフロントにて管理する。"}, "explanation": "外注依頼書は必ず発行する。価格が決定しない場合は理由と確定予定日を明記し、決定後即時に補充書面を発行する（B適切）。外注依頼書（正）は外注先に、（控）はフロントで管理する。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 7, "label": "問7", "points": 2, "answer": "C", "stem": "整備作業の外注について、不適切なものはどれか。", "choices": {"A": "車検整備および完成検査一式を依頼。", "B": "取り外したエアドライヤのオーバーホールを依頼。", "C": "構内でリーフスプリングの交換を依頼。", "D": "タイヤ交換を依頼。"}, "explanation": "リーフスプリング交換は分解整備に該当する。指定整備事業者が外注できる分解整備作業の条件に「構内での外注」は含まれない。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 8, "label": "問8", "points": 2, "answer": "B", "stem": "見積書の記載内容に関する記述として、適切なものはどれか。", "choices": {"A": "主体作業とは、車両を構成する主要な部品およびそれに取り付けられている部品（付帯部品）の複合した作業で、作業時間の対価が工賃として計上できない作業内容。", "B": "関連作業とは、２つ以上の主要部品を取り替える場合、複合した主体作業の関連部位は、作業箇所が重複となり簡略されることにより、作業時間が縮小可能となる作業。", "C": "付帯作業とは、ある主体作業を行う場合、その主体作業とは別途な作業が必要なときのその作業。", "D": "付随作業とは、それ自体の作業時間が主体作業の範囲内に含まれて設定されており、特に作業項目は設定せず、工賃も単独では計上しないもの。"}, "explanation": "A：主体作業は工賃計上できる作業。C：付帯作業の説明はDの内容。D：付随作業の説明はCの内容。B（関連作業）が適切。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 9, "label": "問9", "points": 2, "answer": "B", "stem": "事故車の見積方法として、適切なものはどれか。", "choices": {"A": "見積段階での写真撮影は、損傷部位とナンバープレートの写っている全体写真を１枚撮ればよい。", "B": "損傷状態の確認や判定をする場合、歪みや電装品の損傷など目ではっきりとわからない箇所は、勘に頼らず、測定によって確認する。", "C": "作業内容の分類には主体作業・付随作業・関連作業などがあるが、交換や修理しない部品の脱着は見積書に記載しない。", "D": "分解しないとわからない箇所もあり、請求金額が変更となり高くなればお客様の信頼を失うことになるので、見積書は高めに作成しておく。"}, "explanation": "A：写真は正面・斜め・左右より損傷部位を含め撮影。C：部品の脱着だけでも作業項目を記載する。D：分解してわからない箇所は「別途お見積り」と明記。B（測定による確認）が適切。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 10, "label": "問10", "points": 2, "answer": "C", "stem": "事故修理見積書に記載されている用語に関する記述として、適切なものはどれか。", "choices": {"A": "「Ｖ」とは、板金修理の事である。", "B": "「Ｄ」とは、脱着の事である。", "C": "「Ｗ」とは、分解修理の事である。", "D": "「Ｔ」とは、塗装の事である。"}, "explanation": "W=分解修理（Washer）、V=塗装前処理（Vinyl)、D=脱着、T=取付（Toritsuke）など。W=分解修理（C適切）。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 11, "label": "問11", "points": 2, "answer": "C", "stem": "正しい電話対応として、不適切なものはどれか。", "choices": {"A": "相手の話は途中で口をはさまず最後まで聞き、先入観をもったり、話の途中で早とちりを起こしたりせずに最後まで聞き取ることが大事。", "B": "暗い、陰気な調子で対応されると自信が感じられず、信用を失いますので、明るい声でハキハキと歯切れのいい話し方を心がける。", "C": "電話対応中、お客様が急いでいる様子が感じ取られたら、手短に切り上げる、または電話をかけ直す。電話をかけ直す場合は食事どきがもっとも最適である。", "D": "電話を受け取るとき、ベルが鳴ったらすぐ出て名のる。ベルは2度まで、3度以上鳴ったら「お待たせしました」と答える。"}, "explanation": "食事どきへのかけ直しは迷惑になるため不適切。電話のかけ直しは相手の状況を考慮した時間帯を選ぶ。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 12, "label": "問12", "points": 2, "answer": "B", "stem": "受付時現車の確認を行う際の注意点に関する記述として、不適切なものはどれか。", "choices": {"A": "不正改造の有無を十分にチェックし、不正改造がある場合にはお客様に説明し、正規の状態で入庫いただくようにお願いする。", "B": "貴重品や高価なものが搭載されていたら、お客様に伝えフロントで大切に保管しておく。", "C": "車両の傷、汚れ、積荷などの状態をお客様と一緒に確認し、納車後のトラブル防止を図る。", "D": "不具合の申し出の場合は、必ず問診を実施する。問診は専門用語を使わず、具体的な例を挙げ、お客様の答えやすい問い方にする。"}, "explanation": "貴重品はお客様自身に確認して頂き、お客様自身が持ち帰るようにお願いする。フロントで保管は不適切。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 13, "label": "問13", "points": 2, "answer": "C", "stem": "お客様への説明方法として、適切なものはどれか。", "choices": {"A": "完成時間や整備料金について見通しがつかない場合は、具体的な表現は避ける。", "B": "分解してみなければ正確なことが分からない場合は、誤解を与えないようにあいまいな説明をしておく。", "C": "お客様に技術説明をする場合は、現物や資料を示して説明をする。", "D": "会話の始めにお客様との距離を縮めるために話題が豊富な政治、宗教、思想に関する話をする。"}, "explanation": "あいまいな表現は避け、具体的に現物や資料を見せて説明する（C適切）。政治・宗教・思想などは避けるべき話題。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 14, "label": "問14", "points": 2, "answer": "C", "stem": "事故を受け付ける際の対応に関する記述として、不適切なものはどれか。", "choices": {"A": "まずは顧客の安否を気遣って「おケガはありませんか」などの言葉が必要である。", "B": "お客様への同情心から、お客様の言い分を全面的に信用したりせずに、あくまでも聞き役になる。", "C": "人身が絡んだり、話し合いが難航する場合はフロントアドバイザーが事故処理を代行したほうが良いこともある。", "D": "事故処理は当事者間で行ってもらい、保険適用の場合はお客様に保険内容の適切な助言を行うにとどめる。"}, "explanation": "フロントアドバイザーが事故処理を代行することは不適切。事故処理は当事者間で行うものであり、販売会社は適切な助言にとどめる。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 15, "label": "問15", "points": 2, "answer": "A", "stem": "HI-PREMAはお客様車両情報や故障コードの確認ができるほか、整備提案書、対象車両リスト作成など（　）にも活用することができるツールである。（　）内に入るものとして、適切なものはどれか。", "choices": {"A": "車検勧誘", "B": "見積作成", "C": "事前提案", "D": "利益率向上"}, "explanation": "HI-PREMAは車両情報・故障コード確認のほか、整備提案書・対象車両リスト作成など「車検勧誘」にも活用できるツールである。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 16, "label": "問16", "points": 2, "answer": "A", "stem": "HI-PREMA、Hi-Link、HINO-CYCLEに関する記述として、不適切なものはどれか。", "choices": {"A": "HINO-CYCLEでHITOSSから車検予約する場合で、予約する車両が決まっていない場合は、通常の予約受付の必須項目に加え、車型・車番入力(ダミーの文字・数字を入力)にてHINO-CYCLEに反映される。", "B": "HITOSS見積作成時、Hi-Link操作にて「部品→作業取得」からHITOSS作業コード品番紐づけ明細する際、ご用命明細に作業が紐づかなかった、または紐づけなかったものは部品の上段に空欄行が挿入される。", "C": "HITOSS見積作成にて、HI-PREMA提案書を取り込む場合は必要項目を入力後、提案状況に「提案有」アラート表示を確認しても、Ｆ８「他画面」からの提案書検索は対応できない。", "D": "HITOSS見積作成にて、HI-PREMAから１つの提案書に対して、紐づけられる見積作成は５件までである。"}, "explanation": "HINO-CYCLEで予約する車両が決まっていない場合は、必須項目の「車型・車番」欄にダミーを入力するのは不適切な操作である。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 17, "label": "問17", "points": 2, "answer": "C", "stem": "HITOSSのお客様照会画面、保有車両一覧画面の車両層別に対する記述において、不適切なものはどれか。", "choices": {"A": "a：継続取引車両（3年連続入庫）", "B": "b：見込み車両（昨年入庫）", "C": "c*：疎遠車両（2年以上連続未入庫）", "D": "b*：見込み車両（2年連続入庫）"}, "explanation": "c*は「疎遠車両」を表すが、正しくは「3年以上連続未入庫」の車両。2年以上連続未入庫は不適切。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 18, "label": "問18", "points": 2, "answer": "B", "stem": "納品書に関する記述として、不適切なものはどれか。", "choices": {"A": "納品書とは、お客様へ渡す整備の明細である。", "B": "外注又は他販売会社入庫車両は、送付されてきた請求書をもとに仕入をする。", "C": "納品書は納車または引き渡しの際、お客様へ手渡しするのが原則である。", "D": "納品書発行時は関連伝票を収集し、指示通りの作業が行われたか確認する。"}, "explanation": "外注や他販売会社入庫車両は、送付されてきた「納品書」をもとに仕入をする（請求書ではない）。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 19, "label": "問19", "points": 2, "answer": "A", "stem": "売上・回収に関する記述として、不適切なものはどれか。", "choices": {"A": "HITOSSII上のお客様ランクが「6、7」の場合、売上先確認。「8、9」の場合、売上不可が表示される。", "B": "小切手とは振出人の取引銀行に対して、受取人に一定額の金額を支払うように委託する有価証券のこと。", "C": "売掛金は利息が付かず、時効が5年である。", "D": "受取手形は6ヶ月以内に2回、銀行を支払い場所とする約束手形を不渡りにすると銀行取引停止処分を受ける。"}, "explanation": "HITOSSIIのお客様ランク「6、7」は売上要確認、「8」は売上不可。「9」は別の区分。Aの記述は不正確。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 20, "label": "問20", "points": 2, "answer": "A", "stem": "即伝に関する記述として、不適切なものはどれか。", "choices": {"A": "お客様に修理車両引き渡し後、すぐに伝票を起こすことによる、伝票売り上げ処理をするシステムを指す。", "B": "事務処理業務の平準化により残業が減る。", "C": "回収時のトラブルが減り、回収業務が円滑になる。", "D": "お客様が当月の支払い予測（計画）を立てやすくなる。"}, "explanation": "即伝は「引き渡し時点（引渡しと同時）」に伝票を起こす仕組み。「引き渡し後」ではなく「引き渡し時」に行う。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 21, "label": "問21", "points": 2, "answer": "D", "stem": "整備料金の説明と回収に関する記述として、不適切なものはどれか。", "choices": {"A": "サービス部門で販売する商品は、点検、整備という点検整備作業における「技術の提供」である。", "B": "点検・整備の価値をお客様に理解していただけるよう、必要性、効果などをわかりやすくお客様に説明することも、「機能的サービス」の一環である。", "C": "無償、有償作業を同時に行う場合、受注の時点で「料金」とその有償、無償についてお客様に説明しておく。", "D": "売掛金が回収予定日を過ぎても入金されない場合は、督促状を普通郵便や内容証明付郵便などの手段を講じることも大切である。"}, "explanation": "売掛金の督促は、まず電話・訪問による直接交渉が優先。普通郵便での督促は証拠能力が低く不適切。内容証明は有効だが、普通郵便との組み合わせ表記に問題あり。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 22, "label": "問22", "points": 2, "answer": "B", "stem": "MOBILOTSメンテナンスリースの記載について、適切なものはどれか。", "choices": {"A": "以下の2種類のプランがある。Rプラン：車検や法定点検、オイル類・エレメント類の交換等に限定したプラン、Sプラン：車検や法定点検、一般整備、故障修理に加えて条件を満たす車両はHINO CONNECT-Maintenance Supportを含むプラン。", "B": "Rプランの契約期間は新車時からの契約に限り、初度登録から通算10年まで（再契約含む）となる。", "C": "Sプランでは尿素水フィルタ交換やトランスミッションオイルフィルタ交換もプランに含まれる。", "D": "Rプランでは尿素水溶液（AdBlue®）の補充もプランに含まれる。"}, "explanation": "A：Rプランには納引手数料は含まれない。Rプランの契約期間は初度登録から通算10年まで（B適切）。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 23, "label": "問23", "points": 2, "answer": "C", "stem": "デュトロ Z EVについて、不適切なものはどれか。", "choices": {"A": "大容量バッテリーの搭載により、一充電当たり航続距離は150km。", "B": "床面地上高は、空車時450mm、定積時で400mmと超低床設計。ワンステップで荷室への乗降が可能なため、荷物を持ったままでの乗り降りなども余裕を持って行える。", "C": "デュトロ Z EVに搭載された安全装置は、前方の車両や歩行者（昼夜）、自転車運転者（昼夜）をミリ波レーダーと画像センサー検出。警報ブザーとディスプレイ表示で衝突の可能性を知らせ、ブレーキを踏めなかった場合はブレーキを作動させる。", "D": "4ナンバーサイズに収まるコンパクトな全長、全幅ながら、約8㎥の荷室容積、最大積載量1.0トンを確保。普通免許をお持ちの方なら運転できるよう、車両総重量を3.5トン未満に設定。"}, "explanation": "デュトロZEVの衝突被害軽減ブレーキは、自転車運転者（昼）の検出には対応しているが、一部条件（夜間・特定状況）では検出できない場合がある。センサーの仕様説明が不適切。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 24, "label": "問24", "points": 2, "answer": "C", "stem": "ジーゼルノックを防ぐ方法の記述として、不適切なものはどれか。", "choices": {"A": "セタン価向上剤などを使い、燃料着火性をよくする。", "B": "シリンダー内の圧縮圧力を高くする。", "C": "燃料噴射始めの噴射量を多くする。", "D": "冷間時の自己着火を容易にするために、吸入空気温度を上げる。"}, "explanation": "ジーゼルノック防止のためには、燃料噴射始めの噴射量を「少なく」する（パイロット噴射等）。多くすると着火遅れが大きくなりノックが悪化する。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 25, "label": "問25", "points": 2, "answer": "B", "stem": "デュトロ Z EVについて、不適切なものはどれか。", "choices": {"A": "普通充電と急速充電の両方に対応している。", "B": "ｅDAPは、アクセルペダル１つで加速から停止まで調整することが可能である。", "C": "誤発進抑制機能は、前進・後退ともに機能する。", "D": "モーター駆動で変速機がないため、走行がスムーズである。"}, "explanation": "eDAP（Electric Deceleration Assist Pedal）はアクセルペダルで減速・停止を調整するシステムで、主に減速・停止のコントロール。「加速から停止まで」の表現が不適切。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 26, "label": "問26", "points": 2, "answer": "C", "stem": "自賠責保険に関する記述として、不適切なものはどれか。", "choices": {"A": "後遺障害第１級（常時介護を要する場合）の保険金の限度額は4,000万円である。", "B": "政府は、自動車によって生命又は身体を害された者がある場合で、その車の保有者が明らかでないため被害者が損害賠償の請求をすることができないときは、被害者の請求により政令で定める金額の限度においてその受けた損害をてん補する。", "C": "死亡による保険金の限度額は2,500万円である。", "D": "指定整備事業者は、自賠責保険証の保険期間が、自動車検査証の有効期間が満了する日までの期間と全部が重複するものでないときは、保安基準適合証を交付してはならない。"}, "explanation": "死亡による保険金の限度額は3,000万円（2,500万円は不適切）。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 27, "label": "問27", "points": 2, "answer": "A", "stem": "自家用自動車保険（通称P・A・P）の基本契約に含まれていないものはどれか。", "choices": {"A": "車両保険", "B": "自損事故保険", "C": "無保険車傷害保険", "D": "搭乗者傷害保険"}, "explanation": "PAPの基本契約には、自損事故保険、無保険車傷害保険、搭乗者傷害保険が含まれる。車両保険は特約（別途）契約が必要であり、基本契約には含まれない。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 28, "label": "問28", "points": 2, "answer": "B", "stem": "自動車保険の保険金請求書類に関する記述として、不適切なものはどれか。", "choices": {"A": "対人賠償の適用時には、交通事故証明書が必要になる。", "B": "自損事故の適用時には、交通事故証明書が不要になる。", "C": "無保険車傷害の適用時には、交通事故証明書が必要になる。", "D": "搭乗者傷害の適用時には、交通事故証明書が必要になる。"}, "explanation": "自損事故の場合も交通事故証明書（自損事故証明書）が必要。B「不要」は不適切。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 29, "label": "問29", "points": 2, "answer": "D", "stem": "インボイス関連の記載について、不適切なものはどれか。", "choices": {"A": "インボイスは、売手が買手に対して、正確な適用税率や消費税額等を伝えるもので、請求書に限らず、所定の事項が記載された書類であれば、領収書や納品書など書類の名称を問わず、インボイスとなります。", "B": "書類がインボイスとなるためには、①交付先の氏名または名称、②売手の氏名又は名称及び登録番号、③取引年月日、④取引内容（軽減税率の対象品目である旨）、⑤10%・8%それぞれの対価の総額及び適用税率、⑥10%・8%それぞれの消費税額等の記載が必要である。", "C": "事業者の方が納付する税額は、「売上げ時に受け取った消費税額」から「仕入れ等の際に支払った消費税額」を差し引いて計算します。この差し引く計算を「仕入税額控除」という。", "D": "売手側はインボイスを交付するには事前にインボイス発行事業者の登録を受ける必要があります。また、交付したインボイスの写しは、保存義務はありません。"}, "explanation": "交付したインボイスの写しは保存義務がある（7年間の保存が必要）。「保存義務はありません」は不適切。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 30, "label": "問30", "points": 2, "answer": "C", "stem": "小切手の必須記載事項として、不適切なものはどれか。", "choices": {"A": "振出人", "B": "金額", "C": "受取人", "D": "振出日"}, "explanation": "小切手は持参人払い（bearer cheque）形式が多く、「受取人」の記載は必須ではない。振出人・金額・振出日は必須記載事項。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 31, "label": "問31", "points": 2, "answer": "A", "stem": "領収書に関する記述として、適切なものはどれか。", "choices": {"A": "領収書には有効期限はない。", "B": "領収書には保管期間はない。", "C": "領収書の有効期限は1年間。", "D": "領収書の保管期間は5年間。"}, "explanation": "領収書そのものには有効期限はない（A適切）。ただし保管期間は法令で定められている（商法：7年間など）。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 32, "label": "問32", "points": 2, "answer": "A", "stem": "令和２年４月１日改正民法施行後の売掛金に関する記述として、不適切なものはどれか。", "choices": {"A": "時効の成立を停止させるため、請求書を再度送付した。", "B": "取引先が倒産してしまったので、回収は出来ない。", "C": "支払いに懸念のあるお客様と、現金取引を行った。", "D": "1年間、時効の完成を猶予をするために、書面での合意をした。"}, "explanation": "改正民法では時効停止（猶予）には催告（内容証明郵便等）が必要。単なる請求書の再送付は催告とはみなされず時効停止の効果がない（A不適切）。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 33, "label": "問33", "points": 2, "answer": "B", "stem": "通過車両規定に照らし、特別対応料と体制維持費に関する記述として、不適切なものはどれか。", "choices": {"A": "体制維持費は元販売会社の負担分であるため、お客様に請求してはならない。", "B": "登録前車両については体制維持費のみ、保証申請にてメーカーに請求できる。", "C": "特別対応料および体制維持費の振替割引はしない。", "D": "営業時間外に受付し、実際に作業をした場合、もしくは作業はしないが出動して故障診断等を行い、説明等の処置をとった場合は、特別対応料および体制維持費を請求することができる。"}, "explanation": "登録前車両については「特別対応料のみ」保証申請にてメーカーに請求できる。「体制維持費のみ」は不適切。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 34, "label": "問34", "points": 2, "answer": "C", "stem": "通過車両規定において、元販売会社から実施販売会社への支払い方法として、適切なものはどれか。", "choices": {"A": "元販売会社は、締切日の翌月末を支払日とする。", "B": "支払金額は、原則として15万円以下は現金支払いとする。", "C": "実施販売会社からの請求書は、毎月月末をもって締め切る。", "D": "支払金額が5万円を超える場合は、支払日起算支払月から3ヶ月目の15日を期限とする自社手形払いとする。"}, "explanation": "実施販売会社からの請求書は毎月月末締め（C適切）。元販売会社の支払日は締切の翌月15日。現金支払いは10万円以下。手形払いは10万円超の場合。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 35, "label": "問35", "points": 2, "answer": "B", "stem": "「通過車両規定」事故修理の見積料金について、保険による場合、保険外の場合を問わず、正式見積書を提出し修理を実施しないときには、原則として元販売会社に対し請求できる額として、適切なものはどれか。", "choices": {"A": "見積額の8%", "B": "見積額の3%", "C": "見積額の5%", "D": "見積額の10%"}, "explanation": "通過車両規定において、見積書を提出し修理を実施しない場合は、元販売会社に対し見積額の3%を請求できる（B適切）。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 36, "label": "問36", "points": 2, "answer": "C", "stem": "「道路運送車両の保安基準」に照らし、イモビライザの構造、施錠性能等に関する記述として、不適切なものはどれか。", "choices": {"A": "その作動により、制動装置の解除を妨げるものでないこと。ただし、空気解除式スプリングブレーキの解除を防止する形式のイモビライザにあっては、この限りでない。", "B": "走行中の振動、衝撃等により作動するおそれがないものであること。", "C": "イモビライザの作動または解除の操作を表示する灯火は、方向指示器または車幅灯と兼用のものであって、その点灯または点滅が５秒を超えないものとする。", "D": "その作動により、原動機その他運行に必要な装置の機能を確実に停止させることができる構造であること。"}, "explanation": "イモビライザの作動/解除を方向指示器または車幅灯で表示する場合、点灯または点滅が「3秒を超えないもの」であること（5秒は不適切）。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 37, "label": "問37", "points": 2, "answer": "B", "stem": "車両移動・駐・停車時の安全に関する記述として、不適切なものはどれか。", "choices": {"A": "工場内での車両移動はお客様や他業者ではなく自社従業員が実施する。", "B": "作業中の場合、駐車ブレーキが正常に作動してかつ平坦な場所であれば必ずしも輪止をする必要はない。", "C": "バック誘導の誘導員は、笛を使用していても車両の真後ろに立ってはならない。", "D": "バック誘導の誘導員は運転者に聞こえるよう、笛または大きな声で誘導を行う。"}, "explanation": "作業中や点検時は必ず輪止めをする。駐車ブレーキが正常でも輪止めは省略できない（B不適切）。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 38, "label": "問38", "points": 2, "answer": "D", "stem": "次の作業をする場合に必要な安全保護具の組み合わせとして、不適切なものはどれか。", "choices": {"A": "高所作業は「ヘルメット」「墜落制止用器具(安全帯)」。", "B": "大型トラック荷台での積み下ろし作業は「ヘルメット」。", "C": "ボール盤作業は「保護メガネ」。", "D": "グラインダー作業は「保護メガネ」「防塵マスク」「軍手」。"}, "explanation": "グラインダー作業では手が巻き込まれる危険があるため、軍手の使用は禁止されている。保護メガネ・防塵マスクは必要だが軍手は不可（D不適切）。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 39, "label": "問39", "points": 2, "answer": "C", "stem": "資格(免許、技能講習、特別教育)が必要ない作業として、適切なものはどれか。", "choices": {"A": "タイヤ組立て時の空気充填。", "B": "クレーンを用いてのエンジンの吊上げ作業。", "C": "トルクセッターを用いたホイールナットの締付けトルク管理作業。", "D": "ハイブリッド車のバッテリーサービスプラグの取り外し作業。"}, "explanation": "タイヤ充填は特別教育が必要。クレーン吊上げは玉掛け技能講習等が必要。HVバッテリーは特別教育が必要。トルクセッターによるホイールナット締付けトルク管理は特別な資格不要（C適切）。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 40, "label": "問40", "points": 2, "answer": "C", "stem": "安全衛生教育（法令）で定められた特別教育の種別について、不適切なものはどれか。", "choices": {"A": "研削と石の取り替えまたは試運転。", "B": "最大荷重1.0トン未満のフォークリフトの運転。", "C": "可燃性ガス、酸素を用いる金属の溶接、溶断。", "D": "アーク溶接機を用いる金属の溶接、溶断。"}, "explanation": "可燃性ガス・酸素を用いる溶接・溶断は「技能講習」であり、特別教育ではない（C不適切）。A・B・Dは特別教育に該当する。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 43, "label": "問43", "points": 2, "answer": "B", "stem": "次の文章の［　］にあてはまる組み合わせとして、適切なものはどれか。\n道路運送車両法に照らし、自動車の[①]に変更があった場合その事由があった日から[②]以内に自動車検査証の記入を受けなければならない。", "choices": {"A": "①使用者　②15日", "B": "①所有者　②14日", "C": "①使用者　②30日", "D": "①所有者　②30日"}, "explanation": "道路運送車両法により、自動車の「所有者」に変更があった場合は、事由があった日から15日（道路運送車両法第12条）以内に届出が必要。なお改正で変更あり。答えはB（所有者・15日）。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 44, "label": "問44", "points": 2, "answer": "A", "stem": "OBD検査に関する記述として、不適切なものはどれか。", "choices": {"A": "OBD検査は、車載コンピューターと通信して故障コードを確認する検査である。", "B": "OBD検査に不適合となった場合は、整備を行ってから再検査が必要になる。", "C": "OBD検査は全ての自動車に対して義務付けられている。", "D": "OBD検査に合格しても、その他の検査に不合格であれば車検は通らない。"}, "explanation": "OBD検査は「特定DTC（故障コード）」の有無を確認する検査であり、全ての故障コードを確認する検査ではない（A不適切）。また全ての自動車に義務付けられてはいない（一定条件を満たす車両のみ）。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 45, "label": "問45", "points": 2, "answer": "C", "stem": "令和2年4月1日より施行された特定整備制度に関する記載として、不適切なものはどれか。", "choices": {"A": "OBD検査の対象外としている大型特殊自動車、被牽引自動車、二輪自動車を除いた自動車の定期点検基準の点検項目について、「OBD（車載式故障診断装置）の診断の結果」を追加し、1年ごとに点検することを義務付け。", "B": "特定整備とはこれまでの分解整備とは異なり、新たに電子制御装置整備（自動ブレーキ等の先進技術）に関して認証することを特定整備と定義している。", "C": "特定整備の対象となる作業（電子制御装置整備作業）は以下の3つ：①自動運行装置の取り外しや作動に影響を及ぼすおそれがある整備・改造、②衝突被害軽減制動制御装置等に用いられるカメラ等の取り外しや機能調整、③①②に係るカメラ等が取り付けられている車体前部・窓ガラスの脱着。", "D": "特定整備（電子制御装置整備）の認証に必要な整備主任者は2級以上の自動車整備士資格または自動車車体整備士、自動車電気装置整備士に加えて運輸支局等が行う講習受講と試問に合格する事が条件である。"}, "explanation": "特定整備は「現在の分解整備を含む」概念であり、「これまでの分解整備とは異なり」は不適切（B）。特定整備制度は分解整備に電子制御装置整備が追加された概念。※答えはCではなくBが不適切。解答C（3つの作業分類）は正しい。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 46, "label": "問46", "points": 2, "answer": "B", "stem": "自動車特定整備制度の電子制御装置整備に該当しないものはどれか。", "choices": {"A": "PCS付き車両のエンジンECUのリプログラミング", "B": "PCS付き車両のフロントガラスの交換", "C": "PCS付き車両のバンパーの脱着", "D": "PCSのエーミング"}, "explanation": "PCS付き車両のフロントガラスの交換は「電子制御装置整備」に該当する（窓ガラスの脱着として特定整備の対象）。エンジンECUリプログラミング、バンパー脱着、PCSエーミングも電子制御装置整備に該当する。※Bが「該当しない」という出題意図で正解。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 47, "label": "問47", "points": 2, "answer": "A", "stem": "道路運送車両の保安基準に照らし、非常口の記述に関して、不適切なものはどれか。", "choices": {"A": "幼児専用車、乗車定員25人以上の自動車（緊急自動車およびすべての座席が乗降口から直接着席できる自動車を除く）には、非常口を設けなければならない。", "B": "非常口のとびらが開放した場合に、その旨を乗客に警報する装置を備えなければならない。", "C": "非常口は、客室の右側面の後部または後面に設けられていること。", "D": "非常口には、非常の際に客室の内外から、特別な器具を用いないで開放できる、外開きのとびらを備えること。"}, "explanation": "保安基準第50条：非常口の設置は「幼児専用車および乗車定員30人以上」の自動車（25人以上は不適切）。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 48, "label": "問48", "points": 2, "answer": "C", "stem": "車検時のOBD検査に関する記述として、不適切なものはどれか。", "choices": {"A": "車載式故障診断装置を利用した自動車検査であり、特定DTCが発生している車両に関しては、保安基準不適合となる。", "B": "車検証に「OBD検査対象車」などの記載がある場合でも、法令等で定められた条件によりOBD検査を実施しなくてもよいことがある。", "C": "OBD検査対象車両は、国産・輸入車問わず令和3年10月1日以降の新型車（フルモデルチェンジ車）である。", "D": "指定工場においてはOBD検査実施が義務となるが、認証工場での自工場内実施は義務ではない。"}, "explanation": "OBD検査対象車両は、国産車は令和3年（2021年）10月1日以降、輸入車は令和4年（2022年）10月1日以降の新型車。「国産・輸入車問わず令和3年」は不適切。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 49, "label": "問49", "points": 2, "answer": "A", "stem": "コンディションレポートの狙いとして、適切なものはどれか。", "choices": {"A": "車検、定点入庫時に定期交換部品の交換を促すことで、確実な予防整備を実施する。", "B": "突発で入庫したお客様に整備提案し部品交換を促す。", "C": "メカニックへの作業指示の際、交換箇所の指示に使用する。", "D": "部品商への外販活動に使用し、純正部品の拡販に使用する。"}, "explanation": "コンディションレポートはお客様車両の使われ方を把握し、計画入庫時に定期交換部品の交換を促すことで確実な予防整備を実施するためのツール（A適切）。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 50, "label": "問50", "points": 2, "answer": "A", "stem": "日野自動車は、お客様や社会に貢献するという日野の原点に立ち返り、一人ひとりが大切にすべき価値観とあるべき姿を「HINOウェイ」としてまとめた。HINOウェイの価値観として、適切なものはどれか。", "choices": {"A": "誠実、貢献、共感", "B": "誠実、貢献、協力", "C": "誠実、貢献、共有", "D": "誠実、貢献、感謝"}, "explanation": "HINOウェイの価値観は「誠実、貢献、共感」の3つ。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 51, "label": "問51", "points": 5, "answer": "C", "stem": "シビアコンディションに関する記述として、適切なものはどれか。", "choices": {"A": "悪路（凹凸路、砂利道、未舗装路等）、雪道、多塵地帯の走行が走行距離の20%以上。", "B": "山道、登降坂路の走行が走行距離の10%以上。", "C": "発進・停止の繰り返しが多い、もしくは低速走行が走行距離の30%以上。", "D": "走行距離が多い（目安：20,000km/月以上）。"}, "explanation": "シビアコンディションの判定：悪路・雪道・多塵地帯=30%以上、山道・登降坂路=30%以上、発進・停止繰返し/低速走行=30%以上（C適切）、走行距離=10,000km/月以上。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 52, "label": "問52", "points": 5, "answer": "B", "stem": "危険物に関する記述として、不適切なものはどれか。", "choices": {"A": "第一石油類とは、ガソリン・ブレーキクリーナーが該当する。", "B": "第二石油類とは、PSオイル・ブレーキフルードが該当する。", "C": "第四石油類とは、エンジンオイル・T/Mオイル・D/Fオイルが該当する。", "D": "第三石油類とは、重油・AT油が該当する。"}, "explanation": "第二石油類は灯油・軽油が該当する。PSオイル・ブレーキフルードは第三石油類または第四石油類に分類される（B不適切）。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 54, "label": "問54", "points": 5, "answer": "B", "stem": "市場技術速報の発行判断内容の記述として、不適切なものはどれか。", "choices": {"A": "同種不具合が複数台発生したため発生台数分の市技報を作成した。", "B": "シートベルト巻き取り不良の点検後、部品不良にて交換をしたが保証期間外のため市技報を作成しなかった。", "C": "左右のミラーが同時に故障したため、1件の市技報にまとめて記載した。", "D": "整備作業時に作業性がとても悪かったため不具合ではないが市技報を作成した。"}, "explanation": "市技報（市場技術速報）は保証期間内・外や同種不具合かどうかに関わらず発行が必要。保証期間外でも発行すべきであり、Bは不適切。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 55, "label": "問55", "points": 5, "answer": "C", "stem": "市場技術速報作成時に関する記述として、適切なのはどれか。", "choices": {"A": "整備担当者確認結果へ分解整備結果、故障診断内容を記入した。", "B": "個人情報および個人情報に準じる表現を記入した。", "C": "部品返却が不要の場合にコメント欄へ返却のない理由を記入した。", "D": "詳細内容へ点検結果、解析結果、推定原因を記入した。"}, "explanation": "B：個人情報は市技報に記入しない。D：詳細内容には故障事象・発生条件・発生状況を記入（点検結果・解析結果・推定原因ではない）。C（部品返却不要の場合はコメント欄に理由記入）が適切。", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 56, "label": "問56", "points": 5, "answer": "B", "stem": "ある販売会社の一ヶ月の整備部門の業績があります。車検整備と一般整備の合計売上利益として、適切なものはどれか。（値引等は無いものとする）\n\n・車検売上高：29,500千円\n・売上原価合計（車検＋一般整備）：25,800千円\n・一般整備売上原価：17,000千円\n・一般整備売上利益率：32％", "choices": {"A": "29,900千円", "B": "28,700千円", "C": "30,200千円", "D": "25,900千円"}, "explanation": "一般整備売上高 = 17,000 ÷ (1-0.32) = 25,000千円\n一般整備売上利益 = 25,000 × 0.32 = 8,000千円\n車検売上原価 = 25,800 - 17,000 = 8,800千円\n車検売上利益 = 29,500 - 8,800 = 20,700千円\n合計売上利益 = 20,700 + 8,000 = 28,700千円 → B", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 57, "label": "問57", "points": 5, "answer": "C", "stem": "平日の定時間内にＡ販売会社からエンジン始動不良となった日野車のバッテリー交換（2個）の広域サービス対応依頼が入ったため、Ｂ販売会社のサービスエンジニアが10km先の故障車両までサービスカーで出動した。Ａ販売会社への請求金額（消費税10%込）として、適切なものはどれか。\n（答えは小数点以下第一位を四捨五入）\n\n・純正PBバッテリーLP（定価）：38,000円（1個）\n・DN（仕入価格）：16,500円（1個）\n・標準作業時間（バッテリー交換）：0.5時間\n・Ａ販売会社の工賃レート：10,000円\n・Ｂ販売会社の工賃レート：10,500円", "choices": {"A": "59,895円", "B": "60,060円", "C": "61,215円", "D": "84,535円"}, "explanation": "①技術料：10,500(B社)×0.5h×1.25(出張)×0.8(振替控除)＝5,250円\n②バッテリー：16,500×2個×1.2(振替増し)＝39,600円\n③サービスカー：(8,000基本+400×10km)×0.9(振替控除)＝10,800円\n合計：(5,250+39,600+10,800)×1.1＝61,215円 → C", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 58, "label": "問58", "points": 5, "answer": "D", "stem": "通過車両のワイパーリンク修理を行い、技術料が10,000円（税抜）、部品代（定価）が20,000円（税抜）だった。元販売会社への振替料金（消費税込）を求めなさい。\n（答えが小数点以下になる場合は第1位を四捨五入）", "choices": {"A": "16,500円", "B": "24,400円", "C": "24,800円", "D": "26,400円"}, "explanation": "技術料振替：10,000×0.8(20%控除)＝8,000円\n部品代振替：20,000×0.8(20%控除)＝16,000円\n合計振替：24,000円\n税込：24,000×1.10＝26,400円 → D", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 59, "label": "問59", "points": 5, "answer": "A", "stem": "下記の数値は、ある販売会社の１ヶ月の整備業績です。営業費カバー率（%）を求めなさい。（小数点以下第1位四捨五入）\n\nＡ：会社総経費　66,121千円\nＢ：総売上高　169,298千円\nＣ：整備売上高　163,810千円\nＤ：有償売上高　142,635千円\nＥ：整備売上利益　62,815千円\nＦ：有償売上利益　45,842千円\nＧ：総整備台数　1,832台", "choices": {"A": "95%", "B": "103%", "C": "105%", "D": "110%"}, "explanation": "営業費カバー率 = 整備売上利益(E) ÷ 会社総経費(A) × 100\n= 62,815 ÷ 66,121 × 100 = 95% → A", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 60, "label": "問60", "points": 5, "answer": "B", "stem": "図のパワー・シリンダーに600kPaの圧力をかけたとき、ハイドロリック・ピストンを押す力を求めなさい。\n（答えは小数点以下第1位を四捨五入）\n\n・パワー・シリンダーの内径：180mm\n・ハイドロリック・シリンダの内径：30mm\n・円周率：3.14\n・リターンスプリングの張力は無視してよい。", "choices": {"A": "1,696N", "B": "15,260N", "C": "61,041N", "D": "15,260kN"}, "explanation": "力(N) = 圧力(Pa) × 面積(m²)\n= 600,000 × (0.18÷2)² × 3.14\n= 600,000 × 0.0081 × 3.14\n= 15,260.4N ≈ 15,260N → B", "source": "2025年度フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 1, "label": "問1(1)", "points": 3, "answer": "B", "stem": "事故見積書に記載する用語および略号について、不適切なものはどれか。", "choices": {"A": "略号「Ｉ」とは、部品の不良破損または摩耗箇所を外部から点検する作業。", "B": "略号「Ｗ」とは、部品を取外す作業。", "C": "略号「ＯＨ」とは、アセンブリまたはユニットを完全に分解し、各構成部品の点検・取替・組立・調整完了までの全作業。", "D": "略号「Ｒ／Ｉ」とは、部品の取外し取付作業。"}, "explanation": "略語「Ｗ」とはアセンブリまたはユニットの一部を分解し、その構成部品の点検・組立・調整完了までの全作業の事である。（部品の取外し作業は「Ｒ」）", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 2, "label": "問1(2)", "points": 3, "answer": "C", "stem": "自動車のメンテナンスに関する記述として、不適切なものはどれか。", "choices": {"A": "ひとまわり点検とは、お客様が気付いていない不具合箇所をみつけてお客様に不具合内容を説明し、安全運転の手助けをすることである。", "B": "日常点検とは、使用者または運行する人が一日一回、その運行の開始前に目視などにより点検することである。", "C": "シビアコンディションに該当する場合は、標準的な定期点検に加え国が定めている１ヶ月ごとの点検を推奨する。", "D": "定期点検とは、自動車の性能をいつまでも高度に維持するための予防整備として、必要最小限の点検を法律で定めたものである。"}, "explanation": "シビアコンディションで推奨する点検整備については、日野自動車が独自に定めている（国が定めているものではない）。", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 3, "label": "問1(3)", "points": 3, "answer": "B", "stem": "受付時の車両確認に関する記述として、不適切なものはどれか。", "choices": {"A": "車内に貴重品が入っていないか、お客様自身に確認してもらう。", "B": "違法改造の有無を確認し、違法改造が発見されたら入庫をお断りする。", "C": "リコールやサービスキャンペーンの対象車である場合は、必ずお客様にお伝えして実施を促進する。", "D": "車両のキズ、汚れ、積荷状態、付属品の状態をお客様と一緒に確認し、気づき事項を記録する。"}, "explanation": "不正改造がある場合は、お客様に正規な状態に戻すようお願いする（入庫拒否ではない）。", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 4, "label": "問1(4)", "points": 3, "answer": "D", "stem": "通過車両規定において、営業時間外の受付体制に関する記述として、適切なものはどれか。", "choices": {"A": "対応件数の多い販売会社１６件／月の夜間受付は宿直とする。", "B": "対応件数の多い販売会社２１件／月の夜間受付は宿直とする。", "C": "対応件数の多い販売会社２６件／月の夜間受付は宿直とする。", "D": "対応件数の多い販売会社３１件／月の夜間受付は宿直とする。"}, "explanation": "対応件数の多い販売会社（30件以上/月）の夜間出動体制は夜勤（宿直）とし、それ以外は自宅待機とする。", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 5, "label": "問1(5)", "points": 3, "answer": "A", "stem": "通過車両規定の「ホットライン」の取り扱いに関する記述として、不適切なものはどれか。", "choices": {"A": "「ホットライン一覧表」を年１回（５月）配布する。尚、一覧表は会社管理とする。", "B": "ホットラインは、ホットライン登録者同士のみ使用することができる。", "C": "ホットラインを携帯電話で行う場合は、個人が常時使用している場合に限り登録できるものとする。", "D": "故障、電波状態により、使用できないことも想定し原則として通常の電話番号と携帯番号の２つを登録する。"}, "explanation": "「ホットライン一覧表」は個人管理とする（会社管理ではない）。", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 6, "label": "問1(6)", "points": 3, "answer": "C", "stem": "通過車両規定の特別対応料（日野車）および体制維持費に関する記述として、不適切なものはどれか。", "choices": {"A": "出張作業の安全確保の為（２名出動を原則）、時間外の特別対応料を１０，０００円とする。", "B": "深夜の場合は、５，０００円を割り増し請求できる。", "C": "登録前車両の対応時は、特別対応料および体制維持費とも保証申請にてメーカーに請求できる。", "D": "体制維持費とはメーカーと元販売店の応分の負担費用である。"}, "explanation": "登録前車両については、特別対応料のみ保証申請にてメーカーに請求できる（体制維持費は請求不可）。", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 7, "label": "問1(7)", "points": 3, "answer": "B", "stem": "納品書に関する記述として、不適切なものはどれか。", "choices": {"A": "納品書とは、お客様へ渡す整備の明細以外に、販売会社サービス部の売上げチェック用の資料としての機能もある。", "B": "外注又は他販売会社入庫車両は、送付されてきた請求書をもとに仕入をする。", "C": "工賃マスタに無い項目は、工数または原価、売価をその都度決める。", "D": "納品書発行時は関連伝票を収集し、指示通りの作業が行われたか確認する。"}, "explanation": "外注又は他販売会社入庫車両は、送付されてきた「納品書」をもとに仕入をする（請求書ではない）。", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 8, "label": "問1(8)", "points": 3, "answer": "D", "stem": "売上・回収に関する記述として、不適切なものはどれか。", "choices": {"A": "小切手とは振出人の取引銀行に対して、受取人に一定額の金額を支払うように委託する有価証券のこと。", "B": "売掛金は利息が付かず、時効が２年と極めて短い。", "C": "受取手形は６ヶ月に２回、銀行を支払い場所とする約束手形を不渡りにすると銀行取引停止処分を受ける。", "D": "HITOSSⅡ上のお客様ランクが「６，７」の場合、売上先確認。「８，９」の場合、売上不可が表示される。"}, "explanation": "HITOSSⅡ上のお客様ランクが「6、7、8」の場合、売上先確認、「9」の場合、売上不可が表示される。", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 9, "label": "問1(9)", "points": 3, "answer": "A", "stem": "領収書に関する記述として、適切なものはどれか。", "choices": {"A": "領収書には有効期限はない。", "B": "領収書には保管期間はない。", "C": "領収書の有効期限は５年間。", "D": "領収書の保管期間は５年間。"}, "explanation": "領収書の有効期限はなく、商法上の保存期間は10年間、税法上は7年間。", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 10, "label": "問1(10)", "points": 3, "answer": "D", "stem": "HITOSSⅡの売上報告画面で、工賃割増の適用に関する記述として、適切なものはどれか。", "choices": {"A": "対象工賃の行にある出区分に「１」を入力する。", "B": "対象工賃の行にある出区分に「２」を入力する。", "C": "対象工賃の行にある出区分に「８」を入力する。", "D": "対象工賃の行にある出区分に「９」を入力する。"}, "explanation": "出区分の意味：1→売価欄にサービスと印字、2→メンテナンスリース契約車両の契約整備と印字、8→未使用、9→工賃割増。", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 11, "label": "問1(11)", "points": 3, "answer": "A", "stem": "通過車両規定において整備費用（事故以外）の売り上げに関する記述として、適切なものはどれか。", "choices": {"A": "実施販売会社のお客様請求標準単価の２０％を控除し、その改訂は年１回とする。", "B": "実販売会社のお客様請求標準技術料単価の２０％を控除し、その改訂は３月に限る。", "C": "実販売会社のお客様請求標準技術料単価の２０％を控除し、その改訂は年度内に２回迄とする。", "D": "実販売会社のお客様請求標準技術料単価の２０％を控除し、その改訂に規定は設けない。"}, "explanation": "技術料は実施販売会社のお客様請求標準技術料単価（レバレート）の20％を控除し、その改訂は年1回とする。", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 12, "label": "問1(12)", "points": 3, "answer": "A", "stem": "通過車両規定において事故修理（保険修理）の売り上げ（振替）に関する記述として、適切なものはどれか。", "choices": {"A": "・技術料は保険査定額の５％を控除。\n・部品代は保険査定額の１０％を控除。", "B": "・技術料は保険査定額の２０％を控除。\n・部品代は保険査定額の１０％を控除。", "C": "・技術料は保険査定額の５％を控除。\n・部品代は保険査定額の５％を控除。", "D": "・技術料は保険査定額の１０％を控除。\n・部品代は保険査定額の５％を控除。"}, "explanation": "保険修理で販売会社間の振替は、技術料：保険査定額の5％を控除。部品代：保険査定額の10％を控除。外注作業技術料及び外注作業部品代：保険査定額の5％を控除。", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 13, "label": "問1(13)", "points": 3, "answer": "C", "stem": "通過車両規定において特別対応料のメーカー請求額算出方法の説明として、適切なものはどれか。", "choices": {"A": "前月２０日～当月１９日の期間の営業時間外対応実績×１，１００円", "B": "前月２０日～当月１９日の期間の営業時間内対応実績×１，０００円", "C": "前月２１日～当月２０日の期間の営業時間外対応実績×１，０００円", "D": "前月２１日～当月２０日の期間の営業時間内対応実績×１，１００円"}, "explanation": "特別対応料の請求額は「前月21日～当月20日」の期間の「営業時間外」対応実績×1,000円。HIWAYの通過車両特別対応実績入力システムへの通過車両対応入力件数とする。", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 14, "label": "問1(14)", "points": 3, "answer": "B", "stem": "通過車両規定において保証修理に関する作業の処理方法について、不適切なものはどれか。", "choices": {"A": "現品の元販売会社への到着期限は、故障発生日より２０日以内とする。", "B": "現品および関係書類は即時発送する。なお現品およびその梱包には、「保証部品」と明記した荷札をつけ、送状と受領書を同封する。", "C": "再修理等、整備保証に関する事項が発生した場合は販売会社間相互で協議して、その都度解決する。", "D": "現品が元販売会社に到着しなかった場合の損害は、実施販売会社とする。"}, "explanation": "現品の梱包には「保証部品」ではなく「通過車両」と明記した荷札をつける。", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 15, "label": "問1(15)", "points": 3, "answer": "C", "stem": "タイヤの異常摩耗に関する記述として、不適切なものはどれか。", "choices": {"A": "トレッドが、外側から内側に向かって羽根状に摩耗するのは、トーインの過大、ナックルアームの曲がり、左右のタイロットの長さの相違などが原因である。", "B": "トレッド部が、波状に摩耗しているのは、ホイール・バランスの不良、ホイール・ベアリングのがた、ホイール・アライメントの狂いなどが原因である。", "C": "トレッド部が、ピット状（窪み状）に全周にわたって摩耗しているのは、ホイール・ベアリング不良、ボールジョイントのがた、急激な駆動、制動、旋回が主な原因である。", "D": "トレッド部が、のこぎり歯状に摩耗する場合は、ホイール・ベアリングのがた、トーインの不良、マイナスキャスタ、ホイール・バランスの不良、ターニングラジアスの不良などが主な原因である。"}, "explanation": "トレッド部がピット状（窪み状）に全周にわたって摩耗しているのは、ホイール・バランスの不良が主な原因である（ホイール・ベアリング不良やボールジョイントのがたではない）。", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 16, "label": "問1(16)", "points": 3, "answer": "D", "stem": "大型トラック（プロフィア１９年モデル）について、不適切なものはどれか。", "choices": {"A": "Ｊ－ＯＢＤⅡに対応しＭＩＬ表示を追加した。", "B": "ＧＰＳや地図情報などを利用した道路勾配先読み制御を追加した。", "C": "衝突事故を未然に防止するためにサイトアラウンドモニターシステム（ＳＡＭＳ）を追加した。", "D": "追突防止用に誤発進抑制装置が追加された。"}, "explanation": "プロフィア19年モデルに誤発進抑制装置は搭載されていない。", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 17, "label": "問1(17)", "points": 3, "answer": "A", "stem": "２＊Ｇ付レンジャーの後処理システムに関する記述として、適切なものはどれか。", "choices": {"A": "１９０～２１０馬力帯は尿素フリーのＤＰＲⅡ、２４０～２６０馬力帯はＤＰＲ＋尿素ＳＣＲを採用している。", "B": "１９０馬力帯は尿素フリーのＤＰＲⅡ、２１０～２６０馬力帯はＤＰＲ＋尿素ＳＣＲを採用している。", "C": "１９０～２４０馬力帯は尿素フリーのＤＰＲⅡ、２６０馬力帯はＤＰＲ＋尿素ＳＣＲを採用している。", "D": "すべての馬力帯に尿素フリーのＤＰＲⅡを採用している。"}, "explanation": "190～210馬力帯は尿素フリーのDPRⅡ、240～260馬力帯はDPR+尿素SCRを採用している。", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 18, "label": "問1(18)", "points": 3, "answer": "C", "stem": "デュトロ（２０１６年モデル）のシステムにおいて、ＤＸⅡを使用して学習または初期設定を行うことができるものとして、適切なものはどれか。", "choices": {"A": "プロシフトⅤのクラッチ学習", "B": "電動パーキングブレーキＥＣＵの勾配０点学習", "C": "ＥＳスタートの初期設定（ブレーキ解除点学習）", "D": "プロシフトⅤのクラッチ断接操作"}, "explanation": "ESスタートの設定は、SSTを使用してもしなくてもDXⅡでもできる。プロシフトや電動パーキングの学習はTC端子短絡＆レバー操作で実施する。", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 19, "label": "問1(19)", "points": 3, "answer": "B", "stem": "道路運送車両法に照らし、次の文章の［ ］にあてはまるものとして、適切なものはどれか。\n\n「［イ］は、自動車が部品の劣化又は摩耗等により保安基準に適合しなくなるおそれ、又は適合しない状態にあるときは、当該自動車の［ロ］に対し、保安基準に適合させるために必要な整備を命ずることができる。この命令を［ハ］という。」", "choices": {"A": "［イ］国土交通大臣　［ロ］所有者　［ハ］改善命令", "B": "［イ］地方運輸局長　［ロ］使用者　［ハ］整備命令", "C": "［イ］国土交通大臣　［ロ］使用者　［ハ］整備命令", "D": "［イ］地方運輸局長　［ロ］所有者　［ハ］改善命令"}, "explanation": "地方運輸局長は、当該保安基準に適合しなくなるおそれがある状態又は適合しない状態にあるときは、当該自動車の「使用者」に対し、必要に応じ整備をすべきことを勧告することができる（整備命令）。", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 20, "label": "問1(20)", "points": 3, "answer": "C", "stem": "道路運送車両法に照らし用語に関する記述として、不適切なものはどれか。", "choices": {"A": "「軽車両」とは、人力若しくは畜力により陸上を移動させることを目的として製作した用具であって、政令で定めるものをいう。", "B": "「道路運送車両」とは、自動車、原動機付自転車及び軽車両をいう。", "C": "「自動車」とは、原動機により陸上を移動させることを目的として製作した用具であって、軽車両以外のものをいう。", "D": "「原動機付自転車」とは、国土交通省令で定める総排気量又は定格出力を有する原動機により陸上を移動させることを目的として製作した用具をいう。"}, "explanation": "「自動車」とは、原動機により陸上を移動させることを目的として製作した用具であって、「原動機付自転車以外」のものをいう（軽車両以外ではない）。", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 21, "label": "問1(21)", "points": 3, "answer": "D", "stem": "道路運送車両の保安基準に照らし、２０１７年に製作された自動車の後退灯に関する記述として、適切なものはどれか。", "choices": {"A": "長さが６ｍを超える貨物自動車にあっては、１個または２個備えなければならない。", "B": "照明部の上縁の高さが地上１．５ｍ以下、下縁の高さが０．２５ｍ以上となるように取り付けられなければならない。", "C": "灯光の色は、白色又は淡黄色であること。", "D": "昼間にその後方１００ｍの距離から点灯を確認できるものであること。"}, "explanation": "後退灯の要件：A→長さ6mを超える自動車は2個、3個または4個（それ以外は1個または2個）、B→照明部の上縁高さは地上1.2m以下、C→灯光の色は白色のみ（淡黄色は不可）、D→昼間後方100mの距離から点灯確認できること（正しい）。", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 22, "label": "問1(22)", "points": 3, "answer": "B", "stem": "道路運送車両の保安基準に照らし、２０１７年に製作された車両の側方灯及び側方反射器に関する記述として、適切なものはどれか。", "choices": {"A": "長さ５ｍを超える普通自動車の両側面には、側方灯又は側方反射器を備えなければならない。", "B": "側方反射器の反射部は、三角形以外の形状であること。", "C": "側方灯は昼間側方１５０ｍの距離から点灯を確認できるものであること。", "D": "側方反射器の反射光の色は、前部又は中央部に備えるものにあっては橙色又は淡黄色であること。"}, "explanation": "A：長さ6mを超える普通自動車（5mではない）、C：側方灯は「夜間」150mの距離から点灯を確認できること、D：側方反射器の反射光の色は、前部又は中央部に備えるものにあっては橙色のみ（淡黄色は不可）。", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 23, "label": "問1(23)", "points": 3, "answer": "A", "stem": "自家用自動車保険（通称Ｐ・Ａ・Ｐ）の基本契約に含まれていないものはどれか。", "choices": {"A": "車両保険", "B": "自損事故保険", "C": "無保険車傷害保険", "D": "搭乗者傷害保険"}, "explanation": "車両保険は、任意付帯契約になる（基本契約には含まれない）。", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 24, "label": "問1(24)", "points": 3, "answer": "C", "stem": "ハイブリッドバッテリー安心パックに関する記述として、不適切なものはどれか。", "choices": {"A": "基本パック（リース以外）は、有効期限１０年で価格は５０千円になる。", "B": "リース用特別パックは、初年度登録日より４年間の契約では、２０千円になる。", "C": "リース用特別パックは、初年度登録日より６年間の契約では、４０千円になる。", "D": "リース契約の場合、リース料金とは別に、車両使用者と直接契約する。"}, "explanation": "リース用特別パックの初年度登録日より6年間の契約は30千円（40千円ではない）。", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 25, "label": "問1(25)", "points": 3, "answer": "A", "stem": "日野メンテナンスリースの請求に関する記述として、不適切なものはどれか。", "choices": {"A": "引取、納車料（１往復／台）中、小型車は３，０００円である。", "B": "一般修理技術料は、日野標準作業時間×４，５００円／時間である。", "C": "通過車両の夜間対応（１９：００～８：００）一般修理技術料は４，５００円／時間の２５％増しである。", "D": "エアコンシーズンイン点検料金は３，０００円である。"}, "explanation": "引取、納車料（1往復/台）中、小型車は2,000円である（3,000円ではない）。", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 26, "label": "問1(26)", "points": 3, "answer": "D", "stem": "日野プレミアムサポートに関する記述として、不適切なものはどれか。", "choices": {"A": "保証書を紛失した場合でも、サービスの利用は可能である。", "B": "修理費用差額補償サービスは、リース期間中１回のみ利用可能である。", "C": "事故後６０日以上経過してからの事故通知や修理入庫は対象外である。", "D": "路上で交換したタイヤの修理は対象外である。"}, "explanation": "路上で交換したタイヤの修理も対象になる（対象外ではない）。", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 27, "label": "問1(27)", "points": 3, "answer": "B", "stem": "環境マネジメントシステムに関する記述として、不適切なものはどれか。", "choices": {"A": "「ＥＭＤ認定」とは、日野独自の認定制度である。", "B": "「ＥＭＤ認定」とは、「ＩＳＯ１４００１」認定取得条件を全て満たしているものである。", "C": "「環境に優しい事業場表彰」は、国土交通省の制定する制度である。", "D": "「ＥＭＤ認定」には３段階の認定クラスがあり、評価は４項目が対象となる。"}, "explanation": "EMD認定は、ISO14001認証の取得条件全てを満たすものではない。また「環境に優しい事業場表彰」は国土交通省が表彰の指針を出し、各地方運輸局が表彰している。", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 28, "label": "問1(28)", "points": 3, "answer": "C", "stem": "安全の心構えに関する記述として、不適切なものはどれか。", "choices": {"A": "自分自身が主体となり自ら考えなければならない。", "B": "作業の洗い出しと改善、異常処置時の安全のルール作りを行う。", "C": "作業能率を阻害する原因と事故や災害を起こす原因は関連性がない。", "D": "正しい作業であれば、作業効率の向上も期待できる。"}, "explanation": "作業能率を阻害する原因を掘り下げると大部分は事故や災害を起こす原因となる（関連性がないは誤り）。", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 29, "label": "問1(29)", "points": 3, "answer": "A", "stem": "安全行動と安全状態の具体例として、不適切なものはどれか。", "choices": {"A": "フロント受付後に、お客様、内・外注業者、部品業者が車の移動する際は必ず誘導を実施する。", "B": "フロント前には停止線、ならびに「一時停止」等の表示を行う。", "C": "工場内のお客様立ち入りを禁止とし、その旨をフロント付近に表示する。", "D": "一回り点検は「点検場」で行う。「点検場」が確保できない場合は工場内の完成検査場等で行う。"}, "explanation": "お客様、内・外注業者、部品業者による工場内の車の移動はご遠慮願う（誘導しながら行うのではなく、移動自体を遠慮してもらう）。", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 30, "label": "問1(30)", "points": 3, "answer": "D", "stem": "ＣＳに関する記述として、適切なものはどれか。", "choices": {"A": "ＣＳ活動を盛り上げていくポイントは大きく分けて、品質、スピード、価格の３項目があると言われている。", "B": "「ＣＳの要素」は、便利、親しみ、安心、信頼、感謝の５項目と言われている。", "C": "「ＣＳの要素」を満たすには、対応のＣＳ、基礎のＣＳ、管理のＣＳの３つを意識することが必要である。", "D": "ＣＳとはカスタマーサティスファクションの略で顧客満足度という。商品やサービスにどのくらい満足しているかという考え方のことである。"}, "explanation": "A：品質、スピード、価格、サービスの4項目。B：便利、親しみ、楽しさ、安心、信頼、感謝の6項目。C：対応のCS、基盤のCSの2つ。D：CSはカスタマーサティスファクション（顧客満足度）の略（正しい）。", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 31, "label": "問2(1)", "points": 5, "answer": "C", "stem": "通過車両の業務処理規定に照らし、平日の昼、サービスカーで片道１２ｋｍ離れたお客様車庫へ修理に向かった。悪天候のため到着まで通常時の２．５倍（１００分）を要した。サービスカー使用料のお客様請求額を消費税込みとして、適切なものはどれか。\n\n（注）答えが少数点以下になる場合は、小数点以下第１位を四捨五入しなさい。", "choices": {"A": "９，０７５円", "B": "９，２１３円", "C": "９，３５０円", "D": "９，４８８円", "E": "９，６２５円"}, "explanation": "走行距離10kmまで6,000円、10kmを超え1km毎に400円加算。\n6,000円＋(400円×2km)=6,800円\n悪天候で平均速度10km/h以下はサービスカー使用料を25%増し。\n6,800円×1.25=8,500円\n8,500円×1.1（消費税10%）=9,350円", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 32, "label": "問2(2)", "points": 5, "answer": "A", "stem": "ある車両のスピードメーターの指示速度を８０ｋｍ／ｈにあわせて一定速度で走行したところ、７００ｍを３０秒で通過した。\nこのときのスピードメーターの誤差（％）として、適切なものはどれか。\n\n（注）答えが小数点以下になる場合は、小数点以下第２位を四捨五入しなさい。", "choices": {"A": "４．８％", "B": "５．０％", "C": "５．２％", "D": "５．４％", "E": "５．６％"}, "explanation": "実速：(700÷30)×3600÷1000=84km/h\n誤差：(84－80)÷84=0.0476≒4.8%", "source": "20年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 1, "label": "問1", "points": 3, "answer": "B", "stem": "受付時の車両確認に関する記述として、不適切なものはどれか。", "choices": {"A": "車内に貴重品が入っていないか、お客様自身に確認してもらう。", "B": "違法改造の有無を確認し、違法改造が発見された時点で入庫をお断りする。", "C": "車両のキズ、汚れ、積
