const normalPool = [{"no": 1, "label": "問1(1)", "points": 3, "answer": "B", "stem": "補給部品の保証規定に関する記述として、不適切なものはどれか。", "choices": {"A": "補給部品の再保証は、最大：初回保証から１年間である。", "B": "お客様が直接、日野販売会社又は、指定整備工場で購入した部品については、日野純正部品であっても保証されない。", "C": "日野純正部品を他メーカーブランド車に取付けした場合、一切保証を受ける事ができない。", "D": "ガラス類については、組付け直後の指摘を除き、保証の適用除外となる。"}, "explanation": "お客様が日野販売会社または指定整備工場で購入した日野純正部品は、部品保証（一般保証部品に準じた保証）の対象となる。", "source": "18年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 2, "label": "問1(2)", "points": 3, "answer": "A", "stem": "車検整備にかかわる概算見積の料金項目に関する記述として、適切なものはどれか。", "choices": {"A": "お客様ご依頼事項料金は引き取り・納車料、下回り塗装料、検査代行手数料等のことである。", "B": "点検・整備料金は基本点検技術料、引取り・納車料、検査代行手数料等のことである。", "C": "検査諸費用は自賠責保険料、自動車重量税、検査代行手数料等のことである。", "D": "点検・整備料金は基本点検技術料、部品・油脂料、下回り塗装料等のことである。"}, "explanation": "お客様ご依頼事項料金は引き取り・納車料、下回り塗装料、検査代行手数料等。点検・整備料金は基本点検技術料・部品・油脂料等、検査諸費用は自賠責保険料・自動車重量税等が含まれる。", "source": "18年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 3, "label": "問1(3)", "points": 3, "answer": "C", "stem": "保証申請期間に関する記述として、適切なものはどれか。", "choices": {"A": "一般保証修理（日野車）の保証申請期間は、故障発生日から３０日以内である。", "B": "通過車両保証修理（日野車）の保証申請期間は、故障発生日から６０日以内である。", "C": "納入前保証修理（日野車）の保証申請期間は、故障発生日から６０日以内である。", "D": "保証申請で一部又は全部が否決で、それに異議のある場合の再申請は、故障発生日から６０日以内である。"}, "explanation": "納入前保証修理（日野車）の保証申請期間は、故障発生日から60日以内。一般保証修理は故障発生日から30日以内が正しい。", "source": "18年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 4, "label": "問1(4)", "points": 3, "answer": "A", "stem": "HITOSSⅡお客様照会画面の対応区分に関する記述として、不適切なものはどれか。", "choices": {"A": "適応時間帯の「２」は、夜間のみ適応コードである。", "B": "対応区分の「０２」は、不良（Ｂ）客のコードである。", "C": "対応区分の「０４」は、条件付き（Ｇ）客のコードである。", "D": "適応時間帯の「０」は、共通コードである。"}, "explanation": "適応時間帯「２」は夜間のみではなく、別の意味を持つコードである（共通コードは「0」）。", "source": "18年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 5, "label": "問1(5)", "points": 3, "answer": "D", "stem": "通過車両規定に関する記述として、適切なものはどれか。", "choices": {"A": "休日とは、元販売会社の休日をいう。", "B": "通過車両とは、自社以外の販売会社が販売した車両をいう。（流入車両、登録前車両は含まない）", "C": "営業時間外の修理時間は、約３時間／件を目安とする。", "D": "平日とは原則、月曜日から土曜日をいう。（但し、各実施販売会社の休業日を除く）"}, "explanation": "平日とは原則、月曜日から土曜日をいう（実施販売会社の休業日を除く）。休日は実施販売会社の休日をいう。通過車両には流入車両・登録前車両も含む。", "source": "18年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 6, "label": "問1(6)", "points": 3, "answer": "C", "stem": "HITOSSⅡで使用する作業ＣＤに関する記述として、適切なものはどれか。", "choices": {"A": "作業ＣＤで「３１０」から始まる作業ＣＤは、油脂類関係コード。", "B": "作業ＣＤで「４００」から始まる作業ＣＤは、サスペンション関係コード。", "C": "作業ＣＤで「７００」から始まる作業ＣＤは、電装品関係コード。", "D": "作業ＣＤで「６００」から始まる作業ＣＤは、ステアリング関係コード。"}, "explanation": "700→電装品、310→ブレーキ・アクスル、400→ステアリング、500→サスペンション、600→フレーム・ボデー・キャブ。", "source": "18年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 7, "label": "問1(7)", "points": 3, "answer": "A", "stem": "板金修理見積書でキャブ回りの標準的な記載順序として、適切なものはどれか。", "choices": {"A": "①フロントボデー ②サイドボデー ③リヤボデー ④ルーフ ⑤フロア", "B": "①フロントボデー ②フロア ③サイドボデー ④リヤボデー ⑤ルーフ", "C": "①フロントボデー ②ルーフ ③フロア ④サイドボデー ⑤リヤボデー", "D": "①フロントボデー ②フロア ③ルーフ ④サイドボデー ⑤リヤボデー"}, "explanation": "キャブ回りの標準的な記載順序：①フロントボデー ②サイドボデー ③リヤボデー ④ルーフ ⑤フロア。", "source": "18年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 8, "label": "問1(8)", "points": 3, "answer": "B", "stem": "収入印紙に関する記述として、適切なものはどれか。", "choices": {"A": "小切手に貼る収入印紙は、記載金額１０万円未満は非課税、１００万円以下は２００円の収入印紙が必要となる。", "B": "手形に貼る収入印紙は、記載金額１０万円未満は非課税、１００万円以下は２００円の収入印紙が必要となる。", "C": "小切手に貼る収入印紙は、記載金額５万円未満は非課税、１００万円以下は２００円の収入印紙が必要となる。", "D": "手形に貼る収入印紙は、記載金額５万円未満は非課税、１００万円以下は２００円の収入印紙が必要となる。"}, "explanation": "手形は記載金額10万円未満は非課税、100万円以下は200円。小切手は記載金額に関係なく一律200円（一定額以上のみ）。A・Cの「小切手 10万円未満非課税」は誤り。", "source": "18年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 9, "label": "問1(9)", "points": 3, "answer": "D", "stem": "整備料金の説明と回収に関する記述として、不適切なものはどれか。", "choices": {"A": "サービス部門で販売する商品は、点検、整備という点検整備作業における「技術の提供」である。", "B": "点検・整備の価値をお客様に理解していただけるよう、必要性、効果などをわかりやすくお客様に説明することも、「機能的サービス」の一環である。", "C": "無償、有償作業を同時に行う場合、受注の時点で「料金」とその有償、無償についてお客様に説明しておく。", "D": "売掛金が回収予定日を過ぎても入金されない場合は、督促状を普通郵便や内容証明付郵便などの手段を講じることも大切である。"}, "explanation": "点検・整備の価値説明は「機能的サービス」ではなく「説明サービス（ソフト面のサービス）」である。", "source": "18年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 10, "label": "問1(10)", "points": 3, "answer": "A", "stem": "領収書に関する記述として、適切なものはどれか。", "choices": {"A": "領収書そのものには有効期限はない。", "B": "領収書そのものには保管期間はない。", "C": "領収書の有効期限は１年間。", "D": "領収書の保管期間は５年間。"}, "explanation": "領収書そのものには有効期限はない。商法上の保存期間は10年間、税法上は7年間。", "source": "18年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 11, "label": "問1(11)", "points": 3, "answer": "B", "stem": "通過車両の事故車や故障車の保管料に関する記述として、不適切なものはどれか。", "choices": {"A": "修理しないものは、入庫日の翌日から起算し７日間は無料。８日間以上は１日につき小型車は５００円とする。", "B": "小型車の修理を実施したものは、元販売会社宛に完成した旨を通知した日の翌日から起算し、７日間は無料。８日間以上は１日につき５００円とする。", "C": "保管料の振替割引は行わない。", "D": "元販売会社は、車両を預かる販売会社の立場も考慮し、お客様と相談の上、短期間で対応方針を決めるよう努めること。"}, "explanation": "修理を実施した車両の保管料は、元販売会社への完成通知日翌日から起算し7日間無料。8日間以上は1日につき「300円」（500円ではない）。", "source": "18年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 12, "label": "問1(12)", "points": 3, "answer": "A", "stem": "通過車両規定において、事故修理に関する記述として、不適切なものはどれか。", "choices": {"A": "保険外の場合のみ、正式見積書を提出し、修理を実施しないときは見積料金として、見積額の３％を元販売会社に請求できる。", "B": "保険外修理の場合、販売会社間相互に協議した見積額によるものとする。", "C": "外注作業部品代は、保険査定額の５％を控除する。", "D": "部品代は、保険査定額の１０％を控除する。"}, "explanation": "修理を実施しないときの見積料金3%は、「保険外の場合のみ」ではなく、保険による場合・保険外の場合を問わず請求できる。", "source": "18年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 13, "label": "問1(13)", "points": 3, "answer": "D", "stem": "通過車両規定において、元販売会社の支払い方法として、適切なものはどれか。", "choices": {"A": "支払金額が、１０万円を超える場合は、支払日起算支払月から２ヶ月目の２０日を期限とする自社手形払いとする。", "B": "実施販売会社からの請求書は、毎月１５日をもって締め切る。", "C": "支払金額は、原則として１５万円以下は、現金払いとする。", "D": "元販売会社は締切月の翌月１５日を支払日とする。"}, "explanation": "元販売会社は締切月の翌月15日を支払日とする。請求書の締め切りは毎月20日。", "source": "18年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 14, "label": "問1(14)", "points": 3, "answer": "B", "stem": "通過車両の売上に関する記述として、不適切なものはどれか。", "choices": {"A": "技術料割増が２つ以上の時間帯をまたぐ場合は、販売会社相互間で相談の上、整備料金を決定する。", "B": "休日で定時間外（深夜を除く）の技術料割増は、７５％である。", "C": "休日で深夜出張（２２：００～翌５：００）の技術料割増は、１００％である。", "D": "悪条件の場合は、元販売会社へ事前連絡の上、出張技術料割増を５０％とすることができる。"}, "explanation": "休日で定時間外（深夜を除く）の技術料割増は「50%」である（75%ではない）。深夜出張は100%増し。", "source": "18年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 15, "label": "問1(15)", "points": 3, "answer": "D", "stem": "２０１７年１月発売のリエッセⅡに関する記述として、不適切なものはどれか。", "choices": {"A": "エンジンイモビライザーを全車標準装備しており、標準キーを含む最大８本（マスター５本、サブ３本）登録することができる。", "B": "車両電源１２V化に伴い、バッテリーは並列接続に変更されている。", "C": "ＳＲＳエアバッグを運転席に全車標準装備されており、併せてプリテンショナ＋フォースリミッタ付フロントシートアウタベルトＡｓｓｙＲＨを設定されている。", "D": "ＥＳスタートはＭ／Ｔ車全車に標準装備されている。"}, "explanation": "ESスタートはM/T車「全車」標準装備ではなく、一部設定のみとなっている。", "source": "18年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 16, "label": "問1(16)", "points": 3, "answer": "B", "stem": "２ＤＧ付メルファに関する記述として、不適切なものはどれか。", "choices": {"A": "エンジンは単段ターボチャージャー搭載のＡ０５Ｃ型エンジンを採用している。", "B": "排ガス（後処理）システムには尿素フリーのＤＰＲⅡを採用している。", "C": "トランスミッションはＬＸ０６＋ＡＭＴのみの設定となっている。", "D": "運転席に電子式ＳＲＳエアバッグ＆プリテンショナ―付シートベルトを採用している。"}, "explanation": "2DG付メルファの後処理システムはDPRⅡではなく、DPR＋尿素SCRシステムを採用している。", "source": "18年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 17, "label": "問1(17)", "points": 3, "answer": "A", "stem": "デュトロ（２０１６年モデル以降）のスマートエントリー＆スタートシステムに関する記述として、不適切なものはどれか。", "choices": {"A": "スマート（電子）キーのキーＩＤコードは、メインキーとサブキー併せて８個まで登録可能である。", "B": "一度登録したスマート（電子）キーは、他の車両に登録することはできない。", "C": "カスタマイズ機能によりスマートエントリーシステムの、有効と無効を切り替えることができる。", "D": "長期駐車時にスマートキーの電池上がりを防止するため、節電機能（節電モード）がある。"}, "explanation": "スマートキーのキーIDコードはメイン・サブの識別なく、最大「5個」まで登録可能（8個ではない）。", "source": "18年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 18, "label": "問1(18)", "points": 3, "answer": "C", "stem": "デュトロ（２０１６年モデル以降）に関する記述として、不適切なものはどれか。", "choices": {"A": "衝突被害軽減ブレーキシステム（ＰＣＳ）は、対向車、歩行者もしくは停止障害物との相対距離を検知して警報ブザーやインジケーターで運転者に注意を促す、または自動的にブレーキを作動させて衝突回避や衝突被害の軽減をします。", "B": "車線逸脱警報（ＬＤＷＳ）はカメラセンサーにより前方の車線を検知し、自車線からの逸脱を警報します。", "C": "電動パーキングシステムにダイアグが発生している場合、ＤＸⅡで読み出し、消去することができる。", "D": "一般用キーレスエントリーシステム装着車のダブルキャブ車のリヤドアにはキーレスシステム専用のカーテシスイッチが設定されており、ルームランプとは連動しない。"}, "explanation": "電動パーキングシステムのダイアグはDXⅡで読み出しはできるが、消去はできない（TC端子短絡で対応）。", "source": "18年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 19, "label": "問1(19)", "points": 3, "answer": "D", "stem": "道路運送車両法に関する記述として、不適切なものはどれか。", "choices": {"A": "自動車使用の本拠に乗車定員１０人以下で車両総重量８トン以上の自家用自動車及び乗車定員１０人以下の自動車運送事業用に供する自動車を５両以上使用している自動車運送業者は整備管理者を選任しなければならない。", "B": "三級自動車整備士の資格を取得した者は、整備管理者の資格を有する。", "C": "自家用マイクロバスを運行する者は、１日１回、その運行の開始前に日常点検をしなければならない。", "D": "自動車が保安基準に適合しなくなるおそれがある状態又は適合しない状態にあるときは、運輸支局長から改善命令を受けることがある。"}, "explanation": "整備命令を行うのは「地方運輸局長」であり、「運輸支局長」ではない。また名称も「改善命令」ではなく「整備命令」が正しい。", "source": "18年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 20, "label": "問1(20)", "points": 3, "answer": "C", "stem": "道路運送車両法に照らし、自動車の整備事業に関する記述として、適切なものはどれか。", "choices": {"A": "法令に違反した自動車分解整備事業者（認証工場）に対して、地方運輸局長が１８０日の業務停止命令を発令した。", "B": "自動車分解整備事業の認証の取消しを受けたが、その取消しの日から１年以上経過したので、認証を申請した。", "C": "普通自動車分解整備事業で認証を受けた事業者が分解整備を実施できる自動車の種類は、「普通自動車、四輪小型自動車、大型特殊自動車」である。", "D": "自動車分解整備事業者は、その事業を廃止したときは、その日から１５日以内に、その旨を地方運輸局長に届け出なければならない。"}, "explanation": "普通自動車分解整備事業で認証を受けた事業者は「普通自動車、四輪小型自動車、大型特殊自動車」の分解整備を実施できる。業務停止は90日以内が上限。認証取消後の再申請は2年以上経過後。廃止届けは30日以内。", "source": "18年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 22, "label": "問1(22)", "points": 3, "answer": "B", "stem": "道路運送車両の保安基準に関する記述として、不適切なものはどれか。", "choices": {"A": "燃料タンクの注入口及びガス抜き口は、露出した排気管の開口方向になく、かつ、排気管の開口部から３００ｍｍ以上離れていること、また露出した電気端子及び電気開閉器から２００ｍｍ以上離れている事。", "B": "車両総重量が８トン以下の自動車の突入防止装置は、車体後面の構造部が、その平面部の車両中心面に平行な鉛直面による断面の高さが１２０ｍｍ以上あって、その平面部の最外縁が後軸の車輪の最外側の内側１００ｍｍまでの間にある事。", "C": "貨物運送普通自動車及び車両総重量が８トン以上の普通車に取り付けられる巻込防止装置は、空車状態において、その下縁の高さが地上４５０ｍｍ以下、その上縁の高さが地上６５０ｍｍ以上となるように取り付けられる事。", "D": "普通自動車の車両総重量が３．５トンを超え原動機の最高出力が１５０ｋＷを超えるものについては９９ｄｂ以下、１５０ｋＷ以下のものは９８ｄｂ。車両総重量が３．５トン以下のものは９７ｄｂ以下の構造である事。"}, "explanation": "突入防止装置の「平面部の最外縁」は後軸の車輪の最外側の内側ではなく、後軸の車輪の最外側まで（またはそれ以上）延びていなければならない。", "source": "18年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 23, "label": "問1(23)", "points": 3, "answer": "A", "stem": "日野デュトロメンテナンスパックに関する記述として、不適切なものはどれか。", "choices": {"A": "対象車両は、新車日野デュトロで、用途は自家用および事業用でメンテナンス付リース車も含む。", "B": "加入可能期間は、登録日から新車１，０００ｋｍ点検実施前までになる。", "C": "対象車両が事故等により廃車となった場合、中途解約できる。", "D": "対象車両を売却・代替した場合には、中途解約できる。"}, "explanation": "日野デュトロメンテナンスパックの対象は「自家用車に限る」。事業用やメンテナンス付リース車は対象外。", "source": "18年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 24, "label": "問1(24)", "points": 3, "answer": "C", "stem": "自動車保険に関する記述として、適切なものはどれか。", "choices": {"A": "自動車損害賠償責任保険の支払いとして、ケガの場合では１５０万円が限度となっている。", "B": "自家用自動車保険は、示談代行サービス付保険で通称Ｂ・Ａ・Ｐのことである。", "C": "自動車損害賠償責任保険の支払いとして、後遺障害（第一級）では４，０００万円が限度となっている。", "D": "自動車保険は、示談代行サービスのない保険で通称Ｐ・Ａ・Ｐのことである。"}, "explanation": "自賠責保険の後遺障害第1級（常時介護を要する）の限度額は4,000万円（正しい）。傷害の限度額は120万円。P・A・Pは示談代行サービス付の自家用自動車保険。", "source": "18年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 25, "label": "問1(25)", "points": 3, "answer": "D", "stem": "サービス業態集計表に記載されている営業費カバー率の計算式として、適切なものはどれか。", "choices": {"A": "（整備売上高／総売上高）×１００", "B": "（整備売上利益／整備売上高）×１００", "C": "（整備売上利益／総売上利益）×１００", "D": "（整備売上利益／会社総経費）×１００"}, "explanation": "営業費カバー率 ＝ 整備売上利益 ÷ 会社総経費 × 100。整備の利益が会社全体の経費をどれだけカバーできるかを示す指標。", "source": "18年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 26, "label": "問1(26)", "points": 3, "answer": "C", "stem": "平成２８年排出ガス規制適合車のメンテナンスノート見直しに関する記述として、不適切なものはどれか。", "choices": {"A": "新規にVSC用電磁弁を、定期交換部品化（２年・ＡＳＳＹ）とし追加した。", "B": "ＥＧＲバルブは、定期点検継続＋定期交換推奨部品化（８０万ｋｍごと）とした。", "C": "インジェクタは、定期点検継続＋定期交換推奨部品化（５０万ｋｍごと）とした。", "D": "新規に排気バイパスバルブを、定期交換推奨部品化（８０万ｋｍごと）とし追加した。"}, "explanation": "インジェクタは定期交換推奨部品化の対象ではない（定期点検継続品目）。50万kmでの定期交換推奨は誤り。", "source": "18年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 27, "label": "問1(27)", "points": 3, "answer": "C", "stem": "安全衛生教育（法令）で定められた特別教育の内容について、不適切なものはどれか。", "choices": {"A": "研削と石の取り替えまたは試運転", "B": "最大荷重１．０トン未満のフォークリフトの運転", "C": "可燃性ガス、酸素を用いる金属の溶接、溶断", "D": "アーク溶接機を用いる金属の溶接、溶断"}, "explanation": "可燃性ガス・酸素を用いる溶接・溶断（ガス溶接）は「特別教育」ではなく「技能講習」が必要な作業。アーク溶接は特別教育の対象。", "source": "18年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 28, "label": "問1(28)", "points": 3, "answer": "C", "stem": "輪止めの使用方法に関する記述として、不適切なものはどれか。", "choices": {"A": "輪止めは、１対（２個）で使用する。", "B": "輪止めは、タイヤに確実に当てる（斜めにかけない）。足で軽く蹴って効いていることを確認する。", "C": "輪止めを「かける・外す」は車両誘導者が行う。", "D": "輪止めは、明るい色（蛍光テープ）などで目立つようにする。"}, "explanation": "輪止めを「かける・外す」は「作業者自身」が行う（車両誘導者が行うのではない）。", "source": "18年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 29, "label": "問1(29)", "points": 3, "answer": "B", "stem": "廃棄物処理に関する記述として、不適切なものはどれか。", "choices": {"A": "お客様から廃タイヤの引き取りを求められた場合は、産業廃棄物の収集運搬ならびに中間処分許可を持つ業者を紹介する。", "B": "販売会社が自ら引取る場合は、交換品下取りし引取り、廃タイヤ処分料を徴収し有価物として収集運搬、処分契約を結び処理を行なう。", "C": "整備部門でのタイヤ交換またはお客様からの引取りにより発生した廃タイヤは、有価物とし売却リサイクルすること。", "D": "お客様からの買取りや再生業者等への売却および販売・交換時の同等品の無償下取りは可能。"}, "explanation": "廃タイヤは「産業廃棄物」として適切に処理する必要がある。「有価物として収集運搬」ではなく、産業廃棄物収集運搬許可を持つ業者による適正処理が必要。", "source": "18年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 30, "label": "問1(30)", "points": 3, "answer": "D", "stem": "大規模災害発生時の対応として、不適切なものはどれか。", "choices": {"A": "社員の安否の確認と居場所（連絡先）を所在確認用社員名簿に基づき調査し、状況を把握する。", "B": "被災販売会社（もしくは日野自動車の現地調査班、近隣販売会社）はその被害状況を調査し、速やかに日野自動車に連絡する。", "C": "新車、預り車、ユーザ保有車の被害状況から、必要部品の選定を行い、早急に発注する。", "D": "車両整備要領に基づき被災車両の整備を行う。冠水による被害の場合は、修理不可とする。"}, "explanation": "冠水による被害の場合でも、修理不可と一律に判断してはならない。被害状況を確認し、修理可能な場合は整備要領に従い対応する。", "source": "18年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 31, "label": "問2(1)", "points": 5, "answer": "D", "stem": "プロフィアの故障車両がＡ販売会社へ６月１日に入庫したが、Ｂ販売会社からの指示で未修理のまま、６月１１日まで保管をした。\nＢ販売会社へ請求できる保管料（税込）として、適切なものはどれか。", "choices": {"A": "１，２９６円", "B": "１，６２０円", "C": "２，１６０円", "D": "２，９１６円", "E": "３，８８８円"}, "explanation": "入庫日翌日(6/2)から起算し7日間は無料：6/2〜6/8\n有料期間：6/9、6/10、6/11 ＝ 3日間\n3日 × 900円 ＝ 2,700円\n消費税（8%）：2,700 × 1.08 ＝ 2,916円", "source": "18年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 32, "label": "問2(2)", "points": 5, "answer": "E", "stem": "２０１８年３月、平日の２３時頃、Ａ販売会社からエンジン始動不良（他メーカー車両）のバッテリー交換（２個）の広域サービス対応依頼が入ったため、Ｂ販売会社のサービスエンジニアが１３ｋｍ先の故障車両までサービスカーで出動した。\nＡ販売会社への請求金額を（消費税込み）で計算した場合、適切なものはどれか。\n\n部品代（純正ＰＢバッテリー原価） 13,500円（１個）\n標準作業時間（バッテリー交換） 0.5時間\nＡ販売会社の工賃レート 9,500円\nＢ販売会社の工賃レート 9,000円", "choices": {"A": "６０，６７４円", "B": "６６，０７４円", "C": "７１，１８０円", "D": "７１，４７４円", "E": "７６，８７４円"}, "explanation": "答え：E（76,874円）\n\n内訳（平日深夜・他メーカー車）：\n・技術料（B社レート）：9,000×0.5h=4,500円、深夜100%割増=9,000円\n・バッテリー（PB原価×1.2）：13,500×1.2×2個=32,400円\n・サービスカー（13km）：6,000+3×400=7,200円、深夜25%割増=9,000円\n・特別対応料（深夜）：10,000+5,000=15,000円\n・消費税8%適用\n※詳細計算は解答用紙参照", "source": "18年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 1, "label": "(1)", "points": 3, "answer": "B", "stem": "見積書の記載内容に関する記述として、適切なものはどれか。", "choices": {"A": "主体作業とは、車両を構成する主要な部品、およびそれに取り付けられている部品(付帯部品)の複合した作業、作業時間の対価が工賃として計上できない作業内容。", "B": "関連作業とは、２つ以上の主要部品を取り替える場合、複合した主体作業の関連部位は、作業箇所が重複となり簡略されることにより、作業時間が縮小可能となる作業。", "C": "付帯作業とは、ある主体作業を行う場合、その主体作業とは別途な作業が必要な時のその作業。", "D": "付随作業とは、それ自体の作業時間が主体作業の範囲内に含まれて設定されており、特に作業項目は設定せず、工賃も単独では計上しないもの。"}, "explanation": "B（関連作業）が正しい説明。A：主体作業は車両の主要な部品の取り替え・修理で、作業時間を工賃として計上できる作業。C：付帯作業の説明は概ね正しいが、より正確には主体作業に付随して必要な作業。D：付随作業は主体作業の範囲内に含まれ単独計上しない作業（ほぼ正しいが「付帯作業」と混同しやすい）。", "source": "18年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 2, "label": "(2)", "points": 3, "answer": "B", "stem": "ＨＩＴＯＳＳⅡによる保証申請基本データ画面について、不適切なものはどれか。", "choices": {"A": "処理区分「１」は新規で、保証売上(有無償区分３，４，５)の整備納品書を元に、データを呼出し申請データを作成する。", "B": "処理区分「０」は照会で、保証売上されファイル内に管理されている全てのデータ内容を確認する処理で、一部項目のみデータ入力が可能である。", "C": "処理区分「３」は申請取消で、作成済申請データで送信処理前のデータを送信処理の対象から除外する処理である。", "D": "処理区分「２」は再申請で、保証申請回答連絡リストにより、「再発信依頼」申請データの一部項目を修正して、再度申請データを作成し直す処理である。"}, "explanation": "処理区分「０」は照会で、ファイル内のデータを確認する処理だが、照会モードではデータ入力はできない（一部でも入力不可）。", "source": "18年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 3, "label": "(3)", "points": 3, "answer": "C", "stem": "事故車の見積方法として、不適切なものはどれか。", "choices": {"A": "損傷は大きく分類すると、直接損傷と、間接損傷があり、目視・触手や光の反射状態を見ることで、衝撃の最終部位まで確認する。", "B": "写真撮影は正面、斜め、左右より損傷部位をいれ、正対した位置から撮影する。", "C": "作業内容の分類には主体作業・付随作業・関連作業などがあるが、交換や修理しない部品の脱着は見積書に記載しない。", "D": "分解しなければ分からない損傷個所などは、あいまいな見積をせず、別途お見積りと明記する。"}, "explanation": "交換や修理しない部品であっても、脱着が必要な場合は付帯作業として見積書に記載する必要がある。記載しないと後でトラブルになる可能性がある。", "source": "18年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 4, "label": "(4)", "points": 3, "answer": "D", "stem": "通過車両規定の保証修理に関する作業の処理方法として、不適切なものはどれか。", "choices": {"A": "現品および関係書類は即時発行する。なお現品およびその梱包には、「通過車両」と明記した荷札をつけ、送状と受領書を同封する。", "B": "元販売会社への現品到着期限は、故障発生日より２０日以内とする。", "C": "現品が元販売会社へ到着しなかった場合の損害は、実施販売会社とする。", "D": "現品の発送先は、原則として元販売会社サービスフロント宛とし、運賃は実施販売会社負担とする。"}, "explanation": "現品の発送先は原則として元販売会社「整備責任者」宛（サービスフロント宛ではない）とし、運賃は「元販売会社」負担（実施販売会社負担ではない）。", "source": "18年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 5, "label": "(5)", "points": 3, "answer": "D", "stem": "通過車両の事故や、故障車の保管料に関する記述として、適切なものはどれか。", "choices": {"A": "修理を実施したものは元販売会社に完成した旨を通知した日から起算し、７日間は無料、８日間以上は１日につき３００円とする。", "B": "修理を実施したものは元販売会社に完成した旨を通知した日の翌日から起算し、７日間は無料、８日間以上は１日につき５００円とする。", "C": "修理しないものは入庫日の翌日から起算し７日間は無料、８日間以上は１日につき５００円（小型車は３００円）とする。", "D": "修理しないものは入庫日の翌日から起算し７日間は無料、８日間以上は１日につき９００円（小型車は５００円）とする。"}, "explanation": "修理しないものの保管料は入庫日の翌日から起算し、7日間は無料。8日間以上は1日につき900円（小型車は500円）とする。", "source": "18年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 6, "label": "(6)", "points": 3, "answer": "C", "stem": "通過車両規定に関する記述として、不適切なものはどれか。", "choices": {"A": "営業時間外における対応の原則は、当該車両が目的地まで安全に運行できるための、応急処置であることとする。", "B": "修理時間は約２時間/件を目安とするが、これを超えるものについては、販売会社間相互で協議の上、対応方法を決定する。", "C": "通過車両とは、自社以外の販売会社が販売した車両を言い、流入車両、登録前車両は含まない。", "D": "実施販売会社とは、通過車両を修理対応する販売会社を言う。"}, "explanation": "通過車両とは自社以外の販売会社が販売した車両を言い、流入車両や登録前車両も含む。「含まない」は誤り。", "source": "18年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 7, "label": "(7)", "points": 3, "answer": "A", "stem": "領収書に関する記述として、不適切なものはどれか。", "choices": {"A": "領収書に貼り付ける収入印紙は、売上額に応じて印紙税額が決まっており、印紙代金は受領者負担となる。", "B": "納品書に「日付」、「宛名」、「受領権者の記名・捺印」、「金額（物品名・個数）」が記載されていれば、領収書として認められる。", "C": "名刺の裏面であっても必要項目が記載されていれば、領収書として認められる。", "D": "企業の帳簿類は、会計年度で１０年分の保管が義務付けられており、領収書も１０年分の保管が必要である。"}, "explanation": "収入印紙の印紙代金は、お金を受け取る側（受領者）ではなく「発行者（作成者）」の負担となる。", "source": "18年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 8, "label": "(8)", "points": 3, "answer": "D", "stem": "整備料金の説明と回収に関する記述として、不適切なものはどれか。", "choices": {"A": "サービス部門で販売する商品は、点検、整備という点検整備作業における「技術の提供」である。", "B": "点検・整備の価値をお客様に理解していただけるよう、必要性、効果などをわかりやすくお客様に説明することも、「機能的サービス」の一環である。", "C": "無償、有償作業を同時に行う場合、受注の時点で「料金」とその有償、無償についてお客様に説明しておく。", "D": "売掛金が回収予定日を過ぎても入金されない場合は、督促状を普通郵便や内容証明付郵便で送るなどの手段を講じることも大切である。"}, "explanation": "督促状は普通郵便ではなく、配達証明付郵便や内容証明付郵便で送付する必要がある。", "source": "18年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 9, "label": "(9)", "points": 3, "answer": "C", "stem": "手形・小切手に関する記述として、適切なものはどれか。", "choices": {"A": "小切手の取立期間は、振出日の翌日から５日以内に支払人（振出人の取引銀行）へ呈示する必要があり、その間に休日・祭日があればこれを除いて実日数となる。", "B": "手形の取立期間は、手形に記載された日から当日を含めて５日間で、その間に休日・祭日があればこれを除いて実日数となる。", "C": "小切手の取立期間は、振出日の翌日から１０日以内に支払人（振出人の取引銀行）へ呈示する必要があり、その間に休日・祭日があっても期間の延長はされない。", "D": "手形の取立期間は、手形に記載された日から当日を含めて１０日間で、その間に休日・祭日があっても期間の延長はされない。"}, "explanation": "小切手の取立期間は振出日の翌日から10日以内（当日を除く）に支払銀行へ呈示が必要で、この期間に休日祭日があっても期間の延長はない。選択肢Cが正しい。", "source": "18年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 10, "label": "(10)", "points": 3, "answer": "B", "stem": "約束手形に関する記述として、不適切なものはどれか。", "choices": {"A": "約束手形は、振出人が受取人に一定期間後、一定金額を支払うことを約束する有価証券である。", "B": "印紙が貼ってない場合、手形は無効になる。", "C": "手形金額が１００万円の場合は、２００円の収入印紙を貼る必要がある。", "D": "振出人の住所が記載されていない場合、手形は無効になる。"}, "explanation": "収入印紙が貼られていなくても手形としての効力は失われない。ただし脱税として過怠税が課される可能性がある。", "source": "18年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 11, "label": "(11)", "points": 3, "answer": "B", "stem": "ＨＩＴＯＳＳⅡ売上報告画面の「売上区分」に関する記述として、不適切なものはどれか。", "choices": {"A": "区分「１」は、一般売上区分", "B": "区分「３」は、調整赤黒区分", "C": "区分「２」は、振替区分", "D": "区分「９」は、照会区分"}, "explanation": "区分「３」は調整赤黒区分ではない。売上区分の正しい分類では、区分「3」は別の用途に割り当てられている。", "source": "18年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 12, "label": "(12)", "points": 3, "answer": "D", "stem": "通過車両の請求に関する記述として、適切なものはどれか。", "choices": {"A": "実施販売会社が、自社のレッカー車を使用した場合は、市場価格とし、振替請求額は１０％を控除する。", "B": "油脂類代は、車両整備にかかわる油脂類等の振替金額は自社売上金額の１０％を控除する。", "C": "電気、板金、塗装、機械加工等の外注作業は、市場価格を基準とし振替請求額は売上金額の２０％を控除する。", "D": "技術料割増で悪条件の場合、出張技術料の割増を５０％とすることができる。"}, "explanation": "悪条件での出張技術料割増は50%とすることができる。A：自社レッカーは市場価格基準で10%控除は正しい。B：油脂類は自社売上の20%控除が正しい。C：外注作業は市場価格基準で10%控除が正しい（20%ではない）。", "source": "18年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 13, "label": "(13)", "points": 3, "answer": "D", "stem": "通過車両規定における保険修理時の売り上げに関する記述として、不適切なものはどれか。", "choices": {"A": "外注作業部品代は、保険査定額の５％を控除。", "B": "外注作業技術料は、保険査定額の５％控除。", "C": "部品代は保険査定額の１０％控除。", "D": "技術料は、保険査定額の１０％控除。"}, "explanation": "技術料は保険査定額の5%控除（10%ではない）。保険修理時の振替控除率：技術料5%、部品代10%、外注作業技術料5%、外注作業部品代5%。", "source": "18年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 14, "label": "(14)", "points": 3, "answer": "B", "stem": "ＨＩＴＯＳＳⅡで売上報告のご用命作業明細画面に関する記述として、適切なものはどれか。", "choices": {"A": "位置区分に「２」を入力すると、納品書を印字した時に「左右」と印字される。", "B": "位置区分に「７」を入力すると、納品書を印字した時に「前」と印字される。", "C": "位置区分に「８」を入力すると、納品書を印字した時に「前後」と印字される。", "D": "位置区分に「３」を入力すると、納品書を印字した時に「後」と印字される。"}, "explanation": "位置区分「７」は「前」と印字される。HITOSSの位置区分コードの正しいマッピングではBが適切。", "source": "18年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 15, "label": "(15)", "points": 3, "answer": "C", "stem": "ひとまわり点検に関する記述として、不適切なものはどれか。", "choices": {"A": "突発的に発生する休車を未然に防止する。", "B": "自動車本来の機能を保ち、安全運行を維持する。", "C": "一日一回その運行の開始前に目視などにより点検する。", "D": "職場環境、他の改善につながる。"}, "explanation": "「一日一回その運行の開始前に目視などにより点検する」は日常点検の説明。ひとまわり点検（一回り点検）は入庫車両受付時の確認作業であり、日常点検とは異なる。", "source": "18年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 16, "label": "(16)", "points": 3, "answer": "D", "stem": "ＱＰＧ付ＦＥ２Ａに関する記述として、不適切なものはどれか。", "choices": {"A": "補助ブレーキとしてエンジンリターダーを標準で搭載しており、コントロールレバーを操作することによりエキゾーストブレーキと併用で作動する。", "B": "Ａ０５Ｃエンジンに採用されている２段過給システムは、ＶＧターボとウエストゲートターボの組み合わせを最適な条件に制御することにより常に高効率な過給を可能にし、エンジン低回転時にはＶＧターボのノズル開度を絞って高圧段ターボが主に働く。", "C": "全車ＶＳＣを標準装備しており、車両が横滑りした場合、またはスピンする危険がある場合に警報を出して運転者に知らせるとともに必要に応じてエンジンの出力及びサービスブレーキを制御し、車両の危険状態を減少させる。", "D": "トランスミッションＰＴＯをオプション設定しており、許容トルク２４５Ｎ・ｍの標準型と許容トルク３４３Ｎ・ｍの大容量型があり、大容量型はトランスミッションリターダーとの同時装着ができない。"}, "explanation": "トランスミッションPTOについてのトルク値または同時装着の可否に誤りがある。正しくは大容量型（高トルク型）とトランスミッションリターダーの同時装着に関する仕様が異なる。", "source": "18年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 17, "label": "(17)", "points": 3, "answer": "B", "stem": "問診時の注意点に関する記述として、不適切なものはどれか。", "choices": {"A": "問診とは、不具合現象を再現させるために行う。", "B": "簡単なことは、正常・異常をその場で判断するようにする。", "C": "不具合発生場所の具体的な地名を聞きあげる。", "D": "不正改造の有無を確認する。"}, "explanation": "問診は情報収集を目的とした作業であり、その場での判断は早計になりがち。正常・異常の判断は問診で得た情報をもとに、点検・確認を行ってから行う。問診時は判断よりも正確な情報収集を優先する。", "source": "18年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 18, "label": "(18)", "points": 3, "answer": "D", "stem": "２ＤＧ付ＳＨ車に関する記述として、不適切なものはどれか。", "choices": {"A": "カプラー本体のキングピン径がＪＩＳ、ＳＡＥ、ＩＳＯ規格で定められた２インチのものであれば連結可能である。", "B": "スライドカプラーが設定されたことにより、駆動軸がスリップしてしまうような場合、オフセット位置を変更できるようになった。", "C": "第５輪荷重１１．５トン車の追加仕様にともない、スライドカプラーベースを新たに設定した。", "D": "積荷の状態、道路状況および車速に応じ、ローリング角度をコントロールするローリングストッパーが新たに設けられた。"}, "explanation": "ローリングストッパーは積荷の状態・道路状況・車速に応じてローリング角度をコントロールするものではなく、固定された機械的なストッパー機能として設けられた装置である。", "source": "18年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 19, "label": "(19)", "points": 3, "answer": "D", "stem": "道路運送車両法に関する記述で、次の文章の[ ]に当てはまる組み合わせのうち、適切なものはどれか。\n\n「道路運送車両法は、道路運送車両に関し、所有権について[①]を行い、並びに安全性の確保及び公害の防止その他の[②]並びに整備について技術の向上を図り、併せて自動車の整備事業の[③]に資することにより、公共の福祉を増進することを目的とする。」", "choices": {"A": "①交渉等　②環境の保全　③健全な発達", "B": "①公証等　②環境の管理　③健全な発達", "C": "①公証等　②環境の保全　③健全な育成", "D": "①公証等　②環境の保全　③健全な発達"}, "explanation": "道路運送車両法第1条の目的規定：所有権について「公証等」を行い、「環境の保全」を図り、整備事業の「健全な発達」に資することが目的。", "source": "18年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 20, "label": "(20)", "points": 3, "answer": "B", "stem": "道路運送車両法の保安基準に照らし、後部反射器（平成１８年１月１日以降）に関する記述として、不適切なものはどれか。", "choices": {"A": "後部反射器の取付け高さは、地上１．５ｍ以下であること。", "B": "後部反射器は、夜間にその後方３００mの距離から走行用前照灯で照射した場合にその反射光を照射位置から確認できるものであること。", "C": "後部反射器による反射光の色は、赤色であること。", "D": "後部反射器は反射器が損傷し、又は反射面が著しく汚損しているものでないこと。"}, "explanation": "後部反射器は夜間に後方100ｍの距離から走行用前照灯で照射した場合に反射光を確認できるものでなければならない。300ｍは誤り。", "source": "18年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 21, "label": "(21)", "points": 3, "answer": "B", "stem": "地方運輸局長から出される「整備命令」の対象者として、適切なものはどれか。", "choices": {"A": "自動車分解整備事業者", "B": "自動車の使用者", "C": "自動車を整備した自動車整備士", "D": "整備管理者"}, "explanation": "整備命令は「自動車の使用者」に対して地方運輸局長から出される命令。自動車が保安基準に適合しなくなるおそれがある状態の場合、使用者に整備を命じる。", "source": "18年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 22, "label": "(22)", "points": 3, "answer": "B", "stem": "道路運送車両法において、６ヶ月ごとに点検をしなければならない自動車として、適切なものはどれか。", "choices": {"A": "車両総重量８．５トンの自家用トラック", "B": "車両総重量７トンの自家用トラック", "C": "乗車定員１２人の自家用バス", "D": "事業用の軽四輪トラック"}, "explanation": "車両総重量8トン未満の自家用貨物自動車（自家用トラック）は6か月ごとの定期点検が必要。車両総重量8トン以上の自家用自動車は3か月ごと。乗車定員11人以上の自家用バスは3か月ごと。", "source": "18年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 23, "label": "(23)", "points": 3, "answer": "D", "stem": "日野デュトロメンテナンスパックに関する記述として、不適切なものはどれか。", "choices": {"A": "対象車種は日野自動車販売会社において販売された日野デュトロの新車で、用途は自家用に限る。", "B": "加入期間は、登録日から新車１，０００ｋｍ点検実施前までとなり、以降の途中入会はできない。", "C": "レンタカーおよびメンテナンス付リース車は、対象外である。", "D": "点検は、全国の販売会社で実施できる。"}, "explanation": "デュトロメンテナンスパックの点検は全国の販売会社ではなく、指定された販売会社（販売した販売会社や指定工場）で実施する。", "source": "18年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 24, "label": "(24)", "points": 3, "answer": "C", "stem": "自動車保険に関する記述として、適切なものはどれか。", "choices": {"A": "Ｂ・Ａ・Ｐ（Ｂａｓｉｃ Ａｕｔｏｍｏｂｉｌｅ Ｐｏｌｉｃｙ）とは自家用乗用車、自家用貨物車など自家用車のみが対象で、示談代行サービスのない保険である。", "B": "自動車運転者損害賠償責任保険とは、運転者が所有している車両にかける保険である。", "C": "自賠責保険の保険金額の限度額は、怪我の場合１２０万円、死亡の場合は３，０００万円、後遺障害（第１級）で４，０００万円である。", "D": "被害者は加害者の加入している保険会社に、賠償額が確定するまで支払請求できないので、賠償額が確定するまで保険金を受け取れない。"}, "explanation": "A：B・A・Pは全ての自動車が対象（自家用のみではない）。B：自動車運転者損害賠償責任保険は他人の車やレンタカーを借りて運転する際に付ける保険。D：賠償額確定前でも仮渡金として受け取れる。C（自賠責保険の限度額）が正しい。", "source": "18年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 25, "label": "(25)", "points": 3, "answer": "D", "stem": "予防整備拡大コンテスト（実施期間２０１８年７月１日～９月３０日）の内容に関する記述として、不適切なものはどれか。", "choices": {"A": "目的として定期交換部品の交換促進をとおして、重大事故、車両火災、路上故障等の防止を図る。", "B": "内容として車検・定期点検入庫車に対象品目の整備提案を行い、付帯作業を拡大する。", "C": "部門として、定期交換部品部門、油脂部門、エレメント部門、定期点検部門の４部門がある。", "D": "実績算出方法は、部門毎の対象品目 交換実績合計÷入庫台数"}, "explanation": "実績算出方法は単純な「交換実績÷入庫台数」ではなく、部門毎に定められた特定の計算方法（提案率や実施率など）が用いられる。", "source": "18年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 26, "label": "(26)", "points": 3, "answer": "D", "stem": "伝票仕掛日数に関する記述として、適切なものはどれか。", "choices": {"A": "伝票仕掛日数＝仕掛件数÷（直近１ヶ月の入庫台数÷稼働日数）", "B": "伝票仕掛日数＝仕掛件数÷（直近２ヶ月の入庫台数÷稼働日数）", "C": "伝票仕掛日数＝仕掛件数÷（直近３ヶ月の入庫台数÷稼働日数）", "D": "伝票仕掛日数＝仕掛件数÷（直近６ヶ月の入庫台数÷稼働日数）"}, "explanation": "伝票仕掛日数は「仕掛件数÷（直近６ヶ月の入庫台数÷稼働日数）」で計算する。直近6ヶ月の実績を基準にすることで安定した数値が得られる。", "source": "18年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 27, "label": "(27)", "points": 3, "answer": "C", "stem": "日野自動車ホームページに記載されている環境に関する記述として、不適切なものはどれか。", "choices": {"A": "「日野環境チャレンジ２０５０」は車両走行時のＣＯ２削減等６つのチャレンジ項目を抱えた日野グループ共通のチャレンジ目標である。", "B": "日野自動車は車両の大きさ、移動距離、使用場所・用途を踏まえ、ＥＶ車やＰＨＶ車を開発し、ＣＯ２削減に貢献している。", "C": "ＬＣＡ（ライフサイクルアセスメント）とは製品が製造、使用され最終的に廃棄されるまでのライフサイクルで環境負荷を定性的に把握することである。", "D": "ＬＣＡ（ライフサイクルアセスメント）を用いて日野製トラックのＣＯ２排出量を把握すると、走行中の排出量が約９０％となっている。"}, "explanation": "ＬＣＡ（ライフサイクルアセスメント）は環境負荷を「定性的」ではなく「定量的」に把握するための手法。数値で環境影響を評価することが特徴。", "source": "18年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 28, "label": "(28)", "points": 3, "answer": "D", "stem": "危険物に関する記述として、不適切なものはどれか。", "choices": {"A": "第一石油類とは、ガソリン・ブレーキクリーナーが該当する。", "B": "第三石油類とは、重油・ＡＴ油が該当する。", "C": "第四石油類とは、エンジンオイル・Ｔ／Ｍオイル・Ｄ／Ｆオイルが該当する。", "D": "第二石油類とは、ＰＳオイル・ブレーキフルードが該当する。"}, "explanation": "ＰＳオイル（パワーステアリングオイル）は第三石油類に該当する。第二石油類は灯油・軽油などが該当する。ブレーキフルードも第三石油類扱いとなる。", "source": "18年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 29, "label": "(29)", "points": 3, "answer": "C", "stem": "安全衛生教育（法令）で定められた特別教育の種別について、不適切なものはどれか。", "choices": {"A": "研削と石の取り替えまたは試運転", "B": "最大荷重１．０トン未満のフォークリフトの運転", "C": "可燃性ガス、酸素を用いる金属の溶接、溶断", "D": "アーク溶接機を用いる金属の溶接、溶断"}, "explanation": "可燃性ガス・酸素を用いる金属の溶接・溶断については「特別教育」ではなく「技能講習」の修了者等の資格が必要となる。アーク溶接などは特別教育の対象。", "source": "18年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 30, "label": "(30)", "points": 3, "answer": "D", "stem": "大規模災害発生時の対応として、不適切なものはどれか。", "choices": {"A": "社員の安否の確認と居場所（連絡先）を所在確認用社員名簿に基づき調査し、状況を把握する。", "B": "被災販売会社（もしくは日野自動車の現地調査班、近隣販売会社）はその被害状況を調査し、速やかに日野自動車に連絡する。", "C": "新車、預り車、ユーザ保有車の被害状況から、必要部品の選定を行い、早急に発注する。", "D": "車両整備要領に基づき被災車両の整備を行う。冠水による被害の場合は、修理不可とする。"}, "explanation": "冠水による被害であっても、修理不可と一律に判断してはならない。被害状況を確認し、適切な整備要領に基づいて対応する。冠水車両にも適切な点検・整備手順がある。", "source": "18年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 1, "label": "問1(1)", "points": 3, "answer": "B", "stem": "外注依頼の基本業務フローに関する記述として、適切なものはどれか。", "choices": {"A": "外注業者に作業を依頼する場合は、納品までに「外注依頼書」を必ず発行する。", "B": "作業追加が発生した場合は、「外注依頼書」を追加発行する。", "C": "代金未決で「外注依頼書」は発行できないので「補充書面」に「代金決定予定期日」を記載の上発行する。", "D": "代金未決で発注した場合は、遅くとも外注作業着工までに代金を決定させ「外注依頼書」を交付する。"}, "explanation": "A→外注依頼書は「発注まで」に発行する（納品までではない）。C→「代金決定予定期日」を明示した「外注依頼書」を発行する（補充書面ではない）。D→代金未決で発注した場合、遅くても「納品前」までに代金を決定させ「補充書面」を交付する。", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 2, "label": "問1(2)", "points": 3, "answer": "A", "stem": "保証制度に関する記述として、不適切なものはどれか。", "choices": {"A": "日野自動車の保証制度は、販売会社・日野自動車がそれぞれの約束を結び、この約束によって成り立っている。", "B": "販売会社はお客様との売買契約で、保証書に記載されている期間と条件に従って保証修理することを約束している。", "C": "販売会社は日野販売会社基本契約書に基づき、日野自動車に代わって保証修理を実施することを約束している。", "D": "販売会社は、お客様より保証書に記載された期間と条件に適合する申し出を受けた場合は保証修理を断ることができない。"}, "explanation": "日野自動車の保証制度は、お客様・販売会社・日野自動車の三者がそれぞれの約束を結び、この約束によって成り立っている（販売会社と日野自動車だけではない）。", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 3, "label": "問1(3)", "points": 3, "answer": "C", "stem": "保証の種類に関する記述として、不適切なものはどれか。", "choices": {"A": "自動車の保証とは日野が出荷する完成車両に対し、日野が発行する保証書に基づいて実施する保証を言う。", "B": "補給部品の保証は、日野の保証書に記載する一般保証部品に準じる。", "C": "日野が補給するリンク品の保証はリンク品保証書に基づき保証修理を行う。", "D": "汎用エンジンの保証とは、汎用エンジンに添付された保証書に基づく保証を言う。"}, "explanation": "リンク品の保証はメーカ内規保証修理に基づく保証を言い、リンク品には保証書は無い。", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 4, "label": "問1(4)", "points": 3, "answer": "D", "stem": "板金修理の見積書で、キャブ回りの標準的な記載順序として、適切なものはどれか。", "choices": {"A": "①フロントボデー ②フロア ③ルーフ ④サイドボデー ⑤リヤボデー", "B": "①フロントボデー ②フロア ③サイドボデー ④リヤボデー ⑤ルーフ", "C": "①フロントボデー ②ルーフ ③フロア ④サイドボデー ⑤リヤボデー", "D": "①フロントボデー ②サイドボデー ③リヤボデー ④ルーフ ⑤フロア"}, "explanation": "キャブ回りの標準的な記載順序は、①フロントボデー ②サイドボデー ③リヤボデー ④ルーフ ⑤フロア。", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 5, "label": "問1(5)", "points": 3, "answer": "A", "stem": "通過車両規定の業務処理要領に関する記述として、不適切なものはどれか。", "choices": {"A": "HITOSSⅡに優良客（Ｓ）として登録されていれば、１件５万円以上になると思われる作業の場合でも元販売会社へ確認しなくてもよい。", "B": "技術料割増は、定時間内に作業完了した場合には適用なし。", "C": "技術料割増は、悪条件の場合は元販売会社へ事前連絡の上、出張技術料割増を５０％とすることができる。", "D": "純正部品は定価（Ｌ／Ｐ）の２０％を控除する。ただし特定部品は定価の１０％を控除する。"}, "explanation": "「お客様登録リスト」に優良客登録されていても、次の場合は元販売会社へ確認が必要：・保証修理の対象と思われるもの・事故修理・他メーカー車の修理・1件5万円以上になると思われる場合。", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 6, "label": "問1(6)", "points": 3, "answer": "B", "stem": "通過車両規定の業務処理要領に関する記述として、不適切なものはどれか。", "choices": {"A": "整備保証等に関する処理方法で再修理等、整備保証に関する事項が発生した場合は販売会社間相互で協議して、その都度解決する。", "B": "現金貸出し等の取扱い方法で現金の貸出し、立替払い等は原則として行わない。ただし、販売会社間相互間において了解が成立した場合は、翌月までに現金を送付すればよい。", "C": "「通過車両お客様リスト」に登録されていないお客様の車両修理時は販売会社間相互間で必ず事前連絡の上、元販売会社の了承を得てから実施するものとし、承認者欄に担当者名を入力し必ず請求書に明記する。", "D": "通過車両対応上の整備内容や金銭トラブルは原則として当事者間で解決するよう努力し協議する。どうしても解決がつかない場合は、日野自動車のサービス部が仲裁を行う。"}, "explanation": "現金の貸出し、立替払い等は原則として行わない。ただし、販売会社間相互間において了解が成立した場合は、その都度ファクシミリにより確認を行った上、「即日」現金を送付または振込する（翌月ではない）。", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 7, "label": "問1(7)", "points": 3, "answer": "A", "stem": "売掛金に関する記述として、不適切なものはどれか。", "choices": {"A": "時効の成立を中断させるため、請求書を再度送付した。", "B": "取引先が倒産してしまったので、回収は出来ない。", "C": "支払いに懸念のあるお客様と、現金取引を行った。", "D": "時効は２年である。"}, "explanation": "民法第173条により債権は2年間で短期消滅時効となる。請求書を再度送付しただけでは時効の中断にはならない（中断には裁判上の請求・差押・承認などが必要）。", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 8, "label": "問1(8)", "points": 3, "answer": "C", "stem": "手形・小切手に関する記述として、適切なものはどれか。", "choices": {"A": "裏書人の住所が記載されていないため、小切手としての効力を失った。", "B": "実際に振出した日付よりも後の日付けを記載したため効力を失った。", "C": "手形の取り立て期間は、記載された日から２日、当日を含め３日間となる。", "D": "振出人は、通知預金口座に入金を行う。"}, "explanation": "A→裏書の年月日、裏書人の住所は法律上の記載要件ではない（効力を失わない）。B→実際に振出した日付より後の日付を記載したものを「先日付小切手」という（効力を失わない）。D→振出人は「当座預金口座」に入金する（通知預金ではない）。", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 9, "label": "問1(9)", "points": 3, "answer": "D", "stem": "月次業態での値引き率の算出として、適切なものはどれか。", "choices": {"A": "回収値引率 ＝ (回収値引額＋売上値引額) ／ （値引後の有償売上高＋回収値引額＋売上値引額）×１００", "B": "総値引率 ＝ 回収値引額 ／ （値引後の有償売上高 ＋ 回収値引額 ＋ 売上値引額）×１００", "C": "回収値引率 ＝ (回収値引額＋売上値引額) ／ （有償売上高＋回収値引額＋売上値引額）×１００", "D": "総値引率 ＝ (回収値引額＋売上値引額) ／ （値引後の有償売上高＋回収値引額＋売上値引額）×１００"}, "explanation": "正しい算出式：\n回収値引率 = 回収値引額 ÷ (値引後の有償売上高＋回収値引額＋売上値引額)×100\n総値引率 = (回収値引額＋売上値引額) ÷ (値引後の有償売上高＋回収値引額＋売上値引額)×100", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 10, "label": "問1(10)", "points": 3, "answer": "B", "stem": "手形や小切手に関する記述で、［ ］内に当てはまるものとして、適切なものはどれか。\n\n「手形や小切手が不渡りになったとしても、振出人などに支払義務があることに変わりはなく、請求の権利は振出人に対して手形の場合は［イ］、小切手の場合は［ロ］で時効、裏書人に対しては手形の場合は［ハ］、小切手の場合は［ニ］で時効となる。」", "choices": {"A": "［イ］６ヶ月　［ロ］３ヶ月　［ハ］１年　［ニ］６ヶ月", "B": "［イ］３年　　［ロ］６ヶ月　［ハ］１年　［ニ］６ヶ月", "C": "［イ］６ヶ月　［ロ］１年　　［ハ］６ヶ月　［ニ］３ヶ月", "D": "［イ］１年　　［ロ］６ヶ月　［ハ］３年　　［ニ］１年"}, "explanation": "振出人に対して：手形は3年、小切手は6ヶ月で時効。裏書人に対して：手形は1年、小切手は6ヶ月で時効。", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 11, "label": "問1(11)", "points": 3, "answer": "D", "stem": "HITOSSⅡで使用する作業ＣＤに関する記述として、不適切なものはどれか。", "choices": {"A": "「３１０」から始まる作業ＣＤは、「ブレーキおよびアクスル」関係コード。", "B": "「６００」から始まる作業ＣＤは、「フレーム、ボデーおよびキャブ」関係コード。", "C": "「５００」から始まる作業ＣＤは、「サスペンション」関係コード。", "D": "「７００」から始まる作業ＣＤは、「ステアリング」関係コード。"}, "explanation": "作業CD「700」から始まる作業CDは「電装品」関係コード。「ステアリング」は「400」から始まるコード。", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 12, "label": "問1(12)", "points": 3, "answer": "D", "stem": "通過車両規定に照らし事故車や故障車の保管料に関する記述として、不適切なものはどれか。", "choices": {"A": "修理しないものは、入庫日の翌日から起算し、７日間は無料。８日間以上は１日につき９００円とする。", "B": "修理しない小型車は、入庫日の翌日から起算し、７日間は無料。８日間以上は１日につき５００円とする。", "C": "保管料の振替割引は行なわない。", "D": "修理を実施したものは、元販売会社宛に完成した旨を通知した日の翌日から起算し、７日間は無料。８日間以上は１日につき２００円とする。"}, "explanation": "修理を実施したものの保管料は、元販売会社宛に完成した旨を通知した日の翌日から起算し、7日間は無料。8日間以上は1日につき「300円」とする（200円ではない）。", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 13, "label": "問1(13)", "points": 3, "answer": "C", "stem": "通過車両規定に照らし通過車両の売上に関する記述として、不適切なものはどれか。", "choices": {"A": "純正ＰＢバッテリーの原価（ＤＮ）の２０％増しを、振替金額とする。", "B": "特定部品は、定価の１０％を控除する。", "C": "車両整備にかかわる油脂類等の振替価格は、自社売上金額の１０％を控除する。", "D": "保険による場合、保険外の場合を問わず修理実施しない時、見積料金の３％請求できる。"}, "explanation": "車両整備にかかわる油脂類等の振替価格は、自社売上金額の「20％」を控除する（10%ではない）。", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 14, "label": "問1(14)", "points": 3, "answer": "B", "stem": "通過車両規定において、事故保険修理売上に関する記述として、適切なものはどれか。", "choices": {"A": "技術料は保険査定額１０％控除。", "B": "部品代は保険査定額１０％控除。", "C": "外注作業技術料は保険査定額１０％控除。", "D": "外注作業部品代は保険査定額１０％控除。"}, "explanation": "事故保険修理売上：技術料→5%控除、部品代→10%控除（正しい）、外注作業技術料→5%控除、外注作業部品代→5%控除。", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 15, "label": "問1(15)", "points": 3, "answer": "D", "stem": "ポストポスト新長期プロフィアのドライバーシートに関する記述として、適切なものはどれか。", "choices": {"A": "高機能シート、標準シート、廉価シートの３種類が設定されている。", "B": "エアサスペンションシートが全車標準装備されている。", "C": "高機能シートの強制排気機能は緊急時のみ作動し、エアスプリングのエアを強制的に排出し、脱出性を向上させている。", "D": "高機能シートは、シートベルトをシート付けとすることで、首と腹締まりの改善を図っている。"}, "explanation": "A→高機能シートと標準シートの2種類（廉価シートはない）。B→標準シートは装着仕様/なしの設定あり（全車標準ではない）。C→強制排気機能は乗降時に使用することでステアリングとシートクッション間のスペースが拡大し、乗降性が向上する（緊急時のみではない）。", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 16, "label": "問1(16)", "points": 3, "answer": "C", "stem": "ひとまわり点検に関する記述として、不適切なものはどれか。", "choices": {"A": "突発的に発生する休車を未然に防止する。", "B": "自動車本来の機能を保ち、安全運行を維持する。", "C": "一日一回その運行の開始前に目視などにより点検する。", "D": "職場環境、他の改善につながる。"}, "explanation": "「一日一回その運行の開始前に目視などにより点検する」のは「日常点検」の定義であり、ひとまわり点検ではない。ひとまわり点検はお客様が気づいていない不具合を発見する能動的な点検。", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 17, "label": "問1(17)", "points": 3, "answer": "A", "stem": "デュトロ（２０１６年モデル以降）のスマートエントリー＆スタートシステムに関する記述として、不適切なものはどれか。", "choices": {"A": "スマート（電子）キーのキーＩＤコードは、メインキーとサブキー併せて８個まで登録可能である。", "B": "一度登録したスマート（電子）キーは、他の車両に登録することはできない。", "C": "カスタマイズ機能によりスマートエントリーシステムの、有効と無効を切り替えることができる。", "D": "長期駐車時にスマートキーの電池上がりを防止するため、節電機能（節電モード）がある。"}, "explanation": "スマートキーのキーIDコードはメイン、サブの識別は無く、最大「5個」まで登録可能（8個ではない）。", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 18, "label": "問1(18)", "points": 3, "answer": "D", "stem": "ＱＰＧ付ＦＥ２Ａに関する記述として、不適切なものはどれか。", "choices": {"A": "補助ブレーキとしてエンジンリターダーを標準で搭載しており、コントロールレバーを操作することによりエキゾーストブレーキと併用で作動する。", "B": "Ａ０５Ｃエンジンに採用されている２段過給システムは、ＶＧターボとウエストゲートターボの組み合わせを最適な条件に制御することにより常に高効率な過給を可能にし、エンジン低回転時にはＶＧターボのノズル開度を絞って高圧段ターボが主に働く。", "C": "全車ＶＳＣを標準装備しており、車両が横滑りした場合、またはスピンする危険がある場合に警報を出して運転者に知らせるとともに必要に応じてエンジンの出力及びサービスブレーキを制御し、車両の危険状態を減少させる。", "D": "トランスミッションＰＴＯをオプション設定しており、許容トルク２４５Ｎ・ｍの標準型と許容トルク３４３Ｎ・ｍの大容量型があり、大容量型はトランスミッションリターダーとの同時装着ができない。"}, "explanation": "標準型も大容量型もリターダーと同時装着できる（大容量型はリターダーとの同時装着不可は誤り）。", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 19, "label": "問1(19)", "points": 3, "answer": "C", "stem": "次の文章の［ ］に当てはまるものとして、適切なものはどれか。\n\n「道路運送車両法の保安基準」に照らし、車両総重量が車両重量の１．２倍以下の自動車は右側および左側に、それぞれ［ ］まで傾けた場合に転覆しないこと。", "choices": {"A": "２０°", "B": "２５°", "C": "３０°", "D": "３５°"}, "explanation": "自動車は空車状態において、左側および右側にそれぞれ35°まで傾けた場合に転覆しないこと。ただし、車両総重量が車両重量の1.2倍以下の自動車は、30°まで傾けた場合に転覆しなければよい。", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 20, "label": "問1(20)", "points": 3, "answer": "B", "stem": "「道路運送車両法」に照らし、長さ４．６８ｍ、幅１．６５ｍ、高さ１．８７ｍで原動機の総排気量が２．８９リットルのジーゼルエンジンの自動車の種別として、適切なものはどれか。", "choices": {"A": "軽自動車", "B": "小型自動車", "C": "普通自動車", "D": "大型特殊自動車"}, "explanation": "小型自動車で軽油、天然ガスを燃料とする自動車については、総排気量の基準の適用はない。長さ4.7m以下、幅1.7m以下、高さ2.0m以下の条件を満たすため小型自動車。", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 21, "label": "問1(21)", "points": 3, "answer": "C", "stem": "「道路運送車両法」及び「道路運送車両法施行規則」に照らし、分解整備に該当するものはどれか。", "choices": {"A": "トーションバースプリングを取外して行う作業。", "B": "トルクロッドを取外して行う作業。", "C": "ＡＢＳアクチュエーターを取外して行う作業。", "D": "スタビライザーを取外して行う作業。"}, "explanation": "ABSアクチュエータを取外して行う作業は分解整備に該当する（制動装置の分解整備）。", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 22, "label": "問1(22)", "points": 3, "answer": "A", "stem": "「道路運送車両法」及び「道路運送車両法の保安基準の細目を定める告示」に照らし、リアオーバーハングの限度の基準に関する記述として、適切なものはどれか。", "choices": {"A": "物品を車体の後方へ突出して積載するおそれのある自動車は、最遠軸距の２分の１である。", "B": "物品を車体の後方へ突出して積載するおそれのある自動車は、最遠軸距の３分の１である。", "C": "物品を後方へ突出して積載するおそれのある自動車のうち小型自動車は、最遠軸距の３０分の１１である。", "D": "物品を突出して積載するおそれのない自動車は、最遠軸距の２分の１である。"}, "explanation": "B→3分の1ではなく2分の1が正しい。C→30分の11ではなく20分の11が正しい。D→物品を突出して積載するおそれのない自動車は最遠軸距の3分の1。A→最遠軸距の2分の1（正しい）。", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 23, "label": "問1(23)", "points": 3, "answer": "B", "stem": "日野メンテナンスリースに関する記述として、不適切なものはどれか。", "choices": {"A": "基本契約のＳプランでは、パワーステアリングオイル交換も含まれる。", "B": "基本契約のＭプランでは、テールパイプ交換も含まれる。", "C": "基本契約のＲプランでは、エアコン・オーバーホールも含まれる。", "D": "基本契約のＳプランでは、エアークリーナエレメント交換も含まれる。"}, "explanation": "テールパイプは臨時整備なので交換できるのはRプランである（MプランではなくRプラン）。", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 24, "label": "問1(24)", "points": 3, "answer": "A", "stem": "日野プレミアムサポートに関する記述として、不適切なものはどれか。", "choices": {"A": "対象車種は日野プロフィア、日野レンジャー、日野デュトロ、リエッセⅡである。", "B": "自動車保険（リースカー車両費用補償特約つき）に「日野オリジナル補償」が無償でプラスされる専用プランである。", "C": "フロントガラスが飛び石やいたずら等により損害が生じ、修理した場合、自動車保険を使わなくても修理限度額５万円まで「日野オリジナル補償」で補償する。", "D": "事故やいたずら等によりタイヤのパンク損害（単独損害のみ）を被った場合、修理限度額１万円まで「日野オリジナル補償」で補償する。"}, "explanation": "対象車にリエッセⅡは含まれない（プロフィア、レンジャー、デュトロが対象）。", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 25, "label": "問1(25)", "points": 3, "answer": "C", "stem": "自賠責保険に関する記述として、不適切なものはどれか。", "choices": {"A": "傷害による保険金の限度額は１２０万円である。", "B": "後遺障害第１級（常時介護を要する場合）の保険金の限度額は４，０００万円である。", "C": "死亡による保険金の限度額は２，５００万円である。", "D": "後遺障害第１級（介護を必要としない）の保険金の限度額は３，０００万円である。"}, "explanation": "死亡による保険金額の限度額は「3,000万円」である（2,500万円ではない）。", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 26, "label": "問1(26)", "points": 3, "answer": "B", "stem": "日野デュトロメンテナンスパックに関する記述として、不適切なものはどれか。", "choices": {"A": "対象車が廃車となった場合は解約できる。", "B": "対象車種は販売会社にて販売された新車で、用途での規制はない。", "C": "レンタカーは、対象外である。", "D": "加入期間は、登録日から新車１，０００ｋｍ点検実施前までとなり、以降の途中入会はできない。"}, "explanation": "日野デュトロメンテナンスパックは「自家用車」に限る（用途での規制がある）。", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 27, "label": "問1(27)", "points": 3, "answer": "B", "stem": "ヘルメットおよび保護メガネの着用に関する記載として、不適切なものはどれか。", "choices": {"A": "グラインダー等の軽作業時は、保護メガネの着用が法令にて定められている。", "B": "腐食性の液体、バッテリー液を取り扱う作業時は、日野の安全ルールとして保護メガネの着用を推奨している。", "C": "１メートル以上の準高所作業（２メートル以下）時は、日野の安全ルールとしてヘルメットの着用を推奨している。", "D": "天井クレーン操作時は、ヘルメットの着用が法令にて定められている。"}, "explanation": "腐食性の液体、バッテリー液を取り扱う作業時は、保護メガネの着用が「推奨」ではなく「法令で定められている」。", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 28, "label": "問1(28)", "points": 3, "answer": "A", "stem": "地下廃油タンク（１５年未満）に関する記述として、不適切なものはどれか。", "choices": {"A": "地下タンクは、週１回検知孔での漏洩検査を行い記録を２年間保存すること。", "B": "地下タンクは、３年以内毎に漏洩点検を行うこと。", "C": "漏洩の早期発見のため、給油量（廃油タンクは処分または売却量）とタンク残量を毎日記録、管理すること。", "D": "設置後１５年を超える全ての地下タンクは、１年に１回気密測定を行うこと。"}, "explanation": "全ての地下タンクは、週1回検知孔での漏洩検査を行い記録を「3年間」保存すること（2年間ではない）。", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 29, "label": "問1(29)", "points": 3, "answer": "C", "stem": "出張作業に関する記述として、不適切なのはどれか。", "choices": {"A": "故障現場が一般道路の自動車専用道路、交通量が多く安全が確保できないバイパス等の場合は、警察へ緊急案件として危険通報を行い指示を受けること。", "B": "故障現場到着後は①安全対策を実施、②お客様の安全を確保した後に作業を開始する。", "C": "道路公団等の後方警戒者より早く到着した場合は、できる限りの安全対策を施し、後方警戒者が到着したら作業を開始する。", "D": "故障現場到着後、作業者は安全対策を施す前に、必ず故障車より１００ｍ以上後方に発炎筒を設置して、後続車に危険を知らせる。"}, "explanation": "後方警戒者が到着したら「処置方法等の打合せを行ってから」作業を開始する（到着したらすぐ開始ではない）。また発炎筒は故障車の100m後方に設置する。", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 30, "label": "問1(30)", "points": 3, "answer": "D", "stem": "「日野自動車 販売会社 環境マネジメントシステム」に関する記述として、不適切なものはどれか。", "choices": {"A": "日野販売会社が求められる環境面の法的・社会的要求を予め販社環境ガイドラインに定め、適合する拠点をエコマネジメントディーラーとして認定。環境リスク低減と法令順守により経営基盤をより強固にすることを目的としている。", "B": "ＩＳＯ１４００１は、経営管理の一環として環境保全活動の管理サイクル（ＰＤＣＡ）を回して環境リスクを管理、環境影響を継続的に改善する仕組みで国際規格である。", "C": "適用範囲は日野自動車と日本国内で販売会社基本契約を締結して車両と部品の販売、および車両整備を行なう日野販売会社を会計上の連結、非連結を問わず対象としている。", "D": "日野自動車は不適合の是正を確認して、２年に１度ＥＭＤ（エコマネジメントディーラー）認定をする。"}, "explanation": "日野自動車は不適合の是正を確認して、「毎年」EMD（エコ・マネジメントディーラー）認定をする（2年に1度ではない）。", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 31, "label": "問2(1)", "points": 5, "answer": "C", "stem": "通過車両規定に照らし、平日の定時間内にサービスカーを使用して片道２５ｋｍを、やむを得ない事情で２往復し出張作業を行った。\n依頼販売会社へのサービスカー使用料振替金額（消費税込）として、適切なものはどれか。", "choices": {"A": "２１，３８４円", "B": "１５，５５２円", "C": "１７，４９６円", "D": "１９，４４０円", "E": "１９，００８円"}, "explanation": "出発地点から到着地点まで、片道25kmを2往復した場合：\n走行距離：25km×2往復×2=100km（片道として最遠は25km）\n基本料：6,000円＋(40km×300円)=18,000円\n振替割引（10%控除）：18,000×0.9=16,200円\n消費税（8%）：16,200×1.08=17,496円", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 32, "label": "問2(2)", "points": 5, "answer": "A", "stem": "通過車両規定に照らし、平日の定時間内に通過車両の修理を、下記内容で行った。元販売会社への振替料金（消費税込）として、適切なものはどれか。\n\n技術料：２５，０００円（税抜）\n部品代（定価）：３０，０００円（税抜）\n\n（注）答えが小数点以下になる場合は、小数点以下第１位を四捨五入しなさい。", "choices": {"A": "４７，５２０円", "B": "５９，４００円", "C": "５０，７８２円", "D": "５３，４６０円", "E": "４４，０００円"}, "explanation": "技術料振替金額：25,000×(1-0.2)=20,000円\n部品代振替金額：30,000×(1-0.2)=24,000円\n合計振替金額：44,000円\n税込み料金：44,000×1.08=47,520円", "source": "19年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 1, "label": "(1)", "points": 3, "answer": "B", "stem": "外注依頼の基本業務フローに関する記述として、不適切なものはどれか。", "choices": {"A": "外注業者に作業を依頼する場合は、発注時に「外注依頼書」を必ず発行する。", "B": "追加の作業が発生した場合は、「補充書面」を追加で発行する。", "C": "代金未決で「外注依頼書」を発行する場合は、「代金決定予定期日」を明示する。", "D": "代金未決で発注した場合は、遅くとも納品までに「補充書面」を交付する。"}, "explanation": "追加の作業が発生した場合は「補充書面」ではなく「外注依頼書」を追加発行する。", "source": "19年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 2, "label": "(2)", "points": 3, "answer": "D", "stem": "保証制度に関する記述として、不適切なものはどれか。", "choices": {"A": "販売会社は、お客様より保証書に記載された期間と条件に適合する申し出を受けた場合は保証修理を断ることができない。", "B": "保証制度は約束によって成り立っており、お互いに約束（契約）を守って、正しく運用しなければならない。約束（契約）違反は信頼関係を損ない、重大問題に発展する。", "C": "日野自動車製品の取引等に関し、その基本的な事項について、販売会社と日野自動車の代表者間で契約を締結した契約書のことを「日野販売会社基本契約書」と言う。", "D": "日野自動車の保証制度は、販売会社・日野自動車がそれぞれの約束を結び、この約束によって成り立っている。"}, "explanation": "日野自動車の保証制度は、お客様・販売会社・日野自動車の３者がそれぞれの約束を結び成り立っている。「販売会社・日野自動車」の２者だけではない。", "source": "19年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 3, "label": "(3)", "points": 3, "answer": "C", "stem": "事故見積りを実施する際、損傷波及の構造上の着眼点に関する記述として、不適切なものはどれか。", "choices": {"A": "断面形状の変化部位", "B": "部材形状の変化部位", "C": "衝撃力の力点部位", "D": "衝撃力の支点部位"}, "explanation": "損傷波及の構造上の着眼点は「衝撃力の力点部位」ではなく「衝撃力の支点部位」が正しい。", "source": "19年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 4, "label": "(4)", "points": 3, "answer": "A", "stem": "補給部品の保証規定に関する記述として、不適切なものはどれか。", "choices": {"A": "お客様が直接日野販売会社又は、指定整備工場で購入した部品については、日野純正部品であっても保証されない。", "B": "補給部品の再保証は、最大で初回保証から１年間である。", "C": "日野純正部品を他メーカーブランド車に取付けした場合、一切保証を受ける事ができない。", "D": "ガラス類については、組付け直後の指摘を除き保証の適用除外となる。"}, "explanation": "お客様が直接日野販売会社又は指定整備工場で購入「していない」部品については、日野純正部品であっても保証されない。選択肢Aは「購入した部品は保証されない」と逆の記述になっている。", "source": "19年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 5, "label": "(5)", "points": 3, "answer": "C", "stem": "通過車両規定に関する記述として、適切なものはどれか。", "choices": {"A": "休日とは、元販売会社の休日をいう。", "B": "通過車両とは、自社以外の販売会社が販売した車両で、流入車両や登録前車両は含まない。", "C": "平日とは原則、月曜日から土曜日をいう。（但し、各実施販売会社の休業日を除く）", "D": "営業時間外の修理時間は、約３時間／件を目安とする。"}, "explanation": "A：休日とは各実施販売会社のカレンダーに定める休業日。B：通過車両には流入車両や登録前車両も含む。D：営業時間外の修理時間は約２時間／件を目安とする。C（平日は月曜〜土曜）が正しい。", "source": "19年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 6, "label": "(6)", "points": 3, "answer": "A", "stem": "通過車両として「お客様リスト」に登録されているお客様（優良客）より直接、レンジャーのブレーキ調整の依頼を受けた。この場合の応対として、適切なものはどれか。", "choices": {"A": "元販売会社に確認を取らずに受付をして作業した。", "B": "元販売会社の担当と連絡がとれないので、現金払いでの修理をお客様にお願いした。", "C": "元販売会社の担当に連絡がつかないので、連絡がつくまで作業を待ってもらった。", "D": "元販売会社の担当に連絡がつかないので、作業を断った。"}, "explanation": "お客様登録リストに登録されていて修理金額が５万円以下は元販売会社への確認不要で受付・作業できる。", "source": "19年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 7, "label": "(7)", "points": 3, "answer": "C", "stem": "通過車両規定に照らし「ホットライン」の取り扱いに関する記述として、不適切なものはどれか。", "choices": {"A": "ホットラインは、ホットライン登録者同士のみ使用することとする。", "B": "ホットラインを携帯電話で行う場合は、個人が常時使用している場合に限り登録できるものとする。", "C": "「ホットライン一覧表」を年２回配布する。尚、一覧表は個人管理とする。", "D": "故障、電波状態等により、使用できないことも想定し原則として通常の電話番号と携帯番号の２つを登録する。"}, "explanation": "ホットライン一覧表は個人管理ではなく、営業所または責任者等の管理のもとで適切に管理する。", "source": "19年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 8, "label": "(8)", "points": 3, "answer": "B", "stem": "引渡し説明について、不適切なものはどれか。", "choices": {"A": "取り替え部品を提示しながら説明をする。", "B": "作業中に気づいたことから分かりやすく説明する。", "C": "作業前後の差について説明をする。", "D": "測定・調整値は具体的な数字を使って説明する。"}, "explanation": "引渡し説明はまずお客様からの申し出内容（ご用命内容）に対する説明から行う。「作業中に気づいたこと」を先に説明するのは不適切。", "source": "19年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 9, "label": "(9)", "points": 3, "answer": "A", "stem": "売掛金に関する記述として、不適切なものはどれか。", "choices": {"A": "時効の成立を中断させるため、請求書を再度送付した。", "B": "取引先が倒産してしまったので、回収は出来ない。", "C": "支払いに懸念のあるお客様と、現金取引を行った。", "D": "時効は２年である。"}, "explanation": "請求書の送付だけでは時効は中断されない。時効を中断させるには裁判上の請求や債務承認などの法的手続きが必要。", "source": "19年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 10, "label": "(10)", "points": 3, "answer": "B", "stem": "収入印紙に関する記述として、適切なものはどれか。", "choices": {"A": "小切手に貼る収入印紙は、記載金額１０万円未満は非課税、１００万円以下は２００円の収入印紙が必要となる。", "B": "手形に貼る収入印紙は、記載金額１０万円未満は非課税、１００万円以下は２００円の収入印紙が必要となる。", "C": "小切手に貼る収入印紙は、記載金額５万円未満は非課税、１００万円以下は２００円の収入印紙が必要となる。", "D": "手形に貼る収入印紙は、記載金額５万円未満は非課税、１００万円以下は２００円の収入印紙が必要となる。"}, "explanation": "小切手には収入印紙は不要。手形は記載金額10万円未満は非課税、10万円以上100万円以下は200円の収入印紙が必要。", "source": "19年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 11, "label": "(11)", "points": 3, "answer": "D", "stem": "整備料金の説明と回収に関する記述として、不適切なものはどれか。", "choices": {"A": "サービス部門で販売する商品は、点検、整備という点検整備作業における「技術の提供」である。", "B": "点検・整備の価値をお客様に理解していただけるよう、必要性、効果などをわかりやすくお客様に説明することも、「機能的サービス」の一環である。", "C": "無償、有償作業を同時に行う場合、受注の時点で「料金」とその有償、無償についてお客様に説明しておく。", "D": "売掛金が回収予定日を過ぎても入金されない場合は、督促状を普通郵便や内容証明付郵便などの手段を講じることも大切である。"}, "explanation": "督促状は普通郵便ではなく、配達証明付郵便や内容証明付郵便で送付する。", "source": "19年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 12, "label": "(12)", "points": 3, "answer": "B", "stem": "通過車両規定に関する記述として、適切なものはどれか。", "choices": {"A": "外注作業料金は市場価格を基準とし、振替請求額は売上金額の１５％を控除する。", "B": "他メーカーの部品代は、実施販売会社が通常自社のお客様に販売する価格を標準とする。", "C": "純正部品代は定価（Ｌ／Ｐ）の１０％を控除する。", "D": "車両整備にかかわる油脂類等の振替価格は自社売上金額の１０％を控除する。"}, "explanation": "A：外注作業料金の振替は売上金額の10%控除。C：純正部品は定価（L/P）の20%控除。D：油脂類等の振替価格は自社売上金額の20%控除。B（他メーカー部品代の標準価格）が正しい。", "source": "19年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 13, "label": "(13)", "points": 3, "answer": "A", "stem": "通過車両規定において、事故修理売上の販売会社間の振替えについて、適切なものはどれか。", "choices": {"A": "保険修理の場合の外注作業部品代は、保険査定額の５％を控除する。", "B": "保険修理の場合の技術料は、保険査定額の１０％を控除する。", "C": "保険修理の場合の部品代は、保険査定額の５％を控除する。", "D": "保険修理の場合の外注作業技術料は、保険査定額の１０％を控除する。"}, "explanation": "保険修理の場合の振替控除率：技術料＝5%控除、部品代＝10%控除、外注作業技術料＝5%控除、外注作業部品代＝5%控除。A（外注作業部品代は5%控除）が正しい。", "source": "19年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 14, "label": "(14)", "points": 3, "answer": "D", "stem": "通過車両規定の保証修理に関する作業の処理方法として、不適切なものはどれか。", "choices": {"A": "現品および関係書類は即時発行する。なお現品およびその梱包には、「通過車両」と明記した荷札をつけ、送状と受領書を同封する。", "B": "元販売会社への現品到着期限は、故障発生日より２０日以内とする。", "C": "現品が元販売会社へ到着しなかった場合の損害は、実施販売会社とする。", "D": "現品の発送先は、原則として元販売会社サービスフロント宛とし、運賃は実施販売会社負担とする。"}, "explanation": "現品の発送先は原則として元販売会社「整備責任者」宛（サービスフロント宛ではない）とし、運賃は「元販売会社」負担（実施販売会社負担ではない）。", "source": "19年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 15, "label": "(15)", "points": 3, "answer": "A", "stem": "通過車両規定において、実施販売会社の請求方法に関する記述として、適切なものはどれか。", "choices": {"A": "毎月２０日を締切日とし、当月分の請求書を一括して元販売会社に発送する。その際請求明細書を添付する。", "B": "毎月２０日を締切日とし、３ヶ月ごとに、まとめて元販売会社に発送する。その際請求明細書を添付する。", "C": "毎月１５日を締切日とし、３ヶ月ごとに、まとめて元販売会社に発送する。その際請求明細書を添付する。", "D": "毎月２５日を締切日とし、当月分の請求書を一括して元販売会社に発送する。その際請求明細書を添付する。"}, "explanation": "毎月２０日を締切日とし、当月分の請求書を一括して元販売会社に発送する。その際、請求明細書を添付する。", "source": "19年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 16, "label": "(16)", "points": 3, "answer": "B", "stem": "２＊Ｇ付プロフィアの高機能シートに関する記述として、適切なものはどれか。", "choices": {"A": "シートベルトはシート付けとすることで、胸と腹締りの改善を図っている。", "B": "ランバーサポートは３段階の調整ができる。", "C": "エアサス部は固定レバーにて固定できる。", "D": "アームレストは３段階の調整ができる。"}, "explanation": "A：シートベルトはシート付けで「首と腹締り」の改善を図っている（胸ではない）。C：高機能シートには固定レバーはない。D：アームレストは無段階調整。B（ランバーサポートは3段階）が正しい。", "source": "19年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 17, "label": "(17)", "points": 3, "answer": "C", "stem": "ひとまわり点検に関する記述として、不適切なものはどれか。", "choices": {"A": "突発的に発生する休車を未然に防止する。", "B": "自動車本来の機能を保ち、安全運行を維持する。", "C": "一日一回その運行の開始前に目視などにより点検する。", "D": "職場環境、他の改善につながる。"}, "explanation": "「一日一回その運行の開始前に目視などにより点検する」のは「日常点検」の説明。ひとまわり点検（一回り点検）は入庫車両の状態確認のための点検で、日常点検とは異なる。", "source": "19年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 18, "label": "(18)", "points": 3, "answer": "A", "stem": "デュトロ（２０１６年モデル以降）のスマートエントリー＆スタートシステムに関する記述として、不適切なものはどれか。", "choices": {"A": "スマート（電子）キーのキーＩＤコードは、メインキーとサブキー併せて８個まで登録可能である。", "B": "一度登録したスマート（電子）キーは、他の車両に登録することはできない。", "C": "カスタマイズ機能によりスマートエントリーシステムの、有効と無効を切り替えることができる。", "D": "長期駐車時にスマートキーの電池上がりを防止するため、節電機能（節電モード）がある。"}, "explanation": "スマートキーのキーIDコードはメイン・サブの識別はなく最大５個まで登録可能。８個は誤り。", "source": "19年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 19, "label": "(19)", "points": 3, "answer": "B", "stem": "「道路運送車両法」に照らし、長さ４．６８ｍ、幅１．６５ｍ、高さ１．８７ｍで原動機の総排気量が２．８９リットルのジーゼルエンジンの自動車の種別として、適切なものはどれか。", "choices": {"A": "軽自動車", "B": "小型自動車", "C": "普通自動車", "D": "大型特殊自動車"}, "explanation": "小型自動車の寸法基準（長さ4.7m以下、幅1.7m以下）を満たし、ジーゼルエンジンや天然ガスを燃料とする小型自動車については排気量の基準の適用はないため、2.89Lのジーゼルエンジンでも小型自動車となる。", "source": "19年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 20, "label": "(20)", "points": 3, "answer": "D", "stem": "道路運送車両法に関する記述として、不適切なものはどれか。", "choices": {"A": "自動車使用の本拠に乗車定員１０人以下で車両総重量８トン以上の自家用自動車及び乗車定員１０人以下の自動車運送事業用に供する自動車を５両以上使用している自動車運送業者は整備管理者を選任しなければならない。", "B": "三級自動車整備士の資格を取得した者は、整備管理者の資格を有する。", "C": "自家用マイクロバスを運行する者は、１日１回、その運行の開始前に日常点検をしなければならない。", "D": "自動車が保安基準に適合しなくなるおそれがある状態又は適合しない状態にあるときは、運輸支局長から改善命令を受けることがある。"}, "explanation": "整備命令等を発令するのは「運輸支局長」ではなく「地方運輸局長」である。", "source": "19年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 21, "label": "(21)", "points": 3, "answer": "D", "stem": "道路運送車両の保安基準に照らし、車両総重量に関する記述として、不適切なものはどれか。", "choices": {"A": "セミトレーラ以外の自動車で、最遠軸距が５．５ｍ未満のものは、車両総重量２０トン以下。", "B": "セミトレーラ以外の自動車で、最遠軸距が５．５ｍ以上７ｍ未満、自動車の長さが９ｍ未満のものは、車両総重量２０トン以下。", "C": "セミトレーラ以外の自動車で、最遠軸距が７ｍ以上自動車の長さが９ｍ未満のものは、車両総重量２０トン以下。", "D": "セミトレーラ以外の自動車で、最遠軸距が７ｍ以上自動車の長さが１１ｍ以上のものは、車両総重量２２トン以下。"}, "explanation": "最遠軸距が７ｍ以上・自動車の長さが１１ｍ以上のものは、車両総重量２５トン以下が正しい。２２トンは誤り。", "source": "19年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 22, "label": "(22)", "points": 3, "answer": "D", "stem": "道路運送車両法に照らし、自動車の検査の種別として、不適切なものはどれか。", "choices": {"A": "継続検査", "B": "予備検査", "C": "臨時検査", "D": "分解整備検査"}, "explanation": "道路運送車両法に定める検査の種別は、新規検査・継続検査・臨時検査・構造変更等検査・予備検査である。「分解整備検査」は道路運送車両法の検査種別には存在しない。", "source": "19年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 23, "label": "(23)", "points": 3, "answer": "D", "stem": "日野オリジナルサポート「日野オリジナル保証」の記述として、適切なものはどれか。", "choices": {"A": "フロントガラス修理補償サービスは、リース期間１年毎に１回限り利用できる。", "B": "タイヤパンク修理補償サービスは、リース期間１年毎に１回限り利用できる。", "C": "修理費用差額補償サービスは、リース期間１年毎に１回限り利用できる。", "D": "フロントガラス修理補償サービス及びタイヤパンク修理補償サービスは、リース期間１年毎にいずれか１回限り利用できる。"}, "explanation": "修理費用差額補償サービスはリース期間中に1回限り利用できる。フロントガラス修理補償サービス及びタイヤパンク修理補償サービスはリース期間1年毎にいずれか1回限り利用できる。Dが正しい。", "source": "19年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 24, "label": "(24)", "points": 3, "answer": "B", "stem": "日野デュトロメンテナンスパックに関する記述として、不適切なものはどれか。", "choices": {"A": "対象車が廃車となった場合は解約できる。", "B": "対象車種は販売会社にて販売された新車で、用途での規制はない。", "C": "レンタカーは、対象外である。", "D": "加入期間は、登録日から新車１，０００ｋｍ点検実施前までとなり、以降の途中入会はできない。"}, "explanation": "デュトロメンテナンスパックの対象車種は自家用車に限る。用途に規制はないという記述は誤り。", "source": "19年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 25, "label": "(25)", "points": 3, "answer": "C", "stem": "自動車保険に関する記述として、適切なものはどれか。", "choices": {"A": "Ｂ・Ａ・Ｐ（Ｂａｓｉｃ Ａｕｔｏｍｏｂｉｌｅ Ｐｏｌｉｃｙ）とは自家用乗用車、自家用貨物車など自家用車のみが対象で、示談代行サービスのない保険である。", "B": "自動車運転者損害賠償責任保険とは、運転者が所有している車両にかける保険である。", "C": "自賠責保険の保険金額の限度額は、怪我の場合１２０万円、死亡の場合は３，０００万円、後遺障害（第１級）で４，０００万円である。", "D": "被害者は加害者の加入している保険会社に、賠償額が確定するまで支払請求できないので、賠償額が確定するまで保険金を受け取れない。"}, "explanation": "A：B・A・Pは全自動車が対象。B：自動車運転者損害賠償責任保険は友人の車やレンタカーなどを借りて運転するときのための保険。D：賠償額確定前でも仮渡金として受け取れる。C（自賠責の保険金額）が正しい。", "source": "19年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 26, "label": "(26)", "points": 3, "answer": "B", "stem": "日野メンテナンスリースに関する記述として、不適切なものはどれか。", "choices": {"A": "メンテナンスリースとは、車両代・税金・保険等にメンテナンス費用を加えたリース契約のことである。", "B": "基本契約としては、４種類のプラン設定がある。", "C": "基本契約のＳプランでは、定期点検・油脂類交換・ワイパーゴム交換が含まれる。", "D": "メンテナンス対象修理と対象外作業が一度に発生した場合、工事受付を別にして処理しなければならない。"}, "explanation": "日野メンテナンスリースの基本契約はＳ・Ｍ・Ｒの３種類。４種類ではない。", "source": "19年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 27, "label": "(27)", "points": 3, "answer": "A", "stem": "次の記述について、不適切なものはどれか。", "choices": {"A": "５Ｓの一つである、「整理」とは必要なものがいつでも取り出せ、戻せることである。", "B": "ＣＳとはカスタマーサティスファクションの略で顧客満足度と訳す。ＣＳを高めることは、最終的に自社売上げを伸ばすことにつながる。", "C": "サービス業態とはサービス部門で整備したお客様の車の台数、売上、稼ぎ出した利益及び売掛金の回収額や残高状況などの業績状況を数字で表にまとめたもののことを言う。", "D": "日野自動車の安全５項目は「異常の時は、まず止めろ。動いているものは危険と思え。共同作業は合図の確認。修理・段取りは、スイッチを切れ。わからないことは、手を出すな。」である。"}, "explanation": "５Ｓの「整理」とは「いるもの」と「いらないもの」に分けて、いらないものや不用品を捨てること。「必要なものがいつでも取り出せ戻せること」は「整頓」の説明。", "source": "19年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 28, "label": "(28)", "points": 3, "answer": "A", "stem": "出張作業に関する記述として、不適切なのはどれか。", "choices": {"A": "道路公団等の後方警戒者より早く到着した場合は、できる限りの安全対策を施し、後方警戒者が到着したら作業を開始する。", "B": "故障現場が一般道路の自動車専用道路、交通量が多く安全が確保できないバイパス等の場合は、警察へ緊急案件として危険通報を行い指示を受けること。", "C": "故障現場到着後は①安全対策を実施、②お客様の安全を確保した後に作業を開始する。", "D": "故障現場到着後、作業者は安全対策を施す前に、必ず故障車より１００ｍ以上後方に発炎筒を設置して、後続車に危険を知らせる。"}, "explanation": "後方警戒者が到着したら、処置方法等の打合せを行ってから作業を開始する。到着したらすぐ作業開始するのは不適切。なお発炎筒は故障車の100m後方に設置する。", "source": "19年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 29, "label": "(29)", "points": 3, "answer": "C", "stem": "安全衛生教育（法令）で定められた特別教育の種別について、不適切なものはどれか。", "choices": {"A": "研削と石の取り替えまたは試運転", "B": "最大荷重１．０トン未満のフォークリフトの運転", "C": "可燃性ガス、酸素を用いる金属の溶接、溶断", "D": "アーク溶接機を用いる金属の溶接、溶断"}, "explanation": "可燃性ガス・酸素を用いる金属の溶接・溶断については「特別教育」ではなく「技能講習修了者等の資格」が必要となる。", "source": "19年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 30, "label": "(30)", "points": 3, "answer": "D", "stem": "取扱説明書の記載事項に関する記述として、不適切なものはどれか。", "choices": {"A": "「知識」とは、知っておいていただきたいこと、知っておくと便利な事項である。", "B": "「アドバイス」とは、車両の正規性能を確保するため、また車の故障や破損を防ぐために守っていただきたい事項である。", "C": "「注意」とは、取り扱いを誤った場合、傷害を負ったり車などの物的損害につながる可能性がある事項である。", "D": "「警告」とは、取り扱いを誤った場合、生命の危険や重大な傷害につながる事項である。"}, "explanation": "「取り扱いを誤った場合、生命の危険や重大な傷害につながる事項」は「警告」ではなく「危険」の内容。「警告」は重大な傷害につながる「可能性がある」場合であり、表現上に差がある。", "source": "19年HF-1認定2次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 1, "label": "問1", "points": 3, "answer": "C", "stem": "事故見積りを実施する際、構造上の着眼点に関する記述として、不適切なものはどれか。", "choices": {"A": "断面形状の変化部位", "B": "部材形状の変化部位", "C": "衝撃力の力点部位"}, "explanation": "事故見積りの構造上の着眼点は「断面形状の変化部位」「部材形状の変化部位」「変形の波及部位」の3点。衝撃力の力点部位は含まれない。", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 2, "label": "問2", "points": 3, "answer": "B", "stem": "下請法に関する記述として、不適切なものはどれか。", "choices": {"A": "発注に際して「１１の法定事項」を満たした書面を、直ちに下請業者に発行しなければならない。", "B": "発注日または役務の提供をした日から、６０日以内のできるだけ短い期間内に支払期日を定めなければならない。", "C": "下請業者との取引に関する記録を書類として作成し、２年間保存しなければならない。"}, "explanation": "支払期日は「役務の提供を受けた日（完了日）」から60日以内に定めなければならない。「発注日から」という起算点が不適切。", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 3, "label": "問3", "points": 3, "answer": "C", "stem": "保証修理の役割に関する記述として、不適切なものはどれか。", "choices": {"A": "お客様の信頼の回復と維持", "B": "市場技術情報の収集による品質向上", "C": "お客様収益の維持"}, "explanation": "保証修理の役割は「お客様の信頼の回復・維持」と「市場技術情報の収集による品質向上」。お客様の収益維持は保証修理の役割には含まれない。", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 4, "label": "問4", "points": 3, "answer": "A", "stem": "保証期間内の保証修理（一般保証修理、スカニア車除く）で、販売会社間通過車両に伴う場合に申請しなければならない期日の規定として、適切なものはどれか。", "choices": {"A": "故障発生日（入庫日）から９０日以内", "B": "故障発生日（入庫日）から６０日以内", "C": "故障発生日（入庫日）から２０日以内"}, "explanation": "販売会社間通過車両の保証申請期限は、故障発生日（入庫日）から90日以内が正しい規定。", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 5, "label": "問5", "points": 3, "answer": "A", "stem": "保証開始日（保証期間の起算日）に関する記述として、適切なものはどれか。", "choices": {"A": "登録ＮＯが無い汎用エンジン、トレーラ・アクスルは、お客様への納入日を保証開始日とする。", "B": "登録ＮＯが無い無登録車両（構内専用車両、防衛省車両）は、故障発生日を保証開始日とする。", "C": "登録ＮＯが無い登録前車両（納入前車両）は、お客様への納車日または納入日を保証開始日とする。"}, "explanation": "汎用エンジン・トレーラ・アクスルは納入日が保証開始日。無登録車両（構内専用・防衛省）は納車日または納入日、登録前車両は故障発生日が正しい起算日。", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 6, "label": "問6", "points": 3, "answer": "B", "stem": "「通過車両規定」に関する記述として、適切なものはどれか。", "choices": {"A": "元販売会社とは、通過車両を修理対応する販売会社をいう。", "B": "休日とは、実施販売会社のカレンダーに定める休業日をいう。", "C": "営業時間外の修理時間は、約３時間／件を目安とする。"}, "explanation": "B：休日とは実施販売会社のカレンダーに定める休業日→正しい。A：元販売会社は修理を「依頼する」側（修理対応するのは実施販売会社）。C：営業時間外の修理は約2時間/件が目安。", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 7, "label": "問7", "points": 3, "answer": "C", "stem": "Ｓ．Ｏ．Ｓ緊急サービスの実施概要として、不適切なものはどれか。", "choices": {"A": "お客様の車両が路上故障（事故を含む）した場合、目的地まで安全に運行できるよう応急処置を行う。", "B": "お客様からの入電は、原則としてコールセンターで受付、ご要望内容に応じて夜間出動スタッフ（販売会社出動拠点または外注業者、ＪＮＳ）へ出動手配を行う。", "C": "主要幹線道路沿い販売会社から数社を選定し、「アドバイザー」を配備し、お客様への技術的な支援を実施する。"}, "explanation": "アドバイザーはお客様に対してではなく、出動スタッフおよびコールセンターへの技術的支援を行う。", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 8, "label": "問8", "points": 3, "answer": "A", "stem": "「通過車両規定」の技術料単価に関する記述として、適切なものはどれか。", "choices": {"A": "電気、板金、塗装、機械加工等の外注作業は、市場価格を基準とし振替請求額は、売上金額の１０％を控除する。", "B": "実施販売会社のお客様請求標準技術料単価の改訂は、年２回とする。", "C": "技術料割増は、定時間内に受付し、１９：００までに作業完了した場合には、２５％の割増を適用できる。"}, "explanation": "A：外注作業は売上金額の10%控除→正しい。B：技術料単価の改訂は年1回（年2回は不適切）。C：定時間内受付・19:00完了でも出張割増25%が適用できるとは限らない（定時間内は原則割増なし）。", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 9, "label": "問9", "points": 3, "answer": "C", "stem": "下記に記載してある回収手形の単純平均サイトの日数として、適切なものはどれか。\n\n手形枚数 ３枚　手形日数 １８０日\n手形金額 １，０００千円　債数 ７５，０００千円（合計）", "choices": {"A": "４５日", "B": "５０日", "C": "６０日"}, "explanation": "単純平均サイト = 手形日数の合計 ÷ 手形枚数 = 180日 ÷ 3枚 = 60日", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 10, "label": "問10", "points": 3, "answer": "B", "stem": "引渡し、納車時の応対に関する記述として、不適切なものはどれか。", "choices": {"A": "引渡しの約束時間には席を外さないようにし、至急の用件でやむを得ず外出する場合には必ず代理人をたて迷惑をかけないようにする。", "B": "作業内容を説明する際は、不具合内容および整備前と比較してどのように良くなったかを把握し、自信がないときは作業担当者を同席させて説明する。", "C": "取替部品は、提示できるように保管しておく。また出庫依頼書との照合をし、伝票との整合性を確認しておく。"}, "explanation": "フロントは常に作業内容を自信を持って説明できる知識を持つべきであり、「自信がないとき」を前提として担当者に頼る姿勢は不適切。説明責任はフロントが担う。", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 11, "label": "問11", "points": 3, "answer": "C", "stem": "売掛金に関する記述として、不適切なものはどれか。", "choices": {"A": "売掛金は約束日に支払わなくても法的な制裁はない。", "B": "売掛金はそのままでは利息がつかない。", "C": "売掛金は銀行から融資を受ける場合の担保となる。"}, "explanation": "売掛金は一般的に銀行融資の担保にはなりにくい。約束日に支払わなければ法的制裁があり、そのままでは利息もつかないのは正しい記述。", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 12, "label": "問12", "points": 3, "answer": "B", "stem": "「通過車両規定」の特別対応料および体制維持費に関する記述として、不適切なものはどれか。", "choices": {"A": "体制維持費は、お客様に請求してはならない。", "B": "登録前車両は、保証申請にてメーカーに体制維持費と特別対応料を請求できる。", "C": "深夜の場合は、５，０００円を割り増し、他メーカー車両の場合は、１０，０００円を割り増し請求することができる。"}, "explanation": "登録前車両の体制維持費・特別対応料はメーカーへの保証申請対象外。販売会社間の通過車両規定に基づいて処理される。体制維持費をお客様に請求しないのは正しい。", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 13, "label": "問13", "points": 3, "answer": "A", "stem": "「通過車両規定」において、実施販売会社の請求方法に関する記述として、適切なものはどれか。", "choices": {"A": "作業完了後、即時に納品書を元販売会社宛に必ず発送する。また保証整備作業の場合は必ず現品の送状（写）を添付する。", "B": "毎月１５日を締切日とし、当月分の請求書を一括して元販売会社に発送する。その際、請求明細書を添付する。", "C": "残高通知は請求側、支払側とも１ヶ月ごとに残高整理を行い、元販売会社に通知するものとする。"}, "explanation": "作業完了後即時に納品書を発送し、保証整備の場合は現品送状（写）を添付する。締切日は月末、残高整理は3ヶ月ごとが正しい。", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 14, "label": "問14", "points": 3, "answer": "B", "stem": "「通過車両規定」に照らし、通過車両の売上に関する記述として、適切なものはどれか。", "choices": {"A": "洗油、ウエス等は技術料原価に含まれ、消耗品として請求できる。", "B": "外注作業部品は、売上金額の１０％を控除する。", "C": "自社のレッカー使用は、１０％を控除する。"}, "explanation": "外注作業部品は売上金額の10%を控除するのが正しい。洗油・ウエス等は技術料原価に含まれ別途請求不可。自社レッカーは規定の料金（10%控除ではない）で請求する。", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 15, "label": "問15", "points": 3, "answer": "A", "stem": "レンジャーのＤＰＲ（新長期）と新ＤＰＲ（ポスト新長期）の違いに関する記述として、不適切なものはどれか。", "choices": {"A": "新ＤＰＲシステムから吸気絞り弁を追加して、再生性能を向上させた。", "B": "新ＤＰＲシステムからＰＭ除去再生機能に加えて、ＮＯｘ浄化機能を追加した。", "C": "新ＤＰＲシステムからエンジン直下に触媒（ＡＴＣ）を追加して再生性能を向上させた。"}, "explanation": "吸気絞り弁はDPR（新長期）から新DPR（ポスト新長期）への変更で追加されたものではなく、旧DPRから新DPRへの変更点。ポスト新長期では主にNOx浄化機能（SCR等）が追加された。", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 16, "label": "問16", "points": 3, "answer": "B", "stem": "ＳＪＧ付デュトロＨＶ車において、アイドルストップ中にエンジンを再始動させる方法として、不適切なものはどれか。", "choices": {"A": "ブレーキペダルをはなす。", "B": "アイドルストップキャンセルスイッチを押す。", "C": "ニュートラルにする。"}, "explanation": "アイドルストップキャンセルスイッチは将来の自動停止をキャンセルするスイッチであり、すでに停止しているエンジンを再始動させる機能ではない。ブレーキを離す・ニュートラルにするが再始動の方法。", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 17, "label": "問17", "points": 3, "answer": "A", "stem": "ポスト新長期規制のセレガ（１４年モデル）に関する記述として、不適切なものはどれか。", "choices": {"A": "乗客への配慮として、乗客には必要のない各種警報音が客席に届きにくいようにヘッドライトに連動して減音する機能を追加した。", "B": "タイヤ外側逸脱量０．３ｍまでに警報を発する車線逸脱警報（ＬＤＷＳ）を標準装備した。", "C": "ＰＣＳの新機能として、条件により早いタイミングで警報、制動をかけて衝突を回避する機能を追加した。"}, "explanation": "警報音の減音機能は「ヘッドライト」に連動するものではなく、車速や走行状況に応じて減音する機能。ヘッドライトへの連動は誤った記述。", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 18, "label": "問18", "points": 3, "answer": "C", "stem": "プロフィア（１８年モデル）に装備されているＡＤＢヘッドランプに関する記述として、不適切なものはどれか。", "choices": {"A": "ＡＤＢヘッドランプは、プロジェクターレンズの裏にＬＥＤを１１個搭載しており、これらを点灯／消灯／調光することで、遮光ビーム追従などのあらゆる配光パターンを形成している。", "B": "カメラセンサー（画像センサー）は、ＰＣＳや車線逸脱警報で使用しているカメラセンサーを共用している。", "C": "ＡＤＢシステムが作動しているときには、マルチインフォメーション内に橙色のＡＤＢ作動インジケーターランプを表示する。"}, "explanation": "ADB作動インジケーターランプは橙色ではなく緑色で表示される。LED11個搭載・カメラセンサー共用は正しい記述。", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 19, "label": "問19", "points": 3, "answer": "B", "stem": "「道路運送車両法」に照らし、自動車の使用者は、当該自動車について一時抹消登録があったとき、当該自動車検査証を国土交通大臣に返納しなければならないが、その期限として、適切なものはどれか。", "choices": {"A": "その事由があった日から１０日以内", "B": "その事由があった日から１５日以内", "C": "その事由があった日から２０日以内"}, "explanation": "一時抹消登録があった場合、自動車検査証は事由があった日から15日以内に国土交通大臣に返納しなければならない。", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 20, "label": "問20", "points": 3, "answer": "C", "stem": "「道路運送車両法の保安基準」に照らし、巻込防止装置（２０１８年製作車両）に関する記述として、不適切なものはどれか。", "choices": {"A": "大型自動車に備えるものについては、空車状態において、その下縁の高さが地上４５０ｍｍ以下、上縁の高さが６５０ｍｍ以上であること。", "B": "大型自動車以外の貨物用普通自動車に備えるものについては、運転者席乗降口付近を除きその下縁の高さが地上６００ｍｍ以下であること。", "C": "大型自動車に備えるものについては、空車状態において、巻込防止装置の平面部の上縁と荷台等の間隔が６００ｍｍ以下であること。"}, "explanation": "巻込防止装置の平面部上縁と荷台等の間隔の規定は600mmではなく450mm以下が正しい基準。", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 21, "label": "問21", "points": 3, "answer": "A", "stem": "シビアコンディションの判定例として、不適切なものはどれか。", "choices": {"A": "低速走行が走行距離の２０％以上である。", "B": "悪路・雪道・多塵地帯走行が走行距離の３０％以上である。", "C": "事業用自動車で１ヶ月あたり１０，０００ｋｍ以上走行している。"}, "explanation": "シビアコンディションの低速走行判定は走行距離の30%以上（20%ではない）。悪路等30%以上・事業用10,000km以上は正しい基準。", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 22, "label": "問22", "points": 3, "answer": "B", "stem": "「道路運送車両法」及び「道路運送車両法施行規則」に照らし、改造自動車の届け出の範囲として、不適切なものはどれか。", "choices": {"A": "プロペラシャフトの寸法及び材質の変更", "B": "トランスミッションの減速比及び段数の変更", "C": "操舵装置におけるリンク装置の取付位置の変更"}, "explanation": "トランスミッションの減速比・段数の変更は改造届け出が不要な範囲。プロペラシャフトの寸法・材質変更や操舵装置のリンク装置取付位置変更は届け出が必要。", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 23, "label": "問23", "points": 3, "answer": "B", "stem": "日野デュトロメンテナンスパックに関する記述として、適切なものはどれか。", "choices": {"A": "延長プランは、最大で１年である。", "B": "延長プランは、最大で２年である。", "C": "延長プランは、最大で３年である。"}, "explanation": "日野デュトロメンテナンスパックの延長プランは最大で2年。", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 24, "label": "問24", "points": 3, "answer": "A", "stem": "保険処理の事故受付応対に関する記述として、不適切なものはどれか。", "choices": {"A": "お客様は精神的な苦痛を受けているので、事故処理にあたり直接介入し効率よく相手側と話をすすめる。", "B": "事故処理は当事者間で行ってもらい、お客様には保険内容の適切な助言を行う。", "C": "車同士の事故などは、お客様への同情心からお客様の言い分を全面的に信用したりせずに、あくまでも聞き役になる。"}, "explanation": "販売会社が事故処理に直接介入し相手方と交渉するのは不適切。事故処理は当事者間で行ってもらい、販売会社はお客様の話をよく聞き保険内容の助言にとどめる。", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 25, "label": "問25", "points": 3, "answer": "C", "stem": "自賠責保険に関する記述として、適切なものはどれか。", "choices": {"A": "自賠責保険で補償されるのは、相手を怪我または死亡させた場合や、相手の物を破損した場合に保険金が支払われる。自分自身の怪我に対しては保険金は支払われない。", "B": "賠償額の確定までに時間がかかるような場合、被害者は、加害者の加入している保険会社に保険金の前払いを請求することができる。これを仮渡金といい、死亡した者１人につき、３９０万円である。", "C": "加害者が不誠実であったり、金額面で折り合いがつかずに示談が成立しない場合などには、被害者が損害賠償額を直接、保険会社に支払うよう請求できる。"}, "explanation": "被害者が損害賠償額を直接保険会社に請求できる「直接請求権」は自賠責保険の重要な制度。A：自賠責は物損は対象外。B：仮渡金の死亡は290万円（390万は誤り）。", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 26, "label": "問26", "points": 3, "answer": "A", "stem": "日野メンテナンスリースに関する記述として、不適切なものはどれか。", "choices": {"A": "保守整備契約（Ｒ契約：故障修理契約）については、代車費用も含まれる。", "B": "日野が販売する中古の大・中・小トラック（新規導入・日野車）は、メンテナンスリースの受入れが可能である。", "C": "本契約締結後の法令の制定、改廃、官公庁の指示・指導に起因する修理、改造、部品の取付、点検整備などはメンテナンスサービスに含まれない。"}, "explanation": "Ｒ契約（故障修理契約）には代車費用は含まれない。代車費用は別途オプション契約となる。", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 27, "label": "問27", "points": 3, "answer": "C", "stem": "取扱説明書のコーションラベルに関する記述として、不適切なものはどれか。", "choices": {"A": "「危険」とは、取り扱いを誤った場合、生命の危険や重大な傷害につながる事項である。", "B": "「警告」とは、取り扱いを誤った場合、生命の危険や重大な傷害につながる可能性がある事項である。", "C": "「注意」とは、取り扱いを誤った場合、車の故障や破損につながる可能性がある事項である。"}, "explanation": "「注意」とは取り扱いを誤った場合に軽傷を負う恐れまたは物的損害が生じる可能性のある事項。車の故障・破損だけでなく人への軽傷害も含まれる。", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 28, "label": "問28", "points": 3, "answer": "B", "stem": "地下廃油タンク（１５年未満）に関する記述として、不適切なものはどれか。", "choices": {"A": "地下タンクは、３年に１回以上気密測定を行うこと。", "B": "全ての地下タンクは、週１回検知孔での漏洩検査を行い記録を２年間保存すること。", "C": "設置後１５年を超える全ての地下タンクは、１年に１回気密測定を行うこと。"}, "explanation": "週1回の検知孔での漏洩検査が必要なのは「全ての地下タンク」ではなく、設置後15年を超えるタンクが対象。15年未満のタンクには適用されない（3年に1回の気密測定が適用）。", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 29, "label": "問29", "points": 3, "answer": "B", "stem": "出張作業に関する記述として、不適切なものはどれか。", "choices": {"A": "故障現場が一般道路の自動車専用道路、交通量が多く安全が確保できないバイパス等の場合は警察へ緊急案件として危険通報を行い、指示を受けること。", "B": "故障車と出張作業車両との車間距離は、最低１０ｍは離すこと。", "C": "故障現場到着後、作業者は安全対策を施す前に、必ず故障車より１００ｍ以上後方に発炎筒を設置して、後続車に危険を知らせる。"}, "explanation": "故障車と出張作業車両の車間距離は最低50m以上離す必要がある。10mでは近すぎて危険であり不適切。", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 30, "label": "問30", "points": 3, "answer": "C", "stem": "法令で管理が定められた組織に関する記述として、適切なものはどれか。", "choices": {"A": "常時３０名以上雇用する拠点は、安全衛生委員会を設置・運営する。", "B": "常時５０名以上雇用する拠点は、安全衛生推進者を選任し、安全衛生・労災防止業務を行う。", "C": "指定の研修を受講した者を安全管理者として選任し、構内設備と作業の巡視、危険防止措置をとる。"}, "explanation": "安全管理者は指定の研修を受講した者を選任し、設備・作業の巡視と危険防止措置を担う→正しい。A：安全衛生委員会は常時50名以上。B：安全衛生推進者は10名以上50名未満の事業場が対象。", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 31, "label": "問31", "points": 5, "answer": "A", "stem": "【問２(1)】保険による事故修理を実施販売会社が下記内容で行なった。元販売会社への請求金額を消費税込で計算した場合、適切なものはどれか。\n\n実施販売会社の保険査定額（税抜き）\n技術料：２４０，０００円\n部品代：１１０，０００円\nレッカー代（外注作業）：８０，０００円\n外注部品代：９０，０００円\n\n（注）答えが小数点以下になる場合は、小数点以下第１位を四捨五入すること。", "choices": {"A": "５２７，５８０円", "B": "５３３，５２０円", "C": "５０５，４４０円", "D": "５２２，７２０円", "E": "４８８，５００円"}, "explanation": "【計算】2019年5月は消費税8%\n技術料：240,000×0.95＝228,000円\n部品代：110,000×0.90＝99,000円\n外注技術料：80,000×0.95＝76,000円\n外注部品代：90,000×0.95＝85,500円\n小計：488,500円\n消費税込（8%）：488,500×1.08＝527,580円 → A", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 32, "label": "問32", "points": 5, "answer": "C", "stem": "【問２(2)】２０１９年５月、休日の２４時頃、元販売会社からエンジン始動不能車両のバッテリー交換（２個）の広域サービス対応依頼が入ったため、実施販売会社のサービスエンジニアが１８ｋｍ先の故障車までサービスカーで出動した。元販売会社への請求金額を消費税込みで計算した場合、適切なものはどれか。\n\n部品代（純正ＰＢバッテリー原価）：１３，５００円（１個）\n標準作業時間（バッテリー交換）：０．９ｈ\n元販売会社の工賃レート：９，０００円\n実施販売会社の工賃レート：７，５００円\nサービスカー出張料金：通過車両規定に記載の通り\nその他費用：通過車両規定に記載の通り", "choices": {"A": "６４，１３０円", "B": "６７，０４６円", "C": "７２，８７８円", "D": "７３，８７２円", "E": "７４，３３６円"}, "explanation": "【計算】2019年5月は消費税8%。休日深夜の出張対応。\n部品代：13,500×2×1.2＝32,400円\n技術料（出張割増・休日深夜割増・振替控除含む）\nサービスカー：基本8,000円＋距離料（18km）×振替控除\n特別対応料（時間外10,000円＋深夜5,000円）\n合計×1.08＝72,878円 → C", "source": "19年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 1, "label": "問1", "points": 3, "answer": "B", "stem": "お客様がご来店された時の迎え方として、適切なものはどれか。", "choices": {"A": "お客様に呼ばれるまで席で待つ。", "B": "フロントアドバイザーから積極的に近づく。", "C": "お客様がカウンターに来るのを待つ。"}, "explanation": "お客様がご来店された時は、すぐに挨拶をして、お待たせしたり、無視をしたりすることがないようにする。フロントアドバイザーから積極的に近づく（B適切）。", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 2, "label": "問2", "points": 3, "answer": "C", "stem": "フロントアドバイザーがお客様応対を行う際、常に持つ意識として、適切なものはどれか。", "choices": {"A": "受付係", "B": "情報連絡係", "C": "会社の代表"}, "explanation": "フロントアドバイザーに対する信頼感がそのまま会社に対する印象や信頼感になる。常に「会社の代表」という意識を持って応対する。", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 3, "label": "問3", "points": 3, "answer": "A", "stem": "受付時に現車の確認を行う際の注意点に関する記述として、不適切なものはどれか。", "choices": {"A": "貴重品や高価なものが搭載されていたら、お客様に伝えフロントで大切に保管しておく。", "B": "車両の傷、汚れ、積荷などの状態をお客様と一緒に確認し、納車後のトラブル防止を図る。", "C": "不正改造の有無を十分にチェックし、不正改造がある場合にはお客様に説明し、正規の姿に戻すようにお願いする。"}, "explanation": "貴重品はお客様自身に確認して頂き、お客様自身が持ち帰るようにお願いする。フロントで保管するのは不適切。", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 4, "label": "問4", "points": 3, "answer": "C", "stem": "お客様への説明方法として、適切なものはどれか。", "choices": {"A": "完成時間や整備料金について見通しがつかない場合は、具体的な表現は避ける。", "B": "分解してみなければ正確なことが分からない場合は、誤解を与えないようにあいまいな表現をしておく。", "C": "お客様に技術説明をする場合は、現物や資料を示して説明をする。"}, "explanation": "お客様には、あいまいな表現は避け、具体的に現物や資料を見せて説明をする（C適切）。見通しがつかない場合も具体的な表現で伝える。", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 5, "label": "問5", "points": 3, "answer": "C", "stem": "電話対応に関する記述として、不適切なものはどれか。", "choices": {"A": "電話をかけた場合もかかってきた場合も、相手が電話を切ったことを確認してから電話を切る。", "B": "電話をかける前には、関係書類、筆記用具、メモ用紙など必要なものを手元にそろえておく。", "C": "表情、服装など相手には見えないので、背筋を伸ばしたり頭を下げたりはしない。"}, "explanation": "相手に姿が見えないからこそ、声に気持ちをのせる必要がある。正しい姿勢で電話対応することが重要であり、「頭を下げたりはしない」は不適切。", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 6, "label": "問6", "points": 3, "answer": "B", "stem": "確かな保証修理を実施するための基本３カ条として、不適切なものはどれか。", "choices": {"A": "\"よく聞き\"\"よく見て\"保証判定", "B": "不具合範囲を特定し、最大単位で保証修理", "C": "お客様のご用命に基づき保証受付"}, "explanation": "保証修理の基本3カ条の一つは「最小単位で保証修理」。「最大単位で保証修理」は不適切。必要最小限の修理を行うことが原則。", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 7, "label": "問7", "points": 3, "answer": "A", "stem": "品質改善に関する記述として、適切なものはどれか。", "choices": {"A": "「改善対策」とは、保安基準に関わらず、日野自動車（メーカー）が安全確保、公害防止の観点から必要と判断した場合に実施するものである。", "B": "「サービスキャンペーン」とは、車両の構造・装置の不具合による事故を未然に防止することを目的とした制度である。", "C": "「リコール」とは、車両の構造・装置・性能等が、保安基準に適合しなくなる場合に、保証書とは別に有償で修理するものである。"}, "explanation": "改善対策はメーカーが安全確保・公害防止の観点から実施するもの（A適切）。リコールは保安基準に適合しなくなるおそれがある場合に無償で修理するもの（C：有償は不適切）。サービスキャンペーンは商品品質改善の観点から実施するもの。", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 8, "label": "問8", "points": 3, "answer": "C", "stem": "「通過車両対応に関する業務処理規定」の記述として、不適切なものはどれか。", "choices": {"A": "実施販売会社とは、通過車両を修理対応する販売会社をいう。", "B": "元販売会社とは、通過車両を修理対応する際、その車両を販売した販売会社や主幹販社など、現在取引のある販売会社を総称していう。", "C": "通過車両とは、自社以外の販売会社が販売した車両や、自社の他拠店が販売した車両を総称していう。"}, "explanation": "通過車両とは、自社以外の販売会社が販売した車両をいう。自社の他拠店が販売した車両は通過車両に含まれない（C不適切）。", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 9, "label": "問9", "points": 3, "answer": "A", "stem": "整備料金の説明と回収に関する記述として、不適切なものはどれか。", "choices": {"A": "有償と無償の作業を同時に行う場合、請求時点で「有償、無償の区別」「料金」を明確に「お客様に説明」しておくことが、「整備料金」の円滑な回収につながる。", "B": "提供する点検、整備の価値を十分理解していただけるよう、わかりやすく「お客様に説明」することも機能的サービスの一環である。", "C": "サービス部門で販売する商品は点検、整備という機能的サービスすなわち、点検整備作業における「技術の提供」である。"}, "explanation": "料金と有償・無償の説明は受注時点で行う（請求時点ではなく）。受注時に説明することが整備料金の円滑な回収につながる。", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 10, "label": "問10", "points": 3, "answer": "A", "stem": "ＨＩＴＯＳＳIIお客様照会画面の対応区分に関する記述として、適切なものはどれか。", "choices": {"A": "対応区分「０１」は、優良客である。", "B": "対応区分「０２」は、条件付き客である。", "C": "対応区分「０４」は、不良客である。"}, "explanation": "対応区分01（S）は優良客（A適切）。対応区分02（B）は不良客。対応区分04（G）は条件付客。", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 11, "label": "問11", "points": 3, "answer": "B", "stem": "ＨＩＴＯＳＳIIで売掛金を確認する照会画面として、適切なものはどれか。", "choices": {"A": "整備歴照会", "B": "お客様照会", "C": "お客様車両照会"}, "explanation": "売掛金の確認は「お客様照会」の画面で行う。整備歴照会は整備の履歴、お客様車両照会は車両情報の確認。", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 12, "label": "問12", "points": 3, "answer": "C", "stem": "２ヶ月以上の売掛残高があるお客様の修理受付応対として、適切なものはどれか。", "choices": {"A": "すべて受付拒否をする。", "B": "回収してからでなければ受付業務を行わない。", "C": "支払いの確認と督促を行ったうえで受付をする。"}, "explanation": "2ヶ月以上の売掛残高があるお客様でも、一律に受付拒否や回収後でないと受付しないのではなく、支払いの確認と督促を行ったうえで受付をする（C適切）。", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 13, "label": "問13", "points": 3, "answer": "C", "stem": "領収書に関する記述として、不適切なものはどれか。", "choices": {"A": "領収書そのものには、有効期限はない。", "B": "商法上の重要取引で使われた領収書は、１０年保管が必要。", "C": "必要項目の記載があっても名刺の裏では、認められない。"}, "explanation": "必要項目の記載があれば、名刺の裏でも領収書として認められる（C不適切）。領収書に有効期限はなく、商法上の重要取引の領収書は10年保管が必要。", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 14, "label": "問14", "points": 3, "answer": "B", "stem": "売上が９９万円のときに、領収書に貼り付ける収入印紙の金額として、適切なものはどれか。", "choices": {"A": "非課税なので貼らない", "B": "２００円", "C": "６００円"}, "explanation": "5万円未満は非課税。5万円以上100万円以下は200円の収入印紙が必要。99万円は5万円以上100万円以下に該当するため200円（B適切）。", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 15, "label": "問15", "points": 3, "answer": "C", "stem": "ひとまわり点検に関する記述として、適切なものはどれか。", "choices": {"A": "ひとまわり点検はお客様が来場の際、フロントアドバイザーが応対中にエンジニアが点検を実施し不具合箇所があればフロントアドバイザーに報告し、指示を仰ぐ事が基本的な流れである。", "B": "ひとまわり点検の一番の目的とは、フロントアドバイザーの気づいていない不具合を見つけ修理する事である。", "C": "ひとまわり点検のやり方は、まずお客様のご要望事項を確認した後、ひとまわり点検を効率よく実施するように努める。"}, "explanation": "ひとまわり点検は、お客様の要望を聞いた後に行う（C適切）。一番の目的はお客様の安全運行の手助けをすること（B不適切）。", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 16, "label": "問16", "points": 3, "answer": "C", "stem": "バッテリー上がり時のブースターケーブル接続手順に関する記述として、適切なものはどれか。", "choices": {"A": "①バッテリ上がり車のエンジン本体（マイナス）\n②救援車の－（マイナス）ターミナル\n③救援車の＋（プラス）ターミナル\n④バッテリ上がり車の＋（プラス）ターミナル", "B": "①救援車の＋（プラス）ターミナル\n②バッテリ上がり車の＋（プラス）ターミナル\n③救援車の－（マイナス）ターミナル\n④バッテリ上がり車のエンジン本体（マイナス）", "C": "①バッテリ上がり車の＋（プラス）ターミナル\n②救援車の＋（プラス）ターミナル\n③救援車の－（マイナス）ターミナル\n④バッテリ上がり車のエンジン本体（マイナス）"}, "explanation": "正しい接続順序：①バッテリ上がり車の＋→②救援車の＋→③救援車の－→④バッテリ上がり車のエンジン本体（マイナス）。プラス同士を先につなぎ、マイナスはエンジン本体に接続する（C適切）。", "source": "19年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 17, "label": "問17", "points": 3, "answer": "A", "stem": "ＬＬＣに関する記述として、適切なものはどれか。", "choices": {"A": "ＬＬＣの濃度が低いと防錆効果および凍結防止性が低下する。", "B": "ＬＬＣの濃
