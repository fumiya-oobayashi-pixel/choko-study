荷状態、付属品の状態をお客様と一緒に確認し、気づき事項を記録する。"}, "explanation": "違法改造が発見された場合でも、即座に入庫拒否するのではなく、まずお客様に適切に説明し、整備できる範囲での対応を検討する。発見した時点で一方的にお断りするのは不適切。", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 2, "label": "問2", "points": 3, "answer": "B", "stem": "外注依頼書の発行に関する記述として、適切なものはどれか。", "choices": {"A": "作業指示書発行後、外注作業が発生した場合は、作業指示書のコピーで対応出来る。", "B": "発注価格が決定しない場合、確定予定日と理由を明記する。", "C": "納期は変わることがあるので、発注時は特に提示する必要はない。"}, "explanation": "発注価格が未確定の場合は確定予定日と理由を明記する。外注作業にはコピーではなく外注依頼書が必要で、納期は必ず発注時に提示しなければならない。", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 3, "label": "問3", "points": 3, "answer": "C", "stem": "事故見積りを実施する際、構造上の着眼点に関する記述として、不適切なものはどれか。", "choices": {"A": "断面形状の変化部位", "B": "部材形状の変化部位", "C": "衝撃力の力点部位"}, "explanation": "事故見積りの構造上の着眼点は「断面形状の変化部位」「部材形状の変化部位」「変形の波及部位」の3点。衝撃力の力点部位は着眼点に含まれない。", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 4, "label": "問4", "points": 3, "answer": "B", "stem": "レッカーサービスの実施要領として、不適切なものはどれか。", "choices": {"A": "本サービスを提供するお客様は、日野販売会社と整備契約を結んでいる顧客の内、優良客および普通客を対象としている。", "B": "対象車両は、日野大・中・小型トラック／バスであり、他社車両や日野スカニア車については対象外である。", "C": "レッカーサービスの対象となる作業項目は、脱輪等の引き上げ及び自走不可能となった車両の牽引がある。"}, "explanation": "日野スカニア車も日野販売会社が扱う車両であるため、レッカーサービスの対象となる。他社車両のみが対象外であり、日野スカニア車を対象外とするのは不適切。", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 5, "label": "問5", "points": 3, "answer": "C", "stem": "Ｓ．Ｏ．Ｓ緊急サービスの実施概要として、不適切なものはどれか。", "choices": {"A": "お客様の車両が路上故障（事故を含む）した場合、目的地まで安全に運行出来るよう応急処置を行う。", "B": "お客様からの入電は、原則としてコールセンターで受付し、ご要望内容に応じて夜間出動スタッフへ出動手配を行う。", "C": "主要幹線道路沿い販売会社から数社を選定し、アドバイザーが、お客様へ技術的なアドバイスを実施する。"}, "explanation": "アドバイザーはお客様に対してではなく、出動スタッフおよびコールセンターに対して技術的な支援を実施する。お客様への直接対応は出動スタッフが行う。", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 6, "label": "問6", "points": 3, "answer": "B", "stem": "通過車両規定において、受付時の応対に関する記述として、適切なものはどれか。", "choices": {"A": "他販売会社のリコール未実施車両が入庫した場合、早急にリコール作業を実施しなければならないので入庫した販売会社で実施する。", "B": "他販売会社のリコール未実施車両が入庫した場合、元販売会社に連絡し、どちらの販売会社で実施するか相談する。", "C": "他販売会社のリコール未実施車両が入庫した場合、元販売会社で実施するようにお客様へ伝える。"}, "explanation": "他販売会社のリコール未実施車両が入庫した場合、まず元販売会社に連絡してどちらで実施するか相談することが正しい対応。", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 7, "label": "問7", "points": 3, "answer": "C", "stem": "通過車両規定の特別対応料および体制維持費に関する記述として、不適切なものはどれか。", "choices": {"A": "出張作業の安全確保の為（２名出動を原則）、時間外の特別対応料を１０，０００円とする。", "B": "深夜の場合は、５，０００円を割り増し、他メーカー車両の場合は、１０，０００円を割り増し請求することができる。", "C": "登録前車両の対応時は、特別対応料および体制維持費を保証申請にてメーカーに請求できる。"}, "explanation": "登録前車両の対応時の特別対応料および体制維持費は、メーカーへの保証申請の対象外。販売会社間の通過車両規定に基づき処理される。", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 8, "label": "問8", "points": 3, "answer": "B", "stem": "通過車両規定の基本的な内容に関する記述として、不適切なものはどれか。", "choices": {"A": "営業日の平日とは、月曜日から土曜日をいう。但し各実施販売会社の休業日を除く。", "B": "営業時間内とは、平日の９：００～１９：００の時間をいう。", "C": "営業時間外の対応では、他メーカー車両の修理は原則として行わないこととする。（トヨタ車は除く）"}, "explanation": "営業時間内とは、平日の８：００～１７：００をいう（各販売会社の定める時間）。９：００～１９：００という記述は不適切。", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 9, "label": "問9", "points": 3, "answer": "A", "stem": "売掛金に関する記述として、不適切なものはどれか。", "choices": {"A": "売掛金は銀行から融資を受ける場合の担保となる。", "B": "売掛金は約束日に支払わなくても法的な制裁はない。", "C": "売掛金はそのままでは利息がつかない。"}, "explanation": "売掛金は原則として担保にはなりにくい。担保として認められるのは不動産や在庫などが一般的。売掛金の約束日未払いは法的制裁があり、そのままでは利息もつかない。", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 10, "label": "問10", "points": 3, "answer": "C", "stem": "即伝のポイントに関する記述として、適切なものはどれか。", "choices": {"A": "ＨＩＴＯＳＳIIでの部品出庫確認は、その作業がすべて終了した時点で使用した部品と未使用部品を確認してからＨＩＴＯＳＳIIで出庫確認をする。", "B": "外注先からの納品書は、整備作業が終了したのを確認してから伝票を提出してもらい、間違えないように売上時に外注仕入れをする。", "C": "ご用命結果の最終確認責任はフロントにあるので、必ず現車を見ながら、班長または班員と共に作業結果を確認し、確認漏れのないようにする。"}, "explanation": "ご用命結果の最終確認責任はフロントにある。必ず現車を確認しながら班長・班員と共に作業結果を確認することが正しい手順。部品の出庫確認は作業中に逐次行い、外注伝票は納品時に受領するのが正しい。", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 11, "label": "問11", "points": 3, "answer": "A", "stem": "ＨＩＴＯＳＳII作業明細画面の「＊」欄に関する記述として、不適切なものはどれか。", "choices": {"A": "「 ＋ 」を入力すると、行を挿入することができる。", "B": "「 － 」を入力すると、行を削除することができる。", "C": "「 Ｍ 」を入力すると、その行を移動することができる。移動先には「 Ａ 」もしくは「 Ｂ 」を入力する必要がある。"}, "explanation": "行を挿入するには「Ｉ（アイ）」を入力する。「＋」は行の挿入には使用しない。「－」で削除、「Ｍ」で移動は正しい記述。", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 12, "label": "問12", "points": 3, "answer": "A", "stem": "通過車両規定において、実施販売会社の請求方法に関する記述として、適切なものはどれか。", "choices": {"A": "作業完了後、即時に納品書を元販売会社宛に必ず発送する。また、保証整備作業の場合は必ず現品の送状（写）を添付する。", "B": "毎月１５日を締切日とし、当月分の請求書を一括して元販売会社に発送する。その際、請求明細書を添付する。", "C": "残高通知は請求側、支払側とも１ヶ月ごとに残高整理を行い、元販売会社に通知するものとする。"}, "explanation": "作業完了後即時に納品書を元販売会社宛に発送し、保証整備の場合は現品の送状（写）を添付する。請求の締切日は月末、残高整理は3ヶ月ごとが正しい。", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 13, "label": "問13", "points": 3, "answer": "C", "stem": "通過車両の売上に関する記述として、不適切なものはどれか。", "choices": {"A": "平日で深夜出張の技術料割増は、７５％である。", "B": "休日で深夜出張の技術料割増は、１００％である。", "C": "実施販売会社が使用した電話料金は、元販売会社に振替請求できない。"}, "explanation": "実施販売会社が対応のために使用した電話料金（連絡費用）は、通過車両規定に基づき元販売会社に振替請求することができる。請求できないとする記述は不適切。", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 14, "label": "問14", "points": 3, "answer": "A", "stem": "通過車両対応に関する業務処理規定の保証修理に関する作業の処理方法について、適切なものはどれか。", "choices": {"A": "現品の元販売会社への到着期限は、故障発生日より２０日以内とする。", "B": "現品の元販売会社への到着期限は、故障発生日より１５日以内とする。", "C": "現品の元販売会社への到着期限は、故障発生日より３０日以内とする。"}, "explanation": "通過車両の保証修理における現品の元販売会社への到着期限は、故障発生日より20日以内。", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 15, "label": "問15", "points": 3, "answer": "A", "stem": "２＊Ｇ付デュトロの安全装置に関する記述として、適切なものはどれか。", "choices": {"A": "電子インナーミラーは、シフトレバーがＲレンジのときは遠方後方表示ができない。", "B": "誤発進抑制機能は、壁面ガラスを検知できない。", "C": "クリアランスソナーは、障害物の接近を検知し、エンジンの出力を制御する。"}, "explanation": "電子インナーミラーはシフトレバーがRレンジの際は近距離後方表示に切り替わり、遠方後方表示はできない。誤発進抑制機能はガラスも検知可能で、クリアランスソナーは警報を発するがエンジン出力は制御しない。", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 16, "label": "問16", "points": 3, "answer": "A", "stem": "２＊Ｇ付プロフィアに搭載されている安全装置に関する記述として、適切なものはどれか。", "choices": {"A": "ふらつき警報装置は操舵角センサによりハンドルのふらつきを判断し、覚醒度の低下をマルチインフォメーションに警報として表示する。", "B": "ＰＣＳは衝突の恐れが高いとコンピューターが判断すると、警報ブザーで運転者に注意を促し、さらに衝突の可能性が高くなると警報制動を作動させる。", "C": "車線逸脱警報装置は６０ｋｍ／ｈ越えかつ曲線Ｒ２５０ｍ以上で作動し、タイヤが車線を越えそうになると運転者に警報音を発して注意を促す。"}, "explanation": "ふらつき警報装置は操舵角センサでハンドルのふらつきを判断し、マルチインフォメーションに警報表示する。PCSは自動ブレーキも作動させ、車線逸脱警報の作動条件のR250mは不正確（R350m以上）。", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 17, "label": "問17", "points": 3, "answer": "C", "stem": "取扱説明書のコーションラベルに関する記述として、不適切なものはどれか。", "choices": {"A": "「危険」とは、取り扱いを誤った場合、生命の危険や重大な傷害につながる事項である。", "B": "「警告」とは、取り扱いを誤った場合、生命の危険や重大な傷害につながる可能性がある事項である。", "C": "「注意」とは、取り扱いを誤った場合、車の故障や破損につながる可能性がある事項である。"}, "explanation": "「注意」とは、取り扱いを誤った場合に軽傷を負う恐れや物的損害が生じる可能性のある事項。「車の故障や破損」のみに言及するのは不十分・不適切で、人への軽傷害も含まれる。", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 18, "label": "問18", "points": 3, "answer": "A", "stem": "メーターに表示されるマルファンクションインジケーターランプに関する記述として、適切なものはどれか。", "choices": {"A": "エンジン回転中にエンジン電子制御システムや、電子制御スロットルに異常があると点灯する。", "B": "排出ガス浄化性能に影響を与える部品やシステムに異常があると点灯させる。", "C": "排出ガス浄化性能に影響を与える部品やシステムに異常があると点滅させる。"}, "explanation": "マルファンクションインジケーターランプは、エンジン電子制御システムや電子制御スロットルの異常で点灯する。排出ガス浄化に関連するのは別のランプ（DPRランプ等）。", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 19, "label": "問19", "points": 3, "answer": "A", "stem": "道路運送車両法に照らし、自動車の種別として、不適切なものはどれか。", "choices": {"A": "大型自動車", "B": "小型自動車", "C": "大型特殊自動車および小型特殊自動車"}, "explanation": "道路運送車両法上の自動車の種別は「普通自動車」「小型自動車」「軽自動車」「大型特殊自動車」「小型特殊自動車」の5種。「大型自動車」という区分は道路交通法の区分であり、道路運送車両法には存在しない。", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 20, "label": "問20", "points": 3, "answer": "B", "stem": "保安基準適合証および保安基準適合標章の有効期限として、適切なものはどれか。", "choices": {"A": "検査員が検査をした日を含み７日間。", "B": "検査員が検査をした日を含み１５日間。", "C": "検査員が検査をした日を含み３０日間。"}, "explanation": "保安基準適合証および保安基準適合標章の有効期限は、検査員が検査をした日を含み15日間。", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 21, "label": "問21", "points": 3, "answer": "A", "stem": "道路運送車両法および自動車点検基準に照らし、「事業用自動車の定期点検基準」に該当する自動車として、適切なものはどれか。", "choices": {"A": "乗車定員１１人以上の自家用自動車", "B": "乗車定員１０人以下の幼児運送専用の自家用普通・小型自動車", "C": "車両総重量８トン未満の貨物運送用の自家用普通・小型自動車"}, "explanation": "事業用自動車の定期点検（3ヶ月点検）基準に該当するものとして、乗車定員11人以上の自家用自動車（大型バス等）が含まれる。幼児専用自動車や8トン未満の自家用貨物車は別基準。", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 22, "label": "問22", "points": 3, "answer": "B", "stem": "道路運送車両の保安基準に照らし、２０１７年制作車両で大型後部反射器を備えなければならない車両の記述として、適切なものはどれか。", "choices": {"A": "車両総重量６トン以上の貨物運送用普通自動車", "B": "車両総重量７トン以上の貨物運送用普通自動車", "C": "車両総重量８トン以上の貨物運送用普通自動車"}, "explanation": "2017年（平成29年）制作車両において、大型後部反射器を備えなければならないのは車両総重量7トン以上の貨物運送用普通自動車。", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 23, "label": "問23", "points": 3, "answer": "C", "stem": "自賠責保険に関する記述として、適切なものはどれか。", "choices": {"A": "自賠責保険で補償されるのは、相手を怪我または死亡させた場合や、相手の物を破損した場合に保険金が支払われる。自分自身の怪我に対しては保険金は支払われない。", "B": "賠償額の確定までに時間がかかるような場合、被害者は、加害者の加入している保険会社に保険金の前払いを請求することができる。これを仮渡金といい、死亡した者１人につき、３９０万円である。", "C": "加害者が不誠実であったり、金額面で折り合いがつかずに示談が成立しない場合などには、被害者が損害賠償額を直接、保険会社に支払うよう請求できる。"}, "explanation": "被害者が損害賠償額を直接保険会社に請求する「直接請求権」は自賠責保険の重要な特徴。A：自賠責は物損は対象外で正しい部分もあるが全体として不正確。B：仮渡金の死亡額は290万円（390万円は誤り）。", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 24, "label": "問24", "points": 3, "answer": "B", "stem": "保険の処理および計算方法に関する記述として、不適切なものはどれか。", "choices": {"A": "分損とは、事故車が修理可能でしかも車両の修理費が、車の時価よりも低い場合の損害のことをいう。", "B": "保険金の限度は１事故ごとに取扱い、保険金が支払われると保険金額が減少する。", "C": "自動車保険では一定の枠を設けてそれ以下の損害は支払い対象としないことにしており、免責金額として契約している。"}, "explanation": "保険金が支払われても保険金額は減少しない（不減額方式）。1事故ごとに保険金を取扱うのは正しいが、支払後も保険金額は元の額を維持する。", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 25, "label": "問25", "points": 3, "answer": "A", "stem": "日野メンテナンスリースに関する記述として、不適切なものはどれか。", "choices": {"A": "保守整備契約（Ｒ契約：故障修理契約）については、代車費用も含まれる。", "B": "日野が販売する中古の大・中・小トラック（新規導入・日野車）は、メンテナンスリースの受入れが可能である。", "C": "本契約締結後の法令の制定、改廃、官公庁の指示・指導に起因する修理、改造、部品の取付、点検整備などはメンテナンスサービスに含まれない。"}, "explanation": "Ｒ契約（故障修理契約）には代車費用は含まれない。代車費用は別途契約・オプションとなる。中古トラックの受入れ可能・法令起因修理の除外はいずれも正しい記述。", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 26, "label": "問26", "points": 3, "answer": "C", "stem": "日野デュトロハイブリッドバッテリー安心パックに関する記述として、適切なものはどれか。", "choices": {"A": "基本パック（リース以外）は、有効期限５年で価格は３０千円になる。", "B": "有効期間中、ハイブリッドバッテリーに交換の必要が生じた場合、無料でハイブリッドバッテリーを交換できる（交換工賃別）。", "C": "有効期間内である自動車を購入されたお客様は、自動車と証書を最寄りの販売会社にお持ちいただき、手続きを行うことにより継承することができる。"}, "explanation": "有効期間内の自動車を購入したお客様は販売会社で手続きを行うことで安心パックを継承できる。A：価格・有効期限は正確ではない。B：ハイブリッドバッテリーの交換工賃も無料が正しい。", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 27, "label": "問27", "points": 3, "answer": "B", "stem": "指定自動車整備事業を適正に運営するための「指定整備業務の日野標準書」に記載されている第一ポイントは「保安基準不適合車の受付防止」であるが、第二ポイントとして、適切なものはどれか。", "choices": {"A": "フロントの作業指示不徹底による作業漏れの防止", "B": "受け入れ点検の実施と追加作業の承認実施", "C": "整備完了車引渡し時の整備内容の説明実施"}, "explanation": "指定整備業務の日野標準書の第二ポイントは「受け入れ点検の実施と追加作業の承認実施」。第一ポイントの保安基準不適合車受付防止に続く重要な業務手順。", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 28, "label": "問28", "points": 3, "answer": "C", "stem": "自動車のタイヤ組み替え時に空気圧縮機を用いた空気充填の業務に必要な資格として、適切なものはどれか。", "choices": {"A": "資格はいらない", "B": "技能講習", "C": "特別教育"}, "explanation": "空気圧縮機を用いた空気充填業務（タイヤ空気充填等）は、労働安全衛生法に基づく「特別教育」が必要。無資格や技能講習では不足。", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 29, "label": "問29", "points": 3, "answer": "B", "stem": "廃棄物処理に関する記述として、不適切なものはどれか。", "choices": {"A": "廃消火器は、腐食による破裂を避けるため雨に濡れない場所で保管し、消火器販売店等の特定窓口に（リサイクルシールを購入、張り付け）引き渡すこと。", "B": "廃バッテリーは、可燃性ガスの発生や破裂の危険性があるので屋根のない野外で保管し、できる限り有価売却すること。", "C": "廃発炎筒は、多量に保管せず製造メーカー等の指定引取場所へ指定配送業者により、専用箱で送付、引渡し時に廃棄管理伝票を受取り保管すること。"}, "explanation": "廃バッテリーは可燃性ガスの発生や破裂の危険があるため、屋外ではなく屋内で適切に保管しなければならない。屋根のない野外保管は危険で不適切。", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 30, "label": "問30", "points": 3, "answer": "C", "stem": "ＣＳに関する記述として、適切なものはどれか。", "choices": {"A": "ＣＳ活動を盛り上げていくポイントは大きく分けて、品質、スピード、価格の３項目があると言われている。", "B": "「ＣＳの要素」は、便利、親しみ、楽しさ、安心の４項目と言われている。", "C": "「ＣＳの要素」を満たすには、対応のＣＳ、基盤のＣＳの２つを意識することが必要である。"}, "explanation": "CSの要素を満たすには「対応のCS（接客・応対など）」と「基盤のCS（品質・技術・設備など）」の2つを意識することが必要。A・Bのポイントや要素の記述は不正確。", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 31, "label": "問31", "points": 5, "answer": "D", "stem": "【問２(1)】通過車両の業務処理規定に照らし、元販売会社から通過車両の対応依頼が入り、平日の１４時にお客様が実施販売会社に来店しバッテリー交換を下記内容で実施した。元販売会社への請求金額を消費税込みとして、適切なものはどれか。\n\n部品代（純正PBバッテリー）：１３，０００円（原価）×２個\n標準作業時間：バッテリー交換 ０．９時間\n実施販売会社の工賃レート：９，５００円\n元販売会社の工賃レート：９，０００円\n\n（注）答えが少数点以下になる場合は、小数点以下第１位を四捨五入すること。", "choices": {"A": "３０，４０４円", "B": "４１，０８３円", "C": "４１，４８０円", "D": "４１，８４４円", "E": "４１，５２０円"}, "explanation": "【計算】来店のため出張割増・サービスカーなし\n技術料振替：9,500×0.9×0.8＝6,840円\n純正PBバッテリー：13,000×2×1.2＝31,200円\n小計：38,040円\n消費税込：38,040×1.1＝41,844円 → D", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 32, "label": "問32", "points": 5, "answer": "D", "stem": "【問２(2)】保険による事故修理の実施販売会社から元販売会社への請求金額を消費税込みとして、適切なものはどれか。\n\n実施販売会社の保険査定額（消費税抜き）\n技術料：５４，０００円\n部品代（サイドミラー）：１８，０００円\n\n（注）答えが少数点以下になる場合は、小数点以下第１位を四捨五入すること。", "choices": {"A": "７１，２８０円", "B": "７２，９００円", "C": "７２，２７０円", "D": "７４，２５０円", "E": "７５，２４０円"}, "explanation": "【計算】\n技術料振替：54,000×0.95＝51,300円\n部品代振替：18,000×0.90＝16,200円\n小計：67,500円\n消費税込：67,500×1.1＝74,250円 → D", "source": "20年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 1, "label": "問1", "points": 3, "answer": "B", "stem": "日野サービスの基本として、不適切なものはどれか。", "choices": {"A": "お客様の期待を上回る仕事を提供することである。", "B": "部品の価格を通常よりも安くお客様に提供することである。", "C": "お客様目線で業務を行うことである。"}, "explanation": "日野サービスの基本は、無償の行動や価格を安くすることではなく、お客様に信頼・満足していただいて期待を上回る仕事を提供することが最良のサービスと考えている。", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 2, "label": "問2", "points": 3, "answer": "C", "stem": "接客対話の基礎に関する記述として、不適切なものはどれか。", "choices": {"A": "相手の話しや、言い分をじっくり最後まで聞ける、聞き上手になる。", "B": "感情的な議論をしないためには、落ち着いた態度と、なごやかな口調で話す。", "C": "内容をよく分かってもらうために、専門用語をなるべく使って説明する。"}, "explanation": "専門用語ではなく、一般的な用語で話す。", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 3, "label": "問3", "points": 3, "answer": "B", "stem": "名刺の受け渡しマナーとして、適切なものはどれか。", "choices": {"A": "名刺を受け取ったらすぐにしまう。", "B": "名前の読み方がわからない場合は、その場で確認する。", "C": "打合せ内容を忘れないように、その場で名刺にメモをする。"}, "explanation": "名刺を受取ってもすぐにしまわない。名刺にその場ではメモをしない。名前の読み方がわからない場合はその場で確認する（B適切）。", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 4, "label": "問4", "points": 3, "answer": "A", "stem": "ＨＩＴＯＳＳIIお客様照会画面の対応区分に関する記述として、適切なものはどれか。", "choices": {"A": "対応区分「０１」は、優良客である。", "B": "対応区分「０２」は、条件付き客である。", "C": "対応区分「０４」は、不良客である。"}, "explanation": "対応区分01（S）は優良客（A適切）。対応区分02（B）は不良客。対応区分04（G）は条件付客。", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 5, "label": "問5", "points": 3, "answer": "C", "stem": "保証修理の役割に関する記述として、不適切なものはどれか。", "choices": {"A": "お客様の信頼の回復と維持", "B": "市場技術情報の収集による品質向上", "C": "お客様収益の維持"}, "explanation": "販売会社が保証修理費用の申請をすることにより販売会社の収益となる。お客様収益の維持は保証修理の役割ではない。", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 6, "label": "問6", "points": 3, "answer": "B", "stem": "外注依頼書発行業務に関する記述として、不適切なものはどれか。", "choices": {"A": "外注依頼書（控）はフロントにて管理する。", "B": "発注価格が決定しない場合、決定後即時に外注依頼書を発行する。", "C": "発行の際は、納期を必ず提示する。"}, "explanation": "価格が決定しない場合、理由と確定予定日を明記し、決定後即時に補充書面を発行する（外注依頼書を発行するのではなく補充書面を発行）。", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 7, "label": "問7", "points": 3, "answer": "C", "stem": "「通過車両対応に関する業務処理規定」に関する記述として、不適切なものはどれか。", "choices": {"A": "実施販売会社とは、通過車両を修理対応する販売会社をいう。", "B": "元販売会社とは、通過車両を修理対応する際、その車両を販売した販売会社や主幹販社など、現在取引のある販売会社を総称していう。", "C": "通過車両とは、自社以外の販売会社が販売した車両や、自社の他拠店が販売した車両を総称していう。"}, "explanation": "通過車両とは、自社以外の販売会社が販売した車両をいう。自社の他拠店が販売した車両は含まない。", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 8, "label": "問8", "points": 3, "answer": "B", "stem": "他販売会社のリコール未実施車両が入庫した場合の応対に関する記述として、適切なものはどれか。", "choices": {"A": "早急にリコール作業を実施しなければならないので入庫した販売会社で実施する。", "B": "元販売会社に連絡し、どちらの販売会社で実施するか相談する。", "C": "元販売会社で実施するようにお客様へ伝える。"}, "explanation": "他販売会社のリコール未実施車両が入庫した場合、元販売会社に連絡しどちらの販売会社で実施するか相談する。", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 9, "label": "問9", "points": 3, "answer": "A", "stem": "「通過車両対応に関する業務処理規定」に照らし、「お客様登録リスト」に登録されている車両で、営業時間内に元販売会社へお客様確認をとり修理対応を行なう必要がある項目として、適切なものはどれか。", "choices": {"A": "保証修理の対象と思われる場合。", "B": "レッカー対応修理の場合。", "C": "１件１万円以上になると思われる場合。"}, "explanation": "元販売会社へお客様確認をとった上で修理対応を行うのは：保証修理対象と思われるもの、事故修理、他メーカー車の修理、1件5万円以上になると思われる場合。A（保証修理対象）が適切。", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 10, "label": "問10", "points": 3, "answer": "A", "stem": "整備料金の説明と回収に関する記述として、不適切なものはどれか。", "choices": {"A": "有償と無償の作業を同時に行う場合、請求時点で「有償、無償の区別」「料金」を明確に「お客様に説明」しておくことが、「整備料金」の円滑な回収につながる。", "B": "サービス部門で販売する商品は点検、整備という機能的サービスすなわち、点検整備作業における「技術の提供」である。", "C": "提供する点検、整備の価値を十分理解していただけるよう、わかりやすく「お客様に説明」することも機能的サービスの一環である。"}, "explanation": "料金と有償・無償の説明は受注時点（請求時点ではなく）で行う。", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 11, "label": "問11", "points": 3, "answer": "B", "stem": "ＨＩＴＯＳＳIIで売掛金を確認する照会画面として、適切なものはどれか。", "choices": {"A": "整備歴照会", "B": "お客様照会", "C": "お客様車両照会"}, "explanation": "売掛金の確認は、お客様照会の画面で確認する。", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 12, "label": "問12", "points": 3, "answer": "B", "stem": "即伝の目的と効果に関する記述として、適切なものはどれか。", "choices": {"A": "事務処理が増えるので人員増強などの対策を取らないと、残業が増える可能性がある。", "B": "今日の売上、利益が当日分かるので、目標管理が容易になる。", "C": "車両引き渡し時に金額が提示できるため、ユーザーも腹づもりがしやすく、ＥＳの向上につながる。"}, "explanation": "即伝により事務処理業務が平準化するため、少人数での対応が可能。当日の売上・利益がわかり目標管理が容易になる（B適切）。車両引き渡し時の金額提示はCS向上につながる。", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 13, "label": "問13", "points": 3, "answer": "C", "stem": "通過車両規定に照らし、売上に関する記述として、不適切なものはどれか。", "choices": {"A": "修理で使用した油脂は、２０％控除する。", "B": "純正品タイヤ原価（ＤＮ）の２０％増しを振替金額とする。", "C": "自社レッカー使用は、１０％控除する。"}, "explanation": "自社レッカーの使用料金への10%控除は不適切。通過車両規定では、自社レッカーは公示料金の100%（控除なし）で元販社へ振り替える。", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 14, "label": "問14", "points": 3, "answer": "C", "stem": "通過車両規定に照らし、事故車の保管料に関する記述として、適切なものはどれか。", "choices": {"A": "修理しないものは、入庫日から起算し７日間は無料。", "B": "修理を実施したものは、元販売会社宛に完成した旨を通知した日から起算し７日間は無料。", "C": "修理しないものは、入庫日の翌日から８日間以上は１日につき９００円、小型車は５００円とする。"}, "explanation": "修理しないものは入庫日の翌日から起算して7日間は無料（入庫日からではない）。修理実施後は通知した翌日から7日間は無料。C（翌日から8日間以上→900円）が適切。", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 15, "label": "問15", "points": 3, "answer": "B", "stem": "ひとまわり点検に関する記述として、適切なものはどれか。", "choices": {"A": "ひとまわり点検はお客様が来場の際、フロントアドバイザーが応対中にエンジニアが点検を実施し不具合箇所があればフロントアドバイザーに報告し、指示を仰ぐ事が基本的な流れである。", "B": "ひとまわり点検のやり方は、まずお客様のご要望事項を確認した後、ひとまわり点検を効率よく実施するように努める。", "C": "ひとまわり点検の一番の目的とは、フロントアドバイザーの気づいていない不具合を見つけ修理する事である。"}, "explanation": "ひとまわり点検は、お客様の要望を聞いた後に行う（B適切）。ひとまわり点検の一番の目的は、お客様の安全運行の手助けをする事（C不適切）。", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 16, "label": "問16", "points": 3, "answer": "A", "stem": "２＊Ｇ付プロフィア（２０１９年モデル Ｊ－ＯＢＤ II対応車）のメーター内「ＭＩＬ表示」として、適切なものはどれか。\n\n※この問題は選択肢が計器画像のため、解説を参照してください。", "choices": {"A": "MIL（排気浄化系異常）ランプのみ点灯した表示", "B": "MILランプとチェックエンジン（！）ランプが両方点灯した表示", "C": "チェックエンジン（！）ランプのみ点灯した表示"}, "explanation": "MILとは排気ガス浄化性能に影響を与える部品・システム異常時に表示するランプ。エンジンマーク（ガスポンプ形）がMIL表示、エンジンに『！』のマークはチェックエンジンランプで別物。MILのみ点灯しているA（排気浄化系異常のみの表示）が適切。", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 17, "label": "問17", "points": 3, "answer": "C", "stem": "２＊Ｇ付デュトロ（２０１９年モデル）の誤発進抑制システムに関する記述として、不適切なものはどれか。", "choices": {"A": "駐車時や低速走行時にセンサーが進路上の障害物を検知し、障害物への衝突のおそれがあるときはシステムが作動する。", "B": "システムが作動するとエンジントルクカット制御及び自動ブレーキ制御により運転者の衝突回避操作を補助する。", "C": "障害物の検知にソナーセンサーを使用しているので、どしゃぶりの雨や雪、霧、砂嵐などの悪天候の影響を受けない。"}, "explanation": "ソナーセンサーに氷・雪・泥などが付着したときや、どしゃぶりの雨・水しぶきがかかるような悪天候の状況はシステムが正常に作動しないおそれがある。「悪天候の影響を受けない」は不適切。", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 18, "label": "問18", "points": 3, "answer": "B", "stem": "２＊Ｇ付レンジャー（２０１９年モデル）のオートハイビーム（ＡＨＢ）に関する記述として、不適切なものはどれか。", "choices": {"A": "フロントガラスに設置された画像センサーにより制御を行っている。", "B": "ハイビームを点灯する条件は、車速が約６０ｋｍ／ｈ以上で、前方が暗く対向車または先行車を検知していないときである。", "C": "ハイビームとロービームの切り替えは、対向車または先行車のランプや街路灯などの明るさを判断し、自動的に切り替えている。"}, "explanation": "ハイビームを点灯する条件は、車速が30km/h以上で、前方が暗く対向車または先行車を検知していないとき。「約60km/h以上」は不適切。", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 19, "label": "問19", "points": 3, "answer": "A", "stem": "道路運送車両法の保安基準に照らし、次の文章の［　］に当てはまる語句の組み合わせとして、適切なものはどれか。\n\n自動車は、長さ（セミトレーラーにあっては、連結中心から当該セミトレーラーの後端までの水平距離）［①］、幅［②］、高さ［③］を超えてはならない。", "choices": {"A": "①１２ｍ　②２．５ｍ　③３．８ｍ", "B": "①１２ｍ　②２．８ｍ　③４．０ｍ", "C": "①１４ｍ　②２．０ｍ　③３．７ｍ"}, "explanation": "自動車の外形寸法の制限は、長さ12m、幅2.5m、高さ3.8m（A適切）。", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 20, "label": "問20", "points": 3, "answer": "A", "stem": "シビアコンディションの判定例として、不適切なものはどれか。", "choices": {"A": "低速走行が走行距離の２０％以上。", "B": "悪路・雪道・多塵地帯走行が走行距離の３０％以上。", "C": "走行距離が１ヶ月あたり１０，０００ｋｍ以上。"}, "explanation": "シビアコンディションの判定基準は、低速走行が走行距離の30%以上。20%以上というのは不適切（A不適切）。", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 21, "label": "問21", "points": 3, "answer": "B", "stem": "保安基準適合証および保安基準適合標章の有効期限として、適切なものはどれか。", "choices": {"A": "検査員が検査をした日を含み７日間", "B": "検査員が検査をした日を含み１５日間", "C": "検査員が検査をした日を含み３０日間"}, "explanation": "保安基準適合証等の有効期間は、指定規則第9条により、検査をした日から15日間。", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 22, "label": "問22", "points": 3, "answer": "C", "stem": "下請法で定義している親事業者の４つの義務として、不適切なものはどれか。", "choices": {"A": "発注書面交付の義務", "B": "支払日を定める義務", "C": "商品受領の義務"}, "explanation": "下請法の親事業者の4つの義務は①発注書面の交付義務②支払日を定める義務③遅延利息を支払う義務④書類作成の義務。「商品受領の義務」は含まれない。", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 23, "label": "問23", "points": 3, "answer": "A", "stem": "自動車損害賠償責任保険（自賠責保険）に関する記述として、不適切なものはどれか。", "choices": {"A": "対人と対物賠償として入る保険。", "B": "自動車１台ごとに必ずつけなくてはならない保険（強制保険）。", "C": "保険の契約が締結されている車両でなければ運行してはならない。"}, "explanation": "自動車損害賠償保障法により、強制的につけなくてはならない対人賠償のみを担保するもの。対物賠償は含まれない。", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 24, "label": "問24", "points": 3, "answer": "A", "stem": "自動車損害賠償責任保険（自賠責保険）の支払金額に関する記述として、不適切なものはどれか。", "choices": {"A": "保険の支払いとして、ケガの場合で３００万円。", "B": "保険の支払いとして、死亡で３，０００万円。", "C": "保険の支払いとして、後遺障害（第１級）で４，０００万円。"}, "explanation": "ケガの場合の限度額は120万円（自賠法施行令第2条）。「300万円」は不適切。", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 25, "label": "問25", "points": 3, "answer": "C", "stem": "日野メンテナンスリースに関する記述として、不適切なものはどれか。", "choices": {"A": "メンテナンスリースとは、車両代、税金、保険費用等にメンテナンス費用を加えたリース契約のことである。", "B": "基本契約は、「Ｓプラン」と「Ｍプラン」と「Ｒプラン」の３種類がある。", "C": "油脂類の交換は基本契約に含まれていないので、オプション契約が必要である。"}, "explanation": "油脂類の交換は全てのプランに含まれている。オプション契約は不要。", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 26, "label": "問26", "points": 3, "answer": "B", "stem": "サービス業態の伝票仕掛日数に関する記述として、不適切なものはどれか。", "choices": {"A": "伝票仕掛日数は、未売上（仕掛）伝票が１日当り平均入庫台数に対し何日分仕掛っているかを知るための指標である。", "B": "仕掛件数とは工事中や通過車両を除いた工事完了、完成見積、調整赤黒の件数である。", "C": "伝票仕掛日数＝仕掛件数÷（直近６ヶ月の入庫台数÷稼動日数）"}, "explanation": "仕掛件数の定義が不適切。仕掛件数とは前日最終実績の仕掛件数（工事中も含む全ての未売上仕掛件数）。工事中を除いた件数というのは誤り。", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 27, "label": "問27", "points": 3, "answer": "A", "stem": "品質改善に関する記述として、適切なものはどれか。", "choices": {"A": "「改善対策」とは、保安基準に関わらず、日野自動車（メーカー）が安全確保、公害防止の観点から必要と判断した場合に実施するものである。", "B": "「サービスキャンペーン」とは、車両の構造・装置の不具合による事故を未然に防止することを目的とした制度である。", "C": "「リコール」とは、車両の構造・装置・性能等が、保安基準に適合しなくなる場合に、保証書とは別に有償で修理するものである。"}, "explanation": "改善対策（A適切）は保安基準に関わらずメーカーが安全確保・公害防止の観点から実施。サービスキャンペーンは商品品質改善等の観点からメーカーが自主判断で実施（B不適切）。リコールは無償で修理（C不適切）。", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 28, "label": "問28", "points": 3, "answer": "C", "stem": "輪止めの使用方法に関する記述として、不適切なものはどれか。", "choices": {"A": "輪止めは、１対（２個）で使用する。", "B": "輪止めは、タイヤに確実に当てる（斜めにかけない）足で軽く蹴って効いていることを確認する。", "C": "輪止めを「かける・外す」は車両誘導者が行う。"}, "explanation": "輪止めを「かける・外す」は運転手が行う。車両誘導者が行うというのは不適切。", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 29, "label": "問29", "points": 3, "answer": "A", "stem": "ＣＳ（顧客満足度）に関する記述として、不適切なものはどれか。", "choices": {"A": "満足度を高くするためには、お客様の期待するサービスを提供することである。", "B": "ＣＳ活動の基本はお客様の事前の期待をしっかり理解することである。", "C": "ＣＳ活動の基本的心構えとして、お客様の話を良く聴き、察することが大切である。"}, "explanation": "満足度は、事前の期待と実際の対応の差によって決まる。お客様の期待以上の対応をすることによって満足度は向上する。単に「期待するサービスを提供する」だけでは不十分（A不適切）。", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 30, "label": "問30", "points": 3, "answer": "B", "stem": "ＨＩＷＡＹ内の安全に関する記述のうち、出張作業時の対応について、不適切なものはどれか。", "choices": {"A": "作業者は安全対策を施す前に、必ず故障車より最低１００ｍ以上後方に発煙筒を設置して、後続車に危険を知らせる。", "B": "故障車と出張作業車両との車間距離は、最低５ｍ以上は離し、夜間・カーブ等の視界が悪い場合はそれ以上の安全な車間距離で停車する。", "C": "出張作業者は現地に到着したら車両のハンドルを左に切り、危険回避処置を必ず行う。"}, "explanation": "故障車と出張作業車両との車間距離は、最低20ｍ以上は離す（5mでは不十分）。夜間・カーブ等の視界が悪い場合はそれ以上の安全な車間距離で停車する。", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 31, "label": "問31", "points": 5, "answer": "C", "stem": "【問２(1)】通過車両の業務処理規定に照らし、サービスカーを使用して片道１５ｋｍ離れた場所での出張作業を行った。\n依頼販売会社へのサービスカー使用料金の振り替え請求額を消費税込みとして、適切なものはどれか。\n\n（注）答えが小数点以下になる場合は、小数点以下第１位を四捨五入しなさい。", "choices": {"A": "６，６００円", "B": "７，４２５円", "C": "７，９２０円", "D": "８，８００円", "E": "９，３５０円"}, "explanation": "【計算（改定前料金）】\n10kmまで：6,000円\n10km超分：400円×5km＝2,000円\n小計：8,000円\n10%控除：8,000×0.9＝7,200円\n消費税込：7,200×1.1＝7,920円 → C", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 32, "label": "問32", "points": 5, "answer": "A", "stem": "【問２(2)】通過車両の業務処理規定に照らし、通過車両のワイパーリンク修理を下記内容で実施した。\n依頼販売会社への振り替え請求額を消費税込みとして、適切なものはどれか。\n\n技術料：１０，０００円（税抜）\n部品代：１５，０００円（税抜）\n※部品は純正部品（定価）を使用\n\n（注）答えが小数点以下になる場合は、小数点以下第１位を四捨五入しなさい。", "choices": {"A": "２２，０００円", "B": "２３，１００円", "C": "２３，６５０円", "D": "２４，７５０円", "E": "２７，５００円"}, "explanation": "【計算】\n技術料振替（20%控除）：10,000×0.8＝8,000円\n部品代振替（定価×0.8）：15,000×0.8＝12,000円\n小計：20,000円\n消費税込：20,000×1.1＝22,000円 → A", "source": "20年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 1, "label": "問1(1)", "points": 3, "answer": "B", "stem": "事故見積書に記載する用語および略号について、不適切なものはどれか。", "choices": {"A": "略号「I」とは、部品の不良破損または摩耗箇所を外部から点検する作業。", "B": "略号「W」とは、部品を取外す作業。", "C": "略号「OH」とは、アセンブリまたはユニットを完全に分解し、各構成部品の点検・取替・組立・調整完了までの全作業。", "D": "略号「R/I」とは、部品の取外し取付作業。"}, "explanation": "略号「W」とはアセンブリまたはユニットの一部を分解し、その構成部品の点検・組立・調整完了までの全作業のこと。「部品を取外す作業」はR（Remove）の説明。正解はB。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 2, "label": "問1(2)", "points": 3, "answer": "D", "stem": "保証制度に関する記述として、不適切なものはどれか。", "choices": {"A": "販売会社は、お客様より保証書に記載された期間と条件に適合する申し出を受けた場合は保証修理を断ることができない。", "B": "保証制度は約束によって成り立っており、お互いに約束（契約）を守って、正しく運用しなければならない。約束（契約）違反は信頼関係を損ない、重大問題に発展する。", "C": "日野自動車製品の取引等に関し、その基本的な事項について、販売会社と日野自動車の代表者間で契約を締結した契約書のことを「日野販売会社基本契約書」と言う。", "D": "日野自動車の保証制度は、販売会社・日野自動車がそれぞれの約束を結び、この約束によって成り立っている。"}, "explanation": "日野自動車の保証制度は、お客様・販売会社・日野自動車がそれぞれの約束を結び成り立っている（Dには「お客様」が抜けている）。正解はD。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 3, "label": "問1(3)", "points": 3, "answer": "B", "stem": "見積書の記載内容に関する記述として、適切なものはどれか。", "choices": {"A": "主体作業とは、車両を構成する主要な部品、およびそれに取り付けられている部品（付帯部品）の複合した作業、作業時間の対価が工賃として計上できない作業内容。", "B": "関連作業とは、2つ以上の主要部品を取り替える場合、複合した主体作業の関連部位は、作業箇所が重複となり簡略されることにより、作業時間が縮小可能となる作業。", "C": "付帯作業とは、ある主体作業を行う場合、その主体作業とは別途な作業が必要な時のその作業。", "D": "付随作業とは、それ自体の作業時間が主体作業の範囲内に含まれて設定されており、特に作業項目は設定せず、工賃も単独では計上しないもの。"}, "explanation": "A:主体作業は工賃計上できる（できないが誤り）。C:付随作業の説明。D:付帯作業の説明。正しいのはB（関連作業の説明）。正解はB。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 4, "label": "問1(4)", "points": 3, "answer": "A", "stem": "通過車両として「お客様リスト」に登録されているお客様（優良客）より直接、レンジャーのブレーキ調整の依頼を受けた。この場合の応対として、適切なものはどれか。", "choices": {"A": "元販売会社に確認を取らずに受付をして作業した。", "B": "元販売会社の担当と連絡がとれないので、現金払いでの修理をお客様にお願いした。", "C": "元販売会社の担当に連絡がつかないので、連絡がつくまで作業を待ってもらった。", "D": "元販売会社の担当に連絡がつかないので、作業を断った。"}, "explanation": "お客様登録リストに登録されているお客様（優良客）で、5万円以下の修理は確認不要で受付して作業できる。正解はA。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 5, "label": "問1(5)", "points": 3, "answer": "B", "stem": "通過車両規定の現金貸出し等の取り扱い方法に関する記述として、適切なものはどれか。", "choices": {"A": "販売会社間相互間において了解が成立した場合は、その都度電話により確認を行なった上、即日現金を送付または振込する。", "B": "販売会社間相互間において了解が成立した場合は、その都度FAXにより確認を行なった上、即日現金を送付または振込する。", "C": "販売会社間相互間において了解が成立した場合は、その都度FAXにより確認を行なった上、即日売上し、整備納品書にて請求する。", "D": "販売会社間相互間において了解が成立した場合は、その都度電話により確認を行なった上、即日売上し、整備納品書にて請求する。"}, "explanation": "確認はFAXで行い、即日現金を送付または振込する。正解はB。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 6, "label": "問1(6)", "points": 3, "answer": "C", "stem": "通過車両規定の特別対応料（日野車）および体制維持費に関する記述として、不適切なものはどれか。", "choices": {"A": "出張作業の安全確保の為（2名出動を原則）、時間外の特別対応料を10,000円とする。", "B": "深夜の場合は、5,000円を割り増し請求できる。", "C": "登録前車両の対応時は、特別対応料および体制維持費とも保証申請にてメーカーに請求できる。", "D": "体制維持費とはメーカーと元販売店の応分の負担費用である。"}, "explanation": "登録前車両については、特別対応料のみ保証申請にてメーカーに請求できる（体制維持費は対象外）。正解はC。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 7, "label": "問1(7)", "points": 3, "answer": "D", "stem": "整備料金の説明と回収に関する記述として、不適切なものはどれか。", "choices": {"A": "サービス部門で販売する商品は、点検、整備という点検整備作業における「技術の提供」である。", "B": "点検・整備の価値をお客様に理解していただけるよう、必要性、効果などをわかりやすくお客様に説明することも、「機能的サービス」の一環である。", "C": "無償、有償作業を同時に行う場合、受注の時点で「料金」とその有償、無償についてお客様に説明しておく。", "D": "売掛金が回収予定日を過ぎても入金されない場合は、督促状を普通郵便や内容証明付郵便などの手段を講じることも大切である。"}, "explanation": "督促状は配達証明付郵便や内容証明付郵便で送付する（普通郵便は不可）。正解はD。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 8, "label": "問1(8)", "points": 3, "answer": "D", "stem": "売上・回収に関する記述として、不適切なものはどれか。", "choices": {"A": "小切手とは振出人の取引銀行に対して、受取人に一定額の金額を支払うように委託する有価証券のこと。", "B": "売掛金は利息が付かず、時効が2年と極めて短い。", "C": "受取手形は6ヶ月に2回、銀行を支払い場所とする約束手形を不渡りにすると銀行取引停止処分を受ける。", "D": "HITOSSⅡ上のお客様ランクが「6，7」の場合、売上先確認。「8，9」の場合、売上不可が表示される。"}, "explanation": "HITOSS上のランク「6,7,8」の場合、売上先確認。「9」の場合、売上不可が表示される（「8」は売上不可ではない）。正解はD。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 9, "label": "問1(9)", "points": 3, "answer": "C", "stem": "保証申請期間に関する記述として、適切なものはどれか。", "choices": {"A": "一般保証修理（日野車）の保証申請期間は、故障発生日から30日以内である。", "B": "通過車両保証修理（日野車）の保証申請期間は、故障発生日から60日以内である。", "C": "納入前保証修理（日野車）の保証申請期間は、故障発生日から60日以内である。", "D": "保証申請で一部又は全部が否決で、それに異議のある場合の再申請は、故障発生日から60日以内である。"}, "explanation": "A:60日（正しい申請期間は60日）、B:90日、C:60日（正解）、D:90日。正解はC。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 10, "label": "問1(10)", "points": 3, "answer": "D", "stem": "HITOSSⅡの売上報告画面で、工賃割増の適用に関する記述として、適切なものはどれか。", "choices": {"A": "対象工賃の行にある出区分に「1」を入力する。", "B": "対象工賃の行にある出区分に「2」を入力する。", "C": "対象工賃の行にある出区分に「8」を入力する。", "D": "対象工賃の行にある出区分に「9」を入力する。"}, "explanation": "1:売価欄にサービスと印字、2:メンテナンスリース契約車両の契約整備と印字、8:未使用。工賃割増には「9」を入力する。正解はD。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 11, "label": "問1(11)", "points": 3, "answer": "A", "stem": "通過車両規定において、実施販売会社の請求方法に関する記述として、適切なものはどれか。", "choices": {"A": "毎月20日を締切日とし、当月分の請求書を一括して元販売会社に発送する。その際請求明細書を添付する。", "B": "毎月20日を締切日とし、3ヶ月ごとに、まとめて元販売会社に発送する。その際請求明細書を添付する。", "C": "毎月15日を締切日とし、3ヶ月ごとに、まとめて元販売会社に発送する。その際請求明細書を添付する。", "D": "毎月25日を締切日とし、当月分の請求書を一括して元販売会社に発送する。その際請求明細書を添付する。"}, "explanation": "実施販売会社では毎月20日を締切日とし、当月分の請求書を一括して元販売会社に発送する。その際請求明細書を添付する。正解はA。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 12, "label": "問1(12)", "points": 3, "answer": "A", "stem": "通過車両規定において事故修理（保険修理）の売り上げ（振替）に関する記述として、適切なものはどれか。", "choices": {"A": "・技術料は保険査定額の5％を控除。\n・部品代は保険査定額の10％を控除。", "B": "・技術料は保険査定額の20％を控除。\n・部品代は保険査定額の10％を控除。", "C": "・技術料は保険査定額の5％を控除。\n・部品代は保険査定額の5％を控除。", "D": "・技術料は保険査定額の10％を控除。\n・部品代は保険査定額の5％を控除。"}, "explanation": "保険修理で販売会社間の振替は、技術料：保険査定額の5%控除、部品代：保険査定額の10%控除。正解はA。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 13, "label": "問1(13)", "points": 3, "answer": "C", "stem": "通過車両規定において特別対応料のメーカー請求額算出方法の説明として、適切なものはどれか。", "choices": {"A": "前月20日～当月19日の期間の営業時間外対応実績×1,100円", "B": "前月20日～当月19日の期間の営業時間内対応実績×1,000円", "C": "前月21日～当月20日の期間の営業時間外対応実績×1,000円", "D": "前月21日～当月20日の期間の営業時間内対応実績×1,100円"}, "explanation": "特別対応料のメーカー請求額は「前月21日～当月20日の期間の営業時間外対応実績×1,000円」。正解はC。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 14, "label": "問1(14)", "points": 3, "answer": "D", "stem": "通過車両規定の保証修理に関する作業の処理方法として、不適切なものはどれか。", "choices": {"A": "現品および関係書類は即時発行する。なお現品およびその梱包には、「通過車両」と明記した荷札をつけ、送状と受領書を同封する。", "B": "元販売会社への現品到着期限は、故障発生日より20日以内とする。", "C": "現品が元販売会社へ到着しなかった場合の損害は、実施販売会社とする。", "D": "現品の発送先は、原則として元販売会社サービスフロント宛とし、運賃は実施販売会社負担とする。"}, "explanation": "現品の発送先は原則として元販売会社サービス部長宛とし、運賃は元販売会社負担とする（フロント宛・実施販売会社負担は誤り）。正解はD。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 15, "label": "問1(15)", "points": 3, "answer": "B", "stem": "2DG付メルファに関する記述として、不適切なものはどれか。", "choices": {"A": "エンジンは単段ターボチャージャー搭載のA05C型エンジンを採用している。", "B": "排ガス（後処理）システムには尿素フリーのDPRⅡを採用している。", "C": "トランスミッションはLX06＋AMTのみの設定となっている。", "D": "運転席に電子式SRSエアバッグ＆プリテンショナー付シートベルトを採用している。"}, "explanation": "2DGメルファはDPR+尿素SCRシステムを採用（尿素フリーのDPRⅡではない）。正解はB。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 16, "label": "問1(16)", "points": 3, "answer": "D", "stem": "大型トラック（プロフィア2019年モデル）について、不適切なものはどれか。", "choices": {"A": "J-OBDⅡに対応しMIL表示を追加した。", "B": "GPSや地図情報などを利用した道路勾配先読み制御を追加した。", "C": "衝突事故を未然に防止するためにサイトアラウンドモニターシステム（SAMS）を追加した。", "D": "追突防止用に誤発進抑制装置が追加された。"}, "explanation": "誤発進抑制装置は搭載されていない。正解はD。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 17, "label": "問1(17)", "points": 3, "answer": "A", "stem": "2★G付レンジャーの後処理システムに関する記述として、適切なものはどれか。", "choices": {"A": "190～210馬力帯は尿素フリーのDPRⅡ、240～260馬力帯はDPR＋尿素SCRを採用している。", "B": "190馬力帯は尿素フリーのDPRⅡ、210～260馬力帯はDPR＋尿素SCRを採用している。", "C": "190～240馬力帯は尿素フリーのDPRⅡ、260馬力帯はDPR＋尿素SCRを採用している。", "D": "すべての馬力帯に尿素フリーのDPRⅡを採用している。"}, "explanation": "190～210馬力帯は尿素フリーのDPRⅡ、240～260馬力帯はDPR+尿素SCRを採用。正解はA。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 18, "label": "問1(18)", "points": 3, "answer": "A", "stem": "デュトロ（2016年モデル以降）のスマートエントリー＆スタートシステムに関する記述として、不適切なものはどれか。", "choices": {"A": "スマート（電子）キーのキーIDコードは、メインキーとサブキー併せて8個まで登録可能である。", "B": "一度登録したスマート（電子）キーは、他の車両に登録することはできない。", "C": "カスタマイズ機能によりスマートエントリーシステムの、有効と無効を切り替えることができる。", "D": "長期駐車時にスマートキーの電池上がりを防止するため、節電機能（節電モード）がある。"}, "explanation": "スマートキーのキーIDコードはメイン・サブの識別なく最大5個まで登録可能（8個ではない）。正解はA。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 19, "label": "問1(19)", "points": 3, "answer": "B", "stem": "道路運送車両法に照らし、次の文章の〔 〕にあてはまるものとして、適切なものはどれか。\n〔イ〕は、自動車が部品の劣化又は摩耗等により保安基準に適合しなくなるおそれ、又は適合しない状態にあるときは、当該自動車の〔ロ〕に対し、保安基準に適合させるために必要な整備を命ずることができる。この〔イ〕の指示による車両使用の制限に関する命令を〔ハ〕という。", "choices": {"A": "〔イ〕国土交通大臣　〔ロ〕所有者　〔ハ〕改善命令", "B": "〔イ〕地方運輸局長　〔ロ〕使用者　〔ハ〕整備命令", "C": "〔イ〕国土交通大臣　〔ロ〕使用者　〔ハ〕整備命令", "D": "〔イ〕地方運輸局長　〔ロ〕所有者　〔ハ〕改善命令"}, "explanation": "地方運輸局長は当該自動車の使用者に対し整備をすべきことを命ずることができる（整備命令）。正解はB。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 20, "label": "問1(20)", "points": 3, "answer": "D", "stem": "道路運送車両の保安基準に照らし、車両総重量に関する記述として、不適切なものはどれか。", "choices": {"A": "セミトレーラ以外の自動車で、最遠軸距が5.5m未満のものは、車両総重量20トン以下。", "B": "セミトレーラ以外の自動車で、最遠軸距が5.5m以上7m未満、自動車の長さが9m未満のものは、車両総重量20トン以下。", "C": "セミトレーラ以外の自動車で、最遠軸距が7m以上自動車の長さが9m未満のものは、車両総重量20トン以下。", "D": "セミトレーラ以外の自動車で、最遠軸距が7m以上自動車の長さが11m以上のものは、車両総重量22トン以下。"}, "explanation": "最遠軸距7m以上・長さ11m以上のものは車両総重量25トン以下（22トンではない）。正解はD。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 21, "label": "問1(21)", "points": 3, "answer": "D", "stem": "道路運送車両の保安基準に照らし、2017年に製作された自動車の後退灯に関する記述として、適切なものはどれか。", "choices": {"A": "長さが6mを超える貨物自動車にあっては、1個または2個備えなければならない。", "B": "照明部の上縁の高さが地上1.5m以下、下縁の高さが0.25m以上となるように取り付けられなければならない。", "C": "灯光の色は、白色又は淡黄色であること。", "D": "昼間にその後方100mの距離から点灯を確認できるものであること。"}, "explanation": "A:長さ6m超は2個以上必要。B:上縁の高さは地上1.2m以下（1.5mではない）。C:後退灯の灯光の色は白色のみ（淡黄色は不可）。D:正しい。正解はD。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 22, "label": "問1(22)", "points": 3, "answer": "D", "stem": "道路運送車両法に照らし、自動車の検査の種別として、不適切なものはどれか。", "choices": {"A": "継続検査", "B": "予備検査", "C": "臨時検査", "D": "分解整備検査"}, "explanation": "自動車の検査の種別は、新規検査・継続検査・臨時検査・構造等変更検査・予備検査の5種類。「分解整備検査」は検査の種別ではない。正解はD。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 23, "label": "問1(23)", "points": 3, "answer": "C", "stem": "自賠責保険に関する記述として、不適切なものはどれか。", "choices": {"A": "傷害による保険金の限度額は120万円である。", "B": "後遺障害第1級（常時介護を要する場合）の保険金の限度額は4,000万円である。", "C": "死亡による保険金の限度額は2,500万円である。", "D": "後遺障害第1級（介護を必要としない）の保険金の限度額は3,000万円である。"}, "explanation": "死亡による保険金の限度額は3,000万円（2,500万円ではない）。正解はC。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 24, "label": "問1(24)", "points": 3, "answer": "B", "stem": "日野デュトロメンテナンスパックに関する記述として、不適切なものはどれか。", "choices": {"A": "対象車が廃車となった場合は解約できる。", "B": "対象車種は販売会社にて販売された新車で、用途での規制はない。", "C": "レンタカーは、対象外である。", "D": "加入期間は、登録日から新車1,000km点検実施前までとなり、以降の途中入会はできない。"}, "explanation": "対象は自家用車に限る（用途での規制あり）。正解はB。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 25, "label": "問1(25)", "points": 3, "answer": "A", "stem": "日野メンテナンスリースの請求に関する記述として、不適切なものはどれか。", "choices": {"A": "引取、納車料（1往復／台）中、小型車は3,000円である。", "B": "一般修理技術料は、日野標準作業時間×4,500円／時間である。", "C": "通過車両の夜間対応（19：00～8：00）一般修理技術料は4,500円／時間の25％増しである。", "D": "エアコンシーズンイン点検料金は3,000円である。"}, "explanation": "引取・納車料（1往復/台）中、小型車は2,000円（3,000円ではない）。正解はA。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 26, "label": "問1(26)", "points": 3, "answer": "D", "stem": "日野プレミアムサポートに関する記述として、不適切なものはどれか。", "choices": {"A": "保証書を紛失した場合でも、サービスの利用は可能である。", "B": "修理費用差額補償サービスは、リース期間中1回のみ利用可能である。", "C": "事故後60日以上経過してからの事故通知や修理入庫は対象外である。", "D": "路上で交換したタイヤの修理は対象外である。"}, "explanation": "路上で交換したタイヤの修理も対象になる。正解はD。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 27, "label": "問1(27)", "points": 3, "answer": "B", "stem": "環境マネジメントシステムに関する記述として、不適切なものはどれか。", "choices": {"A": "「EMD認定」とは、日野独自の認定制度である。", "B": "「EMD認定」とは、「ISO14001」認定取得条件を全て満たしているものである。", "C": "「環境に優しい事業場表彰」は、国土交通省の制定する制度である。", "D": "「EMD認定」には3段階の認定クラスがあり、評価は4項目が対象となる。"}, "explanation": "「EMD認定」は日野独自の認定制度であり、ISO14001の全条件を満たすものとは異なる。正解はB。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 28, "label": "問1(28)", "points": 3, "answer": "C", "stem": "安全の心構えに関する記述として、不適切なものはどれか。", "choices": {"A": "自分自身が主体となり自ら考えなければならない。", "B": "作業の洗い出しと改善、異常処置時の安全のルール作りを行う。", "C": "作業能率を阻害する原因と事故や災害を起こす原因は関連性がない。", "D": "正しい作業であれば、作業効率の向上も期待できる。"}, "explanation": "作業能率を阻害する原因を掘り下げると大部分は事故や災害を起こす原因となる（関連性がある）。正解はC。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 29, "label": "問1(29)", "points": 3, "answer": "C", "stem": "安全衛生教育（法令）で定められた特別教育の種別について、不適切なものはどれか。", "choices": {"A": "研削砥石の取り替えまたは試運転", "B": "最大荷重1.0トン未満のフォークリフトの運転", "C": "可燃性ガス、酸素を用いる金属の溶接、溶断", "D": "アーク溶接機を用いる金属の溶接、溶断"}, "explanation": "可燃性ガス、酸素を用いる金属の溶接・溶断については技能講習修了者等の資格が必要（特別教育ではない）。正解はC。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 30, "label": "問1(30)", "points": 3, "answer": "D", "stem": "CSに関する記述として、適切なものはどれか。", "choices": {"A": "CS活動を盛り上げていくポイントは大きく分けて、品質、スピード、価格の3項目があると言われている。", "B": "「CSの要素」は、便利、親しみ、安心、信頼、感謝の5項目と言われている。", "C": "「CSの要素」を満たすには、対応のCS、基礎のCS、管理のCSの3つを意識することが必要である。", "D": "CSとはカスタマーサティスファクションの略で顧客満足度という。商品やサービスにどのくらい満足しているかという考え方のことである。"}, "explanation": "A:品質・スピード・価格・サービスの4項目。B:便利・親しみ・楽しさ・安心・信頼・感謝の6項目。C:対応のCS・基盤のCSの2つ。Dが正しい。正解はD。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 31, "label": "問2(1)", "points": 5, "answer": "D", "stem": "【計算問題】通過車両の業務処理規定に照らし、平日の昼、サービスカーで片道15km離れたお客様車庫へ修理に向かった。悪天候のため到着まで通常時の2.5倍（120分）を要した。サービスカー使用料のお客様請求額を消費税込み（10％）として、適切なものはどれか。\n（注）答えが少数点以下になる場合は、小数点以下第1位を四捨五入すること。", "choices": {"A": "8,000円", "B": "8,800円", "C": "10,000円", "D": "11,000円", "E": "12,000円"}, "explanation": "走行距離10kmまで6,000円、10km超え1km毎に400円加算。\n6,000+(400×5km)=8,000円\n悪天候（平均速度10km/h以下）はサービスカー使用料を25%増し。\n8,000×1.25=10,000円\n消費税：10,000×1.1=11,000円\n正解はD。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 32, "label": "問2(2)", "points": 5, "answer": "A", "stem": "【計算問題】通過車両規定に照らし、中型車のターボAssy交換（有償修理）を下記内容で実施した。元販売会社への振替金額（消費税10%税込）を求めなさい。\n（注）答えは小数点以下第一位を四捨五入し、整数で記入しなさい。\n\n【条件】\n・ターボ部品代：250,000円\n・エンジンオイル：13ℓ（700円/ℓ）\n・作業時間：2.5時間\n・工賃：10,000円/時間\n・預かり日数：6日", "choices": {"A": "277,508円", "B": "279,510円", "C": "283,008円", "D": "287,760円", "E": "288,090円"}, "explanation": "ターボ：250,000×0.9（特定部品10%レス）＝225,000円\nオイル：700×13ℓ×0.8（20%レス）＝7,280円\n工賃：10,000×2.5×0.8（20%レス）＝20,000円\n合計：(225,000+7,280+20,000)×1.1＝277,508円\n正解はA。", "source": "21年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 1, "label": "問1", "points": 3, "answer": "A", "stem": "保証修理に関する記述として、不適切なものはどれか。", "choices": {"A": "保証修理とは、車検証にお名前が記載されているお客様に対し、日野自動車が製造した自動車について、保証書に示す条件で無償修理することをいう。", "B": "保証修理の役割には、万一不具合が発生した場合に期待と信頼を損なうことになるが、適切な保証修理を実施することにより、信頼を回復することが出来る。", "C": "保証制度は、お客様・販売会社・日野自動車がそれぞれの約束を結び、この約束によって成り立っているので、正しく運用しなければならない。"}, "explanation": "保証修理とは、車検証ではなくメンテナンスノート内の保証書にお名前が記載されているお客様に対し、日野自動車が製造した自動車について保証書に示す条件で無償修理することをいう。", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 2, "label": "問2", "points": 3, "answer": "B", "stem": "外注依頼書の発行に関する記述として、適切なものはどれか。", "choices": {"A": "作業指示書発行後、外注作業が発生した場合は、作業指示書のコピーで対応出来る。", "B": "発注価格が決定しない場合、確定予定日と理由を明記する。", "C": "納期は変わることがあるので、発注時は特に提示する必要はない。"}, "explanation": "外注作業が発生した場合は外注依頼書を発行する（コピー不可）。発注価格が未確定の場合は確定予定日と理由の明記が必要。納期は必ず提示しなければならない。", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 3, "label": "問3", "points": 3, "answer": "C", "stem": "事故見積りを実施する際、構造上の着眼点に関する記述として、不適切なものはどれか。", "choices": {"A": "断面形状の変化部位", "B": "部材形状の変化部位", "C": "衝撃力の力点部位"}, "explanation": "事故見積りの構造上の着眼点は「断面形状の変化部位」「部材形状の変化部位」「変形の波及部位」である。衝撃力の力点部位は着眼点に含まれない。", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 4, "label": "問4", "points": 3, "answer": "B", "stem": "保険処理の事故受付応対に関する記述として、不適切なものはどれか。", "choices": {"A": "保険で処理するという安心感とお客様への同情心から、お客様の言い分を全面的に信用したりせずに、あくまでも聞き役になる。", "B": "お客様は精神的な苦痛を受けているので、事故処理にあたり直接介入し効率よく相手側と話をすすめる。", "C": "事故処理は当事者間で行ってもらい、お客様には保険内容の適切な助言を行う。"}, "explanation": "販売会社が事故処理に直接介入することは不適切。事故処理は当事者間で行ってもらい、お客様の話をよく聞き保険内容の助言を行うにとどめる。", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 5, "label": "問5", "points": 3, "answer": "C", "stem": "通過車両規定に関する記述として、不適切なものはどれか。", "choices": {"A": "部品代として、純正部品は定価（Ｌ／Ｐ）の２０％を控除、外注作業部品は売上金額の１０％を控除する。", "B": "バッテリー代は、純正ＰＢバッテリの原価（Ｄ／Ｎ）の２０％増しを振替金額とする。", "C": "油脂類代は、車両整備にかかわる油脂類等の振替金額は自社売上金額の１０％を控除する。"}, "explanation": "油脂類の振替金額は自社売上金額をそのまま振替金額とする（控除なし）。純正部品はL/Pの20%控除、外注作業部品は売上金額の10%控除が正しい。", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 6, "label": "問6", "points": 3, "answer": "B", "stem": "通過車両規定において、受付時の応対に関する記述として、適切なものはどれか。", "choices": {"A": "他販売会社のリコール未実施車両が入庫した場合、早急にリコール作業を実施しなければならないので入庫した販売会社で実施する。", "B": "他販売会社のリコール未実施車両が入庫した場合、元販売会社に連絡し、どちらの販売会社で実施するか相談する。", "C": "他販売会社のリコール未実施車両が入庫した場合、元販売会社で実施するようにお客様へ伝える。"}, "explanation": "他販売会社のリコール未実施車両が入庫した場合、まず元販売会社に連絡し、どちらの販売会社で実施するか相談することが適切な対応。", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 7, "label": "問7", "points": 3, "answer": "C", "stem": "通過車両規定の特別対応料および体制維持費に関する記述として、不適切なものはどれか。", "choices": {"A": "出張作業の安全確保の為（２名出動を原則）、時間外の特別対応料を１０，０００円とする。", "B": "深夜の場合は、５，０００円を割り増し、他メーカー車両の場合は、１０，０００円を割り増し請求することができる。", "C": "登録前車両の対応時は、特別対応料および体制維持費を保証申請にてメーカーに請求できる。"}, "explanation": "登録前車両の対応時の特別対応料および体制維持費は、メーカーへの保証申請の対象外である。", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 8, "label": "問8", "points": 3, "answer": "B", "stem": "通過車両規定の基本的な内容に関する記述として、不適切なものはどれか。", "choices": {"A": "営業日の平日とは、月曜日から土曜日をいう。但し各実施販売会社の休業日を除く。", "B": "営業時間内とは、平日の９：００～１９：００の時間をいう。", "C": "営業時間外の対応では、他メーカー車両の修理は原則として行わないこととする。（トヨタ車は除く）"}, "explanation": "営業時間内とは、平日の８：００～１７：００（または各販売会社の定める時間）をいう。９：００～１９：００という記述は不適切。", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 9, "label": "問9", "points": 3, "answer": "A", "stem": "売掛金に関する記述として、不適切なものはどれか。", "choices": {"A": "売掛金は銀行から融資を受ける場合の担保となる。", "B": "売掛金は約束日に支払わなくても法的な制裁はない。", "C": "売掛金はそのままでは利息がつかない。"}, "explanation": "売掛金は一般的に担保にはならない。融資の担保となるのは不動産や在庫（棚卸資産）などである。売掛金は約束日に支払わなければ法的制裁があり、そのままでは利息もつかない。", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 10, "label": "問10", "points": 3, "answer": "B", "stem": "領収書に関する記述として、不適切なものはどれか。", "choices": {"A": "領収書には、日付、宛名、発行者、金額の記入が必ず必要である。", "B": "必要項目の記載があっても名刺の裏では、認められない。", "C": "商法上の重要取引で使われた領収書の保管期間は、１０年である。"}, "explanation": "必要項目（日付・宛名・発行者・金額）が記載されていれば、名刺の裏であっても領収書として認められる。領収書の形式に制限はなく、内容が重要。", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 11, "label": "問11", "points": 3, "answer": "A", "stem": "ＨＩＴＯＳＳⅡ作業明細画面の「＊」欄に関する記述として、不適切なものはどれか。", "choices": {"A": "「 ＋ 」を入力すると、行を挿入することができる。", "B": "「 － 」を入力すると、行を削除することができる。", "C": "「 Ｍ 」を入力すると、その行を移動することができる。移動先には「 Ａ 」もしくは「 Ｂ 」を入力する必要がある。"}, "explanation": "行を挿入するには「Ｉ（アイ）」を入力する。「＋」は行の挿入には使用しない。「－」で削除、「Ｍ」で移動は正しい。", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 12, "label": "問12", "points": 3, "answer": "A", "stem": "通過車両規定において、実施販売会社の請求方法に関する記述として、適切なものはどれか。", "choices": {"A": "作業完了後、即時に納品書を元販売会社宛に必ず発送する。また、保証整備作業の場合は必ず現品の送状（写）を添付する。", "B": "毎月１５日を締切日とし、当月分の請求書を一括して元販売会社に発送する。その際、請求明細書を添付する。", "C": "残高通知は請求側、支払側とも１ヶ月ごとに残高整理を行い、元販売会社に通知するものとする。"}, "explanation": "作業完了後即時に納品書を元販売会社宛に発送し、保証整備作業の場合は現品の送状（写）を添付する。締切日は月末で、残高通知は3ヶ月ごとが正しい。", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 13, "label": "問13", "points": 3, "answer": "C", "stem": "通過車両規定において、事故修理に関する記述として、適切なものはどれか。", "choices": {"A": "保険修理の場合、技術料は保険査定額の１０％を控除。", "B": "保険修理の場合、外注作業技術料は保険査定額の１０％を控除。", "C": "保険修理の場合、部品代は保険査定額の１０％を控除。"}, "explanation": "保険修理の振替計算：技術料は5%控除（×0.95）、外注作業技術料は5%控除（×0.95）、部品代は10%控除（×0.90）が正しい。", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 14, "label": "問14", "points": 3, "answer": "A", "stem": "通過車両対応に関する業務処理規定の保証修理に関する作業の処理方法について、適切なものはどれか。", "choices": {"A": "現品の元販売会社への到着期限は、故障発生日より２０日以内とする。", "B": "現品の元販売会社への到着期限は、故障発生日より１５日以内とする。", "C": "現品の元販売会社への到着期限は、故障発生日より３０日以内とする。"}, "explanation": "通過車両の保証修理における現品の元販売会社への到着期限は、故障発生日より20日以内とする。", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 15, "label": "問15", "points": 3, "answer": "B", "stem": "２＊Ｇ付デュトロの安全装置に関する記述として、適切なものはどれか。", "choices": {"A": "誤発進抑制機能は、壁面ガラスを検知できない。", "B": "電子インナーミラーは、シフトレバーがＲレンジのときは遠方後方表示ができない。", "C": "クリアランスソナーは、障害物の接近を検知し、エンジンの出力を制御する。"}, "explanation": "電子インナーミラーはシフトレバーがRレンジの際は近距離後方表示に切り替わり、遠方後方表示はできない。誤発進抑制機能はガラスも検知可能で、クリアランスソナーはエンジン出力制御ではなく警報を発する。", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 16, "label": "問16", "points": 3, "answer": "A", "stem": "メーターに表示されるマルファンクションインジケーターランプに関する記述として、適切なものはどれか。", "choices": {"A": "エンジン回転中にエンジン電子制御システムや、電子制御スロットルに異常があると点灯する。", "B": "排出ガス浄化性能に影響を与える部品やシステムに異常があると点灯させる。", "C": "排出ガス浄化性能に影響を与える部品やシステムに異常があると点滅させる。"}, "explanation": "マルファンクションインジケーターランプは、エンジン回転中にエンジン電子制御システムや電子制御スロットルに異常がある場合に点灯する。排出ガス浄化に関連するのは別のランプ（DPRランプなど）。", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 17, "label": "問17", "points": 3, "answer": "A", "stem": "プロフィア（１８年モデル）に装備されているＡＤＢヘッドランプに関する記述として、不適切なものはどれか。", "choices": {"A": "ＡＤＢシステムが作動しているときには、マルチインフォメーション内に橙色のＡＤＢ作動インジケーターランプを表示する。", "B": "カメラセンサー（画像センサー）は、ＰＣＳや車線逸脱警報で使用しているカメラセンサーを共用している。", "C": "ＡＤＢヘッドランプは、プロジェクターレンズの裏にＬＥＤを１１個搭載しており、これらを点灯／消灯／調光することで、遮光ビーム追従などのあらゆる配光パターンを形成している。"}, "explanation": "ADBシステムが作動しているときのインジケーターランプは橙色ではなく緑色で表示される。カメラセンサーの共用とLED11個の搭載は正しい記述。", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 18, "label": "問18", "points": 3, "answer": "C", "stem": "２＊Ｇ付プロフィアに搭載されている安全装置に関する記述として、適切なものはどれか。", "choices": {"A": "ＰＣＳは衝突の恐れが高いとコンピューターが判断すると、警報ブザーで運転者に注意を促し、さらに衝突の可能性が高くなると警報制動を作動させる。", "B": "車線逸脱警報装置は６０ｋｍ／ｈ越えかつ曲線Ｒ２５０ｍ以上で作動し、タイヤが車線を越えそうになると運転者に警報音を発して注意を促す。", "C": "ふらつき警報装置は操舵角センサによりハンドルのふらつきを判断し、覚醒度の低下をマルチインフォメーションに警報として表示する。"}, "explanation": "ふらつき警報装置は操舵角センサでハンドルのふらつきを判断し、マルチインフォメーションに警報表示する。PCSは自動ブレーキも作動させ、車線逸脱警報の作動条件はR250mではなくR350m以上。", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 19, "label": "問19", "points": 3, "answer": "A", "stem": "シビアコンディションの判定例として、不適切なものはどれか。", "choices": {"A": "低速走行が走行距離の２０％以上である。", "B": "悪路・雪道・多塵地帯走行が走行距離の３０％以上である。", "C": "事業用自動車で１ヶ月あたり１０，０００ｋｍ以上走行している。"}, "explanation": "シビアコンディションの低速走行の判定基準は走行距離の30%以上（20%ではない）。悪路・雪道は30%以上、事業用で10,000km以上はいずれも正しい基準。", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 20, "label": "問20", "points": 3, "answer": "B", "stem": "保安基準適合証および保安基準適合標章の有効期限として、適切なものはどれか。", "choices": {"A": "検査員が検査をした日を含み７日間。", "B": "検査員が検査をした日を含み１５日間。", "C": "検査員が検査をした日を含み３０日間。"}, "explanation": "保安基準適合証および保安基準適合標章の有効期限は、検査員が検査をした日を含み15日間。", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 21, "label": "問21", "points": 3, "answer": "C", "stem": "道路運送車両法において、法令３ヶ月点検を実施しなければならない自動車の種別として、不適切なものはどれか。", "choices": {"A": "乗車定員１１人の自家用バス", "B": "車両総重量８トンの自家用貨物トラック", "C": "乗車定員１０人以下の乗用の普通、小型、検査対象軽自動車のレンタカー"}, "explanation": "3ヶ月点検が義務付けられるのは、事業用自動車（バス・トラック）や自家用大型バスなど。乗車定員10人以下の乗用レンタカーは対象外（6ヶ月点検）。", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 22, "label": "問22", "points": 3, "answer": "B", "stem": "道路運送車両の保安基準に照らし、２０１７年制作車両で大型後部反射器を備えなければならない車両の記述として、適切なものはどれか。", "choices": {"A": "車両総重量６トン以上の貨物運送用普通自動車", "B": "車両総重量７トン以上の貨物運送用普通自動車", "C": "車両総重量８トン以上の貨物運送用普通自動車"}, "explanation": "2017年（平成29年）制作車両において、大型後部反射器を備えなければならないのは車両総重量7トン以上の貨物運送用普通自動車。", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 23, "label": "問23", "points": 3, "answer": "B", "stem": "自動車損害賠償責任保険に関する記述として、不適切なものはどれか。", "choices": {"A": "自賠責保険は、法律によって自動車１台ごとに必ずつけなくてはならない。", "B": "保険の支払い限度額は、ケガの場合で１５０万円である。", "C": "保険の支払い限度額は、死亡時で３，０００万円である。"}, "explanation": "自賠責保険のケガ（傷害）に対する支払い限度額は120万円（150万円ではない）。死亡時の3,000万円は正しい。", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 24, "label": "問24", "points": 3, "answer": "B", "stem": "保険の処理および計算方法に関する記述として、不適切なものはどれか。", "choices": {"A": "分損とは、事故車が修理可能でしかも車両の修理費が、車の時価よりも低い場合の損害のことをいう。", "B": "保険金の限度は１事故ごとに取扱い、保険金が支払われると保険金額が減少する。", "C": "自動車保険では一定の枠を設けてそれ以下の損害は支払い対象としないことにしており、免責金額として契約している。"}, "explanation": "保険金が支払われても保険金額は減少しない（不減額方式）。1事故ごとに保険金を取扱うという点は正しいが、支払われた後も保険金額は元の額を維持する。", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 25, "label": "問25", "points": 3, "answer": "A", "stem": "日野メンテナンスリースに関する記述として、不適切なものはどれか。", "choices": {"A": "保守整備契約（Ｒ契約：故障修理契約）については、代車費用も含まれる。", "B": "日野が販売する中古の大・中・小トラック（新規導入・日野車）は、メンテナンスリースの受入れが可能である。", "C": "本契約締結後の法令の制定、改廃、官公庁の指示・指導に起因する修理、改造、部品の取付、点検整備などはメンテナンスサービスに含まれない。"}, "explanation": "Ｒ契約（故障修理契約）には代車費用は含まれない。代車費用は別途オプションとなる。中古トラックの受入れ可能・法令起因修理の除外はいずれも正しい記述。", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 26, "label": "問26", "points": 3, "answer": "C", "stem": "日野デュトロハイブリッドバッテリー安心パックに関する記述として、適切なものはどれか。", "choices": {"A": "基本パック（リース以外）は、有効期限５年で価格は３０，０００円になる。", "B": "有効期間中、ハイブリッドバッテリーに交換の必要が生じた場合、無料でハイブリッドバッテリーを交換できる（交換工賃別）。", "C": "有効期間内である自動車を購入されたお客様は、自動車と証書を最寄りの販売会社にお持ちいただき、手続きを行うことにより継承することができる。"}, "explanation": "有効期間内の自動車を購入したお客様は販売会社で手続きを行うことで安心パックを継承できる。A：価格・有効期限は異なる。B：交換工賃は無料であり「交換工賃別」は不適切。", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 27, "label": "問27", "points": 3, "answer": "A", "stem": "出張作業に関する記述として、不適切なのはどれか。", "choices": {"A": "道路公団等の後方警戒者より早く到着した場合は、できる限りの安全対策を施し、後方警戒者が到着したら作業を開始する。", "B": "故障現場が一般道路の自動車専用道路、交通量が多く安全が確保できないバイパス等の場合は、警察へ緊急案件として危険通報を行い指示を受けること。", "C": "故障現場到着後は ①安全対策を実施、②お客様の安全を確保した後に作業を開始する。"}, "explanation": "後方警戒者より早く到着した場合は、できる限りの安全対策を施した上で、後方警戒者の到着を待たずに速やかに作業を開始できる。後方警戒者到着まで待つ必要はない。", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 28, "label": "問28", "points": 3, "answer": "C", "stem": "安全衛生教育（法令）で定められた特別教育の種別について、不適切なものはどれか。", "choices": {"A": "研削と石の取り替えまたは試運転", "B": "最大荷重１．０トン未満のフォークリフトの運転", "C": "可燃性ガス、酸素を用いる金属の溶接、溶断"}, "explanation": "可燃性ガス・酸素を用いた溶接・溶断は「特別教育」ではなく「技能講習」が必要。研削砥石の取替・試運転と1トン未満フォークリフトの運転は特別教育の対象。", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 29, "label": "問29", "points": 3, "answer": "B", "stem": "廃棄物処理に関する記述として、不適切なものはどれか。", "choices": {"A": "廃消火器は、腐食による破裂を避けるため雨に濡れない場所で保管し、消火器販売店等の特定窓口に（リサイクルシールを購入、張り付け）引き渡すこと。", "B": "廃バッテリーは、可燃性ガスの発生や破裂の危険性があるので屋根のない野外で保管し、できる限り有価売却すること。", "C": "廃発炎筒は、多量に保管せず製造メーカー等の指定引取場所へ指定配送業者により、専用箱で送付、引渡し時に廃棄管理伝票を受取り保管すること。"}, "explanation": "廃バッテリーは可燃性ガスの発生や破裂の危険性があるため、屋外ではなく屋内で保管しなければならない。屋根のない野外での保管は危険であり不適切。", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 30, "label": "問30", "points": 3, "answer": "C", "stem": "ＣＳに関する記述として、適切なものはどれか。", "choices": {"A": "ＣＳ活動を盛り上げていくポイントは大きく分けて、品質、スピード、価格の３項目があると言われている。", "B": "「ＣＳの要素」は、便利、親しみ、楽しさ、安心の４項目と言われている。", "C": "「ＣＳの要素」を満たすには、対応のＣＳ、基盤のＣＳの２つを意識することが必要である。"}, "explanation": "CSの要素を満たすには「対応のCS（接客・応対など）」と「基盤のCS（品質・技術・設備など）」の2つを意識することが必要。CSの要素はA・Bとも不正確。", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 31, "label": "問31", "points": 5, "answer": "A", "stem": "【問２(1)】通過車両規定に照らし、平日の定時間内に通過車両の修理を、下記内容で行った。元販売会社への振替料金（消費税１０％込み）として、適切なものはどれか。\n\n技術料：２５，０００円（税抜）\n部品代（定価）：３０，０００円（税抜）\n\n（注）答えが小数点以下になる場合は、小数点以下第１位を四捨五入すること。", "choices": {"A": "４８，４００円", "B": "５９，４００円", "C": "５０，７８２円", "D": "５３，４６０円", "E": "４４，０００円"}, "explanation": "【計算】\n技術料振替：25,000×0.8＝20,000円\n部品代振替：30,000×0.8＝24,000円\n小計：44,000円\n消費税込：44,000×1.1＝48,400円 → A", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 32, "label": "問32", "points": 5, "answer": "C", "stem": "【問２(2)】保険による事故修理の実施販売会社から元販売会社への請求金額（消費税１０％込み）として、適切なものはどれか。\n\n実施販売会社の保険査定額（消費税抜き）\n技術料：５４，０００円\n部品代（サイドミラー）：３１，０００円\n\n（注）答えが少数点以下になる場合は、小数点以下第１位を四捨五入すること。", "choices": {"A": "８１，９００円", "B": "８５，０００円", "C": "８７，１２０円", "D": "９０，０９０円", "E": "９３，５００円"}, "explanation": "【計算】\n技術料振替：54,000×0.95＝51,300円\n部品代振替：31,000×0.90＝27,900円\n小計：79,200円\n消費税込：79,200×1.1＝87,120円 → C", "source": "21年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 1, "label": "問1", "points": 3, "answer": "B", "stem": "日野サービスの基本として、不適切なものはどれか。", "choices": {"A": "お客様の期待を上回る仕事を提供することである。", "B": "部品の価格を通常よりも安くお客様に提供することである。", "C": "お客様目線で業務を行うことである。"}, "explanation": "日野サービスの基本は、無償の行動や価格を安くすることではなく、お客様に信頼・満足していただいて期待を上回る仕事を提供することが最良のサービスと考えている。", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 2, "label": "問2", "points": 3, "answer": "C", "stem": "接客対話の基礎に関する記述として、不適切なものはどれか。", "choices": {"A": "相手の話しや、言い分をじっくり最後まで聞ける、聞き上手になる。", "B": "感情的な議論をしないためには、落ち着いた態度と、なごやかな口調で話す。", "C": "内容をよく分かってもらうために、専門用語をなるべく使って説明する。"}, "explanation": "専門用語ではなく、一般的な用語で話す。", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 3, "label": "問3", "points": 3, "answer": "B", "stem": "名刺の受け渡しマナーとして、適切なものはどれか。", "choices": {"A": "名刺を受け取ったらすぐにしまう。", "B": "名前の読み方がわからない場合は、その場で確認する。", "C": "打合せ内容を忘れないように、その場で名刺にメモをする。"}, "explanation": "名刺を受取ってもすぐにしまわない。名刺にその場ではメモをしない。名刺は相手より先に出すことを心がける。名前の読み方がわからない場合はその場で確認する（B適切）。", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 4, "label": "問4", "points": 3, "answer": "C", "stem": "お客様への説明方法として、適切なものはどれか。", "choices": {"A": "完成時間や整備料金について見通しがつかない場合は、具体的な表現は避ける。", "B": "分解してみなければ正確なことが分からない場合は、誤解を与えないようにあいまいな表現をしておく。", "C": "お客様に技術説明をする場合は、現物や資料を示して説明をする。"}, "explanation": "お客様には、あいまいな表現は避け、具体的に現物や資料を見せて説明をする（C適切）。", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 5, "label": "問5", "points": 3, "answer": "C", "stem": "保証修理の役割に関する記述として、不適切なものはどれか。", "choices": {"A": "お客様の信頼の回復と維持", "B": "市場技術情報の収集による品質向上", "C": "お客様収益の維持"}, "explanation": "販売会社が保証修理費用の申請をすることにより販売会社の収益となる。お客様収益の維持は保証修理の役割ではない。", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 6, "label": "問6", "points": 3, "answer": "B", "stem": "受付時現車の確認を行う際の注意点に関する記述として、不適切なものはどれか。", "choices": {"A": "不正改造の有無を十分にチェックし、不正改造がある場合にはお客様に説明し、正規の姿に戻すようにお願いする。", "B": "貴重品や高価なものが搭載されていたら、お客様に伝えフロントで大切に保管しておく。", "C": "車両の傷、汚れ、積荷、などの状態をお客様と一緒に確認し、納車後のトラブル防止を図る。"}, "explanation": "貴重品は、お客様に持ち帰るようにお願いする。フロントで保管してはいけない。", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 7, "label": "問7", "points": 3, "answer": "C", "stem": "「通過車両対応に関する業務処理規定」に関する記述として、不適切なものはどれか。", "choices": {"A": "実施販売会社とは、通過車両を修理対応する販売会社をいう。", "B": "元販売会社とは、通過車両を修理対応する際、その車両を販売した販売会社や主幹販社など、現在取引のある販売会社を総称していう。", "C": "通過車両とは、自社以外の販売会社が販売した車両や、自社の他拠店が販売した車両を総称していう。"}, "explanation": "通過車両とは、自社以外の販売会社が販売した車両をいう。自社の他拠店が販売した車両は含まない。", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 8, "label": "問8", "points": 3, "answer": "B", "stem": "通過車両の受付要領に関する記述として、不適切なものはどれか。", "choices": {"A": "営業時間外に、中央コールセンターまたは元販売会社受付窓口経由でお客様から修理対応依頼された場合は、迅速に修理対応を行う。", "B": "営業時間内に、直接お客様より修理対応を依頼された場合は、修理費用が５万円以上になると思われる場合でも、ＨＩＷＡＹの「お客様登録リスト」に登録されていれば、元販売会社へのお客様確認は不要である。", "C": "営業時間内に、中央コールセンターまたは元販売会社受付窓口経由でお客様から修理対応依頼された場合は、迅速に修理対応を行う。"}, "explanation": "「お客様登録リスト」に登録されていても、修理費用が１件5万円以上になると思われる場合は、元販売会社へのお客様確認をとった上で修理対応を行う。", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 9, "label": "問9", "points": 3, "answer": "A", "stem": "「通過車両対応に関する業務処理規定」に照らし、「お客様登録リスト」に登録されている車両で、営業時間内に元販売会社へお客様確認をとり修理対応を行なう必要がある項目として、適切なものはどれか。", "choices": {"A": "保証修理の対象と思われる場合。", "B": "レッカー対応修理の場合。", "C": "１件１万円以上になると思われる場合。"}, "explanation": "元販売会社へお客様確認をとった上で修理対応を行うのは：保証修理対象と思われるもの、事故修理、他メーカー車の修理、1件5万円以上になると思われる場合。A（保証修理対象）が適切。", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 10, "label": "問10", "points": 3, "answer": "C", "stem": "領収書に関する記述として、不適切なものはどれか。", "choices": {"A": "領収書そのものには、有効期限はない。", "B": "商法上の重要取引で使われた領収書は、１０年保管が必要。", "C": "必要項目の記載があっても名刺の裏では、認められない。"}, "explanation": "名刺の裏でも必要事項があれば領収書として認められる。帳簿書類等（領収書含む）の保存期間は7年間（欠損金の場合は10年に延長）。", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 11, "label": "問11", "points": 3, "answer": "B", "stem": "ＨＩＴＯＳＳIIで売掛金を確認する照会画面として、適切なものはどれか。", "choices": {"A": "整備歴照会", "B": "お客様照会", "C": "お客様車両照会"}, "explanation": "売掛金の確認は、お客様照会の画面で確認する。", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 12, "label": "問12", "points": 3, "answer": "B", "stem": "即伝の目的と効果に関する記述として、適切なものはどれか。", "choices": {"A": "事務処理が増えるので人員増強などの対策を取らないと、残業が増える可能性がある。", "B": "今日の売上、利益が当日分かるので、目標管理が容易になる。", "C": "車両引き渡し時に金額が提示できるため、ユーザーも腹づもりがしやすく、ＥＳの向上につながる。"}, "explanation": "即伝によって当日の売上・利益がわかり目標管理が容易になる（B適切）。車両引き渡し時の金額提示はCS（顧客満足）向上につながる。", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 13, "label": "問13", "points": 3, "answer": "B", "stem": "通過車両対応の業務処理規定において、サービスカー使用料金として、適切なものはどれか。", "choices": {"A": "片道走行距離で算出し、走行距離１０ｋｍまでは請求できない。", "B": "片道走行距離で算出し、走行距離１０ｋｍまで６，０００円請求できる。", "C": "金額の決まりはない。"}, "explanation": "サービスカー使用料金は片道走行距離で算出し、10kmまで6,000円、以降1km毎に400円（B適切）。", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 14, "label": "問14", "points": 3, "answer": "C", "stem": "通過車両規定に照らし、事故車の保管料に関する記述として、適切なものはどれか。", "choices": {"A": "修理しないものは、入庫日から起算し７日間は無料。", "B": "修理を実施したものは、元販売会社宛に完成した旨を通知した日から起算し７日間は無料。", "C": "修理しないものは、入庫日の翌日から８日間以上は１日につき９００円、小型車は５００円とする。"}, "explanation": "修理しないものは、入庫日の翌日から起算して7日間は無料。8日目以降は1日につき900円（小型車500円）。修理実施後は通知した翌日から7日間は無料（C適切）。", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 15, "label": "問15", "points": 3, "answer": "C", "stem": "尿素ＳＣＲに関する説明として、適切なものはどれか。", "choices": {"A": "尿素ＳＣＲシステムとは、尿素水を排出ガスに噴射し、ＰＭを低減するシステムである。", "B": "尿素ＳＣＲシステムとは、尿素水を排出ガスに噴射し、排出ガス温度を上昇させるシステムである。", "C": "尿素ＳＣＲシステムとは、尿素水を排出ガスに噴射し、ＮＯｘを低減するシステムである。"}, "explanation": "尿素SCRシステムは、尿素水を排出ガスに噴射し、NOxを分解して窒素と水に変化させてNOxを低減するシステム。", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 16, "label": "問16", "points": 3, "answer": "A", "stem": "２＊Ｇ付プロフィア（２０１９年モデル Ｊ－ＯＢＤ II対応車）のメーター内「ＭＩＬ表示」として、適切なものはどれか。\n\n※この問題は選択肢が計器画像のため、解説を参照してください。", "choices": {"A": "MIL（排気浄化系異常）ランプのみ点灯した表示", "B": "MILランプとチェックエンジン（！）ランプが両方点灯した表示", "C": "チェックエンジン（！）ランプのみ点灯した表示"}, "explanation": "MILとは排気ガス浄化性能に影響を与える部品・システム異常時に表示するランプ。エンジンマーク（ガスポンプ形）がMIL表示、エンジンに『！』のマークはチェックエンジンランプで別物。MILのみ点灯しているA（排気浄化系異常のみの表示）が適切。", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 17, "label": "問17", "points": 3, "answer": "B", "stem": "２＊Ｇ付デュトロ（２０１９年モデル）の誤発進抑制システムに関する記述として、不適切なものはどれか。", "choices": {"A": "駐車時や低速走行時にセンサーが進路上の障害物を検知し、障害物への衝突のおそれがあるときはシステムが作動する。", "B": "障害物の検知にソナーセンサーを使用しているので、どしゃぶりの雨や雪、霧、砂嵐などの悪天候の影響を受けない。", "C": "システムが作動するとエンジントルクカット制御及び自動ブレーキ制御により運転者の衝突回避操作を補助する。"}, "explanation": "ソナーセンサーに氷・雪・泥などが付着したときや、どしゃぶりの雨・水しぶきがかかるような悪天候の状況はシステムが正常に作動しないおそれがある。「悪天候の影響を受けない」は不適切。", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 18, "label": "問18", "points": 3, "answer": "A", "stem": "２＊Ｇ付レンジャー（２０１９年モデル）のオートハイビーム（ＡＨＢ）に関する記述として、不適切なものはどれか。", "choices": {"A": "ハイビームを点灯する条件は、車速が約６０ｋｍ／ｈ以上で、前方が暗く対向車または先行車を検知していないときである。", "B": "フロントガラスに設置された画像センサーにより制御を行っている。", "C": "ハイビームとロービームの切り替えは、対向車または先行車のランプや街路灯などの明るさを判断し、自動的に切り替えている。"}, "explanation": "ハイビームを点灯する条件は、車速が30km/h以上で、前方が暗く対向車または先行車を検知していないとき。「約60km/h以上」は不適切。", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 19, "label": "問19", "points": 3, "answer": "A", "stem": "道路運送車両法の保安基準に照らし、次の文章の［　］に当てはまる語句の組み合わせとして、適切なものはどれか。\n\n自動車は、長さ（セミトレーラーにあっては、連結中心から当該セミトレーラーの後端までの水平距離）［①］、幅［②］、高さ［③］を超えてはならない。", "choices": {"A": "①１２ｍ　②２．５ｍ　③３．８ｍ", "B": "①１２ｍ　②２．８ｍ　③４．０ｍ", "C": "①１４ｍ　②２．０ｍ　③３．７ｍ"}, "explanation": "自動車の外形寸法の制限は、長さ12m、幅2.5m、高さ3.8m（A適切）。", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 20, "label": "問20", "points": 3, "answer": "B", "stem": "道路運送車両の保安基準に照らし、非常口に関する記述として、不適切なものはどれか。", "choices": {"A": "幼児専用車両および乗車定員３０人以上の自動車（緊急自動車は除く）には、非常時に容易に脱出できるよう基準に適合する非常口を設けなければならない。", "B": "非常口を設けた自動車には、非常口またはその付近に見やすいように、その位置ととびらの開放方法が表示されていなければならない。位置を表示するときの灯光の色は黄色。", "C": "非常口を設けた自動車には、非常口のとびらが解放した場合にその旨を運転者に警報する装置を備えなければならない。"}, "explanation": "非常口の位置を表示するときの灯光の色は緑色（黄色は不適切）。", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 21, "label": "問21", "points": 3, "answer": "B", "stem": "保安基準適合証および保安基準適合標章の有効期限として、適切なものはどれか。", "choices": {"A": "検査員が検査をした日を含み７日間", "B": "検査員が検査をした日を含み１５日間", "C": "検査員が検査をした日を含み３０日間"}, "explanation": "保安基準適合証等の有効期間は、指定規則第9条により、検査をした日から15日間。", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 22, "label": "問22", "points": 3, "answer": "A", "stem": "「道路運送車両法」の自動車点検基準に照らし、点検整備記録簿の保存期間として、適切なものはどれか。", "choices": {"A": "自動車運送事業用自動車（貨物軽自動車運送事業を除く）は１年間である。", "B": "乗車定員１１人以上の自家用自動車は２年間である。", "C": "自家用乗用自動車は３年間である。"}, "explanation": "乗車定員11人以上の自家用自動車の保存期間は1年間（Bが誤り）。自家用乗用車の保存期間は2年（Cが誤り）。自動車運送事業用自動車（貨物軽自動車運送事業を除く）は1年間（A適切）。", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 23, "label": "問23", "points": 3, "answer": "A", "stem": "自動車損害賠償責任保険（自賠責保険）に関する記述として、不適切なものはどれか。", "choices": {"A": "対人と対物賠償として入る保険。", "B": "自動車１台ごとに必ずつけなくてはならない保険（強制保険）。", "C": "保険の契約が締結されている車両でなければ運行してはならない。"}, "explanation": "自動車損害賠償保障法により、強制的につけなくてはならない対人賠償のみを担保するもの。対物賠償は含まれない。", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 24, "label": "問24", "points": 3, "answer": "B", "stem": "日野メンテナンスリースの基本契約Ｓプランに関する記述として、不適切なものはどれか。", "choices": {"A": "ワイパーゴムの交換は含む。", "B": "クーラーベルトの交換は含む。", "C": "パワーステアリングオイルの交換は含む。"}, "explanation": "クーラーベルトはSプランでは含まない。ワイパーゴム交換・パワーステアリングオイル交換はSプランに含まれる。", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 25, "label": "問25", "points": 3, "answer": "C", "stem": "日野メンテナンスリースに関する記述として、不適切なものはどれか。", "choices": {"A": "メンテナンスリースとは、車両代、税金、保険費用等にメンテナンス費用を加えたリース契約のことである。", "B": "基本契約は、「Ｓプラン」と「Ｍプラン」と「Ｒプラン」の３種類がある。", "C": "油脂類の交換は基本契約に含まれていないので、オプション契約が必要である。"}, "explanation": "油脂類の交換は全てのプラン（S・M・R）に含まれている。オプション契約は不要。", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 26, "label": "問26", "points": 3, "answer": "B", "stem": "サービス業態の伝票仕掛日数に関する記述として、不適切なものはどれか。", "choices": {"A": "伝票仕掛日数は、未売上（仕掛）伝票が１日当り平均入庫台数に対し何日分仕掛っているかを知るための指標である。", "B": "仕掛件数とは工事中や通過車両を除いた工事完了、完成見積、調整赤黒の件数である。", "C": "伝票仕掛日数＝仕掛件数÷（直近６ヶ月の入庫台数÷稼動日数）"}, "explanation": "仕掛件数の定義が不適切。工事中も含む未売上の仕掛伝票件数が仕掛件数となる（工事中を除かない）。", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 27, "label": "問27", "points": 3, "answer": "A", "stem": "品質改善に関する記述として、適切なものはどれか。", "choices": {"A": "「改善対策」とは、保安基準に関わらず、日野自動車（メーカー）が安全確保、公害防止の観点から必要と判断した場合に実施するものである。", "B": "「サービスキャンペーン」とは、車両の構造・装置の不具合による事故を未然に防止することを目的として、国土交通省がメーカーへ改善を命令する制度である。", "C": "「リコール」とは、車両の構造・装置・性能等が、保安基準に適合しなくなる場合に、保証書とは別に有償で修理するものである。"}, "explanation": "改善対策（A適切）は保安基準に関わらずメーカーが安全確保・公害防止の観点から実施。サービスキャンペーンは国交省の命令ではなくメーカーが自主判断で実施（B不適切）。リコールは無償で修理（C不適切）。", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 28, "label": "問28", "points": 3, "answer": "A", "stem": "リヤダブルタイヤ間に挟まった石などの異物の除去方法に関する記述として、適切なものはどれか。", "choices": {"A": "両方のタイヤのエアを完全に抜いてから除去する。", "B": "片方のタイヤのエアを抜いてから除去する。", "C": "エアを抜かずにハンマーで石をたたいて除去する。"}, "explanation": "無理やり取り除くとタイヤが破裂する危険がある。両方のタイヤのエアを完全に抜いてから安全に除去する（A適切）。", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 29, "label": "問29", "points": 3, "answer": "A", "stem": "ＣＳ（顧客満足度）に関する記述として、不適切なものはどれか。", "choices": {"A": "満足度を高くするためには、お客様の期待するサービスを提供することである。", "B": "ＣＳ活動の基本はお客様の事前の期待をしっかり理解することである。", "C": "ＣＳ活動の基本的心構えとして、お客様の話を良く聴き、察することが大切である。"}, "explanation": "満足度は、事前の期待と実際の対応の差によって決まる。お客様の期待以上の対応をすることによって満足度は向上する。単に「期待するサービスを提供する」だけでは不十分（A不適切）。", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 30, "label": "問30", "points": 3, "answer": "B", "stem": "ＨＩＷＡＹ内の安全に関する記述のうち、出張作業時の対応について、不適切なものはどれか。", "choices": {"A": "作業者は安全対策を施す前に、必ず故障車より最低１００ｍ以上後方に発煙筒を設置して、後続車に危険を知らせる。", "B": "故障車と出張作業車両との車間距離は、最低５ｍ以上は離し、夜間・カーブ等の視界が悪い場合はそれ以上の安全な車間距離で停車する。", "C": "出張作業者は現地に到着したら車両のハンドルを左に切り、危険回避処置を必ず行う。"}, "explanation": "故障車と出張作業車両との車間距離は、最低20ｍ以上は離す（5mでは不十分）。夜間・カーブ等の視界が悪い場合はそれ以上の安全な車間距離で停車する。", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 31, "label": "問31", "points": 5, "answer": "A", "stem": "【問２(1)】通過車両の業務処理規定に照らし、サービスカーを使用して片道１２ｋｍ離れた場所での出張作業を行った。\n依頼販売会社へのサービスカー使用料金の振り替え請求額を消費税込みとして、適切なものはどれか。\n\n（注）答えが小数点以下になる場合は、小数点以下第１位を四捨五入しなさい。", "choices": {"A": "６，７３２円", "B": "６，８００円", "C": "７，４８０円", "D": "８，８００円", "E": "９，３５０円"}, "explanation": "【計算（改定前料金）】\n10kmまで：6,000円\n10km超分：400円×2km＝800円\n小計：6,800円\n10%控除：6,800×0.9＝6,120円\n消費税込：6,120×1.1＝6,732円 → A", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 32, "label": "問32", "points": 5, "answer": "B", "stem": "【問２(2)】通過車両の業務処理規定に照らし、通過車両のサイドミラー修理を下記内容で実施した。\n依頼販売会社への振り替え請求額を消費税込みとして、適切なものはどれか。\n\n技術料：１０，０００円（税抜）\n部品代：３１，０００円（税抜）\n※部品は純正部品（定価）を使用\n\n（注）答えが小数点以下になる場合は、小数点以下第１位を四捨五入しなさい。", "choices": {"A": "３２，６７０円", "B": "３６，０８０円", "C": "３８，２８０円", "D": "４２，９００円", "E": "４５，１００円"}, "explanation": "【計算】\n技術料振替（20%控除）：10,000×0.8＝8,000円\n部品代振替（定価×0.8）：31,000×0.8＝24,800円\n小計：32,800円\n消費税込：32,800×1.1＝36,080円 → B", "source": "21年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 1, "label": "問1(1)", "points": 3, "answer": "D", "stem": "保証制度に関する記述として、不適切なものはどれか。", "choices": {"A": "販売会社は、お客様より保証書に記載された期間と条件に適合する申し出を受けた場合は保証修理を断ることができない。", "B": "保証制度は約束によって成り立っており、お互いに約束（契約）を守って、正しく運用しなければならない。約束（契約）違反は信頼関係を損ない、重大問題に発展する。", "C": "日野自動車製品の取引等に関し、その基本的な事項について、販売会社と日野自動車の代表者間で契約を締結した契約書のことを「日野販売会社基本契約書」と言う。", "D": "日野自動車の保証制度は、販売会社・日野自動車がそれぞれの約束を結び、この約束によって成り立っている。"}, "explanation": "日野自動車の保証制度は、お客様・販売会社・日野自動車がそれぞれの約束を結び成り立っている（D には「お客様」が抜けている）。正解はD。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 2, "label": "問1(2)", "points": 3, "answer": "D", "stem": "シビアコンディションの点検整備に関する記述として、不適切なものはどれか。", "choices": {"A": "悪路（凹凸路、砂利道、未舗装路等）、雪道、多塵地帯の走行が走行距離の30％以上。", "B": "山道、登降坂路の走行が走行距離の30％以上。", "C": "発進・停止の繰り返しが多い、もしくは低速走行が走行距離の30％以上。", "D": "走行距離が多い（目安：20,000km／月以上）。"}, "explanation": "走行距離の目安は10,000km/月以上（20,000kmではない）。正解はD。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 3, "label": "問1(3)", "points": 3, "answer": "B", "stem": "見積書の記載内容に関する記述として、適切なものはどれか。", "choices": {"A": "主体作業とは、車両を構成する主要な部品、およびそれに取り付けられている部品(付帯部品)の複合した作業、作業時間の対価が工賃として計上できない作業内容。", "B": "関連作業とは、２つ以上の主要部品を取り替える場合、複合した主体作業の関連部位は、作業箇所が重複となり簡略されることにより、作業時間が縮小可能となる作業。", "C": "付帯作業とは、ある主体作業を行う場合、その主体作業とは別途な作業が必要な時のその作業。", "D": "付随作業とは、それ自体の作業時間が主体作業の範囲内に含まれて設定されており、特に作業項目は設定せず、工賃も単独では計上しないもの。"}, "explanation": "A:主体作業は工賃計上できる作業内容（「できない」が誤り）。C:付随作業の説明。D:付帯作業の説明。正しいのはB（関連作業の説明）。正解はB。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 4, "label": "問1(4)", "points": 3, "answer": "D", "stem": "HITOSSⅡで売上報告のご用命作業明細画面に関する記述として、不適切なものはどれか。", "choices": {"A": "位置区分に「8」を入力して納品書を印字すると、位置欄に「後」と印字される。", "B": "位置区分に「3」を入力して納品書を印字すると、位置欄に「上下」と印字される。", "C": "位置区分に「4」を入力して納品書を印字すると、位置欄に「右」と印字される。", "D": "位置区分に「6」を入力して納品書を印字すると、位置欄に「前」と印字される。"}, "explanation": "位置CDは1:上 2:下 3:上下 4:右 5:左 6:左右 7:前 8:後 9:前後。「6」は「左右」と印字される（「前」ではない）。正解はD。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 5, "label": "問1(5)", "points": 3, "answer": "D", "stem": "通過車両の業務処理要領「保証修理に関する作業の処理方法」に関する記述として、不適切なものはどれか。", "choices": {"A": "送状には故障状況を記入するが、万一記入できない場合は、市技報に記入して添付する。", "B": "現品の発送先は原則として元販売会社サービス部長宛とし運賃は元販売会社負担とする。", "C": "現品の元販売会社への到着期限は、故障発生日より20日以内とする。", "D": "現品および関係書類は即時発送する。なお現品およびその梱包には「通過車両」と明記した送状と受領書を同封する。"}, "explanation": "現品およびその梱包には「通過車両」と明記した荷札をつけ、送状と受領書を同封する（荷札をつけるのが正しく、送状に明記するのではない）。正解はD。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 6, "label": "問1(6)", "points": 3, "answer": "C", "stem": "通過車両規定の特別対応料（日野車）および体制維持費に関する記述として、不適切なものはどれか。", "choices": {"A": "出張作業の安全確保の為（2名出動を原則）、時間外の特別対応料を10,000円とする。", "B": "深夜の場合は、5,000円を割り増し請求できる。", "C": "登録前車両の対応時は、特別対応料および体制維持費とも保証申請にてメーカーに請求できる。", "D": "体制維持費とはメーカーと元販売会社の応分の負担費用である。"}, "explanation": "登録前車両については、特別対応料のみ保証申請にてメーカーに請求できる（体制維持費は対象外）。正解はC。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 7, "label": "問1(7)", "points": 3, "answer": "D", "stem": "整備料金の説明と回収に関する記述として、不適切なものはどれか。", "choices": {"A": "サービス部門で販売する商品は、点検、整備という点検整備作業における「技術の提供」である。", "B": "点検・整備の価値をお客様に理解していただけるよう、必要性、効果などをわかりやすくお客様に説明することも、「機能的サービス」の一環である。", "C": "無償、有償作業を同時に行う場合、受注の時点で「料金」とその有償、無償についてお客様に説明しておく。", "D": "売掛金が回収予定日を過ぎても入金されない場合は、督促状を普通郵便や内容証明付郵便などの手段を講じることも大切である。"}, "explanation": "督促状は配達証明付郵便や内容証明付郵便で送付する（普通郵便は不可）。正解はD。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 8, "label": "問1(8)", "points": 3, "answer": "A", "stem": "売上・回収に関する記述として、不適切なものはどれか。", "choices": {"A": "HITOSSⅡ上のお客様ランクが「6，7」の場合、売上先確認。「8，9」の場合、売上不可が表示される。", "B": "小切手とは振出人の取引銀行に対して、受取人に一定額の金額を支払うように委託する有価証券のこと。", "C": "売掛金は利息が付かず、時効が5年である。", "D": "受取手形は6ヶ月に2回、銀行を支払い場所とする約束手形を不渡りにすると銀行取引停止処分を受ける。"}, "explanation": "HITOSS上のお客様ランクが「6,7,8」の場合、売上先確認。「9」の場合、売上不可が表示される（「8」は売上不可ではない）。正解はA。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 9, "label": "問1(9)", "points": 3, "answer": "B", "stem": "売掛金に関する記述として、不適切なものはどれか。", "choices": {"A": "取引先が倒産した場合、原則として回収は出来ない。", "B": "時効の成立を中断させるため、請求書を再度送付した。", "C": "支払いに懸念のあるお客様と、現金取引を行った。", "D": "民法上の短期消滅時効は廃止された。"}, "explanation": "請求書の送付だけでは時効は中断されない（訴訟提起・承認など法的手段が必要）。正解はB。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 10, "label": "問1(10)", "points": 3, "answer": "D", "stem": "約束手形、為替手形に関する記述として、不適切なものはどれか。", "choices": {"A": "振出人の署名のない白地手形（手形金額の記載のないものは除く）で、引受人やその他の手形当事者の署名があるものは、引受人やその他の手形当事者がその手形を作成したことになる。", "B": "記載された手形金額が150万円のものには400円、300万円のものには1千円の印紙税がそれぞれかかる。", "C": "手形の金額を補充したときは、その補充をした人がその手形を作成したものとみなされ、納税義務者になる。", "D": "手形の複本または謄本は課税文書となる。"}, "explanation": "手形金額の記載のないものや、手形の複本または謄本は非課税文書となる。正解はD。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 11, "label": "問1(11)", "points": 3, "answer": "D", "stem": "通過車両規定において、実施販売会社の請求方法に関する記述として、不適切なものはどれか。", "choices": {"A": "作業完了後、即時に納品書を元販売会社宛に必ず発送する。また、保証整備作業の場合は必ず現品の送状（写）を添付する。", "B": "毎月20日を締切日とし、当月分の請求書を一括して元販売会社に発送する。その際、請求明細書を添付する。", "C": "原則として追加請求は認めないが、外注、その他やむを得ず別請求になる場合は、事前に元販売会社に連絡をし、承諾を得るものとする。", "D": "残高通知は請求側、支払側とも四半期ごとに残高整理を行い、元販売会社に通知するものとする。"}, "explanation": "残高通知は請求側、支払側とも半期ごとに残高整理を行い元販売会社に通知する（四半期ごとではない）。正解はD。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 12, "label": "問1(12)", "points": 3, "answer": "C", "stem": "通過車両規定において事故修理（保険修理）の売り上げ（振替）に関する記述として、適切なものはどれか。", "choices": {"A": "・技術料は保険査定額の5％を控除。\n・部品代は保険査定額の5％を控除。", "B": "・技術料は保険査定額の10％を控除。\n・部品代は保険査定額の5％を控除。", "C": "・技術料は保険査定額の5％を控除。\n・部品代は保険査定額の10％を控除。", "D": "・技術料は保険査定額の20％を控除。\n・部品代は保険査定額の10％を控除。"}, "explanation": "技術料は保険査定額の5%を控除、部品代は保険査定額の10%を控除。正解はC。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 13, "label": "問1(13)", "points": 3, "answer": "D", "stem": "通過車両の売上に関する記述として、不適切なものはどれか。", "choices": {"A": "技術料割増が2つ以上の時間帯をまたぐ場合は、販売会社相互間で相談の上、整備料金を決定する。", "B": "悪条件の場合は、元販売会社へ事前連絡の上、出張技術料割増を50％とすることができる。", "C": "休日で深夜出張（22：00～翌5：00）の技術料割増は、100％である。", "D": "休日で定時間外（深夜を除く）の技術料割増は、75％である。"}, "explanation": "休日で定時間外（深夜を除く）の技術料割増は50%（75%ではない）。正解はD。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 14, "label": "問1(14)", "points": 3, "answer": "B", "stem": "通過車両規定において、サービスカー使用料金（税抜）に関する記述として、不適切なものはどれか。", "choices": {"A": "出発地点から到着地点まで、片道17kmの場合に販売会社間振替料金は7,920円となる。", "B": "出発地点から到着地点まで、片道9kmの場合に販売会社間振替料金は6,000円となる。", "C": "出発地点から到着地点まで、片道で17kmを2往復した場合に販売会社間振替料金は11,880円となる。", "D": "出発地点から到着地点まで、片道で9kmを2往復した場合に販売会社間振替料金は7,560円となる。"}, "explanation": "片道10kmまでは6,000円。振替控除10%で6,000×0.9=5,400円が正しい（6,000円ではない）。正解はB。※本問は22年9月料金改定前の出題。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 15, "label": "問1(15)", "points": 3, "answer": "A", "stem": "2SGプロフィア（2019年モデル）のハイブリッドシステムに関する記述として、不適切なものはどれか。", "choices": {"A": "一番トルクを必要とする車両発進時にモーターによる発進、もしくはアシスト発進を行うことにより、燃費の向上を狙っている。", "B": "キー操作によるエンジン始動はスターターによって始動するが、アイドリングストップからの始動はHVモーターにより始動する。", "C": "DPR再生中はモーター走行は行わない。", "D": "3D地図情報などをもとにルート上の勾配を先読みし、走行負荷を予測して最適なハイブリッド制御を行っている。"}, "explanation": "定常走行時に負荷が低いときはHVモーターのみで走行する。発進時や高負荷時には行わない（発進時のモーターアシストという説明が誤り）。正解はA。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 16, "label": "問1(16)", "points": 3, "answer": "D", "stem": "2★G付プロフィア（2019年モデル）について、不適切なものはどれか。", "choices": {"A": "J-OBDⅡに対応しMIL表示を追加した。", "B": "GPSや地図情報などを利用した道路勾配先読み制御を追加した。", "C": "衝突事故を未然に防止するためにサイトアラウンドモニターシステム（SAMS）を追加した。", "D": "追突防止用に誤発進抑制装置が追加された。"}, "explanation": "誤発進抑制装置は搭載されていない。正解はD。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 17, "label": "問1(17)", "points": 3, "answer": "B", "stem": "2★G付レンジャー（2019年モデル）のオートハイビーム（AHB）に関する記述として、不適切なものはどれか。", "choices": {"A": "ハイビームを消灯する条件は、車速が約25km/h以下で、前方にヘッドランプやテールランプを点灯した対向車または先行車が存在する状態である。", "B": "ハイビームを点灯する条件は、車速が約60km/h以上で、前方が暗く対向車または先行車を検知していないときである。", "C": "フロントガラスに設置された画像センサーにより制御を行っている。", "D": "ハイビームとロービームの切り替えは、対向車または先行車のランプや街路灯などの明るさを判断し、自動的に切り替えている。"}, "explanation": "ハイビームを点灯する条件は車速が30km/h以上（60km/hではない）。正解はB。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 18, "label": "問1(18)", "points": 3, "answer": "D", "stem": "2DG付メルファに関する記述として、不適切なものはどれか。", "choices": {"A": "エンジンは単段ターボチャージャー搭載のA05C型エンジンを採用している。", "B": "運転席に電子式SRSエアバッグ＆プリテンショナー付シートベルトを採用している。", "C": "トランスミッションはLX06＋AMTのみの設定となっている。", "D": "排ガス（後処理）システムには尿素フリーのDPRⅡを採用している。"}, "explanation": "DPR+尿素SCRシステムを採用している（尿素フリーのDPRⅡではない）。正解はD。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 19, "label": "問1(19)", "points": 3, "answer": "B", "stem": "令和2年4月1日より施行された特定整備制度に関する記載として、不適切なものはどれか。", "choices": {"A": "特定整備の経過措置として改正法施行の際、現に電子制御装置整備に相当する事業を経営している整備事業者においては、施行日から起算して4年を経過する日までの間は、認証を受けるための準備期間として、引き続き、当該事業を経営することができる。", "B": "特定整備とはこれまでの分解整備とは異なり、新たに電子制御装置整備（自動ブレーキ等の先進技術）に関して認証することを特定整備と定義している。", "C": "特定整備の対象となる作業（電子制御装置整備作業）は以下の3つである。①自動運行装置の取り外しや作動に影響を及ぼすおそれがある整備・改造 ②衝突被害軽減制動制御装置、自動命令型操舵機能に用いられるカメラ等の取り外しや機能調整 ③①②に係るカメラ、レーダー等が取り付けられている車体前部、窓ガラスの脱着", "D": "特定整備の認証に必要な整備主任者は2級以上の自動車整備士資格または自動車車体整備士、自動車電気装置整備士に加えて運輸支局等が行う講習受講が条件である。"}, "explanation": "「特定整備」は新たに電子制御装置整備のみでなく、現在の分解整備も含む概念として定義されている。正解はB。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 20, "label": "問1(20)", "points": 3, "answer": "A", "stem": "道路運送車両の保安基準に照らし、車両総重量に関する記述として、不適切なものはどれか。", "choices": {"A": "セミトレーラ以外の自動車で、最遠軸距が7m以上自動車の長さが11m以上のものは、車両総重量22トン以下。", "B": "セミトレーラ以外の自動車で、最遠軸距が5.5m以上7m未満、自動車の長さが9m未満のものは、車両総重量20トン以下。", "C": "セミトレーラ以外の自動車で、最遠軸距が7m以上自動車の長さが9m未満のものは、車両総重量20トン以下。", "D": "セミトレーラ以外の自動車で、最遠軸距が5.5m未満のものは、車両総重量20トン以下。"}, "explanation": "最遠軸距7m以上・長さ11m以上のものは車両総重量25トン以下（22トンではない）。正解はA。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 21, "label": "問1(21)", "points": 3, "answer": "C", "stem": "道路運送車両法の保安基準に照らし、乗降口及び特殊扉に関する記述として、不適切なものはどれか。", "choices": {"A": "特殊扉は、確実に閉じることができるものであり、かつ、閉鎖している状態を保持するための装置を備えているものであること。", "B": "乗降口の有効幅は、600mm以上であること。", "C": "空車状態において床面の高さが地上500mmを超える自動車の乗降口には踏段を備えること。", "D": "非常口を設けた自動車には、非常口のとびらが開放した場合にその旨を運転者に警報する装置を備えなければならない。"}, "explanation": "空車状態において床面の高さが地上450mmを超える自動車の乗降口には踏段を備えること（500mmではない）。正解はC。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 22, "label": "問1(22)", "points": 3, "answer": "A", "stem": "日野メンテナンスリースの請求に関する記述として、不適切なものはどれか。", "choices": {"A": "引取、納車料（1往復／台）中、小型車は3,000円である。", "B": "一般修理技術料
