ion": "後退灯（バックランプ）の照明部位置には最外縁から400mm以内という規定はない（A不適切）。前照灯・車幅灯・尾灯には400mm以内の規定あり。", "source": "第49回全国フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 23, "label": "問23", "points": 2, "answer": "A", "stem": "(23) 小切手に関する記述として、適切なものはどれか。", "choices": {"A": "振出日の翌日から１０日以内に支払人（振出人の取引銀行）へ呈示する必要がある。", "B": "振出日の当日から１０日以内に支払人（振出人の取引銀行）へ呈示する必要がある。", "C": "振出日の翌日から１５日以内に支払人（振出人の取引銀行）へ呈示する必要がある。", "D": "振出日の当日から１５日以内に支払人（振出人の取引銀行）へ呈示する必要がある。"}, "explanation": "小切手は振出日の翌日から10日以内に支払人（振出人の取引銀行）へ呈示する必要がある（A適切）。", "source": "第49回全国フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 24, "label": "問24", "points": 2, "answer": "D", "stem": "(24) 保険処理の事故受付応対に関する記述として、不適切なものはどれか。", "choices": {"A": "お客様への同情心からお客様の言い分を全面的に信用したり、事故処理に直接介入するなど前面に立たない。", "B": "車両同士の事故の場合の事故処理は、当事者間で行ってもらい、フロントアドバイザは聞き役、助言をする役に徹する。", "C": "お客様が事故に合ったという異常な精神状態を察して親身になり、お客様の安否を気遣う。", "D": "人身がからんだり、話し合いが難しい場合などは、フロントアドバイザが事故処理の代行を行う。"}, "explanation": "フロントアドバイザが事故処理を代行してはならない。事故処理は当事者間で行うものであり、助言にとどめる（D不適切）。", "source": "第49回全国フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 25, "label": "問25", "points": 2, "answer": "D", "stem": "(25) 日野プレミアムサポートに関する記述として、不適切なものはどれか。", "choices": {"A": "保証書を紛失した場合でも、サービスの利用は可能である。", "B": "修理費用差額補償サービスは、リース期間中１回のみ利用可能である。", "C": "事故後６０日以上経過してからの事故通知や修理入庫は対象外である。", "D": "路上で交換したタイヤの修理は対象外である。"}, "explanation": "日野プレミアムサポートでは路上でのタイヤサポートも対象。「路上で交換したタイヤの修理は対象外」は不適切（D不適切）。", "source": "第49回全国フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 26, "label": "問26", "points": 2, "answer": "A", "stem": "(26) 安全活動のひとつであるＫＹトレーニングのＫＹとは何を略したものか。", "choices": {"A": "危険予知", "B": "決められたやり方", "C": "危険予測", "D": "ケガ予防"}, "explanation": "KYトレーニングのKYは「危険予知（Kiken Yochi）」の略（A正解）。", "source": "第49回全国フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 27, "label": "問27", "points": 2, "answer": "B", "stem": "(27) ５Ｓの説明で正しいものはどれか。", "choices": {"A": "５つのＳとは、整理・整頓・清掃・清潔・指導 のことである。", "B": "５Ｓは、安全作業の基本と言われている。", "C": "５Sの中の２Ｓ（整理・整頓）とは、作業の効率の為に道具を早く取れる様に近くに置けるようにする事である。", "D": "５Ｓ活動とは汚れたら清掃して、職場をきれいに維持する活動である。"}, "explanation": "5Sは安全作業の基本（B正解）。5Sは整理・整頓・清掃・清潔・躾（しつけ）の5つ。「指導」ではない。", "source": "第49回全国フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 28, "label": "問28", "points": 2, "answer": "C", "stem": "(28) 日野自動車の「安全五項目」に含まれているものはどれか。", "choices": {"A": "異常の時はまず逃げろ", "B": "動いているものには近づくな", "C": "わからないことは手を出すな", "D": "共同作業は目を見て確認"}, "explanation": "日野自動車の安全五項目に「わからないことは手を出すな」が含まれる（C正解）。", "source": "第49回全国フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 29, "label": "問29", "points": 2, "answer": "A", "stem": "(29) ドライバーの異常や車線逸脱を検知して、また乗客や乗務員が異常時にスイッチを作動させて車両を安全に停止させることが出来る、大型バスから採用が始まった「ドライバー異常時対応システム」の略称「EDSS」は何の略か。", "choices": {"A": "Emergency Driving Stop System", "B": "Emergency Driver Stop System", "C": "Emergency Driving Support System", "D": "Emergency Driver Support System"}, "explanation": "EDSS = Emergency Driving Stop System（緊急停車システム）（A正解）。", "source": "第49回全国フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 30, "label": "問30", "points": 2, "answer": "D", "stem": "(30) 自動車整備事業者が行う自動ブレーキ等の先進技術を搭載した車や自動運転車の整備について、その確実な実施を担保するため、これらの整備を行う自動車整備事業者を認証し、自動車の使用者がこれらの事業者を判別できるようにすることが必要となった事から定められた事業者の名称で正しいものはどれか。", "choices": {"A": "指定整備事業者", "B": "分解整備事業者", "C": "電子制御装置整備事業者", "D": "特定整備事業者"}, "explanation": "電子制御装置（自動ブレーキ等）の整備を行う事業者として認証される名称は「特定整備事業者」（D正解）。", "source": "第49回全国フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 1, "label": "問１", "points": 2, "answer": "B", "stem": "事故見積りを実施する際、損傷波及の構造上の着眼点に関する記述として、不適切なものはどれか。", "choices": {"A": "衝撃力の支点部位", "B": "衝撃力の着力点部位", "C": "断面形状の変化部位", "D": "部材形状の変化部位"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 2, "label": "問１", "points": 2, "answer": "C", "stem": "保証書に関する記述として、不適切なものはどれか。", "choices": {"A": "大型バスの保証書に記載されているバスエアコン及びエアコン用サブエンジンの保証期間は新車を登録した日から１年間である。", "B": "保証期間が残っている車両を購入した場合、「二次保証の条件」を満たせば二次保証を受けることができるが、その際の点検の結果で、修理が必要となる部分の費用は、保証対象範囲内であってもお客様に負担していただく。", "C": "保証書を破損又は紛失した場合で保証書の発行を受けたお客様から申し出がある場合に再発行する。再発行手続きは最寄の日野販売会社で行う。", "D": "保証の開始日は次の通りである。①登録No.が有る車両は初度登録日　②登録No.が無い登録前車両（納入前車両）は故障発生日　③登録No.が無い無登録車両（構内専用車、防衛省車両）はお客様への納車又は納入日"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 3, "label": "問１", "points": 2, "answer": "B", "stem": "外注依頼の基本業務フローに関する記述として、不適切なものはどれか。", "choices": {"A": "外注業者に作業を依頼する場合は、発注時に「外注依頼書」を必ず発行する。", "B": "追加の作業が発生した場合は、「補充書面」を追加で発行する。", "C": "代金未決で「外注依頼書」を発行する場合は、「代金決定予定期日」を明示する。", "D": "代金未決で発注した場合は、遅くとも納品までに「補充書面」を交付する。"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 4, "label": "問１", "points": 2, "answer": "C", "stem": "下請法に関する取引上の注意事項として、不適切なものはどれか。", "choices": {"A": "「60日以内の支払」の起算日とは、下請事業者から給付を受けた日であり、検収日でも請求書受付日でもなく「納入日」のことである。", "B": "「１ヶ月締切制度」とは、１ヶ月毎に納品の締切日を定め、締切日１ヶ月後までに支払日を定めて支払う制度であり、１ヶ月締切制度を採用している場合、支払日は「締切後30日以内」ではなく、あくまでも締切後１ヶ月となる。", "C": "金融機関を利用した支払（振込）で支払日が金融機関休業日にあたる場合、仕入先とあらかじめ、翌営業日への支払いの順延を「合意、書面化」していれば、５日以内の範囲で順延が可能である。", "D": "金融機関の振込手数料（実費）の仕入先負担について、仕入先との間で書面での合意をしている場合、実費の範囲内で有効である。"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 5, "label": "問１", "points": 2, "answer": "A", "stem": "保証制度に関する記述として、不適切なものはどれか。", "choices": {"A": "日野自動車の保証制度は、販売会社・日野自動車がそれぞれの約束を結び、この約束によって成り立っている。", "B": "販売会社はお客様との売買契約で、保証書に記載されている期間と条件に従って保証修理することを約束している。", "C": "販売会社は日野販売会社基本契約書に基づき、日野自動車に代わって保証修理を実施することを約束している。", "D": "販売会社は、お客様より保証書に記載された期間と条件に適合する申し出を受けた場合は保証修理を断ることができない。"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 6, "label": "問１", "points": 2, "answer": "C", "stem": "通過車両の保証処理業務に関する記述として、不適切なものはどれか。", "choices": {"A": "実施販売会社は、保証期間内の車両、あるいは、保証修理に該当すると認められる場合は、元販売会社と十分に連絡をとり、その処置を決める。", "B": "エンジンAssy またはトランスミッションAssyを使用する場合は、元販売会社にて利用依頼書を発行し、手配する。", "C": "高額部品の交換が必要になった場合、必ず元販売会社で使用部品の調達を行う。", "D": "返却部品は、原則として元販売会社の整備部長宛に運賃は「着払い」で発送する。"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 7, "label": "問１", "points": 2, "answer": "C", "stem": "通過車両規定に照らし、お客様リストに優良客として登録されているお客様（通過車両）より直接、レンジャーのブレーキ調整の依頼を受けた。この場合の応対として、適切なものはどれか。", "choices": {"A": "元販売会社の担当と連絡がとれないので、現金払いでの修理をお客様にお願いした。", "B": "元販売会社の担当に連絡がとれないので、連絡がつくまで作業を待ってもらった。", "C": "元販売会社に確認をとらずに、受付をして作業した。", "D": "元販売会社の担当に連絡がとれないので、作業を断った。"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 8, "label": "問１", "points": 2, "answer": "D", "stem": "広域サービスのお客様をHITOSS IIで受付する際に確認する、対応区分と適応時間帯に関する記述として、適切なものはどれか。", "choices": {"A": "適応時間帯の「１」は、共通の適応コードである。", "B": "対応区分の「０２」は、条件付き（G）客のコードである。", "C": "適応時間帯の「２」は、夜間のみ適応コードである。", "D": "対応区分の「０１」は、優良（S）客のコードである。"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 9, "label": "問１", "points": 2, "answer": "D", "stem": "通過車両規定に関する記述として、適切なものはどれか。", "choices": {"A": "休日とは、元販売会社の休日をいう。", "B": "通過車両とは、自社以外の販売会社が販売した車両で、流入車両、登録前車両は含まれない。", "C": "営業時間外の修理時間は、約３時間／件を目安とする。", "D": "平日とは原則、月曜日から土曜日をいう。（但し、各実施販売会社の休業日を除く）"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 10, "label": "問１", "points": 2, "answer": "C", "stem": "通過車両規定において特別対応料（日野車）および体制維持費に関する記述として、不適切なものはどれか。", "choices": {"A": "出張作業の安全確保の為（２名出動を原則）、時間外の特別対応料を10,000円とする。", "B": "深夜の場合は、5,000円を割り増し請求できる。", "C": "登録前車両の対応時は、特別対応料および体制維持費とも保証申請にてメーカーに請求できる。", "D": "体制維持費とはメーカーと元販売店の応分の負担費用である。"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 11, "label": "問１", "points": 2, "answer": "D", "stem": "売掛金に関する記述として、適切なものはどれか。", "choices": {"A": "いかなる場合でも、売掛金発生時から利息が付く。", "B": "売掛金を担保に銀行から借り入れができる。", "C": "約束の日に支払いがないと、銀行取引停止処分を受ける。", "D": "時効は２年と極めて短い。"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 12, "label": "問１", "points": 2, "answer": "C", "stem": "不渡りになった手形の請求権利に関する記述として、適切なものはどれか。振出人に対しては何年で時効となるか。", "choices": {"A": "１年で時効となる。", "B": "２年で時効となる。", "C": "３年で時効となる。", "D": "４年で時効となる。"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 13, "label": "問１", "points": 2, "answer": "A", "stem": "領収書に関する記述として、適切なものはどれか。", "choices": {"A": "領収書には有効期限はない。", "B": "領収書には保管期間はない。", "C": "領収書の有効期限は１年間。", "D": "領収書の保管期間は５年間。"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 14, "label": "問１", "points": 2, "answer": "D", "stem": "整備料金の説明と回収に関する記述として、不適切なものはどれか。", "choices": {"A": "サービス部門で販売する商品は、点検、整備という点検整備作業における「技術の提供」である。", "B": "点検・整備の価値をお客様に理解していただけるよう、必要性、効果などをわかりやすくお客様に説明することも、「機能的サービス」の一環である。", "C": "無償、有償作業を同時に行う場合、受注の時点で「料金」とその有償、無償についてお客様に説明しておく。", "D": "売掛金が回収予定日を過ぎても入金されない場合は、督促状を普通郵便や内容証明付郵便などの手段を講じることも大切である。"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 15, "label": "問１", "points": 2, "answer": "A", "stem": "板金修理見積書でキャブ回りの標準的な記載順序として、適切なものはどれか。", "choices": {"A": "①フロントボデー ②サイドボデー ③リヤボデー ④ルーフ ⑤フロア", "B": "①フロントボデー ②フロア ③サイドボデー ④リヤボデー ⑤ルーフ", "C": "①フロントボデー ②ルーフ ③フロア ④サイドボデー ⑤リヤボデー", "D": "①フロントボデー ②フロア ③ルーフ ④サイドボデー ⑤リヤボデー"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 16, "label": "問１", "points": 2, "answer": "B", "stem": "「通過車両規定」事故修理の見積料金について、保険による場合・保険外の場合を問わず、正式見積書を提出し修理を実施しないときには、原則として元販売会社に対し請求できる額として適切なものはどれか。", "choices": {"A": "見積額の１％", "B": "見積額の３％", "C": "見積額の５％", "D": "見積額の７％"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 17, "label": "問１", "points": 2, "answer": "C", "stem": "通過車両規定に照らし、保証修理の処理方法について、不適切なものはどれか。", "choices": {"A": "現品の元販売会社への到着期限は、故障発生日より20日以内とする。", "B": "再修理等、整備保証に関する事項が発生した場合は販売会社間相互で協議して、その都度解決する。", "C": "現品および関係書類は即時発送する。なお現品およびその梱包には「保証部品」と明記した荷札をつけ、送状と受領書を同封する。", "D": "現品が元販売会社に到着しなかった場合の損害は、実施販売会社とする。"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 18, "label": "問１", "points": 2, "answer": "A", "stem": "通過車両規定に照らし、実施販売会社の請求方法に関する記述として、適切なものはどれか。", "choices": {"A": "請求書は毎月20日を締切日とし、当月分を一括して元販売会社に発送する。", "B": "請求書は作業完了後1件ごとに元販売会社に発送する。", "C": "納品書は毎月20日を締切日とし、当月分を一括して元販売会社に発送する。", "D": "納品書及び請求書は1件ごとに元販売会社に発送する。"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 19, "label": "問１", "points": 2, "answer": "B", "stem": "通過車両規定において、サービスカー使用料金（税抜）に関する記述として、不適切なものはどれか。", "choices": {"A": "出発地点から到着地点まで、片道17kmの場合に販売会社間振替料金は7,920円となる。", "B": "出発地点から到着地点まで、片道9kmの場合に販売会社間振替料金は6,000円となる。", "C": "出発地点から到着地点まで、片道17kmを2往復した場合に販売会社間振替料金は11,880円となる。", "D": "出発地点から到着地点まで、片道9kmを2往復した場合に販売会社間振替料金は7,560円となる。"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 20, "label": "問１", "points": 2, "answer": "C", "stem": "通過車両規定に照らし、事故車や故障車の保管料に関する記述として、不適切なものはどれか。", "choices": {"A": "修理しないものは、入庫日の翌日から起算し7日間は無料。8日間以上は1日につき小型車は500円とする。", "B": "保管料の振替割引は行わない。", "C": "小型車で修理を実施したものは、元販売会社宛に完成した旨を通知した日の翌日から起算し、7日間は無料。8日間以上は1日につき500円とする。", "D": "元販売会社は、車両を預かる販売会社の立場も考慮し、お客様と相談の上、短期間で対応方針を決めるよう努めること。"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 21, "label": "問１", "points": 2, "answer": "D", "stem": "2*G付レンジャーのプロシフト搭載車に関する記述として、不適切なものはどれか。", "choices": {"A": "非常コントロール機能の非常走行制御は、スターターキーが「LOCK」または「ACC」位置で解除される。", "B": "DTCコード（P0719）ブレーキスイッチ故障の検出条件として、アウトプット回転数が750r/min、アクセル開度10%以上、ブレーキ信号ありの状態が規定時間継続して検出されたときである。", "C": "DTCコード（P1821）バックアップ用ギヤセレクターD信号系統異常を検出すると、I/Oコンバーター系統（CANおよび本体）の故障時、前進ギヤが選択できない。", "D": "HINO DX IIを使用せず、ギヤ位置初期学習を行う手順として、はじめにスターターキーを「ON」、車両停止、パーキングブレーキを引き、ギヤセレクターを「N」位置にする。次にブレーキを踏んでギヤセレクターを「D」位置にし、オート/マニュアル切り替えスイッチを押してM（マニュアル）モードにする。"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 22, "label": "問１", "points": 2, "answer": "B", "stem": "LDG付プロフィア9段T/M（M009）に関する記述として、不適切なものはどれか。", "choices": {"A": "ローレンジ（LO）とハイレンジ（HI）の切替はメインギヤがニュートラル（N）位置で行なう。", "B": "チェンジレバーは、R（後退）・1速～4速までのローレンジ（LO）と、5速～9速までのハイレンジ（HI）に分かれている。", "C": "オーバーラン防止システムにより、エンジン回転数が1,700r/min以上の車速では、ハイレンジ（HI）からローレンジ（LO）に切り替わらない。", "D": "ミスシフト防止のために（HI）→（LO）への切り替え操作は、（LO）→（HI）への切り替え操作より重めになっている。"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 23, "label": "問１", "points": 2, "answer": "D", "stem": "SJG付デュトロのHVシステムに関する記述として、不適切なものはどれか。", "choices": {"A": "一度でエンジンが始動しないときは、HVバッテリー機能保護のため、30秒ほど待ってから再始動を行う。", "B": "減速時のクラッチの断接状態は、HVバッテリー容量によって自動的に切り替わる。", "C": "車両電装品への電力供給はHVバッテリーの電力をDC-DCコンバーターで降圧して供給している。", "D": "モーター動力のみの発進時は、トランスミッションギヤ段は1速になる。"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 24, "label": "問１", "points": 2, "answer": "A", "stem": "エンジンに関する記述として、適切なものはどれか。", "choices": {"A": "4サイクル直列6気筒エンジンでは、クランクシャフトが1回転すると、3回燃焼する。", "B": "4サイクルエンジンとは、4ストローク・1サイクルエンジンの略称で、クランクシャフト4回転で1サイクルの作用を完了するエンジンである。", "C": "4サイクルエンジンにおいて、クランクシャフトが1回転すると、カムシャフトは2回転する。", "D": "4サイクルエンジンでは、ピストン1ストロークで、クランクシャフトが1回転する。"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 25, "label": "問１", "points": 2, "answer": "D", "stem": "QPG付FE2Aに関する記述として、不適切なものはどれか。", "choices": {"A": "補助ブレーキとしてエンジンリターダーを標準で搭載しておりコントロールレバーを操作することによりエキゾーストブレーキと併用で作動する。", "B": "A05Cエンジンに採用されている2段過給システムはVGターボとウエストゲートターボの組み合わせを最適な条件に制御することにより常に高効率な過給を可能にした。エンジン低回転時にはVGターボのノズル開度を絞って高圧段ターボが主に働く。", "C": "全車VSCを標準装備しており、車両が横滑りした場合、またはスピンする危険がある場合に警報を出して運転者に知らせるとともに必要に応じてエンジンの出力およびサービスブレーキを制御し、車両の危険状態を減少させる。", "D": "トランスミッションPTOをオプション設定しており、許容トルクが245N・mの標準型と許容トルク343N・mの大容量型があるが、大容量型はトランスミッションリターダーとの同時装着ができない。"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 26, "label": "問１", "points": 2, "answer": "D", "stem": "コンプライアンスに関する記述として、不適切なものはどれか。", "choices": {"A": "大型1種免許を保有していれば、牽引免許がなくても、大型レッカー車を使用して連結状態のセミトレーラーをレッカー移動させることができる。", "B": "大型1種免許・高圧ガス移動監視者免許を保有していれば、水素ガスフル積載状態の大型タンクローリーを自走にて引き取りできる。", "C": "大型1種免許を保有していれば牽引免許がなくても、簡易的な切り離しが出来ない連節バスを自走にて引き取りできる。", "D": "大型1種免許を保有していれば、吊上げ能力250トンのラフタークレーンを自走にて引き取りできる。"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 27, "label": "問１", "points": 2, "answer": "A", "stem": "道路運送車両法の保安基準に照らし、最低地上高の測定に関する記述として、不適切なものはどれか。", "choices": {"A": "測定する自動車は運転手1名が乗車した状態とする。", "B": "車高調整装置が装着されている自動車にあっては、標準（中立）の位置とする。ただし、車高を任意の位置に保持することができる車高調整装置にあっては車高が最低となる位置と車高が最高となる位置の中間の位置とする。", "C": "測定する自動車を舗装された平面に置き、地上高を巻尺等を用いて測定する。", "D": "測定位置は、1cm未満は切り捨て、cm単位とする。"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 28, "label": "問１", "points": 2, "answer": "B", "stem": "令和2年4月1日より施行された特定整備制度に関する記載として、不適切なものはどれか。", "choices": {"A": "特定整備の経過措置として改正法施行の際、現に電子制御装置整備に相当する事業を経営している整備事業者においては、施行日から起算して4年を経過する日までの間は、認証を受けるための準備期間として、引き続き、当該事業を経営することができる。", "B": "特定整備とはこれまでの分解整備とは異なり、新たに電子制御装置整備（自動ブレーキ等の先進技術）に関して認証することを特定整備と定義している。", "C": "特定整備の対象となる作業（電子制御装置整備作業）は①自動運行装置の取り外しや作動に影響を及ぼすおそれがある整備・改造　②衝突被害軽減制動制御装置等に用いられるカメラ等の取り外しや機能調整　③①②に係るカメラ・レーダー等が取り付けられている車体前部・窓ガラスの脱着の3つである。", "D": "特定整備の認証に必要な整備主任者は2級以上の自動車整備士資格または自動車車体整備士、自動車電気装置整備士に加えて運輸支局等が行う講習受講が条件である。"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 29, "label": "問１", "points": 2, "answer": "B", "stem": "「道路運送車両法」に照らし、長さ4.68m、幅1.65m、高さ1.87mで原動機の総排気量が2.89リットルのジーゼルエンジンの自動車の種別として、適切なものはどれか。", "choices": {"A": "軽自動車", "B": "小型自動車", "C": "普通自動車", "D": "大型特殊自動車"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 30, "label": "問１", "points": 2, "answer": "C", "stem": "道路運送車両法の保安基準に照らし、次の文章の［　］に当てはまるものとして、適切なものはどれか。\n最高速度が20km/h未満の自動車は右側および左側に、それぞれ［　］まで傾けた場合に転覆しないこと。", "choices": {"A": "20°", "B": "25°", "C": "30°", "D": "35°"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 31, "label": "問１", "points": 2, "answer": "C", "stem": "自動車損害賠償責任保険（自賠責保険）では、被害者が神経系統・精神または胸腹部臓器に著しい障害を残し、随時介護を必要とする後遺障害を負った場合の1名あたりの保険金額（支払限度額）で適切なものはどれか。", "choices": {"A": "2,000万円", "B": "2,500万円", "C": "3,000万円", "D": "4,000万円"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 32, "label": "問１", "points": 2, "answer": "B", "stem": "日野デュトロ「ハイブリッドバッテリー安心パック」に関する記述として、適切なものはどれか。", "choices": {"A": "区分がリースで、保証期間が3年のものは、料金が1万円である。", "B": "区分がリースで、保証期間が4年のものは、料金が2万円である。", "C": "区分がリースで、保証期間が5年のものは、料金が3万円である。", "D": "区分がリースで、保証期間が6年のものは、料金が4万円である。"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 33, "label": "問１", "points": 2, "answer": "D", "stem": "日野デュトロメンテナンスパックに関する記述として、不適切なものはどれか。", "choices": {"A": "対象車種は、日野自動車販売会社において、販売された自家用の日野デュトロである。", "B": "申し込み以外の販売会社で点検は、基本受けられない。", "C": "お客様費用として、ベーシックタイプの費用は全国一律85,000円である。", "D": "パックに加入できる期間は、登録日から5,000km点検実施前である。"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 34, "label": "問１", "points": 2, "answer": "A", "stem": "日野プレミアムサポートに関する記述として、不適切なものはどれか。", "choices": {"A": "対象車種は日野プロフィア、日野レンジャー、日野デュトロ、リエッセIIである。", "B": "自動車保険（リースカー車両費用補償特約つき）に「日野オリジナル補償」が無償でプラスされる専用プランである。", "C": "フロントガラスが飛び石やいたずら等により損害が生じ、修理した場合、自動車保険を使わなくても修理限度額5万円まで「日野オリジナル補償」で補償する。", "D": "事故やいたずら等によりタイヤのパンク損害（単独損害のみ）を被った場合、修理限度額1万円まで「日野オリジナル補償」で補償する。"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 35, "label": "問１", "points": 2, "answer": "B", "stem": "日野メンテナンスリースに関する記述として、不適切なものはどれか。", "choices": {"A": "基本契約のSプランでは、パワーステアリングオイル交換も含まれる。", "B": "基本契約のMプランでは、テールパイプ交換も含まれる。", "C": "基本契約のRプランでは、エアコン・オーバーホールも含まれる。", "D": "基本契約のSプランでは、エアークリーナエレメント交換も含まれる。"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 36, "label": "問１", "points": 2, "answer": "B", "stem": "環境マネジメントシステム（2020年）に関する記述として、不適切なものはどれか。", "choices": {"A": "「EMD認定」とは、日野独自の認定制度である。", "B": "「EMD認定」とは、「ISO14001」認定取得条件を全て満たしているものである。", "C": "日野環境チャレンジ2050としてチャレンジ6項目を掲げている。", "D": "2020年環境プランの重点項目は「CO₂排出低減」「環境リスク低減」「廃棄物低減」である。"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 37, "label": "問１", "points": 2, "answer": "D", "stem": "取扱説明書の記載事項に関する記述として、不適切なものはどれか。", "choices": {"A": "「知識」とは、知っておいていただきたいこと、知っておくと便利な事項である。", "B": "「アドバイス」とは、車両の正規性能を確保するため、また車の故障や破損を防ぐために守っていただきたい事項である。", "C": "「注意」とは、取り扱いを誤った場合、傷害を負ったり車などの物的損害につながる可能性がある事項である。", "D": "「警告」とは、取り扱いを誤った場合、生命の危険や重大な傷害につながる事項である。"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 38, "label": "問１", "points": 2, "answer": "A", "stem": "危険物に関する記述として、適切なものはどれか。", "choices": {"A": "第一石油類とは、ガソリン、パーツクリーナが該当する。", "B": "第二石油類とは、エンジンオイル、T/Mオイル、D/Fオイルが該当する。", "C": "第三石油類とは、灯油、軽油、ルーセンが該当する。", "D": "第四石油類とは、重油、AT油、PSオイル、ブレーキフルードが該当する。"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 39, "label": "問１", "points": 2, "answer": "A", "stem": "敬語の使い方の例として、不適切なものはどれか。", "choices": {"A": "おっしゃられましたように", "B": "少々、お伺いしたいことがあるのですが", "C": "あいにく外出いたしております", "D": "お電話差し上げます"}, "explanation": "", "source": "第49回支部フロント資格試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 40, "label": "問１", "points": 2, "answer": "D", "stem": "メンテナンスノートで定めている、事業用自動車の厳しい使 (2)", "points": 5, "answer": "277,508円", "stem": "通過車両規定に照らし、中型車のターボ交換（有償修理）を下記内容で実施した。\n元販売会社への振替金額（消費税１０％税込）を求めなさい。\n\n※答えは小数点以下第一位を四捨五入し、整数で記入\n\n【条件】\n・ターボ部品代：２５０，０００円\n・エンジンオイル：１３ℓ（７００円／ℓ）\n・作業時間：２．５時間\n・工賃：１０，０００円／時間\n・預かり日数：６日\n・その他費用：通過車両規定に記載の通り", "choices": {}, "explanation": "【計算内訳】\n①ターボ部品代（純正部品→20%控除）：\n  250,000×0.8=200,000円\n  ※答え解説では10%控除で225,000円とあるため：250,000×0.9=225,000円\n\n②エンジンオイル（20%控除）：\n  700×13ℓ×0.8=7,280円\n\n③工賃（20%控除）：\n  10,000×2.5h×0.8=20,000円\n\n④合計（税抜）：225,000＋7,280＋20,000=252,280円\n\n⑤消費税10%込：252,280×1.1=277,508円", "source": "19年HF-1認定2次試験", "freeAnswer": true, "multi": false, "invalid": false}];

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

// ランダム選択: 通常30問 + 計算2問
var normalSelected = shuffle(normalPool).slice(0, 30);
var calcSelected = shuffle(calcPool).slice(0, 2);
var questions = normalSelected.concat(calcSelected);

var totalQ = questions.length;
var idx = 0;
var ans = {};

function updateProg() {
  var answered = Object.keys(ans).length;
  document.getElementById('barfill').style.width = (answered/totalQ*100)+'%';
  document.getElementById('prog').textContent = (idx+1)+' / '+totalQ+' 問  （回答済み '+answered+' 問）';
}

function render() {
  var q = questions[idx];
  var choiceKeys = Object.keys(q.choices);
  var html = '';
  html += '<div class="source-badge">'+q.source+'</div>';
  html += '<div class="qtitle">問'+(idx+1)+'（'+q.points+'点）</div>';
  if (q.freeAnswer) {
    html += '<div class="calc-note">📝 記述計算問題 — 電卓使用可（採点対象外）</div>';
    html += '<div class="qstem">'+q.stem.replace(/\n/g,'<br>')+'</div>';
    html += '<div style="background:#eff6ff;border:1px solid #93c5fd;border-radius:10px;padding:12px;margin-top:10px">';
    html += '<div style="font-weight:700;color:#1d4ed8;margin-bottom:6px">正解：'+q.answer+'</div>';
    if (q.explanation) html += '<div style="color:#333;font-size:14px;line-height:1.6">'+q.explanation.replace(/\n/g,'<br>')+'</div>';
    html += '</div>';
  } else {
    html += '<div class="qstem">'+q.stem.replace(/\n/g,'<br>')+'</div>';
    html += '<div class="choices">';
    choiceKeys.forEach(function(c) {
      if (!q.choices[c]) return;
      var sel = ans[idx] === c ? ' selected' : '';
      html += '<button class="choice'+sel+'" onclick="selectAns('+idx+',\''+c+'\')"><span class="label">'+c+'</span><span>'+q.choices[c]+'</span></button>';
    });
    html += '</div>';
  }
  document.getElementById('quiz').innerHTML = html;
  document.getElementById('nextBtn').textContent = idx === totalQ - 1 ? '採点する ✓' : '次へ ▶';
  updateProg();
  window.scrollTo(0, 0);
}

function selectAns(i, c) { ans[i] = c; updateProg(); render(); }
function prevQ() { if (idx > 0) { idx--; render(); } }
function nextQ() { if (idx < totalQ - 1) { idx++; render(); } else { showResult(); } }

function showResult() {
  var score = 0, max = 0;
  questions.forEach(function(q, i) {
    if (q.freeAnswer) return;
    max += q.points;
    if (ans[i] === q.answer) score += q.points;
  });
  var html = '<div class="result"><h2>📊 採点結果</h2><div class="score-big">'+score+' / '+max+' 点</div>';
  html += '<p style="font-size:13px;color:#666">（計算問題2問は採点対象外）</p>';
  var hasMiss = false;
  html += '<h3 style="margin:16px 0 8px;font-size:15px;color:#333">📝 全問解説</h3>';
  questions.forEach(function(q, i) {
    if (q.freeAnswer) {
      html += '<div style="border-left:5px solid #93c5fd;background:#eff6ff;padding:12px;margin:8px 0;border-radius:8px;line-height:1.6;font-size:14px">';
      html += '<div style="font-weight:700;font-size:15px;margin-bottom:4px;color:#1d4ed8">問'+(i+1)+' 📝 記述計算問題（'+q.source+'）</div>';
      html += '<div style="color:#1d4ed8;font-weight:700;margin-bottom:4px">正解：'+q.answer+'</div>';
      if (q.explanation) html += '<div style="color:#333;margin-top:4px">'+q.explanation.replace(/\n/g,'<br>')+'</div>';
      html += '</div>';
      return;
    }
    var wrong = ans[i] !== q.answer;
    if (wrong) hasMiss = true;
    var bc = wrong ? '#dc2626' : '#d1d5db';
    var bg = wrong ? '#fff5f5' : '#fff';
    var correctText = q.choices[q.answer] || '';
    html += '<div style="border-left:5px solid '+bc+';background:'+bg+';padding:12px;margin:8px 0;border-radius:8px;line-height:1.6;font-size:14px">';
    html += '<div style="font-weight:700;font-size:15px;margin-bottom:4px;color:'+(wrong?'#dc2626':'#111')+'">問'+(i+1)+(wrong?' ❌':' ✅')+' <span style="font-size:11px;font-weight:400;color:#888">'+q.source+'</span></div>';
    if (wrong) {
      var myText = q.choices[ans[i]] || '';
      html += '<div style="color:#dc2626;font-weight:700;margin-bottom:2px">あなたの答え：'+(ans[i]||'未回答')+(myText?'　'+myText:'')+'</div>';
      html += '<div style="color:#16a34a;font-weight:700;margin-bottom:4px">正解：'+q.answer+(correctText?'　'+correctText:'')+'</div>';
    } else {
      html += '<div style="color:#16a34a;font-weight:700;margin-bottom:4px">正解：'+q.answer+(correctText?'　'+correctText:'')+'</div>';
    }
    if (q.explanation) html += '<div style="color:#333;margin-top:4px">'+q.explanation.replace(/\n/g,'<br>')+'</div>';
    html += '</div>';
  });
  if (!hasMiss) html += '<p style="font-size:18px;font-weight:900;color:#16a34a">🎉 全問正解！</p>';
  html += '<div class="actions"><button onclick="reviewMistakes()" style="padding:14px;border:none;border-radius:12px;background:#dc2626;color:#fff;font-size:16px;font-weight:700;cursor:pointer">間違えた問題を復習</button><button onclick="location.reload()" style="padding:14px;border:none;border-radius:12px;background:#6366f1;color:#fff;font-size:16px;font-weight:700;cursor:pointer">🎲 別の30問に挑戦</button><button onclick="resetQuiz()" style="padding:14px;border:none;border-radius:12px;background:#6b7280;color:#fff;font-size:16px;font-weight:700;cursor:pointer">最初からやり直す</button></div></div>';
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('nav').style.display = 'none';
  var r = document.getElementById('result');
  r.style.display = 'block'; html += '<a href="./index.html" style="display:block;text-align:center;margin-top:16px;padding:12px;background:#1e3a5f;color:white;border-radius:10px;text-decoration:none;font-weight:700;font-size:.95rem">🏠 ホームへ戻る</a>';
  r.innerHTML = html;
  window.scrollTo(0, 0);
}

function reviewMistakes() {
  for (var i = 0; i < questions.length; i++) {
    if (!questions[i].freeAnswer && ans[i] !== questions[i].answer) {
      idx = i;
      document.getElementById('quiz').style.display = 'block';
      document.getElementById('nav').style.display = 'flex';
      document.getElementById('result').style.display = 'none';
      render(); return;
    }
  }
}

function resetQuiz() {
  ans = {}; idx = 0;
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('nav').style.display = 'flex';
  document.getElementById('result').style.display = 'none';
  render();
}

render();
</script>

<script src="./firebase-config.js"></script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, deleteDoc, serverTimestamp, increment } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

try {
  const app = initializeApp(FIREBASE_CONFIG);
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, user => {
    const badge = document.getElementById('fb-login-badge');
    if (badge) {
      if (user) {
        const name = user.displayName || user.email.split('@')[0];
        badge.innerHTML = `<a href="./index.html" style="font-size:.72rem;background:rgba(255,255,255,.2);color:white;padding:3px 8px;border-radius:999px;text-decoration:none">👤 ${name}</a>`;
      } else {
        badge.innerHTML = `<a href="./login.html" style="font-size:.72rem;background:rgba(255,255,255,.15);color:white;padding:3px 10px;border-radius:999px;text-decoration:none">ログイン</a>`;
      }
    }
    window._fbUser = user;
    window._fbDb = db;
  });

  // selectAns(i, c) : iは配列インデックス、questionsは問題配列
  const _orig = window.selectAns;
  window.selectAns = function(i, c) {
    _orig(i, c);
    const user = window._fbUser; const dbInst = window._fbDb;
    if (!user || !dbInst) return;
    const q = window.questions ? window.questions[i] : null;
    if (!q) return;
    const isCorrect = c === q.answer;
    // sourceはランダムプールのsourceフィールド（例: "25年 1次"）
    const src = (q.source || 'フロントランダム').replace(/[\s　]/g,'_').replace(/[^\w\u3040-\u9FFF]/g,'');
    const key = src + '_q' + (q.no || i);
    if (isCorrect) {
      deleteDoc(doc(dbInst,'users',user.uid,'wrongAnswers',key)).catch(()=>{});
    } else {
      setDoc(doc(dbInst,'users',user.uid,'wrongAnswers',key),{
        source: q.source||'フロントランダム', qNo: q.no||i,
        label: q.label||('Q'+(q.no||i)),
        stem: (q.stem||'').substring(0,120), timestamp: serverTimestamp()
      },{merge:true}).catch(()=>{});
    }
  };

  // showResult後に受験記録
  const _origResult = window.showResult;
  if (typeof _origResult === 'function') {
    window.showResult = function() {
      _origResult();
      const user = window._fbUser; const dbInst = window._fbDb;
      if (!user || !dbInst) return;
      const qs = window.questions || [];
      let correct = 0, total = 0;
      qs.forEach((q, i) => {
        if (q.freeAnswer) return;
        total += q.points || 3;
        if (window.ans && window.ans[i] === q.answer) correct += q.points || 3;
      });
      setDoc(doc(dbInst,'users',user.uid,'stats','フロントランダム'),{
        source:'フロントランダム', lastCorrect:correct, lastTotal:total,
        lastDate:serverTimestamp(), totalAttempts:increment(1)
      },{merge:true}).catch(()=>{});
    };
  }
} catch(e){ console.warn('Firebase:',e.message); }
</script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, deleteDoc, collection, getDocs, serverTimestamp, increment } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const SOURCE_KEY = document.title.replace(/[\s　]/g,'_').replace(/[^\w\u3040-\u9FFF]/g,'');

try {
  const app = initializeApp(FIREBASE_CONFIG);
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, async user => {
    const badge = document.getElementById('fb-login-badge');
    if (badge) {
      if (user) {
        const name = user.displayName || user.email.split('@')[0];
        badge.innerHTML = `<a href="./index.html" style="font-size:.72rem;background:rgba(255,255,255,.2);color:white;padding:3px 8px;border-radius:999px;text-decoration:none">👤 ${name}</a>`;
      } else {
        badge.innerHTML = `<a href="./login.html" style="font-size:.72rem;background:rgba(255,255,255,.15);color:white;padding:3px 10px;border-radius:999px;text-decoration:none">ログイン</a>`;
      }
    }
    window._fbUser = user;
    window._fbDb = db;
    window._fbSrc = SOURCE_KEY;
  });

  const _orig = window.selectAns;
  if (typeof _orig === 'function') {
    window.selectAns = function(no, choice) {
      _orig(no, choice);
      const user = window._fbUser; const db = window._fbDb;
      if (!user || !db) return;
      const q = (window.questions||[]).find(q2 => q2.no === no);
      if (!q) return;
      const isCorrect = choice === q.answer;
      const key = window._fbSrc + '_q' + no;
      if (isCorrect) {
        deleteDoc(doc(db,'users',user.uid,'wrongAnswers',key)).catch(()=>{});
      } else {
        setDoc(doc(db,'users',user.uid,'wrongAnswers',key),{
          source:window._fbSrc,qNo:no,label:q.label||('Q'+no),
          stem:(q.stem||'').substring(0,120),timestamp:serverTimestamp()
        },{merge:true}).catch(()=>{});
      }
    };
  }

  const _origResult = window.showResult;
  if (typeof _origResult === 'function') {
    window.showResult = function() {
      _origResult();
      const user = window._fbUser; const db = window._fbDb;
      if (!user || !db) return;
      const norms = (window.questions||[]).filter(q=>!q.invalid&&!q.freeAnswer&&!q.multi);
      let correct=0,total=0;
      norms.forEach(q=>{total+=q.points||3;if(window.ans&&window.ans[q.no]===q.answer)correct+=q.points||3;});
      setDoc(doc(db,'users',user.uid,'stats',window._fbSrc),{
        source:window._fbSrc,lastCorrect:correct,lastTotal:total,
        lastDate:serverTimestamp(),totalAttempts:increment(1)
      },{merge:true}).catch(()=>{});
    };
  }
} catch(e){ console.warn('Firebase:',e.message); }
</script>
</body>
