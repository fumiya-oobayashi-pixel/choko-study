は、日野標準作業時間×4,500円／時間である。", "C": "通過車両の夜間対応（19：00～8：00）一般修理技術料は4,500円／時間の25％増しである。", "D": "エアコンシーズンイン点検料金は3,000円である。"}, "explanation": "引取・納車料（1往復/台）中、小型車は2,000円（3,000円ではない）。正解はA。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 23, "label": "問1(23)", "points": 3, "answer": "D", "stem": "自賠責保険に関する記述として、不適切なものはどれか。", "choices": {"A": "傷害による保険金の限度額は120万円である。", "B": "後遺障害第1級（常時介護を要する場合）の保険金の限度額は4,000万円である。", "C": "後遺障害第1級（介護を必要としない）の保険金の限度額は3,000万円である。", "D": "死亡による保険金の限度額は2,500万円である。"}, "explanation": "死亡による保険金の限度額は3,000万円（2,500万円ではない）。正解はD。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 24, "label": "問1(24)", "points": 3, "answer": "C", "stem": "ハイブリッドバッテリー安心パックに関する記述として、不適切なものはどれか。", "choices": {"A": "基本パック（リース以外）は、有効期限10年で価格は50千円になる。", "B": "リース用特別パックは、初年度登録日より4年間の契約では、20千円になる。", "C": "リース用特別パックは、初年度登録日より6年間の契約では、40千円になる。", "D": "リース契約の場合、リース料金とは別に、車両使用者と直接契約する。"}, "explanation": "リース用特別パックの6年間の契約は30千円（40千円ではない）。正解はC。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 25, "label": "問1(25)", "points": 3, "answer": "B", "stem": "日野プロフィアHEVバッテリー保証プランに関する記述のうち、不適切な記述の数として、適切なものはどれか。\n①リース契約に含めない場合の加入期限は、初度登録日から6か月以内である。\n②交換可否の判定は日野自動車が行う。\n③解約による返金は、保証開始前（初度登録日から1年以内）の申し出かつ解約日であれば、保証料の原価が返金される。\n④保証期間の延長はリース車両かつ、再リース時のみ可能であるが、初度登録より10年を超えての延長はできない。", "choices": {"A": "1個", "B": "2個", "C": "3個", "D": "4個"}, "explanation": "不適切な記述は①と③の2個。①：加入期限は初度登録日から1年以内。③：返金は保証料の一部（原価ではない）。正解はB。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 26, "label": "問1(26)", "points": 3, "answer": "B", "stem": "日野プレミアムサポートに関する記述として、不適切なものはどれか。", "choices": {"A": "保証書を紛失した場合でも、サービスの利用は可能である。", "B": "路上で交換したタイヤの修理は対象外である。", "C": "事故後60日以上経過してからの事故通知や修理入庫は対象外である。", "D": "修理費用差額補償サービスは、リース期間中1回のみ利用可能である。"}, "explanation": "路上で交換したタイヤの修理も対象になる。正解はB。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 27, "label": "問1(27)", "points": 3, "answer": "D", "stem": "次の記述について、不適切なものはどれか。", "choices": {"A": "日野自動車の安全5項目：異常の時は止めろ／動いているものは危険と思え／共同作業は合図の確認／修理・段取りはスイッチを切れ／わからないことは手を出すな。", "B": "CSとはカスタマーサティスファクションの略で顧客満足度と訳す。CSを高めることは、最終的に自社売上げを伸ばすことにつながる。", "C": "サービス業態とはサービス部門で整備したお客様の車の台数、売上、稼ぎ出した利益及び売掛金の回収額や残高状況などの業績状況を数字で表にまとめたもの。", "D": "5Sの一つである、「整理」とは必要なものがいつでも取り出せ、戻せることである。"}, "explanation": "「整理」とはいるものといらないものに分けて、いらないものを捨てること。「必要なものがいつでも取り出せ、戻せる」は「整頓」の説明。正解はD。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 28, "label": "問1(28)", "points": 3, "answer": "B", "stem": "安全の心構えに関する記述として、不適切なものはどれか。", "choices": {"A": "作業の洗い出しと改善、異常処置時の安全のルール作りを行う。", "B": "作業能率を阻害する原因と事故や災害を起こす原因は関連性がない。", "C": "自分自身が主体となり自ら考えなければならない。", "D": "正しい作業であれば、作業効率の向上も期待できる。"}, "explanation": "作業能率を阻害する原因を掘り下げると大部分は事故や災害を起こす原因となる（関連性がある）。正解はB。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 29, "label": "問1(29)", "points": 3, "answer": "C", "stem": "安全行動と安全状態の具体例として、不適切なものはどれか。", "choices": {"A": "車両点検、受入点検は「点検場」を確保、明示し、そこで行う。一回り点検は「点検場」で行う。「点検場」が確保できない場合は工場内の完成検査場等で行う。", "B": "工場内のお客様立ち入りを禁止とし、その旨をフロント付近に表示する。やむを得ずお客様が工場内に入る場合は帽子、ヘルメット等を着用していただくと共に、必ず案内をつける。", "C": "フロント受付後に、お客様、内・外注業者、部品業者が車の移動する際は必ず誘導を実施する。", "D": "フロント前には停止線、ならびに「一時停止」等の表示を行う。"}, "explanation": "お客様・内外注業者・部品業者による工場内の車の移動はご遠慮願う（必ず誘導ではなく、移動させないことが基本）。正解はC。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 30, "label": "問1(30)", "points": 3, "answer": "A", "stem": "CSに関する記述として、不適切なものはどれか。", "choices": {"A": "CS活動を盛り上げていくポイントは、品質と価格の2項目である。", "B": "「CSの要素」は、便利、安心、信頼、感謝、親しみ、楽しさの6項目と言われている。", "C": "「CSの要素」を満たすには、対応のCS、基盤のCSの2つを意識することが必要である。", "D": "CSを向上させるには、まずお客様の心を知ることが必要である。"}, "explanation": "CSのポイントは品質・スピード・価格・サービスの4項目（2項目ではない）。正解はA。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 31, "label": "問2(1)", "points": 5, "answer": "C", "stem": "【計算問題】平日の23時にA販売会社からエンジン始動不良となった日野車のバッテリー交換（2個）の広域サービス対応依頼が入ったため、B販売会社のサービスエンジニアが10km先の故障車両までサービスカーで出動した。A販売会社への請求金額を（消費税込み）で計算した場合、適切なものはどれか。\n（注）答えが小数点以下になる場合は、小数点以下第1位を四捨五入すること。\n\n【条件】\n・部品代（純正PBバッテリー原価）：13,500円（1個）\n・標準作業時間（バッテリー交換）：0.5時間\n・A販売会社の工賃レート：9,500円\n・B販売会社の工賃レート：9,000円", "choices": {"A": "58,520円", "B": "65,010円", "C": "66,110円", "D": "67,843円", "E": "68,503円"}, "explanation": "①技術料：9,000×0.5(B社レート)×1.75(深夜帯25%+出張50%)×0.8(技術料控除)＝6,300円\n②部品代：13,500×2個×1.2(振替増し)＝32,400円\n③サービスカー：6,000×0.9(振替控除)＝5,400円 ※改定前料金\n④特別対応料他：15,000(深夜)+1,000(体制維持費)＝16,000円\n合計：(6,300+32,400+5,400+16,000)×1.1＝66,110円\n正解はC。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 32, "label": "問2(2)", "points": 5, "answer": "D", "stem": "【計算問題】プロフィアの故障車両がA販売会社へ4月1日に入庫したが、B販売会社からの指示で未修理のまま、4月16日まで保管をした。B販売会社へ請求できる保管料（税込）として、適切なものはどれか。\n（注）答えが小数点以下になる場合は、小数点以下第1位を四捨五入すること。", "choices": {"A": "2,160円", "B": "2,916円", "C": "5,832円", "D": "7,920円", "E": "8,910円"}, "explanation": "修理しない車両の保管料：入庫日の翌日から起算し7日間は無料。8日以上は1日につき900円（小型車は500円）。振替割引なし。\n入庫4/1→翌日4/2から4/16まで＝15日間。7日間無料、残り8日間×900円×1.10＝7,920円\n正解はD。", "source": "22年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 1, "label": "問1", "points": 3, "answer": "A", "stem": "保証修理に関する記述として、不適切なものはどれか。", "choices": {"A": "保証修理とは、車検証に記載されている使用者であるお客様に対し、日野自動車が製造した自動車について、保証書に示す条件で無償修理することをいう。", "B": "保証修理の役割には、万一不具合が発生した場合に期待と信頼を損なうことになるが、適切な保証修理を実施することにより、信頼を回復することが出来る。", "C": "保証制度は、お客様・販売会社・日野自動車がそれぞれの約束を結び、この約束によって成り立っているので、正しく運用しなければならない。"}, "explanation": "保証修理とは、車検証ではなく「メンテナンスノート内の保証書」にお名前が記載されているお客様に対し、日野自動車が製造した自動車について保証書に示す条件で無償修理することをいう。", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 2, "label": "問2", "points": 3, "answer": "A", "stem": "保証開始日（保証期間の起算日）に関する記述として、適切なものはどれか。", "choices": {"A": "登録ＮＯが無い汎用エンジン、トレーラ・アクスルは、お客様への納入日を保証開始日とする。", "B": "登録ＮＯが無い無登録車両（構内専用車両、防衛省車両）は、故障発生日を保証開始日とする。", "C": "登録ＮＯが無い登録前車両（納入前車両）は、お客様への納車日または納入日を保証開始日とする。"}, "explanation": "B：無登録車両（構内専用車両・防衛省車両）はお客様への納車日または納入日が保証開始日。C：登録前車両（納入前車両）は故障発生日が保証開始日。A：汎用エンジン・トレーラ・アクスルは納入日が正しい。", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 3, "label": "問3", "points": 3, "answer": "A", "stem": "保証の種類に関する記述として、不適切なものはどれか。", "choices": {"A": "日野が補給するリンク品の保証はリンク品保証書に基づき保証修理を行う。", "B": "自動車の保証とは日野が出荷する完成車両に対し、日野が発行する保証書に基づいて実施する保証を言う。", "C": "汎用エンジンの保証とは、汎用エンジンに添付された保証書に基づく保証を言う。"}, "explanation": "リンク品の保証はメーカー内規保証修理に基づく保証を言い、リンク品には保証書はない。", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 4, "label": "問4", "points": 3, "answer": "B", "stem": "外注依頼書の発行に関する記述として、適切なものはどれか。", "choices": {"A": "作業指示書発行後、外注作業が発生した場合は、作業指示書のコピーで対応出来る。", "B": "発注価格が決定しない場合、確定予定日と理由を明記する。", "C": "納期は変わることがあるので、発注時は特に提示する必要はない。"}, "explanation": "外注作業が発生した場合は外注依頼書を発行する（コピー不可）。また、納期は必ず提示しなければならない。", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 5, "label": "問5", "points": 3, "answer": "C", "stem": "Ｓ．Ｏ．Ｓ緊急サービスの実施概要として、不適切なものはどれか。", "choices": {"A": "お客様の車両が路上故障（事故を含む）した場合、目的地まで安全に運行できるよう応急処置を行う。", "B": "お客様からの入電は、原則としてコールセンターで受付、ご要望内容に応じて夜間出動スタッフ（販売会社出動拠点または外注業者、ＪＮＳ）へ出動手配を行う。", "C": "主要幹線道路沿い販売会社から数社を選定し、「アドバイザー」を配備し、お客様への技術的な支援を実施する。"}, "explanation": "アドバイザーはお客様ではなく、出動スタッフ及びコールセンターへの技術的な支援を実施する。", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 6, "label": "問6", "points": 3, "answer": "C", "stem": "通過車両規定において、受付時の応対に関する記述として、適切なものはどれか。", "choices": {"A": "他販売会社のリコール未実施車両が入庫した場合、早急にリコール作業を実施しなければならないので入庫した販売会社で実施する。", "B": "他販売会社のリコール未実施車両が入庫した場合、元販売会社で実施するようにお客様へ伝える。", "C": "他販売会社のリコール未実施車両が入庫した場合、元販売会社に連絡し、どちらの販売会社で実施するか相談する。"}, "explanation": "他販売会社のリコール未実施車両が入庫した場合、元販売会社に連絡しどちらの販売会社で実施するか相談する。", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 7, "label": "問7", "points": 3, "answer": "B", "stem": "通過車両規定の特別対応料および体制維持費に関する記述として、不適切なものはどれか。", "choices": {"A": "営業時間外に作業をした場合、特別対応料および体制維持費を請求できる。この場合、特別対応料および体制維持費の振り替え割引はしない。", "B": "登録前車両の対応時は、特別対応料および体制維持費を保証申請にてメーカーに請求できる。", "C": "出張作業の安全確保の為に２名出動を原則とし、時間外の場合は特別対応料を１０，０００円とする。"}, "explanation": "登録前車両の対応時は、特別対応料のみ保証申請にてメーカーに申請できる（体制維持費は含まれない）。", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 8, "label": "問8", "points": 3, "answer": "C", "stem": "通過車両規定の基本的な内容に関する記述として、不適切なものはどれか。", "choices": {"A": "営業日の平日とは、月曜日から土曜日をいう。但し各実施販売会社の休業日を除く。", "B": "営業時間外の対応では、他メーカー車両の修理は原則として行わないこととする。（トヨタ車は除く）", "C": "営業時間内とは、平日の９：００～１９：００の時間をいう。"}, "explanation": "営業時間内とは、原則平日の実施販売会社定時間帯をいう（9:00〜19:00と決まっているわけではなく、各社の定時間帯による）。", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 9, "label": "問9", "points": 3, "answer": "B", "stem": "売掛金に関する記述として、不適切なものはどれか。", "choices": {"A": "売掛金は約束日に支払わなくても法的な制裁はない。", "B": "売掛金は銀行から融資を受ける場合の担保となる。", "C": "売掛金はそのままでは利息がつかない。"}, "explanation": "売掛金は担保にならない。", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 10, "label": "問10", "points": 3, "answer": "C", "stem": "領収書に関する記述として、不適切なものはどれか。", "choices": {"A": "領収書には、日付、宛名、発行者、金額の記入が必ず必要である。", "B": "商法上の重要取引で使われた領収書の保管期間は、１０年である。", "C": "名刺の裏に必要項目の記載をしたとしても領収書として認められない。"}, "explanation": "名刺の裏でも必要事項があれば領収書として認められる。", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 11, "label": "問11", "points": 3, "answer": "A", "stem": "売上・回収に関する記述として、不適切なものはどれか。", "choices": {"A": "ＨＩＴＯＳＳⅡ上のお客様ランクが「６，７」の場合、売上先確認。「８，９」の場合、売上不可が表示される。", "B": "改正民法施行により、起算日令和２年４月１日以降の売掛金の時効が２年から５年になった。", "C": "受取手形は６ヶ月に２回、銀行を支払い場所とする約束手形を不渡りにすると銀行取引停止処分を受ける。"}, "explanation": "HITOSSⅡのランクは「6、7、8」の場合が売上先確認、「9」の場合が売上不可が表示される。「8」は売上先確認の対象。", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 12, "label": "問12", "points": 3, "answer": "B", "stem": "通過車両規定の業務処理要領に関する記述として、不適切なものはどれか。", "choices": {"A": "技術料割増は、実施販売会社の定時間内に作業完了した場合には適用なし。", "B": "ＨＩＴＯＳＳⅡに優良客（Ｓ）として登録されていれば、１件５万円以上になると思われる作業の場合でも元販売会社へ確認しなくてもよい。", "C": "技術料割増は、悪条件の場合は元販売会社へ事前連絡の上、出張技術料割増を５０％とすることができる。"}, "explanation": "優良客（S）として登録されていても、1件5万円以上になると思われる場合は元販売会社へお客様確認が必要。", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 13, "label": "問13", "points": 3, "answer": "C", "stem": "通過車両の事故や、故障車の保管料に関する記述として、適切なものはどれか。", "choices": {"A": "修理を実施したものに関しては、元販売会社に保管料を請求できない。", "B": "修理を実施したものは元販売会社に完成した旨を通知した日の翌日から起算し、７日間は無料、８日間以上は１日につき５００円とする。", "C": "修理しないものは入庫日の翌日から起算し７日間は無料、８日間以上は１日につき９００円（小型車は５００円）とする。"}, "explanation": "修理実施したもの：完成通知日翌日から7日間無料、8日間以上は1日300円（500円ではない）。修理しないもの：入庫翌日から7日間無料、8日間以上は1日900円（小型車500円）。C が正しい。", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 14, "label": "問14", "points": 3, "answer": "B", "stem": "通過車両対応に関する業務処理規定の保証修理に関する作業の処理方法について、適切なものはどれか。", "choices": {"A": "現品の元販売会社への到着期限は、故障発生日より１５日以内とする。", "B": "現品の元販売会社への到着期限は、故障発生日より２０日以内とする。", "C": "現品の元販売会社への到着期限は、故障発生日より３０日以内とする。"}, "explanation": "現品の元販売会社への到着期限は、故障発生日より２０日以内とする。", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 15, "label": "問15", "points": 3, "answer": "B", "stem": "２ＰＧ付レンジャーのＭｙドライブマスターに関する記述として、不適切なものはどれか。", "choices": {"A": "アクセル警報は、アクセル開度を感知して、おもにラフなアクセルワークを警告する。", "B": "シフトアップ警報は、車速を感知して、シフトアップを促す。", "C": "長時間アイドリング警報は、アイドリング回転での停車時間が設定時間を超過した場合、アイドルストップを促す。"}, "explanation": "シフトアップ警報は「車速」ではなく「エンジン回転数」を感知してシフトアップを促す。", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 16, "label": "問16", "points": 3, "answer": "A", "stem": "メーターに表示される「チェックエンジンランプ（エンジン警告灯）」に関する記述として、適切なものはどれか。", "choices": {"A": "エンジン回転中にエンジン電子制御システムや、電子制御スロットルに異常があると点灯する。", "B": "排出ガス浄化性能に影響を与える部品やシステムに異常があると点灯する。", "C": "排出ガス浄化性能に影響を与える部品やシステムに異常があると点滅する。"}, "explanation": "チェックエンジンランプ（エンジン警告灯）は、エンジン電子制御システムや電子制御スロットルに異常があると点灯する。排出ガス系の不具合はMIL（排出ガス警告灯）が点灯する。", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 17, "label": "問17", "points": 3, "answer": "A", "stem": "２＊Ｇ付プロフィア（２０１９年モデル）について、不適切なものはどれか。", "choices": {"A": "追突防止用に誤発進抑制装置が追加された。", "B": "ＧＰＳや地図情報などを利用した道路勾配先読み制御を追加した。", "C": "衝突事故を未然に防止するためにサイトアラウンドモニターシステム（ＳＡＭＳ）を追加した。"}, "explanation": "2019年モデルのプロフィアに誤発進抑制装置は搭載されていない。", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 18, "label": "問18", "points": 3, "answer": "B", "stem": "２ＤＧ付メルファに関する記述として、不適切なものはどれか。", "choices": {"A": "エンジンは単段ターボチャージャー搭載のＡ０５Ｃ型エンジンを採用している。", "B": "排ガス（後処理）システムには尿素フリーのＤＰＲⅡを採用している。", "C": "トランスミッションはＬＸ０６＋ＡＭＴのみの設定となっている。"}, "explanation": "2DGメルファの排ガス（後処理）システムにはDPR+尿素SCRシステムを採用している（尿素フリーのDPRⅡではない）。", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 19, "label": "問19", "points": 3, "answer": "C", "stem": "道路運送車両法において、自動車の整備事業に関する記述として、適切なものはどれか。", "choices": {"A": "整備主任者は同一事業者が経営する事業場であれば、他の事業場の整備主任者を兼務することができる。", "B": "整備命令は、自動車整備事業者に対し、その実施した整備の状況が不良の場合に出される命令である。", "C": "普通自動車特定整備事業のみの認証を受けた事業場では、四輪の軽自動車の分解整備を行うことはできない。"}, "explanation": "普通自動車特定整備事業の対象は普通自動車・四輪の小型自動車・大型特殊自動車であり、軽自動車は含まれないため正しい。B：整備命令は車両使用者に対して出されるもの。", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 20, "label": "問20", "points": 3, "answer": "A", "stem": "道路運送車両法に照らし、自動車の検査の種別として、不適切なものはどれか。", "choices": {"A": "分解整備検査", "B": "予備検査", "C": "臨時検査"}, "explanation": "自動車の検査の種別は、新規検査・継続検査・臨時検査・構造変更等検査・予備検査の5種類。「分解整備検査」という種別は存在しない。", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 21, "label": "問21", "points": 3, "answer": "B", "stem": "道路運送車両法において、法令３ヶ月点検を実施しなければならない自動車の種別として、不適切なものはどれか。", "choices": {"A": "乗車定員１１人の自家用バス", "B": "乗車定員１０人以下の乗用の普通、小型、検査対象軽自動車のレンタカー", "C": "車両総重量８トンの自家用貨物トラック"}, "explanation": "乗車定員10人以下の乗用レンタカーは6ヶ月ごとの定期点検が義務付けられており、3ヶ月点検の対象ではない。", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 22, "label": "問22", "points": 3, "answer": "B", "stem": "道路運送車両の保安基準に照らし、２０１７年制作車両で大型後部反射器を備えなければならない車両の記述として、適切なものはどれか。", "choices": {"A": "車両総重量６トン以上の貨物運送用普通自動車", "B": "車両総重量７トン以上の貨物運送用普通自動車", "C": "車両総重量８トン以上の貨物運送用普通自動車"}, "explanation": "貨物の運送の用に供する普通自動車であって、車両総重量が7トン以上のものの後面には大型後部反射器を備えなければならない。", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 23, "label": "問23", "points": 3, "answer": "C", "stem": "自動車損害賠償責任保険に関する記述として、不適切なものはどれか。", "choices": {"A": "自賠責保険は、法律によって自動車１台ごとに必ずつけなくてはならない。", "B": "保険の支払い限度額は、死亡時で３，０００万円である。", "C": "保険の支払い限度額は、ケガの場合で１５０万円である。"}, "explanation": "ケガ（傷害）の場合の支払い限度額は120万円（150万円ではない）。", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 24, "label": "問24", "points": 3, "answer": "C", "stem": "自賠責保険に関する記述として、適切なものはどれか。", "choices": {"A": "自賠責保険で補償されるのは、相手を怪我、または死亡させた場合や、相手の物を破損した場合に、相手の損害賠償に対して保険金が支払われる。自分自身の怪我に対しては保険金は支払われない。", "B": "賠償額の確定までに時間がかかるような場合、被害者は、加害者の加入している保険会社に保険金の前払いを請求することができる。これを仮渡金といい、死亡した者１人につき、３９０万円である。", "C": "加害者が不誠実であったり、金額面で折り合いがつかずに示談が成立しない場合などには、被害者が損害賠償額を直接、保険会社に支払うよう請求できる。"}, "explanation": "A：自賠責は物の損害には適用されない。B：仮渡金は死亡した者１人につき290万円（390万円ではない）。C：被害者直接請求（被害者請求）は正しい。", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 25, "label": "問25", "points": 3, "answer": "B", "stem": "日野メンテナンスリースに関する記述として、不適切なものはどれか。", "choices": {"A": "日野が販売する中古の大・中・小トラック（新規導入・日野車）は、メンテナンスリースの受入れが可能である。", "B": "保守整備契約（Ｒ契約：故障修理契約）については、代車費用も含まれる。", "C": "本契約締結後の法令の制定、改廃、官公庁の指示・指導に起因する修理、改造、部品の取付、点検整備などはメンテナンスサービスに含まれない。"}, "explanation": "保守整備契約（R契約：故障修理契約）では、代車費用は含まれない。", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 26, "label": "問26", "points": 3, "answer": "A", "stem": "保険処理の事故受付応対に関する記述として、不適切なものはどれか。", "choices": {"A": "お客様は精神的な苦痛を受けているので、事故処理にあたり直接介入し効率よく相手側と話をすすめる。", "B": "事故処理は当事者間で行ってもらい、お客様には保険内容の適切な助言を行う。", "C": "車同士の事故などは、お客様への同情心からお客様の言い分を全面的に信用したりせずに、あくまでも聞き役になる。"}, "explanation": "保険処理では前面には立たず、聞き役に徹する。相手側にも必ず言い分があるため、直接介入することは不適切。", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 27, "label": "問27", "points": 3, "answer": "B", "stem": "販売会社整備工場の設備・機器類の検査・点検に関する記述として、不適切なものはどれか。", "choices": {"A": "始業点検の記録の保存は、１年間である。", "B": "定期点検の記録の保存は、２年間である。", "C": "定期自主検査の記録の保存は、３年間である。"}, "explanation": "記録の保存期間：始業点検は1年、定期点検は1年（2年ではない）、定期自主検査は3年。", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 28, "label": "問28", "points": 3, "answer": "A", "stem": "安全衛生教育（法令）で定められた特別教育の種別について、不適切なものはどれか。", "choices": {"A": "可燃性ガス、酸素を用いる金属の溶接、溶断", "B": "最大荷重１．０トン未満のフォークリフトの運転", "C": "研削と石の取り替えまたは試運転"}, "explanation": "可燃性ガス、酸素を用いる金属の溶接・溶断については技能講習修了者等の資格が必要であり、特別教育ではなく技能講習の対象。", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 29, "label": "問29", "points": 3, "answer": "C", "stem": "安全に関する記述として、不適切なものはどれか。", "choices": {"A": "工場内はお客様立ち入り禁止とし、その旨をフロント付近に表示する。", "B": "フロント受付後の車移動は全て社員の手で行う。", "C": "お客様から見えない位置のカウンター内側であれば部品を置いても良い。"}, "explanation": "預かり品、外注納品修理品、外注部品、リンク品をフロントの前やカウンターの内側に置かない。", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 30, "label": "問30", "points": 3, "answer": "B", "stem": "出張作業に関する記述として、不適切なものはどれか。", "choices": {"A": "故障現場が一般道路の自動車専用道路、交通量が多く安全が確保できないバイパス等の場合は警察へ緊急案件として危険通報を行い、指示を受けること。", "B": "故障車と出張作業車両との車間距離は、最低１０ｍは離すこと。", "C": "故障現場到着後、作業者は安全対策を施す前に、必ず故障車より１００ｍ以上後方に発炎筒を設置して、後続車に危険を知らせる。"}, "explanation": "故障車と出張作業車両との車間距離は最低20m離すこと（10mではない）。夜間・カーブ等の視界が悪い場合はそれ以上の安全な車間距離で停止する。", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 31, "label": "問31", "points": 5, "answer": "C", "stem": "通過車両の業務処理規定に照らし、元販売会社から通過車両の対応依頼が入り、平日の１４時にお客様が実施販売会社に来店しバッテリー交換を下記内容で実施した。元販売会社への消費税込み請求金額として、適切なものはどれか。\n（注）答えが少数点以下になる場合は、小数点以下第１位を四捨五入しなさい。\n\n部品代（純正PBバッテリー）：１５，０００円（原価）×２個\n標準作業時間：バッテリー交換 ０．９時間\n実施販売会社の工賃レート：９，５００円\n元販売会社の工賃レート：９，０００円\n\n【計算式】（お客様来店のためサービスカー・出張割増なし）\n技術料：9,500×0.9×0.8（技術料控除）＝6,840円\n部品代：15,000×2×1.2（振替増し）＝36,000円\n合計：(6,840＋36,000)×1.1（消費税）＝47,124円", "choices": {"A": "４０，５２４円", "B": "４１，８４４円", "C": "４７，１２４円", "D": "４８，０６５円", "E": "４９，００５円"}, "explanation": "お客様来店のためサービスカー料金・出張割増なし。技術料6,840＋部品代36,000＝42,840円、税込：42,840×1.1＝47,124円", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 32, "label": "問32", "points": 5, "answer": "D", "stem": "保険による事故修理を実施販売会社が下記内容で行なった。元販売会社への請求金額を消費税込で計算した場合、適切なものはどれか。\n（注）答えが小数点以下になる場合は、小数点以下第１位を四捨五入しなさい。\n\n実施販売会社の保険査定額（税抜き）\n技術料：２５０，０００円\n部品代：１００，０００円\n外注作業技術料：９０，０００円\n外注作業部品代：１００，０００円\n\n【計算式】\n技術料：250,000×0.95（5%控除）＝237,500円\n部品代：100,000×0.90（10%控除）＝90,000円\n外注技術料：90,000×0.95（5%控除）＝85,500円\n外注部品代：100,000×0.95（5%控除）＝95,000円\n合計：508,000円　税込：508,000×1.1＝558,800円", "choices": {"A": "５２７，５８０円", "B": "５３９，５５０円", "C": "５４０，０００円", "D": "５５８，８００円", "E": "５９４，０００円"}, "explanation": "技術料237,500＋部品代90,000＋外注技術料85,500＋外注部品代95,000＝508,000円、税込：508,000×1.1＝558,800円", "source": "22年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 1, "label": "問1", "points": 3, "answer": "C", "stem": "日野サービスの基本として、不適切なものはどれか。", "choices": {"A": "お客様の期待を上回る仕事を提供することである。", "B": "お客様目線で業務を行うことである。", "C": "部品の価格を通常よりも安くお客様に提供することである。"}, "explanation": "日野サービスの基本は、無償の行動や価格を安くすることではなく、お客様に信頼・満足していただいて期待を上回る仕事を提供することが最良のサービスと考えている。", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 2, "label": "問2", "points": 3, "answer": "C", "stem": "接客対話の基礎に関する記述として、不適切なものはどれか。", "choices": {"A": "相手の話しや、言い分をじっくり最後まで聞ける、聞き上手になる。", "B": "感情的な議論をしないためには、落ち着いた態度と、なごやかな口調で話す。", "C": "内容をよく分かってもらうために、専門用語をなるべく使って説明する。"}, "explanation": "専門用語ではなく、一般的な用語で話す。", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 3, "label": "問3", "points": 3, "answer": "A", "stem": "名刺の受け渡しマナーとして、適切なものはどれか。", "choices": {"A": "名前の読み方がわからない場合は、その場で確認する。", "B": "名刺を受け取ったらすぐにしまう。", "C": "打合せ内容を忘れないように、その場で名刺にメモをする。"}, "explanation": "名刺を受取ってもすぐにしまわない。名刺にその場ではメモをしない。名刺は相手より先に出すことを心がける。名前の読み方がわからない場合はその場で確認する（A適切）。", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 4, "label": "問4", "points": 3, "answer": "C", "stem": "車検受付け時に必要な書類に関する記述として、不適切なものはどれか。", "choices": {"A": "当該車両の自賠責保険証明書", "B": "当該車両の自動車検査証", "C": "当該車両の自動車重量税納税証明書"}, "explanation": "車検受付に必要なのは自動車重量税納税証明書ではなく、自動車税納税証明書。", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 5, "label": "問5", "points": 3, "answer": "C", "stem": "保証修理の役割に関する記述として、不適切なものはどれか。", "choices": {"A": "お客様の信頼の回復と維持", "B": "市場技術情報の収集による品質向上", "C": "お客様収益の維持"}, "explanation": "販売会社が保証修理費用の申請をすることにより販売会社の収益となる。お客様収益の維持は保証修理の役割ではない。", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 6, "label": "問6", "points": 3, "answer": "B", "stem": "受付時現車の確認を行う際の注意点に関する記述として、不適切なものはどれか。", "choices": {"A": "不正改造の有無を十分にチェックし、不正改造がある場合にはお客様に説明し、正規の姿に戻すようにお願いする。", "B": "貴重品や高価なものが搭載されていたら、お客様に伝えフロントで大切に保管しておく。", "C": "車両の傷、汚れ、積荷、などの状態をお客様と一緒に確認し、納車後のトラブル防止を図る。"}, "explanation": "貴重品は、お客様に持ち帰るようにお願いする。フロントで保管してはいけない。", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 7, "label": "問7", "points": 3, "answer": "A", "stem": "通過車両対応に関する業務処理規定に関する記述として、不適切なものはどれか。", "choices": {"A": "通過車両とは、自社以外の販売会社が販売した車両や、自社の他拠店が販売した車両を総称していう。", "B": "元販売会社とは、通過車両を修理対応する際、その車両を販売した販売会社や主幹販社など、現在取引のある販売会社を総称していう。", "C": "実施販売会社とは、通過車両を修理対応する販売会社をいう。"}, "explanation": "通過車両とは、自社以外の販売会社が販売した車両をいう。自社の他拠店が販売した車両は含まない。", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 8, "label": "問8", "points": 3, "answer": "B", "stem": "他販売会社のリコール未実施車両が入庫した場合の応対に関する記述として、適切なものはどれか。", "choices": {"A": "早急にリコール作業を実施しなければならないので入庫した販売会社で実施する。", "B": "元販売会社に連絡し、どちらの販売会社で実施するか相談する。", "C": "元販売会社で実施するようにお客様へ伝える。"}, "explanation": "他販売会社のリコール未実施車両が入庫した場合、元販売会社に連絡しどちらの販売会社で実施するか相談することが適切な対応。", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 9, "label": "問9", "points": 3, "answer": "B", "stem": "通過車両規定に関する記述として、適切なものはどれか。", "choices": {"A": "修理時間は、約１時間／件を目安とする。", "B": "他メーカの車両（トヨタ車は除く）は、原則として修理対応しないこととする。", "C": "平日とは月曜日から金曜日をいう。"}, "explanation": "A：修理時間は約2時間/件を目安とする。C：平日とは原則、月曜から土曜日をいう。B（他メーカ車はトヨタ車を除き原則対応しない）が適切。", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 10, "label": "問10", "points": 3, "answer": "C", "stem": "領収書に関する記述として、不適切なものはどれか。", "choices": {"A": "領収書そのものには、有効期限はない。", "B": "商法上の重要取引で使われた領収書は、１０年保管が必要。", "C": "必要項目の記載があっても名刺の裏では、認められない。"}, "explanation": "名刺の裏でも必要事項があれば領収書として認められる。帳簿書類等（領収書含む）の保存期間は7年間（欠損金の場合は10年に延長）。", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 11, "label": "問11", "points": 3, "answer": "B", "stem": "ＨＩＴＯＳＳIIで売掛金を確認する照会画面として、適切なものはどれか。", "choices": {"A": "整備歴照会", "B": "お客様照会", "C": "お客様車両照会"}, "explanation": "売掛金の確認は、お客様照会の画面で確認する。", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 12, "label": "問12", "points": 3, "answer": "A", "stem": "引渡し、納車時の応対に関する記述として、不適切なものはどれか。", "choices": {"A": "どの部品がどのように不具合があったかを、お客様に分かりやすく説明できるように、取り替えた部品の損傷状態を自分で確認してから廃却する必要がある。", "B": "作業指示書通りの作業が完了しているか、車両は清掃されているか、傷が付かなかったか、搭載物は受付時の通りかなど、お客様の車両を確認する必要がある。", "C": "納車時の説明は、お客様からの申し出内容に対する説明のみならず、使用上の注意、この先必要になる整備等のアドバイスをする必要がある。"}, "explanation": "交換部品はお客様へ提示し分かりやすく説明した後、お客様の廃却意思の確認後に廃却する。自分で確認後に廃却するのは不適切。", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 13, "label": "問13", "points": 3, "answer": "C", "stem": "通過車両規定に照らし、売上に関する記述として、不適切なものはどれか。", "choices": {"A": "修理で使用した油脂は、２０％控除する。", "B": "純正品タイヤ原価（ＤＮ）の２０％増しを振替金額とする。", "C": "自社レッカー使用は、１０％控除する。"}, "explanation": "自社レッカーの使用料金への10%控除は不適切。通過車両規定では、自社レッカーは公示料金の100%（控除なし）で元販社へ振り替える。", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 14, "label": "問14", "points": 3, "answer": "A", "stem": "通過車両規定に照らし、事故車の保管料に関する記述として、適切なものはどれか。", "choices": {"A": "修理しないものは、入庫日の翌日から８日間以上は１日につき９００円、小型車は５００円とする。", "B": "修理を実施したものは、元販売会社宛に完成した旨を通知した日から起算し７日間は無料。", "C": "修理しないものは、入庫日から起算し７日間は無料。"}, "explanation": "保管料の規定：修理しないものは入庫日の翌日から起算して7日間は無料。8日目以降は1日につき900円（小型車500円）。修理実施後は通知した翌日から7日間は無料。A（翌日から8日間以上→900円）が適切。", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 15, "label": "問15", "points": 3, "answer": "B", "stem": "尿素ＳＣＲに関する説明として、適切なものはどれか。", "choices": {"A": "尿素水を排出ガスに噴射し、ＰＭを低減するシステムである。", "B": "尿素水を排出ガスに噴射し、ＮＯｘを低減するシステムである。", "C": "尿素水を排出ガスに噴射し、排出ガス温度を上昇させるシステムである。"}, "explanation": "尿素SCRシステムは、尿素水を排出ガスに噴射し、NOxを分解して窒素と水に変化させてNOxを低減するシステム。", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 16, "label": "問16", "points": 3, "answer": "A", "stem": "２＊Ｇ付プロフィア（２０１８年モデル）に装備されているＡＤＢヘッドランプに関する記述として、不適切なものはどれか。", "choices": {"A": "カメラセンサー（画像センサー）は、ＰＣＳや車線逸脱警報で使用しているカメラセンサーとは別体の専用品を使用している。", "B": "プロジェクターレンズの裏にLEDを複数個搭載しており、これらを点灯／消灯／調光することであらゆる配光パターンを形成する。", "C": "自動切り替え制御には、後退判定があり、後退時にはハイビームを自動消灯させる。"}, "explanation": "カメラセンサー（画像センサー）は、ＰＣＳや車線逸脱警報で使用しているカメラセンサーを共用している。別体の専用品を使用しているというのは不適切。", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 17, "label": "問17", "points": 3, "answer": "B", "stem": "２＊Ｇ付デュトロ（２０１９年モデル）の誤発進抑制システムに関する記述として、不適切なものはどれか。", "choices": {"A": "駐車時や低速走行時にセンサーが進路上の障害物を検知し、障害物への衝突のおそれがあるときはシステムが作動する。", "B": "障害物の検知にソナーセンサーを使用しているので、どしゃぶりの雨や雪、霧、砂嵐などの悪天候の影響を受けない。", "C": "システムが作動するとエンジントルクカット制御及び自動ブレーキ制御により運転者の衝突回避操作を補助する。"}, "explanation": "ソナーセンサーに氷・雪・泥などが付着したときや、どしゃぶりの雨・水しぶきがかかるような悪天候の状況はシステムが正常に作動しないおそれがある。「悪天候の影響を受けない」は不適切。", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 18, "label": "問18", "points": 3, "answer": "B", "stem": "ＤＰＲ（排出ガス浄化装置）に関する記述として、適切なものはどれか。", "choices": {"A": "メーター内の堆積量表示の本数に関わらず、インジケータランプが点滅することがあり、この場合はＤＰＲ装置の故障である。", "B": "ＤＰＲフィルター内に排出ガス中のＰＭを捕集し、燃焼処理を行う。", "C": "ＤＰＲフィルター内に排出ガス中のＮＯｘを捕集し、燃焼処理を行う。"}, "explanation": "DPRは、排出ガス中のPM（すす）を捕集し、燃焼処理を行うものである（B適切）。インジケータ点滅はDPR故障とは限らない。NOxを処理するのはSCRシステム。", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 19, "label": "問19", "points": 3, "answer": "A", "stem": "道路運送車両法に照らし、自動車の種別として、不適切なものはどれか。", "choices": {"A": "大型自動車", "B": "小型自動車", "C": "大型特殊自動車および小型特殊自動車"}, "explanation": "道路運送車両法における自動車の種別は「普通自動車・小型自動車・軽自動車・大型特殊自動車・小型特殊自動車」。「大型自動車」は道路交通法（免許区分）の種別であり、道路運送車両法には存在しない。", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 20, "label": "問20", "points": 3, "answer": "B", "stem": "道路運送車両法の保安基準に照らし（２０１７年製作車両）、次の文章の［　］に当てはまるものとして、適切なものはどれか。\n\n貨物の運送の用に供する普通自動車であって車両総重量が［　］以上のものの後面には、大型後部反射器を備えなければならない。", "choices": {"A": "５トン", "B": "７トン", "C": "８トン"}, "explanation": "貨物の運送の用に供する普通自動車であって車両総重量が7トン以上のものの後面には、後部反射器の他に大型後部反射器を備えなければならない。", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 21, "label": "問21", "points": 3, "answer": "B", "stem": "保安基準適合証および保安基準適合標章の有効期限として、適切なものはどれか。", "choices": {"A": "検査員が検査をした日を含み７日間", "B": "検査員が検査をした日を含み１５日間", "C": "検査員が検査をした日を含み３０日間"}, "explanation": "保安基準適合証等の有効期間は、指定規則第9条により、検査をした日から15日間。", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 22, "label": "問22", "points": 3, "answer": "C", "stem": "「道路運送車両法」の自動車点検基準に照らし、点検整備記録簿の保存期間として、適切なものはどれか。", "choices": {"A": "自家用乗用自動車は３年間である。", "B": "乗車定員１１人以上の自家用自動車は２年間である。", "C": "自動車運送事業用自動車（貨物軽自動車運送事業を除く）は１年間である。"}, "explanation": "自家用乗用自動車の保存期間は2年（Aが誤り）。乗車定員11人以上の自家用自動車の保存期間は1年間（Bが誤り）。自動車運送事業用自動車（貨物軽自動車運送事業を除く）は1年間（C適切）。", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 23, "label": "問23", "points": 3, "answer": "B", "stem": "自動車損害賠償責任保険（自賠責保険）に関する記述として、不適切なものはどれか。", "choices": {"A": "自動車１台ごとに必ずつけなくてはならない保険（強制保険）。", "B": "対人と対物賠償として入る保険。", "C": "保険の契約が締結されている車両でなければ運行してはならない。"}, "explanation": "自動車損害賠償保障法により、強制的につけなくてはならない対人賠償のみを担保するもの。対物賠償は含まれない。", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 24, "label": "問24", "points": 3, "answer": "A", "stem": "日野メンテナンスリースのＳプランに関する基本整備項目の記述として、不適切なものはどれか。", "choices": {"A": "バッテリーの交換は含む。", "B": "バルブ（電球）の交換は含む。", "C": "車検整備は含む。"}, "explanation": "バッテリー交換はどのプランも含まれず、オプションとして追加できる。", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 25, "label": "問25", "points": 3, "answer": "C", "stem": "保険処理の事故を受け付ける際の対応に関する記述として、不適切なものはどれか。", "choices": {"A": "まずは顧客の安否を気遣って「おケガはありませんか」などの言葉が必要である。", "B": "顧客の言い分を全面的に信用したり、事故処理に直接介入したりするなど前面に立つことをしてはいけない。", "C": "人身が絡んだり、話し合いが難航する場合はフロントアドバイザーが事故処理を代行したほうが良いこともある。"}, "explanation": "事故処理は当事者間で行ってもらい、販売会社はお客様への保険内容の助言にとどめる。フロントアドバイザーが事故処理を代行することは不適切。", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 26, "label": "問26", "points": 3, "answer": "B", "stem": "サービス業態の伝票仕掛日数に関する記述として、不適切なものはどれか。", "choices": {"A": "伝票仕掛日数は、未売上（仕掛）伝票が１日当り平均入庫台数に対し何日分仕掛っているかを知るための指標である。", "B": "仕掛件数とは工事中や通過車両を除いた工事完了、完成見積、調整赤黒の件数である。", "C": "伝票仕掛日数＝仕掛件数÷（直近６ヶ月の入庫台数÷稼動日数）"}, "explanation": "仕掛件数の定義が不適切。工事中も含む未売上の仕掛伝票件数が仕掛件数となる（工事中を除かない）。", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 27, "label": "問27", "points": 3, "answer": "A", "stem": "車両をリフトアップする作業でのリフト操作の注意として、不適切なものはどれか。", "choices": {"A": "リフト昇降中に車両下作業を行う場合は、ヘルメットと保護メガネを着用する。", "B": "リフトアップ後は、リモコンの電源を「切」にする。", "C": "車両の下に人がいる場合、リフト操作を行わない。"}, "explanation": "リフト昇降中は車両下での作業を行ってはならない（昇降が完全に停止してから作業を開始する）。ヘルメット・保護メガネを着用しても昇降中の車両下での作業は禁止。", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 28, "label": "問28", "points": 3, "answer": "C", "stem": "職場内の５Ｓに関する記述として、適切なものはどれか。", "choices": {"A": "整理とは、必要なものがいつでも取り出せて、戻せること。", "B": "整頓とは、いるものといらないものを分けて、いらないものを捨てること。", "C": "清掃とは、いつもきれいな環境にしておくこと。"}, "explanation": "整理とはいるものといらないものを分けていらないものを捨てること。整頓とは必要なものがいつでも取り出せて戻せること。AとBが逆。清掃（C）が正しい。", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 29, "label": "問29", "points": 3, "answer": "C", "stem": "安全に関する記述として、不適切なものはどれか。", "choices": {"A": "工場内はお客様立ち入り禁止とし、その旨をフロント付近に表示する。", "B": "フロント受付後の車移動は全て社員の手で行う。", "C": "お客様から見えない位置のカウンター内側であれば部品を置いても良い。"}, "explanation": "フロントのカウンター内側には部品などを置かない。お客様から見えない位置であっても安全のため不可。", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 30, "label": "問30", "points": 3, "answer": "A", "stem": "品質改善に関する記述として、適切なものはどれか。", "choices": {"A": "「改善対策」とは、保安基準に関わらず、日野自動車（メーカー）が安全確保、公害防止の観点から必要と判断した場合に実施するものである。", "B": "「サービスキャンペーン」とは、車両の構造・装置の不具合による事故を未然に防止することを目的とした制度である。", "C": "「リコール」とは、車両の構造・装置・性能等が、保安基準に適合しなくなる場合に保証書とは別に有償で修理するものである。"}, "explanation": "改善対策（A適切）は保安基準に関わらずメーカーが安全確保・公害防止の観点から実施。リコールは保安基準に適合しなくなる「おそれ」がある場合に無償で実施。サービスキャンペーンは商品品質改善等の観点から実施。", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 31, "label": "問31", "points": 5, "answer": "B", "stem": "【問２(1)】通過車両の業務処理規定に照らし、サービスカーを使用して片道２０ｋｍ離れた場所での出張作業を行った。\n依頼販売会社へのサービスカー使用料金の振り替え請求額を消費税込みとして、適切なものはどれか。\n\n（注）答えが小数点以下になる場合は、小数点以下第１位を四捨五入しなさい。", "choices": {"A": "７，４８０円", "B": "９，９００円", "C": "１０，８００円", "D": "１１，０００円", "E": "１３，２００円"}, "explanation": "※22年9月に料金が改定されています。この問題は改定前の出題です。\n【計算（改定前料金）】\n10kmまで：6,000円\n10km超分：400円×10km＝4,000円\n小計：10,000円\n10%控除：10,000×0.9＝9,000円\n消費税込：9,000×1.1＝9,900円 → B", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 32, "label": "問32", "points": 5, "answer": "E", "stem": "【問２(2)】平日の営業時間内に通過車両のバッテリ交換を下記内容で行った。消費税込みの元販売会社への振替料金として、適切なものはどれか。\n但し、部品は純正部品を使用し、特定部品は使用していない。\n\n技術料：１５，０００円（税抜）\n部品代（定価）：４，２００円（税抜）\n純正ＰＢバッテリ（原価）：２８，０００円（２個分合計税抜）\n\n（注）答えが小数点以下になる場合は、小数点以下第１位を四捨五入しなさい。", "choices": {"A": "４７，２００円", "B": "４８，９６０円", "C": "５０，５６０円", "D": "５１，９２０円", "E": "５３，８５６円"}, "explanation": "【計算】\n技術料（20%控除）：15,000×0.8＝12,000円\n部品代（定価×0.8）：4,200×0.8＝3,360円\n純正PBバッテリ（原価×1.2）：28,000×1.2＝33,600円\n小計：48,960円\n消費税込：48,960×1.1＝53,856円 → E", "source": "22年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 1, "label": "問1", "points": 3, "answer": "C", "stem": "保証制度に関する記述として、不適切なものはどれか。", "choices": {"A": "保証制度は、お互いに約束（契約）を守って、正しく運用しなければならない。約束（契約）違反は信頼関係を損ない、重大問題に発展する。", "B": "日野自動車製品の取引等に関し、その基本的な事項について、販売会社と日野自動車の代表者間で契約を締結した契約書のことを「日野販売会社基本契約書」と言う。", "C": "日野自動車の保証制度は、販売会社・日野自動車がそれぞれの約束を結び、この約束によって成り立っている。"}, "explanation": "日野自動車の保証制度は、お客様・販売会社・日野自動車の三者がそれぞれの約束を結び、この約束によって成り立っている。", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 2, "label": "問2", "points": 3, "answer": "B", "stem": "保険処理の事故受付対応に関する記述として、不適切なものはどれか。", "choices": {"A": "保険で処理するという安心感とお客様への同情心から、お客様の言い分を全面的に信用したりせずに、あくまでも聞き役になる。", "B": "お客様は精神的な苦痛を受けているので、事故処理にあたり直接介入し、効率よく相手側と話をすすめる。", "C": "事故処理は当事者間で行ってもらい、お客様には保険内容の適切な助言を行う。"}, "explanation": "保険処理では前面には立たず、聞き役に徹する。相手側にも必ず言い分があるため、直接介入することは不適切。", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 3, "label": "問3", "points": 3, "answer": "A", "stem": "保証の種類に関する記述として、不適切なものはどれか。", "choices": {"A": "日野が補給するリンク品の保証は、リンク品保証書に基づき保証修理を行う。", "B": "自動車の保証とは日野が出荷する完成車両に対し、日野が発行する保証書に基づいて実施する保証を言う。", "C": "汎用エンジンの保証とは、汎用エンジンに添付された保証書に基づく保証を言う。"}, "explanation": "リンク品の保証はメーカー内規保証修理に基づく保証を言い、リンク品には保証書はない。", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 4, "label": "問4", "points": 3, "answer": "B", "stem": "小型トラックにおける保証期間の記述として、不適切なものはどれか。", "choices": {"A": "エグゾースト・パイプマフラ等は一般保証である。", "B": "ハロゲン・ランプは保証外である。", "C": "ハイブリッド用メインバッテリ（駆動用電池）は架装物等に電源を供給した場合、一般保証である。"}, "explanation": "ハロゲン・ランプは保証外ではなく、一般保証の対象である。", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 5, "label": "問5", "points": 3, "answer": "C", "stem": "受付など接客対応に関する記述として、不適切なものはどれか。", "choices": {"A": "第一印象がそれ以降の対応に重大な影響を及ぼすので、態度、言葉づかい、身だしなみなどには充分注意を払い、お客様に良い印象を与えるように努める。", "B": "不具合を訴えているお客様には、いつから、どこが、どんな時に、どのように、など話をよく聞き真意を知ることで自身とお客様の感覚の違いをなくすようにする。", "C": "再修理作業について、技術的には同一箇所の再修理作業ではなく同類の故障だった場合、まずは充分に技術的な説明をして再修理ではないことを弁解する必要がある。"}, "explanation": "同類の故障が発生するとお客様は再修理と変わらない印象を受ける。まずはお詫びが必要であり、弁解から入ることは不適切。", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 6, "label": "問6", "points": 3, "answer": "C", "stem": "レッカーサービスの実施要領として、不適切なものはどれか。", "choices": {"A": "本サービスを提供するお客様は、日野販売会社と整備契約を結んでいる顧客の内、優良客および普通客を対象としている。", "B": "レッカーサービスの対象となる作業項目は、脱輪等の引き上げ及び自走不可能となった車両の牽引がある。", "C": "対象車両は、日野大型・中型・小型トラック／バスであり、他社車両や日野スカニア車については対象外である。"}, "explanation": "対象車両は日野大中小型トラック／バス全車およびスカニア車を対象とし、他社車両も対応可能である。", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 7, "label": "問7", "points": 3, "answer": "B", "stem": "通過車両規定の特別対応料および体制維持費に関する記述として、不適切なものはどれか。", "choices": {"A": "営業時間外に作業をした場合、特別対応料および体制維持費を請求できる。この場合、特別対応料および体制維持費の振り替え割引はしない。", "B": "登録前車両の対応時は、特別対応料および体制維持費を保証申請にてメーカーに請求できる。", "C": "出張作業の安全確保の為に２名出動を原則とし、時間外の場合は特別対応料を１０，０００円とする。"}, "explanation": "登録前車両の対応時は、特別対応料のみ保証申請にてメーカーに申請できる（体制維持費は含まれない）。", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 8, "label": "問8", "points": 3, "answer": "C", "stem": "通過車両規定において、受付時の対応に関する記述として、適切なものはどれか。", "choices": {"A": "他販売会社のリコール未実施車両が入庫した場合、早急にリコール作業を実施しなければならないので、入庫した販売会社で実施する。", "B": "他販売会社のリコール未実施車両が入庫した場合、元販売会社で実施するようにお客様へ伝える。", "C": "他販売会社のリコール未実施車両が入庫した場合、元販売会社に連絡し、どちらの販売会社で実施するか相談する。"}, "explanation": "他販売会社のリコール未実施車両が入庫した場合、元販売会社に連絡しどちらの販売会社で実施するか相談する。", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 9, "label": "問9", "points": 3, "answer": "B", "stem": "売掛金に関する記述として、適切なものはどれか。", "choices": {"A": "売掛金は約束日に支払う必要があり、その日に支払わない場合は法的な制裁がある。", "B": "売掛金の短期消滅時効は廃止され、以前より時効期間が長くなっている。", "C": "売掛金は銀行から融資を受ける場合の担保となる。"}, "explanation": "法改正により売掛金の短期消滅時効は廃止され、通常の債権と同じ時効期間となり長くなった。A：法的制裁はない。C：売掛金は担保にならない。", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 10, "label": "問10", "points": 3, "answer": "C", "stem": "領収書に関する記述として、不適切なものはどれか。", "choices": {"A": "領収書には、日付、宛名、発行者、金額の記入が必ず必要である。", "B": "商法上の重要取引で使われた領収書の保管期間は、１０年である。", "C": "名刺の裏に必要項目の記載をしたとしても領収書として認められない。"}, "explanation": "名刺の裏でも必要事項があれば領収書として認められる。", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 11, "label": "問11", "points": 3, "answer": "C", "stem": "売上・回収に関する記述として、不適切なものはどれか。", "choices": {"A": "受取手形は６ヶ月に２回、銀行を支払い場所とする約束手形を不渡りにすると銀行取引停止処分を受ける。", "B": "小切手とは振出人の取引銀行に対して、受取人に一定額の金額を支払うように委託する有価証券のこと。", "C": "ＨＩＴＯＳＳⅡ上のお客様ランクが「６，７」の場合、売上先確認。「８，９」の場合、売上不可が表示される。"}, "explanation": "HITOSSⅡのランクは「6、7、8」の場合が売上先確認、「9」の場合が売上不可が表示される。「8」は売上先確認の対象であり、売上不可ではない。", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 12, "label": "問12", "points": 3, "answer": "B", "stem": "通過車両規定の業務処理要領に関する記述として、不適切なものはどれか。", "choices": {"A": "技術料割増は、実施販売会社の定時間内に作業完了した場合には適用しない。", "B": "ＨＩＴＯＳＳⅡに優良客（Ｓ）として登録されていれば、事故修理など突発案件の場合は元販売会社へ確認しなくてもよい。", "C": "技術料割増は、悪条件の場合は元販売会社へ事前連絡の上、出張技術料割増を５０％とすることができる。"}, "explanation": "優良客（S）として登録されていても、保証修理・事故修理・他メーカー車修理・1件5万円以上になると思われる場合は元販売会社へ確認が必要。", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 13, "label": "問13", "points": 3, "answer": "B", "stem": "通過車両規定において、サービスカー使用料金（税抜）に関する記述として、不適切なものはどれか。\n【基本料金：8,000円、超過：400円/km（片道）、2往復の場合は300円/km、振替控除10%】", "choices": {"A": "出発地点から到着地点まで、片道１７ｋｍの場合に販売会社間振替料金は１３，３２０円となる。", "B": "出発地点から到着地点まで、片道９ｋｍの場合に販売会社間振替料金は９，５２０円となる。", "C": "出発地点から到着地点まで、片道で１７ｋｍを２往復した場合に販売会社間振替料金は１６，３８０円となる。"}, "explanation": "片道9km：(8,000+400×9)×0.9=10,440円。B は9,520円としているが正しくは10,440円。A：(8,000+400×17)×0.9=13,320円✓　C：(8,000+300×17×2)×0.9=16,380円✓", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 14, "label": "問14", "points": 3, "answer": "A", "stem": "デュトロ ＺＥＶ（ＢＥＶ車）について、不適切なものはどれか。", "choices": {"A": "ｅＤＡＰは、アクセルペダル１つで加速から停止まで調整することが可能である。", "B": "誤発進抑制機能は、前進・後退ともに機能する。", "C": "モーター駆動で変速機がないため、走行がスムーズである。"}, "explanation": "eDAPは停止まで可能なものではなく、停止にはブレーキ操作が必要。", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 15, "label": "問15", "points": 3, "answer": "B", "stem": "２ＰＧ付レンジャーのＭｙドライブマスターに関する記述として、不適切なものはどれか。", "choices": {"A": "アクセル警報は、アクセル開度を感知して、おもにラフなアクセルワークを警告する。", "B": "シフトアップ警報は、車速を感知して、シフトアップを促す。", "C": "長時間アイドリング警報は、アイドリング回転での停車時間が設定時間を超過した場合、アイドルストップを促す。"}, "explanation": "シフトアップ警報は「車速」ではなく「エンジン回転数」を感知してシフトアップを促す。", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 16, "label": "問16", "points": 3, "answer": "C", "stem": "２＊Ｇ付メルファ（２０２１年モデル）に関する記述として、不適切なものはどれか。", "choices": {"A": "ＥＤＳＳが搭載された。", "B": "車線逸脱警報が搭載された。", "C": "ドライバーモニターⅡが搭載された。"}, "explanation": "2021年モデルのメルファにドライバーモニターⅡは搭載されていない。", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 17, "label": "問17", "points": 3, "answer": "B", "stem": "２＊Ｇ付プロフィア（２０１９年モデル）について、不適切なものはどれか。", "choices": {"A": "ＧＰＳや地図情報などを利用した道路勾配先読み制御を追加した。", "B": "追突防止用に誤発進抑制装置が追加された。", "C": "衝突事故を未然に防止するためにサイトアラウンドモニターシステム（ＳＡＭＳ）を追加した。"}, "explanation": "2019年モデルのプロフィアに誤発進抑制装置は搭載されていない。", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 18, "label": "問18", "points": 3, "answer": "A", "stem": "２＊Ｇ付デュトロのＨＶ車（２０１９年モデル）について、不適切なものはどれか。", "choices": {"A": "発進時は、モーターのみ走行が可能であり、その際にエンジンは停止している。", "B": "定常走行時は、状況によりエンジン走行、パラレル走行、モーター走行を行う。", "C": "減速時は、回生機能が作動するが、ＨＶバッテリーの残存容量によっては回生による減速力が低下するので注意が必要である。"}, "explanation": "モーター走行時のエンジンはアイドリングで待機している。発進時でもエンジンは停止しているのではなく、アイドリング状態で待機している。", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 19, "label": "問19", "points": 3, "answer": "B", "stem": "道路運送車両法において、自動車の整備事業に関する記述として、適切なものはどれか。", "choices": {"A": "整備主任者は同一事業者が経営する事業場であれば、他の事業場の整備主任者を兼務することができる。", "B": "普通自動車特定整備事業のみの認証を受けた事業場では、四輪の軽自動車の分解整備を行うことはできない。", "C": "整備命令は、自動車整備事業者に対し、その実施した整備の状況が不良の場合に出される命令である。"}, "explanation": "普通自動車特定整備事業の対象は普通自動車・四輪の小型自動車・大型特殊自動車であり、軽自動車は含まれない。C：整備命令は車両使用者に対して出されるもの。", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 20, "label": "問20", "points": 3, "answer": "C", "stem": "道路運送車両法の一部改正に伴う特定整備の電子制御装置整備に関する記述として、不適切なものはどれか。", "choices": {"A": "エーミング作業については「静的エーミング」と「動的エーミング」があり、ターゲット等を設置する必要がない「動的エーミング」については、原則として特定整備の対象外である。", "B": "電子制御装置点検整備作業場は、他の整備事業者の電子制御装置点検整備作業の共用を可能としている。この共用は、その場所で電子制御装置点検作業以外の従来の分解整備を行うことはできない。", "C": "電子制御装置整備対象車両のフロントガラス交換作業を外注で修理業者が自社工場（特定整備認証工場）にて行う場合、修理業者は特定整備事業者の資格が必要である。"}, "explanation": "フロントガラス交換作業を外注で行う場合、修理業者は整備士資格も特定整備事業者資格も不要。", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 21, "label": "問21", "points": 3, "answer": "B", "stem": "道路運送車両法において、法令３ヶ月点検を実施しなければならない自動車の種別として、不適切なものはどれか。", "choices": {"A": "乗車定員１１人の自家用バス", "B": "乗車定員１０人以下の乗用の普通、小型、検査対象軽自動車のレンタカー", "C": "車両総重量８トンの自家用貨物トラック"}, "explanation": "乗車定員10人以下の乗用レンタカーは6ヶ月ごとの定期点検が義務付けられており、3ヶ月点検の対象ではない。", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 22, "label": "問22", "points": 3, "answer": "A", "stem": "保安基準適合証および保安基準適合標章の有効期限として、適切なものはどれか。", "choices": {"A": "検査員が検査をした日を含み１５日間。", "B": "検査員が検査をした日を含み７日間。", "C": "検査員が検査をした日を含み３０日間。"}, "explanation": "保安基準適合証および保安基準適合標章の有効期間は、検査をした日から15日間である。", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 23, "label": "問23", "points": 3, "answer": "B", "stem": "保険の処理および計算方法に関する記述として、不適切なものはどれか。", "choices": {"A": "分損とは、事故車が修理可能でしかも車両の修理費が、車の時価よりも低い場合の損害のことをいう。", "B": "保険金の限度は１事故ごとに取扱い、保険金が支払われると保険金額が減少する。", "C": "自動車保険では一定の枠を設けてそれ以下の損害は支払い対象としないことにしており、免責金額として契約している。"}, "explanation": "保険金が支払われても保険金額は減少するものではない。1事故ごとの限度額で管理されるが、支払後に保険金額が減少することはない。", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 24, "label": "問24", "points": 3, "answer": "B", "stem": "自賠責保険に関する記述として、適切なものはどれか。", "choices": {"A": "自賠責保険で補償されるのは、相手を怪我、または死亡させた場合や、相手の物を破損した場合に、相手の損害賠償に対して保険金が支払われる。自分自身の怪我に対しては保険金は支払われない。", "B": "加害者が不誠実であったり、金額面で折り合いがつかずに示談が成立しない場合などには、被害者が損害賠償額を直接、保険会社に支払うよう請求できる。", "C": "賠償額の確定までに時間がかかるような場合、被害者は、加害者の加入している保険会社に保険金の前払いを請求することができる。これを仮渡金といい、死亡した者１人につき、３９０万円である。"}, "explanation": "A：自賠責保険は物の損害には適用されない。C：仮渡金は死亡した者１人につき290万円（390万円ではない）。B：被害者が直接保険会社に請求できる（被害者請求）は正しい。", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 25, "label": "問25", "points": 3, "answer": "C", "stem": "日野メンテナンスリースに関する記述として、不適切なものはどれか。", "choices": {"A": "日野が販売する中古の大型・中型・小型トラック（新規導入・日野車）は、メンテナンスリースの受入れが可能である。", "B": "本契約締結後の法令の制定、改廃、官公庁の指示・指導に起因する修理、改造、部品の取付、点検整備などはメンテナンスサービスに含まれない。", "C": "保守整備契約（Ｒ契約：故障修理契約）については、代車費用も含まれる。"}, "explanation": "保守整備契約（R契約：故障修理契約）では、代車費用は含まれない。", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 26, "label": "問26", "points": 3, "answer": "C", "stem": "日野デュトロハイブリッドバッテリー安心パックに関する記述として、適切なものはどれか。", "choices": {"A": "基本パック（リース以外）は、有効期限５年で価格は３０，０００円になる。", "B": "有効期間中、ハイブリッドバッテリーに交換の必要が生じた場合、無料でハイブリッドバッテリーを交換できる（交換工賃別）。", "C": "有効期間内である自動車を購入されたお客様は、自動車と証書を最寄りの販売会社にお持ちいただき、手続きを行うことにより継承することができる。"}, "explanation": "A：基本パックは有効期限10年で50,000円。B：交換工賃も無料。C：有効期間内の自動車を購入したお客様は証書を持参して手続きにより継承できる（C は正しい）。", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 27, "label": "問27", "points": 3, "answer": "B", "stem": "販売会社整備工場の設備・機器類の検査・点検に関する記述として、不適切なものはどれか。", "choices": {"A": "始業点検の記録の保存は、１年間である。", "B": "定期点検の記録の保存は、２年間である。", "C": "定期自主検査の記録の保存は、３年間である。"}, "explanation": "記録の保存期間：始業点検は1年、定期点検は1年（2年ではない）、定期自主検査は3年。", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 28, "label": "問28", "points": 3, "answer": "A", "stem": "安全衛生教育（法令）で定められた特別教育の種別について、不適切なものはどれか。", "choices": {"A": "可燃性ガス、酸素を用いる金属の溶接、溶断", "B": "最大荷重１．０トン未満のフォークリフトの運転", "C": "研削と石の取り替えまたは試運転"}, "explanation": "可燃性ガス、酸素を用いる金属の溶接・溶断については技能講習修了者等の資格が必要であり、特別教育ではなく技能講習の対象。", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 29, "label": "問29", "points": 3, "answer": "C", "stem": "フロント受付時の安全に関する記述について、不適切なものはどれか。", "choices": {"A": "お客様車両入庫時には、積荷の安全確認を行う。", "B": "お客様車両入庫時には、フレーム腐食など作業の安全に支障がないか確認する。", "C": "お客様に提示する用事があるなど、すぐに使用する部品はフロントのカウンター内に置くようにしてお待たせしないようにする。"}, "explanation": "フロントのカウンター内には部品などを置かない。部品はカウンター内に置いてはいけない。", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 30, "label": "問30", "points": 3, "answer": "B", "stem": "安全の心構えに関する記述として、不適切なものはどれか。", "choices": {"A": "作業の洗い出しと改善、異常処置時の安全のルール作りを行う。", "B": "作業能率を阻害する原因と事故や災害を起こす原因は関連性がない。", "C": "自分自身が主体となり自ら考えなければならない。"}, "explanation": "作業能率を阻害する原因を掘り下げると大部分は事故や災害を起こす原因となる。両者には大きな関連性がある。", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 31, "label": "問31", "points": 5, "answer": "C", "stem": "平日の定時間内にＡ販売会社からエンジン始動不良となった日野車のバッテリー交換（２個）の広域サービス対応依頼が入ったため、Ｂ販売会社のサービスエンジニアが１５ｋｍ先の故障車両までサービスカーで出動した。Ａ販売会社への請求金額を消費税１０％込みで計算した場合、適切なものはどれか。\n（注）答えは小数点以下第一位を四捨五入し、整数とする。\n\n部品代（純正ＰＢバッテリー原価）：１３，５００円（１個）\n標準作業時間（バッテリー交換）：０．５時間\nＡ販売会社の工賃レート：９，５００円\nＢ販売会社の工賃レート：９，０００円\n\n【計算式】\n①技術料：9,000×0.5×1.25（出張）×0.8（技術料控除）＝4,500円\n②部品代：13,500×2個×1.2（振替増し）＝32,400円\n③サービスカー：(8,000＋400×15km)×0.9（振替控除）＝12,600円\n合計：(4,500＋32,400＋12,600)×1.1（消費税）＝54,450円", "choices": {"A": "４６，５３０円", "B": "５２，４７０円", "C": "５４，４５０円", "D": "５９，５８３円", "E": "６２，０１０円"}, "explanation": "①技術料4,500＋②部品代32,400＋③サービスカー12,600＝49,500円、税込：49,500×1.1＝54,450円", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 32, "label": "問32", "points": 5, "answer": "C", "stem": "保険による事故修理を実施販売会社が下記内容で行なった。元販売会社への請求金額を消費税１０％込みで計算した場合、適切なものはどれか。\n（注）答えは小数点以下第一位を四捨五入し、整数とする。\n\n実施販売会社の保険査定額（税抜き）\n技術料：３００，０００円\n部品代：１００，０００円\n外注作業技術料：９０，０００円\n外注作業部品代：１００，０００円\n\n【計算式】\n技術料：300,000×0.95（5%控除）＝285,000円\n部品代：100,000×0.90（10%控除）＝90,000円\n外注技術料：90,000×0.95（5%控除）＝85,500円\n外注部品代：100,000×0.95（5%控除）＝95,000円\n合計税抜：555,500円　税込：555,500×1.1＝611,050円", "choices": {"A": "５５７，５８０円", "B": "５８９，５５０円", "C": "６１１，０５０円", "D": "６３２，８００円", "E": "６５０，０００円"}, "explanation": "技術料285,000＋部品代90,000＋外注技術料85,500＋外注部品代95,000＝555,500円、税込：555,500×1.1＝611,050円", "source": "23年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 1, "label": "問1", "points": 3, "answer": "B", "stem": "受付対応に関する記述として、適切なものはどれか。", "choices": {"A": "お客様の出迎えでは、大きくハッキリした言葉で挨拶する。", "B": "ご用命事項を聞き取る際には、重要な情報だけは必ずメモをとる。", "C": "ご用命確認後は、速やかにお客様を待合室へご案内する。"}, "explanation": "ご用命事項を聞き取る際には、重要な情報は必ずメモをとる。なお、ご用命確認後はただ待合室に案内するだけでなく、車両確認や所要時間の説明なども行う。", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 2, "label": "問2", "points": 3, "answer": "C", "stem": "日野サービスの基本として、不適切なものはどれか。", "choices": {"A": "お客様の期待を上回る仕事を提供することである。", "B": "お客様目線で業務を行うことである。", "C": "部品の価格を通常よりも安くお客様に提供することである。"}, "explanation": "日野サービスの基本は、無償の行動や価格を安くすることではなく、お客様に信頼・満足していただいて期待を上回る仕事を提供することが最良のサービスと考えている。", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 3, "label": "問3", "points": 3, "answer": "A", "stem": "接客対話の基礎に関する記述として、不適切なものはどれか。", "choices": {"A": "内容をよく分かってもらうために、専門用語をなるべく使って説明する。", "B": "感情的な議論をしないためには、落ち着いた態度と、なごやかな口調で話す。", "C": "相手の話しや、言い分をじっくり最後まで聞ける、聞き上手になる。"}, "explanation": "専門用語ではなく、一般的な用語で話す。", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 4, "label": "問4", "points": 3, "answer": "B", "stem": "名刺の受け渡しマナーとして、適切なものはどれか。", "choices": {"A": "名刺を受け取ったらすぐにしまう。", "B": "名前の読み方がわからない場合は、その場で確認する。", "C": "打合せ内容を忘れないように、その場で名刺にメモをする。"}, "explanation": "名刺を受取ってもすぐにしまわない。名刺にメモをしない。名前の読み方がわからない場合はその場で確認する（B適切）。", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 5, "label": "問5", "points": 3, "answer": "C", "stem": "お客様への説明方法として、適切なものはどれか。", "choices": {"A": "完成時間や整備料金について見通しがつかない場合は、具体的な表現は避ける。", "B": "分解してみなければ正確なことが分からない場合は、誤解を与えないようにあいまいな表現をしておく。", "C": "お客様に技術説明をする場合は、現物や資料を示して説明をする。"}, "explanation": "お客様には、あいまいな表現は避け、具体的に現物や資料を見せて説明をする。", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 6, "label": "問6", "points": 3, "answer": "A", "stem": "保証制度に関する記述として、不適切なものはどれか。", "choices": {"A": "日野自動車の保証制度は、販売会社・日野自動車がそれぞれの約束を結び、この約束によって成り立っている。", "B": "販売会社はお客様との売買契約で、保証書に記載されている期間と条件に従って保証修理することを約束している。", "C": "販売会社は日野販売会社基本契約書に基づき、日野自動車に代わって保証修理を実施することを約束している。"}, "explanation": "日野自動車の保証制度は、お客様・販売会社・日野自動車がそれぞれの約束を結び成り立っている。「お客様」が含まれていないAは不適切。", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 7, "label": "問7", "points": 3, "answer": "C", "stem": "受付時現車の確認を行う際の注意点に関する記述として、不適切なものはどれか。", "choices": {"A": "不正改造の有無を十分にチェックし、不正改造がある場合にはお客様に説明し、正規の姿に戻すようにお願いする。", "B": "車両の傷、汚れ、積荷、などの状態をお客様と一緒に確認し、納車後のトラブル防止を図る。", "C": "貴重品や高価なものが搭載されていたら、お客様に伝えフロントで大切に保管しておく。"}, "explanation": "貴重品は、お客様に持ち帰るようにお願いする（フロントで保管しない）。", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 8, "label": "問8", "points": 3, "answer": "B", "stem": "通過車両対応に関する業務処理規定に関する記述として、不適切なものはどれか。", "choices": {"A": "元販売会社とは、通過車両を修理対応する際、その車両を販売した販売会社や主幹販社など、現在取引のある販売会社を総称していう。", "B": "通過車両とは、自社以外の販売会社が販売した車両や、自社の他拠店が販売した車両を総称していう。", "C": "実施販売会社とは、通過車両を修理対応する販売会社をいう。"}, "explanation": "通過車両とは、自社以外の販売会社が販売した車両をいう。自社の他拠店が販売した車両は含まない。", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 9, "label": "問9", "points": 3, "answer": "B", "stem": "他販売会社のリコール未実施車両が入庫した場合の応対に関する記述として、適切なものはどれか。", "choices": {"A": "早急にリコール作業を実施しなければならないので入庫した販売会社で実施する。", "B": "元販売会社に連絡し、どちらの販売会社で実施するか相談する。", "C": "元販売会社で実施するようにお客様へ伝える。"}, "explanation": "他販売会社のリコール未実施車両が入庫した場合、元販売会社に連絡し、どちらの販売会社で実施するか相談することが適切な対応。", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 10, "label": "問10", "points": 3, "answer": "C", "stem": "通過車両規定の営業時間外における対応に関する記述として、不適切なものはどれか。", "choices": {"A": "修理対応は、応急処置であることが原則となる。", "B": "自社エンジニアの出動は、２名体制とする。", "C": "他メーカの車両も原則として修理対応を実施することとする。"}, "explanation": "営業時間外（夜間・休日）は他メーカー車については原則として対応しない（日野車が対象）。", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 11, "label": "問11", "points": 3, "answer": "C", "stem": "領収書に関する記述として、不適切なものはどれか。", "choices": {"A": "商法上の重要取引で使われた領収書は、１０年保管が必要。", "B": "領収書そのものには、有効期限はない。", "C": "必要項目の記載があっても名刺の裏では、認められない。"}, "explanation": "必要項目（日付・宛名・発行者・金額）が記載されていれば、名刺の裏であっても領収書として認められる。", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 12, "label": "問12", "points": 3, "answer": "A", "stem": "整備料金の説明と回収に関する記述として、不適切なものはどれか。", "choices": {"A": "有償と無償の作業を同時に行う場合、請求時点で「有償、無償の区別」「料金」を明確に「お客様に説明」しておくことが、「整備料金」の円滑な回収につながる。", "B": "サービス部門で販売する商品は点検、整備という機能的サービスすなわち、点検整備作業における「技術の提供」である。", "C": "提供する点検、整備の価値を十分理解していただけるよう、わかりやすく「お客様に説明」することも機能的サービスの一環である。"}, "explanation": "料金と有償・無償の説明は受注時点（請求時点ではなく）で行う。", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 13, "label": "問13", "points": 3, "answer": "A", "stem": "引渡し、納車時の応対に関する記述として、不適切なものはどれか。", "choices": {"A": "どの部品がどのように不具合があったかを、お客様に分かりやすく説明できるように、取り替えた部品の損傷状態を自分で確認してから廃却する必要がある。", "B": "作業指示書通りの作業が完了しているか、車両は清掃されているか、傷が付かなかったか、搭載物は受付時の通りかなど、お客様の車両を確認する必要がある。", "C": "納車時の説明は、お客様からの申し出内容に対する説明のみならず、使用上の注意、この先必要になる整備等のアドバイスをする必要がある。"}, "explanation": "交換部品はお客様へ提示し分かりやすく説明した後、お客様の廃却意思の確認後に廃却する。自分で確認後に廃却するのは不適切。", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 14, "label": "問14", "points": 3, "answer": "C", "stem": "通過車両規定に照らし、事故車の保管料に関する記述として、適切なものはどれか。", "choices": {"A": "修理しないものは、入庫日から起算し７日間は無料。", "B": "修理を実施したものは、元販売会社宛に完成した旨を通知した日から起算し７日間は無料。", "C": "修理しないものは、入庫日の翌日から８日間以上は１日につき９００円、小型車は５００円とする。"}, "explanation": "保管料の規定：修理しないものは入庫日の翌日から8日間以上は1日につき900円（小型車500円）。", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 15, "label": "問15", "points": 3, "answer": "C", "stem": "尿素ＳＣＲに関する説明として、適切なものはどれか。", "choices": {"A": "尿素水を排出ガスに噴射し、ＰＭを低減するシステムである。", "B": "尿素水を排出ガスに噴射し、排出ガス温度を上昇させるシステムである。", "C": "尿素水を排出ガスに噴射し、ＮＯｘを低減するシステムである。"}, "explanation": "SCRシステムは、尿素水を排出ガスに噴射し、NOxを分解して窒素と水に変化させてNOxを低減するシステム。", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 16, "label": "問16", "points": 3, "answer": "B", "stem": "２＊Ｇ付デュトロ（ディーゼル車）の安全装置に関する記述として、適切なものはどれか。", "choices": {"A": "誤発進抑制機能は、壁面ガラスを検知できない。", "B": "電子インナーミラーは、シフトレバーがＲレンジのときは遠方後方表示ができない。", "C": "クリアランスソナーは、障害物の接近を検知し、エンジンの出力を制御する。"}, "explanation": "電子インナーミラーはシフトレバーがRレンジの際は近距離後方表示に切り替わり、遠方後方表示はできない。誤発進抑制機能はガラスも検知可能で、クリアランスソナーは警報を発するがエンジン出力制御はしない。", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 17, "label": "問17", "points": 3, "answer": "B", "stem": "２＊Ｇ付レンジャー（２０２１年モデル）に関する記述として、不適切なものはどれか。", "choices": {"A": "ＥＤＳＳは、ドライバーモニターIIと車線逸脱警報装置によりドライバーの異常を検知し、自動でブレーキを作動させる。", "B": "ＳＡＭＳは、コーナーレーダーセンサーで進路上を交差する移動物を検知し、衝突の恐れがあれば自動でブレーキを作動させる。", "C": "ＰＣＳは、レーダーセンサーと画像センサーにより衝突物が検知され、衝突の恐れがあれば自動でブレーキを作動させる。"}, "explanation": "SAMSはいずれも警告（警報）のみであり、自動でブレーキを作動させることはない。", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 18, "label": "問18", "points": 3, "answer": "B", "stem": "ＤＰＲ（排出ガス浄化装置）に関する記述として、適切なものはどれか。", "choices": {"A": "メーター内の堆積量表示の本数に関わらず、インジケータランプが点滅することがあり、この場合はＤＰＲ装置の故障である。", "B": "ＤＰＲフィルター内に排出ガス中のＰＭを捕集し、燃焼処理を行う。", "C": "ＤＰＲフィルター内に排出ガス中のＮＯｘを捕集し、燃焼処理を行う。"}, "explanation": "DPRはPM（粒子状物質）を捕集・燃焼処理する装置。インジケータランプが点滅してもDPR装置の故障とは限らない。NOxを処理するのはSCRシステム。", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 19, "label": "問19", "points": 3, "answer": "A", "stem": "道路運送車両法に照らし、自動車の種別として、不適切なものはどれか。", "choices": {"A": "大型自動車", "B": "小型自動車", "C": "大型特殊自動車および小型特殊自動車"}, "explanation": "道路運送車両法における自動車の種別は「普通自動車・小型自動車・軽自動車・大型特殊自動車・小型特殊自動車」。「大型自動車」は道路交通法（免許区分）の種別であり、道路運送車両法の種別には存在しない。", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 20, "label": "問20", "points": 3, "answer": "C", "stem": "「道路運送車両法」に照らし、長さ４．６５ｍ、幅１．７２ｍ、高さ１．６７ｍで原動機の総排気量が１．９９Ｌのディーゼルエンジンの自動車の種別として、適切なものはどれか。", "choices": {"A": "軽自動車", "B": "小型自動車", "C": "普通自動車"}, "explanation": "小型自動車の基準は幅1.7m以下等。この車両は幅1.72mで1.7mを超えるため小型自動車に該当せず、普通自動車となる。", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 21, "label": "問21", "points": 3, "answer": "B", "stem": "保安基準適合証および保安基準適合標章の有効期限として、適切なものはどれか。", "choices": {"A": "検査員が検査をした日を含み７日間", "B": "検査員が検査をした日を含み１５日間", "C": "検査員が検査をした日を含み３０日間"}, "explanation": "保安基準適合証および保安基準適合標章の有効期限は、検査員が検査をした日を含み15日間。", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 22, "label": "問22", "points": 3, "answer": "C", "stem": "道路運送車両法に関する記述として、不適切なものはどれか。", "choices": {"A": "三級自動車整備士の資格を取得した者は、整備管理者の資格を有する。", "B": "自家用マイクロバスを運行する者は、１日１回、その運行の開始前に日常点検をしなければならない。", "C": "自動車が保安基準に適合しなくなるおそれがある状態又は適合しない状態にあるときは、運輸支局長から改善命令を受けることがある。"}, "explanation": "改善命令を行うのは「運輸支局長」ではなく「地方運輸局長」が正しい。", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 23, "label": "問23", "points": 3, "answer": "B", "stem": "自動車損害賠償責任保険（自賠責保険）に関する記述として、不適切なものはどれか。", "choices": {"A": "自動車１台ごとに必ずつけなくてはならない保険（強制保険）。", "B": "対人と対物賠償として入る保険。", "C": "保険の契約が締結されている車両でなければ運行してはならない。"}, "explanation": "自動車損害賠償保障法により、強制的につけなくてはならない対人賠償のみを担保するもの。対物賠償は含まれない。", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 24, "label": "問24", "points": 3, "answer": "C", "stem": "日野メンテナンスリースのＳプランに関する基本整備項目の記述として、不適切なものはどれか。", "choices": {"A": "車検整備は含む。", "B": "バルブ（電球）の交換は含む。", "C": "バッテリーの交換は含む。"}, "explanation": "バッテリーの交換はSプランの基本整備項目には含まれない（別途オプション）。", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 25, "label": "問25", "points": 3, "answer": "C", "stem": "保険処理の事故を受け付ける際の対応に関する記述として、不適切なものはどれか。", "choices": {"A": "まずは顧客の安否を気遣って「おケガはありませんか」などの言葉が必要である。", "B": "顧客の言い分を全面的に信用したり、事故処理に直接介入したりするなど前面に立つことをしてはいけない。", "C": "人身が絡んだり、話し合いが難航する場合はフロントアドバイザーが事故処理を代行したほうが良いこともある。"}, "explanation": "事故処理は当事者間で行ってもらい、販売会社はお客様への保険内容の助言にとどめる。フロントアドバイザーが事故処理を代行することは不適切。", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 26, "label": "問26", "points": 3, "answer": "B", "stem": "サービス業態の伝票仕掛日数に関する記述として、不適切なものはどれか。", "choices": {"A": "伝票仕掛日数は、未売上（仕掛）伝票が１日当り平均入庫台数に対し何日分仕掛っているかを知るための指標である。", "B": "仕掛件数とは工事中や通過車両を除いた工事完了、完成見積、調整赤黒の件数である。", "C": "伝票仕掛日数＝仕掛件数÷（直近６ヶ月の入庫台数÷稼動日数）"}, "explanation": "仕掛件数の定義が不適切。工事中も含む未売上の仕掛伝票件数が仕掛件数となる。", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 27, "label": "問27", "points": 3, "answer": "A", "stem": "車両をリフトアップする作業でのリフト操作の注意として、不適切なものはどれか。", "choices": {"A": "リフト昇降中に車両下作業を行う場合は、ヘルメットと保護メガネを着用する。", "B": "リフトアップ後は、リモコンの電源を「切」にする。", "C": "車両の下に人がいる場合、リフト操作を行わない。"}, "explanation": "リフト昇降中は車両下での作業を行ってはならない（昇降が完全に停止してから作業を開始する）。", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 28, "label": "問28", "points": 3, "answer": "C", "stem": "職場内の５Ｓに関する記述として、適切なものはどれか。", "choices": {"A": "整理とは、必要なものがいつでも取り出せて、戻せること。", "B": "整頓とは、いるものといらないものを分けて、いらないものを捨てること。", "C": "清掃とは、いつもきれいな環境にしておくこと。"}, "explanation": "整理とはいるものといらないものを分けていらないものを捨てること。整頓とは必要なものがいつでも取り出せて戻せること。AとBが逆。清掃（C）が正しい。", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 29, "label": "問29", "points": 3, "answer": "C", "stem": "フロント受付時の安全に関する記述について、不適切なものはどれか。", "choices": {"A": "お客様車両入庫時には、積荷の安全確認を行う。", "B": "お客様車両入庫時には、フレーム腐食など作業の安全に支障がないか確認する。", "C": "お客様に提示する用事があるなど、すぐに使用する部品はフロントのカウンター内に置くようにしてお待たせしないようにする。"}, "explanation": "フロントのカウンター内には部品などを置かない（安全のため）。", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 30, "label": "問30", "points": 3, "answer": "A", "stem": "リヤダブルタイヤ間に挟まった石などの異物の除去方法に関する記述として、適切なものはどれか。", "choices": {"A": "両方のタイヤのエアを完全に抜いてから除去する。", "B": "片方のタイヤのエアを抜いてから除去する。", "C": "エアを抜かずにハンマーで石をたたいて除去する。"}, "explanation": "エアを抜かずに無理やり取り除くとタイヤが破裂する危険がある。両方のタイヤのエアを完全に抜いてから安全に除去する。", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 31, "label": "問31", "points": 5, "answer": "C", "stem": "【問２(1)】通過車両の業務処理規定に照らし、サービスカーを使用して片道２０ｋｍ離れた場所での出張作業を行った。\n依頼販売会社へのサービスカー使用料金の振り替え請求額を消費税１０％込みで計算した場合、適切なものはどれか。\n\n（注）答えは小数点以下第一位を四捨五入し、整数とする。", "choices": {"A": "９，４８０円", "B": "１０，９００円", "C": "１５，８４０円", "D": "１７，８００円", "E": "２０，２００円"}, "explanation": "【計算】\n基本料金：8,000円\n距離料金：400円×20km＝8,000円\n小計：16,000円\n10%控除：16,000×0.9＝14,400円\n消費税込：14,400×1.1＝15,840円 → C", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 32, "label": "問32", "points": 5, "answer": "A", "stem": "【問２(2)】平日の営業時間内に通過車両のバッテリ交換を下記内容で行った。消費税１０％込みの元販売会社への振替料金として、適切なものはどれか。\n\n技術料：１５，０００円（税抜）\n部品代（定価）：４，２００円（税抜）\n純正ＰＢバッテリ（原価）：２５，０００円（２個分合計税抜）\n\n（注）答えは小数点以下第一位を四捨五入し、整数とする。", "choices": {"A": "４９，８９６円", "B": "５０，５６０円", "C": "５１，９２０円", "D": "５３，８５６円", "E": "５６，２５０円"}, "explanation": "【計算】\n技術料振替（20%控除）：15,000×0.8＝12,000円\n部品代振替（定価×0.8）：4,200×0.8＝3,360円\n純正PBバッテリ（原価×1.2）：25,000×1.2＝30,000円\n小計：45,360円\n消費税込：45,360×1.1＝49,896円 → A", "source": "23年HF-3認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 1, "label": "問1(1)", "points": 3, "answer": "B", "stem": "保証業務に関する記述として、不適切なものはどれか。", "choices": {"A": "保証修理には販売会社の収益、お客様の信頼の回復と維持、市場技術情報の収集と大きな役割を持っている。", "B": "補給部品の保証について、日野の保証書に記載する一般保証部品に準じ、販売会社の取り付け上に起因する不具合も含むものとする。", "C": "部品メーカーの保証対象と適用範囲について、バッテリーは製造日より６ヶ月間であり、タイヤについては各タイヤ製造メーカーの条件による保証とし、それぞれ代替品にて対応となる。", "D": "大型トラック／トラクター保証書について日野自動車が示す仕様（積載量、定員、速度、エンジン回転数等）の限度を超える使用に起因すると判定できる故障または破損については適用しない。"}, "explanation": "補給部品の保証において、販売会社の取り付け上に起因する不具合は含まない。", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 2, "label": "問1(2)", "points": 3, "answer": "A", "stem": "下請法の親事業者の４つの義務に関する記述として、不適切なものはどれか。", "choices": {"A": "納入物受領後６０日を経過した日から支払手続き完了日までの期間については、年率１４．６％の遅延利息を支払わなくてはならない。", "B": "口頭発注によるトラブルを未然に防止するため、親事業者は発注に際して、「１１の法定事項」を満たした書面を直ちに下請事業者に発行しなければならない。", "C": "支払期限は、納入品受領（納入）日または役務の提供をした日から６０日以内のできるだけ短い期間内に定めなければならない。", "D": "下請事業者との取引に関する記録を書類として作成し、２年間保存しなければならない。"}, "explanation": "遅延利息は「納入物受領後６０日を経過した日から支払手続き完了日まで」ではなく、「納入物受領後６０日を経過した日から実際に支払われた日まで」の期間について支払わなければならない。", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 3, "label": "問1(3)", "points": 3, "answer": "A", "stem": "ＨＩ－ＰＲＥＭＡ、Ｈｉ－Ｌｉｎｋ、ＨＩＮＯ－ＣＹＣＬＥに関する記述として、不適切なものはどれか。", "choices": {"A": "HINO-CYCLEでHITOSSから車検予約する場合で、予約する車両が決まっていない場合は、通常の予約受付の必須項目に加え、車型・車番入力（ダミーの文字・数字を入力）にてHINO-CYCLEに反映される。", "B": "HITOSS見積作成時、Hi-Link操作にて「部品→作業取得」からHITOSS作業コード品番紐づけ明細する際、ご用命明細に作業が紐づかなかった、または紐づけなかったものは部品の上段に空欄行が挿入される。", "C": "HITOSS見積作成にて、HI-PREMA提案書を取り込む場合は必要項目を入力後、提案状況に「提案有」アラート表示を確認しても、Ｆ８「他画面」からの提案書検索は対応できない。", "D": "HITOSS見積作成にて、HI-PREMAから１つの提案書に対して、紐づけられる見積作成は５件までである。"}, "explanation": "HINO-CYCLEへの車検予約時、ダミーの文字・数字入力だけでなく、車種区分とメーカCDの３項目入力が必要。", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 4, "label": "問1(4)", "points": 3, "answer": "C", "stem": "受付対応や苦情対応に関する記述として、不適切なものはどれか。", "choices": {"A": "不満を持った顧客のうち、苦情を申し立て、その解決に満足した顧客の再購入決定率は、不満を持ちながら苦情を申し立てない顧客のそれに対して比較的高いと言われている。", "B": "口コミの波及効果は、好意的な内容よりも非好意的な内容の方が二倍も強く影響を与えると言われている。", "C": "事故などお客様にトラブルが発生した際には、まず事故原因など技術的な説明をしてからお客様の気持ちが落ち着くのを待つことが大切である。", "D": "商品やサービスに問題があっても全てが苦情になるわけではなく、信頼関係ができていれば大問題にならない場合もあるが、それに甘えず常に緊張感を持って対応することが必要である。"}, "explanation": "お客様にトラブルが発生した際には、まずお客様の立場で心境をくみ取り、お客様の身を案じることが最優先。技術的な説明は後から行う。", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 5, "label": "問1(5)", "points": 3, "answer": "B", "stem": "見積書に関する記述として、不適切なものはどれか。", "choices": {"A": "分解しないと追加作業が発生するかどうかがわからないものに関しては、見積りの段階で概算の金額であることを伝える。", "B": "見積り段階でお客様に納期を明示する場合、整備時間を正確に把握して作業完了時期と納期を同じタイミングになるよう明示する必要がある。", "C": "見積りを正確なものにするには、受け入れ時のチェックや問診が必要になる。", "D": "見積りとは、費用、修理内容、日数などをお客様に理解しやすいように提示するものである。"}, "explanation": "正確な作業時間を把握することは必要であるが、確実な納期とするためには少しの余裕を持たせる必要がある。作業完了と納期を同じタイミングにすると余裕がなくなる。", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 6, "label": "問1(6)", "points": 3, "answer": "B", "stem": "通過車両の業務処理要領について、不適切なものはどれか。", "choices": {"A": "中央コールセンターまたは元販売会社受付窓口経由でお客様から修理対応依頼された場合は迅速に修理対応を行う。", "B": "レッカー使用料金および牽引料金について、実施販売会社が外注を使用した場合は振替請求額の５％を控除して請求する。", "C": "修理見積料金について、保険による場合、保険外の場合を問わず、正式見積書を提出し修理を実施しないときには、原則として元販売会社に対し、見積料金として見積額の３％を請求できる。", "D": "ＳＯＳ緊急サービス販売会社における対応について、出動する場合は誰がおよそどの位の時間で到着するかを必ずお客様に伝えるようにする。"}, "explanation": "レッカー使用料金および牽引料金について外注を使用した場合は、仕入れ価格の１０％増し金額から５％を控除して請求する。単純に振替請求額の５％控除ではない。", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 7, "label": "問1(7)", "points": 3, "answer": "A", "stem": "引渡し、納車時の対応に関する記述として、不適切なものはどれか。", "choices": {"A": "どの部品がどのように不具合があったかを、お客様に分かりやすく説明できるように、取り替えた部品の損傷状態を自分で確認してから廃却する必要がある。", "B": "作業指示書通りの作業が完了しているか、車両は清掃されているか、傷が付かなかったか、搭載物は受付時の通りかなど、お客様の車両を確認する必要がある。", "C": "納車時の説明は、お客様からの申し出内容に対する説明のみならず、使用上の注意、この先必要になる整備等のアドバイスをする必要がある。", "D": "納車時での説明では、作業中に気付いたことや車の使い方に対するアドバイスなどお客様一人一人に合わせた心づかいが必要である。"}, "explanation": "交換部品はお客様へ提示し分かりやすく説明した後、お客様の廃却意思を確認してから廃却する。自分で確認してから廃却するのではなく、お客様への提示・説明・廃却意思確認が必要。", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 8, "label": "問1(8)", "points": 3, "answer": "B", "stem": "売掛金に関する記述として、不適切なものはどれか。", "choices": {"A": "取引先が倒産した場合、原則として回収は出来ない。", "B": "時効の成立を中断させるため、請求書を再度送付した。", "C": "支払いに懸念のあるお客様と、現金取引を行った。", "D": "民法上の短期消滅時効（２年間）は廃止された。"}, "explanation": "請求書の送付だけでは時効は中断されない。時効を中断させるには、裁判上の請求や債務承認などの法的手続きが必要。", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 9, "label": "問1(9)", "points": 3, "answer": "A", "stem": "手形、小切手、領収書に関する記述として、不適切なものはどれか。", "choices": {"A": "手形・小切手を受け取った際の確認ポイントとして、受取人の名前、支払金額、支払日、振出日、被裏書人欄など全て記載されていない場合は無効になる。", "B": "手形の記載金額が１０万円以上の場合、印紙税法により収入印紙を貼ることが定められており、貼り付けられた印紙に消印を押す理由として、一度使った収入印紙が再度使われることを防ぐためである。", "C": "領収書の保存、保管期間は請求書などと同様に帳簿類の記載事項の証拠書類となるため１０年分の保管が必要である。", "D": "手形の取立期間は記載された日から２日、当日を含めて３日間となり、この中に日曜・祭日があればこれを除いて実日数となる。"}, "explanation": "被裏書人欄に何も記載しなくても「白地式裏書」として渡すことができる。白地式裏書の場合には、裏書が連続しているとみなされる。", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 10, "label": "問1(10)", "points": 3, "answer": "B", "stem": "整備料金の説明と回収に関する記述として、不適切なものはどれか。", "choices": {"A": "点検・整備の価値をお客様に理解していただけるよう、必要性、効果などをわかりやすくお客様に説明することも、「機能的サービス」の一環である。", "B": "売掛金が回収予定日を過ぎても入金されない場合は、督促状を普通郵便や内容証明付郵便などの手段を講じることも大切である。", "C": "無償、有償作業を同時に行う場合、受注の時点で「料金」とその有償、無償についてお客様に説明しておく。", "D": "サービス部門で販売する商品は、点検、整備という点検整備作業における「技術の提供」である。"}, "explanation": "督促状は普通郵便ではなく、配達証明付郵便や内容証明付郵便で送付する必要がある。", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 11, "label": "問1(11)", "points": 3, "answer": "A", "stem": "売上・回収に関する記述として、不適切なものはどれか。", "choices": {"A": "ＨＩＴＯＳＳⅡ上のお客様ランクが「６，７」の場合、売上先確認。「８，９」の場合、売上不可が表示される。", "B": "小切手とは振出人の取引銀行に対して、受取人に一定額の金額を支払うように委託する有価証券のこと。", "C": "売掛金は利息が付かず、時効が５年である。", "D": "受取手形は６ヶ月以内に２回、銀行を支払い場所とする約束手形を不渡りにすると銀行取引停止処分を受ける。"}, "explanation": "HITOSS上のお客様ランクが「６，７，８」の場合は売上先確認、「９」の場合が売上不可。「８」は売上不可ではなく売上先確認となる。", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 12, "label": "問1(12)", "points": 3, "answer": "C", "stem": "領収書に関する記述として、不適切なものはどれか。", "choices": {"A": "領収書には、日付、宛名、発行者、金額の記入が必ず必要である。", "B": "商法上の重要取引で使われた領収書の保管期間は、１０年である。", "C": "名刺の裏に必要項目の記載をしたとしても領収書として認められない。", "D": "領収書そのものには、有効期限はない。"}, "explanation": "名刺の裏でも必要事項（日付・宛名・発行者・金額等）が記載されていれば、領収書として認められる。", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 13, "label": "問1(13)", "points": 3, "answer": "C", "stem": "通過車両の保険修理対応による事故売り上げの記述として、適切なものはどれか。", "choices": {"A": "技術料は保険査定額の１０％を控除して売上をする。", "B": "部品代は保険査定額の２０％を控除して売上をする。", "C": "外注作業技術料は保険査定額の５％を控除して売上をする。", "D": "外注作業部品代は保険査定額の１０％を控除して売上をする。"}, "explanation": "通過車両の保険修理における外注作業技術料は、保険査定額の５％を控除して売上をする。", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 14, "label": "問1(14)", "points": 3, "answer": "D", "stem": "通過車両規定において、サービスカー使用料金（税抜）に関する記述として、不適切なものはどれか。", "choices": {"A": "出発地点から到着地点まで、片道１７ｋｍの場合に販売会社間振替料金は１３，３２０円となる。", "B": "出発地点から到着地点まで、片道で１７ｋｍを２往復した場合に販売会社間振替料金は１６，３８０円となる。", "C": "出発地点から到着地点まで、片道で９ｋｍを２往復した場合に販売会社間振替料金は１２，０６０円となる。", "D": "出発地点から到着地点まで、片道９ｋｍの場合に販売会社間振替料金は９，５２０円となる。"}, "explanation": "サービスカー使用料金：基本料8,000円＋片道1kmごとに400円加算。2往復の場合は基本8,000円＋片道1kmごとに300円加算。振替は上記の10%控除。\n\n■片道9kmの正しい計算：\n8,000＋（400×9）＝11,600円\n11,600×0.9＝10,440円\n→選択肢Ｄの9,520円は誤り\n\n■片道17kmの確認（A）：8,000＋(400×17)=14,800×0.9=13,320円 ✓\n■2往復17kmの確認（B）：8,000＋(300×17×2)=18,200×0.9=16,380円 ✓\n■2往復9kmの確認（C）：8,000＋(300×9×2)=13,400×0.9=12,060円 ✓", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 15, "label": "問1(15)", "points": 3, "answer": "C", "stem": "２＊Ｇ付プロフィア（２０２３年モデル）のＭ１１２型トランスミッションに関する記述として、不適切なものはどれか。", "choices": {"A": "オートシフトダウン機能は、アクセルペダルまたはクラッチペダルを踏むと解除される。", "B": "キックダウン機能があり、オートモード選択時に１１速から７速の間のいずれかにシフトダウンする。", "C": "非常コントロール機能を使用中の場合、インギヤでクラッチがつながっている状態ではエンジン始動が不可能である。", "D": "本体構造自体はマニュアルミッションと変わらないので、クリープ現象はない。"}, "explanation": "非常コントロール時は、インギヤでクラッチがつながっている状態でもエンジン始動が可能である。通常のマニュアル車とは異なる。", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 16, "label": "問1(16)", "points": 3, "answer": "B", "stem": "デュトロ ＺＥＶ（ＢＥＶ車）について、不適切なものはどれか。", "choices": {"A": "普通充電と急速充電の両方に対応している。", "B": "ｅＤＡＰは、アクセルペダル１つで加速から停止まで調整することが可能である。", "C": "誤発進抑制機能は、前進・後退ともに機能する。", "D": "モーター駆動で変速機がないため、走行がスムーズである。"}, "explanation": "eDAPはアクセルペダル１つで加速から減速まで調整できるが、完全な停止にはブレーキ操作が必要。アクセルだけで停止まではできない。", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 17, "label": "問1(17)", "points": 3, "answer": "C", "stem": "２＊Ｇ付プロフィア（２０２３年モデル）に関する記述として、適切なものはどれか。", "choices": {"A": "ＥＤＳＳについて、車線逸脱警報をＯＦＦにしているとＥＤＳＳ作動時における車両逸脱判定は行わないため、減速および停止は機能するが、車線内維持は行わない。", "B": "ＳＡＭＳは、コーナーレーダーセンサーで進路上を交差する移動物を検知し、衝突の恐れがあれば自動でブレーキを作動させる。", "C": "レーンキーピングアシスト（ＬＫＡ）は、一定速度以上で走行中にシステムが車線逸脱を判断するとステアリングを制御し、車両を車線内に戻す支援や車線内に維持することを支援する。", "D": "ドライバーモニターⅡは、ＰＣＳと連動して作動するものであるため、単独での運転者への警報機能は備えていない。"}, "explanation": "A：EDSSは車線逸脱警報OFFでも車両逸脱判定は継続する。B：SAMSは警告のみで自動ブレーキは作動しない。D：ドライバーモニターⅡは単独での警報機能がある。C（LKA）の記述が正しい。", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 18, "label": "問1(18)", "points": 3, "answer": "A", "stem": "デュトロ（２０１６年モデル以降）のスマートエントリー＆スタートシステムに関する記述として、不適切なものはどれか。", "choices": {"A": "スマート（電子）キーのキーＩＤコードは、メインキーとサブキー併せて８個まで登録可能である。", "B": "一度登録したスマート（電子）キーは、他の車両に登録することはできない。", "C": "カスタマイズ機能によりスマートエントリーシステムの、有効と無効を切り替えることができる。", "D": "長期駐車時にスマートキーの電池上がりを防止するため、節電機能（節電モード）がある。"}, "explanation": "スマートキーのキーIDコードはメイン・サブの識別はなく、最大５個まで登録可能。８個ではない。", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 19, "label": "問1(19)", "points": 3, "answer": "B", "stem": "道路運送車両法及び指定自動車整備事業規則に照らし、保安基準適合証に関する次の文章の［イ］～［ロ］に当てはまるものとして、下の組み合わせのうち、適切なものはどれか。\n\n「保安基準適合証の有効期限は、［イ］をした日から［ロ］となっている。」", "choices": {"A": "［イ］交付、［ロ］１５日間", "B": "［イ］検査、［ロ］１５日間", "C": "［イ］交付、［ロ］３０日間", "D": "［イ］検査、［ロ］３０日間"}, "explanation": "保安基準適合証の有効期限は「検査をした日から１５日間」である（道路運送車両法第94条の５）。", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 20, "label": "問1(20)", "points": 3, "answer": "B", "stem": "道路運送車両法において、自動車の整備事業に関する記述として、適切なものはどれか。", "choices": {"A": "事業用自動車の点検整備記録簿の保存期間は、その記載の日から２年間である。", "B": "普通自動車特定整備事業のみの認証を受けた事業場では、四輪の軽自動車の分解整備を行うことはできない。", "C": "整備命令は、自動車整備事業者に対し、その実施した整備の状況が不良の場合に出される命令である。", "D": "整備主任者は同一事業者が経営する事業場であれば、他の事業場の整備主任者を兼務することができる。"}, "explanation": "普通自動車特定整備事業は普通自動車・四輪の小型自動車・大型特殊自動車を対象とする。軽自動車（検査対象軽自動車）は軽自動車特定整備事業の対象であり、普通自動車特定整備事業のみでは分解整備できない。", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 21, "label": "問1(21)", "points": 3, "answer": "D", "stem": "道路運送車両の保安基準に照らし、車両総重量に関する記述として、不適切なものはどれか。", "choices": {"A": "セミトレーラ以外の自動車で、最遠軸距が５．５ｍ未満のものは、車両総重量２０トン以下。", "B": "セミトレーラ以外の自動車で、最遠軸距が５．５ｍ以上７ｍ未満、自動車の長さが９ｍ未満のものは、車両総重量２０トン以下。", "C": "セミトレーラ以外の自動車で、最遠軸距が７ｍ以上自動車の長さが９ｍ未満のものは、車両総重量２０トン以下。", "D": "セミトレーラ以外の自動車で、最遠軸距が７ｍ以上自動車の長さが１１ｍ以上のものは、車両総重量２２トン以下。"}, "explanation": "最遠軸距が７ｍ以上、自動車の長さが１１ｍ以上のものは、車両総重量２５トン以下が正しい。２２トンではない。", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 22, "label": "問1(22)", "points": 3, "answer": "B", "stem": "道路運送車両法及び自動車点検基準に照らし、自動車の区分（種別、用途等）と定期点検の時期の組合せとして、適切なものはどれか。", "choices": {"A": "乗車定員１１人以上の自家用バスは、６か月ごとに定期点検", "B": "車両総重量８トン未満の貨物運送用の自家用普通自動車は、６か月ごとに定期点検", "C": "車両総重量８トン以上の自家用自動車は、６か月ごとに定期点検", "D": "乗車定員１０人以下の乗用普通レンタカーは、１年ごとに定期点検"}, "explanation": "乗車定員11人以上の自家用バスは３か月ごと。車両総重量8トン以上の自家用自動車は３か月ごと。乗用普通レンタカーは６か月ごと。車両総重量8トン未満の貨物運送用自家用普通自動車の６か月ごとが正しい。", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 23, "label": "問1(23)", "points": 3, "answer": "D", "stem": "自賠責保険に関する記述として、不適切なものはどれか。", "choices": {"A": "政府は，自動車によって生命又は身体を害された者がある場合，その車の保有者が明らかでないため被害者が損害賠償の請求をすることができないときは，被害者の請求により，政令で定める金額の限度において，その受けた損害をてん補する。", "B": "後遺障害第１級（常時介護を要する場合）の保険金の限度額は４，０００万円である。", "C": "指定整備事業者は、自賠責保険証の保険期間が、自動車検査証の有効期間が満了する日までの期間と全部が重複するものでないときは、保安基準適合証を交付してはならない。", "D": "死亡による保険金の限度額は２，５００万円である。"}, "explanation": "死亡による自賠責保険金の限度額は３，０００万円である。２，５００万円は誤り。", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 24, "label": "問1(24)", "points": 3, "answer": "B", "stem": "接客・応対時、お客様の性格４タイプのうちニギヤカ型のお客様における対応方法について適切なものはどれか。", "choices": {"A": "ゆっくり冷静な態度で、一つ一つ念をおしていくような対応が望ましい。", "B": "中途半端な対応は禁物で、常に筋を通して、ときには強気に出る。", "C": "お客様と同じ気持ちになり、てきぱきと迅速に処理し明るく対応する。", "D": "特に明るく、積極的に話し、こちらから話を引き出す。"}, "explanation": "A：オットリ型の対応。C：テキパキ型の対応。D：キマジメ型の対応。ニギヤカ型には中途半端な対応は禁物で、常に筋を通してときには強気に出る対応が適切。", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 25, "label": "問1(25)", "points": 3, "answer": "A", "stem": "日野メンテナンスリース基本契約でメンテナンスサービス（整備内容）に含まれない項目として、不適切なものはどれか。　※但しオプション設定を除く。", "choices": {"A": "マーカーランプ、タイヤランプ等の保安基準適合の灯火装置・灯火類の修理・交換。", "B": "音、振動、オイルの滲み等の一般に品質、機能上影響がないと認められる感覚的な現象の修理。", "C": "バッテリーの交換、バッテリーが原因の修理および出張費用。", "D": "指定サービス工場以外での整備・修理およびこれに起因する故障修理。"}, "explanation": "含まれない（対象外）項目は「保安基準適合以外の灯火装置・灯火類の修理・交換」。選択肢Aは「保安基準適合の灯火装置」と記述しており、これは対象外でないため不適切な記述。", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 26, "label": "問1(26)", "points": 3, "answer": "B", "stem": "日野メンテナンスリースに関する記述として、不適切なものはどれか。", "choices": {"A": "メンテナンスリースとは、車両代・税金・保険等にメンテナンス費用を加えたリース契約のことである。", "B": "基本契約としては、４種類のプラン設定がある。", "C": "基本契約のＳプランでは、定期点検・油脂類交換・ワイパーゴム交換が含まれる。", "D": "メンテナンス対象修理と対象外作業が一度に発生した場合、工事受付を別にして処理しなければならない。"}, "explanation": "日野メンテナンスリースの基本契約はＳ・Ｍ・Ｒの３種類のプラン設定がある。４種類ではない。", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 27, "label": "問1(27)", "points": 3, "answer": "A", "stem": "安全マニュアルガイドラインに照らし、フロント受付に関する記述について、不適切なものはどれか。", "choices": {"A": "お客様に提示する用事があるなど、すぐに使用する部品はフロントのカウンター内に置くようにしてお待たせしないようにする。", "B": "お客様車両入庫時には、フレーム腐食など作業の安全性に支障がないか確認する。", "C": "お客様車両入庫時には、積荷の安全確認を行う。", "D": "フロント受付後、お客様による整備車両移動はご遠慮いただき、必ず社員が移動させる。"}, "explanation": "フロントのカウンター内には部品などを置かない。すぐに使用する部品であっても、カウンター内への置き場は安全上不適切。", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 28, "label": "問1(28)", "points": 3, "answer": "D", "stem": "安全の心構えに関する記述として、不適切なものはどれか。", "choices": {"A": "作業の洗い出しと改善、異常処置時の安全のルール作りを行う。", "B": "正しい作業であれば、作業効率の向上も期待できる。", "C": "自分自身が主体となり自ら考えなければならない。", "D": "作業能率を阻害する原因と事故や災害を起こす原因は関連性がない。"}, "explanation": "作業能率を阻害する原因を掘り下げると、大部分は事故や災害を起こす原因となる。つまり両者は密接な関連性がある。", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 29, "label": "問1(29)", "points": 3, "answer": "D", "stem": "フロントスタッフの安全ガイドラインに関する記述として、不適切なものはどれか。", "choices": {"A": "交通量の多いフロント～工場、工場内レーン周囲は約１６０ｃｍ以上の通路幅を確保し、白線を引き明示する", "B": "交通量の多いフロント～工場、工場内レーン周囲は約１５０ｃｍ以上の通路幅を確保し、白線を引き明示する", "C": "交通量の多いフロント～工場、工場内レーン周囲は約８０ｃｍ以上の通路幅を確保し、白線を引き明示する", "D": "交通量の多いフロント～工場、工場内レーン周囲は約７５ｃｍ以上の通路幅を確保し、白線を引き明示する"}, "explanation": "交通量の多いフロント～工場、工場内レーン周囲は約８０ｃｍ以上の通路幅を確保し、白線を引き明示する。約７５ｃｍは誤り。", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 30, "label": "問1(30)", "points": 3, "answer": "C", "stem": "安全行動と安全状態の具体例に関する記述として、不適切なものはどれか。", "choices": {"A": "フロント前には停止線、ならびに「一時停止」等の表示を行う。", "B": "車両点検、受入点検は「点検場」を確保、明示し、そこで行う。一回り点検は「点検場」で行う。「点検場」が確保できない場合は工場内の完成検査場等で行う。", "C": "工場内のお客様立ち入りを禁止とし、その旨をフロント付近に表示し、安全上、いかなる場合も立ち入らせてはならない。", "D": "フロント受付後に、お客様、内・外注業者、部品業者が入庫車の移動は安全上、ご遠慮願う。"}, "explanation": "やむを得ずお客様が工場内に入る場合は、帽子・ヘルメット等を着用していただくと共に、必ず案内をつける。「いかなる場合も立ち入らせてはならない」は不適切。", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 31, "label": "問2(31)", "points": 5, "answer": "D", "stem": "平日の定時間外２０時に、Ａ販売会社から日野中型車エンジン始動不良車両のバッテリー中間ケーブル交換（１個）の広域サービス対応依頼が入ったため、安全確保の観点からＢ販売会社のサービスエンジニア２名が１８km先の故障車両までサービスカーで出動した。\nＡ販売会社への請求金額を消費税込みで計算した場合、適切なものはどれか。\n\n※答えが小数点以下になる場合は、小数点以下第一位を四捨五入\n\n【条件】\n・部品代（外注部品バッテリー中間ケーブル）：１，５００円\n・標準作業時間（バッテリー中間ケーブル交換）：０．４時間\n・Ａ販売会社の工賃レート：１０，０００円\n・Ｂ販売会社の工賃レート：１０，５００円\n・サービスカー出張料金：通過車両規定に記載の通り\n・その他費用：通過車両規定に記載の通り", "choices": {"A": "３６，１１０円", "B": "３９，７２１円", "C": "３５，６８４円", "D": "３４，１７７円", "E": "３１，０７０円"}, "explanation": "【計算内訳】\n①サービスカー：8,000＋(400×18)=15,200円 → 振替：15,200×0.9=13,680円\n②外注部品：1,500×0.9=1,350円\n③技術料：10,500×0.4×1.5（定時間外・出張）×0.8=5,040円\n④特別対応料10,000＋体制維持費1,000=11,000円\n\n合計：(13,680＋1,350＋5,040＋11,000)=31,070円\n31,070×1.1=34,177円 → 答えＤ", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 32, "label": "問2(32)", "points": 5, "answer": "A", "stem": "通過車両の業務処理規定に照らし、通過車両のワイパーリンク修理を下記内容で実施した。依頼販売会社への振り替え請求額を消費税込みで計算した場合、適切なものはどれか。\n\n※答えが小数点以下になる場合は、小数点以下第１位を四捨五入\n\n【条件】\n・技術料：１０，０００円（税抜）\n・部品代：１５，０００円（税抜）\n・部品は純正部品（定価）を使用", "choices": {"A": "２２，０００円", "B": "２３，１００円", "C": "２３，６５０円", "D": "２４，７５０円", "E": "２７，５００円"}, "explanation": "【振替計算】通過車両規定による振替控除：技術料・部品代ともに20%控除\n①技術料：10,000×0.8＝8,000円\n②部品代：15,000×0.8＝12,000円\n合計：20,000円\n消費税込み：20,000×1.1＝22,000円 → 答えＡ", "source": "24年HF-1認定1次試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 1, "label": "問1", "points": 3, "answer": "C", "stem": "保証制度に関する記述として、不適切なものはどれか。", "choices": {"A": "保証制度は、お互いに約束（契約）を守って、正しく運用しなければならない。約束（契約）違反は信頼関係を損ない、重大問題に発展する。", "B": "日野自動車製品の取引等に関し、その基本的な事項について、販売会社と日野自動車の代表者間で契約を締結した契約書のことを「日野販売会社基本契約書」と言う。", "C": "日野自動車の保証制度は、販売会社・日野自動車がそれぞれの約束を結び、この約束によって成り立っている。"}, "explanation": "日野自動車の保証制度は、お客様・販売会社・日野自動車の三者がそれぞれの約束を結び、この約束によって成り立っている。", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 2, "label": "問2", "points": 3, "answer": "B", "stem": "外注依頼書の発行に関する記述として、適切なものはどれか。", "choices": {"A": "作業指示書発行後、外注作業が発生した場合は、作業指示書のコピーで対応出来る。", "B": "発注価格が決定しない場合、確定予定日と理由を明記する。", "C": "納期は変わることがあるので、発注時は特に納期を提示する必要はない。"}, "explanation": "外注作業が発生した場合は外注依頼書を発行する（作業指示書コピーは不可）。また、納期は必ず提示しなければならない。", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 3, "label": "問3", "points": 3, "answer": "B", "stem": "見積書に関する記述として、不適切なものはどれか。", "choices": {"A": "分解しないと追加作業が発生するかどうかがわからないものに関しては、見積りの段階で概算の金額であることを伝える。", "B": "見積り段階でお客様に納期を明示する場合、整備時間を正確に把握して作業完了時期と納期を同じタイミングになるよう明示する必要がある。", "C": "見積りを正確なものにするには、受け入れ時のチェックや問診が必要になる。"}, "explanation": "確実な納期とするためには、整備時間を正確に把握することに加え、少しの余裕を持たせる必要がある。作業完了時期と納期を同じにするのは不適切。", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 4, "label": "問4", "points": 3, "answer": "C", "stem": "お客様への説明方法として、適切なものはどれか。", "choices": {"A": "完成時間や整備料金について見通しがつかない場合は、具体的な表現は避ける。", "B": "分解してみなければ正確なことが分からない場合は、誤解を与えないようにあいまいな表現をしておく。", "C": "お客様に技術説明をする場合は、現物や資料を示して説明をする。"}, "explanation": "お客様にはあいまいな表現は避け、具体的に現物や資料を見せて説明をすることが適切。", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 5, "label": "問5", "points": 3, "answer": "C", "stem": "苦情対応に関する記述として、不適切なものはどれか。", "choices": {"A": "お客様の話を親身になってよく聞き、その場で対応できることは迅速に実施する。", "B": "苦情受付後は、速やかに上司に報告する。", "C": "自分で対応できない時は上司へ相談するまでの間に、その場しのぎの回答を行う。"}, "explanation": "対応しきれないことは、すぐに上司へ相談する必要はあるが、その場しのぎの回答は避ける。", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 6, "label": "問6", "points": 3, "answer": "A", "stem": "受付対応や苦情対応に関する記述として、不適切なものはどれか。", "choices": {"A": "事故などお客様にトラブルが発生した際には、まず事故原因など技術的な説明をしてからお客様の気持ちが落ち着くのを待つことが大切である。", "B": "不満を持った顧客のうち、苦情を申し立て、その解決に満足した顧客の再購入決定率は、不満を持ちながら苦情を申し立てない顧客のそれに対して比較的高いと言われている。", "C": "商品やサービスに問題があっても全てが苦情になるわけではなく、信頼関係ができていれば大問題にならない場合もあるが、それに甘えず常に緊張感を持って対応することが必要である。"}, "explanation": "お客様の立場で心境をくみ取る必要があり、まずはお客様の身を案じることが最優先となる。技術的な説明はその後に行う。", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 7, "label": "問7", "points": 3, "answer": "C", "stem": "「通過車両対応に関する業務処理規定」に照らし、「お客様登録リスト」に登録されている車両で、営業時間内に元販売会社へお客様確認をとり修理対応を行なう必要がある項目として、適切なものはどれか。", "choices": {"A": "レッカー対応修理の場合。", "B": "１件１万円以上になると思われる場合。", "C": "保証修理の対象と思われる場合。"}, "explanation": "元販売会社へ確認が必要な項目は：保証修理の対象と思われるもの、事故修理、他メーカー車の修理、1件5万円以上になると思われる場合。レッカーや1万円以上は該当しない。", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 8, "label": "問8", "points": 3, "answer": "A", "stem": "ＨＩＴＯＳＳⅡ作業明細画面の「＊」欄に関する記述として、不適切なものはどれか。", "choices": {"A": "「＋」を入力すると、行を挿入することができる。", "B": "「－」を入力すると、行を削除することができる。", "C": "「Ｍ」を入力すると、その行を移動することができる。移動先には「Ａ」もしくは「Ｂ」を入力する必要がある。"}, "explanation": "「＊」欄は「＋」ではなく、１～９の数字を入力することで数字分だけ行を挿入する。", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 9, "label": "問9", "points": 3, "answer": "A", "stem": "手形、小切手、領収書に関する記述として、不適切なものはどれか。", "choices": {"A": "手形・小切手を受け取った際の確認ポイントとして、受取人の名前、支払金額、支払日、振出日、被裏書人欄など全て記載されていない場合は無効になる。", "B": "手形の記載金額が１０万円以上の場合、印紙税法により収入印紙を貼ることが定められており、貼り付けられた印紙に消印を押す理由として、一度使った収入印紙が再度使われることを防ぐためである。", "C": "領収書の保存、保管期間は請求書などと同様に帳簿類の記載事項の証拠書類となるため１０年分の保管が必要である。"}, "explanation": "被裏書人欄に何も記載しなくても「白地式裏書」として渡すことができ、白地式裏書の場合には裏書が連続しているとみなされる。被裏書人欄が空欄でも有効。", "source": "24年HF-2認定試験", "freeAnswer": false, "multi": false, "invalid": false}, {"no": 10, "label
