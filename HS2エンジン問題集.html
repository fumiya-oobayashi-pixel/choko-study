  {no:2, cat:"エンジン制御", stem:"ディーゼルスロットル制御の目的に関する記述として、適切なものはどれか。",

  {no:3, cat:"エンジン制御", stem:"コモンレール式燃料噴射制御に含まれる制御の組み合わせとして、適切なものはどれか。",

  {no:4, cat:"エンジン制御", stem:"エンジン停止時のディーゼルスロットル制御に関する記述として、適切なものはどれか。",

  {no:7, cat:"エンジン制御", stem:"EGRシステムの機能に関する記述として、適切なものはどれか。",

     A:"排出ガスの一部を吸気側に戻し、シリンダー内の燃焼を緩慢にさせ燃焼温度を低くすることでNOxの発生を低減させる",

     C:"排出ガスの一部をDPRフィルターに送り、PM（粒子状物質）を捕集・除去する",

  {no:8, cat:"エンジン制御", stem:"PTO作動許可条件に関する記述として、適切なものはどれか。",

  {no:11, cat:"エンジン制御", stem:"スピードリミッター制御に関する記述として、適切なものはどれか。",
   answer:"B",

  {no:12, cat:"コモンレール燃料噴射", stem:"コモンレール式電子制御燃料噴射システムの特徴に関する記述として、適切なものはどれか。",

  {no:13, cat:"コモンレール燃料噴射", stem:"日野自動車で用いられるサプライポンプの種類と用途に関する記述として、適切なものはどれか。",

  {no:15, cat:"DPR制御", stem:"DPRシステムが排気ガス中から捕集・除去する主な成分に関する記述として、適切なものはどれか。",

  {no:21, cat:"尿素SCR制御", stem:"EGRシステムとSCRシステムの役割に関する記述として、適切なものはどれか。",

  {no:22, cat:"尿素SCR制御", stem:"DCU（制御ユニット）によるNOx浄化率の計算方法に関する記述として、適切なものはどれか。",

  {no:24, cat:"尿素SCR制御", stem:"尿素SCRシステムにおけるアンモニアの生成メカニズムに関する記述として、適切なものはどれか。",

  {no:41, cat:"DPR制御", stem:"ATC（アフターターボキャタリスト）に関する記述として、適切なものはどれか。",

  {no:42, cat:"尿素SCR", stem:"尿素SCRシステムと HC-SCRシステムの採用車種に関する記述として、適切なものはどれか。",
   answer:"A",

  {no:43, cat:"尿素SCR", stem:"尿素SCRシステムにおけるNOx還元の原理に関する記述として、適切なものはどれか。",

     C:"尿素水はそのままNOxと直接反応し、NOxをN2とCO2に分解する",
     D:"NH3スリップ触媒でNOxを分解し、残留したアンモニアをFR-DOCで処理する"
   },
   explanation:"マフラーユニットに流入したNOは、FR-DOCの作用によってNO2に酸化され、NOxはNO：NO2の比率が1：1になる。尿素水インジェクターで噴射された尿素水はアンモニアとCO2に分解され、アンモニアが尿素SCR触媒でNOxと反応してN2とH2Oに変化する。残留したアンモニアはNH3スリップ触媒でN2とH2Oに分解される。正解はB。"},

  {no:44, cat:"尿素SCR", stem:"NH3スリップ触媒の役割に関する記述として、適切なものはどれか。",

   },

  {no:45, cat:"尿素SCR", stem:"尿素水の凍結温度とシステムの解凍・保温制御に関する記述として、適切なものはどれか。",

  {no:46, cat:"尿素SCR", stem:"尿素水残量が無くなった場合（第2段階）の対応に関する記述として、適切なものはどれか。",

  {no:48, cat:"HC-SCR", stem:"HC-SCRシステムの概要に関する記述として、適切なものはどれか。",

  {no:49, cat:"HC-SCR", stem:"HC-SCRシステムにおけるFR-DOCの機能に関する記述として、適切なものはどれか。",

  {no:50, cat:"HC-SCR", stem:"FCV（燃料遮断弁）の作動に関する記述として、適切なものはどれか。",

  {no:52, cat:"故障診断", stem:"エンジン出力不足の原因調査の基本的な進め方に関する記述として、適切なものはどれか。",

  {no:53, cat:"故障診断", stem:"フューエルフィルターの詰まりによる症状とその推定原因に関する記述として、適切なものはどれか。",

     B:"粗悪燃料を使用するとエンジン出力が向上するが、燃費が悪化する",

let current = 0;
let answers = new Array(questions.length).fill(null);

function render() {
  const q = questions[current];
  const answered = answers[current] !== null;
  document.getElementById('prog').textContent = current+1 + ' / ' + questions.length;
  document.getElementById('barfill').style.width = (((current+1)/questions.length)*100) + '%';

  let html = '<div class="section-badge">' + q.cat + '</div>' +
  '<div class="qtitle">問' + q.no + '</div>' +
  '<div class="qstem">' + q.stem + '</div>' +
  '<div class="choices">';

  const choiceKeys = ['A','B','C','D'];
  choiceKeys.forEach(function(k) {
    let cls = 'choice';
    if(answered) {
      if(k === q.answer) cls += ' correct';
      else if(k === answers[current]) cls += ' wrong';
    } else if(answers[current] === k) cls += ' selected';
    html += '<button class="' + cls + '" onclick="select(\'' + k + '\')"><span class="label">' + k + '</span><span>' + q.choices[k] + '</span></button>';
  });

  html += '</div>';
  if(answered) {
    html += '<div class="explanation show">&#128161; ' + q.explanation + '</div>';
  }

  document.getElementById('quiz').innerHTML = html;
  document.getElementById('nextBtn').textContent = current === questions.length-1 ? '結果を見る' : '次へ ▶';
}

function select(k) {
  if(answers[current] !== null) return;
  answers[current] = k;
  render();
}

function nextQ() {
  if(current === questions.length-1) { showResult(); return; }
  current++;
  render();
}

function prevQ() {
  if(current > 0) { current--; render(); }
}

function showResult() {
  document.getElementById('nav').style.display = 'none';
  document.getElementById('quiz').style.display = 'none';
  const correct = answers.filter(function(a,i){ return a === questions[i].answer; }).length;
  const total = questions.length;
  const pct = Math.round(correct / total * 100);

  // Firebase保存
  if (typeof window._saveELResult === 'function') window._saveELResult(correct, total);

  // 間違い問題リスト
  let wrongHtml = '';
  const wrongs = questions.filter(function(q,i){ return answers[i] !== q.answer; });
  if (wrongs.length > 0) {
    wrongHtml = '<div style="margin-top:16px;border-top:1px solid #eee;padding-top:12px">' +
      '<div style="font-weight:700;font-size:13px;color:#dc2626;margin-bottom:8px">❌ 間違えた問題 (' + wrongs.length + '問)</div>';
    wrongs.forEach(function(q, i) {
      wrongHtml += '<div style="background:#fff5f5;border-left:3px solid #dc2626;padding:8px 10px;border-radius:6px;margin-bottom:6px;font-size:12px">';
      wrongHtml += '<div style="font-weight:700;color:#dc2626;margin-bottom:3px">Q' + q.no + '.</div>';
      wrongHtml += '<div style="color:#333;line-height:1.5">' + q.stem.substring(0, 60) + (q.stem.length > 60 ? '…' : '') + '</div>';
      wrongHtml += '<div style="color:#16a34a;font-weight:700;margin-top:3px">正解：' + q.answer + '　' + (q.choices[q.answer] || '') + '</div>';
      wrongHtml += '</div>';
    });
    wrongHtml += '</div>';
  } else {
    wrongHtml = '<div style="margin-top:12px;color:#16a34a;font-weight:700;font-size:15px">🎉 全問正解！</div>';
  }

  document.getElementById('result').style.display = 'block';
  document.getElementById('result').innerHTML =
    '<div class="result">' +
    '<div style="font-weight:900;font-size:18px">📊 結果</div>' +
    '<div class="score-big">' + correct + ' / ' + total + '</div>' +
    '<div style="font-size:14px;color:#666">' + pct + '点</div>' +
    wrongHtml +
    '<div class="actions" style="margin-top:16px;display:grid;gap:10px">' +
    '<button onclick="location.reload()" style="padding:14px;border:none;border-radius:12px;background:#2563eb;color:#fff;font-size:15px;font-weight:700;cursor:pointer;width:100%">🔄 もう一度</button>' +
    '<a href="./index.html" style="display:block;padding:14px;border-radius:12px;background:#1e3a5f;color:#fff;font-size:15px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none">🏠 ホームへ戻る</a>' +
    '</div>' +
    '</div>';
  window.scrollTo(0, 0);
}

render();
</script>
<script src="./firebase-config.js"></script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, deleteDoc, serverTimestamp, increment } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
const SOURCE_KEY = document.title.replace(/[\s\u3000]/g,'_').replace(/[^\w\u3040-\u9FFF_]/g,'');
try {
  const app = initializeApp(FIREBASE_CONFIG);
  const auth = getAuth(app);
  const db = getFirestore(app);
  onAuthStateChanged(auth, user => {
    window._fbUser = user;
    window._fbDb = db;
    window._fbSrc = SOURCE_KEY;
  });
} catch(e) { console.warn('Firebase init:', e.message); }
window._saveELResult = function(correct, total) {
  const user = window._fbUser, db = window._fbDb, src = window._fbSrc;
  if (!user || !db) return;
  questions.forEach(function(q, i) {
    const isCorrect = answers[i] === q.answer;
    const key = src + '_q' + q.no;
    if (isCorrect) {
      deleteDoc(doc(db, 'users', user.uid, 'wrongAnswers', key)).catch(function(){});
    } else if (answers[i] !== null && answers[i] !== undefined) {
      setDoc(doc(db, 'users', user.uid, 'wrongAnswers', key), {
        source: src, qNo: q.no, label: 'Q' + q.no,
        stem: (q.stem || '').substring(0, 120),
        timestamp: serverTimestamp(),
        url: window.location.pathname
      }, {merge: true}).catch(function(){});
      setDoc(doc(db, 'users', user.uid, 'wrongHistory', key), {
        source: src, qNo: q.no, label: 'Q' + q.no,
        stem: (q.stem || '').substring(0, 120),
        firstWrong: serverTimestamp(),
        url: window.location.pathname
      }, {merge: true}).catch(function(){});
    }
  });
  setDoc(doc(db, 'users', user.uid, 'stats', src), {
    source: src, lastCorrect: correct, lastTotal: total,
    lastDate: serverTimestamp(), totalAttempts: increment(1)
  }, {merge: true}).catch(function(){});
};
</script>
