  {no:1, cat:"エンジン", stem:"エンジンの制御システムの構成に関する記述として、適切なものはどれか。",

   choices:{
     A:"「入力系」「制御系」「出力系」の3つから構成される",

  {no:2, cat:"エンジン", stem:"ディーゼルスロットル制御の目的に関する記述として、適切なものはどれか。",

  {no:3, cat:"エンジン", stem:"コモンレール式燃料噴射制御に含まれる制御の組み合わせとして、適切なものはどれか。",

  {no:4, cat:"エンジン", stem:"エンジン停止時のディーゼルスロットル制御に関する記述として、適切なものはどれか。",

  {no:5, cat:"エンジン", stem:"インテークエアヒーターの制御基準に関する記述として、適切なものはどれか。",

  {no:6, cat:"エンジン", stem:"EGRバルブの種類と駆動方式に関する記述として、適切なものはどれか。",

  {no:7, cat:"エンジン", stem:"EGRシステムの機能に関する記述として、適切なものはどれか。",
   answer:"A",
   choices:{
     A:"排出ガスの一部を吸気側に戻し、シリンダー内の燃焼を緩慢にさせ燃焼温度を低くすることでNOxの発生を低減させる",
     B:"排出ガスの一部を吸気側に戻し、シリンダー内の酸素濃度を高めることで燃焼効率を上げる",
     C:"排出ガスの一部をDPRフィルターに送り、PM（粒子状物質）を捕集・除去する",

   },

  {no:8, cat:"エンジン", stem:"PTO作動許可条件に関する記述として、適切なものはどれか。",

     C:"PTOポジションスイッチがONで、エンジンがオーバーヒート状態であっても作動許可となる",

  {no:10, cat:"エンジン", stem:"スターターブロック制御に関する記述として、適切なものはどれか。",

  {no:11, cat:"エンジン", stem:"スピードリミッター制御に関する記述として、適切なものはどれか。",
   answer:"B",

  {no:12, cat:"エンジン", stem:"コモンレール式電子制御燃料噴射システムの特徴に関する記述として、適切なものはどれか。",

  {no:13, cat:"エンジン", stem:"日野自動車で用いられるサプライポンプの種類と用途に関する記述として、適切なものはどれか。",

let current = 0;
let answers = new Array(questions.length).fill(null);

function render() {
  const q = questions[current];
  const answered = answers[current] !== null;
  document.getElementById('prog').textContent = current+1 + ' / ' + questions.length;
  document.getElementById('barfill').style.width = (((current+1)/questions.length)*100) + '%';

  let html = '<div class="section-badge">' + q.cat + '</div>' +
  '<div class="qtitle">問' + q.no + '</div>' +
  '<div class="qstem">' + q.stem + '</div>' +
  '<div class="choices">';

  const choiceKeys = ['A','B','C','D'];
  choiceKeys.forEach(function(k) {
    let cls = 'choice';
    if(answered) {
      if(k === q.answer) cls += ' correct';
      else if(k === answers[current]) cls += ' wrong';
    } else if(answers[current] === k) cls += ' selected';
    html += '<button class="' + cls + '" onclick="select(\'' + k + '\')"><span class="label">' + k + '</span><span>' + q.choices[k] + '</span></button>';
  });

  html += '</div>';
  if(answered) {
    html += '<div class="explanation show">&#128161; ' + q.explanation + '</div>';
  }

  document.getElementById('quiz').innerHTML = html;
  document.getElementById('nextBtn').textContent = current === questions.length-1 ? '結果を見る' : '次へ ▶';
}

function select(k) {
  if(answers[current] !== null) return;
  answers[current] = k;
  render();
}

function nextQ() {
  if(current === questions.length-1) { showResult(); return; }
  current++;
  render();
}

function prevQ() {
  if(current > 0) { current--; render(); }
}

function showResult() {
  document.getElementById('nav').style.display = 'none';
  document.getElementById('quiz').style.display = 'none';
  const correct = answers.filter(function(a,i){ return a === questions[i].answer; }).length;
  const total = questions.length;
  const pct = Math.round(correct / total * 100);

  // Firebase保存
  if (typeof window._saveELResult === 'function') window._saveELResult(correct, total);

  // 間違い問題リスト
  let wrongHtml = '';
  const wrongs = questions.filter(function(q,i){ return answers[i] !== q.answer; });
  if (wrongs.length > 0) {
    wrongHtml = '<div style="margin-top:16px;border-top:1px solid #eee;padding-top:12px">' +
      '<div style="font-weight:700;font-size:13px;color:#dc2626;margin-bottom:8px">❌ 間違えた問題 (' + wrongs.length + '問)</div>';
    wrongs.forEach(function(q, i) {
      wrongHtml += '<div style="background:#fff5f5;border-left:3px solid #dc2626;padding:8px 10px;border-radius:6px;margin-bottom:6px;font-size:12px">';
      wrongHtml += '<div style="font-weight:700;color:#dc2626;margin-bottom:3px">Q' + q.no + '.</div>';
      wrongHtml += '<div style="color:#333;line-height:1.5">' + q.stem.substring(0, 60) + (q.stem.length > 60 ? '…' : '') + '</div>';
      wrongHtml += '<div style="color:#16a34a;font-weight:700;margin-top:3px">正解：' + q.answer + '　' + (q.choices[q.answer] || '') + '</div>';
      wrongHtml += '</div>';
    });
    wrongHtml += '</div>';
  } else {
    wrongHtml = '<div style="margin-top:12px;color:#16a34a;font-weight:700;font-size:15px">🎉 全問正解！</div>';
  }

  document.getElementById('result').style.display = 'block';
  document.getElementById('result').innerHTML =
    '<div class="result">' +
    '<div style="font-weight:900;font-size:18px">📊 結果</div>' +
    '<div class="score-big">' + correct + ' / ' + total + '</div>' +
    '<div style="font-size:14px;color:#666">' + pct + '点</div>' +
    wrongHtml +
    '<div class="actions" style="margin-top:16px;display:grid;gap:10px">' +
    '<button onclick="location.reload()" style="padding:14px;border:none;border-radius:12px;background:#2563eb;color:#fff;font-size:15px;font-weight:700;cursor:pointer;width:100%">🔄 もう一度</button>' +
    '<a href="./index.html" style="display:block;padding:14px;border-radius:12px;background:#1e3a5f;color:#fff;font-size:15px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none">🏠 ホームへ戻る</a>' +
    '</div>' +
    '</div>';
  window.scrollTo(0, 0);
}

render();
</script>
<script>
// ?q=N 復習モード（マイページ復習フォルダから遷移時）
(function(){
  var qParam = new URLSearchParams(location.search).get('q');
  if (!qParam) return;
  var qi = questions.findIndex(function(q){ return q.no === parseInt(qParam); });
  if (qi < 0) return;
  current = qi;
  render();

  // 選択後に即時フィードバックオーバーレイを表示
  var _origSelect = select;
  select = function(k) {
    if (answers[current] !== null) return;
    _origSelect(k);
    var q = questions[current];
    var isCorrect = k === q.answer;
    // Firebase更新（正解→削除、不正解→保存）
    (function(){
      var u=window._fbUser, d=window._fbDb, s=window._fbSrc;
      if(!u||!d||!s) return;
      import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js').then(function(m){
        var key=s+'_q'+q.no;
        if(isCorrect){
          m.deleteDoc(m.doc(d,'users',u.uid,'wrongAnswers',key)).catch(function(){});
        } else {
          m.setDoc(m.doc(d,'users',u.uid,'wrongAnswers',key),{
            source:s,qNo:q.no,label:'Q'+q.no,
            stem:(q.stem||'').substring(0,120),
            timestamp:m.serverTimestamp(),
            url:window.location.pathname
          },{merge:true}).catch(function(){});
          m.setDoc(m.doc(d,'users',u.uid,'wrongHistory',key),{
            source:s,qNo:q.no,label:'Q'+q.no,
            stem:(q.stem||'').substring(0,120),
            firstWrong:m.serverTimestamp(),
            url:window.location.pathname
          },{merge:true}).catch(function(){});
        }
      });
    })();
    _showElReviewOverlay(q, isCorrect);
  };

  function _showElReviewOverlay(q, isCorrect) {
    var old=document.getElementById('_el_rov'); if(old) old.remove();
    var col=isCorrect?'#059669':'#dc2626';
    var ansHtml=!isCorrect
      ?'<div style="margin:8px 0;font-size:.9rem;color:#1d4ed8;font-weight:700">正解: '+q.answer+'　'+(q.choices[q.answer]||'')+'</div>'
      :'';
    var expHtml=q.explanation
      ?'<div style="margin-top:12px;text-align:left;background:#f8fafc;border-radius:8px;padding:12px;font-size:.82rem;line-height:1.7;color:#374151;max-height:200px;overflow-y:auto">'+q.explanation.replace(/\n/g,'<br>')+'</div>'
      :'';
    var nextBtn=(function(){
      var rq=JSON.parse(sessionStorage.getItem('reviewQueue')||'[]');
      var next=rq.length?rq[0]:null;
      if(next){rq.shift();sessionStorage.setItem('reviewQueue',JSON.stringify(rq));}
      var left=rq.length;
      return next
        ?'<a href="'+next+'" style="display:inline-block;margin-top:10px;margin-left:8px;padding:12px 24px;background:#059669;color:white;border-radius:10px;text-decoration:none;font-weight:700;font-size:.9rem">▶ 次の復習問題（残'+left+'問）</a>'
        :'<div style="margin-top:12px;font-size:.85rem;color:#059669;font-weight:700">✅ この単元の復習完了！</div>';
    })();
    var ov=document.createElement('div');
    ov.id='_el_rov';
    ov.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.65);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;box-sizing:border-box';
    ov.innerHTML='<div style="background:white;border-radius:16px;padding:24px;max-width:480px;width:100%;text-align:center;font-family:-apple-system,Meiryo,sans-serif">'
      +'<div style="font-size:2.4rem">'+(isCorrect?'✅':'❌')+'</div>'
      +'<div style="font-size:1.25rem;font-weight:900;color:'+col+';margin:8px 0">'+(isCorrect?'正解！':'不正解')+'</div>'
      +ansHtml+expHtml
      +'<div style="margin-top:20px">'
      +'<a href="./mypage.html" style="display:inline-block;padding:12px 24px;background:#1e3a5f;color:white;border-radius:10px;text-decoration:none;font-weight:700;font-size:.9rem">📁 マイページへ戻る</a>'
      +nextBtn
      +'</div></div>';
    document.body.appendChild(ov);
  }
})();
</script>

<script src="./firebase-config.js"></script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, deleteDoc, serverTimestamp, increment } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// e-learning カテゴリ → レーダーチャートカテゴリ マッピング
const _EL_CAT_MAP = {
  'エンジン制御':'エンジン','コモンレール燃料噴射':'エンジン',
  'DPR制御':'エンジン','尿素SCR制御':'エンジン','尿素SCR':'エンジン',
  'HC-SCR制御':'エンジン','HC-SCR':'エンジン','故障診断':'エンジン',
  'ディーゼルエンジン':'エンジン','エンジン本体':'エンジン',
  '潤滑・冷却':'エンジン','燃料装置':'エンジン','エンジン':'エンジン',
  '測定具':'エンジン','油脂':'エンジン','定期点検整備':'エンジン',
  '動力伝達装置':'T/M','動力伝達':'T/M',
  '制動装置':'ブレーキ',
  '操舵走行装置':'シャシ・フレーム','シャシ':'シャシ・フレーム',
  '電気装置':'電気装置','電気':'電気装置',
  '法律':'法令','法令':'法令',
  '安全':'新装置・一般','仕様':'新装置・一般','自動車概要':'新装置・一般',
};
const SOURCE_KEY = document.title.replace(/[\s\u3000]/g,'_').replace(/[^\w\u3040-\u9FFF_]/g,'');
try {
  const app = initializeApp(FIREBASE_CONFIG);
  const auth = getAuth(app);
  const db = getFirestore(app);
  onAuthStateChanged(auth, user => {
    window._fbUser = user;
    window._fbDb = db;
    window._fbSrc = SOURCE_KEY;
  });
  // selectをラップ: 解答ごとにcatStats更新
  const _elOrigSel = window.select;
  window.select = function(k) {
    _elOrigSel(k);
    const user = window._fbUser, db = window._fbDb;
    if (!user || !db) return;
    const q = questions[current];
    if (!q) return;
    const isCorrect = k === q.answer;
    const mappedCat = _EL_CAT_MAP[q.cat] || q.cat || 'エンジン';
    setDoc(doc(db, 'users', user.uid, 'catStats', mappedCat), {
      total: increment(1),
      correct: increment(isCorrect ? 1 : 0)
    }, {merge: true}).catch(() => {});
  };

} catch(e) { console.warn('Firebase init:', e.message); }
window._saveELResult = function(correct, total) {
  const user = window._fbUser, db = window._fbDb, src = window._fbSrc;
  if (!user || !db) return;
  questions.forEach(function(q, i) {
    const isCorrect = answers[i] === q.answer;
    const key = src + '_q' + q.no;
    if (isCorrect) {
      deleteDoc(doc(db, 'users', user.uid, 'wrongAnswers', key)).catch(function(){});
    } else if (answers[i] !== null && answers[i] !== undefined) {
      setDoc(doc(db, 'users', user.uid, 'wrongAnswers', key), {
        source: src, qNo: q.no, label: 'Q' + q.no,
        stem: (q.stem || '').substring(0, 120),
        cat: q.cat || '',
        timestamp: serverTimestamp(),
        url: window.location.pathname
      }, {merge: true}).catch(function(){});
      setDoc(doc(db, 'users', user.uid, 'wrongHistory', key), {
        source: src, qNo: q.no, label: 'Q' + q.no,
        stem: (q.stem || '').substring(0, 120),
        firstWrong: serverTimestamp(),
        url: window.location.pathname
      }, {merge: true}).catch(function(){});
    }
  });
  setDoc(doc(db, 'users', user.uid, 'stats', src), {
    source: src, lastCorrect: correct, lastTotal: total,
    lastDate: serverTimestamp(), totalAttempts: increment(1)
  }, {merge: true}).catch(function(){});
};
</script>
