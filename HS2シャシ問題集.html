<script>
const questions = [
  {no:1, cat:"動力伝達装置", stem:"日野自動車の小型トラックHVシステムに関する記述として、適切なものはどれか。", answer:"B",
   choices:{A:"シリーズ（直列）ハイブリッドシステムが採用されており、エンジンとモーターの両方でタイヤを駆動する。",B:"パラレル（並列）ハイブリッドシステムが採用されており、モータージェネレーターはクラッチとトランスミッションの間に配置されている。",C:"パラレル・シリーズハイブリッドシステムが採用されており、プラネタリーギアを用いた動力分割機構を持つ。",D:"シリーズ（直列）ハイブリッドシステムが採用されており、一般的なスターターモーターも搭載されている。"},
   explanation:"正解はB。日野自動車の小型トラックHVはパラレル（並列）ハイブリッドシステムを採用。モータージェネレーターはクラッチとトランスミッションの間に配置される。また、スターター機能はモータージェネレーターが担うため、一般的なスターターモーターは搭載されていない。"},

  {no:2, cat:"動力伝達装置", stem:"小型トラックHVのエネルギー回生機能に関する記述として、適切なものはどれか。", answer:"C",
   choices:{A:"加速時にHV-ECUが加速状態を判断し、モータージェネレーターを発電機として機能させ回生する。",B:"常時モータージェネレーターが発電機として機能し、HVバッテリーに充電を続ける。",C:"HV-ECUが減速状態（エンジンブレーキがかかっている状態）を判断すると、インバーターがモータージェネレーターを発電機として機能させ、車両の運動エネルギーを電気エネルギーに変換してHVバッテリーに蓄電する。",D:"フットブレーキを踏んだときのみ回生が行われ、エンジンブレーキ時には回生は行われない。"},
   explanation:"正解はC。エネルギー回生機能は、HV-ECUが減速状態（エンジンブレーキがかかっている状態）を判断したときに作動する。モータージェネレーターが発電機として機能し、運動エネルギーを電気エネルギーに変換してHVバッテリーに蓄電しながら車両を減速させる。"},

  {no:3, cat:"動力伝達装置", stem:"CHV（クールハイブリッド）システムに関する記述として、不適切なものはどれか。", answer:"D",
   choices:{A:"CHVシステムはFR1E型車およびFW1E型車に設定されている。",B:"スタンバイ機能を標準装備し、外部電源が使用可能な場所ではエンジン停止中でも上物の駆動が可能である。",C:"CHVのモータージェネレーターは、小型HV車とは異なり、始動時や車両駆動には使用しない。",D:"CHVのHVバッテリーは、バッテリー残存容量が高ければ、加速・定常走行時だけでなくDレンジで停車中でも発電効率が高く、積極的に電動冷凍機へ電力供給する。"},
   explanation:"正解はD（不適切）。CHVの注意事項として、Dレンジで停車すると発電効率の低下につながり、HVバッテリーの残存容量が低下する場合がある。停車時は発電に不利であるため、注意が必要。"},

  {no:4, cat:"動力伝達装置", stem:"プロシフト12（高圧エア式）のクラッチストロークセンサーに関する記述として、適切なものはどれか。", answer:"A",
   choices:{A:"ロッドを介してクラッチレリーズレバーの動きを検出し、クラッチストロークを電気信号に置き換えてECUへ送る。また、クラッチフェーシングの摩耗限度位置の検出も兼ねている。",B:"クラッチストロークセンサーの電圧値によるクラッチフェーシングの摩耗検出は、オート操作時にのみ限定される。",C:"クラッチディスク交換時はクラッチストロークセンサーの電圧を3.5Vに調整する。",D:"摩耗検出は基準電流からの電流変化量で行われ、基準電流を学習する機能を持つ。"},
   explanation:"正解はA。クラッチストロークセンサーはレリーズレバーの動きを電気信号に変換しECUへ送るとともに、摩耗限度位置の検出も行う。検出はオート・マニュアル両方の操作時に行われ（オート操作時限定ではない）、クラッチディスク交換時は電圧を2.5Vに調整する。"},

  {no:5, cat:"動力伝達装置", stem:"プロシフト6特有の制御として、1速またはRへの変速操作に関する記述として、適切なものはどれか。", answer:"B",
   choices:{A:"1速またはRに変速する際、直接目標ギヤへギヤ入れを行う。",B:"1速またはRに変速する際、一度2速へ変速しカウンターシャフトの回転を止めてから、1速またはRへのギヤ入れを行う。ただし、トランスミッション油温が低い場合は直接目標ギヤへギヤ入れを行う。",C:"1速またはRに変速する際、一度2速へ変速しカウンターシャフトの回転を止めてから、1速またはRへのギヤ入れを行う。トランスミッション油温にかかわらず常にこの制御を行う。",D:"1速またはRに変速する際、一度ニュートラルへ変速し、その後目標ギヤへギヤ入れを行う。"},
   explanation:"正解はB。プロシフト6では1速・R変速時は一度2速へ変速してカウンターシャフトの回転を止めてからギヤ入れを行う。ただし、トランスミッション油温が高い場合は直接目標ギヤへギヤ入れを行う（油温が低い場合ではなく高い場合が例外）。"},

  {no:6, cat:"動力伝達装置", stem:"アリソン製オートマチックトランスミッションのロックアップ制御に関する記述として、適切なものはどれか。", answer:"C",
   choices:{A:"全段でロックアップが作動し、R（リバース）でも作動する。",B:"3速以上でロックアップが作動し、2速への変速完了後にロックアップクラッチを締結する。",C:"2速以上は全段ロックアップで、2速への変速完了後にタービン回転数がポンプ回転数に近づいたときにロックアップクラッチを締結する。ロックアップはR、Nおよび1速では作動しない。",D:"1速以上は全段ロックアップが作動し、アイドル時のみロックアップは解除される。"},
   explanation:"正解はC。アリソン製ATMのロックアップ制御は2速以上の全段で作動する。2速への変速完了後、タービン回転数がポンプ回転数に近づいたときにロックアップクラッチを締結する。R・N・1速ではロックアップは作動しない。"},

  {no:7, cat:"動力伝達装置", stem:"プラネタリーギヤの作動で、サンギヤが固定、プラネタリーキャリアが出力、インターナルギヤが入力の場合に関する記述として、適切なものはどれか。", answer:"A",
   choices:{A:"トルクは増加して出力される。",B:"トルクは減少して出力される。",C:"入力と同じトルクで出力される。",D:"逆回転方向で出力される。"},
   explanation:"正解はA。サンギヤ固定・プラネタリーキャリア出力・インターナルギヤ入力の場合、減速比が1以上となりトルクは増加して出力される。これはATMの変速制御の基本原理である。"},

  {no:8, cat:"動力伝達装置", stem:"MZ12プロシフトのトランスミッション構成に関する記述として、適切なものはどれか。", answer:"D",
   choices:{A:"メイン部分は前進4段、後退2段で、スプリッターとレンジを組み合わせて前進16段の変速を行う。",B:"メイン部分は前進3段、後退1段で、スプリッターのみを組み合わせて前進6段の変速を行う。",C:"レンジには2軸かみ合い式を採用し、メインおよびスプリッターには遊星ギヤ式を採用している。",D:"メイン部分は前進3段、後退1段で、スプリッターとレンジを組み合わせて前進12段、後退2段の変速を行う。レンジには遊星ギヤ式を採用している。"},
   explanation:"正解はD。MZ12プロシフトはメイン前進3段・後退1段で、スプリッターとレンジ（各Hi/Lo 2段）の組み合わせにより前進12段・後退2段を実現する。メインおよびスプリッターは2軸かみ合い式、レンジには大容量で省スペース性に優れた遊星ギヤ式を採用。"},

  {no:9, cat:"動力伝達装置", stem:"HVバッテリーの充電容量（SOC）に関する記述として、適切なものはどれか。", answer:"C",
   choices:{A:"SOCはHVバッテリー電流とHVバッテリー電圧のみから算出される。",B:"SOCはHVバッテリー温度のみから算出される。",C:"SOCはHVバッテリー電流・HVバッテリー電圧・HVバッテリー温度から算出される。",D:"SOCはインバーターの温度と電流から算出される。"},
   explanation:"正解はC。SOC（State of Charge：充電容量）は、HVバッテリー電流・電圧・温度の3つの情報から算出される。これらの情報はBMU（バッテリーマネジメントユニット）が監視している。"},

  {no:10, cat:"動力伝達装置", stem:"プロシフト12（モーター式）に関する記述として、適切なものはどれか。", answer:"B",
   choices:{A:"プロシフトECUはセレクトレバーの情報のみから状況を判断し、シフトユニットを制御する。",B:"プロシフトECUはセレクトレバー・各センサー・各スイッチ等の情報から状況を判断し、あらかじめ記憶された変速マップをもとに、シフトユニット・セレクトユニット・ACUを制御する。",C:"モーター式はエア圧を利用してシフト操作を行うため、ロープレッシャースイッチが主要な構成部品となる。",D:"シフトユニットとACUは連動しておらず、それぞれ独立して制御される。"},
   explanation:"正解はB。プロシフト12モーター式では、プロシフトECUがセレクトレバー・各センサー・各スイッチ等の情報から状況を判断し、変速マップをもとにシフトユニット・セレクトユニット・ACUを制御する。"},

  {no:11, cat:"制動装置", stem:"ABSに関する記述として、適切なものはどれか。", answer:"A",
   choices:{A:"ABSは車軸に装着された車輪速センサーにより常時車輪の回転状況を監視し、ブレーキ作動中にいずれかの車輪がロック傾向になるとABS ECUがABSアクチュエーターに信号を送り、ブレーキ圧力を保持・減圧して車輪のロックを防止する装置である。",B:"ABSはブレーキ作動中に全ての車輪が同時にロックしたときのみ作動し、個別の車輪のロックには対応しない。",C:"ABSは車速センサーとステアリングセンサーの両方の信号を使用して作動する。",D:"ABSはブレーキ圧力を増圧する方向のみに制御を行い、減圧制御は行わない。"},
   explanation:"正解はA。ABSは車輪速センサーで各車輪の回転を常時監視し、いずれかの車輪がロック傾向を示すとABS ECUがアクチュエーターへ信号を送り、ブレーキ圧力を保持・減圧してロックを防止し、車両の安定性を確保する。"},

  {no:12, cat:"制動装置", stem:"EBSに関する記述として、適切なものはどれか。", answer:"D",
   choices:{A:"EBSは油圧ブレーキシステムの油圧による制御回路の一部を電気信号に置き換えたシステムである。",B:"EBSを導入しても、ブレーキの作動タイムラグは従来のフルエアブレーキと変わらない。",C:"EBSではブレーキの効き遅れは低減できるが、解除遅れの低減は難しい。",D:"EBSは従来のフルエアブレーキシステムのエア圧による制御回路の一部を電気信号にしたシステムで、ブレーキペダル操作に対して追従性が良く、ブレーキの効き遅れや解除遅れが低減でき、車両の停止距離を短縮できる効果がある。"},
   explanation:"正解はD。EBS（エレクトロニックブレーキシステム）はフルエアブレーキのエア制御回路の一部を電気信号化したシステム。ブレーキペダル操作への追従性が向上し、効き遅れ・解除遅れの両方が低減でき、停止距離の短縮効果がある。"},

  {no:13, cat:"制動装置", stem:"TRC・ASRに関する記述として、不適切なものはどれか。", answer:"C",
   choices:{A:"TRC・ASRは、滑りやすい路面での発進・加速時に駆動輪にトルクが作用した際、タイヤと路面のスリップ率を適正に制御する機能である。",B:"TRC・ASRは、駆動輪のスリップ時にエンジン出力も制御する。",C:"TRCとASRは同様な機能を持つが、TRC・ASRともに制御はブレーキ制御のみで行われ、エンジン制御は行わない。",D:"日野自動車では小型トラックにはTRC、中・大型トラックにはASRの名称を用いている。"},
   explanation:"正解はC（不適切）。TRC・ASRはブレーキ制御のみではなく、駆動輪スリップ時にエンジン出力も制御する。ブレーキ制御とエンジン制御の両方を組み合わせてスリップを防ぐ。"},

  {no:14, cat:"制動装置", stem:"EBD（エレクトリックブレーキフォースディストリビューション）に関する記述として、適切なものはどれか。", answer:"B",
   choices:{A:"EBDは、積車時における前輪の荷重増加状態において前輪のスリップを検知すると、前輪液圧を増加させる機能である。",B:"EBDは、空車時における後輪の荷重減少状態において後輪のスリップを検知すると、後輪液圧を保持し、リヤブレーキのABS早期作動を抑制して車両の安定性を確保する機能である。",C:"EBDは全車輪に均等なブレーキ力を配分する機能で、前後の荷重変化に対応していない。",D:"EBDはABSとは独立して作動し、ABS作動中はEBDは機能しない。"},
   explanation:"正解はB。EBDは空車時（後輪の荷重が減少した状態）に後輪がスリップしやすいことに対応した機能。後輪のスリップを検知すると後輪液圧を保持してリヤブレーキのABS早期作動を抑制し、車両安定性を確保する。"},

  {no:15, cat:"制動装置", stem:"電磁リターダーに関する記述として、適切なものはどれか。", answer:"A",
   choices:{A:"電磁リターダーが作動すると、インストルメントパネル内の作動表示ランプが点灯し、同時にストップランプが点灯する。また、ABS連動機能があり、リターダー作動中に車輪がロック傾向になると、車両制御ECUの制御によりリターダーが解除される。",B:"電磁リターダーはABSと連動しておらず、車輪がロック傾向になってもリターダーは継続作動する。",C:"電磁リターダーが作動すると、ストップランプのみ点灯し、作動表示ランプは点灯しない。",D:"電磁リターダーは補助ブレーキの一種だが、作動中にストップランプは点灯しない。"},
   explanation:"正解はA。電磁リターダーはABSと連動しており、作動中に車輪がロック傾向になると車両制御ECUによりリターダーが解除される。また作動時はインストルメントパネルの作動表示ランプとストップランプが同時に点灯する。"},

  {no:16, cat:"制動装置", stem:"電動パーキングブレーキに関する記述として、適切なものはどれか。", answer:"C",
   choices:{A:"電動パーキングブレーキは、従来手動で行っていたケーブルのけん引を、スプリングチャンバーの力で行う。",B:"電動パーキングブレーキのシューギャップ調整警報とは、パーキングブレーキシューが摩耗してくると、シューの交換を促す目的でウォーニングランプを点灯させる機能である。",C:"電動パーキングブレーキは、従来手動で行っていたケーブルのけん引を、電動パーキングブレーキECUで制御された電動パーキングブレーキアクチュエーター内蔵のモーターで行う。",D:"電動パーキングブレーキECUは外気温度変化を考慮せず、一定のケーブルけん引力で制御する。"},
   explanation:"正解はC。電動パーキングブレーキはアクチュエーター内蔵モーターでケーブルをけん引する。シューギャップ調整警報はシューの「交換」ではなく「調整」を促す機能。ECUは温度センサーによる外気温を加味してけん引力を制御する。"},

  {no:17, cat:"制動装置", stem:"電動パーキングブレーキの増し引き機能に関する記述として、適切なものはどれか。", answer:"D",
   choices:{A:"増し引き機能とは、パーキングブレーキ作動前に事前にケーブルを引いておく機能である。",B:"増し引き機能とは、走行中にパーキングブレーキの制動力を自動的に増加させる機能である。",C:"増し引き機能とは、ケーブルの交換時期が近づくと自動的にケーブルを交換するよう促す機能である。",D:"増し引き機能とは、電動パーキングブレーキ作動後にケーブルけん引力の低下があると、ケーブルの増し引きを行う機能である。"},
   explanation:"正解はD。電動パーキングブレーキの増し引き機能は、パーキングブレーキ作動後にケーブルけん引力が低下した場合に、自動的にケーブルの増し引きを行って制動力を維持する機能である。"},

  {no:18, cat:"制動装置", stem:"PAB（パワーアシストブレーキ）に関する記述として、適切なものはどれか。", answer:"B",
   choices:{A:"PABは、ブレーキブースターが正常に作動しているときのみ機能する補助装置である。",B:"PABは、強い制動力が必要なときや、ブレーキブースター失陥時などにより普段の踏力でブレーキを操作した際、不足した制動力を助勢できるようブレーキ液圧を加圧する機能である。",C:"PABは後輪のブレーキ液圧のみを加圧し、前輪への液圧制御は行わない。",D:"PABはブレーキブースターが完全に失陥した場合のみ作動し、通常走行時は機能しない。"},
   explanation:"正解はB。PAB（パワーアシストブレーキ）は、強い制動力が必要なとき、またはブレーキブースター失陥時など、普段の踏力では不足する制動力を補うためにブレーキ液圧を加圧する機能である。"},

  {no:19, cat:"制動装置", stem:"ZF製流体式リターダーの自己診断に関する記述として、適切なものはどれか。", answer:"A",
   choices:{A:"ZF製流体式リターダーの自己診断は、トレーラー連結状態ではキーON時にインジケーターランプが点灯しないため、トレーラー非連結状態で行う。",B:"ZF製流体式リターダーの自己診断は、トレーラーを連結した状態でのみ正確に行える。",C:"ZF製流体式リターダーのリターダーインジケーターランプ（橙）が点滅しているとき、流体式リターダーは正常に作動している。",D:"ZF製流体式リターダーの自己診断はエンジン始動後10分以上経過してから行う必要がある。"},
   explanation:"正解はA。ZF製流体式リターダーの自己診断はトレーラー連結状態だとキーON時にインジケーターランプが点灯しないため、トレーラー非連結状態で実施する必要がある。また、インジケーターランプ（橙）が点滅している場合は流体式リターダーが非作動または制動力が低下している可能性がある。"},

  {no:20, cat:"制動装置", stem:"プロシフトⅤ車両の電動パーキングブレーキの作動に関する記述として、適切なものはどれか。", answer:"C",
   choices:{A:"パーキングブレーキの作動はパーキングブレーキレバーの操作のみで行われ、セレクトレバーの位置は関係しない。",B:"パーキングブレーキの作動はセレクトレバーの操作のみで行われ、パーキングブレーキレバーの位置は関係しない。",C:"電動パーキングブレーキ付きプロシフトⅤ車両では、パーキングブレーキの作動・解除はパーキングブレーキレバーとセレクトレバーの両方が作動・解除位置にならないと作動しない。",D:"キースイッチON時にセレクトレバーを駐車ポジションに操作すると、パーキングブレーキレバーの位置に関わらず自動的に電動パーキングブレーキが作動する。"},
   explanation:"正解はC。電動パーキングブレーキ付きプロシフトⅤ車両では、パーキングブレーキの作動・解除にはパーキングブレーキレバーとセレクトレバーの両方が正しい位置にある必要がある。なお、キースイッチON時にセレクトレバーを駐車ポジションに操作すると、車両制御ECUよりCAN通信にて作動信号が送信される。"},

  {no:21, cat:"操舵走行装置", stem:"速度感応型パワーステアリングに関する記述として、適切なものはどれか。", answer:"B",
   choices:{A:"速度感応型パワーステアリングECUはトランスミッション回転数センサーからの信号に基づいてコントロールバルブへの電流を制御する。",B:"速度感応型パワーステアリングECUが車速センサーからの信号に基づいてパワーステアリングギヤボックスに設けられたコントロールバルブへの電流を制御し、車速に合った操舵力を得られるよう制御する。モード切り替えスイッチでライト・ノーマル・ヘビーに切り替えられる。",C:"速度感応型パワーステアリングのリザーブタンクには20μmのペーパーフィルターが設けられている。",D:"コントロールバルブは速度に応じて自動でのみ切り替わり、手動でのモード切り替えはできない。"},
   explanation:"正解はB。速度感応型パワーステアリングECUは車速センサーからの信号に基づきコントロールバルブの電流を制御する。リザーブタンクには10μmのペーパーフィルターが設けられており、モード切り替えスイッチでライト・ノーマル・ヘビーの3段階に切り替え可能。"},

  {no:22, cat:"操舵走行装置", stem:"エアサスペンションの特徴に関する記述として、不適切なものはどれか。", answer:"D",
   choices:{A:"荷重の変化に応じて、ばね定数が自動的に変化する。",B:"荷重の増減に関係なく車高が常に一定に保たれ、車高の前後左右の傾きを防止できる。",C:"荷重の増減にかかわらず、固有振動数がほぼ一定になる。",D:"荷重が増加するほど車高が高くなり、荷台積載能力が向上する。"},
   explanation:"正解はD（不適切）。エアサスペンションは荷重に関係なく車高を一定に保つシステムであり、荷重が増加しても車高は変わらない（自動調整される）。荷台高さを高くするのではなく、一定に保つことが特徴。"},

  {no:23, cat:"操舵走行装置", stem:"エアサスペンションの制御方式に関する記述として、適切なものはどれか。", answer:"C",
   choices:{A:"電子制御式は各輪に設置されたレベリングバルブのアーム角度の変化によってバルブ内部の給排気バルブを切り替えてエアベローズ内の圧縮エア量を調整する。",B:"メカニカルコントロール式は各車軸に配置された車高センサーからの車高信号を基にECUが車高調整バルブを制御し、圧縮エア量を調整して車高を制御する。",C:"電子制御式は各車軸に配置された車高センサーからの車高信号を基にECUが車高調整バルブを制御する。メカニカルコントロール式は各輪（フロントは軸）に設置されたレベリングバルブのアーム角度の変化によってバルブ内部の給排気バルブを切り替える。",D:"電子制御式・メカニカルコントロール式ともに車高センサーとレベリングバルブの両方を使用して制御する。"},
   explanation:"正解はC。電子制御式は車高センサーの信号をECUが処理して車高調整バルブを制御する方式。メカニカルコントロール式は各輪（フロントは軸）のレベリングバルブのアーム角度変化でバルブを切り替える方式。両者は別々のシステムである。"},

  {no:24, cat:"操舵走行装置", stem:"トラックのエアサスペンションの自動車高調整機能に関する記述として、適切なものはどれか。", answer:"A",
   choices:{A:"エアサスペンションECUは車速を監視しており、車両停止時は1秒間連続で車高がトレランスを外れると車高調整を行う。",B:"車高がトレランスの上限を超えると車高を上げる方向に、下限を下回ると車高を下げる方向に制御する。",C:"エアサスペンションECUは車速を監視しておらず、常時車高調整を行う。",D:"車両走行中も停止時と同じ1秒間の連続検出で車高調整を開始する。"},
   explanation:"正解はA。エアサスペンションECUは車速を常時監視しており、車両停止時は1秒間連続して車高がトレランスを外れた場合に車高調整を行う。車高がトレランス上限を超えると車高を下げる方向に、下限を下回ると車高を上げる方向に制御する（選択肢Bは上下が逆）。"},

  {no:25, cat:"操舵走行装置", stem:"ファイングリップ・非常走行装置に関する記述として、適切なものはどれか。", answer:"D",
   choices:{A:"ファイングリップ・非常走行装置は、前2軸車において2軸間の重量配分を変化させるシステムである。",B:"ファイングリップ・非常走行装置はエアサスペンション車専用のシステムで、リーフスプリング車には利用できない。",C:"エアサスペンション車のファイングリップは、後後軸のエアスプリング内の圧縮エアを約半分まで排出する。",D:"ファイングリップ・非常走行装置は、後2軸車において2軸間の重量配分を変化させるシステムで、エアサスペンション車以外にもリーフスプリング車でも利用される。"},
   explanation:"正解はD。ファイングリップ・非常走行装置は後2軸車（前1軸・後2軸の2デフ車等）において後2軸間の重量配分を変化させるシステムで、エアサスペンション車だけでなくリーフスプリング車にも適用される。エアサスペンション車のファイングリップは後後軸のエアスプリング内の圧縮エアを全排出する。"},

  {no:26, cat:"操舵走行装置", stem:"電子制御式エアサスペンションのファイングリップ機能におけるエアスプリング圧力センサーに関する記述として、適切なものはどれか。", answer:"B",
   choices:{A:"エアスプリング圧力センサーはエアスプリングの外気温を計測し、エアサスペンションECUに送信する。",B:"エアスプリング圧力センサーはエアスプリングの内圧を計測してエアサスペンションECUに送信し、この信号をもとにエアサスペンションECUは軸重（積載重量＋空車重量）を判定している。",C:"エアスプリング圧力センサーはエアスプリングの内圧を計測するが、積載重量の判定には使用されない。",D:"エアスプリング圧力センサーは車速信号と組み合わせて使用され、走行中のみ軸重を判定する。"},
   explanation:"正解はB。電子制御式エアサスペンションのエアスプリング圧力センサーはエアスプリングの内圧を計測し、その信号からエアサスペンションECUが軸重（積載重量＋空車重量）を判定する。これによりファイングリップ・非常走行機能の制御が行われる。"},

  {no:27, cat:"操舵走行装置", stem:"バスのハイトコントロール機能（車高アップ）に関する記述として、適切なものはどれか。", answer:"C",
   choices:{A:"車高が上昇した状態で車速が10km/h以上になるとブザーが鳴り、強制的に標準車高へ戻される。",B:"車高が上昇した状態で車速が30km/h以上になるとブザーが鳴り、強制的に標準車高へ戻される。",C:"車高が上昇した状態で車速が20km/h以上になるとブザーが鳴り、強制的に標準車高へ戻される。",D:"車高アップ機能は走行中も維持されるため、車速による自動解除機能はない。"},
   explanation:"正解はC。バスのハイトコントロール機能（車高アップ）において、車高が上昇した状態で車速が20km/h以上になるとブザーが鳴り、強制的に標準車高へ戻される安全機構が設けられている。"},

  {no:28, cat:"操舵走行装置", stem:"ステアリングホイールの振れの推定原因として、不適切なものはどれか。", answer:"D",
   choices:{A:"キングピンと キングピンブッシュのクリアランス過大によるガタが発生すると、走行中にホイールに振動が発生しステアリングホイールに伝わる。",B:"タイヤの偏摩耗やホイールバランスの不良は、ステアリングホイールの振れに大きく影響する。",C:"ブレーキの片効きや引きずりが発生すると、タイヤの転がり抵抗に左右差が発生し、回転アンバランスがステアリングホイール振れを引き起こす。",D:"エンジンオイルの粘度が高い場合、直接ステアリングホイールの振れの原因となる。"},
   explanation:"正解はD（不適切）。エンジンオイルの粘度はステアリングホイールの振れとは直接関係しない。ステアリングホイール振れの推定原因はフロントアクスルのガタ、タイヤ・ホイールのアライメントやバランス不良、ブレーキの片効き、サスペンションの不具合などである。"},

  {no:29, cat:"電気装置", stem:"アイドルストップシステムに関する記述として、適切なものはどれか。", answer:"A",
   choices:{A:"アイドルストップシステムは、渋滞や信号待ちなどの停車時にパーキングブレーキを作動させることで自動的にエンジンを停止し、排出ガス・騒音の低減と燃費向上を図るシステムである。発進時はクラッチペダルを踏み込むだけで自動的にエンジンが始動する。",B:"アイドルストップシステムは、ブレーキペダルを踏んで停車するとエンジンが自動停止し、アクセルペダルを踏むと再始動する。",C:"アイドルストップシステムのアイドルストップ用エア圧スイッチは、エア圧が高い時に車両制御ECUへ信号を送信し、エンジン自動停止を禁止する。",D:"ポスト新長期以降の車両では、アイドルストップECUが独立して制御を行い、車両制御ECUは関与しない。"},
   explanation:"正解はA。アイドルストップシステムはパーキングブレーキ作動により自動停止し、クラッチペダル踏み込みで再始動する。アイドルストップ用エア圧スイッチはエア圧が「低い」時に信号を送りエンジン自動停止を禁止する。ポスト新長期以降はアイドルストップECUが廃止され、車両制御ECUが制御を担う。"},

  {no:30, cat:"電気装置", stem:"ESスタートに関する記述として、不適切なものはどれか。", answer:"C",
   choices:{A:"ESスタートは、坂道発進時のブレーキ保持と解除をECUが自動で行うことで、パーキングブレーキによるブレーキ保持やブレーキペダルからアクセルペダルへの踏み変え操作をなくし、ドライバーの負担を軽減するシステムである。",B:"ESスタートの作動条件の一つに、車両停車位置が登り勾配であることが挙げられる。",C:"ESスタートの解除条件の一つにパーキングブレーキが作動状態であることが挙げられ、車両制御ECUはスプリングブレーキスイッチの信号のみを用いてパーキングブレーキの作動状態を判断している。",D:"ESスタートコントロールバルブは、車両制御ECUからの信号によって作動する。"},
   explanation:"正解はC（不適切）。ESスタートの解除条件にパーキングブレーキが作動状態であることは含まれるが、車両制御ECUはスプリングブレーキスイッチの信号「のみ」を用いているわけではない。複数の信号を組み合わせてパーキングブレーキの作動状態を判断する。"},

  {no:31, cat:"電気装置", stem:"エコラン制御に関する記述として、適切なものはどれか。", answer:"D",
   choices:{A:"車両制御ECUはエンジンECUに対しエコラン作動信号を送信し、この信号を基にエンジンECUがエコラン制御を行う。",B:"エコラン制御のアクセルファジー制御とは、エンジンリターダー弱を作動させてトップギヤで走行している際、ドライバーのアクセル波状運転を検出すると、自動的にエンジンリターダー強へ切り替える制御である。",C:"エコラン制御が自動的に解除される条件の中に、ウィンカーの操作は含まれない。",D:"エコラン制御のアクセルファジー制御とは、エンジンリターダー強を作動させてトップギヤで走行している際、車両制御ECUがドライバーのアクセル波状運転を検出すると、車両制御ECUが自動的にエンジンリターダー弱へ切り替える制御である。"},
   explanation:"正解はD。エコラン制御のアクセルファジー制御は、エンジンリターダー強でトップギヤ走行中にアクセル波状運転を検出すると、エンジンリターダー弱へ自動切り替えする制御（強→弱の方向）。またエコラン制御の自動解除条件にはウィンカー操作も含まれる。車両制御ECUがエコラン作動信号をエンジンECUへ送信するという記述（選択肢A）は正しいが、「この信号を基にエンジンECUがエコラン制御を行う」という表現は不正確。"},

  {no:32, cat:"電気装置", stem:"ヘッドライトオートレベリングに関する記述として、適切なものはどれか。", answer:"B",
   choices:{A:"オートレベリングECUは車速信号や車高センサーからの車高信号と、トランスミッションECU内に記憶されたホイールベース情報から車両の姿勢変化を演算する。",B:"オートレベリングECUは、車速信号や車高センサーからの車高信号と車両制御ECU内に記憶されたホイールベース情報から、車両の姿勢変化を演算してヘッドランプアクチュエーターを駆動し、光軸を制御している。",C:"ヘッドライトオートレベリングは停車中のみ光軸制御を行い、走行中は制御を行わない。",D:"ヘッドライトオートレベリングは悪路走行中も常に光軸制御を行い、姿勢変化を読み取り続ける。"},
   explanation:"正解はB。オートレベリングECUは車速信号・車高センサー信号・車両制御ECU内のホイールベース情報から車両姿勢変化を演算し、ヘッドランプアクチュエーターを制御する。悪路走行中は光軸制御を行わない（姿勢変化が激しいため制御しない）。"},

  {no:33, cat:"電気装置", stem:"スキャニングクルーズに関する記述として、適切なものはどれか。", answer:"A",
   choices:{A:"スキャニングクルーズ/スキャニングクルーズⅡのミリ波レーダーセンサーは、ミリ波を送受信し、先行車もしくは停止車両との距離（車間距離）および相対速度を計測する。",B:"車間距離警報（ニューセーフティアイ）機能で、自車速度と同等以上で走行している先行車がいる場合は、警報を継続する。",C:"スキャニングクルーズはカメラセンサーのみで先行車との車間距離を計測する。",D:"車間距離警報（ニューセーフティアイ）機能は、停止車両に対しては作動しない。"},
   explanation:"正解はA。スキャニングクルーズはミリ波レーダーセンサーを使用し、先行車・停止車両との距離と相対速度を計測する。車間距離警報（ニューセーフティアイ）は、自車速度と同等以上で走行している先行車がいる場合は警報を停止する条件に当てはまる（警報を継続するのは不適切）。"},

  {no:34, cat:"電気装置", stem:"ふらつき警報に関する記述として、適切なものはどれか。", answer:"C",

let current=0,answers=new Array(questions.length).fill(null);
function render(){
  const q=questions[current];
  const answered=answers[current]!==null;
  document.getElementById('prog').textContent=`${current+1} / ${questions.length}`;
  document.getElementById('barfill').style.width=`${((current+1)/questions.length)*100}%`;
  let html=`<div class="section-badge">${q.cat}</div><div class="qtitle">問${q.no}</div><div class="qstem">${q.stem}</div><div class="choices">`;
  ['A','B','C','D'].forEach(k=>{
    let cls='choice';
    if(answered){if(k===q.answer)cls+=' correct';else if(k===answers[current])cls+=' wrong';}
    html+=`<button class="${cls}" onclick="select('${k}')"><span class="label">${k}</span><span>${q.choices[k]}</span></button>`;
  });
  html+=`</div>`;
  if(answered)html+=`<div class="explanation show">💡 ${q.explanation}</div>`;
  document.getElementById('quiz').innerHTML=html;
  document.getElementById('nextBtn').textContent=current===questions.length-1?'結果を見る':'次へ ▶';
}
function select(k){if(answers[current]!==null)return;answers[current]=k;render();}
function nextQ(){if(current===questions.length-1){showResult();return;}current++;render();}
function prevQ(){if(current>0){current--;render();}}
function showResult(){
  document.getElementById('nav').style.display='none';
  document.getElementById('quiz').style.display='none';
  const correct=answers.filter((a,i)=>a===questions[i].answer).length;
  document.getElementById('result').style.display='block';
  document.getElementById('result').innerHTML=`<div class="result"><div style="font-weight:900;font-size:18px">結果</div><div class="score-big">${correct} / ${questions.length}</div><div style="font-size:14px;color:#666">${Math.round(correct/questions.length*100)}点</div><div class="actions"><button onclick="location.reload()" style="padding:14px;border:none;border-radius:12px;background:#2563eb;color:#fff;font-size:16px;font-weight:700;cursor:pointer">もう一度</button></div></div>`;
}
render();
</script>
